<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ბილიარდი — კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;--panel:#120f24;--panel2:#1a1730;--border:rgba(160,80,255,0.35);
  --text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;--input-bg:#221f3a;
  --online:#c07aff;--indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.18);
  --glow:rgba(168,85,247,0.28);--accent:#f07aff;
  --green:#4ade80;--green-f:rgba(74,222,128,0.15);
  --felt:#1a4a2e;--felt2:#1f5c38;--rail:#2d1b00;--rail2:#4a2d00;--chalk:#d4a574;
}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ─── TOPNAV ─── */
#topnav{display:flex;align-items:center;gap:8px;background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;flex-shrink:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.nav-logo{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:900;color:var(--accent);letter-spacing:1px;cursor:pointer;white-space:nowrap}
.nav-logo span{color:var(--text3);font-weight:400}
.nav-back{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;padding:6px 14px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;transition:all .2s}
.nav-back:hover{background:var(--border);color:var(--text)}
.nav-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-left:4px}
.nav-spacer{flex:1}
.nav-score{font-family:'Unbounded',sans-serif;font-size:12px;color:var(--accent);background:var(--indigo-f);border:1px solid var(--border);border-radius:12px;padding:5px 14px}

/* ─── LAYOUT ─── */
#layout{display:flex;flex:1;min-height:0;gap:0}
#gameArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;padding:12px;gap:10px;position:relative}
#rightPanel{width:280px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
@media(max-width:768px){#rightPanel{display:none}#layout{flex-direction:column}#gameArea{padding:6px}}

/* ─── LOBBY ─── */
#lobbyScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;width:100%;max-width:520px;margin:0 auto}
.lobby-icon{font-size:72px;filter:drop-shadow(0 0 30px var(--glow));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.lobby-title{font-family:'Unbounded',sans-serif;font-size:24px;font-weight:900;color:var(--text);text-align:center}
.lobby-subtitle{font-size:13px;color:var(--text3);text-align:center}
.lobby-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.lobby-btn{padding:14px 24px;border-radius:16px;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;letter-spacing:.5px}
.lobby-btn.primary{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;box-shadow:0 6px 24px rgba(120,30,200,.5)}
.lobby-btn.primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(120,30,200,.65)}
.lobby-btn.secondary{background:var(--indigo-f);border:1px solid var(--border);color:var(--text2)}
.lobby-btn.secondary:hover{background:var(--border);color:var(--text)}
.lobby-btn.green{background:linear-gradient(135deg,#16a34a,#4ade80);color:#052e16;box-shadow:0 6px 24px rgba(74,222,128,.4)}
.lobby-btn.green:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(74,222,128,.55)}

/* ─── INVITE ─── */
#inviteModal{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:5000;display:none;align-items:center;justify-content:center;padding:16px}
#inviteModal.open{display:flex}
.invite-box{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px var(--glow)}
.invite-title{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;color:var(--text);margin-bottom:16px;letter-spacing:1px;text-transform:uppercase}
.invite-search{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:13px;font-family:'Noto Sans Georgian',sans-serif;outline:none;margin-bottom:12px}
.invite-search:focus{border-color:var(--indigo2)}
.invite-search::placeholder{color:var(--text3)}
#inviteUserList{max-height:220px;overflow-y:auto}
#inviteUserList::-webkit-scrollbar{width:3px}
#inviteUserList::-webkit-scrollbar-thumb{background:var(--border)}
.invite-user-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:3px}
.invite-user-item:hover{background:var(--indigo-f);border-color:var(--border)}
.invite-av{width:36px;height:36px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0}
.invite-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.invite-name{font-size:13px;font-weight:500;color:var(--text)}
.invite-online{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.invite-cancel{margin-top:12px;width:100%;padding:10px;border-radius:12px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif}
.invite-cancel:hover{background:var(--border)}

/* ─── INCOMING INVITE ─── */
#incomingModal{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:6000;display:none;align-items:center;justify-content:center;padding:16px}
#incomingModal.open{display:flex}
.incoming-box{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:28px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 50px rgba(74,222,128,.3),0 0 100px rgba(74,222,128,.1);animation:popIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.incoming-icon{font-size:56px;margin-bottom:12px;animation:float 2s ease-in-out infinite}
.incoming-from{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.incoming-msg{font-size:13px;color:var(--text2);margin-bottom:20px}
.incoming-btns{display:flex;gap:10px}
.incoming-accept{flex:1;padding:12px;border-radius:14px;background:linear-gradient(135deg,#16a34a,#4ade80);border:none;color:#052e16;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.incoming-accept:hover{transform:scale(1.04);box-shadow:0 6px 20px rgba(74,222,128,.5)}
.incoming-decline{flex:1;padding:12px;border-radius:14px;background:rgba(220,0,0,.1);border:1px solid rgba(220,0,0,.3);color:#ff7777;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.incoming-decline:hover{background:rgba(220,0,0,.2)}

/* ─── WAITING SCREEN ─── */
#waitingScreen{display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center}
.waiting-spinner{width:56px;height:56px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.waiting-title{font-family:'Unbounded',sans-serif;font-size:16px;color:var(--text)}
.waiting-sub{font-size:13px;color:var(--text3)}
.waiting-cancel{padding:10px 24px;border-radius:12px;background:rgba(220,0,0,.1);border:1px solid rgba(220,0,0,.3);color:#ff7777;font-size:13px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;transition:all .2s}
.waiting-cancel:hover{background:rgba(220,0,0,.2)}

/* ─── GAME HUD ─── */
#gameHUD{display:flex;align-items:center;gap:12px;width:100%;max-width:700px;flex-shrink:0}
.hud-player{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:10px 14px;display:flex;align-items:center;gap:10px;transition:all .3s;position:relative;overflow:hidden}
.hud-player.active{border-color:var(--accent);box-shadow:0 0 20px rgba(168,85,247,.3)}
.hud-player.active::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(168,85,247,.08),transparent);animation:shimmer 2s ease infinite}
.hud-player.p2active{border-color:var(--green);box-shadow:0 0 20px rgba(74,222,128,.3)}
.hud-player.p2active::before{background:linear-gradient(90deg,transparent,rgba(74,222,128,.08),transparent);animation:shimmer 2s ease infinite}
@keyframes shimmer{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
.hud-av{width:38px;height:38px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0}
.hud-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hud-info{flex:1;min-width:0}
.hud-name{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hud-balls{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.hud-ball{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex-shrink:0}
.hud-turn{font-size:9px;font-family:'Unbounded',sans-serif;color:var(--accent);letter-spacing:.5px;position:absolute;top:6px;right:8px}
.hud-vs{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:900;color:var(--text3);flex-shrink:0}

/* ─── TABLE WRAP ─── */
#tableWrap{position:relative;background:var(--rail);border-radius:16px;padding:18px;box-shadow:0 0 60px rgba(0,0,0,.8),inset 0 0 20px rgba(0,0,0,.5);flex-shrink:0}
#tableWrap::before{content:'';position:absolute;inset:0;border-radius:16px;background:linear-gradient(135deg,rgba(255,255,255,.05),transparent);pointer-events:none}
canvas#billiards{display:block;border-radius:8px;cursor:crosshair;touch-action:none}

/* ─── CUE POWER ─── */
#powerBar{display:flex;align-items:center;gap:8px;width:100%;max-width:700px;flex-shrink:0}
.power-label{font-size:10px;font-family:'Unbounded',sans-serif;color:var(--text3);white-space:nowrap}
.power-track{flex:1;height:8px;background:var(--panel2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.power-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#4ade80,#fbbf24,#ef4444);transition:width .1s}
#powerVal{font-size:10px;font-family:'Unbounded',sans-serif;color:var(--text2);width:30px;text-align:right}

/* ─── STATUS BAR ─── */
#statusBar{font-size:12px;color:var(--text2);text-align:center;min-height:20px;font-style:italic}

/* ─── RESULT OVERLAY ─── */
#resultOverlay{position:absolute;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);border-radius:16px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px;text-align:center;z-index:200}
#resultOverlay.open{display:flex}
.result-icon{font-size:60px;animation:float 2s ease-in-out infinite}
.result-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:var(--text)}
.result-sub{font-size:13px;color:var(--text2)}
.result-btn{padding:12px 32px;border-radius:14px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;margin-top:4px}
.result-btn.again{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;box-shadow:0 6px 24px rgba(120,30,200,.5)}
.result-btn.again:hover{transform:translateY(-2px)}
.result-btn.back{background:var(--indigo-f);border:1px solid var(--border);color:var(--text2)}
.result-btn.back:hover{background:var(--border)}

/* ─── RIGHT PANEL ─── */
#rpTabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-tab{flex:1;padding:12px;text-align:center;font-size:11px;font-family:'Unbounded',sans-serif;letter-spacing:.5px;color:var(--text3);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
.rp-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.rp-tab:hover{color:var(--text)}

/* ─── LEADERBOARD ─── */
#lbPanel{flex:1;overflow-y:auto;padding:10px}
#lbPanel::-webkit-scrollbar{width:3px}
#lbPanel::-webkit-scrollbar-thumb{background:var(--border)}
.lb-title{font-size:9px;font-family:'Unbounded',sans-serif;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:6px 6px 4px}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:12px;transition:background .15s;margin-bottom:2px}
.lb-row:hover{background:var(--indigo-f)}
.lb-rank{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;width:26px;text-align:center;flex-shrink:0}
.lb-rank.gold{color:#ffd040;text-shadow:0 0 8px rgba(255,208,64,.5)}
.lb-rank.silver{color:#c8c8c8}
.lb-rank.bronze{color:#c88040}
.lb-av{width:30px;height:30px;border-radius:50%;background:var(--indigo-f);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.lb-name{flex:1;font-size:12px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;color:var(--accent)}
.lb-wl{font-size:10px;color:var(--text3)}

/* ─── CHAT PANEL ─── */
#chatPanel{flex:1;display:none;flex-direction:column;min-height:0}
#chatPanel.active{display:flex}
#lbPanel.active{display:block}
#chatMsgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:4px}
#chatMsgs::-webkit-scrollbar{width:3px}
#chatMsgs::-webkit-scrollbar-thumb{background:var(--border)}
.chat-msg{display:flex;gap:7px;align-items:flex-start;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-msg-av{width:28px;height:28px;border-radius:50%;background:var(--indigo-f);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden}
.chat-msg-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-msg-body{flex:1;min-width:0}
.chat-msg-nick{font-size:10px;font-weight:600;color:var(--indigo2);margin-bottom:2px}
.chat-msg-bubble{background:var(--bubble);border:1px solid var(--border);border-radius:4px 12px 12px 12px;padding:7px 10px;font-size:12px;color:var(--text);word-break:break-word;line-height:1.5}
.chat-msg.mine .chat-msg-bubble{background:rgba(120,30,200,0.22);border-color:rgba(168,85,247,.4)}
.chat-msg.sys .chat-msg-bubble{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.2);color:var(--green);font-style:italic;font-size:11px;text-align:center}
.chat-msg-bubble img.em{width:28px!important;height:28px!important;object-fit:contain;vertical-align:middle;border-radius:4px}
.chat-msg-bubble img.em-gif{width:34px!important;height:34px!important;object-fit:contain;vertical-align:middle;border-radius:5px;animation-play-state:running!important}
.chat-msg-bubble .em-text{font-size:20px;vertical-align:middle;line-height:1}

/* ─── EMOJI PANEL ─── */
#chatEmoPanel{border-top:1px solid var(--border);padding:8px;display:none;flex-wrap:wrap;gap:5px;max-height:140px;overflow-y:auto}
#chatEmoPanel.open{display:flex}
#chatEmoPanel::-webkit-scrollbar{width:3px}
#chatEmoPanel::-webkit-scrollbar-thumb{background:var(--border)}
.cem-btn{width:44px;height:44px;border-radius:10px;background:var(--indigo-f);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.cem-btn:hover{background:var(--border);transform:scale(1.1)}
.cem-btn img{width:30px!important;height:30px!important;border-radius:5px;object-fit:contain;display:block}
.cem-btn .cem-text{font-size:22px;line-height:1}

/* ─── CHAT BAR ─── */
.chat-bar{display:flex;gap:6px;padding:8px;border-top:1px solid var(--border);flex-shrink:0}
.chat-em-btn{width:34px;height:34px;border-radius:10px;background:var(--indigo-f);border:1px solid var(--border);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chat-em-btn:hover{background:var(--border)}
#chatInput{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:8px 12px;color:var(--text);font-size:12px;font-family:'Noto Sans Georgian',sans-serif;outline:none;min-width:0}
#chatInput:focus{border-color:var(--indigo2)}
#chatInput::placeholder{color:var(--text3)}
.chat-send{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;border-radius:10px;color:#fff;font-size:15px;cursor:pointer;padding:0 12px;height:34px;flex-shrink:0;transition:all .2s}
.chat-send:hover{transform:scale(1.05)}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:99999;box-shadow:0 6px 24px rgba(0,0,0,.4);pointer-events:none;animation:popIn .3s ease;white-space:nowrap}

/* ─── BALLCOUNT IN HUD ─── */
.ball-solid{background:conic-gradient(from 0deg,#fbbf24 0deg 360deg)}
.ball-stripe-overlay{background:conic-gradient(from 0deg,#c0c0c0 0deg 360deg)}

/* ─── MOBILE CHAT BTN ─── */
#mobileChatBtn{display:none;position:fixed;bottom:16px;right:16px;z-index:300;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;font-size:22px;cursor:pointer;box-shadow:0 6px 20px rgba(120,30,200,.6);color:#fff}
@media(max-width:768px){#mobileChatBtn{display:flex;align-items:center;justify-content:center}}
#mobileChatOverlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:none;flex-direction:column}
#mobileChatOverlay.open{display:flex}
#mobileChatInner{background:var(--panel);border-radius:20px 20px 0 0;margin-top:auto;height:60vh;display:flex;flex-direction:column;border-top:1px solid var(--border)}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav id="topnav">
  <button class="nav-back" onclick="goBack()">← უკან</button>
  <div class="nav-title">🎱 ბილიარდი</div>
  <div class="nav-spacer"></div>
  <div class="nav-score" id="myScoreDisplay">💜 0</div>
</nav>

<!-- INVITE MODAL -->
<div id="inviteModal">
  <div class="invite-box">
    <div class="invite-title">👥 მოიწვიე მოთამაშე</div>
    <input class="invite-search" id="inviteSearch" placeholder="🔍 ძებნა..." oninput="filterInviteList()">
    <div id="inviteUserList"></div>
    <button class="invite-cancel" onclick="closeInviteModal()">✕ გაუქმება</button>
  </div>
</div>

<!-- INCOMING INVITE -->
<div id="incomingModal">
  <div class="incoming-box">
    <div class="incoming-icon">🎱</div>
    <div class="incoming-from" id="incomingFromName">?</div>
    <div class="incoming-msg">გიწვევთ ბილიარდის თამაშში!</div>
    <div class="incoming-btns">
      <button class="incoming-accept" onclick="acceptInvite()">✅ დასტური</button>
      <button class="incoming-decline" onclick="declineInvite()">❌ უარი</button>
    </div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div id="layout">

  <!-- GAME AREA -->
  <div id="gameArea">

    <!-- LOBBY -->
    <div id="lobbyScreen">
      <div class="lobby-icon">🎱</div>
      <div class="lobby-title">ბილიარდი</div>
      <div class="lobby-subtitle">8-ბურთი · კლასიკური ბილიარდი</div>
      <div class="lobby-btns">

function renderChatContent(s){
  if(!s)return'';
  let h=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/\[e:(\d+)\]/g,(m,id)=>{
    const url=emojiCache[parseInt(id)];
    if(!url)return m;
    if(url.startsWith('http')||url.startsWith('data:')){
      const isGif=url.toLowerCase().includes('.gif')||url.startsWith('data:image/gif');
      return`<img src="${url}" class="${isGif?'em-gif':'em'}" loading="eager">`;
    }
    return`<span class="em-text">${url}</span>`;
  });
  return h;
}

function watchInviteResponse(invId){
  const ch=sb.channel('invite_resp_'+invId)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'billiard_invites',filter:`id=eq.${invId}`},async p=>{
      if(p.new.status==='accepted'){
        sb.removeChannel(ch);
        opponentId=p.new.to_id;
        opponentProf=allUsers.find(u=>u.id===p.new.to_id)||{username:'?',emotion:'😊'};
        await startOnlineGame(invId,'caller');
      } else if(p.new.status==='declined'||p.new.status==='cancelled'){
        sb.removeChannel(ch);
        toast('❌ '+(opponentProf?.username||'?')+' უარი თქვა');
        showLobby();
      }
    }).subscribe();

      if(p.new.status!=='pending')return;

      currentInviteId=p.new.id;
      const sender=allUsers.find(u=>u.id===p.new.from_id)||{username:'?',emotion:'😊'};

// ─── BALL PHYSICS ───
function initGame(){
  balls=[];
  breakShot=true;
  p1Team=null;p2Team=null;myTeam=null;
  p1Pocketed=[];p2Pocketed=[];
  animating=false;
  foulPending=false;

  // Cue ball
  balls.push({id:0,x:W*0.25,y:H/2,vx:0,vy:0,r:11,color:'#ffffff',active:true,type:'cue'});

  // Rack position
  const rx=W*0.65,ry=H/2;
  const rs=23; // spacing
  const rack=[
    {row:0,col:0,n:1},
    {row:1,col:0,n:2},{row:1,col:1,n:9},
    {row:2,col:0,n:3},{row:2,col:1,n:8},{row:2,col:2,n:10},
    {row:3,col:0,n:4},{row:3,col:1,n:14},{row:3,col:2,n:7},{row:3,col:3,n:11},
    {row:4,col:0,n:12},{row:4,col:1,n:6},{row:4,col:2,n:15},{row:4,col:3,n:13},{row:4,col:4,n:5},
  ];
  rack.forEach(({row,col,n})=>{
    const x=rx+row*rs*Math.cos(Math.PI/6);
    const y=ry+(col-(row/2))*rs;
    const isSolid=n>=1&&n<=7;
    balls.push({id:n,x,y,vx:0,vy:0,r:11,color:BALL_COLORS[n],active:true,type:isSolid?'solid':'stripe',n});
  });

  startRenderLoop();
}

function getBallState(){return balls.map(b=>({id:b.id,x:b.x,y:b.y,vx:b.vx,vy:b.vy,active:b.active}))}
function applyBallState(state){state.forEach(s=>{const b=balls.find(x=>x.id===s.id);if(b)Object.assign(b,s)});}

// ─── RENDER LOOP ───
function startRenderLoop(){
  if(raf)cancelAnimationFrame(raf);
  function loop(){
    update();
    draw();
    raf=requestAnimationFrame(loop);
  }
  loop();
}

function update(){
  if(!animating)return;
  let allStopped=true;
  balls.forEach(b=>{
    if(!b.active)return;
    b.x+=b.vx;b.y+=b.vy;
    b.vx*=0.985;b.vy*=0.985;
    if(Math.abs(b.vx)<0.08)b.vx=0;
    if(Math.abs(b.vy)<0.08)b.vy=0;
    if(b.vx||b.vy)allStopped=false;
    // Rail bounce
    if(b.x-b.r<RAIL_W){b.x=RAIL_W+b.r;b.vx*=-0.75;}
    if(b.x+b.r>W-RAIL_W){b.x=W-RAIL_W-b.r;b.vx*=-0.75;}
    if(b.y-b.r<RAIL_W){b.y=RAIL_W+b.r;b.vy*=-0.75;}
    if(b.y+b.r>H-RAIL_W){b.y=H-RAIL_W-b.r;b.vy*=-0.75;}
  });

  // Ball collisions
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      const a=balls[i],b=balls[j];
      if(!a.active||!b.active)continue;
      const dx=b.x-a.x,dy=b.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minD=a.r+b.r;
      if(dist<minD&&dist>0){
        const nx=dx/dist,ny=dy/dist;
        const overlap=(minD-dist)/2;
        a.x-=nx*overlap;a.y-=ny*overlap;
        b.x+=nx*overlap;b.y+=ny*overlap;
        const dvx=b.vx-a.vx,dvy=b.vy-a.vy;
        const dot=dvx*nx+dvy*ny;
        if(dot<0){
          const imp=dot*0.95;
          a.vx+=imp*nx;a.vy+=imp*ny;
          b.vx-=imp*nx;b.vy-=imp*ny;
        }
      }
    }
  }

  // Pocket check
  let pocketedThisTurn=[];
  let cuePocketed=false;
  balls.forEach(b=>{
    if(!b.active)return;
    POCKETS.forEach(p=>{
      const dx=b.x-p.x,dy=b.y-p.y;
      if(Math.sqrt(dx*dx+dy*dy)<POCKET_R+2){
        b.active=false;b.vx=0;b.vy=0;
        if(b.type==='cue'){cuePocketed=true;foulPending=true;}
        else{pocketedThisTurn.push(b);}
      }
    });
  });

  if(allStopped){
    animating=false;
    onTurnEnd(pocketedThisTurn,cuePocketed);
  }
}

function onTurnEnd(pocketed,cueFoul){
  // Assign teams on first pocket
  if(breakShot&&pocketed.length>0){
    breakShot=false;
    if(!p1Team){
      const first=pocketed[0];
      if(currentPlayer===1){p1Team='solid';p2Team='stripe';if(first.type==='stripe'){p1Team='stripe';p2Team='solid';}}
      else{p2Team='solid';p1Team='stripe';if(first.type==='stripe'){p2Team='stripe';p1Team='solid';}}
      myTeam=(currentPlayer===1)?p1Team:p2Team;
      updateHUD();
      toast('⚡ '+((currentPlayer===1)?MYPROF?.username:opponentProf?.username)+' → '+(currentPlayer===1?p1Team:p2Team));
    }
  }

  // Distribute pocketed
  pocketed.forEach(b=>{
    if(currentPlayer===1&&b.type===p1Team){if(!p1Pocketed.includes(b.id))p1Pocketed.push(b.id);}
    else if(currentPlayer===2&&b.type===p2Team){if(!p2Pocketed.includes(b.id))p2Pocketed.push(b.id);}
  });

  // Check 8-ball pocket
  const eightPocketed=pocketed.find(b=>b.id===8);
  if(eightPocketed){
    const myTeamBalls=(currentPlayer===1?p1Team:p2Team);
    const myTeamBallsCount=balls.filter(b=>b.active&&b.type===myTeamBalls).length;
    if(myTeamBallsCount===0){
      // All cleared → win
      endGame(currentPlayer===1?'p1':'p2');
    } else {
      endGame(currentPlayer===1?'p2':'p1');
    }
    return;
  }

  updateHUD();

  // Switch turn?
  const scored=pocketed.length>0&&!cueFoul&&
    p1Team&&(pocketed.every(b=>b.type===(currentPlayer===1?p1Team:p2Team)));

  if(cueFoul){
    setStatus('⚡ ფაული! კიუ ბურთი ხელახლა');
    placeCueBall();
    foulPending=false;
  }

  if(!scored||cueFoul){
    currentPlayer=currentPlayer===1?2:1;
    myTurn=(currentPlayer===1);
  }

  if(gameMode==='online'){
    syncGameState();
  }

  updateTurnHUD();

  if(!myTurn&&gameMode==='ai'){
    setStatus('🤖 AI ფიქრობს...');
    aiThinkTimer=setTimeout(aiTakeTurn,1200+Math.random()*800);
  } else if(myTurn){
    setStatus('🎯 შენი ჯერი!');
  } else {
    setStatus('⏳ მოწინააღმდეგე ითამაშებს...');
  }
}

function placeCueBall(){
  const cb=balls.find(b=>b.id===0);
  if(cb){cb.active=true;cb.x=W*0.25;cb.y=H/2;cb.vx=0;cb.vy=0;}
}

function endGame(winner){
  gameActive=false;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  const iWon=(winner==='p1'&&gameMode!=='online')||(winner==='p1'&&gameMode==='online'&&currentPlayer===1)||(winner==='p1');
  const myWon=(gameMode==='ai')?(winner==='p1'):(winner==='p1');

  document.getElementById('resultIcon').textContent=myWon?'🏆':'😢';
  document.getElementById('resultTitle').textContent=myWon?'გამარჯვება!':'წაგება';
  document.getElementById('resultSub').textContent=myWon?'ბრავო! ქულები დაემატა':'სცადე ისევ!';
  document.getElementById('resultOverlay').classList.add('open');

  if(gameMode==='ai'){
    updateScore(myWon,5);
  } else if(gameMode==='online'&&ME.id){
    updateScore(myWon,10);
    if(opponentId&&opponentId!=='ai'){
      sb.from('profiles').update(myWon?{billiard_losses:((opponentProf?.billiard_losses||0)+1)}:{billiard_wins:((opponentProf?.billiard_wins||0)+1)}).eq('id',opponentId).then(()=>{});
    }
  }
  sendSystemMsg(myWon?`🏆 ${MYPROF?.username} გაიმარჯვა!`:`🏆 ${opponentProf?.username||'AI'} გაიმარჯვა!`);
}

async function updateScore(won,pts){
  if(!MYPROF)return;
  const newScore=(MYPROF.billiard_score||0)+(won?pts:0);
  const newWins=(MYPROF.billiard_wins||0)+(won?1:0);
  const newLosses=(MYPROF.billiard_losses||0)+(won?0:1);
  await sb.from('profiles').update({billiard_score:newScore,billiard_wins:newWins,billiard_losses:newLosses}).eq('id',ME.id);
  MYPROF.billiard_score=newScore;
  MYPROF.billiard_wins=newWins;
  MYPROF.billiard_losses=newLosses;
  document.getElementById('myScoreDisplay').textContent='💜 '+newScore;
  loadLeaderboard();
}

function restartGame(){
  document.getElementById('resultOverlay').classList.remove('open');
  if(gameMode==='ai')startVsAI();
  else showLobby();
}

// ─── AI ───
function aiTakeTurn(){
  if(!gameActive||myTurn||gameMode!=='ai')return;
  const cb=balls.find(b=>b.id===0&&b.active);
  if(!cb)return;

  let targets=balls.filter(b=>b.active&&b.id!==0&&b.id!==8&&b.type===(p2Team||'solid'));
  if(!targets.length)targets=balls.filter(b=>b.active&&b.id===8);
  if(!targets.length)return;

  const target=targets[Math.floor(Math.random()*targets.length)];
  const dx=target.x-cb.x,dy=target.y-cb.y;
  const angle=Math.atan2(dy,dx);
  const power=0.3+Math.random()*0.5;

  shoot(angle,power);
}

// ─── DRAW ───
const canvas=document.getElementById('billiards');
const ctx=canvas.getContext('2d');

function draw(){
  ctx.clearRect(0,0,W,H);
  drawTable();
  drawPockets();
  balls.forEach(b=>{if(b.active)drawBall(b);});
  if(!animating&&myTurn&&gameActive)drawCue();
}

function drawTable(){
  // Felt
  const g=ctx.createRadialGradient(W/2,H/2,20,W/2,H/2,W/2);
  g.addColorStop(0,'#22643a');g.addColorStop(1,'#163d24');
  ctx.fillStyle=g;
  ctx.fillRect(RAIL_W,RAIL_W,W-RAIL_W*2,H-RAIL_W*2);
  // Rail
  ctx.fillStyle='#3a2200';
  ctx.fillRect(0,0,W,RAIL_W);
  ctx.fillRect(0,H-RAIL_W,W,RAIL_W);
  ctx.fillRect(0,0,RAIL_W,H);
  ctx.fillRect(W-RAIL_W,0,RAIL_W,H);
  // Dots on felt
  ctx.fillStyle='rgba(255,255,255,0.08)';
  [[W*0.25,H/2],[W/2,H/4],[W/2,H*3/4],[W*0.75,H/2]].forEach(([x,y])=>{
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
  });
}

function drawPockets(){
  POCKETS.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,POCKET_R,0,Math.PI*2);
    ctx.fillStyle='#000';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();
  });
}

function drawBall(b){
  ctx.save();
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  // Shadow
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=6;ctx.shadowOffsetY=3;
  if(b.type==='stripe'){
    ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,Math.PI*0.2,Math.PI*0.8);
    ctx.fillStyle=b.color;ctx.fill();
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,Math.PI*1.2,Math.PI*1.8);
    ctx.fillStyle=b.color;ctx.fill();
  } else {
    ctx.fillStyle=b.color;ctx.fill();
  }
  ctx.shadowColor='transparent';
  // Shine
  ctx.beginPath();ctx.arc(b.x-b.r*0.28,b.y-b.r*0.3,b.r*0.38,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fill();
  // Number
  if(b.id>0){
    ctx.fillStyle=b.type==='stripe'?b.color:'rgba(255,255,255,0.9)';
    if(b.id===8)ctx.fillStyle='#fff';
    ctx.font=`bold ${b.r*0.85}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=2;
    ctx.fillText(b.id,b.x,b.y);
  }
  ctx.restore();
}

function drawCue(){
  const cb=balls.find(b=>b.id===0&&b.active);
  if(!cb)return;
  const angle=Math.atan2(mouseY-cb.y,mouseX-cb.x);
  const len=isAiming?cuePower*200+40:80;
  const tipX=cb.x-Math.cos(angle)*(cb.r+4);
  const tipY=cb.y-Math.sin(angle)*(cb.r+4);
  const endX=tipX-Math.cos(angle)*len;
  const endY=tipY-Math.sin(angle)*len;
  ctx.save();
  const g=ctx.createLinearGradient(tipX,tipY,endX,endY);
  g.addColorStop(0,'#f0d080');g.addColorStop(1,'#8b4513');
  ctx.strokeStyle=g;
  ctx.lineWidth=7;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(tipX,tipY);ctx.lineTo(endX,endY);ctx.stroke();
  ctx.lineWidth=2;ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.moveTo(tipX,tipY);ctx.lineTo(endX,endY);ctx.stroke();
  // Dotted guide line
  if(isAiming){
    ctx.setLineDash([6,6]);ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,0.2)';
    ctx.beginPath();ctx.moveTo(cb.x,cb.y);ctx.lineTo(cb.x+Math.cos(angle)*150,cb.y+Math.sin(angle)*150);ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

// ─── MOUSE/TOUCH INPUT ───
function getCanvasPos(e){
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width,scaleY=H/rect.height;
  let cx,cy;
  if(e.touches){cx=e.touches[0].clientX;cy=e.touches[0].clientY;}
  else{cx=e.clientX;cy=e.clientY;}
  return{x:(cx-rect.left)*scaleX,y:(cy-rect.top)*scaleY};
}

canvas.addEventListener('mousedown',e=>{
  if(!myTurn||animating||!gameActive)return;
  const p=getCanvasPos(e);mouseX=p.x;mouseY=p.y;
  isDragging=true;isAiming=true;cuePower=0;
});
canvas.addEventListener('mousemove',e=>{
  const p=getCanvasPos(e);mouseX=p.x;mouseY=p.y;
  if(isDragging&&isAiming){
    const cb=balls.find(b=>b.id===0&&b.active);
    if(!cb)return;
    const dx=p.x-cb.x,dy=p.y-cb.y;
    cuePower=Math.min(1,Math.sqrt(dx*dx+dy*dy)/120);
    document.getElementById('powerFill').style.width=(cuePower*100)+'%';
    document.getElementById('powerVal').textContent=Math.round(cuePower*100)+'%';
  }
});
canvas.addEventListener('mouseup',e=>{
  if(!isDragging||!isAiming||!myTurn||animating||!gameActive)return;
  isDragging=false;isAiming=false;
  const cb=balls.find(b=>b.id===0&&b.active);
  if(!cb){isDragging=false;isAiming=false;return;}
  const p=getCanvasPos(e);
  const angle=Math.atan2(p.y-cb.y,p.x-cb.x);
  if(cuePower>0.01)shoot(angle,cuePower);
  cuePower=0;
  document.getElementById('powerFill').style.width='0%';
  document.getElementById('powerVal').textContent='0%';
});

canvas.addEventListener('touchstart',e=>{e.preventDefault();if(!myTurn||animating||!gameActive)return;const p=getCanvasPos(e);mouseX=p.x;mouseY=p.y;isDragging=true;isAiming=true;cuePower=0;},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const p=getCanvasPos(e);mouseX=p.x;mouseY=p.y;if(isDragging){const cb=balls.find(b=>b.id===0&&b.active);if(!cb)return;const dx=p.x-cb.x,dy=p.y-cb.y;cuePower=Math.min(1,Math.sqrt(dx*dx+dy*dy)/120);document.getElementById('powerFill').style.width=(cuePower*100)+'%';document.getElementById('powerVal').textContent=Math.round(cuePower*100)+'%';}},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(!isDragging||!myTurn||animating||!gameActive)return;isDragging=false;isAiming=false;const cb=balls.find(b=>b.id===0&&b.active);if(!cb)return;const p={x:mouseX,y:mouseY};const angle=Math.atan2(p.y-cb.y,p.x-cb.x);if(cuePower>0.01)shoot(angle,cuePower);cuePower=0;document.getElementById('powerFill').style.width='0%';document.getElementById('powerVal').textContent='0%';},{passive:false});

function shoot(angle,power){
  const cb=balls.find(b=>b.id===0&&b.active);
  if(!cb)return;
  const speed=power*18;
  cb.vx=Math.cos(angle)*speed;
  cb.vy=Math.sin(angle)*speed;
  animating=true;
  if(gameMode==='online')myTurn=false;
  setStatus(gameMode==='online'?'⏳ ბურთები მოძრაობენ...':'🎱');
}

// ─── ONLINE SYNC ───
async function syncGameState(){
  if(!GAME_KEY)return;
  await sb.from('billiard_games').upsert({
    game_key:GAME_KEY,
    state:JSON.stringify(getBallState()),
    current_player:currentPlayer
  });
}

function watchGameChannel(){
  if(gameCh){try{sb.removeChannel(gameCh);}catch(e){}}
  gameCh=sb.channel('billiard_game_'+GAME_KEY)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'billiard_games',filter:`game_key=eq.${GAME_KEY}`},p=>{
      if(!p.new.state)return;
      try{
        const st=JSON.parse(p.new.state);
        applyBallState(st);
        currentPlayer=p.new.current_player||currentPlayer;
        myTurn=(currentPlayer===1&&ME.id===opponentId?false:currentPlayer===1);
        // If I was originally callee (P2)
        const amP1=(gameMode==='online'&&currentInviteId);
        updateTurnHUD();
        setStatus(myTurn?'🎯 შენი ჯერი!':'⏳ მოწინააღმდეგე ითამაშებს...');
      }catch(e){}
    }).subscribe();
}

// ─── HUD ───
function updateHUD(){
  const b1=document.getElementById('hudP1Balls'),b2=document.getElementById('hudP2Balls');
  b1.innerHTML='';b2.innerHTML='';
  if(p1Team){
    const total=7;
    for(let i=0;i<total;i++){
      const d=document.createElement('div');
      d.className='hud-ball';
      d.style.background=i<p1Pocketed.length?`${p1Team==='solid'?'#fbbf24':'#93c5fd'}`:'rgba(255,255,255,0.15)';
      b1.appendChild(d);
    }
  }
  if(p2Team){
    const total=7;
    for(let i=0;i<total;i++){
      const d=document.createElement('div');
      d.className='hud-ball';
      d.style.background=i<p2Pocketed.length?`${p2Team==='solid'?'#fbbf24':'#93c5fd'}`:'rgba(255,255,255,0.15)';
      b2.appendChild(d);
    }
  }
}

function updateTurnHUD(){
  const h1=document.getElementById('hudP1');
  const h2=document.getElementById('hudP2');
  const t1=document.getElementById('hudP1Turn');
  const t2=document.getElementById('hudP2Turn');
  h1.classList.toggle('active',currentPlayer===1);
  h2.classList.toggle('active',currentPlayer===2);
  h2.classList.toggle('p2active',currentPlayer===2);
  t1.style.display=currentPlayer===1?'':'none';
  t2.style.display=currentPlayer===2?'':'none';
}

function setStatus(msg){document.getElementById('statusBar').textContent=msg}

// ─── CHAT ───
function watchChatChannelForGame(){
  if(!GAME_KEY)return;
  if(chatCh){try{sb.removeChannel(chatCh);}catch(e){}}
  chatCh=sb.channel('billiard_chat_'+GAME_KEY)
    .on('broadcast',{event:'msg'},({payload})=>{
      if(!payload||payload.uid===ME.id)return;
      appendChatMsg({nick:payload.nick,content:payload.content,uid:payload.uid});
    }).subscribe();
}

function watchChat(){
  // For AI mode — local only, no channel needed
}

async function sendChatMsg(){
  const inp=document.getElementById('chatInput');
  const t=inp.value.trim();
  if(!t)return;
  inp.value='';
  sendChatMsgText(t);
}

async function sendChatMsgText(t){
  appendChatMsg({nick:MYPROF?.username||'?',content:t,uid:ME.id,mine:true});
  if(gameMode==='online'&&GAME_KEY&&chatCh){
    try{chatCh.send({type:'broadcast',event:'msg',payload:{uid:ME.id,nick:MYPROF?.username,content:t}});}catch(e){}
  }
}

function sendSystemMsg(msg){appendChatMsg({content:msg,sys:true})}

function appendChatMsg({nick,content,uid,mine,sys}){
  const isMe=mine||(uid&&uid===ME.id);
  const wrap=document.createElement('div');
  wrap.className='chat-msg'+(isMe?' mine':'')+(sys?' sys':'');
  if(!sys){
    const u=uid?allUsers.find(x=>x.id===uid):null;
    const avHtml=u?.avatar_url?`<img src="${u.avatar_url}">`:(u?.emotion||'😊');
    wrap.innerHTML=`<div class="chat-msg-av">${avHtml}</div><div class="chat-msg-body"><div class="chat-msg-nick">${esc(nick||'?')}</div><div class="chat-msg-bubble">${renderChatContent(content)}</div></div>`;
  } else {
    wrap.innerHTML=`<div class="chat-msg-body" style="width:100%"><div class="chat-msg-bubble">${esc(content)}</div></div>`;
  }
  // append to desktop & mobile
  const chatMsgs=document.getElementById('chatMsgs');
  chatMsgs.appendChild(wrap);
  chatMsgs.scrollTop=chatMsgs.scrollHeight;
  const mobMsgs=document.getElementById('mobChatMsgs');
  mobMsgs.appendChild(wrap.cloneNode(true));
  mobMsgs.scrollTop=mobMsgs.scrollHeight;
}

init();
