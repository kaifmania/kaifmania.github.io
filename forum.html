<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფფორუმი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #1a1033; /* შენი საიტის მუქი იასამნისფერი */
        --card-bg: rgba(255, 255, 255, 0.05);
        --accent: #6d5dfc;
        --text-color: #ffffff;
        --text-dim: #b0a8c5;
        --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Noto Sans Georgian', sans-serif;
        background: var(--bg-color);
        color: var(--text-color);
        padding: 20px;
        overflow-x: hidden;
    }

    /* ფორუმის კონტეინერი */
    .forum-wrapper {
        max-width: 900px;
        margin: 0 auto;
    }

    .forum-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 1px solid var(--border);
    }

    .forum-title { font-size: 22px; font-weight: 600; }

    /* ღილაკი "+ ახალი თემა" - მხოლოდ ადმინებისთვის */
    .admin-btn {
        background: linear-gradient(135deg, #6d5dfc, #a085ff);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.3s;
        display: none; /* საწყისად დამალულია */
    }

    .admin-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(109, 93, 252, 0.4); }

    /* თემის ბარათი */
    .topic-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 15px;
        transition: 0.3s ease;
        cursor: pointer;
        backdrop-filter: blur(10px);
    }

    .topic-card:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--accent);
    }

    .topic-top { display: flex; align-items: flex-start; gap: 15px; }

    .topic-emoji {
        font-size: 24px;
        background: rgba(109, 93, 252, 0.2);
        width: 50px; height: 50px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 15px;
    }

    .topic-info h3 { font-size: 18px; margin-bottom: 5px; color: var(--text-color); }
    
    .topic-meta {
        font-size: 13px;
        color: var(--text-dim);
        display: flex;
        gap: 15px;
    }

    /* კომენტარების სექცია */
    .comments-box {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid var(--border);
        display: none;
    }

    .comment {
        background: rgba(0, 0, 0, 0.2);
        padding: 10px 15px;
        border-radius: 12px;
        margin-bottom: 10px;
        font-size: 14px;
    }

    .comment-user { color: var(--accent); font-weight: 600; font-size: 12px; margin-bottom: 3px; }

    .add-comment-form {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }

    input[type="text"] {
        flex: 1;
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--border);
        padding: 10px 15px;
        border-radius: 10px;
        color: white;
        outline: none;
    }

    /* ახალი თემის ფორმა */
    .new-topic-modal {
        background: rgba(26, 16, 51, 0.95);
        border: 1px solid var(--accent);
        padding: 25px;
        border-radius: 20px;
        margin-bottom: 25px;
        display: none;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

</style>
</head>
<body>

<div class="forum-wrapper">
    <div class="forum-header">
        <div class="forum-title">კაიფფორუმი</div>
        <button class="admin-btn" id="addTopicBtn">+ ახალი თემა</button>
    </div>

    <div class="new-topic-modal" id="newTopicForm">
        <h3 style="margin-bottom: 15px">ახალი თემის დამატება</h3>
        <input type="text" id="topicTitle" placeholder="თემის სათაური" style="width: 100%; margin-bottom: 10px;"><br>
        <textarea id="topicContent" placeholder="აღწერა..." style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: white; min-height: 80px;"></textarea>
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
            <button onclick="hideNewTopicForm()" style="background: none; border: none; color: white; cursor: pointer;">გაუქმება</button>
            <button class="admin-btn" style="display: block;" onclick="createTopic()">გამოქვეყნება</button>
        </div>
    </div>

    <div id="topicsList">
        <div style="text-align: center; color: var(--text-dim); padding: 40px;">იტვირთება...</div>
    </div>
</div>

<script>
    // სუფაბეისის კონფიგურაცია (იგივე დავტოვე)
    const { createClient } = supabase;
    const sb = createClient(
        "https://vjstuyxuhshsouqsnvxp.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqc3R1eXh1aHNoc291cXNudnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDExOTQsImV4cCI6MjA5MDk3NzE5NH0.sVzu2GTaMwskp8lGb0C9F15Iy7RKT1FxQrwd5JgHquE"
    );

    let myProfile = null;
    let currentUser = null;

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) return;
        currentUser = user;

        const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
        myProfile = profile;

        // მხოლოდ ადმინებს და დამფუძნებლებს ვუჩვენებთ ღილაკს
        if (profile?.role === 'admin' || profile?.role === 'founder') {
            document.getElementById('addTopicBtn').style.display = 'block';
        }

        loadTopics();
    }

    async function loadTopics() {
        const { data } = await sb.from('forum_topics').select('*, profiles(username, emotion)').order('is_pinned', { ascending: false }).order('created_at', { ascending: false });
        const list = document.getElementById('topicsList');
        list.innerHTML = '';

        data.forEach(t => {
            const card = document.createElement('div');
            card.className = 'topic-card';
            card.innerHTML = `
                <div class="topic-top" onclick="toggleComments('${t.id}')">
                    <div class="topic-emoji">${t.profiles?.emotion || '📝'}</div>
                    <div class="topic-info">
                        <h3>${t.title}</h3>
                        <div class="topic-meta">
                            <span>👤 ${t.profiles?.username}</span>
                            <span>💬 ${t.comment_count || 0} პასუხი</span>
                        </div>
                    </div>
                </div>
                <div class="comments-box" id="comments-${t.id}">
                    <div id="list-${t.id}">იტვირთება...</div>
                    <div class="add-comment-form">
                        <input type="text" id="input-${t.id}" placeholder="დაწერე პასუხი...">
                        <button class="admin-btn" style="display: block; padding: 8px 15px;" onclick="addComment('${t.id}')">➤</button>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function toggleComments(id) {
        const box = document.getElementById(`comments-${id}`);
        const isVisible = box.style.display === 'block';
        box.style.display = isVisible ? 'none' : 'block';
        if (!isVisible) loadComments(id);
    }

    async function loadComments(topicId) {
        const { data } = await sb.from('forum_comments').select('*, profiles(username)').eq('topic_id', topicId).order('created_at', { ascending: true });
        const list = document.getElementById(`list-${topicId}`);
        list.innerHTML = data.length ? '' : '<p style="font-size:12px; color:gray;">კომენტარები ჯერ არ არის.</p>';
        data.forEach(c => {
            list.innerHTML += `
                <div class="comment">
                    <div class="comment-user">${c.profiles?.username}</div>
                    <div>${c.content}</div>
                </div>
            `;
        });
    }

    async function addComment(topicId) {
        const input = document.getElementById(`input-${topicId}`);
        const val = input.value.trim();
        if(!val) return;
        await sb.from('forum_comments').insert({ topic_id: topicId, user_id: currentUser.id, content: val });
        input.value = '';
        loadComments(topicId);
    }

    function showNewTopicForm() { document.getElementById('newTopicForm').style.display = 'block'; }
    function hideNewTopicForm() { document.getElementById('newTopicForm').style.display = 'none'; }

    async function createTopic() {
        const title = document.getElementById('topicTitle').value;
        const content = document.getElementById('topicContent').value;
        if(!title) return;
        await sb.from('forum_topics').insert({ title, content, user_id: currentUser.id });
        location.reload();
    }

    document.getElementById('addTopicBtn').onclick = showNewTopicForm;
    init();
</script>
</body>
</html>
