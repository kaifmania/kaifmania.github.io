<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია - ფორუმი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Noto Sans Georgian', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
}

body.dark {
  background: #121212;
  color: #ddd;
}

.header {
  background: #fff;
  border-bottom: 1px solid #ddd;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

body.dark .header {
  background: #1a1a1a;
  border-bottom-color: #333;
}

.logo {
  font-size: 18px;
  font-weight: 600;
  color: #7c3aed;
  cursor: pointer;
}

.user-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #7c3aed;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
}

.username {
  font-size: 13px;
  font-weight: 500;
}

.role-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  background: #e9e9ef;
}

body.dark .role-badge {
  background: #2a2a2a;
}

.role-badge.founder {
  background: #fef3c7;
  color: #b45309;
}

.role-badge.admin {
  background: #ede9fe;
  color: #7c3aed;
}

.btn-icon {
  background: none;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 12px;
}

body.dark .btn-icon {
  border-color: #444;
  color: #ddd;
}

.container {
  max-width: 750px;
  margin: 0 auto;
  padding: 20px;
}

/* ახალი თემის ფორმა - მხოლოდ ადმინ/ფაუნდერი */
.new-topic-form {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
  display: none;
}

body.dark .new-topic-form {
  background: #1a1a1a;
  border-color: #333;
}

.new-topic-form.show {
  display: block;
}

.new-topic-form h4 {
  font-size: 12px;
  margin-bottom: 12px;
  color: #666;
}

input, textarea {
  width: 100%;
  padding: 10px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  margin-bottom: 10px;
  outline: none;
}

body.dark input, body.dark textarea {
  background: #2a2a2a;
  border-color: #444;
  color: #ddd;
}

input:focus, textarea:focus {
  border-color: #7c3aed;
}

textarea {
  min-height: 70px;
  resize: vertical;
}

.form-buttons {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.btn-primary {
  background: #7c3aed;
  border: none;
  padding: 6px 16px;
  border-radius: 8px;
  color: #fff;
  font-weight: 500;
  cursor: pointer;
  font-size: 12px;
}

.btn-secondary {
  background: none;
  border: 1px solid #ddd;
  padding: 6px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
}

.topics-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.topics-header h2 {
  font-size: 14px;
  font-weight: 600;
}

.new-topic-btn {
  background: #7c3aed;
  border: none;
  padding: 5px 14px;
  border-radius: 8px;
  color: #fff;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  display: none;
}

/* თემის ბარათი */
.topic {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
}

body.dark .topic {
  background: #1a1a1a;
  border-color: #333;
}

.topic.pinned {
  border-left: 3px solid #fbbf24;
}

.topic-header {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.topic-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #e9e9ef;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

body.dark .topic-avatar {
  background: #2a2a2a;
}

.topic-info {
  flex: 1;
}

.topic-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.pin-badge {
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 10px;
  background: #fef3c7;
  color: #b45309;
}

.topic-meta {
  display: flex;
  gap: 10px;
  font-size: 10px;
  color: #888;
}

.topic-author {
  color: #7c3aed;
  cursor: pointer;
}

.topic-stats {
  display: flex;
  gap: 8px;
  font-size: 10px;
  color: #888;
}

.topic-actions {
  display: flex;
  gap: 4px;
}

.action-btn {
  background: none;
  border: none;
  font-size: 13px;
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 6px;
}

.action-btn.delete {
  color: #ef4444;
}

.action-btn.pin {
  color: #fbbf24;
}

/* კომენტარები */
.comments-area {
  border-top: 1px solid #eee;
  padding: 12px 16px;
  display: none;
  background: #fafafa;
}

body.dark .comments-area {
  border-top-color: #333;
  background: #151515;
}

.comments-list {
  max-height: 300px;
  overflow-y: auto;
  margin-bottom: 12px;
}

.comment {
  padding: 8px 0;
  border-bottom: 1px solid #eee;
  display: flex;
  gap: 8px;
}

body.dark .comment {
  border-bottom-color: #2a2a2a;
}

.comment-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}

.comment-content {
  flex: 1;
}

.comment-author {
  font-size: 11px;
  font-weight: 600;
  color: #7c3aed;
  margin-bottom: 3px;
}

.comment-text {
  font-size: 12px;
  line-height: 1.4;
}

.comment-time {
  font-size: 9px;
  color: #aaa;
  margin-top: 3px;
}

.comment-delete {
  font-size: 10px;
  color: #ef4444;
  cursor: pointer;
  align-self: center;
}

.add-comment {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.add-comment input {
  margin-bottom: 0;
  padding: 8px;
  font-size: 12px;
}

.add-comment button {
  background: #7c3aed;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  color: #fff;
  font-size: 11px;
  cursor: pointer;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 12px;
  z-index: 1000;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal.show {
  display: flex;
}

.modal-box {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  max-width: 300px;
  width: 90%;
  text-align: center;
}

body.dark .modal-box {
  background: #1a1a1a;
  border: 1px solid #333;
}

.modal-buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 16px;
}

.loading {
  text-align: center;
  padding: 40px;
  font-size: 13px;
  color: #888;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="location.reload()">კაიფფორუმი</div>
  <div class="user-area">
    <div class="avatar" id="userAvatar">👤</div>
    <div>
      <div class="username" id="userName">...</div>
      <div class="role-badge" id="userRole">წევრი</div>
    </div>
    <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="btn-icon" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">
  <div class="new-topic-form" id="newTopicForm">
    <h4>ახალი თემა</h4>
    <input type="text" id="topicTitle" placeholder="სათაური">
    <textarea id="topicContent" placeholder="ტექსტი..."></textarea>
    <div class="form-buttons">
      <button class="btn-secondary" onclick="hideNewTopicForm()">გაუქმება</button>
      <button class="btn-primary" onclick="createTopic()">შექმნა</button>
    </div>
  </div>

  <div class="topics-header">
    <h2>თემები</h2>
    <button class="new-topic-btn" id="addTopicBtn">+ ახალი</button>
  </div>

  <div id="topicsList">
    <div class="loading">იტვირთება...</div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div id="modalMsg">წავშალოთ თემა?</div>
    <div class="modal-buttons">
      <button class="btn-primary" style="background:#ef4444" onclick="confirmDelete()">წაშლა</button>
      <button class="btn-secondary" onclick="closeModal()">გაუქმება</button>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  "https://vjstuyxuhshsouqsnvxp.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqc3R1eXh1aHNoc291cXNudnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDExOTQsImV4cCI6MjA5MDk3NzE5NH0.sVzu2GTaMwskp8lGb0C9F15Iy7RKT1FxQrwd5JgHquE"
);

let currentUser = null;
let myProfile = null;
let topics = [];
let pendingDeleteId = null;
let openComments = new Set();

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { location.href = 'index.html'; return; }
  currentUser = user;
  myProfile = await getProfile(user.id);
  if (!myProfile) {
    await sb.from('profiles').insert({ id: user.id, username: user.email?.split('@')[0] || 'მომხმარებელი', role: 'member', emotion: '😊' });
    myProfile = await getProfile(user.id);
  }
  document.getElementById('userName').innerText = myProfile?.username || '';
  document.getElementById('userAvatar').innerText = myProfile?.emotion || '👤';
  const roleSpan = document.getElementById('userRole');
  if (myProfile?.role === 'founder') {
    roleSpan.innerText = 'დამფუძნებელი';
    roleSpan.className = 'role-badge founder';
  } else if (myProfile?.role === 'admin') {
    roleSpan.innerText = 'ადმინი';
    roleSpan.className = 'role-badge admin';
  } else {
    roleSpan.innerText = 'წევრი';
    roleSpan.className = 'role-badge';
  }
  const canCreate = myProfile?.role === 'admin' || myProfile?.role === 'founder';
  document.getElementById('addTopicBtn').style.display = canCreate ? 'block' : 'none';
  await loadTopics();
  subscribeRealTime();
}

async function getProfile(id) {
  const { data } = await sb.from('profiles').select('*').eq('id', id).single();
  return data;
}

async function loadTopics() {
  const { data } = await sb.from('forum_topics').select('*, profiles(username, role, emotion)').order('is_pinned', { ascending: false }).order('created_at', { ascending: false });
  topics = data || [];
  renderTopics();
}

function renderTopics() {
  const container = document.getElementById('topicsList');
  if (!topics.length) { container.innerHTML = '<div class="loading">ჯერ არ არის თემები</div>'; return; }
  container.innerHTML = '';
  const isAdmin = myProfile?.role === 'admin';
  const isFounder = myProfile?.role === 'founder';
  for (let t of topics) {
    const isOpen = openComments.has(t.id);
    const div = document.createElement('div');
    div.className = `topic ${t.is_pinned ? 'pinned' : ''}`;
    let actions = '';
    if (isAdmin || isFounder) actions += `<button class="action-btn delete" onclick="event.stopPropagation(); deleteTopic('${t.id}')">🗑</button>`;
    if (isFounder) actions += `<button class="action-btn pin" onclick="event.stopPropagation(); pinTopic('${t.id}', ${!t.is_pinned})">📌</button>`;
    div.innerHTML = `
      <div class="topic-header" onclick="toggleComments('${t.id}')">
        <div class="topic-avatar">${t.profiles?.emotion || '📝'}</div>
        <div class="topic-info">
          <div class="topic-title">${escapeHtml(t.title)}${t.is_pinned ? '<span class="pin-badge">პინი</span>' : ''}</div>
          <div class="topic-meta"><span class="topic-author">${escapeHtml(t.profiles?.username || '?')}</span><span>${formatDate(t.created_at)}</span><span>💬 ${t.comment_count || 0}</span></div>
        </div>
        <div class="topic-stats">👁️ ${t.views || 0}</div>
        <div class="topic-actions">${actions}</div>
      </div>
      <div class="comments-area" id="comments-${t.id}" style="display:${isOpen ? 'block' : 'none'}">
        <div class="comments-list" id="commentsList-${t.id}"><div class="loading">იტვირთება...</div></div>
        <div class="add-comment"><input type="text" id="commentInput-${t.id}" placeholder="კომენტარი..."><button onclick="addComment('${t.id}')">გაგზავნა</button></div>
      </div>
    `;
    container.appendChild(div);
    if (isOpen) loadComments(t.id);
  }
}

async function toggleComments(id) {
  if (openComments.has(id)) { openComments.delete(id); document.getElementById(`comments-${id}`).style.display = 'none'; }
  else { openComments.add(id); document.getElementById(`comments-${id}`).style.display = 'block'; loadComments(id); }
}

async function loadComments(topicId) {
  const { data } = await sb.from('forum_comments').select('*, profiles(username, role, emotion)').eq('topic_id', topicId).order('created_at', true);
  renderComments(topicId, data || []);
}

function renderComments(topicId, comments) {
  const container = document.getElementById(`commentsList-${topicId}`);
  if (!container) return;
  if (!comments.length) { container.innerHTML = '<div style="padding:12px;text-align:center;color:#888">კომენტარები არ არის</div>'; return; }
  container.innerHTML = '';
  const isAdminOrFounder = myProfile?.role === 'admin' || myProfile?.role === 'founder';
  for (let c of comments) {
    const canDelete = isAdminOrFounder || c.user_id === currentUser?.id;
    const div = document.createElement('div');
    div.className = 'comment';
    div.innerHTML = `
      <div class="comment-avatar">${c.profiles?.emotion || '💬'}</div>
      <div class="comment-content">
        <div class="comment-author">${escapeHtml(c.profiles?.username || '?')}</div>
        <div class="comment-text">${escapeHtml(c.content)}</div>
        <div class="comment-time">${formatDate(c.created_at)}</div>
      </div>
      ${canDelete ? `<span class="comment-delete" onclick="deleteComment('${c.id}', '${topicId}')">🗑</span>` : ''}
    `;
    container.appendChild(div);
  }
}

async function addComment(topicId) {
  const input = document.getElementById(`commentInput-${topicId}`);
  const content = input.value.trim();
  if (!content) { toast('დაწერე კომენტარი'); return; }
  await sb.from('forum_comments').insert({ topic_id: topicId, user_id: currentUser.id, content });
  input.value = '';
  await loadComments(topicId);
  await updateCount(topicId);
  toast('კომენტარი დაემატა');
}

async function deleteComment(commentId, topicId) {
  const isAdminOrFounder = myProfile?.role === 'admin' || myProfile?.role === 'founder';
  const { data: c } = await sb.from('forum_comments').select('user_id').eq('id', commentId).single();
  if (!isAdminOrFounder && c?.user_id !== currentUser?.id) { toast('არ გაქვს უფლება'); return; }
  await sb.from('forum_comments').delete().eq('id', commentId);
  await loadComments(topicId);
  await updateCount(topicId);
  toast('წაიშალა');
}

async function updateCount(topicId) {
  const { count } = await sb.from('forum_comments').select('*', { count: 'exact', head: true }).eq('topic_id', topicId);
  await sb.from('forum_topics').update({ comment_count: count }).eq('id', topicId);
  await loadTopics();
}

async function createTopic() {
  if (myProfile?.role !== 'admin' && myProfile?.role !== 'founder') { toast('არ გაქვს უფლება'); return; }
  const title = document.getElementById('topicTitle').value.trim();
  if (!title) { toast('ჩაწერე სათაური'); return; }
  const content = document.getElementById('topicContent').value.trim();
  await sb.from('forum_topics').insert({ title, content: content || '', user_id: currentUser.id });
  document.getElementById('topicTitle').value = '';
  document.getElementById('topicContent').value = '';
  hideNewTopicForm();
  await loadTopics();
  toast('თემა შეიქმნა');
}

function showNewTopicForm() { document.getElementById('newTopicForm').classList.add('show'); }
function hideNewTopicForm() { document.getElementById('newTopicForm').classList.remove('show'); }

function deleteTopic(id) {
  if (myProfile?.role !== 'admin' && myProfile?.role !== 'founder') { toast('არ გაქვს უფლება'); return; }
  pendingDeleteId = id;
  document.getElementById('modal').classList.add('show');
}

async function confirmDelete() {
  if (pendingDeleteId) { await sb.from('forum_topics').delete().eq('id', pendingDeleteId); await loadTopics(); toast('თემა წაიშალა'); pendingDeleteId = null; }
  closeModal();
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

async function pinTopic(id, pinned) {
  if (myProfile?.role !== 'founder') { toast('მხოლოდ დამფუძნებელს შეუძლია'); return; }
  await sb.from('forum_topics').update({ is_pinned: pinned }).eq('id', id);
  await loadTopics();
  toast(pinned ? 'დაპინავდა' : 'პინი მოხსნილია');
}

function formatDate(d) {
  const date = new Date(d);
  const now = new Date();
  const diff = now - date;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'ახლახან';
  if (mins < 60) return mins + ' წთ წინ';
  const hours = Math.floor(diff / 3600000);
  if (hours < 24) return hours + ' სთ წინ';
  const days = Math.floor(diff / 86400000);
  if (days < 7) return days + ' დღის წინ';
  return date.toLocaleDateString('ka-GE');
}

function escapeHtml(s) { if (!s) return ''; return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
function toggleTheme() { document.body.classList.toggle('dark'); document.getElementById('themeBtn').innerText = document.body.classList.contains('dark') ? '☀️' : '🌙'; }
async function logout() { await sb.auth.signOut(); location.href = 'index.html'; }
function subscribeRealTime() {
  sb.channel('live').on('postgres_changes', { event: '*', schema: 'public', table: 'forum_topics' }, () => loadTopics())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'forum_comments' }, () => { openComments.forEach(id => loadComments(id)); }).subscribe();
}
document.getElementById('addTopicBtn').onclick = showNewTopicForm;
init();
</script>
</body>
</html>
