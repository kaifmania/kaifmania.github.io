<!DOCTYPE html>

<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია · ფორუმი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEMES (same as main app) ── */
body.night{–bg:#1c1a30;–panel:#252240;–panel2:#2e2a50;–border:rgba(160,80,255,0.35);–text:#ede0ff;–text2:#b580e0;–text3:#7a5a9a;–bubble:#2a2745;–input-bg:#221f3a;–online:#c07aff;–indigo:#7a1fc8;–indigo2:#a855f7;–indigo-f:rgba(120,30,200,0.18);–glow:rgba(168,85,247,0.28);–accent:#f07aff;}
body.day{–bg:#f5eeff;–panel:#ede0ff;–panel2:#e8d5ff;–border:rgba(106,13,173,0.2);–text:#1e0a36;–text2:#6b3a9e;–text3:#a882cc;–bubble:#fff;–input-bg:#fff;–online:#7b2fbe;–indigo:#5a189a;–indigo2:#7b2fbe;–indigo-f:rgba(106,13,173,0.08);–glow:rgba(106,13,173,0.2);–accent:#c040ff;}
body.theme-ocean{–bg:#0a1628;–panel:#0d1f3c;–panel2:#112447;–border:rgba(0,180,255,0.3);–text:#e0f4ff;–text2:#60b8e8;–text3:#3a7ca8;–bubble:#0e2040;–input-bg:#0a1a30;–online:#00d4ff;–indigo:#005fa3;–indigo2:#0097cc;–indigo-f:rgba(0,150,200,0.15);–glow:rgba(0,180,255,0.25);–accent:#00e5ff;}
body.theme-forest{–bg:#0a1a0f;–panel:#0d2215;–panel2:#10291a;–border:rgba(0,200,80,0.3);–text:#d4f5dc;–text2:#50c870;–text3:#2a7840;–bubble:#0d2015;–input-bg:#091510;–online:#00e555;–indigo:#006830;–indigo2:#00a845;–indigo-f:rgba(0,160,60,0.15);–glow:rgba(0,200,80,0.25);–accent:#00ff80;}
body.theme-sunset{–bg:#1a0a1a;–panel:#250d20;–panel2:#30102a;–border:rgba(255,100,50,0.3);–text:#ffe0d0;–text2:#e87050;–text3:#a84030;–bubble:#250d18;–input-bg:#1a0812;–online:#ff7030;–indigo:#a03010;–indigo2:#e05530;–indigo-f:rgba(200,80,40,0.15);–glow:rgba(255,100,50,0.25);–accent:#ff8c50;}
body.theme-rose{–bg:#1a0a12;–panel:#250d18;–panel2:#300f20;–border:rgba(255,80,120,0.3);–text:#ffe0ec;–text2:#e8608a;–text3:#a83055;–bubble:#250d18;–input-bg:#1a0810;–online:#ff4080;–indigo:#a01040;–indigo2:#e03060;–indigo-f:rgba(200,40,80,0.15);–glow:rgba(255,80,120,0.25);–accent:#ff5090;}
body.theme-gold{–bg:#160f00;–panel:#1e1500;–panel2:#251900;–border:rgba(220,160,0,0.3);–text:#fff5cc;–text2:#d4a030;–text3:#a07820;–bubble:#1e1500;–input-bg:#160f00;–online:#ffc020;–indigo:#8c6000;–indigo2:#c89000;–indigo-f:rgba(200,140,0,0.15);–glow:rgba(220,160,0,0.25);–accent:#ffd040;}
body.theme-cyber{–bg:#000a0a;–panel:#001515;–panel2:#001e1e;–border:rgba(0,255,200,0.3);–text:#ccffee;–text2:#00d8a0;–text3:#008860;–bubble:#001515;–input-bg:#000a0a;–online:#00ffcc;–indigo:#006650;–indigo2:#00aa80;–indigo-f:rgba(0,200,150,0.12);–glow:rgba(0,255,200,0.25);–accent:#00ffe8;}
body.theme-lavender{–bg:#f0ecff;–panel:#e8e0ff;–panel2:#ddd5ff;–border:rgba(120,80,200,0.2);–text:#2a1060;–text2:#6040a8;–text3:#9080c0;–bubble:#fff;–input-bg:#fff;–online:#8060cc;–indigo:#5030a0;–indigo2:#7050c0;–indigo-f:rgba(100,60,180,0.1);–glow:rgba(120,80,200,0.2);–accent:#9060e0;}
body.theme-midnight{–bg:#05050f;–panel:#0a0a1e;–panel2:#0e0e28;–border:rgba(100,100,255,0.3);–text:#d0d0ff;–text2:#8080cc;–text3:#505090;–bubble:#0a0a1e;–input-bg:#05050f;–online:#6060ff;–indigo:#2020a0;–indigo2:#4040cc;–indigo-f:rgba(50,50,200,0.15);–glow:rgba(100,100,255,0.25);–accent:#8080ff;}
body.theme-galaxy{–bg:#080010;–panel:#100020;–panel2:#180030;–border:rgba(180,0,255,0.3);–text:#f0d0ff;–text2:#c060f0;–text3:#803090;–bubble:#100020;–input-bg:#080010;–online:#e040ff;–indigo:#600090;–indigo2:#a000e0;–indigo-f:rgba(150,0,220,0.15);–glow:rgba(180,0,255,0.3);–accent:#e060ff;}
body.theme-arctic{–bg:#e8f4ff;–panel:#d8eeff;–panel2:#c8e4ff;–border:rgba(0,120,200,0.2);–text:#001830;–text2:#005080;–text3:#6090b0;–bubble:#fff;–input-bg:#fff;–online:#0080cc;–indigo:#003060;–indigo2:#0060a0;–indigo-f:rgba(0,80,160,0.1);–glow:rgba(0,120,200,0.2);–accent:#0090e0;}
body.theme-neon{–bg:#000508;–panel:#001008;–panel2:#001810;–border:rgba(0,255,100,0.3);–text:#ccffe8;–text2:#00cc60;–text3:#008840;–bubble:#001008;–input-bg:#000508;–online:#00ff80;–indigo:#004820;–indigo2:#00aa50;–indigo-f:rgba(0,200,80,0.12);–glow:rgba(0,255,100,0.3);–accent:#00ff88;}
body.theme-cherry{–bg:#1a000a;–panel:#250010;–panel2:#300018;–border:rgba(220,0,60,0.3);–text:#ffd0e0;–text2:#cc4060;–text3:#882040;–bubble:#250010;–input-bg:#1a000a;–online:#ff2060;–indigo:#800020;–indigo2:#cc0040;–indigo-f:rgba(200,0,50,0.15);–glow:rgba(220,0,60,0.25);–accent:#ff4080;}
body.theme-mint{–bg:#001a12;–panel:#002218;–panel2:#002d20;–border:rgba(0,220,140,0.3);–text:#ccfff0;–text2:#40d8a0;–text3:#208860;–bubble:#002218;–input-bg:#001a12;–online:#00ff99;–indigo:#006640;–indigo2:#00aa70;–indigo-f:rgba(0,180,100,0.15);–glow:rgba(0,220,140,0.25);–accent:#00ffbb;}
body.theme-storm{–bg:#080d14;–panel:#0d1520;–panel2:#121c2a;–border:rgba(80,140,220,0.3);–text:#d0e8ff;–text2:#5090d0;–text3:#305880;–bubble:#0d1520;–input-bg:#080d14;–online:#60b0ff;–indigo:#1a4080;–indigo2:#3060c0;–indigo-f:rgba(40,80,180,0.15);–glow:rgba(80,140,220,0.25);–accent:#80c8ff;}
body.theme-sand{–bg:#f5e8d0;–panel:#eedfc4;–panel2:#e8d4b8;–border:rgba(160,100,40,0.2);–text:#2a1500;–text2:#805020;–text3:#b09060;–bubble:#fff8ee;–input-bg:#fff;–online:#c06020;–indigo:#604010;–indigo2:#a06030;–indigo-f:rgba(140,80,20,0.1);–glow:rgba(160,100,40,0.2);–accent:#d08040;}
body.theme-ember{–bg:#1a0800;–panel:#220d00;–panel2:#2d1100;–border:rgba(255,120,0,0.3);–text:#ffe8cc;–text2:#e07030;–text3:#a04010;–bubble:#220d00;–input-bg:#1a0800;–online:#ff8000;–indigo:#882000;–indigo2:#cc5000;–indigo-f:rgba(200,80,0,0.15);–glow:rgba(255,120,0,0.25);–accent:#ffaa00;}

body{
font-family:‘Noto Sans Georgian’,sans-serif;
background:var(–bg);color:var(–text);
min-height:100dvh;display:flex;flex-direction:column;
transition:background .4s,color .4s;
}

@keyframes messagePop{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes flicker{0%,100%{filter:drop-shadow(0 0 6px var(–glow))}50%{filter:drop-shadow(0 0 20px var(–glow)) drop-shadow(0 0 40px var(–accent))}}
@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(0.93)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── NAV ── */
#topnav{
display:flex;align-items:center;gap:6px;
background:var(–panel);border-bottom:1px solid var(–border);
padding:6px 16px;z-index:100;flex-shrink:0;
box-shadow:0 2px 20px rgba(0,0,0,.25);
position:sticky;top:0;
}
.nav-logo{font-size:22px;animation:flicker 2.5s ease-in-out infinite;cursor:pointer;flex-shrink:0}
.nav-title{font-family:‘Unbounded’,sans-serif;font-size:12px;font-weight:700;color:var(–text);letter-spacing:.5px}
.nav-sub{font-size:10px;color:var(–text3);background:var(–indigo-f);border:1px solid var(–border);padding:2px 8px;border-radius:12px;font-family:‘Unbounded’,sans-serif;letter-spacing:.5px}
.nav-spacer{flex:1}
.nav-btn{
height:34px;border-radius:10px;background:transparent;border:1px solid transparent;
color:var(–text2);font-size:14px;cursor:pointer;display:flex;align-items:center;
gap:5px;transition:all .2s;white-space:nowrap;padding:0 12px;flex-shrink:0;
}
.nav-btn:hover{background:var(–indigo-f);border-color:var(–border);color:var(–text)}
.nav-btn span{font-size:10px;font-family:‘Unbounded’,sans-serif;letter-spacing:.5px}
.back-btn{
display:flex;align-items:center;gap:6px;padding:5px 14px;
border-radius:12px;background:var(–indigo-f);border:1px solid var(–border);
color:var(–text2);font-size:12px;cursor:pointer;transition:all .2s;
font-family:‘Noto Sans Georgian’,sans-serif;text-decoration:none;
}
.back-btn:hover{background:var(–border);color:var(–text)}

/* ── LAYOUT ── */
#wrap{
max-width:860px;margin:0 auto;padding:24px 16px;
width:100%;flex:1;
}

/* ── SECTION HEADER ── */
.section-head{
display:flex;align-items:center;gap:10px;
margin-bottom:20px;padding-bottom:14px;
border-bottom:1px solid var(–border);
}
.section-icon{font-size:26px;filter:drop-shadow(0 0 8px var(–glow))}
.section-title{font-family:‘Unbounded’,sans-serif;font-size:16px;font-weight:700;color:var(–text)}
.section-sub{font-size:11px;color:var(–text3);margin-top:2px}
.add-post-btn{
margin-left:auto;display:flex;align-items:center;gap:6px;
padding:8px 18px;border-radius:14px;
background:linear-gradient(135deg,var(–indigo),var(–indigo2));
border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;
transition:all .2s;font-family:‘Unbounded’,sans-serif;letter-spacing:.3px;
box-shadow:0 4px 16px rgba(120,30,200,.4);
}
.add-post-btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 24px rgba(120,30,200,.55)}
.add-post-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── POST CARD ── */
.post-card{
background:var(–panel);border:1px solid var(–border);
border-radius:18px;margin-bottom:14px;overflow:hidden;
animation:messagePop .3s ease;transition:box-shadow .25s,transform .2s;
cursor:pointer;
}
.post-card:hover{box-shadow:0 6px 28px rgba(0,0,0,.3),0 0 0 1px var(–border);transform:translateY(-2px)}
.post-card.open-card{transform:none;cursor:default;box-shadow:0 0 0 2px var(–accent),0 8px 32px rgba(0,0,0,.35)}
.post-header{
display:flex;align-items:flex-start;gap:12px;
padding:16px 18px 12px;
}
.post-av{
width:40px;height:40px;border-radius:50%;
background:var(–indigo-f);border:2px solid var(–border);
display:flex;align-items:center;justify-content:center;font-size:20px;
flex-shrink:0;overflow:hidden;
}
.post-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.post-meta{flex:1;min-width:0}
.post-nick{
font-size:13px;font-weight:600;color:var(–indigo2);
display:inline-flex;align-items:center;gap:5px;
}
.post-role{
font-size:9px;padding:2px 6px;border-radius:5px;font-weight:700;
font-family:‘Unbounded’,sans-serif;
}
.rb-founder{background:rgba(255,180,0,.18);color:#f0a500;border:1px solid rgba(255,180,0,.3)}
.rb-admin{background:rgba(168,85,247,.2);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.post-time{font-size:10px;color:var(–text3);margin-top:3px}
.post-del-btn{
background:none;border:none;color:var(–text3);font-size:13px;
cursor:pointer;padding:3px 7px;border-radius:7px;transition:all .15s;
flex-shrink:0;margin-left:auto;
}
.post-del-btn:hover{background:rgba(220,0,0,.15);color:#ff6666}
.post-body{padding:0 18px 14px}
.post-title{
font-family:‘Unbounded’,sans-serif;font-size:15px;font-weight:700;
color:var(–text);margin-bottom:8px;line-height:1.4;
}
.post-content{font-size:13px;color:var(–text2);line-height:1.65;word-break:break-word}
.post-content img.chat-emoji{width:26px!important;height:26px!important;object-fit:contain;vertical-align:middle;border-radius:4px}
.post-content img.chat-emoji-gif{width:32px!important;height:32px!important;object-fit:contain;vertical-align:middle;border-radius:6px;animation-play-state:running!important}
.post-content .chat-emoji-text{font-size:22px;vertical-align:middle;line-height:1}
.post-footer{
display:flex;align-items:center;gap:8px;
padding:10px 18px 14px;border-top:1px solid var(–border);
}
.comment-count{
display:flex;align-items:center;gap:4px;
font-size:11px;color:var(–text3);
}
.open-thread-hint{
margin-left:auto;font-size:10px;color:var(–text3);
font-family:‘Unbounded’,sans-serif;letter-spacing:.5px;
}
.post-card:hover .open-thread-hint{color:var(–indigo2)}

/* ── THREAD VIEW ── */
#threadView{display:none}
.thread-back{
display:flex;align-items:center;gap:6px;
color:var(–text2);font-size:12px;cursor:pointer;
padding:6px 10px;border-radius:10px;background:var(–indigo-f);
border:1px solid var(–border);margin-bottom:16px;
transition:all .2s;width:fit-content;
}
.thread-back:hover{background:var(–border);color:var(–text)}

/* ── COMMENTS ── */
.comments-section{margin-top:0}
.comments-label{
font-family:‘Unbounded’,sans-serif;font-size:9px;
letter-spacing:2px;color:var(–text2);text-transform:uppercase;
margin-bottom:12px;display:flex;align-items:center;gap:6px;
}
.comments-label::after{content:’’;flex:1;height:1px;background:var(–border)}
.comment-item{
display:flex;gap:10px;padding:10px 14px;
border-radius:14px;margin-bottom:6px;
background:var(–bubble);border:1px solid var(–border);
animation:messagePop .2s ease;position:relative;
}
.comment-item.reply-indent{
margin-left:28px;
border-left:2px solid var(–accent);
}
.comment-av{
width:32px;height:32px;border-radius:50%;
background:var(–indigo-f);border:2px solid var(–border);
display:flex;align-items:center;justify-content:center;font-size:15px;
flex-shrink:0;overflow:hidden;
}
.comment-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.comment-body{flex:1;min-width:0}
.comment-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.comment-nick{font-size:11px;font-weight:600;color:var(–indigo2);cursor:pointer}
.comment-nick:hover{text-decoration:underline}
.comment-time{font-size:10px;color:var(–text3)}
.comment-text{font-size:13px;color:var(–text);line-height:1.6;word-break:break-word}
.comment-text img.chat-emoji{width:24px!important;height:24px!important;object-fit:contain;vertical-align:middle;border-radius:4px}
.comment-text img.chat-emoji-gif{width:30px!important;height:30px!important;object-fit:contain;vertical-align:middle;border-radius:5px;animation-play-state:running!important}
.comment-text .chat-emoji-text{font-size:20px;vertical-align:middle;line-height:1}
.reply-preview-inline{
border-left:2px solid var(–accent);padding:2px 8px;margin-bottom:4px;
font-size:10px;color:var(–text3);border-radius:2px;background:var(–indigo-f);
}
.reply-preview-inline strong{color:var(–indigo2)}
.comment-actions{display:flex;gap:4px;margin-top:5px}
.c-act-btn{
background:none;border:none;color:var(–text3);font-size:10px;
cursor:pointer;padding:2px 7px;border-radius:7px;transition:all .15s;
font-family:‘Noto Sans Georgian’,sans-serif;
}
.c-act-btn:hover{background:var(–indigo-f);color:var(–indigo2)}
.c-del-btn{color:var(–text3)}
.c-del-btn:hover{background:rgba(220,0,0,.1);color:#ff7777}

/* ── REPLY BAR ── */
#replyBar{
display:none;align-items:center;gap:8px;
padding:7px 12px;background:var(–indigo-f);border:1px solid var(–border);
border-radius:10px;margin-bottom:8px;font-size:11px;color:var(–text3);
}
#replyBar.open{display:flex}
#replyBar strong{color:var(–indigo2)}
.reply-cancel-btn{background:none;border:none;color:var(–text3);cursor:pointer;font-size:14px;padding:0 4px}

/* ── COMMENT INPUT ── */
.comment-input-wrap{
background:var(–panel);border:1px solid var(–border);
border-radius:18px;padding:14px 16px;margin-top:16px;
box-shadow:0 4px 20px rgba(0,0,0,.12);
}
.comment-input-label{
font-size:9px;letter-spacing:2px;color:var(–text3);
font-family:‘Unbounded’,sans-serif;text-transform:uppercase;margin-bottom:8px;
}

/* ── EMOJI PANEL ── */
.emoji-toggle-btn{
width:34px;height:34px;border-radius:10px;
background:var(–indigo-f);border:1px solid var(–border);
font-size:17px;cursor:pointer;display:flex;align-items:center;
justify-content:center;transition:all .2s;flex-shrink:0;
}
.emoji-toggle-btn:hover{background:var(–border)}
#emojiPanelForum{
background:var(–panel2);border:1px solid var(–border);border-radius:16px;
padding:12px;margin-bottom:8px;display:none;
box-shadow:0 8px 30px rgba(0,0,0,.3);
}
#emojiPanelForum.open{display:block}
.emoji-grid-forum{display:flex;flex-wrap:wrap;gap:5px;max-height:160px;overflow-y:auto}
.emoji-grid-forum::-webkit-scrollbar{width:3px}
.emoji-grid-forum::-webkit-scrollbar-thumb{background:var(–border)}
.em-f-btn{
width:44px;height:44px;border-radius:10px;
background:var(–indigo-f);border:1px solid var(–border);
cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:all .15s;flex-shrink:0;font-size:20px;
}
.em-f-btn:hover{background:var(–border);transform:scale(1.1)}
.em-f-btn img{width:30px!important;height:30px!important;border-radius:5px;object-fit:contain;display:block;pointer-events:none;animation-play-state:running!important}

/* ── INPUT ROW ── */
.input-row{display:flex;gap:8px;align-items:flex-end;margin-top:8px}
#commentInput{
flex:1;background:var(–input-bg);border:1.5px solid var(–border);
border-radius:16px;padding:10px 14px;color:var(–text);
font-size:13px;font-family:‘Noto Sans Georgian’,sans-serif;
outline:none;resize:none;min-height:42px;max-height:120px;
transition:border-color .2s,box-shadow .2s;
}
#commentInput:focus{border-color:var(–indigo2);box-shadow:0 0 0 3px var(–indigo-f)}
#commentInput::placeholder{color:var(–text3)}
.send-comment-btn{
width:42px;height:42px;border-radius:50%;
background:linear-gradient(135deg,var(–indigo),var(–indigo2));
border:none;color:#fff;font-size:18px;cursor:pointer;
display:flex;align-items:center;justify-content:center;flex-shrink:0;
transition:transform .2s,box-shadow .2s;
box-shadow:0 4px 16px rgba(120,30,200,.45);
}
.send-comment-btn:hover{transform:scale(1.1);box-shadow:0 6px 22px rgba(120,30,200,.6)}
.send-comment-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── ADD POST MODAL ── */
.overlay{
position:fixed;inset:0;background:rgba(0,0,0,.8);
backdrop-filter:blur(10px);z-index:9999;
display:none;align-items:center;justify-content:center;padding:16px;
}
.overlay.open{display:flex}
.modal{
background:var(–panel);border:1px solid var(–border);
border-radius:22px;width:100%;max-width:540px;
max-height:90vh;overflow-y:auto;padding:26px;position:relative;
box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px var(–glow);
animation:modalIn .35s cubic-bezier(0.34,1.3,0.64,1);
}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(–border)}
.modal-x{
position:absolute;top:14px;right:14px;background:var(–indigo-f);
border:1px solid var(–border);border-radius:9px;width:28px;height:28px;

<script>
const{createClient}=supabase;
const sb=createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

let ME=null,MYPROF=null;
let allUsers=[],customEmojis=[],emojiCache={};
let currentPost=null,replyTo=null;
let posts=[];

/* ── THEME ── */
const THEMES=['night','day','theme-ocean','theme-forest','theme-sunset','theme-rose','theme-gold','theme-cyber','theme-lavender','theme-midnight','theme-cherry','theme-mint','theme-ember','theme-storm','theme-galaxy','theme-arctic','theme-neon','theme-sand','theme-galaxy'];
function loadTheme(){
  const saved=localStorage.getItem('kaif_theme')||'night';
  THEMES.forEach(t=>document.body.classList.remove(t));
  if(saved!=='custom'){document.body.classList.add(saved);return;}
  const c=JSON.parse(localStorage.getItem('kaif_custom_colors')||'{}');
  if(c.bg){
    const s=document.createElement('style');s.id='customThemeStyle';
    s.textContent=`body{--bg:${c.bg};--panel:${c.panel};--panel2:${c.panel};--border:rgba(128,128,128,0.3);--text:${c.text};--text2:${c.text};--text3:${c.text};--bubble:${c.panel};--input-bg:${c.bg};--online:${c.accent};--indigo:${c.indigo};--indigo2:${c.indigo};--indigo-f:rgba(80,0,200,0.15);--glow:rgba(180,0,255,0.2);--accent:${c.accent};}`;
    document.head.appendChild(s);
  }else document.body.classList.add('night');
}

/* ── HELPERS ── */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
function timeStr(ts){return new Date(ts).toLocaleString('ka-GE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function rLabel(r){return r==='founder'?'👑 დამფუძნებელი':r==='admin'?'🛡️ ადმინი':'';}
function rbClass(r){return r==='founder'?'rb-founder':r==='admin'?'rb-admin':'';}
function autoResize(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px';}

/* ── EMOJI RENDER ── */
function renderContent(s){
  if(!s)return'';
  let h=esc(s);
  h=h.replace(/\[e:(\d+)\]/g,(m,id)=>{
    const url=emojiCache[parseInt(id)];
    if(!url)return m;
    if(url.startsWith('http')||url.startsWith('data:')){
      const isGif=url.toLowerCase().includes('.gif')||url.startsWith('data:image/gif');
      return`<img src="${url}" class="${isGif?'chat-emoji-gif':'chat-emoji'}" loading="eager" style="${isGif?'animation-play-state:running!important':''}">`;
    }
    return`<span class="chat-emoji-text">${url}</span>`;
  });
  return h;
}

/* ── EMOJI PANEL ── */
async function loadEmojis(){
  const{data}=await sb.from('global_emojis').select('id,url').order('id',{ascending:true});
  customEmojis=data||[];
  emojiCache={};
  customEmojis.forEach(e=>{emojiCache[e.id]=e.url;});
  buildForumEmojis();
  buildModalEmojis();
}

function makeEmojiBtn(em,inputId,className){
  const btn=document.createElement('button');
  btn.className=className;
  const isImg=em.url&&(em.url.startsWith('http')||em.url.startsWith('data:'));
  if(isImg){const img=document.createElement('img');img.src=em.url;img.loading='eager';img.style.cssText='animation-play-state:running!important';btn.appendChild(img);}
  else{btn.textContent=em.url||'?';}
  btn.addEventListener('click',()=>{
    const inp=document.getElementById(inputId);
    if(!inp)return;
    const tag=isImg?`[e:${em.id}]`:em.url;
    const s=inp.selectionStart||inp.value.length;
    inp.value=inp.value.slice(0,s)+tag+inp.value.slice(inp.selectionEnd||s);
    inp.focus();
    inp.selectionStart=inp.selectionEnd=s+tag.length;
  });
  return btn;
}

function buildForumEmojis(){
  const grid=document.getElementById('emojiGridForum');
  if(!grid)return;
  grid.innerHTML='';
  const frag=document.createDocumentFragment();
  customEmojis.forEach(em=>frag.appendChild(makeEmojiBtn(em,'commentInput','em-f-btn')));
  grid.appendChild(frag);
}

function buildModalEmojis(){
  const grid=document.getElementById('modalEmojiRow');
  if(!grid)return;
  grid.innerHTML='';
  const frag=document.createDocumentFragment();
  customEmojis.forEach(em=>frag.appendChild(makeEmojiBtn(em,'newContent','modal-em-btn')));
  grid.appendChild(frag);
}

function toggleForumEmoji(){
  const p=document.getElementById('emojiPanelForum');
  p.classList.toggle('open');
}
document.addEventListener('click',e=>{
  const p=document.getElementById('emojiPanelForum');
  if(p&&p.classList.contains('open')&&!p.contains(e.target)&&!e.target.classList.contains('emoji-toggle-btn')){
    p.classList.remove('open');
  }
});

/* ── USERS ── */
async function loadUsers(){
  const{data}=await sb.from('profiles').select('id,username,role,avatar_url,emotion');
  allUsers=data||[];
}
function getUser(uid){return allUsers.find(u=>u.id===uid)||{username:'?',emotion:'😊'};}
function userAvHtml(u){
  return u.avatar_url
    ?`<img src="${u.avatar_url}">`
    :(u.emotion||'😊');
}

/* ── POSTS ── */
async function loadPosts(){
  document.getElementById('postList').innerHTML=`<div class="loader"><div class="spin"></div>იტვირთება...</div>`;
  const{data,error}=await sb.from('forum_posts').select('*').order('created_at',{ascending:false});
  if(error){
    document.getElementById('postList').innerHTML=`<div class="empty-state"><span class="empty-icon">❌</span><div class="empty-text">${esc(error.message)}</div></div>`;
    return;
  }
  posts=data||[];
  document.getElementById('postCountLabel').textContent=posts.length+' პოსტი';
  renderPostList();
}

function renderPostList(){
  const el=document.getElementById('postList');
  el.innerHTML='';
  if(!posts.length){
    el.innerHTML=`<div class="empty-state"><span class="empty-icon">📋</span><div class="empty-text">ფორუმი ცარიელია</div></div>`;
    return;
  }
  posts.forEach(p=>el.appendChild(makePostCard(p,false)));
}

function makePostCard(p,isOpen){
  const author=getUser(p.user_id);
  const card=document.createElement('div');
  card.className='post-card'+(isOpen?' open-card':'');
  const roleLabel=rLabel(author.role);
  const roleBadge=roleLabel?`<span class="post-role ${rbClass(author.role)}">${roleLabel}</span>`:'';
  const canDel=(ME&&(p.user_id===ME.id||MYPROF?.role==='founder'||MYPROF?.role==='admin'));
  card.innerHTML=`
    <div class="post-header">
      <div class="post-av">${userAvHtml(author)}</div>
      <div class="post-meta">
        <div class="post-nick">${esc(author.username||'?')} ${roleBadge}</div>
        <div class="post-time">${timeStr(p.created_at)}</div>
      </div>
      ${canDel?`<button class="post-del-btn" data-id="${p.id}">🗑</button>`:''}
    </div>
    <div class="post-body">
      <div class="post-title">${esc(p.title||'')}</div>
      <div class="post-content">${renderContent(p.content||'')}</div>
    </div>
    <div class="post-footer">
      <div class="comment-count">💬 <span class="ccount" id="ccount_${p.id}">...</span></div>
      ${!isOpen?`<div class="open-thread-hint">გახსნა →</div>`:''}
    </div>
  `;
  if(!isOpen){
    card.addEventListener('click',e=>{
      if(e.target.classList.contains('post-del-btn')||e.target.closest('.post-del-btn'))return;
      openThread(p);
    });
  }
  const delBtn=card.querySelector('.post-del-btn');
  if(delBtn){
    delBtn.addEventListener('click',async e=>{
      e.stopPropagation();
      if(!confirm('პოსტი წაიშალა?'))return;
      const{error}=await sb.from('forum_posts').delete().eq('id',p.id);
      if(error){toast('❌ '+error.message);return;}
      toast('🗑 წაიშალა');
      if(isOpen)goBack();else await loadPosts();
    });
  }
  loadCommentCount(p.id);
  return card;
}

async function loadCommentCount(postId){
  const{count}=await sb.from('forum_comments').select('id',{count:'exact',head:true}).eq('post_id',postId);
  document.querySelectorAll('#ccount_'+postId).forEach(el=>el.textContent=count||0);
}

/* ── THREAD ── */
async function openThread(p){
  currentPost=p;
  replyTo=null;
  document.getElementById('replyBar').classList.remove('open');
  document.getElementById('listView').style.display='none';
  document.getElementById('threadView').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});

  // render post
  const cardEl=document.getElementById('threadPostCard');
  cardEl.innerHTML='';
  cardEl.appendChild(makePostCard(p,true));

  // show comment box only if logged in
  document.getElementById('commentInputWrap').style.display=ME?'':'none';
  document.getElementById('emojiPanelForum').classList.remove('open');

  await loadComments(p.id);
}

function goBack(){
  currentPost=null;replyTo=null;
  document.getElementById('threadView').style.display='none';
  document.getElementById('listView').style.display='block';
  document.getElementById('replyBar').classList.remove('open');
  document.getElementById('emojiPanelForum').classList.remove('open');
  loadPosts();
}

/* ── COMMENTS ── */
async function loadComments(postId){
  const el=document.getElementById('commentList');
  el.innerHTML=`<div class="loader"><div class="spin"></div>კომენტარები...</div>`;
  const{data,error}=await sb.from('forum_comments').select('*').eq('post_id',postId).order('created_at',{ascending:true});
  el.innerHTML='';
  if(error){el.innerHTML=`<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">❌ ${esc(error.message)}</div>`;return;}
  if(!data||!data.length){
    el.innerHTML=`<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px">კომენტარი ჯერ არ არის 💬</div>`;
    return;
  }
  const frag=document.createDocumentFragment();
  data.forEach(c=>frag.appendChild(makeCommentEl(c)));
  el.appendChild(frag);
  loadCommentCount(postId);
}

function makeCommentEl(c){
  const author=getUser(c.user_id);
  const canDel=(ME&&(c.user_id===ME.id||MYPROF?.role==='founder'||MYPROF?.role==='admin'));
  const isReply=c.reply_to_nick&&c.content&&c.content.startsWith('[reply:');
  const div=document.createElement('div');
  div.className='comment-item'+(isReply?' reply-indent':'');
  div.id='cmt_'+c.id;

  let replyHtml='',displayContent=c.content||'';
  if(c.content&&c.content.startsWith('[reply:')){
    const m=c.content.match(/^\[reply:([^\]]+)\|([^\]]*)\]([\s\S]*)$/);
    if(m){
      replyHtml=`<div class="reply-preview-inline"><strong>${esc(m[1])}</strong>: ${esc((m[2]||'').substring(0,50))}</div>`;
      displayContent=m[3]||'';
    }
  }

  div.innerHTML=`
    <div class="comment-av">${userAvHtml(author)}</div>
    <div class="comment-body">
      <div class="comment-meta">
        <span class="comment-nick">${esc(author.username||'?')}</span>
        ${author.role&&author.role!=='member'?`<span class="post-role ${rbClass(author.role)}" style="font-size:8px">${rLabel(author.role)}</span>`:''}
        <span class="comment-time">${timeStr(c.created_at)}</span>
      </div>
      ${replyHtml}
      <div class="comment-text">${renderContent(displayContent)}</div>
      <div class="comment-actions">
        ${ME?`<button class="c-act-btn" onclick="setReply('${esc(author.username||'?')}','${c.id}')">↩️ პასუხი</button>`:''}
        ${canDel?`<button class="c-act-btn c-del-btn" onclick="deleteComment('${c.id}')">🗑 წაშლა</button>`:''}
      </div>
    </div>
  `;
  return div;
}

/* ── REPLY ── */
function setReply(nick,commentId){
  replyTo={nick,commentId};
  document.getElementById('replyNickSpan').textContent=nick;
  document.getElementById('replyBar').classList.add('open');
  document.getElementById('commentInput').focus();
  document.getElementById('commentInput').placeholder='↩️ '+nick+'-ს პასუხი...';
}
function cancelReply(){
  replyTo=null;
  document.getElementById('replyBar').classList.remove('open');
  document.getElementById('commentInput').placeholder='დაწერე კომენტარი...';
}

/* ── SEND COMMENT ── */
async function sendComment(){
  if(!ME){toast('❌ შედი სისტემაში!');return;}
  const inp=document.getElementById('commentInput');
  let txt=inp.value.trim();
  if(!txt||!currentPost)return;
  const btn=document.getElementById('sendCommentBtn');
  btn.disabled=true;

  let finalContent=txt;
  let replyNick='';
  if(replyTo){
    // get original comment snippet
    const origEl=document.getElementById('cmt_'+replyTo.commentId);
    let origSnip='';
    if(origEl){const textEl=origEl.querySelector('.comment-text');origSnip=(textEl?.textContent||'').substring(0,50);}
    finalContent=`[reply:${replyTo.nick}|${origSnip}]${txt}`;
    replyNick=replyTo.nick;
  }

  const{error}=await sb.from('forum_comments').insert({
    post_id:currentPost.id,
    user_id:ME.id,
    content:finalContent,
    reply_to_nick:replyNick||null
  });

  btn.disabled=false;
  if(error){toast('❌ '+error.message);return;}
  inp.value='';inp.style.height='auto';
  cancelReply();
  document.getElementById('emojiPanelForum').classList.remove('open');
  toast('✅ კომენტარი გამოქვეყნდა!');
  await loadComments(currentPost.id);
  // scroll to bottom of comments
  const lastC=document.getElementById('commentList').lastElementChild;
  if(lastC)lastC.scrollIntoView({behavior:'smooth',block:'end'});
}

async function deleteComment(id){
  if(!confirm('კომენტარი წაიშალა?'))return;
  const{error}=await sb.from('forum_comments').delete().eq('id',id);
  if(error){toast('❌ '+error.message);return;}
  document.getElementById('cmt_'+id)?.remove();
  toast('🗑 წაიშალა');
  loadCommentCount(currentPost?.id);
}

/* ── ADD POST ── */
function canPost(){return MYPROF&&(MYPROF.role==='founder'||MYPROF.role==='admin');}

function openAddPost(){
  if(!canPost()){toast('❌ მხოლოდ ადმინს!');return;}
  document.getElementById('newTitle').value='';
  document.getElementById('newContent').value='';
  document.getElementById('addPostOverlay').classList.add('open');
}
function closeAddPost(){document.getElementById('addPostOverlay').classList.remove('open');}
function bgClose(e){if(e.target.id==='addPostOverlay')closeAddPost();}

async function submitPost(){
  const title=document.getElementById('newTitle').value.trim();
  const content=document.getElementById('newContent').value.trim();
  if(!title){toast('❌ სათაური ცარიელია!');return;}
  const btn=document.getElementById('submitPostBtn');
  btn.disabled=true;btn.textContent='⏳...';
  const{error}=await sb.from('forum_posts').insert({
    user_id:ME.id,title,content:content||''
  });
  btn.disabled=false;btn.textContent='✅ გამოქვეყნება';
  if(error){toast('❌ '+error.message);return;}
  closeAddPost();
  toast('✅ პოსტი გამოქვეყნდა!');
  await loadPosts();
}

/* ── REALTIME ── */
function watchPosts(){
  sb.channel('forum-posts')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'forum_posts'},async payload=>{
      const{data:fresh}=await sb.from('forum_posts').select('*').eq('id',payload.new.id).single();
      if(fresh){posts.unshift(fresh);renderPostList();}
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'forum_posts'},payload=>{
      posts=posts.filter(p=>p.id!==payload.old.id);
      renderPostList();
    })
    .subscribe();

  sb.channel('forum-comments')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'forum_comments'},async payload=>{
      const c=payload.new;
      // update count badge
      loadCommentCount(c.post_id);
      // if thread is open for this post, append
      if(currentPost&&currentPost.id===c.post_id){
        // don't re-add if already rendered by our own sendComment
        if(!document.getElementById('cmt_'+c.id)){
          // fetch author info if needed
          if(!allUsers.find(u=>u.id===c.user_id)){
            const{data}=await sb.from('profiles').select('id,username,role,avatar_url,emotion').eq('id',c.user_id).single();
            if(data)allUsers.push(data);
          }
          const el=makeCommentEl(c);
          document.getElementById('commentList').appendChild(el);
          el.scrollIntoView({behavior:'smooth',block:'end'});
        }
      }
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'forum_comments'},payload=>{
      document.getElementById('cmt_'+payload.old.id)?.remove();
      if(currentPost)loadCommentCount(currentPost.id);
    })
    .subscribe();
}

/* ── INIT ── */
async function init(){
  loadTheme();
  const{data:{user}}=await sb.auth.getUser();
  if(user){
    ME=user;
    const{data}=await sb.from('profiles').select('*').eq('id',ME.id).single();
    MYPROF=data;
  }
  await loadUsers();
  await loadEmojis();
  if(canPost()){
    document.getElementById('addPostBtn').style.display='flex';
  }
  await loadPosts();
  watchPosts();
}

init();
</script>
