<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია - ფორუმი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body.night {
  --bg: #0a0a12;
  --card: #14141f;
  --card2: #1a1a2a;
  --border: #2a2a3e;
  --text: #eeeef5;
  --text2: #a0a0c0;
  --text3: #6a6a8a;
  --primary: #7c3aed;
  --primary-dark: #5b21b6;
  --red: #ef4444;
  --yellow: #fbbf24;
  --input: #1e1e2e;
}

body.day {
  --bg: #f5f3ff;
  --card: #ffffff;
  --card2: #f8f7ff;
  --border: #e2ddf5;
  --text: #1e1b4b;
  --text2: #5b21b6;
  --text3: #8b7bb5;
  --primary: #7c3aed;
  --primary-dark: #5b21b6;
  --red: #ef4444;
  --yellow: #eab308;
  --input: #ffffff;
}

body {
  font-family: 'Noto Sans Georgian', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: all 0.3s;
  min-height: 100vh;
}

/* header */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, #c084fc, #7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  cursor: pointer;
}

.user-area {
  display: flex;
  align-items: center;
  gap: 16px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--primary-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.user-details {
  text-align: right;
}

.username {
  font-size: 14px;
  font-weight: 600;
}

.role-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  background: rgba(124, 58, 237, 0.15);
  color: var(--primary);
}

.role-badge.founder {
  background: rgba(251, 191, 36, 0.15);
  color: var(--yellow);
}

.role-badge.admin {
  background: rgba(124, 58, 237, 0.2);
  color: #a78bfa;
}

.btn-icon {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
}

.btn-icon:hover {
  background: var(--border);
}

/* container */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* ახალი თემის ფორმა (მხოლოდ ადმინ/ფაუნდერი) */
.new-topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 28px;
  display: none;
}

.new-topic-card.show {
  display: block;
}

.new-topic-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 16px;
}

input, textarea {
  width: 100%;
  padding: 12px 16px;
  background: var(--input);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
}

input:focus, textarea:focus {
  border-color: var(--primary);
}

textarea {
  min-height: 90px;
  resize: vertical;
}

.form-buttons {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  padding: 10px 24px;
  border-radius: 14px;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  padding: 10px 24px;
  border-radius: 14px;
  color: var(--text2);
  cursor: pointer;
}

/* header for topics */
.topics-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.topics-header h2 {
  font-size: 16px;
  font-weight: 600;
}

.new-topic-btn {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  padding: 8px 20px;
  border-radius: 14px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
  display: none;
}

/* topic card */
.topic {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  margin-bottom: 14px;
  overflow: hidden;
  transition: all 0.2s;
}

.topic:hover {
  border-color: var(--primary);
}

.topic.pinned {
  border-left: 4px solid var(--yellow);
}

.topic-header {
  padding: 16px 20px;
  cursor: pointer;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.topic-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--card2);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.topic-content {
  flex: 1;
}

.topic-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.pin-label {
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 20px;
  background: rgba(251, 191, 36, 0.12);
  color: var(--yellow);
  border: 1px solid rgba(251, 191, 36, 0.3);
}

.topic-meta {
  display: flex;
  gap: 14px;
  font-size: 11px;
  color: var(--text3);
}

.topic-author {
  color: var(--primary);
  cursor: pointer;
}

.topic-stats {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--text2);
  align-items: center;
}

.topic-actions {
  display: flex;
  gap: 6px;
  margin-left: 10px;
}

.action-btn {
  background: transparent;
  border: none;
  font-size: 16px;
  cursor: pointer;
  padding: 5px 8px;
  border-radius: 10px;
  transition: all 0.2s;
}

.action-btn.delete {
  color: var(--red);
}

.action-btn.delete:hover {
  background: rgba(239, 68, 68, 0.1);
}

.action-btn.pin {
  color: var(--yellow);
}

.action-btn.pin:hover {
  background: rgba(251, 191, 36, 0.1);
}

/* comments */
.comments-area {
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  display: none;
  background: var(--card2);
}

.comments-list {
  max-height: 400px;
  overflow-y: auto;
  margin-bottom: 16px;
}

.comment {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

.comment-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.comment-info {
  flex: 1;
}

.comment-author-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 4px;
}

.comment-text {
  font-size: 13px;
  line-height: 1.45;
}

.comment-time {
  font-size: 10px;
  color: var(--text3);
  margin-top: 4px;
}

.comment-delete {
  font-size: 11px;
  color: var(--red);
  cursor: pointer;
  align-self: center;
}

.add-comment-form {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}

.add-comment-form input {
  margin-bottom: 0;
  flex: 1;
}

.add-comment-form button {
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: 14px;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

/* toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 10px 24px;
  border-radius: 40px;
  font-size: 13px;
  z-index: 1000;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(5px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal.show {
  display: flex;
}

.modal-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px;
  max-width: 360px;
  width: 90%;
  text-align: center;
}

.modal-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
}

.loading {
  text-align: center;
  padding: 50px;
  color: var(--text2);
}
</style>
</head>
<body class="night">

<div class="header">
  <div class="logo" onclick="location.reload()">🎯 კაიფფორუმი</div>
  <div class="user-area">
    <div class="avatar" id="userAvatar">👤</div>
    <div class="user-details">
      <div class="username" id="userName">იტვირთება...</div>
      <div class="role-badge" id="userRole">წევრი</div>
    </div>
    <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="btn-icon" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">
  <!-- ახალი თემის ფორმა (მხოლოდ ადმინ/ფაუნდერი ხედავს) -->
  <div class="new-topic-card" id="newTopicForm">
    <div class="new-topic-title">📝 ახალი თემა</div>
    <input type="text" id="topicTitle" placeholder="სათაური...">
    <textarea id="topicContent" placeholder="ტექსტი..."></textarea>
    <div class="form-buttons">
      <button class="btn-secondary" onclick="hideNewTopicForm()">გაუქმება</button>
      <button class="btn-primary" onclick="createTopic()">შექმნა</button>
    </div>
  </div>

  <div class="topics-header">
    <h2>📋 თემები</h2>
    <button class="new-topic-btn" id="addTopicBtn">+ ახალი თემა</button>
  </div>

  <div id="topicsList">
    <div class="loading">იტვირთება...</div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div id="modalMsg">დარწმუნებული ხარ?</div>
    <div class="modal-buttons">
      <button class="btn-primary" style="background:#ef4444" onclick="confirmDelete()">წაშლა</button>
      <button class="btn-secondary" onclick="closeModal()">გაუქმება</button>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://vjstuyxuhshsouqsnvxp.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqc3R1eXh1aHNoc291cXNudnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDExOTQsImV4cCI6MjA5MDk3NzE5NH0.sVzu2GTaMwskp8lGb0C9F15Iy7RKT1FxQrwd5JgHquE"
);

let currentUser = null;
let myProfile = null;
let topics = [];
let pendingDeleteTopicId = null;
let openCommentsSet = new Set();

async function init() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) {
    location.href = 'index.html';
    return;
  }
  currentUser = user;
  myProfile = await getProfile(user.id);
  
  if (!myProfile) {
    const meta = user.user_metadata || {};
    await supabaseClient.from('profiles').insert({
      id: user.id,
      username: meta.username || user.email?.split('@')[0] || 'მომხმარებელი',
      role: 'member',
      emotion: '😊'
    });
    myProfile = await getProfile(user.id);
  }
  
  document.getElementById('userName').innerText = myProfile?.username || 'მომხმარებელი';
  document.getElementById('userAvatar').innerText = myProfile?.emotion || '👤';
  const roleSpan = document.getElementById('userRole');
  const role = myProfile?.role || 'member';
  
  if (role === 'founder') {
    roleSpan.innerText = '👑 დამფუძნებელი';
    roleSpan.className = 'role-badge founder';
  } else if (role === 'admin') {
    roleSpan.innerText = '🛡️ ადმინი';
    roleSpan.className = 'role-badge admin';
  } else {
    roleSpan.innerText = '👤 წევრი';
    roleSpan.className = 'role-badge';
  }
  
  const canCreate = (role === 'admin' || role === 'founder');
  document.getElementById('addTopicBtn').style.display = canCreate ? 'flex' : 'none';
  
  await loadTopics();
  subscribeRealTime();
}

async function getProfile(id) {
  const { data } = await supabaseClient.from('profiles').select('*').eq('id', id).single();
  return data;
}

async function loadTopics() {
  const { data, error } = await supabaseClient
    .from('forum_topics')
    .select('*, profiles(username, role, emotion)')
    .order('is_pinned', { ascending: false })
    .order('created_at', { ascending: false });
  
  if (error) {
    document.getElementById('topicsList').innerHTML = '<div class="loading">❌ შეცდომა</div>';
    return;
  }
  topics = data || [];
  renderTopics();
}

function renderTopics() {
  const container = document.getElementById('topicsList');
  if (!topics.length) {
    container.innerHTML = '<div class="loading">📭 ჯერ არ არის თემები</div>';
    return;
  }
  
  container.innerHTML = '';
  const userRole = myProfile?.role;
  const isAdmin = userRole === 'admin';
  const isFounder = userRole === 'founder';
  
  for (const topic of topics) {
    const isOpen = openCommentsSet.has(topic.id);
    const topicDiv = document.createElement('div');
    topicDiv.className = `topic ${topic.is_pinned ? 'pinned' : ''}`;
    
    let actionsHtml = '';
    if (isAdmin || isFounder) {
      actionsHtml += `<button class="action-btn delete" onclick="event.stopPropagation(); deleteTopic('${topic.id}')">🗑</button>`;
    }
    if (isFounder) {
      actionsHtml += `<button class="action-btn pin" onclick="event.stopPropagation(); pinTopic('${topic.id}', ${!topic.is_pinned})">📌</button>`;
    }
    
    topicDiv.innerHTML = `
      <div class="topic-header" onclick="toggleComments('${topic.id}')">
        <div class="topic-avatar">${topic.profiles?.emotion || '📝'}</div>
        <div class="topic-content">
          <div class="topic-title">
            ${escapeHtml(topic.title)}
            ${topic.is_pinned ? '<span class="pin-label">📌 პინი</span>' : ''}
          </div>
          <div class="topic-meta">
            <span class="topic-author" onclick="event.stopPropagation();">${escapeHtml(topic.profiles?.username || '?')}</span>
            <span>${formatDate(topic.created_at)}</span>
            <span>💬 ${topic.comment_count || 0}</span>
          </div>
        </div>
        <div class="topic-stats">
          <span>👁️ ${topic.views || 0}</span>
        </div>
        <div class="topic-actions" onclick="event.stopPropagation()">
          ${actionsHtml}
        </div>
      </div>
      <div class="comments-area" id="comments-${topic.id}" style="display: ${isOpen ? 'block' : 'none'}">
        <div class="comments-list" id="commentsList-${topic.id}">
          <div class="loading">იტვირთება...</div>
        </div>
        <div class="add-comment-form">
          <input type="text" id="commentInput-${topic.id}" placeholder="დაწერე კომენტარი...">
          <button onclick="addComment('${topic.id}')">გაგზავნა</button>
        </div>
      </div>
    `;
    container.appendChild(topicDiv);
    
    if (isOpen) {
      loadComments(topic.id);
    }
  }
}

async function toggleComments(topicId) {
  if (openCommentsSet.has(topicId)) {
    openCommentsSet.delete(topicId);
    const sec = document.getElementById(`comments-${topicId}`);
    if (sec) sec.style.display = 'none';
  } else {
    openCommentsSet.add(topicId);
    const sec = document.getElementById(`comments-${topicId}`);
    if (sec) {
      sec.style.display = 'block';
      loadComments(topicId);
    }
  }
}

async function loadComments(topicId) {
  const { data, error } = await supabaseClient
    .from('forum_comments')
    .select('*, profiles(username, role, emotion)')
    .eq('topic_id', topicId)
    .order('created_at', { ascending: true });
  
  if (error) return;
  renderComments(topicId, data || []);
}

function renderComments(topicId, comments) {
  const container = document.getElementById(`commentsList-${topicId}`);
  if (!container) return;
  
  if (!comments.length) {
    container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text3)">💬 კომენტარები ჯერ არ არის</div>';
    return;
  }
  
  container.innerHTML = '';
  const isAdminOrFounder = myProfile?.role === 'admin' || myProfile?.role === 'founder';
  
  for (const comment of comments) {
    const canDelete = isAdminOrFounder || comment.user_id === currentUser?.id;
    const commentDiv = document.createElement('div');
    commentDiv.className = 'comment';
    commentDiv.innerHTML = `
      <div class="comment-avatar">${comment.profiles?.emotion || '💬'}</div>
      <div class="comment-info">
        <div class="comment-author-name">
          ${escapeHtml(comment.profiles?.username || '?')}
          ${comment.profiles?.role === 'admin' ? ' 🛡️' : ''}
          ${comment.profiles?.role === 'founder' ? ' 👑' : ''}
        </div>
        <div class="comment-text">${escapeHtml(comment.content)}</div>
        <div class="comment-time">${formatDate(comment.created_at)}</div>
      </div>
      ${canDelete ? `<span class="comment-delete" onclick="deleteComment('${comment.id}', '${topicId}')">🗑</span>` : ''}
    `;
    container.appendChild(commentDiv);
  }
}

async function addComment(topicId) {
  const input = document.getElementById(`commentInput-${topicId}`);
  const content = input.value.trim();
  if (!content) {
    toast('✏️ დაწერე კომენტარი!');
    return;
  }
  
  const { error } = await supabaseClient.from('forum_comments').insert({
    topic_id: topicId,
    user_id: currentUser.id,
    content: content
  });
  
  if (error) {
    toast('❌ ' + error.message);
    return;
  }
  
  input.value = '';
  await loadComments(topicId);
  await updateCommentCount(topicId);
  toast('✅ კომენტარი დაემატა');
}

async function deleteComment(commentId, topicId) {
  const isAdminOrFounder = myProfile?.role === 'admin' || myProfile?.role === 'founder';
  const { data: comment } = await supabaseClient.from('forum_comments').select('user_id').eq('id', commentId).single();
  
  if (!isAdminOrFounder && comment?.user_id !== currentUser?.id) {
    toast('⛔ არ გაქვს უფლება');
    return;
  }
  
  await supabaseClient.from('forum_comments').delete().eq('id', commentId);
  await loadComments(topicId);
  await updateCommentCount(topicId);
  toast('🗑 წაიშალა');
}

async function updateCommentCount(topicId) {
  const { count } = await supabaseClient.from('forum_comments').select('*', { count: 'exact', head: true }).eq('topic_id', topicId);
  await supabaseClient.from('forum_topics').update({ comment_count: count }).eq('id', topicId);
  await loadTopics();
}

async function createTopic() {
  const role = myProfile?.role;
  if (role !== 'admin' && role !== 'founder') {
    toast('⛔ თემის შექმნა მხოლოდ ადმინს შეუძლია');
    return;
  }
  
  const title = document.getElementById('topicTitle').value.trim();
  const content = document.getElementById('topicContent').value.trim();
  
  if (!title) {
    toast('📝 ჩაწერე სათაური');
    return;
  }
  
  const { error } = await supabaseClient.from('forum_topics').insert({
    title: title,
    content: content || '',
    user_id: currentUser.id
  });
  
  if (error) {
    toast('❌ ' + error.message);
    return;
  }
  
  document.getElementById('topicTitle').value = '';
  document.getElementById('topicContent').value = '';
  hideNewTopicForm();
  await loadTopics();
  toast('✅ თემა შეიქმნა');
}

function showNewTopicForm() {
  const role = myProfile?.role;
  if (role !== 'admin' && role !== 'founder') {
    toast('⛔ არ გაქვს უფლება');
    return;
  }
  document.getElementById('newTopicForm').classList.add('show');
}

function hideNewTopicForm() {
  document.getElementById('newTopicForm').classList.remove('show');
}

function deleteTopic(topicId) {
  const role = myProfile?.role;
  if (role !== 'admin' && role !== 'founder') {
    toast('⛔ არ გაქვს უფლება');
    return;
  }
  pendingDeleteTopicId = topicId;
  document.getElementById('modalMsg').innerText = '🗑 წაშალო თემა? (კომენტარებიც წაიშლება)';
  document.getElementById('modal').classList.add('show');
}

async function confirmDelete() {
  if (pendingDeleteTopicId) {
    await supabaseClient.from('forum_topics').delete().eq('id', pendingDeleteTopicId);
    await loadTopics();
    toast('✅ თემა წაიშალა');
    pendingDeleteTopicId = null;
  }
  closeModal();
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

async function pinTopic(topicId, isPinned) {
  if (myProfile?.role !== 'founder') {
    toast('⛔ პინავა მხოლოდ დამფუძნებელს შეუძლია');
    return;
  }
  await supabaseClient.from('forum_topics').update({ is_pinned: isPinned }).eq('id', topicId);
  await loadTopics();
  toast(isPinned ? '📌 დაპინავდა' : '📍 პინი მოხსნილია');
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = now - d;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'ახლახან';
  if (mins < 60) return `${mins} წთ წინ`;
  const hours = Math.floor(diff / 3600000);
  if (hours < 24) return `${hours} სთ წინ`;
  const days = Math.floor(diff / 86400000);
  if (days < 7) return `${days} დღის წინ`;
  return d.toLocaleDateString('ka-GE');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function toggleTheme() {
  const body = document.body;
  const isNight = body.classList.contains('night');
  body.classList.remove(isNight ? 'night' : 'day');
  body.classList.add(isNight ? 'day' : 'night');
  document.getElementById('themeBtn').innerText = isNight ? '☀️' : '🌙';
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.href = 'index.html';
}

function subscribeRealTime() {
  supabaseClient.channel('forum-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'forum_topics' }, () => loadTopics())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'forum_comments' }, () => {
      openCommentsSet.forEach(id => loadComments(id));
    })
    .subscribe();
}

document.getElementById('addTopicBtn').onclick = showNewTopicForm;
init();
</script>
