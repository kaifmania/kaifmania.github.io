<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია — ფორუმი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0b1a;--panel:#120f24;--panel2:#1a1730;--border:rgba(160,80,255,0.35);--text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;--input-bg:#221f3a;--indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.18);--glow:rgba(168,85,247,0.28);--accent:#f07aff;}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
@keyframes messagePop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes flicker{0%,100%{filter:drop-shadow(0 0 6px var(--glow))}50%{filter:drop-shadow(0 0 20px var(--glow)) drop-shadow(0 0 40px var(--accent))}}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes planeShoot{0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1}60%{transform:translate(30px,-30px) rotate(-40deg) scale(.8);opacity:.5}100%{transform:translate(60px,-60px) rotate(-45deg) scale(.4);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAV */
#topnav{display:flex;align-items:center;gap:8px;background:var(--panel);border-bottom:1px solid var(--border);padding:8px 20px;z-index:100;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.3);position:sticky;top:0}
.nav-logo{font-size:24px;animation:flicker 2.5s ease-in-out infinite;flex-shrink:0;text-decoration:none}
.nav-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px}
.nav-back{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;text-decoration:none;transition:all .2s;font-family:'Noto Sans Georgian',sans-serif}
.nav-back:hover{background:var(--border);color:var(--text)}
.nav-spacer{flex:1}
.nav-user{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.nav-av{width:32px;height:32px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.nav-av img{width:100%;height:100%;object-fit:cover}

/* MAIN LAYOUT */
#app{max-width:860px;width:100%;margin:0 auto;padding:24px 16px;flex:1}

/* POST CREATION (admin/founder only) */
.create-post-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:28px;box-shadow:0 4px 24px rgba(0,0,0,.25)}
.create-post-title{font-family:'Unbounded',sans-serif;font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.create-post-title::after{content:'';flex:1;height:1px;background:var(--border)}
.cp-inp{width:100%;padding:11px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s}
.cp-inp:focus{border-color:var(--indigo2)}
.cp-inp::placeholder{color:var(--text3)}
.cp-textarea{width:100%;padding:11px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:14px;outline:none;resize:vertical;min-height:100px;line-height:1.6;transition:border-color .2s}
.cp-textarea:focus{border-color:var(--indigo2)}
.cp-textarea::placeholder{color:var(--text3)}
.cp-footer{display:flex;align-items:center;gap:10px;margin-top:10px}
.cp-tag-row{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.cp-tag{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--indigo-f);color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s}
.cp-tag.active,.cp-tag:hover{background:var(--indigo);color:#fff;border-color:var(--indigo2)}
.post-btn{padding:10px 22px;border-radius:20px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;color:#fff;font-family:'Noto Sans Georgian',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(120,30,200,.4);white-space:nowrap}
.post-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(120,30,200,.55)}
.post-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* FILTERS */
.filters-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--indigo-f);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Noto Sans Georgian',sans-serif}
.filter-chip.active,.filter-chip:hover{background:var(--indigo);color:#fff;border-color:var(--indigo2)}
.search-inp{flex:1;min-width:160px;padding:8px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:13px;font-family:'Noto Sans Georgian',sans-serif;outline:none;transition:border-color .2s}
.search-inp:focus{border-color:var(--indigo2)}
.search-inp::placeholder{color:var(--text3)}

/* POST CARD */
.post-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:messagePop .3s ease}
.post-card:hover{border-color:rgba(168,85,247,.5);box-shadow:0 4px 24px rgba(120,30,200,.15)}
.post-header{padding:16px 18px 12px;display:flex;align-items:flex-start;gap:12px}
.post-av{width:40px;height:40px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;cursor:pointer}
.post-av img{width:100%;height:100%;object-fit:cover}
.post-meta{flex:1;min-width:0}
.post-nick{font-size:13px;font-weight:600;color:var(--indigo2);cursor:pointer}
.post-nick:hover{text-decoration:underline}
.post-role{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700;margin-left:6px}
.rb-founder{background:rgba(255,180,0,.18);color:#f0a500;border:1px solid rgba(255,180,0,.3)}
.rb-admin{background:rgba(168,85,247,.2);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.post-time{font-size:11px;color:var(--text3);margin-top:2px}
.post-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2);margin-left:auto;flex-shrink:0;white-space:nowrap}
.post-tag.tag-კითხვა{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.3);color:#c084fc}
.post-tag.tag-განხილვა{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3);color:#4ade80}
.post-tag.tag-ინფო{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:#60a5fa}
.post-tag.tag-სხვა{background:var(--indigo-f);border-color:var(--border);color:var(--text2)}
.post-body{padding:0 18px 14px}
.post-title-text{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4}
.post-content-text{font-size:14px;color:var(--text2);line-height:1.65;word-break:break-word}
.post-footer{padding:10px 18px 14px;display:flex;align-items:center;gap:12px;border-top:1px solid var(--border)}
.post-react-row{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.react-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;background:var(--indigo-f);border:1px solid var(--border);font-size:13px;cursor:pointer;transition:all .15s}
.react-chip:hover,.react-chip.mine{background:var(--indigo);border-color:var(--indigo2)}
.react-chip span{font-size:11px;color:var(--text2);font-weight:600}
.react-chip.mine span{color:#fff}
.react-add-row{display:flex;gap:4px}
.react-add-btn{font-size:18px;cursor:pointer;padding:4px 6px;border-radius:10px;transition:all .15s;border:none;background:none}
.react-add-btn:hover{background:var(--indigo-f);transform:scale(1.2)}
.comment-toggle{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Noto Sans Georgian',sans-serif;white-space:nowrap}
.comment-toggle:hover{background:var(--border);color:var(--text)}
.post-del{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all .15s}
.post-del:hover{background:rgba(220,0,0,.15);color:#ff6666}

/* COMMENTS SECTION */
.comments-section{background:var(--panel2);border-top:1px solid var(--border);padding:16px 18px;display:none}
.comments-section.open{display:block}
.comment-item{display:flex;gap:10px;margin-bottom:14px;animation:messagePop .2s ease}
.c-av{width:34px;height:34px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;cursor:pointer}
.c-av img{width:100%;height:100%;object-fit:cover}
.c-body{flex:1;min-width:0}
.c-bubble{background:var(--bubble);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:9px 13px;font-size:14px;color:var(--text);line-height:1.55;word-break:break-word}
.c-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.c-nick{font-size:11px;font-weight:600;color:var(--indigo2);cursor:pointer}
.c-nick:hover{text-decoration:underline}
.c-time{font-size:10px;color:var(--text3)}
.c-del{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:1px 5px;border-radius:4px}
.c-del:hover{background:rgba(220,0,0,.15);color:#ff6666}
.c-reply-btn{background:none;border:none;color:var(--text3);font-size:10px;cursor:pointer;padding:2px 6px;border-radius:5px;transition:all .15s}
.c-reply-btn:hover{background:var(--indigo-f);color:var(--indigo2)}
.c-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.c-react-chip{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;background:var(--indigo-f);border:1px solid var(--border);font-size:12px;cursor:pointer;transition:all .15s}
.c-react-chip:hover,.c-react-chip.mine{background:var(--indigo);border-color:var(--indigo2)}
.c-react-chip span{font-size:9px;color:var(--text2);font-weight:600}

/* REPLY PREVIEW */
.reply-preview{background:var(--indigo-f);border-left:3px solid var(--accent);border-radius:6px;padding:4px 10px;margin-bottom:5px;font-size:11px;color:var(--text3)}
.reply-preview strong{color:var(--indigo2);display:block;font-size:10px;margin-bottom:1px}

/* COMMENT INPUT */
.comment-input-wrap{margin-top:4px}
.c-reply-bar{background:var(--indigo-f);border:1px solid var(--border);border-radius:8px;padding:5px 10px;margin-bottom:6px;font-size:11px;color:var(--text3);display:none;align-items:center;gap:6px}
.c-reply-bar.open{display:flex}
.c-reply-bar strong{color:var(--indigo2)}
.c-reply-cancel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;margin-left:auto}

/* EMOJI PANEL for comments */
.c-emoji-panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:10px;margin-bottom:8px;display:none}
.c-emoji-panel.open{display:block}
.c-emoji-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:160px;overflow-y:auto}
.c-emoji-grid::-webkit-scrollbar{width:3px}
.c-emoji-grid::-webkit-scrollbar-thumb{background:var(--border)}
.c-em-btn{width:44px;height:44px;border-radius:10px;background:var(--indigo-f);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.c-em-btn:hover{background:var(--border);transform:scale(1.1)}
.c-em-btn img{width:30px!important;height:30px!important;border-radius:5px;object-fit:contain}
.c-em-btn .em-text{font-size:22px;line-height:1}
.c-em-btn img.gif-em{animation-play-state:running!important}

.c-input-row{display:flex;gap:8px;align-items:center}
.c-input-row input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;padding:9px 16px;color:var(--text);font-size:13px;font-family:'Noto Sans Georgian',sans-serif;outline:none;transition:border-color .2s}
.c-input-row input:focus{border-color:var(--indigo2)}
.c-input-row input::placeholder{color:var(--text3)}
.c-emoji-btn{width:36px;height:36px;border-radius:10px;background:var(--indigo-f);border:1px solid var(--border);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.c-emoji-btn:hover{background:var(--border)}
.c-send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;overflow:hidden}
.c-send-btn:hover{transform:scale(1.1)}
.c-send-plane{display:inline-block}
.c-send-btn.fly .c-send-plane{animation:planeShoot .45s ease forwards}

/* EMPTY STATE */
.empty-state{text-align:center;padding:64px 20px;color:var(--text3)}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.6}
.empty-text{font-size:14px;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:99999;box-shadow:0 6px 24px rgba(0,0,0,.4);pointer-events:none;animation:messagePop .3s ease;white-space:nowrap}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text3);font-size:13px;gap:10px}
.loader-spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--panel2);border-radius:10px}
::-webkit-scrollbar-thumb{background:var(--indigo2);border-radius:10px}

/* RESPONSIVE */
@media(max-width:600px){
  #app{padding:16px 10px}
  .post-title-text{font-size:15px}
  .cp-footer{flex-direction:column;align-items:stretch}
  .post-btn{width:100%}
}
</style>
</head>
<body>

<nav id="topnav">
  <span class="nav-logo">🔥</span>
  <span class="nav-title">ფორუმი</span>
  <div class="nav-spacer"></div>
  <div class="nav-user">
    <div class="nav-av" id="navAv">👤</div>
    <span id="navNick" style="font-size:12px;color:var(--text2)"></span>
  </div>
  <a href="chat.html" class="nav-back">← ჩატი</a>
</nav>

<div id="app">
  <!-- CREATE POST (admin/founder) -->
  <div class="create-post-card" id="createPostCard" style="display:none">
    <div class="create-post-title">✍️ ახალი პოსტი</div>
    <input class="cp-inp" id="postTitleInp" placeholder="სათაური..." maxlength="120">
    <textarea class="cp-textarea" id="postBodyInp" placeholder="შინაარსი..."></textarea>
    <div class="cp-footer">
      <div class="cp-tag-row" id="cpTags">
        <div class="cp-tag active" data-tag="კითხვა" onclick="pickTag(this)">❓ კითხვა</div>
        <div class="cp-tag" data-tag="განხილვა" onclick="pickTag(this)">💬 განხილვა</div>
        <div class="cp-tag" data-tag="ინფო" onclick="pickTag(this)">ℹ️ ინფო</div>
        <div class="cp-tag" data-tag="სხვა" onclick="pickTag(this)">🔖 სხვა</div>
      </div>
      <button class="post-btn" id="postBtn" onclick="createPost()">✈️ გამოქვეყნება</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <input class="search-inp" id="searchInp" placeholder="🔍 ძებნა..." oninput="filterPosts()">
    <div class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">ყველა</div>
    <div class="filter-chip" data-filter="კითხვა" onclick="setFilter('კითხვა',this)">❓ კითხვა</div>
    <div class="filter-chip" data-filter="განხილვა" onclick="setFilter('განხილვა',this)">💬 განხილვა</div>
    <div class="filter-chip" data-filter="ინფო" onclick="setFilter('ინფო',this)">ℹ️ ინფო</div>
    <div class="filter-chip" data-filter="სხვა" onclick="setFilter('სხვა',this)">🔖 სხვა</div>
  </div>

  <!-- POSTS LIST -->
  <div id="postsList">
    <div class="loader"><div class="loader-spin"></div> იტვირთება...</div>
  </div>
</div>

<script>
const {createClient} = supabase;
const sb = createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

let ME = null, MYPROF = null;
let allPosts = [], allUsers = [], customEmojis = [], emojiCache = {};
let activeFilter = 'all', activeTag = 'კითხვა';
let openCommentSections = {}; // postId -> {replyTo, emojiOpen}
let postsCh = null;

/* ===== HELPERS ===== */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rLabel(r){return r==='founder'?'👑 დამფუძნებელი':r==='admin'?'🛡️ ადმინი':'👤 წევრი';}
function rbClass(r){return r==='founder'?'rb-founder':r==='admin'?'rb-admin':'';}
function timeAgo(ts){
  const d=Date.now()-new Date(ts).getTime(),s=Math.floor(d/1000);
  if(s<60)return s+'წ წინ';
  const m=Math.floor(s/60);if(m<60)return m+'წთ წინ';
  const h=Math.floor(m/60);if(h<24)return h+'სთ წინ';
  const day=Math.floor(h/24);if(day<7)return day+'დ წინ';
  return new Date(ts).toLocaleDateString('ka-GE');
}
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

/* ===== EMOJI RENDER ===== */
function renderContent(s){
  if(!s)return'';
  let h=esc(s);
  h=h.replace(/\[e:(\d+)\]/g,(m,id)=>{
    const url=emojiCache[parseInt(id)];
    if(!url)return m;
    if(url.startsWith('http')||url.startsWith('data:')){
      const isGif=url.toLowerCase().includes('.gif')||url.startsWith('data:image/gif');
      return`<img src="${url}" style="width:${isGif?34:28}px;height:${isGif?34:28}px;vertical-align:middle;border-radius:5px;object-fit:contain;${isGif?'animation-play-state:running!important':''}">`;
    }
    return`<span style="font-size:22px;vertical-align:middle">${url}</span>`;
  });
  return h;
}

/* ===== LOAD EMOJIS ===== */
async function loadEmojis(){
  const{data}=await sb.from('global_emojis').select('id,url').order('id',{ascending:true});
  customEmojis=data||[];
  emojiCache={};
  customEmojis.forEach(e=>{emojiCache[e.id]=e.url;});
}

/* ===== BUILD EMOJI GRID ===== */
function buildCommentEmojiGrid(gridEl, inputEl){
  gridEl.innerHTML='';
  customEmojis.forEach(em=>{
    const btn=document.createElement('button');
    btn.className='c-em-btn';
    const isImg=em.url&&(em.url.startsWith('http')||em.url.startsWith('data:'));
    if(isImg){
      const img=document.createElement('img');
      img.src=em.url;
      const isGif=em.url.toLowerCase().includes('.gif')||em.url.startsWith('data:image/gif');
      if(isGif)img.className='gif-em';
      btn.appendChild(img);
    } else {
      const span=document.createElement('span');
      span.className='em-text';span.textContent=em.url||'?';
      btn.appendChild(span);
    }
    btn.addEventListener('click',()=>{
      inputEl.value+=(isImg?`[e:${em.id}]`:em.url);
      inputEl.focus();
    });
    gridEl.appendChild(btn);
  });
}

/* ===== TAG PICKER ===== */
function pickTag(el){
  document.querySelectorAll('.cp-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  activeTag=el.dataset.tag;
}

/* ===== FILTER ===== */
function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderPosts();
}
function filterPosts(){renderPosts();}

/* ===== CREATE POST ===== */
async function createPost(){
  const title=document.getElementById('postTitleInp').value.trim();
  const body=document.getElementById('postBodyInp').value.trim();
  if(!title){toast('❌ სათაური შეავსე!');return;}
  const btn=document.getElementById('postBtn');
  btn.disabled=true;btn.textContent='⏳...';
  const{error}=await sb.from('forum_posts').insert({
    user_id:ME.id,
    title,
    content:body,
    tag:activeTag
  });
  btn.disabled=false;btn.textContent='✈️ გამოქვეყნება';
  if(error){toast('❌ '+error.message);return;}
  document.getElementById('postTitleInp').value='';
  document.getElementById('postBodyInp').value='';
  toast('✅ გამოქვეყნდა!');
}

/* ===== LOAD POSTS ===== */
async function loadPosts(){
  const{data}=await sb.from('forum_posts')
    .select('*,profiles!forum_posts_user_id_fkey(id,username,role,avatar_url,emotion)')
    .order('created_at',{ascending:false})
    .limit(60);
  allPosts=data||[];
  renderPosts();
}

/* ===== RENDER POSTS ===== */
function renderPosts(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  let filtered=allPosts;
  if(activeFilter!=='all')filtered=filtered.filter(p=>p.tag===activeFilter);
  if(q)filtered=filtered.filter(p=>(p.title||'').toLowerCase().includes(q)||(p.content||'').toLowerCase().includes(q));

  const el=document.getElementById('postsList');
  el.innerHTML='';
  if(!filtered.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">პოსტი ჯერ არ არის</div></div>`;
    return;
  }
  filtered.forEach(post=>el.appendChild(makePostCard(post)));
}

/* ===== MAKE POST CARD ===== */
function makePostCard(post){
  const prof=post.profiles;
  const nick=prof?.username||'?';
  const role=prof?.role;
  const avHtml=prof?.avatar_url?`<img src="${prof.avatar_url}">`:(prof?.emotion||'😊');
  const rbadge=role&&role!=='member'?`<span class="post-role ${rbClass(role)}">${rLabel(role)}</span>`:'';
  const canDel=MYPROF?.role==='founder'||(MYPROF?.role==='admin'&&role!=='founder')||post.user_id===ME?.id;
  const tagClass='tag-'+(post.tag||'სხვა');

  const card=document.createElement('div');
  card.className='post-card';
  card.id='post_'+post.id;

  card.innerHTML=`
    <div class="post-header">
      <div class="post-av" onclick="void(0)" data-uid="${prof?.id||''}">${avHtml}</div>
      <div class="post-meta">
        <div>
          <span class="post-nick" data-uid="${prof?.id||''}">${esc(nick)}</span>
          ${rbadge}
        </div>
        <div class="post-time">${timeAgo(post.created_at)}</div>
      </div>
      <span class="post-tag ${tagClass}">${post.tag||'სხვა'}</span>
    </div>
    <div class="post-body">
      <div class="post-title-text">${esc(post.title||'')}</div>
      ${post.content?`<div class="post-content-text">${renderContent(post.content)}</div>`:''}
    </div>
    <div class="post-footer">
      <div class="post-react-row" id="preact_${post.id}"></div>
      <div class="react-add-row">
        <button class="react-add-btn" onclick="addPostReact('${post.id}','❤️')">❤️</button>
        <button class="react-add-btn" onclick="addPostReact('${post.id}','🔥')">🔥</button>
        <button class="react-add-btn" onclick="addPostReact('${post.id}','👍')">👍</button>
        <button class="react-add-btn" onclick="addPostReact('${post.id}','😂')">😂</button>
        <button class="react-add-btn" onclick="addPostReact('${post.id}','💜')">💜</button>
      </div>
      <button class="comment-toggle" id="ctoggle_${post.id}" onclick="toggleComments('${post.id}',this)">
        💬 <span id="ccnt_${post.id}">0</span>
      </button>
      ${canDel?`<button class="post-del" onclick="deletePost('${post.id}')">🗑</button>`:''}
    </div>
    <div class="comments-section" id="cs_${post.id}"></div>
  `;
  loadPostReactions(post.id);
  loadCommentCount(post.id);
  return card;
}

/* ===== POST REACTIONS ===== */
async function loadPostReactions(postId){
  const{data}=await sb.from('forum_reactions').select('emoji,user_id').eq('post_id',postId);
  renderPostReactions(postId,data||[]);
}
function renderPostReactions(postId,reactions){
  const el=document.getElementById('preact_'+postId);
  if(!el)return;
  const grouped={};
  reactions.forEach(r=>{if(!grouped[r.emoji])grouped[r.emoji]=[];grouped[r.emoji].push(r.user_id);});
  el.innerHTML='';
  Object.entries(grouped).forEach(([emoji,uids])=>{
    const chip=document.createElement('div');
    chip.className='react-chip'+(uids.includes(ME?.id)?' mine':'');
    chip.innerHTML=`${emoji}<span>${uids.length}</span>`;
    chip.onclick=()=>addPostReact(postId,emoji);
    el.appendChild(chip);
  });
}
async function addPostReact(postId,emoji){
  if(!ME)return;
  const{data:ex}=await sb.from('forum_reactions').select('id').eq('post_id',postId).eq('user_id',ME.id).eq('emoji',emoji).maybeSingle();
  if(ex)await sb.from('forum_reactions').delete().eq('id',ex.id);
  else await sb.from('forum_reactions').insert({post_id:postId,user_id:ME.id,emoji});
  await loadPostReactions(postId);
}

/* ===== DELETE POST ===== */
async function deletePost(postId){
  if(!confirm('პოსტი წაიშალოს?'))return;
  await sb.from('forum_comments').delete().eq('post_id',postId);
  await sb.from('forum_reactions').delete().eq('post_id',postId);
  await sb.from('forum_posts').delete().eq('id',postId);
  document.getElementById('post_'+postId)?.remove();
  allPosts=allPosts.filter(p=>p.id!==postId);
  toast('🗑 წაიშალა');
}

/* ===== COMMENT COUNT ===== */
async function loadCommentCount(postId){
  const{count}=await sb.from('forum_comments').select('id',{count:'exact',head:true}).eq('post_id',postId);
  const el=document.getElementById('ccnt_'+postId);
  if(el)el.textContent=count||0;
}

/* ===== TOGGLE COMMENTS ===== */
async function toggleComments(postId,btn){
  const section=document.getElementById('cs_'+postId);
  if(section.classList.contains('open')){
    section.classList.remove('open');
    return;
  }
  section.classList.add('open');
  if(!openCommentSections[postId])openCommentSections[postId]={replyTo:null,emojiOpen:false};
  await renderCommentsSection(postId,section);
}

/* ===== RENDER COMMENTS SECTION ===== */
async function renderCommentsSection(postId,sectionEl){
  sectionEl.innerHTML=`<div class="loader"><div class="loader-spin"></div></div>`;
  const{data}=await sb.from('forum_comments')
    .select('*,profiles!forum_comments_user_id_fkey(id,username,role,avatar_url,emotion)')
    .eq('post_id',postId).order('created_at',{ascending:true});

  sectionEl.innerHTML='';

  // render comments
  const commentsWrap=document.createElement('div');
  (data||[]).forEach(c=>{
    commentsWrap.appendChild(makeCommentEl(c,postId));
  });
  if(!(data||[]).length){
    const empty=document.createElement('div');
    empty.style.cssText='color:var(--text3);font-size:12px;text-align:center;padding:12px 0 16px';
    empty.textContent='პირველი კომენტარი დაწერე! 💬';
    commentsWrap.appendChild(empty);
  }
  sectionEl.appendChild(commentsWrap);

  // input area
  const inputWrap=document.createElement('div');
  inputWrap.className='comment-input-wrap';
  inputWrap.id='cinput_'+postId;

  inputWrap.innerHTML=`
    <div class="c-reply-bar" id="creplybar_${postId}">
      <span style="color:var(--accent)">↩️</span>
      <span style="flex:1;font-size:11px">პასუხი: <strong id="creplyname_${postId}"></strong></span>
      <button class="c-reply-cancel" onclick="cancelCommentReply('${postId}')">✕</button>
    </div>
    <div class="c-emoji-panel" id="cemoji_${postId}">
      <div class="c-emoji-grid" id="cemojigrid_${postId}"></div>
    </div>
    <div class="c-input-row">
      <button class="c-emoji-btn" onclick="toggleCommentEmoji('${postId}')">😊</button>
      <input id="cinp_${postId}" placeholder="კომენტარი..." onkeydown="if(event.key==='Enter')sendComment('${postId}')">
      <button class="c-send-btn" id="csendbtn_${postId}" onclick="sendComment('${postId}')"><span class="c-send-plane">✈️</span></button>
    </div>
  `;
  sectionEl.appendChild(inputWrap);

  // build emoji grid
  const emojiGrid=document.getElementById('cemojigrid_'+postId);
  const inp=document.getElementById('cinp_'+postId);
  if(emojiGrid&&inp)buildCommentEmojiGrid(emojiGrid,inp);

  // update count
  const cntEl=document.getElementById('ccnt_'+postId);
  if(cntEl)cntEl.textContent=(data||[]).length;
}

/* ===== MAKE COMMENT ELEMENT ===== */
function makeCommentEl(c,postId){
  const prof=c.profiles;
  const nick=prof?.username||'?';
  const role=prof?.role;
  const avHtml=prof?.avatar_url?`<img src="${prof.avatar_url}">`:(prof?.emotion||'😊');
  const rbadge=role&&role!=='member'?`<span class="post-role ${rbClass(role)}" style="font-size:8px;margin-left:4px">${rLabel(role)}</span>`:'';
  const canDel=MYPROF?.role==='founder'||(MYPROF?.role==='admin'&&role!=='founder')||c.user_id===ME?.id;

  let replyHtml='', displayContent=c.content;
  if(c.content&&c.content.startsWith('[reply:')){
    const rm=c.content.match(/^\[reply:([^\]]+)\|([^\]]*)\]([\s\S]*)$/);
    if(rm){
      replyHtml=`<div class="reply-preview"><strong>${esc(rm[1])}</strong>${esc(rm[2].substring(0,60))}</div>`;
      displayContent=rm[3];
    }
  }

  const div=document.createElement('div');
  div.className='comment-item';
  div.id='comment_'+c.id;
  div.innerHTML=`
    <div class="c-av" data-uid="${prof?.id||''}">${avHtml}</div>
    <div class="c-body">
      <div class="c-meta">
        <span class="c-nick" data-uid="${prof?.id||''}">${esc(nick)}</span>
        ${rbadge}
        <span class="c-time">${timeAgo(c.created_at)}</span>
        <button class="c-reply-btn" onclick="setCommentReply('${postId}','${c.id}','${esc(nick).replace(/'/g,"\\'")}')">↩️</button>
        ${canDel?`<button class="c-del" onclick="deleteComment('${c.id}','${postId}')">🗑</button>`:''}
      </div>
      <div class="c-bubble">${replyHtml}${renderContent(displayContent)}</div>
      <div class="c-reactions" id="creact_${c.id}"></div>
    </div>
  `;
  loadCommentReactions(c.id);
  return div;
}

/* ===== COMMENT REACTIONS ===== */
async function loadCommentReactions(commentId){
  const{data}=await sb.from('forum_comment_reactions').select('emoji,user_id').eq('comment_id',commentId);
  renderCommentReactions(commentId,data||[]);
}
function renderCommentReactions(commentId,reactions){
  const el=document.getElementById('creact_'+commentId);
  if(!el)return;
  const grouped={};
  reactions.forEach(r=>{if(!grouped[r.emoji])grouped[r.emoji]=[];grouped[r.emoji].push(r.user_id);});
  el.innerHTML='';
  // add reaction buttons
  const addBtns=document.createElement('div');
  addBtns.style.cssText='display:flex;gap:3px;margin-right:4px';
  ['❤️','🔥','😂','👍'].forEach(emoji=>{
    const b=document.createElement('button');
    b.className='react-add-btn';
    b.style.cssText='font-size:14px;padding:2px 4px';
    b.textContent=emoji;
    b.onclick=()=>addCommentReact(commentId,emoji);
    addBtns.appendChild(b);
  });
  el.appendChild(addBtns);
  Object.entries(grouped).forEach(([emoji,uids])=>{
    const chip=document.createElement('div');
    chip.className='c-react-chip'+(uids.includes(ME?.id)?' mine':'');
    chip.innerHTML=`${emoji}<span>${uids.length}</span>`;
    chip.onclick=()=>addCommentReact(commentId,emoji);
    el.appendChild(chip);
  });
}
async function addCommentReact(commentId,emoji){
  if(!ME)return;
  const{data:ex}=await sb.from('forum_comment_reactions').select('id').eq('comment_id',commentId).eq('user_id',ME.id).eq('emoji',emoji).maybeSingle();
  if(ex)await sb.from('forum_comment_reactions').delete().eq('id',ex.id);
  else await sb.from('forum_comment_reactions').insert({comment_id:commentId,user_id:ME.id,emoji});
  await loadCommentReactions(commentId);
}

/* ===== REPLY TO COMMENT ===== */
function setCommentReply(postId,commentId,nick){
  if(!openCommentSections[postId])openCommentSections[postId]={};
  openCommentSections[postId].replyTo={commentId,nick};
  const bar=document.getElementById('creplybar_'+postId);
  const nameEl=document.getElementById('creplyname_'+postId);
  if(bar){bar.classList.add('open');}
  if(nameEl)nameEl.textContent=nick;
  document.getElementById('cinp_'+postId)?.focus();
}
function cancelCommentReply(postId){
  if(openCommentSections[postId])openCommentSections[postId].replyTo=null;
  document.getElementById('creplybar_'+postId)?.classList.remove('open');
}

/* ===== TOGGLE EMOJI ===== */
function toggleCommentEmoji(postId){
  const p=document.getElementById('cemoji_'+postId);
  if(!p)return;
  p.classList.toggle('open');
}

/* ===== SEND COMMENT ===== */
async function sendComment(postId){
  const inp=document.getElementById('cinp_'+postId);
  if(!inp)return;
  let txt=inp.value.trim();
  if(!txt)return;
  inp.value='';

  const state=openCommentSections[postId]||{};
  if(state.replyTo){
    txt=`[reply:${state.replyTo.nick}|]${txt}`;
    cancelCommentReply(postId);
  }

  const btn=document.getElementById('csendbtn_'+postId);
  if(btn){btn.classList.add('fly');setTimeout(()=>btn.classList.remove('fly'),500);}

  const{data,error}=await sb.from('forum_comments').insert({
    post_id:postId,user_id:ME.id,content:txt
  }).select('*,profiles!forum_comments_user_id_fkey(id,username,role,avatar_url,emotion)').single();

  if(error){toast('❌ '+error.message);inp.value=txt;return;}

  // append to comments wrap
  const section=document.getElementById('cs_'+postId);
  const inputWrap=document.getElementById('cinput_'+postId);
  if(section&&inputWrap&&data){
    const newEl=makeCommentEl(data,postId);
    section.insertBefore(newEl,inputWrap);
  }

  // update count
  const cntEl=document.getElementById('ccnt_'+postId);
  if(cntEl)cntEl.textContent=parseInt(cntEl.textContent||'0')+1;

  // close emoji
  document.getElementById('cemoji_'+postId)?.classList.remove('open');
}

/* ===== DELETE COMMENT ===== */
async function deleteComment(commentId,postId){
  if(!confirm('კომენტარი წაიშალოს?'))return;
  await sb.from('forum_comment_reactions').delete().eq('comment_id',commentId);
  await sb.from('forum_comments').delete().eq('id',commentId);
  document.getElementById('comment_'+commentId)?.remove();
  const cntEl=document.getElementById('ccnt_'+postId);
  if(cntEl)cntEl.textContent=Math.max(0,parseInt(cntEl.textContent||'0')-1);
  toast('🗑 წაიშალა');
}

/* ===== REALTIME ===== */
function watchPosts(){
  postsCh=sb.channel('forum_posts_ch')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'forum_posts'},async payload=>{
      const{data}=await sb.from('forum_posts')
        .select('*,profiles!forum_posts_user_id_fkey(id,username,role,avatar_url,emotion)')
        .eq('id',payload.new.id).single();
      if(data){
        allPosts.unshift(data);
        const list=document.getElementById('postsList');
        const firstCard=list.firstChild;
        const newCard=makePostCard(data);
        if(firstCard&&firstCard.className==='post-card')list.insertBefore(newCard,firstCard);
        else{list.innerHTML='';list.appendChild(newCard);}
      }
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'forum_posts'},payload=>{
      allPosts=allPosts.filter(p=>p.id!==payload.old.id);
      document.getElementById('post_'+payload.old.id)?.remove();
    })
    .subscribe();
}

/* ===== INIT ===== */
async function init(){
  const{data:{user}}=await sb.auth.getUser();
  if(!user){location.href='index.html';return;}
  ME=user;
  const{data:prof}=await sb.from('profiles').select('*').eq('id',ME.id).single();
  MYPROF=prof;

  // nav
  const navAv=document.getElementById('navAv');
  const navNick=document.getElementById('navNick');
  if(prof?.avatar_url){navAv.innerHTML=`<img src="${prof.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;}
  else{navAv.textContent=prof?.emotion||'😊';}
  if(navNick)navNick.textContent=prof?.username||'';

  // show create post for admin/founder
  if(prof?.role==='admin'||prof?.role==='founder'){
    document.getElementById('createPostCard').style.display='block';
  }

  await loadEmojis();
  await loadPosts();
  watchPosts();
}

init();
</script>
