<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია - ფორუმი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body.night{
  --bg:#1c1a30;
  --panel:#252240;
  --panel2:#2e2a50;
  --border:rgba(160,80,255,0.35);
  --text:#ede0ff;
  --text2:#b580e0;
  --text3:#7a5a9a;
  --bubble:#2a2745;
  --input-bg:#221f3a;
  --online:#c07aff;
  --indigo:#7a1fc8;
  --indigo2:#a855f7;
  --indigo-f:rgba(120,30,200,0.18);
  --glow:rgba(168,85,247,0.28);
  --accent:#f07aff;
  --green:#4ade80;
  --red:#f87171;
  --yellow:#fbbf24;
}

body.day{
  --bg:#f5eeff;
  --panel:#ede0ff;
  --panel2:#e8d5ff;
  --border:rgba(106,13,173,0.2);
  --text:#1e0a36;
  --text2:#6b3a9e;
  --text3:#a882cc;
  --bubble:#fff;
  --input-bg:#fff;
  --online:#7b2fbe;
  --indigo:#5a189a;
  --indigo2:#7b2fbe;
  --indigo-f:rgba(106,13,173,0.08);
  --glow:rgba(106,13,173,0.2);
  --accent:#c040ff;
  --green:#22c55e;
  --red:#ef4444;
  --yellow:#eab308;
}

body{
  font-family:'Noto Sans Georgian',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .4s,color .4s;
}

/* ===== HEADER ===== */
.top-bar{
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
  position:sticky;
  top:0;
  z-index:100;
}
.logo{
  font-family:'Unbounded',sans-serif;
  font-size:18px;
  font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--indigo2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  cursor:pointer;
}
.user-info{
  display:flex;
  align-items:center;
  gap:12px;
}
.user-avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:var(--indigo-f);
  border:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}
.user-name{
  font-size:14px;
  font-weight:500;
  color:var(--text);
}
.user-role{
  font-size:10px;
  padding:2px 8px;
  border-radius:12px;
  background:var(--indigo-f);
  color:var(--text2);
}
.role-founder{background:rgba(255,180,0,0.15);color:#f0a500;border:1px solid rgba(255,180,0,0.3);}
.role-admin{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid rgba(168,85,247,0.3);}
.role-member{background:var(--indigo-f);color:var(--text2);border:1px solid var(--border);}

.btn-icon{
  background:var(--indigo-f);
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 14px;
  color:var(--text2);
  cursor:pointer;
  font-size:14px;
  transition:all .2s;
}
.btn-icon:hover{
  background:var(--border);
  color:var(--text);
}

/* ===== MAIN CONTAINER ===== */
.container{
  max-width:1000px;
  margin:0 auto;
  padding:20px;
}

/* ===== NEW TOPIC FORM ===== */
.new-topic-form{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  margin-bottom:24px;
  display:none;
}
.new-topic-form.show{display:block;}
.form-title{
  font-family:'Unbounded',sans-serif;
  font-size:11px;
  letter-spacing:1.5px;
  color:var(--text2);
  text-transform:uppercase;
  margin-bottom:14px;
}
.form-input{
  width:100%;
  padding:12px 16px;
  background:var(--input-bg);
  border:1px solid var(--border);
  border-radius:14px;
  color:var(--text);
  font-family:'Noto Sans Georgian',sans-serif;
  font-size:14px;
  margin-bottom:12px;
  outline:none;
}
.form-input:focus{border-color:var(--indigo2);}
.form-textarea{
  width:100%;
  padding:12px 16px;
  background:var(--input-bg);
  border:1px solid var(--border);
  border-radius:14px;
  color:var(--text);
  font-family:'Noto Sans Georgian',sans-serif;
  font-size:14px;
  min-height:100px;
  resize:vertical;
  outline:none;
}
.form-textarea:focus{border-color:var(--indigo2);}
.form-actions{
  display:flex;
  gap:10px;
  justify-content:flex-end;
}
.btn-submit{
  padding:10px 24px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
.btn-cancel{
  padding:10px 24px;
  border-radius:12px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  cursor:pointer;
}

/* ===== TOPICS LIST ===== */
.topics-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  flex-wrap:wrap;
  gap:10px;
}
.topics-title{
  font-family:'Unbounded',sans-serif;
  font-size:13px;
  font-weight:700;
  color:var(--text);
}
.add-topic-btn{
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));
  border:none;
  border-radius:12px;
  padding:8px 18px;
  color:#fff;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
}
.add-topic-btn:hover{transform:translateY(-1px);}

/* ===== TOPIC CARD ===== */
.topic-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  margin-bottom:16px;
  overflow:hidden;
  transition:all .2s;
}
.topic-card:hover{border-color:var(--indigo2);}
.topic-pinned{
  border-left:4px solid var(--yellow);
}
.topic-header{
  padding:16px 20px;
  cursor:pointer;
  display:flex;
  align-items:flex-start;
  gap:12px;
}
.topic-avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:var(--indigo-f);
  border:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  flex-shrink:0;
}
.topic-info{
  flex:1;
}
.topic-title{
  font-size:16px;
  font-weight:700;
  color:var(--text);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.pin-badge{
  font-size:9px;
  padding:2px 8px;
  border-radius:12px;
  background:rgba(251,191,36,0.15);
  color:var(--yellow);
  border:1px solid rgba(251,191,36,0.3);
}
.topic-meta{
  display:flex;
  gap:12px;
  font-size:11px;
  color:var(--text3);
}
.topic-author{
  color:var(--indigo2);
  cursor:pointer;
}
.topic-author:hover{text-decoration:underline;}
.topic-stats{
  display:flex;
  gap:12px;
  align-items:center;
  margin-left:auto;
  font-size:12px;
  color:var(--text2);
}
.topic-actions{
  display:flex;
  gap:6px;
  margin-left:12px;
}
.action-btn{
  background:transparent;
  border:none;
  font-size:14px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:8px;
  transition:all .2s;
}
.action-btn.delete{color:var(--red);}
.action-btn.delete:hover{background:rgba(248,113,113,0.15);}
.action-btn.pin{color:var(--yellow);}
.action-btn.pin:hover{background:rgba(251,191,36,0.1);}
.action-btn:hover{transform:scale(1.05);}

/* ===== COMMENTS SECTION ===== */
.comments-section{
  background:var(--surface2);
  border-top:1px solid var(--border);
  padding:16px 20px;
  display:none;
}
.comments-section.show{display:block;}
.comment-list{
  margin-bottom:16px;
  max-height:400px;
  overflow-y:auto;
}
.comment-item{
  padding:12px 0;
  border-bottom:1px solid var(--border);
  display:flex;
  gap:10px;
}
.comment-avatar{
  width:30px;
  height:30px;
  border-radius:50%;
  background:var(--indigo-f);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  flex-shrink:0;
}
.comment-content{
  flex:1;
}
.comment-author{
  font-size:12px;
  font-weight:600;
  color:var(--indigo2);
  margin-bottom:4px;
}
.comment-text{
  font-size:13px;
  color:var(--text);
  line-height:1.5;
}
.comment-time{
  font-size:10px;
  color:var(--text3);
  margin-top:4px;
}
.comment-delete{
  font-size:11px;
  color:var(--red);
  cursor:pointer;
  margin-left:8px;
}
.comment-delete:hover{text-decoration:underline;}
.add-comment{
  display:flex;
  gap:10px;
  margin-top:12px;
}
.add-comment input{
  flex:1;
  padding:10px 14px;
  background:var(--input-bg);
  border:1px solid var(--border);
  border-radius:14px;
  color:var(--text);
  font-family:'Noto Sans Georgian',sans-serif;
  font-size:13px;
  outline:none;
}
.add-comment input:focus{border-color:var(--indigo2);}
.add-comment button{
  padding:10px 18px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));
  color:#fff;
  padding:10px 24px;
  border-radius:30px;
  font-size:13px;
  z-index:1000;
  animation:toastIn .3s ease;
}
@keyframes toastIn{
  from{opacity:0;transform:translateX(-50%) translateY(20px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}
}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(8px);
  z-index:1000;
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-overlay.show{display:flex;}
.modal-content{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  max-width:400px;
  width:90%;
  text-align:center;
}
.modal-buttons{
  display:flex;
  gap:12px;
  margin-top:20px;
  justify-content:center;
}
.modal-btn{
  padding:10px 24px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:600;
}
.modal-btn.confirm{background:var(--red);color:#fff;}
.modal-btn.cancel{background:var(--indigo-f);color:var(--text);border:1px solid var(--border);}

/* ===== LOADING ===== */
.loading{
  text-align:center;
  padding:40px;
  color:var(--text2);
}
</style>
</head>
<body class="night">

<div class="top-bar">
  <div class="logo" onclick="location.reload()">🎯 კაიფფორუმი</div>
  <div class="user-info" id="userInfo">
    <div class="user-avatar" id="userAvatar">👤</div>
    <div>
      <div class="user-name" id="userName">იტვირთება...</div>
      <div class="user-role" id="userRole">წევრი</div>
    </div>
    <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="btn-icon" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">
  <div class="new-topic-form" id="newTopicForm">
    <div class="form-title">📝 ახალი თემის შექმნა</div>
    <input type="text" class="form-input" id="topicTitle" placeholder="თემის სათაური...">
    <textarea class="form-textarea" id="topicContent" placeholder="თემის შინაარსი..."></textarea>
    <div class="form-actions">
      <button class="btn-cancel" onclick="hideNewTopicForm()">გაუქმება</button>
      <button class="btn-submit" onclick="createTopic()">შექმნა</button>
    </div>
  </div>

  <div class="topics-header">
    <div class="topics-title">📋 ყველა თემა</div>
    <button class="add-topic-btn" id="addTopicBtn" onclick="showNewTopicForm()">+ ახალი თემა</button>
  </div>

  <div id="topicsList">
    <div class="loading">იტვირთება...</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <div id="modalMessage">დარწმუნებული ხარ?</div>
    <div class="modal-buttons">
      <button class="modal-btn confirm" onclick="confirmAction()">დიახ</button>
      <button class="modal-btn cancel" onclick="closeModal()">არა</button>
    </div>
  </div>
</div>

<script>
const {createClient} = supabase;
const sb = createClient(
  "https://vjstuyxuhshsouqsnvxp.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqc3R1eXh1aHNoc291cXNudnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDExOTQsImV4cCI6MjA5MDk3NzE5NH0.sVzu2GTaMwskp8lGb0C9F15Iy7RKT1FxQrwd5JgHquE"
);

let ME = null;
let MYPROF = null;
let currentTopics = [];
let pendingAction = null;
let pendingTopicId = null;
let openComments = new Set();

// ===== AUTH =====
async function init() {
  const {data:{user}} = await sb.auth.getUser();
  if (!user) { 
    location.href = 'index.html'; 
    return; 
  }
  ME = user;
  MYPROF = await loadProf(ME.id);
  if (!MYPROF) {
    const meta = user.user_metadata || {};
    await sb.from('profiles').insert({
      id: ME.id,
      username: meta.username || meta.name || user.email?.split('@')[0] || 'მომხმარებელი',
      role: 'member',
      emotion: '😊'
    });
    MYPROF = await loadProf(ME.id);
  }
  
  document.getElementById('userName').textContent = MYPROF?.username || 'მომხმარებელი';
  document.getElementById('userAvatar').textContent = MYPROF?.emotion || '👤';
  const roleEl = document.getElementById('userRole');
  roleEl.textContent = rLabel(MYPROF?.role);
  roleEl.className = `user-role role-${MYPROF?.role || 'member'}`;
  
  // თუ ადმინი ან დამფუძნებელია - აჩვენე ახალი თემის ღილაკი
  const canCreate = MYPROF?.role === 'admin' || MYPROF?.role === 'founder';
  document.getElementById('addTopicBtn').style.display = canCreate ? 'flex' : 'none';
  
  await loadTopics();
  subscribeToChanges();
}

async function loadProf(uid) {
  const {data} = await sb.from('profiles').select('*').eq('id', uid).single();
  return data;
}

function rLabel(r) {
  if (r === 'founder') return '👑 დამფუძნებელი';
  if (r === 'admin') return '🛡️ ადმინი';
  return '👤 წევრი';
}

// ===== TOPICS =====
async function loadTopics() {
  const {data, error} = await sb.from('forum_topics')
    .select('*, profiles(username, role, emotion, avatar_url)')
    .order('is_pinned', {ascending: false})
    .order('created_at', {ascending: false});
  
  if (error) {
    console.error(error);
    document.getElementById('topicsList').innerHTML = '<div class="loading">❌ შეცდომა ჩატვირთვისას</div>';
    return;
  }
  
  currentTopics = data || [];
  renderTopics();
}

function renderTopics() {
  const container = document.getElementById('topicsList');
  if (!currentTopics.length) {
    container.innerHTML = '<div class="loading">📭 ჯერ არ არის თემები</div>';
    return;
  }
  
  container.innerHTML = '';
  currentTopics.forEach(topic => {
    const isPinned = topic.is_pinned;
    const canDelete = MYPROF?.role === 'admin' || MYPROF?.role === 'founder';
    const canPin = MYPROF?.role === 'founder';
    const isOpen = openComments.has(topic.id);
    
    const topicDiv = document.createElement('div');
    topicDiv.className = `topic-card ${isPinned ? 'topic-pinned' : ''}`;
    topicDiv.innerHTML = `
      <div class="topic-header" onclick="toggleComments('${topic.id}')">
        <div class="topic-avatar">${topic.profiles?.emotion || '📝'}</div>
        <div class="topic-info">
          <div class="topic-title">
            ${topic.title}
            ${isPinned ? '<span class="pin-badge">📌 პინავა</span>' : ''}
          </div>
          <div class="topic-meta">
            <span class="topic-author" onclick="event.stopPropagation(); showUserProfile('${topic.user_id}')">${escapeHtml(topic.profiles?.username || '?')}</span>
            <span>${formatDate(topic.created_at)}</span>
            <span>💬 ${topic.comment_count || 0}</span>
          </div>
        </div>
        <div class="topic-stats">
          <span>👁️ ${topic.views || 0}</span>
        </div>
        <div class="topic-actions" onclick="event.stopPropagation()">
          ${canPin ? `<button class="action-btn pin" onclick="pinTopic('${topic.id}', ${!isPinned})">📌</button>` : ''}
          ${canDelete ? `<button class="action-btn delete" onclick="deleteTopic('${topic.id}')">🗑</button>` : ''}
        </div>
      </div>
      <div class="comments-section" id="comments-${topic.id}" style="display: ${isOpen ? 'block' : 'none'}">
        <div class="comment-list" id="commentList-${topic.id}">
          <div class="loading">იტვირთება კომენტარები...</div>
        </div>
        <div class="add-comment">
          <input type="text" id="commentInput-${topic.id}" placeholder="დაწერე კომენტარი...">
          <button onclick="addComment('${topic.id}')">📨 გაგზავნა</button>
        </div>
      </div>
    `;
    container.appendChild(topicDiv);
    
    // თუ გახსნილია, ჩატვირთე კომენტარები
    if (isOpen) {
      loadComments(topic.id);
    }
  });
}

function toggleComments(topicId) {
  if (openComments.has(topicId)) {
    openComments.delete(topicId);
    document.getElementById(`comments-${topicId}`).style.display = 'none';
  } else {
    openComments.add(topicId);
    document.getElementById(`comments-${topicId}`).style.display = 'block';
    loadComments(topicId);
  }
}

// ===== COMMENTS =====
async function loadComments(topicId) {
  const {data, error} = await sb.from('forum_comments')
    .select('*, profiles(username, role, emotion, avatar_url)')
    .eq('topic_id', topicId)
    .order('created_at', {ascending: true});
  
  if (error) {
    console.error(error);
    return;
  }
  
  renderComments(topicId, data || []);
}

function renderComments(topicId, comments) {
  const container = document.getElementById(`commentList-${topicId}`);
  if (!container) return;
  
  if (!comments.length) {
    container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text3)">💬 კომენტარები ჯერ არ არის</div>';
    return;
  }
  
  container.innerHTML = '';
  comments.forEach(comment => {
    const canDelete = MYPROF?.role === 'admin' || MYPROF?.role === 'founder' || comment.user_id === ME?.id;
    const commentDiv = document.createElement('div');
    commentDiv.className = 'comment-item';
    commentDiv.innerHTML = `
      <div class="comment-avatar">${comment.profiles?.emotion || '💬'}</div>
      <div class="comment-content">
        <div class="comment-author">
          ${escapeHtml(comment.profiles?.username || '?')}
          ${comment.profiles?.role === 'admin' ? '<span style="font-size:9px;margin-left:4px;">🛡️</span>' : ''}
          ${comment.profiles?.role === 'founder' ? '<span style="font-size:9px;margin-left:4px;">👑</span>' : ''}
        </div>
        <div class="comment-text">${escapeHtml(comment.content)}</div>
        <div class="comment-time">${formatDate(comment.created_at)}</div>
      </div>
      ${canDelete ? `<span class="comment-delete" onclick="deleteComment('${comment.id}', '${topicId}')">🗑</span>` : ''}
    `;
    container.appendChild(commentDiv);
  });
}

async function addComment(topicId) {
  const input = document.getElementById(`commentInput-${topicId}`);
  const content = input.value.trim();
  if (!content) {
    toast('✏️ დაწერე კომენტარი!');
    return;
  }
  
  const {error} = await sb.from('forum_comments').insert({
    topic_id: topicId,
    user_id: ME.id,
    content: content
  });
  
  if (error) {
    toast('❌ ' + error.message);
    return;
  }
  
  input.value = '';
  await loadComments(topicId);
  await updateCommentCount(topicId);
  toast('✅ კომენტარი დაემატა!');
}

async function deleteComment(commentId, topicId) {
  const {error} = await sb.from('forum_comments').delete().eq('id', commentId);
  if (error) {
    toast('❌ ' + error.message);
    return;
  }
  await loadComments(topicId);
  await updateCommentCount(topicId);
  toast('🗑 კომენტარი წაიშალა!');
}

async function updateCommentCount(topicId) {
  const {count} = await sb.from('forum_comments').select('*', {count: 'exact', head: true}).eq('topic_id', topicId);
  await sb.from('forum_topics').update({comment_count: count}).eq('id', topicId);
  await loadTopics();
}

// ===== TOPIC ACTIONS =====
async function createTopic() {
  const title = document.getElementById('topicTitle').value.trim();
  const content = document.getElementById('topicContent').value.trim();
  
  if (!title) {
    toast('📝 ჩაწერე თემის სათაური!');
    return;
  }
  
  const {error} = await sb.from('forum_topics').insert({
    title: title,
    content: content || '',
    user_id: ME.id
  });
  
  if (error) {
    toast('❌ ' + error.message);
    return;
  }
  
  document.getElementById('topicTitle').value = '';
  document.getElementById('topicContent').value = '';
  hideNewTopicForm();
  await loadTopics();
  toast('✅ თემა შეიქმნა!');
}

function showNewTopicForm() {
  document.getElementById('newTopicForm').classList.add('show');
}

function hideNewTopicForm() {
  document.getElementById('newTopicForm').classList.remove('show');
}

function deleteTopic(topicId) {
  pendingTopicId = topicId;
  pendingAction = 'delete';
  document.getElementById('modalMessage').textContent = '🗑 თემის წაშლა? (კომენტარებიც წაიშლება)';
  document.getElementById('modalOverlay').classList.add('show');
}

async function pinTopic(topicId, isPinned) {
  const {error} = await sb.from('forum_topics').update({is_pinned: isPinned}).eq('id', topicId);
  if (error) {
    toast('❌ ' + error.message);
    return;
  }
  await loadTopics();
  toast(isPinned ? '📌 თემი დაპინავდა!' : '📍 პინი მოხსნილია');
}

async function confirmAction() {
  if (pendingAction === 'delete' && pendingTopicId) {
    const {error} = await sb.from('forum_topics').delete().eq('id', pendingTopicId);
    if (error) {
      toast('❌ ' + error.message);
    } else {
      await loadTopics();
      toast('✅ თემა წაიშალა!');
    }
  }
  closeModal();
  pendingAction = null;
  pendingTopicId = null;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ===== UTILITIES =====
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  
  if (minutes < 1) return 'ახლახან';
  if (minutes < 60) return `${minutes} წუთის წინ`;
  if (hours < 24) return `${hours} საათის წინ`;
  if (days < 7) return `${days} დღის წინ`;
  return date.toLocaleDateString('ka-GE');
}

function showUserProfile(uid) {
  toast('👤 მომხმარებლის პროფილი (მალე დაემატება)');
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function toggleTheme() {
  const body = document.body;
  const isNight = body.classList.contains('night');
  body.classList.remove(isNight ? 'night' : 'day');
  body.classList.add(isNight ? 'day' : 'night');
  document.getElementById('themeBtn').textContent = isNight ? '☀️' : '🌙';
}

async function logout() {
  await sb.auth.signOut();
  location.href = 'index.html';
}

function subscribeToChanges() {
  sb.channel('forum-changes')
    .on('postgres_changes', {event: '*', schema: 'public', table: 'forum_topics'}, () => loadTopics())
    .on('postgres_changes', {event: '*', schema: 'public', table: 'forum_comments'}, () => {
      openComments.forEach(id => loadComments(id));
    })
    .subscribe();
}

init();
</script>
