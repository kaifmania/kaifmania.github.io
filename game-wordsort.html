<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>შიფროგრამა 🔐</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1e;--panel:#16142e;--panel2:#1e1b38;
  --border:rgba(160,80,255,0.3);--text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;
  --accent:#f07aff;--indigo:#7a1fc8;--indigo2:#a855f7;
  --indigo-f:rgba(120,30,200,0.18);--glow:rgba(168,85,247,0.35);
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;
}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-x:hidden;padding:16px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(120,30,200,0.2),transparent),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(240,122,255,0.1),transparent);pointer-events:none;z-index:0}

.back-btn{position:fixed;top:14px;left:14px;background:var(--indigo-f);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:12px;padding:8px 14px;cursor:pointer;z-index:100;transition:all .2s;font-family:'Noto Sans Georgian',sans-serif;text-decoration:none;display:flex;align-items:center;gap:5px}
.back-btn:hover{background:var(--indigo);color:#fff}

.game-header{text-align:center;margin-bottom:24px;position:relative;z-index:1;margin-top:8px}
.game-logo{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--indigo2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;margin-bottom:4px}
.game-sub{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;font-family:'Unbounded',sans-serif}

.score-strip{display:flex;gap:10px;margin-bottom:20px;position:relative;z-index:1;flex-wrap:wrap;justify-content:center}
.sc-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:10px 18px;text-align:center;min-width:90px;position:relative;overflow:hidden}
.sc-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--indigo-f),transparent);pointer-events:none}
.sc-label{font-size:9px;color:var(--text3);font-family:'Unbounded',sans-serif;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.sc-val{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:var(--accent);text-shadow:0 0 20px var(--glow)}
.sc-val.green{color:var(--green);text-shadow:0 0 16px rgba(74,222,128,.4)}
.sc-val.yellow{color:var(--yellow);text-shadow:0 0 16px rgba(251,191,36,.4)}

.game-card{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:24px;width:100%;max-width:500px;position:relative;z-index:1;box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 30px var(--indigo-f)}

.hint-row{display:flex;align-items:center;justify-content:flex-end;margin-bottom:16px}
.hint-btn{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:11px;padding:5px 12px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;transition:all .2s;display:flex;align-items:center;gap:4px}
.hint-btn:hover{background:var(--indigo);color:#fff}
.hint-btn:disabled{opacity:.4;cursor:not-allowed}
.hint-text{background:rgba(168,85,247,0.1);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:12px;color:var(--text2);margin-bottom:12px;display:none;line-height:1.5}
.hint-text.show{display:block}

.scrambled-label{font-size:9px;color:var(--text3);letter-spacing:2px;font-family:'Unbounded',sans-serif;text-transform:uppercase;margin-bottom:10px}
.scrambled-letters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;min-height:52px;padding:4px;justify-content:center}
.letter-tile{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:1px solid var(--accent);color:#fff;font-family:'Noto Sans Georgian',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(120,30,200,.3);user-select:none;animation:tileIn .25s ease both}
.letter-tile:hover:not(.used){transform:translateY(-4px) scale(1.08);box-shadow:0 8px 20px rgba(168,85,247,.5)}
.letter-tile.used{opacity:.25;cursor:not-allowed;transform:none}
.letter-tile:active:not(.used){transform:scale(.95)}

.answer-label{font-size:9px;color:var(--text3);letter-spacing:2px;font-family:'Unbounded',sans-serif;text-transform:uppercase;margin-bottom:10px}
.answer-slots{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;margin-bottom:20px;padding:4px;justify-content:center}
.answer-slot{width:44px;height:44px;border-radius:12px;border:2px dashed var(--border);background:rgba(255,255,255,.02);color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;user-select:none}
.answer-slot.filled{border-style:solid;border-color:var(--indigo2);background:var(--indigo-f)}
.answer-slot.filled:hover{border-color:var(--accent);background:rgba(240,122,255,.12)}
.answer-slot.correct{border-color:var(--green);background:rgba(74,222,128,.12);animation:correctPop .4s ease}
.answer-slot.wrong{border-color:var(--red);background:rgba(248,113,113,.12);animation:wrongShake .4s ease}

.progress-bar{width:100%;height:4px;background:var(--panel2);border-radius:4px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--indigo),var(--accent));border-radius:4px;transition:width .5s ease}

.timer-bar{width:100%;height:6px;background:var(--panel2);border-radius:6px;margin-bottom:16px;overflow:hidden}
.timer-fill{height:100%;border-radius:6px;transition:width .1s linear}

.streak-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--yellow);font-family:'Unbounded',sans-serif;font-weight:700;margin-bottom:10px;transition:all .3s}
.streak-badge.hidden{opacity:0;pointer-events:none}

.skip-count{font-size:10px;color:var(--text3);text-align:right;margin-bottom:8px;font-family:'Unbounded',sans-serif}

.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{flex:1;min-width:110px;padding:12px;border-radius:14px;border:1px solid var(--border);font-family:'Noto Sans Georgian',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;font-weight:600}
.btn-primary{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;color:#fff;box-shadow:0 4px 18px rgba(120,30,200,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(120,30,200,.55)}
.btn-secondary{background:var(--indigo-f);color:var(--text2)}
.btn-secondary:hover{background:var(--panel2);color:var(--text)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.result-overlay.show{opacity:1;pointer-events:all}
.result-card{background:var(--panel);border:1px solid var(--border);border-radius:28px;padding:32px;text-align:center;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 60px var(--glow);animation:popIn .4s cubic-bezier(.22,1.5,.4,1)}
.result-emoji{font-size:60px;display:block;margin-bottom:12px;line-height:1}
.result-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;margin-bottom:6px}
.result-title.win{color:var(--green)}
.result-title.lose{color:var(--red)}
.result-word{font-size:24px;font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:2px}
.result-score{font-size:13px;color:var(--text2);margin-bottom:20px}
.result-score strong{color:var(--yellow);font-size:16px;font-family:'Unbounded',sans-serif}

.lb-section{width:100%;max-width:500px;margin-top:16px;position:relative;z-index:1}
.lb-header{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-radius:16px 16px 0 0;display:flex;align-items:center;gap:6px;border-bottom:0}
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--panel);border:1px solid var(--border);border-top:0;transition:background .15s}
.lb-row:last-child{border-radius:0 0 16px 16px}
.lb-row:hover{background:var(--panel2)}
.lb-rank{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;width:28px;text-align:center;flex-shrink:0}
.rank-1{color:#ffd040;text-shadow:0 0 10px rgba(255,208,64,.5)}
.rank-2{color:#c8c8c8}
.rank-3{color:#c88040}
.lb-name{flex:1;font-size:13px;color:var(--text);font-weight:500}
.lb-score{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--accent)}

.floating-score{position:fixed;font-family:'Unbounded',sans-serif;font-size:24px;font-weight:900;color:var(--green);text-shadow:0 0 20px rgba(74,222,128,.5);pointer-events:none;z-index:9999;animation:scoreFloat .9s ease forwards}

@keyframes correctPop{0%{transform:scale(1)}30%{transform:scale(1.2)}60%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes popIn{from{opacity:0;transform:scale(.7) translateY(40px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes scoreFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.4)}}
@keyframes tileIn{from{opacity:0;transform:translateY(20px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>
<body>

<a class="back-btn" href="javascript:window.close()">← უკან</a>

<div class="game-header">
  <div class="game-logo">🔐 შიფროგრამა</div>

</div>

<div class="score-strip">

  <div class="sc-card"><div class="sc-label">სტრიქი</div><div class="sc-val" id="streakVal" style="color:var(--yellow)">0🔥</div></div>
</div>

<div class="game-card">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="streakBadge" class="streak-badge hidden">🔥 <span id="streakText">0</span> სტრიქი!</div>
  <div class="hint-row">

  </div>
  <div class="hint-text" id="hintText"></div>
  <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%;background:linear-gradient(90deg,#4ade80,#a855f7)"></div></div>

  <div class="scrambled-letters" id="scrambledLetters"></div>
  <div class="answer-label">✍️ სწორი პასუხი</div>
  <div class="answer-slots" id="answerSlots"></div>
  <div class="skip-count">გამოტოვება: <span id="skipCount">3</span></div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="clearAnswer()">🔄 გასუფთავება</button>
    <button class="btn btn-secondary" id="skipBtn" onclick="skipWord()">⏭ გამოტოვება</button>
    <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">✅ შემოწმება</button>
  </div>
</div>

<div class="lb-section">
  <div class="lb-header">🏆 ტოპ 10 · შიფროგრამა</div>
  <div id="lbContainer"></div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <div class="result-title" id="resultTitle">სწორია!</div>
    <div class="result-word" id="resultWord"></div>
    <div class="result-score" id="resultScore"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="nextWord()">➡ შემდეგი სიტყვა</button>
  </div>
</div>

// ====== STATE ======
let ME = null, MYPROF = null;
let currentWord = null;
let score = 0, correctCount = 0, wordIndex = 0, streak = 0;
let hintCount = 3, skipCount = 3;
let shuffledLetters = [], selectedLetters = [];
let usedIndices = new Set();
let timerInterval = null, timerLeft = 30;
const TIMER_MAX = 30;
const POINTS_PER_WORD = 5;
let usedWords = new Set();

// ====== INIT ======
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.close(); return; }
  ME = user;
  const { data } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  MYPROF = data;
  score = MYPROF?.game_score || 0;
  document.getElementById('scoreVal').textContent = score;
  loadLeaderboard();
  loadNewWord();
}

// ====== WORD LOGIC ======
function scramble(word) {
  const arr = [...word];
  let attempts = 0;
  do {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    attempts++;
  } while (arr.join('') === word && attempts < 30 && word.length > 1);
  return arr;
}

function loadNewWord() {
  clearInterval(timerInterval);

  // თუ ყველა გამოყენებულია, გადატვირთე
  if (usedWords.size >= WORDS.length) usedWords.clear();

  let idx;
  do { idx = Math.floor(Math.random() * WORDS.length); }
  while (usedWords.has(idx));
  usedWords.add(idx);

  currentWord = WORDS[idx];
  wordIndex++;
  usedIndices = new Set();
  selectedLetters = [];
  shuffledLetters = scramble(currentWord.w);

  // reset hint
  hintCount = 3;
  document.getElementById('hintCount').textContent = hintCount;
  document.getElementById('hintBtn').disabled = false;
  document.getElementById('hintText').textContent = '💡 ' + currentWord.hint;
  document.getElementById('hintText').classList.remove('show');

  document.getElementById('wordNum').textContent = wordIndex;
  document.getElementById('progressFill').style.width = Math.min(wordIndex * 0.33, 100) + '%';

  renderScrambled();
  renderAnswerSlots();
  startTimer();
}

function renderScrambled() {
  const el = document.getElementById('scrambledLetters');
  el.innerHTML = '';
  shuffledLetters.forEach((letter, i) => {
    const tile = document.createElement('div');
    tile.className = 'letter-tile';
    tile.textContent = letter;
    tile.style.animationDelay = (i * 0.06) + 's';
    if (usedIndices.has(i)) tile.classList.add('used');
    tile.addEventListener('click', () => pickLetter(i));
    el.appendChild(tile);
  });
}

function renderAnswerSlots() {
  const el = document.getElementById('answerSlots');
  el.innerHTML = '';
  const len = currentWord.w.length;
  for (let i = 0; i < len; i++) {
    const slot = document.createElement('div');
    slot.className = 'answer-slot' + (selectedLetters[i] !== undefined ? ' filled' : '');
    slot.textContent = selectedLetters[i]?.letter || '';
    slot.dataset.idx = i;
    slot.addEventListener('click', () => {
      if (selectedLetters[i] !== undefined) removeLetter(i);
    });
    el.appendChild(slot);
  }
}

function pickLetter(tileIdx) {
  if (usedIndices.has(tileIdx)) return;
  const nextEmpty = selectedLetters.length;
  if (nextEmpty >= currentWord.w.length) return;
  usedIndices.add(tileIdx);
  selectedLetters.push({ letter: shuffledLetters[tileIdx], tileIdx });
  renderScrambled();
  renderAnswerSlots();
  if (selectedLetters.length === currentWord.w.length) {
    setTimeout(checkAnswer, 200);
  }
}

function removeLetter(slotIdx) {
  if (slotIdx >= selectedLetters.length) return;
  const removed = selectedLetters.splice(slotIdx, 1)[0];
  usedIndices.delete(removed.tileIdx);
  renderScrambled();
  renderAnswerSlots();
}

function clearAnswer() {
  selectedLetters = [];
  usedIndices = new Set();
  renderScrambled();
  renderAnswerSlots();
}

// ====== CHECK ======
function checkAnswer() {
  if (selectedLetters.length < currentWord.w.length) { toast('⚠️ ყველა ასო ამოარჩიე!'); return; }
  const answer = selectedLetters.map(s => s.letter).join('');
  const slots = document.querySelectorAll('.answer-slot');
  clearInterval(timerInterval);

  if (answer === currentWord.w) {
    streak++;
    score += POINTS_PER_WORD;
    correctCount++;
    slots.forEach(s => { s.classList.add('correct'); s.classList.remove('filled'); });
    updateScoreDisplay();
    updateStreak();
    saveScore();
    showResult(true);
    spawnScoreFloat('+5');
  } else {
    streak = 0;
    updateStreak();
    slots.forEach(s => { s.classList.add('wrong'); s.classList.remove('filled'); });
    setTimeout(() => slots.forEach(s => s.classList.remove('wrong')), 600);
    showResult(false);
  }
}

function updateScoreDisplay() {
  const el = document.getElementById('scoreVal');
  el.textContent = score;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'correctPop .4s ease';
  document.getElementById('correctVal').textContent = correctCount;
}

function updateStreak() {
  document.getElementById('streakVal').textContent = streak + '🔥';
  const badge = document.getElementById('streakBadge');
  if (streak >= 2) {
    document.getElementById('streakText').textContent = streak;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

async function saveScore() {
  if (!ME) return;
  await sb.from('profiles').update({ game_score: score }).eq('id', ME.id);
  loadLeaderboard();
}

// ====== TIMER ======
function startTimer() {
  timerLeft = TIMER_MAX;
  const fill = document.getElementById('timerFill');
  fill.style.width = '100%';
  fill.style.background = 'linear-gradient(90deg,#4ade80,#a855f7)';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerLeft -= 0.1;
    const pct = (timerLeft / TIMER_MAX) * 100;
    fill.style.width = pct + '%';
    if (pct < 40) fill.style.background = 'linear-gradient(90deg,#fbbf24,#f87171)';
    if (pct < 20) fill.style.background = '#f87171';
    if (timerLeft <= 0) {
      clearInterval(timerInterval);
      streak = 0;
      updateStreak();
      showResult(false, true);
    }
  }, 100);
}

// ====== HINT ======
function useHint() {
  if (hintCount <= 0) return;
  hintCount--;
  document.getElementById('hintCount').textContent = hintCount;
  document.getElementById('hintText').classList.add('show');
  if (hintCount === 0) document.getElementById('hintBtn').disabled = true;
}

// ====== SKIP ======
function skipWord() {
  if (skipCount <= 0) { toast('❌ გამოტოვება ამოიწურა!'); return; }
  skipCount--;
  streak = 0;
  updateStreak();
  document.getElementById('skipCount').textContent = skipCount;
  if (skipCount === 0) document.getElementById('skipBtn').disabled = true;
  clearInterval(timerInterval);
  toast('⏭ გამოტოვებულია');
  setTimeout(loadNewWord, 300);
}

// ====== RESULT ======
function showResult(win, timeout = false) {
  const overlay = document.getElementById('resultOverlay');
  document.getElementById('resultEmoji').textContent = win ? (streak >= 3 ? '🔥🎉🔥' : '🎉') : (timeout ? '⏰' : '❌');
  const title = document.getElementById('resultTitle');
  title.textContent = win ? (streak >= 3 ? 'სუპერ სტრიქი!' : 'სწორია!') : (timeout ? 'დრო ამოიწურა!' : 'არასწორია');
  title.className = 'result-title ' + (win ? 'win' : 'lose');
  document.getElementById('resultWord').textContent = currentWord.w;
  document.getElementById('resultScore').innerHTML = win
    ? `+<strong>5</strong> ქულა · სულ: <strong>${score}</strong> · სტრიქი: ${streak}🔥`
    : `სწორი იყო: <strong style="color:var(--green)">${currentWord.w}</strong>`;
  overlay.classList.add('show');
}

function nextWord() {
  document.getElementById('resultOverlay').classList.remove('show');
  loadNewWord();
}

// ====== FLOATING SCORE ======
function spawnScoreFloat(txt) {
  const el = document.createElement('div');
  el.className = 'floating-score';
  el.textContent = txt;
  el.style.left = (30 + Math.random() * 40) + '%';
  el.style.top = '40%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ====== LEADERBOARD ======
async function loadLeaderboard() {
  const { data } = await sb.from('profiles')
    .select('id,username,game_score')
    .order('game_score', { ascending: false })
    .limit(10);
  const cont = document.getElementById('lbContainer');
  cont.innerHTML = '';
  (data || []).forEach((u, i) => {
    const medals = ['🥇', '🥈', '🥉'];
    const rankClass = i < 3 ? `rank-${i+1}` : '';
    const isMe = u.id === ME?.id;
    const d = document.createElement('div');
    d.className = 'lb-row';
    if (isMe) d.style.background = 'var(--indigo-f)';
    d.innerHTML = `
      <span class="lb-rank ${rankClass}">${medals[i] || (i+1)}</span>
      <span class="lb-name" style="${isMe?'color:var(--accent);font-weight:700':''}">${esc(u.username||'?')}${isMe?' 👈':''}</span>
      <span class="lb-score">${u.game_score||0}</span>
    `;
    cont.appendChild(d);
  });
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:13px;z-index:99999;box-shadow:0 6px 24px rgba(0,0,0,.4);color:var(--text);white-space:nowrap';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

init();
</script>
