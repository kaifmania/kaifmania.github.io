<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎱 ბილიარდი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0612, #110d22);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Noto Sans Georgian', system-ui, sans-serif;
            color: #ede0ff;
        }

        /* ========== მთავარი მენიუ ========== */
        .main-menu {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0612, #110d22);
            z-index: 100;
        }

        .menu-card {
            background: #1a1530;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(168,85,247,0.3);
            min-width: 320px;
        }

        .menu-title {
            font-size: 38px;
            font-weight: bold;
            background: linear-gradient(135deg, #f07aff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .menu-btn {
            background: linear-gradient(135deg, #7a1fc8, #a855f7);
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #a855f7, #c084fc);
        }

        /* ========== წევრების სია (მეგობართან თამაში) ========== */
        .members-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0612, #110d22);
            z-index: 200;
            display: none;
            padding: 20px;
        }

        .members-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px;
        }

        .back-arrow {
            background: #1a1530;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            border: 1px solid rgba(168,85,247,0.3);
        }

        .members-title {
            font-size: 20px;
            font-weight: bold;
            color: #f07aff;
        }

        .members-list {
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            padding: 10px;
        }

        .member-card {
            background: #1a1530;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(168,85,247,0.2);
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7a1fc8, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .member-details {
            text-align: left;
        }

        .member-nick {
            font-size: 16px;
            font-weight: bold;
        }

        .member-status {
            font-size: 11px;
            color: #4ade80;
            margin-top: 4px;
        }

        .invite-button {
            background: linear-gradient(135deg, #7a1fc8, #a855f7);
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .invite-button:disabled {
            opacity: 0.5;
        }

        .empty-members {
            text-align: center;
            padding: 40px;
            color: #b580e0;
        }

        /* ========== მოწვევის პოპაპი ========== */
        .invite-popup {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1530;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #f07aff;
            z-index: 300;
            min-width: 280px;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .popup-title {
            margin-bottom: 15px;
            font-size: 14px;
        }

        .popup-title strong {
            color: #f07aff;
        }

        .popup-buttons {
            display: flex;
            gap: 10px;
        }

        .accept-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .decline-btn {
            background: linear-gradient(135deg, #f87171, #dc2626);
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* ========== თამაშის ეკრანი ========== */
        .game-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #0a0612;
        }

        .game-header {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 10;
        }

        .exit-btn {
            background: #1a1530;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            border: 1px solid rgba(168,85,247,0.3);
        }

        .turn-text {
            background: #1a1530;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            border-left: 3px solid #f07aff;
        }

        .score-panel {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            z-index: 10;
        }

        .score-item {
            background: #1a1530;
            border-radius: 20px;
            padding: 10px 20px;
            text-align: center;
            min-width: 150px;
            border: 1px solid rgba(168,85,247,0.3);
        }

        .score-item.active {
            border: 2px solid #f07aff;
            box-shadow: 0 0 15px rgba(240,122,255,0.3);
        }

        .score-name {
            font-size: 13px;
            color: #b580e0;
        }

        .score-number {
            font-size: 28px;
            font-weight: bold;
            color: #f07aff;
        }

        .pocketed-balls {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }

        .mini-ball {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 2px black;
            box-shadow: inset -1px -1px 3px rgba(0,0,0,0.3), inset 1px 1px 2px rgba(255,255,255,0.2);
        }

        .table-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a2a1a;
            border-radius: 15px;
            padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            border-radius: 10px;
            cursor: crosshair;
            box-shadow: 0 0 0 4px #8B4513, 0 0 0 8px #5a2a0a;
        }

        .control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1530;
            border-radius: 40px;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid rgba(168,85,247,0.3);
            z-index: 10;
        }

        .power-container {
            width: 180px;
            height: 6px;
            background: #0a0612;
            border-radius: 3px;
            overflow: hidden;
        }

        .power-level {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #4ade80, #fbbf24, #f87171);
        }

        input[type="range"] {
            width: 120px;
            accent-color: #a855f7;
        }

        .shoot-button {
            background: linear-gradient(135deg, #7a1fc8, #a855f7);
            border: none;
            padding: 8px 25px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .win-screen {
            position: fixed;
            inset: 0;
            background: rgba(10,6,18,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 400;
        }

        .win-box {
            background: #1a1530;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 2px solid #a855f7;
        }

        .win-box button {
            margin-top: 20px;
            background: linear-gradient(135deg, #7a1fc8, #a855f7);
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .score-item { padding: 8px 12px; min-width: 120px; }
            .score-number { font-size: 22px; }
            .control-panel { padding: 8px 15px; gap: 10px; }
            .power-container { width: 120px; }
            .member-card { padding: 12px; }
            .member-avatar { width: 40px; height: 40px; font-size: 20px; }
        }
    </style>
</head>
<body>

<!-- მთავარი მენიუ -->
<div id="mainMenu" class="main-menu">
    <div class="menu-card">
        <div class="menu-title">🎱 ბილიარდი</div>
        <button class="menu-btn" onclick="startAIGame()">🤖 AI-ს წინააღმდეგ</button>
        <button class="menu-btn" onclick="showMembers()">👥 მეგობართან თამაში</button>
    </div>
</div>

<!-- წევრების სია -->
<div id="membersScreen" class="members-screen">
    <div class="members-header">
        <div class="back-arrow" onclick="hideMembers()">←</div>
        <div class="members-title">📨 ონლაინ მოთამაშეები</div>
    </div>
    <div id="membersList" class="members-list">
        <div class="empty-members">🚀 იტვირთება...</div>
    </div>
</div>

<!-- თამაშის ეკრანი -->
<div id="gameScreen" class="game-screen">
    <div class="game-header">
        <div class="exit-btn" onclick="exitToMenu()">← გასვლა</div>
        <div class="turn-text" id="turnDisplay">🎯 მოთამაშის ჯერი</div>
    </div>

    <div class="score-panel">
        <div class="score-item" id="player1ScoreCard">
            <div class="score-name" id="p1Name">👤 მოთამაშე 1</div>
            <div class="score-number" id="p1Score">0</div>
            <div class="pocketed-balls" id="p1Pocketed"></div>
        </div>
        <div class="score-item" id="player2ScoreCard">
            <div class="score-name" id="p2Name">👤 მოთამაშე 2</div>
            <div class="score-number" id="p2Score">0</div>
            <div class="pocketed-balls" id="p2Pocketed"></div>
        </div>
    </div>

    <div class="table-area">
        <canvas id="gameCanvas" width="950" height="530"></canvas>
    </div>

    <div class="control-panel">
        <span>⚡ ძალა</span>
        <div class="power-container">
            <div class="power-level" id="powerFill"></div>
        </div>
        <input type="range" id="powerSlider" min="0" max="100" value="50">
        <button class="shoot-button" id="shootBtn">🎯 დარტყმა</button>
    </div>
</div>

<div id="winScreen" class="win-screen">
    <div class="win-box">
        <div style="font-size: 48px;" id="winEmoji">🏆</div>
        <h2 id="winMessage">გამარჯვება!</h2>
        <button onclick="resetGame()">🔄 ახალი თამაში</button>
    </div>
</div>

<script>
    // ========== localStorage მოთამაშეებისთვის ==========
    let myId = 'player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
    let myName = 'მოთამაშე_' + Math.floor(Math.random() * 1000);
    let onlinePlayers = [];
    let gameInProgress = false;
    let currentGameMode = null;
    let pendingInvite = null;

    // ========== წევრების სინქრონიზაცია ==========
    function updatePresence() {
        const players = getAllPlayers();
        const myIndex = players.findIndex(p => p.id === myId);
        const myData = {
            id: myId,
            name: myName,
            lastSeen: Date.now(),
            inGame: gameInProgress
        };
        
        if(myIndex === -1) players.push(myData);
        else players[myIndex] = myData;
        
        localStorage.setItem('billiard_players', JSON.stringify(players));
    }
    
    function getAllPlayers() {
        const data = localStorage.getItem('billiard_players');
        if(!data) return [];
        try { return JSON.parse(data); }
        catch(e) { return []; }
    }
    
    function loadMembers() {
        let players = getAllPlayers();
        const now = Date.now();
        
        // ბოლო 10 წამში აქტიურები, საკუთარი თავის გამოკლებით
        players = players.filter(p => p.id !== myId && (now - p.lastSeen) < 10000);
        onlinePlayers = players;
        
        const container = document.getElementById('membersList');
        
        if(players.length === 0) {
            container.innerHTML = '<div class="empty-members">😴 აქტიური მოთამაშეები არ არიან<br><span style="font-size: 12px;">გახსენით თამაში სხვა ფანჯარაში</span></div>';
            return;
        }
        
        container.innerHTML = players.map(p => `
            <div class="member-card">
                <div class="member-info">
                    <div class="member-avatar">${getAvatarEmoji(p.name)}</div>
                    <div class="member-details">
                        <div class="member-nick">${escapeHtml(p.name)}</div>
                        <div class="member-status">● ონლაინში</div>
                    </div>
                </div>
                <button class="invite-button" onclick="sendInvite('${p.id}', '${escapeHtml(p.name)}')">📨 მოწვევა</button>
            </div>
        `).join('');
    }
    
    function getAvatarEmoji(name) {
        const emojis = ['🎱', '🎯', '🏆', '⭐', '🎮', '🎲'];
        let hash = 0;
        for(let i = 0; i < name.length; i++) {
            hash = ((hash << 5) - hash) + name.charCodeAt(i);
            hash |= 0;
        }
        return emojis[Math.abs(hash) % emojis.length];
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== მოწვევის გაგზავნა ==========
    function sendInvite(toId, toName) {
        if(gameInProgress) {
            alert('თამაში უკვე მიმდინარეობს!');
            return;
        }
        
        const invite = {
            from: myId,
            fromName: myName,
            to: toId,
            toName: toName,
            timestamp: Date.now()
        };
        
        localStorage.setItem('billiard_invite_' + toId, JSON.stringify(invite));
        
        setTimeout(() => {
            const current = localStorage.getItem('billiard_invite_' + toId);
            if(current) {
                const parsed = JSON.parse(current);
                if(parsed && parsed.timestamp === invite.timestamp) {
                    localStorage.removeItem('billiard_invite_' + toId);
                }
            }
        }, 30000);
        
        alert(`📨 მოწვევა გაეგზავნა ${toName}-ს`);
    }
    
    // ========== მოწვევების მოსმენა ==========
    function listenForInvites() {
        window.addEventListener('storage', (e) => {
            if(e.key === 'billiard_invite_' + myId) {
                const invite = JSON.parse(e.newValue);
                if(invite && invite.to === myId && !gameInProgress) {
                    showInvitePopup(invite);
                }
            }
        });
    }
    
    function showInvitePopup(invite) {
        const old = document.querySelector('.invite-popup');
        if(old) old.remove();
        
        const div = document.createElement('div');
        div.className = 'invite-popup';
        div.innerHTML = `
            <div class="popup-title">
                <strong>${escapeHtml(invite.fromName)}</strong> გიწვევს სათამაშოდ!
            </div>
            <div class="popup-buttons">
                <button class="accept-btn" onclick="acceptInvite('${invite.from}', '${escapeHtml(invite.fromName)}')">✅ მიღება</button>
                <button class="decline-btn" onclick="declineInvite(this)">❌ უარი</button>
            </div>
        `;
        document.body.appendChild(div);
    }
    
    function acceptInvite(fromId, fromName) {
        const popup = document.querySelector('.invite-popup');
        if(popup) popup.remove();
        
        startOnlineGame(fromName);
    }
    
    function declineInvite(btn) {
        const popup = btn.closest('.invite-popup');
        if(popup) popup.remove();
    }
    
    // ========== ბილიარდის ფიზიკა ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const W = 950, H = 530;
    const BALL_R = 7;
    const FRICTION = 0.985;
    const WALL_BOUNCE = 0.92;
    
    const POCKETS = [
        { x: 20, y: 20 }, { x: W/2, y: 15 }, { x: W-20, y: 20 },
        { x: 20, y: H-20 }, { x: W/2, y: H-15 }, { x: W-20, y: H-20 }
    ];
    
    const BALL_COLORS = {
        1: '#FFD700', 2: '#0000CD', 3: '#DC143C', 4: '#8B008B', 5: '#FF8C00',
        6: '#228B22', 7: '#B22222', 8: '#1a1a2e', 9: '#FFD700', 10: '#0000CD',
        11: '#DC143C', 12: '#8B008B', 13: '#FF8C00', 14: '#228B22', 15: '#B22222', 0: '#FFFFFF'
    };
    
    const SOLIDS = [1,2,3,4,5,6,7];
    const STRIPES = [9,10,11,12,13,14,15];
    
    let balls = [];
    let currentPlayer = 1;
    let gameActive = true;
    let isMoving = false;
    let power = 50;
    let angle = 0;
    let isDragging = false;
    let placingWhiteBall = false;
    let animationId = null;
    
    let gamePlayers = {
        1: { name: '👤 მოთამაშე 1', score: 0, pocketed: [], group: null },
        2: { name: '👤 მოთამაშე 2', score: 0, pocketed: [], group: null }
    };
    
    function initBalls() {
        balls = [];
        const startX = W - 130;
        const startY = H/2;
        const spacing = BALL_R * 2.1;
        
        const positions = [
            [0,0], [-1,-1], [1,-1], [-2,-2], [0,-2], [2,-2],
            [-3,-3], [-1,-3], [1,-3], [3,-3], [-4,-4], [-2,-4], [0,-4], [2,-4], [4,-4]
        ];
        
        const numbers = [8, 1, 9, 2, 10, 3, 11, 4, 12, 5, 13, 6, 14, 7, 15];
        
        for(let i = 0; i < positions.length; i++) {
            balls.push({
                id: i, num: numbers[i],
                x: startX + positions[i][0] * spacing,
                y: startY + positions[i][1] * spacing * 0.866,
                vx: 0, vy: 0, pocketed: false,
                isStripe: STRIPES.includes(numbers[i])
            });
        }
        
        balls.push({
            id: 16, num: 0,
            x: W * 0.18, y: H/2,
            vx: 0, vy: 0, pocketed: false,
            isStripe: false
        });
    }
    
    function updateGameUI() {
        document.getElementById('p1Score').textContent = gamePlayers[1].score;
        document.getElementById('p2Score').textContent = gamePlayers[2].score;
        document.getElementById('p1Name').textContent = gamePlayers[1].name;
        document.getElementById('p2Name').textContent = gamePlayers[2].name;
        
        const card1 = document.getElementById('player1ScoreCard');
        const card2 = document.getElementById('player2ScoreCard');
        
        if(currentPlayer === 1) {
            card1.classList.add('active');
            card2.classList.remove('active');
            document.getElementById('turnDisplay').innerHTML = `🎯 ${gamePlayers[1].name}-ის ჯერი`;
        } else {
            card1.classList.remove('active');
            card2.classList.add('active');
            document.getElementById('turnDisplay').innerHTML = `🎯 ${gamePlayers[2].name}-ის ჯერი`;
        }
        
        const p1Div = document.getElementById('p1Pocketed');
        const p2Div = document.getElementById('p2Pocketed');
        
        p1Div.innerHTML = gamePlayers[1].pocketed.map(n => 
            `<div class="mini-ball" style="background: ${BALL_COLORS[n]}">${n}</div>`
        ).join('');
        
        p2Div.innerHTML = gamePlayers[2].pocketed.map(n => 
            `<div class="mini-ball" style="background: ${BALL_COLORS[n]}">${n}</div>`
        ).join('');
    }
    
    function updatePhysics() {
        let moving = false;
        
        for(let b of balls) {
            if(b.pocketed) continue;
            
            b.x += b.vx;
            b.y += b.vy;
            b.vx *= FRICTION;
            b.vy *= FRICTION;
            
            if(Math.abs(b.vx) > 0.1 || Math.abs(b.vy) > 0.1) moving = true;
            
            if(b.x - BALL_R < 12) { b.x = 12 + BALL_R; b.vx = -b.vx * WALL_BOUNCE; }
            if(b.x + BALL_R > W - 12) { b.x = W - 12 - BALL_R; b.vx = -b.vx * WALL_BOUNCE; }
            if(b.y - BALL_R < 12) { b.y = 12 + BALL_R; b.vy = -b.vy * WALL_BOUNCE; }
            if(b.y + BALL_R > H - 12) { b.y = H - 12 - BALL_R; b.vy = -b.vy * WALL_BOUNCE; }
            
            for(let p of POCKETS) {
                if(Math.hypot(b.x - p.x, b.y - p.y) < BALL_R + 10 && !b.pocketed) {
                    b.pocketed = true;
                    b.vx = b.vy = 0;
                    
                    if(b.num === 0) {
                        placingWhiteBall = true;
                        document.getElementById('turnDisplay').innerHTML = '⚠️ დადე თეთრი ბურთი!';
                    } 
                    else if(b.num === 8) {
                        const remaining = balls.filter(bb => 
                            !bb.pocketed && bb.num !== 0 && bb.num !== 8 && 
                            (gamePlayers[currentPlayer].group === 'solid' ? SOLIDS.includes(bb.num) : STRIPES.includes(bb.num))
                        ).length;
                        if(remaining === 0) endGame(currentPlayer);
                        else endGame(3 - currentPlayer);
                    }
                    else {
                        const group = SOLIDS.includes(b.num) ? 'solid' : 'stripe';
                        if(gamePlayers[1].group === null && gamePlayers[2].group === null) {
                            gamePlayers[currentPlayer].group = group;
                            gamePlayers[3-currentPlayer].group = group === 'solid' ? 'stripe' : 'solid';
                        }
                        if(gamePlayers[currentPlayer].group === group) {
                            gamePlayers[currentPlayer].pocketed.push(b.num);
                            gamePlayers[currentPlayer].score++;
                            updateGameUI();
                        } else {
                            currentPlayer = 3 - currentPlayer;
                            updateGameUI();
                        }
                    }
                    break;
                }
            }
        }
        
        for(let i = 0; i < balls.length; i++) {
            for(let j = i+1; j < balls.length; j++) {
                const b1 = balls[i], b2 = balls[j];
                if(b1.pocketed || b2.pocketed) continue;
                
                const dx = b2.x - b1.x, dy = b2.y - b1.y;
                const dist = Math.hypot(dx, dy);
                
                if(dist < BALL_R * 2) {
                    const ang = Math.atan2(dy, dx);
                    const overlap = BALL_R * 2 - dist;
                    const moveX = Math.cos(ang) * overlap * 0.5;
                    const moveY = Math.sin(ang) * overlap * 0.5;
                    
                    b1.x -= moveX; b1.y -= moveY;
                    b2.x += moveX; b2.y += moveY;
                    
                    const nx = dx / dist, ny = dy / dist;
                    const dvx = b2.vx - b1.vx, dvy = b2.vy - b1.vy;
                    const dot = dvx * nx + dvy * ny;
                    
                    if(dot < 0) {
                        const imp = dot * 0.8;
                        b1.vx += imp * nx; b1.vy += imp * ny;
                        b2.vx -= imp * nx; b2.vy -= imp * ny;
                    }
                }
            }
        }
        
        if(!moving && isMoving) {
            isMoving = false;
            if(!placingWhiteBall) {
                currentPlayer = 3 - currentPlayer;
                updateGameUI();
            }
            if(gameActive && !placingWhiteBall && currentPlayer === 2 && currentGameMode === 'ai') {
                setTimeout(() => aiShoot(), 500);
            }
        }
        
        isMoving = moving;
        drawGame();
        if(isMoving) animationId = requestAnimationFrame(updatePhysics);
        else if(animationId) { cancelAnimationFrame(animationId); animationId = null; }
    }
    
    function shoot() {
        if(isMoving || placingWhiteBall || !gameActive) return;
        if(currentGameMode === 'ai' && currentPlayer !== 1) return;
        
        const cue = balls.find(b => b.num === 0 && !b.pocketed);
        if(!cue) return;
        
        const speed = power * 0.45;
        cue.vx = Math.cos(angle) * speed;
        cue.vy = Math.sin(angle) * speed;
        isMoving = true;
        updatePhysics();
    }
    
    function aiShoot() {
        if(isMoving || !gameActive || currentPlayer !== 2 || placingWhiteBall) return;
        
        const cue = balls.find(b => b.num === 0 && !b.pocketed);
        if(!cue) return;
        
        let targets = balls.filter(b => !b.pocketed && b.num !== 0);
        if(gamePlayers[2].group) {
            targets = targets.filter(b => 
                gamePlayers[2].group === 'solid' ? SOLIDS.includes(b.num) : STRIPES.includes(b.num)
            );
        }
        if(targets.length === 0 && gamePlayers[2].pocketed.length >= 7) {
            targets = balls.filter(b => !b.pocketed && b.num === 8);
        }
        if(targets.length === 0) {
            targets = balls.filter(b => !b.pocketed && b.num !== 0 && b.num !== 8);
        }
        
        if(targets.length > 0) {
            const target = targets[0];
            angle = Math.atan2(target.y - cue.y, target.x - cue.x);
            angle += (Math.random() - 0.5) * 0.2;
            const dist = Math.hypot(target.x - cue.x, target.y - cue.y);
            power = Math.min(90, Math.max(35, dist / 4.5));
        } else {
            angle = Math.random() * Math.PI * 2;
            power = 50;
        }
        
        document.getElementById('powerSlider').value = power;
        document.getElementById('powerFill').style.width = power + '%';
        
        const speed = power * 0.45;
        cue.vx = Math.cos(angle) * speed;
        cue.vy = Math.sin(angle) * speed;
        isMoving = true;
        updatePhysics();
    }
    
    function placeWhiteBall(x, y) {
        if(x < BALL_R + 15 || x > W - BALL_R - 15 || y < BALL_R + 15 || y > H - BALL_R - 15) return;
        
        for(let b of balls) {
            if(b.pocketed) continue;
            if(b.num === 0) continue;
            if(Math.hypot(b.x - x, b.y - y) < BALL_R * 2.2) return;
        }
        
        const cue = balls.find(b => b.num === 0);
        if(cue) { cue.x = x; cue.y = y; cue.pocketed = false; }
        
        placingWhiteBall = false;
        updateGameUI();
        drawGame();
        
        if(gameActive && currentPlayer === 2 && currentGameMode === 'ai') {
            setTimeout(() => aiShoot(), 500);
        }
    }
    
    function drawGame() {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#1a6b2f';
        ctx.fillRect(0, 0, W, H);
        
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 8;
        ctx.strokeRect(8, 8, W-16, H-16);
        
        for(let p of POCKETS) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 12, 0, Math.PI*2);
            ctx.fillStyle = '#000000aa';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
            ctx.fillStyle = '#000000';
            ctx.fill();
        }
        
        for(let b of balls) {
            if(b.pocketed) continue;
            
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2);
            
            if(b.isStripe && b.num !== 0) {
                ctx.fillStyle = '#FFFFFF';
                ctx.fill();
                ctx.fillStyle = BALL_COLORS[b.num];
                ctx.fillRect(b.x - BALL_R, b.y - 3, BALL_R*2, 6);
            } else {
                const grad = ctx.createRadialGradient(b.x-3, b.y-3, 2, b.x, b.y, BALL_R);
                grad.addColorStop(0, BALL_COLORS[b.num] || '#888');
                grad.addColorStop(1, '#444');
                ctx.fillStyle = grad;
                ctx.fill();
            }
            
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 0.5;
            ctx.stroke();
            
            if(b.num !== 0) {
                ctx.fillStyle = '#FFF';
                ctx.font = `bold ${BALL_R+2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(b.num, b.x, b.y);
            }
            ctx.shadowBlur = 0;
        }
        
        if(!isMoving && !placingWhiteBall && gameActive) {
            if(currentGameMode === '2player' || (currentGameMode === 'ai' && currentPlayer === 1)) {
                const cue = balls.find(b => b.num === 0 && !b.pocketed);
                if(cue) {
                    const lineEndX = cue.x + Math.cos(angle) * 200;
                    const lineEndY = cue.y + Math.sin(angle) * 200;
                    ctx.beginPath();
                    ctx.setLineDash([6, 8]);
                    ctx.strokeStyle = '#f07aff';
                    ctx.lineWidth = 1.5;
                    ctx.moveTo(cue.x, cue.y);
                    ctx.lineTo(lineEndX, lineEndY);
                    ctx.stroke();
                    
                    const stickX = cue.x - Math.cos(angle) * (BALL_R + 18 + (power / 100) * 35);
                    const stickY = cue.y - Math.sin(angle) * (BALL_R + 18 + (power / 100) * 35);
                    const stickEndX = stickX - Math.cos(angle) * 65;
                    const stickEndY = stickY - Math.sin(angle) * 65;
                    
                    ctx.beginPath();
                    ctx.setLineDash([]);
                    ctx.lineWidth = 5;
                    ctx.strokeStyle = '#8B6914';
                    ctx.moveTo(stickX, stickY);
                    ctx.lineTo(stickEndX, stickEndY);
                    ctx.stroke();
                    
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#DAA520';
                    ctx.moveTo(stickX, stickY);
                    ctx.lineTo(stickEndX, stickEndY);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.arc(stickX, stickY, 3, 0, Math.PI*2);
                    ctx.fillStyle = '#DAA520';
                    ctx.fill();
                }
            }
        }
    }
    
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
        else { cx = e.clientX; cy = e.clientY; }
        return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
    }
    
    function onMouseDown(e) {
        e.preventDefault();
        if(isMoving) return;
        const coords = getCoords(e);
        if(placingWhiteBall) {
            placeWhiteBall(coords.x, coords.y);
        } else {
            if(currentGameMode === 'ai' && currentPlayer !== 1) return;
            isDragging = true;
            const cue = balls.find(b => b.num === 0 && !b.pocketed);
            if(cue) { angle = Math.atan2(coords.y - cue.y, coords.x - cue.x); drawGame(); }
        }
    }
    
    function onMouseMove(e) {
        if(!isDragging || isMoving || placingWhiteBall) return;
        if(currentGameMode === 'ai' && currentPlayer !== 1) return;
        const coords = getCoords(e);
        const cue = balls.find(b => b.num === 0 && !b.pocketed);
        if(cue) { angle = Math.atan2(coords.y - cue.y, coords.x - cue.x); drawGame(); }
    }
    
    function onMouseUp() { isDragging = false; }
    
    function endGame(winner) {
        gameActive = false;
        gameInProgress = false;
        document.getElementById('winMessage').innerHTML = `${gamePlayers[winner].name} გაიმარჯვა! 🎉`;
        document.getElementById('winEmoji').innerHTML = winner === 1 ? '🏆' : '🎯';
        document.getElementById('winScreen').style.display = 'flex';
        updatePresence();
    }
    
    function resetGame() {
        if(animationId) { cancelAnimationFrame(animationId); animationId = null; }
        gameActive = true;
        currentPlayer = 1;
        isMoving = false;
        placingWhiteBall = false;
        
        gamePlayers[1].score = 0; gamePlayers[2].score = 0;
        gamePlayers[1].pocketed = []; gamePlayers[2].pocketed = [];
        gamePlayers[1].group = null; gamePlayers[2].group = null;
        
        initBalls();
        updateGameUI();
        drawGame();
        document.getElementById('winScreen').style.display = 'none';
    }
    
    // ========== თამაშის დაწყების ფუნქციები ==========
    function startAIGame() {
        currentGameMode = 'ai';
        gameInProgress = true;
        gamePlayers[1].name = '👤 მოთამაშე';
        gamePlayers[2].name = '🤖 AI';
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('membersScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        resetGame();
        updatePresence();
    }
    
    function startOnlineGame(opponentName) {
        currentGameMode = '2player';
        gameInProgress = true;
        gamePlayers[1].name = '👤 ' + myName;
        gamePlayers[2].name = '👤 ' + opponentName;
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('membersScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        resetGame();
        updatePresence();
    }
    
    function showMembers() {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('membersScreen').style.display = 'block';
        loadMembers();
    }
    
    function hideMembers() {
        document.getElementById('mainMenu').style.display = 'flex';
        document.getElementById('membersScreen').style.display = 'none';
    }
    
    function exitToMenu() {
        if(animationId) { cancelAnimationFrame(animationId); animationId = null; }
        gameInProgress = false;
        document.getElementById('mainMenu').style.display = 'flex';
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('winScreen').style.display = 'none';
        resetGame();
        updatePresence();
        loadMembers();
    }
    
    // ========== ინიციალიზაცია ==========
    const powerSlider = document.getElementById('powerSlider');
    const powerFill = document.getElementById('powerFill');
    
    powerSlider.addEventListener('input', (e) => {
        power = parseInt(e.target.value);
        powerFill.style.width = power + '%';
        drawGame();
    });
    
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('touchstart', onMouseDown);
    canvas.addEventListener('touchmove', onMouseMove);
    canvas.addEventListener('touchend', onMouseUp);
    
    document.getElementById('shootBtn').addEventListener('click', shoot);
    
    // ინიციალიზაცია
    myName = 'მოთამაშე_' + Math.floor(Math.random() * 1000);
    initBalls();
    updateGameUI();
    drawGame();
    updatePresence();
    listenForInvites();
    
    // ყოველ 3 წამში განახლება
    setInterval(() => {
        updatePresence();
        if(document.getElementById('membersScreen').style.display === 'block') {
            loadMembers();
        }
    }, 3000);
</script>
