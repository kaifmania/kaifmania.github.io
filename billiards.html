<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ბილიარდი — კაიფმანია</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;--panel:#120f24;--panel2:#1a1730;--border:rgba(160,80,255,0.35);
  --text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;--input-bg:#221f3a;
  --indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.18);
  --glow:rgba(168,85,247,0.28);--accent:#f07aff;
  --green:#4ade80;--green-f:rgba(74,222,128,0.15);
}
html,body{height:100%;margin:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* NAV */
#topnav{display:flex;align-items:center;gap:8px;background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;flex-shrink:0;z-index:10}
.nav-back{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;padding:6px 14px;cursor:pointer;transition:all .2s}
.nav-back:hover{background:var(--border);color:var(--text)}
.nav-title{font-size:15px;font-weight:700;color:var(--text);margin-left:4px;flex:1}
.nav-score{font-size:12px;color:var(--accent);background:var(--indigo-f);border:1px solid var(--border);border-radius:12px;padding:5px 14px}

/* LAYOUT */
#layout{display:flex;flex:1;min-height:0}
#gameArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;padding:12px;gap:8px;position:relative;overflow:hidden}
#rightPanel{width:270px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
@media(max-width:700px){#rightPanel{display:none}}

/* LOBBY */
#lobbyScreen{display:flex;flex-direction:column;align-items:center;gap:18px;padding:20px;width:100%;max-width:400px}
.lobby-icon{font-size:64px;animation:floatAnim 3s ease-in-out infinite}
@keyframes floatAnim{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.lobby-title{font-size:22px;font-weight:900;color:var(--text);text-align:center;letter-spacing:1px}
.lobby-sub{font-size:12px;color:var(--text3)}
.lobby-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.lbtn{padding:13px 20px;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;width:100%;letter-spacing:.3px}
.lbtn.primary{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;box-shadow:0 6px 20px rgba(120,30,200,.5)}
.lbtn.primary:hover{transform:translateY(-2px)}
.lbtn.green{background:linear-gradient(135deg,#16a34a,#4ade80);color:#052e16;box-shadow:0 6px 20px rgba(74,222,128,.4)}
.lbtn.green:hover{transform:translateY(-2px)}
.lbtn.sec{background:var(--indigo-f);border:1px solid var(--border);color:var(--text2)}
.lbtn.sec:hover{background:var(--border)}

/* MODAL BASE */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px var(--glow)}
.modal-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:14px;letter-spacing:1px;text-transform:uppercase}
.modal-cancel{margin-top:12px;width:100%;padding:10px;border-radius:12px;background:rgba(200,0,0,.1);border:1px solid rgba(200,0,0,.3);color:#ff8888;font-size:13px;cursor:pointer}
.modal-cancel:hover{background:rgba(200,0,0,.2)}

/* INVITE */
#inviteSearch{width:100%;padding:9px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px}
#inviteSearch:focus{border-color:var(--indigo2)}
#inviteSearch::placeholder{color:var(--text3)}
#inviteList{max-height:260px;overflow-y:auto}
#inviteList::-webkit-scrollbar{width:3px}
#inviteList::-webkit-scrollbar-thumb{background:var(--border)}
.inv-section{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 6px 3px;opacity:.8}
.inv-row{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:2px;border:1px solid transparent}
.inv-row:hover{background:var(--indigo-f);border-color:var(--border)}
.inv-av{width:34px;height:34px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;overflow:hidden;flex-shrink:0}
.inv-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.inv-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0}
.inv-spin{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* INCOMING */
#incomingModal .modal-box{border-color:rgba(74,222,128,.5);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 50px rgba(74,222,128,.2)}
.inc-icon{font-size:52px;margin-bottom:10px;display:block;animation:floatAnim 2s ease-in-out infinite}
.inc-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.inc-sub{font-size:12px;color:var(--text2);margin-bottom:12px}
.inc-timer{font-size:11px;color:var(--green);font-weight:700;margin-bottom:16px}
.inc-btns{display:flex;gap:10px}
.inc-accept{flex:1;padding:13px;border-radius:12px;background:linear-gradient(135deg,#16a34a,#4ade80);border:none;color:#052e16;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.inc-accept:hover{transform:scale(1.03)}
.inc-decline{flex:1;padding:13px;border-radius:12px;background:rgba(200,0,0,.1);border:1px solid rgba(200,0,0,.3);color:#ff8888;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.inc-decline:hover{background:rgba(200,0,0,.2)}

/* WAITING */
#waitingScreen{display:none;flex-direction:column;align-items:center;gap:14px;padding:28px;text-align:center}
.wait-spin{width:52px;height:52px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
.wait-title{font-size:15px;font-weight:700;color:var(--text)}
.wait-sub{font-size:12px;color:var(--text3)}
.wait-cancel{padding:9px 22px;border-radius:10px;background:rgba(200,0,0,.1);border:1px solid rgba(200,0,0,.3);color:#ff8888;font-size:12px;cursor:pointer;transition:all .2s}
.wait-cancel:hover{background:rgba(200,0,0,.2)}

/* HUD */
#hudWrap{display:none;flex-direction:column;align-items:center;gap:7px;width:100%}
#gameHUD{display:flex;align-items:center;gap:10px;width:100%;max-width:680px}
.hud-p{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:9px 12px;display:flex;align-items:center;gap:9px;transition:all .25s;position:relative;overflow:hidden}
.hud-p.active{border-color:var(--accent);box-shadow:0 0 18px rgba(168,85,247,.3)}
.hud-p.active::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(168,85,247,.07),transparent);animation:shim 2s ease infinite}
.hud-p.p2on{border-color:var(--green);box-shadow:0 0 18px rgba(74,222,128,.3)}
.hud-p.p2on::before{background:linear-gradient(90deg,transparent,rgba(74,222,128,.07),transparent);animation:shim 2s ease infinite}
@keyframes shim{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
.hud-av{width:36px;height:36px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden;flex-shrink:0}
.hud-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hud-info{flex:1;min-width:0}
.hud-name{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hud-balls{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.hud-ball{width:13px;height:13px;border-radius:50%;border:1px solid rgba(255,255,255,.15)}
.hud-turn{font-size:9px;font-weight:700;color:var(--accent);letter-spacing:.5px;position:absolute;top:5px;right:7px}
.hud-vs{font-size:13px;font-weight:900;color:var(--text3);flex-shrink:0}

/* TABLE */
#tableWrap{position:relative;background:#3a2200;border-radius:14px;padding:16px;box-shadow:0 0 50px rgba(0,0,0,.8),inset 0 0 18px rgba(0,0,0,.4);flex-shrink:0}
canvas#gc{display:block;border-radius:7px;touch-action:none;cursor:crosshair}

/* POWER */
#powerBar{display:flex;align-items:center;gap:8px;width:100%;max-width:680px}
.pwr-lbl{font-size:10px;color:var(--text3);white-space:nowrap}
.pwr-track{flex:1;height:7px;background:var(--panel2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.pwr-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#4ade80,#fbbf24,#ef4444);transition:width .08s}
#pwr-val{font-size:10px;color:var(--text2);width:28px;text-align:right}

/* STATUS */
#statusBar{font-size:12px;color:var(--text2);text-align:center;min-height:18px;font-style:italic}

/* BALL-IN-HAND */
#bihHint{display:none;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.35);border-radius:9px;padding:6px 12px;font-size:11px;color:var(--green);text-align:center;font-weight:700;width:100%;max-width:680px}

/* RESULT */
#resultOverlay{position:absolute;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);border-radius:14px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;text-align:center;z-index:50}
#resultOverlay.open{display:flex}
.res-icon{font-size:56px;animation:floatAnim 2s ease-in-out infinite}
.res-title{font-size:20px;font-weight:900;color:var(--text)}
.res-sub{font-size:12px;color:var(--text2)}
.res-btn{padding:11px 28px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;margin-top:4px}
.res-btn.again{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff}
.res-btn.again:hover{transform:translateY(-2px)}
.res-btn.back{background:var(--indigo-f);border:1px solid var(--border);color:var(--text2)}

/* RIGHT PANEL */
#rpTabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-tab{flex:1;padding:11px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text3);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
.rp-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
#lbPanel{flex:1;overflow-y:auto;padding:10px;display:none}
#lbPanel.on{display:block}
#lbPanel::-webkit-scrollbar{width:3px}
#lbPanel::-webkit-scrollbar-thumb{background:var(--border)}
.lb-row{display:flex;align-items:center;gap:9px;padding:8px 7px;border-radius:10px;transition:background .15s;margin-bottom:2px;cursor:default}
.lb-row:hover{background:var(--indigo-f)}
.lb-rank{font-size:13px;font-weight:700;width:24px;text-align:center;flex-shrink:0}
.lb-rank.gold{color:#ffd040}
.lb-rank.silver{color:#c8c8c8}
.lb-rank.bronze{color:#c88040}
.lb-av{width:28px;height:28px;border-radius:50%;background:var(--indigo-f);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;flex-shrink:0}
.lb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.lb-name{flex:1;font-size:12px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-pts{font-size:13px;font-weight:700;color:var(--accent)}
.lb-wl{font-size:9px;color:var(--text3)}

/* CHAT */
#chatPanel{flex:1;display:none;flex-direction:column;min-height:0}
#chatPanel.on{display:flex}
#chatMsgs{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:4px}
#chatMsgs::-webkit-scrollbar{width:3px}
#chatMsgs::-webkit-scrollbar-thumb{background:var(--border)}
.cmsg{display:flex;gap:6px;align-items:flex-start;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.cmsg-av{width:26px;height:26px;border-radius:50%;background:var(--indigo-f);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;overflow:hidden}
.cmsg-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.cmsg-body{flex:1;min-width:0}
.cmsg-nick{font-size:10px;font-weight:600;color:var(--indigo2);margin-bottom:2px}
.cmsg-bubble{background:var(--bubble);border:1px solid var(--border);border-radius:4px 10px 10px 10px;padding:6px 9px;font-size:12px;color:var(--text);word-break:break-word;line-height:1.4}
.cmsg.mine .cmsg-bubble{background:rgba(120,30,200,.2);border-color:rgba(168,85,247,.35)}
.cmsg.sys .cmsg-bubble{background:rgba(74,222,128,.07);border-color:rgba(74,222,128,.2);color:var(--green);font-style:italic;font-size:11px;text-align:center}
.chat-bar{display:flex;gap:5px;padding:7px;border-top:1px solid var(--border);flex-shrink:0}
.chat-em-btn{width:32px;height:32px;border-radius:9px;background:var(--indigo-f);border:1px solid var(--border);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chat-em-btn:hover{background:var(--border)}
#chatInput{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:7px 11px;color:var(--text);font-size:12px;outline:none;min-width:0}
#chatInput:focus{border-color:var(--indigo2)}
#chatInput::placeholder{color:var(--text3)}
.chat-send{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;border-radius:9px;color:#fff;font-size:14px;cursor:pointer;padding:0 11px;height:32px;flex-shrink:0;transition:all .15s}
.chat-send:hover{transform:scale(1.05)}
#emoPanel{border-top:1px solid var(--border);padding:7px;display:none;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto}
#emoPanel.open{display:flex}
.emo-btn{width:40px;height:40px;border-radius:9px;background:var(--indigo-f);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.emo-btn:hover{background:var(--border);transform:scale(1.08)}
.emo-btn img{width:28px;height:28px;border-radius:4px;object-fit:contain}
.emo-btn span{font-size:20px;line-height:1}

/* MOBILE CHAT */
#mobChatBtn{display:none;position:fixed;bottom:14px;right:14px;z-index:200;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;font-size:20px;cursor:pointer;box-shadow:0 6px 18px rgba(120,30,200,.6);color:#fff;align-items:center;justify-content:center}
@media(max-width:700px){#mobChatBtn{display:flex}}
#mobChatOvl{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:none;flex-direction:column}
#mobChatOvl.open{display:flex}
#mobChatInner{background:var(--panel);border-radius:18px 18px 0 0;margin-top:auto;height:58vh;display:flex;flex-direction:column;border-top:1px solid var(--border)}
#mobChatMsgs{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:4px}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;padding:9px 20px;border-radius:18px;font-size:13px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.4);pointer-events:none;white-space:nowrap;animation:slideUp .3s ease}
</style>
</head>
<body>

<nav id="topnav">
  <button class="nav-back" id="btnBack">← უკან</button>
  <div class="nav-title">🎱 ბილიარდი</div>
  <div class="nav-score" id="myScore">💜 0</div>
</nav>

<!-- INVITE MODAL -->
<div class="modal-bg" id="inviteModal">
  <div class="modal-box">
    <div class="modal-title">👥 მოთამაშის მოწვევა</div>
    <input id="inviteSearch" placeholder="🔍 ძებნა სახელით...">
    <div id="inviteList"><div style="text-align:center;padding:20px;color:var(--text3)"><div class="inv-spin"></div><div style="margin-top:8px;font-size:12px">იტვირთება...</div></div></div>
    <button class="modal-cancel" id="btnInviteCancel">✕ გაუქმება</button>
  </div>
</div>

<!-- INCOMING MODAL -->
<div class="modal-bg" id="incomingModal">
  <div class="modal-box">
    <span class="inc-icon">🎱</span>
    <div class="inc-name" id="incName">?</div>
    <div class="inc-sub">გიწვევს ბილიარდის თამაშში!</div>
    <div class="inc-timer" id="incTimer">⏱ 30</div>
    <div class="inc-btns">
      <button class="inc-accept" id="btnAccept">✅ დასტური</button>
      <button class="inc-decline" id="btnDecline">❌ უარი</button>
    </div>
  </div>
</div>

<div id="layout">
  <div id="gameArea">

    <!-- LOBBY -->
    <div id="lobbyScreen">
      <div class="lobby-icon">🎱</div>
      <div class="lobby-title">ბილიარდი</div>
      <div class="lobby-sub">8-ბურთი · კლასიკური</div>
      <div class="lobby-btns">
        <button class="lbtn primary" id="btnVsAI">🤖 AI-ს წინააღმდეგ</button>
        <button class="lbtn green" id="btnInvite">👥 მეგობრის მოწვევა</button>
        <button class="lbtn sec" id="btnHome">← მთავარ გვერდზე</button>
      </div>
    </div>

    <!-- WAITING -->
    <div id="waitingScreen">
      <div class="wait-spin"></div>
      <div class="wait-title" id="waitTitle">ველოდებით...</div>
      <div class="wait-sub" id="waitSub">მოწვევა გაიგზავნა</div>
      <button class="wait-cancel" id="btnCancelWait">✕ გაუქმება</button>
    </div>

    <!-- GAME -->
    <div id="hudWrap">
      <div id="gameHUD">
        <div class="hud-p active" id="hudP1">
          <div class="hud-av" id="hudP1Av">😊</div>
          <div class="hud-info">
            <div class="hud-name" id="hudP1Name">მოთამაშე 1</div>
            <div class="hud-balls" id="hudP1Balls"></div>
          </div>
          <div class="hud-turn" id="hudP1Turn">🎯 ჯერი</div>
        </div>
        <div class="hud-vs">VS</div>
        <div class="hud-p" id="hudP2">
          <div class="hud-av" id="hudP2Av">🤖</div>
          <div class="hud-info">
            <div class="hud-name" id="hudP2Name">AI</div>
            <div class="hud-balls" id="hudP2Balls"></div>
          </div>
          <div class="hud-turn" id="hudP2Turn" style="display:none">🎯 ჯერი</div>
        </div>
      </div>

      <div id="tableWrap">
        <canvas id="gc" width="660" height="360"></canvas>
        <div id="resultOverlay">
          <div class="res-icon" id="resIcon">🏆</div>
          <div class="res-title" id="resTitle">გამარჯვება!</div>
          <div class="res-sub" id="resSub"></div>
          <button class="res-btn again" id="btnAgain">🔄 კვლავ</button>
          <button class="res-btn back" id="btnToLobby">🏠 ლობი</button>
        </div>
      </div>

      <div id="bihHint">🎱 Ball-in-hand — დააჭირე სადაც გსურს თეთრი ბურთის დადება</div>
      <div id="powerBar">
        <span class="pwr-lbl">ძალა:</span>
        <div class="pwr-track"><div class="pwr-fill" id="pwrFill" style="width:0%"></div></div>
        <span id="pwr-val">0%</span>
      </div>
      <div id="statusBar">...</div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div id="rightPanel">
    <div id="rpTabs">
      <div class="rp-tab" id="tabLb">🏆 TOP</div>
      <div class="rp-tab on" id="tabChat">💬 ჩატი</div>
    </div>
    <div id="lbPanel">

    }
    return `<span style="font-size:20px;vertical-align:middle">${url}</span>`;
  });
  return h;
}

function renderInviteList(q){
  const el=document.getElementById('inviteList');

  const offline=filtered.filter(u=>!isOnline(u.last_seen));

    const h=document.createElement('div'); h.className='inv-section'; h.style.color='var(--green)';
    h.textContent=`🟢 ონლაინი (${online.length})`; el.appendChild(h);

  }
  if(offline.length){
    const h=document.createElement('div'); h.className='inv-section'; h.style.color='var(--text3)';

function makeInvRow(u,online){

  div.onclick=()=>sendInvite(u.id,u);
  return div;
}

// ─────────────────────────────────────────────
// INBOX LISTENER — persistent per-user channel
// ─────────────────────────────────────────────
function startInboxListener(){
  if(!sb||!ME) return;
  if(myInboxCh){ try{sb.removeChannel(myInboxCh);}catch(e){} }

  myInboxCh = sb.channel('inbox_'+ME.id, {config:{broadcast:{ack:false,self:false}}})
    .on('broadcast',{event:'invite'},({payload})=>{
      if(!payload) return;

      // cancelled
      if(payload.cancelled){
        if(payload.invite_id===currentInviteId){
          document.getElementById('incomingModal').classList.remove('open');
          clearIncTimer();
          toast('❌ მოწვევა გაუქმდა');
          currentInviteId=null; opponentId=null; opponentProf=null;
        }
        return;
      }

      // busy
      if(gameActive){ replyInvite(payload.from_id,payload.invite_id,'declined'); return; }

      currentInviteId=payload.invite_id;
      opponentId=payload.from_id;
      opponentProf=allUsers.find(u=>u.id===payload.from_id)||{
        username:payload.from_name||'?', emotion:payload.from_emotion||'😊',
        billiard_score:payload.from_score||0, id:payload.from_id
      };

      document.getElementById('incName').textContent=opponentProf.username||'?';
      document.getElementById('incomingModal').classList.add('open');
      startIncTimer(30);

      if('Notification' in window && Notification.permission==='granted'){
        new Notification('🎱 ბილიარდი',(opponentProf.username||'?')+' გიწვევს!');
      }
    })
    .subscribe((status,err)=>{
      console.log('inbox status:',status, err||'');
    });
}

function startIncTimer(secs){
  clearIncTimer();
  let left=secs;
  document.getElementById('incTimer').textContent='⏱ '+left;
  incTimerInterval=setInterval(()=>{
    left--;
    document.getElementById('incTimer').textContent='⏱ '+left;
    if(left<=0){ clearIncTimer(); declineInvite(); }
  },1000);
}
function clearIncTimer(){
  if(incTimerInterval){clearInterval(incTimerInterval); incTimerInterval=null;}
  document.getElementById('incTimer').textContent='';
}

// ─────────────────────────────────────────────
// SEND / REPLY INVITE
// ─────────────────────────────────────────────
async function replyInvite(toId, inviteId, status){
  if(!sb) return;
  const ch=sb.channel('resp_'+inviteId,{config:{broadcast:{ack:false}}});
  await new Promise(res=>{
    ch.subscribe(s=>{ if(s==='SUBSCRIBED') res(); });
    setTimeout(res,2000);
  });
  await ch.send({type:'broadcast',event:'invite_response',payload:{invite_id:inviteId,status,from_id:ME.id}});
  setTimeout(()=>{try{sb.removeChannel(ch);}catch(e){}},3000);
}

async function sendInvite(uid, userObj){
  closeInviteModal();
  if(!sb||!ME){ toast('⚠️ შესვლა საჭიროა'); return; }

  opponentId=uid;
  opponentProf=userObj||allUsers.find(u=>u.id===uid)||{username:'?',emotion:'😊'};
  const invId='inv_'+ME.id.slice(0,8)+'_'+uid.slice(0,8)+'_'+Date.now();
  currentInviteId=invId;

  // show waiting
  document.getElementById('lobbyScreen').style.display='none';
  document.getElementById('waitingScreen').style.display='flex';
  document.getElementById('waitTitle').textContent='ველოდებით '+(opponentProf.username||'?')+'-ს...';
  document.getElementById('waitSub').textContent='მოწვევა გაიგზავნა 🎱';

  // listen for response FIRST
  if(pendingRespCh){ try{sb.removeChannel(pendingRespCh);}catch(e){} }
  let responded=false;
  pendingRespCh=sb.channel('resp_'+invId,{config:{broadcast:{ack:false}}})
    .on('broadcast',{event:'invite_response'},async({payload})=>{
      if(!payload||payload.invite_id!==invId) return;
      responded=true;
      clearTimeout(inviteTimeoutId);
      try{sb.removeChannel(pendingRespCh);}catch(e){} pendingRespCh=null;
      if(payload.status==='accepted'){
        await startOnlineGame(invId,'caller');
      } else {
        toast('❌ '+(opponentProf?.username||'?')+' — უარი თქვა');
        showLobby();
      }
    })
    .subscribe(async(status)=>{
      if(status==='SUBSCRIBED'){
        // now send invite to recipient's inbox
        const targetCh=sb.channel('inbox_'+uid,{config:{broadcast:{ack:false}}});
        await new Promise(res=>{ targetCh.subscribe(s=>{ if(s==='SUBSCRIBED') res(); }); setTimeout(res,2000); });
        await targetCh.send({
          type:'broadcast', event:'invite',
          payload:{
            invite_id:invId, from_id:ME.id,
            from_name:MYPROF?.username||'?',
            from_emotion:MYPROF?.emotion||'😊',
            from_score:MYPROF?.billiard_score||0
          }
        });
        setTimeout(()=>{try{sb.removeChannel(targetCh);}catch(e){}},4000);
      }
    });

  inviteTimeoutId=setTimeout(()=>{
    if(!responded){
      if(pendingRespCh){try{sb.removeChannel(pendingRespCh);}catch(e){} pendingRespCh=null;}
      toast('⏰ მოწვევის დრო ამოიწურა');
      showLobby();
    }
  },60000);
}

async function cancelInvite(){
  clearTimeout(inviteTimeoutId);
  if(pendingRespCh){try{sb.removeChannel(pendingRespCh);}catch(e){} pendingRespCh=null;}
  if(sb&&opponentId&&currentInviteId){
    const ch=sb.channel('inbox_'+opponentId,{config:{broadcast:{ack:false}}});
    await new Promise(res=>{ ch.subscribe(s=>{ if(s==='SUBSCRIBED') res(); }); setTimeout(res,1500); });
    await ch.send({type:'broadcast',event:'invite',payload:{invite_id:currentInviteId,from_id:ME.id,cancelled:true}});
    setTimeout(()=>{try{sb.removeChannel(ch);}catch(e){}},2000);
  }
  currentInviteId=null; opponentId=null; opponentProf=null;
  showLobby();
}

async function acceptInvite(){
  document.getElementById('incomingModal').classList.remove('open');
  clearIncTimer();
  if(!currentInviteId||!opponentId) return;
  const invId=currentInviteId, oppId=opponentId;
  await replyInvite(oppId,invId,'accepted');
  await startOnlineGame(invId,'callee');
}

async function declineInvite(){
  document.getElementById('incomingModal').classList.remove('open');
  clearIncTimer();
  if(!currentInviteId||!opponentId){ currentInviteId=null; opponentId=null; opponentProf=null; return; }
  await replyInvite(opponentId,currentInviteId,'declined');
  currentInviteId=null; opponentId=null; opponentProf=null;
}

async function startOnlineGame(invId,role){
  gameMode='online'; GAME_KEY='billiard_'+invId; scoreUpdated=false;
  myPlayerNum=(role==='caller')?1:2;
  currentPlayer=1; myTurn=(role==='caller');
  initGame(); showGameUI();

    await sb.from('billiard_games').upsert({game_key:GAME_KEY,state:JSON.stringify(getBallState()),current_player:1});

// ─────────────────────────────────────────────
// GAME INIT
// ─────────────────────────────────────────────
function initGame(){
  balls=[]; breakShot=true; p1Team=null; p2Team=null;
  p1Pot=[]; p2Pot=[]; animating=false; ballInHand=false;
  balls.push({id:0,x:CW*0.25,y:CH/2,vx:0,vy:0,r:11,color:'#fff',active:true,type:'cue'});
  const rx=CW*0.65,ry=CH/2,rs=23;
  const rack=[
    {r:0,c:0,n:1},{r:1,c:0,n:2},{r:1,c:1,n:9},
    {r:2,c:0,n:3},{r:2,c:1,n:8},{r:2,c:2,n:10},
    {r:3,c:0,n:4},{r:3,c:1,n:14},{r:3,c:2,n:7},{r:3,c:3,n:11},
    {r:4,c:0,n:12},{r:4,c:1,n:6},{r:4,c:2,n:15},{r:4,c:3,n:13},{r:4,c:4,n:5}
  ];
  rack.forEach(({r,c,n})=>{
    const x=rx+r*rs*Math.cos(Math.PI/6);
    const y=ry+(c-(r/2))*rs;
    balls.push({id:n,x,y,vx:0,vy:0,r:11,color:BCOLORS[n],active:true,type:n<=7?'solid':'stripe',n});
  });
  if(raf) cancelAnimationFrame(raf);
  (function loop(){update(); draw(); raf=requestAnimationFrame(loop);})();
}

function getBallState(){return balls.map(b=>({id:b.id,x:b.x,y:b.y,vx:b.vx,vy:b.vy,active:b.active}));}
function applyBallState(st){st.forEach(s=>{const b=balls.find(x=>x.id===s.id); if(b) Object.assign(b,s);});}

// ─────────────────────────────────────────────
// PHYSICS UPDATE
// ─────────────────────────────────────────────
function update(){
  if(!animating) return;
  let allStop=true;
  balls.forEach(b=>{
    if(!b.active) return;
    b.x+=b.vx; b.y+=b.vy;
    b.vx*=0.985; b.vy*=0.985;
    if(Math.abs(b.vx)<0.08) b.vx=0;
    if(Math.abs(b.vy)<0.08) b.vy=0;
    if(b.vx||b.vy) allStop=false;
    if(b.x-b.r<RAIL){b.x=RAIL+b.r; b.vx*=-0.75;}
    if(b.x+b.r>CW-RAIL){b.x=CW-RAIL-b.r; b.vx*=-0.75;}
    if(b.y-b.r<RAIL){b.y=RAIL+b.r; b.vy*=-0.75;}
    if(b.y+b.r>CH-RAIL){b.y=CH-RAIL-b.r; b.vy*=-0.75;}
  });
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      const a=balls[i],b=balls[j];
      if(!a.active||!b.active) continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy),mn=a.r+b.r;
      if(d<mn&&d>0){
        const nx=dx/d,ny=dy/d,ov=(mn-d)/2;
        a.x-=nx*ov; a.y-=ny*ov; b.x+=nx*ov; b.y+=ny*ov;
        const dvx=b.vx-a.vx,dvy=b.vy-a.vy,dot=dvx*nx+dvy*ny;
        if(dot<0){const imp=dot*0.95; a.vx+=imp*nx; a.vy+=imp*ny; b.vx-=imp*nx; b.vy-=imp*ny;}
      }
    }
  }
  let potted=[],cueFoul=false;
  balls.forEach(b=>{
    if(!b.active) return;
    POCKETS.forEach(p=>{
      if(Math.hypot(b.x-p.x,b.y-p.y)<PRAIL+2){
        b.active=false; b.vx=0; b.vy=0;
        if(b.type==='cue') cueFoul=true; else potted.push(b);
      }
    });
  });
  if(allStop){animating=false; onTurnEnd(potted,cueFoul);}
}

function onTurnEnd(potted,cueFoul){
  // assign teams
  if(breakShot&&potted.length>0){
    breakShot=false;
    if(!p1Team){
      const ft=potted[0];
      if(currentPlayer===1){p1Team=ft.type; p2Team=ft.type==='solid'?'stripe':'solid';}
      else{p2Team=ft.type; p1Team=ft.type==='solid'?'stripe':'solid';}
      const mt=(myPlayerNum===1)?p1Team:p2Team;
      toast(`⚡ შენი გუნდი: ${mt==='solid'?'🟡 ერთფეროვანი':'⚪ ზოლიანი'}`);
    }
  } else if(breakShot) breakShot=false;

  potted.forEach(b=>{
    if(currentPlayer===1&&p1Team&&b.type===p1Team&&!p1Pot.includes(b.id)) p1Pot.push(b.id);
    else if(currentPlayer===2&&p2Team&&b.type===p2Team&&!p2Pot.includes(b.id)) p2Pot.push(b.id);
  });
  updateHUD();

  const eight=potted.find(b=>b.id===8);
  if(eight){
    const ct=currentPlayer===1?p1Team:p2Team;
    const rem=balls.filter(b=>b.active&&b.type===ct).length;
    endGame(rem===0?(currentPlayer===1?'p1':'p2'):(currentPlayer===1?'p2':'p1'));
    return;
  }

  const scoredOwn=potted.length>0&&p1Team&&potted.every(b=>b.type===(currentPlayer===1?p1Team:p2Team));

  if(cueFoul){
    currentPlayer=currentPlayer===1?2:1;
    myTurn=(currentPlayer===myPlayerNum);
    updateTurnHUD();
    if(myTurn){ setStatus('⚡ ფაული! ადე ბურთი სადაც გსურს'); enterBIH(); }
    else{
      setStatus('⚡ ფაული! მოწინAAGდეგე ადებს...');
      if(gameMode==='ai') setTimeout(()=>{aiBIH(); setTimeout(aiTurn,1000);},700);
    }
  } else if(!scoredOwn){
    currentPlayer=currentPlayer===1?2:1;
    myTurn=(currentPlayer===myPlayerNum);
    updateTurnHUD();
    if(!myTurn&&gameMode==='ai'){setStatus('🤖 AI ფიქრობს...'); aiTimer=setTimeout(aiTurn,1200+Math.random()*800);}
    else if(myTurn) setStatus('🎯 შენი ჯერი!');
    else setStatus('⏳ მოწინAAGდეგე ითამაშებს...');
  } else {
    updateTurnHUD();
    if(myTurn) setStatus('🎯 კარგი! კვლავ შენი ჯერია');
    else if(gameMode==='ai'){setStatus('🤖 AI ფიქრობს...'); aiTimer=setTimeout(aiTurn,1000+Math.random()*600);}
  }
  if(gameMode==='online') syncState();
}

function enterBIH(){
  ballInHand=true;
  const h=document.getElementById('bihHint');
  h.style.display='block'; canvas.style.cursor='cell';
}
function aiBIH(){
  let cb=balls.find(b=>b.id===0);
  if(!cb){balls.push({id:0,x:CW*0.25,y:CH/2,vx:0,vy:0,r:11,color:'#fff',active:true,type:'cue'});}
  else{cb.active=true; cb.x=CW*0.25+Math.random()*50; cb.y=CH/2+(Math.random()-.5)*80; cb.vx=0; cb.vy=0;}
  ballInHand=false; document.getElementById('bihHint').style.display='none';
}
function placeBIH(x,y){
  const mn=RAIL+12,mxX=CW-RAIL-12,mxY=CH-RAIL-12;
  x=Math.max(mn,Math.min(mxX,x)); y=Math.max(mn,Math.min(mxY,y));
  for(const b of balls){
    if(!b.active||b.id===0) continue;
    if(Math.hypot(b.x-x,b.y-y)<b.r+12){toast('⚠️ ამ ადგილას სხვა ბურთია!'); return false;}
  }
  let cb=balls.find(b=>b.id===0);
  if(!cb){balls.push({id:0,x,y,vx:0,vy:0,r:11,color:'#fff',active:true,type:'cue'});}
  else{cb.active=true; cb.x=x; cb.y=y; cb.vx=0; cb.vy=0;}
  return true;
}

function aiTurn(){
  if(!gameActive||myTurn||gameMode!=='ai') return;
  const cb=balls.find(b=>b.id===0&&b.active); if(!cb) return;
  let targets=balls.filter(b=>b.active&&b.id!==0&&b.id!==8&&b.type===(p2Team||'solid'));
  if(!targets.length) targets=balls.filter(b=>b.active&&b.id===8);
  if(!targets.length) return;
  const t=targets[Math.floor(Math.random()*targets.length)];
  shoot(Math.atan2(t.y-cb.y,t.x-cb.x),0.3+Math.random()*0.5);
}

// ─────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,CW,CH);
  // table felt
  const g=ctx.createRadialGradient(CW/2,CH/2,20,CW/2,CH/2,CW/2);
  g.addColorStop(0,'#22643a'); g.addColorStop(1,'#163d24');
  ctx.fillStyle=g; ctx.fillRect(RAIL,RAIL,CW-RAIL*2,CH-RAIL*2);
  // rails
  ctx.fillStyle='#3a2200';
  ctx.fillRect(0,0,CW,RAIL); ctx.fillRect(0,CH-RAIL,CW,RAIL);
  ctx.fillRect(0,0,RAIL,CH); ctx.fillRect(CW-RAIL,0,RAIL,CH);
  // spots
  ctx.fillStyle='rgba(255,255,255,.07)';
  [[CW*.25,CH/2],[CW/2,CH/4],[CW/2,CH*.75],[CW*.75,CH/2]].forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
  });
  // pockets
  POCKETS.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,PRAIL,0,Math.PI*2);
    ctx.fillStyle='#000'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.1)'; ctx.lineWidth=1; ctx.stroke();
  });
  // balls
  balls.forEach(b=>{ if(b.active) drawBall(b); });
  // bih preview
  if(ballInHand&&myTurn){
    const inBounds=bihX>=RAIL+12&&bihX<=CW-RAIL-12&&bihY>=RAIL+12&&bihY<=CH-RAIL-12;
    if(inBounds){
      let ov=false;
      for(const b of balls){ if(!b.active||b.id===0) continue; if(Math.hypot(b.x-bihX,b.y-bihY)<b.r+12){ov=true; break;} }
      ctx.save(); ctx.globalAlpha=.6;
      ctx.beginPath(); ctx.arc(bihX,bihY,11,0,Math.PI*2);
      ctx.fillStyle=ov?'rgba(255,80,80,.7)':'rgba(255,255,255,.85)'; ctx.fill();
      ctx.strokeStyle=ov?'#f44':'rgba(255,255,255,.4)'; ctx.lineWidth=2; ctx.stroke();
      ctx.restore();
    }
  }
  // cue
  if(!animating&&myTurn&&gameActive&&!ballInHand) drawCue();
}

function drawBall(b){
  ctx.save();
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=6; ctx.shadowOffsetY=3;
  if(b.type==='stripe'){
    ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,Math.PI*.2,Math.PI*.8); ctx.fillStyle=b.color; ctx.fill();
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,Math.PI*1.2,Math.PI*1.8); ctx.fillStyle=b.color; ctx.fill();
  } else { ctx.fillStyle=b.color; ctx.fill(); }
  ctx.shadowColor='transparent';
  ctx.beginPath(); ctx.arc(b.x-b.r*.28,b.y-b.r*.3,b.r*.38,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fill();
  if(b.id>0){
    ctx.fillStyle=b.type==='stripe'?b.color:'rgba(255,255,255,.9)';
    if(b.id===8) ctx.fillStyle='#fff';
    ctx.font=`bold ${b.r*.85}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=2;
    ctx.fillText(b.id,b.x,b.y);
  }
  ctx.restore();
}

function drawCue(){
  const cb=balls.find(b=>b.id===0&&b.active); if(!cb) return;
  const angle=Math.atan2(mouseY-cb.y,mouseX-cb.x);
  const len=isAiming?cuePower*200+40:80;
  const tx=cb.x-Math.cos(angle)*(cb.r+4), ty=cb.y-Math.sin(angle)*(cb.r+4);
  const ex=tx-Math.cos(angle)*len, ey=ty-Math.sin(angle)*len;
  ctx.save();
  const grd=ctx.createLinearGradient(tx,ty,ex,ey);
  grd.addColorStop(0,'#f0d080'); grd.addColorStop(1,'#8b4513');
  ctx.strokeStyle=grd; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(ex,ey); ctx.stroke();
  ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,.25)';
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(ex,ey); ctx.stroke();
  if(isAiming){
    ctx.setLineDash([6,6]); ctx.lineWidth=1; ctx.strokeStyle='rgba(255,255,255,.18)';
    ctx.beginPath(); ctx.moveTo(cb.x,cb.y); ctx.lineTo(cb.x+Math.cos(angle)*160,cb.y+Math.sin(angle)*160); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────
function canvasPos(e){
  const r=canvas.getBoundingClientRect();
  const sx=CW/r.width, sy=CH/r.height;
  let cx,cy;
  if(e.touches?.length>0){cx=e.touches[0].clientX; cy=e.touches[0].clientY;}
  else if(e.changedTouches?.length>0){cx=e.changedTouches[0].clientX; cy=e.changedTouches[0].clientY;}
  else{cx=e.clientX; cy=e.clientY;}
  return{x:(cx-r.left)*sx, y:(cy-r.top)*sy};
}

canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',e=>{e.preventDefault(); onDown(e);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault(); onMove(e);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault(); onUp(e);},{passive:false});

function onDown(e){
  if(!myTurn||animating||!gameActive) return;
  const p=canvasPos(e);
  if(ballInHand){
    if(placeBIH(p.x,p.y)){
      ballInHand=false;
      document.getElementById('bihHint').style.display='none';
      canvas.style.cursor='crosshair';
      setStatus('🎯 შენი ჯერი!');
      if(gameMode==='online') syncState();
    }
    return;
  }
  mouseX=p.x; mouseY=p.y; isDragging=true; isAiming=true; cuePower=0;
}
function onMove(e){
  const p=canvasPos(e);
  mouseX=p.x; mouseY=p.y;
  if(ballInHand&&myTurn){bihX=p.x; bihY=p.y; return;}
  if(isDragging&&isAiming){
    const cb=balls.find(b=>b.id===0&&b.active); if(!cb) return;
    cuePower=Math.min(1,Math.hypot(p.x-cb.x,p.y-cb.y)/120);
    setPwr(cuePower);
  }
}
function onUp(e){
  if(!isDragging||!isAiming||!myTurn||animating||!gameActive||ballInHand) return;
  isDragging=false; isAiming=false;
  const cb=balls.find(b=>b.id===0&&b.active);
  if(!cb){setPwr(0); return;}
  const p=canvasPos(e);
  if(cuePower>0.01) shoot(Math.atan2(p.y-cb.y,p.x-cb.x),cuePower);
  setPwr(0);
}

function shoot(angle,power){
  const cb=balls.find(b=>b.id===0&&b.active); if(!cb) return;
  cb.vx=Math.cos(angle)*power*18;
  cb.vy=Math.sin(angle)*power*18;
  animating=true;
  if(gameMode==='online') myTurn=false;
  setStatus('🎱');
}

// ─────────────────────────────────────────────
// ONLINE SYNC
// ─────────────────────────────────────────────
async function syncState(){
  if(!sb||!GAME_KEY) return;
  await sb.from('billiard_games').upsert({game_key:GAME_KEY,state:JSON.stringify(getBallState()),current_player:currentPlayer});
}
function watchGameCh(){
  if(!sb||!GAME_KEY) return;
  if(gameCh){try{sb.removeChannel(gameCh);}catch(e){}}
  gameCh=sb.channel('bg_'+GAME_KEY)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'billiard_games',filter:`game_key=eq.${GAME_KEY}`},p=>{
      if(!p.new?.state) return;
      try{
        applyBallState(JSON.parse(p.new.state));
        currentPlayer=p.new.current_player||currentPlayer;
        myTurn=(currentPlayer===myPlayerNum);
        updateTurnHUD();
        setStatus(myTurn?'🎯 შენი ჯერი!':'⏳ მოწინAAGდეგე...');
      }catch(e){}
    }).subscribe();
}
function watchChatCh(){
  if(!sb||!GAME_KEY) return;
  if(chatCh){try{sb.removeChannel(chatCh);}catch(e){}}
  chatCh=sb.channel('bc_'+GAME_KEY)
    .on('broadcast',{event:'msg'},({payload})=>{
      if(!payload||payload.uid===ME?.id) return;
      appendMsg({nick:payload.nick,content:payload.content,uid:payload.uid});
    }).subscribe();
}

// HUD
// ─────────────────────────────────────────────
function updateHUD(){
  ['1','2'].forEach(n=>{
    const el=document.getElementById('hudP'+n+'Balls'); el.innerHTML='';
    const team=n==='1'?p1Team:p2Team;
    const pot=n==='1'?p1Pot:p2Pot;
    if(team){
      for(let i=0;i<7;i++){
        const d=document.createElement('div'); d.className='hud-ball';
        d.style.background=i<pot.length?(team==='solid'?'#fbbf24':'#93c5fd'):'rgba(255,255,255,.15)';
        el.appendChild(d);
      }
    }
  });
  updateTurnHUD();
}
function updateTurnHUD(){
  const p1=currentPlayer===1;
  document.getElementById('hudP1').className='hud-p'+(p1?' active':'');
  document.getElementById('hudP2').className='hud-p'+(!p1?' p2on':'');
  document.getElementById('hudP1Turn').style.display=p1?'':'none';
  document.getElementById('hudP2Turn').style.display=!p1?'':'none';
}

// ─────────────────────────────────────────────
// RESULT
// ─────────────────────────────────────────────
function endGame(winner){
  if(!gameActive) return;
  gameActive=false;
  if(raf){cancelAnimationFrame(raf); raf=null;}
  ballInHand=false; document.getElementById('bihHint').style.display='none';
  const won=(winner==='p1'&&myPlayerNum===1)||(winner==='p2'&&myPlayerNum===2);
  document.getElementById('resIcon').textContent=won?'🏆':'😢';
  document.getElementById('resTitle').textContent=won?'გამარჯვება! 🎉':'წაგება 😔';
  document.getElementById('resSub').textContent=won?`+${gameMode==='ai'?5:10} ქულა!`:'სცადე ისევ!';
  document.getElementById('resultOverlay').classList.add('open');
  if(!scoreUpdated){
    scoreUpdated=true;
    updateScore(won,gameMode==='ai'?5:10);
  }
  sysMsg(`🏆 ${won?(MYPROF?.username||'?'):(opponentProf?.username||'AI')} გაიმარჯვა!`);
}

async function updateScore(won,pts){
  if(!sb||!MYPROF||!ME) return;
  const ns=(MYPROF.billiard_score||0)+(won?pts:0);
  const nw=(MYPROF.billiard_wins||0)+(won?1:0);
  const nl=(MYPROF.billiard_losses||0)+(won?0:1);
  const {error}=await sb.from('profiles').update({billiard_score:ns,billiard_wins:nw,billiard_losses:nl}).eq('id',ME.id);
  if(!error){
    MYPROF.billiard_score=ns; MYPROF.billiard_wins=nw; MYPROF.billiard_losses=nl;
    document.getElementById('myScore').textContent='💜 '+ns;
    loadLeaderboard();
  }
}

function restartGame(){
  document.getElementById('resultOverlay').classList.remove('open');
  scoreUpdated=false;
  if(gameMode==='ai') startVsAI(); else showLobby();
}

function sendChat(){
  const inp=document.getElementById('chatInput');
  const t=inp.value.trim(); if(!t) return; inp.value='';
  appendMsg({nick:MYPROF?.username||'?',content:t,uid:ME?.id,mine:true});
  if(gameMode==='online'&&chatCh){
    try{chatCh.send({type:'broadcast',event:'msg',payload:{uid:ME.id,nick:MYPROF?.username,content:t}});}catch(e){}
  }
}
function sendMobChat(){
  const inp=document.getElementById('mobInput');
  const t=inp.value.trim(); if(!t) return; inp.value='';
  appendMsg({nick:MYPROF?.username||'?',content:t,uid:ME?.id,mine:true});
  if(gameMode==='online'&&chatCh){
    try{chatCh.send({type:'broadcast',event:'msg',payload:{uid:ME.id,nick:MYPROF?.username,content:t}});}catch(e){}
  }
}
function sysMsg(m){appendMsg({content:m,sys:true});}

function appendMsg({nick,content,uid,mine,sys}){
  const isMe=mine||(uid&&uid===ME?.id);
  const w=document.createElement('div');
  w.className='cmsg'+(isMe?' mine':'')+(sys?' sys':'');
  if(!sys){
    const u=uid?allUsers.find(x=>x.id===uid):null;
    const av=u?.avatar_url?`<img src="${u.avatar_url}">`:(u?.emotion||'😊');
    w.innerHTML=`<div class="cmsg-av">${av}</div><div class="cmsg-body"><div class="cmsg-nick">${esc(nick||'?')}</div><div class="cmsg-bubble">${renderChatContent(content)}</div></div>`;
  } else {
    w.innerHTML=`<div class="cmsg-body" style="width:100%"><div class="cmsg-bubble">${esc(content)}</div></div>`;
  }
  const cm=document.getElementById('chatMsgs');
  cm.appendChild(w); cm.scrollTop=cm.scrollHeight;
  const mm=document.getElementById('mobChatMsgs');
  mm.appendChild(w.cloneNode(true)); mm.scrollTop=mm.scrollHeight;
}

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
init();
</script>
