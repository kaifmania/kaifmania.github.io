<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎱 ბილიარდი - სრული ვერსია</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0612, #110d22);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Noto Sans Georgian', system-ui, sans-serif;
            color: #ede0ff;
            overflow: hidden;
        }

        /* ========== მთავარი მენიუ ========== */
        .main-menu {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0612, #110d22);
            z-index: 100;
        }

        .menu-card {
            background: #1a1530;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(168,85,247,0.3);
            min-width: 350px;
        }

        .menu-title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #f07aff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .menu-btn {
            background: linear-gradient(135deg, #7a1fc8, #a855f7);
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px 0;
            width: 100%;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #a855f7, #c084fc);
        }

        /* ========== წევრების სია ========== */
        .members-panel {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(168,85,247,0.2);
        }

        .members-title {
            font-size: 14px;
            color: #b580e0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .members-list {
            max-height: 250px;
            overflow-y: auto;
            border-radius: 15px;
        }

        .member-item {
            background: #0a0612;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(168,85,247,0.2);
            transition: all 0.2s;
        }

        .member-item:hover {
            border-color: #a855f7;
            background: #1a1530;
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .member-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7a1fc8, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .member-name {
            font-weight: 600;
            font-size: 14px;
        }

        .member-status {
            font-size: 10px;
            color: #4ade80;
        }

        .invite-member-btn {
            background: linear-gradient(135deg, #7a1fc8, #a855f7);
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #b580e0;
            font-size: 12px;
        }

        /* ========== მოწვევის შეტყობინება ========== */
        .invite-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1530;
            border-radius: 20px;
            padding: 18px;
            border: 2px solid #a855f7;
            z-index: 200;
            min-width: 280px;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .invite-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .accept-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        .decline-btn {
            background: linear-gradient(135deg, #f87171, #dc2626);
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        /* ========== თამაშის არე ========== */
        .game-area {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #0a0612;
            position: relative;
        }

        .game-header {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .back-btn {
            background: #1a1530;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            border: 1px solid rgba(168,85,247,0.3);
        }

        .turn-indicator {
            background: #1a1530;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            border-left: 3px solid #f07aff;
        }

        /* ქულების დაფა */
        .score-panel {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            z-index: 10;
        }

        .score-card {
            background: #1a1530;
            border-radius: 20px;
            padding: 12px 20px;
            text-align: center;
            min-width: 160px;
            border: 1px solid rgba(168,85,247,0.3);
        }

        .score-card.active {
            border: 2px solid #f07aff;
            box-shadow: 0 0 15px rgba(240,122,255,0.3);
        }

        .score-name {
            font-size: 14px;
            color: #b580e0;
        }

        .score-value {
            font-size: 28px;
            font-weight: bold;
            color: #f07aff;
        }

        .pocketed-balls {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }

        .mini-ball {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 2px black;
        }

        /* მაგიდა */
        .table-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a2a1a;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            border-radius: 10px;
            cursor: crosshair;
            box-shadow: 0 0 0 4px #8B4513, 0 0 0 8px #5a2a0a;
        }

        /* კონტროლები */
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1530;
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid rgba(168,85,247,0.3);
            z-index: 10;
        }

        .power-bar {
            width: 180px;
            height: 6px;
            background: #0a0612;
            border-radius: 3px;
            overflow: hidden;
        }

        .power-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #4ade80, #fbbf24, #f87171);
        }

        input[type="range"] {
            width: 120px;
            accent-color: #a855f7;
        }

        .shoot-btn {
            background: linear-gradient(135deg, #7a1fc8, #a855f7);
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* მოგების ეკრანი */
        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10,6,18,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }

        .win-card {
            background: #1a1530;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 2px solid #a855f7;
        }
    </style>
</head>
<body>

<!-- მთავარი მენიუ -->
<div id="mainMenu" class="main-menu">
    <div class="menu-card">
        <div class="menu-title">🎱 ბილიარდი</div>
        <button class="menu-btn" onclick="startLocalGame()">👥 ადგილობრივი თამაში (2 მოთამაშე)</button>
        <button class="menu-btn" onclick="startAIGame()">🤖 AI-ს წინააღმდეგ</button>
        
        <div class="members-panel">
            <div class="members-title">
                <span>🌟</span> ონლაინ წევრები
                <span id="onlineCount" style="font-size: 11px;"></span>
            </div>
            <div id="membersList" class="members-list">
                <div class="loading">🚀 იტვირთება წევრები...</div>
            </div>
        </div>
    </div>
</div>

<!-- თამაშის არე -->
<div id="gameArea" class="game-area">
    <div class="game-header">
        <div class="back-btn" onclick="backToMenu()">← მთავარი</div>
        <div class="turn-indicator" id="turnText">🎯 მოთამაშე 1-ის ჯერი</div>
    </div>

    <div class="score-panel">
        <div class="score-card" id="scoreCard1">
            <div class="score-name" id="player1Name">👤 მოთამაშე 1</div>
            <div class="score-value" id="player1Score">0</div>
            <div class="pocketed-balls" id="player1Balls"></div>
        </div>
        <div class="score-card" id="scoreCard2">
            <div class="score-name" id="player2Name">👤 მოთამაშე 2</div>
            <div class="score-value" id="player2Score">0</div>
            <div class="pocketed-balls" id="player2Balls"></div>
        </div>
    </div>

    <div class="table-container">
        <canvas id="gameCanvas" width="950" height="530"></canvas>
    </div>

    <div class="controls-panel">
        <span style="font-size: 12px;">⚡ ძალა</span>
        <div class="power-bar">
            <div class="power-fill" id="powerFill"></div>
        </div>
        <input type="range" id="powerSlider" min="0" max="100" value="50">
        <button class="shoot-btn" id="shootBtn">🎯 სროლა</button>
    </div>
</div>

<div id="winOverlay" class="win-overlay">
    <div class="win-card">
        <div style="font-size: 48px;" id="winEmoji">🏆</div>
        <h2 id="winText">გამარჯვება!</h2>
        <button class="menu-btn" style="margin-top: 20px;" onclick="resetGame()">🔄 ახალი თამაში</button>
    </div>
</div>

<script>
    // ========== Supabase ინიციალიზაცია ==========
    const supabase = createClient(
        "https://brggiyhfzfbmlirqfgpo.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
    );

    let currentUser = null;
    let onlineMembers = [];
    let pendingInvite = null;

    // ========== წევრების ჩატვირთვა ==========
    async function loadMembers() {
        try {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                // ანონიმური შესვლა
                const { data: signUp } = await supabase.auth.signUp({
                    email: `guest_${Date.now()}@temp.com`,
                    password: Math.random().toString(36)
                });
                currentUser = signUp?.user;
            } else {
                currentUser = user;
            }

            // პროფილის შექმნა/განახლება
            const name = localStorage.getItem('playerName') || `მოთამაშე_${Math.floor(Math.random()*1000)}`;
            await supabase.from('profiles').upsert({
                id: currentUser.id,
                username: name,
                last_seen: new Date().toISOString(),
                emotion: '🎱'
            });

            // წევრების წამოღება
            const { data: profiles } = await supabase
                .from('profiles')
                .select('id, username, last_seen, emotion')
                .neq('id', currentUser.id)
                .order('last_seen', { ascending: false });

            onlineMembers = (profiles || []).filter(p => {
                if (!p.last_seen) return false;
                const diff = Date.now() - new Date(p.last_seen).getTime();
                return diff < 60000; // ბოლო 1 წუთში აქტიური
            });

            renderMembers();

        } catch(e) {
            console.error(e);
            document.getElementById('membersList').innerHTML = '<div class="loading">⚠️ ვერ ვიტვირთავ წევრებს</div>';
        }
    }

    function renderMembers() {
        const container = document.getElementById('membersList');
        const countSpan = document.getElementById('onlineCount');
        
        if (onlineMembers.length === 0) {
            container.innerHTML = '<div class="loading">😴 აქტიური წევრები არ არიან</div>';
            countSpan.textContent = '(0)';
            return;
        }

        countSpan.textContent = `(${onlineMembers.length})`;
        container.innerHTML = onlineMembers.map(m => `
            <div class="member-item">
                <div class="member-info">
                    <div class="member-avatar">${m.emotion || '🎱'}</div>
                    <div>
                        <div class="member-name">${escapeHtml(m.username || 'მოთამაშე')}</div>
                        <div class="member-status">● ონლაინში</div>
                    </div>
                </div>
                <button class="invite-member-btn" onclick="sendGameInvite('${m.id}', '${escapeHtml(m.username)}')">📨 მოწვევა</button>
            </div>
        `).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== მოწვევის გაგზავნა ==========
    async function sendGameInvite(toId, toName) {
        if (!currentUser) {
            alert('გთხოვთ, დაელოდეთ...');
            return;
        }

        const { data: myProfile } = await supabase
            .from('profiles')
            .select('username')
            .eq('id', currentUser.id)
            .single();

        const myName = myProfile?.username || 'მოთამაშე';

        // მოწვევის შენახვა
        await supabase.from('game_invites').insert({
            from_id: currentUser.id,
            to_id: toId,
            from_name: myName,
            to_name: toName,
            status: 'pending',
            created_at: new Date().toISOString()
        });

        alert(`📨 მოწვევა გაეგზავნა ${toName}-ს`);
    }

    // ========== მოწვევების მოსმენა ==========
    function listenForInvites() {
        if (!currentUser) return;

        const channel = supabase
            .channel('invites')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'game_invites',
                filter: `to_id=eq.${currentUser.id}`
            }, (payload) => {
                const invite = payload.new;
                if (invite.status === 'pending') {
                    showInvitePopup(invite);
                }
            })
            .subscribe();
    }

    function showInvitePopup(invite) {
        // წაშალე ძველი
        const old = document.querySelector('.invite-notification');
        if (old) old.remove();

        const div = document.createElement('div');
        div.className = 'invite-notification';
        div.innerHTML = `
            <div style="margin-bottom: 10px;">
                <strong>${escapeHtml(invite.from_name)}</strong> გიწვევს სათამაშოდ!
            </div>
            <div class="invite-buttons">
                <button class="accept-btn" onclick="acceptInvite('${invite.id}', '${invite.from_id}', '${escapeHtml(invite.from_name)}')">✅ მიღება</button>
                <button class="decline-btn" onclick="declineInvite('${invite.id}')">❌ უარი</button>
            </div>
        `;
        document.body.appendChild(div);
    }

    async function acceptInvite(inviteId, fromId, fromName) {
        await supabase.from('game_invites').update({ status: 'accepted' }).eq('id', inviteId);
        
        const notif = document.querySelector('.invite-notification');
        if (notif) notif.remove();
        
        alert(`✅ თამაში იწყება ${fromName}-სთან`);
        startOnlineGame(fromId, fromName);
    }

    async function declineInvite(inviteId) {
        await supabase.from('game_invites').update({ status: 'declined' }).eq('id', inviteId);
        const notif = document.querySelector('.invite-notification');
        if (notif) notif.remove();
        alert('❌ მოწვევა უარყოფილია');
    }

    // ========== თამაშის ლოგიკა (გამარტივებული, მუშა) ==========
    let balls = [];
    let currentPlayer = 1;
    let gameActive = true;
    let isMoving = false;
    let power = 50;
    let angle = 0;
    let isDragging = false;
    let placingCueBall = false;
    let gameMode = 'local';
    let animationId = null;

    const W = 950, H = 530;
    const BALL_R = 7;
    const FRICTION = 0.985;
    const WALL_BOUNCE = 0.92;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = W;
    canvas.height = H;

    const POCKETS = [
        { x: 20, y: 20 }, { x: W/2, y: 15 }, { x: W-20, y: 20 },
        { x: 20, y: H-20 }, { x: W/2, y: H-15 }, { x: W-20, y: H-20 }
    ];

    const COLORS = {
        1: '#FFD700', 2: '#0000CD', 3: '#DC143C', 4: '#8B008B', 5: '#FF8C00',
        6: '#228B22', 7: '#B22222', 8: '#1a1a2e', 9: '#FFD700', 10: '#0000CD',
        11: '#DC143C', 12: '#8B008B', 13: '#FF8C00', 14: '#228B22', 15: '#B22222', 0: '#FFFFFF'
    };

    const SOLIDS = [1,2,3,4,5,6,7];
    const STRIPES = [9,10,11,12,13,14,15];

    let playersStats = {
        1: { name: '👤 მოთამაშე 1', score: 0, pocketed: [], group: null },
        2: { name: '👤 მოთამაშე 2', score: 0, pocketed: [], group: null }
    };

    function initBalls() {
        balls = [];
        const startX = W - 130;
        const startY = H/2;
        const spacing = BALL_R * 2.1;
        
        const positions = [
            [0,0], [-1,-1], [1,-1], [-2,-2], [0,-2], [2,-2],
            [-3,-3], [-1,-3], [1,-3], [3,-3], [-4,-4], [-2,-4], [0,-4], [2,-4], [4,-4]
        ];
        
        const numbers = [8, 1, 9, 2, 10, 3, 11, 4, 12, 5, 13, 6, 14, 7, 15];
        
        for(let i = 0; i < positions.length; i++) {
            balls.push({
                id: i, num: numbers[i],
                x: startX + positions[i][0] * spacing,
                y: startY + positions[i][1] * spacing * 0.866,
                vx: 0, vy: 0, pocketed: false,
                isStripe: STRIPES.includes(numbers[i])
            });
        }
        
        balls.push({
            id: 16, num: 0,
            x: W * 0.18, y: H/2,
            vx: 0, vy: 0, pocketed: false,
            isStripe: false
        });
    }

    function updateUI() {
        document.getElementById('player1Score').textContent = playersStats[1].score;
        document.getElementById('player2Score').textContent = playersStats[2].score;
        document.getElementById('player1Name').textContent = playersStats[1].name;
        document.getElementById('player2Name').textContent = playersStats[2].name;

        const card1 = document.getElementById('scoreCard1');
        const card2 = document.getElementById('scoreCard2');
        
        if (currentPlayer === 1) {
            card1.classList.add('active');
            card2.classList.remove('active');
            document.getElementById('turnText').innerHTML = `🎯 ${playersStats[1].name}-ის ჯერი`;
        } else {
            card1.classList.remove('active');
            card2.classList.add('active');
            document.getElementById('turnText').innerHTML = `🎯 ${playersStats[2].name}-ის ჯერი`;
        }

        const p1Balls = document.getElementById('player1Balls');
        const p2Balls = document.getElementById('player2Balls');
        
        p1Balls.innerHTML = playersStats[1].pocketed.map(n => 
            `<div class="mini-ball" style="background: ${COLORS[n]}">${n}</div>`
        ).join('');
        
        p2Balls.innerHTML = playersStats[2].pocketed.map(n => 
            `<div class="mini-ball" style="background: ${COLORS[n]}">${n}</div>`
        ).join('');
    }

    function updatePhysics() {
        let moving = false;
        
        for(let b of balls) {
            if(b.pocketed) continue;
            
            b.x += b.vx;
            b.y += b.vy;
            b.vx *= FRICTION;
            b.vy *= FRICTION;
            
            if(Math.abs(b.vx) > 0.1 || Math.abs(b.vy) > 0.1) moving = true;
            
            if(b.x - BALL_R < 12) { b.x = 12 + BALL_R; b.vx = -b.vx * WALL_BOUNCE; }
            if(b.x + BALL_R > W - 12) { b.x = W - 12 - BALL_R; b.vx = -b.vx * WALL_BOUNCE; }
            if(b.y - BALL_R < 12) { b.y = 12 + BALL_R; b.vy = -b.vy * WALL_BOUNCE; }
            if(b.y + BALL_R > H - 12) { b.y = H - 12 - BALL_R; b.vy = -b.vy * WALL_BOUNCE; }
            
            for(let p of POCKETS) {
                if(Math.hypot(b.x - p.x, b.y - p.y) < BALL_R + 10 && !b.pocketed) {
                    b.pocketed = true;
                    b.vx = b.vy = 0;
                    
                    if(b.num === 0) {
                        placingCueBall = true;
                        document.getElementById('turnText').innerHTML = '⚠️ დადე თეთრი ბურთი!';
                    } 
                    else if(b.num === 8) {
                        const remaining = balls.filter(bb => 
                            !bb.pocketed && bb.num !== 0 && bb.num !== 8 && 
                            (playersStats[currentPlayer].group === 'solid' ? SOLIDS.includes(bb.num) : STRIPES.includes(bb.num))
                        ).length;
                        if(remaining === 0) endGame(currentPlayer);
                        else endGame(3 - currentPlayer);
                    }
                    else {
                        const group = SOLIDS.includes(b.num) ? 'solid' : 'stripe';
                        if(playersStats[1].group === null && playersStats[2].group === null) {
                            playersStats[currentPlayer].group = group;
                            playersStats[3-currentPlayer].group = group === 'solid' ? 'stripe' : 'solid';
                        }
                        if(playersStats[currentPlayer].group === group) {
                            playersStats[currentPlayer].pocketed.push(b.num);
                            playersStats[currentPlayer].score++;
                            updateUI();
                        } else {
                            currentPlayer = 3 - currentPlayer;
                            updateUI();
                        }
                    }
                    break;
                }
            }
        }
        
        for(let i = 0; i < balls.length; i++) {
            for(let j = i+1; j < balls.length; j++) {
                const b1 = balls[i], b2 = balls[j];
                if(b1.pocketed || b2.pocketed) continue;
                
                const dx = b2.x - b1.x, dy = b2.y - b1.y;
                const dist = Math.hypot(dx, dy);
                
                if(dist < BALL_R * 2) {
                    const ang = Math.atan2(dy, dx);
                    const overlap = BALL_R * 2 - dist;
                    const moveX = Math.cos(ang) * overlap * 0.5;
                    const moveY = Math.sin(ang) * overlap * 0.5;
                    
                    b1.x -= moveX; b1.y -= moveY;
                    b2.x += moveX; b2.y += moveY;
                    
                    const nx = dx / dist, ny = dy / dist;
                    const dvx = b2.vx - b1.vx, dvy = b2.vy - b1.vy;
                    const dot = dvx * nx + dvy * ny;
                    
                    if(dot < 0) {
                        const imp = dot * 0.8;
                        b1.vx += imp * nx; b1.vy += imp * ny;
                        b2.vx -= imp * nx; b2.vy -= imp * ny;
                    }
                }
            }
        }
        
        if(!moving && isMoving) {
            isMoving = false;
            if(!placingCueBall) {
                currentPlayer = 3 - currentPlayer;
                updateUI();
            }
            if(gameActive && !placingCueBall && currentPlayer === 2 && gameMode === 'ai') {
                setTimeout(() => aiShoot(), 500);
            }
        }
        
        isMoving = moving;
        draw();
        if(isMoving) animationId = requestAnimationFrame(updatePhysics);
        else if(animationId) { cancelAnimationFrame(animationId); animationId = null; }
    }

    function shoot() {
        if(isMoving || placingCueBall || !gameActive) return;
        if(gameMode === 'ai' && currentPlayer !== 1) return;
        
        const cue = balls.find(b => b.num === 0 && !b.pocketed);
        if(!cue) return;
        
        const speed = power * 0.45;
        cue.vx = Math.cos(angle) * speed;
        cue.vy = Math.sin(angle) * speed;
        isMoving = true;
        updatePhysics();
    }

    function aiShoot() {
        if(isMoving || !gameActive || currentPlayer !== 2 || placingCueBall) return;
        
        const cue = balls.find(b => b.num === 0 && !b.pocketed);
        if(!cue) return;
        
        let targets = balls.filter(b => !b.pocketed && b.num !== 0);
        if(playersStats[2].group) {
            targets = targets.filter(b => 
                playersStats[2].group === 'solid' ? SOLIDS.includes(b.num) : STRIPES.includes(b.num)
            );
        }
        if(targets.length === 0 && playersStats[2].pocketed.length >= 7) {
            targets = balls.filter(b => !b.pocketed && b.num === 8);
        }
        if(targets.length === 0) {
            targets = balls.filter(b => !b.pocketed && b.num !== 0 && b.num !== 8);
        }
        
        if(targets.length > 0) {
            const target = targets[0];
            angle = Math.atan2(target.y - cue.y, target.x - cue.x);
            angle += (Math.random() - 0.5) * 0.25;
            const dist = Math.hypot(target.x - cue.x, target.y - cue.y);
            power = Math.min(90, Math.max(35, dist / 4.5));
        } else {
            angle = Math.random() * Math.PI * 2;
            power = 50;
        }
        
        document.getElementById('powerSlider').value = power;
        document.getElementById('powerFill').style.width = power + '%';
        
        const speed = power * 0.45;
        cue.vx = Math.cos(angle) * speed;
        cue.vy = Math.sin(angle) * speed;
        isMoving = true;
        updatePhysics();
    }

    function placeCueBall(x, y) {
        if(x < BALL_R + 15 || x > W - BALL_R - 15 || y < BALL_R + 15 || y > H - BALL_R - 15) return;
        for(let b of balls) {
            if(b.pocketed) continue;
            if(b.num === 0) continue;
            if(Math.hypot(b.x - x, b.y - y) < BALL_R * 2.2) return;
        }
        
        const cue = balls.find(b => b.num === 0);
        if(cue) { cue.x = x; cue.y = y; cue.pocketed = false; }
        
        placingCueBall = false;
        updateUI();
        draw();
        
        if(gameActive && currentPlayer === 2 && gameMode === 'ai') {
            setTimeout(() => aiShoot(), 500);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        
        // მაგიდა
        ctx.fillStyle = '#1a6b2f';
        ctx.fillRect(0, 0, W, H);
        
        // კიდეები
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 8;
        ctx.strokeRect(8, 8, W-16, H-16);
        
        // ჯიბეები
        for(let p of POCKETS) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 12, 0, Math.PI*2);
            ctx.fillStyle = '#000000aa';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
            ctx.fillStyle = '#000000';
            ctx.fill();
        }
        
        // ბურთები
        for(let b of balls) {
            if(b.pocketed) continue;
            
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2);
            
            if(b.isStripe && b.num !== 0) {
                ctx.fillStyle = '#FFFFFF';
                ctx.fill();
                ctx.fillStyle = COLORS[b.num];
                ctx.fillRect(b.x - BALL_R, b.y - 3, BALL_R*2, 6);
            } else {
                const grad = ctx.createRadialGradient(b.x-3, b.y-3, 2, b.x, b.y, BALL_R);
                grad.addColorStop(0, COLORS[b.num] || '#888');
                grad.addColorStop(1, '#444');
                ctx.fillStyle = grad;
                ctx.fill();
            }
            
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 0.5;
            ctx.stroke();
            
            if(b.num !== 0) {
                ctx.fillStyle = '#FFF';
                ctx.font = `bold ${BALL_R+2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(b.num, b.x, b.y);
            }
            ctx.shadowBlur = 0;
        }
        
        // ========== ბილიარდის კიი (ჯოხი) ==========
        if(!isMoving && !placingCueBall && gameActive) {
            if(gameMode === 'local' || (gameMode === 'ai' && currentPlayer === 1)) {
                const cue = balls.find(b => b.num === 0 && !b.pocketed);
                if(cue) {
                    // სამიზნე ხაზი
                    const endX = cue.x + Math.cos(angle) * 200;
                    const endY = cue.y + Math.sin(angle) * 200;
                    ctx.beginPath();
                    ctx.setLineDash([6, 8]);
                    ctx.strokeStyle = '#f07aff';
                    ctx.lineWidth = 1.5;
                    ctx.moveTo(cue.x, cue.y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    
                    // ჯოხი (cue stick) - ბურთის უკან
                    const stickX = cue.x - Math.cos(angle) * (BALL_R + 20 + (power / 100) * 35);
                    const stickY = cue.y - Math.sin(angle) * (BALL_R + 20 + (power / 100) * 35);
                    const stickEndX = stickX - Math.cos(angle) * 70;
                    const stickEndY = stickY - Math.sin(angle) * 70;
                    
                    ctx.beginPath();
                    ctx.setLineDash([]);
                    ctx.lineWidth = 5;
                    ctx.strokeStyle = '#8B6914';
                    ctx.moveTo(stickX, stickY);
                    ctx.lineTo(stickEndX, stickEndY);
                    ctx.stroke();
                    
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#DAA520';
                    ctx.moveTo(stickX, stickY);
                    ctx.lineTo(stickEndX, stickEndY);
                    ctx.stroke();
                    
                    // ჯოხის წვერი
                    ctx.beginPath();
                    ctx.arc(stickX, stickY, 3, 0, Math.PI*2);
                    ctx.fillStyle = '#DAA520';
                    ctx.fill();
                }
            }
        }
    }

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
        else { cx = e.clientX; cy = e.clientY; }
        return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
    }

    function onMouseDown(e) {
        e.preventDefault();
        if(isMoving) return;
        const coords = getCoords(e);
        if(placingCueBall) {
            placeCueBall(coords.x, coords.y);
        } else {
            if(gameMode === 'ai' && currentPlayer !== 1) return;
            isDragging = true;
            const cue = balls.find(b => b.num === 0 && !b.pocketed);
            if(cue) { angle = Math.atan2(coords.y - cue.y, coords.x - cue.x); draw(); }
        }
    }

    function onMouseMove(e) {
        if(!isDragging || isMoving || placingCueBall) return;
        if(gameMode === 'ai' && currentPlayer !== 1) return;
        const coords = getCoords(e);
        const cue = balls.find(b => b.num === 0 && !b.pocketed);
        if(cue) { angle = Math.atan2(coords.y - cue.y, coords.x - cue.x); draw(); }
    }

    function onMouseUp() { isDragging = false; }

    function endGame(winner) {
        gameActive = false;
        document.getElementById('winText').innerHTML = `${playersStats[winner].name} გაიმარჯვა! 🎉`;
        document.getElementById('winEmoji').innerHTML = winner === 1 ? '🏆' : '🎯';
        document.getElementById('winOverlay').style.display = 'flex';
    }

    function resetGame() {
        if(animationId) cancelAnimationFrame(animationId);
        gameActive = true;
        currentPlayer = 1;
        isMoving = false;
        placingCueBall = false;
        playersStats[1].score = 0; playersStats[2].score = 0;
        playersStats[1].pocketed = []; playersStats[2].pocketed = [];
        playersStats[1].group = null; playersStats[2].group = null;
        initBalls();
        updateUI();
        draw();
        document.getElementById('winOverlay').style.display = 'none';
    }

    function startLocalGame() {
        gameMode = 'local';
        playersStats[1].name = '👤 მოთამაშე 1';
        playersStats[2].name = '👤 მოთამაშე 2';
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        resetGame();
    }

    function startAIGame() {
        gameMode = 'ai';
        playersStats[1].name = '👤 მოთამაშე';
        playersStats[2].name = '🤖 AI';
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        resetGame();
    }

    function startOnlineGame(opponentId, opponentName) {
        gameMode = 'online';
        playersStats[1].name = currentUser?.email?.split('@')[0] || '👤 მე';
        playersStats[2].name = opponentName;
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        resetGame();
    }

    function backToMenu() {
        if(animationId) cancelAnimationFrame(animationId);
        document.getElementById('mainMenu').style.display = 'flex';
        document.getElementById('gameArea').style.display = 'none';
        resetGame();
    }

    // ========== ინიციალიზაცია ==========
    const powerSlider = document.getElementById('powerSlider');
    const powerFill = document.getElementById('powerFill');
    
    powerSlider.addEventListener('input', (e) => {
        power = parseInt(e.target.value);
        powerFill.style.width = power + '%';
        draw();
    });
    
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('touchstart', onMouseDown);
    canvas.addEventListener('touchmove', onMouseMove);
    canvas.addEventListener('touchend', onMouseUp);
    
    document.getElementById('shootBtn').addEventListener('click', shoot);
    
    initBalls();
    updateUI();
    draw();
    
    loadMembers();
    listenForInvites();
    
    // ყოველ 30 წამში განახლება
    setInterval(() => loadMembers(), 30000);
</script>
</body>
</html>
