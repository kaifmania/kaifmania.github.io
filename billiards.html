<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ბილიარდი · კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0612;--panel:#110d22;--panel2:#1a1530;
  --border:rgba(160,80,255,0.3);--text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;
  --indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.15);
  --accent:#f07aff;--glow:rgba(168,85,247,0.3);
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;
}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--glow)}50%{box-shadow:0 0 20px 6px var(--glow)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ballPocket{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}100%{transform:scale(0);opacity:0}}
@keyframes winAnim{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes notifSlide{from{opacity:0;transform:translateX(120%)}to{opacity:1;transform:translateX(0)}}
@keyframes powerBar{from{width:0}to{width:var(--pw)}}
@keyframes dot{0%,100%{opacity:.3}50%{opacity:1}}

/* ====== LAYOUT ====== */
#appWrapper{display:flex;flex:1;min-height:0;position:relative}

/* ====== LOBBY ====== */
#lobby{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;animation:fadeIn .5s ease}
.lobby-logo{font-family:'Unbounded',sans-serif;font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--indigo2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.lobby-sub{font-size:13px;color:var(--text3);text-align:center}
.lobby-card{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:12px}
.lb-title{font-family:'Unbounded',sans-serif;font-size:11px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:4px}
.lb-btn{padding:13px 20px;border-radius:14px;border:1px solid var(--border);background:var(--indigo-f);color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;text-align:center;display:flex;align-items:center;gap:10px}
.lb-btn:hover{background:var(--indigo);border-color:var(--indigo2);transform:translateY(-2px)}
.lb-btn.primary{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border-color:transparent;font-weight:600;justify-content:center;font-size:15px}
.lb-btn.primary:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(120,30,200,.5)}
.lb-btn.danger{border-color:rgba(248,113,113,.3);color:var(--red)}
.lb-btn.danger:hover{background:rgba(248,113,113,.1)}
.waiting-room{display:flex;flex-direction:column;gap:10px;display:none}
.waiting-players{display:flex;gap:12px;align-items:center;justify-content:center;padding:16px}
.wp-slot{width:80px;height:80px;border-radius:50%;background:var(--indigo-f);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;transition:all .3s}
.wp-slot.filled{border-style:solid;border-color:var(--indigo2);box-shadow:0 0 20px var(--glow)}
.wp-slot img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.wp-vs{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;color:var(--text3)}
.invite-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:var(--panel2);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.invite-item:hover{background:var(--indigo-f);border-color:var(--indigo2)}
.invite-item .av{width:36px;height:36px;border-radius:50%;background:var(--indigo-f);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0}
.invite-item .av img{width:100%;height:100%;object-fit:cover}
.invite-item .info{flex:1;min-width:0}
.invite-item .nick{font-size:13px;font-weight:600;color:var(--text)}
.invite-item .sub{font-size:11px;color:var(--text3)}
.online-dot-sm{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0}
.invite-send-btn{background:var(--indigo);border:none;border-radius:8px;color:#fff;font-size:11px;padding:5px 12px;cursor:pointer;flex-shrink:0;font-family:'Noto Sans Georgian',sans-serif;white-space:nowrap}
.invite-send-btn:hover{background:var(--indigo2)}
.invite-send-btn:disabled{opacity:.5;cursor:not-allowed}
#userSearchInvite{width:100%;padding:10px 14px;background:var(--panel2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:13px;font-family:'Noto Sans Georgian',sans-serif;outline:none;margin-bottom:6px}
#userSearchInvite:focus{border-color:var(--indigo2)}
#userSearchInvite::placeholder{color:var(--text3)}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--indigo2);border-radius:50%;animation:spin 1s linear infinite}

/* ====== GAME HEADER ====== */
#gameHeader{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10}
.gh-back{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;padding:6px 12px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.gh-back:hover{background:var(--border);color:var(--text)}
.gh-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;flex:1;text-align:center}
.gh-status{font-size:11px;color:var(--text3);text-align:center;padding:2px 8px;background:var(--indigo-f);border:1px solid var(--border);border-radius:20px;white-space:nowrap}

/* ====== PLAYER BARS ====== */
.player-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.pb-av{width:34px;height:34px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0;transition:border-color .3s,box-shadow .3s}
.pb-av img{width:100%;height:100%;object-fit:cover}
.pb-av.active{border-color:var(--green);box-shadow:0 0 12px rgba(74,222,128,.4)}
.pb-info{flex:1;min-width:0}
.pb-name{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pb-balls{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.mini-ball{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:inset -2px -2px 4px rgba(0,0,0,.4)}
.pb-score-wrap{text-align:right;flex-shrink:0}
.pb-score-lbl{font-size:9px;color:var(--text3);font-family:'Unbounded',sans-serif;letter-spacing:.5px}
.pb-score-val{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:900;color:var(--accent)}
.turn-indicator{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:var(--green);font-family:'Unbounded',sans-serif;white-space:nowrap;display:none}
.turn-indicator.show{display:block;animation:pulse 1.5s infinite}

/* ====== CANVAS AREA ====== */
#canvasWrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:radial-gradient(ellipse at center,#0d1a10 0%,#060e08 100%)}
#tableCanvas{display:block;touch-action:none;cursor:crosshair}
#aimLine{position:absolute;inset:0;pointer-events:none;z-index:2}

/* ====== CUE POWER ====== */
#cuePanel{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(10,6,18,.85);border:1px solid var(--border);border-radius:14px;padding:8px 16px;display:flex;flex-direction:column;gap:5px;align-items:center;z-index:5;min-width:200px;backdrop-filter:blur(8px)}
.cp-label{font-size:9px;letter-spacing:1.5px;color:var(--text3);font-family:'Unbounded',sans-serif;text-transform:uppercase}
#powerTrack{width:160px;height:12px;background:var(--panel2);border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--border)}
#powerFill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));transition:width .05s linear}
.shoot-btn{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;border-radius:10px;color:#fff;font-family:'Noto Sans Georgian',sans-serif;font-size:13px;padding:7px 20px;cursor:pointer;transition:all .2s;width:100%}
.shoot-btn:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(120,30,200,.5)}
.shoot-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#cuePanel.hidden{display:none}

/* ====== CUEBALL PLACEMENT ====== */
#placementMsg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,6,18,.9);border:1px solid var(--yellow);border-radius:16px;padding:14px 24px;font-size:13px;color:var(--yellow);text-align:center;z-index:10;pointer-events:none;display:none;backdrop-filter:blur(8px)}

/* ====== WIN OVERLAY ====== */
#winOverlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:5000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(12px)}
#winOverlay.show{display:flex;animation:fadeIn .4s ease}
.win-card{background:var(--panel);border:1px solid var(--border);border-radius:28px;padding:32px;text-align:center;max-width:340px;width:90%;box-shadow:0 0 60px var(--glow);animation:winAnim 2s ease-in-out infinite}
.win-emoji{font-size:64px;display:block;margin-bottom:10px}
.win-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:var(--accent);margin-bottom:6px}
.win-sub{font-size:14px;color:var(--text2);margin-bottom:20px}
.win-btn{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;border-radius:14px;color:#fff;font-size:14px;padding:12px 32px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;margin-bottom:8px;width:100%;transition:all .2s}
.win-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(120,30,200,.5)}
.win-btn.sec{background:var(--panel2);border:1px solid var(--border);color:var(--text2)}

/* ====== BALL GRAPH ====== */
#ballGraph{background:var(--panel);border-top:1px solid var(--border);padding:8px 14px;display:flex;gap:12px;align-items:flex-start;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#ballGraph::-webkit-scrollbar{display:none}
.bg-player{flex:1;min-width:0}
.bg-title{font-size:9px;font-family:'Unbounded',sans-serif;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.bg-balls{display:flex;gap:4px;flex-wrap:wrap}
.bg-ball{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.8);box-shadow:inset -3px -3px 6px rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.4);transition:all .3s}
.bg-ball.empty{background:var(--panel2)!important;box-shadow:none;opacity:.4}
.bg-divider{width:1px;background:var(--border);align-self:stretch;flex-shrink:0}

/* ====== CHAT ====== */
#chatPanel{width:280px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:5}
@media(max-width:700px){
  #chatPanel{position:fixed;bottom:0;left:0;right:0;width:100%;height:200px;border-left:none;border-top:1px solid var(--border);z-index:20}
  #canvasWrap{padding-bottom:200px}
  #gameHeader .gh-title{font-size:11px}
}
.chat-head{padding:10px 14px;border-bottom:1px solid var(--border);font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;display:flex;align-items:center;gap:6px;flex-shrink:0}
.ch-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}
#chatMsgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:4px;min-height:0}
#chatMsgs::-webkit-scrollbar{width:3px}
#chatMsgs::-webkit-scrollbar-thumb{background:var(--border)}
.cm{padding:6px 10px;border-radius:4px 12px 12px 12px;font-size:12px;word-break:break-word;max-width:95%;animation:slideUp .2s ease}
.cm.mine{background:rgba(120,30,200,.25);border:1px solid rgba(168,85,247,.3);align-self:flex-end;border-radius:12px 4px 12px 12px}
.cm.other{background:var(--panel2);border:1px solid var(--border);align-self:flex-start}
.cm.system{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--green);font-size:11px;text-align:center;align-self:center;border-radius:10px}
.cm-nick{font-size:10px;font-weight:600;color:var(--indigo2);margin-bottom:2px}
.cm-text{color:var(--text);line-height:1.4}
.cm-text img{width:28px!important;height:28px!important;vertical-align:middle;border-radius:4px}
.cm-text .chat-emoji-text{font-size:22px;vertical-align:middle}
.chat-bar{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0;position:relative}
#chatInput{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;color:var(--text);font-size:12px;font-family:'Noto Sans Georgian',sans-serif;outline:none}
#chatInput:focus{border-color:var(--indigo2)}
#chatInput::placeholder{color:var(--text3)}
.chat-em-btn,.chat-send-btn{width:32px;height:32px;border-radius:9px;background:var(--indigo-f);border:1px solid var(--border);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chat-em-btn:hover,.chat-send-btn:hover{background:var(--indigo)}
.chat-send-btn{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border-color:transparent;color:#fff}
#chatEmoPanel{position:absolute;bottom:52px;left:8px;background:var(--panel2);border:1px solid var(--border);border-radius:16px;padding:12px;width:260px;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.5);display:none;max-height:200px;overflow-y:auto}
#chatEmoPanel::-webkit-scrollbar{width:3px}
#chatEmoPanel::-webkit-scrollbar-thumb{background:var(--border)}
#chatEmoPanel.open{display:block}
.cep-grid{display:flex;flex-wrap:wrap;gap:6px}
.cep-btn{width:44px;height:44px;border-radius:10px;background:var(--indigo-f);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cep-btn:hover{background:var(--border);transform:scale(1.1)}
.cep-btn img{width:30px;height:30px;object-fit:contain}
.cep-btn .em-text{font-size:22px}

/* ====== NOTIF TOAST ====== */
.game-notif{position:fixed;top:70px;right:16px;background:var(--panel);border:1px solid var(--indigo2);border-radius:18px;padding:14px 18px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 30px var(--glow);min-width:280px;max-width:340px;animation:notifSlide .35s ease}
.gn-head{font-family:'Unbounded',sans-serif;font-size:10px;letter-spacing:1px;color:var(--indigo2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.gn-body{font-size:13px;color:var(--text);margin-bottom:12px;line-height:1.5}
.gn-btns{display:flex;gap:8px}
.gn-accept{flex:1;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.4);border-radius:10px;color:var(--green);font-size:12px;padding:8px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;transition:all .2s}
.gn-accept:hover{background:rgba(74,222,128,.25)}
.gn-decline{flex:1;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:10px;color:var(--red);font-size:12px;padding:8px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;transition:all .2s}
.gn-decline:hover{background:rgba(248,113,113,.18)}

/* ====== UTIL ====== */
.hidden{display:none!important}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border)}
#spectateMsg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,6,18,.9);border:1px solid var(--border);border-radius:14px;padding:14px 24px;text-align:center;color:var(--text3);font-size:13px;pointer-events:none;display:none;backdrop-filter:blur(6px)}
.waiting-dots span{display:inline-block;animation:dot 1s infinite}.waiting-dots span:nth-child(2){animation-delay:.2s}.waiting-dots span:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>

<!-- ====== LOBBY ====== -->
<div id="lobby">
  <div class="lobby-logo">🎱 ბილიარდი</div>
  <div class="lobby-sub">კლასიკური 8-ბურთი · კაიფმანია</div>

  <div class="lobby-card" id="lobbyMain">
    <div class="lb-title">მოთამაშე</div>
    <div id="myPlayerInfo" style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel2);border:1px solid var(--border);border-radius:12px">
      <div class="pb-av" id="myLobbyAv" style="width:44px;height:44px;font-size:22px">😊</div>
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text)" id="myLobbyNick">-</div>
        <div style="font-size:11px;color:var(--text3)">🎱 მოგება: <span id="myLobbyScore">0</span></div>
      </div>
    </div>
    <div class="lb-title" style="margin-top:8px">ოფციები</div>
    <button class="lb-btn primary" onclick="showInviteSection()">🎮 მოწვევა</button>
    <button class="lb-btn" onclick="startVsAI()">🤖 AI-ს წინააღმდეგ</button>
    <button class="lb-btn danger" onclick="goBack()">← კაიფმანიაში დაბრუნება</button>
  </div>

  <div class="lobby-card hidden" id="inviteSection">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <button class="gh-back" onclick="showLobbyMain()" style="padding:5px 10px;font-size:11px">←</button>
      <div class="lb-title" style="margin:0">მომხმარებლების მოწვევა</div>
    </div>
    <input id="userSearchInvite" placeholder="🔍 მომხმარებლის ძებნა..." oninput="filterInviteUsers()">
    <div id="inviteUserList" style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:6px"></div>
    <div class="waiting-room" id="waitingRoom">
      <div class="lb-title">ლობი</div>
      <div class="waiting-players">
        <div class="wp-slot filled" id="wpSlot1"><span id="wpEmoji1">😊</span></div>
        <div class="wp-vs">VS</div>
        <div class="wp-slot" id="wpSlot2"><span>❓</span></div>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--text3)">
        მოწვევა გაიგზავნა<span class="waiting-dots"> <span>.</span><span>.</span><span>.</span></span>
      </div>
      <button class="lb-btn danger" onclick="cancelInvite()">❌ გაუქმება</button>
    </div>
  </div>
</div>

<!-- ====== GAME ====== -->
<div id="gameScreen" class="hidden" style="display:flex;flex-direction:column;height:100dvh">

  <div id="gameHeader">
    <button class="gh-back" onclick="confirmLeave()">← გასვლა</button>
    <div class="gh-title">🎱 ბილიარდი</div>
    <div class="gh-status" id="ghStatus">მიმდინარეობს</div>
  </div>

  <div class="player-bar" id="pbTop">
    <div class="pb-av" id="p2Av">❓</div>
    <div class="pb-info">
      <div class="pb-name" id="p2Name">-</div>
      <div class="pb-balls" id="p2BallsMini"></div>
    </div>
    <div class="pb-score-wrap">
      <div class="pb-score-lbl">მოგება</div>
      <div class="pb-score-val" id="p2Score">0</div>
    </div>
    <div class="turn-indicator" id="p2Turn">↑ ახლა</div>
  </div>

  <div id="appWrapper">
    <div id="canvasWrap">
      <canvas id="tableCanvas"></canvas>
      <canvas id="aimLine" style="position:absolute;inset:0;pointer-events:none;z-index:2"></canvas>
      <div id="cuePanel">

function aiMakeMove() {
  if (gameOver || myTurn || shootingLocked) return;
  
  const cueBall = balls.find(b => b.num === 0);
  if (!cueBall) return;

  // AI picks a target ball smartly
  const aiGroup = isP1 ? p2Group : p1Group;
  const aiPocketed = isP1 ? p2Pocketed : p1Pocketed;
  
  let targets = balls.filter(b => !b.pocketed && b.num !== 0 && b.num !== 8);
  if (aiGroup === 'solid') targets = targets.filter(b => SOLID_NUMS.has(b.num));
  else if (aiGroup === 'stripe') targets = targets.filter(b => STRIPE_NUMS.has(b.num));
  
  // Check if AI can shoot 8-ball
  if (aiPocketed.length >= 7 && targets.length === 0) {
    const ball8 = balls.find(b => b.num === 8 && !b.pocketed);
    if (ball8) targets = [ball8];
  }
  
  if (targets.length === 0) targets = balls.filter(b => !b.pocketed && b.num !== 0);
  
  if (targets.length > 0) {
    // Aim at closest target ball
    const target = targets.reduce((closest, b) => {
      const d1 = Math.hypot(b.x - cueBall.x, b.y - cueBall.y);
      const d2 = Math.hypot(closest.x - cueBall.x, closest.y - cueBall.y);
      return d1 < d2 ? b : closest;
    }, targets[0]);
    
    // Aim angle toward target with slight random offset
    aimAngle = Math.atan2(target.y - cueBall.y, target.x - cueBall.x) + (Math.random() - 0.5) * 0.3;
  } else {
    aimAngle = Math.random() * Math.PI * 2;
  }
  
  const power = 40 + Math.random() * 45;
  document.getElementById('powerSlider').value = power;
  updatePowerFill(power);
  executeShotPhysics(power);
}

function makeInitialState() {
  return { balls: initBallsData(), turn: 'p1', p1Pocketed: [], p2Pocketed: [], p1Group: null, p2Group: null };
}

function initBallsData() {
  const data = [];
  const cx = TW * 0.72, cy = TH / 2;
  const r = 9;
  const gap = r * 2.15;

  // Triangle rack
  const rack = [
    [0,0],
    [-1,-1],[1,-1],
    [-2,-2],[0,-2],[2,-2],
    [-3,-3],[-1,-3],[1,-3],[3,-3],
    [-4,-4],[-2,-4],[0,-4],[2,-4],[4,-4]
  ];
  // ball order with 8 in center
  const order = [1,9,2,10,8,3,11,4,12,5,13,6,14,7,15];
  rack.forEach(([col,row],i) => {
    const bx = cx + col * gap * 0.5;
    const by = cy + row * gap * Math.sqrt(3)/2;
    data.push({ id: i+1, num: order[i] || (i+1), x: bx, y: by, vx: 0, vy: 0, pocketed: false });
  });
  // cue ball
  data.push({ id: 0, num: 0, x: TW * 0.27, y: TH / 2, vx: 0, vy: 0, pocketed: false });
  return data;
}

function initBalls() {
  balls = initBallsData();
  p1Pocketed = [];
  p2Pocketed = [];
  p1Group = null;
  p2Group = null;
  myTurn = isP1;
  updateGraphUI();
}

function loadStateFromDB(gRow) {
  try {
    const st = JSON.parse(gRow.state);
    balls = st.balls || initBallsData();
    p1Pocketed = st.p1Pocketed || [];
    p2Pocketed = st.p2Pocketed || [];
    p1Group = st.p1Group || null;
    p2Group = st.p2Group || null;
    myTurn = (isP1 && gRow.turn === gRow.player1_id) || (!isP1 && gRow.turn === gRow.player2_id);
    p1Wins = gRow.p1_wins || 0;
    p2Wins = gRow.p2_wins || 0;
    document.getElementById('p1Score').textContent = isP1 ? p1Wins : p2Wins;
    document.getElementById('p2Score').textContent = isP1 ? p2Wins : p1Wins;
    updateGraphUI();
  } catch(e) { initBalls(); }
}

function setupInput() {
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd);
  canvas.addEventListener('click', onCanvasClick);
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) / SCALE;
  const py = (e.clientY - rect.top) / SCALE;
  return { x: px, y: py };
}
function getTouchCanvasPos(e) {
  const t = e.touches[0];
  return getCanvasPos({ clientX: t.clientX, clientY: t.clientY });
}

function onMouseDown(e) {
  if (!myTurn || shootingLocked) return;
  if (placingCueBall) return;
  aimDragging = true;
  updateAim(getCanvasPos(e));
}
function onMouseMove(e) {
  if (!myTurn || shootingLocked || !aimDragging) return;
  updateAim(getCanvasPos(e));
}
function onMouseUp() { aimDragging = false; }

function onTouchStart(e) {
  e.preventDefault();
  if (!myTurn || shootingLocked) return;
  lastTouchAim = getTouchCanvasPos(e);
  if (placingCueBall) return;
  aimDragging = true;
  updateAim(lastTouchAim);
}
function onTouchMove(e) {
  e.preventDefault();
  if (!myTurn || shootingLocked || !aimDragging) return;
  lastTouchAim = getTouchCanvasPos(e);
  updateAim(lastTouchAim);
}
function onTouchEnd() { aimDragging = false; }

function onCanvasClick(e) {
  if (!placingCueBall || !myTurn) return;
  const pos = getCanvasPos(e);
  const cueBall = balls.find(b => b.num === 0);
  if (!cueBall) return;
  // Constrain to left half
  const nx = Math.max(20, Math.min(TW * 0.48, pos.x));
  const ny = Math.max(20, Math.min(TH - 20, pos.y));
  cueBall.x = nx; cueBall.y = ny;
  placingCueBall = false;
  document.getElementById('placementMsg').style.display = 'none';
  document.getElementById('cuePanel').classList.remove('hidden');
  renderAll();
}

function updateAim(pos) {
  const cueBall = balls.find(b => b.num === 0);
  if (!cueBall) return;
  aimAngle = Math.atan2(pos.y - cueBall.y, pos.x - cueBall.x);
  drawAimLine();
}

// ============================================================
//  RENDER
// ============================================================
function renderAll() {
  if (!ctx) return;
  ctx.clearRect(0, 0, W, H);
  drawTable();
  balls.forEach(b => { if (!b.pocketed) drawBall(b); });
  if (!aimDragging) drawCueStick();
}

function drawTable() {
  const s = SCALE;
  // Felt
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H));
  grad.addColorStop(0, '#1a4a20');
  grad.addColorStop(1, '#0d2e12');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Rail
  ctx.strokeStyle = '#5a3010';
  ctx.lineWidth = 18 * SCALE;
  ctx.strokeRect(9*SCALE, 9*SCALE, (TW-18)*SCALE, (TH-18)*SCALE);
  ctx.strokeStyle = '#8B5A2B';
  ctx.lineWidth = 14 * SCALE;
  ctx.strokeRect(9*SCALE, 9*SCALE, (TW-18)*SCALE, (TH-18)*SCALE);

  // Pockets
  const pockets = [
    {x:18,y:18},{x:TW/2,y:10},{x:TW-18,y:18},
    {x:18,y:TH-18},{x:TW/2,y:TH-10},{x:TW-18,y:TH-18}
  ];
  pockets.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x*SCALE, p.y*SCALE, 14*SCALE, 0, Math.PI*2);
    ctx.fillStyle = '#050a06';
    ctx.fill();
    ctx.strokeStyle = '#3a2010';
    ctx.lineWidth = 2*SCALE;
    ctx.stroke();
  });

  // Break line
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1*SCALE;
  ctx.setLineDash([4*SCALE,4*SCALE]);
  ctx.beginPath();
  ctx.moveTo(TW*0.28*SCALE, 18*SCALE);
  ctx.lineTo(TW*0.28*SCALE, (TH-18)*SCALE);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawBall(b) {
  const s = SCALE;
  const x = b.x * s, y = b.y * s, r = 9 * s;

  ctx.save();
  if (b.num === 0) {
    // Cue ball
    const g = ctx.createRadialGradient(x-r*0.3,y-r*0.35,r*0.05,x,y,r);
    g.addColorStop(0,'#ffffff');
    g.addColorStop(0.7,'#e8e8e8');
    g.addColorStop(1,'#c0c0c0');
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1.5*s; ctx.stroke();
  } else {
    const col = BALL_COLORS[b.num] || '#888';
    const isStripe = STRIPE_NUMS.has(b.num);

    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = isStripe ? '#fff' : col;
    ctx.fill();

    if (isStripe) {
      ctx.save();
      ctx.clip();
      ctx.fillStyle = col;
      ctx.fillRect(x-r,y-r*0.5,r*2,r);
      ctx.restore();
    }

    // Shine
    const g2 = ctx.createRadialGradient(x-r*0.3,y-r*0.35,r*0.05,x,y,r);
    g2.addColorStop(0,'rgba(255,255,255,0.5)');
    g2.addColorStop(0.5,'rgba(255,255,255,0.1)');
    g2.addColorStop(1,'rgba(0,0,0,0.25)');
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=g2; ctx.fill();

    // Number
    ctx.fillStyle='#fff';
    ctx.font = `bold ${7*s}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.num, x, y);
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2*s; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.fillText(b.num, x, y);

    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5*s; ctx.stroke();
  }
  ctx.restore();
}

function drawCueStick() {
  if (!myTurn || placingCueBall || gameOver || shootingLocked) return;
  const cueBall = balls.find(b => b.num === 0);
  if (!cueBall) return;
  const s = SCALE;
  const cx = cueBall.x * s, cy = cueBall.y * s;
  const offset = 16 * s;
  const len = 130 * s;
  const dx = -Math.cos(aimAngle), dy = -Math.sin(aimAngle);

  const x1 = cx + dx * offset;
  const y1 = cy + dy * offset;
  const x2 = cx + dx * (offset + len);
  const y2 = cy + dy * (offset + len);

  aimCtx.clearRect(0, 0, aimCanvas.width, aimCanvas.height);

  // Aim dots
  aimCtx.save();
  const aimRect = canvas.getBoundingClientRect();
  const canvasLeft = aimRect.left - document.getElementById('canvasWrap').getBoundingClientRect().left;
  const canvasTop = aimRect.top - document.getElementById('canvasWrap').getBoundingClientRect().top;
  aimCtx.translate(canvasLeft, canvasTop);

  // Dotted aim line
  const adx = Math.cos(aimAngle), ady = Math.sin(aimAngle);
  aimCtx.setLineDash([6,8]);
  aimCtx.strokeStyle = 'rgba(255,255,255,0.25)';
  aimCtx.lineWidth = 1.5;
  aimCtx.beginPath();
  aimCtx.moveTo(cx, cy);
  aimCtx.lineTo(cx + adx * TW * SCALE, cy + ady * TW * SCALE);
  aimCtx.stroke();
  aimCtx.setLineDash([]);

  // Cue stick
  const grad = aimCtx.createLinearGradient(x1, y1, x2, y2);
  grad.addColorStop(0, '#e8c070');
  grad.addColorStop(0.3, '#c89040');
  grad.addColorStop(1, '#5a3010');
  aimCtx.beginPath();
  aimCtx.moveTo(x1, y1);
  aimCtx.lineTo(x2, y2);
  aimCtx.lineWidth = 5 * s;
  aimCtx.strokeStyle = grad;
  aimCtx.lineCap = 'round';
  aimCtx.stroke();

  aimCtx.restore();
}

function drawAimLine() { drawCueStick(); }

// ============================================================

function shootCueBall() {
  if (!myTurn || shootingLocked || gameOver || placingCueBall) return;
  const power = parseInt(document.getElementById('powerSlider').value);
  executeShotPhysics(power);
}

function executeShotPhysics(power) {
  if (shootingLocked) return;
  shootingLocked = true;

  const cueBall = balls.find(b => b.num === 0);
  if (!cueBall) { shootingLocked = false; return; }

  const speed = power * 0.22;
  cueBall.vx = Math.cos(aimAngle) * speed;
  cueBall.vy = Math.sin(aimAngle) * speed;

  document.getElementById('cuePanel').classList.add('hidden');
  aimCtx.clearRect(0, 0, aimCanvas.width, aimCanvas.height);

  simulatePhysics();
}

// ============================================================
//  PHYSICS
// ============================================================
const FRICTION = 0.985;
const BALL_R = 9;
const MIN_SPEED = 0.04;

const POCKETS = [
  {x:18,y:18},{x:350,y:10},{x:682,y:18},
  {x:18,y:332},{x:350,y:340},{x:682,y:332}
];
const POCKET_R = 14;

let animFrame = null;

function simulatePhysics() {
  const pocketedThisShot = [];
  const stepsPerFrame = 6;

  function step() {
    let anyMoving = false;
    for (let s = 0; s < stepsPerFrame; s++) {
      balls.forEach(b => {
        if (b.pocketed) return;
        b.x += b.vx;
        b.y += b.vy;
        b.vx *= FRICTION;
        b.vy *= FRICTION;

        // Wall bounces
        if (b.x - BALL_R < 18) { b.x = 18 + BALL_R; b.vx = Math.abs(b.vx) * 0.85; }
        if (b.x + BALL_R > TW - 18) { b.x = TW - 18 - BALL_R; b.vx = -Math.abs(b.vx) * 0.85; }
        if (b.y - BALL_R < 12) { b.y = 12 + BALL_R; b.vy = Math.abs(b.vy) * 0.85; }
        if (b.y + BALL_R > TH - 12) { b.y = TH - 12 - BALL_R; b.vy = -Math.abs(b.vy) * 0.85; }

        // Pocket check
        for (const p of POCKETS) {
          const dx = b.x - p.x, dy = b.y - p.y;
          if (Math.sqrt(dx*dx+dy*dy) < POCKET_R + 2) {
            b.pocketed = true; b.vx = 0; b.vy = 0;
            if (!pocketedThisShot.includes(b.id)) pocketedThisShot.push(b.id);
            break;
          }
        }

        if (Math.abs(b.vx) > MIN_SPEED || Math.abs(b.vy) > MIN_SPEED) anyMoving = true;
      });

      // Ball-ball collisions
      for (let i = 0; i < balls.length; i++) {
        for (let j = i+1; j < balls.length; j++) {
          const a = balls[i], b2 = balls[j];
          if (a.pocketed || b2.pocketed) continue;
          const dx = b2.x - a.x, dy = b2.y - a.y;
          const dist = Math.sqrt(dx*dx+dy*dy);
          if (dist < BALL_R*2 && dist > 0) {
            const nx = dx/dist, ny = dy/dist;
            const overlap = BALL_R*2 - dist;
            a.x -= nx*overlap*0.5; a.y -= ny*overlap*0.5;
            b2.x += nx*overlap*0.5; b2.y += ny*overlap*0.5;
            const dvx = a.vx - b2.vx, dvy = a.vy - b2.vy;
            const dot = dvx*nx + dvy*ny;
            if (dot > 0) {
              const imp = dot * 0.92;
              a.vx -= imp*nx; a.vy -= imp*ny;
              b2.vx += imp*nx; b2.vy += imp*ny;
            }
          }
        }
      }
    }

    renderAll();

    if (anyMoving) {
      animFrame = requestAnimationFrame(step);
    } else {
      balls.forEach(b => { b.vx = 0; b.vy = 0; });
      onShotComplete(pocketedThisShot);
    }
  }
  animFrame = requestAnimationFrame(step);
}

// ============================================================
//  SHOT COMPLETE
// ============================================================
function onShotComplete(pocketedIds) {
  const pocketedBalls = pocketedIds.map(id => balls.find(b => b.id === id)).filter(Boolean);
  const cueBallPocketed = pocketedBalls.find(b => b.num === 0);
  const regularPocketed = pocketedBalls.filter(b => b.num !== 0 && b.num !== 8);
  const ball8Pocketed = pocketedBalls.find(b => b.num === 8);

  // Who just shot? myTurn=true means I (the local player) just shot
  const iJustShot = myTurn;

  // Determine groups if not yet assigned
  if ((p1Group === null || p2Group === null) && regularPocketed.length > 0) {
    const firstNum = regularPocketed[0].num;
    const isStripe = STRIPE_NUMS.has(firstNum);
    if (iJustShot) {
      // I just scored first ball - assign my group
      if (isP1) {
        p1Group = isStripe ? 'stripe' : 'solid';
        p2Group = isStripe ? 'solid' : 'stripe';
      } else {
        p2Group = isStripe ? 'stripe' : 'solid';
        p1Group = isStripe ? 'solid' : 'stripe';
      }
    } else {
      // Opponent scored first - assign their group
      if (isP1) {
        p2Group = isStripe ? 'stripe' : 'solid';
        p1Group = isStripe ? 'solid' : 'stripe';
      } else {
        p1Group = isStripe ? 'stripe' : 'solid';
        p2Group = isStripe ? 'solid' : 'stripe';
      }
    }
  }

  // 8-ball pocketed
  if (ball8Pocketed) {
    if (iJustShot) {
      const myPocketed = isP1 ? p1Pocketed : p2Pocketed;
      if (!cueBallPocketed && myPocketed.length >= 7) {
        endGame(true, '🏆 8-ბურთი სწორად ჩავარდა!');
      } else {
        endGame(false, '😔 8-ბურთი ნაადრევად ჩავარდა');
      }
    } else {
      // Opponent pocketed 8
      const theirPocketed = isP1 ? p2Pocketed : p1Pocketed;
      if (!cueBallPocketed && theirPocketed.length >= 7) {
        endGame(false, '😔 მოწინააღმდეგემ 8-ბურთი ჩააგდო');
      } else {
        endGame(true, '🏆 მოწინააღმდეგემ 8-ბურთი ნაადრევად ჩააგდო!');
      }
    }
    return;
  }

  // Cue ball pocketed - give placement to opponent
  if (cueBallPocketed) {
    chatSystem('⚪ ბელა ჩავარდა! ' + (iJustShot ? 'მოწინააღმდეგეს' : 'შენ') + ' ეძლევა განლაგება.');
    const cb = balls.find(b => b.num === 0);
    if (cb) { cb.pocketed = false; cb.x = TW * 0.2; cb.y = TH / 2; }

    if (iJustShot) {
      // opponent (not me) gets placement
      switchTurn(true);
      // if vsAI and now AI's turn, AI auto-places
      if (vsAI && !myTurn) {
        const cbb = balls.find(b => b.num === 0);
        if (cbb) { cbb.x = TW * 0.2 + Math.random() * 60; cbb.y = 40 + Math.random() * (TH - 80); }
        setTimeout(() => { syncAndFinish(); }, 800);
      }
    } else {
      // I get placement
      switchTurn(false);
      startCueBallPlacement();
    }
    syncAndFinish();
    return;
  }

  // Count valid pocketed balls for shooter
  let scoredValid = false;
  regularPocketed.forEach(b => {
    if (iJustShot) {
      const myGrp = isP1 ? p1Group : p2Group;
      const isMyBall = !myGrp
        || (myGrp === 'solid' && SOLID_NUMS.has(b.num))
        || (myGrp === 'stripe' && STRIPE_NUMS.has(b.num));
      if (isMyBall) {
        const arr = isP1 ? p1Pocketed : p2Pocketed;
        if (!arr.includes(b.num)) { arr.push(b.num); scoredValid = true; }
      } else {
        const arr = isP1 ? p2Pocketed : p1Pocketed;
        if (!arr.includes(b.num)) arr.push(b.num);
      }
    } else {
      const theirGrp = isP1 ? p2Group : p1Group;
      const isTheirBall = !theirGrp
        || (theirGrp === 'solid' && SOLID_NUMS.has(b.num))
        || (theirGrp === 'stripe' && STRIPE_NUMS.has(b.num));
      if (isTheirBall) {
        const arr = isP1 ? p2Pocketed : p1Pocketed;
        if (!arr.includes(b.num)) arr.push(b.num);
      } else {
        const arr = isP1 ? p1Pocketed : p2Pocketed;
        if (!arr.includes(b.num)) arr.push(b.num);
      }
    }
  });

  updateGraphUI();

  // Keep turn if scored valid ball, else switch
  if (iJustShot) {
    if (!scoredValid) switchTurn(true);
    // else keep myTurn = true (already is)
  } else {
    if (!scoredValid) switchTurn(false); // switch back to me
    // else keep opponent's turn
  }

  syncAndFinish();
}

function switchTurn(toOpponent) {
  myTurn = !toOpponent;
  updateTurnUI();
  if (vsAI && !myTurn && !gameOver) {
    setTimeout(aiMakeMove, 1200);
  }
}

function startCueBallPlacement() {
  placingCueBall = true;
  document.getElementById('cuePanel').classList.add('hidden');
  document.getElementById('placementMsg').style.display = 'block';
}

async function syncAndFinish() {
  shootingLocked = false;
  updateTurnUI();
  renderAll();
  if (!myTurn) {
    document.getElementById('cuePanel').classList.add('hidden');
    document.getElementById('spectateMsg').style.display = 'block';
    setTimeout(() => { document.getElementById('spectateMsg').style.display = 'none'; }, 800);
  } else if (!placingCueBall) {
    document.getElementById('cuePanel').classList.remove('hidden');
  }
  await pushStateToServer();
}

function updateTurnUI() {
  document.getElementById('p1Turn').classList.toggle('show', myTurn && !gameOver);
  document.getElementById('p2Turn').classList.toggle('show', !myTurn && !gameOver);
  document.getElementById('p1Av').classList.toggle('active', myTurn);
  document.getElementById('p2Av').classList.toggle('active', !myTurn);
  document.getElementById('shootBtn').disabled = !myTurn || shootingLocked;

  const status = gameOver ? 'დასრულდა' : (myTurn ? 'შენი სვლაა' : 'მოწინააღმდეგის სვლა...');
  document.getElementById('ghStatus').textContent = status;
}

// ============================================================
//  GRAPH UI
// ============================================================
const BALL_GRAPH_COLORS = Object.assign({}, BALL_COLORS);

function updateGraphUI() {
  const myPocketed = isP1 ? p1Pocketed : p2Pocketed;
  const theirPocketed = isP1 ? p2Pocketed : p1Pocketed;

  renderBallsRow('bg1Balls', myPocketed, isP1 ? p1Group : p2Group);
  renderBallsRow('bg2Balls', theirPocketed, isP1 ? p2Group : p1Group);

  // Mini balls in player bar
  renderMiniBalls('p1BallsMini', myPocketed);
  renderMiniBalls('p2BallsMini', theirPocketed);
}

function renderBallsRow(elId, pocketed, group) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = '';
  const nums = group === 'stripe' ? [9,10,11,12,13,14,15,8] : [1,2,3,4,5,6,7,8];
  nums.forEach(n => {
    const d = document.createElement('div');
    d.className = 'bg-ball' + (pocketed.includes(n) ? '' : ' empty');
    d.style.background = pocketed.includes(n) ? (BALL_COLORS[n] || '#888') : 'var(--panel2)';
    d.textContent = pocketed.includes(n) ? n : '';
    el.appendChild(d);
  });
}

function renderMiniBalls(elId, pocketed) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = '';
  pocketed.forEach(n => {
    const d = document.createElement('div');
    d.className = 'mini-ball';
    d.style.background = BALL_COLORS[n] || '#888';
    el.appendChild(d);
  });
}

// ============================================================
//  GAME END
// ============================================================
async function endGame(iWon, reason) {
  if (gameOver) return;
  gameOver = true;
  shootingLocked = true;

  if (iWon) p1Wins++; else p2Wins++;
  document.getElementById('p1Score').textContent = isP1 ? p1Wins : p2Wins;
  document.getElementById('p2Score').textContent = isP1 ? p2Wins : p1Wins;

  const overlay = document.getElementById('winOverlay');
  overlay.classList.add('show');
  document.getElementById('winEmoji').textContent = iWon ? '🏆' : '😔';
  document.getElementById('winTitle').textContent = iWon ? 'გამარჯვება!' : 'წაგება';
  document.getElementById('winSub').textContent = reason || '';

  // Update billiard_score in DB
  if (iWon) {
    const newScore = (MYPROF?.billiard_score || 0) + 5;
    await sb.from('profiles').update({ billiard_score: newScore }).eq('id', ME.id);
    MYPROF = { ...MYPROF, billiard_score: newScore };
  }

  if (!vsAI) {
    await sb.from('billiard_games').update({
      status: 'finished',
      winner_id: iWon ? ME.id : (isP1 ? opponent?.id : opponent?.id),
      p1_wins: p1Wins,
      p2_wins: p2Wins
    }).eq('id', gameId);
  }

  chatSystem(iWon ? '🏆 ' + (MYPROF.username || 'შენ') + ' გაიმარჯვა!' : '😔 ' + (opponent?.username || '?') + ' გაიმარჯვა!');
}

function handleRemoteWin(row) {
  if (gameOver) return;
  const iWon = row.winner_id === ME.id;
  endGame(iWon, iWon ? 'გამარჯვება!' : 'წაგება');
}

async function playAgain() {
  document.getElementById('winOverlay').classList.remove('show');
  gameOver = false;
  shootingLocked = false;
  placingCueBall = false;
  initBalls();
  myTurn = isP1;
  updateTurnUI();
  document.getElementById('cuePanel').classList.remove('hidden');
  renderAll();
  if (!vsAI) await pushStateToServer({ status: 'active' });
}

function goToLobby() {
  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('lobby').classList.remove('hidden');
  showLobbyMain();
  gameOver = false;
  shootingLocked = false;
  if (gameCh) { try { sb.removeChannel(gameCh); } catch(e) {} gameCh = null; }
  if (chatCh) { try { sb.removeChannel(chatCh); } catch(e) {} chatCh = null; }
}

function confirmLeave() {
  if (confirm('დარწმუნებული ხარ? თამაში წყდება.')) {
    if (!gameOver) endGame(false, 'გასვლა');
    setTimeout(goToLobby, 800);
  }
}

//  CHAT
// ============================================================
function subscribeChat() {
  if (!gameId || vsAI) return;
  chatCh = sb.channel('billiard_chat_' + gameId)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'billiard_games', filter: `id=eq.${gameId}` }, async p => {
      try {
        const msgs = JSON.parse(p.new.chat || '[]');
        renderChatMsgs(msgs);
      } catch(e) {}
    })
    .subscribe();
}

async function loadChatHistory(gid) {
  const { data } = await sb.from('billiard_games').select('chat').eq('id', gid).single();
  if (data?.chat) {
    try { renderChatMsgs(JSON.parse(data.chat)); } catch(e) {}
  }
}

async function sendChat() {
  const inp = document.getElementById('chatInput');
  const txt = inp.value.trim();
  if (!txt || !gameId) return;
  inp.value = '';

  const msg = { uid: ME.id, nick: MYPROF.username || '?', text: txt, t: Date.now() };

  if (vsAI) {
    appendChatMsg(msg, true);
    return;
  }

  const { data } = await sb.from('billiard_games').select('chat').eq('id', gameId).single();
  const msgs = JSON.parse(data?.chat || '[]');
  msgs.push(msg);
  if (msgs.length > 100) msgs.shift();
  await sb.from('billiard_games').update({ chat: JSON.stringify(msgs) }).eq('id', gameId);
  appendChatMsg(msg, true);
}

function renderChatMsgs(msgs) {
  const el = document.getElementById('chatMsgs');
  const wasBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
  el.innerHTML = '';
  msgs.forEach(m => appendChatMsg(m, false));
  if (wasBottom) el.scrollTop = el.scrollHeight;
}

function appendChatMsg(m, scroll) {
  const el = document.getElementById('chatMsgs');
  const isMe = m.uid === ME.id;
  const isSystem = m.uid === 'system';
  const d = document.createElement('div');
  d.className = 'cm ' + (isSystem ? 'system' : isMe ? 'mine' : 'other');
  if (!isSystem) {
    d.innerHTML = `<div class="cm-nick">${esc(m.nick)}</div><div class="cm-text">${renderChatContent(m.text)}</div>`;
  } else {
    d.innerHTML = `<div class="cm-text">${esc(m.text)}</div>`;
  }
  el.appendChild(d);
  if (scroll) el.scrollTop = el.scrollHeight;
}

async function chatSystem(text) {
  const msg = { uid: 'system', nick: '', text, t: Date.now() };
  appendChatMsg(msg, true);
  if (!vsAI && gameId) {
    const { data } = await sb.from('billiard_games').select('chat').eq('id', gameId).single();
    const msgs = JSON.parse(data?.chat || '[]');
    msgs.push(msg);
    await sb.from('billiard_games').update({ chat: JSON.stringify(msgs) }).eq('id', gameId);
  }
}

function renderChatContent(s) {
  if (!s) return '';
  let h = esc(s);
  h = h.replace(/\[e:(\d+)\]/g, (m, id) => {
    const url = emojiCache[parseInt(id)];
    if (!url) return m;
    if (url.startsWith('http') || url.startsWith('data:')) {
      return `<img src="${url}" style="width:28px;height:28px;vertical-align:middle;border-radius:4px">`;
    }
    return `<span class="chat-emoji-text">${url}</span>`;
  });
  return h;
}

// ============================================================
//  EMOJI PANEL (CHAT)
// ============================================================
function buildCepGrid() {
  const grid = document.getElementById('cepGrid');
  if (!grid) return;
  grid.innerHTML = '';
  customEmojis.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'cep-btn';
    const isImg = em.url && (em.url.startsWith('http') || em.url.startsWith('data:'));
    if (isImg) {
      btn.innerHTML = `<img src="${em.url}" style="width:30px;height:30px;object-fit:contain">`;
    } else {
      btn.innerHTML = `<span class="em-text">${em.url || '?'}</span>`;
    }
    btn.addEventListener('click', () => {
      const inp = document.getElementById('chatInput');
      inp.value += isImg ? `[e:${em.id}]` : em.url;
      inp.focus();
    });
    grid.appendChild(btn);
  });
}

function toggleChatEmo() {
  document.getElementById('chatEmoPanel').classList.toggle('open');
}

document.addEventListener('click', e => {
  const p = document.getElementById('chatEmoPanel');
  if (p && p.classList.contains('open') && !p.contains(e.target) && !e.target.closest('.chat-em-btn')) {
    p.classList.remove('open');
  }
});

// ============================================================
//  UTIL
// ============================================================
function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:99999;box-shadow:0 6px 24px rgba(0,0,0,.4);pointer-events:none;white-space:nowrap;font-family:Noto Sans Georgian,sans-serif';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============================================================
//  START
// ============================================================
init();
</script>
