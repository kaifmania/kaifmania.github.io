<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ბილიარდი · კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--panel2:#21262d;--border:rgba(100,200,100,0.25);
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --green:#4ade80;--green2:#22c55e;--green-f:rgba(74,222,128,0.12);--green-glow:rgba(74,222,128,0.3);
  --felt:#1a4a2a;--felt2:#16401f;--rail:#8B4513;--rail2:#a0522d;
  --ball-1:#f5f5f5;--ball-2:#e8c619;--ball-3:#1565C0;--ball-4:#c62828;--ball-5:#6a1b9a;
  --ball-6:#e65100;--ball-7:#00695c;--ball-8:#212121;
}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* NAV */
#topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.tb-logo{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:900;color:var(--green);letter-spacing:1px;cursor:pointer;text-decoration:none}
.tb-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.tb-title{font-size:13px;font-weight:600;color:var(--text)}
.tb-spacer{flex:1}
.tb-btn{height:34px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0 12px;transition:all .2s;white-space:nowrap;font-family:'Noto Sans Georgian',sans-serif}
.tb-btn:hover{background:var(--green-f);border-color:var(--green);color:var(--text)}
.tb-btn.active{background:var(--green-f);border-color:var(--green);color:var(--green)}
.user-chip{display:flex;align-items:center;gap:7px;padding:4px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;color:var(--text2)}
.user-chip .av{width:24px;height:24px;border-radius:50%;background:var(--green-f);border:1px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;overflow:hidden;flex-shrink:0}
.user-chip .av img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* LAYOUT */
#app{display:flex;flex:1;min-height:0}
#gameSide{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
#chatSide{width:280px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s}
#chatSide.collapsed{width:0;overflow:hidden}

/* GAME AREA */
#gameArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px;overflow:hidden}

/* STATUS BAR */
#statusBar{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 20px;background:var(--panel2);border:1px solid var(--border);border-radius:30px;font-size:12px;flex-wrap:wrap}
.status-player{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;border:2px solid transparent;transition:all .3s}
.status-player.active{border-color:var(--green);background:var(--green-f);box-shadow:0 0 12px var(--green-glow)}
.status-player .sp-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;border:2px solid var(--border)}
.status-player .sp-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.status-player .sp-name{font-weight:600;font-size:12px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-player .sp-balls{font-size:10px;color:var(--text2)}
.vs-badge{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px}
#turnTimer{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;color:var(--green);min-width:32px;text-align:center}
#turnTimer.urgent{color:#f87171;animation:timerPulse .5s ease infinite alternate}
@keyframes timerPulse{from{opacity:1}to{opacity:.5}}

/* BILLIARDS TABLE */
#tableWrap{position:relative;display:flex;align-items:center;justify-content:center}
#tableOuter{border-radius:18px;background:var(--rail);padding:18px;box-shadow:0 0 60px rgba(0,0,0,.8),0 0 30px var(--green-glow),inset 0 2px 4px rgba(255,255,255,.1);position:relative}
#tableOuter::before{content:'';position:absolute;inset:6px;border-radius:14px;border:3px solid var(--rail2);pointer-events:none;z-index:10}
#billiardCanvas{display:block;border-radius:10px;cursor:crosshair;touch-action:none}

/* POWER BAR */
#powerWrap{display:flex;align-items:center;gap:10px;width:100%;max-width:600px}
#powerLabel{font-size:10px;color:var(--text2);font-family:'Unbounded',sans-serif;letter-spacing:1px;min-width:50px;text-align:center}
#powerBar{flex:1;height:10px;background:var(--panel2);border-radius:5px;border:1px solid var(--border);overflow:hidden;position:relative}
#powerFill{height:100%;width:0%;background:linear-gradient(90deg,var(--green2),var(--green),#fbbf24,#f87171);border-radius:5px;transition:width .05s}
#powerNum{font-family:'Unbounded',sans-serif;font-size:10px;color:var(--green);min-width:36px;text-align:right}

/* WAITING OVERLAY */
#waitOverlay{position:absolute;inset:0;background:rgba(13,17,23,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:200;border-radius:10px;backdrop-filter:blur(4px)}
.wait-icon{font-size:60px;animation:waitFloat 2s ease-in-out infinite}
@keyframes waitFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.wait-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;color:var(--text)}
.wait-sub{font-size:13px;color:var(--text2);text-align:center;max-width:280px;line-height:1.6}
.wait-code{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;color:var(--green);letter-spacing:8px;text-shadow:0 0 20px var(--green-glow);padding:10px 20px;background:var(--green-f);border:1px solid var(--green);border-radius:12px}
.wait-btn{padding:11px 28px;border-radius:30px;border:none;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .2s}
.wait-btn.primary{background:linear-gradient(135deg,var(--green2),var(--green));color:#052e16;box-shadow:0 4px 20px var(--green-glow)}
.wait-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--green-glow)}
.wait-btn.secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text2)}
.wait-btn.secondary:hover{background:var(--border);color:var(--text)}
#inviteForm{display:flex;gap:8px;align-items:center}
#inviteInp{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-size:13px;font-family:'Noto Sans Georgian',sans-serif;outline:none;width:180px}
#inviteInp:focus{border-color:var(--green)}
#inviteInp::placeholder{color:var(--text3)}

/* INVITE TOAST */
.inv-toast{position:fixed;top:70px;right:16px;background:var(--panel);border:1px solid var(--green);border-radius:18px;padding:14px 18px;z-index:99999;box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px var(--green-glow);min-width:280px;max-width:320px;animation:invSlide .4s cubic-bezier(.22,1,.36,1)}
@keyframes invSlide{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
.inv-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.inv-av{width:36px;height:36px;border-radius:50%;background:var(--green-f);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0}
.inv-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.inv-title{font-size:12px;font-weight:700;color:var(--green);font-family:'Unbounded',sans-serif}
.inv-name{font-size:13px;color:var(--text);font-weight:600}
.inv-actions{display:flex;gap:8px;margin-top:8px}
.inv-act{flex:1;padding:8px;border-radius:10px;border:none;font-size:12px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;font-weight:600;transition:all .15s}
.inv-acc{background:linear-gradient(135deg,var(--green2),var(--green));color:#052e16}
.inv-dec{background:rgba(220,0,0,.12);border:1px solid rgba(220,0,0,.25);color:#f87171}
.inv-acc:hover{transform:scale(1.03)}
.inv-dec:hover{background:rgba(220,0,0,.2)}

/* GAME OVER */
#gameOverOverlay{position:absolute;inset:0;background:rgba(13,17,23,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;border-radius:10px;backdrop-filter:blur(6px)}
#gameOverOverlay.show{display:flex;animation:goAnim .5s ease}
@keyframes goAnim{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.go-trophy{font-size:72px;animation:trophyBounce 1s ease-in-out infinite}
@keyframes trophyBounce{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.1) rotate(5deg)}}
.go-title{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;text-align:center}
.go-sub{font-size:14px;color:var(--text2);text-align:center}

/* CHAT */
#chatHeader{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:linear-gradient(135deg,var(--green-f),transparent)}
#chatHeader .ch-title{font-family:'Unbounded',sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--green);text-transform:uppercase;flex:1}
.ch-toggle{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;padding:3px 8px;cursor:pointer;transition:all .2s}
.ch-toggle:hover{background:var(--green-f);color:var(--green)}
#chatMsgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:4px}
#chatMsgs::-webkit-scrollbar{width:3px}
#chatMsgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.c-msg{padding:6px 10px;border-radius:10px;font-size:12px;line-height:1.5;word-break:break-word;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.c-msg.sys{color:var(--green);background:var(--green-f);border:1px solid rgba(74,222,128,.15);text-align:center;font-style:italic;font-size:11px}
.c-msg .c-nick{font-weight:700;color:var(--green);margin-bottom:2px;font-size:11px}
.c-msg .c-text{color:var(--text)}
.c-msg.mine .c-nick{color:#60a5fa}
#chatBar{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0}
#chatInp{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:8px 11px;color:var(--text);font-size:12px;font-family:'Noto Sans Georgian',sans-serif;outline:none}
#chatInp:focus{border-color:var(--green)}
#chatInp::placeholder{color:var(--text3)}
#chatSend{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--green2),var(--green));border:none;color:#052e16;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
#chatSend:hover{transform:scale(1.08)}

/* BALLS TRAY */
#ballsRow{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.ball-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;transition:all .3s;position:relative;box-shadow:inset -3px -2px 4px rgba(0,0,0,.4),inset 2px 1px 4px rgba(255,255,255,.3)}
.ball-dot.potted{opacity:.25;transform:scale(.7)}
.ball-dot.stripe::after{content:'';position:absolute;top:25%;left:0;right:0;height:50%;background:white;opacity:.35;border-radius:0}

/* POCKET HOLES on canvas - done in JS */

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:10000;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:20px;width:100%;max-width:380px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px var(--green-glow);animation:mFloat .4s cubic-bezier(.34,1.3,.64,1)}
@keyframes mFloat{from{opacity:0;transform:translateY(30px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.m-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;letter-spacing:.5px}
.m-x{float:right;background:var(--panel2);border:1px solid var(--border);border-radius:8px;width:26px;height:26px;color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:-4px -4px 0 0}
.m-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;margin-bottom:14px}
.m-user{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;background:var(--panel2);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.m-user:hover{border-color:var(--green);background:var(--green-f)}
.m-user .av{width:32px;height:32px;border-radius:50%;background:var(--green-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.m-user .av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.m-user .info{flex:1;min-width:0}
.m-user .u-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-user .u-status{font-size:10px;color:var(--text2)}
.m-empty{color:var(--text3);font-size:12px;text-align:center;padding:20px 0}
.act-btn{width:100%;padding:11px;border-radius:12px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:6px;text-align:center}
.act-btn:hover{background:var(--green-f);border-color:var(--green)}
.act-btn.primary{background:linear-gradient(135deg,var(--green2),var(--green));border:none;color:#052e16;font-weight:700}
.act-btn.primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--green-glow)}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--green2),var(--green));color:#052e16;padding:9px 20px;border-radius:20px;font-size:13px;z-index:99999;box-shadow:0 4px 20px var(--green-glow);pointer-events:none;animation:toastIn .3s ease;white-space:nowrap;font-weight:600}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(max-width:700px){
  #chatSide{position:fixed;right:0;top:0;bottom:0;z-index:150;width:260px!important;transform:translateX(100%);transition:transform .3s}
  #chatSide.mobile-open{transform:translateX(0)}
  #chatSide.collapsed{width:260px!important;transform:translateX(100%)}
  #billiardCanvas{max-width:calc(100vw - 32px)}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <a class="tb-logo" href="index.html">🔥 კაიფ</a>
  <div class="tb-sep"></div>
  <div class="tb-title">💜 ბილიარდი</div>
  <div class="tb-spacer"></div>
  <div id="myChip" class="user-chip"><div class="av" id="myAv">👤</div><span id="myName">...</span></div>
  <button class="tb-btn" id="inviteBtn" onclick="openInviteModal()">👥 მოწვევა</button>
  <button class="tb-btn" id="chatToggle" onclick="toggleChat()">💬 ჩატი</button>
</div>

<div id="app">
  <!-- GAME SIDE -->
  <div id="gameSide">
    <div id="gameArea">
      <!-- STATUS -->
      <div id="statusBar">
        <div class="status-player active" id="sp1">
          <div class="sp-av" id="sp1av">👤</div>
          <div>
            <div class="sp-name" id="sp1name">მოთამაშე 1</div>
            <div class="sp-balls" id="sp1balls">🎱 0/7</div>
          </div>
        </div>
        <div class="vs-badge">VS</div>
        <div id="turnTimer">30</div>
        <div class="vs-badge">VS</div>
        <div class="status-player" id="sp2">
          <div class="sp-av" id="sp2av">👤</div>
          <div>
            <div class="sp-name" id="sp2name">მოთამაშე 2</div>
            <div class="sp-balls" id="sp2balls">🎱 0/7</div>
          </div>
        </div>
      </div>

      <!-- BALLS TRAY -->
      <div id="ballsRow"></div>

      <!-- TABLE -->
      <div id="tableWrap">
        <div id="tableOuter">
          <canvas id="billiardCanvas"></canvas>
          <div id="waitOverlay">
            <span class="wait-icon">🎱</span>
            <div class="wait-title">ბილიარდი</div>
            <div class="wait-sub" id="waitSub">მოემზადე სათამაშოდ! მოიწვიე მეგობარი ბილიარდის სათამაშოდ.</div>
            <div id="waitActions">
              <button class="wait-btn primary" onclick="startVsAI()">🤖 AI-სთან თამაში</button>
              <button class="wait-btn secondary" onclick="openInviteModal()">👥 მეგობრის მოწვევა</button>
            </div>
          </div>
          <div id="gameOverOverlay">
            <div class="go-trophy" id="goTrophy">🏆</div>
            <div class="go-title" id="goTitle">გამარჯვებული!</div>
            <div class="go-sub" id="goSub"></div>
            <button class="wait-btn primary" onclick="resetGame()" style="margin-top:8px">🔄 თავიდან</button>
          </div>
        </div>
      </div>

      <!-- POWER BAR -->
      <div id="powerWrap">
        <div id="powerLabel">ძალა</div>
        <div id="powerBar"><div id="powerFill"></div></div>
        <div id="powerNum">0%</div>
      </div>
    </div>
  </div>

  <!-- CHAT SIDE -->
  <div id="chatSide">
    <div id="chatHeader">
      <span style="font-size:16px">💬</span>
      <span class="ch-title">ჩატი</span>
      <button class="ch-toggle" onclick="toggleChat()">✕</button>
    </div>
    <div id="chatMsgs"></div>
    <div id="chatBar">
      <input id="chatInp" placeholder="შეტყობინება..." onkeydown="if(event.key==='Enter')sendChat()">
      <button id="chatSend" onclick="sendChat()">✈️</button>
    </div>
  </div>
</div>

<!-- INVITE MODAL -->
<div class="overlay" id="inviteOverlay" onclick="bgClose(event,'inviteOverlay')">
  <div class="modal">
    <div class="m-title">👥 მეგობრის მოწვევა <button class="m-x" onclick="closeModal('inviteOverlay')">✕</button></div>
    <div class="m-list" id="inviteUserList"></div>
    <div class="m-empty hidden" id="inviteEmpty">ონლაინ მეგობარი არ არის 😢</div>
    <button class="act-btn" onclick="closeModal('inviteOverlay')">დახურვა</button>
  </div>
</div>

<script>
const {createClient} = supabase;
const sb = createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

let ME = null, MYPROF = null;
let allUsers = [], myFriends = [];
let gameState = null; // 'waiting'|'playing'|'gameover'
let vsAI = false;
let myTurn = false;
let turnTimer = 30, timerInterval = null;
let inviteChannel = null, gameChannel = null, chatChannel = null;
let currentGameId = null;
let opponent = null;
let chatOpen = true;

/* ======= BILLIARDS ENGINE ======= */
const TABLE_W = 560, TABLE_H = 280;
const POCKET_R = 16;
const FRICTION = 0.985;
const CUE_BALL_R = 10;
const BALL_R = 10;
const BALL_COLORS = ['#f5f5f5','#e8c619','#1565C0','#c62828','#7b1fa2','#e65100','#00695c','#212121',
  '#e8c619','#1565C0','#c62828','#7b1fa2','#e65100','#00695c','#f5f5f5'];
const BALL_STRIPES = [false,false,false,false,false,false,false,false,false,true,true,true,true,true,true,true];
const POCKET_POSITIONS = [
  {x:POCKET_R,y:POCKET_R},{x:TABLE_W/2,y:POCKET_R/2},{x:TABLE_W-POCKET_R,y:POCKET_R},
  {x:POCKET_R,y:TABLE_H-POCKET_R},{x:TABLE_W/2,y:TABLE_H-POCKET_R/2},{x:TABLE_W-POCKET_R,y:TABLE_H-POCKET_R}
];

let balls = []; // {x,y,vx,vy,r,color,number,isStripe,potted,isCue}
let aimAngle = 0, power = 0, isAiming = false, shooting = false;
let mousePos = {x:0,y:0};
let playerBallType = null; // null|'solid'|'stripe' per player
let scores = [0,0]; // [p1,p2]
let pottedByPlayer = [[],[]]; // balls potted by each player
let activePlayer = 0; // 0 or 1
let canvas, ctx;
let animFrame;
let isShooting = false;
let chargeStart = null, chargeInterval = null;
let isCharging = false;
let aiTimeout = null;

function initTable(){
  canvas = document.getElementById('billiardCanvas');
  canvas.width = TABLE_W;
  canvas.height = TABLE_H;
  ctx = canvas.getContext('2d');
  resetBalls();
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('touchmove', onTouchMove, {passive:false});
  canvas.addEventListener('touchstart', onTouchStart, {passive:false});
  canvas.addEventListener('touchend', onTouchEnd, {passive:false});
  renderLoop();
}

function resetBalls(){
  balls = [];
  // Cue ball
  balls.push({x:TABLE_W*0.25,y:TABLE_H/2,vx:0,vy:0,r:BALL_R,color:BALL_COLORS[0],number:0,isStripe:false,potted:false,isCue:true});
  // Rack
  const cx = TABLE_W*0.65, cy = TABLE_H/2;
  const spacing = BALL_R*2.1;
  const rack = [
    [0,0],[1,0],[1,1],[2,0],[2,1],[2,2],[3,0],[3,1],[3,2],[3,3],[4,0],[4,1],[4,2],[4,3],[4,4]
  ];
  const order = [1,9,2,10,3,8,11,4,12,5,13,6,14,7,15];
  rack.forEach(([row,col],i)=>{
    const bx = cx + row*spacing*0.87;
    const by = cy + (col - row/2)*spacing;
    const num = order[i];
    balls.push({
      x:bx,y:by,vx:0,vy:0,r:BALL_R,
      color:BALL_COLORS[num],number:num,
      isStripe:BALL_STRIPES[num],
      potted:false,isCue:false
    });
  });
}

function getCueBall(){ return balls.find(b=>b.isCue&&!b.potted); }

function onMouseMove(e){
  const rect = canvas.getBoundingClientRect();
  const scaleX = TABLE_W / rect.width;
  const scaleY = TABLE_H / rect.height;
  mousePos = {x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
  if(gameState==='playing'&&myTurn&&!isShooting){
    const cb = getCueBall();
    if(cb){ aimAngle = Math.atan2(mousePos.y-cb.y, mousePos.x-cb.x); }
  }
}
function onTouchMove(e){
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = TABLE_W/rect.width, scaleY = TABLE_H/rect.height;
  mousePos = {x:(t.clientX-rect.left)*scaleX, y:(t.clientY-rect.top)*scaleY};
  const cb = getCueBall();
  if(cb&&gameState==='playing'&&myTurn&&!isShooting) aimAngle=Math.atan2(mousePos.y-cb.y,mousePos.x-cb.x);
}
function onTouchStart(e){
  e.preventDefault();
  onTouchMove(e);
  startCharge();
}
function onTouchEnd(e){
  e.preventDefault();
  releaseShot();
}
function onMouseDown(e){
  if(e.button===0) startCharge();
}
function onMouseUp(e){
  if(e.button===0) releaseShot();
}
function startCharge(){
  if(gameState!=='playing'||!myTurn||isShooting) return;
  isCharging = true;
  chargeStart = Date.now();
  chargeInterval = setInterval(()=>{
    const elapsed = Math.min((Date.now()-chargeStart)/1500,1);
    power = elapsed;
    document.getElementById('powerFill').style.width=(power*100)+'%';
    document.getElementById('powerNum').textContent=Math.round(power*100)+'%';
  },30);
}
function releaseShot(){
  if(!isCharging) return;
  clearInterval(chargeInterval);
  isCharging = false;
  if(gameState==='playing'&&myTurn&&!isShooting){
    shoot(power);
  }
  power=0;
  document.getElementById('powerFill').style.width='0%';
  document.getElementById('powerNum').textContent='0%';
}
function shoot(p){
  const cb = getCueBall();
  if(!cb) return;
  isShooting = true;
  const speed = 14*p;
  cb.vx = Math.cos(aimAngle)*speed;
  cb.vy = Math.sin(aimAngle)*speed;
  myTurn = false;
  if(gameChannel&&!vsAI) broadcastShot(aimAngle, p);
}

function broadcastShot(angle, p){
  if(!gameChannel||!currentGameId) return;
  gameChannel.send({type:'broadcast',event:'shot',payload:{angle,power:p,gameId:currentGameId}});
}

function applyOpponentShot(angle, p){
  const cb = getCueBall();
  if(!cb) return;
  const speed = 14*p;
  cb.vx = Math.cos(angle)*speed;
  cb.vy = Math.sin(angle)*speed;
  isShooting = true;
  myTurn = false;
}

let pottedThisTurn = [];
let foulThisTurn = false;

function physicsStep(){
  pottedThisTurn = [];
  foulThisTurn = false;
  const moving = balls.filter(b=>!b.potted&&(Math.abs(b.vx)>0.05||Math.abs(b.vy)>0.05));
  moving.forEach(b=>{
    b.x += b.vx; b.y += b.vy;
    b.vx *= FRICTION; b.vy *= FRICTION;
    // Wall collisions
    if(b.x-b.r<0){b.x=b.r;b.vx*=-0.8;}
    if(b.x+b.r>TABLE_W){b.x=TABLE_W-b.r;b.vx*=-0.8;}
    if(b.y-b.r<0){b.y=b.r;b.vy*=-0.8;}
    if(b.y+b.r>TABLE_H){b.y=TABLE_H-b.r;b.vy*=-0.8;}
  });
  // Ball-ball collisions
  for(let i=0;i<balls.length;i++){
    if(balls[i].potted) continue;
    for(let j=i+1;j<balls.length;j++){
      if(balls[j].potted) continue;
      const dx=balls[j].x-balls[i].x, dy=balls[j].y-balls[i].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minDist=balls[i].r+balls[j].r;
      if(dist<minDist&&dist>0){
        const nx=dx/dist,ny=dy/dist;
        const overlap=(minDist-dist)/2;
        balls[i].x-=nx*overlap;balls[i].y-=ny*overlap;
        balls[j].x+=nx*overlap;balls[j].y+=ny*overlap;
        const dvx=balls[i].vx-balls[j].vx,dvy=balls[i].vy-balls[j].vy;
        const dot=dvx*nx+dvy*ny;
        if(dot>0){
          balls[i].vx-=dot*nx;balls[i].vy-=dot*ny;
          balls[j].vx+=dot*nx;balls[j].vy+=dot*ny;
        }
      }
    }
  }
  // Pocket detection
  balls.forEach(b=>{
    if(b.potted) return;
    for(const p of POCKET_POSITIONS){
      const dx=b.x-p.x,dy=b.y-p.y;
      if(Math.sqrt(dx*dx+dy*dy)<POCKET_R*0.9){
        b.potted=true; b.vx=0; b.vy=0;
        pottedThisTurn.push(b);
        break;
      }
    }
  });
  // Check if all balls stopped
  const anyMoving=balls.filter(b=>!b.potted).some(b=>Math.abs(b.vx)>0.08||Math.abs(b.vy)>0.08);
  if(!anyMoving&&isShooting){
    isShooting=false;
    onTurnEnd();
  }
}

function onTurnEnd(){
  // Process potted balls
  pottedThisTurn.forEach(b=>{
    if(b.isCue){
      foulThisTurn=true;
      // Respawn cue ball
      setTimeout(()=>{
        b.potted=false;
        b.x=TABLE_W*0.25; b.y=TABLE_H/2;
        b.vx=0;b.vy=0;
        sysChat('⚪ ფული! ბურთი ხელახლა.');
      },600);
    } else if(b.number===8){
      // 8-ball potted
      const curPlayer=activePlayer;
      const hasAllBalls=pottedByPlayer[curPlayer].length>=7;
      if(hasAllBalls){
        endGame(curPlayer, false);
      } else {
        endGame(1-curPlayer, false);
        sysChat('🖤 8 ბურთი ადრე — '+(['მოთ.1','მოთ.2'][1-curPlayer])+' გაიმარჯვა!');
      }
      return;
    } else {
      // Assign ball type
      if(!playerBallType){
        if(b.isStripe){playerBallType=[activePlayer,'stripe']; }
        else{playerBallType=[activePlayer,'solid'];}
      }
      pottedByPlayer[activePlayer].push(b.number);
      scores[activePlayer]++;
    }
  });
  // Check win
  if(checkWin()) return;
  updateScoreUI();
  // Turn switch
  const scoredThisTurn=pottedThisTurn.filter(b=>!b.isCue&&b.number!==8).length;
  if(scoredThisTurn===0||foulThisTurn){
    // Switch player
    activePlayer=1-activePlayer;
    switchTurn();
  } else {
    switchTurn();
  }
}

function checkWin(){
  const p1Balls=pottedByPlayer[0].length;
  const p2Balls=pottedByPlayer[1].length;
  if(p1Balls>=7){
    const eight=balls.find(b=>b.number===8);
    if(eight&&eight.potted){ endGame(0,true); return true; }
  }
  if(p2Balls>=7){
    const eight=balls.find(b=>b.number===8);
    if(eight&&eight.potted){ endGame(1,true); return true; }
  }
  return false;
}

function endGame(winnerIdx, isLegit){
  gameState='gameover';
  clearTurnTimer();
  const names=[document.getElementById('sp1name').textContent, document.getElementById('sp2name').textContent];
  const winner=names[winnerIdx];
  document.getElementById('goTrophy').textContent=isLegit?'🏆':'🎱';
  document.getElementById('goTitle').textContent=winner+' — გაიმარჯვა!';
  document.getElementById('goSub').textContent=isLegit?'სუფთა გამარჯვება! ყველა ბურთი + 8 ბურთი.':'ოპონენტმა 8 ბურთი გაუშვა ვადამდე.';
  document.getElementById('gameOverOverlay').classList.add('show');
  sysChat('🏆 '+winner+' გაიმარჯვა!');
  // Save score if this player won (player index 0 = local player in both modes)
  const localWon = (winnerIdx === 0);
  if(ME && MYPROF && localWon){
    const newScore = (MYPROF.billiard_score||0) + 1;
    MYPROF.billiard_score = newScore;
    await sb.from('profiles').update({billiard_score: newScore}).eq('id', ME.id);
    // Notify chat.html (opener) to refresh score UI
    try{ if(window.opener && !window.opener.closed) window.opener.postMessage({type:'game_score',field:'billiard_score',value:1},'*'); }catch(e){}
    toast('🏆 +1 ქულა! სულ: '+newScore);
  }
}

function switchTurn(){
  if(gameState!=='playing') return;
  startTurnTimer();
  if((activePlayer===0&&!vsAI)||(vsAI&&activePlayer===0)){
    myTurn=true;
    sysChat('🎱 შენი ჯერია!');
  } else if(vsAI&&activePlayer===1){
    myTurn=false;
    aiMove();
  } else {
    myTurn=false;
    sysChat('🎱 ოპონენტის ჯერია...');
  }
  document.getElementById('sp1').classList.toggle('active',activePlayer===0);
  document.getElementById('sp2').classList.toggle('active',activePlayer===1);
}

function aiMove(){
  clearTimeout(aiTimeout);
  aiTimeout=setTimeout(()=>{
    if(gameState!=='playing'||activePlayer!==1) return;
    const cb=getCueBall();
    if(!cb) return;
    // Find best target
    const targets=balls.filter(b=>!b.potted&&!b.isCue&&b.number!==8);
    if(!targets.length) return;
    const target=targets[Math.floor(Math.random()*targets.length)];
    const angle=Math.atan2(target.y-cb.y,target.x-cb.x)+(Math.random()-0.5)*0.3;
    const pwr=0.4+Math.random()*0.5;
    // Animate aim
    aimAngle=angle;
    isShooting=true;
    const speed=14*pwr;
    cb.vx=Math.cos(angle)*speed;
    cb.vy=Math.sin(angle)*speed;
    myTurn=false;
    if(gameChannel&&!vsAI) broadcastShot(angle,pwr);
  },1200);
}

function startTurnTimer(){
  clearTurnTimer();
  turnTimer=30;
  updateTimerUI();
  timerInterval=setInterval(()=>{
    turnTimer--;
    updateTimerUI();
    if(turnTimer<=5) document.getElementById('turnTimer').classList.add('urgent');
    else document.getElementById('turnTimer').classList.remove('urgent');
    if(turnTimer<=0){
      clearTurnTimer();
      // Force switch
      activePlayer=1-activePlayer;
      switchTurn();
      sysChat('⏰ დრო გავიდა! ჯერი გადავიდა.');
    }
  },1000);
}
function clearTurnTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById('turnTimer').classList.remove('urgent');
}
function updateTimerUI(){ document.getElementById('turnTimer').textContent=turnTimer; }

function renderLoop(){
  if(gameState==='playing') physicsStep();
  draw();
  animFrame=requestAnimationFrame(renderLoop);
}

function draw(){
  if(!ctx) return;
  // Felt
  ctx.fillStyle='#1a4a2a';
  ctx.fillRect(0,0,TABLE_W,TABLE_H);
  // Grid pattern
  ctx.strokeStyle='rgba(0,0,0,.08)';
  ctx.lineWidth=1;
  for(let x=0;x<TABLE_W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,TABLE_H);ctx.stroke();}
  for(let y=0;y<TABLE_H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(TABLE_W,y);ctx.stroke();}
  // Center line
  ctx.strokeStyle='rgba(255,255,255,.06)';
  ctx.lineWidth=2;
  ctx.setLineDash([10,10]);
  ctx.beginPath();ctx.moveTo(TABLE_W/2,0);ctx.lineTo(TABLE_W/2,TABLE_H);ctx.stroke();
  ctx.setLineDash([]);
  // Head string
  ctx.strokeStyle='rgba(255,255,255,.05)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(TABLE_W*0.25,TABLE_H/2,TABLE_H*0.35,0,Math.PI*2);ctx.stroke();
  // Pockets
  POCKET_POSITIONS.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,POCKET_R,0,Math.PI*2);
    ctx.fillStyle='#0a0a0a';ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.8)';ctx.lineWidth=2;ctx.stroke();
    // Inner glow
    const grad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,POCKET_R);
    grad.addColorStop(0,'rgba(0,0,0,.95)');
    grad.addColorStop(1,'rgba(20,20,20,.3)');
    ctx.fillStyle=grad;ctx.fill();
  });
  // Aim line
  if(gameState==='playing'&&myTurn&&!isShooting){
    const cb=getCueBall();
    if(cb){
      ctx.save();
      ctx.setLineDash([6,8]);
      ctx.strokeStyle='rgba(255,255,255,.3)';
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(cb.x,cb.y);
      const len=120;
      ctx.lineTo(cb.x+Math.cos(aimAngle)*len,cb.y+Math.sin(aimAngle)*len);
      ctx.stroke();
      ctx.setLineDash([]);
      // Arrow
      const ax=cb.x+Math.cos(aimAngle)*len,ay=cb.y+Math.sin(aimAngle)*len;
      ctx.beginPath();
      ctx.moveTo(ax,ay);
      ctx.lineTo(ax-Math.cos(aimAngle-0.4)*12,ay-Math.sin(aimAngle-0.4)*12);
      ctx.lineTo(ax-Math.cos(aimAngle+0.4)*12,ay-Math.sin(aimAngle+0.4)*12);
      ctx.closePath();
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.fill();
      // Cue stick
      const cueStart=Math.max(0,(power||0))*20+15;
      ctx.strokeStyle='rgba(200,150,80,.8)';
      ctx.lineWidth=4;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(cb.x-Math.cos(aimAngle)*cueStart,cb.y-Math.sin(aimAngle)*cueStart);
      ctx.lineTo(cb.x-Math.cos(aimAngle)*(cueStart+80),cb.y-Math.sin(aimAngle)*(cueStart+80));
      ctx.stroke();
      ctx.restore();
    }
  }
  // Balls
  balls.forEach(b=>{
    if(b.potted) return;
    ctx.save();
    // Shadow
    ctx.beginPath();ctx.arc(b.x+3,b.y+4,b.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fill();
    // Ball body
    const grad=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.05,b.x,b.y,b.r);
    grad.addColorStop(0,'rgba(255,255,255,.5)');
    grad.addColorStop(0.4,b.color);
    grad.addColorStop(1,darken(b.color,40));
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=grad;ctx.fill();
    // Stripe
    if(b.isStripe){
      ctx.save();
      ctx.clip();
      ctx.fillStyle='white';
      ctx.fillRect(b.x-b.r,b.y-b.r*0.35,b.r*2,b.r*0.7);
      ctx.restore();
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.strokeStyle=darken(b.color,30);ctx.lineWidth=1;ctx.stroke();
    }
    // Number circle
    if(b.number>0&&!b.isCue){
      ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.4,0,Math.PI*2);
      ctx.fillStyle=b.isStripe?b.color:'white';ctx.fill();
      ctx.font=`bold ${Math.round(b.r*0.5)}px monospace`;
      ctx.fillStyle=b.isStripe?'white':'#333';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(b.number,b.x,b.y);
    }
    // Cue ball shine
    if(b.isCue){
      ctx.beginPath();ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.25,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();
    }
    // Border
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  });
}

function darken(hex,amt){
  let r=parseInt(hex.slice(1,3),16)-amt,g=parseInt(hex.slice(3,5),16)-amt,b=parseInt(hex.slice(5,7),16)-amt;
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}

function updateScoreUI(){
  document.getElementById('sp1balls').textContent='🟡 '+pottedByPlayer[0].length+'/7';
  document.getElementById('sp2balls').textContent='🔵 '+pottedByPlayer[1].length+'/7';
  buildBallsRow();
}

function buildBallsRow(){
  const row=document.getElementById('ballsRow');
  row.innerHTML='';
  balls.slice(1).forEach(b=>{
    const dot=document.createElement('div');
    dot.className='ball-dot'+(b.potted?' potted':'')+(b.isStripe?' stripe':'');
    dot.style.background=b.color;
    dot.title='ბურთი '+b.number;
    row.appendChild(dot);
  });
}

function resetGame(){
  gameState='playing';
  document.getElementById('gameOverOverlay').classList.remove('show');
  document.getElementById('waitOverlay').style.display='none';
  resetBalls();
  scores=[0,0];
  pottedByPlayer=[[],[]];
  playerBallType=null;
  activePlayer=0;
  isShooting=false;
  aimAngle=0;
  buildBallsRow();
  updateScoreUI();
  switchTurn();
}

async function openInviteModal(){
  await loadOnlineFriends();
  openModal('inviteOverlay');
}

async function loadOnlineFriends(){
  const list=document.getElementById('inviteUserList');
  const empty=document.getElementById('inviteEmpty');
  list.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;padding:16px">⏳ იტვირთება...</div>';
  empty.classList.add('hidden');
  // Get online users (last_seen within 2 min)
  const {data}=await sb.from('profiles').select('*').neq('id',ME.id).order('username');
  const online=(data||[]).filter(u=>{
    if(!u.last_seen) return false;
    return Date.now()-new Date(u.last_seen).getTime()<120000;
  });
  list.innerHTML='';
  if(!online.length){
    empty.classList.remove('hidden');
    return;
  }
  online.forEach(u=>{
    const d=document.createElement('div');
    d.className='m-user';
    const avHtml=u.avatar_url?`<img src="${u.avatar_url}">`:(u.emotion||'😊');
    d.innerHTML=`<div class="av">${avHtml}</div><div class="info"><div class="u-name">${esc(u.username||'?')}</div><div class="u-status">🟢 ონლაინი</div></div><button style="padding:6px 14px;border-radius:8px;background:var(--green-f);border:1px solid var(--green);color:var(--green);font-size:11px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;white-space:nowrap" onclick="sendInvite('${u.id}','${esc(u.username||'')}',this)">📨 მოწვევა</button>`;
    list.appendChild(d);
  });
}

async function sendInvite(uid, nick, btn){
  if(!ME||!MYPROF) return;
  btn.disabled=true; btn.textContent='⏳...';
  const gameId='game_'+ME.id+'_'+Date.now();
  currentGameId=gameId;
  // Send via Supabase realtime broadcast
  const ch=sb.channel('invite_'+uid);
  await ch.subscribe(async(status)=>{
    if(status==='SUBSCRIBED'){
      await ch.send({type:'broadcast',event:'game_invite',payload:{
        from_id:ME.id,
        from_nick:MYPROF?.username||'?',
        from_avatar:MYPROF?.avatar_url||null,
        from_emotion:MYPROF?.emotion||'😊',
        game_id:gameId
      }});
      setTimeout(()=>sb.removeChannel(ch),3000);
    }
  });
  // Also store in DB (optional fallback)
  await sb.from('comments').insert({user_id:ME.id,content:`billiard_invite:${uid}:${gameId}:${MYPROF?.username||'?'}`});
  btn.textContent='✅ გაიგზავნა';
  toast('📨 მოწვევა გაიგზავნა '+nick+'-ს!');
  closeModal('inviteOverlay');
  // Setup host waiting state
  setupGameChannel(gameId, 0); // 0=host
  showWaitingForOpponent(nick);
}

function showWaitingForOpponent(nick){
  document.getElementById('waitOverlay').style.display='flex';
  document.getElementById('waitSub').textContent=nick+'-ის პასუხის მოლოდინი...';
  document.getElementById('waitActions').innerHTML=`<button class="wait-btn secondary" onclick="cancelWaiting()">❌ გაუქმება</button>`;
}

function cancelWaiting(){
  document.getElementById('waitOverlay').style.display='flex';
  document.getElementById('waitSub').textContent='მოემზადე სათამაშოდ! მოიწვიე მეგობარი.';
  document.getElementById('waitActions').innerHTML=`
    <button class="wait-btn primary" onclick="startVsAI()">🤖 AI-სთან თამაში</button>
    <button class="wait-btn secondary" onclick="openInviteModal()">👥 მეგობრის მოწვევა</button>
  `;
  currentGameId=null;
}

function setupInviteListener(){
  if(!ME) return;
  const ch=sb.channel('invite_'+ME.id);
  ch.on('broadcast',{event:'game_invite'},async({payload})=>{
    showInviteToast(payload);
  }).subscribe();
  // Also poll DB for offline delivery
  setInterval(async()=>{
    const {data}=await sb.from('comments').select('*').like('content',`billiard_invite:${ME.id}:%`).gte('created_at',new Date(Date.now()-30000).toISOString());
    if(data&&data.length){
      data.forEach(async row=>{
        const parts=row.content.split(':');
        if(parts.length>=4){
          showInviteToast({from_id:parts[0].replace('billiard_invite','').slice(1)||parts[1],from_nick:parts[3],game_id:parts[2],from_emotion:'😊'});
          await sb.from('comments').delete().eq('id',row.id);
        }
      });
    }
  },5000);
}

function showInviteToast(payload){
  // Remove old
  document.querySelectorAll('.inv-toast').forEach(t=>t.remove());
  const el=document.createElement('div');
  el.className='inv-toast';
  const avHtml=payload.from_avatar?`<img src="${payload.from_avatar}">`:(payload.from_emotion||'😊');
  el.innerHTML=`
    <div class="inv-head">
      <div class="inv-av">${avHtml}</div>
      <div>
        <div class="inv-title">🎱 ბილიარდის მოწვევა</div>
        <div class="inv-name">${esc(payload.from_nick||'?')}</div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:8px">გიწვევს ბილიარდის სათამაშოდ!</div>
    <div class="inv-actions">
      <button class="inv-act inv-acc" onclick="acceptInvite('${payload.from_id}','${esc(payload.from_nick||'')}','${payload.game_id||''}',this.closest('.inv-toast'))">✅ დასტური</button>
      <button class="inv-act inv-dec" onclick="declineInvite('${payload.from_id}','${esc(payload.from_nick||'')}',this.closest('.inv-toast'))">❌ უარი</button>
    </div>
  `;
  document.body.appendChild(el);
  setTimeout(()=>{if(el.parentNode)el.remove();},20000);
}

async function acceptInvite(fromId, fromNick, gameId, toastEl){
  if(toastEl) toastEl.remove();
  opponent=allUsers.find(u=>u.id===fromId)||{username:fromNick,emotion:'😊'};
  // Notify host via broadcast
  const notifCh=sb.channel('game_accept_'+fromId);
  await notifCh.subscribe(async(status)=>{
    if(status==='SUBSCRIBED'){
      await notifCh.send({type:'broadcast',event:'accepted',payload:{from_id:ME.id,from_nick:MYPROF?.username,from_avatar:MYPROF?.avatar_url,game_id:gameId}});
      setTimeout(()=>sb.removeChannel(notifCh),3000);
    }
  });
  currentGameId=gameId;
  setupGameChannel(gameId, 1); // 1=guest
  vsAI=false;
  document.getElementById('waitOverlay').style.display='none';
  document.getElementById('sp1name').textContent=fromNick;
  document.getElementById('sp2name').textContent=MYPROF?.username||'შენ';
  const fUser=allUsers.find(u=>u.id===fromId)||{};
  document.getElementById('sp1av').innerHTML=fUser.avatar_url?`<img src="${fUser.avatar_url}">`:(fUser.emotion||'😊');
  document.getElementById('sp2av').innerHTML=MYPROF?.avatar_url?`<img src="${MYPROF.avatar_url}">`:(MYPROF?.emotion||'😊');
  // Guest is player 2 — wait for host's first shot
  resetBallsMultiplayer();
  gameState='playing';
  buildBallsRow();updateScoreUI();
  activePlayer=0; myTurn=false;
  document.getElementById('sp1').classList.add('active');
  document.getElementById('sp2').classList.remove('active');
  startTurnTimer();
  sysChat('✅ '+fromNick+'-სთან თამაში დაიწყო! ✈️');
  toast('🎱 თამაში დაიწყო!');
}

async function declineInvite(fromId, fromNick, toastEl){
  if(toastEl) toastEl.remove();
  // Send decline
  const ch=sb.channel('game_accept_'+fromId);
  await ch.subscribe(async(status)=>{
    if(status==='SUBSCRIBED'){
      await ch.send({type:'broadcast',event:'declined',payload:{from_nick:MYPROF?.username}});
      setTimeout(()=>sb.removeChannel(ch),2000);
    }
  });
  toast('❌ '+fromNick+'-ს უარი ეთქვა');
}

function resetBallsMultiplayer(){
  resetBalls();
  scores=[0,0];pottedByPlayer=[[],[]];playerBallType=null;isShooting=false;aimAngle=0;
}

function setupGameChannel(gameId, role){
  if(gameChannel){try{sb.removeChannel(gameChannel);}catch(e){}}
  gameChannel=sb.channel('billiard_game_'+gameId)
    .on('broadcast',{event:'shot'},({payload})=>{
      if(!payload||payload.gameId!==gameId) return;
      if(role===0){
        // host receives guest shot
        applyOpponentShot(payload.angle,payload.power);
      } else {
        // guest receives host shot
        applyOpponentShot(payload.angle,payload.power);
      }
    })
    .on('broadcast',{event:'accepted'},({payload})=>{
      if(role!==0) return;
      // Host: guest accepted
      opponent=allUsers.find(u=>u.id===payload.from_id)||{username:payload.from_nick,emotion:'😊'};
      document.getElementById('waitOverlay').style.display='none';
      document.getElementById('sp1name').textContent=MYPROF?.username||'შენ';
      document.getElementById('sp2name').textContent=payload.from_nick||'ოპ.';
      document.getElementById('sp1av').innerHTML=MYPROF?.avatar_url?`<img src="${MYPROF.avatar_url}">`:(MYPROF?.emotion||'😊');
      document.getElementById('sp2av').innerHTML=payload.from_avatar?`<img src="${payload.from_avatar}">`:(opponent?.emotion||'😊');
      vsAI=false;
      resetBallsMultiplayer();
      gameState='playing';
      buildBallsRow();updateScoreUI();
      activePlayer=0;myTurn=true;
      document.getElementById('sp1').classList.add('active');
      document.getElementById('sp2').classList.remove('active');
      startTurnTimer();
      sysChat('🎱 '+payload.from_nick+'-სთან თამაში დაიწყო!');
      toast('🎱 თამაში დაიწყო!');
    })
    .on('broadcast',{event:'declined'},({payload})=>{
      toast('❌ '+payload.from_nick+' - უარი');
      cancelWaiting();
    })
    .on('broadcast',{event:'chat'},({payload})=>{
      appendChat(payload.nick,payload.text,false);
    })
    .subscribe();

  // Chat channel
  if(chatChannel){try{sb.removeChannel(chatChannel);}catch(e){}}
  chatChannel=sb.channel('billiard_chat_'+gameId);
  chatChannel.subscribe();
}

/* ======= CHAT ======= */
function toggleChat(){
  const s=document.getElementById('chatSide');
  s.classList.toggle('collapsed');
  s.classList.toggle('mobile-open');
}

function sysChat(msg){
  const box=document.getElementById('chatMsgs');
  const d=document.createElement('div');
  d.className='c-msg sys';
  d.textContent=msg;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}

function appendChat(nick,text,isMe){
  const box=document.getElementById('chatMsgs');
  const d=document.createElement('div');
  d.className='c-msg'+(isMe?' mine':'');
  d.innerHTML=`<div class="c-nick">${esc(nick)}</div><div class="c-text">${esc(text)}</div>`;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}

function sendChat(){
  const inp=document.getElementById('chatInp');
  const txt=inp.value.trim();
  if(!txt) return;
  inp.value='';
  appendChat(MYPROF?.username||'?',txt,true);
  if(gameChannel&&currentGameId){
    gameChannel.send({type:'broadcast',event:'chat',payload:{nick:MYPROF?.username||'?',text:txt}});
  }
}

/* ======= HELPERS ======= */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function bgClose(e,id){if(e.target.id===id)closeModal(id);}

/* ======= INIT ======= */
async function init(){
  const{data:{user}}=await sb.auth.getUser();
  if(!user){location.href='index.html';return;}
  ME=user;
  const{data:prof}=await sb.from('profiles').select('*').eq('id',ME.id).single();
  MYPROF=prof;
  if(MYPROF?.is_blocked){alert('დაბლოკილია');await sb.auth.signOut();location.href='index.html';return;}
  // Update UI
  const myAv=document.getElementById('myAv');
  if(MYPROF?.avatar_url)myAv.innerHTML=`<img src="${MYPROF.avatar_url}">`;
  else myAv.textContent=MYPROF?.emotion||'😊';
  document.getElementById('myName').textContent=MYPROF?.username||'?';
  // Load users
  const{data:users}=await sb.from('profiles').select('*').neq('id',ME.id);
  allUsers=users||[];
  // Init table
  initTable();
  // Ping online
  await sb.from('profiles').update({last_seen:new Date().toISOString()}).eq('id',ME.id);
  setInterval(()=>sb.from('profiles').update({last_seen:new Date().toISOString()}).eq('id',ME.id),30000);
  // Setup invite listener
  setupInviteListener();
  sysChat('👋 კეთილი იყოს შენი მობრძანება! აირჩიე AI ან მოიწვიე მეგობარი.');
}
init();
</script>
