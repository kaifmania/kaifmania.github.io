<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ბილიარდი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0b1a;color:#fff;font-family:sans-serif;height:100vh;display:flex;flex-direction:column}
button{cursor:pointer;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:bold}
.lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px}
.lobby-btn{background:#7a1fc8;color:#fff;padding:15px 30px;font-size:16px}
.lobby-btn.green{background:#16a34a}
#inviteList{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center}
.invite-box{background:#120f24;padding:20px;border-radius:20px;width:90%;max-width:350px}
.user-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;margin:5px 0}
.user-item:hover{background:#1a1730}
.user-av{width:40px;height:40px;border-radius:50%;background:#7a1fc8;display:flex;align-items:center;justify-content:center;font-size:20px}
#incoming{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center}
.incoming-box{background:#120f24;padding:30px;border-radius:20px;text-align:center}
canvas{background:#1a4a2e;border-radius:10px;display:block;margin:0 auto}
</style>
</head>
<body>

<div class="lobby" id="lobby">
  <div style="font-size:60px">🎱</div>
  <h1>ბილიარდი</h1>
  <button class="lobby-btn" onclick="playWithAI()">🤖 AI-ს წინააღმდეგ</button>
  <button class="lobby-btn green" onclick="showInviteList()">👥 მეგობრის მოწვევა</button>
</div>

<div id="inviteList">
  <div class="invite-box">
    <h3>👥 მოიწვიე მეგობარი</h3>
    <input type="text" id="searchInput" placeholder="🔍 ძებნა..." style="width:100%;padding:10px;margin:10px 0;border-radius:10px;border:none" oninput="filterUsers()">
    <div id="usersList" style="max-height:300px;overflow-y:auto"></div>
    <button onclick="closeInviteList()" style="width:100%;margin-top:10px;background:#333">✕ დახურვა</button>
  </div>
</div>

<div id="incoming">
  <div class="incoming-box">
    <div style="font-size:50px">🎱</div>
    <h3 id="inviterName">მოთამაშე</h3>
    <p>გიწვევთ თამაშში!</p>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button onclick="acceptInvite()" style="flex:1;background:#16a34a">✅ დასტური</button>
      <button onclick="declineInvite()" style="flex:1;background:#dc2626">❌ უარი</button>
    </div>
  </div>
</div>

<div id="game" style="display:none;padding:20px;text-align:center">
  <canvas id="gameCanvas" width="600" height="300"></canvas>
  <div style="margin-top:10px">
    <div id="turnText" style="font-size:18px;margin:10px">🎯 შენი ჯერია!</div>
    <div id="scoreText" style="color:#a855f7">💜 0</div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

let ME = null, MYPROF = null;
let allUsers = [];
let currentInviteId = null;
let gameMode = null;

// ინიციალიზაცია
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { location.href = 'index.html'; return; }
  ME = user;
  
  const { data } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  MYPROF = data;
  document.getElementById('scoreText').innerHTML = '💜 ' + (MYPROF?.billiard_score || 0);
  
  await loadUsers();
  startListening();
}

// მომხმარებლების ჩატვირთვა
async function loadUsers() {
  const { data } = await sb.from('profiles').select('id, username, avatar_url, last_seen, billiard_score');
  allUsers = data || [];
}

// ონლაინი თუ არა
function isOnline(ts) {
  if (!ts) return false;
  return Date.now() - new Date(ts).getTime() < 90000;
}

// მოწვევის სიის ჩვენება
async function showInviteList() {
  await loadUsers();
  document.getElementById('inviteList').style.display = 'flex';
  renderUsers('');
}

function closeInviteList() {
  document.getElementById('inviteList').style.display = 'none';
}

function renderUsers(filter) {
  const el = document.getElementById('usersList');
  el.innerHTML = '';
  
  const q = filter.toLowerCase();
  const others = allUsers.filter(u => u.id !== ME.id);
  const filtered = q ? others.filter(u => (u.username || '').toLowerCase().includes(q)) : others;
  
  const online = filtered.filter(u => isOnline(u.last_seen));
  const offline = filtered.filter(u => !isOnline(u.last_seen));
  
  if (online.length === 0 && offline.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:20px">🙏 მომხმარებელი ვერ მოიძებნა</div>';
    return;
  }
  
  if (online.length > 0) {
    el.innerHTML += '<div style="color:#4ade80;font-size:12px;margin:5px 0">🟢 ონლაინი</div>';
    online.forEach(u => el.appendChild(createUserItem(u, true)));
  }
  
  if (offline.length > 0) {
    el.innerHTML += '<div style="color:#666;font-size:12px;margin:10px 0 5px">⚫ ოფლაინი</div>';
    offline.forEach(u => el.appendChild(createUserItem(u, false)));
  }
}

function createUserItem(u, isOnlineUser) {
  const div = document.createElement('div');
  div.className = 'user-item';
  div.innerHTML = `
    <div class="user-av">${u.avatar_url ? `<img src="${u.avatar_url}" style="width:40px;height:40px;border-radius:50%">` : (u.emotion || '😊')}</div>
    <div style="flex:1"><b>${u.username || '?'}</b><br><span style="font-size:12px;color:#aaa">💜 ${u.billiard_score || 0}</span></div>
    ${isOnlineUser ? '<div style="width:10px;height:10px;background:#4ade80;border-radius:50%"></div>' : ''}
  `;
  div.onclick = () => sendInvite(u.id);
  return div;
}

function filterUsers() {
  renderUsers(document.getElementById('searchInput').value);
}

// მოწვევის გაგზავნა
async function sendInvite(toId) {
  closeInviteList();
  
  const { data, error } = await sb.from('billiard_invites')
    .insert({ from_id: ME.id, to_id: toId, status: 'pending' })
    .select('id').single();
  
  if (error) {
    alert('❌ მოწვევა ვერ გაიგზავნა');
    return;
  }
  
  currentInviteId = data.id;
  alert('✅ მოწვევა გაიგზავნა! ველოდებით პასუხს...');
  
  // პასუხის მოსმენა
  sb.channel('invite_' + data.id)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'billiard_invites', filter: `id=eq.${data.id}` }, (payload) => {
      if (payload.new.status === 'accepted') {
        alert('✅ მოწვევა მიღებულია! თამაში იწყება');
        startGame('online');
      } else if (payload.new.status === 'declined') {
        alert('❌ მოწვევაზე უარი თქვეს');
      }
    }).subscribe();
}

// მოწვევების მოსმენა
function startListening() {
  sb.channel('my_invites')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'billiard_invites', filter: `to_id=eq.${ME.id}` }, async (payload) => {
      if (payload.new.status !== 'pending') return;
      
      const sender = allUsers.find(u => u.id === payload.new.from_id);
      if (!sender) return;
      
      currentInviteId = payload.new.id;
      document.getElementById('inviterName').innerHTML = sender.username || 'მოთამაშე';
      document.getElementById('incoming').style.display = 'flex';
    }).subscribe();
}

async function acceptInvite() {
  document.getElementById('incoming').style.display = 'none';
  if (!currentInviteId) return;
  
  await sb.from('billiard_invites')
    .update({ status: 'accepted' })
    .eq('id', currentInviteId);
  
  startGame('online');
}

async function declineInvite() {
  document.getElementById('incoming').style.display = 'none';
  if (currentInviteId) {
    await sb.from('billiard_invites')
      .update({ status: 'declined' })
      .eq('id', currentInviteId);
  }
}

// თამაშის ლოგიკა
let gameActive = false, myTurn = true;
let myScore = MYPROF?.billiard_score || 0;

function playWithAI() {
  gameMode = 'ai';
  startGame('ai');
}

function startGame(type) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  gameActive = true;
  myTurn = true;
  updateTurnDisplay();
}

function updateTurnDisplay() {
  document.getElementById('turnText').innerHTML = myTurn ? '🎯 შენი ჯერია!' : '⏳ მოწინააღმდეგის ჯერია...';
}

// AI რიგი
function aiTurn() {
  if (!gameActive || myTurn || gameMode !== 'ai') return;
  setTimeout(() => {
    if (!gameActive) return;
    const randomPoints = Math.floor(Math.random() * 10);
    if (randomPoints > 3) {
      myScore += 5;
      document.getElementById('scoreText').innerHTML = '💜 ' + myScore;
      updateScoreInDB(myScore);
    }
    myTurn = true;
    updateTurnDisplay();
    checkGameEnd();
  }, 1500);
}

async function updateScoreInDB(score) {
  await sb.from('profiles').update({ billiard_score: score }).eq('id', ME.id);
}

function checkGameEnd() {
  if (myScore >= 50) {
    alert('🏆 გილოცავ! გაიმარჯვე!');
    endGame();
  }
}

function endGame() {
  gameActive = false;
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('game').style.display = 'none';
}

// თამაშის კონტროლი
function playerTurn() {
  if (!gameActive || !myTurn) return;
  const points = Math.floor(Math.random() * 10) + 1;
  myScore += points;
  document.getElementById('scoreText').innerHTML = '💜 ' + myScore;
  updateScoreInDB(myScore);
  
  myTurn = false;
  updateTurnDisplay();
  checkGameEnd();
  
  if (gameActive && gameMode === 'ai') {
    aiTurn();
  }
}

// კანვასზე დაჭერა
const canvas = document.getElementById('gameCanvas');
canvas.addEventListener('click', () => {
  if (gameActive && myTurn) {
    playerTurn();
  }
});

// ხატვა
function drawTable() {
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a4a2e';
  ctx.fillRect(0, 0, 600, 300);
  ctx.fillStyle = '#2d1b00';
  ctx.fillRect(0, 0, 600, 20);
  ctx.fillRect(0, 280, 600, 20);
  ctx.fillRect(0, 0, 20, 300);
  ctx.fillRect(580, 0, 20, 300);
  
  // ბურთი
  ctx.beginPath();
  ctx.arc(200, 150, 12, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('8', 200, 150);
}

drawTable();

init();
</script>
</body>
</html>
