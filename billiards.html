<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ბილიარდი · სრული ვერსია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: #0a0e1a;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh;
  color: white;
}

/* ლობი */
#lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 30px;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
}

.lobby-card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 24px;
  padding: 24px 32px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid rgba(255,255,255,0.2);
}

.lobby-card:hover {
  transform: scale(1.02);
  background: rgba(255,255,255,0.15);
}

/* თამაშის არე */
#gameArea {
  display: none;
  flex-direction: column;
  height: 100vh;
}

#gameHeader {
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

.player-card {
  text-align: center;
  padding: 8px 16px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
}

.player-card.active {
  background: linear-gradient(135deg, #ff6b6b, #feca57);
  box-shadow: 0 0 20px rgba(255,107,107,0.5);
}

#canvasContainer {
  flex: 1;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #1a472a;
}

canvas {
  display: block;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  border-radius: 12px;
  cursor: crosshair;
}

#powerPanel {
  display: flex;
  gap: 15px;
  padding: 12px 20px;
  background: rgba(0,0,0,0.7);
  align-items: center;
}

#powerTrack {
  flex: 1;
  height: 8px;
  background: #333;
  border-radius: 4px;
  cursor: pointer;
  position: relative;
}

#powerFill {
  height: 100%;
  width: 50%;
  background: linear-gradient(90deg, #4cd964, #ff3b30);
  border-radius: 4px;
  transition: width 0.02s linear;
}

#shootBtn {
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  border: none;
  color: white;
  padding: 8px 24px;
  border-radius: 40px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.1s;
}

#shootBtn:active {
  transform: scale(0.95);
}

#shootBtn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal.hidden {
  display: none;
}

.modal-content {
  background: #1a1f2e;
  border-radius: 32px;
  padding: 32px;
  text-align: center;
  min-width: 280px;
}

button {
  background: #ff6b6b;
  border: none;
  color: white;
  padding: 10px 20px;
  border-radius: 40px;
  margin: 5px;
  cursor: pointer;
  font-weight: bold;
}

.invite-item {
  background: rgba(255,255,255,0.1);
  margin: 8px;
  padding: 12px;
  border-radius: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
</style>
</head>
<body>

<div id="lobby">
  <h1>🎱 8-Ball ბილიარდი</h1>
  <div style="display: flex; gap: 20px;">
    <div class="lobby-card" onclick="startGameWithAI()">
      <h2>🤖 AI-ს წინააღმდეგ</h2>
      <p>ითამაშე კომპიუტერთან</p>
    </div>
    <div class="lobby-card" onclick="showInviteModal()">
      <h2>👥 მეგობრის მოწვევა</h2>
      <p>ითამაშე ონლაინ</p>
    </div>
  </div>
  <div id="scoreDisplay">🏆 ქულები: 0</div>
</div>

<div id="gameArea">
  <div id="gameHeader">
    <div class="player-card" id="player1Card">
      <div id="p1Name">მოთამაშე 1</div>
      <div id="p1Type">⚪</div>
      <div id="p1Score">0</div>
    </div>
    <div style="font-size: 24px;">VS</div>
    <div class="player-card" id="player2Card">
      <div id="p2Name">მოთამაშე 2</div>
      <div id="p2Type">⚪</div>
      <div id="p2Score">0</div>
    </div>
  </div>
  
  <div id="canvasContainer">
    <canvas id="gameCanvas" width="1000" height="500"></canvas>
  </div>
  
  <div id="powerPanel">
    <span>💪 ძალა:</span>
    <div id="powerTrack">
      <div id="powerFill"></div>
    </div>
    <span id="powerValue">50%</span>
    <button id="shootBtn" onclick="shoot()">🎯 სროლა</button>
  </div>
</div>

<div id="inviteModal" class="modal hidden">
  <div class="modal-content">
    <h3>📨 მოიწვიე მეგობარი</h3>
    <div id="onlineUsersList"></div>
    <button onclick="closeInviteModal()">დახურვა</button>
  </div>
</div>

<div id="resultModal" class="modal hidden">
  <div class="modal-content">
    <h2 id="resultTitle">🏆 გაიმარჯვე!</h2>
    <p id="resultMessage">შესანიშნავი თამაში!</p>
    <button onclick="resetToLobby()">მთავარ მენიუში</button>
    <button onclick="playAgain()">🔄 თავიდან</button>
  </div>
</div>

<script>
// ==================== KONFIGURACIA ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// მაგიდის ზომები
const TABLE = { w: 1000, h: 500 };
canvas.width = TABLE.w;
canvas.height = TABLE.h;

// ბურთის პარამეტრები
const BALL_RADIUS = 10;
const POCKET_RADIUS = 16;
const FRICTION = 0.985;
const MIN_SPEED = 0.5;

// ჯიბეების პოზიციები (6 ჯიბე)
const POCKETS = [
  { x: 0, y: 0 }, { x: TABLE.w/2, y: 0 }, { x: TABLE.w, y: 0 },
  { x: 0, y: TABLE.h }, { x: TABLE.w/2, y: TABLE.h }, { x: TABLE.w, y: TABLE.h }
];

// ბურთების ფერები
const COLORS = {
  0: 'white',    // cue ball
  1: '#ffcc00', 2: '#0055ff', 3: '#ff3333', 4: '#8800ff', 5: '#ff6600',
  6: '#00cc66', 7: '#cc3333', 8: '#333333', 9: '#ffee88', 10: '#88aaff',
  11: '#ff8888', 12: '#cc88ff', 13: '#ffaa66', 14: '#88ffaa', 15: '#ff88aa'
};

// ==================== GAME STATE ====================
let balls = [];
let currentPlayer = 'p1'; // 'p1' ან 'p2'
let gameMode = null; // 'ai' ან 'online'
let isAITurn = false;
let power = 50;
let isDraggingPower = false;
let isAnimating = false;
let aimAngle = 0;
let mouseX = TABLE.w/2, mouseY = TABLE.h/2;
let ghostBall = { x: 0, y: 0, visible: false };

// მოთამაშეების მონაცემები
let players = {
  p1: { name: 'მოთამაშე', type: null, pocketed: [], score: 0 },
  p2: { name: 'AI', type: null, pocketed: [], score: 0 }
};

// ==================== BALLS INITIALIZATION ====================
function initBalls() {
  balls = [];
  
  // Cue ball (0)
  balls.push({
    num: 0, x: TABLE.w * 0.25, y: TABLE.h/2,
    vx: 0, vy: 0, active: true
  });
  
  // 15 ბურთის განლაგება სამკუთხედად
  const startX = TABLE.w * 0.75;
  const startY = TABLE.h/2;
  const spacing = BALL_RADIUS * 2 + 2;
  
  let idx = 1;
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col <= row; col++) {
      if (idx > 15) break;
      const offsetX = row * spacing * 0.866;
      const offsetY = (col - row/2) * spacing;
      
      balls.push({
        num: idx,
        x: startX + offsetX,
        y: startY + offsetY,
        vx: 0, vy: 0,
        active: true
      });
      idx++;
    }
  }
  
  // 8-ის ბურთი ცენტრში
  const eightBall = balls.find(b => b.num === 8);
  if (eightBall) {
    eightBall.x = startX + 3 * spacing * 0.866;
    eightBall.y = startY;
  }
}

// ==================== PHYSICS ====================
function updatePhysics() {
  let anyMoving = false;
  
  // ბურთების მოძრაობა
  for (let ball of balls) {
    if (!ball.active) continue;
    
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= FRICTION;
    ball.vy *= FRICTION;
    
    if (Math.abs(ball.vx) < MIN_SPEED) ball.vx = 0;
    if (Math.abs(ball.vy) < MIN_SPEED) ball.vy = 0;
    
    if (ball.vx !== 0 || ball.vy !== 0) anyMoving = true;
    
    // კედლების კოლიზია
    if (ball.x - BALL_RADIUS < 5) { ball.x = 5 + BALL_RADIUS; ball.vx = -ball.vx * 0.9; }
    if (ball.x + BALL_RADIUS > TABLE.w - 5) { ball.x = TABLE.w - 5 - BALL_RADIUS; ball.vx = -ball.vx * 0.9; }
    if (ball.y - BALL_RADIUS < 5) { ball.y = 5 + BALL_RADIUS; ball.vy = -ball.vy * 0.9; }
    if (ball.y + BALL_RADIUS > TABLE.h - 5) { ball.y = TABLE.h - 5 - BALL_RADIUS; ball.vy = -ball.vy * 0.9; }
    
    // ჯიბეების შემოწმება
    for (let pocket of POCKETS) {
      const dx = ball.x - pocket.x;
      const dy = ball.y - pocket.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < POCKET_RADIUS) {
        ball.active = false;
        ball.vx = ball.vy = 0;
        
        // ჩაგდებული ბურთის დამატება მოთამაშის ანგარიშზე
        if (ball.num !== 0 && ball.num !== 8) {
          const currentPlayerData = players[currentPlayer];
          if (!currentPlayerData.pocketed.includes(ball.num)) {
            currentPlayerData.pocketed.push(ball.num);
            currentPlayerData.score++;
            updateScoreDisplay();
            
            // ტიპის განსაზღვრა (solid/stripe)
            if (!players.p1.type && !players.p2.type) {
              const isStripe = ball.num >= 9;
              players.p1.type = currentPlayer === 'p1' ? (isStripe ? 'stripe' : 'solid') : null;
              players.p2.type = currentPlayer === 'p2' ? (isStripe ? 'stripe' : 'solid') : null;
              
              // მეორე მოთამაშეს მიეცემა საპირისპირო ტიპი
              if (players.p1.type) players.p2.type = players.p1.type === 'solid' ? 'stripe' : 'solid';
              if (players.p2.type) players.p1.type = players.p2.type === 'solid' ? 'stripe' : 'solid';
              
              updatePlayerTypes();
            }
          }
        }
        
        // შავი ბურთის შემოწმება
        if (ball.num === 8) {
          const playerWon = checkEightBallWin();
          if (playerWon) endGame(true);
          else endGame(false);
        }
        break;
      }
    }
  }
  
  // ბურთ-ბურთის კოლიზია
  for (let i = 0; i < balls.length; i++) {
    for (let j = i+1; j < balls.length; j++) {
      const b1 = balls[i];
      const b2 = balls[j];
      if (!b1.active || !b2.active) continue;
      
      const dx = b2.x - b1.x;
      const dy = b2.y - b1.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      
      if (dist < BALL_RADIUS * 2) {
        const angle = Math.atan2(dy, dx);
        const overlap = BALL_RADIUS * 2 - dist;
        const moveX = Math.cos(angle) * overlap / 2;
        const moveY = Math.sin(angle) * overlap / 2;
        
        b1.x -= moveX;
        b1.y -= moveY;
        b2.x += moveX;
        b2.y += moveY;
        
        const nx = dx / dist;
        const ny = dy / dist;
        const vrelx = b2.vx - b1.vx;
        const vrely = b2.vy - b1.vy;
        const dot = vrelx * nx + vrely * ny;
        
        if (dot < 0) {
          const impulse = (2 * dot) / 2;
          b1.vx += impulse * nx;
          b1.vy += impulse * ny;
          b2.vx -= impulse * nx;
          b2.vy -= impulse * ny;
        }
      }
    }
  }
  
  return anyMoving;
}

// ==================== GHOST BALL & AIM ====================
function calculateGhostBall() {
  const cueBall = balls.find(b => b.num === 0 && b.active);
  if (!cueBall) return false;
  
  // ვეძებთ სამიზნე ბურთს
  let targetBall = null;
  let minDist = Infinity;
  
  for (let ball of balls) {
    if (!ball.active || ball.num === 0) continue;
    if (ball.num === 8) {
      // შავი ბურთის ტიპის შემოწმება
      const currentType = players[currentPlayer].type;
      if (currentType) {
        const remainingOfType = balls.some(b => 
          b.active && b.num !== 0 && b.num !== 8 && 
          ((currentType === 'solid' && b.num <= 7) || (currentType === 'stripe' && b.num >= 9))
        );
        if (remainingOfType) continue; // ჯერ საკუთარი ბურთები უნდა ჩააგდოს
      }
    }
    
    const dx = ball.x - cueBall.x;
    const dy = ball.y - cueBall.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < minDist && dist > 20) {
      minDist = dist;
      targetBall = ball;
    }
  }
  
  if (!targetBall) return false;
  
  // Ghost ball-ის გამოთვლა (ზუსტი სამიზნის წრე)
  const dx = targetBall.x - cueBall.x;
  const dy = targetBall.y - cueBall.y;
  const angleToTarget = Math.atan2(dy, dx);
  
  // ghost ball მდებარეობს სამიზნე ბურთის უკან, BALL_RADIUS * 2 მანძილზე
  ghostBall.x = targetBall.x - Math.cos(angleToTarget) * BALL_RADIUS * 2;
  ghostBall.y = targetBall.y - Math.sin(angleToTarget) * BALL_RADIUS * 2;
  ghostBall.visible = true;
  
  // მაუსის მიმართულებით ჯოხის კუთხის გამოთვლა
  const mouseAngle = Math.atan2(mouseY - cueBall.y, mouseX - cueBall.x);
  aimAngle = mouseAngle;
  
  return true;
}

// ==================== RENDERING ====================
function drawTable() {
  // მაგიდის ფონი
  ctx.fillStyle = '#1a6b2f';
  ctx.fillRect(0, 0, TABLE.w, TABLE.h);
  
  // კიდეები
  ctx.strokeStyle = '#8b5a2b';
  ctx.lineWidth = 12;
  ctx.strokeRect(8, 8, TABLE.w-16, TABLE.h-16);
  
  // ჯიბეები
  for (let pocket of POCKETS) {
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.arc(pocket.x, pocket.y, POCKET_RADIUS-4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(pocket.x, pocket.y, POCKET_RADIUS-8, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawBall(x, y, num) {
  const color = COLORS[num] || '#ccc';
  
  // ჩრდილი
  ctx.shadowBlur = 8;
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  
  // ბურთის სხეული
  const grad = ctx.createRadialGradient(x-3, y-3, 3, x, y, BALL_RADIUS);
  grad.addColorStop(0, color);
  grad.addColorStop(1, '#222');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, BALL_RADIUS, 0, Math.PI*2);
  ctx.fill();
  
  // ნომერი
  ctx.fillStyle = 'white';
  ctx.font = `bold ${BALL_RADIUS}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(num.toString(), x, y);
  
  // ბზინვარება
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(x-3, y-3, 3, 2, 0, 0, Math.PI*2);
  ctx.fill();
  
  ctx.shadowBlur = 0;
}

function drawCueStick() {
  const cueBall = balls.find(b => b.num === 0 && b.active);
  if (!cueBall || isAnimating || currentPlayer !== 'p1' && gameMode === 'ai') return;
  
  const angle = aimAngle;
  const stickLength = 120;
  const startX = cueBall.x + Math.cos(angle + Math.PI) * (BALL_RADIUS + 10);
  const startY = cueBall.y + Math.sin(angle + Math.PI) * (BALL_RADIUS + 10);
  const endX = startX + Math.cos(angle + Math.PI) * stickLength;
  const endY = startY + Math.sin(angle + Math.PI) * stickLength;
  
  // ჯოხი
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(endX, endY);
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#c9a87b';
  ctx.stroke();
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#8b5a2b';
  ctx.stroke();
}

function drawGhostBall() {
  if (ghostBall.visible && !isAnimating) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(ghostBall.x, ghostBall.y, BALL_RADIUS, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function render() {
  drawTable();
  
  // ბურთების დახატვა
  for (let ball of balls) {
    if (ball.active) {
      drawBall(ball.x, ball.y, ball.num);
    }
  }
  
  drawGhostBall();
  drawCueStick();
  
  // სამიზნის ხაზი
  if (ghostBall.visible && !isAnimating) {
    const cueBall = balls.find(b => b.num === 0 && b.active);
    if (cueBall) {
      ctx.beginPath();
      ctx.moveTo(cueBall.x, cueBall.y);
      ctx.lineTo(ghostBall.x, ghostBall.y);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.setLineDash([5, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

// ==================== GAME LOGIC ====================
function shoot() {
  if (isAnimating) return;
  if (gameMode === 'ai' && currentPlayer !== 'p1') return;
  
  const cueBall = balls.find(b => b.num === 0 && b.active);
  if (!cueBall) return;
  
  const force = power / 100 * 18;
  cueBall.vx = Math.cos(aimAngle) * force;
  cueBall.vy = Math.sin(aimAngle) * force;
  
  isAnimating = true;
  document.getElementById('shootBtn').disabled = true;
  
  animate();
}

function animate() {
  const moving = updatePhysics();
  render();
  
  if (moving) {
    requestAnimationFrame(animate);
  } else {
    isAnimating = false;
    document.getElementById('shootBtn').disabled = false;
    
    // შემოწმება ჩაგდებული ბურთი თუ არა
    const pocketedThisTurn = checkIfAnyPocketed();
    
    if (!pocketedThisTurn) {
      // მორიგეობის გადაცემა
      switchPlayer();
    }
    
    // AI-ს ჯერია?
    if (gameMode === 'ai' && currentPlayer === 'p2') {
      setTimeout(() => aiShoot(), 800);
    }
  }
}

function switchPlayer() {
  currentPlayer = currentPlayer === 'p1' ? 'p2' : 'p1';
  updateActivePlayer();
}

function checkIfAnyPocketed() {
  // ვამოწმებთ ჩაგდებული ბურთები ამ სვლაში
  // (უბრალო ვერსია - ყოველთვის აბრუნებს false)
  return false;
}

function checkEightBallWin() {
  const currentType = players[currentPlayer].type;
  if (!currentType) return true;
  
  // ვამოწმებთ ყველა საკუთარი ტიპის ბურთი ჩაგდებულია თუ არა
  const myBalls = balls.filter(b => 
    b.active && b.num !== 0 && b.num !== 8 &&
    ((currentType === 'solid' && b.num <= 7) || (currentType === 'stripe' && b.num >= 9))
  );
  
  return myBalls.length === 0;
}

// ==================== AI LOGIC ====================
function aiShoot() {
  if (currentPlayer !== 'p2' || gameMode !== 'ai') return;
  
  const cueBall = balls.find(b => b.num === 0 && b.active);
  if (!cueBall) return;
  
  // ვპოულობთ საუკეთესო სამიზნეს
  let bestTarget = null;
  let bestAngle = 0;
  
  for (let target of balls) {
    if (!target.active || target.num === 0) continue;
    
    // AI-ს ტიპის შემოწმება
    const aiType = players.p2.type;
    if (aiType && target.num !== 8) {
      const isTargetMyType = (aiType === 'solid' && target.num <= 7) || (aiType === 'stripe' && target.num >= 9);
      if (!isTargetMyType) continue;
    }
    
    const dx = target.x - cueBall.x;
    const dy = target.y - cueBall.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx);
    
    if (!bestTarget || dist < 100) {
      bestTarget = target;
      bestAngle = angle;
    }
  }
  
  if (bestTarget) {
    const force = 12 + Math.random() * 8;
    cueBall.vx = Math.cos(bestAngle) * force;
    cueBall.vy = Math.sin(bestAngle) * force;
    
    isAnimating = true;
    animate();
  } else {
    switchPlayer();
  }
}

// ==================== UI UPDATES ====================
function updateActivePlayer() {
  const p1Card = document.getElementById('player1Card');
  const p2Card = document.getElementById('player2Card');
  
  p1Card.classList.toggle('active', currentPlayer === 'p1');
  p2Card.classList.toggle('active', currentPlayer === 'p2');
}

function updateScoreDisplay() {
  document.getElementById('p1Score').innerText = players.p1.score;
  document.getElementById('p2Score').innerText = players.p2.score;
  document.getElementById('scoreDisplay').innerHTML = `🏆 ქულები: ${players.p1.score}`;
}

function updatePlayerTypes() {
  const p1Type = players.p1.type === 'solid' ? '⚫ SOLID' : (players.p1.type === 'stripe' ? '🟡 STRIPE' : '⚪');
  const p2Type = players.p2.type === 'solid' ? '⚫ SOLID' : (players.p2.type === 'stripe' ? '🟡 STRIPE' : '⚪');
  document.getElementById('p1Type').innerHTML = p1Type;
  document.getElementById('p2Type').innerHTML = p2Type;
}

// ==================== GAME CONTROL ====================
function startGameWithAI() {
  gameMode = 'ai';
  currentPlayer = 'p1';
  players = {
    p1: { name: 'შენ', type: null, pocketed: [], score: 0 },
    p2: { name: 'AI 🤖', type: null, pocketed: [], score: 0 }
  };
  
  document.getElementById('p1Name').innerHTML = '👤 შენ';
  document.getElementById('p2Name').innerHTML = '🤖 AI';
  
  initBalls();
  updateScoreDisplay();
  updateActivePlayer();
  updatePlayerTypes();
  
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('gameArea').style.display = 'flex';
  
  render();
}

function resetToLobby() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('resultModal').classList.add('hidden');
  gameMode = null;
}

function endGame(isWin) {
  document.getElementById('resultTitle').innerHTML = isWin ? '🏆 გაიმარჯვე!' : '😞 წააგე';
  document.getElementById('resultMessage').innerHTML = isWin ? 'შესანიშნავი თამაში!' : 'შემდეგ ჯერზე გამოგივა!';
  document.getElementById('resultModal').classList.remove('hidden');
}

function playAgain() {
  document.getElementById('resultModal').classList.add('hidden');
  if (gameMode === 'ai') startGameWithAI();
}

// ==================== POWER BAR ====================
const powerTrack = document.getElementById('powerTrack');
const powerFill = document.getElementById('powerFill');
const powerValue = document.getElementById('powerValue');

powerTrack.addEventListener('mousedown', (e) => {
  isDraggingPower = true;
  updatePower(e);
});

window.addEventListener('mousemove', (e) => {
  if (isDraggingPower) updatePower(e);
});

window.addEventListener('mouseup', () => {
  isDraggingPower = false;
});

function updatePower(e) {
  const rect = powerTrack.getBoundingClientRect();
  let x = e.clientX - rect.left;
  x = Math.max(0, Math.min(x, rect.width));
  power = (x / rect.width) * 100;
  powerFill.style.width = power + '%';
  powerValue.innerHTML = Math.round(power) + '%';
}

// ==================== MOUSE TRACKING ====================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;
  
  mouseX = Math.max(10, Math.min(mouseX, TABLE.w - 10));
  mouseY = Math.max(10, Math.min(mouseY, TABLE.h - 10));
  
  calculateGhostBall();
  render();
});

}

function closeInviteModal() {
  document.getElementById('inviteModal').classList.add('hidden');
}
