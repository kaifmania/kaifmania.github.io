<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎱 ბილიარდი - ჩატის თემა</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0612 0%, #110d22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Noto Sans Georgian', system-ui, sans-serif;
        }

        /* ========== ჩატის სტილის ფერები ========== */
        :root {
            --bg-dark: #0a0612;
            --bg-panel: #110d22;
            --bg-panel2: #1a1530;
            --border-glow: rgba(168,85,247,0.3);
            --text-main: #ede0ff;
            --text-dim: #b580e0;
            --text-dark: #7a5a9a;
            --accent: #7a1fc8;
            --accent-glow: #a855f7;
            --accent-light: #f07aff;
            --success: #4ade80;
            --warning: #fbbf24;
            --error: #f87171;
        }

        /* მთავარი მენიუ */
        .main-menu {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0612, #110d22);
            z-index: 100;
        }

        .menu-card {
            background: var(--bg-panel);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 1px solid var(--border-glow);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-width: 320px;
        }

        .menu-title {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent-light), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .menu-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            transition: transform 0.2s;
        }

        .menu-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-light));
        }

        /* მოწვევის პანელი */
        .invite-panel {
            background: var(--bg-panel);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid var(--border-glow);
        }

        .invite-panel input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--border-glow);
            background: var(--bg-panel2);
            color: var(--text-main);
            font-size: 14px;
        }

        .invite-panel input:focus {
            outline: none;
            border-color: var(--accent-glow);
        }

        .online-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .online-user {
            padding: 8px;
            margin: 5px 0;
            background: var(--bg-panel2);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .online-user:hover {
            border-color: var(--accent-glow);
            background: rgba(168,85,247,0.1);
        }

        .invite-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            border: none;
            padding: 5px 15px;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        /* თამაშის კონტეინერი */
        .game-container {
            display: none;
            padding: 20px;
        }

        /* ქულების დაფა */
        .scoreboard {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .player-card {
            background: var(--bg-panel);
            border-radius: 20px;
            padding: 15px 25px;
            text-align: center;
            min-width: 200px;
            border: 1px solid var(--border-glow);
            transition: all 0.3s;
        }

        .player-card.active {
            border: 2px solid var(--accent-light);
            box-shadow: 0 0 20px rgba(240,122,255,0.3);
            background: linear-gradient(135deg, #1a1530, #1f1a3a);
        }

        .player-name {
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 5px;
        }

        .player-score {
            font-size: 36px;
            font-weight: bold;
            color: var(--accent-light);
            margin-bottom: 10px;
        }

        .pocketed-balls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 35px;
        }

        .mini-ball {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 2px black;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3), inset 1px 1px 3px rgba(255,255,255,0.2);
        }

        /* მაგიდა */
        .table-wrapper {
            background: #0a2a1a;
            border-radius: 20px;
            padding: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 10px 30px rgba(0,0,0,0.4);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            cursor: crosshair;
            box-shadow: 0 0 0 5px #8B4513, 0 0 0 10px #5a2a0a;
        }

        /* კონტროლები */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            background: var(--bg-panel);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid var(--border-glow);
        }

        .power-bar {
            width: 200px;
            height: 8px;
            background: var(--bg-panel2);
            border-radius: 4px;
            overflow: hidden;
        }

        .power-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, var(--success), var(--warning), var(--error));
            transition: width 0.05s;
        }

        input[type="range"] {
            width: 150px;
            accent-color: var(--accent-glow);
        }

        button {
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            border: none;
            padding: 8px 25px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.03);
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
        }

        /* ინდიკატორები */
        .turn-text {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--bg-panel);
            padding: 8px 20px;
            border-radius: 25px;
            border-left: 4px solid var(--accent-light);
            font-size: 14px;
            color: var(--text-dim);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-panel);
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text-dim);
            cursor: pointer;
            border: 1px solid var(--border-glow);
            font-size: 12px;
            z-index: 50;
        }

        .back-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* მოგების ეკრანი */
        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10,6,18,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .win-content {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid var(--accent-glow);
        }

        .win-content button {
            margin-top: 20px;
        }

        /* მოწვევის შეტყობინება */
        .invite-notification {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: var(--bg-panel);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid var(--accent-light);
            z-index: 150;
            min-width: 250px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .invite-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .invite-buttons button {
            flex: 1;
            padding: 5px;
            font-size: 12px;
        }

        .accept-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .decline-btn {
            background: linear-gradient(135deg, var(--error), #dc2626);
        }

        @media (max-width: 1000px) {
            .player-card { padding: 10px 15px; min-width: 150px; }
            .player-score { font-size: 24px; }
            .mini-ball { width: 22px; height: 22px; font-size: 10px; }
            .controls { gap: 8px; padding: 8px 15px; }
            .power-bar { width: 120px; }
        }
    </style>
</head>
<body>

<!-- მთავარი მენიუ -->
<div id="mainMenu" class="main-menu">
    <div class="menu-card">
        <div class="menu-title">🎱 ბილიარდი</div>
        <button class="menu-btn" onclick="startLocalGame()">👥 ადგილობრივი თამაში</button>
        <button class="menu-btn" onclick="startAIGame()">🤖 AI-ს წინააღმდეგ</button>
        
        <div class="invite-panel">
            <div style="color: var(--text-dim); margin-bottom: 10px;">📨 ონლაინ მოწვევა</div>
            <input type="text" id="playerName" placeholder="თქვენი სახელი" value="მოთამაშე">
            <button class="menu-btn" style="font-size: 14px; padding: 8px;" onclick="goOnline()">🌐 ონლაინ რეჟიმი</button>
            <div id="onlineArea" style="display: none;">
                <div id="onlineUsers" class="online-list"></div>
                <div style="font-size: 12px; color: var(--text-dark); margin-top: 10px;" id="onlineStatus">🔍 მომხმარებლების ძიება...</div>
            </div>
        </div>
    </div>
</div>

<!-- თამაშის კონტეინერი -->
<div id="gameArea" class="game-container">
    <div class="back-btn" onclick="backToMenu()">← მთავარი</div>
    
    <div class="scoreboard">
        <div class="player-card" id="player1Card">
            <div class="player-name" id="player1Name">👤 მოთამაშე 1</div>
            <div class="player-score" id="player1Score">0</div>
            <div class="pocketed-balls" id="player1Balls"></div>
        </div>
        <div class="player-card" id="player2Card">
            <div class="player-name" id="player2Name">👤 მოთამაშე 2</div>
            <div class="player-score" id="player2Score">0</div>
            <div class="pocketed-balls" id="player2Balls"></div>
        </div>
    </div>

    <div class="table-wrapper">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
    </div>

    <div class="controls">
        <span>⚡ ძალა</span>
        <div class="power-bar">
            <div class="power-fill" id="powerFill"></div>
        </div>
        <input type="range" id="powerSlider" min="0" max="100" value="50">
        <button id="shootBtn">🎯 სროლა</button>
    </div>

    <div class="turn-text" id="turnText">🎯 მოთამაშე 1-ის ჯერი</div>
</div>

<!-- მოგების ეკრანი -->
<div id="winOverlay" class="win-overlay">
    <div class="win-content">
        <div style="font-size: 48px;" id="winEmoji">🏆</div>
        <h2 id="winText">გამარჯვება!</h2>
        <button onclick="resetGame()">🔄 თავიდან</button>
    </div>
</div>

<script>
    // ========== კონსტანტები ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const W = 900, H = 500;
    const BALL_R = 8;
    const FRICTION = 0.985;
    const WALL_BOUNCE = 0.92;
    
    const POCKETS = [
        { x: 20, y: 20 }, { x: W/2, y: 15 }, { x: W-20, y: 20 },
        { x: 20, y: H-20 }, { x: W/2, y: H-15 }, { x: W-20, y: H-20 }
    ];
    
    const COLORS = {
        1: '#FFD700', 2: '#0000CD', 3: '#DC143C', 4: '#8B008B', 5: '#FF8C00',
        6: '#228B22', 7: '#B22222', 8: '#1a1a2e', 9: '#FFD700', 10: '#0000CD',
        11: '#DC143C', 12: '#8B008B', 13: '#FF8C00', 14: '#228B22', 15: '#B22222', 0: '#FFFFFF'
    };
    
    const SOLIDS = [1,2,3,4,5,6,7];
    const STRIPES = [9,10,11,12,13,14,15];
    
    // ========== თამაშის მდგომარეობა ==========
    let balls = [];
    let currentPlayer = 1;
    let gameMode = 'local';
    let gameActive = true;
    let isMoving = false;
    let power = 50;
    let angle = 0;
    let isDragging = false;
    let placingCueBall = false;
    let myPlayerId = null;
    let currentGameId = null;
    let onlineMode = false;
    
    let players = {
        1: { name: '👤 მოთამაშე 1', score: 0, pocketed: [], group: null },
        2: { name: '👤 მოთამაშე 2', score: 0, pocketed: [], group: null }
    };
    
    // ========== ბურთების ინიციალიზაცია ==========
    function initBalls() {
        balls = [];
        const startX = W - 120;
        const startY = H/2;
        const spacing = BALL_R * 2.1;
        
        const positions = [
            [0,0], [-1,-1], [1,-1], [-2,-2], [0,-2], [2,-2],
            [-3,-3], [-1,-3], [1,-3], [3,-3], [-4,-4], [-2,-4], [0,-4], [2,-4], [4,-4]
        ];
        
        const numbers = [8, 1, 9, 2, 10, 3, 11, 4, 12, 5, 13, 6, 14, 7, 15];
        
        for(let i = 0; i < positions.length; i++) {
            balls.push({
                id: i, num: numbers[i],
                x: startX + positions[i][0] * spacing,
                y: startY + positions[i][1] * spacing * 0.866,
                vx: 0, vy: 0, pocketed: false,
                color: COLORS[numbers[i]],
                isStripe: STRIPES.includes(numbers[i])
            });
        }
        
        balls.push({
            id: 16, num: 0,
            x: W * 0.2, y: H/2,
            vx: 0, vy: 0, pocketed: false,
            color: '#FFFFFF', isStripe: false
        });
    }
    
    // ========== UI განახლება ==========
    function updateUI() {
        document.getElementById('player1Score').textContent = players[1].score;
        document.getElementById('player2Score').textContent = players[2].score;
        document.getElementById('player1Name').textContent = players[1].name;
        document.getElementById('player2Name').textContent = players[2].name;
        
        const p1Card = document.getElementById('player1Card');
        const p2Card = document.getElementById('player2Card');
        
        if(currentPlayer === 1) {
            p1Card.classList.add('active');
            p2Card.classList.remove('active');
            document.getElementById('turnText').innerHTML = `🎯 ${players[1].name}-ის ჯერი`;
        } else {
            p1Card.classList.remove('active');
            p2Card.classList.add('active');
            document.getElementById('turnText').innerHTML = `🎯 ${players[2].name}-ის ჯერი`;
        }
        
        const p1Balls = document.getElementById('player1Balls');
        const p2Balls = document.getElementById('player2Balls');
        
        p1Balls.innerHTML = players[1].pocketed.map(n => 
            `<div class="mini-ball" style="background: ${COLORS[n]}">${n}</div>`
        ).join('');
        
        p2Balls.innerHTML = players[2].pocketed.map(n => 
            `<div class="mini-ball" style="background: ${COLORS[n]}">${n}</div>`
        ).join('');
    }
    
    // ========== ფიზიკა ==========
    function updatePhysics() {
        let moving = false;
        
        for(let b of balls) {
            if(b.pocketed) continue;
            
            b.x += b.vx;
            b.y += b.vy;
            b.vx *= FRICTION;
            b.vy *= FRICTION;
            
            if(Math.abs(b.vx) > 0.1 || Math.abs(b.vy) > 0.1) moving = true;
            
            if(b.x - BALL_R < 15) { b.x = 15 + BALL_R; b.vx = -b.vx * WALL_BOUNCE; }
            if(b.x + BALL_R > W - 15) { b.x = W - 15 - BALL_R; b.vx = -b.vx * WALL_BOUNCE; }
            if(b.y - BALL_R < 15) { b.y = 15 + BALL_R; b.vy = -b.vy * WALL_BOUNCE; }
            if(b.y + BALL_R > H - 15) { b.y = H - 15 - BALL_R; b.vy = -b.vy * WALL_BOUNCE; }
            
            for(let p of POCKETS) {
                if(Math.hypot(b.x - p.x, b.y - p.y) < BALL_R + 12 && !b.pocketed) {
                    b.pocketed = true;
                    b.vx = b.vy = 0;
                    
                    if(b.num === 0) {
                        placingCueBall = true;
                        document.getElementById('turnText').innerHTML = '⚠️ დადე თეთრი ბურთი!';
                    } 
                    else if(b.num === 8) {
                        const remaining = balls.filter(bb => 
                            !bb.pocketed && bb.num !== 0 && bb.num !== 8 && 
                            (players[currentPlayer].group === 'solid' ? SOLIDS.includes(bb.num) : STRIPES.includes(bb.num))
                        ).length;
                        if(remaining === 0) endGame(currentPlayer);
                        else endGame(3 - currentPlayer);
                    }
                    else {
                        const group = SOLIDS.includes(b.num) ? 'solid' : 'stripe';
                        if(players[1].group === null && players[2].group === null) {
                            players[currentPlayer].group = group;
                            players[3-currentPlayer].group = group === 'solid' ? 'stripe' : 'solid';
                        }
                        if(players[currentPlayer].group === group) {
                            players[currentPlayer].pocketed.push(b.num);
                            players[currentPlayer].score++;
                            updateUI();
                        } else {
                            currentPlayer = 3 - currentPlayer;
                            updateUI();
                        }
                    }
                    break;
                }
            }
        }
        
        for(let i = 0; i < balls.length; i++) {
            for(let j = i+1; j < balls.length; j++) {
                const b1 = balls[i], b2 = balls[j];
                if(b1.pocketed || b2.pocketed) continue;
                
                const dx = b2.x - b1.x, dy = b2.y - b1.y;
                const dist = Math.hypot(dx, dy);
                
                if(dist < BALL_R * 2) {
                    const ang = Math.atan2(dy, dx);
                    const overlap = BALL_R * 2 - dist;
                    const moveX = Math.cos(ang) * overlap * 0.5;
                    const moveY = Math.sin(ang) * overlap * 0.5;
                    
                    b1.x -= moveX; b1.y -= moveY;
                    b2.x += moveX; b2.y += moveY;
                    
                    const nx = dx / dist, ny = dy / dist;
                    const dvx = b2.vx - b1.vx, dvy = b2.vy - b1.vy;
                    const dot = dvx * nx + dvy * ny;
                    
                    if(dot < 0) {
                        const imp = dot * 0.8;
                        b1.vx += imp * nx; b1.vy += imp * ny;
                        b2.vx -= imp * nx; b2.vy -= imp * ny;
                    }
                }
            }
        }
        
        if(!moving && isMoving) {
            isMoving = false;
            if(!placingCueBall) {
                currentPlayer = 3 - currentPlayer;
                updateUI();
            }
            if(gameActive && !placingCueBall && currentPlayer === 2 && gameMode === 'ai') {
                setTimeout(() => aiShoot(), 500);
            }
        }
        
        isMoving = moving;
        if(isMoving) requestAnimationFrame(updatePhysics);
        draw();
    }
    
    // ========== AI ==========
    function aiShoot() {
        if(isMoving || !gameActive || currentPlayer !== 2 || placingCueBall) return;
        
        const cue = balls.find(b => b.num === 0 && !b.pocketed);
        if(!cue) return;
        
        let targets = balls.filter(b => !b.pocketed && b.num !== 0);
        if(players[2].group) {
            targets = targets.filter(b => 
                players[2].group === 'solid' ? SOLIDS.includes(b.num) : STRIPES.includes(b.num)
            );
        }
        if(targets.length === 0 && players[2].pocketed.length >= 7) {
            targets = balls.filter(b => !b.pocketed && b.num === 8);
        }
        if(targets.length === 0) {
            targets = balls.filter(b => !b.pocketed && b.num !== 0 && b.num !== 8);
        }
        
        if(targets.length > 0) {
            const target = targets[0];
            angle = Math.atan2(target.y - cue.y, target.x - cue.x);
            angle += (Math.random() - 0.5) * 0.2;
            const dist = Math.hypot(target.x - cue.x, target.y - cue.y);
            power = Math.min(90, Math.max(30, dist / 4));
        } else {
            angle = Math.random() * Math.PI * 2;
            power = 50;
        }
        
        document.getElementById('powerSlider').value = power;
        document.getElementById('powerFill').style.width = power + '%';
        
        const speed = power * 0.4;
        cue.vx = Math.cos(angle) * speed;
        cue.vy = Math.sin(angle) * speed;
        isMoving = true;
        updatePhysics();
    }
    
    function shoot() {
        if(isMoving || placingCueBall || !gameActive) return;
        if(gameMode === 'ai' && currentPlayer !== 1) return;
        
        const cue = balls.find(b => b.num === 0 && !b.pocketed);
        if(!cue) return;
        
        const speed = power * 0.4;
        cue.vx = Math.cos(angle) * speed;
        cue.vy = Math.sin(angle) * speed;
        isMoving = true;
        updatePhysics();
    }
    
    function placeCueBall(x, y) {
        if(x < BALL_R + 15 || x > W - BALL_R - 15 || y < BALL_R + 15 || y > H - BALL_R - 15) return;
        for(let b of balls) {
            if(b.pocketed) continue;
            if(b.num === 0) continue;
            if(Math.hypot(b.x - x, b.y - y) < BALL_R * 2.5) return;
        }
        
        const cue = balls.find(b => b.num === 0);
        if(cue) { cue.x = x; cue.y = y; cue.pocketed = false; }
        
        placingCueBall = false;
        updateUI();
        draw();
        
        if(gameActive && currentPlayer === 2 && gameMode === 'ai') {
            setTimeout(() => aiShoot(), 500);
        }
    }
    
    // ========== ხატვა ==========
    function draw() {
        ctx.clearRect(0, 0, W, H);
        
        ctx.fillStyle = '#1a6b2f';
        ctx.fillRect(0, 0, W, H);
        
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 6;
        ctx.strokeRect(10, 10, W-20, H-20);
        
        for(let p of POCKETS) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 14, 0, Math.PI*2);
            ctx.fillStyle = '#000000aa';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
            ctx.fillStyle = '#000000';
            ctx.fill();
        }
        
        for(let b of balls) {
            if(b.pocketed) continue;
            
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2);
            
            if(b.isStripe && b.num !== 0) {
                ctx.fillStyle = '#FFFFFF';
                ctx.fill();
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x - BALL_R, b.y - 3, BALL_R*2, 6);
            } else {
                const grad = ctx.createRadialGradient(b.x-3, b.y-3, 2, b.x, b.y, BALL_R);
                grad.addColorStop(0, b.color);
                grad.addColorStop(1, '#666');
                ctx.fillStyle = grad;
                ctx.fill();
            }
            
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 0.5;
            ctx.stroke();
            
            if(b.num !== 0) {
                ctx.fillStyle = '#FFF';
                ctx.font = `bold ${BALL_R+2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(b.num, b.x, b.y);
            }
            ctx.shadowBlur = 0;
        }
        
        if(!isMoving && !placingCueBall && gameActive) {
            if(gameMode === 'local' || (gameMode === 'ai' && currentPlayer === 1)) {
                const cue = balls.find(b => b.num === 0 && !b.pocketed);
                if(cue) {
                    const endX = cue.x + Math.cos(angle) * 200;
                    const endY = cue.y + Math.sin(angle) * 200;
                    ctx.beginPath();
                    ctx.setLineDash([5, 8]);
                    ctx.strokeStyle = '#f07aff';
                    ctx.lineWidth = 2;
                    ctx.moveTo(cue.x, cue.y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }
    }
    
    // ========== მაუსი ==========
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
        else { cx = e.clientX; cy = e.clientY; }
        return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
    }
    
    function onMouseDown(e) {
        e.preventDefault();
        if(isMoving) return;
        const coords = getCoords(e);
        if(placingCueBall) {
            placeCueBall(coords.x, coords.y);
        } else {
            if(gameMode === 'ai' && currentPlayer !== 1) return;
            isDragging = true;
            const cue = balls.find(b => b.num === 0 && !b.pocketed);
            if(cue) { angle = Math.atan2(coords.y - cue.y, coords.x - cue.x); draw(); }
        }
    }
    
    function onMouseMove(e) {
        if(!isDragging || isMoving || placingCueBall) return;
        if(gameMode === 'ai' && currentPlayer !== 1) return;
        const coords = getCoords(e);
        const cue = balls.find(b => b.num === 0 && !b.pocketed);
        if(cue) { angle = Math.atan2(coords.y - cue.y, coords.x - cue.x); draw(); }
    }
    
    function onMouseUp() { isDragging = false; }
    
    // ========== თამაშის კონტროლი ==========
    function endGame(winner) {
        gameActive = false;
        document.getElementById('winText').innerHTML = `${players[winner].name} გაიმარჯვა!`;
        document.getElementById('winEmoji').innerHTML = winner === 1 ? '🏆' : '🎯';
        document.getElementById('winOverlay').style.display = 'flex';
    }
    
    function resetGame() {
        gameActive = true;
        currentPlayer = 1;
        isMoving = false;
        placingCueBall = false;
        players[1].score = 0; players[2].score = 0;
        players[1].pocketed = []; players[2].pocketed = [];
        players[1].group = null; players[2].group = null;
        initBalls();
        updateUI();
        draw();
        document.getElementById('winOverlay').style.display = 'none';
    }
    
    // ========== რეჟიმები ==========
    function startLocalGame() {
        gameMode = 'local';
        onlineMode = false;
        players[1].name = '👤 მოთამაშე 1';
        players[2].name = '👤 მოთამაშე 2';
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        resetGame();
    }
    
    function startAIGame() {
        gameMode = 'ai';
        onlineMode = false;
        players[1].name = '👤 მოთამაშე';
        players[2].name = '🤖 AI';
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        resetGame();
    }
    
    function backToMenu() {
        document.getElementById('mainMenu').style.display = 'flex';
        document.getElementById('gameArea').style.display = 'none';
        resetGame();
    }
    
    // ========== ონლაინ (დემო) ==========
    function goOnline() {
        const name = document.getElementById('playerName').value || 'მოთამაშე';
        onlineMode = true;
        document.getElementById('onlineArea').style.display = 'block';
        document.getElementById('onlineStatus').innerHTML = '🔍 მომხმარებლების ძიება...';
        
        // დემო მომხმარებლები
        const demoUsers = [
            { id: '1', name: '🎮 გიორგი', online: true },
            { id: '2', name: '🎯 ნიკა', online: true },
            { id: '3', name: '🎱 თამარი', online: true },
            { id: '4', name: '🏆 დავითი', online: true }
        ];
        
        const list = document.getElementById('onlineUsers');
        list.innerHTML = demoUsers.map(u => `
            <div class="online-user">
                <span>${u.name}</span>
                <button class="invite-btn" onclick="sendInvite('${u.id}', '${u.name}')">📨 მოწვევა</button>
            </div>
        `).join('');
        
        document.getElementById('onlineStatus').innerHTML = '✅ 4 მომხმარებელი ონლაინში';
    }
    
    function sendInvite(userId, userName) {
        // მოწვევის გაგზავნა
        showInviteNotification(userName);
        alert(`📨 მოწვევა გაეგზავნა ${userName}-ს`);
    }
    
    function showInviteNotification(fromName) {
        // წაშალე ძველი
        const old = document.querySelector('.invite-notification');
        if(old) old.remove();
        
        const div = document.createElement('div');
        div.className = 'invite-notification';
        div.innerHTML = `
            <div style="margin-bottom: 10px;">🎱 <strong>${fromName}</strong> გიწვევს სათამაშოდ!</div>
            <div class="invite-buttons">
                <button class="accept-btn" onclick="acceptInvite(this)">✅ მიღება</button>
                <button class="decline-btn" onclick="declineInvite(this)">❌ უარი</button>
            </div>
        `;
        document.body.appendChild(div);
    }
    
    function acceptInvite(btn) {
        const notif = btn.closest('.invite-notification');
        if(notif) notif.remove();
        alert('✅ მოწვევა მიღებულია! თამაში იწყება...');
        startLocalGame();
    }
    
    function declineInvite(btn) {
        const notif = btn.closest('.invite-notification');
        if(notif) notif.remove();
        alert('❌ მოწვევა უარყოფილია');
    }
    
    // ========== ინიციალიზაცია ==========
    const powerSlider = document.getElementById('powerSlider');
    const powerFill = document.getElementById('powerFill');
    
    powerSlider.addEventListener('input', (e) => {
        power = parseInt(e.target.value);
        powerFill.style.width = power + '%';
    });
    
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('touchstart', onMouseDown);
    canvas.addEventListener('touchmove', onMouseMove);
    canvas.addEventListener('touchend', onMouseUp);
    
    document.getElementById('shootBtn').addEventListener('click', shoot);
    
    initBalls();
    updateUI();
    draw();
</script>
</body>
