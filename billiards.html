<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ბილიარდი — კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;--panel:#120f24;--panel2:#1a1730;--border:rgba(160,80,255,0.35);
  --text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;--input-bg:#221f3a;
  --online:#c07aff;--indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.18);
  --glow:rgba(168,85,247,0.28);--accent:#f07aff;
  --green:#4ade80;--green-f:rgba(74,222,128,0.15);
  --felt:#1a4a2e;--felt2:#1f5c38;--rail:#2d1b00;--rail2:#4a2d00;--chalk:#d4a574;
}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

#topnav{display:flex;align-items:center;gap:8px;background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;flex-shrink:0;z-index:100}
.nav-back{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;padding:6px 14px;cursor:pointer}
.nav-back:hover{background:var(--border);color:var(--text)}
.nav-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-left:4px}
.nav-spacer{flex:1}
.nav-score{font-family:'Unbounded',sans-serif;font-size:12px;color:var(--accent);background:var(--indigo-f);border:1px solid var(--border);border-radius:12px;padding:5px 14px}

#layout{display:flex;flex:1;min-height:0;gap:0}
#gameArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;padding:12px;gap:10px;position:relative}
#rightPanel{width:280px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
@media(max-width:768px){#rightPanel{display:none}}

#lobbyScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;width:100%;max-width:520px;margin:0 auto}
.lobby-icon{font-size:72px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.lobby-title{font-family:'Unbounded',sans-serif;font-size:24px;font-weight:900;color:var(--text);text-align:center}
.lobby-subtitle{font-size:13px;color:var(--text3);text-align:center}
.lobby-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.lobby-btn{padding:14px 24px;border-radius:16px;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.lobby-btn.primary{background:linear-gradient(135deg,#7a1fc8,#a855f7);color:#fff}
.lobby-btn.green{background:linear-gradient(135deg,#16a34a,#4ade80);color:#052e16}
.lobby-btn.secondary{background:var(--indigo-f);border:1px solid var(--border);color:var(--text2)}

#inviteModal{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:5000;display:none;align-items:center;justify-content:center;padding:16px}
#inviteModal.open{display:flex}
.invite-box{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:28px;width:100%;max-width:400px}
.invite-title{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;color:var(--text);margin-bottom:16px}
.invite-search{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:13px;outline:none;margin-bottom:12px}
#inviteUserList{max-height:220px;overflow-y:auto}
.invite-user-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:3px}
.invite-user-item:hover{background:var(--indigo-f);border-color:var(--border)}
.invite-av{width:36px;height:36px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0}
.invite-av img{width:100%;height:100%;object-fit:cover}
.invite-name{font-size:13px;font-weight:500;color:var(--text)}
.invite-online{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;flex-shrink:0}
.invite-cancel{margin-top:12px;width:100%;padding:10px;border-radius:12px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer}
.invite-section-hdr{font-size:9px;font-family:'Unbounded',sans-serif;padding:4px 8px 6px;opacity:0.8}

#incomingModal{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:6000;display:none;align-items:center;justify-content:center;padding:16px}
#incomingModal.open{display:flex}
.incoming-box{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:28px;width:100%;max-width:340px;text-align:center}
.incoming-icon{font-size:56px;margin-bottom:12px}
.incoming-from{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.incoming-msg{font-size:13px;color:var(--text2);margin-bottom:20px}
.incoming-btns{display:flex;gap:10px}
.incoming-accept{flex:1;padding:12px;border-radius:14px;background:linear-gradient(135deg,#16a34a,#4ade80);border:none;color:#052e16;font-weight:700;cursor:pointer}
.incoming-decline{flex:1;padding:12px;border-radius:14px;background:rgba(220,0,0,.1);border:1px solid rgba(220,0,0,.3);color:#ff7777;font-weight:700;cursor:pointer}

#waitingScreen{display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center}
.waiting-spinner{width:56px;height:56px;border:3px solid var(--border);border-top-color:#f07aff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.waiting-title{font-family:'Unbounded',sans-serif;font-size:16px;color:var(--text)}
.waiting-cancel{padding:10px 24px;border-radius:12px;background:rgba(220,0,0,.1);border:1px solid rgba(220,0,0,.3);color:#ff7777;font-size:13px;cursor:pointer}

#gameHUD{display:flex;align-items:center;gap:12px;width:100%;max-width:700px;flex-shrink:0}
.hud-player{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.hud-player.active{border-color:#f07aff;box-shadow:0 0 20px rgba(168,85,247,.3)}
.hud-av{width:38px;height:38px;border-radius:50%;background:var(--indigo-f);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.hud-av img{width:100%;height:100%;object-fit:cover}
.hud-info{flex:1}
.hud-name{font-size:12px;font-weight:600;color:var(--text)}
.hud-balls{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.hud-ball{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,.2)}
.hud-turn{font-size:9px;font-family:'Unbounded',sans-serif;color:#f07aff;position:absolute;top:6px;right:8px}
.hud-vs{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:900;color:var(--text3)}

#tableWrap{position:relative;background:#2d1b00;border-radius:16px;padding:18px;box-shadow:0 0 60px rgba(0,0,0,.8);flex-shrink:0}
canvas#billiards{display:block;border-radius:8px;touch-action:none}

#powerBar{display:flex;align-items:center;gap:8px;width:100%;max-width:700px;flex-shrink:0}
.power-label{font-size:10px;color:var(--text3)}
.power-track{flex:1;height:8px;background:var(--panel2);border-radius:4px;overflow:hidden}
.power-fill{height:100%;background:linear-gradient(90deg,#4ade80,#fbbf24,#ef4444);transition:width .1s}
#powerVal{font-size:10px;color:var(--text2);width:30px}

#statusBar{font-size:12px;color:var(--text2);text-align:center;min-height:20px}
#ballInHandHint{display:none;background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);border-radius:10px;padding:6px 14px;font-size:11px;color:#4ade80;width:100%;max-width:700px}

#resultOverlay{position:absolute;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);border-radius:16px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200}
#resultOverlay.open{display:flex}
.result-icon{font-size:60px}
.result-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:var(--text)}
.result-btn{padding:12px 32px;border-radius:14px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px}
.result-btn.again{background:linear-gradient(135deg,#7a1fc8,#a855f7);color:#fff}

#chatPanel{flex:1;display:flex;flex-direction:column;min-height:0}
#chatMsgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:4px}
.chat-msg{display:flex;gap:7px;align-items:flex-start}
.chat-msg-av{width:28px;height:28px;border-radius:50%;background:var(--indigo-f);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.chat-msg-av img{width:100%;height:100%;object-fit:cover}
.chat-msg-bubble{background:var(--bubble);border:1px solid var(--border);border-radius:4px 12px 12px 12px;padding:7px 10px;font-size:12px;color:var(--text)}
.chat-msg.mine .chat-msg-bubble{background:rgba(120,30,200,0.22)}
.chat-msg.sys .chat-msg-bubble{background:rgba(74,222,128,.08);color:#4ade80;font-style:italic;font-size:11px}
.chat-bar{display:flex;gap:6px;padding:8px;border-top:1px solid var(--border)}
.chat-em-btn{width:34px;height:34px;border-radius:10px;background:var(--indigo-f);border:1px solid var(--border);font-size:16px;cursor:pointer}
#chatInput{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:8px 12px;color:var(--text);font-size:12px;outline:none}
.chat-send{background:linear-gradient(135deg,#7a1fc8,#a855f7);border:none;border-radius:10px;color:#fff;font-size:15px;cursor:pointer;padding:0 12px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7a1fc8,#a855f7);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:99999;animation:popIn .3s ease}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<nav id="topnav">
  <button class="nav-back" onclick="goBack()">← უკან</button>
  <div class="nav-title">🎱 ბილიარდი</div>
  <div class="nav-spacer"></div>
  <div class="nav-score" id="myScoreDisplay">💜 0</div>
</nav>

<div id="inviteModal">
  <div class="invite-box">
    <div class="invite-title">👥 მოიწვიე მოთამაშე</div>
    <input class="invite-search" id="inviteSearch" placeholder="🔍 ძებნა..." oninput="filterInviteList()">
    <div id="inviteUserList"><div style="text-align:center;padding:20px;color:var(--text3)">იტვირთება...</div></div>
    <button class="invite-cancel" onclick="closeInviteModal()">✕ გაუქმება</button>
  </div>
</div>

<div id="incomingModal">
  <div class="incoming-box">
    <div class="incoming-icon">🎱</div>
    <div class="incoming-from" id="incomingFromName">?</div>
    <div class="incoming-msg">გიწვევთ ბილიარდის თამაშში!</div>
    <div class="incoming-btns">
      <button class="incoming-accept" onclick="acceptInvite()">✅ დასტური</button>
      <button class="incoming-decline" onclick="declineInvite()">❌ უარი</button>
    </div>
  </div>
</div>

<div id="layout">
  <div id="gameArea">
    <div id="lobbyScreen">
      <div class="lobby-icon">🎱</div>
      <div class="lobby-title">ბილიარდი</div>
      <div class="lobby-subtitle">8-ბურთი · კლასიკური ბილიარდი</div>
      <div class="lobby-btns">
        <button class="lobby-btn primary" onclick="startVsAI()">🤖 AI-ს წინააღმდეგ</button>
        <button class="lobby-btn green" onclick="openInviteModal()">👥 მეგობრის მოწვევა</button>
        <button class="lobby-btn secondary" onclick="goBack()">← მთავარ გვერდზე</button>
      </div>
    </div>

    <div id="waitingScreen">
      <div class="waiting-spinner"></div>
      <div class="waiting-title" id="waitingTitle">ველოდებით...</div>
      <button class="waiting-cancel" onclick="cancelInvite()">✕ გაუქმება</button>
    </div>

    <div id="hudWrap" style="display:none;flex-direction:column;align-items:center;gap:8px;width:100%">
      <div id="gameHUD">
        <div class="hud-player active" id="hudP1">
          <div class="hud-av" id="hudP1Av">😊</div>
          <div class="hud-info">
            <div class="hud-name" id="hudP1Name">თქვენ</div>
            <div class="hud-balls" id="hudP1Balls"></div>
          </div>
        </div>
        <div class="hud-vs">VS</div>
        <div class="hud-player" id="hudP2">
          <div class="hud-av" id="hudP2Av">🤖</div>
          <div class="hud-info">
            <div class="hud-name" id="hudP2Name">AI</div>
            <div class="hud-balls" id="hudP2Balls"></div>
          </div>
        </div>
      </div>

      <div id="tableWrap" style="position:relative">
        <canvas id="billiards" width="660" height="360"></canvas>
        <div id="resultOverlay">
          <div class="result-icon" id="resultIcon">🏆</div>
          <div class="result-title" id="resultTitle">გამარჯვება!</div>
          <button class="result-btn again" onclick="restartGame()">🔄 კვლავ</button>
        </div>
      </div>

      <div id="ballInHandHint">🎱 Ball-in-hand: დააჭირეთ მაგიდაზე</div>
      <div id="powerBar">
        <div class="power-label">ძალა:</div>
        <div class="power-track"><div class="power-fill" id="powerFill" style="width:0%"></div></div>
        <div id="powerVal">0%</div>
      </div>
      <div id="statusBar">თამაში იწყება...</div>
    </div>
  </div>

  <div id="rightPanel">
    <div id="chatPanel">
      <div id="chatMsgs"></div>
      <div class="chat-bar">
        <input id="chatInput" placeholder="შეტყობინება..." onkeydown="if(event.key==='Enter')sendChatMsg()">
        <button class="chat-send" onclick="sendChatMsg()">✈️</button>
      </div>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

let ME = null, MYPROF = null;
let allUsers = [];
let gameMode = null;
let currentInviteId = null, opponentId = null, opponentProf = null;
let gameActive = false, myTurn = false;
let GAME_KEY = null;
let aiThinkTimer = null;
let myPlayerNum = 1;

// თამაშის ცვლადები
const W = 660, H = 360;
const RAIL_W = 22;
const POCKET_R = 16;
let balls = [];
let cuePower = 0, isAiming = false, isDragging = false;
let mouseX = 0, mouseY = 0;
let animating = false;
let ballInHand = false;
let currentPlayer = 1;
let p1Team = null, p2Team = null;
let p1Pocketed = [], p2Pocketed = [];
let breakShot = true;
let raf = null;

const POCKETS = [
  {x: RAIL_W, y: RAIL_W}, {x: W/2, y: RAIL_W-4}, {x: W-RAIL_W, y: RAIL_W},
  {x: RAIL_W, y: H-RAIL_W}, {x: W/2, y: H-RAIL_W+4}, {x: W-RAIL_W, y: H-RAIL_W}
];
const BALL_COLORS = {
  1:'#fbbf24',2:'#2563eb',3:'#dc2626',4:'#7c3aed',5:'#ea580c',
  6:'#16a34a',7:'#be185d',8:'#111827',
  9:'#fbbf24',10:'#2563eb',11:'#dc2626',12:'#7c3aed',
  13:'#ea580c',14:'#16a34a',15:'#be185d'
};

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
function goBack() { window.close(); if (!window.closed) location.href = 'index.html'; }

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { location.href = 'index.html'; return; }
  ME = user;
  const { data } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  MYPROF = data;
  document.getElementById('myScoreDisplay').textContent = '💜 ' + (MYPROF?.billiard_score || 0);
  
  await sb.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', ME.id);
  setInterval(async () => {
    await sb.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', ME.id);
  }, 30000);
  
  await loadAllUsers();
  watchInvites();
}

async function loadAllUsers() {
  const { data, error } = await sb.from('profiles')
    .select('id, username, avatar_url, emotion, last_seen, billiard_score')
    .order('billiard_score', { ascending: false });
  if (!error) allUsers = data || [];
}

function isOnline(ts) {
  if (!ts) return false;
  return Date.now() - new Date(ts).getTime() < 90000;
}

async function openInviteModal() {
  const modal = document.getElementById('inviteModal');
  modal.classList.add('open');
  document.getElementById('inviteSearch').value = '';
  
  // მომხმარებლების ჩატვირთვა
  await loadAllUsers();
  renderInviteList('');
}

function closeInviteModal() {
  document.getElementById('inviteModal').classList.remove('open');
}

function renderInviteList(filter) {
  const el = document.getElementById('inviteUserList');
  el.innerHTML = '';
  
  const q = (filter || '').toLowerCase();
  const others = allUsers.filter(u => u.id !== ME.id);
  const filtered = q ? others.filter(u => (u.username || '').toLowerCase().includes(q)) : others;
  
  if (!filtered.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:16px">მომხმარებელი ვერ მოიძებნა</div>';
    return;
  }
  
  const online = filtered.filter(u => isOnline(u.last_seen));
  const offline = filtered.filter(u => !isOnline(u.last_seen));
  
  if (online.length) {
    const hdr = document.createElement('div');
    hdr.className = 'invite-section-hdr';
    hdr.style.color = '#4ade80';
    hdr.textContent = '🟢 ონლაინი (' + online.length + ')';
    el.appendChild(hdr);
    online.forEach(u => el.appendChild(makeInviteRow(u, true)));
  }
  
  if (offline.length) {
    const hdr = document.createElement('div');
    hdr.className = 'invite-section-hdr';
    hdr.style.color = 'var(--text3)';
    hdr.textContent = '⚫ ოფლაინი (' + offline.length + ')';
    el.appendChild(hdr);
    offline.forEach(u => el.appendChild(makeInviteRow(u, false)));
  }
}

function makeInviteRow(u, online) {
  const div = document.createElement('div');
  div.className = 'invite-user-item';
  const avHtml = u.avatar_url ? `<img src="${u.avatar_url}">` : (u.emotion || '😊');
  div.innerHTML = `
    <div class="invite-av">${avHtml}</div>
    <div style="flex:1">
      <div class="invite-name">${esc(u.username || '?')}</div>
      <div style="font-size:10px;color:var(--text3)">💜 ${u.billiard_score || 0}</div>
    </div>
    ${online ? '<div class="invite-online"></div>' : ''}
  `;
  div.onclick = () => sendInvite(u.id);
  return div;
}

function filterInviteList() {
  renderInviteList(document.getElementById('inviteSearch').value);
}

async function sendInvite(uid) {
  closeInviteModal();
  const { data, error } = await sb.from('billiard_invites')
    .insert({ from_id: ME.id, to_id: uid, status: 'pending' })
    .select('id').single();
  
  if (error) {
    toast('❌ მოწვევა ვერ გაიგზავნა');
    return;
  }
  
  currentInviteId = data.id;
  opponentId = uid;
  opponentProf = allUsers.find(u => u.id === uid);
  
  document.getElementById('lobbyScreen').style.display = 'none';
  document.getElementById('waitingScreen').style.display = 'flex';
  document.getElementById('waitingTitle').textContent = 'ველოდებით ' + (opponentProf?.username || '?') + '-ს...';
  
  // მოწვევაზე პასუხის მოსმენა
  const ch = sb.channel('invite_resp_' + data.id)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'billiard_invites', filter: `id=eq.${data.id}` }, async (p) => {
      if (p.new.status === 'accepted') {
        sb.removeChannel(ch);
        await startOnlineGame(data.id, 'caller');
      } else if (p.new.status === 'declined') {
        sb.removeChannel(ch);
        toast('❌ მოწვევაზე უარი თქვეს');
        showLobby();
      }
    }).subscribe();
}

function watchInvites() {
  sb.channel('invites_for_' + ME.id)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'billiard_invites', filter: `to_id=eq.${ME.id}` }, async (p) => {
      if (p.new.status !== 'pending') return;
      if (gameActive) return;
      
      currentInviteId = p.new.id;
      await loadAllUsers();
      const sender = allUsers.find(u => u.id === p.new.from_id) || { username: '?', emotion: '😊' };
      opponentId = p.new.from_id;
      opponentProf = sender;
      
      document.getElementById('incomingFromName').textContent = sender.username || '?';
      document.getElementById('incomingModal').classList.add('open');
    }).subscribe();
}

async function acceptInvite() {
  document.getElementById('incomingModal').classList.remove('open');
  if (!currentInviteId) return;
  await sb.from('billiard_invites').update({ status: 'accepted' }).eq('id', currentInviteId);
  await startOnlineGame(currentInviteId, 'callee');
}

async function declineInvite() {
  document.getElementById('incomingModal').classList.remove('open');
  if (currentInviteId) {
    await sb.from('billiard_invites').update({ status: 'declined' }).eq('id', currentInviteId);
    currentInviteId = null;
  }
}

async function cancelInvite() {
  if (currentInviteId) {
    await sb.from('billiard_invites').update({ status: 'cancelled' }).eq('id', currentInviteId);
    currentInviteId = null;
  }
  showLobby();
}

function startVsAI() {
  gameMode = 'ai';
  myPlayerNum = 1;
  opponentProf = { username: '🤖 AI', id: 'ai' };
  initGame();
  showGameUI();
  gameActive = true;
  myTurn = true;
  currentPlayer = 1;
  setStatus('შენი ჯერი!');
}

async function startOnlineGame(invId, role) {
  gameMode = 'online';
  GAME_KEY = 'billiard_' + invId;
  const isCaller = (role === 'caller');
  myPlayerNum = isCaller ? 1 : 2;
  currentPlayer = 1;
  myTurn = isCaller;
  
  initGame();
  showGameUI();
  gameActive = true;
  setStatus(myTurn ? 'შენი ჯერი!' : 'მოწინააღმდეგის ჯერი...');
}

function showGameUI() {
  document.getElementById('lobbyScreen').style.display = 'none';
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('hudWrap').style.display = 'flex';
  
  const avHtml = (prof) => prof?.avatar_url ? `<img src="${prof.avatar_url}">` : (prof?.emotion || '😊');
  document.getElementById('hudP1Av').innerHTML = avHtml(MYPROF);
  document.getElementById('hudP2Av').innerHTML = avHtml(opponentProf);
  document.getElementById('hudP1Name').textContent = MYPROF?.username || 'თქვენ';
  document.getElementById('hudP2Name').textContent = opponentProf?.username || 'AI';
  
  resizeCanvas();
}

function showLobby() {
  document.getElementById('lobbyScreen').style.display = 'flex';
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('hudWrap').style.display = 'none';
  gameActive = false;
  myTurn = false;
  if (raf) cancelAnimationFrame(raf);
  if (aiThinkTimer) clearTimeout(aiThinkTimer);
}

function resizeCanvas() {
  const c = document.getElementById('billiards');
  const wrap = document.getElementById('tableWrap');
  const maxW = Math.min(660, wrap.parentElement.clientWidth - 40);
  const scale = maxW / 660;
  c.style.width = (660 * scale) + 'px';
  c.style.height = (360 * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);

function initGame() {
  balls = [];
  breakShot = true;
  p1Team = null;
  p2Team = null;
  p1Pocketed = [];
  p2Pocketed = [];
  animating = false;
  ballInHand = false;
  
  // თეთრი ბურთი
  balls.push({ id: 0, x: W * 0.25, y: H / 2, vx: 0, vy: 0, r: 11, color: '#ffffff', active: true, type: 'cue' });
  
  // ბურთების რაკი
  const rx = W * 0.65, ry = H / 2, rs = 23;
  const rack = [
    { row: 0, col: 0, n: 1 }, { row: 1, col: 0, n: 2 }, { row: 1, col: 1, n: 9 },
    { row: 2, col: 0, n: 3 }, { row: 2, col: 1, n: 8 }, { row: 2, col: 2, n: 10 },
    { row: 3, col: 0, n: 4 }, { row: 3, col: 1, n: 14 }, { row: 3, col: 2, n: 7 }, { row: 3, col: 3, n: 11 },
    { row: 4, col: 0, n: 12 }, { row: 4, col: 1, n: 6 }, { row: 4, col: 2, n: 15 }, { row: 4, col: 3, n: 13 }, { row: 4, col: 4, n: 5 }
  ];
  rack.forEach(({ row, col, n }) => {
    const x = rx + row * rs * Math.cos(Math.PI / 6);
    const y = ry + (col - (row / 2)) * rs;
    balls.push({ id: n, x, y, vx: 0, vy: 0, r: 11, color: BALL_COLORS[n], active: true, type: (n >= 1 && n <= 7) ? 'solid' : 'stripe', n });
  });
  
  startRenderLoop();
}

function startRenderLoop() {
  if (raf) cancelAnimationFrame(raf);
  function loop() { update(); draw(); raf = requestAnimationFrame(loop); }
  loop();
}

function update() {
  if (!animating) return;
  
  let allStopped = true;
  balls.forEach(b => {
    if (!b.active) return;
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= 0.985;
    b.vy *= 0.985;
    if (Math.abs(b.vx) < 0.08) b.vx = 0;
    if (Math.abs(b.vy) < 0.08) b.vy = 0;
    if (b.vx || b.vy) allStopped = false;
    
    // კედლები
    if (b.x - b.r < RAIL_W) { b.x = RAIL_W + b.r; b.vx *= -0.75; }
    if (b.x + b.r > W - RAIL_W) { b.x = W - RAIL_W - b.r; b.vx *= -0.75; }
    if (b.y - b.r < RAIL_W) { b.y = RAIL_W + b.r; b.vy *= -0.75; }
    if (b.y + b.r > H - RAIL_W) { b.y = H - RAIL_W - b.r; b.vy *= -0.75; }
  });
  
  // შეჯახებები
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      const a = balls[i], b = balls[j];
      if (!a.active || !b.active) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minD = a.r + b.r;
      if (dist < minD && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = (minD - dist) / 2;
        a.x -= nx * overlap;
        a.y -= ny * overlap;
        b.x += nx * overlap;
        b.y += ny * overlap;
        const dvx = b.vx - a.vx, dvy = b.vy - a.vy;
        const dot = dvx * nx + dvy * ny;
        if (dot < 0) {
          const imp = dot * 0.95;
          a.vx += imp * nx;
          a.vy += imp * ny;
          b.vx -= imp * nx;
          b.vy -= imp * ny;
        }
      }
    }
  }
  
  // ჯიბეები
  let pocketedThisTurn = [];
  let cuePocketed = false;
  balls.forEach(b => {
    if (!b.active) return;
    POCKETS.forEach(p => {
      const dx = b.x - p.x, dy = b.y - p.y;
      if (Math.sqrt(dx * dx + dy * dy) < POCKET_R + 2) {
        b.active = false;
        if (b.type === 'cue') cuePocketed = true;
        else pocketedThisTurn.push(b);
      }
    });
  });
  
  if (allStopped) {
    animating = false;
    onTurnEnd(pocketedThisTurn, cuePocketed);
  }
}

function onTurnEnd(pocketed, cueFoul) {
  // გუნდის მინიჭება
  if (breakShot && pocketed.length > 0) {
    breakShot = false;
    if (!p1Team) {
      const first = pocketed[0];
      if (currentPlayer === 1) {
        p1Team = first.type === 'solid' ? 'solid' : 'stripe';
        p2Team = p1Team === 'solid' ? 'stripe' : 'solid';
      } else {
        p2Team = first.type === 'solid' ? 'solid' : 'stripe';
        p1Team = p2Team === 'solid' ? 'stripe' : 'solid';
      }
      toast(`⚡ ${currentPlayer === 1 ? 'თქვენ' : opponentProf?.username} → ${currentPlayer === 1 ? p1Team : p2Team}`);
    }
  } else if (breakShot && pocketed.length === 0) {
    breakShot = false;
  }
  
  // ჩაგდებული ბურთების ჩაწერა
  pocketed.forEach(b => {
    if (currentPlayer === 1 && p1Team && b.type === p1Team) {
      if (!p1Pocketed.includes(b.id)) p1Pocketed.push(b.id);
    } else if (currentPlayer === 2 && p2Team && b.type === p2Team) {
      if (!p2Pocketed.includes(b.id)) p2Pocketed.push(b.id);
    }
  });
  
  // 8-ბურთის შემოწმება
  const eightPocketed = pocketed.find(b => b.id === 8);
  if (eightPocketed) {
    const curTeam = currentPlayer === 1 ? p1Team : p2Team;
    const myTeamLeft = balls.filter(b => b.active && b.type === curTeam).length;
    const winner = (myTeamLeft === 0) ? currentPlayer : (currentPlayer === 1 ? 2 : 1);
    endGame(winner === 1 ? 'p1' : 'p2');
    return;
  }
  
  updateHUD();
  
  const scoredOwn = pocketed.length > 0 && p1Team &&
    pocketed.every(b => b.type === (currentPlayer === 1 ? p1Team : p2Team));
  
  if (cueFoul) {
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    myTurn = (currentPlayer === myPlayerNum);
    setStatus((myTurn ? 'შენ' : 'მოწინააღმდეგე') + ' ადებს თეთრ ბურთს');
    enterBallInHand();
  } else if (!scoredOwn) {
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    myTurn = (currentPlayer === myPlayerNum);
  }
  
  updateTurnHUD();
  
  if (!ballInHand && !myTurn && gameMode === 'ai') {
    aiThinkTimer = setTimeout(aiTakeTurn, 1000);
  }
}

function enterBallInHand() {
  ballInHand = true;
  if (myTurn) {
    document.getElementById('ballInHandHint').style.display = 'block';
    setStatus('Ball-in-hand - დააჭირე მაგიდაზე');
  } else if (gameMode === 'ai') {
    setTimeout(() => {
      let cb = balls.find(b => b.id === 0);
      if (cb) { cb.active = true; cb.x = W * 0.25 + Math.random() * 50; cb.y = H / 2; cb.vx = 0; cb.vy = 0; }
      ballInHand = false;
      aiTakeTurn();
    }, 800);
  }
}

function placeCueBallAt(x, y) {
  const minX = RAIL_W + 12, maxX = W - RAIL_W - 12;
  const minY = RAIL_W + 12, maxY = H - RAIL_W - 12;
  x = Math.max(minX, Math.min(maxX, x));
  y = Math.max(minY, Math.min(maxY, y));
  
  for (const b of balls) {
    if (!b.active || b.id === 0) continue;
    const dx = b.x - x, dy = b.y - y;
    if (Math.sqrt(dx * dx + dy * dy) < b.r + 12) {
      toast('⚠️ აქ სხვა ბურთია!');
      return false;
    }
  }
  
  let cb = balls.find(b => b.id === 0);
  if (cb) { cb.active = true; cb.x = x; cb.y = y; cb.vx = 0; cb.vy = 0; }
  return true;
}

function aiTakeTurn() {
  if (!gameActive || myTurn || gameMode !== 'ai' || ballInHand) return;
  
  const cb = balls.find(b => b.id === 0 && b.active);
  if (!cb) return;
  
  let targets = balls.filter(b => b.active && b.id !== 0 && b.id !== 8 && b.type === (p2Team || 'solid'));
  if (!targets.length) targets = balls.filter(b => b.active && b.id === 8);
  if (!targets.length) return;
  
  const target = targets[Math.floor(Math.random() * targets.length)];
  const angle = Math.atan2(target.y - cb.y, target.x - cb.x);
  shoot(angle, 0.3 + Math.random() * 0.5);
}

function shoot(angle, power) {
  const cb = balls.find(b => b.id === 0 && b.active);
  if (!cb) return;
  cb.vx = Math.cos(angle) * power * 18;
  cb.vy = Math.sin(angle) * power * 18;
  animating = true;
  setStatus('');
}

const canvas = document.getElementById('billiards');
const ctx = canvas.getContext('2d');

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawTable();
  drawPockets();
  balls.forEach(b => { if (b.active) drawBall(b); });
  if (!animating && myTurn && gameActive && !ballInHand) drawCue();
}

function drawTable() {
  ctx.fillStyle = '#1a4a2e';
  ctx.fillRect(RAIL_W, RAIL_W, W - RAIL_W * 2, H - RAIL_W * 2);
  ctx.fillStyle = '#2d1b00';
  ctx.fillRect(0, 0, W, RAIL_W);
  ctx.fillRect(0, H - RAIL_W, W, RAIL_W);
  ctx.fillRect(0, 0, RAIL_W, H);
  ctx.fillRect(W - RAIL_W, 0, RAIL_W, H);
}

function drawPockets() {
  POCKETS.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, POCKET_R, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
  });
}

function drawBall(b) {
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = b.color;
  ctx.fill();
  if (b.id > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.id, b.x, b.y);
  }
}

function drawCue() {
  const cb = balls.find(b => b.id === 0 && b.active);
  if (!cb) return;
  const angle = Math.atan2(mouseY - cb.y, mouseX - cb.x);
  const len = isAiming ? cuePower * 200 + 40 : 80;
  const tipX = cb.x - Math.cos(angle) * (cb.r + 4);
  const tipY = cb.y - Math.sin(angle) * (cb.r + 4);
  const endX = tipX - Math.cos(angle) * len;
  const endY = tipY - Math.sin(angle) * len;
  
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(endX, endY);
  ctx.strokeStyle = '#8b4513';
  ctx.lineWidth = 6;
  ctx.stroke();
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  let cx, cy;
  if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
  else { cx = e.clientX; cy = e.clientY; }
  return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}

function handleCanvasDown(e) {
  if (!myTurn || animating || !gameActive) return;
  const p = getCanvasPos(e);
  
  if (ballInHand) {
    if (placeCueBallAt(p.x, p.y)) {
      ballInHand = false;
      document.getElementById('ballInHandHint').style.display = 'none';
      setStatus('შენი ჯერი!');
    }
    return;
  }
  
  mouseX = p.x;
  mouseY = p.y;
  isDragging = true;
  isAiming = true;
  cuePower = 0;
}

function handleCanvasMove(e) {
  const p = getCanvasPos(e);
  mouseX = p.x;
  mouseY = p.y;
  
  if (ballInHand && myTurn) return;
  
  if (isDragging && isAiming) {
    const cb = balls.find(b => b.id === 0 && b.active);
    if (!cb) return;
    const dx = p.x - cb.x, dy = p.y - cb.y;
    cuePower = Math.min(1, Math.sqrt(dx * dx + dy * dy) / 120);
    document.getElementById('powerFill').style.width = (cuePower * 100) + '%';
    document.getElementById('powerVal').textContent = Math.round(cuePower * 100) + '%';
  }
}

function handleCanvasUp(e) {
  if (!isDragging || !isAiming || !myTurn || animating || !gameActive || ballInHand) return;
  isDragging = false;
  isAiming = false;
  
  const cb = balls.find(b => b.id === 0 && b.active);
  if (!cb) return;
  
  const p = getCanvasPos(e);
  const angle = Math.atan2(p.y - cb.y, p.x - cb.x);
  if (cuePower > 0.01) shoot(angle, cuePower);
  
  cuePower = 0;
  document.getElementById('powerFill').style.width = '0%';
  document.getElementById('powerVal').textContent = '0%';
}

canvas.addEventListener('mousedown', handleCanvasDown);
canvas.addEventListener('mousemove', handleCanvasMove);
canvas.addEventListener('mouseup', handleCanvasUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleCanvasDown(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); handleCanvasMove(e); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); handleCanvasUp(e); }, { passive: false });

function updateHUD() {
  const b1 = document.getElementById('hudP1Balls');
  const b2 = document.getElementById('hudP2Balls');
  b1.innerHTML = '';
  b2.innerHTML = '';
  
  if (p1Team) {
    for (let i = 0; i < 7; i++) {
      const d = document.createElement('div');
      d.className = 'hud-ball';
      d.style.background = i < p1Pocketed.length ? (p1Team === 'solid' ? '#fbbf24' : '#93c5fd') : 'rgba(255,255,255,0.15)';
      b1.appendChild(d);
    }
  }
  
  if (p2Team) {
    for (let i = 0; i < 7; i++) {
      const d = document.createElement('div');
      d.className = 'hud-ball';
      d.style.background = i < p2Pocketed.length ? (p2Team === 'solid' ? '#fbbf24' : '#93c5fd') : 'rgba(255,255,255,0.15)';
      b2.appendChild(d);
    }
  }
}

function updateTurnHUD() {
  const p1 = document.getElementById('hudP1');
  const p2 = document.getElementById('hudP2');
  p1.classList.toggle('active', currentPlayer === 1);
  p2.classList.toggle('active', currentPlayer === 2);
}

function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

function endGame(winner) {
  gameActive = false;
  if (raf) cancelAnimationFrame(raf);
  ballInHand = false;
  
  const myWon = (winner === 'p1' && myPlayerNum === 1) || (winner === 'p2' && myPlayerNum === 2);
  
  document.getElementById('resultIcon').textContent = myWon ? '🏆' : '😢';
  document.getElementById('resultTitle').textContent = myWon ? 'გამარჯვება!' : 'წაგება';
  document.getElementById('resultOverlay').classList.add('open');
  
  updateScore(myWon, gameMode === 'ai' ? 5 : 10);
  sendSystemMsg((myWon ? '🏆 ' + (MYPROF?.username || 'თქვენ') : '😢 ' + (opponentProf?.username || 'AI')) + ' გაიმარჯვა!');
}

async function updateScore(won, pts) {
  if (!MYPROF) return;
  const newScore = (MYPROF.billiard_score || 0) + (won ? pts : 0);
  const newWins = (MYPROF.billiard_wins || 0) + (won ? 1 : 0);
  const newLosses = (MYPROF.billiard_losses || 0) + (won ? 0 : 1);
  
  await sb.from('profiles').update({
    billiard_score: newScore,
    billiard_wins: newWins,
    billiard_losses: newLosses
  }).eq('id', ME.id);
  
  MYPROF.billiard_score = newScore;
  document.getElementById('myScoreDisplay').textContent = '💜 ' + newScore;
  toast((won ? '✅ +' + pts : '❌ +0') + ' ქულა');
}

function restartGame() {
  document.getElementById('resultOverlay').classList.remove('open');
  if (gameMode === 'ai') startVsAI();
  else showLobby();
}

function sendChatMsg() {
  const inp = document.getElementById('chatInput');
  const t = inp.value.trim();
  if (!t) return;
  inp.value = '';
  appendChatMsg({ nick: MYPROF?.username || 'თქვენ', content: t, mine: true });
}

function sendSystemMsg(msg) {
  appendChatMsg({ content: msg, sys: true });
}

function appendChatMsg({ nick, content, mine, sys }) {
  const wrap = document.createElement('div');
  wrap.className = 'chat-msg' + (mine ? ' mine' : '') + (sys ? ' sys' : '');
  
  if (sys) {
    wrap.innerHTML = `<div class="chat-msg-bubble">${esc(content)}</div>`;
  } else {
    wrap.innerHTML = `
      <div class="chat-msg-av">😊</div>
      <div class="chat-msg-bubble"><b>${esc(nick || '?')}:</b> ${esc(content)}</div>
    `;
  }
  
  document.getElementById('chatMsgs').appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth' });
}

init();
</script>
