<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ბილიარდი · სრული ვერსია</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    background: linear-gradient(135deg, #0a0612 0%, #110d22 100%);
    font-family: 'Segoe UI', 'Noto Sans Georgian', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    color: #ede0ff;
}

/* Mode selection screen */
#modeScreen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0a0612, #110d22);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    flex-direction: column;
    gap: 20px;
}

.mode-btn {
    background: linear-gradient(135deg, #7a1fc8, #a855f7);
    border: none;
    padding: 15px 40px;
    border-radius: 50px;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    transition: transform 0.3s;
    width: 250px;
    border: 1px solid rgba(168,85,247,0.3);
}

.mode-btn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #a855f7, #c084fc);
}

/* Scoreboard */
.scoreboard {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(17,13,34,0.95);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 12px 24px;
    display: flex;
    gap: 40px;
    z-index: 100;
    border: 1px solid rgba(168,85,247,0.3);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.player-score {
    text-align: center;
}

.player-name {
    font-size: 14px;
    font-weight: bold;
    background: linear-gradient(135deg, #f07aff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 5px;
}

.score-value {
    font-size: 28px;
    font-weight: bold;
    color: #f07aff;
}

.balls-pocketed {
    display: flex;
    gap: 5px;
    margin-top: 5px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 180px;
}

.mini-ball {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 2px black;
    box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3), inset 1px 1px 3px rgba(255,255,255,0.2);
}

.mini-ball.stripe {
    background: white;
    position: relative;
    overflow: hidden;
}

.mini-ball.stripe::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 8px;
    transform: translateY(-50%);
    background: currentColor;
}

/* Game container */
#gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
}

canvas {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    border-radius: 10px;
    cursor: crosshair;
}

#gameCanvas {
    background: #1a6b2f;
    z-index: 1;
}

#aimCanvas {
    z-index: 2;
}

/* Controls */
.controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(17,13,34,0.95);
    backdrop-filter: blur(10px);
    padding: 15px 25px;
    border-radius: 30px;
    display: flex;
    gap: 20px;
    align-items: center;
    z-index: 10;
    border: 1px solid rgba(168,85,247,0.3);
}

.power-bar {
    width: 200px;
    height: 8px;
    background: #1a1530;
    border-radius: 4px;
    overflow: hidden;
}

.power-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4ade80, #fbbf24, #f87171);
    transition: width 0.05s linear;
    border-radius: 4px;
}

button {
    background: linear-gradient(135deg, #7a1fc8, #a855f7);
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
    transition: transform 0.2s;
}

button:hover {
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}

.turn-indicator {
    position: fixed;
    top: 100px;
    left: 20px;
    background: rgba(17,13,34,0.95);
    padding: 10px 20px;
    border-radius: 10px;
    border-left: 4px solid #4ade80;
    font-size: 14px;
    z-index: 10;
    border: 1px solid rgba(168,85,247,0.3);
}

.place-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(17,13,34,0.95);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    z-index: 20;
    border: 2px solid #fbbf24;
    display: none;
    color: #fbbf24;
}

.win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,6,18,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.win-content {
    background: linear-gradient(135deg, #110d22, #1a1530);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    border: 2px solid #a855f7;
}

.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(17,13,34,0.9);
    padding: 8px 16px;
    border-radius: 20px;
    z-index: 100;
    cursor: pointer;
    font-size: 12px;
    border: 1px solid rgba(168,85,247,0.3);
    color: #b580e0;
}

/* Mobile */
@media (max-width: 768px) {
    .scoreboard { padding: 8px 16px; gap: 20px; }
    .score-value { font-size: 20px; }
    .controls { padding: 10px 15px; gap: 10px; }
    .power-bar { width: 120px; }
    button { padding: 6px 12px; font-size: 11px; }
    .mini-ball { width: 16px; height: 16px; font-size: 8px; }
    .mode-btn { padding: 12px 30px; font-size: 16px; width: 200px; }
}
</style>
</head>
<body>

<!-- Mode Selection Screen -->
<div id="modeScreen">
    <h1 style="margin-bottom: 30px; background: linear-gradient(135deg, #f07aff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎱 ბილიარდი</h1>
    <button class="mode-btn" onclick="startGame('ai')">🤖 AI-ს წინააღმდეგ</button>
    <button class="mode-btn" onclick="startGame('twoPlayer')">👥 ორი მოთამაშე</button>
</div>

<!-- Game Container -->
<div id="gameContainer">
    <div class="back-btn" onclick="backToMenu()">← მთავარი</div>
    
    <canvas id="gameCanvas"></canvas>
    <canvas id="aimCanvas"></canvas>
</div>

<!-- Scoreboard -->
<div class="scoreboard">
    <div class="player-score">
        <div class="player-name" id="player1Name">👤 მოთამაშე 1</div>
        <div class="score-value" id="score1">0</div>
        <div class="balls-pocketed" id="pocketed1"></div>
    </div>
    <div class="player-score">
        <div class="player-name" id="player2Name">🤖 AI</div>
        <div class="score-value" id="score2">0</div>
        <div class="balls-pocketed" id="pocketed2"></div>
    </div>
</div>

<div class="controls">
    <span>⚡ ძალა:</span>
    <div class="power-bar">
        <div class="power-fill" id="powerFill"></div>
    </div>
    <input type="range" id="powerSlider" min="0" max="100" value="50">
    <button id="shootBtn">🎯 სროლა</button>
</div>

<div class="turn-indicator" id="turnIndicator">
    🎱 თქვენი ჯერი
</div>

<div class="place-banner" id="placeBanner">
    ⚪ დადე თეთრი ბურთი<br>
    <small>დააჭირე იქ სადაც გინდა</small>
</div>

<div class="win-overlay" id="winOverlay">
    <div class="win-content">
        <div style="font-size: 48px;" id="winEmoji">🏆</div>
        <h2 id="winText">გამარჯვება!</h2>
        <button onclick="resetGame()">🔄 თავიდან</button>
    </div>
</div>

<script>
// ========== კონსტანტები ==========
const TABLE = { w: 1000, h: 600 };
const BALL_RADIUS = 10;
const FRICTION = 0.985;
const WALL_BOUNCE = 0.92;

const POCKETS = [
    { x: 25, y: 25 },
    { x: TABLE.w/2, y: 20 },
    { x: TABLE.w - 25, y: 25 },
    { x: 25, y: TABLE.h - 25 },
    { x: TABLE.w/2, y: TABLE.h - 20 },
    { x: TABLE.w - 25, y: TABLE.h - 25 }
];

// ფერები - ჩატის სტილში
const BALL_COLORS = {
    0: '#FFFFFF',  // თეთრი
    1: '#FFD700', 2: '#0044CC', 3: '#CC0000', 4: '#8800AA', 5: '#FF6600',
    6: '#006620', 7: '#880000', 8: '#1a1a2e',  // შავი
    9: '#FFD700', 10: '#0044CC', 11: '#CC0000', 12: '#8800AA',
    13: '#FF6600', 14: '#006620', 15: '#880000'
};

const SOLIDS = [1,2,3,4,5,6,7];
const STRIPES = [9,10,11,12,13,14,15];

// ========== თამაშის მდგომარეობა ==========
let balls = [];
let currentPlayer = 1;
let gameActive = true;
let power = 50;
let angle = 0;
let isDragging = false;
let isMoving = false;
let placingCueBall = false;
let foulOccurred = false;
let gameMode = 'ai';
let aiThinking = false;

let players = {
    1: { name: "👤 მოთამაშე", score: 0, pocketed: [], group: null },
    2: { name: "🤖 AI", score: 0, pocketed: [], group: null }
};

// ========== კანვასები ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const aimCanvas = document.getElementById('aimCanvas');
const aimCtx = aimCanvas.getContext('2d');

canvas.width = TABLE.w;
canvas.height = TABLE.h;
aimCanvas.width = TABLE.w;
aimCanvas.height = TABLE.h;

// ========== ბურთების ინიციალიზაცია ==========
function initBalls() {
    balls = [];
    const startX = TABLE.w - 150;
    const startY = TABLE.h/2;
    const spacing = BALL_RADIUS * 2.05;
    
    const positions = [
        [0,0], [-1,-1], [1,-1], [-2,-2], [0,-2], [2,-2],
        [-3,-3], [-1,-3], [1,-3], [3,-3], [-4,-4], [-2,-4], [0,-4], [2,-4], [4,-4]
    ];
    
    // ბურთების განლაგება: 8-ბურთი ცენტრშია
    const numbers = [1,9,2,10,8,3,11,4,12,5,13,6,14,7,15];
    
    for(let i = 0; i < positions.length; i++) {
        balls.push({
            id: i, number: numbers[i],
            x: startX + positions[i][0] * spacing,
            y: startY + positions[i][1] * spacing * 0.866,
            vx: 0, vy: 0, pocketed: false, 
            color: BALL_COLORS[numbers[i]],
            isStripe: STRIPES.has(numbers[i])
        });
    }
    
    // თეთრი ბურთი (cue ball)
    balls.push({
        id: 16, number: 0,
        x: TABLE.w * 0.2, y: TABLE.h/2,
        vx: 0, vy: 0, pocketed: false, 
        color: '#FFFFFF', isStripe: false
    });
}

// ========== ჯგუფის განსაზღვრა ==========
function determineGroup(ballNumber) {
    if(ballNumber === 8) return 'eight';
    if(SOLIDS.includes(ballNumber)) return 'solid';
    if(STRIPES.includes(ballNumber)) return 'stripe';
    return null;
}

// ========== AI ლოგიკა ==========
function findBestTarget() {
    const cueBall = balls.find(b => b.number === 0 && !b.pocketed);
    if(!cueBall) return null;
    
    const aiGroup = players[2].group;
    
    let targets = balls.filter(b => !b.pocketed && b.number !== 0);
    
    // ჯგუფის მიხედვით ფილტრაცია
    if(aiGroup && aiGroup !== 'eight') {
        targets = targets.filter(b => {
            const group = determineGroup(b.number);
            return group === aiGroup;
        });
    }
    
    // თუ ჯგუფის ყველა ბურთი ჩაგდებულია, მიზანია 8-ბურთი
    const remainingInGroup = targets.filter(b => determineGroup(b.number) === aiGroup).length;
    if(remainingInGroup === 0 && players[currentPlayer].pocketed.length >= 7) {
        targets = balls.filter(b => !b.pocketed && b.number === 8);
    }
    
    if(targets.length === 0) {
        targets = balls.filter(b => !b.pocketed && b.number !== 0 && b.number !== 8);
    }
    
    if(targets.length === 0) return null;
    
    // უახლოესი სამიზნე
    let best = targets[0];
    let bestDist = Math.hypot(best.x - cueBall.x, best.y - cueBall.y);
    
    for(let target of targets) {
        const dist = Math.hypot(target.x - cueBall.x, target.y - cueBall.y);
        if(dist < bestDist) {
            bestDist = dist;
            best = target;
        }
    }
    
    return best;
}

function calculateAIShot() {
    const cueBall = balls.find(b => b.number === 0 && !b.pocketed);
    if(!cueBall) return;
    
    const target = findBestTarget();
    if(!target) {
        angle = Math.random() * Math.PI * 2;
        power = 40 + Math.random() * 40;
        return;
    }
    
    let dx = target.x - cueBall.x;
    let dy = target.y - cueBall.y;
    angle = Math.atan2(dy, dx);
    
    // AI-ს შეცდომა (უფრო რეალისტური)
    angle += (Math.random() - 0.5) * 0.25;
    
    const dist = Math.hypot(dx, dy);
    power = Math.min(95, Math.max(30, dist / 5.5));
}

async function aiShoot() {
    if(aiThinking) return;
    if(currentPlayer !== 2) return;
    if(isMoving) return;
    if(placingCueBall) return;
    if(!gameActive) return;
    
    aiThinking = true;
    await new Promise(resolve => setTimeout(resolve, 500));
    
    if(currentPlayer !== 2 || isMoving || !gameActive) {
        aiThinking = false;
        return;
    }
    
    calculateAIShot();
    
    document.getElementById('powerSlider').value = power;
    document.getElementById('powerFill').style.width = power + '%';
    
    const cueBall = balls.find(b => b.number === 0 && !b.pocketed);
    if(cueBall) {
        const speed = power * 0.45;
        cueBall.vx = Math.cos(angle) * speed;
        cueBall.vy = Math.sin(angle) * speed;
        isMoving = true;
        foulOccurred = false;
        updatePhysics();
    }
    
    aiThinking = false;
}

// ========== ქულების განახლება ==========
function updateScoreboard() {
    document.getElementById('score1').textContent = players[1].score;
    document.getElementById('score2').textContent = players[2].score;
    document.getElementById('player1Name').textContent = players[1].name;
    document.getElementById('player2Name').textContent = players[2].name;
    
    const pocketed1Div = document.getElementById('pocketed1');
    const pocketed2Div = document.getElementById('pocketed2');
    
    pocketed1Div.innerHTML = players[1].pocketed.map(n => {
        const isStripe = STRIPES.has(n);
        const color = BALL_COLORS[n];
        if(isStripe) {
            return `<div class="mini-ball stripe" style="color: ${color}">${n}</div>`;
        }
        return `<div class="mini-ball" style="background: ${color}">${n}</div>`;
    }).join('');
    
    pocketed2Div.innerHTML = players[2].pocketed.map(n => {
        const isStripe = STRIPES.has(n);
        const color = BALL_COLORS[n];
        if(isStripe) {
            return `<div class="mini-ball stripe" style="color: ${color}">${n}</div>`;
        }
        return `<div class="mini-ball" style="background: ${color}">${n}</div>`;
    }).join('');
}

// ========== ფიზიკა ==========
function updatePhysics() {
    let anyMoving = false;
    
    for(let ball of balls) {
        if(ball.pocketed) continue;
        
        ball.x += ball.vx;
        ball.y += ball.vy;
        ball.vx *= FRICTION;
        ball.vy *= FRICTION;
        
        if(Math.abs(ball.vx) > 0.1 || Math.abs(ball.vy) > 0.1) {
            anyMoving = true;
        }
        
        // კედლებთან შეჯახება
        if(ball.x - BALL_RADIUS < 20) {
            ball.x = 20 + BALL_RADIUS;
            ball.vx = -ball.vx * WALL_BOUNCE;
        }
        if(ball.x + BALL_RADIUS > TABLE.w - 20) {
            ball.x = TABLE.w - 20 - BALL_RADIUS;
            ball.vx = -ball.vx * WALL_BOUNCE;
        }
        if(ball.y - BALL_RADIUS < 20) {
            ball.y = 20 + BALL_RADIUS;
            ball.vy = -ball.vy * WALL_BOUNCE;
        }
        if(ball.y + BALL_RADIUS > TABLE.h - 20) {
            ball.y = TABLE.h - 20 - BALL_RADIUS;
            ball.vy = -ball.vy * WALL_BOUNCE;
        }
        
        // ჯიბეებში მოხვედრის შემოწმება
        for(let pocket of POCKETS) {
            const dx = ball.x - pocket.x;
            const dy = ball.y - pocket.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist < BALL_RADIUS + 12 && !ball.pocketed) {
                ball.pocketed = true;
                ball.vx = 0;
                ball.vy = 0;
                
                // ========== თეთრი ბურთის ლოგიკა ==========
                if(ball.number === 0) {
                    // თეთრი ბურთი ჩავარდა - ფოული
                    foulOccurred = true;
                    placingCueBall = true;
                    document.getElementById('placeBanner').style.display = 'block';
                    document.getElementById('turnIndicator').innerHTML = '⚠️ ფოული! დადე თეთრი ბურთი';
                }
                // ========== 8-ბურთის ლოგიკა ==========
                else if(ball.number === 8) {
                    const playerGroup = players[currentPlayer].group;
                    const remainingBalls = balls.filter(b => 
                        !b.pocketed && b.number !== 0 && b.number !== 8 &&
                        determineGroup(b.number) === playerGroup
                    );
                    
                    // თუ ყველა ჯგუფის ბურთი ჩაგდებულია, 8-ბურთის ჩაგდება მოგებაა
                    if(remainingBalls.length === 0) {
                        endGame(currentPlayer);
                    } else {
                        // ნაადრევად ჩაგდებული 8-ბურთი - წაგება
                        endGame(3-currentPlayer);
                    }
                }
                // ========== ჩვეულებრივი ბურთების ლოგიკა ==========
                else if(ball.number !== 0 && ball.number !== 8) {
                    const group = determineGroup(ball.number);
                    
                    // ჯგუფების პირველად განსაზღვრა
                    if(players[1].group === null && players[2].group === null) {
                        players[currentPlayer].group = group;
                        players[3-currentPlayer].group = group === 'solid' ? 'stripe' : 'solid';
                        
                        // ვიზუალური შეტყობინება
                        const groupName = group === 'solid' ? 'სრული 🎱' : 'ზოლიანი 🎯';
                        document.getElementById('turnIndicator').innerHTML = `📌 ${players[currentPlayer].name} - ${groupName}`;
                        setTimeout(() => updateTurnDisplay(), 2000);
                    }
                    
                    const correctGroup = players[currentPlayer].group === group;
                    
                    if(correctGroup) {
                        players[currentPlayer].pocketed.push(ball.number);
                        players[currentPlayer].score++;
                        updateScoreboard();
                        // სწორი ბურთი - ჯერი გრძელდება
                    } else {
                        // არასწორი ბურთი - ფოული, ჯერი იცვლება
                        foulOccurred = true;
                    }
                }
                break;
            }
        }
    }
    
    // ბურთებს შორის შეჯახება
    for(let i = 0; i < balls.length; i++) {
        for(let j = i + 1; j < balls.length; j++) {
            const b1 = balls[i];
            const b2 = balls[j];
            if(b1.pocketed || b2.pocketed) continue;
            
            const dx = b2.x - b1.x;
            const dy = b2.y - b1.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist < BALL_RADIUS * 2) {
                const angle = Math.atan2(dy, dx);
                const overlap = BALL_RADIUS * 2 - dist;
                const moveX = Math.cos(angle) * overlap * 0.5;
                const moveY = Math.sin(angle) * overlap * 0.5;
                
                b1.x -= moveX;
                b1.y -= moveY;
                b2.x += moveX;
                b2.y += moveY;
                
                const nx = dx / dist;
                const ny = dy / dist;
                const dvx = b2.vx - b1.vx;
                const dvy = b2.vy - b1.vy;
                const dot = dvx * nx + dvy * ny;
                
                if(dot < 0) {
                    const impulse = dot * 0.8;
                    b1.vx += impulse * nx;
                    b1.vy += impulse * ny;
                    b2.vx -= impulse * nx;
                    b2.vy -= impulse * ny;
                }
            }
        }
    }
    
    // მოძრაობის შეწყვეტისას
    if(!anyMoving && isMoving) {
        isMoving = false;
        if(foulOccurred) {
            currentPlayer = 3 - currentPlayer;
            foulOccurred = false;
        }
        updateTurnDisplay();
        render();
        
        // AI-ს ჯერი
        if(gameActive && !placingCueBall && currentPlayer === 2 && gameMode === 'ai') {
            aiShoot();
        }
    }
    
    isMoving = anyMoving;
    
    if(isMoving) {
        requestAnimationFrame(updatePhysics);
        render();
    }
}

// ========== სროლა ==========
function shoot() {
    if(isMoving) return;
    if(placingCueBall) return;
    if(currentPlayer !== 1 && gameMode === 'ai') return;
    if(!gameActive) return;
    
    const cueBall = balls.find(b => b.number === 0 && !b.pocketed);
    if(!cueBall) return;
    
    const speed = power * 0.45;
    cueBall.vx = Math.cos(angle) * speed;
    cueBall.vy = Math.sin(angle) * speed;
    
    isMoving = true;
    foulOccurred = false;
    updatePhysics();
}

// ========== თეთრი ბურთის დადება (ფოულის შემდეგ) ==========
function placeCueBall(x, y) {
    // შემოწმება - არ ემთხვევა თუ არა სხვა ბურთებს
    let valid = true;
    for(let ball of balls) {
        if(ball.pocketed) continue;
        if(ball.number === 0) continue;
        const dx = ball.x - x;
        const dy = ball.y - y;
        if(Math.sqrt(dx*dx + dy*dy) < BALL_RADIUS * 2.5) {
            valid = false;
            break;
        }
    }
    
    // დადების ზონის შემოწმება (მთელი მაგიდა)
    if(valid && x > BALL_RADIUS + 10 && x < TABLE.w - BALL_RADIUS - 10 && 
       y > BALL_RADIUS + 10 && y < TABLE.h - BALL_RADIUS - 10) {
        const cueBall = balls.find(b => b.number === 0);
        if(cueBall) {
            cueBall.x = x;
            cueBall.y = y;
            cueBall.pocketed = false;
            cueBall.vx = 0;
            cueBall.vy = 0;
        }
        placingCueBall = false;
        document.getElementById('placeBanner').style.display = 'none';
        render();
        
        updateTurnDisplay();
        
        // AI-ს ჯერი
        if(gameActive && currentPlayer === 2 && gameMode === 'ai') {
            aiShoot();
        }
    }
}

// ========== ჯერის ინდიკატორის განახლება ==========
function updateTurnDisplay() {
    const indicator = document.getElementById('turnIndicator');
    if(currentPlayer === 1) {
        indicator.innerHTML = `🎯 ${players[1].name}-ის ჯერი`;
        indicator.style.borderLeftColor = '#4ade80';
    } else {
        if(gameMode === 'ai') {
            indicator.innerHTML = `🤖 AI ფიქრობს...`;
        } else {
            indicator.innerHTML = `🎯 ${players[2].name}-ის ჯერი`;
        }
        indicator.style.borderLeftColor = '#fbbf24';
    }
}

// ========== თამაშის დასრულება ==========
function endGame(winner) {
    gameActive = false;
    const overlay = document.getElementById('winOverlay');
    const winText = document.getElementById('winText');
    const winEmoji = document.getElementById('winEmoji');
    
    if(winner === 1) {
        winText.textContent = `🏆 ${players[1].name} გაიმარჯვა! 🏆`;
        winEmoji.textContent = '🎉';
    } else {
        if(gameMode === 'ai') {
            winText.textContent = `🤖 AI გაიმარჯვა!`;
            winEmoji.textContent = '🤖';
        } else {
            winText.textContent = `🏆 ${players[2].name} გაიმარჯვა! 🏆`;
            winEmoji.textContent = '🎯';
        }
    }
    overlay.style.display = 'flex';
}

// ========== თამაშის გადატვირთვა ==========
function resetGame() {
    gameActive = true;
    currentPlayer = 1;
    players[1].score = 0;
    players[2].score = 0;
    players[1].pocketed = [];
    players[2].pocketed = [];
    players[1].group = null;
    players[2].group = null;
    placingCueBall = false;
    foulOccurred = false;
    isMoving = false;
    aiThinking = false;
    
    initBalls();
    updateScoreboard();
    updateTurnDisplay();
    
    document.getElementById('winOverlay').style.display = 'none';
    document.getElementById('placeBanner').style.display = 'none';
    document.getElementById('shootBtn').disabled = false;
    
    render();
}

// ========== თამაშის დაწყება ==========
function startGame(mode) {
    gameMode = mode;
    
    if(mode === 'ai') {
        players[1].name = "👤 მოთამაშე";
        players[2].name = "🤖 AI";
    } else {
        players[1].name = "👤 მოთამაშე 1";
        players[2].name = "👤 მოთამაშე 2";
    }
    
    document.getElementById('modeScreen').style.display = 'none';
    document.getElementById('gameContainer').style.display = 'flex';
    
    resetGame();
}

function backToMenu() {
    document.getElementById('modeScreen').style.display = 'flex';
    document.getElementById('gameContainer').style.display = 'none';
    resetGame();
}

// ========== ვიზუალიზაცია ==========
function drawTable() {
    // მაგიდის ფონი
    ctx.fillStyle = '#1a6b2f';
    ctx.fillRect(0, 0, TABLE.w, TABLE.h);
    
    // კიდეები
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 8;
    ctx.strokeRect(15, 15, TABLE.w - 30, TABLE.h - 30);
    
    // ცენტრალური ხაზი
    ctx.beginPath();
    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = '#ffffff33';
    ctx.lineWidth = 2;
    ctx.moveTo(TABLE.w/2, 20);
    ctx.lineTo(TABLE.w/2, TABLE.h - 20);
    ctx.stroke();
    
    ctx.setLineDash([]);
    
    // ჯიბეები
    for(let pocket of POCKETS) {
        ctx.beginPath();
        ctx.arc(pocket.x, pocket.y, 15, 0, Math.PI * 2);
        ctx.fillStyle = '#00000066';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(pocket.x, pocket.y, 12, 0, Math.PI * 2);
        ctx.fillStyle = '#000000aa';
        ctx.fill();
    }
}

function drawBalls() {
    for(let ball of balls) {
        if(ball.pocketed) continue;
        
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
        
        // 3D ეფექტი
        const gradient = ctx.createRadialGradient(
            ball.x - 3, ball.y - 3, 3,
            ball.x, ball.y, BALL_RADIUS
        );
        
        if(ball.isStripe && ball.number !== 0) {
            // ზოლიანი ბურთი
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            ctx.save();
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
            ctx.clip();
            ctx.fillStyle = ball.color;
            ctx.fillRect(ball.x - BALL_RADIUS, ball.y - 4, BALL_RADIUS * 2, 8);
            ctx.restore();
        } else {
            gradient.addColorStop(0, ball.color);
            gradient.addColorStop(1, ball.color === '#FFFFFF' ? '#CCCCCC' : 
                `rgba(${parseInt(ball.color.slice(1,3), 16) * 0.6}, ${parseInt(ball.color.slice(3,5), 16) * 0.6}, ${parseInt(ball.color.slice(5,7), 16) * 0.6}, 1)`);
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        ctx.strokeStyle = '#00000066';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // ნომერი
        if(ball.number !== 0) {
            ctx.fillStyle = ball.number === 8 ? '#FFD700' : '#FFFFFF';
            ctx.font = `bold ${BALL_RADIUS + 2}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ball.number, ball.x, ball.y);
        }
    }
    ctx.shadowBlur = 0;
}

function drawAimLine() {
    aimCtx.clearRect(0, 0, TABLE.w, TABLE.h);
    if(isMoving) return;
    if(placingCueBall) return;
    if(currentPlayer !== 1 && gameMode === 'ai') return;
    
    const cueBall = balls.find(b => b.number === 0 && !b.pocketed);
    if(!cueBall) return;
    
    const endX = cueBall.x + Math.cos(angle) * 300;
    const endY = cueBall.y + Math.sin(angle) * 300;
    
    aimCtx.beginPath();
    aimCtx.setLineDash([5, 10]);
    aimCtx.strokeStyle = '#f07aff';
    aimCtx.lineWidth = 2;
    aimCtx.moveTo(cueBall.x, cueBall.y);
    aimCtx.lineTo(endX, endY);
    aimCtx.stroke();
    
    aimCtx.setLineDash([]);
    aimCtx.beginPath();
    aimCtx.arc(endX, endY, 5, 0, Math.PI * 2);
    aimCtx.fillStyle = '#f07affaa';
    aimCtx.fill();
}

function render() {
    drawTable();
    drawBalls();
    drawAimLine();
}

// ========== მაუსის მოვლენები ==========
function getMouseAngle(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    let clientX, clientY;
    if(e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    const canvasX = (clientX - rect.left) * scaleX;
    const canvasY = (clientY - rect.top) * scaleY;
    
    const cueBall = balls.find(b => b.number === 0 && !b.pocketed);
    if(cueBall) {
        angle = Math.atan2(canvasY - cueBall.y, canvasX - cueBall.x);
        render();
    }
}

function onMouseDown(e) {
    e.preventDefault();
    if(isMoving) return;
    if(currentPlayer !== 1 && gameMode === 'ai') return;
    
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    let clientX, clientY;
    if(e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    const canvasX = (clientX - rect.left) * scaleX;
    const canvasY = (clientY - rect.top) * scaleY;
    
    if(placingCueBall) {
        placeCueBall(canvasX, canvasY);
    } else {
        isDragging = true;
        getMouseAngle(e);
    }
}

function onMouseMove(e) {
    if(isDragging && !isMoving && !placingCueBall) {
        getMouseAngle(e);
    }
}

function onMouseUp(e) {
    isDragging = false;
}

// ========== ინიციალიზაცია ==========
const powerSlider = document.getElementById('powerSlider');
const powerFill = document.getElementById('powerFill');

powerSlider.addEventListener('input', (e) => {
    power = parseInt(e.target.value);
    powerFill.style.width = power + '%';
});

canvas.addEventListener('mousedown', onMouseDown);
canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('mouseup', onMouseUp);
canvas.addEventListener('touchstart', onMouseDown);
canvas.addEventListener('touchmove', onMouseMove);
canvas.addEventListener('touchend', onMouseUp);

document.getElementById('shootBtn').addEventListener('click', shoot);
</script>
