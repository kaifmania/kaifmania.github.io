<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ბილიარდი · კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0612;--panel:#110d22;--panel2:#1a1530;
  --border:rgba(160,80,255,0.3);--text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;
  --indigo:#7a1fc8;--indigo2:#a855f7;--if:rgba(120,30,200,0.15);
  --accent:#f07aff;--glow:rgba(168,85,247,0.3);
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);user-select:none}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes dot{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.4)}50%{box-shadow:0 0 0 6px rgba(74,222,128,0)}}
@keyframes placeGlow{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.5)}50%{box-shadow:0 0 18px 6px rgba(251,191,36,.25)}}

#lobby{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px;overflow-y:auto;animation:fi .4s ease}
.logo{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--indigo2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lcard{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:9px}
.lb{padding:11px 14px;border-radius:11px;border:1px solid var(--border);background:var(--if);color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.lb:hover{background:var(--indigo);border-color:var(--indigo2)}
.lb.p{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border-color:transparent;font-weight:600}
.lb.d{border-color:rgba(248,113,113,.3);color:var(--red)}
.lt{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:2px}
#usi{width:100%;padding:8px 11px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:'Noto Sans Georgian',sans-serif;outline:none}
#usi:focus{border-color:var(--indigo2)}#usi::placeholder{color:var(--text3)}
.ii{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;background:var(--panel2);border:1px solid var(--border)}
.ii .a{width:32px;height:32px;border-radius:50%;background:var(--if);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.ii .a img{width:100%;height:100%;object-fit:cover}
.ii .inf{flex:1;min-width:0}
.ii .ni{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ii .su{font-size:10px;color:var(--text3)}
.od{width:6px;height:6px;background:var(--green);border-radius:50%;flex-shrink:0}
.ib{background:var(--indigo);border:none;border-radius:7px;color:#fff;font-size:11px;padding:5px 10px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans Georgian',sans-serif}
.ib:hover{background:var(--indigo2)}
.wr{display:none;flex-direction:column;gap:8px;align-items:center}
.wps{display:flex;gap:14px;align-items:center}
.wsl{width:58px;height:58px;border-radius:50%;background:var(--if);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.wsl.f{border-style:solid;border-color:var(--indigo2)}
.wsl img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.wvs{font-family:'Unbounded',sans-serif;font-size:14px;color:var(--text3)}
.wdt span{display:inline-block;animation:dot 1s infinite}.wdt span:nth-child(2){animation-delay:.2s}.wdt span:nth-child(3){animation-delay:.4s}

#game{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg)}
#game.on{display:flex}

#gh{background:var(--panel);border-bottom:1px solid var(--border);padding:5px 11px;display:flex;align-items:center;gap:7px;flex-shrink:0;height:42px}
.ghb{background:var(--if);border:1px solid var(--border);border-radius:7px;padding:4px 9px;color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap}
.ght{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;flex:1;text-align:center}
.ghs{font-size:10px;color:var(--text3);background:var(--if);border:1px solid var(--border);border-radius:10px;padding:2px 8px;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}

.pr{background:var(--panel);border-bottom:1px solid var(--border);padding:4px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;min-height:56px}
.pr.bot{border-bottom:none;border-top:1px solid var(--border)}

.pav{width:34px;height:34px;border-radius:50%;background:var(--if);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0;transition:border-color .3s,box-shadow .3s}
.pav img{width:100%;height:100%;object-fit:cover}
.pav.ac{border-color:var(--green);box-shadow:0 0 10px rgba(74,222,128,.5);animation:pulse 1.5s infinite}

.pinfo{display:flex;flex-direction:column;gap:2px;flex-shrink:0;width:80px}
.pnm{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pgrp{font-size:9px;font-family:'Unbounded',sans-serif;height:13px;display:flex;align-items:center;gap:3px;white-space:nowrap}
.pgrp .gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pgrp .gstripe{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#fff;position:relative;overflow:hidden}
.pgrp .gstripe::after{content:'';position:absolute;top:50%;left:0;right:0;height:4px;transform:translateY(-50%);background:var(--sc)}

.bswrap{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;overflow:hidden;padding:2px 0}
.bsrow{display:flex;gap:2px;align-items:center;flex-wrap:nowrap;overflow:hidden;min-height:20px}
.bslabel{font-size:8px;color:var(--text3);font-family:'Unbounded',sans-serif;letter-spacing:.3px;margin-right:2px;flex-shrink:0}

.bbl{width:18px;height:18px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.bbl.solid-ball{box-shadow:inset -2px -2px 5px rgba(0,0,0,.55),inset 1px 1px 3px rgba(255,255,255,.25)}
.bbl.stripe-ball{background:#fff;box-shadow:inset -2px -2px 5px rgba(0,0,0,.3),inset 1px 1px 3px rgba(255,255,255,.35);overflow:hidden}
.bbl.stripe-ball .stripe-band{position:absolute;top:50%;left:0;right:0;height:8px;transform:translateY(-50%)}
.bbl.empty-slot{background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.1)}
.bbl .bn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6.5px;font-weight:900;text-shadow:0 1px 2px rgba(0,0,0,.9)}
.bbl.stripe-ball .bn{color:#111;z-index:2}
.bbl.solid-ball .bn{color:#fff}

.pright{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;width:36px}
.pw{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:900;color:var(--accent);line-height:1}
.pti{font-size:8px;padding:2px 4px;border-radius:6px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--green);display:none;white-space:nowrap;text-align:center}
.pti.on{display:block}

#main{flex:1;display:flex;min-height:0;overflow:hidden}

#cw{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(ellipse,#0d1a10,#060e08);overflow:hidden}
#tc{display:block;touch-action:none}
#aim{position:absolute;inset:0;pointer-events:none;width:100%;height:100%}

#cup{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(10,6,18,.93);border:1px solid var(--border);border-radius:13px;padding:7px 12px;display:flex;flex-direction:column;align-items:center;gap:4px;z-index:10;backdrop-filter:blur(8px);min-width:170px}
#cup.h{display:none}
.clb{font-size:8px;letter-spacing:1px;color:var(--text3);font-family:'Unbounded',sans-serif;text-transform:uppercase}
#pt{width:140px;height:9px;background:var(--panel2);border-radius:5px;border:1px solid var(--border);overflow:hidden}
#pf{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));width:50%;transition:width .05s}
#ps{width:140px;accent-color:var(--indigo2);cursor:pointer;margin:0}
#sb{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;border-radius:9px;color:#fff;font-size:12px;padding:6px 0;cursor:pointer;width:100%;font-family:'Noto Sans Georgian',sans-serif;font-weight:600}
#sb:disabled{opacity:.4;cursor:not-allowed}

#plm{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(10,6,18,.95);border:1px solid var(--yellow);border-radius:11px;padding:9px 18px;color:var(--yellow);font-size:12px;text-align:center;display:none;z-index:20;pointer-events:none;animation:placeGlow 1.5s infinite;white-space:nowrap}
#wm{position:absolute;top:12px;right:12px;left:auto;transform:none;background:rgba(10,6,18,.88);border:1px solid var(--border);border-radius:11px;padding:7px 14px;color:var(--text3);font-size:11px;text-align:center;display:none;z-index:8;pointer-events:none;white-space:nowrap}

#cht{width:240px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.chh{padding:7px 11px;border-bottom:1px solid var(--border);font-family:'Unbounded',sans-serif;font-size:8px;letter-spacing:2px;color:var(--text2);display:flex;align-items:center;gap:5px;flex-shrink:0}
.chd{width:5px;height:5px;border-radius:50%;background:var(--accent)}
#cm{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:3px}
#cm::-webkit-scrollbar{width:2px}#cm::-webkit-scrollbar-thumb{background:var(--border)}
.msg{padding:5px 8px;border-radius:4px 9px 9px 9px;font-size:11px;word-break:break-word;max-width:97%}
.msg.me{background:rgba(120,30,200,.25);border:1px solid rgba(168,85,247,.3);align-self:flex-end;border-radius:9px 4px 9px 9px}
.msg.oth{background:var(--panel2);border:1px solid var(--border);align-self:flex-start}
.msg.sys{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);color:var(--green);font-size:10px;align-self:center;border-radius:7px;text-align:center;max-width:100%}
.mn{font-size:9px;font-weight:600;color:var(--indigo2);margin-bottom:1px}
.mt{color:var(--text);line-height:1.4}
.mt img{width:22px!important;height:22px!important;vertical-align:middle;border-radius:3px}
.cb{padding:6px 7px;border-top:1px solid var(--border);display:flex;gap:4px;align-items:center;flex-shrink:0;position:relative}
#ci{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:6px 9px;color:var(--text);font-size:12px;font-family:'Noto Sans Georgian',sans-serif;outline:none}
#ci:focus{border-color:var(--indigo2)}
.ceb,.csb{width:28px;height:28px;border-radius:7px;background:var(--if);border:1px solid var(--border);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.csb{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border-color:transparent;color:#fff}
#ep{position:absolute;bottom:42px;left:5px;background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:9px;width:220px;display:none;max-height:170px;overflow-y:auto;z-index:50;box-shadow:0 8px 22px rgba(0,0,0,.5)}
#ep.open{display:block}
.epg{display:flex;flex-wrap:wrap;gap:4px}
.epb{width:38px;height:38px;border-radius:7px;background:var(--if);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center}
.epb:hover{background:var(--border)}
.epb img{width:26px;height:26px;object-fit:contain}

#win{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
#win.on{display:flex}
.wc{background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:26px;text-align:center;max-width:300px;width:90%;box-shadow:0 0 50px var(--glow)}
.we{font-size:52px;margin-bottom:7px}
.wt{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;color:var(--accent);margin-bottom:5px}
.ws{font-size:12px;color:var(--text2);margin-bottom:18px}
.wb{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;border-radius:11px;color:#fff;font-size:13px;padding:10px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;width:100%;margin-bottom:6px}
.wb.s{background:var(--panel2);border:1px solid var(--border);color:var(--text2)}

.gn{position:fixed;top:55px;right:12px;background:var(--panel);border:1px solid var(--indigo2);border-radius:14px;padding:12px 14px;z-index:9999;box-shadow:0 8px 26px rgba(0,0,0,.6);min-width:250px;max-width:300px}
.gnh{font-family:'Unbounded',sans-serif;font-size:9px;color:var(--indigo2);margin-bottom:5px}
.gnb{font-size:12px;color:var(--text);margin-bottom:9px}
.gnbs{display:flex;gap:5px}
.gna{flex:1;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:7px;color:var(--green);font-size:11px;padding:6px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif}
.gnd{flex:1;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.22);border-radius:7px;color:var(--red);font-size:11px;padding:6px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif}

.toast{position:fixed;bottom:55px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;padding:7px 16px;border-radius:14px;font-size:12px;z-index:9999;pointer-events:none;white-space:nowrap;font-family:'Noto Sans Georgian',sans-serif}

@media(max-width:660px){
  #cht{position:absolute;bottom:0;left:0;right:0;width:100%;height:120px;border-left:none;border-top:1px solid var(--border);z-index:5}
  #cw{padding-bottom:120px}
  #cup{bottom:128px;min-width:145px;padding:5px 9px;gap:3px}
  #wm{top:8px;right:8px;font-size:10px;padding:5px 10px}
  #pt,#ps{width:110px}
  #sb{font-size:11px;padding:5px 0}
  .chh{display:none}
  #cm{padding:4px}
  .msg{font-size:10px}
  .bbl{width:15px;height:15px}
  .bbl .bn{font-size:5.5px}
  .bbl.stripe-ball .stripe-band{height:6px}
  .pr{min-height:48px;padding:3px 7px;gap:4px}
  .pav{width:29px;height:29px}
  .pinfo{width:68px}
  .pnm{font-size:10px}
  .pright{width:30px}
  .pw{font-size:13px}
  #gh{height:38px;padding:4px 9px}
  .ghs{max-width:100px}
}
</style>
</head>
<body>

<div id="lobby">
  <div class="logo">🎱 ბილიარდი</div>
  <div style="font-size:11px;color:var(--text3)">კლასიკური 8-ბურთი · კაიფმანია</div>
  <div class="lcard" id="lm">
    <div class="lt">მოთამაშე</div>
    <div style="display:flex;align-items:center;gap:9px;padding:9px;background:var(--panel2);border:1px solid var(--border);border-radius:10px">
      <div id="mav" style="width:38px;height:38px;border-radius:50%;background:var(--if);display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden;flex-shrink:0">🎱</div>
      <div><div style="font-size:13px;font-weight:600;color:var(--text)" id="mnk">-</div><div style="font-size:11px;color:var(--text3)">🎱 <span id="msc">0</span> მოგება</div></div>
    </div>
    <button class="lb p" onclick="showInv()">🎮 მოთამაშის მოწვევა</button>
    <button class="lb" onclick="startAI()">🤖 AI-ს წინააღმდეგ</button>
  </div>
  <div class="lcard" id="li" style="display:none">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">
      <button class="lb" style="padding:4px 9px;font-size:11px;width:auto" onclick="showMain()">←</button>
      <div class="lt" style="margin:0">მოთამაშეების მოწვევა</div>
    </div>
    <input id="usi" placeholder="🔍 ძებნა..." oninput="filterU()">
    <div id="ul" style="display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto"></div>
    <div class="wr" id="wr">
      <div class="wps"><div class="wsl f" id="ws1">🎱</div><div class="wvs">VS</div><div class="wsl" id="ws2">❓</div></div>
      <div style="font-size:11px;color:var(--text3)">მოწვევა გაიგზავნა<span class="wdt"> <span>.</span><span>.</span><span>.</span></span></div>
      <button class="lb d" style="width:auto;padding:5px 14px" onclick="cancelI()">❌ გაუქმება</button>
    </div>
  </div>
</div>

<div id="game">
  <div id="gh">
    <button class="ghb" onclick="confirmLeave()">← გასვლა</button>
    <div class="ght">🎱 ბილიარდი</div>
    <div class="ghs" id="gst">-</div>
  </div>

  <div class="pr" id="prT">
    <div class="pav" id="av2">❓</div>
    <div class="pinfo">
      <div class="pnm" id="nm2">-</div>
      <div class="pgrp" id="grp2"></div>
    </div>
    <div class="bswrap" id="bswrap2">
      <div class="bsrow" id="bs2poc"></div>
      <div class="bsrow" id="bs2rem"></div>
    </div>
    <div class="pright">
      <div class="pw" id="w2">0</div>
      <div class="pti" id="ti2">↑ ჯერი</div>
    </div>
  </div>

  <div id="main">
    <div id="cw">
      <canvas id="tc"></canvas>
      <canvas id="aim"></canvas>
      <div id="cup">
        <div class="clb">ძალა</div>
        <div id="pt"><div id="pf"></div></div>
        <input type="range" id="ps" min="1" max="100" value="50" oninput="updP(this.value)">
        <button id="sb" onclick="shoot()">🎱 სროლა</button>
      </div>
      <div id="plm">☝️ დადე თეთრი ბურთი სასურველ ადგილზე<br><small style="font-size:10px;opacity:.7">შემდეგ დააჭირე სროლა</small></div>
      <div id="wm">⏳ მოწინააღმდეგის სვლა...</div>
    </div>
    <div id="cht">
      <div class="chh"><div class="chd"></div>ჩატი</div>
      <div id="cm"></div>
      <div class="cb">
        <div id="ep"><div class="epg" id="epg"></div></div>
        <button class="ceb" onclick="togEmo()">😊</button>
        <input id="ci" placeholder="შეტყობინება..." onkeydown="if(event.key==='Enter')sendC()">
        <button class="csb" onclick="sendC()">✈️</button>
      </div>
    </div>
  </div>

  <div class="pr bot" id="prB">
    <div class="pav" id="av1">🎱</div>
    <div class="pinfo">
      <div class="pnm" id="nm1">შენ</div>
      <div class="pgrp" id="grp1"></div>
    </div>
    <div class="bswrap" id="bswrap1">
      <div class="bsrow" id="bs1poc"></div>
      <div class="bsrow" id="bs1rem"></div>
    </div>
    <div class="pright">
      <div class="pw" id="w1">0</div>
      <div class="pti" id="ti1">↓ შენი</div>
    </div>
  </div>
</div>

<div id="win">
  <div class="wc">
    <div class="we" id="we">🏆</div>
    <div class="wt" id="wt">გამარჯვება!</div>
    <div class="ws" id="wss">-</div>
    <button class="wb" onclick="again()">🔄 თავიდან</button>
    <button class="wb s" onclick="toLobby()">← ლობი</button>
  </div>
</div>

// ===== FIX: ang reset helper =====
function resetAng(){
  const cb=balls.find(b=>b.n===0);
  const ts=balls.filter(b=>!b.p&&b.n!==0);
  if(cb&&ts.length){
    const t=ts.reduce((a,b)=>Math.hypot(b.x-cb.x,b.y-cb.y)<Math.hypot(a.x-cb.x,a.y-cb.y)?b:a,ts[0]);
    ang=Math.atan2(t.y-cb.y,t.x-cb.x);
  }
}

// ===== FIX: offset cache — getBoundingClientRect ერთხელ resize-ზე =====
function cacheOffsets(){
  requestAnimationFrame(()=>{
    if(!canvas||!aimC)return;
    const cr=canvas.getBoundingClientRect();
    const ar=aimC.getBoundingClientRect();
    _canvasOffX=cr.left-ar.left;

}

function mkSt(){return{balls:mkBalls(),p1poc:[],p2poc:[],p1grp:null,p2grp:null};}
function mkBalls(){
  const d=[];
  const cx=TW*.72,cy=TH/2,gap=BR*2.12;
  const rows=[[0,0],[-1,-1],[1,-1],[-2,-2],[0,-2],[2,-2],[-3,-3],[-1,-3],[1,-3],[3,-3],[-4,-4],[-2,-4],[0,-4],[2,-4],[4,-4]];
  const ord=[1,9,2,10,8,3,11,4,12,5,13,6,14,7,15];
  rows.forEach(([c,r],i)=>d.push({id:i+1,n:ord[i],x:cx+c*gap*.5,y:cy+r*gap*Math.sqrt(3)/2,vx:0,vy:0,p:false}));
  d.push({id:0,n:0,x:TW*.27,y:TH/2,vx:0,vy:0,p:false});
  return d;
}
function initB(){balls=mkBalls();p1poc=[];p2poc=[];p1grp=null;p2grp=null;updGr();}

function subGame(){
  if(vsAI)return;
  if(gCh) sb.removeChannel(gCh);
  gCh=sb.channel('bg_'+GID)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'billiard_games',filter:`id=eq.${GID}`},async p=>{
      const row=p.new;
      if(row.status==='finished'){remWin(row);return;}

      if(row.physics_state){
        if(row.turn!==ME.id){
          try{
            const ps=JSON.parse(row.physics_state);
            if(Array.isArray(ps)){
              ps.forEach(pb=>{
                const b=balls.find(bb=>bb.id===pb.id);
                if(b){b.x=pb.x;b.y=pb.y;b.vx=pb.vx;b.vy=pb.vy;b.p=pb.p;}
              });
              render();
            }
          }catch(e){}
        }
        return;
      }

      if(row.state){
        try{
          const st=JSON.parse(row.state);
          if(st.balls) balls=st.balls;
          if(st.p1poc!==undefined) p1poc=st.p1poc||[];
          if(st.p2poc!==undefined) p2poc=st.p2poc||[];
          if(st.p1grp!==undefined) p1grp=st.p1grp;
          if(st.p2grp!==undefined) p2grp=st.p2grp;
          p1w=row.p1_wins||0;p2w=row.p2_wins||0;
          document.getElementById('w1').textContent=isP1?p1w:p2w;
          document.getElementById('w2').textContent=isP1?p2w:p1w;

          const nowMyTurn=(row.turn===ME.id);

          if(nowMyTurn&&!myTurn){
            myTurn=true;locked=false;
            placing=st.placing||false;placingReady=false;
            resetAng();
            document.getElementById('wm').style.display='none';
            if(placing){
              document.getElementById('plm').style.display='block';
              document.getElementById('cup').classList.add('h');
              document.getElementById('sb').disabled=false;
            } else {
              document.getElementById('plm').style.display='none';
              document.getElementById('cup').classList.remove('h');
              document.getElementById('sb').disabled=false;
            }
            sysM('🎯 შენი სვლაა!');
          } else if(!nowMyTurn&&myTurn){
            myTurn=false;locked=false;
            placing=st.placing||false;placingReady=false;
            document.getElementById('plm').style.display='none';
            document.getElementById('wm').style.display='block';
            document.getElementById('cup').classList.add('h');
            document.getElementById('sb').disabled=true;
          } else if(!nowMyTurn&&!myTurn){
            placing=st.placing||false;
            document.getElementById('wm').style.display='block';
            document.getElementById('cup').classList.add('h');
            document.getElementById('sb').disabled=true;
          }

          updUI();updGr();render();
        }catch(e){console.error('subGame state parse error:',e);}
      }
    }).subscribe();
}

function throttledPhysicsSync(){
  if(vsAI||!GID)return;
  if(_syncTimer)return;
  _syncTimer=setTimeout(async()=>{
    _syncTimer=null;
    const moving=balls.some(b=>Math.abs(b.vx)>0.05||Math.abs(b.vy)>0.05);
    if(!moving)return;
    const snapshot=JSON.stringify(balls.map(b=>({id:b.id,n:b.n,x:Math.round(b.x*10)/10,y:Math.round(b.y*10)/10,vx:Math.round(b.vx*100)/100,vy:Math.round(b.vy*100)/100,p:b.p})));
    if(snapshot===_lastSyncState)return;
    _lastSyncState=snapshot;
    await sb.from('billiard_games').update({physics_state:snapshot}).eq('id',GID);
  },50);
}

function setupIn(){
  canvas.addEventListener('mousedown',e=>{if(!myTurn||locked)return;if(placing){plCB(gPos(e));return;}drag=true;updA(gPos(e));});
  canvas.addEventListener('mousemove',e=>{if(!myTurn||locked||placing)return;if(drag)updA(gPos(e));});
  canvas.addEventListener('mouseup',()=>drag=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();if(!myTurn||locked)return;const p=gtPos(e);if(placing){plCB(p);return;}drag=true;updA(p);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!myTurn||locked||placing)return;if(drag)updA(gtPos(e));},{passive:false});
  canvas.addEventListener('touchend',()=>drag=false);
}
function gPos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)/SC,y:(e.clientY-r.top)/SC};}
function gtPos(e){const t=e.touches[0];return gPos({clientX:t.clientX,clientY:t.clientY});}

function updA(pos){
  const cb=balls.find(b=>b.n===0);
  if(!cb)return;
  ang=Math.atan2(pos.y-cb.y,pos.x-cb.x);
  // ===== FIX: render() იძახებს drawStickOnTC-ს — tc canvas-ზე =====
  render();
}

function plCB(pos){
  const nx=Math.max(BR+20,Math.min(TW*.48,pos.x));
  const ny=Math.max(BR+14,Math.min(TH-BR-14,pos.y));
  const clash=balls.some(b=>b.n!==0&&!b.p&&Math.hypot(b.x-nx,b.y-ny)<BR*2.2);
  if(clash){toast('⚠️ სხვა ბურთის ადგილი!');return;}
  const cb=balls.find(b=>b.n===0);if(!cb)return;
  cb.x=nx;cb.y=ny;placingReady=true;
  render();
  document.getElementById('cup').classList.remove('h');
  document.getElementById('sb').disabled=false;
  // ===== FIX: placing-ის შემდეგ ang განახლება =====
  resetAng();
  render();
  throttledPhysicsSync();
}
function updP(v){document.getElementById('pf').style.width=v+'%';}

function shoot(){
  if(!myTurn||locked||over)return;
  if(placing&&!placingReady){toast('☝️ ჯერ დადე ბურთი!');return;}
  placing=false;placingReady=false;
  document.getElementById('plm').style.display='none';
  document.getElementById('wm').style.display='none';
  execShot(parseInt(document.getElementById('ps').value));
}

function execShot(pw){
  if(locked)return;
  locked=true;
  const cb=balls.find(b=>b.n===0);
  if(!cb){locked=false;return;}
  const sp=4+pw*.24;
  cb.vx=Math.cos(ang)*sp;
  cb.vy=Math.sin(ang)*sp;
  document.getElementById('cup').classList.add('h');
  // ===== FIX: aim canvas გავასუფთაოთ სროლის დროს =====
  if(actx) actx.clearRect(0,0,aimC.width,aimC.height);
  physics();
}

let raf=null;
function physics(){
  const pd=[];const SUBSTEPS=6;
  function step(){
    let mv=false;
    for(let s=0;s<SUBSTEPS;s++){
      balls.forEach(b=>{
        if(b.p)return;
        b.x+=b.vx/SUBSTEPS;b.y+=b.vy/SUBSTEPS;
        b.vx*=FR;b.vy*=FR;
        if(b.x-BR<18){b.x=18+BR;b.vx=Math.abs(b.vx)*.84;}
        if(b.x+BR>TW-18){b.x=TW-18-BR;b.vx=-Math.abs(b.vx)*.84;}
        if(b.y-BR<12){b.y=12+BR;b.vy=Math.abs(b.vy)*.84;}
        if(b.y+BR>TH-12){b.y=TH-12-BR;b.vy=-Math.abs(b.vy)*.84;}
        for(const pk of PKS){
          if(Math.hypot(b.x-pk.x,b.y-pk.y)<PR_POCKET){
            b.p=true;b.vx=0;b.vy=0;
            if(!pd.includes(b.id)) pd.push(b.id);
            break;
          }
        }
        if(Math.abs(b.vx)>MV||Math.abs(b.vy)>MV) mv=true;
      });
      for(let i=0;i<balls.length;i++){
        for(let j=i+1;j<balls.length;j++){
          const a=balls[i],bb=balls[j];
          if(a.p||bb.p)continue;
          const dx=bb.x-a.x,dy=bb.y-a.y,d=Math.hypot(dx,dy);
          if(d<BR*2&&d>0){
            const nx=dx/d,ny=dy/d,ov=BR*2-d;
            a.x-=nx*ov*.5;a.y-=ny*ov*.5;
            bb.x+=nx*ov*.5;bb.y+=ny*ov*.5;
            const dv=(a.vx-bb.vx)*nx+(a.vy-bb.vy)*ny;
            if(dv>0){const imp=dv*.92;a.vx-=imp*nx;a.vy-=imp*ny;bb.vx+=imp*nx;bb.vy+=imp*ny;}
          }
        }
      }
    }
    render();
    throttledPhysicsSync();
    if(mv){raf=requestAnimationFrame(step);}
    else{balls.forEach(b=>{b.vx=0;b.vy=0;});shotDone(pd);}
  }
  raf=requestAnimationFrame(step);
}

function shotDone(pids){
  const pb=pids.map(id=>balls.find(b=>b.id===id)).filter(Boolean);
  const cbP=pb.find(b=>b.n===0);
  const reg=pb.filter(b=>b.n!==0&&b.n!==8);
  const b8=pb.find(b=>b.n===8);

  // ჯგუფის დადგენა პირველი ჩაგდებული ბურთით
  if(reg.length>0&&(p1grp===null||p2grp===null)&&!cbP){
    const fn=reg[0].n;const isStr=STRIPES.has(fn);
    if(isP1){p1grp=isStr?'stripe':'solid';p2grp=isStr?'solid':'stripe';}
    else{p2grp=isStr?'stripe':'solid';p1grp=isStr?'solid':'stripe';}
  }

  // 8-ბურთი
  if(b8){
    const myPoc=isP1?p1poc:p2poc;
    const shooterClear=myPoc.length>=7;
    const foulWithCue=!!cbP;
    if(shooterClear&&!foulWithCue) endGame(true,'🏆 8-ბურთი სწორად!');
    else endGame(false,'😔 8-ბ ნაადრევად / ბელა');
    return;
  }

  // ბურთების განაწილება ჯიბეებში
  let scoredOwn=false;
  reg.forEach(b=>{
    const isStr=STRIPES.has(b.n);
    const myGrp=isP1?p1grp:p2grp;
    const mine=myGrp==='stripe'?isStr:(myGrp==='solid'?!isStr:true);
    if(mine){
      const arr=isP1?p1poc:p2poc;
      if(!arr.includes(b.n)){arr.push(b.n);scoredOwn=true;}
    } else {
      const arr=isP1?p2poc:p1poc;
      if(!arr.includes(b.n)) arr.push(b.n);
    }
  });

  // ===== FIX: ბელა — სვლა მოწინAAღმდეგეზე გადადის =====
  if(cbP){
    const cb=balls.find(b=>b.n===0);
    if(cb){cb.p=false;cb.x=-999;cb.y=-999;cb.vx=0;cb.vy=0;}
    sysM('⚪ ბელა ჩავარდა! მოწინAAღმდეგე ბელას ნებისმიერ ადგილზე დადებს');

    // ===== FIX: nextId = opp, placing=true, myTurn=false =====
    const nextId = vsAI ? 'ai' : (opp?.id || ME.id);
    placing = true;
    placingReady = false;
    myTurn = false;
    locked = false;

    document.getElementById('plm').style.display='none';
    document.getElementById('wm').style.display='block';
    document.getElementById('cup').classList.add('h');
    document.getElementById('sb').disabled=true;

    updUI();updGr();render();
    pushSt(nextId);

    // AI ბელა
    if(vsAI && !myTurn && !over) setTimeout(()=>aiGo(),1100);
    return;
  }

  // ===== FIX: სვლის გადაცემა =====
  // scoredOwn=true → ჩვენ გვრჩება სვლა
  // scoredOwn=false → გადადის მოწინAAღმდეგეზე
  const keepTurn = scoredOwn && !cbP;

  let nextId;
  if(vsAI){
    // AI-ს წინааღმდეგ
    nextId = keepTurn ? ME.id : 'ai';
    myTurn = keepTurn;
  } else {
    nextId = keepTurn ? ME.id : (opp?.id || ME.id);
    myTurn = keepTurn;
  }

  updGr();
  finishTurn(nextId);
}

// ===== FIX: finishTurn — locked ბოლოს იხსნება, UI სწორად განახლება =====
async function finishTurn(nextId){
  updUI();render();

  if(myTurn){
    // ჩვენი სვლაა
    locked=false;
    document.getElementById('cup').classList.remove('h');
    document.getElementById('sb').disabled=false;
    document.getElementById('wm').style.display='none';
    resetAng();
    render();
  } else {
    // მოწინAAღმდეგის სვლაა
    locked=false;
    document.getElementById('cup').classList.add('h');
    document.getElementById('sb').disabled=true;
    if(!vsAI) document.getElementById('wm').style.display='block';
  }

  await pushSt(nextId||ME.id);

  // ===== FIX: AI გამოძახება =====
  if(vsAI&&!myTurn&&!over) setTimeout(()=>aiGo(),1100);
}

function aiGo(){
  if(over||myTurn||locked)return;
  const cb=balls.find(b=>b.n===0);if(!cb)return;

  if(placing){
    // AI ბელას დებს
    locked=true;
    cb.p=false;
    cb.x=TW*.18+Math.random()*100;
    cb.y=30+Math.random()*(TH-60);
    // შეჭახება შეამოწმე
    balls.filter(b=>b.n!==0&&!b.p).forEach(b=>{
      if(Math.hypot(cb.x-b.x,cb.y-b.y)<BR*2.5){cb.x=TW*.15;cb.y=TH/2;}
    });
    placing=false;placingReady=false;
    myTurn=false; // AI-ს სვლა გრძელდება
    document.getElementById('plm').style.display='none';
    render();
    setTimeout(()=>{locked=false;doAIShoot();},600);
    return;
  }
  doAIShoot();
}

function doAIShoot(){
  if(over||myTurn||locked)return;
  const cb=balls.find(b=>b.n===0);if(!cb)return;
  const myGrp=isP1?p2grp:p1grp; // AI მეორე მოთამაშეა
  let targets=balls.filter(b=>!b.p&&b.n!==0&&b.n!==8);
  if(myGrp==='solid') targets=targets.filter(b=>SOLIDS.has(b.n));
  else if(myGrp==='stripe') targets=targets.filter(b=>STRIPES.has(b.n));
  const myPoc=isP1?p2poc:p1poc;
  if(myPoc.length>=7) targets=balls.filter(b=>!b.p&&b.n===8);
  if(!targets.length) targets=balls.filter(b=>!b.p&&b.n!==0);
  if(targets.length){
    const t=targets.reduce((a,b)=>Math.hypot(b.x-cb.x,b.y-cb.y)<Math.hypot(a.x-cb.x,a.y-cb.y)?b:a,targets[0]);
    ang=Math.atan2(t.y-cb.y,t.x-cb.x)+(Math.random()-.5)*.3;
  } else { ang=Math.random()*Math.PI*2; }
  const pw=45+Math.random()*45;
  document.getElementById('ps').value=pw;updP(pw);
  execShot(pw);
}

function updUI(){

  document.getElementById('ti1').classList.toggle('on',active);
  document.getElementById('ti2').classList.toggle('on',!active&&!over);
  document.getElementById('sb').disabled=!myTurn||locked||over;
  const st=over?'დასრულდა':myTurn?(placing?'📍 ბელა განათავსე':'🎯 შენი სვლაა'):'⏳ მოწინAAღმდეგე...';
  document.getElementById('gst').textContent=st;
}

function updGr(){
  const myPoc=isP1?p1poc:p2poc;
  const thPoc=isP1?p2poc:p1poc;
  const myGrp=isP1?p1grp:p2grp;
  const thGrp=isP1?p2grp:p1grp;
  renderGrpLabel('grp1',myGrp);
  renderGrpLabel('grp2',thGrp);
  renderStrip('bs1poc','bs1rem',myPoc,myGrp);
  renderStrip('bs2poc','bs2rem',thPoc,thGrp);
  document.getElementById('w1').textContent=isP1?p1w:p2w;
  document.getElementById('w2').textContent=isP1?p2w:p1w;
}
function renderGrpLabel(elId,grp){
  const el=document.getElementById(elId);if(!el)return;el.innerHTML='';
  if(!grp)return;
  const isSt=grp==='stripe';
  const dot=document.createElement('div');
  if(isSt){dot.className='gstripe';dot.style.setProperty('--sc','#0044CC');}
  else{dot.className='gdot';dot.style.background='#FFD700';}

function renderStrip(pocId,remId,poc,grp){
  const pocEl=document.getElementById(pocId),remEl=document.getElementById(remId);
  if(!pocEl||!remEl)return;
  pocEl.innerHTML='';
  if(poc.length===0){const ph=document.createElement('span');ph.style.cssText='font-size:9px;color:var(--text3);opacity:.5';ph.textContent='—';pocEl.appendChild(ph);}
  else{poc.forEach(n=>pocEl.appendChild(makeBallChip(n,false)));}
  remEl.innerHTML='';
  if(grp){
    const gSet=grp==='solid'?SOLIDS:STRIPES;
    [...gSet].sort((a,b)=>a-b).filter(n=>!poc.includes(n)).forEach(n=>{remEl.appendChild(makeBallChip(n,true));});
  }
}
function makeBallChip(n,empty){
  const d=document.createElement('div');
  const isSt=STRIPES.has(n);
  if(empty){
    d.className='bbl empty-slot';d.title='ბ.'+n+' (დარჩ.)';
    d.style.width='16px';d.style.height='16px';
    d.style.borderColor=(BALL_COLORS[n]||'#888')+'55';return d;
  }
  d.className='bbl '+(isSt?'stripe-ball':'solid-ball');d.title='ჩაგდ. ბ.'+n;
  if(isSt){const band=document.createElement('div');band.className='stripe-band';band.style.background=BALL_COLORS[n]||'#888';d.appendChild(band);}
  else{d.style.background=BALL_COLORS[n]||'#888';}
  const num=document.createElement('span');num.className='bn';num.textContent=n;d.appendChild(num);return d;
}

function render(){
  if(!ctx)return;
  ctx.clearRect(0,0,W,H);
  drawTable();
  balls.forEach(b=>{if(!b.p) drawBall(b);});
  // ===== FIX: კიის ჯოხი tc canvas-ზე — offset პრობლემა არ არის =====
  drawStickOnTC();
  // aim canvas-ი გავასუფთაოთ (სამიზნე ხაზი tc-ზე გადავიტანეთ)
  if(actx) actx.clearRect(0,0,aimC.width,aimC.height);
}

function drawTable(){
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  g.addColorStop(0,'#1c5228');g.addColorStop(1,'#0e2d16');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#6b3a12';ctx.lineWidth=15*SC;ctx.strokeRect(7*SC,7*SC,(TW-14)*SC,(TH-14)*SC);
  ctx.strokeStyle='#8B4513';ctx.lineWidth=10*SC;ctx.strokeRect(7*SC,7*SC,(TW-14)*SC,(TH-14)*SC);
  PKS.forEach(pk=>{ctx.beginPath();ctx.arc(pk.x*SC,pk.y*SC,13*SC,0,Math.PI*2);ctx.fillStyle='#030806';ctx.fill();ctx.strokeStyle='#2a1008';ctx.lineWidth=2*SC;ctx.stroke();});
  ctx.save();ctx.setLineDash([4*SC,5*SC]);
  ctx.strokeStyle='rgba(255,255,255,.09)';ctx.lineWidth=SC;
  ctx.beginPath();ctx.moveTo(TW*.27*SC,15*SC);ctx.lineTo(TW*.27*SC,(TH-15)*SC);ctx.stroke();
  ctx.restore();
  if(placing&&myTurn){
    ctx.save();ctx.fillStyle='rgba(251,191,36,.07)';ctx.fillRect(19*SC,13*SC,(TW*.48-19)*SC,(TH-26)*SC);
    ctx.strokeStyle='rgba(251,191,36,.35)';ctx.lineWidth=1.5*SC;ctx.setLineDash([5*SC,5*SC]);
    ctx.strokeRect(19*SC,13*SC,(TW*.48-19)*SC,(TH-26)*SC);ctx.restore();
  }
}

function drawBall(b){
  const x=b.x*SC,y=b.y*SC,r=BR*SC;
  ctx.save();
  if(b.n===0){
    if(placing&&myTurn&&b.x<0){
      ctx.globalAlpha=0.25;ctx.beginPath();ctx.arc(TW*.27*SC,TH/2*SC,r,0,Math.PI*2);
      ctx.fillStyle='#fff';ctx.fill();ctx.restore();return;
    }
    const g=ctx.createRadialGradient(x-r*.3,y-r*.35,r*.05,x,y,r);
    g.addColorStop(0,'#fff');g.addColorStop(.7,'#e8e8e8');g.addColorStop(1,'#c0c0c0');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=SC;ctx.stroke();
  } else{
    const col=BALL_COLORS[b.n]||'#888';const isSt=STRIPES.has(b.n);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=isSt?'#fff':col;ctx.fill();
    if(isSt){ctx.save();ctx.clip();ctx.fillStyle=col;ctx.fillRect(x-r,y-r*.52,r*2,r);ctx.restore();}
    const g2=ctx.createRadialGradient(x-r*.3,y-r*.35,r*.05,x,y,r);
    g2.addColorStop(0,'rgba(255,255,255,.42)');g2.addColorStop(.6,'rgba(255,255,255,.07)');g2.addColorStop(1,'rgba(0,0,0,.2)');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(6,7*SC)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=2*SC;
    ctx.strokeText(b.n,x,y);ctx.fillText(b.n,x,y);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=SC;ctx.stroke();
  }
  ctx.restore();
}

// ===== FIX: კიის ჯოხი პირდაპირ tc canvas-ზე — offset 0 =====
function drawStickOnTC(){
  if(!ctx)return;
  if(!myTurn||over)return;
  if(placing&&!placingReady)return;
  const cb=balls.find(b=>b.n===0);
  if(!cb||cb.x<0)return;

  // tc canvas კოორდინატები — პირდაპირი, offset არ სჭირდება
  const cx=cb.x*SC;
  const cy=cb.y*SC;

  ctx.save();

  // სამიზნე ხაზი
  const farX=cx+Math.cos(ang)*W*3;
  const farY=cy+Math.sin(ang)*H*3;
  ctx.setLineDash([5,7]);
  ctx.strokeStyle='rgba(255,255,255,.28)';
  ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(farX,farY);ctx.stroke();
  ctx.setLineDash([]);

  // კიის ჯოხი
  const off=14*SC, len=150*SC;
  const bx=-Math.cos(ang), by=-Math.sin(ang);
  const rx1=cx+bx*off, ry1=cy+by*off;
  const rx2=cx+bx*(off+len), ry2=cy+by*(off+len);

  const sg=ctx.createLinearGradient(rx1,ry1,rx2,ry2);
  sg.addColorStop(0,'#f0d070');
  sg.addColorStop(0.15,'#c89030');
  sg.addColorStop(0.7,'#7a4510');
  sg.addColorStop(1,'#3a1806');

  ctx.beginPath();
  ctx.moveTo(rx1,ry1);ctx.lineTo(rx2,ry2);
  ctx.lineWidth=6*SC;ctx.strokeStyle=sg;ctx.lineCap='round';ctx.stroke();

  // წვერი
  ctx.beginPath();ctx.arc(rx1,ry1,2.5*SC,0,Math.PI*2);
  ctx.fillStyle='#b0d0f0';ctx.fill();

  ctx.restore();
}

// ===== ძველი drawStick — aim canvas-ისთვის (mousemove-ზე) =====
function drawStick(){
  if(!actx)return;
  actx.clearRect(0,0,aimC.width,aimC.height);

  if(!myTurn||over)return;
  if(placing&&!placingReady)return;

  const cb=balls.find(b=>b.n===0);
  if(!cb||cb.x<0)return;

  // ===== FIX: offset პირდაპირ — getBoundingClientRect სწრაფია static layout-ზე =====
  const cr=canvas.getBoundingClientRect();
  const ar=aimC.getBoundingClientRect();
  const ox=cr.left-ar.left;
  const oy=cr.top-ar.top;
  const cx=cb.x*SC+ox;
  const cy=cb.y*SC+oy;

  actx.save();

  // სამიზნე ხაზი
  const farX=cx+Math.cos(ang)*Math.max(TW,TH)*SC*2;
  const farY=cy+Math.sin(ang)*Math.max(TW,TH)*SC*2;
  actx.setLineDash([5,7]);
  actx.strokeStyle='rgba(255,255,255,.22)';
  actx.lineWidth=1.2;
  actx.beginPath();actx.moveTo(cx,cy);actx.lineTo(farX,farY);actx.stroke();
  actx.setLineDash([]);

  // კიის ჯოხი — ბურთის უკან
  const off=14*SC, len=150*SC;
  const bx=-Math.cos(ang), by=-Math.sin(ang);
  const rx1=cx+bx*off, ry1=cy+by*off;
  const rx2=cx+bx*(off+len), ry2=cy+by*(off+len);

  const sg=actx.createLinearGradient(rx1,ry1,rx2,ry2);
  sg.addColorStop(0,'#f0d070');
  sg.addColorStop(0.15,'#c89030');
  sg.addColorStop(0.7,'#7a4510');
  sg.addColorStop(1,'#3a1806');

  actx.beginPath();
  actx.moveTo(rx1,ry1);
  actx.lineTo(rx2,ry2);
  actx.lineWidth=6*SC;
  actx.strokeStyle=sg;
  actx.lineCap='round';
  actx.stroke();

  // ჯოხის წვერი
  actx.beginPath();
  actx.arc(rx1,ry1,2.5*SC,0,Math.PI*2);
  actx.fillStyle='#b0d0f0';
  actx.fill();

  actx.restore();
}

  document.getElementById('wss').textContent=reason||'';
  document.getElementById('win').classList.add('on');
  sysM(won?('🏆 '+(PROF.username||'შენ')+' გაიმარჯვა!'):('😔 '+(opp?.username||'?')+' გაიმარჯვა!'));

function buildEp(){
  const g=document.getElementById('epg');if(!g)return;g.innerHTML='';
  emojis.forEach(em=>{
    const b=document.createElement('button');b.className='epb';
    const isI=em.url&&(em.url.startsWith('http')||em.url.startsWith('data:'));
    if(isI) b.innerHTML=`<img src="${em.url}">`;
    else b.innerHTML=`<span style="font-size:20px">${em.url||'?'}</span>`;
    b.onclick=()=>{document.getElementById('ci').value+=isI?`[e:${em.id}]`:em.url;};
    g.appendChild(b);
  });
}
function togEmo(){document.getElementById('ep').classList.toggle('open');}
document.addEventListener('click',e=>{
  const p=document.getElementById('ep');
  if(p&&p.classList.contains('open')&&!p.contains(e.target)&&!e.target.closest('.ceb')) p.classList.remove('open');
});

init();
</script>
</body>
