<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ბილიარდი · კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none}
body{background:#0a0612;color:#ede0ff;font-family:sans-serif;overflow:hidden}
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0a0612;z-index:100}
.lcard{background:#110d22;border:1px solid #a850ff55;border-radius:20px;padding:20px;width:320px}
button{padding:10px;margin:5px;border-radius:10px;border:none;cursor:pointer;background:#7a1fc8;color:white}
#game{position:fixed;inset:0;display:none;flex-direction:column}
#game.on{display:flex}
#top-bar{background:#110d22;padding:8px;display:flex;justify-content:space-between}
canvas{display:block;margin:auto;background:#0e2d16;cursor:crosshair}
#controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#0a0612dd;padding:10px 20px;border-radius:20px;display:flex;gap:15px}
#power-slider{width:200px}
#shoot-btn{background:#a855f7;padding:8px 20px}
.status{position:absolute;top:60px;right:20px;background:#110d22;padding:8px 15px;border-radius:20px;font-size:14px}
.turn-indicator{position:absolute;top:60px;left:20px;background:#110d22;padding:8px 15px;border-radius:20px}
</style>
</head>
<body>

<div id="lobby">
  <div class="lcard">
    <h2>🎱 ბილიარდი</h2>
    <button onclick="startMultiplayer()">👥 მრავალმოთამაშიანი</button>
    <button onclick="startAI()">🤖 AI-ს წინააღმდეგ</button>
  </div>
</div>

<div id="game">
  <div id="top-bar">
    <button onclick="leaveGame()">← გასვლა</button>
    <span id="game-id"></span>
    <span id="score">0 : 0</span>
  </div>
  <canvas id="gameCanvas" width="700" height="350"></canvas>
  <div id="controls">
    <span>💪 ძალა</span>
    <input type="range" id="power-slider" min="1" max="100" value="50">
    <button id="shoot-btn" onclick="shoot()">🎯 სროლა</button>
  </div>
  <div class="status" id="statusMsg">ლოდინი...</div>
  <div class="turn-indicator" id="turnIndicator">⚡ თქვენი ჯერი</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ==================== KONFIGURACIA ====================
const TW = 700, TH = 350, BR = 8;
const POCKETS = [[18,16],[350,9],[682,16],[18,334],[350,341],[682,334]];
const BALL_COLORS = {1:'#FFD700',2:'#0044CC',3:'#CC0000',4:'#8800AA',5:'#FF6600',6:'#006620',7:'#880000',8:'#1a1a2e',9:'#FFD700',10:'#0044CC',11:'#CC0000',12:'#8800AA',13:'#FF6600',14:'#006620',15:'#880000'};
const STRIPES = new Set([9,10,11,12,13,14,15]);

const supabase = supabase.createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

// ==================== GLOBALURI ====================
let currentUser = null;
let gameId = null;
let isPlayer1 = true;
let vsAI = false;
let opponent = null;

let balls = [];
let myTurn = false;
let isShooting = false;
let power = 50;
let angle = 0;
let mouseX = 0, mouseY = 0;
let animationId = null;
let channel = null;

let p1Score = 0, p2Score = 0;
let p1Pocketed = [], p2Pocketed = [];
let p1Group = null, p2Group = null;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ==================== ბურთების ინიციალიზაცია ====================
function initBalls() {
  const ballsArr = [];
  const cx = TW * 0.72, cy = TH / 2, gap = BR * 2.2;
  const positions = [[0,0],[-1,-1],[1,-1],[-2,-2],[0,-2],[2,-2],[-3,-3],[-1,-3],[1,-3],[3,-3],[-4,-4],[-2,-4],[0,-4],[2,-4],[4,-4]];
  const numbers = [1,9,2,10,8,3,11,4,12,5,13,6,14,7,15];
  
  for(let i = 0; i < 15; i++) {
    ballsArr.push({
      id: i+1,
      num: numbers[i],
      x: cx + positions[i][0] * gap * 0.5,
      y: cy + positions[i][1] * gap * 0.866,
      vx: 0, vy: 0,
      pocketed: false
    });
  }
  // cue ball
  ballsArr.push({ id: 0, num: 0, x: TW * 0.27, y: TH/2, vx: 0, vy: 0, pocketed: false });
  return ballsArr;
}

function resetGame() {
  balls = initBalls();
  p1Pocketed = [];
  p2Pocketed = [];
  p1Group = null;
  p2Group = null;
  myTurn = (vsAI ? true : isPlayer1);
  isShooting = false;
  if(animationId) cancelAnimationFrame(animationId);
  draw();
  updateUI();
}

// ==================== ფიზიკა ====================
function updatePhysics() {
  let moving = false;
  const FRICTION = 0.985;
  
  for(let b of balls) {
    if(b.pocketed) continue;
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= FRICTION;
    b.vy *= FRICTION;
    
    // კედლები
    if(b.x - BR < 5) { b.x = 5 + BR; b.vx = -b.vx * 0.8; }
    if(b.x + BR > TW - 5) { b.x = TW - 5 - BR; b.vx = -b.vx * 0.8; }
    if(b.y - BR < 5) { b.y = 5 + BR; b.vy = -b.vy * 0.8; }
    if(b.y + BR > TH - 5) { b.y = TH - 5 - BR; b.vy = -b.vy * 0.8; }
    
    // ჯიბეები
    for(let pocket of POCKETS) {
      const dx = b.x - pocket[0], dy = b.y - pocket[1];
      if(Math.hypot(dx, dy) < 14 && !b.pocketed && b.num !== 0) {
        b.pocketed = true;
        b.vx = b.vy = 0;
        // ჩაგდებული ბურთის დამუშავება
        if(myTurn && !vsAI) {
          if(p1Group === null && p2Group === null && b.num !== 8) {
            if(STRIPES.has(b.num)) { p1Group = 'stripe'; p2Group = 'solid'; }
            else { p1Group = 'solid'; p2Group = 'stripe'; }
          }
          const myGroup = isPlayer1 ? p1Group : p2Group;
          const isMine = (myGroup === 'stripe' && STRIPES.has(b.num)) || (myGroup === 'solid' && !STRIPES.has(b.num));
          if(isMine && b.num !== 8) {
            if(isPlayer1) p1Pocketed.push(b.num);
            else p2Pocketed.push(b.num);
          } else if(b.num !== 8) {
            if(isPlayer1) p2Pocketed.push(b.num);
            else p1Pocketed.push(b.num);
          }
        }
        break;
      }
    }
    
    // ჯიბეში ჩავარდნილი ბურთები გვერდზე გადაიტანე
    if(b.pocketed) {
      b.x = -100;
      b.y = -100;
    }
    
    if(Math.abs(b.vx) > 0.1 || Math.abs(b.vy) > 0.1) moving = true;
  }
  
  // შეჯახებები
  for(let i = 0; i < balls.length; i++) {
    for(let j = i+1; j < balls.length; j++) {
      const a = balls[i], b = balls[j];
      if(a.pocketed || b.pocketed) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      if(dist < BR * 2) {
        const angle = Math.atan2(dy, dx);
        const overlap = BR * 2 - dist;
        const moveX = Math.cos(angle) * overlap * 0.5;
        const moveY = Math.sin(angle) * overlap * 0.5;
        a.x -= moveX; a.y -= moveY;
        b.x += moveX; b.y += moveY;
        
        const nx = dx / dist, ny = dy / dist;
        const vrelx = b.vx - a.vx, vrely = b.vy - a.vy;
        const dot = vrelx * nx + vrely * ny;
        if(dot < 0) {
          const imp = (1.0 * dot) / 2;
          a.vx += imp * nx; a.vy += imp * ny;
          b.vx -= imp * nx; b.vy -= imp * ny;
        }
      }
    }
  }
  
  draw();
  
  if(!moving && animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
    endTurn();
  } else if(moving && !animationId) {
    animationId = requestAnimationFrame(function animate() {
      updatePhysics();
      if(!balls.some(b => Math.abs(b.vx) > 0.1 || Math.abs(b.vy) > 0.1)) {
        cancelAnimationFrame(animationId);
        animationId = null;
        endTurn();
      } else {
        animationId = requestAnimationFrame(animate);
      }
    });
  }
}

function shoot() {
  if(!myTurn || isShooting) return;
  const cue = balls.find(b => b.num === 0);
  if(!cue || cue.pocketed) return;
  
  const powerVal = parseInt(document.getElementById('power-slider').value);
  const speed = 3 + powerVal * 0.25;
  cue.vx = Math.cos(angle) * speed;
  cue.vy = Math.sin(angle) * speed;
  isShooting = true;
  myTurn = false;
  updateUI();
  updatePhysics();
}

function endTurn() {
  isShooting = false;
  
  // 8-ბურთის შემოწმება
  const eightBall = balls.find(b => b.num === 8);
  if(eightBall && eightBall.pocketed) {
    const myPocketedCount = (isPlayer1 ? p1Pocketed : p2Pocketed).length;
    if(myPocketedCount >= 7) {
      if(isPlayer1) p1Score++; else p2Score++;
      alert((isPlayer1 ? "თქვენ" : "მოწინააღმდეგემ") + " მოიგო!");
      updateScoreDisplay();
      resetGame();
      return;
    } else {
      if(isPlayer1) p2Score++; else p1Score++;
      alert("8-ბურთი ნაადრევად! მოწინააღმდეგემ მოიგო");
      updateScoreDisplay();
      resetGame();
      return;
    }
  }
  
  // სვლის გადაცემა
  if(vsAI) {
    myTurn = true;
    updateUI();
    if(!myTurn) setTimeout(() => aiShoot(), 500);
  } else {
    // multiplayer - გადაცემა მოწინააღმდეგეს
    myTurn = false;
    updateUI();
    saveGameState();
  }
  
  draw();
}

// ==================== AI ====================
function aiShoot() {
  if(myTurn || vsAI === false) return;
  const cue = balls.find(b => b.num === 0);
  if(!cue || cue.pocketed) return;
  
  // აირჩიე სამიზნე
  const myGroup = isPlayer1 ? p1Group : p2Group;
  let targets = balls.filter(b => !b.pocketed && b.num !== 0 && b.num !== 8);
  if(myGroup === 'solid') targets = targets.filter(b => !STRIPES.has(b.num));
  else if(myGroup === 'stripe') targets = targets.filter(b => STRIPES.has(b.num));
  if(targets.length === 0) targets = balls.filter(b => !b.pocketed && b.num !== 0);
  
  if(targets.length > 0) {
    const target = targets.reduce((a,b) => 
      Math.hypot(b.x - cue.x, b.y - cue.y) < Math.hypot(a.x - cue.x, a.y - cue.y) ? b : a
    );
    angle = Math.atan2(target.y - cue.y, target.x - cue.x);
    angle += (Math.random() - 0.5) * 0.3;
  } else {
    angle = Math.random() * Math.PI * 2;
  }
  
  const powerVal = 40 + Math.random() * 50;
  document.getElementById('power-slider').value = powerVal;
  const speed = 3 + powerVal * 0.25;
  cue.vx = Math.cos(angle) * speed;
  cue.vy = Math.sin(angle) * speed;
  isShooting = true;
  updateUI();
  updatePhysics();
}

// ==================== ხატვა ====================
function draw() {
  ctx.clearRect(0, 0, TW, TH);
  
  // მაგიდა
  ctx.fillStyle = '#1a6b2f';
  ctx.fillRect(0, 0, TW, TH);
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 8;
  ctx.strokeRect(4, 4, TW-8, TH-8);
  
  // ჯიბეები
  for(let p of POCKETS) {
    ctx.beginPath();
    ctx.arc(p[0], p[1], 12, 0, Math.PI*2);
    ctx.fillStyle = '#000000';
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.arc(p[0], p[1], 8, 0, Math.PI*2);
    ctx.fill();
  }
  
  // ბურთები
  for(let b of balls) {
    if(b.pocketed) continue;
    const x = b.x, y = b.y;
    ctx.beginPath();
    ctx.arc(x, y, BR, 0, Math.PI*2);
    
    if(b.num === 0) {
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.fillStyle = '#ccc';
      ctx.arc(x-2, y-2, 2, 0, Math.PI*2);
      ctx.fill();
    } else {
      const isStripe = STRIPES.has(b.num);
      if(isStripe) {
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.fillStyle = BALL_COLORS[b.num];
        ctx.fillRect(x - BR, y - 3, BR*2, 6);
      } else {
        ctx.fillStyle = BALL_COLORS[b.num];
        ctx.fill();
      }
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${BR}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.num, x, y);
    }
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  
  // სამიზნე ხაზი + ჯოხი (მხოლოდ ჩემი სვლისას)
  if(myTurn && !isShooting) {
    const cue = balls.find(b => b.num === 0);
    if(cue && !cue.pocketed) {
      const endX = cue.x + Math.cos(angle) * 200;
      const endY = cue.y + Math.sin(angle) * 200;
      ctx.beginPath();
      ctx.moveTo(cue.x, cue.y);
      ctx.lineTo(endX, endY);
      ctx.strokeStyle = '#ffff0088';
      ctx.setLineDash([5, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // ჯოხი
      const stickX = cue.x - Math.cos(angle) * 25;
      const stickY = cue.y - Math.sin(angle) * 25;
      ctx.beginPath();
      ctx.moveTo(stickX, stickY);
      ctx.lineTo(stickX - Math.cos(angle) * 80, stickY - Math.sin(angle) * 80);
      ctx.lineWidth = 6;
      ctx.strokeStyle = '#c8a86b';
      ctx.stroke();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#8b5a2b';
      ctx.stroke();
    }
  }
}

// ==================== მაუსის მართვა ====================
function updateAngleFromMouse(e) {
  if(!myTurn || isShooting) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = TW / rect.width;
  const scaleY = TH / rect.height;
  let mouseCanvasX = (e.clientX - rect.left) * scaleX;
  let mouseCanvasY = (e.clientY - rect.top) * scaleY;
  mouseCanvasX = Math.min(Math.max(mouseCanvasX, 0), TW);
  mouseCanvasY = Math.min(Math.max(mouseCanvasY, 0), TH);
  
  const cue = balls.find(b => b.num === 0);
  if(cue && !cue.pocketed) {
    angle = Math.atan2(mouseCanvasY - cue.y, mouseCanvasX - cue.x);
    draw();
  }
}

canvas.addEventListener('mousemove', updateAngleFromMouse);
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
  updateAngleFromMouse(fakeEvent);
});

// ==================== UI ====================
function updateUI() {
  const turnEl = document.getElementById('turnIndicator');
  if(myTurn && !isShooting) {
    turnEl.innerHTML = '🎯 თქვენი ჯერი!';
    turnEl.style.color = '#4ade80';
  } else {
    turnEl.innerHTML = vsAI ? '🤖 AI-ს ჯერი...' : '⏳ მოწინააღმდეგის ჯერი...';
    turnEl.style.color = '#fbbf24';
  }
  document.getElementById('shoot-btn').disabled = !myTurn || isShooting;
}

function updateScoreDisplay() {
  document.getElementById('score').innerHTML = `${p1Score} : ${p2Score}`;
}

// ==================== MULTIPLAYER SUPABASE ====================
async function startMultiplayer() {
  const { data: { user } } = await supabase.auth.getUser();
  if(!user) {
    alert('ჯერ უნდა გაიაროთ ავტორიზაცია');
    return;
  }
  currentUser = user;
  
  // შექმენი ახალი თამაში
  const initialState = { balls: initBalls(), p1Pocketed: [], p2Pocketed: [], p1Group: null, p2Group: null };
  const { data: game, error } = await supabase.from('billiard_games').insert({
    player1_id: user.id,
    player2_id: null,
    status: 'waiting',
    game_state: JSON.stringify(initialState),
    current_turn: user.id,
    p1_score: 0,
    p2_score: 0
  }).select().single();
  
  if(error) { alert('თამაშის შექმნა ვერ მოხერხდა'); return; }
  
  gameId = game.id;
  isPlayer1 = true;
  vsAI = false;
  document.getElementById('game-id').innerHTML = `თამაშის ID: ${gameId}`;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').classList.add('on');
  
  // მოუსმინე შემოერთებას
  const inviteLink = prompt('გაუგზავნეთ ეს ბმული მეგობარს:\n' + window.location.href + '?join=' + gameId);
  
  subscribeToGame();
  resetGame();
}

async function joinGame(gameIdFromUrl) {
  const { data: { user } } = await supabase.auth.getUser();
  if(!user) return;
  currentUser = user;
  
  const { data: game } = await supabase.from('billiard_games').select('*').eq('id', gameIdFromUrl).single();
  if(!game || game.status !== 'waiting') { alert('თამაში არ მოიძებნა'); return; }
  
  await supabase.from('billiard_games').update({
    player2_id: user.id,
    status: 'active'
  }).eq('id', gameIdFromUrl);
  
  gameId = gameIdFromUrl;
  isPlayer1 = false;
  vsAI = false;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').classList.add('on');
  subscribeToGame();
  resetGame();
}

function subscribeToGame() {
  if(channel) supabase.removeChannel(channel);
  channel = supabase.channel(`game:${gameId}`)
    .on('postgres_changes', {
      schema: 'public',
      table: 'billiard_games',
      filter: `id=eq.${gameId}`,
      event: 'UPDATE'
    }, (payload) => {
      const newState = payload.new;
      if(newState.current_turn === currentUser.id) {
        myTurn = true;
        updateUI();
      } else {
        myTurn = false;
        updateUI();
      }
      // სტეიტის ჩატვირთვა
      if(newState.game_state) {
        const state = JSON.parse(newState.game_state);
        balls = state.balls;
        p1Pocketed = state.p1Pocketed;
        p2Pocketed = state.p2Pocketed;
        p1Group = state.p1Group;
        p2Group = state.p2Group;
        p1Score = newState.p1_score;
        p2Score = newState.p2_score;
        updateScoreDisplay();
        draw();
      }
    }).subscribe();
}

async function saveGameState() {
  if(vsAI) return;
  const gameState = {
    balls: balls,
    p1Pocketed: p1Pocketed,
    p2Pocketed: p2Pocketed,
    p1Group: p1Group,
    p2Group: p2Group
  };
  const nextTurn = myTurn ? currentUser.id : (isPlayer1 ? balls[0]?.id : currentUser.id);
  await supabase.from('billiard_games').update({
    game_state: JSON.stringify(gameState),
    current_turn: (myTurn ? currentUser.id : (isPlayer1 ? 'p2_will_be' : currentUser.id)),
    p1_score: p1Score,
    p2_score: p2Score
  }).eq('id', gameId);
}

function leaveGame() {
  if(channel) supabase.removeChannel(channel);
  document.getElementById('game').classList.remove('on');
  document.getElementById('lobby').style.display = 'flex';
  vsAI = false;
}

// ==================== AI დაწყება ====================
function startAI() {
  vsAI = true;
  isPlayer1 = true;
  myTurn = true;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').classList.add('on');
  resetGame();
}

// ==================== URL-დან შემოერთება ====================
window.onload = () => {
  const urlParams = new URLSearchParams(window.location.search);
  const joinId = urlParams.get('join');
  if(joinId) {
    joinGame(joinId);
  }
};

// power slider
document.getElementById('power-slider').addEventListener('input', (e) => {
  power = e.target.value;
});
</script>
</body>
</html>
