<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Georgian',sans-serif;background:#0f0c1e;color:#ede0ff;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(120,30,200,0.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(168,85,247,0.14) 0%,transparent 60%);pointer-events:none;z-index:0}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes popIn{0%{transform:scale(0.7) rotate(-4deg);opacity:0}70%{transform:scale(1.05) rotate(1deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes scoreFloat{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
@keyframes correctGlow{0%{box-shadow:0 0 0 0 rgba(74,222,128,0.6)}100%{box-shadow:0 0 0 16px rgba(74,222,128,0)}}
@keyframes wrongGlow{0%{box-shadow:0 0 0 0 rgba(239,68,68,0.6)}100%{box-shadow:0 0 0 16px rgba(239,68,68,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
#app{position:relative;z-index:1;width:100%;max-width:560px}
.screen{display:none;flex-direction:column;align-items:center;gap:18px;width:100%;animation:slideUp .35s ease}
.screen.active{display:flex}
.loading-icon{font-size:60px;animation:float 2s ease-in-out infinite}
.loading-text{font-family:'Unbounded',sans-serif;font-size:11px;color:#b580e0;letter-spacing:2.5px}
.spinner{width:36px;height:36px;border:3px solid rgba(168,85,247,0.2);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite}
.welcome-icon{font-size:80px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(168,85,247,0.6))}
.welcome-title{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:900;background:linear-gradient(135deg,#f07aff,#a855f7,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;line-height:1.25}
.welcome-sub{font-size:13px;color:#b580e0;text-align:center;line-height:1.7;margin-bottom:8px}
.stats-row{display:flex;gap:10px;width:100%;flex-wrap:wrap}
.stat-card{flex:1;min-width:100px;background:rgba(120,30,200,0.12);border:1px solid rgba(168,85,247,0.2);border-radius:14px;padding:12px 14px;text-align:center}
.stat-val{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;color:#f07aff;display:block}
.stat-lbl{font-size:9px;color:#7a5a9a;text-transform:uppercase;letter-spacing:1.5px;font-family:'Unbounded',sans-serif;margin-top:2px}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-height:300px;overflow-y:auto;padding:2px}
.cat-grid::-webkit-scrollbar{width:3px}
.cat-grid::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.3);border-radius:10px}
.cat-btn{padding:10px 12px;border-radius:12px;border:1px solid rgba(168,85,247,0.2);background:rgba(120,30,200,0.1);color:#b580e0;font-family:'Noto Sans Georgian',sans-serif;font-size:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.cat-btn:hover,.cat-btn.sel{background:rgba(168,85,247,0.25);border-color:rgba(168,85,247,0.6);color:#ede0ff;transform:translateY(-1px)}
.sec-lbl{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:2px;color:#7a5a9a;text-transform:uppercase;width:100%}
.start-btn{width:100%;padding:17px;border-radius:18px;border:none;background:linear-gradient(135deg,#7a1fc8,#a855f7,#f07aff);color:#fff;font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 8px 28px rgba(168,85,247,0.45)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(168,85,247,0.6)}
.quiz-top{width:100%;display:flex;align-items:center;gap:10px}
.q-num{font-family:'Unbounded',sans-serif;font-size:10px;color:#7a5a9a;letter-spacing:1px;flex-shrink:0}
.prog-bar{flex:1;height:6px;background:rgba(168,85,247,0.15);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#a855f7,#f07aff);border-radius:3px;transition:width .4s ease;box-shadow:0 0 8px rgba(168,85,247,0.5)}
.score-live{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;color:#f07aff;flex-shrink:0;position:relative}
.score-pop{position:absolute;top:-22px;right:0;font-size:11px;color:#4ade80;font-weight:700;animation:scoreFloat .9s ease forwards;pointer-events:none;white-space:nowrap}
.q-card{width:100%;background:rgba(18,12,36,0.85);border:1px solid rgba(168,85,247,0.22);border-radius:22px;padding:22px;backdrop-filter:blur(18px);box-shadow:0 20px 50px rgba(0,0,0,0.45),inset 0 1px 0 rgba(168,85,247,0.08);animation:popIn .3s cubic-bezier(0.34,1.2,0.64,1)}
.q-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);font-size:9px;color:#b580e0;font-family:'Unbounded',sans-serif;letter-spacing:.8px;margin-bottom:12px}
.q-text{font-size:17px;font-weight:600;color:#ede0ff;line-height:1.55;margin-bottom:18px;min-height:60px}
.answers{display:flex;flex-direction:column;gap:8px}
.ans-btn{padding:13px 16px;border-radius:14px;border:1px solid rgba(168,85,247,0.2);background:rgba(40,25,70,0.6);color:#ede0ff;font-family:'Noto Sans Georgian',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:10px}
.ans-btn:hover:not(:disabled){background:rgba(120,30,200,0.25);border-color:rgba(168,85,247,0.45);transform:translateX(4px)}
.ans-btn:disabled{cursor:default}
.ans-btn.correct{background:rgba(74,222,128,0.18)!important;border-color:rgba(74,222,128,0.6)!important;color:#4ade80!important;animation:correctGlow .6s ease}
.ans-btn.wrong{background:rgba(239,68,68,0.18)!important;border-color:rgba(239,68,68,0.5)!important;color:#ef4444!important;animation:wrongGlow .6s ease,shake .4s ease}
.ans-btn.reveal{background:rgba(74,222,128,0.08)!important;border-color:rgba(74,222,128,0.3)!important;color:#4ade80!important}
.ans-idx{width:26px;height:26px;border-radius:8px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.2);display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:10px;color:#b580e0;flex-shrink:0}
.ans-btn.correct .ans-idx{background:rgba(74,222,128,0.2);border-color:rgba(74,222,128,0.4);color:#4ade80}
.ans-btn.wrong .ans-idx{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.4);color:#ef4444}
.feedback-row{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;font-size:13px;opacity:0;transition:opacity .3s}
.feedback-row.show{opacity:1}
.feedback-row.ok{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);color:#4ade80}
.feedback-row.ko{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#ef4444}
.next-btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#7a1fc8,#a855f7);color:#fff;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px;opacity:0;pointer-events:none;transform:translateY(8px)}
.next-btn.show{opacity:1;pointer-events:all;transform:translateY(0);transition:all .3s ease}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(168,85,247,0.4)}
.result-icon{font-size:80px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(168,85,247,0.6))}
.result-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;text-align:center;line-height:1.3;background:linear-gradient(135deg,#f07aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}
.res-card{background:rgba(120,30,200,0.12);border:1px solid rgba(168,85,247,0.2);border-radius:14px;padding:14px;text-align:center}
.res-val{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:#f07aff;display:block}
.res-lbl{font-size:9px;color:#7a5a9a;text-transform:uppercase;letter-spacing:1px;font-family:'Unbounded',sans-serif;margin-top:2px}
.rating-bar{width:100%;background:rgba(168,85,247,0.1);border-radius:10px;height:10px;overflow:hidden;border:1px solid rgba(168,85,247,0.15)}
.rating-fill{height:100%;background:linear-gradient(90deg,#a855f7,#f07aff);border-radius:10px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.total-score-box{width:100%;padding:20px;background:rgba(120,30,200,0.15);border:1px solid rgba(168,85,247,0.3);border-radius:18px;text-align:center}
.total-score-num{font-family:'Unbounded',sans-serif;font-size:48px;font-weight:900;color:#f07aff;line-height:1;display:block}
.total-score-lbl{font-size:11px;color:#7a5a9a;text-transform:uppercase;letter-spacing:2px;font-family:'Unbounded',sans-serif;margin-top:6px;display:block}
.saved-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.25);color:#4ade80;font-size:12px}
.replay-btn{width:100%;padding:16px;border-radius:18px;border:none;background:linear-gradient(135deg,#7a1fc8,#a855f7,#f07aff);color:#fff;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 8px 28px rgba(168,85,247,0.4)}
.replay-btn:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(168,85,247,0.55)}
.back-link{color:#7a5a9a;font-size:12px;cursor:pointer;text-decoration:underline;font-family:'Noto Sans Georgian',sans-serif}
.back-link:hover{color:#b580e0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7a1fc8,#a855f7);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;pointer-events:none;animation:slideUp .3s ease;white-space:nowrap}
</style>
</head>

  {cat:'🧬 ბიოლოგია',q:'ფოტოსინთეზი მცენარის რომელ ნაწილში ხდება?',a:['ქლოროპლასტში','მიტოქონდრიაში','ბირთვში','რიბოსომაში'],c:0},
  
  {cat:'🐉 მითოლოგია',q:'ბერძნულ მითოლოგიაში ღმერთების მეფე ვინ იყო?',a:['ზევსი','პოსეიდონი','ჰადესი','აპოლონი'],c:0},
  {cat:'🐉 მითოლოგია',q:'ამაზონები ვინ იყვნენ ბერძნულ მითოლოგიაში?',a:['მებრძოლი ქალები','მეომრები','ნიმფები','ქალღმერთები'],c:0},
  {cat:'🐉 მითოლოგია',q:'მედუზა გორგონას რა განსაკუთრებული ჰქონდა?',a:['თმის ნაცვლად გველები','ფრთები','ოქროს ხმალი','ცეცხლის სუნთქვა'],c:0},
  {cat:'🐉 მითოლოგია',q:'ბერძნულ მითოლოგიაში აქილევსის სისუსტე რა იყო?',a:['ქუსლი','მუხლი','ხელი','თვალი'],c:0},
  {cat:'🐉 მითოლოგია',q:'ბერძნულ მითოლოგიაში ზღვის ქალღმერთი ვინ იყო?',a:['ამფიტრიტე','აფროდიტე','ათენა','არტემიდა'],c:0}
];

const CATS = [...new Set(ALL_QUESTIONS.map(q=>q.cat))];

let selectedCatObj = 'all';
let ME_ID = null, myProfile = null;
let sessionScore = 0, sessionCorrect = 0, sessionWrong = 0;
let currentQuestions = [], currentIndex = 0;
let isAnswered = false;
const SCORE_PER_Q = 5;

async function init() {
  const {data:{user}} = await sb.auth.getUser();
  if (!user) { location.href='index.html'; return; }
  ME_ID = user.id;
  const {data:p} = await sb.from('profiles').select('*').eq('id',ME_ID).single();
  myProfile = p;
  buildCatGrid();
  updateStats();
  showScreen('welcomeScreen');
}

function buildCatGrid() {
  const g = document.getElementById('catGrid');
  g.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'cat-btn sel';
  all.innerHTML = '🎲 ყველა';
  all.onclick = () => selectCat('all', all);
  g.appendChild(all);
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c;
    btn.onclick = () => selectCat(c, btn);
    g.appendChild(btn);
  });
}

function selectCat(val, el) {
  selectedCatObj = val;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}

function updateStats() {
  const el = document.getElementById('statsRow');
  if (!el) return;
  const total = myProfile?.quiz_score || 0;
  const games = myProfile?.quiz_games || 0;
  el.innerHTML = `
    <div class="stat-card"><span class="stat-val">${total}</span><span class="stat-lbl">სულ ქულა</span></div>
    <div class="stat-card"><span class="stat-val">${games}</span><span class="stat-lbl">თამაში</span></div>
    <div class="stat-card"><span class="stat-val">${ALL_QUESTIONS.length}</span><span class="stat-lbl">კითხვა</span></div>
  `;
}

function startQuiz() {
  let pool = ALL_QUESTIONS;
  if (selectedCatObj !== 'all') pool = pool.filter(q => q.cat === selectedCatObj);
  if (pool.length === 0) { showToast('❌ ამ კატეგორიაში კითხვები არ არის!'); return; }
  currentQuestions = shuffle([...pool]).slice(0, Math.min(20, pool.length));
  currentIndex = 0;
  sessionScore = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  showScreen('quizScreen');
  renderQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  isAnswered = false;
  document.getElementById('qNum').textContent = `${currentIndex+1}/${currentQuestions.length}`;
  document.getElementById('progFill').style.width = `${(currentIndex/currentQuestions.length)*100}%`;
  document.getElementById('scoreLive').innerHTML = `${sessionScore} ქ.<span id="scorePop" style="display:none" class="score-pop"></span>`;
  document.getElementById('qTag').textContent = q.cat;
  document.getElementById('qText').textContent = q.q;
  
  const ansEl = document.getElementById('answers');
  ansEl.innerHTML = '';
  const letters = ['ა', 'ბ', 'გ', 'დ'];
  const shuffled = shuffleAnswers(q.a, q.c);
  shuffled.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = `<span class="ans-idx">${letters[i]}</span>${item.text}`;
    btn.dataset.correct = item.correct ? '1' : '0';
    btn.onclick = () => answerQ(btn, item.correct);
    ansEl.appendChild(btn);
  });
  
  document.getElementById('feedbackRow').className = 'feedback-row';
  document.getElementById('feedbackTxt').textContent = '';
  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn';
  nb.textContent = currentIndex < currentQuestions.length-1 ? 'შემდეგი კითხვა →' : 'შედეგი →';
}

function shuffleAnswers(answers, correctIdx) {
  const items = answers.map((text, i) => ({text, correct: i === correctIdx}));
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }
  return items;
}

function answerQ(btn, isCorrect) {
  if (isAnswered) return;
  isAnswered = true;
  
  document.querySelectorAll('.ans-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('reveal');
  });
  
  if (isCorrect) {
    btn.classList.remove('reveal');
    btn.classList.add('correct');
    sessionCorrect++;
    sessionScore += SCORE_PER_Q;
    const pop = document.getElementById('scorePop');
    if (pop) {
      pop.textContent = `+${SCORE_PER_Q}`;
      pop.style.display = 'block';
      setTimeout(() => pop.style.display = 'none', 900);
    }
    document.getElementById('scoreLive').innerHTML = `${sessionScore} ქ.<span id="scorePop" style="display:none" class="score-pop"></span>`;
    showFeedback(true, '✅ სწორია! +5 ქულა');
  } else {
    btn.classList.remove('reveal');
    btn.classList.add('wrong');
    sessionWrong++;
    showFeedback(false, '❌ არასწორია!');
  }
  document.getElementById('nextBtn').classList.add('show');
}

function showFeedback(ok, txt) {
  const fb = document.getElementById('feedbackRow');
  fb.className = `feedback-row show ${ok ? 'ok' : 'ko'}`;
  document.getElementById('feedbackTxt').textContent = txt;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    finishQuiz();
  } else {
    renderQuestion();
  }
}

async function finishQuiz() {
  showScreen('resultScreen');
  const total = currentQuestions.length;
  const accuracy = Math.round((sessionCorrect / total) * 100);
  
  let icon = '🏆', title = 'შესანიშნავი!';
  if (accuracy >= 80) { icon = '🌟'; title = 'ბრწყინვალე!'; }
  else if (accuracy >= 60) { icon = '👏'; title = 'კარგად!'; }
  else if (accuracy >= 40) { icon = '💪'; title = 'გაგრძელდება!'; }
  else { icon = '🤔'; title = 'ვარჯიში გჭირდება!'; }
  
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('totalScore').textContent = sessionScore;
  document.getElementById('resultGrid').innerHTML = `
    <div class="res-card"><span class="res-val" style="color:#4ade80">${sessionCorrect}</span><span class="res-lbl">სწორი</span></div>
    <div class="res-card"><span class="res-val" style="color:#ef4444">${sessionWrong}</span><span class="res-lbl">არასწორი</span></div>
    <div class="res-card"><span class="res-val" style="color:#fbbf24">${total - sessionCorrect - sessionWrong}</span><span class="res-lbl">გამოტოვებული</span></div>
  `;
  document.getElementById('accPct').textContent = `${accuracy}%`;
  setTimeout(() => { document.getElementById('ratingFill').style.width = `${accuracy}%`; }, 100);
  
  if (ME_ID && sessionScore > 0) await saveScore();
}

async function saveScore() {
  try {
    const newTotal = (myProfile?.quiz_score || 0) + sessionScore;
    const newGames = (myProfile?.quiz_games || 0) + 1;
    const {error} = await sb.from('profiles').update({quiz_score: newTotal, quiz_games: newGames}).eq('id', ME_ID);
    if (!error) {
      myProfile = {...myProfile, quiz_score: newTotal, quiz_games: newGames};
      document.getElementById('savedBadge').style.display = 'inline-flex';
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({type: 'QUIZ_SCORE_UPDATE', score: newTotal}, '*');
      }
    }
  } catch(e) { console.error(e); }
}

function replayQuiz() {
  showScreen('welcomeScreen');
  updateStats();
}

function goBack() { location.href = 'index.html'; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

init();
</script>
</body>
</html>
