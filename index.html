<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - შესვლა</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0e0018, #1a0b2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(20, 5, 35, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(138, 43, 226, 0.2);
            transition: all 0.3s;
        }
        .logo {
            text-align: center;
            font-size: 64px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 12px #b06aff);
        }
        h1 {
            color: #fff;
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .sub {
            text-align: center;
            color: #a07cc0;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(138, 43, 226, 0.5);
            border-radius: 24px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #b06aff;
            box-shadow: 0 0 12px rgba(176, 106, 255, 0.3);
        }
        input::placeholder {
            color: #7a5a9e;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #7b2fbe, #b06aff);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(176, 106, 255, 0.4);
        }
        .switch {
            text-align: center;
            margin-top: 24px;
            color: #c084fc;
            cursor: pointer;
            font-size: 14px;
        }
        .switch span {
            color: #ffb86b;
            font-weight: bold;
        }
        .error {
            color: #ff8a8a;
            background: rgba(255, 0, 0, 0.1);
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            display: none;
        }
        .hearts-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
<div class="container" id="authContainer">
    <div class="logo">🔥💜</div>
    <h1>კაიფმანია</h1>
    <div class="sub">შემოგვიერთდი და იკაიფე</div>

    <div id="loginForm">
        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="ელ. ფოსტა" autocomplete="email">
        </div>
        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="პაროლი" autocomplete="current-password">
        </div>
        <button id="loginBtn">✨ შესვლა ✨</button>
        <div class="switch" id="showRegister">არ გაქვს ანგარიში? <span>რეგისტრაცია</span></div>
    </div>

    <div id="registerForm" style="display: none;">
        <div class="input-group">
            <input type="text" id="regUsername" placeholder="მომხმარებლის სახელი" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="email" id="regEmail" placeholder="ელ. ფოსტა" autocomplete="email">
        </div>
        <div class="input-group">
            <input type="password" id="regPassword" placeholder="პაროლი (მინ 6 სიმბოლო)" autocomplete="new-password">
        </div>
        <button id="registerBtn">🚀 რეგისტრაცია 🚀</button>
        <div class="switch" id="showLogin">უკვე გაქვს ანგარიში? <span>შესვლა</span></div>
    </div>

    <div id="errorMsg" class="error"></div>
</div>

<script>
    const supabase = createClient(
        "https://gdvjawrplvvldbjpfcgx.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkdmphd3JwbHZ2bGRianBmY2d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzE1NDIsImV4cCI6MjA4OTAwNzU0Mn0.QEySoKfVHF1b4dV5TAH5vgQQKQMAgdETzQm3P9p3H8A"
    );

    // ელემენტები
    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    const showRegisterBtn = document.getElementById('showRegister');
    const showLoginBtn = document.getElementById('showLogin');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const errorDiv = document.getElementById('errorMsg');

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 4000);
    }

    // ფორმების გადართვა
    showRegisterBtn.addEventListener('click', () => {
        loginFormDiv.style.display = 'none';
        registerFormDiv.style.display = 'block';
        errorDiv.style.display = 'none';
    });
    showLoginBtn.addEventListener('click', () => {
        registerFormDiv.style.display = 'none';
        loginFormDiv.style.display = 'block';
        errorDiv.style.display = 'none';
    });

    // შესვლა
    loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) {
            showError('გთხოვთ შეიყვანეთ ელ.ფოსტა და პაროლი');
            return;
        }
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            showError(error.message);
            return;
        }
        // წარმატება -> გადასვლა chat.html-ზე
        window.location.href = 'chat.html';
    });

    // რეგისტრაცია
    registerBtn.addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!username || !email || !password) {
            showError('გთხოვთ შეავსოთ ყველა ველი');
            return;
        }
        if (password.length < 6) {
            showError('პაროლი უნდა შეიცავდეს მინიმუმ 6 სიმბოლოს');
            return;
        }
        // 1) რეგისტრაცია
        const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: {
                data: { username: username }
            }
        });
        if (error) {
            showError(error.message);
            return;
        }
        if (data.user) {
            // პროფილის შექმნა (თუ ტრიგერი არ გაქვს)
            const { error: profileError } = await supabase
                .from('profiles')
                .upsert({ id: data.user.id, username: username, role: 'member', emotion: '😊' });
            if (profileError) console.error('Profile error:', profileError);
            showError('✅ რეგისტრაცია წარმატებულია! გადამისამართება...');
            setTimeout(() => {
                window.location.href = 'chat.html';
            }, 1500);
        }
    });

    // თუ უკვე შესულია, პირდაპირ გადავამისამართოთ
    (async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            window.location.href = 'chat.html';
        }
    })();
</script>
</body>
</html>
