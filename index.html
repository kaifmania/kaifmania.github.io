<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ავტორიზაცია</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .auth-card { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #ff4d6d; text-align: center; width: 300px; z-index: 10; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ff4d6d; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        .floating { position: fixed; top: 100%; font-size: 24px; animation: moveUp 6s linear infinite; pointer-events: none; }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="title">რეგისტრაცია</h2>
        <input type="email" id="email" placeholder="ელ-ფოსტა">
        <input type="password" id="password" placeholder="პაროლი">
        <button onclick="handleAuth()">დაწყება</button>
        <p style="font-size: 12px; cursor: pointer; color: #ff4d6d;" onclick="toggle()">შესვლა / რეგისტრაცია</p>
    </div>

    <script>
        // შენი მონაცემები
        const SB_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let isLogin = false;
        function toggle() { isLogin = !isLogin; document.getElementById('title').innerText = isLogin ? 'შესვლა' : 'რეგისტრაცია'; }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(isLogin) {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if(error) alert(error.message); else alert("შესულია!");
            } else {
                const { error } = await supabaseClient.auth.signUp({ email, password });
                if(error) alert(error.message); else alert("რეგისტრაცია წარმატებულია! შეამოწმე მეილი.");
            }
        }

        // გულების ანიმაცია
        setInterval(() => {
            const el = document.createElement('div');
            el.className = 'floating';
            el.innerText = ['❤️', '🌸', '💖'][Math.floor(Math.random()*3)];
            el.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 6000);
        }, 400);
    </script>
</body>
</html>
