<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle, #330000 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1200px;
        }

        /* მთავარი დახრილი ბარათი */
        .card {
            background: #0a0a0a;
            padding: 45px 40px;
            border-radius: 50px;
            text-align: center;
            width: 420px;
            border: 2px solid #ff2222;
            transform: rotateX(4deg) rotateY(-4deg) rotateZ(1deg);
            transition: all 0.35s ease-in-out;
            box-shadow: 25px 30px 40px rgba(0, 0, 0, 0.7), 0 0 12px rgba(255, 0, 0, 0.3);
        }

        .card:hover {
            transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            box-shadow: 0 0 35px rgba(255, 0, 0, 0.5);
            border-color: #ff5555;
        }

        h1 {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ff9999);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px #ff0000;
            margin-bottom: 35px;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            background: #1c1c1c;
            border: 1.5px solid #3a3a3a;
            color: #f0f0f0;
            border-radius: 60px;
            font-size: 16px;
            transition: 0.25s;
            outline: none;
        }

        input:focus {
            border-color: #ff3333;
            background: #252525;
            box-shadow: 0 0 10px rgba(255, 50, 50, 0.4);
        }

        input::placeholder {
            color: #999;
            font-weight: 400;
        }

        button {
            background: linear-gradient(95deg, #e60000, #990000);
            color: white;
            border: none;
            padding: 12px 28px;
            margin: 18px 8px 8px 8px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 12px black;
        }

        button:hover {
            transform: scale(1.03);
            background: linear-gradient(95deg, #ff3333, #cc0000);
            box-shadow: 0 0 15px #ff4444;
        }

        .hidden {
            display: none;
        }

        #message {
            margin-top: 20px;
            color: #ff8888;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link {
            margin-top: 18px;
            color: #aaaaaa;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            display: inline-block;
        }

        .back-link:hover {
            color: #ff7777;
            transform: translateX(-5px);
        }

        .main-buttons button {
            width: 160px;
            margin: 10px 12px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🔥 კაიფმანია 🔥</h1>

    <div id="mainButtons" class="main-buttons">
        <button onclick="showForm('reg')">📝 რეგისტრაცია</button>
        <button onclick="showForm('log')">🔑 შესვლა</button>
    </div>

    <div id="formSection" class="hidden">
        <input type="email" id="email" placeholder="📧 ელ. ფოსტა" autocomplete="off">
        <input type="text" id="nickname" placeholder="👤 ნიკნეიმი">
        <input type="password" id="password" placeholder="🔒 პაროლი (მინ 6)">
        <button id="submitBtn">✅ გაგზავნა</button>
        <div class="back-link" onclick="location.reload()">◀ უკან დაბრუნება</div>
    </div>

    <p id="message"></p>
</div>

<script>
    const supabase = supabase.createClient(
        "https://ccfvjcqleadastnvlcww.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjZnZqY3FsZWFkYXN0bnZsY3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDkxMzgsImV4cCI6MjA5MDg4NTEzOH0.oKjo8U6G2ND_rX8h88iNjqGl5UCaQVx_ZiKYcQfSa6s"
    );

    let mode = "";

    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            window.location.href = "chat.html";
        }
    }
    checkUser();

    function showForm(m) {
        mode = m;
        document.getElementById("mainButtons").classList.add("hidden");
        document.getElementById("formSection").classList.remove("hidden");
        const btn = document.getElementById("submitBtn");
        btn.innerText = (m === 'reg') ? "📝 რეგისტრაცია" : "🔑 შესვლა";
        const nickField = document.getElementById("nickname");
        nickField.style.display = (m === 'reg') ? "block" : "none";
        document.getElementById("message").innerText = "";
        btn.onclick = handleAuth;
    }

    async function handleAuth() {
        const email = document.getElementById("email").value.trim();
        const nick = document.getElementById("nickname").value.trim();
        const pass = document.getElementById("password").value.trim();
        const msg = document.getElementById("message");

        if (mode === "reg") {
            if (!email || !nick || !pass) {
                msg.innerText = "⚠️ შეავსე ყველა ველი!";
                return;
            }
            if (pass.length < 6) {
                msg.innerText = "⚠️ პაროლი უნდა იყოს მინიმუმ 6 სიმბოლო!";
                return;
            }
            msg.innerText = "🔄 მიმდინარეობს რეგისტრაცია...";
            const { error } = await supabase.auth.signUp({
                email: email,
                password: pass,
                options: { data: { username: nick } }
            });
            if (error) {
                msg.innerText = "❌ " + error.message;
            } else {
                msg.innerText = "✅ რეგისტრაცია წარმატებულია!";
                setTimeout(() => { window.location.href = "chat.html"; }, 1700);
            }
        } 
        else if (mode === "log") {
            if (!email || !pass) {
                msg.innerText = "⚠️ შეავსე ელ.ფოსტა და პაროლი!";
                return;
            }
            msg.innerText = "🔄 მიმდინარეობს შესვლა...";
            const { error } = await supabase.auth.signInWithPassword({
                email: email,
                password: pass
            });
            if (error) {
                msg.innerText = "❌ ელ.ფოსტა ან პაროლი არასწორია!";
            } else {
                msg.innerText = "✅ წარმატებით შეხვედი!";
                setTimeout(() => { window.location.href = "chat.html"; }, 1500);
            }
        }
    }
</script>
</body>
</html>
