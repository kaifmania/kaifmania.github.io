<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია · შესვლა</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* მცურავი გულები */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: 0;
            font-size: 1.5rem;
            opacity: 0.6;
            animation: floatHeart 6s linear forwards;
            user-select: none;
            pointer-events: none;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* დახრილი მუქი ბარათი */
        .login-card {
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 2rem;
            padding: 2rem 2rem 2.5rem;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            z-index: 10;
            transition: 0.3s;
            transform: rotate(-1deg);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .login-card:hover {
            transform: rotate(0deg) scale(1.01);
            transition: 0.3s;
        }

        .logo {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 10px #ff4d6d);
        }

        h2 {
            text-align: center;
            color: #ffe6f0;
            margin-bottom: 1.8rem;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 60px;
            background: rgba(30, 30, 50, 0.9);
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            color: #f0f0f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input:focus {
            background: #1e1e3a;
            box-shadow: 0 0 0 3px rgba(255, 77, 109, 0.4);
            border-color: #ff4d6d;
        }

        input::placeholder {
            color: #aaaacc;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ff4d6d;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:hover {
            background: #ff1e4d;
            transform: scale(0.98);
        }

        .toggle-text {
            text-align: center;
            margin-top: 1.5rem;
            color: #ccccee;
            font-size: 0.9rem;
        }

        .toggle-text span {
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            transition: 0.2s;
            color: #ff99aa;
        }

        .toggle-text span:hover {
            color: #ff4d6d;
        }

        .message {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            padding: 8px;
            color: #f9f9f9;
        }

        footer {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #aaaacc;
        }
    </style>
</head>
<body>

<div class="hearts-container" id="heartsContainer"></div>

<div class="login-card">
    <div class="logo">🔥 კაიფმანია 🔥</div>
    <h2 id="formTitle">✨ შესვლა ✨</h2>
    
    <!-- ნიკის ველი (რეგისტრაციის დროს გამოჩნდება) -->
    <div class="input-group" id="nicknameGroup" style="display: none;">
        <input type="text" id="nickname" placeholder="🏷️ ნიკი (მომხმარებლის სახელი)">
    </div>
    
    <div class="input-group">
        <input type="email" id="email" placeholder="📧 ელ. ფოსტა" autocomplete="email">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="🔒 პაროლი">
    </div>
    <button id="actionBtn">შესვლა</button>
    <div class="toggle-text">
        არ გაქვს ანგარიში? <span id="toggleMode">რეგისტრაცია</span>
    </div>
    <div class="message" id="messageArea"></div>
    <footer>❤️ მცურავი გულები + კაიფმანია ❤️</footer>
</div>

<script>
    (function() {
        // ---------- მცურავი გულები ----------
        const heartsContainer = document.getElementById('heartsContainer');
        const heartSymbols = ['❤️', '💖', '💗', '💓', '💕', '💞', '❤️‍🔥', '🧡', '💛', '💚', '💙', '💜', '🩷', '❤️‍🩹', '💝', '💘'];

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            const size = 1 + Math.random() * 2.5;
            heart.style.fontSize = `${size}rem`;
            heart.style.left = `${Math.random() * 100}%`;
            const duration = 4 + Math.random() * 6;
            heart.style.animationDuration = `${duration}s`;
            heart.style.animationDelay = `${Math.random() * 2}s`;
            heartsContainer.appendChild(heart);
            setTimeout(() => heart.remove(), duration * 1000);
        }

        setInterval(createFloatingHeart, 350);

        // ---------- DOM ელემენტები ----------
        let isLoginMode = true;
        const formTitle = document.getElementById('formTitle');
        const actionBtn = document.getElementById('actionBtn');
        const toggleSpan = document.getElementById('toggleMode');
        const messageDiv = document.getElementById('messageArea');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const nicknameInput = document.getElementById('nickname');
        const nicknameGroup = document.getElementById('nicknameGroup');

        function showMessage(msg, isError = true) {
            messageDiv.textContent = msg;
            messageDiv.style.color = isError ? '#ffaaaa' : '#aaffaa';
            setTimeout(() => {
                if(messageDiv.textContent === msg) messageDiv.textContent = '';
            }, 3000);
        }

        // რეგისტრაცია (ნიკი + მეილი + პაროლი)
        function fakeRegister(email, password, nickname) {
            if(!email.includes('@')) {
                showMessage('📧 გთხოვთ შეიყვანოთ სწორი ელ.ფოსტა', true);
                return false;
            }
            if(password.length < 3) {
                showMessage('🔒 პაროლი უნდა იყოს მინიმუმ 3 სიმბოლო', true);
                return false;
            }
            if(!nickname || nickname.trim().length < 2) {
                showMessage('🏷️ გთხოვთ შეიყვანოთ ნიკი (მინ. 2 სიმბოლო)', true);
                return false;
            }

            const users = JSON.parse(localStorage.getItem('kaifmania_users') || '{}');
            if(users[email]) {
                showMessage('⚠️ ეს ელ.ფოსტა უკვე რეგისტრირებულია', true);
                return false;
            }
            // ვინახავთ მომხმარებელს ნიკით
            users[email] = { 
                password: password,
                nickname: nickname.trim()
            };
            localStorage.setItem('kaifmania_users', JSON.stringify(users));
            showMessage(`✅ რეგისტრაცია წარმატებული! ახლა შედით, ${nickname.trim()}`, false);
            return true;
        }

        // შესვლა
        function fakeLogin(email, password) {
            const users = JSON.parse(localStorage.getItem('kaifmania_users') || '{}');
            if(!users[email]) {
                showMessage('❌ მომხმარებელი არ არსებობს. გაიარეთ რეგისტრაცია', true);
                return false;
            }
            if(users[email].password !== password) {
                showMessage('🔒 პაროლი არასწორია', true);
                return false;
            }
            const nickname = users[email].nickname;
            // წარმატებული შესვლა – ვინახავთ სესიას ნიკით
            localStorage.setItem('kaifmania_logged_in', email);
            localStorage.setItem('kaifmania_nickname', nickname);
            showMessage(`🎉 კაიფი მოდის, ${nickname}! გადაგვყავს chat.html-ზე...`, false);
            setTimeout(() => {
                window.location.href = 'chat.html';
            }, 1200);
            return true;
        }

        function handleMainAction() {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if(!email || !password) {
                showMessage('❗ შეიყვანეთ ელ.ფოსტა და პაროლი', true);
                return;
            }

            if(isLoginMode) {
                fakeLogin(email, password);
            } else {
                const nickname = nicknameInput.value.trim();
                const success = fakeRegister(email, password, nickname);
                if(success) {
                    // რეგისტრაციის შემდეგ ვრთავთ შესვლის რეჟიმს
                    isLoginMode = true;
                    formTitle.innerText = '✨ შესვლა ✨';
                    actionBtn.innerText = 'შესვლა';
                    toggleSpan.innerText = 'რეგისტრაცია';
                    nicknameGroup.style.display = 'none';
                    emailInput.value = '';
                    passwordInput.value = '';
                    nicknameInput.value = '';
                }
            }
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;
            if(isLoginMode) {
                formTitle.innerText = '✨ შესვლა ✨';
                actionBtn.innerText = 'შესვლა';
                toggleSpan.innerText = 'რეგისტრაცია';
                nicknameGroup.style.display = 'none';
                messageDiv.textContent = '';
            } else {
                formTitle.innerText = '📝 რეგისტრაცია';
                actionBtn.innerText = 'რეგისტრაცია';
                toggleSpan.innerText = 'შესვლა';
                nicknameGroup.style.display = 'block';
                messageDiv.textContent = '';
            }
        }

        actionBtn.addEventListener('click', handleMainAction);
        toggleSpan.addEventListener('click', toggleMode);

        // თუ უკვე შესულია, პირდაპირ chat.html-ზე გადავის
        if(localStorage.getItem('kaifmania_logged_in')) {
            window.location.href = 'chat.html';
        }
    })();
</script>
</body>
</html>
