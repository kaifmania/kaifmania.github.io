<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია · შესვლა</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #1a0a2e;
  --bg2: #2d0b3d;
  --bg3: #1f0a1a;
  --surface: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
  --border-focus: #ff6eb4;
  --text: #fdf0ff;
  --muted: rgba(253,240,255,0.45);
  --accent: #ff6eb4;
  --accent2: #c084fc;
  --accent3: #fb923c;
  --success: #4ade80;
  --error: #f87171;
  --radius: 24px;
  --radius-sm: 14px;
  --radius-xs: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 50%, #3b0764 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, #4a0535 0%, transparent 55%),
    radial-gradient(ellipse at 60% 80%, #1e1040 0%, transparent 50%),
    linear-gradient(135deg, #0f0720 0%, #1a0530 50%, #0d0818 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans Georgian', system-ui, sans-serif;
  color: var(--text);
  padding: 1rem;
  overflow: hidden;
  position: relative;
}

#hearts-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.orb1 {
  width: 420px; height: 420px;
  background: rgba(192,132,252,0.18);
  top: -120px; left: -120px;
  animation: o1 9s ease-in-out infinite alternate;
}
.orb2 {
  width: 360px; height: 360px;
  background: rgba(255,110,180,0.14);
  bottom: -100px; right: -100px;
  animation: o2 11s ease-in-out infinite alternate;
}
.orb3 {
  width: 260px; height: 260px;
  background: rgba(251,146,60,0.09);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  animation: o3 7s ease-in-out infinite alternate;
}

@keyframes o1 { to { transform: translate(40px, 30px) scale(1.12); } }
@keyframes o2 { to { transform: translate(-30px, -20px) scale(1.08); } }
@keyframes o3 { to { transform: translate(-44%, -56%) scale(1.15); } }

.card {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.055);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: var(--radius);
  padding: 2.5rem 2rem 2rem;
  box-shadow:
    0 0 0 1px rgba(255,110,180,0.08),
    0 32px 64px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.1);
  animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(32px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,110,180,0.7), rgba(192,132,252,0.7), transparent);
}

.brand-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0.5rem;
}

.brand-icon {
  font-size: 1.7rem;
  line-height: 1;
  animation: heartbeat 2.4s ease-in-out infinite;
  filter: drop-shadow(0 0 10px rgba(255,110,180,0.8));
}

@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  14%     { transform: scale(1.2); }
  28%     { transform: scale(1); }
  42%     { transform: scale(1.1); }
  70%     { transform: scale(1); }
}

.brand-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: linear-gradient(90deg, #ff6eb4, #c084fc);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

h1 {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 1.75rem;
  line-height: 1.2;
  letter-spacing: -0.02em;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 1rem;
}

label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--muted);
}

input {
  width: 100%;
  padding: 13px 15px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-xs);
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}

input::placeholder { color: var(--muted); }

input:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
}

input:focus {
  background: rgba(255,255,255,0.09);
  border-color: var(--border-focus);
  box-shadow: 0 0 0 4px rgba(255,110,180,0.15), 0 0 20px rgba(255,110,180,0.07);
}

.field-err {
  font-size: 12px;
  color: var(--error);
  min-height: 1em;
  padding-left: 2px;
}

.btn {
  position: relative;
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #ff6eb4 0%, #c084fc 50%, #fb923c 100%);
  background-size: 200% 200%;
  animation: gradShift 4s ease infinite;
  color: #fff;
  border: none;
  border-radius: var(--radius-xs);
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 0.4rem;
  letter-spacing: 0.03em;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  box-shadow: 0 8px 32px rgba(255,110,180,0.38), 0 2px 8px rgba(0,0,0,0.3);
  overflow: hidden;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 44px rgba(255,110,180,0.55), 0 4px 14px rgba(0,0,0,0.3);
}

.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; animation: none; }

@keyframes gradShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.toggle {
  text-align: center;
  margin-top: 1.3rem;
  font-size: 13.5px;
  color: var(--muted);
}

.toggle button {
  background: none;
  border: none;
  color: var(--accent);
  font-size: inherit;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  padding: 0;
  transition: color 0.15s;
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-color: rgba(255,110,180,0.4);
}

.toggle button:hover { color: #ffaacc; text-decoration-color: #ffaacc; }

.msg {
  margin-top: 1rem;
  padding: 11px 14px;
  border-radius: var(--radius-xs);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid transparent;
  display: none;
}

.msg.error {
  display: block;
  background: rgba(248,113,113,0.1);
  color: var(--error);
  border-color: rgba(248,113,113,0.25);
  animation: msgIn 0.25s ease both;
}

.msg.success {
  display: block;
  background: rgba(74,222,128,0.1);
  color: var(--success);
  border-color: rgba(74,222,128,0.25);
  animation: msgIn 0.25s ease both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(-5px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<canvas id="hearts-canvas"></canvas>

<div class="card">
  <div class="brand-row">
    <span class="brand-icon">💖</span>
    <span class="brand-name">კაიფმანია</span>
  </div>
  <h1 id="title">შემოდი</h1>

  <form id="form" novalidate>

    <div class="field" id="nicknameWrap" hidden>
      <label for="nickname">ნიკი</label>
      <input type="text" id="nickname" autocomplete="username" placeholder="მაგ: კაიფო" maxlength="20">
      <span class="field-err" id="nickErr" role="alert"></span>
    </div>

    <div class="field">
      <label for="email">ელ.ფოსტა</label>
      <input type="email" id="email" autocomplete="email" placeholder="შენი@ფოსტა.com" required>
      <span class="field-err" id="emailErr" role="alert"></span>
    </div>

    <div class="field">
      <label for="password">პაროლი</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="მინიმუმ 6 სიმბოლო" required>
      <span class="field-err" id="passErr" role="alert"></span>
    </div>

    <button type="submit" id="submitBtn" class="btn">შესვლა</button>
  </form>

  <p class="toggle">
    არ გაქვს ანგარიში?
    <button type="button" id="toggleBtn">დარეგისტრირდი</button>
  </p>

  <div id="msg" class="msg" role="status" aria-live="polite"></div>
</div>

<script>
/* ── floating hearts ─────────────────────────────────────── */
(function () {
  const canvas = document.getElementById('hearts-canvas');
  const ctx    = canvas.getContext('2d');

  const EMOJIS = ['❤️','🧡','💛','💜','🩷','💖','💗','💓','💕','💞','💘','❤️‍🔥','🩶','💙'];
  const COLORS = ['#ff6eb4','#c084fc','#fb923c','#f472b6','#a78bfa','#fbbf24','#f9a8d4'];

  const particles = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(a,b) { return a + Math.random()*(b-a); }

  class Heart {
    constructor(initial) {
      this.init(initial);
    }

    init(initial) {
      this.x         = rand(0, canvas.width);
      this.y         = initial ? rand(-canvas.height, canvas.height) : canvas.height + rand(20, 80);
      this.size      = rand(22, 58);
      this.vy        = rand(0.45, 1.5);
      this.vx        = rand(-0.45, 0.45);
      this.wobble    = rand(0, Math.PI * 2);
      this.wobbleSpd = rand(0.01, 0.028);
      this.wobbleAmp = rand(0.5, 1.4);
      this.alpha     = rand(0.5, 0.88);
      this.rot       = rand(-0.5, 0.5);
      this.rotSpd    = rand(-0.009, 0.009);
      this.fadeSpd   = rand(0.0008, 0.002);
      this.emoji     = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      this.color     = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.useEmoji  = Math.random() < 0.6;
    }

    drawHeart(s) {
      const w = s, h = s;
      ctx.beginPath();
      ctx.moveTo(0, h * 0.35);
      ctx.bezierCurveTo(-w * 0.5, -h * 0.1, -w, h * 0.2, 0, h * 0.85);
      ctx.bezierCurveTo(w, h * 0.2, w * 0.5, -h * 0.1, 0, h * 0.35);
      ctx.closePath();
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);

      if (this.useEmoji) {
        ctx.font = `${this.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 20;
        ctx.fillText(this.emoji, 0, 0);
      } else {
        const s = this.size * 0.5;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 24;
        this.drawHeart(s);
        ctx.fillStyle = this.color;
        ctx.fill();
      }

      ctx.restore();
    }

    update() {
      this.wobble += this.wobbleSpd;
      this.x      += Math.sin(this.wobble) * this.wobbleAmp + this.vx;
      this.y      -= this.vy;
      this.rot    += this.rotSpd;
      this.alpha  -= this.fadeSpd;
      if (this.y < -80 || this.alpha <= 0) this.init(false);
    }
  }

  for (let i = 0; i < 30; i++) particles.push(new Heart(true));

  let lastSpawn = 0;

  function loop(ts) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (ts - lastSpawn > 360) {
      particles.push(new Heart(false));
      if (particles.length > 50) particles.shift();
      lastSpawn = ts;
    }

    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
})();

/* ── auth ──────────────────────────────────────────────────── */
(function () {
  const USERS_KEY   = 'km_users';
  const SESSION_KEY = 'km_session';
  const REDIRECT    = 'chat.html';

  if (localStorage.getItem(SESSION_KEY)) location.replace(REDIRECT);

  const form         = document.getElementById('form');
  const titleEl      = document.getElementById('title');
  const submitBtn    = document.getElementById('submitBtn');
  const toggleBtn    = document.getElementById('toggleBtn');
  const msgEl        = document.getElementById('msg');
  const nicknameWrap = document.getElementById('nicknameWrap');
  const nickInput    = document.getElementById('nickname');
  const emailInput   = document.getElementById('email');
  const passInput    = document.getElementById('password');
  const nickErr      = document.getElementById('nickErr');
  const emailErr     = document.getElementById('emailErr');
  const passErr      = document.getElementById('passErr');

  let isLogin = true;

  const getUsers = () => { try { return JSON.parse(localStorage.getItem(USERS_KEY)||'{}'); } catch { return {}; } };
  const saveUsers = u => localStorage.setItem(USERS_KEY, JSON.stringify(u));

  async function hashPass(pw) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw + 'km_salt_2024'));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function showMsg(text, type) {
    msgEl.className = 'msg';
    void msgEl.offsetWidth;
    msgEl.textContent = text;
    msgEl.className = 'msg ' + type;
  }

  function clearAll() {
    nickErr.textContent = emailErr.textContent = passErr.textContent = '';
    msgEl.className = 'msg';
  }

  function setLoading(on) {
    submitBtn.disabled    = on;
    submitBtn.textContent = on ? 'გთხოვთ დაიცადოთ...' : (isLogin ? 'შესვლა' : 'რეგისტრაცია');
  }

  const vEmail = v => !v ? 'ელ.ფოსტა სავალდებულოა' : !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? 'ელ.ფოსტის ფორმატი არასწორია' : null;
  const vPass  = v => !v ? 'პაროლი სავალდებულოა' : v.length < 6 ? 'პაროლი მინიმუმ 6 სიმბოლო' : null;
  const vNick  = v => !v?.trim() ? 'ნიკი სავალდებულოა' : v.trim().length < 2 ? 'ნიკი მინიმუმ 2 სიმბოლო' : null;

  async function doLogin(email, password) {
    const user = getUsers()[email];
    if (!user) return { ok: false, msg: 'მომხმარებელი ვერ მოიძებნა' };
    if (await hashPass(password) !== user.hash) return { ok: false, msg: 'პაროლი არასწორია' };
    localStorage.setItem(SESSION_KEY, JSON.stringify({ email, nickname: user.nickname }));
    return { ok: true, msg: `კეთილი იყოს, ${user.nickname}! 🎉` };
  }

  async function doRegister(email, password, nickname) {
    const users = getUsers();
    if (users[email]) return { ok: false, msg: 'ეს ელ.ფოსტა უკვე რეგისტრირებულია' };
    users[email] = { hash: await hashPass(password), nickname: nickname.trim() };
    saveUsers(users);
    return { ok: true, msg: `გამარჯობა, ${nickname.trim()}! ახლა შემოდი 👋` };
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    clearAll();

    const email = emailInput.value.trim();
    const pw    = passInput.value;
    const nick  = nickInput.value.trim();
    let err = false;

    const eE = vEmail(email); if (eE) { emailErr.textContent = eE; err = true; }
    const pE = vPass(pw);     if (pE) { passErr.textContent  = pE; err = true; }
    if (!isLogin) { const nE = vNick(nick); if (nE) { nickErr.textContent = nE; err = true; } }
    if (err) return;

    setLoading(true);
    try {
      if (isLogin) {
        const res = await doLogin(email, pw);
        if (!res.ok) { showMsg(res.msg, 'error'); return; }
        showMsg(res.msg, 'success');
        setTimeout(() => location.href = REDIRECT, 950);
      } else {
        const res = await doRegister(email, pw, nick);
        if (!res.ok) { showMsg(res.msg, 'error'); return; }
        showMsg(res.msg, 'success');
        setMode(true);
        form.reset();
      }
    } catch(e) {
      showMsg('შეცდომა მოხდა, სცადე კიდევ ერთხელ.', 'error');
    } finally {
      setLoading(false);
    }
  });

  function setMode(login) {
    isLogin = login;
    titleEl.textContent   = login ? 'შემოდი' : 'რეგისტრაცია';
    submitBtn.textContent = login ? 'შესვლა' : 'რეგისტრაცია';
    toggleBtn.textContent = login ? 'დარეგისტრირდი' : 'უკვე გაქვს? შემოდი';
    nicknameWrap.hidden   = login;
    nickInput.required    = !login;
    clearAll();
  }

  toggleBtn.addEventListener('click', () => { setMode(!isLogin); form.reset(); emailInput.focus(); });
})();
</script>
</body>
</html>
