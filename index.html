<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 რეგისტრაცია • 12 ოთახი</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s, color 0.2s; }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui;
            background: linear-gradient(145deg, #ffe6f5 0%, #ffd9eb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        body.dark {
            background: linear-gradient(145deg, #0f0c20 0%, #1a1535 100%);
        }

        .floating-emoji {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            animation: floatMagic 8s ease-out forwards;
            z-index: 9999;
            bottom: -40px;
        }

        @keyframes floatMagic {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; bottom: -30px; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; bottom: 110%; }
        }

        .auth-card {
            background: rgba(255, 245, 250, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 40px 45px;
            width: 460px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,200,230,0.8);
            z-index: 10;
            position: relative;
        }

        body.dark .auth-card {
            background: rgba(25, 20, 50, 0.9);
            border-color: rgba(180, 130, 255, 0.5);
            color: white;
        }

        .auth-card h1 { font-size: 2.2rem; margin-bottom: 10px; }
        .auth-card input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,245,0.95);
            font-size: 1rem;
        }
        .auth-card button {
            background: #ff7eb3;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            margin: 6px;
            cursor: pointer;
            color: white;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 10px auto;
            border: 3px solid #ff7eb3;
            display: block;
        }
        .avatar-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }
        .avatar-buttons button {
            background: #b77eff;
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        #themeToggleBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.5);
            border: none;
            border-radius: 50px;
            padding: 8px 18px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>
<button id="themeToggleBtn">🌙 ღამე/დღე</button>
<div id="floatingContainer"></div>

<div class="auth-card">
    <h1>🌸 12 ოთახი 🌸</h1>
    <p>მეგობრები • PM • ხმოვანი • მოძრავი გულები</p>
    
    <input type="email" id="regEmail" placeholder="ელ. ფოსტა">
    <input type="password" id="regPassword" placeholder="პაროლი">
    <input type="text" id="regNickname" placeholder="შენი ნიკი (სახელი)">
    
    <!-- ავატარის ატვირთვა -->
    <img id="avatarPreview" class="avatar-preview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ff7eb3'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='45'%3E🌸%3C/text%3E%3C/svg%3E">
    <div class="avatar-buttons">
        <button id="uploadPhotoBtn">📷 ფოტო გალერეიდან</button>
        <button id="pickEmojiBtn">😊 Emoji</button>
    </div>
    <div id="emojiPicker" style="display: none; margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
        <!-- emoji ები -->
    </div>
    
    <button id="btnLogin">🚪 შესვლა</button>
    <button id="btnRegister">✨ რეგისტრაცია</button>
    <p id="authMessage" style="margin-top: 15px; font-size: 0.85rem;"></p>
</div>

<script>
    const SUPABASE_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let selectedAvatar = "🌸";

    // მოძრავი გულები
    function createFloating() {
        const items = ['❤️', '💖', '🌸', '🌺', '💗', '🌼', '💕', '🌷', '❤️‍🔥', '✨'];
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.innerText = items[Math.floor(Math.random() * items.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
        el.style.animationDuration = 5 + Math.random() * 6 + 's';
        document.getElementById('floatingContainer').appendChild(el);
        setTimeout(() => el.remove(), 9000);
    }
    setInterval(() => { for(let i=0;i<2;i++) createFloating(); }, 1800);

    // ღამის რეჟიმი
    document.getElementById('themeToggleBtn').onclick = () => {
        document.body.classList.toggle('dark');
        const btn = document.getElementById('themeToggleBtn');
        btn.innerText = document.body.classList.contains('dark') ? '☀️ დღე' : '🌙 ღამე';
    };

    // Emoji არჩევა
    const commonEmojis = ['😊', '😍', '😂', '🥰', '😘', '❤️', '💖', '🌸', '🌺', '🔥', '✨', '🌟', '⭐', '👑', '🎉', '💀', '👻', '🦄', '🐱', '🐶', '🍕', '🎵', '⚽'];
    const emojiPicker = document.getElementById('emojiPicker');
    commonEmojis.forEach(em => {
        const btn = document.createElement('button');
        btn.innerText = em;
        btn.style.fontSize = '1.5rem';
        btn.style.background = 'rgba(255,255,255,0.5)';
        btn.onclick = () => {
            selectedAvatar = em;
            document.getElementById('avatarPreview').src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23d9c0ff'/%3E%3Ctext x='50' y='70' text-anchor='middle' fill='white' font-size='50'%3E${encodeURIComponent(em)}%3C/text%3E%3C/svg%3E`;
            emojiPicker.style.display = 'none';
        };
        emojiPicker.appendChild(btn);
    });

    document.getElementById('pickEmojiBtn').onclick = () => {
        emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'flex' : 'none';
    };

    // ფოტოს ატვირთვა გალერეიდან
    document.getElementById('uploadPhotoBtn').onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedAvatar = event.target.result;
                    document.getElementById('avatarPreview').src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    };

    // რეგისტრაცია
    document.getElementById('btnRegister').onclick = async () => {
        const email = document.getElementById('regEmail').value;
        const pwd = document.getElementById('regPassword').value;
        const nickname = document.getElementById('regNickname').value;

        if(!email || !pwd || !nickname) {
            document.getElementById('authMessage').innerText = "❓ შეავსე ყველა ველი!";
            return;
        }

        const { data, error } = await supabase.auth.signUp({ email, password: pwd });
        if(error) {
            document.getElementById('authMessage').innerText = error.message;
            return;
        }

        if(data.user) {
            await supabase.from('users').insert([{
                id: data.user.id,
                email: email,
                nickname: nickname,
                avatar: selectedAvatar,
                role: 'member',
                status: '😊'
            }]);
            document.getElementById('authMessage').innerHTML = "✅ რეგისტრაცია წარმატებული! ახლა შედი.";
        }
    };

    // შესვლა
    document.getElementById('btnLogin').onclick = async () => {
        const email = document.getElementById('regEmail').value;
        const pwd = document.getElementById('regPassword').value;

        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pwd });
        if(error) {
            document.getElementById('authMessage').innerText = error.message;
            return;
        }

        if(data.user) {
            localStorage.setItem('userId', data.user.id);
            localStorage.setItem('userEmail', data.user.email);
            window.location.href = "chat.html";
        }
    };
</script>
</body>
</html>
