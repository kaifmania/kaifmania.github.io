<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია 😎🔥</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a0000 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            overflow: hidden;
            perspective: 1200px; /* სიღრმის ეფექტი */
        }

        /* --- 3D დახრილი ბარათი --- */
        .auth-card {
            background: #111;
            padding: 40px;
            border-radius: 25px;
            width: 320px;
            text-align: center;
            border: 2px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            
            /* აი აქ არის მთავარი 3D დახრა */
            transform: rotateY(-20deg) rotateX(10deg);
            transform-style: preserve-3d;
            transition: 0.5s ease;
            z-index: 10;
            display: block !important; /* რომ აუცილებლად გამოჩნდეს */
        }

        .auth-card:hover {
            transform: rotateY(0deg) rotateX(0deg) scale(1.05); /* მაუსის მიტანისას სწორდება */
        }

        h2 {
            color: white;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 30px;
            font-size: 26px;
        }

        /* ველების სტილი */
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #333;
            background: #222;
            color: white;
            box-sizing: border-box;
            outline: none;
            display: block; /* რომ არ დაიმალოს */
        }

        input:focus { border-color: #ff0000; }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #ff0000;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        /* მცურავი გულები */
        .heart {
            position: fixed;
            top: 100%;
            animation: fly 6s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>კაიფმანია 😎🔥</h2>
        <input type="email" id="email" placeholder="ელ-ფოსტა">
        <input type="password" id="pass" placeholder="პაროლი">
        <button onclick="handleAuth('up')">რეგისტრაცია</button>
        <button onclick="handleAuth('in')" style="background: #333; margin-top: 10px;">შესვლა</button>
    </div>

    <script>
        const SB_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            if(!email || !password) return alert("შეავსე ველები!");

            const { error } = type === 'up' 
                ? await sb.auth.signUp({ email, password }) 
                : await sb.auth.signInWithPassword({ email, password });

            if(error) alert(error.message);
            else alert("წარმატებით შესრულდა!");
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerText = ['❤️', '🌸', '💖'][Math.floor(Math.random()*3)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 20 + 15) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }, 400);
    </script>
</body>
</html>
