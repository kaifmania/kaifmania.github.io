<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: radial-gradient(circle, #330000 0%, #000 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
        }
        .card {
            background: #0d0d0d;
            padding: 35px 30px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid red;
            width: 360px;
            transform: rotate(2deg) skew(-1deg);
            transition: 0.25s ease;
            box-shadow: 12px 12px 25px rgba(0,0,0,0.6);
        }
        .card:hover {
            transform: rotate(0deg) skew(0deg);
            box-shadow: 0px 0px 28px rgba(255,0,0,0.4);
        }
        h1 {
            color: white;
            text-shadow: 0 0 6px red;
            margin-bottom: 28px;
            font-size: 30px;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            color: white;
            border-radius: 40px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: red;
            background: #2a2a2a;
        }
        button {
            background: red;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin: 12px 6px 4px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background: #b30000;
            transform: scale(1.02);
        }
        .hidden {
            display: none;
        }
        #message {
            color: #ff8080;
            margin-top: 16px;
            font-size: 13px;
        }
        .back-link {
            color: #aaa;
            cursor: pointer;
            margin-top: 16px;
            display: inline-block;
            font-size: 13px;
        }
        .back-link:hover {
            color: red;
        }
        /* მთავარი ღილაკები */
        .main-buttons button {
            width: 140px;
            margin: 8px 8px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🔥 კაიფმანია 🔥</h1>

    <div id="mainButtons" class="main-buttons">
        <button onclick="showForm('reg')">📝 რეგისტრაცია</button>
        <button onclick="showForm('log')">🔑 შესვლა</button>
    </div>

    <div id="formSection" class="hidden">
        <input type="email" id="email" placeholder="ელ. ფოსტა" autocomplete="off">
        <input type="text" id="nickname" placeholder="ნიკნეიმი">
        <input type="password" id="password" placeholder="პაროლი (მინ 6)">
        <button id="submitBtn">✅ გაგზავნა</button>
        <div class="back-link" onclick="location.reload()">◀ უკან</div>
    </div>

    <p id="message"></p>
</div>

<script>
    const supabase = supabase.createClient(
        "https://ccfvjcqleadastnvlcww.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjZnZqY3FsZWFkYXN0bnZsY3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDkxMzgsImV4cCI6MjA5MDg4NTEzOH0.oKjo8U6G2ND_rX8h88iNjqGl5UCaQVx_ZiKYcQfSa6s"
    );

    let mode = "";

    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            window.location.href = "chat.html";
        }
    }
    checkUser();

    function showForm(m) {
        mode = m;
        document.getElementById("mainButtons").classList.add("hidden");
        document.getElementById("formSection").classList.remove("hidden");
        const btn = document.getElementById("submitBtn");
        btn.innerText = (m === 'reg') ? "📝 რეგისტრაცია" : "🔑 შესვლა";
        document.getElementById("nickname").style.display = (m === 'reg') ? "block" : "none";
        document.getElementById("message").innerText = "";
        // ჩაამაგრე ღილაკზე მოქმედება
        btn.onclick = handleAuth;
    }

    async function handleAuth() {
        const email = document.getElementById("email").value.trim();
        const nick = document.getElementById("nickname").value.trim();
        const pass = document.getElementById("password").value.trim();
        const msg = document.getElementById("message");

        if (mode === "reg") {
            if (!email || !nick || !pass) {
                msg.innerText = "⚠️ შეავსე ყველა ველი!";
                return;
            }
            if (pass.length < 6) {
                msg.innerText = "⚠️ პაროლი მინ 6 სიმბოლო!";
                return;
            }
            msg.innerText = "🔄 რეგისტრაცია...";
            const { error } = await supabase.auth.signUp({
                email: email,
                password: pass,
                options: { data: { username: nick } }
            });
            if (error) {
                msg.innerText = "❌ " + error.message;
            } else {
                msg.innerText = "✅ რეგისტრაცია წარმატებულია!";
                setTimeout(() => { window.location.href = "chat.html"; }, 1800);
            }
        } else if (mode === "log") {
            if (!email || !pass) {
                msg.innerText = "⚠️ შეავსე ელ.ფოსტა და პაროლი!";
                return;
            }
            msg.innerText = "🔄 შესვლა...";
            const { error } = await supabase.auth.signInWithPassword({
                email: email,
                password: pass
            });
            if (error) {
                msg.innerText = "❌ ელ.ფოსტა ან პაროლი არასწორია!";
            } else {
                msg.innerText = "✅ წარმატებით შეხვედი!";
                setTimeout(() => { window.location.href = "chat.html"; }, 1500);
            }
        }
    }
</script>
</body>
</html>
