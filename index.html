<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>რეგისტრაცია და შესვლა</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    margin: 0;
    overflow: hidden;
  }

  /* მცურავი გულები */
  .heart {
    position: absolute;
    bottom: -50px;
    font-size: 24px;
    color: red;
    animation: floatUp 10s linear forwards;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) scale(0.5);
      opacity: 1;
    }
    100% {
      transform: translateY(-100vh) scale(1);
      opacity: 0;
    }
  }

  /* ფორმა */
  .form-container {
    position: relative;
    width: 300px;
    margin: 50px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    z-index: 1;
  }

  h2 {
    text-align: center;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 10px;
    background-color: #ff69b4;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background-color: #ff1493;
  }

  /* სმაილები და სხვა ელემენტები */
</style>
</head>
<body>

<div class="form-container">
  <h2>რეგისტრაცია</h2>
  <input type="text" id="regNik" placeholder="მომხმარებლის სახელი"/>
  <input type="password" id="regPass" placeholder="პაროლი"/>
  <button onclick="register()">რეგისტრაცია</button>
</div>

<div class="form-container">
  <h2>შესვლა</h2>
  <input type="text" id="loginNik" placeholder="მომხმარებლის სახელი"/>
  <input type="password" id="loginPass" placeholder="პაროლი"/>
  <button onclick="login()">შესვლა</button>
</div>

<script>
  // ფუნქცია რომ მოაშოროს გულები და შექმნას ახალი გულები
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '❤️'; // ან სხვა Emojis
    heart.style.left = Math.random() * 100 + 'vw';
    document.body.appendChild(heart);

    // გულების მოძრაობა
    setTimeout(() => {
      document.body.removeChild(heart);
    }, 10000); // 10 წამი
  }

  // რეგისტრაცია
  function register() {
    alert('რეგისტრაცია წარმატებით!');
  }

  // შესვლა
  function login() {
    alert('შესვლა წარმატებით!');
  }

  // ყოველი 300 მლიწინად ქმნის გულს
  setInterval(createHeart, 300);
</script>

</body>
</html>
