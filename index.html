<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: radial-gradient(circle, #330000 0%, #000 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .card {
            background: #0d0d0d;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid red;
            width: 350px;
            transform: rotate(2deg) skew(-1deg);
            transition: 0.3s;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
        }
        .card:hover {
            transform: rotate(0deg) skew(0deg);
        }
        h1 {
            color: white;
            text-shadow: 0 0 10px red;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
        }
        button {
            background: red;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
        }
        button:hover { background: darkred; }
        .hidden { display: none; }
        #message { color: #ff6666; margin-top: 15px; }
        .back-link { color: #888; cursor: pointer; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔥 კაიფმანია 🔥</h1>

    <div id="mainButtons">
        <button onclick="showForm('reg')">📝 რეგისტრაცია</button>
        <button onclick="showForm('log')">🔑 შესვლა</button>
    </div>

    <div id="formSection" class="hidden">
        <input type="email" id="email" placeholder="ელ. ფოსტა">
        <input type="text" id="nickname" placeholder="ნიკნეიმი">
        <input type="password" id="password" placeholder="პაროლი (მინ 6)">
        <button id="submitBtn" onclick="handleAuth()">✅ გაგზავნა</button>
        <div class="back-link" onclick="location.reload()">◀ უკან</div>
    </div>

    <p id="message"></p>
</div>

<script>
    const supabase = supabase.createClient(
        "https://ccfvjcqleadastnvlcww.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjZnZqY3FsZWFkYXN0bnZsY3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDkxMzgsImV4cCI6MjA5MDg4NTEzOH0.oKjo8U6G2ND_rX8h88iNjqGl5UCaQVx_ZiKYcQfSa6s"
    );

    let mode = "";

    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) window.location.href = "chat.html";
    }
    checkUser();

    function showForm(m) {
        mode = m;
        document.getElementById("mainButtons").classList.add("hidden");
        document.getElementById("formSection").classList.remove("hidden");
        document.getElementById("submitBtn").innerText = (m === 'reg') ? "📝 რეგისტრაცია" : "🔑 შესვლა";
        document.getElementById("nickname").style.display = (m === 'reg') ? "block" : "none";
        document.getElementById("message").innerText = "";
    }

    async function handleAuth() {
        const email = document.getElementById("email").value.trim();
        const nick = document.getElementById("nickname").value.trim();
        const pass = document.getElementById("password").value.trim();
        const msg = document.getElementById("message");

        if (mode === "reg") {
            if (!email || !nick || !pass) return msg.innerText = "⚠️ შეავსე ყველა ველი!";
            if (pass.length < 6) return msg.innerText = "⚠️ პაროლი მინ 6 სიმბოლო!";
            msg.innerText = "🔄 რეგისტრაცია...";
            const { error } = await supabase.auth.signUp({
                email, password: pass,
                options: { data: { username: nick } }
            });
            if (error) msg.innerText = "❌ " + error.message;
            else msg.innerText = "✅ რეგისტრაცია წარმატებულია!";
            setTimeout(() => { window.location.href = "chat.html"; }, 2000);
        } else if (mode === "log") {
            if (!email || !pass) return msg.innerText = "⚠️ შეავსე ელ.ფოსტა და პაროლი!";
            msg.innerText = "🔄 შესვლა...";
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) msg.innerText = "❌ ელ.ფოსტა ან პაროლი არასწორია!";
            else msg.innerText = "✅ წარმატებით შეხვედი!";
            setTimeout(() => { window.location.href = "chat.html"; }, 1500);
        }
    }
</script>
</body>
</html>
