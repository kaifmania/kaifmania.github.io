<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - რეგისტრაცია</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #120a22, #2a1840);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .container {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 30px;
            width: 350px;
        }
        h1 { color: white; text-align: center; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            background: rgba(255,255,255,0.9);
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            background: #8b3fe0;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .error { color: #ff8888; background: rgba(255,0,0,0.2); padding: 10px; border-radius: 10px; margin: 10px 0; display: none; }
        .success { color: #88ff88; background: rgba(0,255,0,0.2); padding: 10px; border-radius: 10px; margin: 10px 0; display: none; }
        .switch { text-align: center; color: #cc99ff; cursor: pointer; margin-top: 15px; }
        .loading { display: none; text-align: center; color: white; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>💜 კაიფმანია 💜</h1>
    
    <div id="loginBox">
        <input type="email" id="email" placeholder="ელ. ფოსტა">
        <input type="password" id="password" placeholder="პაროლი">
        <button onclick="login()">შესვლა</button>
        <div class="switch" onclick="showRegister()">არ გაქვს ანგარიში? რეგისტრაცია</div>
    </div>

    <div id="registerBox" style="display:none">
        <input type="text" id="regName" placeholder="მომხმარებლის სახელი">
        <input type="email" id="regEmail" placeholder="ელ. ფოსტა">
        <input type="password" id="regPass" placeholder="პაროლი (6+ სიმბოლო)">
        <button onclick="register()">რეგისტრაცია</button>
        <div class="switch" onclick="showLogin()">უკვე გაქვს ანგარიში? შესვლა</div>
    </div>

    <div id="loadingMsg" class="loading">⏳ იტვირთება...</div>
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
</div>

<script>
    const supabaseUrl = "https://vjstuyxuhshsouqsnvxp.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqc3R1eXh1aHNoc291cXNudnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDExOTQsImV4cCI6MjA5MDk3NzE5NH0.sVzu2GTaMwskp8lGb0C9F15Iy7RKT1FxQrwd5JgHquE";
    
    const supabase = supabase.createClient(supabaseUrl, supabaseKey, {
        auth: {
            autoRefreshToken: true,
            persistSession: true,
            detectSessionInUrl: true
        }
    });

    function showError(msg) {
        document.getElementById('loadingMsg').style.display = 'none';
        const errDiv = document.getElementById('errorMsg');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.style.display = 'none', 4000);
    }

    function showSuccess(msg) {
        document.getElementById('loadingMsg').style.display = 'none';
        const sucDiv = document.getElementById('successMsg');
        sucDiv.innerText = msg;
        sucDiv.style.display = 'block';
        setTimeout(() => sucDiv.style.display = 'none', 3000);
    }

    function showRegister() {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('registerBox').style.display = 'block';
    }

    function showLogin() {
        document.getElementById('registerBox').style.display = 'none';
        document.getElementById('loginBox').style.display = 'block';
    }

    async function register() {
        const username = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value;

        if (!username || !email || !password) {
            showError('შეავსე ყველა ველი!');
            return;
        }
        if (password.length < 6) {
            showError('პაროლი უნდა იყოს მინიმუმ 6 სიმბოლო!');
            return;
        }

        document.getElementById('loadingMsg').style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('successMsg').style.display = 'none';

        try {
            // ჯერ ვამოწმებთ ინტერნეტ კავშირს
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        username: username,
                        role: 'user'
                    }
                }
            });
            
            clearTimeout(timeoutId);

            if (error) {
                showError('❌ ' + error.message);
                console.error('Supabase error:', error);
                return;
            }

            if (data?.user) {
                showSuccess('✅ რეგისტრაცია წარმატებულია! შედი სისტემაში');
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPass').value = '';
                setTimeout(() => showLogin(), 2000);
            }
        } catch (err) {
            console.error('Fetch error:', err);
            if (err.name === 'AbortError') {
                showError('⏰ ქსელი ნელია, სცადეთ თავიდან');
            } else {
                showError('🌐 ქსელის შეცდომა! შეამოწმეთ ინტერნეტი');
            }
        } finally {
            document.getElementById('loadingMsg').style.display = 'none';
        }
    }

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showError('შეიყვანე ელ.ფოსტა და პაროლი!');
            return;
        }

        document.getElementById('loadingMsg').style.display = 'block';

        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                showError('❌ ' + error.message);
                return;
            }

            if (data.user) {
                showSuccess('✅ წარმატებით შეხვედი!');
                localStorage.setItem('user_id', data.user.id);
                setTimeout(() => {
                    window.location.href = 'chat.html';
                }, 1000);
            }
        } catch (err) {
            showError('🌐 ქსელის შეცდომა!');
        } finally {
            document.getElementById('loadingMsg').style.display = 'none';
        }
    }

    // შემოწმება
    supabase.auth.getSession().then(({ data: { session } }) => {
        if (session && window.location.pathname.indexOf('chat') === -1) {
            window.location.href = 'chat.html';
        }
    });
</script>
</body>
</html>
