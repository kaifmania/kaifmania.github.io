<!DOCTYPE html>

<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NebulaChat — შედი სამყაროში</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #ff6b9d;
    --violet: #c77dff;
    --gold: #ffd166;
    --dark: #0d0d1a;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.1);
    --text: #f0e6ff;
    --muted: rgba(240,230,255,0.5);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–dark);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
position: relative;
}

/* ── Animated background ── */
.bg-mesh {
position: fixed; inset: 0; z-index: 0;
background:
radial-gradient(ellipse 80% 60% at 20% 20%, rgba(199,125,255,0.18) 0%, transparent 60%),
radial-gradient(ellipse 60% 80% at 80% 80%, rgba(255,107,157,0.15) 0%, transparent 60%),
radial-gradient(ellipse 50% 50% at 50% 50%, rgba(13,13,26,1) 0%, transparent 100%),
#0d0d1a;
}

/* ── Floating particles ── */
.particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.particle {
position: absolute;
border-radius: 50%;
animation: floatUp linear infinite;
opacity: 0;
}
@keyframes floatUp {
0%   { transform: translateY(110vh) scale(0); opacity: 0; }
10%  { opacity: 1; }
90%  { opacity: 1; }
100% { transform: translateY(-10vh) scale(1.2) rotate(720deg); opacity: 0; }
}

/* ── Hearts & Flowers ── */
.floater {
position: fixed;
font-size: 1.4rem;
animation: floatHeart linear infinite;
pointer-events: none;
z-index: 1;
filter: drop-shadow(0 0 6px rgba(255,107,157,0.6));
}
@keyframes floatHeart {
0%   { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
15%  { opacity: 0.8; }
85%  { opacity: 0.8; }
100% { transform: translateY(-10vh) rotate(360deg) scale(1.1); opacity: 0; }
}

/* ── Card ── */
.card {
position: relative; z-index: 10;
width: 420px;
background: var(–card);
border: 1px solid var(–border);
border-radius: 28px;
padding: 48px 44px;
backdrop-filter: blur(24px);
box-shadow:
0 0 0 1px rgba(255,107,157,0.08),
0 32px 80px rgba(0,0,0,0.5),
inset 0 1px 0 rgba(255,255,255,0.08);
animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn {
from { opacity:0; transform: translateY(40px) scale(0.95); }
to   { opacity:1; transform: translateY(0) scale(1); }
}

.logo {
text-align: center;
margin-bottom: 36px;
}
.logo-icon {
font-size: 2.8rem;
display: block;
margin-bottom: 8px;
animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
0%,100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(199,125,255,0.6)); }
50% { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(199,125,255,0.9)); }
}
.logo h1 {
font-family: ‘Playfair Display’, serif;
font-size: 2rem;
color: var(–text);
letter-spacing: -0.5px;
}
.logo p {
color: var(–muted);
font-size: 0.82rem;
margin-top: 4px;
letter-spacing: 0.5px;
}

/* Tabs */
.tabs {
display: flex;
background: rgba(255,255,255,0.04);
border-radius: 12px;
padding: 4px;
margin-bottom: 28px;
border: 1px solid var(–border);
}
.tab {
flex: 1;
padding: 10px;
border: none;
background: transparent;
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.88rem;
font-weight: 500;
cursor: pointer;
border-radius: 9px;
transition: all 0.25s;
}
.tab.active {
background: linear-gradient(135deg, var(–rose), var(–violet));
color: #fff;
box-shadow: 0 4px 16px rgba(199,125,255,0.35);
}

/* Form */
.form-group { margin-bottom: 18px; }
.form-group label {
display: block;
color: var(–muted);
font-size: 0.78rem;
letter-spacing: 0.8px;
text-transform: uppercase;
margin-bottom: 8px;
}
.form-group input {
width: 100%;
background: rgba(255,255,255,0.05);
border: 1px solid var(–border);
border-radius: 12px;
padding: 13px 16px;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.95rem;
transition: all 0.25s;
outline: none;
}
.form-group input:focus {
border-color: var(–violet);
background: rgba(199,125,255,0.06);
box-shadow: 0 0 0 3px rgba(199,125,255,0.12);
}
.form-group input::placeholder { color: rgba(240,230,255,0.25); }

.btn-main {
width: 100%;
padding: 14px;
border: none;
border-radius: 14px;
background: linear-gradient(135deg, var(–rose) 0%, var(–violet) 100%);
color: #fff;
font-family: ‘DM Sans’, sans-serif;
font-size: 1rem;
font-weight: 500;
cursor: pointer;
margin-top: 8px;
transition: all 0.3s;
position: relative;
overflow: hidden;
letter-spacing: 0.3px;
}
.btn-main::before {
content: ‘’;
position: absolute; inset: 0;
background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
opacity: 0;
transition: opacity 0.3s;
}
.btn-main:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(199,125,255,0.45); }
.btn-main:hover::before { opacity: 1; }
.btn-main:active { transform: translateY(0); }

.msg { font-size: 0.83rem; text-align: center; margin-top: 14px; min-height: 20px; }
.msg.error { color: #ff6b6b; }
.msg.success { color: #6bffb8; }

.panel { display: none; }
.panel.active { display: block; }

/* Glowing orbs */
.orb {
position: fixed;
border-radius: 50%;
filter: blur(80px);
animation: orbDrift ease-in-out infinite alternate;
z-index: 0;
pointer-events: none;
}
.orb1 { width:300px; height:300px; background:rgba(199,125,255,0.12); top:-80px; left:-80px; animation-duration:8s; }
.orb2 { width:250px; height:250px; background:rgba(255,107,157,0.1); bottom:-60px; right:-60px; animation-duration:11s; }
.orb3 { width:180px; height:180px; background:rgba(255,209,102,0.08); top:40%; left:60%; animation-duration:9s; }
@keyframes orbDrift {
from { transform: translate(0,0) scale(1); }
to   { transform: translate(30px,40px) scale(1.15); }
}
</style>

</head>
<body>

<div class="bg-mesh"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="particles" id="particles"></div>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🌌</span>
    <h1>NebulaChat</h1>
    <p>სამყარო, სადაც სიტყვები ცოცხლდება</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">შესვლა</button>
    <button class="tab" onclick="switchTab('register')">რეგისტრაცია</button>
  </div>

  <!-- Login -->

  <div class="panel active" id="panel-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="შენი email…">
    </div>
    <div class="form-group">
      <label>პაროლი</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>
    <button class="btn-main" onclick="doLogin()">✦ შესვლა</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Register -->

  <div class="panel" id="panel-register">
    <div class="form-group">
      <label>სახელი (nickname)</label>
      <input type="text" id="reg-nick" placeholder="შენი უნიკალური სახელი…">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="შენი email…">
    </div>
    <div class="form-group">
      <label>პაროლი</label>
      <input type="password" id="reg-pass" placeholder="მინ. 6 სიმბოლო">
    </div>
    <button class="btn-main" onclick="doRegister()">🌸 რეგისტრაცია</button>
    <div class="msg" id="reg-msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPA_URL = 'https://brggiyhfzfbmlirqfgpo.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// Check if already logged in
sb.auth.getSession().then(({data:{session}}) => {
  if (session) window.location.href = 'chat.html';
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('panel-login').classList.toggle('active', tab==='login');
  document.getElementById('panel-register').classList.toggle('active', tab==='register');
}

function setMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email||!pass) return setMsg('login-msg','შეავსე ყველა ველი','error');
  setMsg('login-msg','⏳ მოიცადე…','');
  const {error} = await sb.auth.signInWithPassword({email,password:pass});
  if (error) return setMsg('login-msg', error.message, 'error');
  setMsg('login-msg','✓ წარმატება! გადამისამართება…','success');
  setTimeout(()=>window.location.href='chat.html',800);
}

async function doRegister() {
  const nick  = document.getElementById('reg-nick').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  if (!nick||!email||!pass) return setMsg('reg-msg','შეავსე ყველა ველი','error');
  if (pass.length<6) return setMsg('reg-msg','პაროლი მინ. 6 სიმბოლო','error');
  setMsg('reg-msg','⏳ ვქმნით ანგარიშს…','');
  const {data,error} = await sb.auth.signUp({email,password:pass});
  if (error) return setMsg('reg-msg',error.message,'error');
  if (data.user) {
    await sb.from('profiles').upsert({id:data.user.id, username:nick, email:email, role:'member', avatar_url:null, status_emoji:'😊', theme:'dark', accent_color:'#c77dff', created_at:new Date().toISOString()});
  }
  setMsg('reg-msg','🌸 ანგარიში შეიქმნა! გახსენი Email შესამოწმებლად.','success');
}

// ── Floating hearts & flowers ──
const emojis = ['❤️','🌸','💜','✨','🌺','💫','🌷','💕','⭐','🌼'];
function spawnFloater() {
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  el.style.left = Math.random()*100+'vw';
  el.style.fontSize = (0.9+Math.random()*1.2)+'rem';
  const dur = 7+Math.random()*10;
  el.style.animationDuration = dur+'s';
  el.style.animationDelay = Math.random()*5+'s';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), (dur+5)*1000);
}
for(let i=0;i<18;i++) setTimeout(spawnFloater, i*400);
setInterval(spawnFloater, 1800);

// ── Particles ──
const pCont = document.getElementById('particles');
const pColors = ['rgba(199,125,255,0.6)','rgba(255,107,157,0.6)','rgba(255,209,102,0.5)','rgba(107,255,200,0.4)'];
function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = 2+Math.random()*4;
  p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;background:${pColors[Math.floor(Math.random()*pColors.length)]};animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*5}s;`;
  pCont.appendChild(p);
  setTimeout(()=>p.remove(),20000);
}
for(let i=0;i<20;i++) setTimeout(spawnParticle,i*200);
setInterval(spawnParticle,600);
</script>

</body>
</html>
