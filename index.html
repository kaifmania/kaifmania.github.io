<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - შესვლა / რეგისტრაცია</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #120a22 0%, #2a1840 50%, #0e0518 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(156, 81, 255, 0.2), transparent 70%);
            pointer-events: none;
        }

        .container {
            background: rgba(30, 12, 48, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 40px 32px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(156, 81, 255, 0.4), 0 0 28px rgba(156, 81, 255, 0.3);
            transition: 0.2s;
            position: relative;
            z-index: 1;
        }

        .logo {
            text-align: center;
            font-size: 68px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 18px #b77eff);
        }

        h1 {
            text-align: center;
            font-size: 30px;
            background: linear-gradient(135deg, #f0e6ff, #cc9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .sub {
            text-align: center;
            color: #b48ad4;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1.5px solid rgba(156, 81, 255, 0.6);
            border-radius: 40px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #c58aff;
            box-shadow: 0 0 12px rgba(176, 106, 255, 0.4);
        }

        input::placeholder {
            color: #9b7ab8;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(105deg, #8b3fe0, #bf7eff);
            border: none;
            border-radius: 44px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 22px rgba(156, 81, 255, 0.5);
        }

        .switch {
            text-align: center;
            margin-top: 26px;
            color: #c792ff;
            cursor: pointer;
            font-size: 14px;
        }

        .switch span {
            color: #ffcd7e;
            font-weight: bold;
        }

        .error, .success {
            padding: 12px;
            border-radius: 28px;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            display: none;
        }

        .error {
            color: #ffaaaa;
            background: rgba(255, 70, 70, 0.15);
            border: 1px solid rgba(255, 100, 100, 0.4);
        }

        .success {
            color: #c2ff9e;
            background: rgba(120, 220, 60, 0.12);
            border: 1px solid rgba(180, 255, 100, 0.4);
        }

        .floating-hearts {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            bottom: -40px;
            font-size: 22px;
            opacity: 0.5;
            animation: floatUp linear infinite;
            color: #cc88ff;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="floating-hearts" id="hearts"></div>

<div class="container">
    <div class="logo">💜🔥</div>
    <h1>კაიფმანია</h1>
    <div class="sub">შემოგვიერთდი და იკაიფე</div>

    <div id="loginForm">
        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="📧 ელ. ფოსტა">
        </div>
        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="🔒 პაროლი">
        </div>
        <button id="loginBtn">✨ შესვლა ✨</button>
        <div class="switch" id="showRegister">არ გაქვს ანგარიში? <span>📝 რეგისტრაცია</span></div>
    </div>

    <div id="registerForm" style="display: none;">
        <div class="input-group">
            <input type="text" id="regUsername" placeholder="👤 მომხმარებლის სახელი">
        </div>
        <div class="input-group">
            <input type="email" id="regEmail" placeholder="📧 ელ. ფოსტა">
        </div>
        <div class="input-group">
            <input type="password" id="regPassword" placeholder="🔒 პაროლი (მინ 6)">
        </div>
        <button id="registerBtn">🚀 რეგისტრაცია 🚀</button>
        <div class="switch" id="showLogin">უკვე გაქვს ანგარიში? <span>🔑 შესვლა</span></div>
    </div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
</div>

<script>
    // ✅ გამოსწორებული - მხოლოდ ახალი credentials
    const { createClient } = supabase;

    const supabaseUrl = "https://vjstuyxuhshsouqsnvxp.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqc3R1eXh1aHNoc291cXNudnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDExOTQsImV4cCI6MjA5MDk3NzE5NH0.sVzu2GTaMwskp8lGb0C9F15Iy7RKT1FxQrwd5JgHquE";

    const sb = createClient(supabaseUrl, supabaseKey);

    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    const showRegisterBtn = document.getElementById('showRegister');
    const showLoginBtn = document.getElementById('showLogin');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');

    function clearLoginFields() {
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
    }

    function clearRegisterFields() {
        document.getElementById('regUsername').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
    }

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        successDiv.style.display = 'none';
        setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        setTimeout(() => successDiv.style.display = 'none', 4000);
    }

    showRegisterBtn.addEventListener('click', () => {
        loginFormDiv.style.display = 'none';
        registerFormDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        clearLoginFields();
    });

    showLoginBtn.addEventListener('click', () => {
        registerFormDiv.style.display = 'none';
        loginFormDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        clearRegisterFields();
    });

    // შესვლა
    loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            showError('📛 გთხოვთ შეიყვანეთ ელ.ფოსტა და პაროლი');
            return;
        }

        try {
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                showError('❌ შესვლის შეცდომა: ' + error.message);
                console.error('Supabase login error:', error);
                return;
            }
            if (data?.user) {
                showSuccess('✅ წარმატებული შესვლა! გადამისამართება...');
                setTimeout(() => window.location.href = 'chat.html', 1200);
            }
        } catch (err) {
            showError('⚠️ ქსელის შეცდომა, შეამოწმეთ ინტერნეტი');
            console.error(err);
        }
    });

    // რეგისტრაცია
    registerBtn.addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;

        if (!username || !email || !password) {
            showError('📛 გთხოვთ შეავსოთ ყველა ველი');
            return;
        }
        if (password.length < 6) {
            showError('🔒 პაროლი უნდა შეიცავდეს მინიმუმ 6 სიმბოლოს');
            return;
        }

        try {
            const { data, error } = await sb.auth.signUp({
                email,
                password,
                options: { data: { username } }
            });

            if (error) {
                showError('❌ რეგისტრაციის შეცდომა: ' + error.message);
                console.error(error);
                return;
            }

            if (data?.user) {
                // profiles ჩანაწერი
                await sb.from('profiles').upsert({ 
                    id: data.user.id, 
                    username: username, 
                    role: 'member', 
                    emotion: '😊' 
                });
                showSuccess('✅ რეგისტრაცია წარმატებულია! გადამისამართება...');
                setTimeout(() => window.location.href = 'chat.html', 1500);
            }
        } catch (err) {
            showError('⚠️ ქსელის შეცდომა, სცადეთ თავიდან');
            console.error(err);
        }
    });

    // თუ უკვე შესულია
    (async () => {
        const { data: { user } } = await sb.auth.getUser();
        if (user) window.location.href = 'chat.html';
    })();

    // მოძრავი გულები ✅
    function spawnHearts() {
        const container = document.getElementById('hearts');
        const icons = ['💜', '💜', '🌸', '💜', '💖', '🌷', '💜'];
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = icons[Math.floor(Math.random() * icons.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
            heart.style.animationDuration = (6 + Math.random() * 10) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 14000);
        }, 700);
    }
    spawnHearts();
</script>
</body>
</html>
