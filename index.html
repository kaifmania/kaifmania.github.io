<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaifMania ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#ffecd2,#fcb69f,#ffeaa7,#dfe6e9,#a29bfe,#fd79a8);
  background-size:400% 400%;animation:bgS 12s ease infinite;
  font-family:'Nunito',sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
@keyframes bgS{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.floater{position:fixed;pointer-events:none;z-index:0;animation:flt linear infinite}
@keyframes flt{0%{transform:translateY(105vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}
.card{
  position:relative;z-index:10;width:420px;max-width:95vw;
  background:rgba(255,255,255,0.88);backdrop-filter:blur(28px);
  border-radius:32px;padding:44px 40px 36px;
  box-shadow:0 8px 60px rgba(253,121,168,0.25),0 2px 0 rgba(255,255,255,.9) inset;
  border:1.5px solid rgba(255,255,255,.9);
  animation:pop .7s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pop{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:none}}
.logo{text-align:center;margin-bottom:30px}
.logo-name{
  font-family:'Pacifico',cursive;font-size:2.6rem;
  background:linear-gradient(135deg,#fd79a8,#a29bfe,#fdcb6e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-sub{font-size:.8rem;color:#a29bfe;font-weight:700;letter-spacing:1.5px;margin-top:4px}
.tabs{display:flex;background:rgba(162,155,254,.12);border-radius:14px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:10px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;border-radius:11px;color:#b2bec3;transition:all .25s}
.tab.active{background:#fff;color:#6c5ce7;box-shadow:0 2px 12px rgba(108,92,231,.2)}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:.73rem;font-weight:800;color:#a29bfe;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.fg input{
  width:100%;padding:13px 16px;border-radius:13px;
  border:2px solid rgba(162,155,254,.25);background:rgba(255,255,255,.7);
  font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;color:#2d3436;
  outline:none;transition:all .25s;
}
.fg input:focus{border-color:#a29bfe;background:#fff;box-shadow:0 0 0 4px rgba(162,155,254,.12)}
.fg input::placeholder{color:#b2bec3;font-weight:400}
.btn{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#fd79a8,#a29bfe,#fdcb6e);
  background-size:200%;animation:btnG 4s ease infinite;
  color:#fff;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;margin-top:6px;transition:all .3s;
}
@keyframes btnG{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(162,155,254,.4)}
.msg{font-size:.82rem;text-align:center;margin-top:12px;min-height:18px;font-weight:700}
.msg.err{color:#e17055}.msg.ok{color:#00b894}
.panel{display:none}.panel.active{display:block}
</style>
</head>
<body>
<div id="fc"></div>
<div class="card">
  <div class="logo">
    <div class="logo-name">KaifMania</div>
    <div class="logo-sub">✨ სადაც სიხარული ცხოვრობს ✨</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="sw('login',this)">შესვლა</button>
    <button class="tab" onclick="sw('reg',this)">რეგისტრაცია</button>
  </div>
  <div class="panel active" id="p-login">
    <div class="fg"><label>Email</label><input type="email" id="l-e" placeholder="შენი email…"></div>
    <div class="fg"><label>პაროლი</label><input type="password" id="l-p" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn" onclick="login()">💜 შესვლა</button>
    <div class="msg" id="lm"></div>
  </div>
  <div class="panel" id="p-reg">
    <div class="fg"><label>ნიქნეიმი</label><input type="text" id="r-n" placeholder="შენი სახელი ჩატში…"></div>
    <div class="fg"><label>Email</label><input type="email" id="r-e" placeholder="შენი email…"></div>
    <div class="fg"><label>პაროლი</label><input type="password" id="r-p" placeholder="მინ. 6 სიმბოლო" onkeydown="if(event.key==='Enter')reg()"></div>
    <button class="btn" onclick="reg()">🌸 ანგარიშის შექმნა</button>
    <div class="msg" id="rm"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient('https://brggiyhfzfbmlirqfgpo.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU');
sb.auth.getSession().then(({data:{session}})=>{if(session)location.href='chat.html'});
function sw(t,btn){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));document.getElementById('p-'+t).classList.add('active')}
function m(id,txt,t){const e=document.getElementById(id);e.textContent=txt;e.className='msg '+(t||'')}
async function login(){
  const e=document.getElementById('l-e').value.trim(),p=document.getElementById('l-p').value;
  if(!e||!p)return m('lm','შეავსე ყველა ველი','err');
  m('lm','⏳','');
  const{error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error)return m('lm',error.message,'err');
  m('lm','✓ გამარჯობა! 🎉','ok');
  setTimeout(()=>location.href='chat.html',600);
}
async function reg(){
  const n=document.getElementById('r-n').value.trim(),e=document.getElementById('r-e').value.trim(),p=document.getElementById('r-p').value;
  if(!n||!e||!p)return m('rm','შეავსე ყველა ველი','err');
  if(p.length<6)return m('rm','პაროლი მინ. 6 სიმბოლო','err');
  const{data:ex}=await sb.from('profiles').select('id').eq('username',n).maybeSingle();
  if(ex)return m('rm','სახელი დაკავებულია!','err');
  m('rm','⏳ ვქმნი…','');
  const{data,error}=await sb.auth.signUp({email:e,password:p});
  if(error)return m('rm',error.message,'err');
  if(data.user)await sb.from('profiles').upsert({id:data.user.id,username:n,email:e,role:'member',status_emoji:'😊',theme:'light',accent_color:'#a29bfe',avatar_url:null,created_at:new Date().toISOString()});
  m('rm','🌸 მზადაა! გახსენი email დასადასტურებლად','ok');
}
// floaters
const EM=['❤️','🌸','💜','✨','🌺','💫','🌷','💕','⭐','🌼','🎀','🦋'];
const fc=document.getElementById('fc');
function sp(){const el=document.createElement('div');el.className='floater';el.textContent=EM[Math.floor(Math.random()*EM.length)];el.style.left=Math.random()*100+'vw';el.style.fontSize=(1+Math.random())+'rem';const d=8+Math.random()*12;el.style.animationDuration=d+'s';el.style.animationDelay=Math.random()*3+'s';fc.appendChild(el);setTimeout(()=>el.remove(),(d+4)*1000)}
for(let i=0;i<20;i++)setTimeout(sp,i*250);setInterval(sp,1400);
</script>
</body>
</html>
