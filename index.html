<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background: radial-gradient(circle, #330000 0%, #000 70%); 
            font-family: Arial, sans-serif; 
            color: white;
            overflow: hidden;
        }
        
        header { 
            background: rgba(0, 0, 0, 0.9); 
            padding: 15px; 
            border-bottom: 2px solid red; 
            text-align: center; 
            box-shadow: 0 0 25px red; 
            z-index: 10;
        }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scrollbar-width: thin;
            scrollbar-color: red black;
        }

        /* შეტყობინების დიზაინი */
        .msg { 
            background: rgba(15, 15, 15, 0.95); 
            padding: 12px 18px; 
            border-radius: 15px; 
            border-left: 5px solid red; 
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.5);
            max-width: 80%;
            align-self: flex-start;
        }

        .u-name { 
            color: #ff0000; 
            font-weight: bold; 
            text-decoration: none; 
            display: block;
            margin-bottom: 5px;
            font-size: 15px;
            text-shadow: 0 0 5px red;
        }

        .u-text { font-size: 16px; line-height: 1.4; color: #eee; }

        /* ქვედა საწერი პანელი */
        .input-area { 
            background: #000; 
            padding: 20px; 
            display: flex; 
            gap: 12px; 
            border-top: 2px solid #400;
        }

        input { 
            flex: 1; 
            padding: 15px; 
            border-radius: 25px; 
            border: 1px solid #555; 
            background: #111; 
            color: white; 
            outline: none; 
            font-size: 15px;
        }

        input:focus { border-color: red; box-shadow: 0 0 10px red; }

        button { 
            padding: 0 25px; 
            background: red; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
        }

        button:hover { background: darkred; transform: scale(1.05); }

    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">KAIFMANIA CHAT 🔥</h2>
</header>

<div id="chat-box"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="დაწერე რამე..." autocomplete="off">
    <button onclick="sendMsg()">გაგზავნა</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');

    // თუ არ არის ნიკი, აგდებს შესვლის გვერდზე
    if (!myNick) { window.location.href = "index.html"; }

    async function loadMsgs() {
        const { data } = await _s.from('messages').select('*').order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        
        if (data) {
            data.forEach(m => {
                box.innerHTML += `
                    <div class="msg">
                        <a href="profile.html?user=${m.username}" class="u-name">${m.username}</a>
                        <div class="u-text">${m.text}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const { error } = await _s.from('messages').insert([{ username: myNick, text: text }]);
        if (error) { alert("შეცდომა!"); }
        input.value = '';
    }

    // რეალურ დროში განახლება
    _s.channel('chat_realtime').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadMsgs).subscribe();

    loadMsgs();

    // ენტერზე გაგზავნა
    document.getElementById("msgInput").addEventListener("keyup", (e) => { if (e.key === "Enter") sendMsg(); });
</script>
</body>
</html>
