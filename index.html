<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ ChatVerse — შესვლა</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --surface: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
    --accent: #ff6eb4;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --text: #f0f0ff;
    --text-muted: rgba(240,240,255,0.5);
    --glow: 0 0 30px rgba(255,110,180,0.3);
  }
  * { margin:0;padding:0;box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'Noto Sans Georgian', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Animated background */
  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(167,139,250,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255,110,180,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(52,211,153,0.1) 0%, transparent 50%),
      #0d0d1a;
  }
  /* Floating particles */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    animation: floatUp linear infinite;
    opacity: 0;
    font-size: 20px;
    user-select: none;
  }
  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  /* Auth container */
  .auth-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 440px;
    padding: 20px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    background: linear-gradient(135deg, #ff6eb4, #a78bfa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,110,180,0.5));
  }
  .logo p {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .tabs {
    display: flex;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }
  .tab-btn {
    flex: 1; padding: 10px;
    border: none; background: transparent;
    color: var(--text-muted);
    font-family: 'Noto Sans Georgian', sans-serif;
    font-size: 14px; font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, #ff6eb4, #a78bfa);
    color: white;
    box-shadow: 0 4px 15px rgba(255,110,180,0.4);
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Sans Georgian', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.3s;
  }
  .form-input:focus {
    border-color: var(--accent);
    background: rgba(255,110,180,0.05);
    box-shadow: 0 0 0 3px rgba(255,110,180,0.1);
  }
  .form-input::placeholder { color: var(--text-muted); }
  .avatar-upload {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .avatar-preview {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff6eb4, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    cursor: pointer;
    transition: all 0.3s;
    border: 2px solid rgba(255,255,255,0.1);
    overflow: hidden;
    position: relative;
  }
  .avatar-preview:hover { transform: scale(1.05); box-shadow: var(--glow); }
  .avatar-preview img { width:100%;height:100%;object-fit:cover; }
  .avatar-preview #avatar-file { display:none; }
  .avatar-info { color: var(--text-muted); font-size: 12px; line-height: 1.6; }
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #ff6eb4, #a78bfa);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Noto Sans Georgian', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(255,110,180,0.5);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-primary:hover::after { opacity: 1; }
  .error-msg {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff8080;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .success-msg {
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.3);
    color: #34d399;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .form-tab { display: none; }
  .form-tab.active { display: block; }
  .loading-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 16px;
    transition: opacity 0.5s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 50px; height: 50px;
    border: 3px solid rgba(255,110,180,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div id="particles"></div>

<div class="loading-overlay" id="loading">
  <div style="font-family:'Playfair Display',serif;font-size:36px;background:linear-gradient(135deg,#ff6eb4,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">ChatVerse</div>
  <div class="spinner"></div>
  <div class="loading-text">იტვირთება...</div>
</div>

<div class="auth-wrap">
  <div class="logo">
    <h1>✨ ChatVerse</h1>
    <p>სადაც სიყვარული იწყება</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">შესვლა</button>
      <button class="tab-btn" onclick="switchTab('register')">რეგისტრაცია</button>
    </div>

    <!-- Login -->
    <div class="form-tab active" id="tab-login">
      <div class="form-group">
        <label>ელ-ფოსტა</label>
        <input class="form-input" type="email" id="login-email" placeholder="შეიყვანე ელ-ფოსტა">
      </div>
      <div class="form-group">
        <label>პაროლი</label>
        <input class="form-input" type="password" id="login-pass" placeholder="შეიყვანე პაროლი">
      </div>
      <button class="btn-primary" onclick="doLogin()">✨ შესვლა</button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <!-- Register -->
    <div class="form-tab" id="tab-register">
      <div class="avatar-upload">
        <div class="avatar-preview" onclick="document.getElementById('avatar-file').click()" id="avatarPreview">
          <span id="avatarEmoji">👤</span>
          <img id="avatarImg" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          <input type="file" id="avatar-file" accept="image/*" onchange="previewAvatar(this)">
        </div>
        <div class="avatar-info">
          <strong style="color:var(--text)">ავატარი</strong><br>
          დააჭირე ფოტოს ასარჩევად<br>
          PNG, JPG — მაქს 2MB
        </div>
      </div>
      <div class="form-group">
        <label>ნიქნეიმი</label>
        <input class="form-input" type="text" id="reg-nick" placeholder="შეიყვანე ნიქნეიმი">
      </div>
      <div class="form-group">
        <label>ელ-ფოსტა</label>
        <input class="form-input" type="email" id="reg-email" placeholder="შეიყვანე ელ-ფოსტა">
      </div>
      <div class="form-group">
        <label>პაროლი</label>
        <input class="form-input" type="password" id="reg-pass" placeholder="შეიყვანე პაროლი">
      </div>
      <button class="btn-primary" onclick="doRegister()">🌸 რეგისტრაცია</button>
      <div class="error-msg" id="reg-error"></div>
      <div class="success-msg" id="reg-success"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
// Floating particles
const emojis = ['❤️','🌸','💜','🌺','💕','✨','🌷','💖','🦋','🌹','💫','🌻'];
const container = document.getElementById('particles');
function createParticle() {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (16 + Math.random() * 20) + 'px';
  const dur = 6 + Math.random() * 8;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay = Math.random() * 4 + 's';
  container.appendChild(el);
  setTimeout(() => el.remove(), (dur + 4) * 1000);
}
setInterval(createParticle, 600);
for (let i = 0; i < 10; i++) createParticle();

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
  document.querySelectorAll('.form-tab').forEach(f => f.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

let avatarFile = null;
function previewAvatar(input) {
  if (!input.files[0]) return;
  avatarFile = input.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('avatarEmoji').style.display = 'none';
    const img = document.getElementById('avatarImg');
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(avatarFile);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'შეავსე ყველა ველი'; errEl.style.display = 'block'; return; }
  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    window.location.href = 'pages/chat.html';
  } catch(e) {
    errEl.textContent = 'შეცდომა: ' + (e.message || 'სცადე თავიდან');
    errEl.style.display = 'block';
  }
}

async function doRegister() {
  const nick = document.getElementById('reg-nick').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const errEl = document.getElementById('reg-error');
  const sucEl = document.getElementById('reg-success');
  errEl.style.display = 'none'; sucEl.style.display = 'none';
  if (!nick || !email || !pass) { errEl.textContent = 'შეავსე ყველა ველი'; errEl.style.display='block'; return; }
  if (pass.length < 6) { errEl.textContent = 'პაროლი მინ. 6 სიმბოლო'; errEl.style.display='block'; return; }
  try {
    const { data, error } = await supabase.auth.signUp({ email, password: pass });
    if (error) throw error;
    const userId = data.user.id;
    let avatarUrl = null;
    if (avatarFile) {
      const ext = avatarFile.name.split('.').pop();
      const { data: up, error: ue } = await supabase.storage.from('avatars').upload(`${userId}.${ext}`, avatarFile, { upsert: true });
      if (!ue) {
        const { data: pub } = supabase.storage.from('avatars').getPublicUrl(`${userId}.${ext}`);
        avatarUrl = pub.publicUrl;
      }
    }
    await supabase.from('profiles').insert({ id: userId, username: nick, avatar_url: avatarUrl, role: 'member' });
    sucEl.textContent = '✅ წარმატებით დარეგისტრირდი! შედი ანგარიშში.';
    sucEl.style.display = 'block';
  } catch(e) {
    errEl.textContent = 'შეცდომა: ' + (e.message || 'სცადე თავიდან');
    errEl.style.display = 'block';
  }
}

// Check existing session
(async () => {
  const { data } = await supabase.auth.getSession();
  if (data.session) window.location.href = 'pages/chat.html';
  else document.getElementById('loading').classList.add('hidden');
})();
</script>
</body>
</html>
