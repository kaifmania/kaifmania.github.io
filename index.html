<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - შესვლა</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0e0018 100%);
        }

        /* მოძრავი ფონის ეფექტი */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 40%, rgba(138, 43, 226, 0.15) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(-10%, -10%) rotate(0deg); }
            50% { transform: translate(10%, 10%) rotate(5deg); }
        }

        /* 3D ბარათის კონტეინერი */
        .card-3d {
            perspective: 1500px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        .container {
            background: rgba(20, 5, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 45px 35px;
            width: 100%;
            box-shadow: 
                0 30px 50px rgba(0, 0, 0, 0.5),
                0 0 0 2px rgba(138, 43, 226, 0.3),
                0 0 30px rgba(138, 43, 226, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: float 4s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
        }

        /* ნეონის კიდეები */
        .container:hover {
            box-shadow: 
                0 35px 60px rgba(0, 0, 0, 0.6),
                0 0 0 2px rgba(176, 106, 255, 0.6),
                0 0 40px rgba(176, 106, 255, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .logo {
            text-align: center;
            font-size: 75px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px #b06aff);
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 15px #b06aff); transform: scale(1); }
            50% { filter: drop-shadow(0 0 30px #ff6fff); transform: scale(1.05); }
        }

        h1 {
            color: #fff;
            text-align: center;
            font-size: 32px;
            margin-bottom: 8px;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .sub {
            text-align: center;
            color: #a07cc0;
            margin-bottom: 35px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid rgba(138, 43, 226, 0.5);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            border-color: #b06aff;
            box-shadow: 0 0 20px rgba(176, 106, 255, 0.4);
            background: rgba(0, 0, 0, 0.6);
        }

        input::placeholder {
            color: #7a5a9e;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7b2fbe, #b06aff);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(176, 106, 255, 0.5);
        }

        .switch {
            text-align: center;
            margin-top: 28px;
            color: #c084fc;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .switch:hover {
            color: #ffb86b;
        }

        .switch span {
            color: #ffb86b;
            font-weight: bold;
        }

        .error {
            color: #ff8a8a;
            background: rgba(255, 0, 0, 0.15);
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            display: none;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .success {
            color: #88ee44;
            background: rgba(136, 238, 68, 0.1);
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            display: none;
            border: 1px solid rgba(136, 238, 68, 0.3);
        }

        /* მოძრავი გულები ფონზე */
        .floating-hearts {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 20px;
            opacity: 0.6;
            animation: heartFloat linear infinite;
            color: #b06aff;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 3D ეფექტისთვის მცირე ეკრანებზე */
        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
            }
            .logo {
                font-size: 60px;
            }
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

<div class="floating-hearts" id="hearts"></div>

<div class="card-3d">
    <div class="container" id="authContainer">
        <div class="logo">🔥💜</div>
        <h1>კაიფმანია</h1>
        <div class="sub">შემოგვიერთდი და იკაიფე</div>

        <div id="loginForm">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="📧 ელ. ფოსტა" autocomplete="email">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="🔒 პაროლი" autocomplete="current-password">
            </div>
            <button id="loginBtn">✨ შესვლა ✨</button>
            <div class="switch" id="showRegister">არ გაქვს ანგარიში? <span>📝 რეგისტრაცია</span></div>
        </div>

        <div id="registerForm" style="display: none;">
            <div class="input-group">
                <input type="text" id="regUsername" placeholder="👤 მომხმარებლის სახელი" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="📧 ელ. ფოსტა" autocomplete="email">
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="🔒 პაროლი (მინ 6 სიმბოლო)" autocomplete="new-password">
            </div>
            <button id="registerBtn">🚀 რეგისტრაცია 🚀</button>
            <div class="switch" id="showLogin">უკვე გაქვს ანგარიში? <span>🔑 შესვლა</span></div>
        </div>

        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    
    const sb = createClient(
        "https://gdvjawrplvvldbjpfcgx.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkdmphd3JwbHZ2bGRianBmY2d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzE1NDIsImV4cCI6MjA4OTAwNzU0Mn0.QEySoKfVHF1b4dV5TAH5vgQQKQMAgdETzQm3P9p3H8A"
    );

    // ელემენტები
    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    const showRegisterBtn = document.getElementById('showRegister');
    const showLoginBtn = document.getElementById('showLogin');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        successDiv.style.display = 'none';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 4000);
    }

    function showSuccess(msg) {
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        setTimeout(() => {
            successDiv.style.display = 'none';
        }, 3000);
    }

    // ფორმების გადართვა
    showRegisterBtn.addEventListener('click', () => {
        loginFormDiv.style.display = 'none';
        registerFormDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
    });
    
    showLoginBtn.addEventListener('click', () => {
        registerFormDiv.style.display = 'none';
        loginFormDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
    });

    // შესვლა
    loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showError('📛 გთხოვთ შეიყვანეთ ელ.ფოსტა და პაროლი');
            return;
        }
        
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        
        if (error) {
            showError('❌ ' + error.message);
            return;
        }
        
        showSuccess('✅ წარმატებული შესვლა! გადამისამართება...');
        setTimeout(() => {
            window.location.href = 'chat.html';
        }, 1000);
    });

    // რეგისტრაცია
    registerBtn.addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        
        if (!username || !email || !password) {
            showError('📛 გთხოვთ შეავსოთ ყველა ველი');
            return;
        }
        
        if (password.length < 6) {
            showError('🔒 პაროლი უნდა შეიცავდეს მინიმუმ 6 სიმბოლოს');
            return;
        }
        
        const { data, error } = await sb.auth.signUp({
            email,
            password,
            options: {
                data: { username: username }
            }
        });
        
        if (error) {
            showError('❌ ' + error.message);
            return;
        }
        
        if (data.user) {
            const { error: profileError } = await sb
                .from('profiles')
                .upsert({ id: data.user.id, username: username, role: 'member', emotion: '😊' });
            
            if (profileError) console.error('Profile error:', profileError);
            
            showSuccess('✅ რეგისტრაცია წარმატებულია! გადამისამართება...');
            setTimeout(() => {
                window.location.href = 'chat.html';
            }, 1500);
        }
    });

    // თუ უკვე შესულია, პირდაპირ გადავამისამართოთ
    (async () => {
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            window.location.href = 'chat.html';
        }
    })();

    // 💜 მოძრავი გულები ფონზე
    function spawnHearts() {
        const heartsContainer = document.getElementById('hearts');
        const emojis = ['💜', '💜', '🌸', '💗', '🌺', '💖', '🌷', '💕', '🌸', '💜'];
        
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
            heart.style.animationDuration = (8 + Math.random() * 8) + 's';
            heart.style.opacity = 0.3 + Math.random() * 0.5;
            heartsContainer.appendChild(heart);
            
            setTimeout(() => {
                if (heart && heart.remove) heart.remove();
            }, 15000);
        }, 800);
    }
    
    spawnHearts();
</script>
</body>
</html>
