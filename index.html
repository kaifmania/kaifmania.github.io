<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია · Premium Edition</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            color: white;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        .logo-area {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        h2 {
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-container {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            outline: none;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #e73c7e;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .footer-text span {
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
        }

        /* პატარა დეკორატიული ელემენტები */
        .orb {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
        }
    </style>
</head>
<body>

<div class="orb" style="top: 10%; left: 20%;"></div>
<div class="orb" style="bottom: 10%; right: 20%;"></div>

<div class="glass-card">
    <div class="logo-area">🪐</div>
    <h2>კაიფმანია</h2>
    
    <div class="input-container">
        <input type="email" placeholder="ელ.ფოსტა">
    </div>
    <div class="input-container">
        <input type="password" placeholder="პაროლი">
    </div>
    
    <button>შესვლა</button>
    
    <div class="footer-text">
        არ გაქვს ანგარიში? <span>რეგისტრაცია</span>
    </div>
</div>

</body>
</html>
