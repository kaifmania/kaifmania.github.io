<!DOCTYPE html>

<html lang="ka" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0d0d1a;
  --bg2: #13132b;
  --bg3: #1a1a35;
  --panel: #16162e;
  --border: #2a2a50;
  --accent: #7c5cbf;
  --accent2: #e040fb;
  --accent3: #00e5ff;
  --text: #e8e8ff;
  --text2: #9090c0;
  --online: #00e676;
  --danger: #ff1744;
  --gold: #ffd740;
  --shadow: 0 8px 32px rgba(124,92,191,0.25);
  --radius: 18px;
  --user-color: #7c5cbf;
}
[data-theme="light"] {
  --bg: #f0f0ff;
  --bg2: #e8e8ff;
  --bg3: #ffffff;
  --panel: #f5f5ff;
  --border: #d0d0f0;
  --text: #1a1a3a;
  --text2: #6060a0;
  --shadow: 0 8px 32px rgba(124,92,191,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow:hidden; }

/* FLOATING PARTICLES */
#particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.particle { position:absolute; animation: floatUp linear infinite; opacity:0; font-size:20px; }
@keyframes floatUp {
0% { transform:translateY(100vh) rotate(0deg); opacity:0; }
10% { opacity:0.7; }
90% { opacity:0.5; }
100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
}

/* AUTH */
#auth-screen {
position:fixed; inset:0; z-index:100;
background:radial-gradient(ellipse at 30% 20%, #2a1a5e 0%, #0d0d1a 60%);
display:flex; align-items:center; justify-content:center;
}
.auth-card {
background:rgba(22,22,46,0.95);
border:1px solid var(–border);
border-radius:28px;
padding:48px 40px;
width:420px;
box-shadow:0 0 80px rgba(124,92,191,0.3);
position:relative; z-index:1;
backdrop-filter:blur(20px);
}
.auth-logo { text-align:center; margin-bottom:32px; }
.auth-logo h1 { font-size:2.5rem; font-weight:900; background:linear-gradient(135deg,#7c5cbf,#e040fb,#00e5ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.auth-logo p { color:var(–text2); font-size:.9rem; margin-top:4px; }
.auth-tabs { display:flex; gap:4px; background:var(–bg); border-radius:12px; padding:4px; margin-bottom:28px; }
.auth-tab { flex:1; padding:10px; border:none; border-radius:9px; cursor:pointer; font-family:inherit; font-weight:700; font-size:.9rem; transition:.2s; background:transparent; color:var(–text2); }
.auth-tab.active { background:var(–accent); color:#fff; }
.input-group { margin-bottom:16px; }
.input-group label { display:block; font-size:.8rem; font-weight:700; color:var(–text2); margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
.input-group input {
width:100%; padding:13px 16px; border-radius:12px;
border:1.5px solid var(–border); background:var(–bg2);
color:var(–text); font-family:inherit; font-size:.95rem;
transition:.2s; outline:none;
}
.input-group input:focus { border-color:var(–accent); box-shadow:0 0 0 3px rgba(124,92,191,0.2); }
.btn-primary {
width:100%; padding:14px; border:none; border-radius:14px;
background:linear-gradient(135deg,var(–accent),var(–accent2));
color:#fff; font-family:inherit; font-weight:800; font-size:1rem;
cursor:pointer; transition:.2s; margin-top:8px;
box-shadow:0 4px 20px rgba(124,92,191,0.4);
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(124,92,191,0.5); }
.auth-error { color:#ff6b8a; font-size:.85rem; text-align:center; margin-top:12px; display:none; }

/* LAYOUT */
#app { display:none; height:100vh; flex-direction:column; position:relative; z-index:1; }
.main-layout { display:flex; flex:1; overflow:hidden; }

/* SIDEBAR */
.sidebar {
width:300px; background:var(–panel);
border-right:1px solid var(–border);
display:flex; flex-direction:column;
transition:.3s;
}
.sidebar-header {
padding:20px 16px 12px;
border-bottom:1px solid var(–border);
display:flex; align-items:center; gap:10px;
}
.sidebar-logo { font-size:1.3rem; font-weight:900; background:linear-gradient(135deg,#7c5cbf,#e040fb); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sidebar-actions { margin-left:auto; display:flex; gap:6px; }
.icon-btn {
width:34px; height:34px; border:none; border-radius:9px;
background:var(–bg3); color:var(–text2); cursor:pointer;
display:flex; align-items:center; justify-content:center;
font-size:16px; transition:.2s;
}
.icon-btn:hover { background:var(–accent); color:#fff; }

.sidebar-section { padding:12px 16px 6px; }
.sidebar-section-title { font-size:.7rem; font-weight:800; color:var(–text2); text-transform:uppercase; letter-spacing:.1em; }

.room-list { overflow-y:auto; flex:1; padding:8px; }
.room-item {
display:flex; align-items:center; gap:10px;
padding:10px 12px; border-radius:12px; cursor:pointer;
transition:.2s; margin-bottom:3px; position:relative;
}
.room-item:hover { background:var(–bg3); }
.room-item.active { background:var(–accent); }
.room-item.active .room-name { color:#fff; }
.room-icon { width:36px; height:36px; border-radius:10px; background:var(–bg3); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.room-name { font-weight:700; font-size:.9rem; }
.room-preview { font-size:.75rem; color:var(–text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }
.unread-badge { margin-left:auto; background:var(–accent2); color:#fff; border-radius:10px; padding:1px 7px; font-size:.72rem; font-weight:800; }

/* TOP BAR */
.topbar {
height:60px; background:var(–panel);
border-bottom:1px solid var(–border);
display:flex; align-items:center; padding:0 20px; gap:12px;
}
.topbar-room { font-weight:800; font-size:1.05rem; }
.topbar-info { font-size:.8rem; color:var(–text2); }
.topbar-actions { margin-left:auto; display:flex; gap:6px; }

/* CHAT AREA */
.chat-area { flex:1; display:flex; flex-direction:column; min-width:0; }
.messages {
flex:1; overflow-y:auto; padding:20px;
display:flex; flex-direction:column; gap:4px;
}
.messages::-webkit-scrollbar { width:6px; }
.messages::-webkit-scrollbar-track { background:transparent; }
.messages::-webkit-scrollbar-thumb { background:var(–border); border-radius:3px; }

.msg-group { display:flex; flex-direction:column; gap:2px; }
.msg-row { display:flex; align-items:flex-end; gap:10px; }
.msg-row.own { flex-direction:row-reverse; }
.msg-avatar {
width:34px; height:34px; border-radius:50%; overflow:hidden;
flex-shrink:0; cursor:pointer;
}
.msg-avatar img { width:100%; height:100%; object-fit:cover; }
.msg-avatar-placeholder {
width:34px; height:34px; border-radius:50%;
display:flex; align-items:center; justify-content:center;
font-weight:800; font-size:.9rem; flex-shrink:0; cursor:pointer;
}
.msg-content { max-width:65%; }
.msg-header { display:flex; align-items:center; gap:6px; margin-bottom:3px; padding-left:4px; }
.msg-nick { font-size:.8rem; font-weight:800; }
.msg-role-badge { font-size:.65rem; padding:1px 6px; border-radius:6px; font-weight:800; }
.role-founder { background:linear-gradient(135deg,#ffd740,#ff6d00); color:#000; }
.role-admin { background:linear-gradient(135deg,#7c5cbf,#e040fb); color:#fff; }
.msg-time { font-size:.7rem; color:var(–text2); }
.msg-bubble {
padding:10px 14px; border-radius:18px; font-size:.92rem; line-height:1.5;
position:relative; word-break:break-word;
cursor:pointer; transition:.1s;
}
.msg-bubble:hover { opacity:.92; }
.msg-row:not(.own) .msg-bubble { background:var(–bg3); border-bottom-left-radius:5px; }
.msg-row.own .msg-bubble { background:var(–accent); color:#fff; border-bottom-right-radius:5px; }

.msg-reactions { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.reaction-chip {
background:var(–bg3); border:1px solid var(–border);
border-radius:12px; padding:2px 8px; font-size:.78rem;
cursor:pointer; transition:.2s; user-select:none;
display:flex; align-items:center; gap:3px;
}
.reaction-chip:hover, .reaction-chip.mine { background:var(–accent); border-color:var(–accent); color:#fff; }

.system-msg { text-align:center; font-size:.78rem; color:var(–text2); padding:8px; }

/* INPUT AREA */
.input-area {
padding:16px 20px;
border-top:1px solid var(–border);
background:var(–panel);
}
.input-toolbar { display:flex; gap:6px; margin-bottom:8px; }
.toolbar-btn {
padding:5px 10px; border:1px solid var(–border);
border-radius:8px; background:transparent;
color:var(–text2); cursor:pointer; font-size:.82rem;
font-family:‘Fira Code’,monospace; transition:.2s;
}
.toolbar-btn:hover { background:var(–accent); color:#fff; border-color:var(–accent); }
.input-row { display:flex; gap:10px; align-items:flex-end; }
#msg-input {
flex:1; padding:12px 16px; border-radius:14px;
border:1.5px solid var(–border); background:var(–bg2);
color:var(–text); font-family:inherit; font-size:.95rem;
resize:none; outline:none; max-height:120px; line-height:1.5;
transition:.2s;
}
#msg-input:focus { border-color:var(–accent); }
.send-btn {
width:46px; height:46px; border-radius:12px;
background:linear-gradient(135deg,var(–accent),var(–accent2));
border:none; color:#fff; cursor:pointer; font-size:20px;
display:flex; align-items:center; justify-content:center;
transition:.2s; flex-shrink:0;
}
.send-btn:hover { transform:scale(1.08); }
.emoji-toggle {
width:40px; height:40px; border-radius:11px;
background:var(–bg3); border:1px solid var(–border);
color:var(–text2); cursor:pointer; font-size:20px;
display:flex; align-items:center; justify-content:center; transition:.2s;
}
.emoji-toggle:hover { background:var(–accent); color:#fff; }

/* EMOJI PANEL */
.emoji-panel {
position:absolute; bottom:90px; left:20px;
background:var(–panel); border:1px solid var(–border);
border-radius:18px; padding:12px; width:340px;
box-shadow:var(–shadow); z-index:50; display:none;
}
.emoji-panel.show { display:block; animation:fadeUp .2s; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.emoji-cats { display:flex; gap:4px; margin-bottom:10px; overflow-x:auto; }
.emoji-cat { padding:5px 10px; border-radius:8px; border:none; background:transparent; cursor:pointer; font-size:18px; transition:.2s; }
.emoji-cat.active { background:var(–accent); }
.emoji-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; max-height:200px; overflow-y:auto; }
.emoji-grid span { font-size:22px; cursor:pointer; text-align:center; padding:4px; border-radius:6px; transition:.1s; }
.emoji-grid span:hover { background:var(–bg3); transform:scale(1.2); }
.custom-emoji-row { margin-top:10px; border-top:1px solid var(–border); padding-top:10px; display:flex; gap:6px; flex-wrap:wrap; }
.custom-emoji-item { font-size:28px; cursor:pointer; padding:4px; border-radius:6px; transition:.2s; }
.custom-emoji-item:hover { background:var(–bg3); transform:scale(1.2); }
.custom-emoji-item img { width:32px; height:32px; border-radius:6px; }

/* RIGHT PANEL */
.right-panel {
width:260px; background:var(–panel);
border-left:1px solid var(–border);
display:flex; flex-direction:column;
transition:.3s;
}
.right-panel-tabs { display:flex; border-bottom:1px solid var(–border); }
.rpanel-tab { flex:1; padding:12px; border:none; background:transparent; color:var(–text2); cursor:pointer; font-family:inherit; font-weight:700; font-size:.8rem; transition:.2s; }
.rpanel-tab.active { color:var(–accent); border-bottom:2px solid var(–accent); }
.members-list { overflow-y:auto; flex:1; padding:10px; }
.member-item {
display:flex; align-items:center; gap:9px;
padding:8px 10px; border-radius:11px; cursor:pointer;
transition:.2s; position:relative;
}
.member-item:hover { background:var(–bg3); }
.member-avatar {
width:34px; height:34px; border-radius:50%; overflow:hidden;
position:relative; flex-shrink:0;
}
.member-avatar img { width:100%; height:100%; object-fit:cover; }
.member-avatar-ph { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.85rem; }
.online-dot {
width:10px; height:10px; border-radius:50%; background:var(–online);
position:absolute; bottom:1px; right:1px;
border:2px solid var(–panel);
}
.member-info { flex:1; min-width:0; }
.member-name { font-size:.85rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.member-status { font-size:.72rem; color:var(–text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.member-role { margin-left:auto; font-size:.65rem; }

/* CONTEXT MENU */
.ctx-menu {
position:fixed; background:var(–panel);
border:1px solid var(–border); border-radius:14px;
padding:6px; min-width:180px; z-index:200;
box-shadow:var(–shadow); display:none;
animation:fadeUp .15s;
}
.ctx-menu.show { display:block; }
.ctx-item {
padding:9px 14px; border-radius:9px; cursor:pointer;
font-size:.88rem; font-weight:600; display:flex; align-items:center; gap:8px;
transition:.15s;
}
.ctx-item:hover { background:var(–bg3); }
.ctx-item.danger { color:var(–danger); }
.ctx-item.danger:hover { background:rgba(255,23,68,.1); }
.ctx-sep { height:1px; background:var(–border); margin:4px 0; }

/* REACTION PICKER */
.reaction-picker {
position:fixed; background:var(–panel);
border:1px solid var(–border); border-radius:50px;
padding:8px 12px; z-index:200; display:none;
box-shadow:var(–shadow); gap:6px;
animation:fadeUp .15s;
}
.reaction-picker.show { display:flex; }
.react-emoji { font-size:24px; cursor:pointer; padding:4px; border-radius:8px; transition:.15s; }
.react-emoji:hover { transform:scale(1.3); background:var(–bg3); }

/* MODAL */
.modal-overlay {
position:fixed; inset:0; background:rgba(0,0,0,.6);
z-index:300; display:none; align-items:center; justify-content:center;
backdrop-filter:blur(4px);
}
.modal-overlay.show { display:flex; }
.modal {
background:var(–panel); border:1px solid var(–border);
border-radius:24px; padding:32px; width:480px;
max-width:95vw; box-shadow:var(–shadow);
animation:fadeUp .2s;
}
.modal h2 { font-size:1.3rem; font-weight:800; margin-bottom:20px; }
.modal-actions { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }
.btn-secondary {
padding:10px 20px; border-radius:11px;
border:1px solid var(–border); background:transparent;
color:var(–text); font-family:inherit; font-weight:700;
cursor:pointer; transition:.2s;
}
.btn-secondary:hover { background:var(–bg3); }
.btn-danger {
padding:10px 20px; border-radius:11px;
border:none; background:var(–danger);
color:#fff; font-family:inherit; font-weight:700;
cursor:pointer; transition:.2s;
}

/* PM MODAL */
.pm-modal {
position:fixed; bottom:20px; right:20px;
width:360px; height:480px;
background:var(–panel); border:1px solid var(–border);
border-radius:20px; z-index:150; display:none;
flex-direction:column; box-shadow:var(–shadow);
animation:fadeUp .2s;
}
.pm-modal.show { display:flex; }
.pm-header {
padding:14px 16px; border-bottom:1px solid var(–border);
display:flex; align-items:center; gap:10px;
}
.pm-title { font-weight:800; font-size:.95rem; flex:1; }
.pm-close { width:28px; height:28px; border:none; background:var(–bg3); border-radius:8px; cursor:pointer; color:var(–text2); font-size:16px; display:flex; align-items:center; justify-content:center; }
.pm-messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:6px; }
.pm-msg-row { display:flex; align-items:flex-end; gap:6px; }
.pm-msg-row.own { flex-direction:row-reverse; }
.pm-bubble {
padding:8px 12px; border-radius:14px; font-size:.88rem;
max-width:70%; word-break:break-word; position:relative;
}
.pm-msg-row:not(.own) .pm-bubble { background:var(–bg3); }
.pm-msg-row.own .pm-bubble { background:var(–accent); color:#fff; }
.pm-seen { font-size:.68rem; color:var(–text2); margin-top:2px; text-align:right; }
.pm-input-row { padding:12px; border-top:1px solid var(–border); display:flex; gap:8px; align-items:flex-end; }
.pm-input {
flex:1; padding:9px 12px; border-radius:11px;
border:1px solid var(–border); background:var(–bg2);
color:var(–text); font-family:inherit; font-size:.88rem;
outline:none; resize:none; max-height:80px;
}
.pm-input:focus { border-color:var(–accent); }
.pm-send-btn { width:36px; height:36px; border-radius:10px; background:var(–accent); border:none; color:#fff; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.pm-voice-btn { width:36px; height:36px; border-radius:10px; background:var(–bg3); border:1px solid var(–border); color:var(–text2); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:.2s; }
.pm-voice-btn:hover { background:var(–danger); color:#fff; }
.pm-voice-btn.recording { background:var(–danger); color:#fff; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.pm-indicator {
position:fixed; bottom:20px; right:390px;
background:var(–panel); border:1px solid var(–border);
border-radius:50px; padding:8px 14px;
display:none; align-items:center; gap:8px;
z-index:149; cursor:pointer; box-shadow:var(–shadow);
}
.pm-indicator.show { display:flex; }
.pm-unread-dot { width:8px; height:8px; border-radius:50%; background:var(–accent2); }

/* PROFILE PANEL */
.profile-panel {
position:fixed; right:-320px; top:0; bottom:0;
width:320px; background:var(–panel);
border-left:1px solid var(–border); z-index:100;
transition:.3s; overflow-y:auto; padding:24px;
}
.profile-panel.open { right:0; }
.profile-cover {
height:100px; border-radius:16px; margin-bottom:-30px;
background:linear-gradient(135deg,var(–accent),var(–accent2));
position:relative;
}
.profile-avatar-wrap { display:flex; justify-content:center; margin-bottom:12px; }
.profile-avatar {
width:70px; height:70px; border-radius:50%;
border:4px solid var(–panel); overflow:hidden;
cursor:pointer; position:relative;
}
.profile-avatar img { width:100%; height:100%; object-fit:cover; }
.profile-name { text-align:center; font-size:1.1rem; font-weight:800; }
.profile-status { text-align:center; font-size:.82rem; color:var(–text2); margin-bottom:16px; }
.profile-emotion { text-align:center; font-size:1.5rem; margin-bottom:12px; }
.profile-section { margin-bottom:16px; }
.profile-section-title { font-size:.72rem; font-weight:800; color:var(–text2); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
.album-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; border-radius:10px; overflow:hidden; }
.album-photo { aspect-ratio:1; object-fit:cover; width:100%; cursor:pointer; transition:.2s; }
.album-photo:hover { opacity:.8; }
.add-photo-btn {
aspect-ratio:1; border:2px dashed var(–border);
border-radius:10px; display:flex; flex-direction:column;
align-items:center; justify-content:center;
cursor:pointer; color:var(–text2); font-size:.72rem;
transition:.2s;
}
.add-photo-btn:hover { border-color:var(–accent); color:var(–accent); }

/* USER PANEL */
.user-panel {
padding:12px 16px;
border-top:1px solid var(–border);
display:flex; align-items:center; gap:10px;
}
.user-panel-avatar { width:36px; height:36px; border-radius:50%; overflow:hidden; cursor:pointer; }
.user-panel-avatar img { width:100%; height:100%; object-fit:cover; }
.user-panel-ph { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; cursor:pointer; }
.user-panel-info { flex:1; min-width:0; }
.user-panel-name { font-weight:800; font-size:.88rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-panel-tag { font-size:.72rem; color:var(–text2); }
.user-panel-actions { display:flex; gap:4px; }

/* THEME PICKER */
.theme-panel {
position:fixed; bottom:80px; left:16px;
background:var(–panel); border:1px solid var(–border);
border-radius:16px; padding:14px; z-index:100;
display:none; box-shadow:var(–shadow);
}
.theme-panel.show { display:block; }
.theme-colors { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.color-swatch { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:.2s; }
.color-swatch:hover { transform:scale(1.2); }
.color-swatch.active { border-color:#fff; }
.theme-toggle-row { display:flex; align-items:center; justify-content:space-between; }
.toggle-switch { position:relative; width:40px; height:22px; }
.toggle-switch input { opacity:0; width:0; height:0; }
.toggle-slider {
position:absolute; cursor:pointer; inset:0;
background:var(–border); border-radius:11px; transition:.3s;
}
.toggle-slider::before {

function createMsgEl(msg) {
  const isOwn=msg.user_id===currentUser.id;
  const isAdminOrFounder=(currentProfile.role==='admin'||currentProfile.role==='founder');
  const profile=msg.profiles||{username:'?',role:'member'};

  // Avatar

    avatarHtml=`<div class="msg-avatar" onclick="openProfile('${msg.user_id}')"><img src="${profile.avatar_url}"></div>`;
  } else {
    avatarHtml=`<div class="msg-avatar-placeholder" style="background:${color};color:#fff" onclick="openProfile('${msg.user_id}')">${profile.username[0].toUpperCase()}</div>`;
  }

  let roleBadge='';
  if(profile.role==='founder') roleBadge='<span class="msg-role-badge role-founder">👑</span>';
  else if(profile.role==='admin') roleBadge='<span class="msg-role-badge role-admin">⭐</span>';

  const time=formatTime(msg.created_at);
  let bodyHtml='';
  if(msg.type==='voice'){
    bodyHtml=`<div class="voice-msg"><button class="voice-play" onclick="playVoice('${msg.content}')">▶</button><svg class="voice-wave" viewBox="0 0 100 24"><rect x="5" y="8" width="3" height="8" rx="1.5" fill="var(--accent)"/><rect x="11" y="4" width="3" height="16" rx="1.5" fill="var(--accent)"/><rect x="17" y="6" width="3" height="12" rx="1.5" fill="var(--accent)"/><rect x="23" y="9" width="3" height="6" rx="1.5" fill="var(--accent)"/><rect x="29" y="3" width="3" height="18" rx="1.5" fill="var(--accent)"/><rect x="35" y="7" width="3" height="10" rx="1.5" fill="var(--accent)"/><rect x="41" y="5" width="3" height="14" rx="1.5" fill="var(--accent)"/><rect x="47" y="8" width="3" height="8" rx="1.5" fill="var(--accent)"/><rect x="53" y="2" width="3" height="20" rx="1.5" fill="var(--accent)"/><rect x="59" y="6" width="3" height="12" rx="1.5" fill="var(--accent)"/><rect x="65" y="9" width="3" height="6" rx="1.5" fill="var(--accent)"/><rect x="71" y="4" width="3" height="16" rx="1.5" fill="var(--accent)"/><rect x="77" y="7" width="3" height="10" rx="1.5" fill="var(--accent)"/><rect x="83" y="10" width="3" height="4" rx="1.5" fill="var(--accent)"/><rect x="89" y="8" width="3" height="8" rx="1.5" fill="var(--accent)"/></svg><span class="voice-dur">🎙️</span></div>`;
  } else {
    bodyHtml=`<span style="${msg.style||''}">${escHtml(msg.content||'')}</span>`;
  }

  let reactions=[];
  try{ reactions=JSON.parse(msg.reactions||'[]'); }catch{}
  let reactHtml='<div class="msg-reactions">';
  const grouped={};
  reactions.forEach(r=>{ if(!grouped[r.emoji])grouped[r.emoji]=[]; grouped[r.emoji].push(r.user_id); });
  Object.entries(grouped).forEach(([emoji,users])=>{
    const mine=users.includes(currentUser.id);
    reactHtml+=`<div class="reaction-chip${mine?' mine':''}" onclick="addReactionToMsg('${msg.id}','${emoji}')">${emoji} ${users.length}</div>`;
  });
  reactHtml+='</div>';

  let deleteBtn='';
  if(isAdminOrFounder||isOwn){
    deleteBtn=`<button onclick="deleteMsg('${msg.id}')" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;transition:.2s" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--text2)'">🗑</button>`;
  }

  row.innerHTML=`
    ${isOwn?'':avatarHtml}
    <div class="msg-content">
      ${isOwn?'':`<div class="msg-header">${roleBadge}<span class="msg-nick" style="color:${color}">${escHtml(profile.username)}</span><span class="msg-time">${time}</span>${deleteBtn}</div>`}
      <div class="msg-bubble" oncontextmenu="showReactionPicker(event,'${msg.id}')" onclick="handleBubbleClick(event,'${msg.id}')">
        ${bodyHtml}
      </div>
      ${isOwn?`<div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:2px"><span class="msg-time">${time}</span>${deleteBtn}</div>`:''}
      ${reactHtml}
    </div>
    ${isOwn?avatarHtml:''}
  `;
  return row;
}

function subscribeMessages() {
  msgSubscription=sb.channel('room-'+currentRoom.id)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:`room_id=eq.${currentRoom.id}`},payload=>{
      if(payload.eventType==='INSERT'){
        sb.from('messages').select('*,profiles(username,avatar_url,role)').eq('id',payload.new.id).single().then(({data})=>{
          if(data){messages.push(data); const c=document.getElementById('messages'); c.appendChild(createMsgEl(data)); c.scrollTop=c.scrollHeight;}
        });
      } else if(payload.eventType==='DELETE'){
        messages=messages.filter(m=>m.id!==payload.old.id);
        const el=document.querySelector(`[data-msg-id="${payload.old.id}"]`);
        if(el)el.remove();
      } else if(payload.eventType==='UPDATE'){
        const idx=messages.findIndex(m=>m.id===payload.new.id);
        if(idx>-1){messages[idx]={...messages[idx],...payload.new};}
        sb.from('messages').select('*,profiles(username,avatar_url,role)').eq('id',payload.new.id).single().then(({data})=>{
          if(data){const el=document.querySelector(`[data-msg-id="${data.id}"]`);if(el)el.replaceWith(createMsgEl(data));}
        });
      }
    }).subscribe();
}

async function toggleVoiceRecord(){
  if(!isRecording){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRecorder=new MediaRecorder(stream);
      recordedChunks=[];
      mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
      mediaRecorder.onstop=async()=>{
        const blob=new Blob(recordedChunks,{type:'audio/webm'});
        const reader=new FileReader();
        reader.onloadend=async()=>{
          const base64=reader.result;
          if(pmTarget){
            await sb.from('private_messages').insert({sender_id:currentUser.id,receiver_id:pmTarget.id,content:base64,type:'voice',created_at:new Date().toISOString(),seen:false,reactions:'[]'});
            await loadPMMessages(pmTarget.id);
          }
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      mediaRecorder.start();
      isRecording=true;
      const btn=document.getElementById('pm-voice-btn');
      btn.classList.add('recording'); btn.textContent='⏹️';
    }catch(e){toast('🎙️ მიკროფონი მიუწვდომელია','error');}
  } else {
    mediaRecorder.stop(); isRecording=false;
    const btn=document.getElementById('pm-voice-btn');
    btn.classList.remove('recording'); btn.textContent='🎙️';
  }
}

    addBtn.innerHTML='<input type="file" accept="image/*" style="display:none" onchange="uploadPhoto(event)"><span style="font-size:20px">📷</span><span>დამატება</span>';
    addBtn.onclick=()=>addBtn.querySelector('input').click();
    albumEl.appendChild(addBtn);
  }
  panel.classList.add('open');
}

function closeProfile(){document.getElementById('profile-panel').classList.remove('open');}

async function uploadAvatar(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onloadend=async()=>{
    const base64=reader.result;
    await sb.from('profiles').update({avatar_url:base64}).eq('id',currentUser.id);
    const {data}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
    currentProfile=data; renderUserPanel();
    toast('✅ ავატარი განახლდა','success');
  };
  reader.readAsDataURL(file);
}

async function uploadPhoto(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onloadend=async()=>{
    await sb.from('photos').insert({user_id:currentUser.id,url:reader.result,created_at:new Date().toISOString()});
    openProfile(currentUser.id);
    toast('✅ ფოტო დაემატა','success');
  };
  reader.readAsDataURL(file);
}

function openPMFromProfile(){
  if(viewingProfile) startPM(viewingProfile.id,viewingProfile.username);
  closeProfile();
}

async function sendFriendRequest(){
  if(!viewingProfile)return;
  const {data:ex}=await sb.from('friends').select('*').or(`and(user_id.eq.${currentUser.id},friend_id.eq.${viewingProfile.id}),and(user_id.eq.${viewingProfile.id},friend_id.eq.${currentUser.id})`).single();
  if(ex){toast('უკვე მეგობრები ხართ ან მოთხოვნა გაგზავნილია','error');return;}
  await sb.from('friends').insert({user_id:currentUser.id,friend_id:viewingProfile.id,status:'pending',created_at:new Date().toISOString()});
  toast('✅ მეგობრობის მოთხოვნა გაგზავნილია','success');
}

// FRIENDS
async function openFriendsModal(){
  document.getElementById('friends-modal').classList.add('show');
  loadFriendsList();
}
function closeFriendsModal(){document.getElementById('friends-modal').classList.remove('show');}

async function loadFriendsList(){
  const {data}=await sb.from('friends').select('*,profiles!friends_friend_id_fkey(username,avatar_url)').eq('user_id',currentUser.id).eq('status','accepted');
  friendsList=data||[];
  renderFriendsList();
}

function renderFriendsList(){
  const c=document.getElementById('friends-list-content');
  c.innerHTML='';
  if(!friendsList.length){c.innerHTML='<p style="color:var(--text2);text-align:center">მეგობრები არ გყავს 😢</p>';return;}
  friendsList.forEach(f=>{
    const m=f.profiles||{username:'?'};
    const color=getColor(m.username);
    const el=document.createElement('div');
    el.className='user-manage-row';
    el.innerHTML=`<div style="width:32px;height:32px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800">${m.username[0]?.toUpperCase()}</div><span class="umr-name">${escHtml(m.username)}</span><div class="umr-actions"><button class="umr-btn" onclick="startPM('${f.friend_id}','${escHtml(m.username)}')">💬</button><button class="umr-btn block" onclick="removeFriend('${f.id}')">❌</button></div>`;
    c.appendChild(el);
  });
}

function switchFriendsTab(tab){
  document.querySelectorAll('#friends-modal .auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='list'?0:1)));
  if(tab==='list') loadFriendsList();
  else loadFriendRequests();
}

async function loadFriendRequests(){
  const {data}=await sb.from('friends').select('*,profiles!friends_user_id_fkey(username)').eq('friend_id',currentUser.id).eq('status','pending');
  const c=document.getElementById('friends-list-content'); c.innerHTML='';
  if(!data?.length){c.innerHTML='<p style="color:var(--text2);text-align:center">მოთხოვნები არ არის</p>';return;}
  data.forEach(req=>{
    const m=req.profiles||{username:'?'};
    const el=document.createElement('div');
    el.className='user-manage-row';
    el.innerHTML=`<span class="umr-name">${escHtml(m.username)}</span><div class="umr-actions"><button class="umr-btn admin" onclick="acceptFriend('${req.id}')">✅</button><button class="umr-btn block" onclick="declineFriend('${req.id}')">❌</button></div>`;
    c.appendChild(el);
  });
}

async function acceptFriend(id){await sb.from('friends').update({status:'accepted'}).eq('id',id);loadFriendRequests();toast('✅ მეგობრობა მიღებულია','success');}
async function declineFriend(id){await sb.from('friends').delete().eq('id',id);loadFriendRequests();}
async function removeFriend(id){await sb.from('friends').delete().eq('id',id);loadFriendsList();toast('❌ მეგობარი წაიშალა','success');}

// STATUS
function openStatusModal(){document.getElementById('status-modal').classList.add('show');}
function closeStatusModal(){document.getElementById('status-modal').classList.remove('show');}

function renderStatusEmotions(){
  const c=document.getElementById('status-emotions'); c.innerHTML='';
  STATUS_EMOTIONS.forEach(e=>{
    const el=document.createElement('span');
    el.className='status-emotion'+(selectedEmotion===e?' selected':'');
    el.textContent=e;
    el.onclick=()=>{selectedEmotion=e; renderStatusEmotions();};
    c.appendChild(el);
  });
}

async function saveStatus(){
  const text=document.getElementById('status-text-input').value;
  await sb.from('profiles').update({status_text:text,emotion:selectedEmotion}).eq('id',currentUser.id);
  const {data}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  currentProfile=data;
  closeStatusModal(); toast('✅ სტატუსი განახლდა','success');
  renderUserPanel();
}

// ADMIN
async function openAdminPanel(){
  document.getElementById('admin-modal').classList.add('show');
  document.getElementById('founder-section').style.display=currentProfile.role==='founder'?'block':'none';
  await loadAdminUsers();
  await loadAdminCustomEmojis();
}
function closeAdminPanel(){document.getElementById('admin-modal').classList.remove('show');}

async function loadAdminUsers(){
  const {data}=await sb.from('profiles').select('*').neq('id',currentUser.id).limit(50);
  const c=document.getElementById('admin-users-list'); c.innerHTML='';
  (data||[]).forEach(u=>{
    const el=document.createElement('div');
    el.className='user-manage-row';
    const roleBadge=u.role==='founder'?'👑':u.role==='admin'?'⭐':u.role==='banned'?'🚫':'👤';
    el.innerHTML=`<span class="umr-name">${roleBadge} ${escHtml(u.username)}</span><div class="umr-actions">`;
    if(currentProfile.role==='founder'){
      el.innerHTML+=`<button class="umr-btn founder" onclick="setRole('${u.id}','founder')">👑</button>`;
    }
    el.innerHTML+=`<button class="umr-btn admin" onclick="setRole('${u.id}','admin')">⭐ ადმინი</button><button class="umr-btn remove-role" onclick="setRole('${u.id}','member')">🔓 მოხსნა</button><button class="umr-btn block" onclick="banUser('${u.id}')">🚫</button></div>`;
    c.appendChild(el);
  });
}

async function loadAdminCustomEmojis(){
  const c=document.getElementById('admin-custom-emojis'); if(!c)return;
  c.innerHTML='';
  customEmojis.forEach((e,i)=>{
    const el=document.createElement('div');
    el.style.cssText='display:flex;align-items:center;gap:4px;background:var(--bg2);border-radius:8px;padding:4px 8px;';
    el.innerHTML=e.startsWith('http')?`<img src="${e}" style="width:28px;height:28px;border-radius:4px">`:`<span style="font-size:24px">${e}</span>`;
    el.innerHTML+=`<button onclick="removeCustomEmoji(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer">✕</button>`;
    c.appendChild(el);
  });
}

async function addCustomEmoji(){
  const val=document.getElementById('custom-emoji-input').value.trim();
  if(!val)return;
  customEmojis.push(val);
  await sb.from('settings').upsert({key:'custom_emojis',value:JSON.stringify(customEmojis)});
  document.getElementById('custom-emoji-input').value='';
  renderCustomEmojis();
  loadAdminCustomEmojis();
  toast('✅ სმაილი დაემატა','success');
}

async function removeCustomEmoji(idx){
  customEmojis.splice(idx,1);
  await sb.from('settings').upsert({key:'custom_emojis',value:JSON.stringify(customEmojis)});
  renderCustomEmojis(); loadAdminCustomEmojis();
}

async function loadCustomEmojis(){
  const {data}=await sb.from('settings').select('value').eq('key','custom_emojis').single();
  if(data){try{customEmojis=JSON.parse(data.value)||[];}catch{}}
  renderCustomEmojis();
}

function renderCustomEmojis(){
  const c=document.getElementById('custom-emojis-row'); if(!c)return;
  c.innerHTML='';
  customEmojis.forEach(e=>{
    const el=document.createElement('div');
    el.className='custom-emoji-item';
    el.innerHTML=e.startsWith('http')?`<img src="${e}">`:`<span>${e}</span>`;
    el.onclick=()=>insertEmoji(e);
    c.appendChild(el);
  });
}

// EMOJI PANEL
function initEmojiPanel(){
  const cats=document.getElementById('emoji-cats');
  cats.innerHTML='';
  EMOJI_CATS.forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='emoji-cat'+(i===0?' active':'');
    btn.textContent=cat.label;
    btn.onclick=()=>{currentEmojiCat=i;renderEmojiGrid();document.querySelectorAll('.emoji-cat').forEach((c,j)=>c.classList.toggle('active',j===i));};
    cats.appendChild(btn);
  });
  renderEmojiGrid();
}

function renderEmojiGrid(){
  const grid=document.getElementById('emoji-grid'); grid.innerHTML='';
  const emojis=[...EMOJI_CATS[currentEmojiCat].emojis];
  emojis.forEach(e=>{
    const el=document.createElement('span'); el.textContent=e;
    el.onclick=()=>insertEmoji(e);
    grid.appendChild(el);
  });
}

function toggleEmoji(){document.getElementById('emoji-panel').classList.toggle('show');}

function insertEmoji(emoji){
  const input=document.getElementById('msg-input');
  const pos=input.selectionStart||input.value.length;
  input.value=input.value.slice(0,pos)+emoji+input.value.slice(pos);
  input.focus();
  document.getElementById('emoji-panel').classList.remove('show');
}

// TEXT FORMATTING
let currentTextStyle='';
function applyFormat(type){
  const input=document.getElementById('msg-input');
  const start=input.selectionStart, end=input.selectionEnd;
  const selected=input.value.slice(start,end);
  if(!selected){
    switch(type){
      case 'bold': currentTextStyle+='font-weight:800;'; break;
      case 'italic': currentTextStyle+='font-style:italic;'; break;
      case 'underline': currentTextStyle+='text-decoration:underline;'; break;
      case 'strikethrough': currentTextStyle+='text-decoration:line-through;'; break;
    }
    toast('✅ ფორმატი მიმდინარე ტექსტზე გამოვა','success');
    return;
  }
}

function pickTextColor(){document.getElementById('text-color-input').click();}
function setTextColor(color){currentTextStyle+=`color:${color};`;toast('🎨 ფერი დაყენებულია','success');}

// THEME
function initThemePanel(){
  const c=document.getElementById('theme-colors'); c.innerHTML='';
  THEME_COLORS.forEach((t,i)=>{
    const el=document.createElement('div');
    el.className='color-swatch'+(i===0?' active':'');
    el.style.background=`linear-gradient(135deg,${t.accent},${t.accent2})`;
    el.title=t.name;
    el.onclick=()=>{applyTheme(t);document.querySelectorAll('.color-swatch').forEach((s,j)=>s.classList.toggle('active',j===i));};
    c.appendChild(el);
  });
}

function applyTheme(t){
  const r=document.documentElement.style;
  r.setProperty('--accent',t.accent);
  r.setProperty('--accent2',t.accent2);
  r.setProperty('--accent3',t.accent3);
}

function toggleThemePanel(){document.getElementById('theme-panel').classList.toggle('show');}
function toggleDarkMode(isDark){document.documentElement.setAttribute('data-theme',isDark?'dark':'light');}

// RIGHT PANEL
function toggleRightPanel(){
  const p=document.getElementById('right-panel');
  p.style.display=p.style.display==='none'?'flex':'none';
}

function switchRPanel(tab){
  document.querySelectorAll('.rpanel-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='members'?0:1)));
  if(tab==='members') renderMembers();
  else {
    const c=document.getElementById('members-list');
    c.innerHTML='';
    loadFriendsInPanel();
  }
}

async function loadFriendsInPanel(){
  const {data}=await sb.from('friends').select('*,profiles!friends_friend_id_fkey(id,username,avatar_url,status_text)').eq('user_id',currentUser.id).eq('status','accepted');
  const c=document.getElementById('members-list'); c.innerHTML='';
  (data||[]).forEach(f=>{
    const m=f.profiles||{username:'?',id:''};
    const color=getColor(m.username);
    const el=document.createElement('div');
    el.className='member-item';
    el.innerHTML=`<div style="position:relative;flex-shrink:0"><div style="width:34px;height:34px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800">${m.username[0]?.toUpperCase()}</div><div class="online-dot"></div></div><div class="member-info"><div class="member-name">${escHtml(m.username)}</div><div class="member-status">${escHtml(m.status_text||'')}</div></div>`;
    el.onclick=()=>startPM(m.id,m.username);
    c.appendChild(el);
  });
}

// PM INDICATOR
function openPMIndicator(){
  if(pmTarget) document.getElementById('pm-modal').classList.add('show');
}

// HELPERS
function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getColor(str){const colors=['#7c5cbf','#e040fb','#00e5ff','#ff6d00','#00e676','#ffd740','#ff1744','#00bcd4','#8bc34a','#ff5722'];let h=0;for(let i=0;i<str.length;i++)h=str.charCodeAt(i)+((h<<5)-h);return colors[Math.abs(h)%colors.length];}
function adjustColor(c){return c.replace(/[0-9a-f]{2}/gi,h=>Math.min(255,parseInt(h,16)+30).toString(16).padStart(2,'0'));}
function formatTime(iso){const d=new Date(iso);return d.toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

function toast(msg,type=''){
  const c=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast '+(type||'');
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},3000);
}

// Close panels on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.emoji-panel')&&!e.target.closest('.emoji-toggle')) document.getElementById('emoji-panel').classList.remove('show');
  if(!e.target.closest('.theme-panel')&&!e.target.closest('[onclick*="toggleThemePanel"]')) document.getElementById('theme-panel').classList.remove('show');
});

// Init
initParticles();
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user) await initApp(session.user);
})();
</script>
