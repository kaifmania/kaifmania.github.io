<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaifmania</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* 3D მინის ბარათი */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 0, 127, 0.4);
            width: 320px;
            text-align: center;
            transform: rotateY(-10deg) rotateX(5deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255, 0, 127, 0.2);
        }

        h1 {
            color: #ff007f;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #ff007f;
            margin-bottom: 30px;
            font-size: 24px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #333;
            background: rgba(0,0,0,0.5);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #ff007f;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px #ff007f;
        }

        /* მცურავი გულები */
        .heart {
            position: fixed;
            top: 100%;
            animation: fly 6s linear infinite;
            pointer-events: none;
            opacity: 0.8;
        }

        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>KAIFMANIA</h1>
        <input type="email" id="email" placeholder="ელ-ფოსტა">
        <input type="password" id="pass" placeholder="პაროლი">
        <button onclick="auth()">შესვლა / რეგისტრაცია</button>
    </div>

    <script>
        const SB_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function auth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const { error } = await sb.auth.signUp({ email, password });
            if(error) alert(error.message); else alert("შემოწმდე მეილი!");
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = ['❤️', '🌸'][Math.floor(Math.random()*2)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 20 + 10) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }, 500);
    </script>
</body>
</html>
