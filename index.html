<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIFMANIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            overflow: hidden;
            perspective: 1200px; /* 3D-სთვის */
        }

        /* 3D ბარათი */
        .card {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
            border: 2px solid #f00;
            box-shadow: 0 0 20px #f00;
            /* ძლიერი დახრა */
            transform: rotateY(-20deg) rotateX(10deg);
            transition: 0.5s;
        }

        .card:hover { transform: rotate(0deg) scale(1.05); }

        h1 { color: #fff; text-shadow: 0 0 10px #f00; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: #fff;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #f00;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        /* მოძრავი გულები */
        .heart {
            position: fixed;
            top: 100%;
            animation: move 6s linear infinite;
            color: #f00;
            pointer-events: none;
        }

        @keyframes move {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>კაიფმანია 😎</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="auth()">შესვლა / რეგისტრაცია</button>
    </div>

    <script>
        const SB_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function auth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const { error } = await sb.auth.signUp({ email, password });
            if(error) alert(error.message); else alert("შესრულდა!");
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerText = '❤️';
            h.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }, 500);
    </script>
</body>
</html>
