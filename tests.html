<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ფსიქო ტესტები · კაიფმანია</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0b1a;--panel:#120f24;--panel2:#1a1730;--border:rgba(160,80,255,0.35);--text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;--input-bg:#221f3a;--indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.18);--glow:rgba(168,85,247,0.28);--accent:#f07aff}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes resultReveal{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(90px) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.back-btn{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;width:38px;height:38px;color:var(--text2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;text-decoration:none;line-height:1}
.back-btn:hover{background:var(--border);color:var(--text)}
.header-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--text);letter-spacing:.5px}
.header-sub{font-size:11px;color:var(--text3);margin-left:auto;background:var(--indigo-f);border:1px solid var(--border);padding:3px 10px;border-radius:20px}
.container{max-width:680px;margin:0 auto;padding:24px 16px}
#homeScreen{animation:fadeIn .4s ease}
.hero{text-align:center;padding:32px 0 24px}
.hero-icon{font-size:64px;display:block;animation:float 3.5s ease-in-out infinite;filter:drop-shadow(0 0 24px var(--glow))}
.hero-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:var(--text);margin-top:14px}
.hero-sub{font-size:13px;color:var(--text3);margin-top:8px}
.tests-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:20px}
.test-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;animation:fadeIn .4s ease both}
.test-card:hover{transform:translateY(-4px);border-color:var(--indigo2);box-shadow:0 12px 40px rgba(120,30,200,.35)}
.test-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--indigo-f),transparent);pointer-events:none}
.test-card-emoji{font-size:36px;display:block;margin-bottom:12px}
.test-card-title{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px}
.test-card-desc{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:12px}
.test-card-meta{display:flex;align-items:center;gap:8px}
.test-card-count{font-size:10px;color:var(--text2);background:var(--indigo-f);border:1px solid var(--border);padding:3px 10px;border-radius:12px;font-family:'Unbounded',sans-serif}
.test-card-tag{font-size:10px;padding:3px 10px;border-radius:12px;font-family:'Unbounded',sans-serif;font-weight:700}
.tag-fun{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.tag-serious{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.25)}
.tag-love{background:rgba(255,80,120,.12);color:#ff5080;border:1px solid rgba(255,80,120,.25)}
.tag-iq{background:rgba(0,200,200,.12);color:#00c8c8;border:1px solid rgba(0,200,200,.25)}
.tag-social{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
#testScreen{display:none;animation:slideUp .35s ease}
.test-top{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.test-exit-btn{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;padding:7px 14px;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;transition:all .2s;white-space:nowrap}
.test-exit-btn:hover{background:rgba(220,0,0,.12);border-color:rgba(220,0,0,.3);color:#ff7777}
.test-title-bar{flex:1;min-width:0}
.test-title-bar h2{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-wrap{margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:6px;font-family:'Unbounded',sans-serif;letter-spacing:.5px}
.progress-bar-bg{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--indigo),var(--accent));border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.question-card{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:28px 24px;margin-bottom:18px;position:relative;overflow:hidden;animation:fadeIn .3s ease}
.question-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--indigo-f),transparent);pointer-events:none}
.q-num{font-size:10px;color:var(--text3);font-family:'Unbounded',sans-serif;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.q-text{font-size:15px;color:var(--text);line-height:1.6;font-weight:500}
.options-list{display:flex;flex-direction:column;gap:10px}
.option-btn{background:var(--panel2);border:1.5px solid var(--border);border-radius:14px;padding:13px 18px;color:var(--text);font-size:13px;font-family:'Noto Sans Georgian',sans-serif;text-align:left;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;line-height:1.45;width:100%}
.option-btn:hover{border-color:var(--indigo2);background:var(--indigo-f);transform:translateX(4px)}
.option-btn.selected{border-color:var(--accent);background:rgba(168,85,247,.18);color:var(--text)}
.option-icon{width:28px;height:28px;border-radius:50%;background:var(--indigo-f);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:var(--text3);font-weight:700;font-family:'Unbounded',sans-serif}
.option-btn.selected .option-icon{background:var(--indigo);color:#fff;border-color:var(--indigo2)}
.nav-btns{display:flex;gap:10px;margin-top:20px}
.nav-btn{flex:1;padding:12px;border-radius:14px;border:1px solid var(--border);font-family:'Noto Sans Georgian',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;font-weight:600}
.nav-btn-prev{background:var(--indigo-f);color:var(--text2)}
.nav-btn-prev:hover{background:var(--border);color:var(--text)}
.nav-btn-next{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;border-color:var(--indigo2);box-shadow:0 4px 18px rgba(120,30,200,.4)}
.nav-btn-next:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(120,30,200,.55)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#resultScreen{display:none;animation:resultReveal .5s cubic-bezier(.34,1.3,.64,1)}
.result-wrap{background:var(--panel);border:1px solid var(--border);border-radius:28px;padding:32px 24px;text-align:center;position:relative;overflow:hidden}
.result-wrap::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--indigo-f),transparent,rgba(168,85,247,.08));pointer-events:none}
.result-emoji{font-size:72px;display:block;margin-bottom:16px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 30px var(--glow))}
.result-type{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;color:var(--accent);margin-bottom:8px;text-shadow:0 0 20px var(--glow)}
.result-score-row{display:flex;justify-content:center;gap:12px;margin:16px 0;flex-wrap:wrap}
.score-pill{background:var(--indigo-f);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-family:'Unbounded',sans-serif;font-size:12px;color:var(--text2)}
.score-pill strong{color:var(--accent);font-size:15px;display:block}
.result-desc{font-size:14px;color:var(--text2);line-height:1.7;margin:16px 0;text-align:left;background:var(--panel2);border:1px solid var(--border);border-radius:16px;padding:18px}
.result-traits{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0}
.trait-chip{padding:6px 14px;border-radius:20px;font-size:12px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2)}
.score-bars{margin:16px 0;text-align:left}
.score-bar-row{margin-bottom:10px}
.score-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px}
.score-bar-bg{height:8px;background:var(--panel2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.score-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.result-actions{display:flex;gap:10px;margin-top:20px}
.res-btn{flex:1;padding:12px;border-radius:14px;font-family:'Noto Sans Georgian',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;border:1px solid var(--border);font-weight:600}
.res-btn-home{background:var(--indigo-f);color:var(--text2)}
.res-btn-home:hover{background:var(--border);color:var(--text)}
.res-btn-share{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;border-color:var(--indigo2);box-shadow:0 4px 16px rgba(120,30,200,.4)}
.res-btn-share:hover{transform:translateY(-2px)}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:confetti 1.3s ease forwards;pointer-events:none;z-index:9999}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--panel2)}
::-webkit-scrollbar-thumb{background:var(--indigo2);border-radius:2px}
</style>
</head>
<body>
<div class="header">
  <a href="javascript:history.back()" class="back-btn">‹</a>
  <div class="header-title">🧠 ფსიქო ტესტები</div>
  <div class="header-sub" id="headerSub">10 ტესტი</div>
</div>
<div class="container">
  <div id="homeScreen">
    <div class="hero">
      <span class="hero-icon">🧬</span>
      <div class="hero-title">გაიცანი საკუთარი თავი</div>
      <div class="hero-sub">10 ფსიქოლოგიური ტესტი · სრული შედეგები და ქულები</div>
    </div>
    <div class="tests-grid" id="testsGrid"></div>
  </div>
  <div id="testScreen">
    <div class="test-top">
      <button class="test-exit-btn" onclick="exitTest()">← გამოსვლა</button>
      <div class="test-title-bar"><h2 id="testTitleBar">ტესტი</h2></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span id="progressLabel">კ. 1 / 10</span><span id="progressPct">0%</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div class="q-num" id="qNum">კ. 01</div>
      <div class="q-text" id="qText">-</div>
    </div>
    <div class="options-list" id="optionsList"></div>
    <div class="nav-btns">
      <button class="nav-btn nav-btn-prev" id="prevBtn" onclick="prevQ()">← წინა</button>
      <button class="nav-btn nav-btn-next" id="nextBtn" onclick="nextQ()">შემდეგი →</button>
    </div>
  </div>
  <div id="resultScreen">
    <div class="result-wrap">
      <span class="result-emoji" id="resEmoji">🧠</span>
      <div class="result-type" id="resType">-</div>
      <div class="result-score-row" id="resScoreRow"></div>
      <div class="result-desc" id="resDesc">-</div>
      <div class="result-traits" id="resTraits"></div>
      <div class="score-bars" id="scoreBars"></div>
    </div>
    <div class="result-actions">
      <button class="res-btn res-btn-home" onclick="showHome()">🏠 ტესტები</button>
      <button class="res-btn res-btn-share" onclick="shareResult()">✨ გაზიარება</button>
    </div>
  </div>
</div>
<script>
const TESTS=[
{id:1,emoji:'🧠',title:'ინტელექტის ტიპი',desc:'განსაზღვრე — ლოგიკური, კრეატიული, ემოციური თუ კინეტიკური?',tag:'iq',tagLabel:'IQ',
questions:[
{q:'ახალ ინფორმაციას როგორ სწავლობ ყველაზე კარგად?',opts:['ვკითხულობ და ვაკეთებ ჩანიშვნებს','ვუსმენ ახსნა-განმარტებას','ვხედავ სქემებს ან ვიდეოს','ვაკეთებ ხელებით, ვცდი']},
{q:'ბავშვობაში ყველაზე საყვარელი საქმიანობა?',opts:['წიგნების კითხვა','მუსიკა ან სიმღერა','ხატვა ან ქანდაკება','სპორტი ან ცეკვა']},
{q:'მათემატიკური ამოცანა — შენი დამოკიდებულება?',opts:['ძალიან მიყვარს — ლოგიკა სახალისოა','არარ, ვარ სხვა სახის ნიჭიერ','ვხვდები თუ ვიზუალური ახსნაა','ნახევრად — მოდელის ამოხსნა მიყვარს']},
{q:'ყველაზე ადვილად გახსოვდება?',opts:['სიტყვები, ციტატები, ტექსტი','სიმღერები და ბგერების თანმიმდევ.','სურათები, ფერები, ადგილები','შეგრძნება ან მოძრაობა']},
{q:'სადაა ყველაზე კომფ. გარემო?',opts:['ბიბლიოთეკა ან კვლევის ოთახი','კონცერტი ან სტუდია','გალერეა ან ატელიე','სპ.დარბაზი ან ბუნება']},
{q:'ფიქრის სტილი?',opts:['ლოგიკური და სისტემური','ინტუიტიური — "ვგრძნობ რომ..."','ვიზუალური — ვხედავ სურათებს','ფიზიკური — ვინძრები']},
{q:'სხვებს ახალ რამეს როგორ ხსნი?',opts:['სიტყვებით, ეტაპობრივად','ისტ.ან.მეტ.ჰ','ვხატავ ან სქემას ვაკეთებ','ვაჩვენებ სხეულით']},
{q:'პრობლემის გადაჭრის ყველ.ეფ.მ?',opts:['ანალ.— ყ.ვ.გ.ვ.','ინტ.— ვ.გ.','კრ.— ახ.ვ.','ექ.— ვ.ვ.']},
{q:'ყველ.სი.სფ?',opts:['მეც.ანა.','მუს.ხელ.','ხ.ფ.','ბ.სი.']},
{q:'შ.ყ.ძ.მ?',opts:['ა.ლ.','ემ.ინ.','ფ.კ.','ფ.ენ.']},
],
calcResult(a){
const c={A:0,B:0,C:0,D:0};a.forEach(x=>{if(x!==null)c[['A','B','C','D'][x]]++;});
const max=Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
const m={
A:{type:'ლინგვისტურ-ლოგიკური',emoji:'📐',desc:'ანალიტიკური გონება — ეს შენი ძალაა. ლოგიკური პრობლემები, ციფრები, სტრუქტ.ა.გ.ი. ხშ.მ.კ.ი.მ.ჩ.',traits:['ანალ.','სის.','ზ.','კ.'],bars:[{l:'ლოგ.',v:95,c:'#00c8c8'},{l:'ლინგ.',v:82,c:'#a855f7'},{l:'ვიზ.',v:58,c:'#fbbf24'},{l:'კინ.',v:42,c:'#4ade80'}]},
B:{type:'მუსიკალური-ინტუიტიური',emoji:'🎵',desc:'ინტ.ემ.ინ.ა.გ. მ.ემ.ადამ.გ. — ეს შ.ძ.',traits:['ინ.','ემ.','კ.','მ.'],bars:[{l:'ინტ.',v:95,c:'#f07aff'},{l:'ემ.',v:88,c:'#ff5080'},{l:'ლ.',v:55,c:'#00c8c8'},{l:'ვ.',v:70,c:'#fbbf24'}]},
C:{type:'ვიზუალურ-სივრ.',emoji:'🎨',desc:'გ.ხ.ს. სივ.წ. ფ.ფ. — ხ.დ.ბ.გ.',traits:['ვ.','კ.','სივ.','მხ.'],bars:[{l:'ვ.',v:98,c:'#fbbf24'},{l:'კ.',v:85,c:'#f07aff'},{l:'ლ.',v:65,c:'#00c8c8'},{l:'ინ.',v:70,c:'#a855f7'}]},
D:{type:'სხ.-კინ.',emoji:'⚡',desc:'ს.ე.ყ.ახ. სპ.ც.ხ. — ფ.გ.ყ.ძ.ს.',traits:['ენ.','ც.','პ.','მ.'],bars:[{l:'კ.',v:97,c:'#4ade80'},{l:'ენ.',v:90,c:'#fbbf24'},{l:'ლ.',v:60,c:'#00c8c8'},{l:'ვ.',v:72,c:'#f07aff'}]},
};
return{...m[max],score:Math.max(...Object.values(c))*10};
}},

{id:2,emoji:'💜',title:'სიყვარულის ენა',desc:'5 სიყვარულის ენა — გაიგე შენი პრიმარული ენა',tag:'love',tagLabel:'სიყ.',
questions:[
{q:'მიჯნური/ახლობელი — ყველ.გ. — რ.გ.?',opts:['სიტ.კ. "ძალ.კ.ხ."','ერთ.გ.დ.ყ.ყ.ყ.','საჩ. — გ.ყ.ნ.','დ. ან ზ.ახ.']},
{q:'ყ.ტ.ავ.ც.?',opts:['კ.ით.','ა.არ.ი.','ა.ი.','არ.დ.']},
{q:'სიყ.გ. — შ.ბ.?',opts:['"ვ.ყ." ხ.','მ.ვ. ყ.','ვ.ყ.ი.სი.','ვ.ყ.ყ.']},
{q:'ყ.ლ.მ?',opts:['"ს.ჩ.ყ.ყ."','ჩ.ვ.ე.','ა.ა.ჩ.ფ.','ა.ყ.ჩ.ზ.']},
{q:'ბ.ს.ა.მ?',opts:['ს.პ.','ე.ყ.','პ.სი.','ქ.ზ.']},
{q:'ა.ტ. — ი.?',opts:['ვ.სა.ვ.ლ.','მ.დ.ტ.','ჩ.სა.ი.','ჩ.პ.ე.']},
{q:'პ.ყ.ძ?',opts:['ს.სი.','ყ.ყ.','მ.კ.ნ.','პ.სი.']},

let currentTest=null,currentQ=0,answers=[];

function buildHome(){
const grid=document.getElementById('testsGrid');grid.innerHTML='';
const tm={fun:'tag-fun',serious:'tag-serious',love:'tag-love',iq:'tag-iq',social:'tag-social'};
TESTS.forEach((t,i)=>{
const c=document.createElement('div');c.className='test-card';c.style.animationDelay=(i*.06)+'s';
c.innerHTML=`<span class="test-card-emoji">${t.emoji}</span><div class="test-card-title">${t.title}</div><div class="test-card-desc">${t.desc}</div><div class="test-card-meta"><span class="test-card-count">${t.questions.length} კ.</span><span class="test-card-tag ${tm[t.tag]||'tag-fun'}">${t.tagLabel}</span></div>`;
c.onclick=()=>startTest(t);grid.appendChild(c);
});
}

function startTest(t){
currentTest=t;currentQ=0;answers=new Array(t.questions.length).fill(null);
document.getElementById('testTitleBar').textContent=t.emoji+' '+t.title;
document.getElementById('homeScreen').style.display='none';
document.getElementById('resultScreen').style.display='none';
document.getElementById('testScreen').style.display='block';
renderQ();
}

function renderQ(){
const q=currentTest.questions[currentQ];
const tot=currentTest.questions.length;
const pct=Math.round(currentQ/tot*100);
document.getElementById('progressLabel').textContent='კ.'+(currentQ+1)+' / '+tot;
document.getElementById('progressPct').textContent=pct+'%';
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('qNum').textContent='კ. '+String(currentQ+1).padStart(2,'0');
document.getElementById('qText').textContent=q.q;
const list=document.getElementById('optionsList');list.innerHTML='';
const L=['A','B','C','D','E'];
q.opts.forEach((o,i)=>{
const b=document.createElement('button');b.className='option-btn'+(answers[currentQ]===i?' selected':'');
b.innerHTML=`<span class="option-icon">${L[i]}</span><span>${o}</span>`;
b.onclick=()=>selectOpt(i);list.appendChild(b);
});
document.getElementById('prevBtn').disabled=currentQ===0;
const last=currentQ===currentTest.questions.length-1;
document.getElementById('nextBtn').textContent=last?'✅ შედეგი':'შემდეგი →';
}

function selectOpt(i){
answers[currentQ]=i;
document.querySelectorAll('.option-btn').forEach((b,j)=>b.classList.toggle('selected',j===i));
}

function nextQ(){
if(answers[currentQ]===null){document.querySelector('.question-card').style.animation='shake .4s ease';setTimeout(()=>{document.querySelector('.question-card').style.animation='';},500);return;}
if(currentQ<currentTest.questions.length-1){currentQ++;renderQ();}else showResult();
}

function prevQ(){if(currentQ>0){currentQ--;renderQ();}}

function exitTest(){
if(answers.some(a=>a!==null)&&!confirm('ტ.ვ.გ. — გ.?'))return;showHome();
}

function showResult(){
const res=currentTest.calcResult(answers);
document.getElementById('testScreen').style.display='none';
document.getElementById('resultScreen').style.display='block';
window.scrollTo({top:0,behavior:'smooth'});
document.getElementById('resEmoji').textContent=res.emoji||'🧠';
document.getElementById('resType').textContent=res.type||'-';
document.getElementById('resScoreRow').innerHTML=`<div class="score-pill"><strong>${res.score||0}%</strong>ქ.</div><div class="score-pill"><strong>${answers.filter(a=>a!==null).length}/${currentTest.questions.length}</strong>პ.</div>`;
document.getElementById('resDesc').textContent=res.desc||'';
const te=document.getElementById('resTraits');te.innerHTML='';
(res.traits||[]).forEach(t=>{const c=document.createElement('span');c.className='trait-chip';c.textContent=t;te.appendChild(c);});
const be=document.getElementById('scoreBars');be.innerHTML='';
(res.bars||[]).forEach((b,i)=>{
const r=document.createElement('div');r.className='score-bar-row';
r.innerHTML=`<div class="score-bar-label"><span>${b.l}</span><span>${b.v}%</span></div><div class="score-bar-bg"><div class="score-bar-fill" style="width:${b.v}%;background:${b.c||'var(--indigo2)'};transition-delay:${i*.15}s"></div></div>`;
be.appendChild(r);
});
spawnConfetti();
}

function showHome(){
document.getElementById('testScreen').style.display='none';
document.getElementById('resultScreen').style.display='none';
document.getElementById('homeScreen').style.display='block';
currentTest=null;
}

function shareResult(){
const t=document.getElementById('resType').textContent;
const s=document.getElementById('resScoreRow').querySelector('strong')?.textContent||'?';
const txt=`🧠 კაიფმანია ·  ფსიქო ტ.\n${currentTest?.title||''}\nტ: ${t}\nქ: ${s}`;
if(navigator.share)navigator.share({title:'ფ.ტ.',text:txt});
else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>alert('✅ კ!'));
else alert(txt);
}

function spawnConfetti(){
const colors=['#f07aff','#a855f7','#4ade80','#fbbf24','#60b8e8','#ff5080'];
for(let i=0;i<20;i++){
const el=document.createElement('div');el.className='confetti-piece';
el.style.cssText=`left:${8+Math.random()*84}%;top:0;background:${colors[i%colors.length]};animation-delay:${Math.random()*.6}s;animation-duration:${1+Math.random()}s`;
document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
}
}

buildHome();
</script>
</body>
</html>
