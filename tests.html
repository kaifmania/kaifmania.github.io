<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ფსიქო ტესტები · კაიფმანია</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;--panel:#120f24;--panel2:#1a1730;--border:rgba(160,80,255,0.35);
  --text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;
  --input-bg:#221f3a;--online:#c07aff;--indigo:#7a1fc8;--indigo2:#a855f7;
  --indigo-f:rgba(120,30,200,0.18);--glow:rgba(168,85,247,0.28);--accent:#f07aff;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes flicker{0%,100%{filter:drop-shadow(0 0 6px var(--glow))}50%{filter:drop-shadow(0 0 20px var(--glow)) drop-shadow(0 0 40px var(--accent))}}
@keyframes heartFloat{0%{transform:translate3d(0,0,0) rotate(-5deg) scale(0.6);opacity:0}8%{opacity:.75}50%{opacity:.45}92%{opacity:.15}100%{transform:translate3d(var(--drift,0px),-115vh,0) rotate(8deg) scale(1.3);opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes resultReveal{from{opacity:0;transform:scale(0.8) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes progressFill{from{width:0}to{width:var(--target-width)}}
@keyframes optionHover{from{transform:translateX(0)}to{transform:translateX(6px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

body{
  font-family:'Noto Sans Georgian',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120,30,200,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(240,122,255,0.08) 0%, transparent 50%);
}
#hearts{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.heart{position:absolute;bottom:-60px;will-change:transform,opacity;user-select:none;animation:heartFloat linear;}

/* TOP NAV */
#topnav{
  display:flex;align-items:center;gap:10px;
  background:var(--panel);border-bottom:1px solid var(--border);
  padding:10px 20px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,.4);
}
.nav-logo{font-size:22px;animation:flicker 2.5s ease-in-out infinite;cursor:pointer;text-decoration:none}
.nav-title{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:2px}
.back-btn{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  padding:7px 16px;border-radius:20px;
  background:var(--indigo-f);border:1px solid var(--border);
  color:var(--text2);font-size:12px;cursor:pointer;
  font-family:'Noto Sans Georgian',sans-serif;
  transition:all .2s;text-decoration:none;
}
.back-btn:hover{background:var(--border);color:var(--text)}

/* MAIN LAYOUT */
#app{max-width:800px;margin:0 auto;padding:24px 16px 60px;position:relative;z-index:1}

/* HEADER */
.page-header{text-align:center;margin-bottom:36px;animation:fadeIn .5s ease}
.page-icon{font-size:56px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 20px var(--glow))}
.page-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:var(--text);margin-bottom:8px}
.page-sub{font-size:13px;color:var(--text3)}

/* TEST GRID */
#testGrid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;
  animation:fadeIn .5s ease .1s both;
}
.test-card{
  background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:20px;cursor:pointer;transition:all .25s;
  position:relative;overflow:hidden;
}
.test-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--indigo-f),transparent);
  pointer-events:none;
}
.test-card:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--indigo2);
  box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 20px var(--glow);
}
.tc-icon{font-size:36px;margin-bottom:10px;display:block}
.tc-title{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.4}
.tc-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.tc-meta{display:flex;align-items:center;gap:6px}
.tc-badge{
  font-size:9px;padding:3px 8px;border-radius:20px;
  background:rgba(168,85,247,0.15);color:#c084fc;
  border:1px solid rgba(168,85,247,0.3);
  font-family:'Unbounded',sans-serif;font-weight:700;letter-spacing:.5px;
}
.tc-questions{font-size:10px;color:var(--text3);margin-left:auto}

/* TEST SCREEN */
#testScreen{display:none;animation:fadeIn .4s ease}
.ts-header{
  background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:20px;margin-bottom:20px;position:relative;overflow:hidden;
}
.ts-header::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--indigo-f),transparent);
  pointer-events:none;
}
.ts-icon{font-size:32px;margin-bottom:6px}
.ts-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.ts-progress-wrap{margin-top:14px}
.ts-progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:6px;font-family:'Unbounded',sans-serif}
.ts-progress-bar{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden}
.ts-progress-fill{height:100%;background:linear-gradient(90deg,var(--indigo),var(--accent));border-radius:3px;transition:width .4s ease}

.question-card{
  background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:24px;margin-bottom:16px;
}
.q-number{font-size:10px;color:var(--text3);font-family:'Unbounded',sans-serif;letter-spacing:1px;margin-bottom:8px}
.q-text{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:20px;font-weight:500}
.options-list{display:flex;flex-direction:column;gap:8px}
.opt-btn{
  padding:12px 16px;border-radius:14px;
  background:var(--panel2);border:1px solid var(--border);
  color:var(--text2);font-size:13px;text-align:left;cursor:pointer;
  font-family:'Noto Sans Georgian',sans-serif;
  transition:all .2s;display:flex;align-items:center;gap:10px;
}
.opt-btn:hover{
  background:var(--indigo-f);border-color:var(--indigo2);
  color:var(--text);transform:translateX(6px);
}
.opt-btn.selected{
  background:linear-gradient(135deg,rgba(120,30,200,0.35),rgba(168,85,247,0.2));
  border-color:var(--accent);color:var(--text);
  box-shadow:0 0 12px var(--glow);
}
.opt-letter{
  width:26px;height:26px;border-radius:8px;
  background:var(--indigo-f);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;font-family:'Unbounded',sans-serif;
  color:var(--text3);flex-shrink:0;transition:all .2s;
}
.opt-btn.selected .opt-letter{background:var(--indigo);border-color:var(--indigo2);color:#fff}

.nav-btns{display:flex;gap:10px;margin-top:16px}
.nav-btn-test{
  flex:1;padding:13px;border-radius:14px;border:1px solid var(--border);
  font-family:'Noto Sans Georgian',sans-serif;font-size:13px;cursor:pointer;
  transition:all .2s;
}
.nav-btn-test.prev{background:var(--panel2);color:var(--text2)}
.nav-btn-test.prev:hover{background:var(--border);color:var(--text)}
.nav-btn-test.next{
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));
  border-color:transparent;color:#fff;font-weight:600;
  box-shadow:0 4px 18px rgba(120,30,200,.4);
}
.nav-btn-test.next:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(120,30,200,.55)}
.nav-btn-test:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* RESULT SCREEN */
#resultScreen{display:none;animation:resultReveal .5s cubic-bezier(0.34,1.3,0.64,1)}
.result-card{
  background:var(--panel);border:1px solid var(--border);border-radius:24px;
  padding:32px 24px;text-align:center;position:relative;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px var(--glow);
}
.result-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--indigo-f),transparent 60%,rgba(240,122,255,0.08));
  pointer-events:none;
}
.result-emoji{font-size:64px;display:block;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
.result-type{
  font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;
  color:var(--accent);margin-bottom:8px;text-shadow:0 0 20px var(--glow);
}
.result-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:14px}
.result-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:20px;max-width:480px;margin-left:auto;margin-right:auto}
.result-traits{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px;
}
.trait-chip{
  padding:6px 14px;border-radius:20px;font-size:12px;
  background:rgba(168,85,247,0.12);color:#c084fc;
  border:1px solid rgba(168,85,247,0.3);
}
.result-bars{width:100%;max-width:400px;margin:0 auto 24px}
.rbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rbar-label{font-size:11px;color:var(--text2);width:100px;text-align:left;font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.5px;flex-shrink:0}
.rbar-track{flex:1;height:8px;background:var(--panel2);border-radius:4px;overflow:hidden}
.rbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--indigo),var(--accent));transition:width 1s ease}
.rbar-pct{font-size:10px;color:var(--text3);width:32px;text-align:right;flex-shrink:0;font-family:'Unbounded',sans-serif}

.result-advice{
  background:var(--panel2);border:1px solid var(--border);border-radius:16px;
  padding:16px 20px;margin-bottom:24px;text-align:left;
}
.ra-title{font-size:10px;font-family:'Unbounded',sans-serif;letter-spacing:1px;color:var(--text3);margin-bottom:8px}
.ra-text{font-size:13px;color:var(--text2);line-height:1.6}

.result-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.rb-btn{
  padding:12px 28px;border-radius:50px;font-family:'Noto Sans Georgian',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s;
}
.rb-btn.primary{
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));
  border:none;color:#fff;font-weight:600;
  box-shadow:0 4px 18px rgba(120,30,200,.4);
}
.rb-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(120,30,200,.55)}
.rb-btn.secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text2)}
.rb-btn.secondary:hover{background:var(--border);color:var(--text)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--panel2)}
::-webkit-scrollbar-thumb{background:var(--indigo2);border-radius:2px}
</style>
</head>
<body>
<div id="hearts"></div>

<nav id="topnav">
  <span class="nav-logo">🧠</span>
  <span class="nav-title">ფსიქო ტესტები</span>
  <a href="javascript:history.back()" class="back-btn">← უკან</a>
</nav>

<div id="app">
  <!-- HOME -->
  <div id="homeScreen">
    <div class="page-header">
      <span class="page-icon">🧠</span>
      <div class="page-title">ფსიქო ტესტები</div>
      <div class="page-sub">15 ტესტი · გაარკვიე ვინ ხარ სინამდვილეში</div>
    </div>
    <div id="testGrid"></div>
  </div>

  <!-- TEST -->
  <div id="testScreen">
    <div class="ts-header">
      <div class="ts-icon" id="tsIcon"></div>
      <div class="ts-title" id="tsTitle"></div>
      <div class="ts-progress-wrap">
        <div class="ts-progress-label">
          <span id="tsQNum">კითხვა 1 / 10</span>
          <span id="tsPct">0%</span>
        </div>
        <div class="ts-progress-bar"><div class="ts-progress-fill" id="tsBar" style="width:0%"></div></div>
      </div>
    </div>
    <div id="questionArea"></div>
    <div class="nav-btns">
      <button class="nav-btn-test prev" id="btnPrev" onclick="prevQ()">← წინა</button>
      <button class="nav-btn-test next" id="btnNext" onclick="nextQ()">შემდეგი →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="resultScreen">
    <div class="result-card">
      <span class="result-emoji" id="resEmoji"></span>
      <div class="result-type" id="resType"></div>
      <div class="result-title" id="resTitle"></div>
      <div class="result-desc" id="resDesc"></div>
      <div class="result-traits" id="resTraits"></div>
      <div class="result-bars" id="resBars"></div>
      <div class="result-advice" id="resAdvice">
        <div class="ra-title">💡 რჩევა</div>
        <div class="ra-text" id="resAdviceText"></div>
      </div>
      <div class="result-btns">
        <button class="rb-btn primary" onclick="retakeTest()">🔄 ხელახლა</button>
        <button class="rb-btn secondary" onclick="goHome()">🏠 ყველა ტესტი</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   TEST DATA — 15 ტესტი
   ============================================================ */
const TESTS = [

/* 1 */
{
  id:1, icon:'🧬', title:'პიროვნების ტიპი',
  desc:'გაარკვიე შენი MBTI სტილის ტიპი',
  badge:'ᲢᲘᲞᲘ', questions:10,
  qs:[
    {t:'როდის გრძნობ ყველაზე მეტ ენერგიას?', opts:['ხალხთან ერთად, ვეცლები მათ ენერგიას','მარტო ყოფნისას — ჩემთვის','პატარა ჯგუფში, სანდო ადამიანებთან','დამოკიდებულია განწყობაზე']},
    {t:'გადაწყვეტილებების მიღებისას:', opts:['ლოგიკა და ფაქტები გამყავს','გრძნობები და ადამიანები მაწუხებს','სიტუაციიდან გამომდინარე ვმოქმედებ','ინტუიცია არ მტყუნებს']},
    {t:'დაგეგმვასთან დაკავშირებით:', opts:['ყველაფერი წინასწარ დავგეგმე','სპონტანობა ჩემი სტილია','ზოგი რამ ვგეგმავ, ზოგს ვტოვებ','სიას ვადგენ, მაგრამ ვარ მოქნილი']},
    {t:'კონფლიქტის დროს:', opts:['პირდაპირ ვამბობ რაც ვფიქრობ','ვცდილობ ყველა კმაყოფილი იყოს','ვიმჩევნებ სანამ არ გაყვარდება','ვანალიზებ სიტუაციას']},
    {t:'ახალ გარემოში:', opts:['ადვილად ვხვდები ადამიანებს','ვაკვირდები და ვუყურებ ჯერ','ნელ-ნელა ვფლობ','ვისე მიქცეს კავშირი']},
    {t:'შენი ოცნებების კარიერა:', opts:['ლიდერი, მმართველი','შემოქმედი, მხატვარი','ანალიტიკოსი, მეცნიერი','დამხმარე, ფსიქოლოგი']},
    {t:'თავისუფალ დროს:', opts:['მეგობრებთან გართობა','კნიგა, ფილმი, თვითგამოხატვა','ახალი სფეროს შესწავლა','ბუნებაში, სიმარტოვეში']},
    {t:'ემოციები:', opts:['გამოვხატავ ღიად','ვინახავ, ჩემთვის','ნაწილობრივ ვამჟღავნებ','ვანალიზებ, სხვებს ვარ']},
    {t:'ყველაზე მნიშვნელოვანი:', opts:['ეფექტურობა','ჰარმონია','ახალი იდეები','სტაბილურობა']},
    {t:'სამყაროს გახდი:', opts:['ნაკლებ ქაოტური','სამართლიანი','ინოვაციური','თბილი, ადამიანური']},
  ],
  calc:(ans)=>{
    const types={E:0,I:0,T:0,F:0,J:0,P:0,N:0,S:0};
    const map=[[['E','I','E','I'],['T','F','S','N'],['J','P','J','P'],['E','F','T','S'],['E','I','I','E'],['E','N','T','F'],['E','S','N','I'],['E','I','E','I'],['T','F','N','S'],['T','F','S','N']]];
    ans.forEach((a,i)=>{if(a>=0&&map[0][i]){const k=map[0][i][a];if(k)types[k]++;}});
    const E=types.E>=types.I,T=types.T>=types.F,J=types.J>=types.P,N=types.N>=types.S;
    const type=(E?'E':'I')+(N?'N':'S')+(T?'T':'F')+(J?'J':'P');
    const profiles={

/* ============================================================
   STATE
   ============================================================ */
let activeTest=null,currentQ=0,answers=[];

/* ============================================================
   RENDER
   ============================================================ */
function renderHome(){
  document.getElementById('homeScreen').style.display='';
  document.getElementById('testScreen').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  const grid=document.getElementById('testGrid');
  grid.innerHTML='';
  TESTS.forEach((t,i)=>{
    const card=document.createElement('div');
    card.className='test-card';
    card.style.animationDelay=(i*0.05)+'s';
    card.style.animation='fadeIn .4s ease '+(i*0.05)+'s both';
    card.innerHTML=`
      <span class="tc-icon">${t.icon}</span>
      <div class="tc-title">${t.title}</div>
      <div class="tc-desc">${t.desc}</div>
      <div class="tc-meta">
        <span class="tc-badge">${t.badge}</span>
        <span class="tc-questions">${t.questions} კ.</span>
      </div>
    `;
    card.onclick=()=>startTest(t);
    grid.appendChild(card);
  });
}

function startTest(test){
  activeTest=test;
  currentQ=0;
  answers=new Array(test.qs.length).fill(-1);
  document.getElementById('homeScreen').style.display='none';
  document.getElementById('testScreen').style.display='';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('tsIcon').textContent=test.icon;
  document.getElementById('tsTitle').textContent=test.title;
  renderQuestion();
}

function renderQuestion(){
  const q=activeTest.qs[currentQ];
  const total=activeTest.qs.length;
  const pct=Math.round((currentQ/total)*100);
  document.getElementById('tsQNum').textContent=`კითხვა ${currentQ+1} / ${total}`;
  document.getElementById('tsPct').textContent=pct+'%';
  document.getElementById('tsBar').style.width=pct+'%';
  document.getElementById('btnPrev').disabled=currentQ===0;
  document.getElementById('btnNext').textContent=currentQ===total-1?'შედეგი ✨':'შემდეგი →';

  const area=document.getElementById('questionArea');
  area.innerHTML='';
  const card=document.createElement('div');
  card.className='question-card';
  card.style.animation='fadeIn .3s ease';
  card.innerHTML=`
    <div class="q-number">კითხვა ${currentQ+1}</div>
    <div class="q-text">${q.t}</div>
    <div class="options-list" id="optList"></div>
  `;
  area.appendChild(card);

  const list=document.getElementById('optList');
  const letters=['ა','ბ','გ','დ','ე'];
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn'+(answers[currentQ]===i?' selected':'');
    btn.innerHTML=`<span class="opt-letter">${letters[i]||i+1}</span>${opt}`;
    btn.onclick=()=>{
      answers[currentQ]=i;
      document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    list.appendChild(btn);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

function nextQ(){
  if(answers[currentQ]<0){
    document.querySelectorAll('.opt-btn').forEach(b=>{
      b.style.animation='none';
      b.style.borderColor='rgba(240,122,255,0.5)';
      setTimeout(()=>{b.style.borderColor='';},800);
    });
    return;
  }
  if(currentQ<activeTest.qs.length-1){
    currentQ++;renderQuestion();
  } else {
    showResult();
  }
}

function prevQ(){
  if(currentQ>0){currentQ--;renderQuestion();}
}

function showResult(){
  const result=activeTest.calc(answers);
  document.getElementById('testScreen').style.display='none';
  document.getElementById('resultScreen').style.display='';
  document.getElementById('resEmoji').textContent=result.emoji;
  document.getElementById('resType').textContent=result.type;
  document.getElementById('resTitle').textContent=result.title;
  document.getElementById('resDesc').textContent=result.desc;
  const traitsEl=document.getElementById('resTraits');
  traitsEl.innerHTML=(result.traits||[]).map(t=>`<span class="trait-chip">${t}</span>`).join('');
  const barsEl=document.getElementById('resBars');
  barsEl.innerHTML='';
  if(result.bars){
    Object.entries(result.bars).forEach(([label,val])=>{
      const row=document.createElement('div');
      row.className='rbar-row';
      row.innerHTML=`
        <div class="rbar-label">${label}</div>
        <div class="rbar-track"><div class="rbar-fill" style="width:0%" data-target="${val}%"></div></div>
        <div class="rbar-pct">${val}%</div>
      `;
      barsEl.appendChild(row);
    });
    setTimeout(()=>{
      document.querySelectorAll('.rbar-fill').forEach(el=>{
        el.style.width=el.dataset.target;
      });
    },300);
  }
  document.getElementById('resAdviceText').textContent=result.advice||'';
  window.scrollTo({top:0,behavior:'smooth'});
}

function retakeTest(){startTest(activeTest);}
function goHome(){renderHome();}

/* HEARTS */
function spawnHearts(){
  const hc=document.getElementById('hearts');
  const emojis=['💜','🌸','💙','🌺','💗','🌷','💕','🌼','💖','✨'];
  function make(){
    const h=document.createElement('div');h.className='heart';
    h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const left=Math.random()*100,drift=(Math.random()-0.5)*80,dur=8+Math.random()*10,size=1+Math.random()*1.2;
    h.style.cssText=`left:${left}%;font-size:${size}rem;animation-duration:${dur}s;--drift:${drift}px`;
    hc.appendChild(h);setTimeout(()=>h.remove(),(dur+1)*1000);
  }
  for(let i=0;i<8;i++)setTimeout(make,i*300);
  setInterval(make,2500);
}

renderHome();
spawnHearts();
