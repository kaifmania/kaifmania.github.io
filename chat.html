async function uploadPhoto(){
  const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    const fn = `photo_${ME.id}_${Date.now()}.jpg`;
    const { error } = await sb.storage.from('photos').upload(fn, file);
    if(error){ toast('❌ შეცდომა'); return; }
    const url = sb.storage.from('photos').getPublicUrl(fn).data.publicUrl;
    await sb.from('photos').insert({ user_id: ME.id, image_url: url });
    toast('✅ ფოტო ატვირთულია');
    if(currentViewingProfile === ME.id) loadUserPhotos(ME.id);
  };
  input.click();
}

// ========== PANEL TOGGLE ==========
// ========== PANEL ==========
function showPanel(name){
  document.getElementById('panelRooms').classList.toggle('hidden', name !== 'rooms');
  document.getElementById('panelUsers').classList.toggle('hidden', name !== 'users');
  document.getElementById('panelFriends').classList.toggle('hidden', name !== 'friends');
  document.getElementById('navRooms').classList.toggle('active', name === 'rooms');
  document.getElementById('navUsers').classList.toggle('active', name === 'users');
  const friendsBtn = document.getElementById('navFriends');
  if(friendsBtn) friendsBtn.classList.toggle('active', name === 'friends');
  const fbtn = document.getElementById('navFriends');
  if(fbtn) fbtn.classList.toggle('active', name === 'friends');
  if(name === 'friends') loadFriends();
  if(window.innerWidth<680) document.getElementById('sidebar').classList.remove('open');
}

// ========== INIT ==========
async function init(){
  initTheme();
  const { data:{user} } = await sb.auth.getUser();
  if(!user){ location.href = 'index.html'; return; }
  ME = user;
  let { data:prof } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  if(!prof){
    const emailName = user.email?.split('@')[0] || 'მომხმარებელი';
    await sb.from('profiles').insert({ id:ME.id, username:emailName, role:'member', emotion:'😊', theme: localStorage.getItem('theme')||'dark' });
    MY_ROLE = 'member'; MY_USERNAME = emailName;
  } else {
    MY_ROLE = prof.role || 'member'; MY_USERNAME = prof.username;
    if(prof.theme && prof.theme !== (localStorage.getItem('theme')||'dark')){ localStorage.setItem('theme', prof.theme); initTheme(); }
  
  // წამოიღე მომხმარებლის მონაცემები index.html-დან
  const loggedIn = await getCurrentUser();
  if(!loggedIn){
    // თუ არ არის შესული, გადაამისამართე index.html-ზე
    window.location.href = 'index.html';
    return;
  }
  
  await updateLastSeen();
  await loadRooms();
  await loadUsers();
  await loadFriends();
  await switchRoom(1);
  
  sb.channel('profiles_live').on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, () => { loadUsers(); loadFriends(); }).subscribe();
  setInterval(()=>{ loadUsers(); loadFriends(); }, 35000);
  
  toast(`👋 გამარჯობა, ${MY_USERNAME}!`);
}
async function logout(){ await sb.auth.signOut(); location.href = 'index.html'; }
