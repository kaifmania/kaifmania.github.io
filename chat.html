<!DOCTYPE html>

<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══ VARIABLES ═══ */
body.night {
–bg:#0a0009;–bg2:#100014;–sidebar:#0d000f;–panel:#120016;
–border:rgba(106,13,173,0.35);–text:#e8d5f5;–text2:#9b7eb8;–text3:#5a3d72;
–bubble-me:#2d0050;–bubble-other:#1a0028;–input-bg:#1c0028;
–online:#a855f7;–indigo:#4b0082;–indigo2:#7b2fbe;–indigo-f:rgba(75,0,130,0.18);
}
body.day {
–bg:#fdf8f0;–bg2:#f5eee6;–sidebar:#f0e8dc;–panel:#f7f0e8;
–border:rgba(106,13,173,0.22);–text:#2d1a42;–text2:#6b4a8a;–text3:#a88cba;
–bubble-me:#e8d5f5;–bubble-other:#fff;–input-bg:#fff;
–online:#7b2fbe;–indigo:#5a189a;–indigo2:#7b2fbe;–indigo-f:rgba(106,13,173,0.1);
}

body{font-family:‘Noto Sans Georgian’,sans-serif;background:var(–bg);color:var(–text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;transition:background .4s,color .4s}

/* ═══ HEARTS ═══ */
#hearts{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.heart{position:absolute;bottom:-80px;font-size:2.6rem;opacity:0;animation:fh linear infinite;user-select:none}
@keyframes fh{0%{transform:translateY(0) rotate(-8deg) scale(.8);opacity:0}10%{opacity:.7}85%{opacity:.4}100%{transform:translateY(-110vh) rotate(12deg) scale(1.3);opacity:0}}

/* ═══ TOP NAV (mobile-first) ═══ */
#topnav{
display:flex;align-items:center;gap:4px;
background:var(–panel);border-bottom:1px solid var(–border);
padding:8px 10px;z-index:50;flex-shrink:0;
overflow-x:auto;scrollbar-width:none;
}
#topnav::-webkit-scrollbar{display:none}

.nav-logo{font-size:22px;margin-right:6px;animation:flicker 2.5s ease-in-out infinite;flex-shrink:0}
@keyframes flicker{0%,100%{filter:drop-shadow(0 0 6px rgba(106,13,173,.9))}50%{filter:drop-shadow(0 0 18px rgba(106,13,173,1)) drop-shadow(0 0 30px rgba(200,100,255,.6))}}

.nav-btn{
min-width:40px;height:38px;border-radius:12px;background:transparent;
border:1px solid transparent;color:var(–text2);font-size:18px;cursor:pointer;
display:flex;align-items:center;justify-content:center;gap:4px;
transition:all .2s;white-space:nowrap;padding:0 10px;flex-shrink:0;position:relative;
}
.nav-btn:hover,.nav-btn.active{background:var(–indigo-f);border-color:var(–border);color:var(–text)}
.nav-btn span.label{font-size:11px;font-family:‘Unbounded’,sans-serif;letter-spacing:.5px}

.badge{
position:absolute;top:3px;right:3px;background:#a855f7;color:#fff;
font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;
display:none;align-items:center;justify-content:center;padding:0 3px;
}
.badge.show{display:flex}

.nav-spacer{flex:1}
.theme-btn{min-width:38px;height:38px;border-radius:12px;background:transparent;border:1px solid transparent;color:var(–text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.theme-btn:hover{background:var(–indigo-f);border-color:var(–border)}

/* ═══ LAYOUT ═══ */
#app{display:flex;flex:1;min-height:0;position:relative;z-index:1}

/* ═══ SIDEBAR ═══ */
#sidebar{
width:220px;background:var(–panel);border-right:1px solid var(–border);
display:flex;flex-direction:column;flex-shrink:0;transition:background .4s;
}
@media(max-width:640px){#sidebar{display:none}#sidebar.mob-open{display:flex;position:fixed;inset:0;top:57px;z-index:40;width:100%}}

.sb-header{padding:12px 14px;border-bottom:1px solid var(–border);font-family:‘Unbounded’,sans-serif;font-size:10px;letter-spacing:2px;color:var(–text2);text-transform:uppercase}
.sb-body{flex:1;overflow-y:auto;padding:8px}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px}

.search-box{width:100%;padding:8px 12px;background:var(–input-bg);border:1px solid var(–border);border-radius:10px;color:var(–text);font-size:13px;font-family:‘Noto Sans Georgian’,sans-serif;outline:none;margin-bottom:8px;transition:border-color .2s}
.search-box:focus{border-color:var(–indigo2)}
.search-box::placeholder{color:var(–text3)}

.group-lbl{font-size:10px;letter-spacing:2px;color:var(–text3);text-transform:uppercase;padding:8px 8px 3px;font-family:‘Unbounded’,sans-serif}

.room-item,.list-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .2s;margin-bottom:2px}
.room-item:hover,.list-item:hover,.room-item.active{background:var(–indigo-f)}

.room-icon{width:32px;height:32px;border-radius:9px;background:var(–indigo-f);border:1px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.room-name{font-size:13px;font-weight:500;color:var(–text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.avatar{width:32px;height:32px;border-radius:50%;background:var(–indigo-f);border:2px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;position:relative;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.online-dot{width:8px;height:8px;background:var(–online);border-radius:50%;border:2px solid var(–panel);position:absolute;bottom:0;right:0}

/* ═══ MAIN ═══ */
#main{flex:1;display:flex;flex-direction:column;min-width:0}

.chat-header{height:52px;background:var(–panel);border-bottom:1px solid var(–border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.chat-title{font-family:‘Unbounded’,sans-serif;font-size:13px;font-weight:700;color:var(–text)}
.chat-sub{font-size:11px;color:var(–text3);margin-left:auto}

#messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:5px}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px}

.msg-row{display:flex;align-items:flex-end;gap:7px;animation:mIn .22s ease both}
@keyframes mIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-row.me{flex-direction:row-reverse}

.msg-bubble{max-width:70%;background:var(–bubble-other);border:1px solid var(–border);border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:14px;color:var(–text);line-height:1.5;position:relative;word-break:break-word}
.msg-row.me .msg-bubble{background:var(–bubble-me);border-radius:16px 16px 4px 16px}

.msg-meta{display:flex;align-items:center;gap:5px;margin-bottom:2px;flex-wrap:wrap}
.msg-nick{font-size:11px;font-weight:600;color:var(–indigo2);cursor:pointer}
.msg-nick:hover{text-decoration:underline}
.role-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700}
.rb-founder{background:rgba(255,180,0,.2);color:#f0a500}
.rb-admin{background:rgba(106,13,173,.3);color:#c084fc}
.msg-time{font-size:10px;color:var(–text3)}
.msg-del{position:absolute;top:3px;right:7px;background:none;border:none;font-size:11px;color:var(–text3);cursor:pointer;opacity:0;transition:opacity .2s;padding:0}
.msg-bubble:hover .msg-del{opacity:1}

/* ═══ INPUT BAR ═══ */
.chat-bar{background:var(–panel);border-top:1px solid var(–border);padding:10px 14px;display:flex;align-items:center;gap:7px;flex-shrink:0;position:relative}

.icon-btn{width:36px;height:36px;border-radius:10px;background:var(–indigo-f);border:1px solid var(–border);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.icon-btn:hover{background:var(–border)}

#msgInput{flex:1;background:var(–input-bg);border:1px solid var(–border);border-radius:18px;padding:9px 14px;color:var(–text);font-size:14px;font-family:‘Noto Sans Georgian’,sans-serif;outline:none;transition:border-color .2s;resize:none;height:40px;max-height:100px}
#msgInput:focus{border-color:var(–indigo2)}
#msgInput::placeholder{color:var(–text3)}

.send-btn{width:40px;height:40px;border-radius:50%;background:var(–indigo);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 3px 12px rgba(75,0,130,.5)}
.send-btn:hover{background:var(–indigo2);transform:scale(1.06)}

/* ═══ EMOJI PANEL ═══ */
#emojiPanel{position:absolute;bottom:58px;left:14px;background:var(–panel);border:1px solid var(–border);border-radius:16px;padding:12px;width:280px;z-index:100;box-shadow:0 8px 28px rgba(0,0,0,.4);display:none}
#emojiPanel.open{display:block}

.ep-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:10px;color:var(–text2);font-family:‘Unbounded’,sans-serif;letter-spacing:1px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:3px;max-height:130px;overflow-y:auto}
.emoji-grid::-webkit-scrollbar{width:3px}
.emoji-grid::-webkit-scrollbar-thumb{background:var(–border)}

.em-btn{width:34px;height:34px;border-radius:8px;background:var(–indigo-f);border:none;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;position:relative}
.em-btn:hover{background:var(–border)}
.em-del{position:absolute;top:-4px;right:-4px;width:13px;height:13px;background:#cc0000;color:#fff;border-radius:50%;font-size:8px;display:none;align-items:center;justify-content:center;cursor:pointer;border:none}
.em-btn:hover .em-del.vis{display:flex}

.ep-add{margin-top:8px;display:flex;gap:6px}
.ep-add-btn{background:var(–indigo);border:none;border-radius:8px;color:#fff;font-size:12px;padding:0 10px;cursor:pointer;font-family:‘Noto Sans Georgian’,sans-serif;white-space:nowrap}

.ep-upload-btn{background:var(–indigo-f);border:1px solid var(–border);border-radius:8px;color:var(–text2);font-size:11px;padding:5px 8px;cursor:pointer;font-family:‘Noto Sans Georgian’,sans-serif;margin-top:6px;width:100%;text-align:center;transition:background .2s}
.ep-upload-btn:hover{background:var(–border)}

/* ═══ MODALS ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}

.modal{background:var(–panel);border:1px solid var(–border);border-radius:22px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;padding:24px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:mIn .3s cubic-bezier(.22,1,.36,1)}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(–border)}

.modal-x{position:absolute;top:14px;right:14px;background:var(–indigo-f);border:1px solid var(–border);border-radius:8px;width:26px;height:26px;color:var(–text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-title{font-family:‘Unbounded’,sans-serif;font-size:13px;font-weight:700;color:var(–text);margin-bottom:18px;letter-spacing:1px}

.sec-lbl{font-size:10px;letter-spacing:2px;color:var(–text3);text-transform:uppercase;font-family:‘Unbounded’,sans-serif;margin:12px 0 6px}
.divider{height:1px;background:var(–border);margin:12px 0}

.av-big-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:16px}
.av-big{width:80px;height:80px;border-radius:50%;background:var(–indigo-f);border:3px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:38px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
.av-big:hover{border-color:var(–indigo2)}
.av-big img{width:100%;height:100%;object-fit:cover}
.av-edit{position:absolute;inset:0;background:rgba(75,0,130,.55);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0;transition:opacity .2s}
.av-big:hover .av-edit{opacity:1}
.prof-name{font-size:17px;font-weight:600;color:var(–text)}
.prof-role{font-size:11px;padding:3px 10px;border-radius:20px}
.pr-founder{background:rgba(255,180,0,.2);color:#f0a500}
.pr-admin{background:rgba(106,13,173,.3);color:#c084fc}
.pr-member{background:var(–indigo-f);color:var(–text2)}

.inp{width:100%;padding:10px 13px;background:var(–input-bg);border:1px solid var(–border);border-radius:11px;color:var(–text);font-family:‘Noto Sans Georgian’,sans-serif;font-size:13px;outline:none;margin-bottom:7px;transition:border-color .2s}
.inp:focus{border-color:var(–indigo2)}
.inp::placeholder{color:var(–text3)}
.inp:disabled{opacity:.5;cursor:not-allowed}

select.inp{cursor:pointer}

.emo-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.emo-btn{padding:5px 10px;border-radius:18px;background:var(–indigo-f);border:1px solid var(–border);color:var(–text2);font-size:12px;cursor:pointer;transition:all .2s}
.emo-btn.active,.emo-btn:hover{background:var(–indigo);color:#fff;border-color:var(–indigo)}

.act-btn{width:100%;padding:10px;border-radius:11px;border:1px solid var(–border);background:var(–indigo-f);color:var(–text);font-family:‘Noto Sans Georgian’,sans-serif;font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:5px;text-align:left}
.act-btn:hover{background:var(–border)}
.act-btn.danger{border-color:rgba(200,0,0,.3);color:#ff6666}
.act-btn.danger:hover{background:rgba(200,0,0,.15)}
.act-btn.success{border-color:rgba(80,200,0,.3);color:#88dd44}
.act-btn.success:hover{background:rgba(80,200,0,.1)}

/* ═══ DM BOX ═══ */
#dmBox{position:fixed;right:16px;bottom:16px;width:300px;height:400px;background:var(–panel);border:1px solid var(–border);border-radius:18px;display:none;flex-direction:column;z-index:300;box-shadow:0 14px 44px rgba(0,0,0,.55);overflow:hidden;animation:mIn .3s ease}
#dmBox.open{display:flex}
.dm-head{background:var(–indigo);padding:10px 13px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.dm-title{flex:1;font-size:13px;font-weight:600;color:#fff}
.dm-x{background:rgba(255,255,255,.2);border:none;border-radius:6px;color:#fff;font-size:11px;cursor:pointer;padding:3px 7px}
#dmMsgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px}
#dmMsgs::-webkit-scrollbar{width:3px}
#dmMsgs::-webkit-scrollbar-thumb{background:var(–border)}
.dm-bar{display:flex;gap:5px;padding:8px;border-top:1px solid var(–border);flex-shrink:0}
#dmInput{flex:1;background:var(–input-bg);border:1px solid var(–border);border-radius:11px;padding:7px 11px;color:var(–text);font-size:13px;font-family:‘Noto Sans Georgian’,sans-serif;outline:none}
#dmInput:focus{border-color:var(–indigo2)}
.dm-send{background:var(–indigo);border:none;border-radius:9px;color:#fff;font-size:15px;cursor:pointer;padding:0 11px;transition:background .2s}
.dm-send:hover{background:var(–indigo2)}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(–indigo);color:#fff;padding:9px 18px;border-radius:18px;font-size:13px;z-index:9999;box-shadow:0 4px 18px rgba(0,0,0,.4);animation:mIn .3s ease;pointer-events:none}

.hidden{display:none!important}
</style>

</head>

async function loadProf(uid){

async function openProfile(uid){
  VIEW_UID=uid;

  const isSelf=uid===ME.id;
  const canAdmin=['admin','founder'].includes(MYPROF?.role)&&!isSelf;

  document.getElementById('profTitle').textContent=isSelf?'ჩემი პროფილი':'პროფილი';

    document.getElementById('avImg').src=p.avatar_url;
    document.getElementById('avImg').style.display='block';
    document.getElementById('avEmoji').style.display='none';
  } else {
    document.getElementById('avImg').style.display='none';
    document.getElementById('avEmoji').style.display='block';
    document.getElementById('avEmoji').textContent=p?.emotion||'😊';

  document.getElementById('avEdit').style.display=isSelf?'':'none';

  document.getElementById('statusInp').value=p?.status||'';
  document.getElementById('statusInp').disabled=!isSelf;
  document.getElementById('emoComment').value=p?.emotion_comment||'';
  document.getElementById('emoComment').disabled=!isSelf;

  document.getElementById('adminSec').classList.toggle('hidden',!canAdmin);

  }

}

async function saveProfile(){
  const updates={
    status:document.getElementById('statusInp').value,
    emotion:selectedEmotion,
    emotion_comment:document.getElementById('emoComment').value,

  const {error}=await sb.from('profiles').update(updates).eq('id',ME.id);

  MYPROF={...MYPROF,...updates};
  toast('✅ შენახულია!');

function pickEmo(btn,em){

function clickAvatar(){

async function uploadAvatar(e){
  const file=e.target.files[0];
  if(!file)return;
  toast('⏳ იტვირთება...');
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    const dataUrl=ev.target.result;
    const {error}=await sb.from('profiles').update({avatar_url:dataUrl}).eq('id',ME.id);
    if(error){toast('❌ '+error.message);return;}
    MYPROF.avatar_url=dataUrl;
    document.getElementById('avImg').src=dataUrl;
    document.getElementById('avImg').style.display='block';
    document.getElementById('avEmoji').style.display='none';
    toast('✅ ფოტო განახლდა!');
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

/* ═══ ROLES ═══ */
async function assignRole(){
  if(MYPROF?.role!=='founder'){toast('❌ მხოლოდ დამფუძნებელს შეუძლია!');return;}

async function blockUser(){

  const reason=document.getElementById('blockReason').value||'მიზეზი არ არის';

  await sb.from('profiles').update({is_blocked:false,block_reason:null}).eq('id',VIEW_UID);

function rLabel(r){return r==='founder'?'👑 დამფუძნებელი':r==='admin'?'🛡️ ადმინი':'👤 წევრი';}
function rClass(r){return r==='founder'?'pr-founder':r==='admin'?'pr-admin':'pr-member';}
function rbClass(r){return r==='founder'?'rb-founder':r==='admin'?'rb-admin':'';}

/* ═══ ROOMS ═══ */
function buildRooms(){
  const el=document.getElementById('roomList');
  el.innerHTML='';
  ROOMS.forEach(r=>{
    const d=document.createElement('div');
    d.className='room-item'+(r.id===ROOM?' active':'');
    d.innerHTML=`<div class="room-icon">${r.icon}</div><div class="room-name">${r.name}</div>`;
    d.onclick=()=>switchRoom(r);
    el.appendChild(d);
  });
}

function switchRoom(r){
  ROOM=r.id;
  document.getElementById('roomTitle').textContent=r.name;
  document.getElementById('roomIcon').textContent=r.icon;
  document.querySelectorAll('.room-item').forEach((el,i)=>el.classList.toggle('active',i===r.id-1));
  loadMessages(r.id);
  document.getElementById('sidebar').classList.remove('mob-open');
}

/* ═══ MESSAGES ═══ */
async function loadMessages(roomId){
  if(msgCh){sb.removeChannel(msgCh);msgCh=null;}
  const {data,error}=await sb.from('messages')
    .select('*, profiles(username,role,avatar_url,emotion)')
    .eq('room_id',roomId)
    .order('created_at',{ascending:true}).limit(80);

  const box=document.getElementById('messages');
  box.innerHTML='';
  (data||[]).forEach(m=>appendMsg(m,false));
  box.scrollTop=box.scrollHeight;

  msgCh=sb.channel('room'+roomId)
    .on('postgres_changes',
      {event:'INSERT',schema:'public',table:'messages',filter:`room_id=eq.${roomId}`},
      async payload=>{
        const {data:msg}=await sb.from('messages')
          .select('*, profiles(username,role,avatar_url,emotion)')
          .eq('id',payload.new.id).single();
        if(msg){appendMsg(msg,true);box.scrollTop=box.scrollHeight;}
      })
    .on('postgres_changes',
      {event:'DELETE',schema:'public',table:'messages'},
      payload=>{document.getElementById('msg'+payload.old.id)?.remove();})
    .subscribe();
}

function appendMsg(m,scroll){
  const isMe=m.user_id===ME?.id;
  const canDel=isMe||['admin','founder'].includes(MYPROF?.role);
  const t=new Date(m.created_at).toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});
  const role=m.profiles?.role;
  const rbadge=role&&role!=='member'
    ?`<span class="role-badge ${rbClass(role)}">${rLabel(role)}</span>`:'';

  let avHtml=m.profiles?.avatar_url
    ?`<img src="${m.profiles.avatar_url}" style="width:100%;height:100%;object-fit:cover">`
    :(m.profiles?.emotion||'😊');

  const row=document.createElement('div');
  row.className='msg-row'+(isMe?' me':'');
  row.id='msg'+m.id;
  row.innerHTML=`
    <div class="avatar" style="cursor:pointer" onclick="openProfile('${m.user_id}')">${avHtml}</div>
    <div>
      <div class="msg-meta">
        <span class="msg-nick" onclick="openProfile('${m.user_id}')">${esc(m.profiles?.username||'?')}</span>
        ${rbadge}
        <span class="msg-time">${t}</span>
      </div>
      <div class="msg-bubble">
        ${esc(m.content)}
        ${canDel?`<button class="msg-del" onclick="delMsg('${m.id}')">🗑</button>`:''}
      </div>
    </div>`;
  document.getElementById('messages').appendChild(row);
}

async function sendMessage(){
  const inp=document.getElementById('msgInput');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  const {error}=await sb.from('messages').insert({room_id:ROOM,user_id:ME.id,content:txt});
  if(error)toast('❌ '+error.message);
}

async function delMsg(id){
  if(!confirm('წავშალო?'))return;
  await sb.from('messages').delete().eq('id',id);

/* ═══ EMOJIS ═══ */
async function loadEmojis(){
  const {data}=await sb.from('settings').select('value').eq('key','custom_emojis').single();
  if(data?.value){try{customEmojis=JSON.parse(data.value);}catch(e){}}
  if(!customEmojis.length) customEmojis=['😊','😂','❤️','🔥','😍','🥺','👑','💜','✨','🎉'];
}

function buildEmojis(){
  const grid=document.getElementById('emojiGrid');
  grid.innerHTML='';
  const canManage=['admin','founder'].includes(MYPROF?.role);

  document.getElementById('epAdminHint').style.display=canManage?'':'none';
  document.getElementById('addEmojiSection').style.display=canManage?'':'none';

  customEmojis.forEach((em,idx)=>{
    const btn=document.createElement('button');
    btn.className='em-btn';
    const isImg=em.startsWith('data:')||em.startsWith('http');
    btn.innerHTML=isImg
      ?`<img src="${em}" style="width:24px;height:24px;border-radius:4px;object-fit:cover">`
      :em;
    if(canManage){
      const del=document.createElement('button');
      del.className='em-del vis';del.textContent='✕';
      del.onclick=e=>{e.stopPropagation();removeEmoji(idx);};
      btn.appendChild(del);
    }
    btn.onclick=e=>{if(e.target.classList.contains('em-del'))return;insertEmoji(em,isImg);};
    grid.appendChild(btn);
  });
}

function insertEmoji(em,isImg){
  if(isImg) return;
  document.getElementById('msgInput').value+=em;
  document.getElementById('msgInput').focus();
  document.getElementById('emojiPanel').classList.remove('open');
}

function addTextEmoji(){
  const v=document.getElementById('newEmojiInput').value.trim();
  if(!v)return;
  customEmojis.push(v);
  document.getElementById('newEmojiInput').value='';
  buildEmojis();saveEmojis();
}

function handleEmojiImage(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    customEmojis.push(ev.target.result);
    buildEmojis();saveEmojis();
    toast('✅ სმაილი დაემატა!');
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function removeEmoji(idx){
  customEmojis.splice(idx,1);
  buildEmojis();saveEmojis();
}

async function saveEmojis(){
  await sb.from('settings').upsert({key:'custom_emojis',value:JSON.stringify(customEmojis)});

async function loadAllUsers(){
  const {data}=await sb.from('profiles').select('*').order('created_at');
  allUsers=data||[];
  renderUserLists();
}

function renderUserLists(){
  const grps={F:[],A:[],M:[]};
  allUsers.forEach(u=>{
    if(u.role==='founder')grps.F.push(u);
    else if(u.role==='admin')grps.A.push(u);
    else grps.M.push(u);
  });
  const onlineNow=allUsers.filter(u=>isOnline(u.last_seen));
  document.getElementById('onlineCnt').textContent=`● ${onlineNow.length} ონლაინი`;

  ['us','on'].forEach(pre=>{
    ['F','A','M'].forEach(g=>{
      const el=document.getElementById(pre+g);
      if(!el)return;
      el.innerHTML='';
      const list=pre==='on'?grps[g].filter(u=>isOnline(u.last_seen)):grps[g];
      list.forEach(u=>el.appendChild(makeUserItem(u)));
    });
  });
}

function makeUserItem(u){
  const d=document.createElement('div');
  d.className='list-item';
  d.dataset.q=(u.username||'').toLowerCase();
  const on=isOnline(u.last_seen);
  const avHtml=u.avatar_url
    ?`<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover">`
    :(u.emotion||'😊');
  d.innerHTML=`
    <div class="avatar" style="position:relative">${avHtml}${on?'<div class="online-dot"></div>':''}</div>
    <div>
      <div style="font-size:13px;font-weight:500">${esc(u.username||'?')}</div>
      ${u.status?`<div style="font-size:11px;color:var(--text3)">${esc(u.status)}</div>`:''}
    </div>`;
  d.onclick=()=>openProfile(u.id);
  return d;
}

function filterUsers(){
  const q=document.getElementById('userSearch').value.toLowerCase();
  document.querySelectorAll('#panelUsers .list-item').forEach(el=>{
    el.style.display=el.dataset.q.includes(q)?'':'none';
  });
}

function isOnline(ts){
  if(!ts)return false;
  return Date.now()-new Date(ts).getTime()<90000;
}

async function pingOnline(){
  if(!ME)return;
  await sb.from('profiles').update({last_seen:new Date().toISOString()}).eq('id',ME.id);

    const u=allUsers.find(u=>u.id===fid);if(!u)return;
    const g=u.role==='founder'?'frF':u.role==='admin'?'frA':'frM';
    const el=document.getElementById(g);
    if(el)el.appendChild(makeUserItem(u));
  });

  const isFr=myFriends.includes(VIEW_UID);

    await sb.from('friends').delete().eq('user_id',ME.id).eq('friend_id',VIEW_UID);
    myFriends=myFriends.filter(f=>f!==VIEW_UID);
    toast('💔 მეგობრობა გაუქმდა');
  } else {
    await sb.from('friends').upsert({user_id:ME.id,friend_id:VIEW_UID,status:'pending'});
    toast('📨 მოთხოვნა გაიგზავნა!');
  }
  document.getElementById('friendBtn').textContent=myFriends.includes(VIEW_UID)?'💔 მეგობრობის გაუქმება':'➕ მეგობრად დამატება';
}

async function checkFriendReqs(){

    .select('*, profiles!friends_user_id_fkey(username)')

    badge.textContent=data.length;badge.classList.add('show');
    const req=data[0];
    document.getElementById('friendReqTxt').textContent=(req.profiles?.username||'?')+' გვინდა დაგამატოს მეგობრებში';
    document.getElementById('friendReqOverlay').dataset.rid=req.id;
    document.getElementById('friendReqOverlay').dataset.fid=req.user_id;
    openModal('friendReqOverlay');
  } else {badge.classList.remove('show');}

async function acceptFriend(){
  const rid=document.getElementById('friendReqOverlay').dataset.rid;
  const fid=document.getElementById('friendReqOverlay').dataset.fid;
  await sb.from('friends').update({status:'accepted'}).eq('id',rid);
  await sb.from('friends').upsert({user_id:ME.id,friend_id:fid,status:'accepted'});
  myFriends.push(fid);
  closeModal('friendReqOverlay');toast('✅ მეგობარი დაემატა!');
  renderFriends();
}

async function declineFriend(){
  const rid=document.getElementById('friendReqOverlay').dataset.rid;
  await sb.from('friends').delete().eq('id',rid);
  closeModal('friendReqOverlay');toast('❌ უარყოფილია');
}

/* ═══ DM ═══ */
async function openDM(uid){
  if(uid)DM_UID=uid;
  if(!DM_UID)return;
  const u=allUsers.find(u=>u.id===DM_UID);
  document.getElementById('dmTitle').textContent=u?.username||'პირადი';
  const avHtml=u?.avatar_url?`<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:(u?.emotion||'👤');
  document.getElementById('dmAv').innerHTML=avHtml;
  document.getElementById('dmBox').classList.add('open');

  const rk=[ME.id,DM_UID].sort().join('_');
  const {data}=await sb.from('direct_messages').select('*').eq('room_key',rk).order('created_at',{ascending:true}).limit(50);
  const box=document.getElementById('dmMsgs');
  box.innerHTML='';
  (data||[]).forEach(m=>{
    const isMe=m.sender_id===ME.id;
    const t=new Date(m.created_at).toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});
    const d=document.createElement('div');
    d.className='msg-row'+(isMe?' me':'');
    d.innerHTML=`<div class="msg-bubble" style="font-size:13px">${esc(m.content)}<span style="font-size:10px;color:var(--text3);margin-left:6px">${t}</span></div>`;
    box.appendChild(d);
  });
  box.scrollTop=box.scrollHeight;

  if(dmCh)sb.removeChannel(dmCh);
  dmCh=sb.channel('dm'+rk)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'direct_messages',filter:`room_key=eq.${rk}`},
      p=>{
        if(p.new.sender_id===ME.id)return;
        const t=new Date(p.new.created_at).toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});
        const d=document.createElement('div');
        d.className='msg-row';
        d.innerHTML=`<div class="msg-bubble" style="font-size:13px">${esc(p.new.content)}<span style="font-size:10px;color:var(--text3);margin-left:6px">${t}</span></div>`;
        box.appendChild(d);box.scrollTop=box.scrollHeight;
        const b=document.getElementById('dmBadge');
        b.textContent=parseInt(b.textContent||0)+1;b.classList.add('show');
      })
    .subscribe();
}

async function sendDM(){
  const inp=document.getElementById('dmInput');
  const txt=inp.value.trim();
  if(!txt||!DM_UID)return;
  inp.value='';
  const rk=[ME.id,DM_UID].sort().join('_');
  const t=new Date().toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});
  const d=document.createElement('div');
  d.className='msg-row me';
  d.innerHTML=`<div class="msg-bubble" style="font-size:13px">${esc(txt)}<span style="font-size:10px;color:var(--text3);margin-left:6px">${t}</span></div>`;
  const box=document.getElementById('dmMsgs');
  box.appendChild(d);box.scrollTop=box.scrollHeight;
  await sb.from('direct_messages').insert({room_key:rk,sender_id:ME.id,receiver_id:DM_UID,content:txt});
}

function closeDM(){
  document.getElementById('dmBox').classList.remove('open');
  document.getElementById('dmBadge').textContent='';
  document.getElementById('dmBadge').classList.remove('show');
}

function openDMfromProfile(){closeModal('profileOverlay');openDM(VIEW_UID);}

/* ═══ PANEL SWITCH ═══ */
function showPanel(name){
  ['rooms','friends','users','online'].forEach(p=>{
    const panel=document.getElementById('panel'+cap(p));
    if(panel)panel.classList.toggle('hidden',p!==name);
    const btn=document.getElementById('nav'+cap(p));
    if(btn)btn.classList.toggle('active',p===name);
  });
  const sb=document.getElementById('sidebar');
  sb.classList.add('mob-open');
  if(name==='friends'){loadFriends();}
  if(name==='users'||name==='online'){loadAllUsers();}
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

/* ═══ THEME ═══ */
function toggleTheme(){
  theme=theme==='night'?'day':'night';
  document.body.className=theme;
  document.getElementById('themeBtn').textContent=theme==='night'?'🌙':'☀️';
}

/* ═══ HEARTS ═══ */
function spawnHearts(){
  const layer=document.getElementById('hearts');
  function mk(){
    const h=document.createElement('div');
    h.className='heart';h.textContent='💜';
    h.style.left=Math.random()*100+'vw';
    h.style.fontSize=(2.2+Math.random()*2)+'rem';
    const dur=9+Math.random()*9;
    h.style.animationDuration=dur+'s';
    h.style.animationDelay=Math.random()*4+'s';
    layer.appendChild(h);
    setTimeout(()=>h.remove(),(dur+5)*1000);
  }
  for(let i=0;i<10;i++)mk();
  setInterval(mk,2200);
}

/* ═══ UTILS ═══ */
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function bgClose(e,id){if(e.target.id===id)closeModal(id);}

function toast(msg){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function logout(){
  await sb.auth.signOut();location.href='index.html';
}

/* ═══ START ═══ */
init();
</script>
