<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { 
            margin: 0; height: 100vh; background: #000; 
            font-family: 'Arial', sans-serif; color: white; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* ზედა პანელი */
        .header {
            height: 60px; background: #0d0d0d; border-bottom: 2px solid red;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1001; position: relative;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        .header h1 { color: red; font-size: 22px; text-shadow: 0 0 10px red; margin: 0; }

        /* ჩამოსაშლელი მენიუ (Dropdown) */
        .nav-menu {
            position: fixed; top: -100%; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.98); border-bottom: 3px solid red;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px; padding: 25px; transition: 0.5s ease-in-out;
            z-index: 1000; box-sizing: border-box;
        }

        .nav-menu.active { top: 60px; }

        .nav-menu a {
            color: #ccc; text-decoration: none; padding: 12px;
            border: 1px solid #333; border-radius: 8px; text-align: center;
            font-size: 13px; transition: 0.3s;
        }

        .nav-menu a:hover { background: red; color: white; box-shadow: 0 0 15px red; }

        /* ჩატის არე */
        .chat-container {
            flex-grow: 1; display: flex; flex-direction: column;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            position: relative; padding: 20px;
        }

        #roomIndicator {
            text-align: center; color: red; font-weight: bold;
            font-size: 28px; text-shadow: 0 0 15px red; margin-bottom: 10px;
        }

        #chatBox {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }

        .msg { background: rgba(255, 255, 255, 0.05); padding: 10px 15px; border-radius: 12px; border-left: 3px solid red; align-self: flex-start; }
        .msg-nick { color: red; font-weight: bold; font-size: 13px; margin-right: 10px; }
        .msg-time { color: #555; font-size: 10px; margin-left: 10px; }

        /* საწერი ველი */
        .input-bar {
            height: 70px; background: #0d0d0d; display: flex;
            align-items: center; padding: 0 20px; gap: 15px; border-top: 1px solid #222;
        }

        #messageInput {
            flex-grow: 1; background: #1a1a1a; border: 1px solid #333;
            border-radius: 25px; padding: 12px 20px; color: white; outline: none;
        }

        /* ნამდვილი ლურჯი Jet თვითმფრინავი */
        .jet-btn {
            background: none; border: none; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        .jet-btn:hover { transform: scale(1.2) translateX(5px); }
        .jet-btn:active { transform: scale(0.9) translateY(-5px); }

        .jet-btn svg {
            width: 45px; height: 45px; fill: #008cff;
            filter: drop-shadow(0 0 10px #008cff);
        }
    </style>
</head>
<body>

    <div class="header" onclick="toggleMenu()">
        <h1>კაიფმანია 😎🔥</h1>
    </div>

    <nav id="navMenu" class="nav-menu">
        <a href="#" onclick="changeRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</a>
        <a href="#" onclick="changeRoom('💎 VIP')">💎 VIP</a>
        <a href="#" onclick="changeRoom('🔍 გამოძიება')">🔍 გამოძიება</a>
        <a href="#" onclick="changeRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</a>
        <a href="#" onclick="changeRoom('❓ ვიქტორინა')">❓ ვიქტორინა</a>
        <a href="#" onclick="changeRoom('🪢 ჩამოხრჩობანა')">🪢 ჩამოხრჩობანა</a>
        <a href="#" onclick="changeRoom('🕵️ მაფია')">🕵️ მაფია</a>
        <a href="#" onclick="changeRoom('🃏 ჯოკერი')">🃏 ჯოკერი</a>
        <a href="#" onclick="changeRoom('🎲 ნარდი')">🎲 ნარდი</a>
        <a href="#" onclick="changeRoom('🎵 მუსიკა')">🎵 მუსიკა</a>
        <a href="#" onclick="changeRoom('🛡️ ადმინი')">🛡️ ადმინი</a>
        <a href="#" onclick="location.href='index.html'" style="color:red">🚪 გასვლა</a>
    </nav>

    <div class="chat-container">
        <div id="roomIndicator">☕ კაფე-ბარი</div>
        <div id="chatBox"></div>
    </div>

    <div class="input-bar">
        <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება..." onkeyup="if(event.key==='Enter') sendMsg()">
        <button class="jet-btn" onclick="sendMsg()">

                <path d="M21 16.5c0 .38-.21.71-.53.88l-7.97 4.27c-.31.17-.69.17-1 0L3.53 17.38c-.32-.17-.53-.5-.53-.88V9.26c0-.38.21-.71.53-.88l7.97-4.27c.31-.17.69-.17 1 0l7.97 4.27c.
