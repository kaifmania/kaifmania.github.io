<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>KAIFMANIA 🔥</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* ზოგადი სტილი */
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ჰედერი - მყარი და სერიოზული */
        header { 
            background: #000; height: 80px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; border-bottom: 4px solid #ff0000; box-shadow: 0 4px 20px rgba(255, 0, 0, 0.6); z-index: 1000;
        }

        /* ლოგო შუაში */
        .logo { font-size: 32px; color: #ff0000; text-shadow: 0 0 15px #ff0000; letter-spacing: 4px; text-transform: uppercase; }

        /* ჩამოსაშლელი მენიუს კონტეინერი */
        .dropdown { position: relative; display: inline-block; }

        /* მთავარი ღილაკი */
        .menu-btn { 
            background: #ff0000; color: #fff; border: 2px solid #fff; padding: 12px 25px; 
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            box-shadow: 0 0 15px #ff0000; transition: 0.3s;
        }
        .menu-btn:hover { background: #cc0000; }

        /* ჩამოსაშლელი სია - ნამდვილი Dropdown */
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 0;
            background: #0a0a0a; min-width: 280px; border: 2px solid #ff0000; 
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.5); z-index: 2000;
        }
        .dropdown:hover .dropdown-content { display: block; }

        .room-link { 
            padding: 18px 25px; color: #fff; display: block; text-decoration: none; 
            border-bottom: 1px solid #222; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .room-link:hover { background: #ff0000; color: #fff; padding-left: 35px; }

        /* ჩატის მხარე */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: #000; }
        
        #room-title { 
            padding: 15px; background: #111; color: #ff0000; text-align: center; 
            font-size: 22px; border-bottom: 2px solid #222; text-transform: uppercase;
        }

        #chat-box { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; font-size: 22px; }
        
        .msg { border-bottom: 1px solid #1a0000; padding-bottom: 10px; color: #eee; }
        .u-name { color: #ff0000; font-weight: bold; margin-right: 15px; text-shadow: 0 0 5px rgba(255,0,0,0.3); }

        /* საწერი ველი */
        .input-area { background: #000; padding: 30px; display: flex; gap: 20px; border-top: 4px solid #ff0000; }
        input { 
            flex: 1; background: #0a0a0a; border: 2px solid #ff0000; border-radius: 8px; 
            padding: 20px; color: #fff; outline: none; font-size: 20px;
        }
        
        button#sendBtn { 
            background: #ff0000; color: #fff; border: none; border-radius: 8px; 
            padding: 0 45px; cursor: pointer; font-weight: bold; font-size: 22px; 
            box-shadow: 0 0 15px #ff0000; transition: 0.2s;
        }
        button#sendBtn:hover { background: #cc0000; transform: translateY(-2px); }
    </style>
</head>
<body>

<header>
    <div class="dropdown">
        <button class="menu-btn">🚪 ოთახები ▼</button>
        <div class="dropdown-content">
            <div class="room-link" onclick="changeRoom('კაფე-ბარი')">🍷 კაფე-ბარი</div>
            <div class="room-link" onclick="changeRoom('ვიპ საუბრები')">👑 ვიპ საუბრები</div>
            <div class="room-link" onclick="changeRoom('გამოძიება')">🔍 გამოძიება</div>
            <div class="room-link" onclick="changeRoom('შიფროგრამა')">📟 შიფროგრამა</div>
            <div class="room-link" onclick="changeRoom('ვიქტორინა')">❓ ვიქტორინა</div>
            <div class="room-link" onclick="changeRoom('ჩამოხრჩობანა')">💀 ჩამოხრჩობანა</div>
            <div class="room-link" onclick="changeRoom('მაფიის ღამე')">🌑 მაფიის ღამე</div>
            <div class="room-link" onclick="changeRoom('ჯოკერი')">🃏 ჯოკერი</div>
            <div class="room-link" onclick="changeRoom('ნარდი')">🎲 ნარდი</div>
            <div class="room-link" onclick="changeRoom('მუსიკა')">🎵 მუსიკა</div>
            <div class="room-link" onclick="changeRoom('იუმორი')">😂 იუმორი</div>
            <div class="room-link" onclick="changeRoom('ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
            <div class="room-link" onclick="changeRoom('დახმარება')">🆘 დახმარება</div>
            <div class="room-link" onclick="changeRoom('ფორუმი')">📝 ფორუმი</div>
            <a href="index.html" class="room-link" style="color: #666;">🚪 გასვლა</a>
        </div>
    </div>
    <div class="logo">KAIFMANIA</div>
    <div style="width: 100px;"></div>
</header>

<div id="main-chat">
    <div id="room-title">ოთახი: <span id="r-name">კაფე-ბარი</span></div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="დაწერე რამე..." autocomplete="off">
        <button id="sendBtn" onclick="sendMsg()">გაგზავნა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');
    let currentRoom = "კაფე-ბარი";

    if (!myNick) { window.location.href = "index.html"; }

    async function changeRoom(roomName) {
        currentRoom = roomName;
        document.getElementById("r-name").innerText = roomName;
        loadMsgs();
    }

    async function loadMsgs() {
        const { data } = await _s.from('messages').select('*').eq('room', currentRoom).order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        if (data) {
            data.forEach(m => {
                box.innerHTML += `<div class="msg"><span class="u-name">${m.username}:</span><span>${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        await _s.from('messages').insert([{ username: myNick, text: input.value.trim(), room: currentRoom }]);
        input.value = '';
    }

    _s.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
        if(p.new.room === currentRoom) loadMsgs();
    }).subscribe();

    loadMsgs();
    document.getElementById("msgInput").addEventListener("keyup", (e) => { if (e.key === "Enter") sendMsg(); });
</script>
</body>
</html>
