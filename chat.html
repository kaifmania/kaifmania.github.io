<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>✨ კაიფმანია · ქართული ჩათი ✨</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7a1fc8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Noto+Sans+Georgian:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Inter', 'Noto Sans Georgian', system-ui, -apple-system, sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.2s ease;
  }

  /* ===== DYNAMIC THEME SYSTEM (FIXED & PRETTY) ===== */
  body.night {
    --bg-gradient: radial-gradient(circle at 10% 20%, #0f0c1f, #03010a);
    --bg-surface: #141024;
    --bg-elevated: #1e1a32;
    --border: rgba(160, 120, 255, 0.18);
    --text-primary: #f0eaff;
    --text-secondary: #b9a9f0;
    --text-muted: #7a6a9e;
    --accent: #c084fc;
    --accent-glow: rgba(192, 132, 252, 0.3);
    --accent-gradient: linear-gradient(135deg, #a855f7, #d946ef);
    --bubble-mine: rgba(168, 85, 247, 0.15);
    --bubble-other: #25223c;
    --online: #10b981;
  }

  body.day {
    --bg-gradient: radial-gradient(circle at 10% 20%, #faf5ff, #f3e8ff);
    --bg-surface: #ffffff;
    --bg-elevated: #f9f5ff;
    --border: rgba(139, 92, 246, 0.2);
    --text-primary: #1f1a2e;
    --text-secondary: #6b21a5;
    --text-muted: #9b8bb5;
    --accent: #8b5cf6;
    --accent-glow: rgba(139, 92, 246, 0.15);
    --accent-gradient: linear-gradient(135deg, #8b5cf6, #c084fc);
    --bubble-mine: #ede9fe;
    --bubble-other: #ffffff;
    --online: #059669;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; opacity: 0.5; }

  /* LAYOUT */
  #topnav {
    background: var(--bg-surface);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 8px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    z-index: 20;
  }
  #topnav::-webkit-scrollbar { display: none; }
  
  .nav-btn {
    background: transparent;
    border: none;
    padding: 8px 14px;
    border-radius: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-btn i { font-size: 16px; }
  .nav-btn.active, .nav-btn:hover {
    background: var(--accent-gradient);
    color: white;
    box-shadow: 0 2px 8px var(--accent-glow);
  }
  .nav-spacer { flex: 1; }
  .badge {
    background: #ff4d4d;
    color: white;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: bold;
    margin-left: 5px;
  }

  #app {
    display: flex;
    flex: 1;
    min-height: 0;
    position: relative;
  }

  /* SIDEBAR */
  #sidebar {
    width: 280px;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    z-index: 15;
  }
  @media (max-width: 680px) {
    #sidebar { position: fixed; top: 60px; bottom: 0; left: 0; transform: translateX(-100%); width: 80%; border-radius: 0 20px 20px 0; }
    #sidebar.mob-open { transform: translateX(0); }
  }

  .sb-header {
    padding: 20px 20px 12px;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--accent);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sb-body { flex: 1; overflow-y: auto; padding: 8px 12px; }
  
  .room-item, .list-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .room-item:hover, .list-item:hover { background: var(--bg-elevated); border-color: var(--border); transform: translateX(4px); }
  .room-item.active { background: var(--accent-gradient); color: white; box-shadow: 0 4px 12px var(--accent-glow); border: none; }
  .room-icon { font-size: 24px; width: 40px; text-align: center; }
  .room-name { font-weight: 600; font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .game-badge, .forum-badge { font-size: 9px; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 20px; }

  /* MAIN CHAT */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-gradient);
  }
  .chat-header {
    padding: 14px 24px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    backdrop-filter: blur(12px);
  }
  .chat-title { font-size: 18px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .chat-sub { font-size: 12px; color: var(--text-muted); margin-left: auto; background: var(--bg-elevated); padding: 4px 12px; border-radius: 20px; }

  /* MESSAGES (CACHE FIXED) */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: fadeSlideUp 0.3s ease;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .avatar {
    width: 42px;
    height: 42px;
    background: var(--bg-elevated);
    border-radius: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    border: 2px solid var(--border);
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .msg-content { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
  .msg-bubble {
    background: var(--bubble-other);
    border-radius: 24px;
    padding: 10px 18px;
    font-size: 14px;
    line-height: 1.45;
    border: 1px solid var(--border);
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  .msg-bubble.mine { background: var(--bubble-mine); border-bottom-right-radius: 4px; }
  .msg-bubble:not(.mine) { border-bottom-left-radius: 4px; }
  .msg-nick { font-weight: 700; font-size: 13px; color: var(--accent); cursor: pointer; }
  .msg-time { font-size: 10px; color: var(--text-muted); margin-left: 8px; }

  /* CHAT BAR */
  .chat-bar {
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    backdrop-filter: blur(16px);
  }
  #msgInput {
    flex: 1;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 12px 20px;
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    transition: 0.2s;
  }
  #msgInput:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  .send-btn {
    background: var(--accent-gradient);
    border: none;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px var(--accent-glow); }

  /* GAME & FORUM PLACEHOLDER */
  #gameRoomPlaceholder, #forumRoomPlaceholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
    padding: 20px;
  }
  .grp-icon, .frp-icon { font-size: 80px; filter: drop-shadow(0 0 15px var(--accent)); }
  .grp-play-btn, .frp-open-btn {
    background: var(--accent-gradient);
    border: none;
    padding: 12px 28px;
    border-radius: 40px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    font-size: 16px;
  }

  /* MODALS & GALLERY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg-surface);
    border-radius: 32px;
    width: 90%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }
  .gal-item {
    aspect-ratio: 1;
    border-radius: 20px;
    overflow: hidden;
    background: var(--bg-elevated);
    cursor: pointer;
    border: 1px solid var(--border);
    transition: 0.2s;
  }
  .gal-item img { width: 100%; height: 100%; object-fit: cover; }
  .color-swatch-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
  .color-swatch { width: 48px; height: 48px; border-radius: 20px; cursor: pointer; border: 2px solid transparent; transition: 0.1s; }
  .color-swatch.active { border-color: white; box-shadow: 0 0 0 2px var(--accent); transform: scale(1.05); }
  
  /* DM BOX */
  #dmBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 360px;
    height: 500px;
    background: var(--bg-surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    display: none;
    flex-direction: column;
    z-index: 200;
    box-shadow: 0 20px 35px -10px black;
  }
  #dmBox.open { display: flex; }
  .dm-head { padding: 16px; background: var(--accent-gradient); color: white; border-radius: 24px 24px 0 0; display: flex; align-items: center; gap: 10px; }
  
  /* UTILS */
  .hidden { display: none !important; }
  button { background: none; border: none; cursor: pointer; }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
    font-weight: 600;
    z-index: 9999;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; bottom: 0; }
    to { opacity: 1; bottom: 30px; }
  }
</style>
</head>
<body class="night">

<nav id="topnav">
  <div class="nav-logo" onclick="toggleSidebar()"><i class="fas fa-feather-alt"></i></div>
  <button class="nav-btn active" id="navRooms" onclick="showPanel('rooms')"><i class="fas fa-comments"></i> ოთახები</button>
  <button class="nav-btn" id="navFriends" onclick="showPanel('friends')"><i class="fas fa-user-friends"></i> მეგობრები</button>
  <button class="nav-btn" id="navUsers" onclick="showPanel('users')"><i class="fas fa-globe"></i> ყველა</button>
  <button class="nav-btn" id="navOnline" onclick="showPanel('online')"><i class="fas fa-circle"></i> ონლაინი</button>
  <button class="nav-btn" id="navDM" onclick="openDMList()"><i class="fas fa-envelope"></i> პირადი</button>
  <div class="nav-spacer"></div>
  <button class="nav-btn" onclick="openMyProfile()"><i class="fas fa-user-astronaut"></i></button>
  <button class="nav-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
  <button class="nav-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
</nav>

<div id="app">
  <div id="sidebar">
    <div id="panelRooms"><div class="sb-header"><i class="fas fa-hashtag"></i> ოთახები</div><div class="sb-body" id="roomList"></div></div>
    <div id="panelFriends" class="hidden"><div class="sb-header"><i class="fas fa-heart"></i> მეგობრები</div><div class="sb-body" id="friendsList"></div></div>
    <div id="panelUsers" class="hidden"><div class="sb-header"><i class="fas fa-users"></i> მომხმარებლები</div><div class="sb-body"><input class="search-box" placeholder="🔍 ძებნა..." id="userSearch" oninput="filterUsers()"><div id="usersListEl"></div></div></div>
    <div id="panelOnline" class="hidden"><div class="sb-header"><i class="fas fa-wifi"></i> ონლაინი</div><div class="sb-body" id="onlineListEl"></div></div>
  </div>

  <div id="main">
    <div class="chat-header"><div style="font-size:28px" id="roomIcon">💬</div><div class="chat-title" id="roomTitle">კაფე-ბარი</div><div class="chat-sub" id="onlineCnt">● 0 ონლაინი</div></div>
    <div id="messages"></div>
    <div id="gameRoomPlaceholder" style="display: none;"><div class="grp-icon">🎮</div><div class="grp-title">თამაში</div><button class="grp-play-btn">თამაშის დაწყება</button></div>
    <div id="forumRoomPlaceholder" style="display: none;"><div class="frp-icon">📋</div><div class="frp-title">ფორუმი</div><button class="frp-open-btn">გახსნა</button></div>
    <div class="chat-bar"><input id="msgInput" placeholder="დაწერე შეტყობინება..."><button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div>
  </div>
</div>

<!-- Profile Modal -->
<div class="overlay" id="profileOverlay"><div class="modal"><button class="modal-x" onclick="closeModal('profileOverlay')">✕</button><div class="modal-title" id="profTitle">პროფილი</div><div id="tabInfo">...</div><div class="gallery-tabs"><button class="gtab" onclick="switchGalleryTab('gallery')">📸 ალბომი</button><button class="gtab" onclick="switchGalleryTab('appear')">🎨 გარეგნობა</button></div><div id="tabGallery" class="hidden"><div class="gallery-grid" id="galGrid"></div></div><div id="tabAppear" class="hidden"><div class="color-swatch-row" id="bgSwatches"></div><div class="color-swatch-row" id="accentSwatches"></div><button onclick="resetColors()">გადაყენება</button></div></div></div>

<div id="dmBox"><div class="dm-head"><div class="dm-title" id="dmTitle">პირადი</div><button onclick="closeDM()">✕</button></div><div id="dmMsgs"></div><div class="dm-bar"><input id="dmInput" placeholder="შეტყობინება..."><button onclick="sendDM()"><i class="fas fa-paper-plane"></i></button></div></div>

<script>
  const supabaseUrl = "https://vjstuyxuhshsouqsnvxp.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqc3R1eXh1aHNoc291cXNudnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDExOTQsImV4cCI6MjA5MDk3NzE5NH0.sVzu2GTaMwskp8lGb0C9F15Iy7RKT1FxQrwd5JgHquE";
  const sb = supabase.createClient(supabaseUrl, supabaseKey);

  let ME = null, MYPROF = null, ROOM = 1;
  let allUsers = [], myFriends = [];
  let msgCache = {}; // 🔥 FIX: Messages CACHE so they don't disappear

  // Helper
  function toast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }

  // Load & Cache messages
  async function loadMessages(roomId) {
    const container = document.getElementById('messages');
    if (!container) return;
    
    // 🔥 CACHE HIT: Show from cache first
    if (msgCache[roomId]) {
      container.innerHTML = '';
      msgCache[roomId].forEach(m => appendMsg(m, false));
      container.scrollTop = container.scrollHeight;
    }
    
    // Fetch fresh from DB
    const { data } = await sb.from('messages').select('*, profiles(username, role, avatar_url)').eq('room_id', roomId).order('created_at', { ascending: true }).limit(100);
    if (data) {
      msgCache[roomId] = data;
      container.innerHTML = '';
      data.forEach(m => appendMsg(m, true));
      container.scrollTop = container.scrollHeight;
    }
    
    // Subscribe to new messages (real-time)
    if (window.msgChannel) sb.removeChannel(window.msgChannel);
    window.msgChannel = sb.channel(`room-${roomId}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${roomId}` }, async (payload) => {
      const { data: newMsg } = await sb.from('messages').select('*, profiles(username, role, avatar_url)').eq('id', payload.new.id).single();
      if (newMsg) {
        if (!msgCache[roomId]) msgCache[roomId] = [];
        msgCache[roomId].push(newMsg);
        appendMsg(newMsg, true);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
      }
    }).subscribe();
  }

  function appendMsg(m, scroll) {
    const container = document.getElementById('messages');
    const isMe = (m.user_id === ME?.id);
    const div = document.createElement('div');
    div.className = 'msg-row';
    div.innerHTML = `
      <div class="avatar" onclick="openProfile('${m.user_id}')">${m.profiles?.avatar_url ? `<img src="${m.profiles.avatar_url}">` : '😊'}</div>
      <div class="msg-content">
        <div><span class="msg-nick" onclick="openProfile('${m.user_id}')">${escapeHtml(m.profiles?.username || '?')}</span><span class="msg-time">${new Date(m.created_at).toLocaleTimeString()}</span></div>
        <div class="msg-bubble ${isMe ? 'mine' : ''}">${escapeHtml(m.content)}</div>
      </div>
    `;
    container.appendChild(div);
    if (scroll) container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    let txt = document.getElementById('msgInput').value.trim();
    if (!txt) return;
    document.getElementById('msgInput').value = '';
    // Optimistic UI update (Cache)
    const tempMsg = { id: Date.now(), user_id: ME.id, content: txt, created_at: new Date(), profiles: MYPROF };
    if (!msgCache[ROOM]) msgCache[ROOM] = [];
    msgCache[ROOM].push(tempMsg);
    appendMsg(tempMsg, true);
    // Send to DB
    await sb.from('messages').insert({ room_id: ROOM, user_id: ME.id, content: txt });
  }

  // Rooms
  const ROOMS = [{ id: 1, icon: '💬', name: 'კაფე-ბარი' }, { id: 2, icon: '🔐', name: 'შიფროგრამა' }, { id: 3, icon: '🏆', name: 'ვიქტორინა' }, { id: 4, icon: '🎵', name: 'მუსიკა' }];
  function buildRooms() {
    const el = document.getElementById('roomList');
    ROOMS.forEach(r => {
      const btn = document.createElement('div'); btn.className = 'room-item'; btn.innerHTML = `<div class="room-icon">${r.icon}</div><div class="room-name">${r.name}</div>`;
      btn.onclick = () => { ROOM = r.id; document.getElementById('roomTitle').innerText = r.name; document.getElementById('roomIcon').innerText = r.icon; loadMessages(r.id); };
      el.appendChild(btn);
    });
  }

  // Users & Auth
  async function init() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) { location.href = 'index.html'; return; }
    ME = user;
    const { data: prof } = await sb.from('profiles').select('*').eq('id', ME.id).single();
    MYPROF = prof;
    if (!MYPROF) await sb.from('profiles').insert({ id: ME.id, username: 'მომხმარებელი' });
    buildRooms();
    loadMessages(1);
    loadAllUsers();
    setInterval(() => sb.from('profiles').update({ last_seen: new Date() }).eq('id', ME.id), 30000);
  }

  async function loadAllUsers() { const { data } = await sb.from('profiles').select('*'); allUsers = data || []; renderUserLists(); }
  function renderUserLists() { const container = document.getElementById('usersListEl'); if (!container) return; container.innerHTML = allUsers.map(u => `<div class="list-item" onclick="openProfile('${u.id}')"><div class="avatar">😊</div><div>${escapeHtml(u.username)}</div></div>`).join(''); }
  function openProfile(id) { document.getElementById('profileOverlay').classList.add('open'); document.getElementById('profTitle').innerText = 'პროფილი'; }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('mob-open'); }
  function openMyProfile() { openProfile(ME.id); }
  function toggleTheme() { document.body.classList.toggle('night'); document.body.classList.toggle('day'); localStorage.setItem('theme', document.body.className); }
  function showPanel(name) { ['rooms','friends','users','online'].forEach(p => document.getElementById(`panel${p.charAt(0).toUpperCase() + p.slice(1)}`).classList.toggle('hidden', p !== name)); document.getElementById('sidebar').classList.remove('mob-open'); }
  function filterUsers() { const q = document.getElementById('userSearch').value.toLowerCase(); document.querySelectorAll('#usersListEl .list-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none'); }
  function escapeHtml(str) { return (str || '').replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }
  async function logout() { await sb.auth.signOut(); location.href = 'index.html'; }
  
  // Gallery & Appearance Stubs
  function switchGalleryTab(tab) { document.getElementById('tabGallery').classList.toggle('hidden', tab !== 'gallery'); document.getElementById('tabAppear').classList.toggle('hidden', tab !== 'appear'); }
  function resetColors() { toast('🎨 ფერები განახლდა'); }
  
  // DM Stubs
  function openDMList() { toast('📩 პირადი შეტყობინებები მალე'); }
  function closeDM() { document.getElementById('dmBox').classList.remove('open'); }
  function sendDM() { toast('DM ფუნქცია აქტიურია'); }
  
  // Apply saved theme
  if (localStorage.getItem('theme') === 'day') document.body.classList.add('day'); else document.body.classList.add('night');
  init();
</script>
</body>
</html>
