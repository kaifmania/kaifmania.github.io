<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🥀 კაიფმანია · სრული ვერსია</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:system-ui,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:.3s;}
    body.dark{--bg:#0a0a0a;--panel:#141414;--border:#5c0a1a;--text:#e6d5b8;--text2:#c9a87c;--accent:#8b1a2b;--input:#1e1e1e;}
    body.light{--bg:#f5efe6;--panel:#fff;--border:#8b1a2b;--text:#2c1810;--text2:#6b3a2a;--accent:#8b1a2b;--input:#f0e8dd;}
    body{background:var(--bg);color:var(--text);}
    .top-nav{background:var(--panel);border-bottom:2px solid var(--border);display:flex;gap:6px;padding:8px 12px;overflow-x:auto;flex-shrink:0;}
    .nav-btn{background:transparent;border:1px solid var(--border);border-radius:24px;padding:6px 16px;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;}
    .nav-btn.active{background:var(--accent);color:#fff;}
    .logo{font-size:24px;cursor:pointer;}
    .app{display:flex;flex:1;overflow:hidden;}
    .sidebar{width:280px;background:var(--panel);border-right:2px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
    .sidebar-header{padding:12px;font-size:10px;color:var(--text2);border-bottom:1px solid var(--border);}
    .user-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(92,10,26,0.2);display:flex;align-items:center;gap:10px;}
    .user-item:hover{background:rgba(139,26,43,0.2);}
    .online-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;display:inline-block;margin-left:6px;}
    .friend-request-btn{background:var(--accent);border:none;border-radius:16px;padding:4px 12px;color:white;cursor:pointer;font-size:11px;}
    .chat-area{flex:1;display:flex;flex-direction:column;}
    .chat-header{background:var(--panel);padding:12px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    .messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
    .msg{max-width:75%;padding:8px 12px;border-radius:16px;background:var(--input);border:1px solid var(--border);position:relative;}
    .msg-mine{align-self:flex-end;background:var(--accent);color:#fff;}
    .msg-name{font-size:10px;font-weight:bold;margin-bottom:4px;}
    .msg-time{font-size:9px;color:var(--text2);margin-top:4px;}
    .msg-actions{display:flex;gap:6px;margin-top:4px;}
    .react-btn{background:transparent;border:none;font-size:14px;cursor:pointer;padding:0 4px;}
    .reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
    .reaction{background:var(--input);border-radius:12px;padding:2px 6px;font-size:11px;cursor:pointer;}
    .chat-input{background:var(--panel);padding:12px;display:flex;flex-direction:column;gap:8px;border-top:2px solid var(--border);}
    .input-row{display:flex;gap:8px;}
    .input-row input{flex:1;background:var(--input);border:1px solid var(--border);border-radius:24px;padding:10px 16px;color:var(--text);}
    .input-row button{background:var(--accent);border:none;border-radius:24px;padding:0 20px;color:#fff;cursor:pointer;}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;}
    .tool-btn{background:var(--input);border:1px solid var(--border);border-radius:16px;padding:4px 10px;cursor:pointer;font-size:12px;}
    .hearts{position:fixed;bottom:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
    .heart{position:absolute;animation:floatHeart linear forwards;font-size:20px;}
    @keyframes floatHeart{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(-100vh) rotate(360deg);opacity:0;}}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:10000;}
    .modal.open{display:flex;}
    .modal-content{background:var(--panel);border:2px solid var(--border);border-radius:20px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;}
    .inp{width:100%;padding:10px;background:var(--input);border:1px solid var(--border);border-radius:12px;color:var(--text);margin-bottom:12px;}
    .btn{background:var(--accent);border:none;border-radius:12px;padding:10px;color:#fff;cursor:pointer;width:100%;margin-bottom:8px;}
    .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
    .gallery-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;cursor:pointer;border:1px solid var(--border);}
    .album-list{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .album-chip{background:var(--input);border-radius:16px;padding:4px 12px;font-size:12px;cursor:pointer;}
    .album-chip.active{background:var(--accent);color:#fff;}
    .emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .emoji-item{font-size:24px;cursor:pointer;background:var(--input);border-radius:12px;padding:6px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;}
    audio{height:32px;border-radius:16px;max-width:200px;}
    .request-badge{background:#ff4444;color:white;border-radius:10px;padding:2px 6px;font-size:10px;margin-left:6px;}
  </style>
</head>
<body class="dark">

<div class="top-nav">
  <span class="logo" onclick="toggleSidebar()">🥀</span>
  <button class="nav-btn active" onclick="showPanel('rooms')">💬 ოთახები</button>
  <button class="nav-btn" onclick="showPanel('friends')">👥 მეგობრები</button>
  <button class="nav-btn" onclick="showPanel('users')">🌐 მომხმარებლები</button>
  <button class="nav-btn" onclick="showPanel('online')">🟢 ონლაინი</button>
  <button class="nav-btn" onclick="showPanel('requests')">📨 მოთხოვნები</button>
  <button class="nav-btn" onclick="openPMList()">✉️ PM</button>
  <button class="nav-btn" onclick="openAlbum()">📸 ალბომი</button>
  <button class="nav-btn" onclick="openEmojiManager()">😊 სმაილები</button>
  <button class="nav-btn" onclick="openThemeModal()">🎨 თემა</button>
  <button class="nav-btn" onclick="openProfile()">👤</button>
</div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">📌 ოთახები</div>
    <div id="roomsList"></div>
    <div class="sidebar-header" id="friendsHeader" style="display:none">👥 ჩემი მეგობრები</div>
    <div id="friendsList" style="display:none"></div>
    <div class="sidebar-header" id="usersHeader" style="display:none">🌐 ყველა მომხმარებელი</div>
    <div id="usersList" style="display:none"></div>
    <div class="sidebar-header" id="onlineHeader" style="display:none">🟢 ონლაინი</div>
    <div id="onlineList" style="display:none"></div>
    <div class="sidebar-header" id="requestsHeader" style="display:none">📨 მეგობრის მოთხოვნები</div>
    <div id="requestsList" style="display:none"></div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <span class="chat-title" id="roomName">💬 კაფე-ბარი</span>
      <span id="onlineCount" style="font-size:12px">● 0 ონლაინი</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input">
      <div class="toolbar">
        <button class="tool-btn" onclick="formatText('bold')"><b>B</b></button>
        <button class="tool-btn" onclick="formatText('italic')"><i>I</i></button>
        <button class="tool-btn" onclick="formatText('underline')"><u>U</u></button>
        <input type="color" id="textColorPicker" value="#e6d5b8" style="width:30px;height:30px;border-radius:8px;">
        <button class="tool-btn" onclick="toggleChatEmoji()">😊</button>
        <button class="tool-btn" id="voiceBtn" onclick="startVoice()">🎤</button>
      </div>
      <div class="input-row">
        <input type="text" id="msgInput" placeholder="დაწერე მესიჯი...">
        <button onclick="sendMessage()">✈️</button>
      </div>
      <div id="voicePreview" style="display:none; gap:8px; align-items:center">
        <audio id="voiceAudio" controls></audio>
        <button class="tool-btn" onclick="sendVoice()">📤</button>
        <button class="tool-btn" onclick="cancelVoice()">✕</button>
      </div>
      <div id="chatEmojiPanel" class="emoji-grid" style="display:none"></div>
    </div>
  </div>
</div>

<div class="hearts" id="hearts"></div>

<!-- პროფილი -->
<div class="modal" id="profileModal">
  <div class="modal-content">
    <h3>👤 პროფილი</h3>
    <input class="inp" id="profileName" placeholder="სახელი">
    <input class="inp" id="profileStatus" placeholder="სტატუსი">
    <input class="inp" id="profileEmotion" placeholder="😊 ემოცია">
    <textarea class="inp" id="profileComment" placeholder="კომენტარი" rows="2"></textarea>
    <button class="btn" onclick="saveProfile()">💾 შენახვა</button>
    <button class="btn" onclick="closeModal('profileModal')">✕</button>
  </div>
</div>

<!-- PM -->
<div class="modal" id="pmModal">
  <div class="modal-content">
    <h3 id="pmTitle">✉️ პირადი შეტყობინება</h3>
    <div id="pmMessages" style="max-height:300px;overflow-y:auto;margin-bottom:12px"></div>
    <div class="toolbar" style="margin-bottom:8px">
      <button class="tool-btn" onclick="togglePMEmoji()">😊</button>
      <button class="tool-btn" id="pmVoiceBtn" onclick="startPMVoice()">🎤</button>
    </div>
    <input class="inp" id="pmInput" placeholder="დაწერე...">
    <div id="pmVoicePreview" style="display:none; gap:8px; margin-bottom:8px">
      <audio id="pmVoiceAudio" controls></audio>
      <button class="tool-btn" onclick="sendPMVoice()">📤</button>
      <button class="tool-btn" onclick="cancelPMVoice()">✕</button>
    </div>
    <button class="btn" onclick="sendPM()">📤 გაგზავნა</button>
    <button class="btn" onclick="closeModal('pmModal')">✕</button>
    <div id="pmEmojiPanel" class="emoji-grid" style="display:none"></div>
  </div>
</div>

<!-- ალბომი -->
<div class="modal" id="albumModal">
  <div class="modal-content">
    <h3>📸 ალბომი</h3>
    <div class="album-list" id="albumList"></div>
    <div class="gallery-grid" id="galleryGrid"></div>
    <button class="btn" onclick="uploadPhoto()">📤 ატვირთვა</button>
    <button class="btn" onclick="closeModal('albumModal')">✕</button>
  </div>
  <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoUpload(event)">
</div>

<!-- სმაილების მართვა -->
<div class="modal" id="emojiManagerModal">
  <div class="modal-content">
    <h3>😊 სმაილების მართვა</h3>
    <div id="emojiList" class="emoji-grid"></div>
    <div style="display:flex; gap:8px; margin-top:12px">
      <input type="text" id="newEmoji" placeholder="😊" maxlength="2" style="width:60px; text-align:center">
      <button class="btn" onclick="addEmoji()" style="width:auto; padding:10px 20px">➕ დამატება</button>
    </div>
    <button class="btn" onclick="closeModal('emojiManagerModal')">✕</button>
  </div>
</div>

<!-- თემა -->
<div class="modal" id="themeModal">
  <div class="modal-content">
    <h3>🎨 თემა</h3>
    <button class="btn" onclick="setTheme('dark')">🌙 ღამე</button>
    <button class="btn" onclick="setTheme('light')">☀️ დღე</button>
    <input type="color" id="accentColor" value="#8b1a2b" style="width:100%; margin-bottom:12px">
    <input type="color" id="bgColor" value="#0a0a0a" style="width:100%; margin-bottom:12px">
    <button class="btn" onclick="applyCustomTheme()">🎨 გამოყენება</button>
    <button class="btn" onclick="closeModal('themeModal')">✕</button>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const ROOMS = [
    { id:1, icon:"💬", name:"კაფე-ბარი" }, { id:2, icon:"🔐", name:"შიფროგრამა" }, { id:3, icon:"🏆", name:"ვიქტორინა" },
    { id:4, icon:"🪢", name:"ჩამოხრჩობა" }, { id:5, icon:"🎵", name:"მუსიკ კლაბი" }, { id:6, icon:"💜", name:"სოული კორნერი" },
    { id:7, icon:"🌊", name:"ოშენ ვაიბი" }, { id:8, icon:"🦋", name:"ადმინისტრაცია" }, { id:9, icon:"🧠", name:"ბრეინ ზონა" },
    { id:10, icon:"🌸", name:"სოფთ ჰარმონი" }, { id:11, icon:"💡", name:"დახმარება" }, { id:12, icon:"🔥", name:"კაიფ ჰაბი" }
  ];

  let currentUser = null, currentRoom = 1, allUsers = [], onlineUsers = new Set(), currentPMUser = null;
  let myFriends = [], friendRequests = [];
  let mediaRecorder = null, audioChunks = [], voiceBlob = null, isRecording = false;
  let customEmojis = ["😊","❤️","😂","🔥","💜","🥀","👍","😍","🎉","😢"];

  async function init() {
    const { data:{user} } = await supabase.auth.getUser();
    if(!user){ 
      await supabase.auth.signUp({ email:`user_${Date.now()}@temp.com`, password:"123456789" }); 
      const { data:{user:u} } = await supabase.auth.getUser(); 
      currentUser = u; 
      await supabase.from("profiles").upsert({ id:u.id, username:`მოთამაშე_${Math.floor(Math.random()*1000)}` });
    } else { currentUser = user; }
    
    const { data:prof } = await supabase.from("profiles").select("*").eq("id",currentUser.id).single();
    if(prof){ 
      document.getElementById("profileName").value = prof.username || ""; 
      document.getElementById("profileStatus").value = prof.status || ""; 
      document.getElementById("profileEmotion").value = prof.emotion || "😊"; 
      document.getElementById("profileComment").value = prof.comment || ""; 
    }
    await loadUsers(); 
    await loadFriends(); 
    await loadMessages(); 
    renderRooms(); 
    startHeartAnimation(); 
    updateOnlineStatus();
    setInterval(updateOnlineStatus, 30000); 
    setInterval(loadUsers, 45000); 
    loadEmojis();
  }

  async function loadEmojis(){ 
    const {data} = await supabase.from("global_emojis").select("*"); 
    if(data && data.length) customEmojis = data.map(e=>e.url); 
    renderEmojiPanels(); 
  }
  
  async function renderEmojiPanels(){ 
    const chatPanel = document.getElementById("chatEmojiPanel"); 
    const pmPanel = document.getElementById("pmEmojiPanel"); 
    const managerList = document.getElementById("emojiList");
    
    if(chatPanel){ 
      chatPanel.innerHTML = ""; 
      customEmojis.forEach(e=>{ 
        const d = document.createElement("div"); 
        d.className = "emoji-item"; 
        d.textContent = e; 
        d.onclick = () => insertEmoji(e); 
        chatPanel.appendChild(d); 
      }); 
    }
    if(pmPanel){ 
      pmPanel.innerHTML = ""; 
      customEmojis.forEach(e=>{ 
        const d = document.createElement("div"); 
        d.className = "emoji-item"; 
        d.textContent = e; 
        d.onclick = () => insertPMEmoji(e); 
        pmPanel.appendChild(d); 
      }); 
    }
    if(managerList && (currentUser?.role === "admin" || currentUser?.role === "founder")){ 
      managerList.innerHTML = ""; 
      customEmojis.forEach(e=>{ 
        const d = document.createElement("div"); 
        d.className = "emoji-item"; 
        d.textContent = e; 
        d.style.position = "relative"; 
        const del = document.createElement("button"); 
        del.textContent = "🗑"; 
        del.style.position = "absolute"; 
        del.style.background = "red"; 
        del.style.borderRadius = "50%"; 
        del.style.width = "16px"; 
        del.style.height = "16px"; 
        del.style.fontSize = "9px"; 
        del.onclick = (ev) => { ev.stopPropagation(); removeEmoji(e); }; 
        d.appendChild(del); 
        managerList.appendChild(d); 
      }); 
    }
  }
  
  async function addEmoji(){ 
    if(currentUser?.role !== "admin" && currentUser?.role !== "founder"){ alert("მხოლოდ ადმინს/დამფუძნებელს შეუძლია"); return; } 
    const em = document.getElementById("newEmoji").value.trim(); 
    if(!em) return; 
    await supabase.from("global_emojis").insert({ url:em }); 
    customEmojis.push(em); 
    await renderEmojiPanels(); 
    document.getElementById("newEmoji").value = ""; 
  }
  
  async function removeEmoji(emoji){ 
    if(currentUser?.role !== "admin" && currentUser?.role !== "founder"){ alert("მხოლოდ ადმინს/დამფუძნებელს შეუძლია"); return; } 
    await supabase.from("global_emojis").delete().eq("url",emoji); 
    customEmojis = customEmojis.filter(e=>e!==emoji); 
    await renderEmojiPanels(); 
  }
  
  function insertEmoji(e){ const inp = document.getElementById("msgInput"); inp.value += e; inp.focus(); }
  function insertPMEmoji(e){ const inp = document.getElementById("pmInput"); inp.value += e; inp.focus(); }
  function openEmojiManager(){ 
    if(currentUser?.role === "admin" || currentUser?.role === "founder") openModal("emojiManagerModal"); 
    else alert("მხოლოდ ადმინს/დამფუძნებელს შეუძლია სმაილების მართვა"); 
  }

  async function loadUsers(){ 
    const {data} = await supabase.from("profiles").select("*"); 
    allUsers = data || []; 
    onlineUsers.clear(); 
    const now = Date.now(); 
    allUsers.forEach(u => { if(u.last_seen && (now - new Date(u.last_seen).getTime() < 60000)) onlineUsers.add(u.id); }); 
    renderUsersList(); 
    renderFriendsList(); 
    renderOnlineList(); 
    document.getElementById("onlineCount").innerHTML = `● ${onlineUsers.size} ონლაინი`; 
  }
  
  async function loadFriends(){ 
    const {data: friendsData} = await supabase.from("friends").select("*").eq("user_id", currentUser.id).eq("status", "accepted");
    myFriends = friendsData?.map(f => f.friend_id) || [];
    const {data: requestsData} = await supabase.from("friends").select("*, profiles!friends_user_id_fkey(username, emotion)").eq("friend_id", currentUser.id).eq("status", "pending");
    friendRequests = requestsData || [];
    renderRequestsList();
  }
  
  async function sendFriendRequest(userId){ 
    await supabase.from("friends").insert({ user_id: currentUser.id, friend_id: userId, status: "pending" }); 
    alert("მოთხოვნა გაიგზავნა!"); 
  }
  
  async function acceptFriend(requestId, friendId){ 
    await supabase.from("friends").update({ status: "accepted" }).eq("id", requestId); 
    await supabase.from("friends").insert({ user_id: currentUser.id, friend_id: friendId, status: "accepted" }); 
    await loadFriends(); 
    await loadUsers(); 
  }
  
  async function declineFriend(requestId){ 
    await supabase.from("friends").delete().eq("id", requestId); 
    await loadFriends(); 
  }
  
  async function removeFriend(friendId){ 
    await supabase.from("friends").delete().eq("user_id", currentUser.id).eq("friend_id", friendId); 
    await supabase.from("friends").delete().eq("user_id", friendId).eq("friend_id", currentUser.id); 
    await loadFriends(); 
    await loadUsers(); 
  }
  
  function renderRequestsList(){ 
    const container = document.getElementById("requestsList"); 
    if(!container) return; 
    container.innerHTML = ""; 
    if(friendRequests.length === 0){ 
      container.innerHTML = '<div style="padding:12px; color:var(--text2)">ახალი მოთხოვნები არ არის</div>'; 
      return; 
    }
    friendRequests.forEach(req => { 
      const user = allUsers.find(u => u.id === req.user_id);
      const div = document.createElement("div"); 
      div.className = "user-item"; 
      div.innerHTML = `
        <span>${user?.emotion || "😊"}</span>
        <span style="flex:1">${user?.username || "?"}</span>
        <button class="friend-request-btn" onclick="acceptFriend('${req.id}', '${req.user_id}')">✅ დამატება</button>
        <button class="friend-request-btn" onclick="declineFriend('${req.id}')" style="background:#555">✕ უარი</button>
      `; 
      container.appendChild(div); 
    }); 
  }
  
  function renderUsersList(){ 
    const container = document.getElementById("usersList"); 
    if(!container) return; 
    container.innerHTML = ""; 
    allUsers.filter(u => u.id !== currentUser?.id).forEach(u => { 
      const isFriend = myFriends.includes(u.id);
      const div = document.createElement("div"); 
      div.className = "user-item"; 
      div.innerHTML = `
        <span>${u.emotion || "😊"}</span>
        <span style="flex:1">${u.username || "?"}</span>
        ${onlineUsers.has(u.id) ? '<span class="online-dot"></span>' : ''}
        ${isFriend ? 
          `<button class="friend-request-btn" onclick="removeFriend('${u.id}')" style="background:#555">💔 წაშლა</button>` : 
          `<button class="friend-request-btn" onclick="sendFriendRequest('${u.id}')">➕ დამატება</button>`
        }
        <button style="background:var(--accent);border:none;border-radius:12px;padding:4px 10px;color:white;cursor:pointer" onclick="openPM('${u.id}','${u.username}')">✉️</button>
      `; 
      container.appendChild(div); 
    }); 
  }
  
  function renderFriendsList(){ 
    const container = document.getElementById("friendsList"); 
    if(!container) return; 
    container.innerHTML = ""; 
    const friendsList = allUsers.filter(u => myFriends.includes(u.id));
    if(friendsList.length === 0){ 
      container.innerHTML = '<div style="padding:12px; color:var(--text2)">მეგობრები ჯერ არ გყავს</div>'; 
      return; 
    }
    friendsList.forEach(u => { 
      const div = document.createElement("div"); 
      div.className = "user-item"; 
      div.innerHTML = `
        <span>${u.emotion || "😊"}</span>
        <span style="flex:1">${u.username || "?"}</span>
        ${onlineUsers.has(u.id) ? '<span class="online-dot"></span>' : ''}
        <button style="background:var(--accent);border:none;border-radius:12px;padding:4px 10px;color:white;cursor:pointer" onclick="openPM('${u.id}','${u.username}')">✉️</button>
      `; 
      container.appendChild(div); 
    }); 
  }
  
  function renderOnlineList(){ 
    const container = document.getElementById("onlineList"); 
    if(!container) return; 
    container.innerHTML = ""; 
    const online = allUsers.filter(u => onlineUsers.has(u.id) && u.id !== currentUser?.id);
    online.forEach(u => { 
      const div = document.createElement("div"); 
      div.className = "user-item"; 
      div.innerHTML = `
        <span>${u.emotion || "😊"}</span>
        <span style="flex:1">${u.username || "?"}</span>
        <button style="background:var(--accent);border:none;border-radius:12px;padding:4px 10px;color:white;cursor:pointer" onclick="openPM('${u.id}','${u.username}')">✉️</button>
      `; 
      container.appendChild(div); 
    }); 
    if(online.length === 0) container.innerHTML = '<div style="padding:12px">ახლა არავინაა ონლაინში 🥀</div>'; 
  }
  
  function renderRooms(){ 
    const c = document.getElementById("roomsList"); 
    c.innerHTML = ""; 
    ROOMS.forEach(r => { 
      const d = document.createElement("div"); 
      d.className = "user-item"; 
      d.innerHTML = `${r.icon} ${r.name}`; 
      d.onclick = () => switchRoom(r.id, r.name); 
      c.appendChild(d); 
    }); 
  }
  
  function switchRoom(id, name){ 
    currentRoom = id; 
    document.getElementById("roomName").innerHTML = ROOMS.find(r => r.id === id)?.icon + " " + name; 
    loadMessages(); 
  }
  
  async function loadMessages(){ 
    if(!currentUser) return; 
    const {data} = await supabase.from("messages").select("*").eq("room_id", currentRoom).order("created_at", {ascending:true}); 
    const c = document.getElementById("messages"); 
    c.innerHTML = ""; 
    for(const msg of data || []){ 
      const user = allUsers.find(u => u.id === msg.user_id); 
      const isMine = msg.user_id === currentUser.id; 
      const date = new Date(msg.created_at).toLocaleTimeString(); 
      const div = document.createElement("div"); 
      div.className = "msg" + (isMine ? " msg-mine" : ""); 
      div.innerHTML = `
        <div class="msg-name">${user?.username || "?"}</div>
        <div>${formatText(msg.content)}</div>
        <div class="msg-time">${date}</div>
        <div class="msg-actions">
          <button class="react-btn" onclick="addReaction('${msg.id}','❤️')">❤️</button>
          <button class="react-btn" onclick="addReaction('${msg.id}','😂')">😂</button>
          <button class="react-btn" onclick="addReaction('${msg.id}','🔥')">🔥</button>
          <button class="react-btn" onclick="addReaction('${msg.id}','💜')">💜</button>
        </div>
        <div class="reactions" id="reactions-${msg.id}"></div>
      `; 
      c.appendChild(div); 
      await loadReactions(msg.id); 
    } 
    c.scrollTop = c.scrollHeight; 
  }
  
  async function addReaction(msgId, emoji){ 
    await supabase.from("message_reactions").insert({ message_id: msgId, user_id: currentUser.id, emoji: emoji }); 
    await loadReactions(msgId); 
  }
  
  async function loadReactions(msgId){ 
    const {data} = await supabase.from("message_reactions").select("*").eq("message_id", msgId); 
    const container = document.getElementById(`reactions-${msgId}`); 
    if(!container) return; 
    const grouped = {}; 
    data?.forEach(r => { if(!grouped[r.emoji]) grouped[r.emoji] = []; grouped[r.emoji].push(r); }); 
    container.innerHTML = ""; 
    Object.entries(grouped).forEach(([emoji, list]) => { 
      const chip = document.createElement("div"); 
      chip.className = "reaction"; 
      chip.textContent = `${emoji} ${list.length}`; 
      container.appendChild(chip); 
    }); 
  }
  
  async function sendMessage(){ 
    const inp = document.getElementById("msgInput"); 
    let content = inp.value.trim(); 
    if(!content) return; 
    const color = document.getElementById("textColorPicker").value; 
    if(color !== "#e6d5b8") content = `[c:${color}]${content}[/c]`; 
    inp.value = ""; 
    await supabase.from("messages").insert({ room_id: currentRoom, user_id: currentUser.id, content }); 
    await loadMessages(); 
  }
  
  function formatText(text){ 
    let html = escapeHtml(text); 
    html = html.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/_(.*?)_/g, "<i>$1</i>").replace(/__(.*?)__/g, "<u>$1</u>").replace(/\[c:(.*?)\](.*?)\[\/c\]/g, '<span style="color:$1">$2</span>'); 
    return html; 
  }
  
  function escapeHtml(str){ return (str || "").replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); }

  // Voice
  async function startVoice(){ 
    if(isRecording){ stopVoiceRecording(); return; } 
    try{ 
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
      audioChunks = []; 
      mediaRecorder = new MediaRecorder(stream); 
      mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); }; 
      mediaRecorder.onstop = () => { 
        voiceBlob = new Blob(audioChunks, { type: "audio/webm" }); 
        const url = URL.createObjectURL(voiceBlob); 
        document.getElementById("voiceAudio").src = url; 
        document.getElementById("voicePreview").style.display = "flex"; 
        stopStream(stream); 
      }; 
      mediaRecorder.start(); 
      isRecording = true; 
      document.getElementById("voiceBtn").textContent = "⏹️"; 
    } catch(e){ alert("მიკროფონი არ არის ხელმისაწვდომი"); } 
  }
  
  function stopVoiceRecording(){ if(mediaRecorder && isRecording){ mediaRecorder.stop(); isRecording = false; document.getElementById("voiceBtn").textContent = "🎤"; } }
  function cancelVoice(){ voiceBlob = null; document.getElementById("voicePreview").style.display = "none"; document.getElementById("voiceAudio").src = ""; }
  async function sendVoice(){ if(!voiceBlob) return; const reader = new FileReader(); reader.onload = async () => { await supabase.from("messages").insert({ room_id: currentRoom, user_id: currentUser.id, content: `[voice:${reader.result}]` }); await loadMessages(); cancelVoice(); }; reader.readAsDataURL(voiceBlob); }

  // PM Voice
  async function startPMVoice(){ 
    if(isRecording){ stopPMVoiceRecording(); return; } 
    try{ 
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
      audioChunks = []; 
      mediaRecorder = new MediaRecorder(stream); 
      mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); }; 
      mediaRecorder.onstop = () => { 
        voiceBlob = new Blob(audioChunks, { type: "audio/webm" }); 
        const url = URL.createObjectURL(voiceBlob); 
        document.getElementById("pmVoiceAudio").src = url; 
        document.getElementById("pmVoicePreview").style.display = "flex"; 
        stopStream(stream); 
      }; 
      mediaRecorder.start(); 
      isRecording = true; 
      document.getElementById("pmVoiceBtn").textContent = "⏹️"; 
    } catch(e){ alert("მიკროფონი არ არის ხელმისაწვდომი"); } 
  }
  
  function stopPMVoiceRecording(){ if(mediaRecorder && isRecording){ mediaRecorder.stop(); isRecording = false; document.getElementById("pmVoiceBtn").textContent = "🎤"; } }
  function cancelPMVoice(){ voiceBlob = null; document.getElementById("pmVoicePreview").style.display = "none"; document.getElementById("pmVoiceAudio").src = ""; }
  async function sendPMVoice(){ if(!voiceBlob || !currentPMUser) return; const reader = new FileReader(); reader.onload = async () => { const roomKey = [currentUser.id, currentPMUser].sort().join("_"); await supabase.from("direct_messages").insert({ room_key: roomKey, sender_id: currentUser.id, receiver_id: currentPMUser, content: `[voice:${reader.result}]` }); loadPMMessages(); cancelPMVoice(); }; reader.readAsDataURL(voiceBlob); }

  function stopStream(stream){ stream.getTracks().forEach(t => t.stop()); }

  async function openPM(userId, name){ 
    currentPMUser = userId; 
    document.getElementById("pmTitle").innerHTML = `✉️ ${name} - პირადი`; 
    document.getElementById("pmInput").value = ""; 
    await loadPMMessages(); 
    openModal("pmModal"); 
  }
  
  async function loadPMMessages(){ 
    if(!currentPMUser) return; 
    const roomKey = [currentUser.id, currentPMUser].sort().join("_"); 
    const {data} = await supabase.from("direct_messages").select("*").eq("room_key", roomKey).order("created_at", {ascending:true}); 
    const c = document.getElementById("pmMessages"); 
    c.innerHTML = ""; 
    for(const msg of data || []){ 
      const isMine = msg.sender_id === currentUser.id; 
      const date = new Date(msg.created_at).toLocaleTimeString(); 
      const div = document.createElement("div"); 
      div.style.padding = "6px"; 
      div.style.marginBottom = "6px"; 
      div.style.background = isMine ? "var(--accent)" : "var(--input)"; 
      div.style.borderRadius = "12px"; 
      div.innerHTML = `<div>${formatText(msg.content)}</div><div style="font-size:9px">${date}</div>`; 
      c.appendChild(div); 
    } 
    c.scrollTop = c.scrollHeight; 
  }
  
  async function sendPM(){ 
    const inp = document.getElementById("pmInput"); 
    const content = inp.value.trim(); 
    if(!content || !currentPMUser) return; 
    inp.value = ""; 
    const roomKey = [currentUser.id, currentPMUser].sort().join("_"); 
    await supabase.from("direct_messages").insert({ room_key: roomKey, sender_id: currentUser.id, receiver_id: currentPMUser, content }); 
    await loadPMMessages(); 
  }
  
  function openPMList(){ 
    const list = allUsers.filter(u => u.id !== currentUser?.id); 
    const container = document.getElementById("pmMessages"); 
    container.innerHTML = ""; 
    list.forEach(u => { 
      const d = document.createElement("div"); 
      d.className = "user-item"; 
      d.innerHTML = `<span>${u.emotion || "😊"}</span><span style="flex:1">${u.username || "?"}</span><button style="background:var(--accent);border:none;border-radius:12px;padding:4px 10px;color:white;cursor:pointer" onclick="openPM('${u.id}','${u.username}')">✉️</button>`; 
      container.appendChild(d); 
    }); 
    document.getElementById("pmTitle").innerHTML = "✉️ აირჩიე მომხმარებელი"; 
    openModal("pmModal"); 
  }

  async function saveProfile(){ 
    await supabase.from("profiles").update({ 
      username: document.getElementById("profileName").value, 
      status: document.getElementById("profileStatus").value, 
      emotion: document.getElementById("profileEmotion").value, 
      comment: document.getElementById("profileComment").value 
    }).eq("id", currentUser.id); 
    closeModal("profileModal"); 
    await loadUsers(); 
  }
  
  function openProfile(){ openModal("profileModal"); }

  // ალბომი
  let currentAlbum = null, userPhotos = [];
  async function openAlbum(){ await loadAlbums(); openModal("albumModal"); }
  async function loadAlbums(){ 
    const {data} = await supabase.from("gallery").select("*").eq("user_id", currentUser.id).order("created_at", {ascending:false}); 
    userPhotos = data || []; 
    renderGallery(); 
    const albumSet = [...new Set(userPhotos.map(p => p.album).filter(Boolean))]; 
    const container = document.getElementById("albumList"); 
    container.innerHTML = "<div class='album-chip' onclick='filterByAlbum(null)'>📷 ყველა</div>"; 
    albumSet.forEach(a => { 
      const chip = document.createElement("div"); 
      chip.className = "album-chip"; 
      chip.textContent = a; 
      chip.onclick = () => filterByAlbum(a); 
      container.appendChild(chip); 
    }); 
  }
  
  function filterByAlbum(album){ currentAlbum = album; renderGallery(); }
  function renderGallery(){ 
    const grid = document.getElementById("galleryGrid"); 
    grid.innerHTML = ""; 
    const filtered = currentAlbum ? userPhotos.filter(p => p.album === currentAlbum) : userPhotos; 
    filtered.forEach(photo => { 
      const img = document.createElement("img"); 
      img.className = "gallery-img"; 
      img.src = photo.url; 
      img.onclick = () => showPhotoModal(photo); 
      grid.appendChild(img); 
    }); 
    if(filtered.length === 0) grid.innerHTML = "<div style='padding:20px; text-align:center'>ფოტოები არ არის</div>"; 
  }
  
  function uploadPhoto(){ document.getElementById("photoInput").click(); }
  async function handlePhotoUpload(e){ 
    const file = e.target.files[0]; 
    if(!file) return; 
    const reader = new FileReader(); 
    reader.onload = async () => { 
      await supabase.from("gallery").insert({ user_id: currentUser.id, url: reader.result, album: prompt("ალბომის სახელი?") || "სხვა" }); 
      await loadAlbums(); 
    }; 
    reader.readAsDataURL(file); 
  }
  
  function showPhotoModal(photo){ 
    const content = `
      <div style="text-align:center">
        <img src="${photo.url}" style="max-width:100%; border-radius:12px">
        <p>📅 ${new Date(photo.created_at).toLocaleDateString()}</p>
        <div class="toolbar" style="justify-content:center">
          <button class="tool-btn" onclick="addPhotoReaction('${photo.id}','❤️')">❤️</button>
          <button class="tool-btn" onclick="addPhotoReaction('${photo.id}','🔥')">🔥</button>
          <button class="tool-btn" onclick="addPhotoReaction('${photo.id}','💜')">💜</button>
        </div>
        <div id="photoReactions-${photo.id}"></div>
        <textarea id="photoComment" placeholder="კომენტარი..." style="width:100%; margin-top:8px"></textarea>
        <button class="btn" onclick="addPhotoComment('${photo.id}')">💬 კომენტარი</button>
        <div id="photoComments-${photo.id}"></div>
      </div>
    `; 
    const modal = document.createElement("div"); 
    modal.className = "modal open"; 
    modal.style.zIndex = 10001; 
    modal.innerHTML = `<div class="modal-content" style="max-width:500px">${content}<button class="btn" onclick="this.closest('.modal').remove()">✕</button></div>`; 
    document.body.appendChild(modal); 
    loadPhotoReactions(photo.id); 
    loadPhotoComments(photo.id); 
  }
  
  async function addPhotoReaction(photoId, emoji){ 
    await supabase.from("photo_reactions").insert({ photo_id: photoId, user_id: currentUser.id, emoji }); 
    loadPhotoReactions(photoId); 
  }
  
  async function loadPhotoReactions(photoId){ 
    const {data} = await supabase.from("photo_reactions").select("*").eq("photo_id", photoId); 
    const container = document.getElementById(`photoReactions-${photoId}`); 
    if(!container) return; 
    const grouped = {}; 
    data?.forEach(r => { if(!grouped[r.emoji]) grouped[r.emoji] = []; grouped[r.emoji].push(r); }); 
    container.innerHTML = ""; 
    Object.entries(grouped).forEach(([emoji, list]) => { 
      const chip = document.createElement("span"); 
      chip.className = "reaction"; 
      chip.textContent = `${emoji} ${list.length} `; 
      container.appendChild(chip); 
    }); 
  }
  
  async function addPhotoComment(photoId){ 
    const txt = document.getElementById("photoComment").value; 
    if(!txt) return; 
    await supabase.from("photo_comments").insert({ photo_id: photoId, user_id: currentUser.id, content: txt }); 
    loadPhotoComments(photoId); 
    document.getElementById("photoComment").value = ""; 
  }
  
  async function loadPhotoComments(photoId){ 
    const {data} = await supabase.from("photo_comments").select("*, profiles(username)").eq("photo_id", photoId).order("created_at", {ascending:true}); 
    const container = document.getElementById(`photoComments-${photoId}`); 
    if(!container) return; 
    container.innerHTML = ""; 
    (data || []).forEach(c => { 
      const div = document.createElement("div"); 
      div.style.padding = "6px"; 
      div.style.marginTop = "6px"; 
      div.style.background = "var(--input)"; 
      div.style.borderRadius = "12px"; 
      div.innerHTML = `<b>${c.profiles?.username || "?"}</b>: ${c.content}<div style="font-size:9px">${new Date(c.created_at).toLocaleTimeString()}</div>`; 
      container.appendChild(div); 
    }); 
  }

  // თემა
  function setTheme(theme){ document.body.className = theme; localStorage.setItem("theme", theme); }
  function applyCustomTheme(){ 
    document.documentElement.style.setProperty("--accent", document.getElementById("accentColor").value); 
    document.documentElement.style.setProperty("--bg", document.getElementById("bgColor").value); 
    document.documentElement.style.setProperty("--panel", document.getElementById("bgColor").value); 
    localStorage.setItem("accent", document.getElementById("accentColor").value); 
    localStorage.setItem("bg", document.getElementById("bgColor").value); 
  }
  function openThemeModal(){ 
    document.getElementById("accentColor").value = getComputedStyle(document.body).getPropertyValue("--accent").trim(); 
    document.getElementById("bgColor").value = getComputedStyle(document.body).getPropertyValue("--bg").trim(); 
    openModal("themeModal"); 
  }
  
  function toggleChatEmoji(){ const p = document.getElementById("chatEmojiPanel"); p.style.display = p.style.display === "flex" ? "none" : "flex"; }
  function togglePMEmoji(){ const p = document.getElementById("pmEmojiPanel"); p.style.display = p.style.display === "flex" ? "none" : "flex"; }
  function toggleSidebar(){ 
    const s = document.getElementById("sidebar"); 
    if(s.style.position === "fixed"){ s.style.position = ""; s.style.width = "280px"; } 
    else{ s.style.position = "fixed"; s.style.left = "0"; s.style.top = "48px"; s.style.bottom = "0"; s.style.width = "70%"; s.style.zIndex = "100"; } 
  }
  
  function showPanel(panel){ 
    ["rooms","friends","users","online","requests"].forEach(p => { 
      const el = document.getElementById(p + "List"); 
      if(el) el.style.display = panel === p ? "block" : "none"; 
      const header = document.getElementById(p + "Header"); 
      if(header) header.style.display = panel === p ? "block" : "none"; 
    }); 
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active")); 
    if(event?.target) event.target.classList.add("active"); 
  }
  
  function openModal(id){ document.getElementById(id).classList.add("open"); }
  function closeModal(id){ document.getElementById(id).classList.remove("open"); }
  
  function startHeartAnimation(){ 
    const c = document.getElementById("hearts"); 
    const hearts = ["💜","❤️","🖤","🥀","💔","🌸"]; 
    setInterval(() => { 
      const h = document.createElement("div"); 
      h.className = "heart"; 
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)]; 
      h.style.left = Math.random() * 100 + "%"; 
      h.style.fontSize = 16 + Math.random() * 24 + "px"; 
      h.style.animationDuration = 3 + Math.random() * 4 + "s"; 
      c.appendChild(h); 
      setTimeout(() => h.remove(), 5000); 
    }, 800); 
  }
  
  async function updateOnlineStatus(){ 
    if(!currentUser) return; 
    await supabase.from("profiles").update({ last_seen: new Date().toISOString() }).eq("id", currentUser.id); 
    await loadUsers(); 
  }
  
  init();
</script>
</body>
