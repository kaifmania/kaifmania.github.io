<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIFMANIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ზედა ზოლი */
        .header { background: #000; border-bottom: 2px solid #ff0000; padding: 10px; display: flex; align-items: center; box-shadow: 0 2px 15px rgba(255, 0, 0, 0.5); z-index: 100; }
        .logo { color: #ff0000; font-weight: bold; font-size: 18px; letter-spacing: 2px; flex: 1; text-align: center; }
        .menu-btn { background: none; border: 1px solid #ff0000; color: #ff0000; padding: 5px 12px; border-radius: 5px; font-size: 24px; cursor: pointer; }

        /* ჩამოსაშლელი მენიუ - ერთ სვეტად */
        .dropdown-menu { 
            position: absolute; top: 55px; left: -100%; width: 280px; height: calc(100vh - 55px);
            background: rgba(5, 0, 0, 0.98); border-right: 3px solid #ff0000; transition: 0.4s; 
            z-index: 99; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        .dropdown-menu.open { left: 0; }

        /* პროფილი: ავატარი ნიკის გვერდით */
        .profile-card { display: flex; align-items: center; gap: 12px; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #ff0000; margin-bottom: 15px; }
        .profile-card img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ff0000; object-fit: cover; box-shadow: 0 0 10px #ff0000; }
        .profile-card b { color: #ff0000; font-size: 18px; display: block; }
        .profile-card span { color: gold; font-size: 12px; font-weight: bold; }

        /* ოთახები */
        .room-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .room { background: #0a0a0a; border: 1px solid #222; color: white; padding: 14px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 15px; }
        .room:hover { border-color: #ff0000; background: #150000; }

        /* ჩატის ზონა */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .msg { background: #0a0a0a; border-left: 4px solid #ff0000; padding: 12px; border-radius: 10px; max-width: 85%; box-shadow: 2px 2px 10px #000; }
        .msg b { color: #ff0000; font-size: 13px; display: block; margin-bottom: 3px; }

        /* ქვედა ზოლი - დიდი გრაფა */
        .footer { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        .main-input { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #0a0a0a; color: white; outline: none; font-size: 16px; }
        .send-btn { background: #ff0000; color: #000; border: none; width: 60px; height: 55px; border-radius: 15px; font-size: 30px; cursor: pointer; box-shadow: 0 0 15px #ff0000; display: flex; align-items: center; justify-content: center; }

        .exit-btn { color: #ff0000; text-align: center; padding: 10px; border: 1px solid #400; border-radius: 8px; text-decoration: none; margin-top: auto; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="logo">KAIFMANIA</div>
</div>

<div id="dropMenu" class="dropdown-menu">
    <div class="profile-card">
        <img id="u-ava" src="https://i.ibb.co/v3m6y6R/avatar.png">
        <div>
            <b id="u-nick">...</b>
            <span id="u-role">დამფუძნებელი 👑</span>
        </div>
    </div>
    
    <div class="room-list">
        <div class="room">☕ კაფე-ბარი</div>
        <div class="room">💎 ვიპ საუბრები</div>
        <div class="room">🧛 მაფიის ღამე</div>
        <div class="room">🕵️ გამოძიება</div>
        <div class="room">🔐 შიფროგრამა</div>
        <div class="room">❓ ვიქტორინა</div>
        <div class="room">😵 ჩამოხრჩობანა</div>
        <div class="room">🃏 კარტი</div>
        <div class="room">🎰 კაზინო</div>
        <div class="room">⚔️ დუელი</div>
        <div class="room">🏰 ციხესიმაგრე</div>
        <div class="room">🎤 კარაოკე</div>
    </div>
    
    <a href="index.html" class="exit-btn" onclick="localStorage.clear()">გასვლა 🚪</a>
</div>

<div id="chatBox"></div>

<div class="footer">
    <input type="text" id="msgInp" class="main-input" placeholder="დაწერე რამე...">
    <button class="send-btn" onclick="sendMsg()">✈️</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');

    function toggleMenu() {
        document.getElementById('dropMenu').classList.toggle('open');
    }

    async function load() {
        if (!myNick) return;
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            document.getElementById('u-nick').innerText = p.username;
            if (p.avatar_url) document.getElementById('u-ava').src = p.avatar_url;
            document.getElementById('u-role').innerText = (p.role === 'Owner') ? "დამფუძნებელი 👑" : "მონაწილე";
        }

        const { data: msgs } = await _s.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
        const box = document.getElementById('chatBox');
        box.innerHTML = '';
        msgs?.forEach(m => {
            box.innerHTML += `<div class="msg"><b>${m.username || 'უცნობი'}</b><span>${m.text}</span></div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInp');
        if (!inp.value.trim()) return;
        await _s.from('messages').insert([{ username: myNick, text: inp.value }]);
        inp.value = '';
        load();
    }

    _s.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, load).subscribe();
    window.onload = load;
    document.getElementById('msgInp').onkeypress = (e) => { if(e.key === "Enter") sendMsg(); };
</script>

</body>
</html>
