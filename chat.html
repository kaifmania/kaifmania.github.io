<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💬 12 ოთახი • მეგობრები • Voice PM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s, color 0.2s;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui;
            background: linear-gradient(145deg, #ffe6f5 0%, #ffd9eb 100%);
            color: #2a1a3a;
            min-height: 100vh;
            padding: 18px;
            position: relative;
            overflow-x: hidden;
        }

        body.dark {
            background: linear-gradient(145deg, #0f0c20 0%, #1a1535 100%);
            color: #f0ecff;
        }

        .floating-emoji {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            animation: floatMagic 8s ease-out forwards;
            z-index: 9999;
            bottom: -40px;
        }

        @keyframes floatMagic {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; bottom: -30px; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; bottom: 110%; }
        }

        .main-grid {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 280px 1fr 330px;
            gap: 18px;
            position: relative;
            z-index: 5;
        }

        .glass-panel {
            background: rgba(255, 245, 252, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            padding: 1.2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,240,0.7);
        }

        body.dark .glass-panel {
            background: rgba(20, 15, 48, 0.8);
            border-color: rgba(210, 180, 255, 0.2);
        }

        .room-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 18px 0;
        }

        .room-btn {
            background: #d9c0ff;
            border: none;
            border-radius: 60px;
            padding: 8px 0;
            font-weight: bold;
            cursor: pointer;
        }

        .room-btn.active {
            background: #ff80bf;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #ff3d9a;
            color: white;
        }

        .chat-area {
            background: rgba(0, 0, 0, 0.08);
            border-radius: 28px;
            padding: 12px;
            height: 50vh;
            overflow-y: auto;
            margin: 12px 0;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 8px 15px;
            margin: 8px;
            display: inline-block;
            max-width: 85%;
            word-break: break-word;
        }

        body.dark .message-bubble {
            background: #2a254f;
        }

        .voice-message {
            background: #ffd9e6;
            border-radius: 30px;
            padding: 8px 18px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .friend-chip {
            background: rgba(200, 170, 250, 0.5);
            border-radius: 50px;
            padding: 6px 12px;
            margin: 5px;
            display: inline-block;
            cursor: pointer;
        }

        button {
            background: #b77eff;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            margin: 4px;
            cursor: pointer;
        }

        .emoji-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }

        .recording {
            background: #ff4444 !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="floatingContainer"></div>

<div class="main-grid">
    <!-- მარცხენა პანელი -->
    <div class="glass-panel">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
            <span id="userAvatar" style="font-size: 2rem;">🌸</span>
            <span id="userNickname" style="font-weight: bold;"></span>
            <button id="logoutBtn" style="margin-left: auto; padding: 5px 12px;">🚪 გასვლა</button>
        </div>
        <h2>🏠 12 ოთახი</h2>
        <div id="roomsGrid" class="room-grid"></div>
        <hr style="margin: 12px 0;">
        
        <h3>👥 მეგობრები</h3>
        <div id="friendsContainer"></div>
        <input type="text" id="friendEmailField" placeholder="მეგობრის email" style="width:100%; margin:5px 0; padding: 8px; border-radius: 50px; border: none;">
        <button id="addFriendBtn">➕ დამატება</button>
        <button id="removeFriendBtn">➖ წაშლა</button>
        <hr>
        
        <h3>⚙️ როლები</h3>
        <input type="text" id="roleTargetEmail" placeholder="მომხმარებლის email" style="width:100%; margin:5px 0; padding: 8px; border-radius: 50px;">
        <button id="makeAdminBtn">👑 ადმინი</button>
        <button id="makeFounderBtn">🌟 დამფუძნებელი</button>
        <button id="removeRoleBtn">🚫 ჩამორთმევა</button>
        <button id="blockUserBtn">⛔ დაბლოკვა</button>
        <hr>
        
        <h3>🎨 ვიზუალი</h3>
        <button id="themeToggleBtn">🌙 ღამე/დღე</button>
        <input type="color" id="customColorPicker" value="#ff99cc">
    </div>

    <!-- ცენტრი: ჩატი -->
    <div class="glass-panel">
        <h2 id="currentRoomTitle">💬 ოთახი 1</h2>
        <div id="chatMessagesBox" class="chat-area"></div>
        
        <div id="emojiToolbar" class="emoji-strip"></div>
        
        <div style="display: flex; gap: 5px; margin: 5px 0;">
            <button id="styleBold">B</button>
            <button id="styleItalic">I</button>
            <input type="color" id="textColorInput" value="#000000">
        </div>
        
        <textarea id="messageTextarea" rows="2" placeholder="დაწერე მესიჯი..." style="width:100%; border-radius: 28px; padding: 10px;"></textarea>
        
        <button id="sendMessageBtn">💬 გაგზავნა (ოთახში)</button>
        <button id="sendPrivateMsgBtn">🔒 PM-ში</button>
    </div>

    <!-- მარჯვენა: PM + Voice -->
    <div class="glass-panel">
        <h3>💌 პირადი მესიჯები <span id="pmLed">🔴</span></h3>
        <div id="pmMessagesBox" style="height: 200px; overflow-y: auto; background: rgba(0,0,0,0.08); border-radius: 20px; padding: 8px;"></div>
        
        <textarea id="pmInputArea" rows="2" placeholder="PM ტექსტი..." style="width:100%; margin: 8px 0; padding: 8px; border-radius: 20px;"></textarea>
        
        <button id="sendPmBtn">📨 გაგზავნა</button>
        <button id="voicePmBtn">🎤 🎙️ ხმოვანი PM</button>
        
        <hr>
        <h3>😍 რეაქციები</h3>
        <button id="launchHeartsBtn">💖 გაუშვი გულები</button>
        <p style="font-size: 12px; margin-top: 8px;">❤️ დააჭირე ნებისმიერ მესიჯს</p>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentRoomId = 1;
    let activePmWith = null;
    let friendsListIds = [];
    let allUsersList = [];
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    // ========== მოძრავი გულები ==========
    function createFloating() {
        const items = ['❤️', '💖', '🌸', '🌺', '💗', '🌼', '💕', '🌷', '❤️‍🔥', '✨'];
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.innerText = items[Math.floor(Math.random() * items.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
        el.style.animationDuration = 5 + Math.random() * 6 + 's';
        document.getElementById('floatingContainer').appendChild(el);
        setTimeout(() => el.remove(), 9000);
    }
    setInterval(() => { for(let i=0;i<2;i++) createFloating(); }, 2000);

    // ========== ავტორიზაციის შემოწმება ==========
    async function checkAuth() {
        const userId = localStorage.getItem('userId');
        if(!userId) {
            window.location.href = "index.html";
            return;
        }
        
        const { data: { user } } = await supabase.auth.getUser();
        if(!user) {
            window.location.href = "index.html";
            return;
        }
        currentUser = user;
        
        const { data: profile } = await supabase.from('users').select('*').eq('id', currentUser.id).single();
        if(profile) {
            document.getElementById('userNickname').innerText = profile.nickname || profile.email;
            document.getElementById('userAvatar').innerText = profile.avatar || '🌸';
        }
        await loadAllUsers();
        await loadEverything();
    }

    async function loadAllUsers() {
        let { data } = await supabase.from('users').select('*');
        allUsersList = data || [];
    }

    async function loadEverything() {
        renderRooms();
        await loadFriends();
        loadRoomMessages(currentRoomId);
        renderEmojiPanel();
        listenPMIndicator();
        setInterval(() => {
            if(activePmWith) loadPmMessages(activePmWith);
            else loadRoomMessages(currentRoomId);
        }, 3000);
    }

    function renderRooms() {
        const container = document.getElementById('roomsGrid');
        container.innerHTML = '';
        for(let i=1; i<=12; i++) {
            const btn = document.createElement('button');
            btn.innerText = `🏠 ${i}`;
            btn.classList.add('room-btn');
            if(currentRoomId === i) btn.classList.add('active');
            btn.onclick = () => {
                currentRoomId = i;
                document.getElementById('currentRoomTitle').innerHTML = `💬 ოთახი ${i}`;
                document.querySelectorAll('.room-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                activePmWith = null;
                loadRoomMessages(i);
            };
            container.appendChild(btn);
        }
    }

    async function loadRoomMessages(roomId) {
        const { data } = await supabase.from('messages').select('*, user:users(*)').eq('room_id', roomId).order('created_at', {ascending: true});
        const box = document.getElementById('chatMessagesBox');
        box.innerHTML = '';
        data?.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message-bubble';
            div.innerHTML = `<strong>${msg.user?.nickname || '?'}</strong> <span style="font-size:10px;">${new Date(msg.created_at).toLocaleTimeString()}</span><br>${msg.text} <span style="cursor:pointer;" class="reactMsg" data-msgid="${msg.id}">❤️</span>`;
            box.appendChild(div);
        });
    }

    async function sendRoomMessage() {
        const text = document.getElementById('messageTextarea').value.trim();
        if(!text) return;
        await supabase.from('messages').insert([{ room_id: currentRoomId, user_id: currentUser.id, text }]);
        document.getElementById('messageTextarea').value = '';
        loadRoomMessages(currentRoomId);
    }

    async function loadFriends() {
        const { data } = await supabase.from('friends').select('friend_id').eq('user_id', currentUser.id);
        friendsListIds = data?.map(f=>f.friend_id) || [];
        const container = document.getElementById('friendsContainer');
        container.innerHTML = '';
        for(let fid of friendsListIds) {
            let u = allUsersList.find(usr=>usr.id===fid);
            if(u) {
                let chip = document.createElement('span');
                chip.className = 'friend-chip';
                chip.innerText = `${u.avatar || '👤'} ${u.nickname || u.email}`;
                chip.onclick = () => { activePmWith = u.id; loadPmMessages(u.id); };
                container.appendChild(chip);
            }
        }
    }

    async function loadPmMessages(otherUserId) {
        if(!otherUserId) return;
        const { data } = await supabase.from('pm_messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${otherUserId}),and(sender_id.eq.${otherUserId},receiver_id.eq.${currentUser.id})`).order('created_at');
        const box = document.getElementById('pmMessagesBox');
        box.innerHTML = '';
        data?.forEach(m => {
            const isMe = m.sender_id === currentUser.id;
            const div = document.createElement('div');
            div.style.padding = '5px';
            div.style.borderBottom = '1px solid rgba(0,0,0,0.1)';
            
            if(m.is_voice) {
                div.innerHTML = `<b>${isMe ? '🎤 მე' : '🎤 მეგობარი'}</b>: <audio controls src="${m.voice_url}" style="height: 35px;"></audio> <span style="font-size:9px;">${new Date(m.created_at).toLocaleTimeString()}</span>`;
            } else {
                div.innerHTML = `<b>${isMe ? 'მე' : 'მეგობარი'}</b>: ${m.text} <span style="font-size:9px;">${new Date(m.created_at).toLocaleTimeString()}</span>`;
            }
            div.innerHTML += ` <span style="cursor:pointer;" class="reactPm" data-pmid="${m.id}">❤️</span>`;
            
            if(!isMe && !m.seen) supabase.from('pm_messages').update({seen: true}).eq('id', m.id);
            box.appendChild(div);
        });
    }

    async function sendPM() {
        const text = document.getElementById('pmInputArea').value.trim();
        if(!text || !activePmWith) return alert("აირჩიე მეგობარი (დააკლიკე მეგობრის სახელს)");
        await supabase.from('pm_messages').insert([{ sender_id: currentUser.id, receiver_id: activePmWith, text, seen: false }]);
        document.getElementById('pmInputArea').value = '';
        loadPmMessages(activePmWith);
    }

    // ========== VOICE PM ==========
    async function startVoiceRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                await sendVoiceMessage(audioBlob);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            const btn = document.getElementById('voicePmBtn');
            btn.innerHTML = '🔴 ჩაწერა... შეაჩერე';
            btn.classList.add('recording');
            
            setTimeout(() => { if(isRecording) stopVoiceRecording(); }, 60000);
        } catch(err) {
            alert("მიკროფონზე წვდომა ვერ მოხერხდა!");
        }
    }

    function stopVoiceRecording() {
        if(mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            const btn = document.getElementById('voicePmBtn');
            btn.innerHTML = '🎤 🎙️ ხმოვანი PM';
            btn.classList.remove('recording');
        }
    }

    async function sendVoiceMessage(audioBlob) {
        if(!activePmWith) {
            alert("აირჩიე მეგობარი PM-სთვის!");
            return;
        }
        
        const fileName = `voice_${currentUser.id}_${Date.now()}.webm`;
        const { error } = await supabase.storage.from('voice_messages').upload(fileName, audioBlob);
        if(error) {
            alert("ხმის ატვირთვა ვერ მოხერხდა");
            return;
        }
        
        const { data: { publicUrl } } = supabase.storage.from('voice_messages').getPublicUrl(fileName);
        
        await supabase.from('pm_messages').insert([{
            sender_id: currentUser.id,
            receiver_id: activePmWith,
            text: "🎤 ხმოვანი შეტყობინება",
            voice_url: publicUrl,
            is_voice: true,
            seen: false
        }]);
        
        loadPmMessages(activePmWith);
    }

    document.getElementById('voicePmBtn').onclick = () => {
        if(isRecording) stopVoiceRecording();
        else startVoiceRecording();
    };

    function listenPMIndicator() {
        supabase.channel('pm-track').on('postgres_changes', {event:'INSERT', schema:'public', table:'pm_messages'}, payload => {
            if(payload.new.receiver_id === currentUser.id && !payload.new.seen) {
                document.getElementById('pmLed').innerHTML = "🔴 🔔 ახალი!";
                setTimeout(()=> document.getElementById('pmLed').innerHTML = "💬", 3000);
            }
        }).subscribe();
    }

    function renderEmojiPanel() {
        const emojis = ['😊', '😍', '😂', '🥰', '❤️', '💖', '🌸', '🌺', '🔥', '🎉', '✨', '👍', '🙏', '🤗', '😎', '🥳'];
        const panel = document.getElementById('emojiToolbar');
        panel.innerHTML = '';
        emojis.forEach(em => {
            const btn = document.createElement('button');
            btn.innerText = em;
            btn.style.fontSize = '1.3rem';
            btn.onclick = () => { document.getElementById('messageTextarea').value += em; };
            panel.appendChild(btn);
        });
    }

    // ღილაკების მოვლენები
    document.getElementById('sendMessageBtn').onclick = sendRoomMessage;
    document.getElementById('sendPmBtn').onclick = sendPM;
    document.getElementById('sendPrivateMsgBtn').onclick = () => { if(activePmWith) sendPM(); else alert("აირჩიე მეგობარი"); };
    document.getElementById('launchHeartsBtn').onclick = () => { for(let i=0;i<15;i++) createFloating(); };
    document.getElementById('themeToggleBtn').onclick = () => document.body.classList.toggle('dark');
    document.getElementById('styleBold').onclick = () => { let ta=document.getElementById('messageTextarea'); ta.style.fontWeight = ta.style.fontWeight==='bold'?'normal':'bold'; };
    document.getElementById('styleItalic').onclick = () => { let ta=document.getElementById('messageTextarea'); ta.style.fontStyle = ta.style.fontStyle==='italic'?'normal':'italic'; };
    document.getElementById('textColorInput').addEventListener('input', e => document.getElementById('messageTextarea').style.color = e.target.value);
    document.getElementById('customColorPicker').addEventListener('input', e => document.getElementById('messageTextarea').style.backgroundColor = e.target.value);
    
    document.getElementById('logoutBtn').onclick = () => {
        localStorage.clear();
        window.location.href = "index.html";
    };

    // მეგობრები
    document.getElementById('addFriendBtn').onclick = async () => {
        let email = document.getElementById('friendEmailField').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u && u.id !== currentUser.id) await supabase.from('friends').insert([{ user_id: currentUser.id, friend_id: u.id }]);
        await loadFriends();
    };
    document.getElementById('removeFriendBtn').onclick = async () => {
        let email = document.getElementById('friendEmailField').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u) await supabase.from('friends').delete().match({ user_id: currentUser.id, friend_id: u.id });
        await loadFriends();
    };

    // როლები
    document.getElementById('makeAdminBtn').onclick = async () => {
        let email = document.getElementById('roleTargetEmail').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u) await supabase.from('users').update({ role: 'admin' }).eq('id', u.id);
    };
    document.getElementById('makeFounderBtn').onclick = async () => {
        let email = document.getElementById('roleTargetEmail').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u) await supabase.from('users').update({ role: 'founder' }).eq('id', u.id);
    };
    document.getElementById('removeRoleBtn').onclick = async () => {
        let email = document.getElementById('roleTargetEmail').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u) await supabase.from('users').update({ role: 'member' }).eq('id', u.id);
    };
    document.getElementById('blockUserBtn').onclick = async () => {
        let email = document.getElementById('roleTargetEmail').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u) await supabase.from('bans').insert([{ user_id: currentUser.id, blocked_id: u.id }]);
        alert("დაბლოკილია");
    };

    checkAuth();
</script>
</body>
</html>
