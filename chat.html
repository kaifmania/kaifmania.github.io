<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0b0000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ზედა პანელი */
        .topbar { background: black; padding: 12px; display: flex; align-items: center; border-bottom: 2px solid #500; z-index: 4001; position: relative; }
        .topbar h1 { flex: 1; text-align: center; color: red; font-size: 18px; margin: 0; cursor: pointer; text-shadow: 0 0 10px red; }

        /* ჩამოსაშლელი მენიუ (მაღლიდან) */
        .top-menu { 
            position: fixed; top: -100%; left: 0; width: 100%; 
            background: rgba(10, 0, 0, 0.95); border-bottom: 2px solid red; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 4000; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); 
            gap: 10px; padding: 20px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        }
        .top-menu.active { top: 50px; } /* ჩამოდის ბარის ქვემოთ */

        .room-item { padding: 10px; background: #111; border: 1px solid #333; border-radius: 8px; cursor: pointer; font-size: 12px; text-align: center; color: #ccc; transition: 0.3s; }
        .room-item:hover { background: red; color: white; box-shadow: 0 0 10px red; }

        /* ჩატის არე */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: radial-gradient(circle, #150000 0%, #000 100%); }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 5px; animation: fadeIn 0.3s; }
        .bubble { background: #1a0000; border: 1px solid #333; padding: 10px; border-radius: 4px 15px 15px 15px; max-width: 80%; }
        .m-nick { font-weight: bold; color: #ff4d4d; font-size: 12px; margin-bottom: 4px; }
        .m-time { color: #555; font-size: 9px; margin-left: 10px; }

        /* ქვედა პანელი და ლურჯი რეაქტიული თვითმფრინავი */
        .input-zone { background: black; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        .input-zone input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; }
        
        .send-btn { background: none; border: none; cursor: pointer; transition: 0.3s; }
        .send-btn svg { width: 35px; height: 35px; fill: #0084ff; filter: drop-shadow(0 0 8px #0084ff); }
        .send-btn:active { transform: scale(0.9) translateX(5px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
    <div style="color:red; font-size:20px; cursor:pointer;" onclick="toggleMenu()">☰</div>
    <h1 id="room-title" onclick="toggleMenu()">☕️ Room 1</h1>
</div>

<nav class="top-menu" id="topMenu">
    <div class="room-item" onclick="changeRoom('Room 1')">Room 1</div>
    <div class="room-item" onclick="changeRoom('Room 2')">Room 2</div>
    <div class="room-item" onclick="changeRoom('Room 3')">Room 3</div>
    <div class="room-item" onclick="changeRoom('Room 4')">Room 4</div>
    <div class="room-item" onclick="changeRoom('Room 5')">Room 5</div>
    <div class="room-item" onclick="changeRoom('Room 6')">Room 6</div>
    <div class="room-item" onclick="changeRoom('Room 7')">Room 7</div>
    <div class="room-item" onclick="changeRoom('Room 8')">Room 8</div>
    <div class="room-item" onclick="changeRoom('Room 9')">Room 9</div>
    <div class="room-item" onclick="changeRoom('Room 10')">Room 10</div>
    <div class="room-item" onclick="changeRoom('Room 11')">Room 11</div>
    <div class="room-item" onclick="changeRoom('Room 12')">Room 12</div>
    <div class="room-item" onclick="changeRoom('Room 13')">Room 13</div>
    <div class="room-item" onclick="changeRoom('Room 14')">Room 14</div>
    <div class="room-item" style="color:red; border-color:red;" onclick="location.reload()">🚪 გასვლა</div>
</nav>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
    </button>
</div>

<script>
    const _supabase = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_TdfzZOd_1s6B7rDNfhwn6Q_mU4ecdkn");

    let myNick = localStorage.getItem('nickname') || "სტუმარი";
    let currentRoom = "Room 1";

    function toggleMenu() {
        document.getElementById('topMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function loadMessages() {
        const { data: msgs } = await _supabase.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const chat = document.getElementById('chat');
        chat.innerHTML = "";
        msgs?.forEach(m => {
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            chat.innerHTML += `
                <div class="msg-container">
                    <div class="bubble">
                        <div class="m-nick">${m.user_nam} <span class="m-time">${time}</span></div>
                        <div style="font-size:14px;">${m.text}</div>
                    </div>
                </div>`;
        });
        chat.scrollTop = chat.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim()) return;
        await _supabase.from('messages').insert([{ user_nam: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }

    function changeRoom(name) {
        currentRoom = name;
        document.getElementById('room-title').innerText = "☕️ " + name;
        toggleMenu();
        loadMessages();
    }

    window.onload = () => {
        loadMessages();
        _supabase.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages()).subscribe();
    };
</script>
</body>
</html>
