<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* მარცხენა ბარი */
        .sidebar { width: 280px; background: #050000; border-right: 2px solid red; display: flex; flex-direction: column; padding: 10px; }
        
        .profile-section { text-align: center; padding: 10px; margin-bottom: 5px; border-bottom: 1px solid #200; }
        .u-ava { width: 85px; height: 85px; border-radius: 50%; border: 2px solid red; object-fit: cover; box-shadow: 0 0 10px red; cursor: pointer; }
        .u-nick { display: block; color: red; font-size: 20px; font-weight: bold; margin-top: 5px; }
        .u-role { display: block; color: gold; font-size: 12px; }
        .u-status { display: inline-block; margin-top: 8px; padding: 5px 10px; border: 1px dashed #444; border-radius: 10px; font-size: 12px; }

        /* 12 ოთახის სია - აქ შეცვალე სახელები! */
        .room-list { flex: 1; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
        .room { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; text-align: left; margin-bottom: 5px; cursor: pointer; border-radius: 5px; font-size: 14px; transition: 0.2s; }
        .room:hover { background: #1a0000; border-color: red; }
        .room.active { background: #200; border-color: red; }

        /* ჩატი */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #000; }
        .header { padding: 12px; border-bottom: 2px solid red; color: red; text-align: center; font-size: 14px; font-weight: bold; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .m-wrap { background: #080808; padding: 10px; border-radius: 8px; border-left: 3px solid red; max-width: 85%; }
        .m-nick { color: red; font-weight: bold; text-decoration: none; font-size: 13px; display: block; }
        .m-text { color: #ddd; font-size: 14px; margin-top: 2px; }

        .input-bar { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid #111; }
        input { flex: 1; padding: 12px; background: #050505; border: 1px solid #333; color: white; border-radius: 5px; outline: none; }
        .btn-send { background: red; color: #000; border: none; padding: 0 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .btn-exit { color: #555; background: none; border: none; padding: 10px; cursor: pointer; font-size: 12px; margin-top: auto; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-section">
        <img id="my-ava" src="https://i.ibb.co/v3m6y6R/avatar.png" class="u-ava" onclick="location.href='profile.html'">
        <span id="my-nick" class="u-nick">იტვირთება...</span>
        <span id="my-role" class="u-role">...</span>
        <div class="u-status" id="my-status">...</div>
    </div>

    <div class="room-list">
        <div class="room active">☕ კაფე-ბარი</div>
        <div class="room">💎 ვიპ საუბრები</div>
        <div class="room">🧛 მაფიის ღამე</div>
        <div class="room">🕵️ გამოძიება</div>
        <div class="room">🔐 შიფროგრამა</div>
        <div class="room">❓ ვიქტორინა</div>
        <div class="room">😵 ჩამოხრჩობანა</div>
        <div class="room">ოთახი 8</div>
        <div class="room">ოთახი 9</div>
        <div class="room">ოთახი 10</div>
        <div class="room">ოთახი 11</div>
        <div class="room">ოთახი 12</div>
    </div>
    
    <button class="btn-exit" onclick="localStorage.clear(); location.href='index.html'">🚪 გასვლა</button>
</div>

<div class="chat-main">
    <div class="header">ოთახი: კაფე-ბარი</div>
    <div id="msg-box"></div>
    <div class="input-bar">
        <input type="text" id="m-inp" placeholder="დაწერე რამე...">
        <button class="btn-send" onclick="send()">გაგზავნა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');

    async function loadProfile() {
        if (!myNick) { location.href='index.html'; return; }
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            document.getElementById('my-nick').innerText = p.username;
            document.getElementById('my-role').innerText = p.role || 'Member';
            document.getElementById('my-status').innerText = p.daily_status || '💬 ...';
            if (p.avatar_url) document.getElementById('my-ava').src = p.avatar_url;
            if (p.role === 'Owner') document.getElementById('my-role').style.color = 'gold';
        }
    }

    async function fetchMessages() {
        const { data: msgs } = await _s.from('messages').select('*').order('created_at', { ascending: true }).limit(60);
        const box = document.getElementById('msg-box');
        box.innerHTML = '';
        if (msgs) {
            msgs.forEach(m => {
                box.innerHTML += `<div class="m-wrap">
                    <a href="profile.html?user=${m.username}" class="m-nick">${m.username}</a>
                    <span class="m-text">${m.text}</span>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function send() {
        const inp = document.getElementById('m-inp');
        if (!inp.value.trim()) return;
        await _s.from('messages').insert([{ username: myNick, text: inp.value.trim() }]);
        inp.value = '';
        fetchMessages();
    }

    _s.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, fetchMessages).subscribe();

    window.onload = () => { loadProfile(); fetchMessages(); }
    document.getElementById('m-inp').onkeypress = (e) => { if (e.key === "Enter") send(); };
</script>

</body>
</html>
