<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ზედა პანელი */
        .topbar { background: #000; height: 60px; display: flex; align-items: center; border-bottom: 2px solid #500; z-index: 5001; position: relative; padding: 0 15px; }
        .menu-btn { cursor: pointer; font-size: 30px; color: red; margin-right: 20px; }
        .room-title { flex: 1; text-align: center; color: red; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px red; }

        /* ჩამოსაშლელი მენიუ - ზემოდან ჩამოდის */
        .dropdown-menu { 
            position: fixed; top: -100%; left: 0; width: 100%; 
            background: rgba(10, 0, 0, 0.98); border-bottom: 3px solid red; 
            transition: 0.5s ease-in-out; z-index: 5000; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 10px; padding: 80px 20px 30px 20px; box-sizing: border-box;
        }
        .dropdown-menu.active { top: 0; }

        .room-item { padding: 15px; background: #1a0000; border: 1px solid #400; border-radius: 8px; cursor: pointer; font-size: 14px; text-align: center; color: #ccc; transition: 0.3s; }
        .room-item:hover { background: red; color: white; }

        /* ჩატის ზონა */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: #050000; display: flex; flex-direction: column; gap: 10px; }
        .msg-line { background: #150000; padding: 10px; border-radius: 8px; border-left: 3px solid red; align-self: flex-start; max-width: 80%; }
        .u-nick { font-weight: bold; color: #ff3333; font-size: 13px; margin-bottom: 3px; }

        /* ქვედა პანელი */
        .input-zone { background: #000; padding: 15px; display: flex; gap: 12px; border-top: 1px solid #333; align-items: center; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #111; color: white; outline: none; font-size: 16px; }
        
        /* ნამდვილი თვითმფრინავის ღილაკი */
        .plane-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; transition: 0.3s; }
        .plane-btn:hover { transform: scale(1.1) rotate(-10deg); }
        .plane-btn svg { width: 45px; height: 45px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 4999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="room-title" id="room-name-display">კაფე-ბარი</div>
</div>

<div class="dropdown-menu" id="topNav">
    <div class="room-item" onclick="changeRoom('კაფე-ბარი')">☕️ კაფე-ბარი</div>
    <div class="room-item" onclick="changeRoom('VIP')">💎 VIP</div>
    <div class="room-item" onclick="changeRoom('გამოძიება')">🔍 გამოძიება</div>
    <div class="room-item" onclick="changeRoom('შიფროგრამა')">🔒 შიფროგრამა</div>
    <div class="room-item" onclick="changeRoom('ვიქტორინა')">❓ ვიქტორინა</div>
    <div class="room-item" onclick="changeRoom('ჩამომხრჩობალა')">🔗 ჩამომხრჩობალა</div>
    <div class="room-item" onclick="changeRoom('მაფია')">🕵️ მაფია</div>
    <div class="room-item" onclick="changeRoom('ჯოკერი')">🃏 ჯოკერი</div>
    <div class="room-item" onclick="changeRoom('ნარდი')">🎲 ნარდი</div>
    <div class="room-item" onclick="changeRoom('მუსიკა')">🎵 მუსიკა</div>
    <div class="room-item" onclick="changeRoom('ადმინი')">🛡️ ადმინი</div>
    <div class="room-item" style="color:red; border-color:red; grid-column: 1 / -1;" onclick="location.reload()">🚪 გასვლა</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="plane-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 16l-8-7V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 7v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5v-2z" fill="white"/>
            <path d="M11.5 2C10.67 2 10 2.67 10 3.5V9l1.5 1.5L13 9V3.5c0-.83-.67-1.5-1.5-1.5zM11.5 18l-1.5 1v2l1.5-.5 1.5.5v-2l-1.5-1z" fill="red"/>
        </svg>
    </button>
</div>

<script>
    const _supabase = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_TdfzZOd_1s6B7rDNfhwn6Q_mU4ecdkn");
    let currentRoom = "კაფე-ბარი";
    let myNick = localStorage.getItem('nickname') || "მარიამი";

    function toggleMenu() {
        document.getElementById('topNav').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function loadMessages() {
        const { data: msgs } = await _supabase.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const chat = document.getElementById('chat');
        chat.innerHTML = "";
        msgs?.forEach(m => {
            chat.innerHTML += `<div class="msg-line"><div class="u-nick">${m.user_nam}</div><div>${m.text}</div></div>`;
        });
        chat.scrollTop = chat.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        await _supabase.from('messages').insert([{ user_nam: myNick, text: input.value, room_name: currentRoom }]);
        input.value = "";
    }

    function changeRoom(name) {
        currentRoom = name;
        document.getElementById('room-name-display').innerText = name;
        toggleMenu();
        loadMessages();
    }

    window.onload = () => {
        loadMessages();
        _supabase.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages()).subscribe();
    };
</script>
</body>
</html>
