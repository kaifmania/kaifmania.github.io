<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>კაიფმანია – ჩატი</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0f0e1a;--bg2:#16152a;--bg3:#1e1c35;--bg4:#252340;
  --card:#1a1830;--border:#2e2b50;
  --acc:#7c5cbf;--acc2:#9b7de8;--acc3:#b89ff0;
  --glow:rgba(124,92,191,.35);
  --odot:#c084fc;
  --text:#e8e4ff;--text2:#a09ac0;--text3:#5f5880;
  --danger:#f87171;--gold:#fbbf24;
  --founder:#f472b6;--admin:#60a5fa;
  --msgow:linear-gradient(135deg,#6d4aad,#4a2d8a);
  --msgot:#1e1c35;
  --send:linear-gradient(135deg,#7c5cbf,#5b3fa0);
  --navh:54px;--subh:46px;
}
.light{
  --bg:#f3f0ff;--bg2:#ede8ff;--bg3:#e4deff;--bg4:#d8d0ff;
  --card:#fff;--border:#c4b8f0;
  --text:#1a1040;--text2:#5a4e80;--text3:#a090c0;
  --msgot:#e8e2ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .25s,color .25s;}

/* HEARTS */
#hLayer{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.fh{position:absolute;bottom:-60px;animation:fhUp linear forwards;opacity:0;filter:drop-shadow(0 0 5px rgba(180,100,255,.8));}
@keyframes fhUp{0%{transform:translateY(0) rotate(-12deg);opacity:0;}8%{opacity:1;}55%{transform:translateY(-60vh) rotate(10deg) scale(.8);opacity:.7;}100%{transform:translateY(-115vh) rotate(25deg) scale(.15);opacity:0;}}

/* NAV */
#nav{height:var(--navh);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.4);z-index:50;}
.logo{padding:0 14px;font-size:1rem;font-weight:900;background:linear-gradient(90deg,var(--acc2),var(--founder));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0;}
#roomTabs{flex:1;display:flex;align-items:center;gap:4px;overflow-x:auto;padding:0 4px;scrollbar-width:none;}
#roomTabs::-webkit-scrollbar{display:none;}
.rtab{padding:5px 11px;border-radius:20px;white-space:nowrap;font-size:.71rem;font-weight:700;cursor:pointer;flex-shrink:0;background:transparent;border:1px solid transparent;color:var(--text2);transition:all .15s;}
.rtab:hover{background:var(--bg3);color:var(--text);}
.rtab.active{background:var(--acc);color:#fff;box-shadow:0 2px 10px var(--glow);border-color:var(--acc2);}
.rtab .rbdg{display:none;background:#f87171;color:#fff;font-size:.5rem;padding:1px 4px;border-radius:10px;margin-left:2px;}
.rtab.unread .rbdg{display:inline;}
.navbtns{display:flex;gap:4px;padding:0 10px;flex-shrink:0;}
.nb{width:32px;height:32px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--text2);transition:all .14s;}
.nb:hover{background:var(--bg4);color:var(--text);transform:scale(1.06);}

/* SUB NAV */
#subNav{height:var(--subh);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;padding:0 10px;flex-shrink:0;}
.snb{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:18px;font-size:.73rem;font-weight:700;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:all .14s;white-space:nowrap;}
.snb:hover{background:var(--bg4);color:var(--text);}
.snb.active{background:var(--acc);color:#fff;border-color:var(--acc2);}
.opill{width:9px;height:9px;border-radius:50%;background:var(--odot);box-shadow:0 0 5px var(--odot);flex-shrink:0;}
#ocnt{font-size:.7rem;color:var(--text3);margin-left:auto;white-space:nowrap;}

/* LAYOUT */
#layout{flex:1;display:flex;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:0;background:var(--bg2);border-right:1px solid var(--border);overflow:hidden;transition:width .22s;flex-shrink:0;display:flex;flex-direction:column;}
#sidebar.open{width:195px;}
.sbt{font-size:.6rem;font-weight:900;color:var(--acc3);letter-spacing:.1em;text-transform:uppercase;padding:11px 11px 4px;}
#uList{overflow-y:auto;flex:1;padding:3px;}
#uList::-webkit-scrollbar{width:3px;}
#uList::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ui{display:flex;align-items:center;gap:6px;padding:6px 7px;border-radius:9px;cursor:pointer;transition:background .13s;font-size:.76rem;}
.ui:hover{background:var(--bg3);}
.uav{width:25px;height:25px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--acc),#3b1f7a);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;position:relative;}
.udot{position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:#555;border:1.5px solid var(--bg2);}
.ui.on .udot{background:var(--odot);box-shadow:0 0 4px var(--odot);}
.uname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.rb{font-size:.5rem;padding:1px 4px;border-radius:7px;font-weight:900;}
.rf{background:rgba(244,114,182,.18);color:var(--founder);}
.ra{background:rgba(96,165,250,.18);color:var(--admin);}

/* CHAT */
#chatArea{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#roomHdr{padding:9px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
#rIcon{font-size:1.2rem;}
#rName{font-size:.92rem;font-weight:900;flex:1;}
#rOnline{font-size:.7rem;padding:2px 9px;border-radius:13px;background:rgba(168,85,247,.14);border:1px solid rgba(168,85,247,.28);color:var(--odot);white-space:nowrap;}

/* MESSAGES */
#msgsArea{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:3px;}
#msgsArea::-webkit-scrollbar{width:4px;}
#msgsArea::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.dline{text-align:center;font-size:.6rem;color:var(--text3);margin:7px 0;position:relative;}
.dline::before,.dline::after{content:'';position:absolute;top:50%;width:37%;height:1px;background:var(--border);}
.dline::before{left:0;}.dline::after{right:0;}
.mrow{display:flex;gap:7px;align-items:flex-end;animation:mIn .16s ease both;}
@keyframes mIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.mrow.own{flex-direction:row-reverse;}
.mav{width:27px;height:27px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--acc),#3b1f7a);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;cursor:pointer;transition:transform .12s;}
.mav:hover{transform:scale(1.1);}
.mbub{max-width:72%;position:relative;}
.msndr{font-size:.6rem;font-weight:700;margin-bottom:2px;padding:0 2px;color:var(--acc3);}
.msndr .ft{color:var(--founder);}.msndr .at{color:var(--admin);}
.msndr .ti{color:var(--text3);font-weight:400;margin-left:4px;}
.mbody{background:var(--msgot);border:1px solid var(--border);border-radius:14px 14px 14px 3px;padding:8px 11px;font-size:.83rem;line-height:1.55;word-break:break-word;}
.mrow.own .mbody{background:var(--msgow);border-color:rgba(124,92,191,.45);border-radius:14px 14px 3px 14px;color:#fff;}
.mmeta{display:flex;align-items:center;gap:3px;font-size:.57rem;color:var(--text3);padding:1px 2px 0;margin-top:1px;}
.mrow.own .mmeta{justify-content:flex-end;}
.tick{color:var(--odot);font-size:.6rem;}
.mdel{display:none;background:none;border:none;color:var(--danger);font-size:.62rem;cursor:pointer;margin-left:2px;}
.mrow:hover .mdel{display:inline;}

/* Message Reactions */
.mreactions{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap;}
.mreact{background:rgba(124,92,191,.15);border-radius:12px;padding:1px 5px;font-size:.6rem;cursor:pointer;transition:all .1s;}
.mreact:hover{background:rgba(124,92,191,.3);transform:scale(1.05);}

/* VOICE */
.vbub{display:flex;align-items:center;gap:7px;background:var(--msgot);border:1px solid var(--border);border-radius:14px 14px 14px 3px;padding:8px 12px;min-width:170px;}
.mrow.own .vbub{background:var(--msgow);border-color:rgba(124,92,191,.45);border-radius:14px 14px 3px 14px;}
.vplay{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.18);border:none;cursor:pointer;color:#fff;font-size:.75rem;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.vplay:hover{background:rgba(255,255,255,.28);transform:scale(1.08);}
.vmic{font-size:.95rem;flex-shrink:0;}
.vtrk{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;position:relative;}
.vprg{height:100%;background:rgba(255,255,255,.65);border-radius:2px;width:0%;transition:width .1s;}
.vdur{font-size:.6rem;color:rgba(255,255,255,.55);white-space:nowrap;}

/* TYPING */
#typingBar{height:17px;padding:0 12px;font-size:.6rem;color:var(--text3);font-style:italic;flex-shrink:0;}

/* INPUT */
#inputWrap{background:var(--bg2);border-top:1px solid var(--border);padding:7px 9px 9px;flex-shrink:0;position:relative;}
#recRow{display:none;align-items:center;gap:7px;padding:5px 9px;margin-bottom:5px;background:rgba(124,92,191,.13);border:1px solid rgba(124,92,191,.28);border-radius:9px;font-size:.72rem;color:var(--acc3);}
#recRow.on{display:flex;}
.rdot{width:7px;height:7px;border-radius:50%;background:var(--danger);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
#inputRow{display:flex;align-items:flex-end;gap:5px;background:var(--bg3);border:1.5px solid var(--border);border-radius:15px;padding:6px 7px;transition:border-color .16s,box-shadow .16s;}
#inputRow:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px var(--glow);}
#emBtn{width:28px;height:28px;flex-shrink:0;background:none;border:none;cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;transition:transform .13s;color:var(--text2);}
#emBtn:hover{transform:scale(1.15);}
#msgInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:.84rem;resize:none;max-height:100px;min-height:18px;line-height:1.5;}
#msgInput::placeholder{color:var(--text3);}
#voiceBtn{width:28px;height:28px;flex-shrink:0;background:none;border:none;cursor:pointer;font-size:.95rem;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .13s;}
#voiceBtn:hover{color:var(--acc2);transform:scale(1.1);}
#voiceBtn.rec{color:var(--danger);}
#sendBtn{width:34px;height:34px;flex-shrink:0;background:var(--send);border:none;border-radius:11px;cursor:pointer;color:#fff;font-size:.95rem;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px var(--glow);transition:transform .12s,box-shadow .12s;}
#sendBtn:hover{transform:scale(1.07);box-shadow:0 5px 16px var(--glow);}

/* EMOJI PANEL */
#emojiPanel{display:none;position:absolute;bottom:68px;left:8px;right:8px;max-width:340px;background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:9px;z-index:200;box-shadow:0 8px 28px rgba(0,0,0,.5);max-height:210px;}
#emojiPanel.open{display:block;}
.eptabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px;}
.eptab{padding:3px 8px;border-radius:7px;font-size:.65rem;font-weight:700;cursor:pointer;background:var(--bg4);border:1px solid var(--border);color:var(--text2);transition:all .11s;}
.eptab.active{background:var(--acc);color:#fff;border-color:var(--acc);}
#eGrid{display:flex;flex-wrap:wrap;gap:2px;overflow-y:auto;max-height:135px;}
#eGrid::-webkit-scrollbar{width:3px;}
#eGrid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ei{font-size:1.2rem;cursor:pointer;padding:3px;border-radius:5px;transition:background .09s,transform .09s;}
.ei:hover{background:var(--bg4);transform:scale(1.18);}

/* MODALS */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:400;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px 20px;width:min(390px,94vw);position:relative;box-shadow:0 0 60px rgba(124,92,191,.28);animation:mIn2 .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes mIn2{from{opacity:0;transform:scale(.88) translateY(16px);}to{opacity:1;transform:none;}}
.modal h2{font-size:.98rem;font-weight:900;margin-bottom:14px;}
.cls{position:absolute;top:11px;right:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:25px;height:25px;border-radius:7px;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;}
.cls:hover{color:var(--danger);}
.mf{margin-bottom:10px;}
.mf label{display:block;font-size:.63rem;font-weight:900;color:var(--acc3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px;}
.mf input,.mf select,.mf textarea{width:100%;padding:8px 11px;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:.82rem;outline:none;transition:border-color .16s;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--glow);}
.mf textarea{resize:vertical;min-height:60px;}
.mbtn{width:100%;padding:10px;border:none;border-radius:10px;font-family:'Noto Sans Georgian',sans-serif;font-size:.86rem;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;box-shadow:0 3px 12px var(--glow);transition:transform .12s;margin-top:4px;}
.mbtn:hover{transform:translateY(-2px);}
.mbtn.sec{background:var(--bg3);color:var(--text2);border:1px solid var(--border);box-shadow:none;}
.mbtn.sec:hover{background:var(--bg4);}
.mbtn.red{background:linear-gradient(135deg,#f87171,#dc2626);}
.mbox{padding:6px 10px;border-radius:8px;font-size:.73rem;text-align:center;margin-top:6px;}
.mbox.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.22);color:#f87171;}
.mbox.ok{background:rgba(110,231,183,.07);border:1px solid rgba(110,231,183,.18);color:#6ee7b7;}

/* profile */
.phdr{display:flex;gap:12px;align-items:center;margin-bottom:14px;}
.pbav{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#3b1f7a);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;flex-shrink:0;box-shadow:0 0 18px var(--glow);}
.ptabs{display:flex;gap:4px;margin-bottom:11px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.pt{padding:5px 10px;border-radius:7px;font-size:.7rem;font-weight:700;cursor:pointer;background:var(--bg3);color:var(--text2);border:1px solid var(--border);transition:all .12s;}
.pt.active{background:var(--acc);color:#fff;border-color:var(--acc);}
.pp{display:none;}.pp.active{display:block;}

/* album */
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.ath{aspect-ratio:1;border-radius:7px;background:var(--bg3);overflow:hidden;cursor:pointer;position:relative;}
.ath img{width:100%;height:100%;object-fit:cover;}
.areact{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);padding:2px 4px;display:flex;gap:2px;font-size:.6rem;}
.aup{border:2px dashed var(--border);border-radius:7px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;color:var(--text3);transition:all .13s;}
.aup:hover{border-color:var(--acc);color:var(--acc);}

/* friend btns */
.frow{display:flex;gap:5px;margin-top:8px;}
.fbtn{flex:1;padding:7px;border-radius:8px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;font-size:.72rem;font-weight:700;border:none;transition:all .13s;}
.fb-add{background:rgba(110,231,183,.1);color:#6ee7b7;border:1px solid rgba(110,231,183,.22);}
.fb-add:hover{background:rgba(110,231,183,.2);}
.fb-rm{background:rgba(248,113,113,.09);color:#f87171;border:1px solid rgba(248,113,113,.2);}
.fb-rm:hover{background:rgba(248,113,113,.18);}
.fb-dm{background:rgba(96,165,250,.09);color:var(--admin);border:1px solid rgba(96,165,250,.2);}
.fb-dm:hover{background:rgba(96,165,250,.18);}

/* admin */
.admsec{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.admt{font-size:.58rem;color:var(--text3);font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.admrow{display:flex;gap:4px;flex-wrap:wrap;}
.abtn{padding:5px 9px;border-radius:7px;cursor:pointer;font-size:.68rem;font-weight:700;font-family:'Noto Sans Georgian',sans-serif;border:none;transition:all .12s;}
.ab-adm{background:rgba(96,165,250,.13);color:var(--admin);}
.ab-fnd{background:rgba(244,114,182,.13);color:var(--founder);}
.ab-rev{background:rgba(251,191,36,.09);color:#fbbf24;}
.ab-blk{background:rgba(248,113,113,.09);color:var(--danger);}

/* DM modal */
#dmModal{max-width:460px;height:min(560px,88vh);display:flex;flex-direction:column;padding:0;overflow:hidden;}
#dmHdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
#dmWith{font-size:.9rem;font-weight:900;flex:1;}
#dmMsgs{flex:1;overflow-y:auto;padding:11px 12px;display:flex;flex-direction:column;gap:3px;}
#dmMsgs::-webkit-scrollbar{width:3px;}
#dmMsgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#dmFoot{padding:7px 11px 9px;border-top:1px solid var(--border);}
.dmdr{display:flex;gap:5px;align-items:flex-end;background:var(--bg3);border:1.5px solid var(--border);border-radius:13px;padding:5px 7px;}
#dmInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:.82rem;resize:none;max-height:70px;}
#dmInput::placeholder{color:var(--text3);}
#dmSend{background:var(--send);border:none;color:#fff;border-radius:8px;padding:5px 11px;cursor:pointer;font-size:.88rem;}

/* Photo viewer */
#pvOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:800;flex-direction:column;align-items:center;justify-content:center;gap:9px;}
#pvOv.open{display:flex;}
#pvImg{max-width:90vw;max-height:66vh;border-radius:11px;}
.pvreacts{display:flex;gap:5px;}
.pvr{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:7px;padding:4px 9px;cursor:pointer;font-size:.9rem;transition:transform .09s;}
.pvr:hover{transform:scale(1.15);}
#pvComs{max-height:120px;overflow-y:auto;width:min(360px,90vw);}
.pvc{padding:4px 0;font-size:.73rem;border-bottom:1px solid rgba(255,255,255,.07);color:#ccc;}
.pvcf{display:flex;gap:5px;margin-top:6px;width:min(360px,90vw);}
.pvcf input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:7px;color:#fff;padding:6px 9px;font-family:'Noto Sans Georgian',sans-serif;font-size:.76rem;outline:none;}
.pvcf button{background:var(--acc);border:none;color:#fff;border-radius:7px;padding:6px 11px;cursor:pointer;font-size:.76rem;}

/* ctx */
#ctx{display:none;position:fixed;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;min-width:155px;z-index:600;box-shadow:0 8px 26px rgba(0,0,0,.5);animation:ctxIn .12s ease;}
@keyframes ctxIn{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:none;}}
#ctx.open{display:block;}
.ci{padding:7px 10px;border-radius:7px;cursor:pointer;font-size:.76rem;font-weight:600;display:flex;align-items:center;gap:6px;transition:background .09s;color:var(--text);}
.ci:hover{background:var(--bg3);}
.ci.red{color:var(--danger);}

/* toast */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:.78rem;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:9000;opacity:0;transition:all .26s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* emoji manage */
#emList{margin-top:9px;max-height:110px;overflow-y:auto;}

async function loadProfile(){
  let{data}=await sb.from('profiles').select('*').eq('id',me.id).single();
  if(!data){
    const nick=me.user_metadata?.nickname||me.email.split('@')[0];
    const{count}=await sb.from('profiles').select('*',{count:'exact',head:true});
    const role=count===0?'founder':'member';
    const{data:nd}=await sb.from('profiles').insert({
      id:me.id,nickname:nick,role,status:'',
      avatar_letter:nick[0]?.toUpperCase()||'?',blocked:false
    }).select().single();
    data=nd;
  }
  myProf=data;
}

async function updatePresence(on){

/* ── ROOMS ── */
function buildRoomTabs(){
  const el=document.getElementById('roomTabs');

    const b=document.createElement('button');
    b.className='rtab'+(r.id===curRoom?' active':'');

    b.innerHTML=`${r.icon} ${r.name}<span class="rbdg">!</span>`;

    el.appendChild(b);
  });
}

async function switchRoom(id){
  curRoom=id;
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active'));
  document.getElementById(`rt-${id}`)?.classList.add('active');
  const r=ROOMS.find(x=>x.id===id);
  document.getElementById('rIcon').textContent=r?.icon||'🏠';
  document.getElementById('rName').textContent=r?.name||'';
  if(msgSub){await msgSub.unsubscribe();msgSub=null;}
  await loadMsgs();
  subMsgs();
}

/* ── MESSAGES ── */
async function loadMsgs(){
  const area=document.getElementById('msgsArea');
  area.innerHTML='<div style="text-align:center;color:var(--text3);font-size:.7rem;padding:30px;">იტვირთება...</div>';
  const{data}=await sb.from('messages')
    .select('*,profiles(nickname,role,avatar_letter)')
    .eq('room_id',curRoom).eq('is_dm',false)
    .order('created_at',{ascending:true}).limit(120);
  area.innerHTML='';
  if(!data?.length){area.innerHTML='<div style="text-align:center;color:var(--text3);font-size:.73rem;padding:50px 20px;">✨ პირველი შეტყობინება გახდი!</div>';return;}
  let lastD='';
  data.forEach(m=>{
    const d=new Date(m.created_at).toLocaleDateString('ka-GE');
    if(d!==lastD){lastD=d;const s=document.createElement('div');s.className='dline';s.textContent=d;area.appendChild(s);}
    area.appendChild(buildMsg(m));
  });
  area.scrollTop=area.scrollHeight;
  markRead(data);
}

function buildMsg(m){
  const own=m.user_id===me.id;
  const canDel=myProf?.role==='founder'||myProf?.role==='admin'||own;
  const p=m.profiles||{};
  const nick=p.nickname||'?';
  const letter=p.avatar_letter||nick[0]?.toUpperCase()||'?';
  const role=p.role||'member';
  const time=new Date(m.created_at).toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});
  let roleTag='';
  if(role==='founder')roleTag=`<span class="ft">👑 დამფუძვნებელი</span>`;
  else if(role==='admin')roleTag=`<span class="at">🛡️ ადმინი</span>`;
  const del=canDel?`<button class="mdel" onclick="delMsg('${m.id}')">🗑</button>`:'';
  let body='';
  if(m.type==='voice'){
    body=`<div class="vbub"><span class="vmic">🎙️</span><button class="vplay" onclick="playVoice(this,'${m.content}')">▶</button><div class="vtrk"><div class="vprg" id="vp-${m.id}"></div></div><span class="vdur">${m.voice_duration||'0:00'}</span></div>`;
  }else{
    body=`<div class="mbody">${esc(m.content)}</div>`;
  }
  // reactions
  let reactionsHtml = '';
  if(m.reactions && m.reactions.length){
      const reactMap = m.reactions.reduce((acc, r) => { acc[r] = (acc[r]||0)+1; return acc;}, {});
      reactionsHtml = `<div class="mreactions">${Object.entries(reactMap).map(([em, cnt]) => `<span class="mreact" onclick="event.stopPropagation(); addMsgReaction('${m.id}','${em}')">${em} ${cnt}</span>`).join('')}</div>`;
  }
  
  const row=document.createElement('div');
  row.className='mrow'+(own?' own':'');
  row.dataset.id=m.id;
  row.innerHTML=`
    <div class="mav" onclick="openProf('${m.user_id}')" oncontextmenu="showCtx(event,'${m.user_id}');return false;">${letter}</div>
    <div class="mbub">
      ${!own?`<div class="msndr">${esc(nick)} ${roleTag}<span class="ti">${time}</span></div>`:''}
      ${body}
      <div class="mmeta">${own?`<span>${time}</span><span class="tick">${(m.read_by?.length||0)>1?'✓✓':'✓'}</span>`:''} ${del}</div>
      ${reactionsHtml}
    </div>`;
  row.oncontextmenu = (e) => { showMsgCtx(e, m.id); return false; };
  return row;
}

function subMsgs(){
  msgSub=sb.channel(`msgs-${curRoom}`)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:`room_id=eq.${curRoom}`},async p=>{
      if(p.eventType==='INSERT'){
        const{data}=await sb.from('messages').select('*,profiles(nickname,role,avatar_letter)').eq('id',p.new.id).single();
        if(data){const a=document.getElementById('msgsArea');a.appendChild(buildMsg(data));a.scrollTop=a.scrollHeight;}
      }
      if(p.eventType==='DELETE'){document.querySelector(`[data-id="${p.old.id}"]`)?.remove();}
      if(p.eventType==='UPDATE'){
          const{data}=await sb.from('messages').select('*,profiles(nickname,role,avatar_letter)').eq('id',p.new.id).single();
          if(data){
              const oldRow = document.querySelector(`[data-id="${p.new.id}"]`);
              if(oldRow) oldRow.replaceWith(buildMsg(data));
          }
      }
    }).subscribe();
}

async function sendMsg(){
  if(myProf?.blocked){toast('დაბლოკილი ხარ 🚫');return;}
  const inp=document.getElementById('msgInput');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';atz(inp);
  await sb.from('messages').insert({
    user_id:me.id,room_id:curRoom,content:txt,
    type:'text',is_dm:false,read_by:[me.id], reactions:[]
  });
}

async function delMsg(id){
  if(!confirm('წავშალო?'))return;
  await sb.from('messages').delete().eq('id',id);
}

async function markRead(msgs){
  for(const m of msgs){
    if(m.user_id===me.id)continue;
    const rb=m.read_by||[];
    if(rb.includes(me.id))continue;
    await sb.from('messages').update({read_by:[...rb,me.id]}).eq('id',m.id);
  }
}

/* ── MESSAGE REACTIONS ── */
function showMsgCtx(e, msgId){
    e.preventDefault();
    closeCtx();
    const menu = document.getElementById('ctx');
    const reacts = ['👍', '❤️', '😂', '😮'];
    menu.innerHTML = reacts.map(em => `<div class="ci" onclick="addMsgReaction('${msgId}','${em}'); closeCtx();">${em}</div>`).join('');
    menu.style.left = Math.min(e.clientX, window.innerWidth-170)+'px';
    menu.style.top = Math.min(e.clientY, window.innerHeight-150)+'px';
    menu.classList.add('open');
}

async function addMsgReaction(msgId, emoji){
    const {data: msg} = await sb.from('messages').select('reactions').eq('id', msgId).single();
    let newReactions = msg.reactions || [];
    newReactions.push(emoji);
    await sb.from('messages').update({reactions: newReactions}).eq('id', msgId);
    toast(`რეაქცია ${emoji} დაემატა!`);
}

/* ── VOICE ── */
function setupVoice(){
  const btn=document.getElementById('voiceBtn');
  btn.addEventListener('mousedown',startRec);
  btn.addEventListener('mouseup',stopRec);
  btn.addEventListener('touchstart',e=>{e.preventDefault();startRec();},{passive:false});
  btn.addEventListener('touchend',stopRec);
}

async function startRec(){
  if(isRec)return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recMR=new MediaRecorder(stream);recCh=[];
    recMR.ondataavailable=e=>recCh.push(e.data);
    recMR.onstop=finishRec;
    recMR.start();isRec=true;recSec=0;
    document.getElementById('recRow').classList.add('on');
    document.getElementById('voiceBtn').classList.add('rec');
    recIv=setInterval(()=>{recSec++;const m=Math.floor(recSec/60),s=recSec%60;document.getElementById('recTime').textContent=`${m}:${s.toString().padStart(2,'0')}`;},1000);
  }catch{toast('მიკროფონი ვერ ჩაირთო 😢');}
}

function stopRec(){
  if(!isRec||!recMR)return;
  recMR.stop();recMR.stream.getTracks().forEach(t=>t.stop());
  isRec=false;clearInterval(recIv);
  document.getElementById('recRow').classList.remove('on');
  document.getElementById('voiceBtn').classList.remove('rec');
}

function cancelRec(){
  stopRec();recCh=[];
}

async function finishRec(){
  if(!recCh.length)return;
  const blob=new Blob(recCh,{type:'audio/webm'});
  const fname=`voice/${me.id}/${Date.now()}.webm`;
  const{error}=await sb.storage.from('voice-messages').upload(fname,blob);
  if(error){toast('ვოისი ვერ აიტვირთა');return;}
  const{data}=sb.storage.from('voice-messages').getPublicUrl(fname);
  const m=Math.floor(recSec/60),s=recSec%60;
  await sb.from('messages').insert({
    user_id:me.id,room_id:curRoom,content:data.publicUrl,
    type:'voice',voice_duration:`${m}:${s.toString().padStart(2,'0')}`,
    is_dm:false,read_by:[me.id], reactions:[]
  });
}

function playVoice(btn,url){
  const audio=new Audio(url);audio.play();
  btn.textContent='⏸';audio.onended=()=>btn.textContent='▶';
}

      <button class="abtn ab-adm" onclick="setRole('${uid}','admin')">🛡️ ადმინი</button>
      <button class="abtn ab-fnd" onclick="setRole('${uid}','founder')">👑 დამფუძვნებელი</button>
      <button class="abtn ab-rev" onclick="setRole('${uid}','member')">🔓 ჩახსნა</button>
      <button class="abtn ab-blk" onclick="blockUser('${uid}')">🚫 ბლოკი</button>
    </div></div>`;
  }else if(isAdmin&&prof.role==='member'){
    admsec=`<div class="admsec"><div class="admt">🔧 ადმინ მართვა</div><div class="admrow">
      <button class="abtn ab-blk" onclick="blockUser('${uid}')">🚫 ბლოკი</button>
    </div></div>`;
  }

  document.getElementById('profBody').innerHTML=`
    <div class="phdr">
      <div class="pbav">${letter}</div>
      <div><div style="font-size:.96rem;font-weight:900;">${esc(prof.nickname)}</div>
        <div style="margin-top:2px;">${roleLabel}</div>
        <div style="font-size:.74rem;color:var(--text2);margin-top:3px;">${esc(prof.status||'')}</div>
      </div>
    </div>
    <div class="ptabs">
      <button class="pt active" onclick="swPT(this,'pi-info')">ℹ️ ინფო</button>
      <button class="pt" onclick="swPT(this,'pi-album')">📸 ალბომი</button>
    </div>
    <div class="pp active" id="pi-info">
      <div class="frow">${fbtns}</div>${admsec}
    </div>
    <div class="pp" id="pi-album">${buildAlbum(photos||[],uid,false)}</div>`;
  openOv('profOv');
}

async function openSelfProfile(){
  if(!myProf)return;
  const{data:photos}=await sb.from('gallery').select('*').eq('user_id',me.id);
  const letter=myProf.avatar_letter||myProf.nickname[0]?.toUpperCase()||'?';
  const isFounder=myProf.role==='founder';
  let roleLabel='';
  if(myProf.role==='founder')roleLabel=`<span style="color:var(--founder)">👑 დამფუძვნებელი</span>`;
  else if(myProf.role==='admin')roleLabel=`<span style="color:var(--admin)">🛡️ ადმინი</span>`;
  else roleLabel=`<span style="color:var(--text3)">👤 მომხმარებელი</span>`;

  document.getElementById('selfBody').innerHTML=`
    <div class="phdr">
      <div class="pbav">${letter}</div>
      <div><div style="font-size:.96rem;font-weight:900;">${esc(myProf.nickname)}</div>
        <div style="margin-top:2px;">${roleLabel}</div>
      </div>
    </div>
    <div class="ptabs">
      <button class="pt active" onclick="swPT(this,'sp-edit')">✏️ რედაქტირება</button>
      <button class="pt" onclick="swPT(this,'sp-album')">📸 ალბომი</button>
      ${isFounder?`<button class="pt" onclick="closeOv('selfOv');openOv('emOv');loadEmList()">😄 სმაილები</button>`:''}
    </div>
    <div class="pp active" id="sp-edit">
      <div class="mf"><label>ნიკნეიმი</label><input id="snick" value="${esc(myProf.nickname)}" maxlength="30"/></div>
      <div class="mf"><label>სტატუსი</label><input id="sstat" value="${esc(myProf.status||'')}" placeholder="შენი სტატუსი..." maxlength="80"/></div>
      <button class="mbtn" onclick="saveSelf()">შენახვა ✅</button>
      <div id="selfMsg"></div>
    </div>
    <div class="pp" id="sp-album">${buildAlbum(photos||[],me.id,true)}</div>`;
  openOv('selfOv');
}

async function saveSelf(){
  const nick=document.getElementById('snick').value.trim();
  const stat=document.getElementById('sstat').value.trim();
  if(!nick)return;
  const{error}=await sb.from('profiles').update({nickname:nick,status:stat}).eq('id',me.id);
  if(error){showMB('selfMsg','შეცდომა!','err');return;}
  myProf.nickname=nick;myProf.status=stat;
  showMB('selfMsg','შენახულია ✅','ok');
}

function swPT(btn,pid){
  const modal=btn.closest('.modal');
  modal.querySelectorAll('.pt').forEach(t=>t.classList.remove('active'));
  modal.querySelectorAll('.pp').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(pid)?.classList.add('active');
}

/* ── ALBUM ── */
function buildAlbum(photos,uid,canUp){
  let h='<div class="agrid">';
  photos.forEach(p=>{
    const reacts=(p.reactions||[]).join('');
    h+=`<div class="ath" onclick="openPV('${p.id}','${p.url}')"><img src="${p.url}" alt=""/><div class="areact">${reacts}</div></div>`;
  });
  if(canUp){h+=`<label class="aup" title="ფოტოს დამატება">＋<input type="file" accept="image/*" style="display:none" onchange="uploadPhoto(this)"/></label>`;}
  h+='</div>';return h;
}

async function uploadPhoto(input){
  const file=input.files[0];if(!file)return;
  const fname=`photos/${me.id}/${Date.now()}_${file.name}`;
  const{error}=await sb.storage.from('user-photos').upload(fname,file);
  if(error){toast('ფოტო ვერ აიტვირთა');return;}
  const{data}=sb.storage.from('user-photos').getPublicUrl(fname);
  await sb.from('gallery').insert({user_id:me.id,url:data.publicUrl,reactions:[],comments:[]});
  toast('ფოტო დამატებულია 📸');
}

/* ── PHOTO VIEWER ── */
async function openPV(photoId,url){
  curPhotoId=photoId;
  document.getElementById('pvImg').src=url;
  const{data}=await sb.from('gallery').select('*').eq('id',photoId).single();
  const reacts=['❤️','😂','😍','🔥','😮','👍'];
  document.getElementById('pvReacts').innerHTML=reacts.map(r=>`<button class="pvr" onclick="addPVReact('${photoId}','${r}')">${r}</button>`).join('');
  document.getElementById('pvComs').innerHTML=(data?.comments||[]).map(c=>`<div class="pvc">${esc(c)}</div>`).join('');
  document.getElementById('pvOv').classList.add('open');
}
function closePV(){document.getElementById('pvOv').classList.remove('open');}

async function addPVReact(id,em){
  const{data}=await sb.from('gallery').select('reactions').eq('id',id).single();
  const r=[...(data?.reactions||[]),em];
  await sb.from('gallery').update({reactions:r}).eq('id',id);
  toast(em+' დამატებულია!');
}

async function addPVCom(){
  const inp=document.getElementById('pvCI');
  const txt=inp.value.trim();if(!txt||!curPhotoId)return;
  const{data}=await sb.from('gallery').select('comments').eq('id',curPhotoId).single();
  const coms=[...(data?.comments||[]),`${myProf?.nickname}: ${txt}`];
  await sb.from('gallery').update({comments:coms}).eq('id',curPhotoId);
  inp.value='';
  document.getElementById('pvComs').innerHTML+=`<div class="pvc">${esc(myProf?.nickname)}: ${esc(txt)}</div>`;
}

/* ── FRIENDS ── */
async function addFriend(uid){
  await sb.from('friends').insert({user_id:me.id,friend_id:uid,status:'pending'});
  toast('მოთხოვნა გაიგზავნა 📨');closeOv('profOv');
}
async function rmFriend(uid){
  await sb.from('friends').delete().or(`and(user_id.eq.${me.id},friend_id.eq.${uid}),and(user_id.eq.${uid},friend_id.eq.${me.id})`);
  toast('წაიშალა');closeOv('profOv');
}

/* ── ADMIN ── */
async function setRole(uid,role){
  if(myProf?.role!=='founder'){toast('მხოლოდ დამფუძვნებელი! 👑');return;}
  await sb.from('profiles').update({role}).eq('id',uid);
  toast('როლი შეიცვალა ✅');closeOv('profOv');loadUsers();
}
async function blockUser(uid){
  if(!confirm('დაბლოკო?'))return;
  await sb.from('profiles').update({blocked:true,online:false}).eq('id',uid);
  toast('დაიბლოკა 🚫');closeOv('profOv');loadUsers();
}

/* ── DM ── */
async function openDMById(uid){
  const{data:prof}=await sb.from('profiles').select('*').eq('id',uid).single();
  if(prof)openDM(prof);
}

async function openDM(prof){
  curDMUser=prof;
  const letter=prof.avatar_letter||prof.nickname[0]?.toUpperCase()||'?';
  document.getElementById('dmAvEl').textContent=letter;
  document.getElementById('dmWith').textContent='💬 '+prof.nickname;
  const area=document.getElementById('dmMsgs');area.innerHTML='';
  const{data}=await sb.from('messages')
    .select('*,profiles(nickname,role,avatar_letter)')
    .eq('is_dm',true)
    .or(`and(user_id.eq.${me.id},to_user_id.eq.${prof.id}),and(user_id.eq.${prof.id},to_user_id.eq.${me.id})`)
    .order('created_at',{ascending:true}).limit(100);
  (data||[]).forEach(m=>{
    const row=buildMsg(m);area.appendChild(row);
  });
  area.scrollTop=area.scrollHeight;
  openOv('dmOv');
}

async function sendDM(){
  if(!curDMUser)return;
  const inp=document.getElementById('dmInput');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';atz(inp);
  await sb.from('messages').insert({
    user_id:me.id,to_user_id:curDMUser.id,
    content:txt,type:'text',is_dm:true,room_id:0,read_by:[me.id], reactions:[]
  });
  const{data}=await sb.from('messages')
    .select('*,profiles(nickname,role,avatar_letter)')
    .eq('user_id',me.id).eq('to_user_id',curDMUser.id)
    .order('created_at',{ascending:false}).limit(1).single();
  if(data){const area=document.getElementById('dmMsgs');area.appendChild(buildMsg(data));area.scrollTop=area.scrollHeight;}
}

async function showDMList(){
  const{data}=await sb.from('messages').select('user_id,to_user_id')
    .eq('is_dm',true).or(`user_id.eq.${me.id},to_user_id.eq.${me.id}`)
    .order('created_at',{ascending:false});
  const seen=new Set();const partners=[];
  (data||[]).forEach(m=>{const pid=m.user_id===me.id?m.to_user_id:m.user_id;if(!seen.has(pid)){seen.add(pid);partners.push(pid);}});
  const el=document.getElementById('dmListBody');el.innerHTML='';
  for(const pid of partners.slice(0,15)){
    const{data:prof}=await sb.from('profiles').select('*').eq('id',pid).single();
    if(!prof)continue;
    const letter=prof.avatar_letter||prof.nickname[0]?.toUpperCase()||'?';
    const div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:9px;padding:8px 6px;border-radius:9px;cursor:pointer;transition:background .13s;';
    div.onmouseover=()=>div.style.background='var(--bg3)';
    div.onmouseout=()=>div.style.background='';
    div.innerHTML=`<div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#3b1f7a);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;flex-shrink:0;">${letter}</div><span style="font-size:.82rem;font-weight:600;">${esc(prof.nickname)}</span>`;
    div.onclick=()=>{closeOv('dmListOv');openDM(prof);};
    el.appendChild(div);
  }
  openOv('dmListOv');
}

/* ── EMOJI ── */
async function loadCustomEmojis(){
  const{data}=await sb.from('global_emojis').select('*');
  if(data)data.forEach(row=>{
    if(!customEmojis[row.category])customEmojis[row.category]=[];
    customEmojis[row.category].push(row.emoji);
  });
}

function buildEmojiPanel(){
  const allCats={...EMOJIS,...customEmojis};
  const tabs=document.getElementById('epTabs');
  const grid=document.getElementById('eGrid');
  tabs.innerHTML='';
  const cats=Object.keys(allCats);
  cats.forEach((cat,i)=>{
    const b=document.createElement('button');
    b.className='eptab'+(i===0?' active':'');
    b.textContent=cat;
    b.onclick=()=>{tabs.querySelectorAll('.eptab').forEach(t=>t.classList.remove('active'));b.classList.add('active');renderEGrid(allCats[cat]);};
    tabs.appendChild(b);
  });
  if(cats.length)renderEGrid(allCats[cats[0]]);
}

function renderEGrid(ems){
  const grid=document.getElementById('eGrid');grid.innerHTML='';
  ems.forEach(em=>{
    const s=document.createElement('span');s.className='ei';s.textContent=em;
    s.onclick=()=>{document.getElementById('msgInput').value+=em;document.getElementById('msgInput').focus();toggleEmoji(false);};
    grid.appendChild(s);
  });
}

function toggleEmoji(force){
  const p=document.getElementById('emojiPanel');
  p.classList.toggle('open',force!==undefined?force:!p.classList.contains('open'));
}

async function addEmoji(){
  if(myProf?.role!=='founder'){toast('მხოლოდ დამფუძვნებელი! 👑');return;}
  const cat=document.getElementById('emCat').value.trim();
  const em=document.getElementById('emEm').value.trim();
  if(!cat||!em){showMB('emMsg','შეავსე ველები','err');return;}
  const{error}=await sb.from('global_emojis').insert({category:cat,emoji:em});
  if(error){showMB('emMsg','შეცდომა','err');return;}
  if(!customEmojis[cat])customEmojis[cat]=[];
  customEmojis[cat].push(em);
  buildEmojiPanel();loadEmList();
  showMB('emMsg','დამატებულია ✅','ok');
}

async function loadEmList(){
  const{data}=await sb.from('global_emojis').select('*');
  const el=document.getElementById('emList');if(!el)return;
  el.innerHTML=(data||[]).map(r=>`<div class="emrow"><span>${r.emoji}</span><span style="color:var(--text3);font-size:.7rem;">${esc(r.category)}</span><button onclick="delEmoji('${r.id}')">🗑️</button></div>`).join('');
}

async function delEmoji(id){
  await sb.from('global_emojis').delete().eq('id',id);
  await loadCustomEmojis();buildEmojiPanel();loadEmList();
}

/* ── CTX MENU ── */
function showCtx(e,uid){
  e.preventDefault();closeCtx();
  const isAdmin=myProf?.role==='admin'||myProf?.role==='founder';
  const menu=document.getElementById('ctx');
  menu.innerHTML=`
    <div class="ci" onclick="openProf('${uid}')">👤 პროფილი</div>
    <div class="ci" onclick="closeCtx();openDMById('${uid}')">💬 შეტყობინება</div>
    <div class="ci" onclick="closeCtx();addFriend('${uid}')">➕ მეგობრობა</div>
    ${isAdmin?`<div class="ci red" onclick="closeCtx();blockUser('${uid}')">🚫 ბლოკი</div>`:''}`;
  menu.style.left=Math.min(e.clientX,window.innerWidth-170)+'px';
  menu.style.top=Math.min(e.clientY,window.innerHeight-150)+'px';
  menu.classList.add('open');
}
function closeCtx(){document.getElementById('ctx').classList.remove('open');}

/* ── THEME ── */
function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('light',!isDark);
  document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️';
}

/* ── HEARTS ── */
function startHearts(){
  const layer=document.getElementById('hLayer');
  const chars=['🩷','💖','💗','❤️‍🔥','🔥','💞','💓','✨','💝','❤️','🌸','💘','💫','🌺','💜'];
  function spawn(){
    const el=document.createElement('div');el.className='fh';
    el.textContent=chars[Math.floor(Math.random()*chars.length)];
    const size=11+Math.random()*18,left=Math.random()*97,dur=6+Math.random()*8,delay=Math.random()*2;
    el.style.cssText=`left:${left}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
    layer.appendChild(el);
    setTimeout(()=>el.remove(),(dur+delay+1)*1000);
  }
  for(let i=0;i<22;i++)spawn();
  setInterval(spawn,320);
}

/* ── HELPERS ── */
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function showMB(id,txt,type){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="mbox ${type}">${txt}</div>`;}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
async function doLogout(){await updatePresence(false);await sb.auth.signOut();location.href='index.html';}

document.addEventListener('click',e=>{
  if(!document.getElementById('emojiPanel').contains(e.target)&&e.target.id!=='emBtn')toggleEmoji(false);
  if(!document.getElementById('ctx').contains(e.target))closeCtx();
});

init();
</script>
</body>
</html>
