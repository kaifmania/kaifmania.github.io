    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .topbar { background: #000; height: 60px; display: flex; align-items: center; border-bottom: 2px solid #500; z-index: 1001; padding: 0 15px; }
        .burger { font-size: 30px; color: red; cursor: pointer; margin-right: 20px; }
        .title { flex: 1; text-align: center; color: red; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px red; }

        /* მენიუ მარცხენა მხარეს - სვეტად */
        .side-menu { 
            position: fixed; top: 60px; left: -260px; width: 240px; height: calc(100vh - 60px);
            background: rgba(10, 0, 0, 0.98); border-right: 2px solid red;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; 
            display: flex; flex-direction: column; padding: 15px; overflow-y: auto;
        }
        .side-menu.active { left: 0; }

        .menu-item { 
            padding: 12px; margin: 4px 0; background: #150000; border: 1px solid #333; 
            border-radius: 8px; cursor: pointer; text-align: left; color: #ccc; font-size: 14px; transition: 0.2s;
        }
        .menu-item:hover { background: red; color: white; border-color: white; transform: translateX(5px); }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: #050000; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #111; padding: 10px; border-radius: 8px; border-left: 3px solid red; align-self: flex-start; max-width: 85%; }
        .u { font-weight: bold; color: red; font-size: 12px; margin-bottom: 3px; }

        .input-zone { background: #000; padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; }
        
        .plane-btn { background: none; border: none; cursor: pointer; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .plane-btn svg { width: 40px; height: 40px; filter: drop-shadow(0 0 5px red); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
