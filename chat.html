<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            background: #000; 
            font-family: 'Arial', sans-serif; 
            color: white; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ჰორიზონტალური მენიუ ზემოთ */
        .top-nav {
            background: #0d0d0d;
            border-bottom: 2px solid red;
            display: flex;
            align-items: center;
            padding: 0 15px;
            overflow-x: auto; /* თუ ბევრია, გვერდზე დასქროლოს */
            white-space: nowrap;
            height: 50px;
            scrollbar-width: none; /* Firefox-ისთვის */
            box-shadow: 0 0 15px red;
            z-index: 10;
        }

        .top-nav::-webkit-scrollbar { display: none; } /* Chrome-სთვის */

        .top-nav a {
            color: #ccc;
            text-decoration: none;
            padding: 10px 15px;
            font-size: 13px;
            border-radius: 5px;
            transition: 0.3s;
            margin-right: 5px;
        }

        .top-nav a:hover, .top-nav a.active {
            background: rgba(255, 0, 0, 0.2);
            color: white;
            text-shadow: 0 0 5px red;
        }

        /* ჩატის კონტეინერი - მთლიან ეკრანზე */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            position: relative;
        }

        /* მესიჯების ველი */
        #chatDisplay {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-row {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 80%;
            align-self: flex-start;
            border-left: 3px solid red;
            position: relative;
        }

        .msg-author { color: red; font-weight: bold; font-size: 14px; margin-bottom: 3px; display: block; }
        .msg-text { font-size: 15px; line-height: 1.4; color: #eee; }
        .msg-time { font-size: 10px; color: #555; margin-left: 10px; vertical-align: bottom; }

        /* ქვედა საწერი პანელი */
        .input-bar {
            background: #0d0d0d;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #222;
        }

        #messageInput {
            flex-grow: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            outline: none;
            font-size: 16px;
        }

        #messageInput:focus { border-color: red; box-shadow: 0 0 5px red; }

        /* "ნამდვილი" თვითმფრინავის ღილაკი */
        .send-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.1) rotate(-10deg); }

        .send-btn svg {
            width: 35px;
            height: 35px;
            fill: red;
            filter: drop-shadow(0 0 8px red);
        }

        /* ოთახის სათაური (წყალნიშანივით ფონზე) */
        .room-bg-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10vw;
            color: rgba(255, 0, 0, 0.03);
            font-weight: bold;
            pointer-events: none;
            z-index: 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="#" onclick="selectRoom('კაფე-ბარი')">☕ კაფე-ბარი</a>
        <a href="#" onclick="selectRoom('ვიპ საუბრები')">💎 VIP</a>
        <a href="#" onclick="selectRoom('გამოძიება')">🔍 გამოძიება</a>
        <a href="#" onclick="selectRoom('შიფროგრამა')">🔐 შიფროგრამა</a>
        <a href="#" onclick="selectRoom('ვიქტორინა')">❓ ვიქტორინა</a>
        <a href="#" onclick="selectRoom('ჩამოხრჩობანა')">🪢 ჩამოხრჩობანა</a>
        <a href="#" onclick="selectRoom('მაფია')">🕵️ მაფია</a>
        <a href="#" onclick="selectRoom('ჯოკერი')">🃏 ჯოკერი</a>
        <a href="#" onclick="selectRoom('ნარდი')">🎲 ნარდი</a>
        <a href="#" onclick="selectRoom('მუსიკა')">🎵 მუსიკა</a>
        <a href="#" onclick="selectRoom('ადმინისტრაცია')">🛡️ ადმინი</a>
        <a href="#" onclick="logout()" style="color: #666;">🚪 გასვლა</a>
    </nav>

    <div class="chat-container">
        <div id="roomWatermark" class="room-bg-title">კაფე-ბარი</div>
        
        <div id="chatDisplay">
            </div>

        <div class="input-bar">
            <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება..." onkeyup="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M3.4 20.4l17.45-7.48c.81-.35.81-1.49 0-1.84L3.4 3.6c-.66-.29-1.39.2-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // ნიკის ამოღება
        const myNick = localStorage.getItem('nickname') || "სტუმარი";

        function selectRoom(name) {
            document.getElementById("roomWatermark").innerText = name;
            // ოთახის შეცვლისას ჩატი რომ გასუფთავდეს (სანამ ბაზას მივაბამთ)
            document.getElementById("chatDisplay").innerHTML = "";
            
            // აქტიური კლასის მინიჭება მენიუსთვის
            const links = document.querySelectorAll('.top-nav a');
            links.forEach(link => {
                if(link.innerText.includes(name)) link.classList.add('active');
                else link.classList.remove('active');
            });
        }

        function sendMessage() {
            const inp = document.getElementById("messageInput");
            const chat = document.getElementById("chatDisplay");
            
            if (inp.value.trim() === "") return;

            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0');

            const msgDiv = document.createElement("div");
            msgDiv.className = "message-row";
            
            msgDiv.innerHTML = `
                <span class="msg-author">${myNick}</span>
                <span class="msg-text">${inp.value} <span class="msg-time">${time}</span></span>
            `;
            
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
            inp.value = "";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
