<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>სუპერ ჩატი - 12 ოთახი | მეგობრები & რეაქციები</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome 6 (სმაილებისთვის) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            overflow-x: hidden;
        }
        /* მოძრავი გულები და ყვავილები (ფონური ანიმაცია) */
        .floating-ornaments {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .floating-item {
            position: absolute;
            font-size: 1.8rem;
            opacity: 0.6;
            animation: floatAnim 12s linear infinite;
            user-select: none;
            pointer-events: none;
        }
        @keyframes floatAnim {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        /* main container */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
            position: relative;
            z-index: 2;
        }
        /* თემის ფერები (dynamic) */
        :root {
            --theme-primary: #6366f1;
            --theme-bg: #ffffff;
            --theme-card: #f8fafc;
            --theme-text: #1e293b;
            --theme-border: #e2e8f0;
        }
        body.dark {
            --theme-primary: #818cf8;
            --theme-bg: #0f172a;
            --theme-card: #1e293b;
            --theme-text: #e2e8f0;
            --theme-border: #334155;
            background: #0f172a;
        }
        /* ფერის ცვლადები */
        body.custom-theme {
            background: var(--theme-bg);
        }
        .card, .chat-panel, .sidebar, .room-bar {
            background: var(--theme-card);
            border: 1px solid var(--theme-border);
            border-radius: 24px;
        }
        button, .btn {
            background: var(--theme-primary);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        button.secondary {
            background: #475569;
        }
        input, textarea, select {
            background: var(--theme-bg);
            border: 1px solid var(--theme-border);
            padding: 10px 12px;
            border-radius: 28px;
            color: var(--theme-text);
        }
        /* layout */
        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 16px;
        }
        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .sidebar, .friends-panel { display: none; }
        }
        .room-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .room-tab {
            background: var(--theme-card);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid var(--theme-border);
        }
        .room-tab.active {
            background: var(--theme-primary);
            color: white;
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            background: var(--theme-bg);
            border-radius: 20px;
            padding: 8px 12px;
            max-width: 80%;
            align-self: flex-start;
        }
        .message.own { align-self: flex-end; background: var(--theme-primary); color: white; }
        .message-time { font-size: 10px; opacity: 0.7; display: flex; gap: 6px; align-items: center; }
        .reactions { display: flex; gap: 6px; margin-top: 5px; font-size: 14px; cursor: pointer; }
        .reaction-badge { background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 20px; }
        .emoji-picker {
            display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap;
        }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .friend-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--theme-border); }
        .admin-badge { background: gold; color: black; padding: 2px 6px; border-radius: 20px; font-size: 11px; }
        .founder-badge { background: #ff4757; color: white; }
        .voice-note { background: #475569; padding: 5px 10px; border-radius: 20px; cursor: pointer; }
        .theme-selector { display: flex; gap: 8px; margin: 8px 0; }
        .color-option { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
        @keyframes wiggle {
            0% { transform: translateX(0); }
            100% { transform: translateX(3px); }
        }
        i.fa-heart, i.fa-leaf { animation: wiggle 1s infinite; }
    </style>
</head>
<body>
<div class="floating-ornaments" id="floatingOrnaments"></div>
<div class="app-container" id="app">
    <!-- ავტორიზაციის ეკრანი -->
    <div id="authScreen" class="card" style="max-width: 450px; margin: 50px auto; padding: 30px; text-align: center;">
        <h2>✨ მოგესალმებით ჩატში ✨</h2>
        <div id="authError" style="color:red; font-size:14px;"></div>
        <input type="text" id="authUsername" placeholder="მომხმარებლის სახელი" style="width:100%; margin:10px 0;">
        <input type="password" id="authPassword" placeholder="პაროლი" style="width:100%; margin:10px 0;">
        <button id="loginBtn">შესვლა</button>
        <button id="registerBtn" class="secondary" style="margin-top:8px;">რეგისტრაცია</button>
        <div style="margin-top:12px; font-size:12px;">✨ მოძრავი გულები და ყვავილები ფონზე ✨</div>
    </div>

    <!-- ძირითადი აპლიკაცია (შესვლის შემდეგ) -->
    <div id="mainApp" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap:wrap;">
            <h2>🌟 12 ოთახიანი ჩატი 🌟</h2>
            <div style="display: flex; gap: 12px;">
                <button id="themeLightBtn">🌞 ნათელი</button>
                <button id="themeDarkBtn">🌙 მუქი</button>
                <div class="theme-selector" id="customColorPicker">
                    <div class="color-option" style="background:#6366f1;" data-color="#6366f1"></div>
                    <div class="color-option" style="background:#ec489a;" data-color="#ec489a"></div>
                    <div class="color-option" style="background:#10b981;" data-color="#10b981"></div>
                    <div class="color-option" style="background:#f97316;" data-color="#f97316"></div>
                </div>
                <button id="logoutBtn">🚪 გასვლა</button>
            </div>
        </div>
        <div class="main-grid" style="margin-top: 20px;">
            <!-- მარცხენა: ოთახები + როლები -->
            <div class="sidebar card" style="padding: 16px;">
                <h4>📌 ოთახები (1-12)</h4>
                <div id="roomList" class="room-list"></div>
                <hr>
                <h4>👥 ჩემი მეგობრები</h4>
                <div id="friendsList" style="max-height: 200px; overflow-y: auto;"></div>
                <input type="text" id="friendAddInput" placeholder="მომხმარებლის ID დასამატებლად">
                <button id="addFriendBtn">➕ მეგობრად დამატება</button>
                <hr>
                <h4>⚙️ ადმინ პანელი</h4>
                <div id="adminPanel" style="display: none;">
                    <input type="text" id="adminTargetUser" placeholder="მომხმარებლის ID">
                    <button id="grantAdminBtn">👑 მიანიჭე ადმინი</button>
                    <button id="grantFounderBtn">🏆 მიანიჭე დამფუძნებელი</button>
                    <button id="removeRoleBtn">❌ როლის მოხსნა</button>
                    <button id="blockUserBtn">⛔ დაბლოკვა</button>
                </div>
            </div>
            <!-- ცენტრი: ჩატი -->
            <div class="chat-panel card" style="padding: 16px; display: flex; flex-direction: column;">
                <div id="currentRoomName" style="font-weight: bold; margin-bottom: 8px;">ოთახი #1</div>
                <div id="chatMessages" class="chat-messages" style="background: var(--theme-bg);"></div>
                <div id="typingIndicator" style="font-size:12px; opacity:0.8;"></div>
                <div style="display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;">
                    <input type="text" id="messageInput" placeholder="დაწერე მესიჯი..." style="flex:1;">
                    <button id="sendMsgBtn">📨 გაგზავნა</button>
                    <button id="voiceRecordBtn" class="secondary">🎤 ვოისი</button>
                </div>
                <div class="emoji-picker" id="emojiPicker">
                    <!-- მოძრავი სმაილები -->
                    <span style="cursor:pointer;">😊</span><span>😂</span><span>❤️</span><span>🔥</span><span>👍</span><span>🎉</span>
                </div>
                <div id="movingSmileysPanel" style="margin-top: 5px;">
                    <button id="addMovingEmojiBtn" class="secondary">➕ მოძრავი სმაილის დამატება (ადმინი)</button>
                </div>
                <div id="statusEmotionArea">
                    <input id="statusInput" placeholder="სტატუსი / ემოცია">
                    <button id="setStatusBtn">დააყენე სტატუსი</button>
                </div>
            </div>
            <!-- მარჯვენა: პირადი შეტყობინებები, ფოტო ალბომი -->
            <div class="friends-panel card" style="padding: 16px;">
                <h4>💬 პირადი შეტყობინებები <span id="pmIndicator" style="background:red; border-radius:50%; width:12px; height:12px; display:inline-block;"></span></h4>
                <div id="pmList" style="max-height: 150px; overflow-y: auto;"></div>
                <div id="pmChatArea" style="margin-top: 8px;">
                    <div id="pmMessages" style="height:150px; overflow-y:auto; background:var(--theme-card); border-radius:12px; padding:5px;"></div>
                    <input type="text" id="pmInput" placeholder="პირადი მესიჯი...">
                    <button id="sendPmBtn">🔒 გაგზავნა</button>
                </div>
                <hr>
                <h4>🖼️ ფოტო ალბომი</h4>
                <button id="createAlbumBtn">📁 ალბომის შექმნა</button>
                <div id="albumsList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // SUPABASE CONFIG (თქვენი მონაცემები)
    const SUPABASE_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let currentRoom = 1;
    let currentFriendPmUser = null;
    let typingTimeout = null;
    let voiceRecorder = null;
    
    // მოძრავი გულები და ყვავილები
    function startFloating() {
        const container = document.getElementById("floatingOrnaments");
        const icons = ['❤️', '🌸', '🌺', '💖', '🌼', '🌷', '💗', '✨'];
        setInterval(() => {
            let item = document.createElement("div");
            item.classList.add("floating-item");
            item.innerText = icons[Math.floor(Math.random() * icons.length)];
            item.style.left = Math.random() * 100 + "%";
            item.style.animationDuration = 8 + Math.random() * 8 + "s";
            item.style.fontSize = 1.2 + Math.random() * 2 + "rem";
            container.appendChild(item);
            setTimeout(() => item.remove(), 13000);
        }, 2000);
    }
    startFloating();
    
    // Helper: DB ცხრილები (უნდა არსებობდეს: users, rooms, messages, friends, roles, blocks, pms, reactions, albums, statuses)
    // ჩვენ მარტივად ვიყენებთ users {id, username, password, role, status, theme, blocked_users}
    // დანარჩენს supabase rpc ან ცალკე ცხრილები.
    // დემო მიზნით ვახდენთ ლოგიკის იმპლემენტაციას localStorage + supabase ჰიბრიდი, მაგრამ სრულად supabase ვერსია.
    
    async function register(username, password) {
        const { data, error } = await supabase.from('users').insert([{ username, password, role: 'user', status: 'აქტიური', theme: 'light' }]);
        if(error) throw error;
        return data;
    }
    async function login(username, password) {
        const { data, error } = await supabase.from('users').select('*').eq('username', username).eq('password', password).single();
        if(error || !data) throw new Error("მომხმარებელი არ არსებობს");
        return data;
    }
    // ოთახების ინიციალიზაცია
    async function initRooms() { for(let i=1;i<=12;i++) await supabase.from('rooms').upsert({id:i, name:`ოთახი ${i}`}, {onConflict:'id'}); }
    
    // ჩატის შეტყობინებების მიღება
    async function loadMessages() {
        let {data} = await supabase.from('messages').select('*, user:users(username, role)').eq('room_id', currentRoom).order('created_at', {ascending:true});
        renderMessages(data);
    }
    async function sendMessage(text) {
        if(!text.trim()) return;
        await supabase.from('messages').insert({room_id:currentRoom, user_id:currentUser.id, content:text, created_at:new Date()});
        loadMessages();
    }
    // Realtime
    supabase.channel('custom-all-channel').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, () => loadMessages()).subscribe();
    
    // მეგობრები
    async function loadFriends(){
        let {data} = await supabase.from('friends').select('friend_id, users!friends_friend_id_fkey(username, role)').eq('user_id', currentUser.id);
        renderFriends(data);
    }
    async function addFriend(friendId){
        await supabase.from('friends').insert({user_id:currentUser.id, friend_id:friendId});
        loadFriends();
    }
    async function removeFriend(friendId){
        await supabase.from('friends').delete().eq('user_id',currentUser.id).eq('friend_id',friendId);
        loadFriends();
    }
    // ადმინ/დამფუძნებელი
    async function grantRole(targetId, newRole){
        if(currentUser.role !== 'founder' && currentUser.role !== 'admin') return alert('მხოლოდ ადმინი/დამფუძნებელი');
        await supabase.from('users').update({role:newRole}).eq('id',targetId);
    }
    async function blockUser(targetId){
        if(currentUser.role !== 'admin' && currentUser.role !== 'founder') return;
        await supabase.from('blocks').insert({blocker_id:currentUser.id, blocked_id:targetId});
    }
    // პირადი შეტყობინებები
    async function sendPM(receiverId, content){
        await supabase.from('pms').insert({sender_id:currentUser.id, receiver_id:receiverId, content, seen:false, created_at: new Date()});
        if(currentFriendPmUser === receiverId) loadPMs(receiverId);
        updatePMIndicator();
    }
    async function loadPMs(withUserId){
        let {data} = await supabase.from('pms').select('*').or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`).order('created_at');
        let filtered = data.filter(m => (m.sender_id === withUserId && m.receiver_id === currentUser.id) || (m.sender_id === currentUser.id && m.receiver_id === withUserId));
        renderPMs(filtered);
        // seen update
        for(let m of filtered.filter(m=> m.receiver_id===currentUser.id && !m.seen)) await supabase.from('pms').update({seen:true}).eq('id',m.id);
    }
    async function updatePMIndicator(){
        let {count} = await supabase.from('pms').select('*', {count:'exact', head:true}).eq('receiver_id', currentUser.id).eq('seen', false);
        document.getElementById('pmIndicator').style.backgroundColor = count>0 ? '#ff4757' : 'gray';
    }
    // სტატუსი
    async function setStatus(emojiStatus){
        await supabase.from('users').update({status: emojiStatus}).eq('id', currentUser.id);
        currentUser.status=emojiStatus;
    }
    // რეაქციები
    async function addReaction(messageId, reaction){
        await supabase.from('reactions').insert({message_id:messageId, user_id:currentUser.id, reaction});
        loadMessages();
    }
    // მოძრავი სმაილები (ადმინისთვის)
    document.getElementById('addMovingEmojiBtn')?.addEventListener('click', () => {
        if(currentUser.role === 'admin' || currentUser.role === 'founder'){
            let emoji = prompt('ახალი მოძრავი სმაილი (ემოჯი):');
            if(emoji) addFloatingEmoji(emoji);
        } else alert('მხოლოდ ადმინი');
    });
    function addFloatingEmoji(emoji){
        const container = document.getElementById("floatingOrnaments");
        let item = document.createElement("div");
        item.classList.add("floating-item");
        item.innerText = emoji;
        item.style.left = Math.random()*100+"%";
        container.appendChild(item);
        setTimeout(()=>item.remove(),15000);
    }
    
    // თემის შეცვლა
    function setTheme(themeMode, customColor=null){
        if(themeMode === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        if(customColor){
            document.body.style.setProperty('--theme-primary', customColor);
            document.body.classList.add('custom-theme');
        } else document.body.style.setProperty('--theme-primary', '#6366f1');
    }
    
    // typing
    function emitTyping(){
        if(typingTimeout) clearTimeout(typingTimeout);
        document.getElementById('typingIndicator').innerText = '✍️ წერა...';
        typingTimeout = setTimeout(()=> document.getElementById('typingIndicator').innerText = '', 1500);
    }
    
    // photo album (simple)
    async function createAlbum(name){
        await supabase.from('albums').insert({user_id:currentUser.id, name});
        loadAlbums();
    }
    async function loadAlbums(){
        let {data} = await supabase.from('albums').select('*').eq('user_id', currentUser.id);
        document.getElementById('albumsList').innerHTML = data.map(a=>`<div>📁 ${a.name}</div>`).join('');
    }
    
    // render functions
    function renderMessages(msgs){
        let container=document.getElementById('chatMessages');
        container.innerHTML=msgs.map(m=>`
            <div class="message ${m.user_id===currentUser.id ? 'own' : ''}">
                <b>${m.user?.username || 'user'}</b> ${m.user?.role==='admin'?'👑':''}
                <div>${m.content}</div>
                <div class="message-time">${new Date(m.created_at).toLocaleTimeString()}
                    <span class="reactions" onclick="addReactionPrompt('${m.id}')">❤️ ${m.reactions?.length||0}</span>
                </div>
                <div class="reactions" id="react-${m.id}"></div>
            </div>
        `).join('');
    }
    window.addReactionPrompt=async (msgId)=>{ let r=prompt('რეაქცია (😊,❤️..)'); if(r) await addReaction(msgId,r); };
    
    function renderFriends(friends){
        let div=document.getElementById('friendsList');
        if(!friends) return;
        div.innerHTML=friends.map(f=>`
            <div class="friend-item">
                <span>${f.users?.username} ${f.users?.role==='admin'?'⭐':''}</span>
                <button onclick="chatWithFriend('${f.friend_id}')">💬 PM</button>
                <button onclick="removeFriendById('${f.friend_id}')">❌</button>
            </div>
        `).join('');
    }
    window.chatWithFriend=(id)=>{ currentFriendPmUser = id; loadPMs(id); };
    window.removeFriendById=async (id)=>{ await removeFriend(id); };
    
    function renderPMs(messages){
        let div=document.getElementById('pmMessages');
        div.innerHTML=messages.map(m=>`<div><b>${m.sender_id===currentUser.id?'თქვენ':'მეგობარი'}</b>: ${m.content} <small>${new Date(m.created_at).toLocaleTimeString()} ${!m.seen && m.receiver_id===currentUser.id ? '🟢' : '✅'}</small></div>`).join('');
    }
    
    // Voice note
    async function startVoice(){
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        const mediaRecorder = new MediaRecorder(stream);
        let chunks=[];
        mediaRecorder.ondataavailable=e=>chunks.push(e.data);
        mediaRecorder.onstop=async()=>{
            const blob = new Blob(chunks, {type:'audio/webm'});
            const reader = new FileReader();
            reader.onloadend=()=> sendMessage('🎤 ვოის შენიშვნა (audio)');
            reader.readAsDataURL(blob);
        };
        mediaRecorder.start();
        setTimeout(()=>mediaRecorder.stop(), 5000);
    }
    
    // events bindings after DOM
    window.onload = async()=>{
        document.getElementById('loginBtn').onclick=async()=>{
            try{
                let user = await login(document.getElementById('authUsername').value, document.getElementById('authPassword').value);
                currentUser=user;
                document.getElementById('authScreen').style.display='none';
                document.getElementById('mainApp').style.display='block';
                if(user.role==='admin'||user.role==='founder') document.getElementById('adminPanel').style.display='block';
                initRooms(); loadFriends(); loadMessages(); updatePMIndicator(); loadAlbums();
                renderRoomList();
                setTheme(user.theme);
            }catch(e){ document.getElementById('authError').innerText='შეცდომა'; }
        };
        document.getElementById('registerBtn').onclick=async()=>{
            try{
                await register(document.getElementById('authUsername').value, document.getElementById('authPassword').value);
                alert('რეგისტრაცია წარმატებული');
            }catch(e){ alert('უკვე არსებობს');}
        };
        document.getElementById('sendMsgBtn').onclick=()=> sendMessage(document.getElementById('messageInput').value);
        document.getElementById('voiceRecordBtn').onclick=startVoice;
        document.getElementById('addFriendBtn').onclick=()=> addFriend(document.getElementById('friendAddInput').value);
        document.getElementById('grantAdminBtn').onclick=()=> grantRole(document.getElementById('adminTargetUser').value, 'admin');
        document.getElementById('grantFounderBtn').onclick=()=> grantRole(document.getElementById('adminTargetUser').value, 'founder');
        document.getElementById('removeRoleBtn').onclick=()=> grantRole(document.getElementById('adminTargetUser').value, 'user');
        document.getElementById('blockUserBtn').onclick=()=> blockUser(document.getElementById('adminTargetUser').value);
        document.getElementById('sendPmBtn').onclick=()=> sendPM(currentFriendPmUser, document.getElementById('pmInput').value);
        document.getElementById('setStatusBtn').onclick=()=> setStatus(document.getElementById('statusInput').value);
        document.getElementById('createAlbumBtn').onclick=()=> createAlbum(prompt('ალბომის სახელი'));
        document.getElementById('themeLightBtn').onclick=()=> setTheme('light');
        document.getElementById('themeDarkBtn').onclick=()=> setTheme('dark');
        document.querySelectorAll('.color-option').forEach(opt=> opt.onclick=()=> setTheme('light', opt.dataset.color));
        document.getElementById('logoutBtn').onclick=()=> location.reload();
        document.getElementById('messageInput').addEventListener('input', emitTyping);
        // მოძრავი სმაილების დაფა - ყოველ 10 წამში შემთხვევითი
        setInterval(()=>{ if(currentUser) addFloatingEmoji(['❤️','🌸','🌼','🌷','💖'][Math.floor(Math.random()*5)]); }, 7000);
    };
    function renderRoomList(){
        let roomsDiv=document.getElementById('roomList');
        roomsDiv.innerHTML='';
        for(let i=1;i<=12;i++){
            let btn=document.createElement('div');
            btn.className='room-tab'+(currentRoom===i ? ' active' : '');
            btn.innerText=`ოთახი ${i}`;
            btn.onclick=()=>{ currentRoom=i; loadMessages(); document.getElementById('currentRoomName').innerText=`ოთახი ${i}`; };
            roomsDiv.appendChild(btn);
        }
    }
</script>
</body>
</html>
