<!DOCTYPE html>

<html lang="ka">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>კაიფმანია – ჩატი</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ══════════════════════════════════════════
   CSS VARIABLES & THEMES
══════════════════════════════════════════ */
:root{
  --bg:#0d0b1a;--bg2:#13112a;--bg3:#1a1838;--bg4:#211f40;
  --card:#16142e;--border:#2a2748;
  --acc:#7c5cbf;--acc2:#9b7de8;--acc3:#b89ff0;
  --glow:rgba(124,92,191,.35);
  --odot:#c084fc;--online:rgba(192,132,252,.15);
  --text:#e8e4ff;--text2:#a09ac0;--text3:#5f5880;
  --danger:#f87171;--gold:#fbbf24;
  --founder:#f472b6;--admin:#60a5fa;
  --msgow:linear-gradient(135deg,#5b3fa0,#3d2170);
  --msgot:#1a1838;
  --send:linear-gradient(135deg,#7c5cbf,#5540a8);
  --navh:52px;--subh:44px;
  --user-color:var(--acc2);
}
/* Custom themes */
body.theme-rose{--acc:#be185d;--acc2:#f472b6;--acc3:#fbcfe8;--glow:rgba(244,114,182,.35);--odot:#f9a8d4;--msgow:linear-gradient(135deg,#9d174d,#6d1040);}
body.theme-emerald{--acc:#065f46;--acc2:#10b981;--acc3:#6ee7b7;--glow:rgba(16,185,129,.35);--odot:#34d399;--msgow:linear-gradient(135deg,#064e3b,#022c22);}
body.theme-ocean{--acc:#1e3a5f;--acc2:#3b82f6;--acc3:#93c5fd;--glow:rgba(59,130,246,.35);--odot:#60a5fa;--msgow:linear-gradient(135deg,#1e40af,#1e3a8a);}
body.theme-sunset{--acc:#92400e;--acc2:#f59e0b;--acc3:#fde68a;--glow:rgba(245,158,11,.35);--odot:#fbbf24;--msgow:linear-gradient(135deg,#b45309,#78350f);}
body.theme-dark{--bg:#000;--bg2:#080808;--bg3:#101010;--bg4:#181818;--card:#0c0c0c;--border:#222;}
body.light{
  --bg:#f0eeff;--bg2:#e8e2ff;--bg3:#ddd5ff;--bg4:#d0c5ff;
  --card:#fff;--border:#c4b5f0;
  --text:#1a1040;--text2:#5a4e80;--text3:#9080c0;
  --msgot:#e8e2ff;--msgow:linear-gradient(135deg,#7c5cbf,#5540a8);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
font-family:‘Noto Sans Georgian’,sans-serif;
background:var(–bg);color:var(–text);
display:flex;flex-direction:column;
transition:background .3s,color .3s;
}

/* ══════════ PARTICLES ══════════ */
#pLayer{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.pt{
position:absolute;bottom:-60px;
animation:ptUp linear forwards;opacity:0;
user-select:none;filter:drop-shadow(0 0 5px rgba(180,100,255,.7));
}
@keyframes ptUp{
0%{transform:translateY(0) rotate(-12deg);opacity:0;}
7%{opacity:.9;}
55%{transform:translateY(-60vh) rotate(10deg) scale(.8);opacity:.7;}
100%{transform:translateY(-115vh) rotate(25deg) scale(.15);opacity:0;}
}

/* ══════════ TOP NAV ══════════ */
#nav{
height:var(–navh);background:var(–bg2);
border-bottom:1px solid var(–border);
display:flex;align-items:center;
flex-shrink:0;z-index:100;
box-shadow:0 2px 20px rgba(0,0,0,.5);
}
.logo{
padding:0 12px;font-size:.95rem;font-weight:900;
background:linear-gradient(90deg,var(–acc2),var(–founder));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
white-space:nowrap;flex-shrink:0;
}
#roomTabs{
flex:1;display:flex;align-items:center;gap:3px;
overflow-x:auto;padding:0 4px;scrollbar-width:none;
}
#roomTabs::-webkit-scrollbar{display:none;}
.rt{
padding:5px 10px;border-radius:18px;white-space:nowrap;
font-size:.7rem;font-weight:700;cursor:pointer;flex-shrink:0;
background:transparent;border:1px solid transparent;
color:var(–text3);transition:all .15s;
}
.rt:hover{background:var(–bg3);color:var(–text);}
.rt.active{
background:var(–acc);color:#fff;
box-shadow:0 2px 10px var(–glow);border-color:var(–acc2);
}
.rt .rbdg{
display:none;background:#f87171;color:#fff;
font-size:.5rem;padding:1px 4px;border-radius:9px;margin-left:2px;
}
.rt.unread .rbdg{display:inline;}
.navbtns{display:flex;gap:3px;padding:0 8px;flex-shrink:0;}
.nb{
width:30px;height:30px;border-radius:8px;
background:var(–bg3);border:1px solid var(–border);
cursor:pointer;display:flex;align-items:center;justify-content:center;
font-size:.85rem;color:var(–text2);transition:all .13s;
}
.nb:hover{background:var(–bg4);color:var(–text);transform:scale(1.06);}

/* ══════════ SUB NAV ══════════ */
#subNav{
height:var(–subh);background:var(–bg2);
border-bottom:1px solid var(–border);
display:flex;align-items:center;gap:4px;
padding:0 8px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
#subNav::-webkit-scrollbar{display:none;}
.snb{
display:flex;align-items:center;gap:4px;
padding:4px 10px;border-radius:16px;
font-size:.71rem;font-weight:700;cursor:pointer;
background:var(–bg3);border:1px solid var(–border);
color:var(–text2);transition:all .13s;white-space:nowrap;flex-shrink:0;
}
.snb:hover{background:var(–bg4);color:var(–text);}
.snb.active{background:var(–acc);color:#fff;border-color:var(–acc2);}
.opill{
width:8px;height:8px;border-radius:50%;
background:var(–odot);box-shadow:0 0 5px var(–odot);flex-shrink:0;
}
/* DM badge on subnav */
.dm-badge{
background:var(–danger);color:#fff;
font-size:.5rem;padding:1px 4px;border-radius:9px;
display:none;
}
.dm-badge.on{display:inline;}
#ocnt{font-size:.68rem;color:var(–text3);margin-left:auto;white-space:nowrap;flex-shrink:0;padding-right:4px;}

/* ══════════ LAYOUT ══════════ */
#layout{flex:1;display:flex;overflow:hidden;}

/* ══════════ LEFT SIDEBAR ══════════ */
#sidebar{
width:0;background:var(–bg2);border-right:1px solid var(–border);
overflow:hidden;transition:width .22s;flex-shrink:0;
display:flex;flex-direction:column;
}
#sidebar.open{width:190px;}
.sbt{
font-size:.58rem;font-weight:900;color:var(–acc3);
letter-spacing:.1em;text-transform:uppercase;
padding:10px 10px 3px;flex-shrink:0;
}
#uList{overflow-y:auto;flex:1;padding:2px;}
#uList::-webkit-scrollbar{width:3px;}
#uList::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px;}
.ui{
display:flex;align-items:center;gap:6px;
padding:6px 7px;border-radius:8px;cursor:pointer;
transition:background .12s;font-size:.74rem;
}
.ui:hover{background:var(–bg3);}
.uav{
width:24px;height:24px;border-radius:50%;flex-shrink:0;
background:linear-gradient(135deg,var(–acc),#3b1f7a);
display:flex;align-items:center;justify-content:center;
font-size:.6rem;font-weight:900;position:relative;
}
.udot{
position:absolute;bottom:-1px;right:-1px;
width:7px;height:7px;border-radius:50%;
background:#444;border:1.5px solid var(–bg2);
}
.ui.on .udot{background:var(–odot);box-shadow:0 0 4px var(–odot);}
.uname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.rb{font-size:.48rem;padding:1px 4px;border-radius:6px;font-weight:900;}
.rF{background:rgba(244,114,182,.18);color:var(–founder);}
.rA{background:rgba(96,165,250,.18);color:var(–admin);}

/* ══════════ CHAT AREA ══════════ */
#chatArea{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#roomHdr{
padding:8px 12px;background:var(–bg2);
border-bottom:1px solid var(–border);
display:flex;align-items:center;gap:8px;flex-shrink:0;
}
#rIcon{font-size:1.15rem;}
#rName{font-size:.9rem;font-weight:900;flex:1;}
#rOnline{
font-size:.68rem;padding:2px 8px;border-radius:12px;
background:var(–online);border:1px solid rgba(192,132,252,.3);
color:var(–odot);white-space:nowrap;
}

/* MESSAGES */
#msgsArea{
flex:1;overflow-y:auto;
padding:10px 8px;
display:flex;flex-direction:column;gap:2px;
}
#msgsArea::-webkit-scrollbar{width:4px;}
#msgsArea::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px;}

.dline{
text-align:center;font-size:.58rem;color:var(–text3);
margin:6px 0;position:relative;
}
.dline::before,.dline::after{
content:’’;position:absolute;top:50%;
width:36%;height:1px;background:var(–border);
}
.dline::before{left:0;}.dline::after{right:0;}

.mrow{
display:flex;gap:6px;align-items:flex-end;
animation:mIn .15s ease both;
position:relative;
}
@keyframes mIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.mrow.own{flex-direction:row-reverse;}

.mav{
width:26px;height:26px;border-radius:50%;flex-shrink:0;
background:linear-gradient(135deg,var(–acc),#3b1f7a);
display:flex;align-items:center;justify-content:center;
font-size:.6rem;font-weight:900;cursor:pointer;
transition:transform .12s;
}
.mav:hover{transform:scale(1.1);}

.mbub{max-width:74%;position:relative;}
.msndr{
font-size:.6rem;font-weight:700;margin-bottom:2px;
padding:0 2px;color:var(–acc3);
}
.msndr .fT{color:var(–founder);}
.msndr .aT{color:var(–admin);}
.msndr .tI{color:var(–text3);font-weight:400;margin-left:3px;}

/* custom text color for message */
.mbody{
background:var(–msgot);border:1px solid var(–border);
border-radius:14px 14px 14px 3px;
padding:7px 10px;font-size:.82rem;line-height:1.55;
word-break:break-word;color:var(–text);
}
.mrow.own .mbody{
background:var(–msgow);
border-color:rgba(124,92,191,.4);
border-radius:14px 14px 3px 14px;
color:#fff;
}
/* Formatted text */
.mbody b{font-weight:900;}
.mbody i{font-style:italic;}
.mbody s{text-decoration:line-through;opacity:.7;}

/* Message reactions display */
.msg-reacts{
display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;
}
.msg-react-item{
background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
border-radius:10px;padding:1px 6px;font-size:.72rem;cursor:pointer;
transition:background .1s,transform .1s;
}
.msg-react-item:hover{background:rgba(255,255,255,.15);transform:scale(1.1);}
.mrow.own .msg-react-item{background:rgba(0,0,0,.15);border-color:rgba(0,0,0,.2);}

.mmeta{
display:flex;align-items:center;gap:3px;
font-size:.56rem;color:var(–text3);
padding:1px 2px 0;margin-top:1px;
}
.mrow.own .mmeta{justify-content:flex-end;}
.tick{color:var(–odot);font-size:.58rem;}
.mdel{
display:none;background:none;border:none;
color:var(–danger);font-size:.6rem;cursor:pointer;margin-left:2px;
}
.mrow:hover .mdel{display:inline;}

/* Reaction popup */
.react-popup{
display:none;position:absolute;bottom:calc(100% + 4px);
background:var(–bg3);border:1px solid var(–border);
border-radius:10px;padding:5px;gap:3px;
box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:50;
flex-wrap:wrap;max-width:200px;
}
.react-popup.open{display:flex;}
.mrow.own .react-popup{right:0;}
.react-popup .re{
font-size:1.1rem;cursor:pointer;padding:3px;
border-radius:5px;transition:background .09s,transform .09s;
}
.react-popup .re:hover{background:var(–bg4);transform:scale(1.2);}

/* VOICE */
.vbub{
display:flex;align-items:center;gap:6px;
background:var(–msgot);border:1px solid var(–border);
border-radius:14px 14px 14px 3px;
padding:7px 10px;min-width:160px;
}
.mrow.own .vbub{
background:var(–msgow);
border-color:rgba(124,92,191,.4);
border-radius:14px 14px 3px 14px;
}
.vplay{
width:26px;height:26px;border-radius:50%;flex-shrink:0;
background:rgba(255,255,255,.18);border:none;
cursor:pointer;color:#fff;font-size:.72rem;
display:flex;align-items:center;justify-content:center;
transition:all .12s;
}
.vplay:hover{background:rgba(255,255,255,.28);transform:scale(1.08);}
.vmic{font-size:.9rem;flex-shrink:0;}
.vtrk{
flex:1;height:3px;background:rgba(255,255,255,.2);
border-radius:2px;cursor:pointer;
}
.vprg{height:100%;background:rgba(255,255,255,.65);border-radius:2px;width:0%;transition:width .1s;}
.vdur{font-size:.58rem;color:rgba(255,255,255,.55);white-space:nowrap;}

/* ══════════ TYPING ══════════ */
#typingBar{
height:16px;padding:0 10px;
font-size:.6rem;color:var(–text3);
font-style:italic;flex-shrink:0;
}

/* ══════════ INPUT AREA ══════════ */
#inputWrap{
background:var(–bg2);border-top:1px solid var(–border);
padding:6px 8px 8px;flex-shrink:0;position:relative;
}
/* Format toolbar */
#fmtBar{
display:flex;gap:3px;margin-bottom:5px;
padding:3px 5px;background:var(–bg3);
border-radius:8px;border:1px solid var(–border);
width:fit-content;
}
.fmtBtn{
width:24px;height:24px;border-radius:5px;
background:none;border:none;cursor:pointer;
color:var(–text2);font-size:.8rem;
display:flex;align-items:center;justify-content:center;
transition:all .12s;font-family:‘Noto Sans Georgian’,sans-serif;
}
.fmtBtn:hover{background:var(–bg4);color:var(–text);}
.fmtBtn.active{background:var(–acc);color:#fff;}
/* Text color picker */
.color-dot{
width:14px;height:14px;border-radius:50%;cursor:pointer;
border:1.5px solid rgba(255,255,255,.2);transition:transform .1s;flex-shrink:0;
}
.color-dot:hover{transform:scale(1.2);}
#colorPicker{display:none;gap:4px;align-items:center;}
#colorPicker.open{display:flex;}

#recRow{
display:none;align-items:center;gap:6px;
padding:4px 8px;margin-bottom:5px;
background:rgba(124,92,191,.12);
border:1px solid rgba(124,92,191,.25);
border-radius:8px;font-size:.7rem;color:var(–acc3);
}
#recRow.on{display:flex;}
.rdot{width:7px;height:7px;border-radius:50%;background:var(–danger);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

#inputRow{
display:flex;align-items:flex-end;gap:5px;
background:var(–bg3);border:1.5px solid var(–border);
border-radius:14px;padding:5px 6px;
transition:border-color .16s,box-shadow .16s;
}
#inputRow:focus-within{
border-color:var(–acc);
box-shadow:0 0 0 3px var(–glow);
}
#emBtn{
width:26px;height:26px;flex-shrink:0;
background:none;border:none;cursor:pointer;
font-size:1rem;display:flex;align-items:center;justify-content:center;
transition:transform .12s;color:var(–text2);
}
#emBtn:hover{transform:scale(1.15);}
#msgInput{
flex:1;background:none;border:none;outline:none;
color:var(–user-color);
font-family:‘Noto Sans Georgian’,sans-serif;
font-size:.83rem;resize:none;
max-height:95px;min-height:18px;line-height:1.5;
}
#msgInput::placeholder{color:var(–text3);}
#voiceBtn{
width:26px;height:26px;flex-shrink:0;
background:none;border:none;cursor:pointer;
font-size:.9rem;color:var(–text2);
display:flex;align-items:center;justify-content:center;
transition:all .12s;
}
#voiceBtn:hover{color:var(–acc2);transform:scale(1.1);}
#voiceBtn.rec{color:var(–danger);}
#sendBtn{
width:32px;height:32px;flex-shrink:0;
background:var(–send);border:none;border-radius:10px;
cursor:pointer;color:#fff;font-size:.9rem;
display:flex;align-items:center;justify-content:center;
box-shadow:0 3px 10px var(–glow);
transition:transform .12s,box-shadow .12s;
}
#sendBtn:hover{transform:scale(1.07);box-shadow:0 5px 16px var(–glow);}

/* ══════════ EMOJI PANEL ══════════ */
#emojiPanel{
display:none;position:absolute;
bottom:calc(100% + 4px);left:0;right:0;max-width:330px;
background:var(–bg3);border:1px solid var(–border);
border-radius:12px;padding:8px;z-index:200;
box-shadow:0 8px 26px rgba(0,0,0,.55);
max-height:205px;
}
#emojiPanel.open{display:block;}
.eptabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.eptab{
padding:2px 7px;border-radius:6px;font-size:.62rem;font-weight:700;
cursor:pointer;background:var(–bg4);border:1px solid var(–border);
color:var(–text2);transition:all .1s;
}
.eptab.active{background:var(–acc);color:#fff;border-color:var(–acc);}
#eGrid{
display:flex;flex-wrap:wrap;gap:2px;
overflow-y:auto;max-height:130px;
}
#eGrid::-webkit-scrollbar{width:3px;}
#eGrid::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px;}
.ei{
font-size:1.15rem;cursor:pointer;padding:3px;
border-radius:5px;transition:background .09s,transform .09s;
}
.ei:hover{background:var(–bg4);transform:scale(1.18);}

/* ══════════ MODALS ══════════ */
.ov{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.8);z-index:400;
align-items:center;justify-content:center;
padding:16px;
}
.ov.open{display:flex;}
.modal{
background:var(–card);border:1px solid var(–border);
border-radius:18px;padding:20px 18px;
width:min(380px,100%);position:relative;
box-shadow:0 0 60px rgba(124,92,191,.25);
animation:mIn2 .2s cubic-bezier(.34,1.56,.64,1) both;
max-height:90vh;overflow-y:auto;
}
.modal::-webkit-scrollbar{width:3px;}
.modal::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px;}
@keyframes mIn2{
from{opacity:0;transform:scale(.88) translateY(14px);}
to{opacity:1;transform:none;}
}
.modal h2{font-size:.95rem;font-weight:900;margin-bottom:13px;}
.cls{
position:sticky;top:0;float:right;
background:var(–bg3);border:1px solid var(–border);
color:var(–text2);width:24px;height:24px;
border-radius:6px;cursor:pointer;
font-size:.72rem;display:flex;align-items:center;justify-content:center;
margin-bottom:4px;
}
.cls:hover{color:var(–danger);}
.mf{margin-bottom:10px;}
.mf label{
display:block;font-size:.6rem;font-weight:900;
color:var(–acc3);letter-spacing:.07em;
text-transform:uppercase;margin-bottom:3px;
}
.mf input,.mf select,.mf textarea{
width:100%;padding:8px 10px;
background:var(–bg3);border:1.5px solid var(–border);
border-radius:9px;color:var(–text);
font-family:‘Noto Sans Georgian’,sans-serif;font-size:.8rem;
outline:none;transition:border-color .15s;
}
.mf input:focus,.mf select:focus,.mf textarea:focus{
border-color:var(–acc);box-shadow:0 0 0 3px var(–glow);
}
.mf textarea{resize:vertical;min-height:55px;}
.mf select option{background:var(–bg3);}
.mbtn{
width:100%;padding:10px;border:none;border-radius:10px;
font-family:‘Noto Sans Georgian’,sans-serif;
font-size:.84rem;font-weight:900;cursor:pointer;
background:linear-gradient(135deg,var(–acc2),var(–acc));
color:#fff;box-shadow:0 3px 12px var(–glow);
transition:transform .12s;margin-top:4px;
}
.mbtn:hover{transform:translateY(-2px);}
.mbtn.sec{background:var(–bg3);color:var(–text2);border:1px solid var(–border);box-shadow:none;}
.mbtn.sec:hover{background:var(–bg4);}
.mbtn.red{background:linear-gradient(135deg,#f87171,#dc2626);}
.mbox{
padding:6px 10px;border-radius:8px;
font-size:.72rem;text-align:center;margin-top:6px;
}
.mbox.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:#f87171;}
.mbox.ok{background:rgba(110,231,183,.07);border:1px solid rgba(110,231,183,.18);color:#6ee7b7;}
.divider{height:1px;background:var(–border);margin:10px 0;}

/* PROFILE */
.phdr{display:flex;gap:11px;align-items:center;margin-bottom:12px;}
.pbav{
width:50px;height:50px;border-radius:50%;
background:linear-gradient(135deg,var(–acc),#3b1f7a);
display:flex;align-items:center;justify-content:center;
font-size:1.4rem;font-weight:900;flex-shrink:0;
box-shadow:0 0 16px var(–glow);
}
.ptabs{
display:flex;gap:3px;margin-bottom:10px;
border-bottom:1px solid var(–border);padding-bottom:7px;
}
.pt{
padding:4px 9px;border-radius:7px;font-size:.68rem;font-weight:700;
cursor:pointer;background:var(–bg3);color:var(–text2);
border:1px solid var(–border);transition:all .11s;
}
.pt.active{background:var(–acc);color:#fff;border-color:var(–acc);}

}

background:rgba(0,0,0,.65);padding:2px 4px;
display:flex;gap:2px;font-size:.58rem;
}
.aup{
border:2px dashed var(–border);border-radius:7px;
aspect-ratio:1;display:flex;align-items:center;
justify-content:center;cursor:pointer;
font-size:1.1rem;color:var(–text3);
transition:all .12s;
}
.aup:hover{border-color:var(–acc);color:var(–acc);}

.fbtn{
flex:1;min-width:80px;padding:7px;border-radius:8px;
cursor:pointer;font-family:‘Noto Sans Georgian’,sans-serif;
font-size:.7rem;font-weight:700;border:none;transition:all .12s;

.fb-dm{background:rgba(96,165,250,.09);color:var(–admin);border:1px solid rgba(96,165,250,.18);}

.admt{font-size:.57rem;color:var(–text3);font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.admrow{display:flex;gap:4px;flex-wrap:wrap;}
.abtn{
padding:4px 9px;border-radius:6px;cursor:pointer;
font-size:.67rem;font-weight:700;
font-family:‘Noto Sans Georgian’,sans-serif;border:none;transition:all .11s;
}
.ab-adm{background:rgba(96,165,250,.12);color:var(–admin);}
.ab-fnd{background:rgba(244,114,182,.12);color:var(–founder);}
.ab-rev{background:rgba(251,191,36,.09);color:#fbbf24;}
.ab-blk{background:rgba(248,113,113,.09);color:var(–danger);}

#dmModal{
max-width:450px;height:min(540px,85vh);
display:flex;flex-direction:column;
padding:0;overflow:hidden;
}
#dmHdr{
padding:11px 13px;border-bottom:1px solid var(–border);
display:flex;align-items:center;gap:7px;flex-shrink:0;
}

padding:10px 11px;display:flex;flex-direction:column;gap:2px;

#dmFoot{padding:6px 10px 8px;border-top:1px solid var(–border);}

background:var(–bg3);border:1.5px solid var(–border);

#ctx{

async function loadProfile(){
  let{data}=await sb.from('profiles').select('*').eq('id',me.id).single();

    const nick=me.user_metadata?.nickname||me.email.split('@')[0];

    const{data:nd}=await sb.from('profiles').insert({
      id:me.id,nickname:nick,role,

async function updatePresence(on){

async function loadMsgs(){

    area.innerHTML='<div style="text-align:center;color:var(--text3);font-size:.72rem;padding:45px 16px;">✨ პირველი შეტყობინება გახდი!</div>';

function buildMsgEl(m,isDM=false){
  const own=m.user_id===me.id;
  const isFounder=myProf?.role==='founder';
  const isAdmin=myProf?.role==='admin'||isFounder;
  const canDel=isAdmin||own;
  const p=m.profiles||{};
  const nick=p.nickname||'?';
  const letter=p.avatar_letter||nick[0]?.toUpperCase()||'?';
  const role=p.role||'member';
  const time=new Date(m.created_at).toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});
  let roleTag='';
  if(role==='founder')roleTag=`<span class="fT">👑 დამფუძვნებელი</span>`;
  else if(role==='admin')roleTag=`<span class="aT">🛡️ ადმინი</span>`;
  const del=canDel?`<button class="mdel" onclick="delMsg('${m.id}')">🗑</button>`:'';

  let body='';
  if(m.type==='voice'){
    body=`<div class="vbub">
      <span class="vmic">🎙️</span>
      <button class="vplay" onclick="playVoice(this,'${m.content}')">▶</button>
      <div class="vtrk"><div class="vprg" id="vp-${m.id}"></div></div>
      <span class="vdur">${m.voice_duration||'0:00'}</span>
    </div>`;
  }else{
    const colored=m.txt_color?`style="color:${m.txt_color}"`:own?'style="color:#fff"':'';
    body=`<div class="mbody" ${colored}>${formatMsgText(esc(m.content))}</div>`;
  }

  // Reactions
  const reacts=(m.reactions||{});
  let reactsHTML='';
  const reactKeys=Object.keys(reacts);
  if(reactKeys.length){
    reactsHTML='<div class="msg-reacts">';
    reactKeys.forEach(em=>{
      const cnt=reacts[em]?.length||0;
      if(cnt>0)reactsHTML+=`<span class="msg-react-item" onclick="toggleReact('${m.id}','${em}')">${em} ${cnt}</span>`;
    });
    reactsHTML+='</div>';
  }

  const row=document.createElement('div');
  row.className='mrow'+(own?' own':'');
  row.dataset.id=m.id;
  row.innerHTML=`
    <div class="mav" onclick="openProf('${m.user_id}')" oncontextmenu="showCtx(event,'${m.user_id}');return false;">${letter}</div>
    <div class="mbub">
      ${!own?`<div class="msndr">${esc(nick)} ${roleTag}<span class="tI">${time}</span></div>`:''}
      ${body}
      ${reactsHTML}
      <div class="mmeta">
        ${own?`<span>${time}</span><span class="tick">${(m.read_by?.length||0)>1?'✓✓':'✓'}</span>`:''}
        <button style="background:none;border:none;cursor:pointer;font-size:.65rem;color:var(--text3);" onclick="toggleReactPopup(this,'${m.id}')">😊</button>
        ${del}
      </div>
      <div class="react-popup" id="rp-${m.id}">${['❤️','😂','😍','🔥','😮','👍','💜','✨'].map(e=>`<span class="re" onclick="toggleReact('${m.id}','${e}');closeReactPopups()">${e}</span>`).join('')}</div>
    </div>`;
  return row;
}

function formatMsgText(txt){
  return txt
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.*?)\*/g,'<i>$1</i>')
    .replace(/~~(.*?)~~/g,'<s>$1</s>');
}

function toggleReactPopup(btn,msgId){
  closeReactPopups();
  const p=document.getElementById(`rp-${msgId}`);
  if(p)p.classList.toggle('open');
}
function closeReactPopups(){
  document.querySelectorAll('.react-popup.open').forEach(p=>p.classList.remove('open'));
}

async function toggleReact(msgId,emoji){
  const{data:m}=await sb.from('messages').select('reactions').eq('id',msgId).single();
  const reacts=m?.reactions||{};
  if(!reacts[emoji])reacts[emoji]=[];
  const idx=reacts[emoji].indexOf(me.id);
  if(idx>-1)reacts[emoji].splice(idx,1);
  else reacts[emoji].push(me.id);
  await sb.from('messages').update({reactions:reacts}).eq('id',msgId);
}

function subMsgs(){
  msgSub=sb.channel(`msgs-room-${curRoom}`)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:`room_id=eq.${curRoom}`},
    async p=>{
      const area=document.getElementById('msgsArea');
      if(p.eventType==='INSERT'){
        const{data}=await sb.from('messages').select('*,profiles(nickname,role,avatar_letter)').eq('id',p.new.id).single();
        if(data){area.appendChild(buildMsgEl(data));area.scrollTop=area.scrollHeight;markRead([data]);}
      }
      if(p.eventType==='UPDATE'){
        const old=document.querySelector(`[data-id="${p.new.id}"]`);
        if(old){const{data}=await sb.from('messages').select('*,profiles(nickname,role,avatar_letter)').eq('id',p.new.id).single();if(data){const newEl=buildMsgEl(data);old.replaceWith(newEl);}}
      }
      if(p.eventType==='DELETE'){document.querySelector(`[data-id="${p.old.id}"]`)?.remove();}
    }).subscribe();
}

function subTyping(){
  typingCh=sb.channel(`typing-room-${curRoom}`)
    .on('broadcast',{event:'typing'},({payload})=>{

async function delMsg(id){

async function markRead(msgs){
  for(const m of msgs){

function setupVoice(){

  btn.addEventListener('touchstart',e=>{e.preventDefault();startRec();},{passive:false});

  const dbtn=document.getElementById('dmVoiceBtn');
  dbtn.addEventListener('mousedown',()=>startRec(true));
  dbtn.addEventListener('mouseup',()=>stopRec(true));
  dbtn.addEventListener('touchstart',e=>{e.preventDefault();startRec(true);},{passive:false});
  dbtn.addEventListener('touchend',()=>stopRec(true));
}

async function startRec(forDM=false){
  if(isRec||isDMRec)return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recMR=new MediaRecorder(stream);recCh=[];
    recMR.ondataavailable=e=>recCh.push(e.data);
    recMR.onstop=()=>finishRec(forDM);
    recMR.start();
    if(forDM)isDMRec=true; else isRec=true;
    recSec=0;
    if(!forDM){
      document.getElementById('recRow').classList.add('on');
      document.getElementById('voiceBtn').classList.add('rec');
    }else{
      document.getElementById('dmVoiceBtn').classList.add('rec');
    }
    recIv=setInterval(()=>{
      recSec++;const m=Math.floor(recSec/60),s=recSec%60;
      if(!forDM)document.getElementById('recTime').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
  }catch{toast('მიკროფონი ვერ ჩაირთო 😢');}
}

function stopRec(forDM=false){
  if((!forDM&&!isRec)||(forDM&&!isDMRec)||!recMR)return;
  recMR.stop();recMR.stream.getTracks().forEach(t=>t.stop());
  if(forDM)isDMRec=false; else isRec=false;
  clearInterval(recIv);
  if(!forDM){document.getElementById('recRow').classList.remove('on');document.getElementById('voiceBtn').classList.remove('rec');}
  else{document.getElementById('dmVoiceBtn').classList.remove('rec');}
}

function cancelRec(){stopRec(false);recCh=[];}

async function finishRec(forDM=false){
  if(!recCh.length)return;
  const blob=new Blob(recCh,{type:'audio/webm'});
  const fname=`voice/${me.id}/${Date.now()}.webm`;
  const{error}=await sb.storage.from('voice-messages').upload(fname,blob);
  if(error){toast('ვოისი ვერ აიტვირთა');return;}
  const{data}=sb.storage.from('voice-messages').getPublicUrl(fname);
  const m=Math.floor(recSec/60),s=recSec%60;
  const dur=`${m}:${s.toString().padStart(2,'0')}`;
  if(forDM&&curDMUser){
    await sb.from('messages').insert({user_id:me.id,to_user_id:curDMUser.id,content:data.publicUrl,type:'voice',voice_duration:dur,is_dm:true,room_id:0,read_by:[me.id],reactions:{}});
    loadDMMsgs(curDMUser);
  }else{
    await sb.from('messages').insert({user_id:me.id,room_id:curRoom,content:data.publicUrl,type:'voice',voice_duration:dur,is_dm:false,read_by:[me.id],reactions:{}});
  }
}

function playVoice(btn,url){
  const audio=new Audio(url);audio.play();
  btn.textContent='⏸';audio.onended=()=>btn.textContent='▶';
}

/* FORMAT */
function fmt(type){
  const inp=document.getElementById('msgInput');
  const start=inp.selectionStart,end=inp.selectionEnd;
  const sel=inp.value.substring(start,end);
  let wrap='';
  if(type==='bold')wrap='**';
  else if(type==='italic')wrap='*';
  else if(type==='strike')wrap='~~';
  if(sel){
    inp.value=inp.value.substring(0,start)+wrap+sel+wrap+inp.value.substring(end);
  }else{
    inp.value+=wrap+wrap;
    inp.setSelectionRange(inp.value.length-wrap.length,inp.value.length-wrap.length);
  }
  inp.focus();
}

      <button class="pt active" onclick="swPT(this,'sp-edit')">✏️ რედაქტირება</button>
      <button class="pt" onclick="swPT(this,'sp-album')">📸 ალბომი</button>
      ${isFounder?`<button class="pt" onclick="closeOv('selfOv');openOv('emOv');loadEmList()">😄 სმაილები</button>`:''}
    </div>
    <div class="pp active" id="sp-edit">
      <div class="mf"><label>ნიკნეიმი</label><input id="snick" value="${esc(myProf.nickname)}" maxlength="30"/></div>
      <div class="mf"><label>სტატუსი / ემოცია</label><input id="sstat" value="${esc(myProf.status||'')}" placeholder="😎 ჩემი სტატუსი..." maxlength="80"/></div>
      <button class="mbtn" onclick="saveSelf()">შენახვა ✅</button>
      <div id="selfMsg"></div>
    </div>
    <div class="pp" id="sp-album">${buildAlbum(photos||[],me.id,true)}</div>`;
  openOv('selfOv');
}

async function saveSelf(){
  const nick=document.getElementById('snick').value.trim();
  const stat=document.getElementById('sstat').value.trim();
  if(!nick){showMB('selfMsg','ნიკნეიმი სავალდებულოა','err');return;}
  const{error}=await sb.from('profiles').update({nickname:nick,status:stat}).eq('id',me.id);
  if(error){showMB('selfMsg','შეცდომა!','err');return;}
  myProf.nickname=nick;myProf.status=stat;
  showMB('selfMsg','შენახულია ✅','ok');
}

function swPT(btn,pid){
  const modal=btn.closest('.modal');
  modal.querySelectorAll('.pt').forEach(t=>t.classList.remove('active'));
  modal.querySelectorAll('.pp').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(pid)?.classList.add('active');
}

/* ═══════════════════════════════════
   ALBUM
═══════════════════════════════════ */
function buildAlbum(photos,uid,canUp){
  let h='<div class="agrid">';
  photos.forEach(p=>{
    const reacts=(p.reactions||[]).join('');
    h+=`<div class="ath" onclick="openPV('${p.id}','${p.url}')">
      <img src="${p.url}" alt="" loading="lazy"/>
      <div class="areact">${reacts}</div>
    </div>`;
  });
  if(canUp){h+=`<label class="aup" title="ფოტოს დამატება">＋<input type="file" accept="image/*" style="display:none" onchange="uploadPhoto(this)"/></label>`;}
  h+='</div>';return h;
}

async function uploadPhoto(input){
  const file=input.files[0];if(!file)return;
  const fname=`photos/${me.id}/${Date.now()}_${file.name}`;
  const{error}=await sb.storage.from('user-photos').upload(fname,file);
  if(error){toast('ფოტო ვერ აიტვირთა');return;}
  const{data}=sb.storage.from('user-photos').getPublicUrl(fname);
  await sb.from('gallery').insert({user_id:me.id,url:data.publicUrl,reactions:[],comments:[]});
  toast('ფოტო დამატებულია 📸');
  openSelfProfile();
}

/* ═══════════════════════════════════
   PHOTO VIEWER
═══════════════════════════════════ */
async function openPV(photoId,url){
  curPhotoId=photoId;
  document.getElementById('pvImg').src=url;
  const{data}=await sb.from('gallery').select('*').eq('id',photoId).single();
  const reacts=['❤️','😂','😍','🔥','😮','👍','💜','✨'];
  document.getElementById('pvReacts').innerHTML=reacts.map(r=>`<button class="pvr" onclick="addPVReact('${photoId}','${r}')">${r}</button>`).join('');
  document.getElementById('pvComs').innerHTML=(data?.comments||[]).map(c=>`<div class="pvc">${esc(c)}</div>`).join('');
  document.getElementById('pvOv').classList.add('open');
}
function closePV(){document.getElementById('pvOv').classList.remove('open');}

async function addPVReact(id,em){
  const{data}=await sb.from('gallery').select('reactions').eq('id',id).single();
  const r=[...(data?.reactions||[]),em];
  await sb.from('gallery').update({reactions:r}).eq('id',id);
  toast(em+' დამატებულია!');
}

async function addPVCom(){
  const inp=document.getElementById('pvCI');
  const txt=inp.value.trim();if(!txt||!curPhotoId)return;
  const{data}=await sb.from('gallery').select('comments').eq('id',curPhotoId).single();
  const coms=[...(data?.comments||[]),`${myProf?.nickname}: ${txt}`];
  await sb.from('gallery').update({comments:coms}).eq('id',curPhotoId);
  inp.value='';
  document.getElementById('pvComs').innerHTML+=`<div class="pvc">${esc(myProf?.nickname)}: ${esc(txt)}</div>`;
}

/* ═══════════════════════════════════
   FRIENDS
═══════════════════════════════════ */
async function addFriend(uid){
  const{data:existing}=await sb.from('friends').select('*')
    .or(`and(user_id.eq.${me.id},friend_id.eq.${uid}),and(user_id.eq.${uid},friend_id.eq.${me.id})`);
  if(existing?.length){toast('მოთხოვნა უკვე გაგზავნილია');return;}
  await sb.from('friends').insert({user_id:me.id,friend_id:uid,status:'pending'});
  toast('მოთხოვნა გაიგზავნა 📨');closeOv('profOv');
}

async function rmFriend(uid){
  await sb.from('friends').delete()
    .or(`and(user_id.eq.${me.id},friend_id.eq.${uid}),and(user_id.eq.${uid},friend_id.eq.${me.id})`);
  toast('მეგობარი წაიშალა');closeOv('profOv');
}

async function showFriends(){
  const{data}=await sb.from('friends').select('*')
    .or(`user_id.eq.${me.id},friend_id.eq.${me.id}`);
  const el=document.getElementById('friendsBody');el.innerHTML='';
  if(!data?.length){el.innerHTML='<div style="text-align:center;color:var(--text3);padding:20px;font-size:.8rem;">მეგობრები არ გყავს ჯერ 😔</div>';openOv('friendsOv');return;}
  for(const f of data){
    const uid=f.user_id===me.id?f.friend_id:f.user_id;
    const{data:prof}=await sb.from('profiles').select('*').eq('id',uid).single();
    if(!prof)continue;
    const letter=prof.avatar_letter||prof.nickname[0]?.toUpperCase()||'?';
    const div=document.createElement('div');div.className='frlist-item';
    div.innerHTML=`
      <div class="fav">${letter}</div>
      <div class="fname">${esc(prof.nickname)}<div style="font-size:.6rem;color:var(--text3);">${f.status==='pending'?'⏳ მოლოდინში':'✅ მეგობარი'}</div></div>
      <div class="factions">
        <button class="faction fa-msg" onclick="closeOv('friendsOv');openDMById('${uid}')">💬</button>
        <button class="faction fa-rm" onclick="rmFriend('${uid}')">✕</button>
      </div>`;
    el.appendChild(div);
  }
  openOv('friendsOv');
}

async function setRole(uid,role){
  if(myProf?.role!=='founder'){toast('მხოლოდ დამფუძვნებელი! 👑');return;}
  await sb.from('profiles').update({role}).eq('id',uid);
  toast('როლი შეიცვალა ✅');closeOv('profOv');loadUsers();
}

async function blockUser(uid){
  if(!confirm('დაბლოკო?'))return;
  await sb.from('profiles').update({blocked:true,online:false}).eq('id',uid);
  toast('დაიბლოკა 🚫');closeOv('profOv');loadUsers();

/* ═══════════════════════════════════
   DM
═══════════════════════════════════ */
async function openDMById(uid){
  const{data:prof}=await sb.from('profiles').select('*').eq('id',uid).single();
  if(prof)openDM(prof);
}

async function openDM(prof){
  curDMUser=prof;
  const letter=prof.avatar_letter||prof.nickname[0]?.toUpperCase()||'?';
  document.getElementById('dmHdrAv').textContent=letter;
  document.getElementById('dmWith').textContent='💬 '+prof.nickname;
  document.getElementById('dmSeen').textContent='';
  await loadDMMsgs(prof);
  // Sub to DM updates
  if(dmSub){dmSub.unsubscribe();dmSub=null;}
  dmSub=sb.channel(`dm-${[me.id,prof.id].sort().join('-')}`)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages'},async p=>{
      if(!p.new?.is_dm)return;
      const isRelevant=(p.new.user_id===me.id&&p.new.to_user_id===prof.id)||(p.new.user_id===prof.id&&p.new.to_user_id===me.id);
      if(!isRelevant)return;
      if(p.eventType==='INSERT'){
        const{data}=await sb.from('messages').select('*,profiles(nickname,role,avatar_letter)').eq('id',p.new.id).single();
        if(data){const a=document.getElementById('dmMsgs');a.appendChild(buildMsgEl(data,true));a.scrollTop=a.scrollHeight;markDMRead(p.new.id);}
      }
    }).subscribe();
  openOv('dmOv');
}

async function loadDMMsgs(prof){
  const area=document.getElementById('dmMsgs');area.innerHTML='';
  const{data}=await sb.from('messages')
    .select('*,profiles(nickname,role,avatar_letter)')
    .eq('is_dm',true)
    .or(`and(user_id.eq.${me.id},to_user_id.eq.${prof.id}),and(user_id.eq.${prof.id},to_user_id.eq.${me.id})`)
    .order('created_at',{ascending:true}).limit(100);
  (data||[]).forEach(m=>{area.appendChild(buildMsgEl(m,true));});
  area.scrollTop=area.scrollHeight;
  // Mark all as read
  for(const m of (data||[])){
    if(m.user_id!==me.id&&!(m.read_by||[]).includes(me.id)){
      await markDMRead(m.id);
    }
  }
  // Show seen on last own msg
  const lastOwn=(data||[]).filter(m=>m.user_id===me.id).pop();
  if(lastOwn&&(lastOwn.read_by?.length||0)>1){
    document.getElementById('dmSeen').textContent='✓✓ ნანახია';
  }
}

async function markDMRead(msgId){
  const{data:m}=await sb.from('messages').select('read_by').eq('id',msgId).single();
  const rb=m?.read_by||[];
  if(!rb.includes(me.id))await sb.from('messages').update({read_by:[...rb,me.id]}).eq('id',msgId);
}

async function sendDM(){
  if(!curDMUser)return;
  const inp=document.getElementById('dmInput');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';atz(inp);
  await sb.from('messages').insert({
    user_id:me.id,to_user_id:curDMUser.id,
    content:txt,type:'text',is_dm:true,
    room_id:0,read_by:[me.id],reactions:{}
  });
}

async function showDMList(){
  const{data}=await sb.from('messages').select('user_id,to_user_id')
    .eq('is_dm',true)
    .or(`user_id.eq.${me.id},to_user_id.eq.${me.id}`)
    .order('created_at',{ascending:false});
  const seen=new Set();const partners=[];
  (data||[]).forEach(m=>{
    const pid=m.user_id===me.id?m.to_user_id:m.user_id;
    if(pid&&!seen.has(pid)){seen.add(pid);partners.push(pid);}
  });
  const el=document.getElementById('dmListBody');el.innerHTML='';
  if(!partners.length){el.innerHTML='<div style="text-align:center;color:var(--text3);padding:20px;font-size:.8rem;">პირადი შეტყობინებები არ გაქვს</div>';}
  for(const pid of partners.slice(0,15)){
    const{data:prof}=await sb.from('profiles').select('*').eq('id',pid).single();
    if(!prof)continue;
    const letter=prof.avatar_letter||prof.nickname[0]?.toUpperCase()||'?';
    const div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:9px;padding:8px 5px;border-radius:8px;cursor:pointer;border-bottom:1px solid var(--border);';
    div.onmouseover=()=>div.style.background='var(--bg3)';
    div.onmouseout=()=>div.style.background='';
    div.innerHTML=`<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#3b1f7a);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;flex-shrink:0;">${letter}</div>
      <div style="flex:1;"><div style="font-size:.8rem;font-weight:700;">${esc(prof.nickname)}</div>${prof.online?'<div style="font-size:.6rem;color:var(--odot);">🟢 ონლაინი</div>':''}</div>`;
    div.onclick=()=>{closeOv('dmListOv');openDM(prof);};
    el.appendChild(div);
  }
  openOv('dmListOv');
}

function toggleDMEmoji(){
  const p=document.getElementById('dmEmojiPanel');
  const isOpen=p.style.display!=='none';
  p.style.display=isOpen?'none':'block';
  if(!isOpen){
    const grid=document.getElementById('dmEGrid');grid.innerHTML='';
    const allEm=[...Object.values(EMOJIS).flat(),...Object.values(customEmojis).flat()];
    allEm.forEach(em=>{
      const s=document.createElement('span');s.className='ei';s.textContent=em;
      s.onclick=()=>{document.getElementById('dmInput').value+=em;p.style.display='none';};
      grid.appendChild(s);
    });
  }
}

/* ═══════════════════════════════════
   EMOJI PANEL
═══════════════════════════════════ */
async function loadCustomEmojis(){
  const{data}=await sb.from('global_emojis').select('*');
  if(data)data.forEach(r=>{
    if(!customEmojis[r.category])customEmojis[r.category]=[];
    customEmojis[r.category].push(r.emoji);
  });
}

function buildEmojiPanel(){
  const allCats={...EMOJIS,...customEmojis};
  const tabs=document.getElementById('epTabs');
  const cats=Object.keys(allCats);
  tabs.innerHTML='';
  cats.forEach((cat,i)=>{
    const b=document.createElement('button');
    b.className='eptab'+(i===0?' active':'');
    b.textContent=cat;
    b.onclick=()=>{tabs.querySelectorAll('.eptab').forEach(t=>t.classList.remove('active'));b.classList.add('active');renderEGrid(allCats[cat]);};
    tabs.appendChild(b);
  });
  if(cats.length)renderEGrid(allCats[cats[0]]);
}

function renderEGrid(ems){
  const g=document.getElementById('eGrid');g.innerHTML='';
  ems.forEach(em=>{
    const s=document.createElement('span');s.className='ei';s.textContent=em;
    s.onclick=()=>{
      document.getElementById('msgInput').value+=em;
      document.getElementById('msgInput').focus();
      toggleEmoji(false);
    };
    g.appendChild(s);
  });
}

function toggleEmoji(force){
  const p=document.getElementById('emojiPanel');
  p.classList.toggle('open',force!==undefined?force:!p.classList.contains('open'));
}

async function addEmoji(){
  if(myProf?.role!=='founder'){toast('მხოლოდ დამფუძვნებელი! 👑');return;}
  const cat=document.getElementById('emCat').value.trim();
  const em=document.getElementById('emEm').value.trim();
  if(!cat||!em){showMB('emMsg','შეავსე ველები','err');return;}
  const{error}=await sb.from('global_emojis').insert({category:cat,emoji:em});
  if(error){showMB('emMsg','შეცდომა','err');return;}
  if(!customEmojis[cat])customEmojis[cat]=[];
  customEmojis[cat].push(em);
  buildEmojiPanel();loadEmList();
  showMB('emMsg','დამატებულია ✅','ok');
}

async function loadEmList(){
  const{data}=await sb.from('global_emojis').select('*');
  const el=document.getElementById('emList');if(!el)return;
  el.innerHTML=(data||[]).map(r=>`<div class="emrow"><span>${r.emoji}</span><span style="color:var(--text3);font-size:.68rem;">${esc(r.category)}</span><button onclick="delEmoji('${r.id}')">🗑️</button></div>`).join('');
}

async function delEmoji(id){
  await sb.from('global_emojis').delete().eq('id',id);
  customEmojis={};await loadCustomEmojis();buildEmojiPanel();loadEmList();
}

/* ═══════════════════════════════════
   THEMES
═══════════════════════════════════ */
function buildThemeUI(){
  // Theme grid
  const tg=document.getElementById('themeGrid');
  THEMES.forEach(t=>{
    const div=document.createElement('div');
    div.className='theme-opt';div.dataset.tid=t.id;
    div.innerHTML=`<div class="theme-dot" style="background:${t.color};"></div><span>${t.name}</span>`;
    div.onclick=()=>applyTheme(t.id);
    tg.appendChild(div);
  });
  // Text color grid
  const cg=document.getElementById('txtColGrid');
  TXT_COLORS.forEach(tc=>{
    const div=document.createElement('div');
    div.className='tcol';div.style.background=tc.c;div.title=tc.n;
    div.onclick=()=>setTxtColor(tc.c);
    cg.appendChild(div);
  });
}

function applyTheme(tid){
  document.body.className='';
  if(tid==='default'){}
  else if(isLight)document.body.classList.add('light',`theme-${tid}`);
  else document.body.classList.add(`theme-${tid}`);
  localStorage.setItem('km-theme',tid);
  document.querySelectorAll('.theme-opt').forEach(el=>{el.classList.toggle('active',el.dataset.tid===tid);});
  toast('თემა შეიცვალა 🎨');
}

function toggleLight(){
  isLight=!isLight;
  const cur=localStorage.getItem('km-theme')||'default';
  document.body.className='';
  if(isLight)document.body.classList.add('light');
  if(cur!=='default')document.body.classList.add(`theme-${cur}`);
  document.getElementById('themeBtn').textContent=isLight?'☀️':'🌙';
  localStorage.setItem('km-light',isLight?'1':'0');
}

function applyStoredTheme(){
  const tid=localStorage.getItem('km-theme')||'default';
  const light=localStorage.getItem('km-light')==='1';
  isLight=light;
  if(light)document.body.classList.add('light');
  if(tid!=='default')document.body.classList.add(`theme-${tid}`);
  document.getElementById('themeBtn').textContent=light?'☀️':'🌙';
}

/* ═══════════════════════════════════
   CTX MENU
═══════════════════════════════════ */
function showCtx(e,uid){
  e.preventDefault();closeCtx();
  const isAdmin=myProf?.role==='admin'||myProf?.role==='founder';
  const menu=document.getElementById('ctx');
  menu.innerHTML=`
    <div class="ci" onclick="openProf('${uid}')">👤 პროფილი</div>
    <div class="ci" onclick="closeCtx();openDMById('${uid}')">💬 შეტყობინება</div>
    <div class="ci" onclick="closeCtx();addFriend('${uid}')">➕ მეგობრობა</div>
    ${isAdmin?`<div class="ci red" onclick="closeCtx();blockUser('${uid}')">🚫 ბლოკი</div>`:''}`;
  menu.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';
  menu.style.top=Math.min(e.clientY,window.innerHeight-140)+'px';
  menu.classList.add('open');
}
function closeCtx(){document.getElementById('ctx').classList.remove('open');}

/* ═══════════════════════════════════
   PARTICLES
═══════════════════════════════════ */
function startParticles(){
  const layer=document.getElementById('pLayer');
  const chars=['🩷','💖','💗','❤️‍🔥','💜','💞','💓','✨','💝','💘','💫','🌸','🌺','🌻','🌹','🍀','⭐','🌟','🦋','🌙','💐'];
  function spawn(){
    const el=document.createElement('div');el.className='pt';
    el.textContent=chars[Math.floor(Math.random()*chars.length)];
    const size=10+Math.random()*18,left=Math.random()*97,dur=7+Math.random()*9,delay=Math.random()*2;
    el.style.cssText=`left:${left}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
    layer.appendChild(el);
    setTimeout(()=>el.remove(),(dur+delay+1)*1000);
  }
  for(let i=0;i<20;i++)spawn();
  setInterval(spawn,350);
}

/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}
function showMB(id,txt,type){
  const el=document.getElementById(id);
  if(el)el.innerHTML=`<div class="mbox ${type}">${txt}</div>`;
}
function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
async function doLogout(){await updatePresence(false);await sb.auth.signOut();location.href='index.html';}

// Close on outside click
document.addEventListener('click',e=>{
  if(!document.getElementById('emojiPanel').contains(e.target)&&e.target.id!=='emBtn')
    toggleEmoji(false);
  if(!document.getElementById('ctx').contains(e.target))closeCtx();
  if(!document.getElementById('colorPicker').contains(e.target)&&!e.target.closest('[onclick="toggleColors()"]'))
    document.getElementById('colorPicker').classList.remove('open');
});

init();
