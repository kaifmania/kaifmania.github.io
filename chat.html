<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>კაიფმანია - პრემიუმ ჩატი</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7a1fc8">
<meta name="mobile-web-app-capable" content="yes">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1c1a30;--panel:#252240;--panel2:#2e2a50;--border:rgba(160,80,255,0.35);
  --text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;--input-bg:#221f3a;
  --online:#4ade80;--indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.18);
  --accent:#f07aff;--typing:#a78bfa;--read:#34d399;
}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
@keyframes msgPop{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes typingDots{0%,20%{opacity:0}50%{opacity:1}to{opacity:0}}
.msg-row{animation:msgPop 0.25s ease}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--indigo2);color:#fff;padding:8px 20px;border-radius:30px;z-index:99999;font-size:13px}
.hidden{display:none!important}
/* navbar */
#topnav{display:flex;align-items:center;gap:2px;background:var(--panel);border-bottom:1px solid var(--border);padding:6px 12px;flex-shrink:0;overflow-x:auto}
.nav-logo{font-size:24px;margin-right:8px;cursor:pointer}
.nav-btn{height:36px;border-radius:10px;background:transparent;border:1px solid transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;padding:0 12px}
.nav-btn.active,.nav-btn:hover{background:var(--indigo-f);border-color:var(--border);color:var(--text)}
.nav-spacer{flex:1}
#app{display:flex;flex:1;min-height:0}
#sidebar{width:270px;background:var(--panel);border-right:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
@media(max-width:640px){#sidebar{display:none}}
.sb-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:9px;color:var(--text2);text-transform:uppercase}
.sb-body{flex:1;overflow-y:auto;padding:10px}
.room-item,.user-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:14px;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
.room-item.active,.user-item:hover{background:var(--indigo-f);border-color:var(--border)}
.room-icon,.avatar{width:36px;height:36px;border-radius:50%;background:var(--indigo-f);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.online-dot{width:10px;height:10px;background:var(--online);border-radius:50%;border:2px solid var(--panel);position:absolute;bottom:0;right:0}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px}
.chat-title{font-weight:700;font-size:14px}
.chat-sub{font-size:11px;background:var(--indigo-f);padding:3px 12px;border-radius:20px;margin-left:auto}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-content{max-width:72%;display:flex;flex-direction:column}
.msg-bubble{background:var(--bubble);border-radius:4px 16px 16px 16px;padding:10px 14px;font-size:14px;word-break:break-word}
.msg-bubble.mine{background:rgba(120,30,200,0.28);border-radius:16px 4px 16px 16px}
.msg-meta{display:flex;gap:6px;margin-bottom:4px;font-size:10px}
.msg-nick{font-weight:600;color:var(--indigo2);cursor:pointer}
.msg-time,.msg-status{font-size:9px;color:var(--text3)}
.msg-del,.msg-admin-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;margin-left:6px}
.msg-audio{display:flex;align-items:center;gap:8px;background:var(--panel2);border-radius:20px;padding:6px 12px}
.audio-play{background:var(--indigo);border:none;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer}
.typing-indicator{font-size:11px;color:var(--typing);padding:4px 12px;font-style:italic}
.chat-bar{background:var(--panel);border-top:1px solid var(--border);padding:10px 16px}
.input-row{display:flex;gap:8px;align-items:center}
#msgInput{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:24px;padding:10px 16px;color:var(--text);outline:none;resize:none;max-height:100px}
.send-btn,.mic-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;color:#fff;cursor:pointer;font-size:18px}
.mic-btn{background:var(--panel2);border:1px solid var(--border)}
.recording{animation:pulse 1s infinite;background:#ff4444}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:10000;display:none;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-card{background:var(--panel);border-radius:26px;width:90%;max-width:400px;padding:24px}
.modal-card h3{margin-bottom:16px}
.user-action-btn{width:100%;padding:12px;margin:6px 0;border-radius:16px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text);cursor:pointer}
.dm-box{position:fixed;right:16px;bottom:16px;width:350px;height:500px;background:var(--panel);border-radius:24px;border:1px solid var(--border);display:none;flex-direction:column;z-index:15000}
.dm-box.open{display:flex}
.dm-header{padding:12px;background:var(--indigo);border-radius:24px 24px 0 0;display:flex;align-items:center;gap:8px}
.dm-title{flex:1;font-weight:600}
.dm-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.dm-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.dm-msg{max-width:80%;padding:8px 12px;border-radius:18px;margin-bottom:4px}
.dm-msg.mine{background:var(--indigo-f);align-self:flex-end;border-radius:18px 4px 18px 18px}
.dm-msg.theirs{background:var(--bubble);align-self:flex-start;border-radius:4px 18px 18px 18px}
.dm-status{font-size:9px;color:var(--text3);margin-top:2px}
.dm-typing{font-size:10px;color:var(--typing);padding:4px 12px}
.dm-bar{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border)}
#dmInput{flex:1;background:var(--input-bg);border:none;border-radius:20px;padding:10px;color:#fff}
.voice-note{display:flex;align-items:center;gap:6px;background:var(--indigo-f);padding:5px 12px;border-radius:30px}
</style>
</head>
<body>

<div id="topnav">
  <div class="nav-logo" onclick="document.getElementById('sidebar').classList.toggle('hidden')">🔥</div>
  <button class="nav-btn active" id="navRooms" onclick="showPanel('rooms')">💬 ოთახები</button>
  <button class="nav-btn" id="navUsers" onclick="showPanel('users')">🌐 მომხმარებლები</button>
  <div class="nav-spacer"></div>
  <button class="nav-btn" onclick="openMyProfile()">👤</button>
  <button class="nav-btn" onclick="logout()">🚪</button>
</div>

<div id="app">
  <div id="sidebar">
    <div id="panelRooms"><div class="sb-header">📌 ოთახები</div><div class="sb-body" id="roomList"></div></div>
    <div id="panelUsers" class="hidden"><div class="sb-header">👥 მომხმარებლები</div><div class="sb-body"><input class="inp" id="userSearch" placeholder="🔍 ძებნა..." oninput="filterUsers()" style="width:100%;margin-bottom:8px;padding:8px;border-radius:20px;background:var(--input-bg);border:none;color:#fff"><div id="usersList"></div></div></div>
  </div>
  <div id="main">
    <div class="chat-header"><div id="roomIcon">🏠</div><div class="chat-title" id="roomTitle">მთავარი</div><div class="chat-sub" id="onlineCnt">● 0 ონლაინი</div></div>
    <div id="messages"></div>
    <div class="chat-bar">
      <div class="input-row">
        <textarea id="msgInput" placeholder="შეტყობინება..." rows="1" onkeydown="handleMsgKey(event)"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleVoiceRecord()">🎙️</button>
        <button class="send-btn" onclick="sendMessage()">✈️</button>
      </div>
      <div id="typingStatus" class="typing-indicator"></div>
    </div>
  </div>
</div>

<!-- DM Panel -->
<div id="dmBox" class="dm-box"><div class="dm-header"><div class="avatar" id="dmAvatar">👤</div><div class="dm-title" id="dmTitle">პირადი</div><button class="dm-close" onclick="closeDM()">✕</button></div><div id="dmMsgs" class="dm-msgs"></div><div id="dmTyping" class="dm-typing"></div><div class="dm-bar"><input id="dmInput" placeholder="აკრიფე..."><button class="send-btn" style="width:40px;height:40px" onclick="sendDM()">✈️</button></div></div>

<!-- User Actions Modal -->
<div id="userModal" class="modal"><div class="modal-card"><h3 id="modalUserName"></h3><div id="modalActions"></div><button class="user-action-btn" onclick="closeModal()">დახურვა</button></div></div>

<script>
const SUPABASE_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let ME = null, MY_ROLE = 'member', CURRENT_ROOM = 1, DM_WITH = null;
let allUsers = [], roomMessages = [], dmMessages = [];
let typingTimeout = null, dmTypingTimeout = null;
let mediaRecorder = null, audioChunks = [], isRecording = false;
let currentVoiceBlob = null;

// Helper
function toast(msg){let t=document.createElement('div');t.className='toast';t.innerText=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
function esc(s){return String(s||'').replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}

// Online / realtime presence
async function updateLastSeen(){await sb.from('profiles').update({last_seen:new Date()}).eq('id',ME.id);}
setInterval(updateLastSeen, 30000);
function isOnline(ts){return ts && (Date.now() - new Date(ts).getTime() < 90000);}

// Load users & roles
async function loadUsers(){
  let {data} = await sb.from('profiles').select('*').order('username');
  allUsers = data||[];
  renderUserList();
  document.getElementById('onlineCnt').innerHTML = `● ${allUsers.filter(u=>isOnline(u.last_seen)).length} ონლაინი`;
}
function renderUserList(){
  let container = document.getElementById('usersList');
  if(!container) return;
  container.innerHTML = allUsers.filter(u=>u.id!==ME?.id).map(u=>`
    <div class="user-item" onclick="openUserActions('${u.id}','${esc(u.username)}')">
      <div class="avatar">${u.avatar_url?`<img src="${u.avatar_url}">`:(u.emotion||'😊')}${isOnline(u.last_seen)?'<div class="online-dot"></div>':''}</div>
      <div><div>${esc(u.username)}</div><div style="font-size:10px;color:var(--text2)">${u.role||'member'}</div></div>
    </div>
  `).join('');
}
function filterUsers(){let q=document.getElementById('userSearch').value.toLowerCase();document.querySelectorAll('.user-item').forEach(el=>{el.style.display=el.innerText.toLowerCase().includes(q)?'flex':'none';});}

// Room logic
const ROOMS = [{id:1,icon:'🏠',name:'მთავარი'},{id:2,icon:'🎭',name:'დისკუსია'}];
function buildRooms(){
  let el=document.getElementById('roomList'); el.innerHTML='';
  ROOMS.forEach(r=>{
    let div=document.createElement('div');div.className='room-item';div.innerHTML=`<div class="room-icon">${r.icon}</div><div>${r.name}</div>`;
    div.onclick=()=>switchRoom(r.id);
    el.appendChild(div);
  });
}
async function switchRoom(roomId){
  CURRENT_ROOM=roomId; document.getElementById('roomTitle').innerText=ROOMS.find(r=>r.id===roomId)?.name;
  await loadRoomMessages();
  if(window.roomChannel) sb.removeChannel(window.roomChannel);
  window.roomChannel = sb.channel(`room:${roomId}`)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`room_id=eq.${roomId}`},payload=>{addMessageToUI(payload.new,false);})
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'messages'},payload=>{document.getElementById(`msg-${payload.old.id}`)?.remove();})
    .subscribe();
}
async function loadRoomMessages(){
  let {data}=await sb.from('messages').select('*, profiles(username,role,avatar_url)').eq('room_id',CURRENT_ROOM).order('created_at',{ascending:true}).limit(200);
  roomMessages=data||[];
  let container=document.getElementById('messages'); container.innerHTML='';
  roomMessages.forEach(m=>addMessageToUI(m,true));
  container.scrollTop=container.scrollHeight;
}
function addMessageToUI(msg, isHistory){
  let isMine = msg.user_id===ME.id;
  let time = new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let avatarData = msg.profiles?.avatar_url ? `<img src="${msg.profiles.avatar_url}">` : (msg.profiles?.emotion||'😊');
  let contentHtml = '';
  if(msg.voice_url){
    contentHtml = `<div class="voice-note"><button class="audio-play" onclick="playAudio('${msg.voice_url}')">▶️</button><span>🎤 ხმოვანი შეტყობინება</span></div>`;
  } else {
    contentHtml = esc(msg.content).replace(/\n/g,'<br>');
  }
  let delBtn = '';
  if(isMine || MY_ROLE==='admin' || MY_ROLE==='founder') delBtn = `<button class="msg-del" onclick="deleteMessage('${msg.id}')">🗑</button>`;
  let msgDiv = document.createElement('div'); msgDiv.className='msg-row'; msgDiv.id=`msg-${msg.id}`;
  msgDiv.innerHTML = `
    <div class="avatar" style="cursor:pointer" onclick="openUserActions('${msg.user_id}','${esc(msg.profiles?.username)}')">${avatarData}</div>
    <div class="msg-content">
      <div class="msg-meta"><span class="msg-nick" onclick="openUserActions('${msg.user_id}','${esc(msg.profiles?.username)}')">${esc(msg.profiles?.username)}</span><span class="msg-time">${time}</span>${delBtn}</div>
      <div class="msg-bubble ${isMine?'mine':''}">${contentHtml}</div>
    </div>
  `;
  document.getElementById('messages').appendChild(msgDiv);
  if(!isHistory) document.getElementById('messages').scrollTop = 1e9;
}
async function sendMessage(){
  let inp = document.getElementById('msgInput'); let text = inp.value.trim();
  if(!text && !currentVoiceBlob) return;
  let voiceUrl = null;
  if(currentVoiceBlob){
    const fileName = `voice_${ME.id}_${Date.now()}.webm`;
    const {data,error} = await sb.storage.from('voices').upload(fileName, currentVoiceBlob);
    if(!error) voiceUrl = sb.storage.from('voices').getPublicUrl(fileName).data.publicUrl;
    currentVoiceBlob = null;
    document.getElementById('micBtn').style.background='';
  }
  if(text || voiceUrl){
    await sb.from('messages').insert({room_id:CURRENT_ROOM, user_id:ME.id, content:text||'', voice_url:voiceUrl, created_at:new Date()});
    inp.value = ''; inp.style.height='auto';
  }
}
async function deleteMessage(msgId){
  if(!confirm('წაშლა?')) return;
  await sb.from('messages').delete().eq('id',msgId);
}
function playAudio(url){ let audio=new Audio(url); audio.play(); }

// Voice recording
async function toggleVoiceRecord(){
  if(isRecording){ mediaRecorder?.stop(); isRecording=false; document.getElementById('micBtn').style.background=''; return; }
  let stream = await navigator.mediaDevices.getUserMedia({audio:true});
  mediaRecorder = new MediaRecorder(stream); audioChunks=[];
  mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
  mediaRecorder.onstop=()=>{ currentVoiceBlob = new Blob(audioChunks,{type:'audio/webm'}); toast('🎙️ ხმა მზადაა! დააჭირეთ გაგზავნას'); };
  mediaRecorder.start(); isRecording=true; document.getElementById('micBtn').style.background='#ff4444';
  setTimeout(()=>{ if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop(); }, 30000);
}

// Typing indicators (room)
let typingUsers = new Set();
function emitTyping(){
  if(window.typingChannel) sb.removeChannel(window.typingChannel);
  window.typingChannel = sb.channel(`typing:${CURRENT_ROOM}`);
  window.typingChannel.on('broadcast',{event:'typing'},({payload})=>{ if(payload.userId!==ME.id) showTyping(payload.username); }).subscribe();
  window.typingChannel.send({type:'broadcast',event:'typing',payload:{userId:ME.id, username:MY_USERNAME}});
  if(typingTimeout) clearTimeout(typingTimeout);
  typingTimeout = setTimeout(()=>{ if(window.typingChannel) window.typingChannel.send({type:'broadcast',event:'typing_stop',payload:{userId:ME.id}}); }, 1000);
}
function showTyping(username){
  let el=document.getElementById('typingStatus'); el.innerText=`${username} წერს...`;
  setTimeout(()=>{ if(el.innerText.includes(username)) el.innerText=''; }, 2000);
}
function handleMsgKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
  else if(e.key !=='Shift') emitTyping();
}

// ---------- PRIVATE DM WITH READ/TYPING/VOICE ----------
let dmChannel = null;
let currentDmPartnerId = null;
async function openDM(userId, username){
  closeDM();
  DM_WITH = userId; currentDmPartnerId = userId;
  document.getElementById('dmTitle').innerHTML = esc(username);
  let partner = allUsers.find(u=>u.id===userId);
  document.getElementById('dmAvatar').innerHTML = partner?.avatar_url?`<img src="${partner.avatar_url}">`:'👤';
  document.getElementById('dmBox').classList.add('open');
  await loadDMMessages();
  if(dmChannel) sb.removeChannel(dmChannel);
  const roomKey = [ME.id, userId].sort().join('_');
  dmChannel = sb.channel(`dm:${roomKey}`);
  dmChannel.on('postgres_changes',{event:'INSERT',schema:'public',table:'direct_messages',filter:`room_key=eq.${roomKey}`}, payload=>{ addDMToUI(payload.new, false); markAsRead(payload.new.id); })
    .on('broadcast',{event:'dm_typing'},({payload})=>{ if(payload.sender===userId) document.getElementById('dmTyping').innerHTML='✍️ წერს...'; setTimeout(()=>document.getElementById('dmTyping').innerHTML='',1500); })
    .subscribe();
}
async function loadDMMessages(){
  let roomKey = [ME.id, DM_WITH].sort().join('_');
  let {data} = await sb.from('direct_messages').select('*').eq('room_key',roomKey).order('created_at',{ascending:true});
  dmMessages = data||[];
  let container=document.getElementById('dmMsgs'); container.innerHTML='';
  dmMessages.forEach(m=>addDMToUI(m,true));
  container.scrollTop=container.scrollHeight;
  dmMessages.forEach(m=>{ if(!m.is_read && m.receiver_id===ME.id) markAsRead(m.id); });
}
function addDMToUI(msg, isHistory){
  let isMine = msg.sender_id===ME.id;
  let div = document.createElement('div'); div.className=`dm-msg ${isMine?'mine':'theirs'}`; div.id=`dm-${msg.id}`;
  let time = new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let status = '';
  if(isMine && msg.is_read) status = ' <span style="color:var(--read)">✓✓</span>';
  else if(isMine) status = ' <span style="color:var(--text3)">✓</span>';
  div.innerHTML = `<div>${esc(msg.content)}</div><div class="dm-status">${time}${status}</div>`;
  document.getElementById('dmMsgs').appendChild(div);
  if(!isHistory) document.getElementById('dmMsgs').scrollTop = 1e9;
}
async function sendDM(){
  let inp = document.getElementById('dmInput'); let text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  let roomKey = [ME.id, DM_WITH].sort().join('_');
  let newMsg = {room_key:roomKey, sender_id:ME.id, receiver_id:DM_WITH, content:text, is_read:false, created_at:new Date()};
  await sb.from('direct_messages').insert(newMsg);
  addDMToUI(newMsg, false);
  // typing stop
  if(dmChannel) dmChannel.send({type:'broadcast',event:'dm_typing',payload:{sender:ME.id}});
}
function emitDMTyping(){
  if(dmChannel) dmChannel.send({type:'broadcast',event:'dm_typing',payload:{sender:ME.id}});
  if(dmTypingTimeout) clearTimeout(dmTypingTimeout);
  dmTypingTimeout = setTimeout(()=>{}, 800);
}
document.getElementById('dmInput')?.addEventListener('keydown',(e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendDM();} else emitDMTyping(); });
async function markAsRead(msgId){
  await sb.from('direct_messages').update({is_read:true}).eq('id',msgId);
  let el = document.getElementById(`dm-${msgId}`);
  if(el && el.querySelector('.dm-status')) el.querySelector('.dm-status').innerHTML += ' ✓✓';
}
function closeDM(){ document.getElementById('dmBox').classList.remove('open'); if(dmChannel) sb.removeChannel(dmChannel); DM_WITH=null; }

// ---------- ADMIN / FOUNDER ROLES & BLOCK ----------
let selectedUserId = null;
async function openUserActions(uid, uname){
  selectedUserId = uid;
  let targetUser = allUsers.find(u=>u.id===uid);
  if(!targetUser) return;
  let myRole = MY_ROLE;
  let canManage = (myRole === 'founder') || (myRole === 'admin');
  let modal = document.getElementById('userModal');
  document.getElementById('modalUserName').innerText = uname;
  let actionsDiv = document.getElementById('modalActions');
  actionsDiv.innerHTML = '';
  // DM button
  let dmBtn = document.createElement('button'); dmBtn.innerText = '✉️ პირადი შეტყობინება'; dmBtn.className='user-action-btn'; dmBtn.onclick=()=>{ closeModal(); openDM(uid,uname); }; actionsDiv.appendChild(dmBtn);
  if(canManage && uid !== ME.id){
    let roleSelect = document.createElement('select'); roleSelect.className='user-action-btn'; roleSelect.style.background='var(--panel2)';
    roleSelect.innerHTML = `<option value="">როლის შეცვლა</option><option value="admin">ადმინი</option><option value="founder">დამფუძნებელი</option><option value="member">წევრი</option>`;
    roleSelect.onchange = async (e)=>{ await sb.from('profiles').update({role:e.target.value}).eq('id',uid); toast('როლი განახლდა'); loadUsers(); closeModal(); };
    actionsDiv.appendChild(roleSelect);
    let blockBtn = document.createElement('button'); blockBtn.innerText = targetUser.is_blocked ? '🔓 განბლოკვა' : '🔨 დაბლოკვა'; blockBtn.className='user-action-btn'; blockBtn.style.borderColor='red';
    blockBtn.onclick = async ()=>{ await sb.from('profiles').update({is_blocked:!targetUser.is_blocked}).eq('id',uid); toast(targetUser.is_blocked?'განბლოკილია':'დაბლოკილია'); loadUsers(); closeModal(); };
    actionsDiv.appendChild(blockBtn);
  }
  modal.classList.add('open');
}
function closeModal(){ document.getElementById('userModal').classList.remove('open'); }
function openMyProfile(){ openUserActions(ME.id, MY_USERNAME); }

// Panel toggle
function showPanel(name){
  document.getElementById('panelRooms').classList.toggle('hidden', name!=='rooms');
  document.getElementById('panelUsers').classList.toggle('hidden', name!=='users');
  document.getElementById('navRooms').classList.toggle('active', name==='rooms');
  document.getElementById('navUsers').classList.toggle('active', name==='users');
}

let MY_USERNAME = '';
async function init(){
  let {data:{user}} = await sb.auth.getUser();
  if(!user){ location.href='index.html'; return; }
  ME = user;
  let {data:prof} = await sb.from('profiles').select('*').eq('id',ME.id).single();
  if(!prof){
    let emailName = user.email?.split('@')[0]||'მომხმარებელი';
    await sb.from('profiles').insert({id:ME.id, username:emailName, role:'member', emotion:'😊'});
    MY_ROLE = 'member';
    MY_USERNAME = emailName;
  } else {
    MY_ROLE = prof.role || 'member';
    MY_USERNAME = prof.username;
  }
  buildRooms(); await loadUsers(); await switchRoom(1);
  // realtime profiles update
  sb.channel('profiles_update').on('postgres_changes',{event:'*',schema:'public',table:'profiles'},()=>loadUsers()).subscribe();
  // Online status every 30s
  setInterval(()=>loadUsers(), 40000);
}
async function logout(){ await sb.auth.signOut(); location.href='index.html'; }
window.onload = init;
</script>
