<!DOCTYPE html>

<html lang="ka" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0e0e16;--surface:#16161f;--panel:#1c1c28;--raised:#22222f;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#e4e4f0;--muted:#6060a0;
  --accent:#6c63ff;--accent2:#c77dff;--acg:linear-gradient(135deg,#6c63ff,#c77dff);
  --online:#3dd68c;--danger:#ff4d6d;--gold:#fbbf24;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;
  --sh:0 8px 40px rgba(0,0,0,.5);--t:.16s ease;
}
[data-theme="light"]{
  --bg:#f0f0f8;--surface:#fff;--panel:#f6f6ff;--raised:#eaeaf6;
  --border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);
  --text:#181826;--muted:#6060a0;--sh:0 8px 40px rgba(80,80,180,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
button{font-family:inherit;cursor:pointer;}
input,textarea{font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* PARTICLES */
#ptcl{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.pt{position:absolute;animation:pfloat linear infinite;opacity:0;font-size:16px;}
@keyframes pfloat{0%{transform:translateY(105vh) rotate(0deg);opacity:0}10%{opacity:.55}90%{opacity:.35}100%{transform:translateY(-8vh) rotate(540deg);opacity:0}}

/* LAYOUT */
#app{display:flex;height:100vh;position:relative;z-index:1;}

/* ROOMS RAIL */
.rail{width:68px;background:var(–bg);border-right:1px solid var(–border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:5px;flex-shrink:0;}
.rail-logo{width:44px;height:44px;border-radius:14px;background:var(–acg);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:5px;box-shadow:0 4px 16px rgba(108,99,255,.35);}
.rail-sep{width:28px;height:1px;background:var(–border);margin:3px 0;}
.rb{width:44px;height:44px;border-radius:14px;border:none;background:var(–surface);color:var(–muted);display:flex;align-items:center;justify-content:center;font-size:17px;transition:var(–t);position:relative;flex-shrink:0;}
.rb:hover,.rb.on{border-radius:12px;background:var(–accent);color:#fff;box-shadow:0 3px 12px rgba(108,99,255,.35);}
.rb-tip{position:absolute;left:56px;top:50%;transform:translateY(-50%);background:var(–raised);color:var(–text);padding:5px 9px;border-radius:var(–r8);font-size:11px;font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;transition:var(–t);z-index:99;border:1px solid var(–border2);}
.rb:hover .rb-tip{opacity:1;}

/* SIDEBAR */
.sidebar{width:232px;background:var(–surface);border-right:1px solid var(–border);display:flex;flex-direction:column;flex-shrink:0;}
.sb-top{padding:14px 12px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;}
.sb-title{font-size:14px;font-weight:800;letter-spacing:-.01em;}
.sb-acts{display:flex;gap:3px;}
.sec-lbl{padding:14px 14px 5px;font-size:10px;font-weight:800;color:var(–muted);text-transform:uppercase;letter-spacing:.1em;}
.mem-list{flex:1;overflow-y:auto;padding:0 6px 6px;}
.mem-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(–r8);cursor:pointer;transition:background var(–t);}
.mem-row:hover{background:var(–raised);}
.av{width:32px;height:32px;border-radius:50%;flex-shrink:0;position:relative;}
.av img{width:32px;height:32px;border-radius:50%;object-fit:cover;}
.av-ph{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
.dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(–online);border:2px solid var(–surface);}
.mi{flex:1;min-width:0;}
.mi-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mi-sub{font-size:10.5px;color:var(–muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mi-badge{font-size:10px;margin-left:auto;flex-shrink:0;}

/* USER BAR */
.ub{padding:9px 10px;border-top:1px solid var(–border);background:var(–bg);display:flex;align-items:center;gap:8px;}
.ub-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;cursor:pointer;overflow:hidden;transition:var(–t);}
.ub-av:hover{opacity:.85;}
.ub-av img,.ub-av-ph{width:34px;height:34px;border-radius:50%;object-fit:cover;}
.ub-av-ph{display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}
.ub-i{flex:1;min-width:0;}
.ub-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ub-role{font-size:10px;color:var(–muted);}
.ub-acts{display:flex;gap:2px;position:relative;}

/* ICON BTN */
.icb{width:28px;height:28px;border:none;border-radius:var(–r8);background:transparent;color:var(–muted);display:flex;align-items:center;justify-content:center;font-size:14px;transition:var(–t);}
.icb:hover{background:var(–raised);color:var(–text);}
.icb.on{background:var(–accent);color:#fff;}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-hd{height:50px;padding:0 18px;border-bottom:1px solid var(–border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(–surface);}
.ch-icon{font-size:19px;}
.ch-name{font-size:14px;font-weight:700;}
.ch-cnt{font-size:11px;color:var(–muted);padding:2px 7px;background:var(–raised);border-radius:20px;}
.ch-acts{margin-left:auto;display:flex;gap:3px;}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:1px;}
.day-line{display:flex;align-items:center;gap:8px;padding:8px 0;color:var(–muted);font-size:10.5px;font-weight:700;}
.day-line::before,.day-line::after{content:’’;flex:1;height:1px;background:var(–border);}

.msg{display:flex;gap:9px;padding:2px 4px;border-radius:var(–r8);transition:background var(–t);align-items:flex-start;}
.msg:hover{background:rgba(255,255,255,.025);}
.msg.own{flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;cursor:pointer;overflow:hidden;margin-top:3px;}
.msg-av img{width:32px;height:32px;border-radius:50%;object-fit:cover;}
.msg-av-ph{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:pointer;}
.msg-bd{max-width:64%;min-width:0;}
.msg-meta{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.msg.own .msg-meta{flex-direction:row-reverse;}
.msg-nick{font-size:12px;font-weight:700;cursor:pointer;}
.msg-nick:hover{text-decoration:underline;}
.rb-lbl{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:700;}
.rl-founder{background:rgba(251,191,36,.15);color:var(–gold);}
.rl-admin{background:rgba(108,99,255,.15);color:var(–accent);}
.msg-t{font-size:10px;color:var(–muted);font-family:‘JetBrains Mono’,monospace;}
.msg-del{opacity:0;background:none;border:none;color:var(–muted);font-size:12px;padding:2px 4px;border-radius:4px;transition:var(–t);margin-top:auto;flex-shrink:0;}
.msg:hover .msg-del{opacity:1;}
.msg-del:hover{color:var(–danger);background:rgba(255,77,109,.1);}

.bbl{display:inline-block;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.55;word-break:break-word;cursor:pointer;transition:filter var(–t);}
.bbl:hover{filter:brightness(1.06);}
.msg:not(.own) .bbl{background:var(–raised);border-radius:3px 14px 14px 14px;}
.msg.own .bbl{background:var(–accent);color:#fff;border-radius:14px 3px 14px 14px;}

.reacts{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.msg.own .reacts{justify-content:flex-end;}
.rchip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:20px;font-size:11.5px;background:var(–raised);border:1px solid var(–border2);cursor:pointer;transition:var(–t);}
.rchip:hover,.rchip.me{background:rgba(108,99,255,.15);border-color:var(–accent);color:var(–accent);}

.voice-bbl{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:14px;background:var(–raised);min-width:170px;}
.msg.own .voice-bbl{background:rgba(108,99,255,.25);}
.vplay{width:30px;height:30px;border-radius:50%;background:var(–accent);border:none;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(–t);}
.vplay:hover{transform:scale(1.08);}
.vbars{display:flex;align-items:center;gap:2px;height:20px;}
.vbar{width:3px;border-radius:2px;background:var(–accent);animation:vbanim .9s ease-in-out infinite alternate;}
.vbar:nth-child(2){animation-delay:.1s;}.vbar:nth-child(3){animation-delay:.2s;}.vbar:nth-child(4){animation-delay:.3s;}.vbar:nth-child(5){animation-delay:.15s;}
@keyframes vbanim{0%{height:3px}100%{height:16px}}
.vdur{font-size:10px;color:var(–muted);font-family:‘JetBrains Mono’,monospace;}

.typing-row{padding:3px 18px;height:26px;display:flex;align-items:center;gap:5px;}
.td{width:5px;height:5px;border-radius:50%;background:var(–muted);animation:tda 1.1s infinite;}
.td:nth-child(2){animation-delay:.15s;}.td:nth-child(3){animation-delay:.3s;}
@keyframes tda{0%,60%,100%{transform:scale(1)}30%{transform:scale(1.4)}}
.typing-txt{font-size:10.5px;color:var(–muted);}

/* INPUT */
.inp-wrap{padding:11px 14px;border-top:1px solid var(–border);background:var(–surface);flex-shrink:0;}
.inp-toolbar{display:flex;align-items:center;gap:4px;margin-bottom:7px;}
.fmtb{padding:2px 7px;border:1px solid var(–border2);border-radius:5px;background:transparent;color:var(–muted);font-size:11.5px;transition:var(–t);}
.fmtb:hover{background:var(–accent);color:#fff;border-color:var(–accent);}
.fmtb b,.fmtb i,.fmtb u,.fmtb s{pointer-events:none;}
.clr-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(–border2);cursor:pointer;transition:var(–t);flex-shrink:0;}
.clr-dot:hover{transform:scale(1.2);}

.inp-box{display:flex;align-items:flex-end;gap:7px;background:var(–raised);border:1.5px solid var(–border2);border-radius:14px;padding:7px 9px;transition:border-color var(–t);}
.inp-box:focus-within{border-color:var(–accent);}
.em-tgl{width:30px;height:30px;border:none;background:transparent;color:var(–muted);font-size:17px;border-radius:var(–r8);transition:var(–t);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.em-tgl:hover{color:var(–text);}
#msgin{flex:1;border:none;background:transparent;color:var(–text);resize:none;outline:none;font-size:13px;line-height:1.5;max-height:110px;min-height:20px;padding-top:2px;}
#msgin::placeholder{color:var(–muted);}
.send-btn{width:32px;height:32px;border:none;border-radius:var(–r8);background:var(–accent);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(–t);}
.send-btn:hover{transform:scale(1.06);box-shadow:0 3px 10px rgba(108,99,255,.4);}

/* EMOJI PANEL */
.ep{position:absolute;bottom:74px;left:14px;width:312px;background:var(–panel);border:1px solid var(–border2);border-radius:18px;box-shadow:var(–sh);z-index:80;display:none;overflow:hidden;}
.ep.open{display:block;animation:sup .16s ease;}
@keyframes sup{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.ep-cats{display:flex;gap:2px;padding:8px 8px 5px;border-bottom:1px solid var(–border);}
.ep-cat{flex:1;padding:5px;border:none;background:transparent;font-size:15px;border-radius:6px;cursor:pointer;transition:var(–t);}
.ep-cat:hover,.ep-cat.on{background:var(–raised);}
.ep-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;padding:7px 8px;max-height:170px;overflow-y:auto;}
.ep-em{font-size:21px;text-align:center;cursor:pointer;padding:3px;border-radius:5px;line-height:1;transition:transform var(–t);}
.ep-em:hover{transform:scale(1.22);background:var(–raised);}
.ep-cust{display:flex;flex-wrap:wrap;gap:3px;padding:7px 8px;border-top:1px solid var(–border);}
.ep-cust:empty{display:none;}
.cem{font-size:24px;cursor:pointer;padding:3px;border-radius:5px;transition:var(–t);}
.cem:hover{transform:scale(1.18);background:var(–raised);}
.cem img{width:26px;height:26px;border-radius:4px;display:block;}

/* REACTION PICKER */
.rpick{position:fixed;z-index:200;background:var(–panel);border:1px solid var(–border2);border-radius:40px;padding:6px 10px;display:none;gap:3px;box-shadow:var(–sh);}
.rpick.open{display:flex;animation:sup .13s ease;}
.rp-em{font-size:21px;cursor:pointer;padding:3px;border-radius:6px;transition:transform var(–t);}
.rp-em:hover{transform:scale(1.3);background:var(–raised);}

/* CONTEXT MENU */
.ctx{position:fixed;z-index:200;min-width:170px;background:var(–panel);border:1px solid var(–border2);border-radius:var(–r12);padding:4px;box-shadow:var(–sh);display:none;}
.ctx.open{display:block;animation:sup .13s ease;}
.cit{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(–r8);font-size:12.5px;font-weight:500;cursor:pointer;transition:background var(–t);}
.cit:hover{background:var(–raised);}
.cit.red{color:var(–danger);}
.cit.red:hover{background:rgba(255,77,109,.1);}
.csep{height:1px;background:var(–border);margin:3px 0;}

/* PM WINDOW */
.pmw{position:fixed;bottom:16px;right:16px;width:330px;height:450px;z-index:150;background:var(–panel);border:1px solid var(–border2);border-radius:18px;display:none;flex-direction:column;box-shadow:var(–sh);}
.pmw.open{display:flex;animation:sup .18s ease;}
.pmw-hd{padding:11px 13px;border-bottom:1px solid var(–border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.pmav{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.pmav img,.pmav-ph{width:28px;height:28px;border-radius:50%;object-fit:cover;}
.pmav-ph{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
.pmw-name{font-size:13px;font-weight:700;flex:1;}
.pmw-close{width:24px;height:24px;border:none;background:var(–raised);border-radius:6px;color:var(–muted);font-size:12px;display:flex;align-items:center;justify-content:center;transition:var(–t);}
.pmw-close:hover{background:var(–danger);color:#fff;}
.pm-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:5px;}
.pmr{display:flex;flex-direction:column;}
.pmr.own{align-items:flex-end;}
.pmbbl{max-width:76%;padding:7px 11px;border-radius:12px;font-size:12.5px;word-break:break-word;cursor:pointer;background:var(–raised);}
.pmr.own .pmbbl{background:var(–accent);color:#fff;border-radius:12px 3px 12px 12px;}
.pmr:not(.own) .pmbbl{border-radius:3px 12px 12px 12px;}
.pm-seen{font-size:9.5px;color:var(–muted);margin-top:2px;font-family:‘JetBrains Mono’,monospace;}
.pm-reacts{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.pmr.own .pm-reacts{justify-content:flex-end;}
.pm-inp{padding:9px 10px;border-top:1px solid var(–border);display:flex;gap:5px;align-items:flex-end;flex-shrink:0;}
.pm-txt{flex:1;padding:7px 10px;border-radius:10px;border:1.5px solid var(–border2);background:var(–raised);color:var(–text);font-size:12.5px;resize:none;outline:none;max-height:65px;transition:border-color var(–t);}
.pm-txt:focus{border-color:var(–accent);}
.pm-vbtn{width:32px;height:32px;border-radius:var(–r8);border:1.5px solid var(–border2);background:transparent;color:var(–muted);font-size:15px;display:flex;align-items:center;justify-content:center;transition:var(–t);}
.pm-vbtn:hover{border-color:var(–danger);color:var(–danger);}
.pm-vbtn.rec{background:var(–danger);color:#fff;border-color:var(–danger);animation:pulse .7s infinite;}
.pm-sbtn{width:32px;height:32px;border-radius:var(–r8);border:none;background:var(–accent);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;transition:var(–t);}
.pm-sbtn:hover{transform:scale(1.06);}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.pmind{position:fixed;bottom:16px;right:362px;z-index:149;background:var(–panel);border:1px solid var(–border2);border-radius:40px;padding:7px 13px;display:none;align-items:center;gap:6px;cursor:pointer;box-shadow:var(–sh);}
.pmind.show{display:flex;}
.pmind-dot{width:7px;height:7px;border-radius:50%;background:var(–accent);animation:pulse .8s infinite;}
.pmind-name{font-size:11.5px;font-weight:700;}

/* PROFILE DRAWER */
.pd{position:fixed;top:0;right:-330px;bottom:0;width:310px;background:var(–panel);border-left:1px solid var(–border2);z-index:120;transition:.26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.pd.open{right:0;}
.pd-cover{height:90px;flex-shrink:0;position:relative;}
.pd-cl{position:absolute;top:9px;right:9px;width:26px;height:26px;border-radius:50%;border:none;background:rgba(0,0,0,.28);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(–t);}
.pd-cl:hover{background:rgba(0,0,0,.5);}
.pd-avwrap{position:absolute;bottom:-26px;left:18px;width:54px;height:54px;border-radius:50%;border:3px solid var(–panel);overflow:hidden;cursor:pointer;}
.pd-avwrap img,.pd-av-ph{width:100%;height:100%;object-fit:cover;}
.pd-av-ph{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;}
.pd-body{flex:1;overflow-y:auto;padding:36px 18px 18px;}
.pd-name{font-size:16px;font-weight:800;}
.pd-rlbl{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:3px;}
.pd-emo{font-size:20px;margin-top:5px;}
.pd-stat{font-size:11.5px;color:var(–muted);margin-top:2px;}
.pd-div{height:1px;background:var(–border);margin:14px 0;}
.pd-acts{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
.pd-btn{width:100%;padding:8px;border-radius:10px;font-size:12.5px;font-weight:600;border:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:var(–t);}
.pd-btn.p{background:var(–accent);color:#fff;}
.pd-btn.p:hover{filter:brightness(1.1);}
.pd-btn.s{background:var(–raised);color:var(–text);border:1px solid var(–border2);}
.pd-btn.s:hover{background:var(–border2);}
.pd-btn.d{background:rgba(255,77,109,.1);color:var(–danger);border:1px solid rgba(255,77,109,.2);}
.pd-btn.d:hover{background:var(–danger);color:#fff;}
.pd-stitle{font-size:10px;font-weight:800;color:var(–muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;}
.alb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;border-radius:var(–r8);overflow:hidden;}
.alb-item{aspect-ratio:1;overflow:hidden;cursor:pointer;}
.alb-item img{width:100%;height:100%;object-fit:cover;transition:transform var(–t);}
.alb-item:hover img{transform:scale(1.05);}
.alb-add{aspect-ratio:1;border:1.5px dashed var(–border2);border-radius:var(–r8);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;color:var(–muted);font-size:10.5px;transition:var(–t);}
.alb-add:hover{border-color:var(–accent);color:var(–accent);}

/* MODALS */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
.moverlay.open{display:flex;}
.modal{background:var(–panel);border:1px solid var(–border2);border-radius:18px;padding:24px;box-shadow:var(–sh);animation:sup .18s ease;width:460px;max-width:95vw;max-height:80vh;overflow-y:auto;}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-hd h2{font-size:15px;font-weight:800;}
.m-tabs{display:flex;gap:3px;background:var(–raised);border-radius:var(–r8);padding:3px;margin-bottom:16px;}
.mtab{flex:1;padding:6px;border:none;background:transparent;color:var(–muted);font-size:12px;font-weight:700;border-radius:6px;cursor:pointer;transition:var(–t);}
.mtab.on{background:var(–surface);color:var(–text);}

.field{margin-bottom:13px;}
.field label{display:block;font-size:10px;font-weight:800;color:var(–muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.field input,.field select{width:100%;padding:8px 11px;border-radius:var(–r8);border:1.5px solid var(–border2);background:var(–raised);color:var(–text);font-size:13px;outline:none;transition:border-color var(–t);}
.field input:focus{border-color:var(–accent);}

/* admin rows */
.adm-row{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(–raised);border-radius:var(–r8);margin-bottom:4px;}
.adm-name{flex:1;font-size:12.5px;font-weight:600;}
.adm-rl{font-size:10px;color:var(–muted);}
.adm-acts{display:flex;gap:3px;}
.ab{padding:3px 7px;border-radius:5px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:var(–t);}
.ab.admin{background:rgba(108,99,255,.15);color:var(–accent);}
.ab.admin:hover{background:var(–accent);color:#fff;}
.ab.founder{background:rgba(251,191,36,.15);color:var(–gold);}
.ab.founder:hover{background:var(–gold);color:#000;}
.ab.unlock{background:rgba(61,214,140,.12);color:var(–online);}
.ab.unlock:hover{background:var(–online);color:#000;}
.ab.ban{background:rgba(255,77,109,.12);color:var(–danger);}
.ab.ban:hover{background:var(–danger);color:#fff;}

/* custom emoji admin */
.cem-row{display:flex;align-items:center;gap:6px;padding:4px 7px;background:var(–raised);border-radius:var(–r8);margin-bottom:3px;}
.cem-del{background:none;border:none;color:var(–muted);cursor:pointer;font-size:13px;transition:color var(–t);}
.cem-del:hover{color:var(–danger);}
.add-row{display:flex;gap:6px;margin-top:8px;}
.add-row input{flex:1;padding:7px 10px;border-radius:var(–r8);border:1.5px solid var(–border2);background:var(–raised);color:var(–text);font-size:12.5px;outline:none;transition:border-color var(–t);}
.add-row input:focus{border-color:var(–accent);}
.add-row button{padding:7px 12px;border-radius:var(–r8);border:none;background:var(–accent);color:#fff;font-size:12.5px;font-weight:700;transition:var(–t);}
.add-row button:hover{filter:brightness(1.1);}

/* friend rows */
.fr-row{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(–raised);border-radius:var(–r8);margin-bottom:4px;}
.fr-name{flex:1;font-size:12.5px;font-weight:600;}
.fr-acts{display:flex;gap:3px;}

/* emotions */
.emo-grid{display:flex;flex-wrap:wrap;gap:5px;margin:9px 0;}
.emoit{font-size:21px;padding:4px;border-radius:var(–r8);cursor:pointer;transition:var(–t);}
.emoit:hover,.emoit.on{background:var(–raised);transform:scale(1.15);}

/* theme pop */
.thpop{position:absolute;bottom:46px;left:0;width:210px;background:var(–panel);border:1px solid var(–border2);border-radius:var(–r16);padding:13px;z-index:100;box-shadow:var(–sh);display:none;}
.thpop.open{display:block;animation:sup .14s ease;}
.th-lbl{font-size:10px;font-weight:800;color:var(–muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;}
.th-colors{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}
.th-sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:var(–t);}
.th-sw:hover{transform:scale(1.15);}
.th-sw.on{border-color:var(–text);}
.th-tog{display:flex;align-items:center;justify-content:space-between;}
.th-tog-lbl{font-size:12px;font-weight:600;}
.sw{position:relative;width:34px;height:19px;cursor:pointer;display:block;}
.sw input{opacity:0;width:0;height:0;position:absolute;}
.sw-tr{position:absolute;inset:0;background:var(–border2);border-radius:10px;transition:var(–t);}
.sw-th{position:absolute;top:3px;left:3px;width:13px;height:13px;background:#fff;border-radius:50%;transition:var(–t);}
.sw input:checked~.sw-tr{background:var(–accent);}
.sw input:checked~.sw-th{transform:translateX(15px);}

/* toasts */
.toasts{position:fixed;top:14px;right:14px;z-index:500;display:flex;flex-direction:column;gap:5px;}
.toast{padding:9px 13px;border-radius:10px;font-size:12px;font-weight:600;background:var(–panel);border:1px solid var(–border2);box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:260px;animation:slin .22s ease;}
@keyframes slin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{border-color:var(–online);}
.toast.err{border-color:var(–danger);}

/* general buttons */
.btn{padding:8px 16px;border-radius:var(–r8);font-size:13px;font-weight:600;border:none;transition:var(–t);cursor:pointer;}
.btn-p{background:var(–accent);color:#fff;}
.btn-p:hover{filter:brightness(1.1);}
.btn-s{background:var(–raised);color:var(–text);border:1px solid var(–border2);}
.btn-s:hover{background:var(–border2);}
.btn-d{background:rgba(255,77,109,.1);color:var(–danger);border:1px solid rgba(255,77,109,.2);}
.btn-d:hover{background:var(–danger);color:#fff;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* scrollable modal content */
.modal-scroll{max-height:340px;overflow-y:auto;padding-right:4px;}
</style>

</head>

/* ── PARTICLES ── */
function particles(){
  const c=document.getElementById('ptcl');
  const syms=['❤️','💜','💙','🌸','🌺','✨','💫','🌟','💖','🌼'];
  for(let i=0;i<20;i++){
    const d=document.createElement('div');
    d.className='pt';
    d.textContent=syms[i%syms.length];
    d.style.cssText=`left:${Math.random()*100}%;font-size:${12+Math.random()*10}px;animation-duration:${10+Math.random()*14}s;animation-delay:${Math.random()*18}s;`;
    c.appendChild(d);
  }
}

/* ── UTIL ── */
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function col(s){const cs=['#6c63ff','#e040fb','#0ea5e9','#10b981','#f97316','#f43f5e','#fbbf24','#06b6d4','#8b5cf6','#ec4899'];let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return cs[Math.abs(h)%cs.length];}
function time(iso){return new Date(iso).toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});}
function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function toast(msg,type=''){
  const c=$('toasts'),d=document.createElement('div');
  d.className='toast '+(type==='ok'?'ok':type==='err'?'err':'');
  d.textContent=msg;c.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity .3s';setTimeout(()=>d.remove(),300);},3000);
}
function openModal(id){$(id).classList.add('open');}
function closeModal(id){$(id).classList.remove('open');}
function avEl(profile,size=32){
  const c=col(profile.username||'?');
  if(profile.avatar_url){
    return `<img src="${esc(profile.avatar_url)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover">`;
  }
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${c};color:#fff;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.35)}px;font-weight:800">${(profile.username||'?')[0].toUpperCase()}</div>`;
}
function roleLabel(role){
  if(role==='founder')return '<span class="rb-lbl rl-founder">👑 დამფუძვნებელი</span>';
  if(role==='admin')return '<span class="rb-lbl rl-admin">⭐ ადმინი</span>';
  return '';
}

/* ── INIT ── */
async function init(){
  particles();
  buildRail();
  buildThemePop();
  buildEmojiPanel();
  buildReactionPicker();
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  ME=session.user;
  const {data}=await sb.from('profiles').select('*').eq('id',ME.id).single();
  if(!data){
    const nick=ME.user_metadata?.username||ME.email.split('@')[0];
    await sb.from('profiles').upsert({id:ME.id,username:nick,email:ME.email,role:'member',created_at:new Date().toISOString()});
    const {data:d2}=await sb.from('profiles').select('*').eq('id',ME.id).single();
    PROF=d2;
  }else PROF=data;
  renderUB();
  if(PROF.role==='admin'||PROF.role==='founder')$('admin-btn').style.display='flex';
  await loadCustomEmojis();
  await selectRoom(ROOMS[0]);
  buildEmoGrid();
  // pm subscription
  sb.channel('pm:'+ME.id).on('postgres_changes',{event:'INSERT',schema:'public',table:'private_messages',filter:`receiver_id=eq.${ME.id}`},p=>{
    if(pmTarget&&pmTarget.id===p.new.sender_id){loadPMMessages(pmTarget.id);}
    else{pmUnread++;showPMInd(p.new.sender_id);}
  }).subscribe();
}

/* ── USER BAR ── */
function renderUB(){
  $('ub-av').innerHTML=avEl(PROF,34);
  $('ub-name').textContent=PROF.username;
  $('ub-role').textContent=PROF.role==='founder'?'👑 დამფუძვნებელი':PROF.role==='admin'?'⭐ ადმინი':'# '+ME.id.slice(-4).toUpperCase();
}

async function doLogout(){await sb.auth.signOut();location.href='index.html';}

/* ── ROOMS ── */
function buildRail(){
  const rail=$('rail');
  ROOMS.forEach((r,i)=>{
    const b=document.createElement('button');
    b.className='rb';
    b.id='rb-'+r.id;
    b.innerHTML=`${r.icon}<span class="rb-tip">${r.name}</span>`;
    b.onclick=()=>selectRoom(r);
    rail.appendChild(b);
  });
}

async function selectRoom(r){

async function loadMessages(){

function renderMessages(){
  const c=$('msgs');c.innerHTML='';
  MSGS.forEach(m=>c.appendChild(msgEl(m)));
  c.scrollTop=c.scrollHeight;
}

function msgEl(m){
  const own=m.user_id===ME.id;
  const p=m.profiles||{username:'?',role:'member'};
  const c=col(p.username);
  const canDel=own||PROF.role==='admin'||PROF.role==='founder';
  let reactions=[];try{reactions=JSON.parse(m.reactions||'[]');}catch{}
  const grouped={};reactions.forEach(r=>{if(!grouped[r.e])grouped[r.e]=[];grouped[r.e].push(r.u);});
  let reacts='<div class="reacts">';
  Object.entries(grouped).forEach(([e,us])=>{
    const me=us.includes(ME.id);
    reacts+=`<span class="rchip${me?' me':''}" onclick="toggleReact('${m.id}','${e}')">${e} <span>${us.length}</span></span>`;
  });
  reacts+='</div>';

  let body='';
  if(m.type==='voice'){
    body=`<div class="voice-bbl"><button class="vplay" onclick="playVoice('${esc(m.content)}')">▶</button><div class="vbars"><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div></div><span class="vdur">ხმა</span></div>`;
  }else{
    body=`<div class="bbl" style="${esc(m.style||'')}" oncontextmenu="showRPick(event,'${m.id}')">${esc(m.content||'')}</div>`;
  }

  const delBtn=canDel?`<button class="msg-del" onclick="delMsg('${m.id}')">🗑</button>`:'';
  const meta=`<div class="msg-meta">
    ${own?'':`<div class="msg-av" onclick="openProfile('${m.user_id}')">${avEl(p,32)}</div>`}
    <span class="msg-nick" style="color:${c}" onclick="openProfile('${m.user_id}')">${esc(p.username)}</span>
    ${roleLabel(p.role)}
    <span class="msg-t">${time(m.created_at)}</span>
  </div>`;

  const div=document.createElement('div');
  div.className='msg'+(own?' own':'');
  div.dataset.id=m.id;
  div.innerHTML=`
    ${own?'':''} 
    <div class="msg-bd">
      ${meta}
      ${body}
      ${reacts}
    </div>
    ${delBtn}
  `;
  return div;
}

function subMessages(){
  msgSub=sb.channel('room:'+ROOM.id)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:`room_id=eq.${ROOM.id}`},p=>{
      if(p.eventType==='INSERT'){
        sb.from('messages').select('*,profiles(username,avatar_url,role)').eq('id',p.new.id).single().then(({data})=>{
          if(!data)return;
          MSGS.push(data);
          const c=$('msgs');c.appendChild(msgEl(data));c.scrollTop=c.scrollHeight;
        });
      }else if(p.eventType==='DELETE'){
        MSGS=MSGS.filter(m=>m.id!==p.old.id);
        const el=document.querySelector(`[data-id="${p.old.id}"]`);if(el)el.remove();
      }else if(p.eventType==='UPDATE'){
        sb.from('messages').select('*,profiles(username,avatar_url,role)').eq('id',p.new.id).single().then(({data})=>{
          if(!data)return;
          const idx=MSGS.findIndex(m=>m.id===data.id);if(idx>-1)MSGS[idx]=data;
          const el=document.querySelector(`[data-id="${data.id}"]`);if(el)el.replaceWith(msgEl(data));
        });
      }
    }).subscribe();
}

/* ── VOICE ── */
async function toggleVoice(){
  if(!isRec){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRec=new MediaRecorder(stream);recChunks=[];
      mediaRec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
      mediaRec.onstop=async()=>{
        const blob=new Blob(recChunks,{type:'audio/webm'});
        const reader=new FileReader();
        reader.onloadend=async()=>{
          if(pmTarget){
            await sb.from('private_messages').insert({sender_id:ME.id,receiver_id:pmTarget.id,content:reader.result,type:'voice',created_at:new Date().toISOString(),seen:false,reactions:'[]'});
            await loadPMMessages(pmTarget.id);
          }
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      mediaRec.start();isRec=true;
      $('pm-vbtn').classList.add('rec');$('pm-vbtn').textContent='⏹';
    }catch{toast('🎙️ მიკროფონი მიუწვდომელია','err');}
  }else{
    mediaRec.stop();isRec=false;
    $('pm-vbtn').classList.remove('rec');$('pm-vbtn').textContent='🎙️';
  }
}
function playVoice(src){new Audio(src).play();}

    const el=document.createElement('div');el.className='emoit'+(selEmo===e?' on':'');
    el.textContent=e;el.onclick=()=>{selEmo=e;buildEmoGrid();};
    g.appendChild(el);
  });
}
async function saveStatus(){
  const txt=$('stat-txt').value;
  await sb.from('profiles').update({status_text:txt,emotion:selEmo}).eq('id',ME.id);
  const {data}=await sb.from('profiles').select('*').eq('id',ME.id).single();
  PROF=data;renderUB();closeModal('m-status');toast('✅ სტატუსი შეინახა','ok');
  if($('pd').classList.contains('open'))openProfile(ME.id);
}

/* ── ADMIN ── */
async function openAdmin(){
  openModal('m-admin');
  if(PROF.role==='founder')$('founder-tab').style.display='flex';
  adminTab('users',document.querySelector('#m-admin .mtab'));
}
async function adminTab(tab,btn){
  document.querySelectorAll('#m-admin .mtab').forEach(t=>t.classList.remove('on'));
  if(btn)btn.classList.add('on');
  const c=$('admin-content');c.innerHTML='';
  if(tab==='users'){
    const {data}=await sb.from('profiles').select('*').neq('id',ME.id).limit(60);
    (data||[]).forEach(u=>{
      const el=document.createElement('div');el.className='adm-row';
      const rl=u.role==='founder'?'👑':u.role==='admin'?'⭐':u.role==='banned'?'🚫':'👤';
      let acts=`<button class="ab admin" onclick="setRole('${u.id}','admin')">⭐</button>
        <button class="ab unlock" onclick="setRole('${u.id}','member')">🔓</button>
        <button class="ab ban" onclick="banUser('${u.id}')">🚫</button>`;
      if(PROF.role==='founder')acts=`<button class="ab founder" onclick="setRole('${u.id}','founder')">👑</button>`+acts;
      el.innerHTML=`<span class="adm-name">${rl} ${esc(u.username)}</span><div class="adm-acts">${acts}</div>`;
      c.appendChild(el);
    });
  }else{
    c.innerHTML='<div class="pd-stitle" style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">მოძრავი სმაილების მართვა</div>';
    const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;';
    customEmojis.forEach((e,i)=>{
      const el=document.createElement('div');el.className='cem-row';
      el.innerHTML=(e.startsWith('http')?`<img src="${esc(e)}" style="width:26px;height:26px;border-radius:4px">`:`<span style="font-size:22px">${e}</span>`)+`<button class="cem-del" onclick="rmCEM(${i})">✕</button>`;
      wrap.appendChild(el);
    });
    c.appendChild(wrap);
    const ar=document.createElement('div');ar.className='add-row';
    ar.innerHTML='<input type="text" id="cem-in" placeholder="😎 ან https://...gif"><button onclick="addCEM()">+ დამატება</button>';
    c.appendChild(ar);
  }
}

async function loadCustomEmojis(){
  const {data}=await sb.from('settings').select('value').eq('key','custom_emojis').single();
  if(data){try{customEmojis=JSON.parse(data.value)||[];}catch{}}
  renderCEMPanel();
}
function renderCEMPanel(){
  const c=$('ep-cust');if(!c)return;c.innerHTML='';
  customEmojis.forEach(e=>{
    const el=document.createElement('div');el.className='cem';
    el.innerHTML=e.startsWith('http')?`<img src="${esc(e)}">`:`${e}`;
    el.onclick=()=>insertEmoji(e);
    c.appendChild(el);
  });
}
async function addCEM(){
  const v=$('cem-in')?.value.trim();if(!v)return;
  customEmojis.push(v);
  await sb.from('settings').upsert({key:'custom_emojis',value:JSON.stringify(customEmojis)});
  $('cem-in').value='';renderCEMPanel();
  adminTab('emoji',null);toast('✅ სმაილი დაემატა','ok');
}
async function rmCEM(i){
  customEmojis.splice(i,1);
  await sb.from('settings').upsert({key:'custom_emojis',value:JSON.stringify(customEmojis)});
  renderCEMPanel();adminTab('emoji',null);
}

/* ── EMOJI PANEL ── */
function buildEmojiPanel(){
  const cats=$('ep-cats');cats.innerHTML='';
  ECATS.forEach((cat,i)=>{
    const b=document.createElement('button');
    b.className='ep-cat'+(i===0?' on':'');
    b.textContent=cat.e;
    b.onclick=()=>{curECat=i;renderEGrid();document.querySelectorAll('.ep-cat').forEach((c,j)=>c.classList.toggle('on',j===i));};
    cats.appendChild(b);
  });
  renderEGrid();
}
function renderEGrid(){
  const g=$('ep-grid');g.innerHTML='';
  [...ECATS[curECat].list].forEach(e=>{
    const el=document.createElement('div');el.className='ep-em';el.textContent=e;
    el.onclick=()=>insertEmoji(e);
    g.appendChild(el);
  });
}
function toggleEP(){$('ep').classList.toggle('open');}
function insertEmoji(e){
  const inp=$('msgin'),pos=inp.selectionStart||inp.value.length;
  inp.value=inp.value.slice(0,pos)+e+inp.value.slice(pos);
  inp.focus();$('ep').classList.remove('open');
}

/* ── FORMAT ── */
function fmt(type){
  const map={bold:'font-weight:800;',italic:'font-style:italic;',underline:'text-decoration:underline;',strike:'text-decoration:line-through;'};
  txtStyle+=map[type]||'';
  toast('✅ ფორმატი დაყენებულია','ok');
}
function setColor(c){txtColor=c;$('clr-dot').style.background=c;}

/* ── THEME ── */
function buildThemePop(){
  const pop=$('thpop');
  let html=`<div class="th-lbl">ფერი</div><div class="th-colors">`;
  THEMES.forEach((t,i)=>{
    html+=`<div class="th-sw${i===0?' on':''}" style="background:linear-gradient(135deg,${t.a},${t.b})" onclick="applyTheme('${t.a}','${t.b}',this)"></div>`;
  });
  html+=`</div><div class="th-tog"><span class="th-tog-lbl">🌙 ბნელი</span>
    <label class="sw"><input type="checkbox" checked onchange="toggleDark(this.checked)"><span class="sw-tr"></span><span class="sw-th"></span></label>
  </div>`;
  pop.innerHTML=html;
}
function toggleTheme(){$('thpop').classList.toggle('open');}
function applyTheme(a,b,el){
  document.documentElement.style.setProperty('--accent',a);
  document.documentElement.style.setProperty('--accent2',b);
  document.documentElement.style.setProperty('--acg',`linear-gradient(135deg,${a},${b})`);
  document.querySelectorAll('.th-sw').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
}
function toggleDark(d){document.documentElement.setAttribute('data-theme',d?'dark':'light');}

/* ── CLOSE ON OUTSIDE CLICK ── */
document.addEventListener('click',e=>{
  if(!e.target.closest('.ep')&&!e.target.closest('.em-tgl'))$('ep').classList.remove('open');
  if(!e.target.closest('.thpop')&&!e.target.closest('[onclick*="toggleTheme"]'))$('thpop').classList.remove('open');
});

/* ── BOOT ── */
init();
</script>

</body>
</html>
