<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: #000; height: 60px; display: flex; align-items: center; border-bottom: 2px solid red; padding: 0 15px; flex-shrink: 0; z-index: 1001; }
        .burger { font-size: 30px; color: red; cursor: pointer; padding: 10px; }
        .title { flex: 1; text-align: center; color: red; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px red; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; background: #0a0000; border-right: 2px solid red; transition: 0.3s ease; z-index: 2000; display: flex; flex-direction: column; padding: 70px 10px 20px; overflow-y: auto; }
        .side-menu.active { left: 0; }
        .menu-item { padding: 12px; margin: 4px 0; background: #150000; border: 1px solid #333; border-radius: 8px; cursor: pointer; color: #ccc; font-size: 14px; }
        .menu-item:hover { background: red; color: white; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050000; display: flex; flex-direction: column; gap: 12px; }
        .m-wrap { display: flex; gap: 10px; align-items: flex-start; max-width: 90%; }
        .m-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1px solid red; flex-shrink: 0; object-fit: cover; }
        .m-body { background: #111; padding: 8px 12px; border-radius: 10px; border-left: 3px solid red; }
        .m-user { font-weight: bold; color: red; font-size: 11px; margin-bottom: 2px; }
        .input-zone { background: #000; padding: 12px; display: flex; gap: 10px; border-top: 2px solid #222; align-items: center; flex-shrink: 0; padding-bottom: 25px; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #444; background: #111; color: white; outline: none; font-size: 16px; }
        .btn { background: none; border: none; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="topbar"><div class="burger" onclick="toggleMenu()">☰</div><div class="title" id="room-title">☕️ კაფე-ბარი</div></div>

<div class="side-menu" id="sideMenu">
    <div class="menu-item" onclick="changeRoom('☕️ კაფე-ბარი')">☕️ კაფე-ბარი</div>
    <div class="menu-item" onclick="changeRoom('💎 VIP')">💎 VIP</div>
    <div class="menu-item" onclick="changeRoom('🔍 გამოძიება')">🔍 გამოძიება</div>
    <div class="menu-item" onclick="changeRoom('🔒 შიფროგრამა')">🔒 შიფროგრამა</div>
    <div class="menu-item" onclick="changeRoom('❓ ვიქტორინა')">❓ ვიქტორინა</div>
    <div class="menu-item" onclick="changeRoom('🔗 ჩამომხრჩობალა')">🔗 ჩამომხრჩობალა</div>
    <div class="menu-item" onclick="changeRoom('🕵️ მაფია')">🕵️ მაფია</div>
    <div class="menu-item" onclick="changeRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
    <div class="menu-item" onclick="changeRoom('🎲 ნარდი')">🎲 ნარდი</div>
    <div class="menu-item" onclick="changeRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
    <div class="menu-item" onclick="changeRoom('🛡️ ადმინი')">🛡️ ადმინი</div>
    <div class="menu-item" onclick="changeRoom('💬 ზოგადი')">💬 ზოგადი</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
    <button class="btn" onclick="send()">
        <svg viewBox="0 0 24 24" width="32" height="32"><path fill="red" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
</div>

<script>
    const _supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkdmphd3JwbHZ2bGRianBmY2d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzE1NDIsImV4cCI6MjA4OTAwNzU0Mn0.QEySoKfVHF1b4dV5TAH5vgQQKQMAgdETzQm3P9p3H8A"
    );

    let room = "☕️ კაფე-ბარი";
    let nick = localStorage.getItem('nickname') || "მარიამი";
    let avatar = "https://ui-avatars.com/api/?name=" + nick + "&background=red&color=fff";

    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function load() {
        const { data, error } = await _supabase.from('messages').select('*').eq('room_id', room).order('created_at', { ascending: true });
        if (error) return;
        const c = document.getElementById('chat');
        c.innerHTML = "";
        data?.forEach(m => {
            const userAvatar = m.avatar_url || `https://ui-avatars.com/api/?name=${m.user_name}&background=333&color=fff`;
            c.innerHTML += `
                <div class="m-wrap">
                    <img src="${userAvatar}" class="m-avatar">
                    <div class="m-body">
                        <div class="m-user">${m.user_name}</div>
                        <div style="font-size:14px;">${m.text}</div>
                    </div>
                </div>`;
        });
        c.scrollTop = c.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('msgInput');
        const val = i.value.trim();
        if (!val) return;
        i.value = "";
        await _supabase.from('messages').insert([{ user_name: nick, text: val, room_id: room, avatar_url: avatar }]);
    }

    function changeRoom(n) {
        room = n;
        document.getElementById('room-title').innerText = n;
        toggleMenu();
        load();
    }

    window.onload = () => {
        load();
        _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => load()).subscribe();
    };
</script>
</body>
</html>
