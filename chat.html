<!DOCTYPE html>

<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NebulaChat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   CSS VARIABLES & RESET
══════════════════════════════════════════ */
:root {
  --rose:#ff6b9d; --violet:#c77dff; --gold:#ffd166; --teal:#6bffda;
  --bg:#0d0d1a; --surface:rgba(255,255,255,0.04); --surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.09); --text:#f0e6ff; --muted:rgba(240,230,255,0.45);
  --accent:var(--violet);
  --sidebar-w:260px;
}
[data-theme="light"] {
  --bg:#f0ebff; --surface:rgba(255,255,255,0.85); --surface2:rgba(255,255,255,0.95);
  --border:rgba(0,0,0,0.08); --text:#1a1030; --muted:rgba(26,16,48,0.5);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); height:100vh; display:flex; overflow:hidden; transition:background 0.4s, color 0.4s; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(–border); border-radius:4px; }

/* ══ SIDEBAR ══ */
.sidebar {
width:var(–sidebar-w); min-width:var(–sidebar-w);
background:rgba(13,13,26,0.95);
border-right:1px solid var(–border);
display:flex; flex-direction:column;
backdrop-filter:blur(20px);
position:relative; z-index:10;
}
[data-theme=“light”] .sidebar { background:rgba(240,235,255,0.98); }

.sidebar-header {
padding:20px 16px 16px;
border-bottom:1px solid var(–border);
display:flex; align-items:center; gap:10px;
}
.logo-txt {
font-family:‘Playfair Display’,serif;
font-size:1.2rem; color:var(–text);
}
.logo-star { font-size:1.4rem; animation:spin 8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.sidebar-section { padding:12px 16px 6px; }
.sidebar-section-label {
font-size:0.68rem; letter-spacing:1.2px; text-transform:uppercase;
color:var(–muted); margin-bottom:8px;
}

.room-item {
display:flex; align-items:center; gap:10px;
padding:9px 12px; border-radius:10px; cursor:pointer;
transition:all 0.2s; font-size:0.88rem; color:var(–muted);
position:relative; user-select:none;
}
.room-item:hover { background:var(–surface2); color:var(–text); }
.room-item.active {
background:linear-gradient(135deg,rgba(199,125,255,0.18),rgba(255,107,157,0.12));
color:var(–text);
border:1px solid rgba(199,125,255,0.2);
}
.room-item .ri-icon { font-size:1rem; width:20px; text-align:center; }
.room-badge {
margin-left:auto; background:var(–rose); color:#fff;
font-size:0.65rem; padding:1px 6px; border-radius:20px; font-weight:600;
}

/* DM list */
.dm-item {
display:flex; align-items:center; gap:10px;
padding:8px 12px; border-radius:10px; cursor:pointer;
transition:all 0.2s; color:var(–muted); font-size:0.86rem;
}
.dm-item:hover { background:var(–surface2); color:var(–text); }
.dm-item.active { background:var(–surface2); color:var(–text); }
.dm-avatar {
width:30px; height:30px; border-radius:50%;
background:linear-gradient(135deg,var(–rose),var(–violet));
display:flex; align-items:center; justify-content:center;
font-size:0.85rem; font-weight:600; color:#fff; flex-shrink:0;
position:relative;
}
.dm-online { position:absolute; bottom:0; right:0; width:8px; height:8px; border-radius:50%; background:#6bffda; border:2px solid var(–bg); }

/* PM indicator */
.pm-indicator {
position:absolute; top:-2px; right:-2px;
width:10px; height:10px; border-radius:50%;
background:var(–rose); border:2px solid var(–bg);
animation:pmPulse 1s ease-in-out infinite;
}
@keyframes pmPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

.sidebar-bottom {
margin-top:auto; padding:14px 16px;
border-top:1px solid var(–border);
}
.my-profile {
display:flex; align-items:center; gap:10px;
cursor:pointer; padding:8px 10px; border-radius:12px;
transition:background 0.2s;
}
.my-profile:hover { background:var(–surface2); }
.my-avatar {
width:36px; height:36px; border-radius:50%;
background:linear-gradient(135deg,var(–violet),var(–rose));
display:flex; align-items:center; justify-content:center;
font-size:1rem; font-weight:700; color:#fff; flex-shrink:0;
border:2px solid var(–accent);
}
.my-info { flex:1; min-width:0; }
.my-name { font-size:0.88rem; font-weight:600; color:var(–text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.my-status { font-size:0.72rem; color:var(–muted); }
.toolbar-icons { display:flex; gap:6px; }
.icon-btn {
width:30px; height:30px; border-radius:8px; border:none;
background:var(–surface2); color:var(–muted); cursor:pointer;
display:flex; align-items:center; justify-content:center;
font-size:0.9rem; transition:all 0.2s;
}
.icon-btn:hover { background:var(–accent); color:#fff; }

/* ══ MAIN AREA ══ */
.main { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }

.topbar {
padding:14px 20px;
border-bottom:1px solid var(–border);
display:flex; align-items:center; gap:14px;
background:rgba(13,13,26,0.6);
backdrop-filter:blur(12px);
flex-shrink:0; z-index:5;
}
[data-theme=“light”] .topbar { background:rgba(240,235,255,0.9); }
.topbar-icon { font-size:1.3rem; }
.topbar-title { font-family:‘Playfair Display’,serif; font-size:1.1rem; flex:1; }
.topbar-sub { font-size:0.75rem; color:var(–muted); }
.topbar-actions { display:flex; gap:8px; }

/* Online indicator */
.online-dot { width:8px; height:8px; border-radius:50%; background:#6bffda; box-shadow:0 0 8px #6bffda; animation:blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Messages ── */
.messages {
flex:1; overflow-y:auto; padding:20px;
display:flex; flex-direction:column; gap:4px;
position:relative;
}

/* Background mesh for messages */
.messages::before {
content:’’; position:absolute; inset:0; z-index:0; pointer-events:none;
background:
radial-gradient(ellipse 60% 40% at 20% 30%,rgba(199,125,255,0.04) 0%,transparent 60%),
radial-gradient(ellipse 50% 50% at 80% 70%,rgba(255,107,157,0.03) 0%,transparent 60%);
}

.msg-group { position:relative; z-index:1; }
.msg-group + .msg-group { margin-top:12px; }

.msg-row {
display:flex; align-items:flex-end; gap:10px;
padding:2px 0;
}
.msg-row.own { flex-direction:row-reverse; }

.msg-avatar {
width:32px; height:32px; border-radius:50%; flex-shrink:0;
background:linear-gradient(135deg,var(–violet),var(–rose));
display:flex; align-items:center; justify-content:center;
font-size:0.8rem; font-weight:700; color:#fff;
cursor:pointer; transition:transform 0.2s;
}
.msg-avatar:hover { transform:scale(1.1); }
.msg-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }

.msg-content { max-width:72%; display:flex; flex-direction:column; gap:2px; }
.msg-row.own .msg-content { align-items:flex-end; }

.msg-meta {
display:flex; align-items:center; gap:6px;
padding:0 4px; margin-bottom:2px;
}
.msg-nick { font-size:0.78rem; font-weight:600; color:var(–violet); }
.msg-nick.admin-nick { color:var(–gold); }
.msg-nick.founder-nick { background:linear-gradient(135deg,var(–gold),var(–rose)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.msg-role-badge {
font-size:0.6rem; padding:1px 5px; border-radius:4px;
font-weight:700; letter-spacing:0.5px;
}
.badge-admin { background:rgba(255,209,102,0.2); color:var(–gold); }
.badge-founder { background:linear-gradient(135deg,rgba(255,209,102,0.3),rgba(255,107,157,0.3)); color:var(–gold); }
.badge-member { display:none; }
.msg-time { font-size:0.68rem; color:var(–muted); margin-left:auto; }

.bubble {
background:var(–surface2);
border:1px solid var(–border);
border-radius:16px 16px 16px 4px;
padding:10px 14px;
font-size:0.9rem; line-height:1.5;
color:var(–text);
position:relative; cursor:pointer;
transition:background 0.2s;
word-break:break-word;
}
.bubble:hover { background:rgba(255,255,255,0.09); }
.msg-row.own .bubble {
background:linear-gradient(135deg,rgba(199,125,255,0.22),rgba(255,107,157,0.18));
border-color:rgba(199,125,255,0.3);
border-radius:16px 16px 4px 16px;
}

/* Reply bubble */
.reply-preview {
background:rgba(199,125,255,0.08);
border-left:3px solid var(–violet);
border-radius:4px; padding:4px 8px;
margin-bottom:4px; font-size:0.78rem; color:var(–muted);
}

/* Reactions */
.bubble-reactions {
display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;
}
.reaction-chip {
background:var(–surface); border:1px solid var(–border);
border-radius:20px; padding:2px 8px; font-size:0.8rem; cursor:pointer;
transition:all 0.2s; display:flex; align-items:center; gap:3px;
}
.reaction-chip:hover, .reaction-chip.mine { background:rgba(199,125,255,0.18); border-color:var(–violet); }
.reaction-count { font-size:0.72rem; color:var(–muted); }

/* Seen indicator */
.seen-indicator { font-size:0.65rem; color:var(–teal); margin-top:2px; padding-right:4px; }

/* Voice message */
.voice-msg {
display:flex; align-items:center; gap:10px;
padding:8px 14px; background:var(–surface2);
border:1px solid var(–border); border-radius:14px;
cursor:pointer; min-width:180px;
}
.voice-play { font-size:1.1rem; }
.voice-wave { flex:1; height:24px; display:flex; align-items:center; gap:1px; }
.voice-wave span {
display:block; width:3px; background:var(–violet);
border-radius:2px; animation:wave 0.8s ease-in-out infinite alternate;
}
.voice-wave span:nth-child(2n){animation-delay:0.1s}
.voice-wave span:nth-child(3n){animation-delay:0.2s}
.voice-wave span:nth-child(4n){animation-delay:0.15s}
@keyframes wave { from{height:4px} to{height:20px} }
.voice-duration { font-size:0.75rem; color:var(–muted); }

/* Context menu */
.ctx-menu {
position:fixed; background:rgba(20,15,40,0.98); backdrop-filter:blur(20px);
border:1px solid var(–border); border-radius:12px;
padding:6px; z-index:1000; min-width:160px;
box-shadow:0 12px 40px rgba(0,0,0,0.5);
animation:ctxIn 0.15s ease;
}
@keyframes ctxIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
.ctx-item {
padding:8px 14px; border-radius:8px; cursor:pointer;
font-size:0.85rem; color:var(–text); transition:background 0.15s;
display:flex; align-items:center; gap:8px;
}
.ctx-item:hover { background:var(–surface2); }
.ctx-item.danger { color:#ff6b6b; }
.ctx-item.danger:hover { background:rgba(255,107,107,0.1); }

/* ── Typing area ── */
.typing-area {
padding:12px 20px 16px; border-top:1px solid var(–border);
background:rgba(13,13,26,0.7); backdrop-filter:blur(12px); flex-shrink:0;
}
[data-theme=“light”] .typing-area { background:rgba(240,235,255,0.95); }

.reply-bar {
display:none; background:rgba(199,125,255,0.08); border-left:3px solid var(–violet);
border-radius:6px; padding:6px 10px; margin-bottom:8px;
font-size:0.8rem; color:var(–muted);
display:none; align-items:center; justify-content:space-between;
}
.reply-bar.show { display:flex; }

.typing-toolbar {
display:flex; gap:6px; margin-bottom:8px;
}
.fmt-btn {
width:28px; height:28px; border-radius:7px; border:none;
background:var(–surface2); color:var(–muted); cursor:pointer;
font-size:0.8rem; transition:all 0.2s; display:flex; align-items:center; justify-content:center;
}
.fmt-btn:hover { background:var(–accent); color:#fff; }
.color-picker-wrap { position:relative; }
.color-dot {
width:28px; height:28px; border-radius:7px; border:2px solid var(–border);
cursor:pointer; background:var(–violet);
}

.input-row {
display:flex; gap:10px; align-items:flex-end;
}
.chat-input {
flex:1; background:var(–surface2); border:1px solid var(–border);
border-radius:14px; padding:11px 16px; color:var(–text);
font-family:‘DM Sans’,sans-serif; font-size:0.92rem;
resize:none; min-height:44px; max-height:140px; outline:none;
transition:all 0.25s; line-height:1.45;
}
.chat-input:focus { border-color:var(–violet); box-shadow:0 0 0 3px rgba(199,125,255,0.12); }
.chat-input::placeholder { color:var(–muted); }

.emoji-btn, .voice-btn, .send-btn {
width:44px; height:44px; border-radius:12px; border:none;
cursor:pointer; display:flex; align-items:center; justify-content:center;
font-size:1.1rem; transition:all 0.2s; flex-shrink:0;
}
.emoji-btn, .voice-btn { background:var(–surface2); color:var(–muted); }
.emoji-btn:hover, .voice-btn:hover { background:var(–surface); color:var(–text); }
.send-btn {
background:linear-gradient(135deg,var(–rose),var(–violet));
color:#fff; box-shadow:0 4px 16px rgba(199,125,255,0.35);
}
.send-btn:hover { transform:scale(1.08); box-shadow:0 6px 24px rgba(199,125,255,0.5); }
.voice-btn.recording { background:var(–rose); color:#fff; animation:recPulse 0.7s ease-in-out infinite; }
@keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,157,0.5)} 50%{box-shadow:0 0 0 8px rgba(255,107,157,0)} }

/* ── Emoji Board ── */
.emoji-board {
position:absolute; bottom:80px; left:20px;
background:rgba(18,12,35,0.98); backdrop-filter:blur(20px);
border:1px solid var(–border); border-radius:16px;
padding:12px; width:320px; z-index:100;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
display:none;
animation:emojiIn 0.2s ease;
}
.emoji-board.show { display:block; }
@keyframes emojiIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.emoji-cats { display:flex; gap:4px; margin-bottom:10px; overflow-x:auto; }
.emoji-cat { padding:4px 10px; border-radius:8px; cursor:pointer; font-size:0.8rem; color:var(–muted); transition:all 0.2s; white-space:nowrap; border:none; background:transparent; }
.emoji-cat.active { background:var(–surface2); color:var(–text); }
.emoji-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; max-height:180px; overflow-y:auto; }
.e-item { font-size:1.3rem; cursor:pointer; text-align:center; padding:4px; border-radius:8px; transition:all 0.15s; }
.e-item:hover { background:var(–surface2); transform:scale(1.2); }
.emoji-upload-row { margin-top:10px; border-top:1px solid var(–border); padding-top:10px; }
.upload-emoji-btn {
width:100%; padding:7px; border-radius:8px; border:1px dashed var(–border);
background:transparent; color:var(–muted); cursor:pointer; font-size:0.8rem;
transition:all 0.2s;
}
.upload-emoji-btn:hover { border-color:var(–violet); color:var(–violet); }

/* ══ RIGHT PANEL ══ */
.right-panel {
width:280px; min-width:280px;
background:rgba(13,13,26,0.92);
border-left:1px solid var(–border);
display:flex; flex-direction:column;
overflow:hidden;
}
[data-theme=“light”] .right-panel { background:rgba(240,235,255,0.98); }
.panel-tabs {
display:flex; border-bottom:1px solid var(–border); flex-shrink:0;
}
.ptab {
flex:1; padding:12px 6px; border:none; background:transparent;
color:var(–muted); font-size:0.78rem; cursor:pointer; transition:all 0.2s;
font-family:‘DM Sans’,sans-serif; letter-spacing:0.3px;
border-bottom:2px solid transparent;
}
.ptab.active { color:var(–violet); border-bottom-color:var(–violet); }
.panel-content { flex:1; overflow-y:auto; padding:14px; }

/* Online members */
.member-item {
display:flex; align-items:center; gap:10px;
padding:8px 10px; border-radius:10px; cursor:pointer;
transition:background 0.2s; margin-bottom:4px;
}
.member-item:hover { background:var(–surface2); }
.m-avatar {
width:32px; height:32px; border-radius:50%;
background:linear-gradient(135deg,var(–violet),var(–rose));
display:flex; align-items:center; justify-content:center;
font-size:0.82rem; font-weight:700; color:#fff; flex-shrink:0;
position:relative;
}
.m-status-dot { position:absolute; bottom:0; right:0; width:8px; height:8px; border-radius:50%; border:2px solid var(–bg); }
.status-online { background:#6bffda; }
.status-away { background:var(–gold); }
.status-offline { background:var(–muted); }
.m-info { flex:1; min-width:0; }
.m-name { font-size:0.84rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.m-role { font-size:0.68rem; color:var(–muted); }
.m-actions { display:flex; gap:4px; opacity:0; transition:opacity 0.2s; }
.member-item:hover .m-actions { opacity:1; }
.m-action-btn {
width:24px; height:24px; border-radius:6px; border:none;
background:var(–surface2); color:var(–muted); cursor:pointer;
font-size:0.75rem; display:flex; align-items:center; justify-content:center;
transition:all 0.2s;
}
.m-action-btn:hover { background:var(–accent); color:#fff; }
.m-action-btn.danger:hover { background:#ff6b6b; }

/* Friends */
.friend-item {
display:flex; align-items:center; gap:10px;
padding:8px 10px; border-radius:10px; cursor:pointer;
transition:background 0.2s; margin-bottom:4px;
}
.friend-item:hover { background:var(–surface2); }
.friend-actions { display:flex; gap:4px; margin-left:auto; }
.fa-btn {
padding:3px 8px; border-radius:6px; border:none; cursor:pointer;
font-size:0.72rem; transition:all 0.2s; font-family:‘DM Sans’,sans-serif;
}
.fa-btn.add { background:rgba(107,255,218,0.15); color:var(–teal); }
.fa-btn.remove { background:rgba(255,107,107,0.15); color:#ff6b6b; }
.fa-btn:hover { filter:brightness(1.2); }

/* Gallery */
.gallery-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.gallery-img {
aspect-ratio:1; border-radius:10px; overflow:hidden;
background:var(–surface2); cursor:pointer; position:relative;
}
.gallery-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
.gallery-img:hover img { transform:scale(1.08); }
.gallery-img .img-overlay {
position:absolute; inset:0; background:rgba(0,0,0,0.4);
display:flex; gap:8px; align-items:center; justify-content:center;
opacity:0; transition:opacity 0.2s;
}
.gallery-img:hover .img-overlay { opacity:1; }

/* ══ MODALS ══ */
.modal-overlay {
position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
z-index:200; display:flex; align-items:center; justify-content:center;
display:none;
}
.modal-overlay.show { display:flex; }
.modal {
background:rgba(18,12,35,0.99); border:1px solid var(–border);
border-radius:20px; padding:28px; width:380px; max-width:95vw;
box-shadow:0 24px 80px rgba(0,0,0,0.6);
animation:modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme=“light”] .modal { background:rgba(248,245,255,0.99); }
@keyframes modalIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
.modal h3 { font-family:‘Playfair Display’,serif; font-size:1.2rem; margin-bottom:16px; color:var(–text); }
.modal-input {
width:100%; background:var(–surface2); border:1px solid var(–border);
border-radius:10px; padding:10px 14px; color:var(–text);
font-family:‘DM Sans’,sans-serif; font-size:0.9rem; outline:none;
transition:border 0.2s; margin-bottom:10px;
}
.modal-input:focus { border-color:var(–violet); }
.modal-row { display:flex; gap:8px; margin-top:4px; }
.modal-btn {
flex:1; padding:10px; border-radius:10px; border:none; cursor:pointer;
font-family:‘DM Sans’,sans-serif; font-size:0.88rem; font-weight:500; transition:all 0.2s;
}
.modal-btn.primary { background:linear-gradient(135deg,var(–rose),var(–violet)); color:#fff; }
.modal-btn.secondary { background:var(–surface2); color:var(–muted); }
.modal-btn:hover { filter:brightness(1.1); }

/* Status emoji picker */
.status-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.status-opt { font-size:1.3rem; cursor:pointer; padding:4px; border-radius:8px; transition:all 0.15s; }
.status-opt:hover, .status-opt.selected { background:var(–surface2); transform:scale(1.2); }

/* Theme / accent color */
.color-swatches { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.swatch {
width:28px; height:28px; border-radius:8px; cursor:pointer;
transition:transform 0.2s; border:2px solid transparent;
}
.swatch:hover { transform:scale(1.15); }
.swatch.selected { border-color:#fff; }

/* ── Profile panel ── */
.profile-panel {
position:fixed; right:0; top:0; height:100vh; width:300px;
background:rgba(18,12,35,0.99); border-left:1px solid var(–border);
backdrop-filter:blur(20px); z-index:150; transform:translateX(100%);
transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
padding:24px; overflow-y:auto;
}
.profile-panel.open { transform:translateX(0); }
[data-theme=“light”] .profile-panel { background:rgba(248,245,255,0.99); }
.profile-panel-avatar {
width:80px; height:80px; border-radius:50%; margin:0 auto 12px;
background:linear-gradient(135deg,var(–violet),var(–rose));
display:flex; align-items:center; justify-content:center;
font-size:2rem; font-weight:700; color:#fff;
border:3px solid var(–accent);
}
.profile-panel-name { text-align:center; font-size:1.1rem; font-weight:600; margin-bottom:4px; }
.profile-panel-role { text-align:center; font-size:0.78rem; color:var(–muted); margin-bottom:16px; }
.pp-action {
width:100%; padding:9px; border-radius:10px; border:1px solid var(–border);
background:var(–surface2); color:var(–text); cursor:pointer;
font-family:‘DM Sans’,sans-serif; font-size:0.86rem; margin-bottom:8px;
transition:all 0.2s; text-align:left; display:flex; align-items:center; gap:8px;
}
.pp-action:hover { background:var(–surface); border-color:var(–violet); }
.pp-action.danger { color:#ff6b6b; border-color:rgba(255,107,107,0.2); }
.pp-action.danger:hover { background:rgba(255,107,107,0.1); }

/* ── Notification toasts ── */
.toast-container { position:fixed; top:16px; right:16px; z-index:500; display:flex; flex-direction:column; gap:8px; }
.toast {
background:rgba(18,12,35,0.98); backdrop-filter:blur(16px);
border:1px solid var(–border); border-radius:12px;
padding:12px 16px; min-width:220px; max-width:300px;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
animation:toastIn 0.3s ease, toastOut 0.3s ease 3.7s both;
display:flex; align-items:center; gap:10px; font-size:0.85rem;
}
@keyframes toastIn { from{opacity:0;transform:translateX(100%)} to{opacity:1;transform:translateX(0)} }
@keyframes toastOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(100%)} }
.toast-icon { font-size:1.1rem; }

/* ── Floating hearts/flowers ── */
.floater {
position:fixed; font-size:1.2rem; pointer-events:none; z-index:1;
animation:flt linear infinite;
filter:drop-shadow(0 0 4px rgba(255,107,157,0.5));
}
@keyframes flt {
0%{transform:translateY(105vh) rotate(0deg) scale(0.7);opacity:0}
10%{opacity:0.7}
90%{opacity:0.7}
100%{transform:translateY(-5vh) rotate(360deg) scale(1.1);opacity:0}
}

/* ── Day/Night toggle ── */
.theme-toggle {
position:relative; width:44px; height:24px; cursor:pointer;
}
.theme-toggle input { display:none; }
.toggle-track {
position:absolute; inset:0; border-radius:12px;
background:var(–surface2); border:1px solid var(–border);
transition:background 0.3s;
}
.toggle-thumb {
position:absolute; top:3px; left:3px; width:18px; height:18px;
border-radius:50%; background:linear-gradient(135deg,var(–gold),var(–rose));
transition:transform 0.3s; font-size:10px; display:flex; align-items:center; justify-content:center;
}
input:checked ~ .toggle-track { background:rgba(107,183,255,0.3); }
input:checked ~ .toggle-thumb { transform:translateX(20px); }

/* PM badge in sidebar */
.pm-badge {
position:absolute; top:-3px; right:-3px; width:12px; height:12px;
border-radius:50%; background:var(–rose); border:2px solid var(–bg);
animation:pmPulse 1.2s ease-in-out infinite;
}

/* Typing indicator */
.typing-indicator {
display:flex; align-items:center; gap:8px;
font-size:0.78rem; color:var(–muted); padding:4px 16px;
}
.typing-dots { display:flex; gap:3px; }
.typing-dots span {
width:5px; height:5px; border-radius:50%;
background:var(–violet); animation:typeDot 1s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes typeDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ── Responsive helpers ── */
@media(max-width:800px) {
.right-panel { display:none; }
.sidebar { width:56px; min-width:56px; }
.sidebar .room-item span:not(.ri-icon), .sidebar .sidebar-section-label,
.sidebar .my-name, .sidebar .my-status, .sidebar .logo-txt { display:none; }
}
</style>

async function joinRoom(room) {
  if (currentRoom===room.id && !isDM) return;
  currentRoom = room.id; isDM = false; dmTarget = null;
  document.querySelectorAll('.room-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('room-'+room.id);
  if(el) el.classList.add('active');
  document.querySelectorAll('.dm-item').forEach(el=>el.classList.remove('active'));

  document.getElementById('topbarIcon').textContent = room.icon;
  document.getElementById('topbarTitle').textContent = room.name;
  document.getElementById('topbarSub').textContent = '💬 საჯარო ოთახი';
  document.title = 'NebulaChat — '+room.name;

  await loadMessages();
  loadMembers();
  subscribeMessages();
}

let msgSub = null;

async function loadMessages() {
  const msgEl = document.getElementById('messages');
  msgEl.innerHTML = '';

  let query = sb.from('messages')
    .select('*')
    .order('created_at', {ascending:true})
    .limit(80);

  if (isDM) {
    query = query.or(`and(sender_id.eq.${me.id},receiver_id.eq.${dmTarget}),and(sender_id.eq.${dmTarget},receiver_id.eq.${me.id})`);
  } else {
    query = query.eq('room_id', currentRoom).is('receiver_id', null);
  }

  const {data:msgs} = await query;
  if (msgs) msgs.forEach(m => renderMessage(m));
  scrollToBottom();
}

function subscribeMessages() {
  if (msgSub) sb.removeChannel(msgSub);
  const filter = isDM
    ? `room_id=is.null`
    : `room_id=eq.${currentRoom}`;

  msgSub = sb.channel('msgs-'+currentRoom+isDM)
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, async (payload) => {
      const m = payload.new;
      if (isDM) {
        if (!((m.sender_id===me.id&&m.receiver_id===dmTarget)||(m.sender_id===dmTarget&&m.receiver_id===me.id))) return;
      } else {
        if (m.room_id!==currentRoom||m.receiver_id) return;
      }
      renderMessage(m);
      scrollToBottom();
      if (m.sender_id!==me.id && isDM) markSeen(m.id);
    })
    .on('postgres_changes', {event:'DELETE', schema:'public', table:'messages'}, (payload) => {
      document.getElementById('msg-'+payload.old.id)?.remove();
    })
    .subscribe();
}

async function renderMessage(m, prepend=false) {
  // Get profile
  let profile = cachedProfiles[m.sender_id];
  if (!profile) {
    const {data} = await sb.from('profiles').select('*').eq('id',m.sender_id).single();
    profile = data || {username:'?', role:'member', avatar_url:null, status_emoji:'😊'};
    cachedProfiles[m.sender_id] = profile;
  }

  const isOwn = m.sender_id === me.id;
  const isAdmin = myProfile.role==='admin'||myProfile.role==='founder';
  const canDelete = isOwn || isAdmin;

  const nick = profile.username||'User';
  const role = profile.role||'member';
  const avatarLetter = nick[0].toUpperCase();
  const time = new Date(m.created_at).toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});

  const reactions = m.reactions ? JSON.parse(typeof m.reactions==='string'?m.reactions:'{}') : {};
  const reactionsHtml = Object.entries(reactions).map(([emoji,users])=>`
    <div class="reaction-chip ${users.includes(me.id)?'mine':''}" onclick="toggleReaction('${m.id}','${emoji}')">
      ${emoji}<span class="reaction-count">${users.length}</span>
    </div>`).join('');

  const replyHtml = m.reply_to ? `<div class="reply-preview">↩️ ${m.reply_preview||'შეტყობინება'}</div>` : '';

  let bodyHtml = '';
  if (m.content_type==='voice') {
    bodyHtml = `<div class="voice-msg" onclick="playVoice('${m.content}')">
      <span class="voice-play">▶️</span>
      <div class="voice-wave">${'<span></span>'.repeat(12)}</div>
      <span class="voice-duration">${m.duration||'0:00'}</span>
    </div>`;
  } else if (m.content_type==='image') {
    bodyHtml = `<img src="${m.content}" style="max-width:220px;border-radius:12px;cursor:pointer" onclick="viewImage('${m.content}')">`;
  } else {
    bodyHtml = `<span>${m.content||''}</span>`;
  }

  const seenHtml = isOwn && m.seen_at ? `<div class="seen-indicator">✓✓ ნახულია</div>` : '';

  const roleClass = role==='founder'?'founder-nick':role==='admin'?'admin-nick':'';
  const badgeClass = role==='founder'?'badge-founder':role==='admin'?'badge-admin':'badge-member';
  const badgeTxt = role==='founder'?'👑':role==='admin'?'⭐':'';

  const row = document.createElement('div');
  row.className = 'msg-group';
  row.id = 'msg-'+m.id;
  row.dataset.msgId = m.id;
  row.dataset.senderId = m.sender_id;
  row.dataset.canDelete = canDelete;
  row.dataset.content = m.content||'';

  row.innerHTML = `
    <div class="msg-row ${isOwn?'own':''}">
      ${!isOwn?`<div class="msg-avatar" onclick="showUserProfile('${m.sender_id}','${nick}','${role}')">${profile.avatar_url?`<img src="${profile.avatar_url}">`:`${avatarLetter}`}</div>`:''}
      <div class="msg-content">
        ${!isOwn?`<div class="msg-meta">
          <span class="msg-nick ${roleClass}">${badgeTxt} ${nick}</span>
          <span class="msg-role-badge ${badgeClass}">${role==='founder'?'FOUNDER':role==='admin'?'ADMIN':''}</span>
          <span class="msg-time">${time}</span>
        </div>`:''}
        ${replyHtml}
        <div class="bubble" oncontextmenu="showCtx(event,'${m.id}',${canDelete})" ontouchstart="touchHold(event,'${m.id}',${canDelete})">
          ${bodyHtml}
        </div>
        ${isOwn?`<div class="msg-meta" style="flex-direction:row-reverse"><span class="msg-time">${time}</span></div>`:''}
        ${reactionsHtml?`<div class="bubble-reactions">${reactionsHtml}</div>`:''}
        ${seenHtml}
      </div>
      ${isOwn?`<div class="msg-avatar" style="cursor:default">${myProfile.avatar_url?`<img src="${myProfile.avatar_url}">`:`${(myProfile.username||'U')[0].toUpperCase()}`}</div>`:''}
    </div>`;

  const messages = document.getElementById('messages');
  if (prepend) messages.prepend(row);
  else messages.appendChild(row);
}

async function sendMessage() {
  const el = document.getElementById('chatInput');
  const content = el.innerHTML.replace(/<br>/g,'\n').replace(/<[^>]+>/g,'').trim();
  if (!content) return;

  const payload = {
    sender_id: me.id,
    content: content,
    content_type: 'text',
    room_id: isDM ? null : currentRoom,
    receiver_id: isDM ? dmTarget : null,
    reply_to: replyingTo?.id||null,
    reply_preview: replyingTo?.content?.substring(0,50)||null,
    reactions: '{}',
    created_at: new Date().toISOString()
  };

  el.innerHTML = '';
  cancelReply();
  stopTyping();

  await sb.from('messages').insert(payload);
}

async function toggleReaction(msgId,emoji){
  const {data:msg} = await sb.from('messages').select('reactions').eq('id',msgId).single();
  const reacts = msg?.reactions ? JSON.parse(typeof msg.reactions==='string'?msg.reactions:'{}') : {};
  if (!reacts[emoji]) reacts[emoji]=[];
  const idx=reacts[emoji].indexOf(me.id);
  if(idx>-1) reacts[emoji].splice(idx,1); else reacts[emoji].push(me.id);
  if(!reacts[emoji].length) delete reacts[emoji];
  await sb.from('messages').update({reactions:JSON.stringify(reacts)}).eq('id',msgId);
  // re-render reactions
  const row=document.getElementById('msg-'+msgId);
  if(!row) return;
  let reactionEl=row.querySelector('.bubble-reactions');
  if(!reactionEl){reactionEl=document.createElement('div');reactionEl.className='bubble-reactions';row.querySelector('.bubble').after(reactionEl);}
  reactionEl.innerHTML=Object.entries(reacts).map(([em,users])=>`<div class="reaction-chip ${users.includes(me.id)?'mine':''}" onclick="toggleReaction('${msgId}','${em}')">${em}<span class="reaction-count">${users.length}</span></div>`).join('');
}

async function toggleVoice(){
  const btn=document.getElementById('voiceBtn');
  if(!isRecording){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRec=new MediaRecorder(stream);
      const chunks=[];
      mediaRec.ondataavailable=e=>chunks.push(e.data);
      mediaRec.onstop=async()=>{
        const blob=new Blob(chunks,{type:'audio/webm'});
        const path=`voice/${me.id}_${Date.now()}.webm`;
        const {data:upData}=await sb.storage.from('gallery').upload(path,blob);
        if(upData){
          const {data:urlData}=sb.storage.from('gallery').getPublicUrl(path);
          await sb.from('messages').insert({sender_id:me.id,content:urlData.publicUrl,content_type:'voice',room_id:isDM?null:currentRoom,receiver_id:isDM?dmTarget:null,reactions:'{}',created_at:new Date().toISOString()});
        }
        stream.getTracks().forEach(t=>t.stop());
      };
      mediaRec.start();
      isRecording=true;
      btn.textContent='⏹️';
      btn.classList.add('recording');
      showToast('🎙️','ჩაწერა დაიწყო…');
    }catch(e){showToast('❌','მიკროფონი მიუწვდომელია');}
  } else {
    mediaRec?.stop();
    isRecording=false;
    btn.textContent='🎙️';
    btn.classList.remove('recording');
  }
}

function playVoice(url){
  new Audio(url).play();
}

  const isAdmin=myProfile.role==='admin'||myProfile.role==='founder';
  document.querySelectorAll('.admin-action').forEach(el=>el.style.display=isAdmin?'flex':'none');
  document.getElementById('userProfilePanel').classList.add('open');
}
function closeProfilePanel(){ document.getElementById('userProfilePanel').classList.remove('open'); }

async function grantAdmin(){
  await sb.from('profiles').update({role:'admin'}).eq('id',currentPPUser);
  if(cachedProfiles[currentPPUser]) cachedProfiles[currentPPUser].role='admin';
  showToast('⭐','ადმინი მინიჭდა!'); closeProfilePanel();
}
async function grantFounder(){
  await sb.from('profiles').update({role:'founder'}).eq('id',currentPPUser);
  if(cachedProfiles[currentPPUser]) cachedProfiles[currentPPUser].role='founder';
  showToast('👑','დამფუძვნებელი მინიჭდა!'); closeProfilePanel();
}
async function removeRole(){
  await sb.from('profiles').update({role:'member'}).eq('id',currentPPUser);
  if(cachedProfiles[currentPPUser]) cachedProfiles[currentPPUser].role='member';
  showToast('🔓','როლი ჩაიხსნა!'); closeProfilePanel();
}
async function blockUser(){
  showToast('🚫',currentPPName+' დაიბლოკა'); closeProfilePanel();
}
function addFriendDirect(){ addFriend(currentPPUser); }

// ════════════════════════════════════
//  PROFILE / SETTINGS
// ════════════════════════════════════
async function saveProfile(){
  await sb.from('profiles').update({
    status_emoji: myProfile.status_emoji,
    theme: myProfile.theme,
    accent_color: myProfile.accent_color
  }).eq('id',me.id);
  document.getElementById('myStatusEl').textContent=(myProfile.status_emoji||'😊')+' ონლაინ';
  showToast('✅','პარამეტრები შენახულია!');
  closeModal('profileModal');
}

function setStatus(emoji){
  myProfile.status_emoji=emoji;
  document.querySelectorAll('.status-opt').forEach(el=>{el.classList.toggle('selected',el.textContent===emoji);});
}

function setAccent(color){
  myProfile.accent_color=color;
  applyAccent(color);
  document.querySelectorAll('.swatch').forEach(el=>{el.classList.toggle('selected',el.style.background===color);});
}

function applyAccent(color){
  document.documentElement.style.setProperty('--accent',color);
  document.documentElement.style.setProperty('--violet',color);
}

function toggleTheme(){
  const isDark=document.body.dataset.theme!=='light';
  myProfile.theme=isDark?'light':'dark';
  applyTheme(myProfile.theme);
  const thumb=document.querySelector('.toggle-thumb');
  thumb.textContent=isDark?'☀️':'🌙';
}

function applyTheme(t){
  document.body.dataset.theme=t;
}

async function changeAvatar(e){
  const file=e.target.files[0]; if(!file) return;
  const path=`avatars/${me.id}_${Date.now()}`;
  const {data:upData}=await sb.storage.from('gallery').upload(path,file,{upsert:true});
  if(upData){
    const {data:urlData}=sb.storage.from('gallery').getPublicUrl(path);
    const url=urlData.publicUrl;
    await sb.from('profiles').update({avatar_url:url}).eq('id',me.id);
    myProfile.avatar_url=url;
    document.getElementById('modalAvatar').innerHTML=`<img src="${url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    document.getElementById('myAvatarEl').innerHTML=`<img src="${url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    showToast('🖼️','ავატარი განახლდა!');
  }
}

// ════════════════════════════════════
//  PHOTO
// ════════════════════════════════════
let photoFile=null;
function previewPhoto(e){
  photoFile=e.target.files[0];
  if(!photoFile) return;
  const url=URL.createObjectURL(photoFile);
  document.getElementById('photoPreview').innerHTML=`<img src="${url}" style="max-height:160px;border-radius:10px">`;
}

async function sendPhoto(){
  if(!photoFile) return;
  const path=`photos/${me.id}_${Date.now()}_${photoFile.name}`;
  const {data:upData}=await sb.storage.from('gallery').upload(path,photoFile);
  if(upData){
    const {data:urlData}=sb.storage.from('gallery').getPublicUrl(path);
    await sb.from('messages').insert({sender_id:me.id,content:urlData.publicUrl,content_type:'image',room_id:isDM?null:currentRoom,receiver_id:isDM?dmTarget:null,reactions:'{}',created_at:new Date().toISOString()});
    await sb.from('gallery').insert({user_id:me.id,url:urlData.publicUrl,room_id:currentRoom,created_at:new Date().toISOString()});
    showToast('📸','ფოტო გაიგზავნა!');
  }
  closeModal('photoModal');
  photoFile=null;
  document.getElementById('photoPreview').innerHTML='';
}

async function toggleGallery(){
  const tab=document.getElementById('ptab-gallery');
  const {data}=await sb.from('gallery').select('*').order('created_at',{ascending:false}).limit(20);
  tab.innerHTML='<div class="gallery-grid">'+(data||[]).map(g=>`
    <div class="gallery-img">
      <img src="${g.url}" loading="lazy">
      <div class="img-overlay"><span onclick="viewImage('${g.url}')" style="cursor:pointer">🔍</span></div>
    </div>`).join('')+'</div>';
  switchPTab('gallery',document.querySelectorAll('.ptab')[2]);
}

function viewImage(url){ window.open(url,'_blank'); }

// ════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════
function scrollToBottom(){ const el=document.getElementById('messages'); el.scrollTop=el.scrollHeight; }

function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

function switchPTab(name,btn){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  btn?.classList.add('active');
  ['members','friends','gallery'].forEach(t=>{
    document.getElementById('ptab-'+t).style.display=t===name?'block':'none';
  });
}

function toggleRightPanel(){
  const rp=document.getElementById('rightPanel');
  rp.style.display=rp.style.display==='none'?'flex':'none';
}

function showToast(icon,text,dur=4000){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<span class="toast-icon">${icon}</span><span>${text}</span>`;
  c.appendChild(t);
  setTimeout(()=>t.remove(),dur);
}

async function logout(){
  await sb.auth.signOut();
  window.location.href='index.html';
}

// ════════════════════════════════════
//  FLOATING HEARTS & FLOWERS
// ════════════════════════════════════
const FLOATERS=['❤️','🌸','💜','✨','🌺','💫','🌷','💕','⭐','🌼','🎀','🦋'];
function spawnFloaters(){
  const cont=document.getElementById('floaters');
  function spawn(){
    const el=document.createElement('div');
    el.className='floater';
    el.textContent=FLOATERS[Math.floor(Math.random()*FLOATERS.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.fontSize=(0.8+Math.random()*1)+'rem';
    const dur=8+Math.random()*14;
    el.style.animationDuration=dur+'s';
    el.style.animationDelay=Math.random()*6+'s';
    el.style.opacity='0.6';
    cont.appendChild(el);
    setTimeout(()=>el.remove(),(dur+6)*1000);
  }
  for(let i=0;i<16;i++) setTimeout(spawn,i*500);
  setInterval(spawn,2200);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(ov=>{
  ov.addEventListener('click',e=>{if(e.target===ov) ov.classList.remove('show');});
});
</script>
