<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔥 კაიფმანია - პრემიუმ ჩატი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#1c1a30;--panel:#252240;--panel2:#2e2a50;--border:rgba(160,80,255,0.35);
  --text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;--input-bg:#221f3a;
  --online:#4ade80;--indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.18);
  --accent:#f07aff;--typing:#a78bfa;--read:#34d399;--shadow:rgba(0,0,0,0.4);
  --success:#10b981;--danger:#ef4444;
}
body.light-mode{
  --bg:#f0ebff;--panel:#ffffff;--panel2:#f5f0ff;--border:rgba(120,30,200,0.2);
  --text:#1c1a30;--text2:#6b2fa0;--text3:#9a7abc;--bubble:#f0ebff;--input-bg:#ffffff;
}

body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;transition:all .3s}

/* ANIMATIONS */
@keyframes msgPop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes heartFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-100px) scale(0);opacity:0}}
@keyframes blink{0%,100%{opacity:0.2}50%{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%{box-shadow:0 0 0px var(--indigo)}100%{box-shadow:0 0 20px var(--indigo2)}}

.msg-row{animation:msgPop 0.22s ease}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--indigo2);color:#fff;padding:10px 24px;border-radius:40px;z-index:99999;font-size:14px;animation:slideUp 0.2s ease;box-shadow:0 4px 12px black;z-index:999999}
.hidden{display:none!important}

/* FLOATING HEARTS */
.floating-heart{position:fixed;pointer-events:none;z-index:99998;font-size:28px;animation:heartFloat 2.2s ease-out forwards}

/* NAVBAR */
#topnav{display:flex;align-items:center;gap:4px;background:var(--panel);border-bottom:2px solid var(--border);padding:8px 16px;flex-shrink:0;overflow-x:auto}
.nav-logo{font-size:26px;cursor:pointer;background:linear-gradient(135deg,var(--indigo),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.nav-btn{height:38px;border-radius:12px;background:transparent;border:1px solid transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;padding:0 14px;font-family:inherit;font-size:13px;font-weight:500;transition:all .2s}
.nav-btn.active,.nav-btn:hover{background:var(--indigo-f);border-color:var(--border);color:var(--text)}
.nav-spacer{flex:1}
#themeToggle{font-size:20px;cursor:pointer;padding:6px 12px;border-radius:12px;background:var(--indigo-f);border:1px solid var(--border)}
.dm-nav-btn{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;border:none}

/* LAYOUT */
#app{display:flex;flex:1;min-height:0}
#sidebar{width:300px;background:var(--panel);border-right:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:all .3s}
@media(max-width:680px){#sidebar{position:fixed;left:-300px;top:0;height:100%;z-index:200;transition:left .3s;box-shadow:4px 0 20px black}#sidebar.open{left:0}}
.sb-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.sb-body{flex:1;overflow-y:auto;padding:12px}
.mobile-menu-btn{display:none;position:fixed;bottom:20px;left:20px;width:50px;height:50px;border-radius:50%;background:var(--indigo);color:#fff;border:none;font-size:24px;z-index:150;box-shadow:0 4px 12px black;cursor:pointer}
@media(max-width:680px){.mobile-menu-btn{display:flex;align-items:center;justify-content:center}}

/* ROOMS */
.room-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:16px;cursor:pointer;margin-bottom:6px;border:1px solid transparent;border-left:4px solid transparent;transition:all .2s;background:var(--panel2)}
.room-item.active{background:var(--indigo);border-left-color:var(--accent);color:#fff}
.room-item:hover{background:var(--indigo-f);transform:translateX(5px)}
.room-icon{width:42px;height:42px;border-radius:50%;background:var(--indigo-f);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.room-name{flex:1;font-weight:500}
.room-delete{background:#ef444430;border:none;border-radius:20px;padding:4px 10px;color:var(--danger);cursor:pointer;font-size:12px}
.room-delete:hover{background:#ef4444;color:#fff}

.user-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:16px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:all .2s}
.user-item:hover{background:var(--indigo-f);border-color:var(--border)}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--indigo-f);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.online-dot{width:12px;height:12px;background:var(--online);border-radius:50%;border:2px solid var(--panel);position:absolute;bottom:0;right:0;animation:pulse 2s infinite}
.online-dot.offline{background:#6b7280;animation:none}

/* MAIN CHAT */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{height:60px;background:var(--panel);border-bottom:2px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.chat-title{font-weight:800;font-size:18px}
.chat-sub{font-size:12px;background:var(--indigo-f);padding:4px 14px;border-radius:30px;margin-left:auto;color:var(--online);font-weight:600;display:flex;align-items:center;gap:6px}

#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;align-items:flex-start;gap:10px}
.msg-content{max-width:70%;display:flex;flex-direction:column}
.msg-bubble{background:var(--bubble);border-radius:8px 20px 20px 20px;padding:10px 16px;font-size:14px;word-break:break-word;line-height:1.5}
.msg-bubble.mine{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;border-radius:20px 8px 20px 20px}
.msg-meta{display:flex;gap:8px;margin-bottom:6px;font-size:10px;align-items:center;flex-wrap:wrap}
.msg-nick{font-weight:700;color:var(--indigo2);cursor:pointer}
.msg-time{font-size:9px;color:var(--text3)}
.msg-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;margin-left:6px;opacity:0}
.msg-row:hover .msg-del{opacity:1}
.reply-badge{font-size:10px;color:var(--accent);margin-bottom:4px;cursor:pointer}
.message-reactions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.reaction-badge{background:var(--panel2);border-radius:30px;padding:2px 8px;font-size:11px;cursor:pointer}
.reaction-picker{position:fixed;background:var(--panel);border:1px solid var(--border);border-radius:30px;padding:8px;display:flex;gap:6px;z-index:10000;box-shadow:0 8px 20px black}

/* VOICE */
.msg-audio{display:flex;align-items:center;gap:10px;background:var(--panel2);border-radius:30px;padding:8px 16px}
.audio-play{background:var(--indigo);border:none;border-radius:50%;width:34px;height:34px;color:#fff;cursor:pointer}
.audio-wave{display:flex;gap:3px;align-items:center}
.audio-wave span{width:3px;background:var(--indigo2);border-radius:2px;animation:blink 1s infinite}

/* TYPING */
.typing-indicator{font-size:12px;color:var(--typing);padding:4px 12px;font-style:italic;min-height:22px}

/* RICH TEXT & CHAT BAR */
.rich-toolbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;background:var(--panel2);padding:8px 14px;border-radius:30px}
.rich-btn{background:transparent;border:none;padding:6px 12px;border-radius:16px;cursor:pointer;font-size:14px;color:var(--text2)}
.rich-btn:hover{background:var(--indigo-f);color:var(--text)}
.color-picker{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);cursor:pointer}
.reply-preview{background:var(--indigo-f);padding:8px 14px;border-radius:16px;margin-bottom:8px;font-size:12px;display:flex;align-items:center;gap:10px;border-left:4px solid var(--indigo2)}
.cancel-reply{margin-left:auto;cursor:pointer}
.chat-bar{background:var(--panel);border-top:2px solid var(--border);padding:12px 16px}
.input-row{display:flex;gap:10px;align-items:flex-end}
#msgInput{flex:1;background:var(--input-bg);border:2px solid var(--border);border-radius:30px;padding:12px 18px;color:var(--text);outline:none;resize:none;max-height:100px;font-family:inherit;font-size:14px}
#msgInput:focus{border-color:var(--indigo2);animation:glow 0.5s}
.send-btn,.mic-btn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;color:#fff;cursor:pointer;font-size:20px;transition:transform .2s}
.send-btn:hover,.mic-btn:hover{transform:scale(1.08)}
.mic-btn{background:var(--panel2);border:2px solid var(--border);color:var(--text2)}
.mic-btn.recording{background:var(--danger);animation:pulse 1s infinite}
.voice-preview{display:flex;align-items:center;gap:10px;background:var(--indigo-f);border-radius:30px;padding:6px 16px;margin-top:8px;font-size:12px}

/* EMOJI BOARD */
.emoji-board{display:none;background:var(--panel);border:2px solid var(--border);border-radius:20px;padding:12px;margin-top:8px;max-height:180px;overflow-y:auto}
.emoji-board.open{display:block;animation:slideUp .2s ease}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px}
.emoji-btn{font-size:30px;cursor:pointer;border-radius:12px;padding:6px;border:1px solid transparent;background:var(--panel2)}
.emoji-btn:hover{background:var(--indigo);transform:scale(1.15)}
.emoji-upload-btn{font-size:12px;padding:6px 14px;border-radius:20px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text);cursor:pointer}
.emoji-wrapper{position:relative;display:inline-block}
.emoji-del{font-size:10px;position:absolute;top:-6px;right:-6px;background:var(--danger);border-radius:50%;width:18px;height:18px;display:none;align-items:center;justify-content:center;color:#fff;cursor:pointer}
.emoji-wrapper:hover .emoji-del{display:flex}

/* DM PANEL */
.dm-box{position:fixed;right:20px;bottom:100px;width:400px;height:600px;background:var(--panel);border-radius:28px;border:2px solid var(--border);display:none;flex-direction:column;z-index:1500;box-shadow:0 20px 40px black;animation:slideUp .25s ease}
.dm-box.open{display:flex}
.dm-header{padding:14px 18px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border-radius:26px 26px 0 0;display:flex;align-items:center;gap:12px}
.dm-title{flex:1;font-weight:700;color:#fff}
.dm-close{background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:18px;cursor:pointer;width:32px;height:32px;border-radius:50%}
.dm-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.dm-msg-wrap{display:flex;flex-direction:column}
.dm-msg-wrap.mine{align-items:flex-end}
.dm-msg{max-width:80%;padding:10px 16px;border-radius:20px;font-size:13px}
.dm-msg.mine{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff;border-radius:20px 4px 20px 20px}
.dm-msg.theirs{background:var(--bubble);border-radius:4px 20px 20px 20px}
.dm-meta{display:flex;gap:6px;margin-top:4px}
.dm-time{font-size:9px;color:var(--text3)}
.dm-read{font-size:11px;color:var(--read)}
.dm-read.pending{color:var(--text3)}
.dm-typing{font-size:11px;color:var(--typing);padding:4px 16px;min-height:22px}
.dm-bar{display:flex;gap:10px;padding:12px;border-top:1px solid var(--border)}
#dmInput{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:24px;padding:10px 16px;color:var(--text);outline:none;resize:none}
.dm-mic-btn,.dm-send-btn{width:40px;height:40px;border-radius:50%;background:var(--panel2);border:1px solid var(--border);color:var(--text2);cursor:pointer}
.dm-send-btn{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:20000;display:none;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-card{background:var(--panel);border-radius:32px;width:95%;max-width:500px;max-height:80vh;overflow-y:auto;padding:24px;border:2px solid var(--border)}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.profile-avatar-large{width:80px;height:80px;border-radius:50%;background:var(--indigo-f);display:flex;align-items:center;justify-content:center;font-size:44px}
.status-selector{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
.status-emoji-btn{font-size:32px;cursor:pointer;background:var(--panel2);border:none;border-radius:50%;width:55px;height:55px}
.status-emoji-btn:hover{transform:scale(1.1);background:var(--indigo)}
.profile-daily{background:var(--indigo-f);border-radius:20px;padding:14px;margin:16px 0}
.profile-daily textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:16px;padding:12px;color:var(--text);font-family:inherit;resize:vertical}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(100px,1fr));gap:10px;margin-top:12px}
.photo-card{background:var(--panel2);border-radius:12px;overflow:hidden;cursor:pointer}
.photo-card img{width:100%;height:100px;object-fit:cover}
.user-action-btn{width:100%;padding:12px;margin:6px 0;border-radius:20px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text);cursor:pointer;text-align:left}
.user-action-btn:hover{background:var(--indigo);color:#fff}
.user-action-btn.danger{border-color:rgba(239,68,68,0.5);color:var(--danger)}
</style>
</head>
<body>

<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

<div id="topnav">
  <div class="nav-logo" onclick="document.getElementById('sidebar').classList.toggle('open')">🔥 KAIFMANIA</div>
  <button class="nav-btn active" id="navRooms" onclick="showPanel('rooms')">💬 ოთახები</button>
  <button class="nav-btn" id="navUsers" onclick="showPanel('users')">🌐 მომხმარებლები</button>
  <button class="nav-btn" id="navFriends" onclick="showPanel('friends')">👥 მეგობრები</button>
  <div class="nav-spacer"></div>
  <button class="nav-btn dm-nav-btn" onclick="openDMList()">✉️ DM</button>
  <button id="themeToggle" onclick="toggleTheme()">🌙</button>
  <button class="nav-btn" onclick="toggleEmojiBoard()">😊</button>
  <button class="nav-btn" onclick="openMyProfile()">👤</button>
</div>

<div id="app">
  <div id="sidebar">
    <div id="panelRooms">
      <div class="sb-header">📌 ოთახები</div>
      <div class="sb-body" id="roomList"></div>
    </div>
    <div id="panelUsers" class="hidden">
      <div class="sb-header">👥 მომხმარებლები</div>
      <div class="sb-body">
        <input class="nav-btn" id="userSearch" placeholder="🔍 ძებნა..." oninput="filterUsers()" style="width:100%;margin-bottom:10px;padding:10px 16px;border-radius:30px;background:var(--input-bg);border:1px solid var(--border)">
        <div id="usersList"></div>
      </div>
    </div>
    <div id="panelFriends" class="hidden">
      <div class="sb-header">👥 მეგობრები</div>
      <div class="sb-body" id="friendsList"></div>
    </div>
  </div>

  <div id="main">
    <div class="chat-header">
      <div id="roomIcon" style="font-size:26px">🏠</div>
      <div class="chat-title" id="roomTitle">ოთახი 1</div>
      <div class="chat-sub" id="onlineCnt"><span>●</span> 0 ონლაინი</div>
    </div>
    <div id="messages"></div>
    <div class="chat-bar">
      <div id="voicePreviewBar" class="voice-preview hidden">🎤 ხმა მზადაა → <button onclick="cancelVoice()" style="background:none;border:none;color:var(--text3);cursor:pointer">✕</button></div>
      <div class="rich-toolbar">
        <button class="rich-btn" onclick="formatText('bold')"><b>B</b></button>
        <button class="rich-btn" onclick="formatText('italic')"><i>I</i></button>
        <button class="rich-btn" onclick="formatText('underline')"><u>U</u></button>
        <input type="color" id="textColorPicker" class="color-picker" onchange="formatText('color', this.value)">
        <button class="rich-btn" onclick="clearRichFormat()">✕</button>
      </div>
      <div id="replyPreview" class="reply-preview hidden">
        <span>💬 პასუხი: <span id="replyPreviewText"></span></span>
        <button class="cancel-reply" onclick="cancelReply()">✕</button>
      </div>
      <div class="input-row">
        <textarea id="msgInput" placeholder="შეტყობინება..." rows="1" oninput="autoResize(this)" onkeydown="handleMsgKey(event)"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleVoiceRecord(false)">🎙️</button>
        <button class="send-btn" onclick="sendMessage()">✈️</button>
      </div>
      <div id="typingStatus" class="typing-indicator"></div>
      
      <!-- EMOJI BOARD -->
      <div id="emojiBoard" class="emoji-board">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
          <span style="font-weight:bold">📦 სმაილები</span>
          <div id="emojiAdminControls" style="display:none">
            <input type="file" id="emojiFileInput" accept="image/gif,image/webp,image/png" style="display:none" onchange="uploadEmoji(this)">
            <button class="emoji-upload-btn" onclick="document.getElementById('emojiFileInput').click()">➕ ატვირთვა</button>
          </div>
        </div>
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- DM PANEL -->
<div id="dmBox" class="dm-box">
  <div class="dm-header">
    <div class="avatar" id="dmAvatar" style="width:36px;height:36px">👤</div>
    <div><div class="dm-title" id="dmTitle">პირადი</div><div class="dm-status-line" id="dmStatusLine" style="font-size:10px;color:rgba(255,255,255,0.7)"></div></div>
    <button class="dm-close" onclick="closeDM()">✕</button>
  </div>
  <div id="dmMsgs" class="dm-msgs"></div>
  <div id="dmTyping" class="dm-typing"></div>
  <div class="dm-bar">
    <textarea id="dmInput" placeholder="შეტყობინება..." rows="1" oninput="autoResize(this)" onkeydown="handleDmKey(event)"></textarea>
    <button class="dm-mic-btn" id="dmMicBtn" onclick="toggleVoiceRecord(true)">🎙️</button>
    <button class="dm-send-btn" onclick="sendDM()">✈️</button>
  </div>
</div>

<!-- DM LIST MODAL -->
<div id="dmListModal" class="modal">
  <div class="modal-card">
    <h3>✉️ პირადი მიმოწერა</h3>
    <div id="dmListContent"></div>
    <button class="user-action-btn" onclick="closeDmList()" style="margin-top:12px">✕ დახურვა</button>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="userModal" class="modal">
  <div class="modal-card">
    <div class="profile-header">
      <div class="profile-avatar-large" id="modalAvatar">😊</div>
      <div><h3 id="modalUserName"></h3><div id="modalUserRole" style="font-size:12px;color:var(--text2)"></div><div id="modalUserStatus" style="font-size:11px;color:var(--online)"></div></div>
    </div>
    
    <div><strong>😊 ემოცია</strong></div>
    <div class="status-selector" id="statusEmojiSelector"></div>
    
    <div style="margin-top:12px"><strong>📝 სტატუსი</strong></div>
    <input type="text" id="profileStatusText" class="user-action-btn" style="width:100%;padding:10px;border-radius:20px;margin:8px 0" placeholder="რას ფიქრობ?">
    
    <div class="profile-daily">
      <strong>📔 დღიური</strong>
      <textarea id="profileDailyEntry" rows="3" placeholder="დაწერე დღის ფიქრები..."></textarea>
      <button class="emoji-upload-btn" onclick="saveDailyEntry()" style="margin-top:8px">💾 შენახვა</button>
    </div>
    
    <div><strong>🖼️ ფოტო ალბომი</strong></div>
    <button class="emoji-upload-btn" onclick="uploadPhoto()" style="margin:8px 0">➕ ატვირთვა</button>
    <div id="photoAlbumGrid" class="photo-grid"></div>
    
    <div id="modalActions" style="margin-top:16px"></div>
    <button class="user-action-btn" onclick="closeModal()" style="margin-top:8px">✕ დახურვა</button>
  </div>

// ========== RICH TEXT ==========
function formatText(type, value){
  const input = document.getElementById('msgInput');
  const start = input.selectionStart, end = input.selectionEnd;
  const selected = input.value.substring(start, end);
  let prefix='', suffix='';
  if(type==='bold'){ prefix='**'; suffix='**'; }
  else if(type==='italic'){ prefix='_'; suffix='_'; }
  else if(type==='underline'){ prefix='__'; suffix='__'; }
  else if(type==='color' && value){ prefix=`<color="${value}">`; suffix='</color>'; }
  if(!selected && type!=='color') return;
  const newText = input.value.substring(0,start) + prefix + selected + suffix + input.value.substring(end);
  input.value = newText;
  input.focus();
}
function clearRichFormat(){
  const input = document.getElementById('msgInput');
  input.value = input.value.replace(/\*\*/g,'').replace(/_/g,'').replace(/__/g,'').replace(/<color=".*?">/g,'').replace(/<\/color>/g,'');
}

async function toggleVoiceRecord(isDM=false){
  const btnId = isDM ? 'dmMicBtn' : 'micBtn';
  const btn = document.getElementById(btnId);
  if(isRecording){
    mediaRecorder?.stop(); isRecording = false;
    btn?.classList.remove('recording'); return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    mediaRecorder = new MediaRecorder(stream); audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type:'audio/webm' });
      if(isDM){ currentDMVoiceBlob = blob; toast('🎤 ხმა მზადაა'); }
      else { currentVoiceBlob = blob; document.getElementById('voicePreviewBar')?.classList.remove('hidden'); }
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start(); isRecording = true;
    btn?.classList.add('recording');
    setTimeout(()=>{ if(mediaRecorder?.state === 'recording'){ mediaRecorder.stop(); }}, 60000);
  } catch(err){ toast('🎙️ მიკროფონი საჭიროა'); }
}

async function loadEmojiBoard(){
  const { data } = await sb.from('custom_emojis').select('*').order('created_at');
  customEmojis = data||[];
  const grid = document.getElementById('emojiGrid'); if(!grid) return;
  grid.innerHTML = customEmojis.map(em => `<div class="emoji-wrapper"><button class="emoji-btn" onclick="insertEmoji(':${em.name}:')"><img src="${em.url}" style="height:32px"></button>${canManage()?`<div class="emoji-del" onclick="deleteEmoji(${em.id})">✕</div>`:''}</div>`).join('');
  ['😊','😂','❤️','🔥','👍','😍','🎉','💜','✨'].forEach(e => { const btn = document.createElement('button'); btn.className='emoji-btn'; btn.textContent=e; btn.onclick=()=>insertEmoji(e); grid.appendChild(btn); });
  const ctrl = document.getElementById('emojiAdminControls');
  if(ctrl) ctrl.style.display = canManage() ? 'flex' : 'none';
}
function toggleEmojiBoard(){ document.getElementById('emojiBoard')?.classList.toggle('open'); if(document.getElementById('emojiBoard')?.classList.contains('open')) loadEmojiBoard(); }
function insertEmoji(code){
  const inp = document.getElementById('msgInput');
  const pos = inp.selectionStart;
  inp.value = inp.value.slice(0,pos) + code + inp.value.slice(pos);
  inp.focus();
}
async function uploadEmoji(input){
  const file = input.files[0]; if(!file) return;
  const name = prompt('სახელი (ლათინურად):'); if(!name) return;
  const fn = `emoji_${Date.now()}_${file.name}`;
  const { error } = await sb.storage.from('emojis').upload(fn, file);
  if(error){ toast('❌ შეცდომა'); return; }
  const url = sb.storage.from('emojis').getPublicUrl(fn).data.publicUrl;
  await sb.from('custom_emojis').insert({ name, url, uploaded_by: ME.id });
  toast(`✅ :${name}: დაემატა`);
  loadEmojiBoard(); input.value='';
}
async function deleteEmoji(id){ if(confirm('წაშლა?')){ await sb.from('custom_emojis').delete().eq('id', id); loadEmojiBoard(); toast('🗑 წაიშალა'); } }

// ========== FULL PROFILE ==========
async function openFullProfile(userId){
  currentViewingProfile = userId;
  const user = allUsers.find(u=>u.id===userId);
  if(!user) return;
  document.getElementById('modalUserName').textContent = user.username;
  document.getElementById('modalUserRole').innerHTML = `📌 ${user.role || 'member'}`;
  document.getElementById('modalUserStatus').innerHTML = isOnline(user.last_seen) ? '🟢 ონლაინი' : '⚫ ოფლაინი';
  document.getElementById('modalAvatar').innerHTML = user.avatar_url ? `<img src="${user.avatar_url}" style="width:80px;height:80px;border-radius:50%">` : (user.status_emoji || '😊');
  
  const statusEmojis = ['😊','😂','❤️','🔥','👍','😍','🎉','💜','✨','😎','🤔','😭'];
  const emojiSelector = document.getElementById('statusEmojiSelector');
  emojiSelector.innerHTML = statusEmojis.map(e => `<button class="status-emoji-btn" onclick="updateStatusEmoji('${e}')">${e}</button>`).join('');
  
  const statusInput = document.getElementById('profileStatusText');
  statusInput.value = user.status_text || '';
  statusInput.onchange = () => updateStatusText(statusInput.value);
  
  const dailyTextarea = document.getElementById('profileDailyEntry');
  dailyTextarea.value = user.daily_entry || '';
  
  await loadUserPhotos(userId);
  
  const actions = document.getElementById('modalActions'); actions.innerHTML = '';
  if(userId !== ME.id){
    addActionBtn(actions, '✉️ პირადი შეტყობინება', () => { closeModal(); openDM(userId, user.username); });
    const isFriend = myFriends.some(f=>f.id===userId);
    if(!isFriend) addActionBtn(actions, '➕ მეგობრად დამატება', () => { sendFriendRequest(userId); closeModal(); });
    else addActionBtn(actions, '❌ მეგობრიდან წაშლა', () => { removeFriend(userId); closeModal(); });
  }
  if(canManage() && userId !== ME.id){
    const sel = document.createElement('select'); sel.className = 'user-action-btn';
    sel.innerHTML = `<option value="">📋 როლის შეცვლა...</option><option value="admin">👑 ადმინი</option><option value="founder">⭐ დამფუძნებელი</option><option value="member">👤 წევრი</option>`;
    sel.onchange = async(e) => { if(e.target.value){ await sb.from('profiles').update({ role:e.target.value }).eq('id', userId); toast(`✅ როლის შეცვლა: ${e.target.value}`); loadUsers(); closeModal(); } };
    actions.appendChild(sel);
  }
  document.getElementById('userModal').classList.add('open');
}
async function updateStatusEmoji(emoji){
  await sb.from('profiles').update({ status_emoji: emoji }).eq('id', currentViewingProfile === ME.id ? ME.id : currentViewingProfile);
  loadUsers();
  if(currentViewingProfile === ME.id) toast('✅ ემოცია განახლდა');
}
async function updateStatusText(text){
  await sb.from('profiles').update({ status_text: text }).eq('id', currentViewingProfile === ME.id ? ME.id : currentViewingProfile);
  loadUsers();
  if(currentViewingProfile === ME.id) toast('✅ სტატუსი განახლდა');
}
async function saveDailyEntry(){
  const entry = document.getElementById('profileDailyEntry').value;
  await sb.from('profiles').update({ daily_entry: entry, daily_entry_date: new Date().toISOString().split('T')[0] }).eq('id', currentViewingProfile === ME.id ? ME.id : currentViewingProfile);
  toast('📔 დღიური შენახულია');
}
async function loadUserPhotos(userId){
  const { data } = await sb.from('photos').select('*').eq('user_id', userId).order('created_at', {ascending:false});
  const grid = document.getElementById('photoAlbumGrid');
  if(grid){
    grid.innerHTML = (data||[]).map(photo => `
      <div class="photo-card" onclick="window.open('${photo.image_url}','_blank')">
        <img src="${photo.image_url}" onerror="this.src='https://via.placeholder.com/100'">
      </div>
    `).join('');
  }
}
async function uploadPhoto(){
  const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    const fn = `photo_${ME.id}_${Date.now()}.jpg`;
    const { error } = await sb.storage.from('photos').upload(fn, file);
    if(error){ toast('❌ შეცდომა'); return; }
    const url = sb.storage.from('photos').getPublicUrl(fn).data.publicUrl;
    await sb.from('photos').insert({ user_id: ME.id, image_url: url });
    toast('✅ ფოტო ატვირთულია');
    if(currentViewingProfile === ME.id) loadUserPhotos(ME.id);
  };
  input.click();
}
function addActionBtn(parent, label, onclick){ const btn = document.createElement('button'); btn.className = 'user-action-btn'; btn.textContent = label; btn.onclick = onclick; parent.appendChild(btn); }
function closeModal(){ document.getElementById('userModal').classList.remove('open'); }
function openMyProfile(){ openFullProfile(ME.id); }

// ========== PANEL ==========
function showPanel(name){
  document.getElementById('panelRooms').classList.toggle('hidden', name !== 'rooms');
  document.getElementById('panelUsers').classList.toggle('hidden', name !== 'users');
  document.getElementById('panelFriends').classList.toggle('hidden', name !== 'friends');
  document.getElementById('navRooms').classList.toggle('active', name === 'rooms');
  document.getElementById('navUsers').classList.toggle('active', name === 'users');
  const fbtn = document.getElementById('navFriends');
  if(fbtn) fbtn.classList.toggle('active', name === 'friends');
  if(name === 'friends') loadFriends();
  if(window.innerWidth<680) document.getElementById('sidebar').classList.remove('open');
}

// ========== INIT ==========
async function init(){
  initTheme();
  
  // წამოიღე მომხმარებლის მონაცემები index.html-დან
  const loggedIn = await getCurrentUser();
  if(!loggedIn){
    // თუ არ არის შესული, გადაამისამართე index.html-ზე
    window.location.href = 'index.html';
    return;
  }
  
  await updateLastSeen();
  await loadRooms();
  await loadUsers();
  await loadFriends();
  await switchRoom(1);
  
  sb.channel('profiles_live').on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, () => { loadUsers(); loadFriends(); }).subscribe();
  setInterval(()=>{ loadUsers(); loadFriends(); }, 35000);
  
  toast(`👋 გამარჯობა, ${MY_USERNAME}!`);
}

window.onload = init;
</script>
