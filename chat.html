<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIFMANIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ზედა მენიუ */
        .header { background: #000; border-bottom: 2px solid #ff0000; padding: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 20px rgba(255, 0, 0, 0.6); z-index: 100; }
        .logo { color: #ff0000; font-weight: bold; font-size: 20px; letter-spacing: 2px; flex: 1; text-align: center; text-shadow: 0 0 10px #ff0000; }
        
        .menu-btn { background: #ff0000; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px #ff0000; }

        /* ჩამოსაშლელი ოთახები */
        .dropdown-menu { 
            position: absolute; top: -100%; left: 0; width: 100%; background: rgba(5, 0, 0, 0.98); 
            border-bottom: 3px solid #ff0000; transition: 0.5s ease; z-index: 99; padding: 20px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; box-sizing: border-box;
        }
        .dropdown-menu.open { top: 50px; }

        .room-item { background: #111; border: 1px solid #300; color: white; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .room-item:hover { border-color: #ff0000; background: #200; box-shadow: inset 0 0 10px #ff0000; }

        /* პროფილის ბლოკი მენიუში */
        .user-card { grid-column: span 2; display: flex; align-items: center; gap: 15px; background: #000; padding: 12px; border-radius: 12px; border: 1px solid #ff0000; margin-bottom: 10px; box-shadow: inset 0 0 10px #300; }
        .user-card img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ff0000; box-shadow: 0 0 10px #ff0000; }

        /* ჩატის ბუშტები */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .bubble { background: #0a0a0a; border-left: 4px solid #ff0000; padding: 12px; border-radius: 12px; box-shadow: 4px 4px 15px #000; max-width: 85%; }
        .b-nick { color: #ff0000; font-weight: bold; font-size: 14px; display: block; margin-bottom: 3px; }
        .b-text { color: #fff; font-size: 15px; line-height: 1.4; }

        /* ინპუტი და თვითმფრინავი */
        .footer { padding: 15px; background: #000; border-top: 2px solid #200; display: flex; gap: 10px; align-items: center; }
        .msg-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #0a0a0a; color: white; outline: none; font-size: 16px; }
        .msg-input:focus { border-color: #ff0000; }
        .plane-btn { background: #ff0000; color: #000; border: none; width: 55px; height: 50px; border-radius: 12px; font-size: 26px; cursor: pointer; box-shadow: 0 0 20px #ff0000; transition: 0.2s; }
        .plane-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" onclick="toggleMenu()">🚪 ოთახები 🔻</button>
    <div class="logo">KAIFMANIA</div>
    <div style="width: 80px;"></div>
</div>

<div id="dropMenu" class="dropdown-menu">
    <div class="user-card">
        <img id="my-ava" src="https://i.ibb.co/v3m6y6R/avatar.png">
        <div>
            <b id="my-nick" style="color: #ff0000; font-size: 18px;">...</b><br>
            <span id="my-role" style="color: gold; font-weight: bold;">დამფუძნებელი 👑</span>
        </div>
    </div>
    <div class="room-item">☕ კაფე-ბარი</div>
    <div class="room-item">💎 ვიპ საუბრები</div>
    <div class="room-item">🧛 მაფიის ღამე</div>
    <div class="room-item">🕵️ გამოძიება</div>
    <div class="room-item">🔐 შიფროგრამა</div>
    <div class="room-item">❓ ვიქტორინა</div>
    <div class="room-item">😵 ჩამოხრჩობანა</div>
    <div class="room-item">🃏 კარტი</div>
    <div class="room-item">🎰 კაზინო</div>
    <div class="room-item">⚔️ დუელი</div>
    <div class="room-item">🏰 ციხესიმაგრე</div>
    <div class="room-item">🎤 კარაოკე</div>
    <button onclick="localStorage.clear(); location.href='index.html'" style="grid-column: span 2; background: #200; border: 1px solid red; color: red; padding: 10px; border-radius: 8px; margin-top: 10px; cursor: pointer;">გასვლა 🚪</button>
</div>

<div id="chatArea" class="chat-area"></div>

<div class="footer">
    <input type="text" id="msgInp" placeholder="დაწერე რამე...">
    <button class="plane-btn" onclick="sendMsg()">✈️</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');

    function toggleMenu() {
        document.getElementById('dropMenu').classList.toggle('open');
    }

    async function loadChat() {
        if (!myNick) return;

        // საკუთარი მონაცემები
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            document.getElementById('my-nick').innerText = p.username;
            // თუ ბაზაში 'Owner' წერია, ქართულად ვაჩვენებთ
            document.getElementById('my-role').innerText = (p.role === 'Owner') ? "დამფუძნებელი 👑" : (p.role === 'Admin' ? "ადმინი 🛡️" : "მონაწილე ✨");
            if (p.avatar_url) document.getElementById('my-ava').src = p.avatar_url;
        }

        // მესიჯების ჩატვირთვა
        const { data: msgs } = await _s.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
        const box = document.getElementById('chatArea');
        box.innerHTML = '';
        if (msgs) {
            msgs.forEach(m => {
                const uName = m.username || "უცნობი";
                box.innerHTML += `<div class="bubble"><b class="b-nick">${uName}</b><span class="b-text">${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInp');
        const txt = inp.value.trim();
        if (!txt || !myNick) return;

        const { error } = await _s.from('messages').insert([{ username: myNick, text: txt }]);
        if (error) console.log(error);
        inp.value = '';
        loadChat();
    }

    _s.channel('rooms').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadChat).subscribe();

    window.onload = loadChat;
    document.getElementById('msgInp').onkeypress = (e) => { if(e.key === "Enter") sendMsg(); };
</script>

</body>
</html>
