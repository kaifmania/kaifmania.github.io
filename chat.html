<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: #000; height: 60px; display: flex; align-items: center; border-bottom: 2px solid red; padding: 0 15px; z-index: 1001; }
        .burger { font-size: 30px; color: red; cursor: pointer; padding: 10px; }
        .title { flex: 1; text-align: center; color: red; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px red; }

        .side-menu { 
            position: fixed; top: 0; left: -280px; width: 250px; height: 100vh;
            background: #0a0000; border-right: 2px solid red;
            transition: 0.3s ease; z-index: 2000; 
            display: flex; flex-direction: column; padding: 70px 15px 20px; overflow-y: auto;
        }
        .side-menu.active { left: 0; }
        .menu-item { padding: 12px; margin: 4px 0; background: #150000; border: 1px solid #333; border-radius: 8px; cursor: pointer; text-align: left; color: #ccc; font-size: 14px; }
        .menu-item:hover { background: red; color: white; }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: #050000; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #111; padding: 10px; border-radius: 8px; border-left: 3px solid red; align-self: flex-start; max-width: 85%; word-wrap: break-word; }
        .u { font-weight: bold; color: red; font-size: 12px; margin-bottom: 3px; }

        .input-zone { background: #000; padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; font-size: 16px; }
        .plane-btn { background: none; border: none; cursor: pointer; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
    <div class="burger" onclick="toggleMenu()">☰</div>
    <div class="title" id="room-title">☕️ კაფე-ბარი</div>
</div>

<div class="side-menu" id="sideMenu">
    <div class="menu-item" onclick="changeRoom('☕️ კაფე-ბარი')">☕️ კაფე-ბარი</div>
    <div class="menu-item" onclick="changeRoom('💎 VIP')">💎 VIP</div>
    <div class="menu-item" onclick="changeRoom('🔍 გამოძიება')">🔍 გამოძიება</div>
    <div class="menu-item" onclick="changeRoom('🔒 შიფროგრამა')">🔒 შიფროგრამა</div>
    <div class="menu-item" onclick="changeRoom('❓ ვიქტორინა')">❓ ვიქტორინა</div>
    <div class="menu-item" onclick="changeRoom('🔗 ჩამომხრჩობალა')">🔗 ჩამომხრჩობალა</div>
    <div class="menu-item" onclick="changeRoom('🕵️ მაფია')">🕵️ მაფია</div>
    <div class="menu-item" onclick="changeRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
    <div class="menu-item" onclick="changeRoom('🎲 ნარდი')">🎲 ნარდი</div>
    <div class="menu-item" onclick="changeRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
    <div class="menu-item" onclick="changeRoom('🛡️ ადმინი')">🛡️ ადმინი</div>
    <div class="menu-item" onclick="changeRoom('💬 ზოგადი')">💬 ზოგადი</div>
    <div class="menu-item" style="color:red; margin-top: 20px; border-color: red;" onclick="location.reload()">🚪 გასვლა</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
    <button class="plane-btn" onclick="send()">
        <svg viewBox="0 0 24 24" width="35" height="35">
            <path fill="white" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            <path fill="red" d="M12 12l-10 2 0-4 10-2z" opacity="0.6"/>
        </svg>
    </button>
</div>

<script>
    const _supabase = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_TdfzZOd_1s6B7rDNfhwn6Q_mU4ecdkn");
    let room = "☕️ კაფე-ბარი";
    let nick = localStorage.getItem('nickname') || "მარიამი";

    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function load() {
        const { data } = await _supabase
            .from('messages')
            .select('*')
            .eq('room_id', room) 
            .order('created_at', { ascending: true });

        const c = document.getElementById('chat');
        c.innerHTML = "";
        data?.forEach(m => { 
            c.innerHTML += `<div class="msg"><div class="u">${m.user_name}</div>${m.text}</div>`; 
        });
        c.scrollTop = c.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('msgInput');
        const val = i.value.trim();
        if (!val) return;
        i.value = "";

        const { error } = await _supabase
            .from('messages')
            .insert([{ user_name: nick, text: val, room_id: room }]);

        if(error) alert("შეცდომა: " + error.message);
        load();
    }

    function changeRoom(n) {
        room = n;
        document.getElementById('room-title').innerText = n;
        toggleMenu();
        load();
    }

    window.onload = () => {
        load();
        _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => load()).subscribe();
    };
</script>
</body>
</html>
