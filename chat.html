<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>KAIFMANIA 🔥</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ზედა ზოლი */
        header { 
            background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 4px solid #ff0000; box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4); z-index: 1000; position: relative;
        }
        
        .menu-btn { 
            background: #ff0000; color: white; border: none; padding: 12px 25px; 
            font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            box-shadow: 0 0 15px #ff0000;
        }

        .logo { font-size: 30px; color: #ff0000; text-shadow: 0 0 20px #ff0000; letter-spacing: 5px; }

        /* ჩამოსაშლელი მენიუ (ზემოდან ქვემოთ) */
        #dropMenu { 
            position: absolute; top: -100vh; left: 0; width: 100%; height: auto; 
            background: rgba(10, 0, 0, 0.95); border-bottom: 4px solid #ff0000; 
            transition: 0.5s ease-in-out; z-index: 999; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); padding: 20px; box-sizing: border-box;
        }
        #dropMenu.active { top: 84px; } /* ჩამოდის ჰედერის დაბლა */

        .room-link { 
            padding: 15px; color: #fff; text-align: center; border: 1px solid #300; 
            cursor: pointer; font-size: 18px; text-transform: uppercase; transition: 0.2s;
        }
        .room-link:hover { background: #ff0000; border-color: #fff; }

        /* ჩატის მხარე */
        #main-chat { flex: 1; display: flex; flex-direction: column; }
        #room-title { padding: 10px; background: #080808; color: #ff0000; text-align: center; font-size: 22px; border-bottom: 1px solid #222; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; font-size: 22px; }
        .msg { border-bottom: 1px solid #1a0000; padding-bottom: 10px; }
        .u-name { color: #ff0000; font-weight: bold; margin-right: 15px; }

        /* საწერი ველი */
        .input-area { background: #000; padding: 25px; display: flex; gap: 20px; border-top: 4px solid #ff0000; }
        input { flex: 1; background: #0a0a0a; border: 2px solid #ff0000; border-radius: 5px; padding: 20px; color: #fff; outline: none; font-size: 20px; }
        
        button#sendBtn { background: #ff0000; color: #fff; border: none; padding: 0 40px; cursor: pointer; font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn" onclick="toggleMenu()">🚪 ოთახები ▼</button>
    <div class="logo">KAIFMANIA</div>
    <div style="width: 100px;"></div>
</header>

<div id="dropMenu">
    <div class="room-link" onclick="changeRoom('კაფე-ბარი')">🍷 კაფე-ბარი</div>
    <div class="room-link" onclick="changeRoom('ვიპ საუბრები')">👑 ვიპ საუბრები</div>
    <div class="room-link" onclick="changeRoom('გამოძიება')">🔍 გამოძიება</div>
    <div class="room-link" onclick="changeRoom('შიფროგრამა')">📟 შიფროგრამა</div>
    <div class="room-link" onclick="changeRoom('ვიქტორინა')">❓ ვიქტორინა</div>
    <div class="room-link" onclick="changeRoom('ჩამოხრჩობანა')">💀 ჩამოხრჩობანა</div>
    <div class="room-link" onclick="changeRoom('მაფიის ღამე')">🌑 მაფიის ღამე</div>
    <div class="room-link" onclick="changeRoom('ჯოკერი')">🃏 ჯოკერი</div>
    <div class="room-link" onclick="changeRoom('ნარდი')">🎲 ნარდი</div>
    <div class="room-link" onclick="changeRoom('მუსიკა')">🎵 მუსიკა</div>
    <div class="room-link" onclick="changeRoom('იუმორი')">😂 იუმორი</div>
    <div class="room-link" onclick="changeRoom('ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
    <div class="room-link" onclick="changeRoom('დახმარება')">🆘 დახმარება</div>
    <div class="room-link" onclick="changeRoom('ფორუმი')">📝 ფორუმი</div>
    <div class="room-link" onclick="location.href='index.html'" style="color: #666;">🚪 გასვლა</div>
</div>

<div id="main-chat">
    <div id="room-title">ოთახი: <span id="room-nm">კაფე-ბარი</span></div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="დაწერე რამე..." autocomplete="off">
        <button id="sendBtn" onclick="sendMsg()">გაგზავნა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');
    let currentRoom = "კაფე-ბარი";

    if (!myNick) { window.location.href = "index.html"; }

    function toggleMenu() {
        document.getElementById("dropMenu").classList.toggle("active");
    }

    async function changeRoom(roomName) {
        currentRoom = roomName;
        document.getElementById("room-nm").innerText = roomName;
        toggleMenu(); // აირჩევ და ავა ზემოთ
        loadMsgs();
    }

    async function loadMsgs() {
        const { data } = await _s.from('messages').select('*').eq('room', currentRoom).order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        if (data) {
            data.forEach(m => {
                box.innerHTML += `<div class="msg"><span class="u-name">${m.username}:</span><span>${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        await _s.from('messages').insert([{ username: myNick, text: input.value.trim(), room: currentRoom }]);
        input.value = '';
    }

    _s.channel('chat_live').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
        if(p.new.room === currentRoom) loadMsgs();
    }).subscribe();

    loadMsgs();
    document.getElementById("msgInput").addEventListener("keyup", (e) => { if (e.key === "Enter") sendMsg(); });
</script>
</body>
</html>
