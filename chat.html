<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <style>
        /* მთავარი ფერები */
        :root {
            --bg-dark: #000000;
            --panel-bg: #0d0d0d;
            --main-red: #ff0000;
            --border-color: #222;
            --glow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
        }

        /* გვერდითა მენიუ */
        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid var(--main-red);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* პროფილის სექცია */
        .profile-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom, #1a0000, #0d0d0d);
        }

        .main-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--main-red);
            box-shadow: var(--glow);
            object-fit: cover;
            margin-bottom: 10px;
        }

        .user-nick {
            color: var(--main-red);
            margin: 5px 0;
            font-size: 20px;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
        }

        .user-status {
            font-size: 13px;
            color: #888;
            border: 1px dashed #444;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
        }

        /* ოთახების სია */
        .rooms-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .room-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 8px;
            color: white;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .room-btn:hover {
            border-color: var(--main-red);
            box-shadow: var(--glow);
            transform: translateX(5px);
            background: #1a1a1a;
        }

        .room-number {
            color: var(--main-red);
            font-weight: bold;
        }

        /* ჩატის ზონა */
        .chat-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-top-bar {
            padding: 15px 25px;
            background: #050505;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .messages-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
        }

        /* ინპუტის ზონა */
        .chat-input-area {
            padding: 20px;
            background: #0d0d0d;
            border-top: 1px solid #222;
            display: flex;
            gap: 15px;
        }

        .msg-input {
            flex-grow: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 30px;
            color: white;
            outline: none;
        }

        .msg-input:focus {
            border-color: var(--main-red);
        }

        .send-button {
            background: var(--main-red);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: var(--glow);
        }

        /* მობილურის ვერსია */
        @media (max-width: 600px) {
            .sidebar { width: 80px; }
            .user-nick, .user-status, .room-name { display: none; }
            .profile-header { padding: 10px; }
            .main-avatar { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile-header">
            <img src="https://via.placeholder.com/100" class="main-avatar" id="myPic">
            <h3 class="user-nick">User_007</h3>
            <div class="user-status" onclick="setMyStatus()">💬 სტატუსის დადება...</div>
        </div>

        <div class="rooms-container">
            <button class="room-btn" onclick="selectRoom(1)"><span class="room-number">01</span> <span class="room-name">რუმ 1</span></button>
            <button class="room-btn" onclick="selectRoom(2)"><span class="room-number">02</span> <span class="room-name">რუმ 2</span></button>
            <button class="room-btn" onclick="selectRoom(3)"><span class="room-number">03</span> <span class="room-name">რუმ 3</span></button>
            <button class="room-btn" onclick="selectRoom(4)"><span class="room-number">04</span> <span class="room-name">რუმ 4</span></button>
            <button class="room-btn" onclick="selectRoom(5)"><span class="room-number">05</span> <span class="room-name">რუმ 5</span></button>
            <button class="room-btn" onclick="selectRoom(6)"><span class="room-number">06</span> <span class="room-name">რუმ 6</span></button>
            <button class="room-btn" onclick="selectRoom(7)"><span class="room-number">07</span> <span class="room-name">რუმ 7</span></button>
            <button class="room-btn" onclick="selectRoom(8)"><span class="room-number">08</span> <span class="room-name">რუმ 8</span></button>
            <button class="room-btn" onclick="selectRoom(9)"><span class="room-number">09</span> <span class="room-name">რუმ 9</span></button>
            <button class="room-btn" onclick="selectRoom(10)"><span class="room-number">10</span> <span class="room-name">რუმ 10</span></button>
            <button class="room-btn" onclick="selectRoom(11)"><span class="room-number">11</span> <span class="room-name">რუმ 11</span></button>
            <button class="room-btn" onclick="selectRoom(12)"><span class="room-number">12</span> <span class="room-name">რუმ 12</span></button>
        </div>

        <div style="padding: 15px;">
            <button class="room-btn" style="border-color: #550000; color: #ff4444;">🚪 გასვლა</button>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-top-bar">
            <h2 id="roomTitle" style="margin:0; font-size: 18px;">🏠 მთავარი დარბაზი</h2>
            <span style="color: #00ff00; font-size: 14px;">● ონლაინ</span>
        </div>

        <div class="messages-box" id="msgBox">
            <div style="color: #444; text-align: center; margin-top: 20px;">აირჩიე ოთახი საუბრის დასაწყებად</div>
        </div>

        <div class="chat-input-area">
            <input type="text" class="msg-input" id="messageInp" placeholder="დაწერე რამე...">
            <button class="send-button" onclick="pushMessage()">➤</button>
        </div>
    </div>

    <script>
        // ოთახის არჩევა
        function selectRoom(num) {
            document.getElementById('roomTitle').innerText = "🔥 რუმ " + num;
            document.getElementById('msgBox').innerHTML = `<div style="color: #555; text-align: center;">შეხვედი ოთახში ${num}</div>`;
        }

        // სტატუსის შეცვლა
        function setMyStatus() {
            let s = prompt("რა არის შენი სტატუსი?");
            if(s) document.querySelector('.user-status').innerText = "💬 " + s;
        }

        // მესიჯის გაგზავნის ვიზუალი
        function pushMessage() {
            let inp = document.getElementById('messageInp');
            if(inp.value.trim() !== "") {
                let div = document.createElement('div');
                div.style.padding = "10px";
                div.style.background = "rgba(255,0,0,0.1)";
                div.style.margin = "5px 0";
                div.style.borderRadius = "5px";
                div.innerHTML = `<b style="color:red">შენ:</b> ${inp.value}`;
                document.getElementById('msgBox').appendChild(div);
                inp.value = "";
                document.getElementById('msgBox').scrollTop = document.getElementById('msgBox').scrollHeight;
            }
        }
    </script>
</body>
</html>
