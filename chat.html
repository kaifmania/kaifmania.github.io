<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            background: #050505; 
            font-family: 'Arial', sans-serif; 
            color: white; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ზედა პანელი და ჰამბურგერი */
        .top-bar {
            height: 60px;
            background: #0d0d0d;
            border-bottom: 2px solid red;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            z-index: 1001;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
        }

        .menu-toggle {
            cursor: pointer;
            color: red;
            font-weight: bold;
            text-shadow: 0 0 10px red;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ჩამოსაშლელი მენიუ (ზემოდან) */
        .drop-menu {
            position: fixed;
            top: -100%; /* თავიდან დამალულია ზემოთ */
            left: 0;
            width: 100%;
            background: #0d0d0d;
            border-bottom: 3px solid red;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            padding: 20px;
            gap: 10px;
            box-sizing: border-box;
        }

        .drop-menu.active { top: 60px; } /* ჩამოდის ბარის ქვემოთ */

        .drop-menu a {
            padding: 12px;
            color: #ccc;
            text-decoration: none;
            text-align: center;
            border: 1px solid #222;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 14px;
        }

        .drop-menu a:hover {
            background: red;
            color: white;
            box-shadow: 0 0 15px red;
        }

        /* საწერი დაფა და ჩატის არე */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        #roomHeader {
            text-align: center;
            color: red;
            text-shadow: 0 0 10px red;
            margin-bottom: 15px;
        }

        /* ჩატის ისტორია */
        #chatDisplay {
            flex-grow: 1;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px #000;
        }

        /* მესიჯის სტრიქონის სტილი */
        .message-row {
            margin-bottom: 12px;
            word-wrap: break-word;
            line-height: 1.4;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        /* ნიკნეიმის სტილი */
        .msg-author {
            color: red;
            font-weight: bold;
            margin-right: 8px;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
        }

        /* მესიჯის ტექსტი */
        .msg-text {
            color: #eee;
        }

        /* საათის სტილი */
        .msg-time {
            font-size: 11px;
            color: #666;
            margin-left: 10px;
            float: right; /* დროს გადაიტანს მარჯვენა მხარეს */
            margin-top: 4px;
        }

        /* საწერი დაფა (Input area) */
        .input-area {
            display: flex;
            gap: 10px;
            background: #111;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid red;
            align-items: center;
        }

        #messageInput {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 16px;
        }

        /* თვითმფრინავი ღილაკი */
        .send-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 5px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover { transform: scale(1.1); }

        .send-btn svg {
            fill: red;
            filter: drop-shadow(0 0 5px red);
            width: 24px;
            height: 24px;
        }

        .logout-btn { color: #555; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="menu-toggle" onclick="toggleMenu()">
        ☰ <span>მენიუ</span>
    </div>
    <div id="userLabel" style="font-size: 14px;">👤 <span id="nickSpan">...</span></div>
    <div class="logout-btn" onclick="logout()">გასვლა</div>
</div>

<div id="dropMenu" class="drop-menu">
    <a href="#" onclick="selectRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</a>
    <a href="#" onclick="selectRoom('💎 ვიპ საუბრები')">💎 ვიპ საუბრები</a>
    <a href="#" onclick="selectRoom('🔍 გამოძიება')">🔍 გამოძიება</a>
    <a href="#" onclick="selectRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</a>
    <a href="#" onclick="selectRoom('❓ ვიქტორინა')">❓ ვიქტორინა</a>
    <a href="#" onclick="selectRoom('🪢 ჩამოხრჩობანა')">🪢 ჩამოხრჩობანა</a>
    <a href="#" onclick="selectRoom('🕵️ მაფიის ღამე')">🕵️ მაფიის ღამე</a>
    <a href="#" onclick="selectRoom('🃏 ჯოკერი')">🃏 ჯოკერი</a>
    <a href="#" onclick="selectRoom('🎲 ნარდი')">🎲 ნარდი</a>
    <a href="#" onclick="selectRoom('🎵 მუსიკა')">🎵 მუსიკა</a>
    <a href="#" onclick="selectRoom('😂 იუმორი')">😂 იუმორი</a>
    <a href="#" onclick="selectRoom('🛡️ ადმინისტრაცია')">🛡️ ადმინისტრაცია</a>
</div>

<div class="main-container">
    <h2 id="roomHeader">აირჩიე ოთახი</h2>
    
    <div id="chatDisplay">
        <p style="color: #444; text-align: center;">აირჩიეთ ოთახი მენიუდან საუბრის დასაწყებად</p>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="დაწერე რამე..." onkeyup="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
        </button>
    </div>
</div>

<script>
    const nick = localStorage.getItem('nickname');
    if (!nick) window.location.href = "index.html";
    document.getElementById('nickSpan').innerText = nick;

    function toggleMenu() {
        document.getElementById("dropMenu").classList.toggle("active");
    }

    function selectRoom(name) {
        document.getElementById("roomHeader").innerText = name;
        document.getElementById("chatDisplay").innerHTML = `<p style='color:red; text-align:center;'>თქვენ შეხვედით ${name}-ში</p>`;
        toggleMenu(); // არჩევის შემდეგ მენიუ იკეცება (ზემოთ ადის)
    }

    function sendMessage() {
        const inp = document.getElementById("messageInput");
        const chat = document.getElementById("chatDisplay");
        
        if (inp.value.trim() === "") return;

        // დროის ობიექტის შექმნა
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                        now.getMinutes().toString().padStart(2, '0');

        // მესიჯის ელემენტის შექმნა
        const msgDiv = document.createElement("div");
        msgDiv.className = "message-row"; // დავამატეთ კლასი სტილისთვის
        
        msgDiv.innerHTML = `
            <span class="msg-author">${nick}:</span> 
            <span class="msg-text">${inp.value}</span>
            <span class="msg-time">${timeStr}</span>
        `;
        
        chat.appendChild(msgDiv);
        
        // სქროლი ავტომატურად ქვემოთ
        chat.scrollTop = chat.scrollHeight; 
        inp.value = "";
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }
</script>

</body>
</html>
