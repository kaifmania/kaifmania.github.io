<!DOCTYPE html>

<html lang="ka">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>კაიფმანია – ჩატი 😎🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #181818;
  --surface3: #1e1e1e;
  --border: #2a1a10;
  --accent: #cc2200;
  --accent2: #ff5500;
  --accent-glow: rgba(204,34,0,0.35);
  --text: #f0f0f0;
  --text2: #aaa;
  --text3: #666;
  --online: #22dd66;
  --danger: #ff3322;
  --gold: #ffbb00;
  --founder: #ff44aa;
  --admin: #4499ff;
  --sidebar-w: 260px;
  --header-h: 56px;
  --radius: 14px;
  --transition: 0.2s ease;
}
.light-mode {
  --bg: #f0ece8;
  --surface: #fff;
  --surface2: #f5f0ec;
  --surface3: #ece7e2;
  --border: #ddd0c8;
  --text: #1a0a00;
  --text2: #555;
  --text3: #aaa;
  --accent-glow: rgba(204,34,0,0.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans Georgian', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: background var(--transition), color var(--transition);
}

/* ========= FLOATING HEARTS ========= */
#heartsLayer {
position: fixed; inset: 0;
pointer-events: none; z-index: 9999;
overflow: hidden;
}
.fheart {
position: absolute;
bottom: -60px;
animation: fhFloat linear forwards;
opacity: 0;
user-select: none;
filter: drop-shadow(0 0 6px rgba(255,60,0,0.9));
}
@keyframes fhFloat {
0%   { transform: translateY(0) rotate(-15deg) scale(1); opacity:0; }
5%   { opacity: 0.9; }
60%  { transform: translateY(-65vh) rotate(12deg) scale(0.75); opacity:0.6; }
100% { transform: translateY(-115vh) rotate(28deg) scale(0.2); opacity:0; }
}

/* ========= TOP HEADER ========= */
#topBar {
height: var(–header-h);
background: var(–surface);
border-bottom: 1px solid var(–border);
display: flex; align-items: center;
padding: 0 16px; gap: 10px;
flex-shrink: 0;
box-shadow: 0 2px 12px rgba(0,0,0,0.4);
z-index: 100;
}
#topBar .logo {
font-size: 1.2rem; font-weight: 900;
background: linear-gradient(90deg,#ff5500,#cc1100);
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
margin-right: 4px;
}
#topBar .room-title {
font-size: 1rem; font-weight: 700; flex: 1;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.icon-btn {
width: 36px; height: 36px;
background: var(–surface2); border: 1px solid var(–border);
border-radius: 10px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 1rem; transition: background var(–transition), transform 0.15s;
flex-shrink: 0; color: var(–text);
}
.icon-btn:hover { background: var(–surface3); transform: scale(1.08); }

/* ========= LAYOUT ========= */
#layout {
flex: 1; display: flex; overflow: hidden;
}

/* ========= LEFT SIDEBAR ========= */
#leftSidebar {
width: var(–sidebar-w); background: var(–surface);
border-right: 1px solid var(–border);
display: flex; flex-direction: column; flex-shrink: 0;
overflow: hidden;
}
.sidebar-section-title {
font-size: 0.65rem; font-weight: 900;
color: var(–accent2); letter-spacing: 0.1em;
text-transform: uppercase;
padding: 14px 14px 5px;
}

/* Rooms */
#roomsList { overflow-y: auto; flex-shrink: 0; max-height: 45%; }
.room-item {
display: flex; align-items: center; gap: 9px;
padding: 9px 14px; cursor: pointer;
border-radius: 10px; margin: 2px 6px;
transition: background var(–transition);
font-size: 0.83rem; font-weight: 600;
}
.room-item:hover { background: var(–surface2); }
.room-item.active { background: linear-gradient(90deg, rgba(204,34,0,0.22), transparent); border-left: 3px solid var(–accent); }
.room-item .room-num {
font-size: 0.7rem; color: var(–text3); min-width: 18px;
}
.room-item .unread {
margin-left: auto; background: var(–accent);
color: #fff; font-size: 0.6rem; font-weight: 900;
padding: 1px 5px; border-radius: 20px;
display: none;
}
.room-item.has-unread .unread { display: inline; }

/* DMs */
#dmList { overflow-y: auto; flex: 1; }
.dm-item {
display: flex; align-items: center; gap: 8px;
padding: 8px 14px; cursor: pointer;
border-radius: 10px; margin: 2px 6px;
transition: background var(–transition); font-size: 0.82rem;
}
.dm-item:hover { background: var(–surface2); }
.dm-item.active { background: var(–surface3); }
.dm-item .av {
width: 30px; height: 30px; border-radius: 50%;
background: linear-gradient(135deg,#cc2200,#ff5500);
display: flex; align-items: center; justify-content: center;
font-size: 0.75rem; font-weight: 900; flex-shrink: 0;
position: relative;
}
.dm-item .av .online-dot {
position: absolute; bottom: 0; right: 0;
width: 9px; height: 9px; border-radius: 50%;
background: var(–online); border: 1.5px solid var(–surface);
display: none;
}
.dm-item .av .online-dot.on { display: block; }
.dm-item .dm-name { flex: 1; font-weight: 600; }
.dm-item .dm-unread {
background: var(–accent); color: #fff;
font-size: 0.6rem; padding: 1px 5px; border-radius: 20px;
display: none;
}
.dm-item.has-unread .dm-unread { display: inline; }

/* ========= RIGHT SIDEBAR ========= */
#rightSidebar {
width: 220px; background: var(–surface);
border-left: 1px solid var(–border);
display: flex; flex-direction: column; flex-shrink: 0;
overflow: hidden;
}
.users-list { overflow-y: auto; flex: 1; padding: 6px; }
.user-item {
display: flex; align-items: center; gap: 8px;
padding: 7px 8px; border-radius: 10px; cursor: pointer;
transition: background var(–transition); font-size: 0.8rem;
position: relative;
}
.user-item:hover { background: var(–surface2); }
.user-item .uav {
width: 28px; height: 28px; border-radius: 50%;
background: linear-gradient(135deg,#cc2200,#550000);
display: flex; align-items: center; justify-content: center;
font-size: 0.7rem; font-weight: 900; flex-shrink: 0;
position: relative;
}
.user-item .uav .udot {
position: absolute; bottom: -1px; right: -1px;
width: 8px; height: 8px; border-radius: 50%;
background: #555; border: 1.5px solid var(–surface);
}
.user-item.is-online .uav .udot { background: var(–online); }
.user-item .uname { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.role-badge {
font-size: 0.55rem; padding: 1px 5px; border-radius: 8px;
font-weight: 900; letter-spacing: 0.04em;
}
.rb-founder { background: rgba(255,68,170,0.2); color: var(–founder); }
.rb-admin   { background: rgba(68,153,255,0.2); color: var(–admin); }

/* ========= MAIN CHAT ========= */
#chatMain {
flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
#messagesArea {
flex: 1; overflow-y: auto; padding: 16px 18px;
display: flex; flex-direction: column; gap: 4px;
}
#messagesArea::-webkit-scrollbar { width: 5px; }
#messagesArea::-webkit-scrollbar-track { background: transparent; }
#messagesArea::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }

/* Date separator */
.date-sep {
text-align: center; font-size: 0.68rem; color: var(–text3);
margin: 10px 0; position: relative;
}
.date-sep::before, .date-sep::after {
content: ‘’; position: absolute; top: 50%;
width: 35%; height: 1px; background: var(–border);
}
.date-sep::before { left: 0; }
.date-sep::after { right: 0; }

/* Messages */
.msg-row {
display: flex; gap: 10px; align-items: flex-end;
animation: msgIn 0.2s ease both;
}
@keyframes msgIn {
from { opacity:0; transform: translateY(6px); }
to   { opacity:1; transform: translateY(0); }
}
.msg-row.own { flex-direction: row-reverse; }
.msg-av {
width: 30px; height: 30px; border-radius: 50%;
background: linear-gradient(135deg,#cc2200,#550000);
display: flex; align-items: center; justify-content: center;
font-size: 0.7rem; font-weight: 900; flex-shrink: 0; cursor: pointer;
transition: transform 0.15s;
}
.msg-av:hover { transform: scale(1.1); }
.msg-bubble {
max-width: 68%; position: relative;
}
.msg-sender {
font-size: 0.68rem; font-weight: 700; margin-bottom: 3px;
padding: 0 2px;
}
.msg-sender .founder-tag { color: var(–founder); }
.msg-sender .admin-tag   { color: var(–admin); }
.msg-body {
background: var(–surface2); border: 1px solid var(–border);
border-radius: 16px 16px 16px 4px; padding: 9px 13px;
font-size: 0.85rem; line-height: 1.5;
word-break: break-word;
position: relative;
}
.msg-row.own .msg-body {
background: linear-gradient(135deg, rgba(204,34,0,0.25), rgba(255,85,0,0.18));
border-color: rgba(204,34,0,0.35);
border-radius: 16px 16px 4px 16px;
}
.msg-meta {
display: flex; align-items: center; gap: 5px;
font-size: 0.6rem; color: var(–text3);
padding: 2px 2px 0; margin-top: 2px;
}
.msg-row.own .msg-meta { justify-content: flex-end; }
.read-tick { color: var(–online); font-size: 0.65rem; }
/* Admin delete btn */
.msg-del-btn {
display: none; background: none; border: none;
color: var(–danger); font-size: 0.7rem; cursor: pointer;
padding: 0 3px; margin-left: 4px;
}
.msg-row:hover .msg-del-btn { display: inline; }

/* Voice message */
.voice-msg {
display: flex; align-items: center; gap: 8px;
background: var(–surface2); border: 1px solid var(–border);
border-radius: 16px 16px 16px 4px; padding: 9px 13px;
}
.msg-row.own .voice-msg {
background: linear-gradient(135deg, rgba(204,34,0,0.25), rgba(255,85,0,0.18));
border-color: rgba(204,34,0,0.35);
border-radius: 16px 16px 4px 16px;
}
.voice-play {
width: 28px; height: 28px; border-radius: 50%;
background: var(–accent); border: none; cursor: pointer;
color: #fff; font-size: 0.75rem;
display: flex; align-items: center; justify-content: center;
transition: transform 0.15s;
}
.voice-play:hover { transform: scale(1.1); }
.voice-bar {
flex: 1; height: 3px; background: var(–border); border-radius: 2px;
position: relative; cursor: pointer; min-width: 60px;
}
.voice-progress {
height: 100%; background: var(–accent); border-radius: 2px;
width: 0%;
}
.voice-dur { font-size: 0.65rem; color: var(–text3); }

/* ========= TYPING INDICATOR ========= */
#typingBar {
height: 20px; padding: 0 18px;
font-size: 0.68rem; color: var(–text3);
font-style: italic;
}

/* ========= INPUT AREA ========= */
#inputArea {
padding: 10px 14px 12px;
background: var(–surface);
border-top: 1px solid var(–border);
}
#inputRow {
display: flex; align-items: flex-end; gap: 8px;
background: var(–surface2); border: 1.5px solid var(–border);
border-radius: 16px; padding: 8px 10px;
transition: border-color var(–transition), box-shadow var(–transition);
}
#inputRow:focus-within {
border-color: var(–accent);
box-shadow: 0 0 0 3px var(–accent-glow);
}
#msgInput {
flex: 1; background: none; border: none; outline: none;
color: var(–text); font-family: ‘Noto Sans Georgian’, sans-serif;
font-size: 0.88rem; resize: none; max-height: 120px;
min-height: 20px; line-height: 1.5;
}
#msgInput::placeholder { color: var(–text3); }
.input-action {
width: 30px; height: 30px; border-radius: 8px;
background: none; border: none; cursor: pointer;
color: var(–text2); font-size: 1rem;
display: flex; align-items: center; justify-content: center;
transition: color var(–transition), transform 0.15s;
flex-shrink: 0;
}
.input-action:hover { color: var(–accent2); transform: scale(1.1); }
#sendBtn {
width: 34px; height: 34px; border-radius: 10px;
background: linear-gradient(135deg,#ff5500,#cc1100);
border: none; cursor: pointer; color: #fff; font-size: 1rem;
display: flex; align-items: center; justify-content: center;
box-shadow: 0 3px 10px rgba(204,34,0,0.4);
transition: transform 0.15s, box-shadow 0.15s;
flex-shrink: 0;
}
#sendBtn:hover { transform: scale(1.08); box-shadow: 0 5px 16px rgba(204,34,0,0.55); }

/* ========= EMOJI PANEL ========= */
#emojiPanel {
display: none; position: absolute;
bottom: 70px; left: 14px; right: 14px; max-width: 360px;
background: var(–surface2); border: 1px solid var(–border);
border-radius: 16px; padding: 12px;
box-shadow: 0 8px 30px rgba(0,0,0,0.5);
z-index: 200; max-height: 220px;
}
#emojiPanel.open { display: block; }
#emojiPanel .ep-tabs {
display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
}
.ep-tab {
padding: 4px 10px; border-radius: 8px; cursor: pointer;
font-size: 0.72rem; font-weight: 700;
background: var(–surface3); color: var(–text2);
border: 1px solid var(–border); transition: all 0.15s;
}
.ep-tab.active {
background: var(–accent); color: #fff; border-color: var(–accent);
}
#emojiGrid {
display: flex; flex-wrap: wrap; gap: 4px;
overflow-y: auto; max-height: 140px;
}
.emoji-item {
font-size: 1.3rem; cursor: pointer; padding: 4px;
border-radius: 6px; transition: background 0.1s, transform 0.1s;
}
.emoji-item:hover { background: var(–surface3); transform: scale(1.2); }

/* ========= MODALS ========= */
.modal-overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.75); z-index: 500;
align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
background: var(–surface); border: 1px solid var(–border);
border-radius: 20px; padding: 28px 26px;
width: min(420px, 94vw); position: relative;
box-shadow: 0 0 60px rgba(204,34,0,0.25);
animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes modalIn {
from { opacity:0; transform: scale(0.88) translateY(20px); }
to   { opacity:1; transform: scale(1) translateY(0); }
}
.modal h2 { font-size: 1.1rem; font-weight: 900; margin-bottom: 18px; }
.modal .close-modal {
position: absolute; top: 14px; right: 14px;
background: var(–surface2); border: 1px solid var(–border);
color: var(–text2); width: 28px; height: 28px;
border-radius: 8px; cursor: pointer; font-size: 0.85rem;
display: flex; align-items: center; justify-content: center;
}
.modal .close-modal:hover { color: var(–danger); }
.modal-field { margin-bottom: 12px; }
.modal-field label {
display: block; font-size: 0.68rem; font-weight: 700;
color: var(–accent2); letter-spacing: 0.06em;
text-transform: uppercase; margin-bottom: 5px;
}
.modal-field input, .modal-field select, .modal-field textarea {
width: 100%; padding: 10px 13px;
background: var(–surface2); border: 1.5px solid var(–border);
border-radius: 10px; color: var(–text);
font-family: ‘Noto Sans Georgian’, sans-serif;
font-size: 0.85rem; outline: none;
transition: border-color var(–transition);
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px var(–accent-glow);
}
.modal-field textarea { resize: vertical; min-height: 70px; }
.modal-btn {
width: 100%; padding: 12px; border: none;
border-radius: 12px; font-family: ‘Noto Sans Georgian’, sans-serif;
font-size: 0.9rem; font-weight: 900; cursor: pointer;
background: linear-gradient(135deg,#ff5500,#cc1100);
color: #fff; box-shadow: 0 4px 16px rgba(204,34,0,0.35);
transition: transform 0.15s, box-shadow 0.15s; margin-top: 6px;
}
.modal-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(204,34,0,0.5); }
.modal-btn.danger { background: linear-gradient(135deg,#ff4422,#aa1100); }
.modal-btn.secondary {
background: var(–surface2); color: var(–text2);
border: 1px solid var(–border); box-shadow: none;
}
.modal-btn.secondary:hover { background: var(–surface3); }
.msg-box {
padding: 8px 12px; border-radius: 10px;
font-size: 0.78rem; text-align: center; margin-top: 8px;
}
.msg-box.error { background: rgba(200,0,0,0.1); border: 1px solid rgba(200,0,0,0.25); color: #ff6644; }
.msg-box.success { background: rgba(0,200,80,0.08); border: 1px solid rgba(0,200,80,0.2); color: #44ff88; }

/* ========= PROFILE MODAL ========= */
#profileModal .profile-header {
display: flex; gap: 14px; align-items: center; margin-bottom: 18px;
}
#profileModal .profile-big-av {
width: 60px; height: 60px; border-radius: 50%;
background: linear-gradient(135deg,#cc2200,#ff5500);
display: flex; align-items: center; justify-content: center;
font-size: 1.6rem; font-weight: 900; flex-shrink: 0;
box-shadow: 0 0 20px rgba(204,34,0,0.4);
}
#profileModal .profile-info h3 { font-size: 1rem; font-weight: 900; }
#profileModal .profile-status { font-size: 0.75rem; color: var(–text2); margin-top: 3px; }
.profile-tabs {
display: flex; gap: 6px; margin-bottom: 14px;
border-bottom: 1px solid var(–border); padding-bottom: 10px;
}
.ptab {
padding: 6px 12px; border-radius: 8px; cursor: pointer;
font-size: 0.75rem; font-weight: 700; transition: all 0.15s;
background: var(–surface2); color: var(–text2);
border: 1px solid var(–border);
}
.ptab.active { background: var(–accent); color: #fff; border-color: var(–accent); }
.ptab-panel { display: none; }
.ptab-panel.active { display: block; }

/* Album */
.album-grid {
display: grid; grid-template-columns: repeat(3,1fr); gap: 6px;
}
.album-thumb {
aspect-ratio: 1; border-radius: 8px;
background: var(–surface3); overflow: hidden;
cursor: pointer; position: relative;
}
.album-thumb img { width: 100%; height: 100%; object-fit: cover; }
.album-thumb .react-bar {
position: absolute; bottom: 0; left: 0; right: 0;
background: rgba(0,0,0,0.7); padding: 3px 5px;
display: flex; gap: 4px; font-size: 0.7rem;
}
.upload-photo-btn {
border: 2px dashed var(–border); border-radius: 8px;
aspect-ratio: 1; display: flex; align-items: center;
justify-content: center; cursor: pointer;
font-size: 1.4rem; color: var(–text3);
transition: border-color var(–transition), color var(–transition);
}
.upload-photo-btn:hover { border-color: var(–accent); color: var(–accent); }

/* Friend buttons */
.friend-action-row { display: flex; gap: 8px; margin-top: 10px; }
.friend-btn {
flex: 1; padding: 9px; border-radius: 10px; cursor: pointer;
font-family: ‘Noto Sans Georgian’, sans-serif;
font-size: 0.78rem; font-weight: 700; border: none;
transition: all 0.15s;
}
.fb-add { background: rgba(0,200,80,0.15); color: #44ff88; border: 1px solid rgba(0,200,80,0.25); }
.fb-add:hover { background: rgba(0,200,80,0.25); }
.fb-remove { background: rgba(255,50,30,0.12); color: #ff6644; border: 1px solid rgba(255,50,30,0.25); }
.fb-remove:hover { background: rgba(255,50,30,0.22); }
.fb-dm { background: rgba(68,153,255,0.12); color: var(–admin); border: 1px solid rgba(68,153,255,0.25); }
.fb-dm:hover { background: rgba(68,153,255,0.22); }

/* Admin panel inside user ctx */
.admin-actions { margin-top: 12px; border-top: 1px solid var(–border); padding-top: 12px; }
.admin-actions-title { font-size: 0.65rem; color: var(–text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.admin-action-row { display: flex; gap: 6px; flex-wrap: wrap; }
.admin-action-btn {
padding: 6px 10px; border-radius: 8px; cursor: pointer;
font-size: 0.72rem; font-weight: 700;
font-family: ‘Noto Sans Georgian’, sans-serif;
border: none; transition: all 0.15s;
}
.aab-grant-admin { background: rgba(68,153,255,0.15); color: var(–admin); }
.aab-grant-founder { background: rgba(255,68,170,0.15); color: var(–founder); }
.aab-revoke { background: rgba(200,200,0,0.1); color: #cccc44; }
.aab-block { background: rgba(255,50,30,0.12); color: var(–danger); }

/* User ctx menu */
#ctxMenu {
display: none; position: fixed;
background: var(–surface); border: 1px solid var(–border);
border-radius: 12px; padding: 6px;
min-width: 170px; z-index: 600;
box-shadow: 0 8px 30px rgba(0,0,0,0.5);
animation: ctxIn 0.15s ease;
}
@keyframes ctxIn { from { opacity:0; transform:scale(0.93); } to { opacity:1; transform:scale(1); } }
#ctxMenu.open { display: block; }
.ctx-item {
padding: 9px 12px; border-radius: 8px; cursor: pointer;
font-size: 0.8rem; font-weight: 600;
display: flex; align-items: center; gap: 8px;
transition: background 0.1s; color: var(–text);
}
.ctx-item:hover { background: var(–surface2); }
.ctx-item.danger { color: var(–danger); }

/* ========= VOICE RECORDING ========= */
#recIndicator {
display: none; align-items: center; gap: 8px;
padding: 6px 12px; background: rgba(204,34,0,0.15);
border: 1px solid rgba(204,34,0,0.3); border-radius: 10px;
margin-bottom: 8px; font-size: 0.78rem; color: var(–accent2);
}
#recIndicator .rec-dot {
width: 8px; height: 8px; border-radius: 50%; background: var(–danger);
animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

<script>
/* ============================================================
   CONFIG & INIT
============================================================ */
const SUPABASE_URL = 'https://brggiyhfzfbmlirqfgpo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentUserProfile = null;
let currentRoom = 1;
let currentDMUser = null;
let isRecording = false;
let mediaRecorder = null;
let recChunks = [];
let recInterval = null;
let recSeconds = 0;
let messagesSub = null;
let dmSub = null;
let typingTimeout = null;
let isDark = true;
let currentPhotoId = null;

const ROOMS = [
  'ოთახი 1','ოთახი 2','ოთახი 3','ოთახი 4','ოთახი 5','ოთახი 6',
  'ოთახი 7','ოთახი 8','ოთახი 9','ოთახი 10','ოთახი 11','ოთახი 12'
];

// Default emoji categories (founders can add more)
let emojiCategories = {
  '😄 ემოციები': ['😀','😂','🥹','😍','🥰','😎','🤩','😤','😭','🥺','😈','👿','🤬','😱','🙈','🙉','🙊'],
  '🔥 ცეცხლი':  ['🔥','💥','⚡','✨','💫','🌟','⭐','🌈','❄️','🌊','🌪️'],
  '❤️ გულები':  ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','💖','💗','💓','💞','💝','💘','❤️‍🔥','🩷'],
  '🎮 გართობა': ['🎮','🕹️','🎯','🎲','🎸','🎵','🎶','🎤','🎧','🎬','📸','🏆','🥇'],
  '🌸 ბუნება':  ['🌸','🌺','🌻','🌹','🍀','🍁','🌙','☀️','🌙','⭐','🌊','🦋','🐱','🐶'],
  '💬 სხვა':    ['👍','👎','👏','🙌','💪','🤝','✌️','☝️','🤘','💯','🔑','🎁','🎀']
};
let customEmojis = {};

/* ============================================================
   AUTH CHECK
============================================================ */
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  currentUser = session.user;
  await loadOrCreateProfile();
  await loadCustomEmojis();
  renderRooms();
  buildEmojiPanel();
  await switchRoom(1);
  await loadUsers();
  startHearts();
  setupVoice();
  setupTyping();
  // Presence
  updatePresence(true);
  window.addEventListener('beforeunload', () => updatePresence(false));
}

async function loadOrCreateProfile() {
  let { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if (!data) {
    const nick = currentUser.user_metadata?.nickname || currentUser.email.split('@')[0];
    // First user = founder
    const { count } = await sb.from('profiles').select('*', { count:'exact', head:true });
    const role = (count === 0) ? 'founder' : 'member';
    const { data: nd } = await sb.from('profiles').insert({
      id: currentUser.id,
      nickname: nick,
      role,
      status: '',
      avatar_letter: nick[0]?.toUpperCase() || '?',
      blocked: false
    }).select().single();
    data = nd;
  }
  currentUserProfile = data;
}

async function updatePresence(online) {
  await sb.from('profiles').update({ online, last_seen: new Date().toISOString() }).eq('id', currentUser.id);
}

/* ============================================================
   ROOMS
============================================================ */
function renderRooms() {
  const el = document.getElementById('roomsList');
  el.innerHTML = '';
  ROOMS.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'room-item' + (i+1===currentRoom ? ' active' : '');
    div.id = `room-${i+1}`;
    div.innerHTML = `<span class="room-num">#${i+1}</span><span>${name}</span><span class="unread" id="unread-${i+1}">0</span>`;
    div.onclick = () => switchRoom(i+1);
    el.appendChild(div);
  });
  document.getElementById('topRoomTitle').textContent = `# ${ROOMS[currentRoom-1]}`;
}

async function switchRoom(num) {
  currentRoom = num;
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
  const ri = document.getElementById(`room-${num}`);
  if (ri) ri.classList.add('active');
  document.getElementById('topRoomTitle').textContent = `# ${ROOMS[num-1]}`;
  // Unsubscribe old
  if (messagesSub) { messagesSub.unsubscribe(); messagesSub = null; }
  await loadMessages();
  subscribeMessages();
}

/* ============================================================
   MESSAGES
============================================================ */
async function loadMessages() {
  const area = document.getElementById('messagesArea');
  area.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:0.75rem;padding:20px;">იტვირთება...</div>';
  const { data } = await sb.from('messages')
    .select('*, profiles(nickname,role,avatar_letter)')
    .eq('room_id', currentRoom)
    .eq('is_dm', false)
    .order('created_at', { ascending: true })
    .limit(100);
  area.innerHTML = '';
  if (!data || data.length === 0) {
    area.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:0.75rem;padding:40px 20px;">პირველი შეტყობინება გახდი! 🔥</div>';
    return;
  }
  let lastDate = '';
  data.forEach(msg => {
    const d = new Date(msg.created_at).toLocaleDateString('ka-GE');
    if (d !== lastDate) {
      lastDate = d;
      const sep = document.createElement('div');
      sep.className = 'date-sep'; sep.textContent = d;
      area.appendChild(sep);
    }
    area.appendChild(buildMessageEl(msg));
  });
  area.scrollTop = area.scrollHeight;
  // Mark as read
  markRead();
}

function buildMessageEl(msg) {
  const own = msg.user_id === currentUser.id;
  const isFounder = currentUserProfile?.role === 'founder';
  const isAdmin = currentUserProfile?.role === 'admin' || isFounder;
  const profile = msg.profiles || {};
  const role = profile.role || 'member';
  const nick = profile.nickname || '?';
  const letter = profile.avatar_letter || nick[0]?.toUpperCase() || '?';
  const time = new Date(msg.created_at).toLocaleTimeString('ka-GE', {hour:'2-digit',minute:'2-digit'});

  const row = document.createElement('div');
  row.className = 'msg-row' + (own ? ' own' : '');
  row.dataset.id = msg.id;

  let roleTag = '';
  if (role === 'founder') roleTag = '<span class="founder-tag">👑 დამფუძვნებელი</span>';
  else if (role === 'admin') roleTag = '<span class="admin-tag">🛡️ ადმინი</span>';

  let delBtn = '';
  if (isAdmin || own) {
    delBtn = `<button class="msg-del-btn" onclick="deleteMessage('${msg.id}')">🗑️</button>`;
  }

  let bodyHTML = '';
  if (msg.type === 'voice') {
    bodyHTML = `<div class="voice-msg">
      <button class="voice-play" onclick="playVoice(this, '${msg.content}')">▶</button>
      <div class="voice-bar"><div class="voice-progress" id="vp-${msg.id}"></div></div>
      <span class="voice-dur">${msg.voice_duration||'0:00'}</span>
    </div>`;
  } else {
    bodyHTML = `<div class="msg-body">${escHTML(msg.content)}</div>`;
  }

  row.innerHTML = `
    <div class="msg-av" onclick="openUserProfile('${msg.user_id}')">${letter}</div>
    <div class="msg-bubble">
      ${!own ? `<div class="msg-sender">${escHTML(nick)} ${roleTag}</div>` : ''}
      ${bodyHTML}
      <div class="msg-meta">
        <span>${time}</span>
        ${own ? `<span class="read-tick">${msg.read_by?.length > 1 ? '✓✓' : '✓'}</span>` : ''}
        ${delBtn}
      </div>
    </div>`;
  return row;
}

function subscribeMessages() {
  messagesSub = sb.channel(`room-${currentRoom}`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'messages',
      filter: `room_id=eq.${currentRoom}`
    }, payload => {
      if (payload.eventType === 'INSERT') {
        fetchAndAppendMessage(payload.new.id);
      } else if (payload.eventType === 'DELETE') {
        const row = document.querySelector(`[data-id="${payload.old.id}"]`);
        if (row) row.remove();
      }
    })
    .subscribe();
}

async function fetchAndAppendMessage(id) {
  const { data } = await sb.from('messages')
    .select('*, profiles(nickname,role,avatar_letter)')
    .eq('id', id).single();
  if (!data) return;
  const area = document.getElementById('messagesArea');
  area.appendChild(buildMessageEl(data));
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  if (currentUserProfile?.blocked) { showToast('შენ დაბლოკილი ხარ! 🚫'); return; }
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResizeTA(input);
  const { error } = await sb.from('messages').insert({
    user_id: currentUser.id,
    room_id: currentRoom,
    content: text,
    type: 'text',
    is_dm: false,
    read_by: [currentUser.id]
  });
  if (error) showToast('შეცდომა: ' + error.message);
}

async function deleteMessage(id) {
  if (!confirm('წავშალო შეტყობინება?')) return;
  await sb.from('messages').delete().eq('id', id);
}

async function markRead() {
  // Mark all unread messages in this room as read by current user
  const { data } = await sb.from('messages')
    .select('id,read_by')
    .eq('room_id', currentRoom)
    .not('read_by', 'cs', `{"${currentUser.id}"}`);
  if (!data?.length) return;
  for (const msg of data) {
    const rb = [...(msg.read_by || []), currentUser.id];
    await sb.from('messages').update({ read_by: rb }).eq('id', msg.id);
  }
}

/* ============================================================
   VOICE
============================================================ */
function setupVoice() {
  const btn = document.getElementById('voiceBtn');
  btn.addEventListener('mousedown', startRecording);
  btn.addEventListener('mouseup', stopRecording);
  btn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  btn.addEventListener('touchend', stopRecording);
}

async function startRecording() {
  if (isRecording) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    recChunks = [];
    mediaRecorder.ondataavailable = e => recChunks.push(e.data);
    mediaRecorder.onstop = handleRecordingStop;
    mediaRecorder.start();
    isRecording = true;
    recSeconds = 0;
    document.getElementById('recIndicator').classList.add('on');
    recInterval = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds/60), s = recSeconds%60;
      document.getElementById('recTimer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  } catch(e) {
    showToast('მიკროფონი ვერ ჩაირთო 😢');
  }
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  isRecording = false;
  clearInterval(recInterval);
  document.getElementById('recIndicator').classList.remove('on');
}

async function handleRecordingStop() {
  if (recChunks.length === 0) return;
  const blob = new Blob(recChunks, { type: 'audio/webm' });
  const fname = `voice_${Date.now()}.webm`;
  const { data, error } = await sb.storage.from('voice-messages').upload(fname, blob);
  if (error) { showToast('ვოისი ვერ აიტვირთა'); return; }
  const { data: urlData } = sb.storage.from('voice-messages').getPublicUrl(fname);
  const m = Math.floor(recSeconds/60), s = recSeconds%60;
  const dur = `${m}:${s.toString().padStart(2,'0')}`;
  await sb.from('messages').insert({
    user_id: currentUser.id,
    room_id: currentRoom,
    content: urlData.publicUrl,
    type: 'voice',
    voice_duration: dur,
    is_dm: false,
    read_by: [currentUser.id]
  });
}

function playVoice(btn, url) {
  const audio = new Audio(url);
  audio.play();
  btn.textContent = '⏸';
  audio.onended = () => btn.textContent = '▶';
}

/* ============================================================
   TYPING INDICATOR
============================================================ */
function setupTyping() {
  document.getElementById('msgInput').addEventListener('input', e => {
    autoResizeTA(e.target);
    sendTyping();
  });
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

async function sendTyping() {
  await sb.channel(`typing-${currentRoom}`).send({
    type: 'broadcast', event: 'typing',
    payload: { user: currentUserProfile?.nickname || '?' }
  });
}

function autoResizeTA(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

/* ============================================================
   USERS LIST
============================================================ */
async function loadUsers() {
  const { data } = await sb.from('profiles').select('*').order('nickname');
  if (!data) return;
  const online = data.filter(u => u.online);
  const offline = data.filter(u => !u.online);
  document.getElementById('onlineCount').textContent =
    `${online.length} ონლაინ / ${data.length} სულ`;
  const list = document.getElementById('usersList');
  list.innerHTML = '';
  [...online, ...offline].forEach(u => {
    if (u.blocked) return;
    const div = document.createElement('div');
    div.className = 'user-item' + (u.online ? ' is-online' : '');
    const letter = u.avatar_letter || u.nickname[0]?.toUpperCase() || '?';
    let badge = '';
    if (u.role==='founder') badge = '<span class="role-badge rb-founder">👑</span>';
    else if (u.role==='admin') badge = '<span class="role-badge rb-admin">🛡️</span>';
    div.innerHTML = `
      <div class="uav">${letter}<div class="udot"></div></div>
      <span class="uname">${escHTML(u.nickname)}</span>${badge}`;
    div.onclick = () => openUserProfile(u.id);
    list.appendChild(div);
  });
  // Refresh every 30s
  setTimeout(loadUsers, 30000);
}

async function loadDMList() {
  // Load recent DM partners
  const { data } = await sb.from('messages')
    .select('user_id, to_user_id, profiles!user_id(nickname, avatar_letter, online)')
    .eq('is_dm', true)
    .or(`user_id.eq.${currentUser.id},to_user_id.eq.${currentUser.id}`)
    .order('created_at', { ascending: false });
  if (!data) return;
  const seen = new Set();
  const partners = [];
  data.forEach(m => {
    const pid = m.user_id === currentUser.id ? m.to_user_id : m.user_id;
    if (!seen.has(pid)) { seen.add(pid); partners.push(pid); }
  });
  const el = document.getElementById('dmList');
  el.innerHTML = '';
  for (const pid of partners.slice(0,10)) {
    const { data: prof } = await sb.from('profiles').select('*').eq('id',pid).single();
    if (!prof) continue;
    const item = document.createElement('div');
    item.className = 'dm-item';
    const letter = prof.avatar_letter || prof.nickname[0]?.toUpperCase() || '?';
    item.innerHTML = `
      <div class="av">${letter}<div class="online-dot ${prof.online?'on':''}"></div></div>
      <span class="dm-name">${escHTML(prof.nickname)}</span>
      <span class="dm-unread">!</span>`;
    item.onclick = () => openDM(prof);
    el.appendChild(item);
  }
}

  const isSelf = uid === currentUser.id;

  const isAdmin = currentUserProfile?.role === 'admin' || isFounder;
  const letter = prof.avatar_letter || prof.nickname[0]?.toUpperCase() || '?';
  let roleLabel = '';
  if (prof.role==='founder') roleLabel = '<span class="founder-tag">👑 დამფუძვნებელი</span>';
  else if (prof.role==='admin') roleLabel = '<span class="admin-tag">🛡️ ადმინი</span>';
  else roleLabel = '<span style="color:var(--text3)">👤 მომხმარებელი</span>';

  // Friend status
  const { data: fdata } = await sb.from('friends')
    .select('*')
    .or(`(user_id.eq.${currentUser.id},friend_id.eq.${uid}),(user_id.eq.${uid},friend_id.eq.${currentUser.id})`);
  const friendStatus = fdata?.[0]?.status || null;

  // Photos
  const { data: photos } = await sb.from('photos').select('*').eq('user_id', uid);

  let friendBtns = '';
  if (!isSelf) {
    if (!friendStatus || friendStatus === 'none') {
      friendBtns += `<button class="friend-btn fb-add" onclick="sendFriendReq('${uid}')">➕ მეგობრობა</button>`;
    } else if (friendStatus === 'pending') {
      friendBtns += `<button class="friend-btn fb-remove" onclick="removeFriend('${uid}')">⏳ გაუქმება</button>`;
    } else if (friendStatus === 'accepted') {
      friendBtns += `<button class="friend-btn fb-remove" onclick="removeFriend('${uid}')">➖ წაშლა</button>`;
    }
    friendBtns += `<button class="friend-btn fb-dm" onclick="closeModal('profileModal');openDMById('${uid}','${escHTML(prof.nickname)}')">💬 შეტყობინება</button>`;
  }

  let adminSection = '';
  if (isFounder && !isSelf) {
    adminSection = `<div class="admin-actions">
      <div class="admin-actions-title">🔧 ადმინ მართვა</div>
      <div class="admin-action-row">
        <button class="admin-action-btn aab-grant-admin" onclick="setRole('${uid}','admin')">🛡️ ადმინი</button>
        <button class="admin-action-btn aab-grant-founder" onclick="setRole('${uid}','founder')">👑 დამფუძვნებელი</button>
        <button class="admin-action-btn aab-revoke" onclick="setRole('${uid}','member')">🔓 ჩახსნა</button>
        <button class="admin-action-btn aab-block" onclick="blockUser('${uid}')">🚫 ბლოკი</button>
      </div>
    </div>`;
  } else if (isAdmin && !isSelf && prof.role==='member') {
    adminSection = `<div class="admin-actions">
      <div class="admin-actions-title">🔧 ადმინ მართვა</div>
      <div class="admin-action-row">
        <button class="admin-action-btn aab-block" onclick="blockUser('${uid}')">🚫 ბლოკი</button>
      </div>
    </div>`;
  }

  const albumHTML = buildAlbumHTML(photos || [], uid, isSelf);

  document.getElementById('profileContent').innerHTML = `
    <div class="profile-header">
      <div class="profile-big-av">${letter}</div>
      <div class="profile-info">
        <h3>${escHTML(prof.nickname)}</h3>
        <div>${roleLabel}</div>
        <div class="profile-status">${escHTML(prof.status || '')}</div>
      </div>
    </div>
    <div class="profile-tabs">
      <button class="ptab active" onclick="switchPTab(this,'pt-info')">ℹ️ ინფო</button>
      <button class="ptab" onclick="switchPTab(this,'pt-album')">📸 ალბომი</button>
    </div>
    <div class="ptab-panel active" id="pt-info">
      <div class="friend-action-row">${friendBtns}</div>
      ${adminSection}
    </div>
    <div class="ptab-panel" id="pt-album">${albumHTML}</div>`;
  openModal('profileModal');
}

function buildAlbumHTML(photos, uid, canUpload) {
  let html = '<div class="album-grid">';
  photos.forEach(p => {
    html += `<div class="album-thumb" onclick="openPhoto('${p.id}','${p.url}')">
      <img src="${p.url}" alt=""/>
      <div class="react-bar">${(p.reactions||[]).join('')}</div>
    </div>`;
  });
  if (canUpload) {
    html += `<label class="upload-photo-btn" title="ფოტოს დამატება">
      ＋<input type="file" accept="image/*" style="display:none" onchange="uploadPhoto(this)"/>
    </label>`;
  }
  html += '</div>';
  return html;
}

async function uploadPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const fname = `photos/${currentUser.id}/${Date.now()}_${file.name}`;
  const { error } = await sb.storage.from('user-photos').upload(fname, file);
  if (error) { showToast('ფოტო ვერ აიტვირთა'); return; }
  const { data } = sb.storage.from('user-photos').getPublicUrl(fname);
  await sb.from('photos').insert({ user_id: currentUser.id, url: data.publicUrl, reactions: [], comments: [] });
  showToast('ფოტო დამატებულია 📸');
}

function switchPTab(btn, panelId) {
  const modal = btn.closest('.modal');
  modal.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  modal.querySelectorAll('.ptab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId)?.classList.add('active');
}

function buildEmojiPanel() {
  const allCats = { ...emojiCategories, ...customEmojis };
  const tabs = document.getElementById('epTabs');
  const grid = document.getElementById('emojiGrid');
  tabs.innerHTML = '';
  const catNames = Object.keys(allCats);
  catNames.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'ep-tab' + (i===0?' active':'');
    btn.textContent = cat;
    btn.onclick = () => {
      tabs.querySelectorAll('.ep-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderEmojiGrid(allCats[cat]);
    };
    tabs.appendChild(btn);
  });
  if (catNames.length > 0) renderEmojiGrid(allCats[catNames[0]]);

function renderEmojiGrid(emojis) {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  emojis.forEach(em => {
    const span = document.createElement('span');
    span.className = 'emoji-item';
    span.textContent = em;
    span.onclick = () => insertEmoji(em);
    grid.appendChild(span);
  });

function insertEmoji(em) {
  const input = document.getElementById('msgInput');
  input.value += em;
  input.focus();
  toggleEmoji(false);
}

function toggleEmoji(force) {
  const panel = document.getElementById('emojiPanel');
  const open = force !== undefined ? force : !panel.classList.contains('open');
  panel.classList.toggle('open', open);
}

document.addEventListener('click', e => {
  const panel = document.getElementById('emojiPanel');
  if (!panel.contains(e.target) && !e.target.closest('[onclick="toggleEmoji()"]')) {

async function addCustomEmoji() {
  if (currentUserProfile?.role !== 'founder') { showToast('მხოლოდ დამფუძვნებელი! 👑'); return; }

============================================================ */
function startHearts() {
  const layer = document.getElementById('heartsLayer');
  const chars = ['🩷','💖','💗','❤️‍🔥','🔥','💞','💓','✨','💝','❤️','🌸','💘','💫','🌺'];
  function spawn() {
    const el = document.createElement('div');
    el.className = 'fheart';
    el.textContent = chars[Math.floor(Math.random()*chars.length)];
    const size = 12 + Math.random()*20;
    const left = Math.random()*97;
    const dur = 6 + Math.random()*9;
    const delay = Math.random()*2;
    el.style.cssText = `left:${left}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
    layer.appendChild(el);
    setTimeout(() => el.remove(), (dur+delay+1)*1000);
  }
  for (let i=0;i<25;i++) spawn();
  setInterval(spawn, 300);
}

/* ============================================================
   SUPABASE TABLE SETUP HINT (run in Supabase SQL Editor)
   
   CREATE TABLE profiles (
     id uuid PRIMARY KEY REFERENCES auth.users(id),
     nickname text, role text DEFAULT 'member',
     status text DEFAULT '', avatar_letter text,
     blocked boolean DEFAULT false,
     online boolean DEFAULT false,
     last_seen timestamptz
   );
   CREATE TABLE messages (
     id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
     user_id uuid REFERENCES profiles(id),
     to_user_id uuid REFERENCES profiles(id),
     room_id int, content text, type text DEFAULT 'text',
     voice_duration text, is_dm boolean DEFAULT false,
     read_by uuid[] DEFAULT '{}',
     created_at timestamptz DEFAULT now()
   );
   CREATE TABLE friends (
