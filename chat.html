<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0b0000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: black; padding: 12px; display: flex; align-items: center; border-bottom: 1px solid #500; }
        .menu-btn { cursor: pointer; font-size: 25px; color: red; margin-right: 15px; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #070000; box-shadow: 2px 0 15px red; transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; border-right: 1px solid red; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid red; }
        .sidebar-header img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid red; }
        .rooms-list { flex: 1; overflow-y: auto; padding: 10px; }
        .room-item { padding: 12px; background: #111; margin-bottom: 5px; border-radius: 5px; cursor: pointer; color: #ccc; font-size: 14px; }
        .room-item:hover { background: #300; border-color: red; color: white; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050000; }
        
        .msg-container { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid red; }
        .bubble { background: #1a0000; border: 1px solid #333; padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .m-nick { font-weight: bold; color: #ff4d4d; font-size: 11px; margin-bottom: 2px; }
        
        /* სქელი და ჩრდილიანი ინპუტი */
        .input-zone { background: black; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #222; }
        .input-zone input { 
            flex: 1; padding: 10px; border-radius: 20px; background: #111; color: white; outline: none; 
            border: 2.5px solid #800; 
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.4); 
            transition: 0.3s;
        }
        .input-zone input:focus { border-color: red; box-shadow: 0 0 18px rgba(255, 0, 0, 0.6); }

        .send-btn { background: red; border: none; padding: 0 20px; border-radius: 20px; color: white; cursor: pointer; font-weight: bold; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3500; }
        .overlay.active { display: block; }

        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #1a0000; margin: 20% auto; padding: 20px; border: 1px solid red; width: 260px; text-align: center; border-radius: 15px; box-shadow: 0 0 20px red; }
        .prof-btn { background: red; color: white; border: none; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png">
        <div id="my-nick-label" style="font-weight:bold; color:red; margin-top:5px;">...</div>
    </div>
    <div class="rooms-list" id="rooms-list-ui">
        </div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="room-name" style="font-weight:bold; color: red; flex: 1; text-align: center;">☕ კაფე-ბარი</div>
</div>

<div class="chat-area" id="chat"></div>

<div id="profile-modal" class="modal">
    <div class="modal-content">
        <img id="prof-avatar" src="" style="width:90px; height:90px; border-radius:50%; border:2px solid red; object-fit: cover;">
        <h3 id="prof-nick" style="color:red; margin:10px 0;"></h3>
        <p id="prof-status" style="font-size:12px; color:#ccc; margin-bottom:15px;"></p>
        <div id="prof-controls"></div>
        <button onclick="closeProfile()" style="background:none; border:none; color:white; margin-top:10px; cursor:pointer;">დახურვა</button>
    </div>
</div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">გაგზავნა</button>
</div>

<script>
    const S_URL = "https://gdvejawrplvvldbjpfcgx.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkdmphd3JwbHZ2bGRianBmY2d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzE1NDIsImV4cCI6MjA4OTAwNzU0Mn0.QEySoKfVHF1b4dV5TAH5vgQQKQMAgdETzQm3P9p3H8A";
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let myNick = localStorage.getItem('nickname') || "მოთამაშე";
    let currentRoom = "☕ კაფე-ბარი";
    const rooms = ['☕ კაფე-ბარი', '💎 ვიპ საუბრები', '🕴 მაფიის ღამე', '🕵️ გამოძიება', '🔐 შიფროგრამა', '❓ ვიქტორინა', '😵 ჩამოხრჩობანა', '🃏 ჯოკერი', '🎲 ნარდი', '🎵 მუსიკა', '😂 იუმორი', '🛠 ადმინისტრაცია'];

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function init() {
        document.getElementById('my-nick-label').innerText = myNick;
        const rList = document.getElementById('rooms-list-ui');
        rList.innerHTML = "";
        rooms.forEach(r => {
            const d = document.createElement('div');
            d.className = 'room-item';
            d.innerText = r;
            d.onclick = () => changeRoom(r);
            rList.appendChild(d);
        });

        loadMessages();
        _supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    }

    async function loadMessages() {
        const { data: msgs } = await _supabase.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const chatDiv = document.getElementById("chat");
        chatDiv.innerHTML = "";
        msgs?.forEach(m => {
            chatDiv.innerHTML += `
                <div class="msg-container" onclick="openProfile('${m.user_name}')">
                    <img src="${m.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar">
                    <div class="bubble">
                        <div class="m-nick">${m.user_name}</div>
                        <div style="font-size:14px; word-break: break-word;">${m.text}</div>
                    </div>
                </div>`;
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById("msg-input");
        const txt = i.value.trim();
        if (!txt) return;

        const { data: profile } = await _supabase.from('profiles').select('is_banned').eq('username', myNick).single();
        if (profile?.is_banned) { alert("თქვენ დაბლოკილი ხართ!"); return; }

        i.value = "";
        await _supabase.from('messages').insert([{ user_name: myNick, text: txt, room_name: currentRoom, avatar_url: localStorage.getItem('myAvatar') || "https://i.ibb.co/v3m6y6R/avatar.png" }]);
    }

    async function openProfile(targetName) {
        const { data: user } = await _supabase.from('profiles').select('*').eq('username', targetName).single();
        const { data: myData } = await _supabase.from('profiles').select('role').eq('username', myNick).single();
        
        document.getElementById('prof-nick').innerText = targetName;
        document.getElementById('prof-avatar').src = user?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
        document.getElementById('prof-status').innerText = user?.status || "სტატუსი არაა";
        
        let html = `<button class="prof-btn" onclick="alert('მალე...')">მიწერა</button>`;
        if (myData?.role === 'admin' && targetName !== myNick) {
            html += `
                <button class="prof-btn" style="background:orange;" onclick="updateUser('${targetName}', {role:'admin'})">ადმინი</button>
                <button class="prof-btn" style="background:darkred;" onclick="updateUser('${targetName}', {is_banned:${!user?.is_banned}})">
                    ${user?.is_banned ? 'განბლოკვა' : 'დაბლოკვა'}
                </button>`;
        }
        document.getElementById('prof-controls').innerHTML = html;
        document.getElementById('profile-modal').style.display = 'block';
    }

    async function updateUser(target, obj) {
        await _supabase.from('profiles').update(obj).eq('username', target);
        alert("შესრულებულია!");
        closeProfile();
    }

    function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
    function changeRoom(n) { currentRoom = n; document.getElementById('room-name').innerText = n; toggleMenu(); loadMessages(); }
    window.onload = init;
</script>
</body>
</html>
