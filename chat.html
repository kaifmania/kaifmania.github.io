<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: #000; height: 60px; display: flex; align-items: center; border-bottom: 2px solid red; padding: 0 15px; flex-shrink: 0; z-index: 1001; }
        .burger { font-size: 30px; color: red; cursor: pointer; padding: 10px; }
        .title { flex: 1; text-align: center; color: red; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px red; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; background: #0a0000; border-right: 2px solid red; transition: 0.3s ease; z-index: 2000; display: flex; flex-direction: column; padding: 70px 10px 20px; overflow-y: auto; }
        .side-menu.active { left: 0; }
        .menu-item { padding: 12px; margin: 4px 0; background: #150000; border: 1px solid #333; border-radius: 8px; cursor: pointer; color: #ccc; font-size: 14px; }
        .menu-item:hover { background: red; color: white; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050000; display: flex; flex-direction: column; gap: 12px; }
        .m-wrap { display: flex; gap: 10px; align-items: flex-start; max-width: 90%; }
        .m-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1px solid red; flex-shrink: 0; object-fit: cover; }
        .m-body { background: #111; padding: 8px 12px; border-radius: 10px; border-left: 3px solid red; }
        .m-user { font-weight: bold; color: red; font-size: 11px; margin-bottom: 2px; }
        .input-zone { background: #000; padding: 12px; display: flex; gap: 10px; border-top: 2px solid #222; align-items: center; flex-shrink: 0; padding-bottom: 25px; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #444; background: #111; color: white; outline: none; }
        .btn { background: none; border: none; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
