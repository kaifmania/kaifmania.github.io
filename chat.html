<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>KAIFMANIA 🔥</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* ყველაფერი გიგანტურია */
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { 
            background: #000; padding: 20px; border-bottom: 5px solid red; 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 30px red;
        }

        /* მენიუს ღილაკი - უზარმაზარი */
        .menu-btn { background: red; color: white; border: none; padding: 20px 40px; cursor: pointer; font-weight: bold; border-radius: 10px; font-size: 28px; }

        /* მარცხენა მენიუ - ბოლომდე და განიერი */
        #sideMenu { 
            position: fixed; left: -400px; top: 0; width: 400px; height: 100%; 
            background: #050505; border-right: 5px solid red; transition: 0.3s; z-index: 100;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        #sideMenu.active { left: 0; }

        /* ოთახების ასოები */
        .room-link { 
            padding: 25px; color: white; text-decoration: none; border-bottom: 2px solid #222; 
            cursor: pointer; font-size: 24px; text-transform: uppercase; font-weight: 900;
        }
        .room-link:hover { background: red; }

        /* ჩატის დაფა */
        #room-title { padding: 20px; background: #111; color: red; text-align: center; font-size: 30px; border-bottom: 3px solid #333; }
        #chat-box { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; font-size: 26px; }
        .u-name { color: red; font-weight: bold; margin-right: 15px; }

        /* საწერი ველი - გიგანტური */
        .input-area { background: #000; padding: 30px; display: flex; gap: 20px; border-top: 5px solid #200; }
        input { flex: 1; background: #0a0a0a; border: 3px solid #555; border-radius: 40px; padding: 25px; color: white; outline: none; font-size: 24px; }
        button#sendBtn { background: red; color: white; border: none; border-radius: 40px; padding: 0 50px; cursor: pointer; font-size: 24px; font-weight: bold; }

        .close-menu { padding: 30px; text-align: right; color: red; font-size: 35px; cursor: pointer; border-bottom: 5px solid red; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn" onclick="toggleMenu()">☰ ოთახები</button>
    <h2 style="margin:0; font-size: 35px; color: white; text-shadow: 0 0 15px red;">KAIFMANIA</h2>
    <div style="width: 100px;"></div>
</header>

<div id="sideMenu">
    <div class="close-menu" onclick="toggleMenu()">დახურვა X</div>
    <div class="room-link" onclick="changeRoom('კაფე-ბარი')">☕ კაფე-ბარი</div>
    <div class="room-link" onclick="changeRoom('ვიპ საუბრები')">💎 ვიპ საუბრები</div>
    <div class="room-link" onclick="changeRoom('გამოძიება')">🔍 გამოძიება</div>
    <div class="room-link" onclick="changeRoom('შიფროგრამა')">📟 შიფროგრამა</div>
    <div class="room-link" onclick="changeRoom('ვიქტორინა')">❓ ვიქტორინა</div>
    <div class="room-link" onclick="changeRoom('ჩამოხრჩობანა')">💀 ჩამოხრჩობანა</div>
    <div class="room-link" onclick="changeRoom('მაფიის ღამე')">🌑 მაფიის ღამე</div>
    <div class="room-link" onclick="changeRoom('ჯოკერი')">🃏 ჯოკერი</div>
    <div class="room-link" onclick="changeRoom('ნარდი')">🎲 ნარდი</div>
    <div class="room-link" onclick="changeRoom('მუსიკა')">🎵 მუსიკა</div>
    <div class="room-link" onclick="changeRoom('იუმორი')">😂 იუმორი</div>
    <div class="room-link" onclick="changeRoom('ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
    <div class="room-link" onclick="changeRoom('დახმარება')">🆘 დახმარება</div>
    <div class="room-link" onclick="changeRoom('ფორუმი')">📝 ფორუმი</div>
    <div class="room-link" onclick="location.href='index.html'" style="color: #444;">🚪 გასვლა</div>
</div>

<div id="chat-container">
    <div id="room-title">კაფე-ბარი</div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="დაწერე რამე..." autocomplete="off">
        <button id="sendBtn" onclick="sendMsg()">გაგზავნა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');
    let currentRoom = "კაფე-ბარი";

    if (!myNick) { window.location.href = "index.html"; }

    function toggleMenu() { document.getElementById("sideMenu").classList.toggle("active"); }

    async function changeRoom(roomName) {
        currentRoom = roomName;
        document.getElementById("room-title").innerText = roomName;
        toggleMenu(); 
        loadMsgs();
    }

    async function loadMsgs() {
        const { data } = await _s.from('messages').select('*').eq('room', currentRoom).order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        if (data) {
            data.forEach(m => {
                box.innerHTML += `<div class="msg"><span class="u-name">${m.username}:</span><span>${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        await _s.from('messages').insert([{ username: myNick, text: input.value.trim(), room: currentRoom }]);
        input.value = '';
    }

    _s.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
        if(p.new.room === currentRoom) loadMsgs();
    }).subscribe();

    loadMsgs();
    document.getElementById("msgInput").addEventListener("keyup", (e) => { if (e.key === "Enter") sendMsg(); });
</script>
</body>
</html>
