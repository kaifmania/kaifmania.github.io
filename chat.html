<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0b0000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: black; padding: 12px; display: flex; align-items: center; border-bottom: 1px solid #500; }
        .menu-btn { cursor: pointer; font-size: 25px; color: red; margin-right: 15px; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #070000; box-shadow: 2px 0 15px red; transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; border-right: 1px solid red; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid red; }
        .sidebar-header img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid red; }
        .rooms-list { flex: 1; overflow-y: auto; padding: 10px; }
        .room-item { padding: 10px; background: #111; margin-bottom: 5px; border-radius: 5px; cursor: pointer; color: #ccc; font-size: 14px; }
        .room-item:hover { background: #300; border-color: red; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050000; }
        .msg-container { display: flex; align-items: flex-start; gap: 8px; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid red; }
        .bubble { background: #1a0000; border: 1px solid #333; padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .m-nick { font-weight: bold; color: #ff4d4d; font-size: 11px; margin-bottom: 2px; }
        .input-zone { background: black; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #222; }
        .input-zone input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .send-btn { background: red; border: none; padding: 0 20px; border-radius: 20px; color: white; cursor: pointer; font-weight: bold; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png">
        <div id="my-nick-label" style="font-weight:bold; color:red; margin-top:5px;">...</div>
    </div>
    <div class="rooms-list">
        <div class="room-item" onclick="changeRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები')">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე')">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🕵️ გამოძიება')">🕵️ გამოძიება</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა')">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('😵 ჩამოხრჩობანა')">😵 ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი')">🎲 ნარდი</div>
        <div class="room-item" onclick="changeRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
        <div class="room-item" onclick="changeRoom('😂 იუმორი')">😂 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🛠 ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
    </div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="room-name" style="font-weight:bold; color: red; flex: 1; text-align: center;">☕ კაფე-ბარი</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">გაგზავნა</button>
</div>

<script>
 const S_URL = "https://gdvejawrplvvldbjpfcgx.supabase.co";
const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkdmphd3JwbHZ2bGRianBmY2d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzE1NDIsImV4cCI6MjA4OTAwNzU0Mn0.QEySoKfVHF1b4dV5TAH5vgQQKQMAgdETzQm3P9p3H8A";
const _supabase = supabase.createClient(S_URL, S_KEY);

    let myNick = (localStorage.getItem('nickname') || "User").trim();
    let currentRoom = "☕ კაფე-ბარი";

    function toggleMenu() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('overlay').classList.toggle('active'); 
    }

    async function init() {
        document.getElementById('my-nick-label').innerText = myNick;
        loadMessages();
        _supabase.channel('room1').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
            if(payload.new.room_name === currentRoom) loadMessages();
        }).subscribe();
    }

    async function loadMessages() {
        const { data: msgs, error } = await _supabase.from('messages')
            .select('*')
            .eq('room_name', currentRoom)
            .order('created_at', { ascending: true });

        if (error) { console.log("ჩატვირთვის შეცდომა:", error.message); return; }

        const chatDiv = document.getElementById("chat");
        chatDiv.innerHTML = "";
        
        msgs?.forEach(m => {
            chatDiv.innerHTML += `
                <div class="msg-container">
                    <img src="https://i.ibb.co/v3m6y6R/avatar.png" class="msg-avatar">
                    <div class="bubble">
                        <div class="m-nick">${m.user_nam}</div>
                        <div style="font-size:14px; word-break: break-word;">${m.text}</div>
                    </div>
                </div>`;
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById("msg-input");
        const txt = i.value.trim();
        if (!txt) return;
        
        i.value = ""; // ეგრევე ვასუფთავებთ ინპუტს

        const { error } = await _supabase.from('messages').insert([
            { user_nam: myNick, text: txt, room_name: currentRoom }
        ]);

        if (error) {
            alert("ბაზაში ვერ ჩაიწერა: " + error.message);
            i.value = txt; // თუ ვერ გაიგზავნა, ტექსტი დააბრუნოს
        }
    }

    function changeRoom(n) { 
        currentRoom = n; 
        document.getElementById('room-name').innerText = n; 
        toggleMenu(); 
        loadMessages(); 
    }

    window.onload = init;
</script>
</body>
</html>
