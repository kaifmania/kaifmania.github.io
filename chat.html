<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>KAIFMANIA 🔥</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* მარცხენა მენიუ - მყვირალა წითელი ჩარჩოთი */
        #sideMenu { 
            width: 320px; background: #080000; border-right: 4px solid #ff0000; 
            display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 10px 0 20px rgba(255, 0, 0, 0.2);
        }
        
        .side-header { padding: 30px 10px; text-align: center; font-size: 28px; color: #ff0000; border-bottom: 4px solid #ff0000; text-shadow: 0 0 15px #ff0000; }

        .room-link { 
            padding: 22px 30px; color: #ccc; text-decoration: none; border-bottom: 1px solid #200; 
            cursor: pointer; font-size: 20px; transition: 0.3s; text-transform: uppercase;
        }
        .room-link:hover { background: #ff0000; color: #fff; padding-left: 45px; text-shadow: 0 0 10px #fff; }

        /* ჩატის მხარე */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #1a0000 0%, #000 100%); }
        
        #chat-header { 
            padding: 25px; background: #000; border-bottom: 3px solid #ff0000; 
            text-align: center; font-size: 32px; color: #ff0000; text-shadow: 0 0 20px #ff0000; 
        }

        #chat-box { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; font-size: 22px; }
        
        .msg { border-bottom: 1px solid #300; padding-bottom: 10px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .u-name { color: #ff0000; font-weight: bold; margin-right: 15px; text-shadow: 0 0 5px #ff0000; }

        /* საწერი ველი - დიდი და მკვეთრი */
        .input-area { background: #000; padding: 30px; display: flex; gap: 20px; border-top: 4px solid #ff0000; }
        input { flex: 1; background: #111; border: 2px solid #ff0000; border-radius: 5px; padding: 20px; color: #fff; outline: none; font-size: 20px; box-shadow: inset 0 0 10px #ff00001a; }
        
        button#sendBtn { background: #ff0000; color: #fff; border: none; padding: 0 45px; cursor: pointer; font-weight: bold; font-size: 22px; text-transform: uppercase; box-shadow: 0 0 15px #ff0000; }
        button#sendBtn:hover { background: #cc0000; transform: scale(1.02); }

        .exit-btn { margin-top: auto; padding: 25px; background: #100; color: #ff0000; text-align: center; font-size: 18px; text-decoration: none; border-top: 2px solid #300; }
    </style>
</head>
<body>

<div id="sideMenu">
    <div class="side-header">ოთახები</div>
    <div class="room-link" onclick="changeRoom('კაფე-ბარი')">🍷 კაფე-ბარი</div>
    <div class="room-link" onclick="changeRoom('ვიპ საუბრები')">👑 ვიპ საუბრები</div>
    <div class="room-link" onclick="changeRoom('გამოძიება')">🔍 გამოძიება</div>
    <div class="room-link" onclick="changeRoom('შიფროგრამა')">📟 შიფროგრამა</div>
    <div class="room-link" onclick="changeRoom('ვიქტორინა')">❓ ვიქტორინა</div>
    <div class="room-link" onclick="changeRoom('ჩამოხრჩობანა')">💀 ჩამოხრჩობანა</div>
    <div class="room-link" onclick="changeRoom('მაფიის ღამე')">🌑 მაფიის ღამე</div>
    <div class="room-link" onclick="changeRoom('ჯოკერი')">🃏 ჯოკერი</div>
    <div class="room-link" onclick="changeRoom('ნარდი')">🎲 ნარდი</div>
    <div class="room-link" onclick="changeRoom('მუსიკა')">🎵 მუსიკა</div>
    <div class="room-link" onclick="changeRoom('იუმორი')">😂 იუმორი</div>
    <div class="room-link" onclick="changeRoom('ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
    <div class="room-link" onclick="changeRoom('დახმარება')">🆘 დახმარება</div>
    <div class="room-link" onclick="changeRoom('ფორუმი')">📝 ფორუმი</div>
    <a href="index.html" class="exit-btn">🚪 გასვლა</a>
</div>

<div id="main-chat">
    <div id="chat-header">KAIFMANIA 🔥 - <span id="room-nm">კაფე-ბარი</span></div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="დაწერე რამე..." autocomplete="off">
        <button id="sendBtn" onclick="sendMsg()">გაგზავნა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');
    let currentRoom = "კაფე-ბარი";

    if (!myNick) { window.location.href = "index.html"; }

    async function changeRoom(roomName) {
        currentRoom = roomName;
        document.getElementById("room-nm").innerText = roomName;
        loadMsgs();
    }

    async function loadMsgs() {
        const { data } = await _s.from('messages').select('*').eq('room', currentRoom).order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        if (data) {
            data.forEach(m => {
                box.innerHTML += `<div class="msg"><span class="u-name">${m.username}:</span><span>${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        await _s.from('messages').insert([{ username: myNick, text: input.value.trim(), room: currentRoom }]);
        input.value = '';
    }

    _s.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
        if(p.new.room === currentRoom) loadMsgs();
    }).subscribe();

    loadMsgs();
    document.getElementById("msgInput").addEventListener("keyup", (e) => { if (e.key === "Enter") sendMsg(); });
</script>
</body>
</html>
