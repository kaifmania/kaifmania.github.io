<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: #000; height: 60px; display: flex; align-items: center; border-bottom: 2px solid red; padding: 0 15px; flex-shrink: 0; }
        .title { flex: 1; text-align: center; color: red; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px red; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050000; display: flex; flex-direction: column; gap: 10px; }
        .m-wrap { display: flex; gap: 10px; margin-bottom: 8px; }
        .m-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid red; }
        .m-body { background: #111; padding: 8px 12px; border-radius: 10px; border-left: 3px solid red; }
        .m-user { font-weight: bold; color: red; font-size: 11px; }
        .input-zone { background: #000; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #444; background: #111; color: white; outline: none; }
        button { background: red; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="topbar"><div class="title">☕️ კაფე-ბარი</div></div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">გაგზავნა</button>
</div>

<script>
    // მონაცემები
    const S_URL = "https://ftfciebnywbondaiarnc.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkdmphd3JwbHZ2bGRianBmY2d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzE1NDIsImV4cCI6MjA4OTAwNzU0Mn0.QEySoKfVHF1b4dV5TAH5vgQQKQMAgdETzQm3P9p3H8A";

    const _supabase = supabase.createClient(S_URL, S_KEY);

    let room = "☕️ კაფე-ბარი";
    let nick = "სტუმარი_" + Math.floor(Math.random() * 100);

    async function load() {
        const { data, error } = await _supabase
            .from('messages')
            .select('*')
            .eq('room_id', room)
            .order('created_at', { ascending: true });

        if (error) { console.error(error); return; }

        const c = document.getElementById('chat');
        c.innerHTML = "";
        data.forEach(m => {
            const av = `https://ui-avatars.com/api/?name=${m.user_name}&background=red&color=fff`;
            c.innerHTML += `
                <div class="m-wrap">
                    <img src="${av}" class="m-avatar">
                    <div class="m-body">
                        <div class="m-user">${m.user_name}</div>
                        <div>${m.text}</div>
                    </div>
                </div>`;
        });
        c.scrollTop = c.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('msgInput');
        const val = i.value.trim();
        if (!val) return;
        i.value = "";

        const { error } = await _supabase
            .from('messages')
            .insert([{ user_name: nick, text: val, room_id: room }]);

        if (error) {
            alert("შეცდომა ბაზაში: " + error.message);
        }
    }

    window.onload = () => {
        load();
        
        // Realtime მოსმენა
        _supabase
            .channel('any')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
                if (p.new.room_id === room) load();
            })
            .subscribe();
    };
</script>

</body>
</html>
