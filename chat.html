<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIFMANIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* მარცხენა პანელი */
        .sidebar { width: 280px; background: #050000; border-right: 2px solid #ff0000; display: flex; flex-direction: column; padding: 10px; box-shadow: 5px 0 15px rgba(255,0,0,0.3); }
        .profile { text-align: center; padding: 15px; border-bottom: 1px solid #300; margin-bottom: 10px; }
        .ava { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #ff0000; object-fit: cover; box-shadow: 0 0 10px #ff0000; }
        .u-nick { display: block; color: #ff0000; font-size: 20px; font-weight: bold; margin-top: 8px; }
        .u-role { display: block; color: gold; font-size: 13px; font-weight: bold; }
        .u-status { display: block; margin-top: 8px; font-size: 12px; color: #fff; border: 1px dashed #444; padding: 5px; border-radius: 8px; }

        /* ოთახების სია */
        .rooms { flex: 1; overflow-y: auto; margin-top: 10px; }
        .room { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #222; color: #fff; text-align: left; margin-bottom: 5px; cursor: pointer; border-radius: 6px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .room:hover { background: #1a0000; border-color: #ff0000; }
        .room.active { background: #200; border-color: #ff0000; box-shadow: inset 0 0 10px #ff0000; }

        /* ჩატის მხარე */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #000; }
        .header { padding: 12px; border-bottom: 1px solid #ff0000; color: #ff0000; text-align: center; font-weight: bold; font-size: 14px; background: #050000; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { background: #080808; padding: 12px; border-radius: 12px; border-left: 4px solid #ff0000; max-width: 85%; align-self: flex-start; }
        .m-nick { color: #ff0000; font-weight: bold; font-size: 13px; margin-bottom: 4px; display: block; cursor: pointer; text-decoration: none; }
        .m-text { color: #eee; font-size: 14px; line-height: 1.4; word-wrap: break-word; }

        /* ინპუტის ზოლი */
        .footer { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid #222; align-items: center; }
        input { flex: 1; padding: 12px; background: #0a0a0a; border: 1px solid #444; color: white; border-radius: 10px; outline: none; }
        input:focus { border-color: #ff0000; }
        .send-btn { background: #ff0000; color: #000; border: none; width: 50px; height: 50px; border-radius: 12px; font-size: 24px; cursor: pointer; box-shadow: 0 0 10px #ff0000; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }

        .exit { color: #666; background: none; border: none; padding: 10px; cursor: pointer; font-weight: bold; font-size: 12px; margin-top: auto; }
        .exit:hover { color: #ff0000; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile">
        <img id="m-ava" src="https://i.ibb.co/v3m6y6R/avatar.png" class="ava" onclick="location.href='profile.html'">
        <span id="m-nick" class="u-nick">...</span>
        <span id="m-role" class="u-role">...</span>
        <span class="u-status">💬 ❤️☠️❤️☠️❤️</span>
    </div>

    <div class="rooms">
        <div class="room active">☕ კაფე-ბარი</div>
        <div class="room">💎 ვიპ საუბრები</div>
        <div class="room">🧛 მაფიის ღამე</div>
        <div class="room">🕵️ გამოძიება</div>
        <div class="room">🔐 შიფროგრამა</div>
        <div class="room">❓ ვიქტორინა</div>
        <div class="room">😵 ჩამოხრჩობანა</div>
        <div class="room">🃏 კარტი</div>
        <div class="room">🎰 კაზინო</div>
        <div class="room">⚔️ დუელი</div>
        <div class="room">🏰 ციხესიმაგრე</div>
        <div class="room">🎤 კარაოკე</div>
    </div>
    
    <button class="exit" onclick="localStorage.clear(); location.href='index.html'">🚪 გასვლა</button>
</div>

<div class="chat-area">
    <div class="header">KAIFMANIA - კაფე-ბარი</div>
    <div id="msgs"></div>
    <div class="footer">
        <input type="text" id="m-inp" placeholder="დაწერე რამე...">
        <button class="send-btn" onclick="send()">✈️</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');

    async function load() {
        if (!myNick) return;
        
        // პროფილის ჩატვირთვა
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            document.getElementById('m-nick').innerText = p.username;
            document.getElementById('m-role').innerText = (p.role === 'Owner') ? "დამფუძნებელი 👑" : "მონაწილე";
            if (p.avatar_url) document.getElementById('m-ava').src = p.avatar_url;
        }

        // მესიჯების ჩატვირთვა
        const { data: msgs } = await _s.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
        const box = document.getElementById('msgs');
        box.innerHTML = '';
        if (msgs) {
            msgs.forEach(m => {
                const name = m.username || "უცნობი";
                box.innerHTML += `<div class="bubble">
                    <a href="profile.html?user=${name}" class="m-nick">${name}</a>
                    <span class="m-text">${m.text}</span>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function send() {
        const inp = document.getElementById('m-inp');
        if (!inp.value.trim()) return;
        await _s.from('messages').insert([{ username: myNick, text: inp.value }]);
        inp.value = '';
        load();
    }

    _s.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, load).subscribe();

    window.onload = load;
    document.getElementById('m-inp').onkeypress = (e) => { if(e.key === "Enter") send(); };
</script>

</body>
</html>
