<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ზედა პანელი */
        .topbar { background: #000; height: 60px; display: flex; align-items: center; border-bottom: 2px solid #500; z-index: 9999; position: relative; padding: 0 15px; }
        .menu-btn { cursor: pointer; font-size: 30px; color: red; }
        .room-title { flex: 1; text-align: center; color: red; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px red; }

        /* ჩამოსაშლელი მენიუ - აი აქ გასწორდა! */
        .dropdown-menu { 
            position: fixed; top: -100%; left: 0; width: 100%; height: auto;
            background: rgba(10, 0, 0, 0.95); border-bottom: 2px solid red; 
            transition: 0.5s ease-in-out; z-index: 9000; 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; padding: 80px 15px 20px 15px; box-sizing: border-box;
        }
        .dropdown-menu.active { top: 0; }

        .room-item { padding: 12px; background: #1a0000; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-size: 13px; text-align: center; color: #ccc; }
        .room-item:hover { background: red; color: white; }

        /* ჩატის ზონა */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: #050000; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #111; padding: 10px; border-radius: 8px; border-left: 3px solid red; align-self: flex-start; }
        .u { font-weight: bold; color: red; font-size: 12px; margin-bottom: 3px; }

        /* ქვედა პანელი */
        .input-zone { background: #000; padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; }
        
        /* ნამდვილი თვითმფრინავი */
        .plane-btn { background: none; border: none; cursor: pointer; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .plane-btn svg { width: 45px; height: 45px; filter: drop-shadow(0 0 5px red); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 8000; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="room-title" id="room-name">კაფე-ბარი</div>
</div>

<div class="dropdown-menu" id="navMenu">
    <div class="room-item" onclick="changeRoom('კაფე-ბარი')">☕️ კაფე-ბარი</div>
    <div class="room-item" onclick="changeRoom('VIP')">💎 VIP</div>
    <div class="room-item" onclick="changeRoom('მაფია')">🕵️ მაფია</div>
    <div class="room-item" onclick="changeRoom('ადმინი')">🛡️ ადმინი</div>
    <div class="room-item" style="grid-column: 1 / -1; color:red;" onclick="location.reload()">🚪 გასვლა</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="minput" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
    <button class="plane-btn" onclick="send()">
        <svg viewBox="0 0 24 24">
            <path fill="white" d="M21,16L21,14L13,9L13,3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/>
            <path fill="red" d="M10,9V3.5A1.5,1.5 0 0,1 11.5,2A1.5,1.5 0 0,1 13,3.5V9L11.5,10L10,9M10,19L11.5,18L13,19V13.5L11.5,12.5L10,13.5V19Z"/>
        </svg>
    </button>
</div>

<script>
    const _supabase = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_TdfzZOd_1s6B7rDNfhwn6Q_mU4ecdkn");
    let room = "კაფე-ბარი";
    let nick = localStorage.getItem('nickname') || "User";

    function toggleMenu() {
        document.getElementById('navMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function load() {
        const { data } = await _supabase.from('messages').select('*').eq('room_name', room).order('created_at', { ascending: true });
        const c = document.getElementById('chat');
        c.innerHTML = "";
        data?.forEach(m => { c.innerHTML += `<div class="msg"><div class="u">${m.user_nam}</div>${m.text}</div>`; });
        c.scrollTop = c.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('minput');
        if (!i.value.trim()) return;
        await _supabase.from('messages').insert([{ user_nam: nick, text: i.value, room_name: room }]);
        i.value = "";
        load();
    }

    function changeRoom(n) {
        room = n;
        document.getElementById('room-name').innerText = n;
        toggleMenu();
        load();
    }

    window.onload = () => {
        load();
        _supabase.channel('c').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => load()).subscribe();
    };
</script>
</body>
</html>
