<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { background: #111; padding: 15px; border-bottom: 2px solid red; text-align: center; box-shadow: 0 0 15px red; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1a1a1a; padding: 10px; border-radius: 10px; border-left: 3px solid red; max-width: 80%; }
        .u-name { color: red; font-weight: bold; cursor: pointer; text-decoration: none; margin-right: 8px; }
        .u-name:hover { text-decoration: underline; }
        .input-area { background: #111; padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; outline: none; }
        button { padding: 12px 25px; background: red; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h2 id="welcome">კაიფმანია ჩატი 😎</h2>
</header>

<div id="chat-box"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="დაწერე რამე...">
    <button onclick="sendMsg()">გაგზავნა</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');

    if (!myNick) { window.location.href = "index.html"; }
    document.getElementById('welcome').innerText = "მოგესალმები, " + myNick;

    // შეტყობინებების წამოღება
    async function loadMsgs() {
        const { data } = await _s.from('messages').select('*').order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        data.forEach(m => {
            box.innerHTML += `
                <div class="msg">
                    <a href="profile.html?user=${m.username}" class="u-name">${m.username}:</a>
                    <span>${m.text}</span>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    // გაგზავნა
    async function sendMsg() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;

        await _s.from('messages').insert([{ username: myNick, text: input.value }]);
        input.value = '';
        loadMsgs();
    }

    // რეალურ დროში განახლება
    _s.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadMsgs).subscribe();

    loadMsgs();
</script>
</body>
</html>
