<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: #000; height: 60px; display: flex; align-items: center; border-bottom: 2px solid red; padding: 0 15px; z-index: 1001; }
        .burger { font-size: 30px; color: red; cursor: pointer; padding: 10px; }
        .title { flex: 1; text-align: center; color: red; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px red; }

        .side-menu { position: fixed; top: 0; left: -280px; width: 250px; height: 100vh; background: #0a0000; border-right: 2px solid red; transition: 0.3s ease; z-index: 2000; display: flex; flex-direction: column; padding: 70px 15px 20px; overflow-y: auto; }
        .side-menu.active { left: 0; }
        .menu-item { padding: 12px; margin: 4px 0; background: #150000; border: 1px solid #333; border-radius: 8px; cursor: pointer; text-align: left; color: #ccc; font-size: 14px; }
        .menu-item:hover { background: red; color: white; }

        /* ჩატი */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: #050000; display: flex; flex-direction: column; gap: 12px; }
        
        /* მესიჯის ვიზუალი ავატარით */
        .msg-box { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
        .av { width: 38px; height: 38px; border-radius: 50%; border: 1px solid red; object-fit: cover; flex-shrink: 0; }
        .txt-cont { background: #111; padding: 8px 12px; border-radius: 10px; border-left: 3px solid red; }
        .u-name { font-weight: bold; color: red; font-size: 11px; margin-bottom: 2px; }

        .input-zone { background: #000; padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; font-size: 16px; }
        .plane-btn { background: none; border: none; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
    <div class="burger" onclick="toggleMenu()">☰</div>
    <div class="title" id="room-title">☕️ კაფე-ბარი</div>
</div>

<div class="side-menu" id="sideMenu">
    <div class="menu-item" onclick="changeRoom('☕️ კაფე-ბარი')">☕️ კაფე-ბარი</div>
    <div class="menu-item" onclick="changeRoom('💎 VIP')">💎 VIP</div>
    <div class="menu-item" onclick="changeRoom('🕵️ მაფიის ღამე')">🕵️ მაფიის ღამე</div>
    <div class="menu-item" onclick="changeRoom('💬შიფროგრამა ')">💬შიფროგრამა</div>
     <div class="menu-item" onclick="changeRoom('💬ვიქტორინა')">💬 ვიქტორინა</div>
     <div class="menu-item" onclick="changeRoom('💬ჩამოხრჩობანა')">💬ჩამოხრჩობანა</div>
     <div class="menu-item" onclick="changeRoom('💬ჯოკერი')">💬 ჯოკერი</div>
     <div class="menu-item" onclick="changeRoom('💬დახმარება')">💬დახმარება/div>
      <div class="menu-item" onclick="changeRoom('💬ადმინისტრაცია')">💬ადმინისტრაცია</div>
    <div class="menu-item" style="color:red; margin-top: 20px;" onclick="location.reload()">🚪 გასვლა</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
    <button class="plane-btn" onclick="send()">
        <svg viewBox="0 0 24 24" width="30" height="30"><path fill="red" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
</div>

<script>
    // შენი მონაცემები
    const _supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co", 
        "sb_publishable_TdfzZOd_1s6B7rDNfhwn6Q_mU4ecdkn"
    );

    let room = "☕️ კაფე-ბარი";
    // ნიკი და ავატარი (ავატარი იქმნება ნიკის მიხედვით ავტომატურად)
    let nick = localStorage.getItem('nickname') || "მარიამი";
    let myAvatar = "https://ui-avatars.com/api/?name=" + nick + "&background=red&color=fff";

    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function load() {
        const { data, error } = await _supabase
            .from('messages')
            .select('*')
            .eq('room_id', room) 
            .order('created_at', { ascending: true });

        const c = document.getElementById('chat');
        c.innerHTML = "";
        
        data?.forEach(m => { 
            c.innerHTML += `
                <div class="msg-box">
                    <img src="${m.avatar_url || 'https://via.placeholder.com/40'}" class="av">
                    <div class="txt-cont">
                        <div class="u-name">${m.user_name}</div>
                        <div style="font-size: 14px;">${m.text}</div>
                    </div>
                </div>`; 
        });
        c.scrollTop = c.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('msgInput');
        const val = i.value.trim();
        if (!val) return;
        i.value = "";

        const { error } = await _supabase
            .from('messages')
            .insert([{ 
                user_name: nick, 
                text: val, 
                room_id: room,
                avatar_url: myAvatar 
            }]);

        if(error) alert("შეცდომა: " + error.message);
    }

    function changeRoom(n) {
        room = n;
        document.getElementById('room-title').innerText = n;
        toggleMenu();
        load();
    }

    window.onload = () => {
        load();
        _supabase.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => load()).subscribe();
    };
</script>
</body>
</html>
