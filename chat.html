<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>KAIFMANIA CHAT 🔥</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: Arial; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { 
            background: #000; padding: 10px 20px; text-align: center; border-bottom: 2px solid red; 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px red;
        }

        .menu-btn { background: red; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 16px; }

        /* მარცხენა მენიუ - ბოლომდე ჩამოსული სვეტი */
        #sideMenu { 
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%; 
            background: #080808; border-right: 2px solid red; transition: 0.4s ease; z-index: 100;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        #sideMenu.active { left: 0; }

        .room-link { 
            padding: 18px 25px; color: white; text-decoration: none; border-bottom: 1px solid #1a1a1a; 
            cursor: pointer; transition: 0.2s; font-size: 15px; text-transform: uppercase;
        }
        .room-link:hover { background: #200; color: red; padding-left: 35px; }

        /* ჩატის არე */
        #chat-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        #room-title { padding: 12px; background: #111; color: red; text-align: center; font-weight: bold; border-bottom: 1px solid #222; letter-spacing: 1px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 4px 0; border-bottom: 1px solid #111; }
        .u-name { color: red; font-weight: bold; margin-right: 10px; text-shadow: 0 0 5px rgba(255,0,0,0.3); }

        /* საწერი ველი */
        .input-area { background: #000; padding: 20px; display: flex; gap: 12px; border-top: 2px solid #200; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 25px; padding: 14px 20px; color: white; outline: none; font-size: 15px; }
        input:focus { border-color: red; }
        button#sendBtn { background: red; color: white; border: none; border-radius: 25px; padding: 0 30px; cursor: pointer; font-weight: bold; }
        
        /* მენიუს დახურვის ღილაკი შიგნით */
        .close-menu { padding: 20px; text-align: right; color: red; font-weight: bold; cursor: pointer; border-bottom: 2px solid red; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn" onclick="toggleMenu()">☰ ოთახები</button>
    <h2 style="margin:0; letter-spacing: 3px;">KAIFMANIA</h2>
    <div style="width: 80px;"></div>
</header>

<div id="sideMenu">
    <div class="close-menu" onclick="toggleMenu()">დახურვა X</div>
    <div class="room-link" onclick="changeRoom('კაფე-ბარი')">☕ კაფე-ბარი</div>
    <div class="room-link" onclick="changeRoom('ვიპ საუბრები')">💎 ვიპ საუბრები</div>
    <div class="room-link" onclick="changeRoom('გამოძიება')">🔍 გამოძიება</div>
    <div class="room-link" onclick="changeRoom('შიფროგრამა')">📟 შიფროგრამა</div>
    <div class="room-link" onclick="changeRoom('ვიქტორინა')">❓ ვიქტორინა</div>
    <div class="room-link" onclick="changeRoom('ჩამოხრჩობანა')">💀 ჩამოხრჩობანა</div>
    <div class="room-link" onclick="changeRoom('მაფიის ღამე')">🌑 მაფიის ღამე</div>
    <div class="room-link" onclick="changeRoom('ჯოკერი')">🃏 ჯოკერი</div>
    <div class="room-link" onclick="changeRoom('ნარდი')">🎲 ნარდი</div>
    <div class="room-link" onclick="changeRoom('მუსიკა')">🎵 მუსიკა</div>
    <div class="room-link" onclick="changeRoom('იუმორი')">😂 იუმორი</div>
    <div class="room-link" onclick="changeRoom('ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
    <div class="room-link" onclick="changeRoom('დახმარება')">🆘 დახმარება</div>
    <div class="room-link" onclick="changeRoom('ფორუმი')">📝 ფორუმი</div>
    <div class="room-link" onclick="location.href='index.html'" style="color: #888;">🚪 გასვლა</div>
</div>

<div id="chat-container">
    <div id="room-title">ოთახი: კაფე-ბარი</div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="დაწერე რამე..." autocomplete="off">
        <button id="sendBtn" onclick="sendMsg()">გაგზავნა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');
    let currentRoom = "კაფე-ბარი";

    if (!myNick) { window.location.href = "index.html"; }

    function toggleMenu() { document.getElementById("sideMenu").classList.toggle("active"); }

    async function changeRoom(roomName) {
        currentRoom = roomName;
        document.getElementById("room-title").innerText = "ოთახი: " + roomName;
        toggleMenu(); 
        loadMsgs();
    }

    async function loadMsgs() {
        const { data } = await _s.from('messages').select('*').eq('room', currentRoom).order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        if (data) {
            data.forEach(m => {
                box.innerHTML += `<div class="msg"><span class="u-name">${m.username}:</span><span>${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        await _s.from('messages').insert([{ username: myNick, text: input.value.trim(), room: currentRoom }]);
        input.value = '';
    }

    _s.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadMsgs).subscribe();
    loadMsgs();
    document.getElementById("msgInput").addEventListener("keyup", (e) => { if (e.key === "Enter") sendMsg(); });
</script>
</body>
</html>
