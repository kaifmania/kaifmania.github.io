<!DOCTYPE html>
<html lang="ka" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>კაიფმანია — ჩატი 😎🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --accent: #ff4400;
  --accent2: #cc1100;
  --bg: #0a0a0a;
  --bg2: #111;
  --bg3: #1a1a1a;
  --bg4: #222;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --text2: #aaa;
  --text3: #666;
  --online: #22cc66;
  --sidebar-w: 220px;
  --panel-w: 260px;
  --header-h: 52px;
  --radius: 14px;
  --glow: rgba(255,68,0,0.25);
}
[data-theme="light"] {
  --bg:#f0f0f0; --bg2:#fff; --bg3:#e8e8e8; --bg4:#d8d8d8;
  --border:#ccc; --text:#111; --text2:#555; --text3:#999;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* PARTICLES */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;bottom:-40px;animation:particleUp linear infinite;opacity:0;user-select:none;filter:drop-shadow(0 0 3px var(--accent));}
@keyframes particleUp{0%{transform:translateY(0) rotate(-10deg) scale(1);opacity:0;}5%{opacity:.7;}80%{opacity:.2;}100%{transform:translateY(-105vh) rotate(20deg) scale(0.2);opacity:0;}}

/* LAYOUT */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}

/* TOPBAR */
#topbar{height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,0.4);}
#logo{font-weight:900;font-size:1.05rem;background:linear-gradient(135deg,#ff6600,#ff2200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.topbar-spacer{flex:1;}
.icon-btn{width:34px;height:34px;border-radius:9px;border:none;background:var(--bg3);color:var(--text);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;position:relative;flex-shrink:0;}
.icon-btn:hover{background:var(--bg4);transform:scale(1.06);}
.badge{position:absolute;top:-3px;right:-3px;background:var(--accent);color:#fff;font-size:.55rem;font-weight:900;padding:1px 4px;border-radius:99px;min-width:15px;text-align:center;}

#main{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#sidebar-header{padding:10px;border-bottom:1px solid var(--border);}
#sidebar-header h3{font-size:.65rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.search-box{width:100%;padding:7px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:.78rem;outline:none;}
.search-box:focus{border-color:var(--accent);}
#room-list{flex:1;overflow-y:auto;padding:6px;}

/* Room group */
.room-group{margin-bottom:4px;}
.room-group-header{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;user-select:none;transition:background .15s;}
.room-group-header:hover{background:var(--bg3);}
.room-group-header .arrow{font-size:.6rem;transition:transform .2s;margin-left:auto;}
.room-group-header.open .arrow{transform:rotate(90deg);}
.room-group-items{overflow:hidden;max-height:0;transition:max-height .3s ease;}
.room-group-items.open{max-height:600px;}
.room-item{padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px;margin-bottom:1px;}
.room-item:hover{background:var(--bg3);}
.room-item.active{background:rgba(255,68,0,.15);border:1px solid rgba(255,68,0,.3);}
.room-icon{font-size:1rem;flex-shrink:0;}
.room-info{flex:1;min-width:0;}
.room-name{font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.room-num{font-size:.65rem;color:var(--text3);}
.room-unread{background:var(--accent);color:#fff;font-size:.6rem;font-weight:900;padding:2px 5px;border-radius:99px;flex-shrink:0;}

/* CHAT AREA */
#chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#chat-header{height:var(--header-h);padding:0 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
#chat-header-name{font-weight:900;font-size:.95rem;}
#online-count{font-size:.7rem;color:var(--online);background:rgba(34,204,102,.1);padding:3px 7px;border-radius:99px;}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:1px;}
.msg-row{display:flex;align-items:flex-end;gap:7px;padding:2px 0;}
.msg-row.own{flex-direction:row-reverse;}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.72rem;flex-shrink:0;cursor:pointer;}
.msg-bubble{max-width:60%;padding:7px 11px;border-radius:14px;font-size:.83rem;line-height:1.5;position:relative;cursor:pointer;background:var(--bg3);border:1px solid var(--border);}
.msg-row.own .msg-bubble{background:linear-gradient(135deg,rgba(255,68,0,.22),rgba(180,20,0,.18));border-color:rgba(255,68,0,.32);}
.msg-meta{font-size:.6rem;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:3px;}
.msg-row.own .msg-meta{justify-content:flex-end;}
.seen-tick{color:#4af;font-size:.68rem;}
.msg-sender{font-size:.66rem;font-weight:700;margin-bottom:2px;padding-left:3px;}
.role-badge{font-size:.52rem;padding:1px 4px;border-radius:4px;font-weight:700;letter-spacing:.04em;}
.role-founder{background:rgba(255,200,0,.2);color:#ffcc00;border:1px solid rgba(255,200,0,.4);}
.role-admin{background:rgba(255,68,0,.2);color:#ff6600;border:1px solid rgba(255,68,0,.4);}
.msg-reactions{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.reaction-chip{background:var(--bg4);border:1px solid var(--border);border-radius:99px;padding:2px 6px;font-size:.72rem;cursor:pointer;transition:transform .1s;display:flex;align-items:center;gap:2px;}
.reaction-chip:hover{transform:scale(1.1);}
.reaction-chip.mine{border-color:var(--accent);background:rgba(255,68,0,.1);}

/* Typing */
#typing-indicator{padding:5px 14px;font-size:.7rem;color:var(--text3);min-height:20px;flex-shrink:0;}

/* INPUT BAR — ALWAYS VISIBLE */
#input-area{border-top:1px solid var(--border);background:var(--bg2);padding:8px 10px;flex-shrink:0;}
#format-bar{display:flex;gap:4px;margin-bottom:6px;align-items:center;}
.fmt-btn{padding:4px 8px;border:1px solid var(--border);border-radius:7px;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:.73rem;font-weight:700;transition:all .15s;font-family:inherit;}
.fmt-btn:hover{background:var(--bg4);color:var(--text);}
.fmt-btn.active{background:rgba(255,68,0,.2);border-color:var(--accent);color:var(--accent);}
#color-picker-input{width:22px;height:22px;border:none;padding:0;border-radius:6px;cursor:pointer;background:none;}
#input-row{display:flex;gap:7px;align-items:flex-end;}
#emoji-toggle{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#msg-input{flex:1;padding:9px 12px;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:.85rem;outline:none;resize:none;min-height:38px;max-height:110px;transition:border-color .2s;line-height:1.4;}
#msg-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
.send-btn{width:38px;height:38px;border-radius:11px;border:none;background:linear-gradient(135deg,#ff5500,#cc1100);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;box-shadow:0 3px 14px rgba(255,68,0,.35);flex-shrink:0;}
.send-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,68,0,.5);}

/* EMOJI PANEL */
#emoji-panel{display:none;position:absolute;bottom:75px;right:10px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:10px;box-shadow:0 8px 40px rgba(0,0,0,.5);z-index:100;width:290px;}
#emoji-panel.open{display:block;}
#emoji-panel h4{font-size:.68rem;color:var(--text3);margin-bottom:7px;}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;}
.emoji-cell{font-size:1.2rem;text-align:center;padding:4px;border-radius:7px;cursor:pointer;transition:background .1s;}
.emoji-cell:hover{background:var(--bg3);}
.animated-emoji{animation:emojiPulse 1.5s ease-in-out infinite;}
@keyframes emojiPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.3) rotate(10deg);}}

/* RIGHT PANEL */
#right-panel{width:var(--panel-w);flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);}
.ptab{flex:1;padding:11px 3px;border:none;background:none;color:var(--text3);font-family:inherit;font-size:.7rem;font-weight:700;cursor:pointer;transition:color .15s,border-bottom .15s;border-bottom:2px solid transparent;}
.ptab.active{color:var(--accent);border-bottom-color:var(--accent);}
.panel-content{flex:1;overflow-y:auto;padding:8px;}
.panel-section{display:none;}
.panel-section.active{display:block;}

/* User card */
.user-card{display:flex;align-items:center;gap:7px;padding:7px;border-radius:11px;margin-bottom:3px;transition:background .15s;cursor:pointer;position:relative;}
.user-card:hover{background:var(--bg3);}
.user-card .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#660000);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.78rem;flex-shrink:0;position:relative;}
.online-dot{position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:var(--online);border:2px solid var(--bg2);}
.offline-dot{position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:var(--text3);border:2px solid var(--bg2);}
.user-info{flex:1;min-width:0;}
.user-name{font-size:.78rem;font-weight:700;}
.user-status{font-size:.63rem;color:var(--text3);}
.user-actions{display:flex;gap:3px;}
.ua-btn{width:25px;height:25px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ua-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:22px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:modalIn .3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal h3{font-size:.95rem;font-weight:900;margin-bottom:14px;}
.modal-close{float:right;background:none;border:none;color:var(--text3);font-size:1.2rem;cursor:pointer;}
.modal-field{margin-bottom:11px;}
.modal-field label{font-size:.68rem;color:var(--text3);display:block;margin-bottom:3px;}
.modal-input{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:11px;color:var(--text);font-family:inherit;font-size:.83rem;outline:none;}
.modal-input:focus{border-color:var(--accent);}
.modal-btn{width:100%;padding:10px;border:none;border-radius:11px;background:linear-gradient(135deg,#ff5500,#cc1100);color:#fff;font-family:inherit;font-size:.87rem;font-weight:900;cursor:pointer;margin-top:3px;}
.modal-btn:hover{opacity:.9;}
.modal-btn.danger{background:linear-gradient(135deg,#cc0000,#880000);}
.modal-btn.safe{background:linear-gradient(135deg,#00aa44,#006622);}
.modal-btn.outline{background:transparent;border:1px solid var(--border);color:var(--text2);}

/* Profile modal tabs */
.prof-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;}
.prof-tab{flex:1;padding:8px;border:none;background:none;color:var(--text3);font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.prof-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.prof-section{display:none;}
.prof-section.active{display:block;}

/* Album grid inside modal */
.album-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:8px;}
.album-thumb{aspect-ratio:1;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;overflow:hidden;border:1px solid var(--border);}
.album-thumb img{width:100%;height:100%;object-fit:cover;}

/* Status emoji presets */
.status-presets{display:flex;gap:5px;flex-wrap:wrap;margin:7px 0;}
.status-preset{cursor:pointer;font-size:1.3rem;padding:3px;border-radius:7px;transition:background .1s;}
.status-preset:hover{background:var(--bg3);}

/* Reaction picker */
#reaction-picker{display:none;position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:7px;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:300;gap:3px;}
#reaction-picker.open{display:flex;}
.rp-emoji{font-size:1.4rem;padding:4px 5px;border-radius:9px;cursor:pointer;transition:transform .1s;}
.rp-emoji:hover{transform:scale(1.3);}

/* Context menu */
#ctx-menu{display:none;position:fixed;z-index:400;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:5px;box-shadow:0 8px 30px rgba(0,0,0,.5);min-width:150px;}
#ctx-menu.open{display:block;}
.ctx-item{padding:7px 11px;border-radius:8px;font-size:.8rem;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:7px;}
.ctx-item:hover{background:var(--bg3);}
.ctx-item.danger{color:#ff4444;}

/* PM PANEL */
#pm-panel{display:none;position:fixed;right:0;top:0;bottom:0;width:350px;background:var(--bg2);border-left:1px solid var(--border);z-index:150;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.5);}
#pm-panel.open{display:flex;}
#pm-header{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
#pm-close{margin-left:auto;background:none;border:none;color:var(--text3);font-size:1.2rem;cursor:pointer;}
#pm-messages{flex:1;overflow-y:auto;padding:11px;display:flex;flex-direction:column;gap:3px;}
#pm-input-row{padding:9px;border-top:1px solid var(--border);display:flex;gap:7px;}
#pm-input{flex:1;padding:8px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:11px;color:var(--text);font-family:inherit;font-size:.82rem;outline:none;}
#pm-input:focus{border-color:var(--accent);}
#pm-voice-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;}
#pm-voice-btn.recording{background:rgba(255,0,0,.2);border-color:red;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Toast */
#toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:9px 16px;font-size:.8rem;opacity:0;transition:all .3s;z-index:500;box-shadow:0 6px 30px rgba(0,0,0,.4);pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Day separator */
.day-sep{text-align:center;font-size:.66rem;color:var(--text3);margin:8px 0;position:relative;}
.day-sep::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border);}
.day-sep span{background:var(--bg);padding:0 9px;position:relative;}

/* Voice */
.voice-msg{display:flex;align-items:center;gap:7px;padding:7px 11px;background:var(--bg3);border-radius:11px;min-width:150px;}
.voice-play{background:var(--accent);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:.78rem;display:flex;align-items:center;justify-content:center;}
.voice-waveform{flex:1;height:18px;display:flex;align-items:center;gap:2px;}
.wv-bar{width:2px;border-radius:2px;background:var(--accent);opacity:.6;}

/* Status bar */
#status-bar{padding:3px 12px;font-size:.66rem;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--online);}

/* Theme color grid */
#theme-modal .color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:11px 0;}
.color-swatch{width:38px;height:38px;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.color-swatch:hover,.color-swatch.sel{transform:scale(1.1);border-color:#fff;}
</style>
</head>
<body>

<div id="particles"></div>

<div id="app">

<!-- STATUS BAR -->
<div id="status-bar">
  <div class="status-dot"></div>
  <span id="sb-nick">loading...</span>
  <span>•</span>
  <span id="sb-room">ოთახი 1</span>
  <span id="sb-online" style="margin-left:auto"></span>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <div id="logo">კაიფმანია 😎🔥</div>
  <div class="topbar-spacer"></div>
  <button class="icon-btn" title="გამოჩენა/ჩამალვა" onclick="toggleTheme()">🌙</button>
  <button class="icon-btn" title="ფერის თემა" onclick="openModal('theme-modal')">🎨</button>
  <div class="icon-btn" title="პმ" onclick="openPmList()" style="cursor:pointer">
    💌 <span class="badge" id="pm-badge" style="display:none">0</span>
  </div>
  <button class="icon-btn" title="პროფილი" onclick="openProfileModal()">👤</button>
  <button class="icon-btn" title="გასვლა" onclick="doLogout()">🚪</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h3>ოთახები</h3>
      <input class="search-box" placeholder="🔍 ძებნა..." oninput="filterRooms(this.value)"/>
    </div>
    <div id="room-list"></div>
  </div>

  <!-- CHAT -->
  <div id="chat-area">
    <div id="chat-header">
      <span id="chat-header-name">ოთახი 1</span>
      <span id="online-count">0 ონლაინ</span>
      <div style="flex:1"></div>
      <button class="icon-btn" onclick="toggleEmojiPanel()" title="სმაილები">😀</button>
    </div>

    <div id="messages">
      <div class="day-sep"><span>დღეს</span></div>
    </div>

    <div id="typing-indicator"></div>

    <!-- Emoji panel (positioned inside chat-area) -->
    <div id="emoji-panel">
      <h4>სმაილები</h4>
      <div class="emoji-grid" id="emoji-grid"></div>
      <div id="animated-emojis-section" style="display:none;margin-top:9px;">
        <h4>ანიმაციური (ადმინი)</h4>
        <div class="emoji-grid" id="anim-emoji-grid"></div>
      </div>
    </div>

    <!-- INPUT BAR — always at bottom of chat-area -->
    <div id="input-area">
      <div id="format-bar">
        <button class="fmt-btn" id="fmt-bold" onclick="toggleFmt('bold')" title="სქლად"><b>B</b></button>
        <button class="fmt-btn" id="fmt-italic" onclick="toggleFmt('italic')" title="დახრილი"><i>I</i></button>
        <button class="fmt-btn" id="fmt-reply" onclick="toggleReply()" title="პასუხი">↩ პასუხი</button>
        <input type="color" id="color-picker-input" value="#ff4400" onchange="setTextColor(this.value)" title="ტექსტის ფერი"/>
      </div>

        <button id="emoji-toggle" onclick="toggleEmojiPanel()">😊</button>

<script>
const SUPABASE_URL = 'https://brggiyhfzfbmlirqfgpo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── STATE ── */
let ME = null;
let currentRoom = 1;
let currentPmUser = null;
let replyTo = null;
let typingTimeout = null;
let activeCtxMsgId = null;
let msgFormat = { bold:false, italic:false, color:null };
let animatedEmojis = ['🎉','💥','✨','🌟','🚀','💫'];
let mediaRecorder = null;
let recordChunks = [];
let channelRoom = null;
let channelPresence = null;
let channelPm = null;
let onlineUsers = {};
let friends = [];
let pmUnread = 0;

/* Room groups */
const ROOM_GROUPS = [
  { name:'🔥 პოპულარული', open:true, rooms:[
    {id:1,name:'ოთახი 1',icon:'🔥'},
    {id:2,name:'ოთახი 2',icon:'💖'},
    {id:3,name:'ოთახი 3',icon:'🎮'},
  ]},
  { name:'🎵 გართობა', open:false, rooms:[
    {id:4,name:'მუსიკა',icon:'🎵'},
    {id:5,name:'კინო',icon:'🎬'},
    {id:6,name:'სპორტი',icon:'⚽'},
  ]},
  { name:'💬 სხვა', open:false, rooms:[
    {id:7,name:'ოთახი 7',icon:'🌙'},
    {id:8,name:'ოთახი 8',icon:'⚡'},
    {id:9,name:'ოთახი 9',icon:'🌸'},
    {id:10,name:'ოთახი 10',icon:'💎'},
    {id:11,name:'ოთახი 11',icon:'🎯'},
    {id:12,name:'ოთახი 12',icon:'🏆'},
  ]},
];

const ROOMS_FLAT = ROOM_GROUPS.flatMap(g => g.rooms);

const EMOJIS = ['😀','😂','🥰','😍','🤩','😎','🥳','😜','🤪','😏',
  '❤️','💖','💗','🔥','✨','💯','👍','🙌','💪','🫶',
  '😢','😭','😤','🤔','🤯','😱','🥹','🫠','😴','🤑'];

/* ── INIT ── */
async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) { window.location.href='index.html'; return; }

  const u = session.user;
  const meta = u.user_metadata || {};
  ME = {
    id: u.id, email: u.email,
    nickname: meta.nickname || u.email.split('@')[0],
    role: meta.role || 'user',
    status: meta.status || '😎 ონლაინ',
    color: meta.color || '#ff4400',
    emotion: meta.emotion || ''
  };

  document.getElementById('sb-nick').textContent = ME.nickname;
  document.documentElement.style.setProperty('--accent', ME.color);
  if (ME.role === 'admin' || ME.role === 'founder') {
    document.getElementById('admin-tab').style.display = 'block';
  }

  loadThemeFromStorage();
  buildRooms();
  buildEmojiGrid();
  spawnParticles();
  await joinRoom(1);
  loadFriends();
  subscribePm();

  // close emoji panel on outside click
  document.addEventListener('click', e => {
    const ep = document.getElementById('emoji-panel');
    if (ep.classList.contains('open') && !ep.contains(e.target) &&
        !document.getElementById('emoji-toggle').contains(e.target) &&
        !document.querySelector('[onclick="toggleEmojiPanel()"]').contains(e.target)) {
      ep.classList.remove('open');
    }
  });
}

/* ── ROOMS (collapsible groups) ── */
function buildRooms() {
  const list = document.getElementById('room-list');
  list.innerHTML = '';
  ROOM_GROUPS.forEach((grp, gi) => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'room-group';

    const header = document.createElement('div');
    header.className = 'room-group-header' + (grp.open ? ' open' : '');
    header.innerHTML = `<span>${grp.name}</span><span class="arrow">▶</span>`;
    header.onclick = () => {
      grp.open = !grp.open;
      header.classList.toggle('open', grp.open);
      itemsDiv.classList.toggle('open', grp.open);
    };

    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'room-group-items' + (grp.open ? ' open' : '');

    grp.rooms.forEach(r => {
      const div = document.createElement('div');
      div.className = 'room-item' + (r.id === currentRoom ? ' active' : '');
      div.id = `room-${r.id}`;
      div.innerHTML = `<div class="room-icon">${r.icon}</div>
        <div class="room-info">
          <div class="room-name">${r.name}</div>
          <div class="room-num">#${r.id}</div>
        </div>`;
      div.onclick = () => joinRoom(r.id);
      itemsDiv.appendChild(div);
    });

    groupDiv.appendChild(header);
    groupDiv.appendChild(itemsDiv);
    list.appendChild(groupDiv);
  });
}

function filterRooms(q) {
  ROOMS_FLAT.forEach(r => {
    const el = document.getElementById(`room-${r.id}`);
    if (el) el.style.display = r.name.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

async function joinRoom(id) {
  if (channelRoom) await sb.removeChannel(channelRoom);
  if (channelPresence) await sb.removeChannel(channelPresence);

  currentRoom = id;
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
  const ri = document.getElementById(`room-${id}`);
  if (ri) ri.classList.add('active');

  const room = ROOMS_FLAT.find(r => r.id === id);
  document.getElementById('chat-header-name').textContent = room ? `${room.icon} ${room.name}` : `ოთახი ${id}`;
  document.getElementById('sb-room').textContent = room ? room.name : `ოთახი ${id}`;
  document.getElementById('messages').innerHTML = '<div class="day-sep"><span>დღეს</span></div>';

  await loadMessages(id);

  channelRoom = sb.channel(`room-${id}`)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`room_id=eq.${id}`}, payload => {
      if (payload.new.user_id !== ME.id) appendMessage(payload.new);
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'messages',filter:`room_id=eq.${id}`}, payload => {
      const el = document.getElementById(`msg-${payload.old.id}`);
      if (el) el.remove();
    })
    .on('broadcast',{event:'typing'}, payload => {
      if (payload.payload.user_id !== ME.id) showTyping(payload.payload.nickname);
    })
    .on('broadcast',{event:'reaction'}, payload => {
      updateReactionUI(payload.payload);
    })
    .subscribe();

  channelPresence = sb.channel(`presence-${id}`,{config:{presence:{key:ME.id}}});
  channelPresence
    .on('presence',{event:'sync'},() => {
      const state = channelPresence.presenceState();
      onlineUsers = {};
      Object.values(state).forEach(arr => arr.forEach(u => { onlineUsers[u.user_id] = u; }));
      renderOnlineList();
    })
    .subscribe(async status => {
      if (status === 'SUBSCRIBED') {
        await channelPresence.track({user_id:ME.id,nickname:ME.nickname,role:ME.role,status:ME.status,color:ME.color});
      }
    });
}

/* ── MESSAGES ── */
async function loadMessages(roomId) {
  const { data } = await sb.from('messages')
    .select('*').eq('room_id', roomId)
    .order('created_at',{ascending:true}).limit(80);
  if (data) data.forEach(m => appendMessage(m, true));
  scrollBottom();
}

function appendMessage(m, initial=false) {
  const isOwn = m.user_id === ME.id;
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row' + (isOwn ? ' own' : '');
  row.id = `msg-${m.id}`;

  const time = new Date(m.created_at).toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});
  const nick = m.nickname || '?';
  const roleTag = m.role==='founder'
    ? `<span class="role-badge role-founder">👑 დამფ.</span>`
    : m.role==='admin' ? `<span class="role-badge role-admin">⚡ ადმ.</span>` : '';

  const reactions = m.reactions ? Object.entries(m.reactions).map(([e,u]) =>
    `<span class="reaction-chip${u.includes(ME.id)?' mine':''}" onclick="addReaction('${e}','${m.id}')">${e}<span style="font-size:.63rem;opacity:.8">${u.length}</span></span>`
  ).join('') : '';

  let content = m.content || '';
  let style = '';
  if (m.format) {
    const f = m.format;
    if (f.bold)   content = `<b>${content}</b>`;
    if (f.italic) content = `<i>${content}</i>`;
    if (f.color)  style = `color:${f.color};`;
  }

  const replyHtml = m.reply_to
    ? `<div style="font-size:.66rem;color:var(--text3);border-left:2px solid var(--accent);padding-left:5px;margin-bottom:3px;opacity:.8">${m.reply_text||'...'}</div>`
    : '';

  let bodyHtml = '';
  if (m.type === 'voice') {
    bodyHtml = `<div class="voice-msg">${voiceWaveform()}<button class="voice-play" onclick="playVoice('${m.voice_url}')">▶</button><span style="font-size:.66rem;color:var(--text3)">${m.duration||'0:00'}</span></div>`;
  } else {
    bodyHtml = `<div style="${style}">${replyHtml}${content}</div>`;
  }

  row.innerHTML = `
    ${!isOwn ? `<div class="avatar" onclick="openUserProfile('${m.user_id}','${nick}','${m.role||'user'}')">${nick[0]?.toUpperCase()||'?'}</div>` : ''}
    <div>
      ${!isOwn ? `<div class="msg-sender">${nick} ${roleTag}</div>` : ''}
      <div class="msg-bubble" data-id="${m.id}" oncontextmenu="openCtxMenu(event,'${m.id}',${isOwn})">
        ${bodyHtml}
        ${reactions ? `<div class="msg-reactions">${reactions}</div>` : ''}
      </div>
      <div class="msg-meta">
        <span>${time}</span>
        ${isOwn ? `<span class="seen-tick">${m.seen?'👁️':'✓'}</span>` : ''}
      </div>
    </div>
    ${isOwn ? `<div class="avatar">${ME.nickname[0]?.toUpperCase()||'?'}</div>` : ''}
  `;

  container.appendChild(row);
  if (!initial) scrollBottom();
}

async function sendMsg() {
  const ta = document.getElementById('msg-input');
  let text = ta.value.trim();
  if (!text) return;
  ta.value = ''; autoGrow(ta);

  const payload = {
    room_id: currentRoom,
    user_id: ME.id,
    nickname: ME.nickname,
    role: ME.role,
    content: text,
    format: {...msgFormat},
    reply_to: replyTo?.id || null,
    reply_text: replyTo?.text || null,
    reactions: {}
  };
  clearReply();
  const { data } = await sb.from('messages').insert([payload]).select().single();
  if (data) appendMessage(data);
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
function inputKeydown(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function onTyping() {
  if (channelRoom) channelRoom.send({type:'broadcast',event:'typing',payload:{user_id:ME.id,nickname:ME.nickname}});
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => document.getElementById('typing-indicator').textContent='', 2500);
}
let typingHideTimer = null;

  e.preventDefault();
  activeCtxMsgId = msgId;
  const m = document.getElementById('ctx-menu');
  document.getElementById('ctx-delete').style.display =
    (isOwn || ME.role==='admin' || ME.role==='founder') ? 'flex' : 'none';

function closeCtx() { document.getElementById('ctx-menu').classList.remove('open'); }
function ctxReact() {
  closeCtx();
  const rp = document.getElementById('reaction-picker');
  const el = document.getElementById(`msg-${activeCtxMsgId}`);
  if (!el) return;
  const r = el.getBoundingClientRect();
  rp.style.left = r.left+'px';
  rp.style.top = (r.top - 48)+'px';
  rp.classList.add('open');
  document.addEventListener('click', () => rp.classList.remove('open'), {once:true});

function ctxReply() {
  closeCtx();
  const el = document.getElementById(`msg-${activeCtxMsgId}`);
  const text = el?.querySelector('.msg-bubble div')?.textContent || '...';
  replyTo = { id:activeCtxMsgId, text };
  document.getElementById('fmt-reply').classList.add('active');
  document.getElementById('fmt-reply').textContent = `↩ "${text.slice(0,18)}..."`;
  document.getElementById('msg-input').focus();
}
async function ctxDelete() {
  closeCtx();
  if (!activeCtxMsgId) return;
  await sb.from('messages').delete().eq('id', activeCtxMsgId);
  const el = document.getElementById(`msg-${activeCtxMsgId}`);
  if (el) el.remove();
}

async function addReaction(emoji, msgId) {
  const id = msgId || activeCtxMsgId;
  if (!id) return;
  document.getElementById('reaction-picker').classList.remove('open');
  const { data } = await sb.from('messages').select('reactions').eq('id', id).single();
  if (!data) return;
  const rxns = data.reactions || {};
  if (!rxns[emoji]) rxns[emoji] = [];
  const idx = rxns[emoji].indexOf(ME.id);
  if (idx > -1) rxns[emoji].splice(idx, 1);
  else rxns[emoji].push(ME.id);
  if (rxns[emoji].length === 0) delete rxns[emoji];
  await sb.from('messages').update({reactions:rxns}).eq('id', id);
  if (channelRoom) channelRoom.send({type:'broadcast',event:'reaction',payload:{id,reactions:rxns}});
  updateReactionUI({id, reactions:rxns});
}

function updateReactionUI({id, reactions}) {
  const el = document.getElementById(`msg-${id}`);
  if (!el) return;
  let rxDiv = el.querySelector('.msg-reactions');
  if (!rxDiv) {
    rxDiv = document.createElement('div');
    rxDiv.className = 'msg-reactions';
    el.querySelector('.msg-bubble').appendChild(rxDiv);
  }
  rxDiv.innerHTML = Object.entries(reactions||{}).map(([e,u]) =>
    `<span class="reaction-chip${u.includes(ME.id)?' mine':''}" onclick="addReaction('${e}','${id}')">${e}<span style="font-size:.63rem;opacity:.8">${u.length}</span></span>`
  ).join('');
}

/* PM */
function subscribePm() {
  channelPm = sb.channel(`pm-${ME.id}`)
    .on('broadcast',{event:'pm'}, payload => {
      const d = payload.payload;
      if (currentPmUser && currentPmUser.uid===d.from_id) {
        appendPmMsg(d, false);
        markPmSeen(d.from_id);
      } else {
        pmUnread++;
        updatePmBadge();
        showToast(`💌 ${d.from_nick}: ${d.content}`);
      }
    })
    .on('broadcast',{event:'pm-typing'}, payload => {
      if (currentPmUser?.uid===payload.payload.uid)
        document.getElementById('pm-seen').textContent = 'წერს...';
    })
    .on('broadcast',{event:'pm-seen'}, payload => {
      if (payload.payload.uid===currentPmUser?.uid)
        document.getElementById('pm-seen').textContent = 'ნანახია ✓';
    })
    .subscribe();
}
function updatePmBadge() {
  const b = document.getElementById('pm-badge');
  b.style.display = pmUnread>0 ? 'block' : 'none';
  b.textContent = pmUnread;
}
function openPmList() {
  const c = document.getElementById('pm-list-content');
  c.innerHTML = '<div style="color:var(--text3);font-size:.78rem;margin-bottom:8px;">ბოლო მიმოწერები:</div>';
  if (!friends.length) {
    c.innerHTML += '<div style="font-size:.73rem;color:var(--text3)">მეგობარი არ გყავს 💔</div>';
  }
  friends.forEach(f => {

    div.className = 'user-card';
    div.innerHTML = `<div class="av">${f.nick[0]?.toUpperCase()||'?'}</div><div class="user-info"><div class="user-name">${f.nick}</div></div>`;

    c.appendChild(div);
  });

}
function openPm(uid, nick) {
  currentPmUser = {uid, nick};
  pmUnread = 0; updatePmBadge();
  document.getElementById('pm-name').textContent = nick;
  document.getElementById('pm-av').textContent = nick[0]?.toUpperCase()||'?';
  document.getElementById('pm-seen').textContent = '';
  document.getElementById('pm-messages').innerHTML = '';
  document.getElementById('pm-panel').classList.add('open');
  loadPmHistory(uid);
}
function closePm() {
  document.getElementById('pm-panel').classList.remove('open');
  currentPmUser = null;
}
async function loadPmHistory(uid) {
  const { data } = await sb.from('direct_messages')
    .select('*')
    .or(`and(sender_id.eq.${ME.id},receiver_id.eq.${uid}),and(sender_id.eq.${uid},receiver_id.eq.${ME.id})`)
    .order('created_at',{ascending:true}).limit(60);
  if (data) data.forEach(m => appendPmMsg(m, m.sender_id===ME.id));
  const pmMsgs = document.getElementById('pm-messages');
  pmMsgs.scrollTop = pmMsgs.scrollHeight;
}
function appendPmMsg(m, isOwn) {
  const cont = document.getElementById('pm-messages');
  const div = document.createElement('div');
  const time = new Date(m.created_at||Date.now()).toLocaleTimeString('ka-GE',{hour:'2-digit',minute:'2-digit'});
  let body = m.type==='voice'
    ? `<div class="voice-msg">${voiceWaveform()}<button class="voice-play" onclick="playVoice('${m.voice_url}')">▶</button></div>`
    : (m.content||m.message||'');
  div.innerHTML = `
    <div style="display:flex;justify-content:${isOwn?'flex-end':'flex-start'};margin-bottom:5px;">
      <div style="max-width:75%;padding:7px 11px;background:${isOwn?'linear-gradient(135deg,rgba(255,68,0,.22),rgba(180,20,0,.18))':'var(--bg3)'};border-radius:13px;border:1px solid ${isOwn?'rgba(255,68,0,.32)':'var(--border)'};font-size:.82rem;">
        ${body}
        <div style="font-size:.6rem;color:var(--text3);margin-top:2px;text-align:${isOwn?'right':'left'}">${time}${isOwn&&m.is_read?' 👁️':''}</div>
      </div>
    </div>`;
  cont.appendChild(div);
}
async function sendPm() {
  if (!currentPmUser) return;
  const input = document.getElementById('pm-input');
  const text = input.value.trim(); if (!text) return;
  input.value = '';
  const msg = {
    sender_id: ME.id,
    receiver_id: currentPmUser.uid,
    message: text,
    is_read: false
  };
  const { data } = await sb.from('direct_messages').insert([msg]).select().single().catch(()=>({data:null}));
  const displayMsg = data || {...msg, created_at: new Date().toISOString()};
  appendPmMsg(displayMsg, true);
  const toCh = sb.channel(`pm-${currentPmUser.uid}`);
  toCh.send({type:'broadcast',event:'pm',payload:{from_id:ME.id,from_nick:ME.nickname,to_id:currentPmUser.uid,content:text}});
}
function pmInputKey(e) { if (e.key==='Enter') sendPm(); }
function sendPmTyping() {
  if (!currentPmUser) return;
  sb.channel(`pm-${currentPmUser.uid}`).send({type:'broadcast',event:'pm-typing',payload:{uid:ME.id}});
}
function markPmSeen(uid) {
  sb.channel(`pm-${uid}`).send({type:'broadcast',event:'pm-seen',payload:{uid:ME.id}});
}

/* VOICE RECORDING */
function toggleVoiceRecord() {
  const btn = document.getElementById('pm-voice-btn');
  if (!mediaRecorder || mediaRecorder.state==='inactive') {
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
      mediaRecorder = new MediaRecorder(stream);
      recordChunks = [];
      mediaRecorder.ondataavailable = e => recordChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordChunks,{type:'audio/webm'});
        const url = URL.createObjectURL(blob);
        const msg = {sender_id:ME.id,receiver_id:currentPmUser?.uid,message:'🎤 ვოის',type:'voice',voice_url:url,is_read:false};
        appendPmMsg({...msg,created_at:new Date().toISOString()}, true);
        stream.getTracks().forEach(t=>t.stop());
      };
      mediaRecorder.start();
      btn.classList.add('recording');
      btn.textContent = '⏹';
    }).catch(()=>showToast('მიკროფონი მიუწვდომელია'));
  } else {
    mediaRecorder.stop();
    btn.classList.remove('recording');
    btn.textContent = '🎤';
  }
}
function playVoice(url) { new Audio(url).play(); }
function voiceWaveform() {
  let bars = '';
  for (let i=0;i<10;i++) { const h=4+Math.random()*14; bars+=`<div class="wv-bar" style="height:${h}px"></div>`; }
  return `<div class="voice-waveform">${bars}</div>`;
}

/* THEME */
function setAccent(c1, c2) {
  document.documentElement.style.setProperty('--accent', c1);
  document.documentElement.style.setProperty('--accent2', c2);
  document.documentElement.style.setProperty('--glow', hexToRgba(c1, 0.25));
  localStorage.setItem('kf_accent', c1);
  localStorage.setItem('kf_accent2', c2);
  closeModal('theme-modal');
  showToast('თემა შეცვლილია 🎨');
}
function shadeColor(c, p) {
  const n=parseInt(c.replace('#',''),16),
        r=Math.min(255,Math.max(0,(n>>16)+p)),
        g=Math.min(255,Math.max(0,(n>>8&0xff)+p)),
        b=Math.min(255,Math.max(0,(n&0xff)+p));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function hexToRgba(h, a) {
  const n=parseInt(h.replace('#',''),16);
  return `rgba(${n>>16},${n>>8&0xff},${n&0xff},${a})`;
}
function loadThemeFromStorage() {
  const c1=localStorage.getItem('kf_accent');
  const c2=localStorage.getItem('kf_accent2');
  if (c1) document.documentElement.style.setProperty('--accent',c1);
  if (c2) document.documentElement.style.setProperty('--accent2',c2);
  const dark = localStorage.getItem('kf_dark') !== 'false';
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  document.querySelector('[onclick="toggleTheme()"]').textContent = dark?'🌙':'☀️';
}
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', isDark?'light':'dark');
  document.querySelector('[onclick="toggleTheme()"]').textContent = isDark?'☀️':'🌙';
  localStorage.setItem('kf_dark', String(!isDark));
}

}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target===el) el.classList.remove('open'); });
});

/* TOAST */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

/* PARTICLES */
function spawnParticles() {
  const canvas = document.getElementById('particles');
  const chars = ['🩷','💖','💗','❤️','🔥','💫','✨','🌸','💝','💞','🌺','⭐'];
  function spawn() {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = chars[Math.floor(Math.random()*chars.length)];
    const size = 10+Math.random()*16;
    const left = Math.random()*98;
    const dur  = 7+Math.random()*9;
    const del  = Math.random()*3;
    el.style.cssText = `left:${left}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:${del}s;`;
    canvas.appendChild(el);
    setTimeout(()=>el.remove(),(dur+del+1.5)*1000);
  }
  for (let i=0;i<25;i++) spawn();
  setInterval(spawn, 400);
}

/* LOGOUT */
async function doLogout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

init();
</script>
