<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            background: #000; 
            font-family: 'Arial', sans-serif; 
            color: white; 
            display: flex; 
            overflow: hidden;
        }

        /* მუდმივი გვერდითა მენიუ (არ იკეცება) */
        .side-nav {
            width: 200px;
            background: #0d0d0d;
            border-right: 2px solid red;
            display: flex;
            flex-direction: column;
            padding: 15px 0;
            flex-shrink: 0;
            box-shadow: 5px 0 15px rgba(255, 0, 0, 0.2);
        }

        .side-nav h2 {
            color: red;
            text-align: center;
            font-size: 18px;
            text-shadow: 0 0 10px red;
            margin-bottom: 20px;
        }

        .side-nav a {
            color: #ccc;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 13px;
            transition: 0.3s;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .side-nav a:hover, .side-nav a.active {
            background: rgba(255, 0, 0, 0.1);
            color: white;
            border-left: 3px solid red;
            text-shadow: 0 0 5px red;
        }

        /* ჩატის კონტეინერი */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            position: relative;
        }

        /* ოთახის სახელი ზემოთ */
        .room-header {
            padding: 15px;
            background: rgba(13, 13, 13, 0.8);
            border-bottom: 1px solid #222;
            text-align: center;
            color: red;
            font-weight: bold;
            text-shadow: 0 0 8px red;
        }

        #chatDisplay {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-row {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 80%;
            align-self: flex-start;
            border-left: 2px solid red;
        }

        .msg-author { color: red; font-weight: bold; font-size: 13px; display: block; }
        .msg-time { font-size: 10px; color: #555; float: right; margin-top: 5px; }

        /* საწერი პანელი */
        .input-bar {
            padding: 15px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #222;
        }

        #messageInput {
            flex-grow: 1;
            background: #151515;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 12px 20px;
            color: white;
            outline: none;
        }

        /* ნამდვილი ლურჯი რეაქტიული თვითმფრინავი */
        .send-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.1) rotate(-10deg); }

        .send-btn svg {
            width: 35px;
            height: 35px;
            fill: #0084ff; /* ლურჯი */
            filter: drop-shadow(0 0 10px #0084ff);
        }

        .logout { color: #555 !important; margin-top: auto; border: none !important; }
    </style>
</head>
<body>

    <nav class="side-nav">
        <h2>კაიფმანია 😎</h2>
        <a href="#" onclick="selectRoom('☕ კაფე-ბარი')" class="active">☕ კაფე-ბარი</a>
        <a href="#" onclick="selectRoom('💎 VIP')">💎 VIP</a>
        <a href="#" onclick="selectRoom('🔍 გამოძიება')">🔍 გამოძიება</a>
        <a href="#" onclick="selectRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</a>
        <a href="#" onclick="selectRoom('❓ ვიქტორინა')">❓ ვიქტორინა</a>
        <a href="#" onclick="selectRoom('🪢 ჩამოხრჩობანა')">🪢 ჩამოხრჩობანა</a>
        <a href="#" onclick="selectRoom('🕵️ მაფია')">🕵️ მაფია</a>
        <a href="#" onclick="selectRoom('🃏 ჯოკერი')">🃏 ჯოკერი</a>
        <a href="#" onclick="selectRoom('🎲 ნარდი')">🎲 ნარდი</a>
        <a href="#" onclick="selectRoom('🎵 მუსიკა')">🎵 მუსიკა</a>
        <a href="#" onclick="selectRoom('🛡️ ადმინი')">🛡️ ადმინი</a>
        <a href="#" onclick="logout()" class="logout">🚪 გასვლა</a>
    </nav>

    <div class="chat-container">
        <div id="roomTitle" class="room-header">კაფე-ბარი</div>
        <div id="chatDisplay"></div>

        <div class="input-bar">
            <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება..." onkeyup="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M21.5 11L4 2.25a.75.75 0 00-1.08.88L5.5 12l-2.58 8.87a.75.75 0 001.08.88L21.5 13a1.17 1.17 0 000-2zM5.31 19.33L7.38 12H15a.75.75 0 000-1.5H7.38L5.31 4.67 19.14 12z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const myNick = localStorage.getItem('nickname') || "სტუმარი";

        function selectRoom(name) {
            // ცვლის სათაურს ზემოთ
            document.getElementById("roomTitle").innerText = name;
            
            // ასუფთავებს ჩატს
            document.getElementById("chatDisplay").innerHTML = "";

            // მენიუს გააქტიურება
            const links = document.querySelectorAll('.side-nav a');
            links.forEach(link => {
                link.classList.remove('active');
                if(link.innerText.includes(name)) link.classList.add('active');
            });
        }

        function sendMessage() {
            const inp = document.getElementById("messageInput");
            const chat = document.getElementById("chatDisplay");
            if (inp.value.trim() === "") return;

            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            const msgDiv = document.createElement("div");
            msgDiv.className = "message-row";
            msgDiv.innerHTML = `
                <span class="msg-author">${myNick}</span>
                <span class="msg-text">${inp.value}</span>
                <span class="msg-time">${time}</span>
            `;
            
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
            inp.value = "";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
