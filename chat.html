<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>კაიფმანია — ჩატი, თამაშები, მეგობრები</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7a1fc8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="კაიფმანია">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ========== THEMES ========== */
  body.night {
    --bg: #080610;
    --bg2: #0d0a1c;
    --panel: #110e22;
    --panel2: #171330;
    --panel3: #1e1840;
    --border: rgba(139, 92, 246, 0.25);
    --border2: rgba(139, 92, 246, 0.12);
    --text: #ede9fe;
    --text2: #a78bfa;
    --text3: #6d5a9c;
    --bubble: #14112a;
    --bubble-mine: rgba(109, 40, 217, 0.2);
    --input-bg: #0f0c20;
    --indigo: #5b21b6;
    --indigo2: #8b5cf6;
    --indigo-f: rgba(91, 33, 182, 0.12);
    --glow: rgba(139, 92, 246, 0.35);
    --accent: #a855f7;
    --accent2: #9333ea;
    --online: #a855f7;
    --shadow: rgba(0, 0, 0, 0.7);
    --send-grad: linear-gradient(135deg, #5b21b6, #a855f7);
    --input-focus-shadow: rgba(139, 92, 246, 0.35);
  }

  body.day {
    --bg: #f8f5ff;
    --bg2: #f1ebff;
    --panel: #ffffff;
    --panel2: #faf6ff;
    --panel3: #f3edff;
    --border: rgba(109, 40, 217, 0.15);
    --border2: rgba(109, 40, 217, 0.08);
    --text: #1e0a3c;
    --text2: #6d28d9;
    --text3: #9d7ecb;
    --bubble: #ffffff;
    --bubble-mine: rgba(109, 40, 217, 0.07);
    --input-bg: #ffffff;
    --indigo: #5b21b6;
    --indigo2: #7c3aed;
    --indigo-f: rgba(91, 33, 182, 0.06);
    --glow: rgba(109, 40, 217, 0.15);
    --accent: #7c3aed;
    --accent2: #6d28d9;
    --online: #7c3aed;
    --shadow: rgba(0, 0, 0, 0.1);
    --send-grad: linear-gradient(135deg, #5b21b6, #7c3aed);
    --input-focus-shadow: rgba(109, 40, 217, 0.18);
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Noto Sans Georgian', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.2s;
    display: flex;
    flex-direction: column;
  }

  /* Анимированный фон */
  #bgCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Летающие частицы */
  #floatLayer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .fp {
    position: absolute;
    bottom: -50px;
    user-select: none;
    pointer-events: none;
    will-change: transform, opacity;
    animation: fpRise linear forwards;
    line-height: 1;
  }
  @keyframes fpRise {
    0%   { transform: translate(0,0) rotate(0deg) scale(0.4); opacity: 0; }
    10%  { opacity: 0.9; }
    80%  { opacity: 0.6; }
    100% { transform: translate(var(--fx), calc(-1 * var(--fy))) rotate(var(--fr)) scale(var(--fs)); opacity: 0; }
  }

  @keyframes flicker { 0%,100%{filter:drop-shadow(0 0 6px var(--glow))} 50%{filter:drop-shadow(0 0 20px var(--accent))} }
  @keyframes slideIn { from { opacity:0; transform: translateX(-12px); } to { opacity:1; transform: translateX(0); } }
  @keyframes msgPop { from { opacity:0; transform: translateY(12px) scale(0.96); } to { opacity:1; transform: translateY(0) scale(1); } }
  @keyframes modalIn { from { opacity:0; transform: translateY(20px) scale(0.94); } to { opacity:1; transform: translateY(0) scale(1); } }
  @keyframes planeFly { 0%{ transform:translate(0,0); opacity:1 } 60%{ transform:translate(18px,-18px) rotate(-35deg); opacity:0.4 } 100%{ transform:translate(40px,-40px) rotate(-45deg); opacity:0 } }
  @keyframes typingDot { 0%,80%,100%{ transform:scale(0.5); opacity:0.3 } 40%{ transform:scale(1.1); opacity:1 } }

  /* Навигация */
  #topnav {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--panel);
    border-bottom: 1.5px solid var(--border);
    padding: 5px 12px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    z-index: 200;
  }
  #topnav::-webkit-scrollbar { display: none; }
  .nav-logo { font-size: 26px; cursor: pointer; animation: flicker 2.5s infinite; flex-shrink: 0; }
  .nav-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text2);
    font-size: 13px;
    padding: 5px 10px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .nav-btn.active, .nav-btn:hover {
    background: var(--indigo-f);
    border-color: var(--border);
    color: var(--text);
  }
  .badge {
    background: var(--accent);
    color: white;
    font-size: 7px;
    border-radius: 10px;
    min-width: 16px;
    height: 16px;
    display: none;
    align-items: center;
    justify-content: center;
    margin-left: 4px;
  }
  .badge.show { display: flex; }
  .nav-spacer { flex: 1; }
  #installBtn {
    background: var(--send-grad);
    border: none;
    padding: 5px 14px;
    border-radius: 30px;
    color: white;
    font-weight: bold;
    font-size: 11px;
    cursor: pointer;
    display: none;
  }
  #installBtn.show { display: flex; }

  /* Sidebar */
  #sidebar {
    width: 250px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: 0.2s;
  }
  @media (max-width: 640px) {
    #sidebar { display: none; }
    #sidebar.mob-open { display: flex; position: fixed; inset: 0; top: 52px; z-index: 300; width: 100%; background: var(--panel); }
  }
  .sb-header {
    padding: 12px;
    font-family: 'Unbounded', sans-serif;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .sb-body { flex: 1; overflow-y: auto; padding: 8px; }
  .room-item, .list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 14px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: 0.2s;
  }
  .room-item:hover, .list-item:hover { background: var(--indigo-f); transform: translateX(3px); }
  .room-item.active { background: var(--indigo-f); border-left: 3px solid var(--accent); }
  .room-icon {
    width: 36px;
    height: 36px;
    background: var(--indigo-f);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .room-name { font-size: 13px; font-weight: 500; }
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--indigo-f);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .online-dot {
    width: 9px;
    height: 9px;
    background: var(--online);
    border-radius: 50%;
    position: absolute;
    bottom: 0;
    right: 0;
    border: 2px solid var(--panel);
  }

  /* Main chat */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }
  .chat-header {
    background: var(--panel);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .chat-title { font-family: 'Unbounded', sans-serif; font-weight: bold; font-size: 14px; }
  .chat-sub { margin-left: auto; font-size: 11px; background: var(--indigo-f); padding: 4px 12px; border-radius: 20px; }
  .online-active { color: var(--accent) !important; border-color: var(--accent); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    animation: msgPop 0.25s ease;
  }
  .msg-bubble {
    background: var(--bubble);
    border: 1px solid var(--border2);
    border-radius: 4px 14px 14px 14px;
    padding: 8px 12px;
    font-size: 12.5px;
    max-width: 70%;
    position: relative;
  }
  .msg-bubble.mine {
    background: var(--bubble-mine);
    border-radius: 14px 4px 14px 14px;
  }
  .msg-nick { font-size: 10px; font-weight: bold; color: var(--indigo2); cursor: pointer; }
  .msg-time { font-size: 8px; color: var(--text3); margin-left: 6px; }
  .msg-del {
    position: absolute;
    top: 4px;
    right: 6px;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 10px;
    cursor: pointer;
    opacity: 0;
  }
  .msg-bubble:hover .msg-del { opacity: 1; }

  /* Chat bar */
  .chat-bar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .chat-toolbar {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .fmt-btn {
    background: transparent;
    border: 1px solid transparent;
    padding: 4px 8px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text2);
  }
  .fmt-btn.active, .fmt-btn:hover { background: var(--indigo-f); border-color: var(--border); }
  #typingIndicator {
    min-height: 18px;
    font-size: 10px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .typing-dots { display: flex; gap: 3px; }
  .typing-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; animation: typingDot 1.2s infinite; }
  .chat-bar-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #msgInput {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  #msgInput:focus { border-color: var(--indigo2); box-shadow: 0 0 0 3px var(--input-focus-shadow); }
  .send-btn {
    background: var(--send-grad);
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
  }
  .send-btn.fly .send-plane { animation: planeFly 0.4s ease forwards; }

  /* Emoji panel */
  #emojiPanel {
    position: absolute;
    bottom: 85px;
    left: 16px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 12px;
    width: 340px;
    z-index: 500;
    display: none;
  }
  #emojiPanel.open { display: block; animation: modalIn 0.2s; }
  .emoji-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }
  .em-btn {
    width: 54px;
    height: 54px;
    background: var(--indigo-f);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.1s;
    border: none;
  }
  .em-btn img { width: 42px; height: 42px; object-fit: contain; border-radius: 8px; }
  .em-emoji-text { font-size: 28px; }

  /* Game / Forum placeholders */
  #gameRoomPlaceholder, #forumRoomPlaceholder {
    display: none;
    flex: 1;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }
  .grp-play-btn, .frp-open-btn {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    border: none;
    padding: 12px 32px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
  }

  /* Modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 10000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--panel);
    border-radius: 24px;
    max-width: 450px;
    width: 90%;
    padding: 20px;
    animation: modalIn 0.25s;
  }
  .modal-x {
    float: right;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text2);
  }

  /* DM Box */
  #dmBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 330px;
    height: 460px;
    background: var(--panel);
    border-radius: 24px;
    display: none;
    flex-direction: column;
    z-index: 15000;
    box-shadow: 0 20px 40px black;
  }
  #dmBox.open { display: flex; }
  .dm-head {
    background: var(--send-grad);
    padding: 12px;
    border-radius: 24px 24px 0 0;
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
  }
  .dm-x {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    color: white;
  }
  #dmMsgs {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .dm-bar {
    display: flex;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid var(--border);
  }
  #dmInput {
    flex: 1;
    background: var(--input-bg);
    border-radius: 28px;
    padding: 8px 14px;
    border: none;
    color: var(--text);
  }

  /* misc */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--send-grad);
    color: white;
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 12px;
    z-index: 99999;
    white-space: nowrap;
  }
  .hidden { display: none !important; }
  .search-box {
    width: 100%;
    padding: 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    margin-bottom: 10px;
  }
  .act-btn {
    background: var(--indigo-f);
    border: 1px solid var(--border);
    padding: 8px;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    color: var(--text);
  }
</style>
</head>
<body class="night">

<canvas id="bgCanvas"></canvas>
<div id="floatLayer"></div>

<!-- Top Navigation -->
<nav id="topnav">
  <div class="nav-logo" onclick="toggleSidebar()">🔥</div>
  <button class="nav-btn active" id="navRooms" onclick="showPanel('rooms')">💬 ოთახები</button>
  <button class="nav-btn" id="navFriends" onclick="showPanel('friends')">👥 მეგობრები<span class="badge" id="friendBadge"></span></button>
  <button class="nav-btn" id="navUsers" onclick="showPanel('users')">🌐 მომხმარებლები</button>
  <button class="nav-btn" id="navOnline" onclick="showPanel('online')">🟣 ონლაინი</button>
  <button class="nav-btn" id="navDM" onclick="openDMList()">✉️ პირადი<span class="badge" id="dmBadge"></span></button>
  <div class="nav-spacer"></div>
  <button id="installBtn" onclick="triggerInstall()">📲 ინსტალაცია</button>
  <button class="nav-btn" onclick="openMyProfile()">👤</button>
  <button class="nav-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  <button class="nav-btn" onclick="logout()" style="color:#f87171">🚪</button>
</nav>

<div id="app">
  <div id="sidebar">
    <div id="panelRooms"><div class="sb-header">💬 ოთახები</div><div class="sb-body" id="roomList"></div></div>
    <div id="panelFriends" class="hidden"><div class="sb-header">👥 მეგობრები</div><div class="sb-body" id="friendsList"></div></div>
    <div id="panelUsers" class="hidden"><div class="sb-header">🌐 მომხმარებლები</div><div class="sb-body"><input id="userSearch" class="search-box" placeholder="🔍 ძებნა..." oninput="filterUsers()"><div id="usersListEl"></div></div></div>
    <div id="panelOnline" class="hidden"><div class="sb-header">🟣 ონლაინი</div><div class="sb-body" id="onlineListEl"></div></div>
  </div>

  <div id="main">
    <div class="chat-header">
      <div id="roomIcon">💬</div>
      <div class="chat-title" id="roomTitle">კაფე-ბარი</div>
      <div class="chat-sub" id="onlineCnt">● 0 ონლაინი</div>
      <button class="play-btn" id="playHeaderBtn" onclick="openGame()" style="display:none">🎮 თამაში</button>
      <a class="forum-open-btn" id="forumHeaderBtn" href="#" style="display:none">💬 ფორუმი</a>
    </div>
    <div id="messages"></div>
    <div id="gameRoomPlaceholder"><div class="grp-icon">🎮</div><div class="grp-title">თამაში</div><button class="grp-play-btn" onclick="openGame()">დაწყება</button></div>
    <div id="forumRoomPlaceholder"><div class="frp-icon">📌</div><div class="frp-title">ფორუმი</div><a class="frp-open-btn" href="#">გახსნა</a></div>

    <div class="chat-bar">
      <div class="chat-toolbar">
        <button class="fmt-btn" onclick="toggleFormat('bold')"><b>B</b></button>
        <button class="fmt-btn" onclick="toggleFormat('italic')"><i>I</i></button>
        <button class="fmt-btn" onclick="toggleFormat('underline')">U</button>
      </div>
      <div id="typingIndicator"></div>
      <div class="chat-bar-row">
        <button class="icon-btn" onclick="toggleEmojiPanel()" style="background:var(--indigo-f); border:none; width:40px; border-radius:12px; cursor:pointer;">😊</button>
        <input id="msgInput" placeholder="დაწერე შეტყობინება..." onkeydown="if(event.key==='Enter') sendMessage()" oninput="onTyping()">
        <button class="send-btn" onclick="sendMessage()"><span class="send-plane">✈️</span></button>
      </div>
    </div>
  </div>
</div>

<!-- DM Box -->
<div id="dmBox">
  <div class="dm-head"><div class="avatar" id="dmAv">👤</div><div class="dm-title" id="dmTitle">პირადი</div><button class="dm-x" onclick="closeDM()">✕</button></div>
  <div id="dmMsgs"></div>
  <div class="dm-bar"><input id="dmInput" placeholder="შეტყობინება..." onkeydown="if(event.key==='Enter') sendDM()"><button class="send-btn" onclick="sendDM()">✈️</button></div>
</div>

<!-- Emoji panel -->
<div id="emojiPanel"><div class="ep-header">სმაილები</div><div class="emoji-grid" id="emojiGrid"></div></div>

<!-- Profile modal -->
<div class="overlay" id="profileOverlay" onclick="if(event.target===this) closeModal('profileOverlay')">
  <div class="modal"><button class="modal-x" onclick="closeModal('profileOverlay')">✕</button><div class="modal-title" id="profTitle">პროფილი</div><div id="profInfo">...</div><button class="act-btn" onclick="closeModal('profileOverlay')">დახურვა</button></div>
</div>

<script>
  // Supabase config
  const supabaseUrl = "https://vjstuyxuhshsouqsnvxp.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqc3R1eXh1aHNzb3Vxc254dnhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDExOTQsImV4cCI6MjA5MDk3NzE5NH0.sVzu2GTaMwskp8lGb0C9F15Iy7RKT1FxQrwd5JgHquE";
  const sb = supabase.createClient(supabaseUrl, supabaseKey);
  let ME = null, MYPROF = null, ROOM = 1, currentChannel = null, typingChannel = null, typingUsers = {}, typingTimeout = null;
  let allUsers = [], myFriends = [], customEmojis = [], msgCache = {};
  let DM_UID = null, dmChannel = null, dmUnread = {};

  // ---- helper functions ----
  function toast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 2000); }
  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function isOnline(ts) { return ts && (Date.now() - new Date(ts).getTime() < 90000); }
  function updateOnlineBadge() { let cnt = allUsers.filter(u=>isOnline(u.last_seen)).length; document.getElementById('onlineCnt').innerHTML = `● ${cnt} ონლაინი`; }
  
  async function loadAllUsers() { let {data} = await sb.from('profiles').select('*'); allUsers = data||[]; renderUserLists(); updateOnlineBadge(); }
  function renderUserLists() {
    let container = document.getElementById('usersListEl'); if(!container) return;
    container.innerHTML = allUsers.map(u => `<div class="list-item" onclick="openProfile('${u.id}')"><div class="avatar">${u.avatar_url ? `<img src="${u.avatar_url}">` : (u.emotion||'😊')}</div><div>${esc(u.username)}</div></div>`).join('');
    let onlineContainer = document.getElementById('onlineListEl'); if(onlineContainer) onlineContainer.innerHTML = allUsers.filter(u=>isOnline(u.last_seen)).map(u=>`<div class="list-item" onclick="openProfile('${u.id}')">${esc(u.username)}</div>`).join('');
  }
  function filterUsers() { let q = document.getElementById('userSearch').value.toLowerCase(); document.querySelectorAll('#usersListEl .list-item').forEach(el => { el.style.display = el.innerText.toLowerCase().includes(q) ? '' : 'none'; }); }

  // ---- Rooms ----
  const ROOMS_LIST = [
    {id:1, icon:'🏠', name:'კაფე-ბარი', isGame:false},
    {id:2, icon:'🔐', name:'შიფროგრამა', isGame:true, gameFile:'game-wordsort.html'},
    {id:3, icon:'🏆', name:'ვიქტორინა', isGame:true, gameFile:'game-quiz.html'},
    {id:5, icon:'📋', name:'ფორუმი', isForum:true}
  ];
  function buildRooms() {
    let container = document.getElementById('roomList'); if(!container) return;
    container.innerHTML = ROOMS_LIST.map(r => `<div class="room-item" data-id="${r.id}"><div class="room-icon">${r.icon}</div><div class="room-name">${r.name}</div></div>`).join('');
    document.querySelectorAll('.room-item').forEach(el => { el.onclick = () => switchRoom(parseInt(el.dataset.id)); });
  }
  function switchRoom(roomId) {
    ROOM = roomId; let room = ROOMS_LIST.find(r=>r.id===roomId);
    document.getElementById('roomTitle').innerText = room.name;
    document.getElementById('roomIcon').innerText = room.icon;
    document.querySelectorAll('.room-item').forEach(el=>el.classList.remove('active'));
    document.querySelector(`.room-item[data-id="${roomId}"]`)?.classList.add('active');
    if(room.isGame) {
      document.getElementById('messages').style.display = 'none';
      document.getElementById('gameRoomPlaceholder').style.display = 'flex';
      document.getElementById('forumRoomPlaceholder').style.display = 'none';
      document.getElementById('playHeaderBtn').style.display = 'flex';
      document.getElementById('forumHeaderBtn').style.display = 'none';
    } else if(room.isForum) {
      document.getElementById('messages').style.display = 'none';
      document.getElementById('gameRoomPlaceholder').style.display = 'none';
      document.getElementById('forumRoomPlaceholder').style.display = 'flex';
      document.getElementById('playHeaderBtn').style.display = 'none';
      document.getElementById('forumHeaderBtn').style.display = 'flex';
    } else {
      document.getElementById('messages').style.display = 'flex';
      document.getElementById('gameRoomPlaceholder').style.display = 'none';
      document.getElementById('forumRoomPlaceholder').style.display = 'none';
      document.getElementById('playHeaderBtn').style.display = 'none';
      document.getElementById('forumHeaderBtn').style.display = 'none';
      loadMessages(ROOM);
    }
  }
  function openGame() { let room = ROOMS_LIST.find(r=>r.id===ROOM); if(room?.gameFile) window.open(room.gameFile, '_blank'); else toast('თამაში მალე დაემატება'); }

  // ---- Messages & realtime ----
  async function loadMessages(roomId) {
    if(currentChannel) try{ await sb.removeChannel(currentChannel); }catch(e){}
    if(typingChannel) try{ await sb.removeChannel(typingChannel); }catch(e){}
    typingUsers = {}; updateTypingUI();
    let {data} = await sb.from('messages').select('*, profiles(username,role,avatar_url)').eq('room_id', roomId).order('created_at', {ascending:true}).limit(60);
    msgCache[roomId] = data||[];
    let container = document.getElementById('messages'); container.innerHTML = '';
    (data||[]).forEach(m => appendMessage(m));
    container.scrollTop = container.scrollHeight;
    currentChannel = sb.channel(`room-${roomId}`).on('postgres_changes', {event:'INSERT', schema:'public', table:'messages', filter:`room_id=eq.${roomId}`}, payload => { onNewMessage(payload.new); }).subscribe();
    typingChannel = sb.channel(`typing-${roomId}`).on('broadcast', {event:'typing'}, ({payload}) => { if(payload.uid !== ME?.id) { typingUsers[payload.uid] = payload.name; updateTypingUI(); setTimeout(()=>{ delete typingUsers[payload.uid]; updateTypingUI(); }, 3000); } }).subscribe();
  }
  function onNewMessage(msg) { if(!msgCache[ROOM]) msgCache[ROOM]=[]; msgCache[ROOM].push(msg); appendMessage(msg); document.getElementById('messages').scrollTop = 9999; }
  function appendMessage(m) {
    let isMe = m.user_id === ME?.id;
    let avatar = m.profiles?.avatar_url ? `<img src="${m.profiles.avatar_url}" style="width:100%;height:100%;object-fit:cover">` : '😊';
    let row = document.createElement('div'); row.className = 'msg-row';
    row.innerHTML = `<div class="avatar" onclick="openProfile('${m.user_id}')">${avatar}</div>
      <div class="msg-content"><div class="msg-bubble ${isMe ? 'mine' : ''}"><span class="msg-nick" onclick="openProfile('${m.user_id}')">${esc(m.profiles?.username||'?')}</span><span class="msg-time">${new Date(m.created_at).toLocaleTimeString()}</span><br>${renderContent(m.content)}${!isMe ? '' : `<button class="msg-del" onclick="deleteMsg('${m.id}')">🗑</button>`}</div></div>`;
    document.getElementById('messages').appendChild(row);
  }
  function renderContent(txt) { return esc(txt).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/_(.*?)_/g,'<em>$1</em>'); }
  async function sendMessage() {
    let inp = document.getElementById('msgInput'); let txt = inp.value.trim(); if(!txt) return;
    inp.value = ''; clearTimeout(typingTimeout);
    await sb.from('messages').insert({room_id: ROOM, user_id: ME.id, content: txt});
    document.querySelector('.send-btn')?.classList.add('fly'); setTimeout(()=>document.querySelector('.send-btn')?.classList.remove('fly'),400);
  }
  async function deleteMsg(id) { if(!confirm('წაშლა?')) return; await sb.from('messages').delete().eq('id', id); document.getElementById(`msg-${id}`)?.remove(); }
  function onTyping() { if(!ME) return; clearTimeout(typingTimeout); sb.channel(`typing-${ROOM}`).send({type:'broadcast', event:'typing', payload:{uid:ME.id, name:MYPROF?.username}}); typingTimeout = setTimeout(()=> sb.channel(`typing-${ROOM}`).send({type:'broadcast', event:'stop', payload:{uid:ME.id}}), 2000); }
  function updateTypingUI() { let el = document.getElementById('typingIndicator'); let names = Object.values(typingUsers); el.innerHTML = names.length ? `<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span>${names.join(', ')} წერს...</span>` : ''; }

  // ---- formatting ----
  let fmt = {bold:false,italic:false,underline:false};
  function toggleFormat(type) { fmt[type]=!fmt[type]; document.getElementById(`fmt${type.charAt(0).toUpperCase()+type.slice(1)}`)?.classList.toggle('active',fmt[type]); }

  // ---- Emoji panel ----
  async function loadEmojis() { let {data} = await sb.from('global_emojis').select('*'); customEmojis = data||[]; buildEmojiGrid(); }
  function buildEmojiGrid() { let grid = document.getElementById('emojiGrid'); if(!grid) return; grid.innerHTML = customEmojis.map(e => `<button class="em-btn" onclick="insertEmoji('${e.url.replace(/'/g, "\\'")}')">${e.url.startsWith('http')?`<img src="${e.url}">`:`<span class="em-emoji-text">${e.url}</span>`}</button>`).join(''); }
  function insertEmoji(emoji) { let inp = document.getElementById('msgInput'); inp.value += emoji; inp.focus(); }
  function toggleEmojiPanel() { document.getElementById('emojiPanel').classList.toggle('open'); }

  // ---- DM System ----
  async function openDMList() { await loadAllUsers(); let list = document.createElement('div'); list.className = 'overlay'; list.id = 'dmListTemp'; list.innerHTML = `<div class="modal"><div class="modal-title">აირჩიე მომხმარებელი</div><div id="dmUserListTemp"></div><button class="act-btn" onclick="this.parentElement.parentElement.remove()">დახურვა</button></div>`; document.body.appendChild(list); list.classList.add('open'); let container = list.querySelector('#dmUserListTemp'); container.innerHTML = allUsers.filter(u=>u.id!==ME?.id).map(u=>`<div class="list-item" onclick="openDM('${u.id}'); list.remove()">${esc(u.username)}</div>`).join(''); }
  async function openDM(uid) { DM_UID = uid; let user = allUsers.find(u=>u.id===uid); document.getElementById('dmTitle').innerText = user?.username||'პირადი'; document.getElementById('dmAv').innerHTML = user?.avatar_url ? `<img src="${user.avatar_url}" style="width:100%">` : (user?.emotion||'👤'); document.getElementById('dmBox').classList.add('open'); let rk = [ME.id, uid].sort().join('_'); let {data} = await sb.from('direct_messages').select('*').eq('room_key', rk).order('created_at'); let container = document.getElementById('dmMsgs'); container.innerHTML = ''; (data||[]).forEach(m=>appendDMMsg(m)); if(dmChannel) try{ await sb.removeChannel(dmChannel); }catch(e){} dmChannel = sb.channel(`dm-${rk}`).on('postgres_changes', {event:'INSERT', schema:'public', table:'direct_messages', filter:`room_key=eq.${rk}`}, payload=>{ appendDMMsg(payload.new); container.scrollTop=9999; if(payload.new.sender_id !== ME.id) { dmUnread[payload.new.sender_id] = 0; updateDMBadge(); } }).subscribe(); container.scrollTop = 9999; }
  function appendDMMsg(m) { let isMe = m.sender_id === ME.id; let div = document.createElement('div'); div.className = 'msg-row'; div.innerHTML = `<div class="msg-bubble ${isMe?'mine':''}" style="max-width:100%"><span class="msg-time">${new Date(m.created_at).toLocaleTimeString()}</span><br>${renderContent(m.content)}</div>`; document.getElementById('dmMsgs').appendChild(div); }
  async function sendDM() { let inp = document.getElementById('dmInput'); let txt = inp.value.trim(); if(!txt || !DM_UID) return; inp.value = ''; let rk = [ME.id, DM_UID].sort().join('_'); await sb.from('direct_messages').insert({room_key: rk, sender_id: ME.id, receiver_id: DM_UID, content: txt}); appendDMMsg({sender_id: ME.id, content: txt, created_at: new Date()}); document.getElementById('dmMsgs').scrollTop = 9999; }
  function closeDM() { document.getElementById('dmBox').classList.remove('open'); if(dmChannel) try{ sb.removeChannel(dmChannel); }catch(e){} DM_UID=null; }
  function updateDMBadge() { let total = Object.values(dmUnread).reduce((a,b)=>a+b,0); let b = document.getElementById('dmBadge'); if(total) { b.innerText = total; b.classList.add('show'); } else b.classList.remove('show'); }

  // ---- Profile ----
  async function openProfile(uid) { let {data:prof} = await sb.from('profiles').select('*').eq('id',uid).single(); document.getElementById('profTitle').innerHTML = prof?.username; document.getElementById('profInfo').innerHTML = `<div>სტატუსი: ${prof?.status||'მშვიდობა'}</div><div>ემოცია: ${prof?.emotion||'😊'}</div>`; openModal('profileOverlay'); }
  function openMyProfile() { openProfile(ME.id); }
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // ---- Theme & Animation Background ----
  function setTheme(t) { document.body.className = t; localStorage.setItem('kaif_theme', t); document.getElementById('themeBtn').innerText = t==='night'?'🌙':'☀️'; }
  function toggleTheme() { setTheme(document.body.className === 'night' ? 'day' : 'night'); }
  
  // Canvas background animation
  (function initBg() { 
    let c = document.getElementById('bgCanvas'), ctx = c.getContext('2d'); 
    function resize() { c.width = innerWidth; c.height = innerHeight; } 
    resize(); window.addEventListener('resize', resize); 
    let points = []; for(let i=0;i<60;i++) points.push({x:Math.random()*innerWidth, y:Math.random()*innerHeight, dx:(Math.random()-.5)*0.4, dy:(Math.random()-.5)*0.4}); 
    function draw() { ctx.clearRect(0,0,c.width,c.height); for(let p of points) { ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fillStyle = `rgba(139,92,246,0.2)`; ctx.fill(); p.x+=p.dx; p.y+=p.dy; if(p.x<0||p.x>c.width) p.dx*=-1; if(p.y<0||p.y>c.height) p.dy*=-1; } requestAnimationFrame(draw); } draw(); 
  })();
  
  // Floating particles animation
  (function floatParticles() { 
    let layer = document.getElementById('floatLayer'); 
    let symbols = ['💜','🌸','💙','✨','⭐','🌙','🦋','🌊','💫','🫧']; 
    setInterval(()=>{ 
      let el = document.createElement('div'); el.className='fp'; el.innerText = symbols[Math.floor(Math.random()*symbols.length)]; 
      el.style.left = Math.random()*100+'%'; el.style.fontSize = (1+Math.random()*1.2)+'rem'; 
      let dur = 8+Math.random()*12; el.style.animationDuration = dur+'s'; 
      el.style.setProperty('--fx', (Math.random()*100-50)+'px'); el.style.setProperty('--fy', (60+Math.random()*60)+'vh'); 
      el.style.setProperty('--fr', (Math.random()*60-30)+'deg'); el.style.setProperty('--fs', 0.7+Math.random()*1.2); 
      layer.appendChild(el); setTimeout(()=>el.remove(), dur*1000); 
    }, 1300); 
  })();

  // ---- Auth & Init - FIXED: no infinite redirect ----
  async function init() {
    try {
      const { data: { user }, error: userError } = await sb.auth.getUser();
      if (userError || !user) {
        // არ ვართ ავტორიზებული - გადამისამართება login-ზე
        window.location.href = 'index.html';
        return;
      }
      ME = user;
      
      let { data: prof, error: profError } = await sb.from('profiles').select('*').eq('id', ME.id).single();
      if (profError || !prof) {
        // პროფილი არ არსებობს - შექმნა
        const username = user.user_metadata?.username || user.email?.split('@')[0] || 'მეგობარი';
        await sb.from('profiles').insert({ id: ME.id, username: username, role: 'member', emotion: '😊' });
        let { data: newProf } = await sb.from('profiles').select('*').eq('id', ME.id).single();
        MYPROF = newProf;
      } else {
        MYPROF = prof;
      }
      
      // დაბლოკვის შემოწმება
      if (MYPROF?.is_blocked) {
        alert('თქვენი ანგარიში დაბლოკილია: ' + (MYPROF.block_reason || 'დაუკავშირდით ადმინისტრატორს'));
        await sb.auth.signOut();
        window.location.href = 'index.html';
        return;
      }
      
      // ყველაფერი მზადაა - ჩატვირთვა
      await loadAllUsers();
      await loadEmojis();
      buildRooms();
      switchRoom(1);
      
      // თემის აღდგენა
      const savedTheme = localStorage.getItem('kaif_theme');
      if (savedTheme) setTheme(savedTheme);
      else setTheme('night');
      
      // მეგობრების ჩატვირთვა
      let { data: friends } = await sb.from('friends').select('friend_id').eq('user_id', ME.id).eq('status', 'accepted');
      myFriends = friends?.map(f => f.friend_id) || [];
      
      // DM შეტყობინებების მოსმენა
      sb.channel('dm-listener-' + ME.id)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages', filter: `receiver_id=eq.${ME.id}` }, payload => {
          let from = payload.new.sender_id;
          if (!document.getElementById('dmBox').classList.contains('open') || DM_UID !== from) {
            dmUnread[from] = (dmUnread[from] || 0) + 1;
            updateDMBadge();
            let sender = allUsers.find(u => u.id === from);
            toast(`📩 ახალი შეტყობინება ${sender?.username || 'მომხმარებლისგან'}`);
          }
        }).subscribe();
      
      // ონლაინ სტატუსის განახლება
      setInterval(pingOnline, 30000);
      pingOnline();
      
      toast('✅ წარმატებით შეხვედით!');
    } catch (err) {
      console.error('Init error:', err);
      toast('❌ შეცდომა: ' + err.message);
    }
  }
  
  async function pingOnline() { 
    if(ME) await sb.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', ME.id); 
  }
  
  function logout() { 
    sb.auth.signOut(); 
    window.location.href = 'index.html'; 
  }
  
  function showPanel(name) { 
    ['rooms','friends','users','online'].forEach(p=>{ 
      document.getElementById(`panel${p.charAt(0).toUpperCase()+p.slice(1)}`).classList.toggle('hidden', p!==name); 
      document.getElementById(`nav${p.charAt(0).toUpperCase()+p.slice(1)}`).classList.toggle('active', p===name); 
    }); 
    if(window.innerWidth<640) document.getElementById('sidebar').classList.add('mob-open'); 
    if(name==='friends') renderFriends(); 
    if(name==='users'||name==='online') loadAllUsers(); 
  }
  
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('mob-open'); }
  
  function renderFriends() { 
    let el = document.getElementById('friendsList'); 
    if(!el) return; 
    let list = myFriends.map(fid=>allUsers.find(u=>u.id===fid)).filter(Boolean); 
    el.innerHTML = list.length ? list.map(u=>`<div class="list-item" onclick="openProfile('${u.id}')">${esc(u.username)}</div>`).join('') : '<div style="padding:20px;text-align:center">მეგობრები ჯერ არ გყავს 💜</div>'; 
  }
  
  window.triggerInstall = () => { toast('PWA ინსტალაცია მალე დაემატება'); };
  
  // გაშვება
  init();
</script>
</body>
</html>
