<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💬 12 ოთახი • მეგობრები • Voice</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s, color 0.2s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Poppins', system-ui;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
            color: #2a1a3a;
            min-height: 100vh;
            padding: 18px;
            position: relative;
            overflow-x: hidden;
        }

        body.dark {
            background: linear-gradient(145deg, #0f0c20 0%, #1a1535 100%);
            color: #f0ecff;
        }

        .floating-emoji {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            animation: floatUp 8s ease-out forwards;
            z-index: 9999;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.9; bottom: -30px; }
            100% { transform: translateY(-110vh) rotate(400deg); opacity: 0; bottom: 110%; }
        }

        .main-grid {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 18px;
            position: relative;
            z-index: 5;
        }

        .glass-panel {
            background: rgba(255, 245, 252, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            padding: 1.2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,240,0.7);
        }

        body.dark .glass-panel {
            background: rgba(20, 15, 48, 0.85);
            border-color: rgba(210, 180, 255, 0.2);
        }

        .room-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 18px 0;
        }

        .room-btn {
            background: #d9c0ff;
            border: none;
            border-radius: 60px;
            padding: 8px 0;
            font-weight: bold;
            cursor: pointer;
        }

        .room-btn.active {
            background: #ff80bf;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #ff3d9a;
            color: white;
        }

        .chat-area {
            background: rgba(0, 0, 0, 0.06);
            border-radius: 28px;
            padding: 12px;
            height: 48vh;
            overflow-y: auto;
            margin: 12px 0;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 8px 15px;
            margin: 8px;
            display: inline-block;
            max-width: 85%;
            word-break: break-word;
        }

        body.dark .message-bubble {
            background: #2a254f;
        }

        .friend-chip {
            background: rgba(200, 170, 250, 0.5);
            border-radius: 50px;
            padding: 6px 12px;
            margin: 5px;
            display: inline-block;
            cursor: pointer;
        }

        button {
            background: #b77eff;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            margin: 4px;
            cursor: pointer;
        }

        .emoji-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }

        .recording {
            background: #ff4444 !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="floatingContainer"></div>

<div class="main-grid">
    <div class="glass-panel">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
            <div id="userAvatar" style="font-size: 3rem;">🌸</div>
            <div>
                <div id="userNickname" style="font-weight: bold; font-size: 1.1rem;"></div>
                <div id="userStatus" style="font-size: 0.8rem; opacity: 0.8;"></div>
            </div>
            <button id="statusBtn" style="margin-left: auto; padding: 5px 12px;">😊</button>
            <button id="logoutBtn" style="padding: 5px 12px;">🚪</button>
        </div>
        
        <h2>🏠 12 ოთახი</h2>
        <div id="roomsGrid" class="room-grid"></div>
        <hr>
        
        <h3>👥 მეგობრები</h3>
        <div id="friendsContainer"></div>
        <input type="text" id="friendEmail" placeholder="მეგობრის email" style="width:100%; margin:5px 0; padding: 8px; border-radius: 50px; border: none;">
        <button id="addFriendBtn">➕ დამატება</button>
        <button id="removeFriendBtn">➖ წაშლა</button>
        <hr>
        
        <h3>⚙️ ადმინი</h3>
        <input type="text" id="roleEmail" placeholder="მომხმარებლის email" style="width:100%; margin:5px 0; padding: 8px; border-radius: 50px;">
        <button id="makeAdminBtn">👑 ადმინი</button>
        <button id="makeFounderBtn">🌟 დამფუძნებელი</button>
        <button id="removeRoleBtn">🚫 ჩამორთმევა</button>
        <hr>
        
        <button id="themeBtn">🌙 ღამე/დღე</button>
    </div>

    <div class="glass-panel">
        <h2 id="roomTitle">💬 ოთახი 1</h2>
        <div id="chatBox" class="chat-area"></div>
        
        <div id="emojiBar" class="emoji-strip"></div>
        
        <div style="display: flex; gap: 6px; margin: 8px 0;">
            <button id="boldBtn">B</button>
            <button id="italicBtn">I</button>
            <input type="color" id="textColor" value="#000000">
        </div>
        
        <textarea id="msgInput" rows="2" placeholder="დაწერე მესიჯი..." style="width:100%; border-radius: 28px; padding: 10px;"></textarea>
        
        <button id="sendRoomBtn">💬 ოთახში</button>
        <button id="sendPrivateBtn">🔒 PM-ში</button>
    </div>

    <div class="glass-panel">
        <h3>💌 პირადი <span id="pmLed">🔴</span></h3>
        <div id="pmBox" style="height: 180px; overflow-y: auto; background: rgba(0,0,0,0.06); border-radius: 20px; padding: 8px;"></div>
        
        <textarea id="pmInput" rows="2" placeholder="PM..." style="width:100%; margin: 8px 0; padding: 8px; border-radius: 20px;"></textarea>
        
        <button id="sendPmBtn">📨 გაგზავნა</button>
        <button id="voiceBtn">🎤 ხმოვანი PM</button>
        <hr>
        <button id="heartsBtn">💖 გაუშვი გულები</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://brggiyhfzfbmlirqfgpo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null, currentRoom = 1, activePmUser = null, friends = [], allUsers = [];
    let mediaRecorder = null, audioChunks = [], isRecording = false;

    function createFloating() {
        const items = ['❤️', '💖', '🌸', '🌺', '💗', '🌼', '💕', '🌷', '❤️‍🔥', '✨', '🕊️', '💘'];
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.innerText = items[Math.floor(Math.random() * items.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1 + Math.random() * 2) + 'rem';
        el.style.animationDuration = 5 + Math.random() * 7 + 's';
        document.getElementById('floatingContainer').appendChild(el);
        setTimeout(() => el.remove(), 9000);
    }
    setInterval(() => { for(let i=0;i<2;i++) createFloating(); }, 1800);
    for(let i=0;i<6;i++) setTimeout(createFloating, i*150);

    document.getElementById('themeBtn').onclick = () => document.body.classList.toggle('dark');
    document.getElementById('heartsBtn').onclick = () => { for(let i=0;i<20;i++) createFloating(); };

    async function checkAuth() {
        const uid = localStorage.getItem('userId');
        if(!uid) { location.href = "index.html"; return; }
        const { data: { user } } = await supabase.auth.getUser();
        if(!user) { location.href = "index.html"; return; }
        currentUser = user;
        const { data: profile } = await supabase.from('users').select('*').eq('id', currentUser.id).single();
        if(profile) {
            document.getElementById('userNickname').innerText = profile.nickname || profile.email;
            document.getElementById('userAvatar').innerText = profile.avatar || '🌸';
            document.getElementById('userStatus').innerText = profile.status || '😊';
        }
        await loadUsers();
        initApp();
    }

    async function loadUsers() {
        let { data } = await supabase.from('users').select('*');
        allUsers = data || [];
    }

    async function initApp() {
        renderRooms();
        await loadFriends();
        loadMessages(currentRoom);
        renderEmojis();
        listenPmIndicator();
        setInterval(() => {
            if(activePmUser) loadPm(activePmUser);
            else loadMessages(currentRoom);
        }, 2500);
    }

    function renderRooms() {
        const container = document.getElementById('roomsGrid');
        container.innerHTML = '';
        for(let i=1;i<=12;i++) {
            const btn = document.createElement('button');
            btn.innerText = `🏠 ${i}`;
            btn.classList.add('room-btn');
            if(currentRoom === i) btn.classList.add('active');
            btn.onclick = () => {
                currentRoom = i;
                document.getElementById('roomTitle').innerHTML = `💬 ოთახი ${i}`;
                document.querySelectorAll('.room-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                activePmUser = null;
                loadMessages(i);
            };
            container.appendChild(btn);
        }
    }

    async function loadMessages(roomId) {
        const { data } = await supabase.from('messages').select('*, user:users(*)').eq('room_id', roomId).order('created_at');
        const box = document.getElementById('chatBox');
        box.innerHTML = '';
        data?.forEach(m => {
            const div = document.createElement('div');
            div.className = 'message-bubble';
            div.innerHTML = `<strong>${m.user?.nickname || '?'} ${m.user?.status || ''}</strong> <span style="font-size:9px;">${new Date(m.created_at).toLocaleTimeString()}</span><br>${m.text} ❤️`;
            box.appendChild(div);
        });
    }

    async function sendMessage() {
        const text = document.getElementById('msgInput').value.trim();
        if(!text) return;
        await supabase.from('messages').insert([{ room_id: currentRoom, user_id: currentUser.id, text }]);
        document.getElementById('msgInput').value = '';
        loadMessages(currentRoom);
    }

    async function loadFriends() {
        const { data } = await supabase.from('friends').select('friend_id').eq('user_id', currentUser.id);
        friends = data?.map(f=>f.friend_id) || [];
        const container = document.getElementById('friendsContainer');
        container.innerHTML = '';
        for(let fid of friends) {
            let u = allUsers.find(x=>x.id===fid);
            if(u) {
                let chip = document.createElement('span');
                chip.className = 'friend-chip';
                chip.innerText = `${u.status || '😊'} ${u.nickname || u.email}`;
                chip.onclick = () => { activePmUser = u.id; loadPm(u.id); };
                container.appendChild(chip);
            }
        }
    }

    async function loadPm(otherId) {
        if(!otherId) return;
        const { data } = await supabase.from('pm_messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${otherId}),and(sender_id.eq.${otherId},receiver_id.eq.${currentUser.id})`).order('created_at');
        const box = document.getElementById('pmBox');
        box.innerHTML = '';
        data?.forEach(m => {
            const isMe = m.sender_id === currentUser.id;
            const div = document.createElement('div');
            div.style.padding = '6px';
            div.style.borderBottom = '1px solid rgba(0,0,0,0.1)';
            if(m.is_voice) {
                div.innerHTML = `<b>${isMe ? '🎤 მე' : '🎤 მეგობარი'}</b><br><audio controls src="${m.voice_url}" style="height: 32px;"></audio><br><span style="font-size:9px;">${new Date(m.created_at).toLocaleTimeString()}</span>`;
            } else {
                div.innerHTML = `<b>${isMe ? 'მე' : 'მეგობარი'}</b>: ${m.text}<br><span style="font-size:9px;">${new Date(m.created_at).toLocaleTimeString()}</span>`;
            }
            if(!isMe && !m.seen) supabase.from('pm_messages').update({seen: true}).eq('id', m.id);
            box.appendChild(div);
        });
    }

    async function sendPm() {
        const text = document.getElementById('pmInput').value.trim();
        if(!text || !activePmUser) return alert("აირჩიე მეგობარი!");
        await supabase.from('pm_messages').insert([{ sender_id: currentUser.id, receiver_id: activePmUser, text, seen: false }]);
        document.getElementById('pmInput').value = '';
        loadPm(activePmUser);
    }

    async function startVoice() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                await sendVoice(blob);
                stream.getTracks().forEach(t=>t.stop());
            };
            mediaRecorder.start();
            isRecording = true;
            const btn = document.getElementById('voiceBtn');
            btn.innerHTML = '🔴 ჩაწერა...';
            btn.classList.add('recording');
            setTimeout(() => { if(isRecording) stopVoice(); }, 60000);
        } catch(e) { alert("მიკროფონი არ არის ხელმისაწვდომი"); }
    }

    function stopVoice() {
        if(mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            const btn = document.getElementById('voiceBtn');
            btn.innerHTML = '🎤 ხმოვანი PM';
            btn.classList.remove('recording');
        }
    }

    async function sendVoice(blob) {
        if(!activePmUser) { alert("აირჩიე მეგობარი!"); return; }
        const name = `voice_${currentUser.id}_${Date.now()}.webm`;
        const { error } = await supabase.storage.from('voice_messages').upload(name, blob);
        if(error) { alert("ატვირთვა ვერ მოხერხდა"); return; }
        const { data: { publicUrl } } = supabase.storage.from('voice_messages').getPublicUrl(name);
        await supabase.from('pm_messages').insert([{ sender_id: currentUser.id, receiver_id: activePmUser, text: "🎤 ხმოვანი", voice_url: publicUrl, is_voice: true, seen: false }]);
        loadPm(activePmUser);
    }

    document.getElementById('voiceBtn').onclick = () => { if(isRecording) stopVoice(); else startVoice(); };

    function listenPmIndicator() {
        supabase.channel('pm').on('postgres_changes', {event:'INSERT', schema:'public', table:'pm_messages'}, payload => {
            if(payload.new.receiver_id === currentUser.id && !payload.new.seen) {
                document.getElementById('pmLed').innerHTML = "🔴 ახალი!";
                setTimeout(()=> document.getElementById('pmLed').innerHTML = "💬", 3000);
            }
        }).subscribe();
    }

    function renderEmojis() {
        const emojis = ['😊','😍','😂','🥰','❤️','💖','🌸','🌺','🔥','🎉','✨','👍'];
        const bar = document.getElementById('emojiBar');
        bar.innerHTML = '';
        emojis.forEach(e => {
            const btn = document.createElement('button');
            btn.innerText = e;
            btn.style.fontSize = '1.3rem';
            btn.onclick = () => { document.getElementById('msgInput').value += e; };
            bar.appendChild(btn);
        });
    }

    // Status
    document.getElementById('statusBtn').onclick = async () => {
        const statuses = ['😊','😍','😂','🔥','💯','❤️','🌸','✨','🥳','😎'];
        let picker = document.createElement('div');
        picker.style.position='fixed'; picker.style.bottom='20px'; picker.style.left='50%'; picker.style.transform='translateX(-50%)';
        picker.style.background='white'; picker.style.borderRadius='40px'; picker.style.padding='12px'; picker.style.zIndex='9999';
        picker.style.display='flex'; picker.style.gap='8px'; picker.style.flexWrap='wrap';
        statuses.forEach(s => {
            const b = document.createElement('button');
            b.innerText = s; b.style.fontSize='1.8rem'; b.style.background='none';
            b.onclick = async () => {
                await supabase.from('users').update({ status: s }).eq('id', currentUser.id);
                document.getElementById('userStatus').innerText = s;
                picker.remove();
            };
            picker.appendChild(b);
        });
        document.body.appendChild(picker);
        setTimeout(()=>picker.remove(),8000);
    };

    document.getElementById('sendRoomBtn').onclick = sendMessage;
    document.getElementById('sendPmBtn').onclick = sendPm;
    document.getElementById('sendPrivateBtn').onclick = () => { if(activePmUser) sendPm(); else alert("აირჩიე მეგობარი"); };
    document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); location.href="index.html"; };
    
    document.getElementById('boldBtn').onclick = () => { let ta=document.getElementById('msgInput'); ta.style.fontWeight = ta.style.fontWeight==='bold'?'normal':'bold'; };
    document.getElementById('italicBtn').onclick = () => { let ta=document.getElementById('msgInput'); ta.style.fontStyle = ta.style.fontStyle==='italic'?'normal':'italic'; };
    document.getElementById('textColor').oninput = e => document.getElementById('msgInput').style.color = e.target.value;

    // Friends
    document.getElementById('addFriendBtn').onclick = async () => {
        let email = document.getElementById('friendEmail').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u && u.id !== currentUser.id) await supabase.from('friends').insert([{ user_id: currentUser.id, friend_id: u.id }]);
        await loadFriends();
    };
    document.getElementById('removeFriendBtn').onclick = async () => {
        let email = document.getElementById('friendEmail').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u) await supabase.from('friends').delete().match({ user_id: currentUser.id, friend_id: u.id });
        await loadFriends();
    };

    // Roles
    document.getElementById('makeAdminBtn').onclick = async () => {
        let email = document.getElementById('roleEmail').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u) await supabase.from('users').update({ role: 'admin' }).eq('id', u.id);
    };
    document.getElementById('makeFounderBtn').onclick = async () => {
        let email = document.getElementById('roleEmail').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u) await supabase.from('users').update({ role: 'founder' }).eq('id', u.id);
    };
    document.getElementById('removeRoleBtn').onclick = async () => {
        let email = document.getElementById('roleEmail').value;
        let { data: u } = await supabase.from('users').select('id').eq('email', email).single();
        if(u) await supabase.from('users').update({ role: 'member' }).eq('id', u.id);
    };

    checkAuth();
</script>
</body>
</html>
