<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Jungle Adventure - კაიფმანია</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: rgba(20, 26, 42, 0.9);
            --neon-green: #39ff14;
            --neon-blue: #00f0ff;
            --neon-gold: #ffcc00;
            --neon-red: #ff3333;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.25);
            border-radius: 16px;
            padding: 15px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-weight: bold;
            font-size: 15px;
        }

        .stat-box {
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #level { color: var(--neon-blue); }
        #score { color: var(--neon-gold); }
        #health { color: var(--neon-green); }

        canvas {
            background: linear-gradient(to bottom, #091a10, #040a06);
            border-radius: 10px;
            display: block;
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .controls-hint {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: #a0aec0;
        }

        .key {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--neon-green);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--neon-green);
            font-weight: bold;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 14, 20, 0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            text-align: center;
        }

        .overlay h2 {
            font-size: 38px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px currentColor;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h1>Panda Warrior: 10 Stages 🐼🎋</h1>
            <div class="stats-bar">
                <div class="stat-box">Stage: <span id="level">1/10</span></div>
                <div class="stat-box">HP: <span id="health">100%</span></div>
                <div class="stat-box">Score: <span id="score">0</span></div>
            </div>
        </div>

        <canvas id="adventureCanvas" width="900" height="450"></canvas>

        <div class="overlay" id="screenOverlay">
            <h2 id="overlayTitle" style="color: var(--neon-red);">GAME OVER</h2>
            <p id="overlayText" style="font-size: 18px; color: #cbd5e0;"></p>
            <button class="btn" id="overlayBtn" onclick="handleOverlayClick()">გაგრძელება</button>
        </div>
    </div>

    <div class="controls-hint">
        მოქმედება: <span class="key">Space</span> / <span class="key">W</span> - ახტომა | 
        <span class="key">F</span> / <span class="key">მაუსის კლიკი</span> - ბამბუკის ჯოხის დარტყმა 🎋
    </div>

    <script>
        const canvas = document.getElementById('adventureCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI ელემენტები
        const levelEl = document.getElementById('level');
        const healthEl = document.getElementById('health');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('screenOverlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayText = document.getElementById('overlayText');
        const overlayBtn = document.getElementById('overlayBtn');

        // თამაშის პროგრესის სისტემა
        let currentStage = 1;
        const maxStages = 10;
        let score = 0;
        let gameActive = true;
        let overlayMode = ""; // "GAME_OVER", "STAGE_CLEAR", "VICTORY"

        // მტრების ტიპები ტურების მიხედვით
        const enemyTypes = [
            { name: "გველი", color: "#48bb78", width: 30, height: 25, damage: 15, hp: 1, speedBonus: 0 },
            { name: "ველური ტახი", color: "#a0aec0", width: 45, height: 40, damage: 25, hp: 2, speedBonus: 1 },
            { name: "შავი ავაზა", color: "#2d3748", width: 50, height: 35, damage: 35, hp: 2, speedBonus: 2.5 }
        ];

        // პანდას ობიექტი (რეალური პროპორციებითა და ფერებით)
        const panda = {
            x: 100,
            y: 330,
            width: 55,
            height: 65,
            velocityY: 0,
            gravity: 0.65,
            jumpForce: -13.5,
            isJumping: false,
            health: 100,
            isAttacking: false,
            attackTimer: 0,
            swingAngle: 0
        };

        let enemies = [];
        let collectibles = []; // ბამბუკი და მონეტები
        let particles = [];
        let spawnTimer = 0;
        let stageProgress = 0; // რამდენი მეტრი გაიარა მიმდინარე ტურში
        const stageLength = 2000; // ყოველი ტურის სიგრძე ფრეიმებში

        // ივენთები
        window.addEventListener('keydown', e => {
            if (!gameActive) return;
            if ((e.code === 'Space' || e.code === 'KeyW') && !panda.isJumping) {
                panda.velocityY = panda.jumpForce;
                panda.isJumping = true;
                createParticles(panda.x + panda.width/2, panda.y + panda.height, '#4a5568', 8);
            }
            if (e.code === 'KeyF' && !panda.isAttacking) {
                useBambooStick();
            }
        });
        canvas.addEventListener('mousedown', () => { if(gameActive && !panda.isAttacking) useBambooStick(); });

        function useBambooStick() {
            panda.isAttacking = true;
            panda.attackTimer = 14;
            panda.swingAngle = -Math.PI / 3; // ჯოხის მოქნევის კუთხე
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    size: Math.random() * 4 + 2,
                    speedX: (Math.random() - 0.5) * 6,
                    speedY: (Math.random() - 0.5) * 6,
                    color: color, alpha: 1
                });
            }
        }

        // ობიექტების (მტრები, ბამბუკები, მონეტები) გენერაცია
        function generateObjects() {
            spawnTimer++;
            
            // მტრების გაჩენის სიხშირე მატულობს ტურებთან ერთად
            let spawnInterval = Math.max(35, 90 - currentStage * 5);
            if (spawnTimer % spawnInterval === 0 && stageProgress < stageLength - 200) {
                // ვირჩევთ მტერს მიმდინარე ტურის სირთულიდან გამომდინარე
                let typeIndex = 0;
                if (currentStage >= 4) typeIndex = Math.floor(Math.random() * 2);
                if (currentStage >= 7) typeIndex = Math.floor(Math.random() * 3);
                
                let t = enemyTypes[typeIndex];
                enemies.push({
                    x: canvas.width,
                    y: 395 - t.height,
                    ...t,
                    speed: (4 + currentStage * 0.4) + t.speedBonus,
                    currentHp: t.hp
                });
            }

            // ბონუსების გაჩენა (მონეტა ან საჭმელი ბამბუკი)
            if (spawnTimer % 140 === 0 && stageProgress < stageLength - 200) {
                let isBamboo = Math.random() > 0.65; // 35% შანსი ბამბუკის (ჰილის), 65% მონეტის
                collectibles.push({
                    x: canvas.width,
                    y: isBamboo ? 320 : 220 + Math.random() * 80,
                    width: 25,
                    height: 25,
                    type: isBamboo ? "bamboo" : "coin",
                    color: isBamboo ? "#39ff14" : "#ffcc00"
                });
            }
        }

        // ლოგიკური განახლება
        function update() {
            if (!gameActive) return;

            stageProgress += 2;

            // ტურის დასრულების შემოწმება
            if (stageProgress >= stageLength) {
                if (currentStage < maxStages) {
                    triggerOverlay("STAGE_CLEAR");
                } else {
                    triggerOverlay("VICTORY");
                }
                return;
            }

            // ფიზიკა
            panda.velocityY += panda.gravity;
            panda.y += panda.velocityY;

            if (panda.y > 330) {
                panda.y = 330;
                panda.velocityY = 0;
                panda.isJumping = false;
            }

            // ჯოხის ქნევის ანიმაცია
            if (panda.isAttacking) {
                panda.swingAngle += 0.15;
                panda.attackTimer--;
                if (panda.attackTimer <= 0) panda.isAttacking = false;
            }

            // მტრების მართვა
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.x -= e.speed;

                // ბამბუკის ჯოხის დარტყმის ზონა (შეტევა)
                if (panda.isAttacking && 
                    e.x < panda.x + panda.width + 55 && 
                    e.x + e.width > panda.x + panda.width) {
                    
                    createParticles(e.x + e.width/2, e.y + e.height/2, e.color, 8);
                    e.currentHp--;
                    
                    if (e.currentHp <= 0) {
                        enemies.splice(i, 1);
                        score += e.damage; // ქულები მტრის სიძლიერის მიხედვით
                        scoreEl.innerText = score;
                    } else {
                        e.x += 40; // უკუგდება დარტყმისას (Knockback)
                    }
                    panda.isAttacking = false; // ერთი დარტყმით ერთი ზიანი
                    continue;
                }

                // პანდასთან შეჯახება (ზიანი)
                if (e.x < panda.x + panda.width - 5 && 
                    e.x + e.width > panda.x + 5 && 
                    e.y < panda.y + panda.height && 
                    e.y + e.height > panda.y) {
                    
                    panda.health -= e.damage;
                    createParticles(panda.x + panda.width/2, panda.y + panda.height/2, '#ff3333', 12);
                    healthEl.innerText = panda.health + '%';
                    enemies.splice(i, 1);

                    if (panda.health <= 0) {
                        panda.health = 0;
                        healthEl.innerText = '0%';
                        triggerOverlay("GAME_OVER");
                    }
                    continue;
                }

                if (e.x + e.width < 0) enemies.splice(i, 1);
            }

            // ბონუსების მართვა
            for (let i = collectibles.length - 1; i >= 0; i--) {
                let c = collectibles[i];
                c.x -= 4; // გარემოს მოძრაობის სიჩქარე

                if (c.x < panda.x + panda.width && 
                    c.x + c.width > panda.x && 
                    c.y < panda.y + panda.height && 
                    c.y + c.height > panda.y) {
                    
                    if (c.type === "bamboo") {
                        panda.health = Math.min(100, panda.health + 20); // სიცოცხლის მომატება
                        healthEl.innerText = panda.health + '%';
                        createParticles(c.x, c.y, '#39ff14', 10);
                    } else {
                        score += 50; // ოქროს მონეტის ქულა
                        scoreEl.innerText = score;
                        createParticles(c.x, c.y, '#ffcc00', 10);
                    }
                    collectibles.splice(i, 1);
                    continue;
                }

                if (c.x + c.width < 0) collectibles.splice(i, 1);
            }

            // ეფექტები
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.speedX; p.y += p.speedY;
                p.alpha -= 0.025;
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            generateObjects();
        }

        // ეკრანზე დახატვა (ვიზუალი)
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. ჯუნგლების უკანა ფონის ხეები და ატმოსფერო
            ctx.fillStyle = "rgba(16, 44, 26, 0.4)";
            for (let i = 0; i < canvas.width; i += 120) {
                let treeX = i - (stageProgress * 0.5 % 120);
                ctx.fillRect(treeX, 150, 35, 250);
            }

            // მიწა (Ground) ჯუნგლების სტილში
            ctx.fillStyle = '#0a1f12';
            ctx.fillRect(0, 395, canvas.width, 55);
            ctx.strokeStyle = '#39ff14';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, 395); ctx.lineTo(canvas.width, 395); ctx.stroke();

            // 2. რეალური პანდას ხატვა
            ctx.save();
            ctx.translate(panda.x, panda.y);

            // თათები (შავი)
            ctx.fillStyle = "#1a202c";
            ctx.fillRect(8, 50, 12, 16);
            ctx.fillRect(panda.width - 20, 50, 12, 16);

            // სხეული (თეთრი შუაში, შავი მხრებით)
            ctx.beginPath();
            ctx.arc(panda.width/2, 35, 20, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(panda.width/2, 35, 15, 0, Math.PI*2);
            ctx.fill();

            // თავი (დიდი თეთრი პანდას თავი)
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(panda.width/2, 16, 16, 0, Math.PI*2);
            ctx.fill();

            // შავი ყურები
            ctx.fillStyle = "#1a202c";
            ctx.beginPath(); ctx.arc(panda.width/2 - 12, 3, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(panda.width/2 + 12, 3, 6, 0, Math.PI*2); ctx.fill();

            // დამახასიათებელი შავი თვალის გარშემო პატჩები
            ctx.beginPath(); ctx.ellipse(panda.width/2 - 6, 14, 4, 6, Math.PI/6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(panda.width/2 + 6, 14, 4, 6, -Math.PI/6, 0, Math.PI*2); ctx.fill();
            
            // პატარა მანათობელი თვალები
            ctx.fillStyle = "#39ff14";
            ctx.fillRect(panda.width/2 - 7, 12, 2, 2);
            ctx.fillRect(panda.width/2 + 5, 12, 2, 2);

            // 🎋 ნამდვილი მწვანე ბამბუკის ჯოხი ხელში
            ctx.restore();
            ctx.save();
            ctx.translate(panda.x + panda.width - 15, panda.y + 32);
            if (panda.isAttacking) {
                ctx.rotate(panda.swingAngle);
            }
            ctx.strokeStyle = "#2f855a"; // მუქი მწვანე
            ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(0, -35); ctx.stroke();
            // ბამბუკის მუხლები და ფოთლები
            ctx.strokeStyle = "#48bb78";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(6, -14); ctx.moveTo(0, -25); ctx.lineTo(-6, -29); ctx.stroke();
            ctx.restore();

            // 3. მტრების დახატვა
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);
                
                // მტრების სახიფათო თვალები
                ctx.fillStyle = "#ff3333";
                ctx.fillRect(e.x + 6, e.y + 10, 4, 4);
                
                // სიცოცხლის ბარი ძლიერ მტრებს
                if (e.hp > 1) {
                    ctx.fillStyle = "rgba(0,0,0,0.5)";
                    ctx.fillRect(e.x, e.y - 10, e.width, 4);
                    ctx.fillStyle = "#ff3333";
                    ctx.fillRect(e.x, e.y - 10, e.width * (e.currentHp / e.hp), 4);
                }
            });

            // 4. ბონუსების დახატვა (ოქრო / ბამბუკის საკვები)
            collectibles.forEach(c => {
                if (c.type === "bamboo") {
                    // საკვები ბამბუკის ყლორტი
                    ctx.fillStyle = "#39ff14";
                    ctx.fillRect(c.x + 8, c.y, 8, c.height);
                    ctx.fillStyle = "#2f855a";
                    ctx.fillRect(c.x + 2, c.y + 6, 14, 4);
                } else {
                    // მანათობელი ოქროს მონეტა
                    ctx.fillStyle = "#ffcc00";
                    ctx.shadowBlur = 10; ctx.shadowColor = "#ffcc00";
                    ctx.beginPath(); ctx.arc(c.x + 12, c.y + 12, 10, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });

            // 5. ეფექტების დახატვა
            particles.forEach(p => {
                ctx.save(); ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            });

            // ტურის პროგრესის ხაზი (ეკრანის ზედა ნაწილში)
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.fillRect(20, 15, canvas.width - 40, 4);
            ctx.fillStyle = "#00f0ff";
            ctx.fillRect(20, 15, (canvas.width - 40) * (stageProgress / stageLength), 4);
        }

        // თამაშის ძირითადი ციკლი
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // მენიუების მართვა
        function triggerOverlay(mode) {
            gameActive = false;
            overlayMode = mode;
            overlay.style.display = "flex";

            if (mode === "GAME_OVER") {
                overlayTitle.innerText = "GAME OVER";
                overlayTitle.style.color = "var(--neon-red)";
                overlayText.innerText = `თქვენ დამარცხდით მე-${currentStage} ტურში. დაგროვილი ქულები: ${score}`;
                overlayBtn.innerText = "თავიდან დაწყება";
            } else if (mode === "STAGE_CLEAR") {
                overlayTitle.innerText = `STAGE ${currentStage} CLEAR!`;
                overlayTitle.style.color = "var(--neon-blue)";
                overlayText.innerText = `ჯუნგლების ეს ნაწილი უსაფრთხოა. მოემზადე შემდეგი სირთულისთვის!`;
                overlayBtn.innerText = `ტური ${currentStage + 1}-ის დაწყება`;
            } else if (mode === "VICTORY") {
                overlayTitle.innerText = "🎉 სრული გამარჯვება! 🎉";
                overlayTitle.style.color = "var(--neon-gold)";
                overlayText.innerText = `თქვენ გაიარეთ 10-ვე ტური და გადაარჩინეთ ჯუნგლები!\nსაბოლოო ქულა: ${score}`;
                overlayBtn.innerText = "მთავარ გვერდზე დაბრუნება";
            }
        }

        function handleOverlayClick() {
            if (overlayMode === "GAME_OVER") {
                currentStage = 1;
                score = 0;
                resetStage();
            } else if (overlayMode === "STAGE_CLEAR") {
                currentStage++;
                resetStage();
            } else if (overlayMode === "VICTORY") {
                window.location.reload(); // ან ჩატში დაბრუნება
            }
        }

        function resetStage() {
            gameActive = true;
            stageProgress = 0;
            panda.health = 100;
            panda.y = 330;
            panda.velocityY = 0;
            panda.isJumping = false;
            panda.isAttacking = false;
            enemies = [];
            collectibles = [];
            particles = [];
            spawnTimer = 0;
            
            levelEl.innerText = `${currentStage}/10`;
            healthEl.innerText = "100%";
            scoreEl.innerText = score;
            overlay.style.display = "none";
        }

        // გაშვება
        gameLoop();
    </script>
</body>
