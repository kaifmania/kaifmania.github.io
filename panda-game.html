<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Panda Adventure</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1c1a30;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif; color: #ede0ff;
        }
        canvas {
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border: 4px solid rgba(160,80,255,0.35);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(168,85,247,0.3);
        }
        h1 { font-size: 2rem; margin-bottom: 10px; color: #f07aff; }
        .controls { margin-top: 15px; color: #b580e0; font-size: 0.9rem; }
        kbd { background: #252240; padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(160,80,255,0.35); }
    </style>
</head>
<body>

    <h1>🐼 PANDA ADVENTURE</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">
        კონტროლი: <kbd>A</kbd> <kbd>D</kbd> ან ისრები - მოძრაობა | <kbd>Space</kbd> ან <kbd>W</kbd> - ხტომა
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const gravity = 0.6;

    const panda = {
        x: 100, y: 200, 
        width: 50, height: 50, 
        velocityX: 0, velocityY: 0, 
        speed: 5, jumpForce: 13, 
        grounded: false,
        
        // ანიმაციისთვის
        direction: "right",
        isMoving: false,
        animTimer: 0
    };

    const platforms = [
        { x: 0, y: 350, width: 800, height: 50, color: "#57606f" }, 
        { x: 200, y: 240, width: 160, height: 20, color: "#d2dae2" },
        { x: 480, y: 170, width: 180, height: 20, color: "#d2dae2" }
    ];

    const keys = { Right: false, Left: false, Up: false };

    window.addEventListener("keydown", (e) => {
        if (e.code === "ArrowRight" || e.code === "KeyD") { keys.Right = true; panda.direction = "right"; panda.isMoving = true; }
        if (e.code === "ArrowLeft" || e.code === "KeyA") { keys.Left = true; panda.direction = "left"; panda.isMoving = true; }
        if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.Up = true;
    });

    window.addEventListener("keyup", (e) => {
        if (e.code === "ArrowRight" || e.code === "KeyD") keys.Right = false;
        if (e.code === "ArrowLeft" || e.code === "KeyA") keys.Left = false;
        if (!keys.Right && !keys.Left) panda.isMoving = false;
        if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.Up = false;
    });

    function checkCollision(player, obj) {
        return player.x < obj.x + obj.width &&
               player.x + player.width > obj.x &&
               player.y < obj.y + obj.height &&
               player.y + player.height > obj.y;
    }

    // 🚀 ფუნქცია, რომელიც კოდით ხატავს საყვარელ პანდას
    function drawPanda(x, y, width, height, direction, isMoving, animTimer) {
        ctx.save();
        
        // თუ მარცხნივ მიდის, მთლიან ნახატს ვატრიალებთ კოდით
        if (direction === "left") {
            ctx.translate(x + width/2, y + height/2);
            ctx.scale(-1, 1);
            ctx.translate(-(x + width/2), -(y + height/2));
        }

        let bounce = 0;
        if (isMoving) {
            bounce = Math.sin(animTimer * 0.3) * 3; // სირბილისას დახტუნაობის ეფექტი
        }

        // 1. ყურები (შავი)
        ctx.fillStyle = "#000000";
        ctx.beginPath(); ctx.arc(x + 12, y + 12 + bounce, 8, 0, Math.PI * 2); ctx.fill(); // მარცხენა
        ctx.beginPath(); ctx.arc(x + 38, y + 12 + bounce, 8, 0, Math.PI * 2); ctx.fill(); // მარჯვენა

        // 2. ტანი/თავი (თეთრი დიდი წრე)
        ctx.fillStyle = "#FFFFFF";
        ctx.beginPath(); ctx.arc(x + 25, y + 28 + bounce, 20, 0, Math.PI * 2); ctx.fill();

        // 3. შავი თვალის გარშემო ლაქები
        ctx.fillStyle = "#000000";
        ctx.beginPath(); ctx.arc(x + 17, y + 26 + bounce, 6, 0, Math.PI * 2); ctx.fill(); // მარცხენა ლაქა
        ctx.beginPath(); ctx.arc(x + 33, y + 26 + bounce, 6, 0, Math.PI * 2); ctx.fill(); // მარჯვენა ლაქა

        // 4. თეთრი თვალის გუგები
        ctx.fillStyle = "#FFFFFF";
        ctx.beginPath(); ctx.arc(x + 18, y + 25 + bounce, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 34, y + 25 + bounce, 2, 0, Math.PI * 2); ctx.fill();

        // 5. ცხვირი
        ctx.fillStyle = "#000000";
        ctx.beginPath(); ctx.arc(x + 25, y + 32 + bounce, 3, 0, Math.PI * 2); ctx.fill();

        // 6. ლოყები (წითელი საყვარელი პატარა წრეები)
        ctx.fillStyle = "#ff85a2";
        ctx.beginPath(); ctx.arc(x + 10, y + 33 + bounce, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 40, y + 33 + bounce, 3, 0, Math.PI * 2); ctx.fill();

        ctx.restore();
    }

    function gameLoop() {
        if (keys.Right) panda.velocityX = panda.speed;
        else if (keys.Left) panda.velocityX = -panda.speed;
        else panda.velocityX = 0;

        panda.velocityY += gravity;
        if (keys.Up && panda.grounded) {
            panda.velocityY = -panda.jumpForce;
            panda.grounded = false;
        }

        panda.x += panda.velocityX;
        panda.y += panda.velocityY;

        if (panda.x < 0) panda.x = 0;
        if (panda.x + panda.width > canvas.width) panda.x = canvas.width - panda.width;

        panda.grounded = false;
        for (let plat of platforms) {
            if (checkCollision(panda, plat)) {
                if (panda.velocityY > 0 && (panda.y + panda.height - panda.velocityY) <= plat.y) {
                    panda.y = plat.y - panda.height;
                    panda.velocityY = 0;
                    panda.grounded = true;
                }
            }
        }

        if (panda.isMoving) {
            panda.animTimer++;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // პლატფორმები
        for (let plat of platforms) {
            ctx.fillStyle = plat.color;
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        }

        // 🚀 ვხატავთ პანდას კოდით
        drawPanda(panda.x, panda.y, panda.width, panda.height, panda.direction, panda.isMoving, panda.animTimer);

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
