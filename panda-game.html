<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Cyber-Warrior - კაიფმანია</title>
    <style>
        /* ფერები და ცვლადები აღებულია კაიფმანიას ჩატის დიზაინიდან */
        :root {
            --bg-color: #0f111a;
            --panel-bg: rgba(23, 28, 41, 0.85);
            --neon-accent: #ff0055;
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --text-color: #ffffff;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            border-radius: 12px;
            padding: 10px;
            backdrop-filter: blur(10px);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        h1 {
            margin: 0;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-accent);
            text-shadow: 0 0 8px var(--neon-accent);
        }

        .stats {
            display: flex;
            gap: 20px;
            font-weight: bold;
            font-size: 16px;
        }

        #score { color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }
        #health { color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }

        canvas {
            background: #05070f;
            border-radius: 8px;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls-hint {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #8a9fc4;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-blue);
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--neon-blue);
            font-weight: bold;
        }

        /* Game Over ეკრანი */
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 17, 26, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .game-overlay h2 {
            font-size: 40px;
            color: var(--neon-accent);
            text-shadow: 0 0 15px var(--neon-accent);
            margin-bottom: 20px;
        }

        .btn-restart {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .btn-restart:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h1>Panda Warrior 🐼⚔️</h1>
            <div class="stats">
                <div>Score: <span id="score">0</span></div>
                <div>HP: <span id="health">100%</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="game-overlay" id="gameOverScreen">
            <h2>GAME OVER</h2>
            <p style="font-size: 18px; margin-bottom: 20px;">თქვენი ქულა: <span id="finalScore" style="color: var(--neon-blue);">0</span></p>
            <button class="btn-restart" onclick="resetGame()">თავიდან დაწყება</button>
        </div>
    </div>

    <div class="controls-hint">
        მართვა: <span class="key">Space</span> / <span class="key">W</span> - გახტომა | 
        <span class="key">F</span> / <span class="key">Left Click</span> - ხმლის დარტყმა (შეტევა)
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const healthEl = document.getElementById('health');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');

        // თამაშის ძირითადი მდგომარეობა
        let gameActive = true;
        let score = 0;
        let gameSpeed = 4;

        // პანდას (მოთამაშის) ობიექტი
        const panda = {
            x: 80,
            y: 300,
            width: 45,
            height: 55,
            velocityY: 0,
            gravity: 0.6,
            jumpForce: -13,
            isJumping: false,
            health: 100,
            isAttacking: false,
            attackTimer: 0,
            color: '#ffffff'
        };

        // მასივები მტრებისა და ეფექტებისთვის
        let enemies = [];
        let particles = [];
        let enemySpawnTimer = 0;

        // კლავიატურის ივენთები
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if ((e.code === 'Space' || e.code === 'KeyW') && !panda.isJumping && gameActive) {
                panda.velocityY = panda.jumpForce;
                panda.isJumping = true;
                createParticles(panda.x + panda.width/2, panda.y + panda.height, '#00f0ff', 8);
            }
            if (e.code === 'KeyF' && !panda.isAttacking && gameActive) {
                triggerAttack();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        canvas.addEventListener('mousedown', () => { if(gameActive) triggerAttack(); });

        function triggerAttack() {
            panda.isAttacking = true;
            panda.attackTimer = 15; // დარტყმის ხანგრძლივობა (ფრეიმებში)
            
            // დარტყმის ტალღის ნაწილაკები
            createParticles(panda.x + panda.width + 20, panda.y + panda.height/2, '#ff0055', 5);
        }

        // ნაწილაკების (Particles) სისტემა აფეთქებებისთვის
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    size: Math.random() * 4 + 2,
                    speedX: (Math.random() - 0.5) * 8,
                    speedY: (Math.random() - 0.5) * 8,
                    color: color,
                    alpha: 1
                });
            }
        }

        // მტრების გენერაცია (ბოროტი კიბერ-სამურაები/რობოტები)
        function spawnEnemy() {
            enemySpawnTimer++;
            if (enemySpawnTimer > Math.max(40, 100 - score * 0.5)) { // ქულების მატებასთან ერთად მტრები უფრო ხშირად ჩნდებიან
                enemySpawnTimer = 0;
                enemies.push({
                    x: canvas.width,
                    y: 310,
                    width: 35,
                    height: 45,
                    color: '#ff0055',
                    speed: gameSpeed + Math.random() * 2
                });
            }
        }

        // მთავარი განახლების ფუნქცია (Logic)
        function update() {
            if (!gameActive) return;

            // გრავიტაცია და პანდას მოძრაობა
            panda.velocityY += panda.gravity;
            panda.y += panda.velocityY;

            // მიწასთან შეჯახება
            if (panda.y > 300) {
                panda.y = 300;
                panda.velocityY = 0;
                panda.isJumping = false;
            }

            // შეტევის ტაიმერი
            if (panda.isAttacking) {
                panda.attackTimer--;
                if (panda.attackTimer <= 0) panda.isAttacking = false;
            }

            // მტრების ლოგიკა
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.x -= e.speed;

                // შეჯახება პანდას შეტევის ზონასთან (ხმლით კვლა)
                if (panda.isAttacking && 
                    e.x < panda.x + panda.width + 40 && 
                    e.x + e.width > panda.x && 
                    e.y < panda.y + panda.height && 
                    e.y + e.height > panda.y) {
                    
                    createParticles(e.x + e.width/2, e.y + e.height/2, '#ff0055', 12);
                    enemies.splice(i, 1);
                    score += 10;
                    scoreEl.innerText = score;
                    if (score % 50 === 0) gameSpeed += 0.5; // სირთულის მომატება
                    continue;
                }

                // შეჯახება უშუალოდ პანდასთან (ზიანის მიყენება)
                if (e.x < panda.x + panda.width && 
                    e.x + e.width > panda.x && 
                    e.y < panda.y + panda.height && 
                    e.y + e.height > panda.y) {
                    
                    panda.health -= 20;
                    createParticles(panda.x + panda.width/2, panda.y + panda.height/2, '#39ff14', 10);
                    healthEl.innerText = panda.health + '%';
                    enemies.splice(i, 1);

                    if (panda.health <= 0) {
                        endGame();
                    }
                    continue;
                }

                // თუ მტერმა გაცდა ეკრანს
                if (e.x + e.width < 0) {
                    enemies.splice(i, 1);
                    score += 1; // გადარჩენისთვის 1 ქულა
                    scoreEl.innerText = score;
                }
            }

            // ნაწილაკების განახლება
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.speedX;
                p.y += p.speedY;
                p.alpha -= 0.02;
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            spawnEnemy();
        }

        // ვიზუალური დახატვის ფუნქცია (Render)
        function draw() {
            // ეკრანის გასუფთავება კიბერპანკ ფონით
            ctx.fillStyle = '#05070f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ნეონის ჰორიზონტალური ხაზები (უკანა ფონი)
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.05)';
            ctx.lineWidth = 2;
            for(let i=0; i<canvas.height; i+=40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // მიწის (Ground) დახატვა ნეონის ხაზით
            ctx.fillStyle = '#0f1322';
            ctx.fillRect(0, 355, canvas.width, 45);
            ctx.strokeStyle = varColor('--neon-blue');
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = varColor('--neon-blue');
            ctx.beginPath();
            ctx.moveTo(0, 355);
            ctx.lineTo(canvas.width, 355);
            ctx.stroke();
            ctx.shadowBlur = 0; // ჩრდილის მოხსნა სხვა ელემენტებისთვის

            // 1. პანდა მეომრის დახატვა (სტილიზებული)
            ctx.save();
            ctx.translate(panda.x, panda.y);
            
            // პანდას სხეული (თეთრი/შავი კიბერ-ჯავშანი)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(panda.width/2, panda.height/2, 22, 0, Math.PI*2);
            ctx.fill();

            // შავი ყურები და თვალები
            ctx.fillStyle = '#11131c';
            ctx.beginPath();
            ctx.arc(10, 10, 8, 0, Math.PI*2); // მარცხენა ყური
            ctx.arc(panda.width - 10, 10, 8, 0, Math.PI*2); // მარჯვენა ყური
            ctx.fill();
            
            // თვალის პატჩები
            ctx.fillRect(12, 20, 8, 10);
            ctx.fillRect(panda.width - 20, 20, 8, 10);
            // მწვანე მანათობელი კიბერ-თვალები
            ctx.fillStyle = varColor('--neon-green');
            ctx.shadowBlur = 8;
            ctx.shadowColor = varColor('--neon-green');
            ctx.fillRect(14, 23, 4, 4);
            ctx.fillRect(panda.width - 18, 23, 4, 4);
            ctx.restore();
            ctx.shadowBlur = 0;

            // პანდას ხმალი (Attack Visual)
            if (panda.isAttacking) {
                ctx.save();
                ctx.strokeStyle = varColor('--neon-accent');
                ctx.lineWidth = 4;
                ctx.shadowBlur = 15;
                ctx.shadowColor = varColor('--neon-accent');
                ctx.beginPath();
                ctx.moveTo(panda.x + panda.width, panda.y + 10);
                ctx.lineTo(panda.x + panda.width + 35, panda.y + panda.height/2 + 5);
                ctx.stroke();
                ctx.restore();
                ctx.shadowBlur = 0;
            }

            // 2. მტრების დახატვა
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = e.color;
                // კიბერ რობოტის ფორმა
                ctx.fillRect(e.x, e.y, e.width, e.height);
                // მტრის მანათობელი ზოლი
                ctx.fillStyle = '#00f0ff';
                ctx.fillRect(e.x + 5, e.y + 10, e.width - 10, 4);
                ctx.shadowBlur = 0;
            });

            // 3. ნაწილაკების დახატვა
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            });
        }

        // დამხმარე ფუნქცია CSS ცვლადის მნიშვნელობის წასაკითხად
        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        // თამაშის მთავარი ციკლი (Loop)
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameActive = false;
            finalScoreEl.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            gameActive = true;
            score = 0;
            gameSpeed = 4;
            panda.health = 100;
            panda.y = 300;
            panda.velocityY = 0;
            panda.isJumping = false;
            panda.isAttacking = false;
            enemies = [];
            particles = [];
            scoreEl.innerText = '0';
            healthEl.innerText = '100%';
            gameOverScreen.style.display = 'none';
        }

        // თამაშის გაშვება
        gameLoop();
    </script>
</body>
</html>
