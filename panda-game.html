<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐼 პანდა მეომარი – ტურები</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    :root {
      --panda-bg: #0f071a;
      --panda-panel: #1e103b;
      --panda-border: #a55eff;
      --panda-text: #e9deff;
      --panda-accent: #c07aff;
      --panda-energy: #ffdc70;
    }
    body {
      background: linear-gradient(145deg, #0a0418 0%, #110b22 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Noto Sans Georgian', system-ui, sans-serif;
      padding: 20px;
    }
    .game-container {
      max-width: 1000px;
      width: 100%;
      border-radius: 48px;
      background: rgba(30, 16, 59, 0.55);
      backdrop-filter: blur(4px);
      padding: 14px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(165, 94, 255, 0.3);
    }
    .hud {
      background: rgba(20, 10, 40, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      border: 1px solid rgba(165, 94, 255, 0.5);
      flex-wrap: wrap;
    }
    .hp-area { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 120px; }
    .hp-label { font-size: 10px; font-weight: bold; color: #ffd966; }
    .bar-bg { flex: 1; height: 10px; background: #2f1a47; border-radius: 20px; overflow: hidden; }
    .bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #c07aff, #e3aaff); border-radius: 20px; transition: width 0.12s ease; }
    .boss-section { display: none; align-items: center; gap: 6px; min-width: 140px; }
    .boss-tag { font-size: 8px; font-weight: bold; background: #6b2e5a; padding: 2px 8px; border-radius: 20px; color: #ffb8e0; }
    .score-board { font-family: monospace; font-size: 18px; font-weight: bold; color: #ffdf8c; min-width: 80px; text-align: right; }
    .combo-indicator, .tour-indicator { font-size: 12px; font-weight: bold; background: #2c1b40; padding: 4px 12px; border-radius: 30px; color: #ffcd7e; white-space: nowrap; }
    .combo-indicator { opacity: 0; }
    .tour-indicator { background: #4a2a6e; color: #ffdd99; }
    canvas { display: block; width: 100%; background: #0c0522; border-radius: 32px; cursor: none; margin-bottom: 12px; border: 1px solid rgba(192, 122, 255, 0.4); }
    .mobile-panel { display: none; gap: 12px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
    .ctrl { background: rgba(30, 16, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid #b07eff; border-radius: 56px; padding: 10px 18px; font-size: 26px; color: white; cursor: pointer; transition: 0.05s linear; min-width: 65px; text-align: center; }
    .ctrl:active { transform: scale(0.93); background: #a55eff66; }
    @media (max-width: 700px) { .mobile-panel { display: flex; } .desktop-hint { display: none; } }
    .desktop-hint { text-align: center; font-size: 11px; color: #b59eff; margin-top: 10px; }
    kbd { background: #1f0f3a; padding: 2px 8px; border-radius: 12px; color: #dcb5ff; font-size: 10px; margin: 0 3px; }
    .overlay { position: fixed; inset: 0; background: rgba(11, 5, 22, 0.94); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .overlay.hide { display: none; }
    .modal { background: rgba(30, 16, 59, 0.96); border-radius: 64px; padding: 28px 24px; text-align: center; max-width: 460px; width: 90%; border: 2px solid #bc8eff; box-shadow: 0 0 40px #a55eff66; }
    .hero-big { font-size: 88px; filter: drop-shadow(0 8px 20px #bc8eff); }
    .title-lg { font-size: 36px; font-weight: 900; color: #ffecb3; margin: 12px 0; }
    .world-row { display: flex; gap: 14px; justify-content: center; margin: 26px 0; flex-wrap: wrap; }
    .world-card { background: #180f2e; border-radius: 32px; padding: 12px 16px; cursor: pointer; border: 2px solid #7e4edb; transition: 0.15s; min-width: 100px; }
    .world-card.selected { border-color: #ffdb6e; background: #2f1d54; box-shadow: 0 0 16px #ffdb6e; }
    .world-name { font-size: 20px; font-weight: bold; color: #e0c0ff; }
    .world-desc { font-size: 10px; color: #b48eff; }
    .btn-start { background: linear-gradient(135deg, #8b5cf6, #c07aff); border: none; padding: 12px 34px; border-radius: 60px; font-size: 20px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; margin-top: 8px; box-shadow: 0 6px 16px #6b3fc0; }
    .restart-btn { background: linear-gradient(135deg, #9c4d6e, #c45c8c); margin-top: 12px; }
    .score-final { font-size: 28px; font-weight: bold; margin: 12px 0; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="hud">
    <div class="hp-area"><span class="hp-label">❤️ ჯანი</span><div class="bar-bg"><div class="bar-fill" id="hpFill"></div></div></div>
    <div class="boss-section" id="bossWrap"><span class="boss-tag">💀 ბოსი</span><div class="bar-bg"><div class="bar-fill" id="bossFill"></div></div></div>
    <div class="score-board" id="scoreValue">0000</div>
    <div class="combo-indicator" id="comboBadge">⚡ x1</div>
    <div class="tour-indicator" id="tourBadge">🌊 ტური 1</div>
  </div>
  <canvas id="gameCanvas" width="900" height="400"></canvas>
  <div class="mobile-panel">
    <div class="ctrl" id="mLeft">◀</div><div class="ctrl" id="mRight">▶</div>
    <div class="ctrl" id="mJump">🔼</div><div class="ctrl" id="mAttack">⚔️</div><div class="ctrl" id="mBeam">✨</div>
  </div>
  <div class="desktop-hint"><kbd>← →</kbd> სიარული &nbsp; <kbd>↑/space</kbd> ორმაგი ნახტომი &nbsp; <kbd>Z</kbd> დარტყმა &nbsp; <kbd>X</kbd> იასამნისფერი სხივი</div>
</div>

<div id="startOverlay" class="overlay"><div class="modal"><div class="hero-big">🐼🎋</div><div class="title-lg">პანდა: იასამნისფერი მეომარი</div><div class="world-row" id="worldPicker"><div class="world-card" data-world="1"><div class="world-name">🌿 ბამბუკის ტყე</div><div class="world-desc">მსუბუქი მტრები</div></div><div class="world-card" data-world="2"><div class="world-name">🏙️ ქალაქი</div><div class="world-desc">ჯარისკაცები + ტანკები</div></div><div class="world-card" data-world="3"><div class="world-name">🏭 ქარხანა</div><div class="world-desc">რთული მტრები + ბოსი</div></div></div><button class="btn-start" id="startBtn">⚡ თავგადასავალი ⚡</button></div></div>
<div id="deathOverlay" class="overlay hide"><div class="modal"><div class="hero-big">💔🐼</div><div class="title-lg">დამარცხდი...</div><div class="score-final" id="deathScore">0</div><button class="btn-start restart-btn" id="restartGameBtn">🔄 თავიდან</button></div></div>
<div id="winOverlay" class="overlay hide"><div class="modal"><div class="hero-big">🏆🐼✨</div><div class="title-lg">გამარჯვება!</div><div class="score-final" id="winScore">0</div><button class="btn-start restart-btn" id="winAgainBtn">🎮 ახალი თამაში</button></div></div>

<script>
  (function(){
    const root = getComputedStyle(document.documentElement);
    const VIOLET_ACCENT = root.getPropertyValue('--panda-accent').trim() || '#c07aff';
    const VIOLET_BG = root.getPropertyValue('--panda-bg').trim() || '#0f071a';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 900, H = 400;
    canvas.width = W; canvas.height = H;

    let gameAlive = false, frame = 0, score = 0, combo = 0, comboTimer = 0, currentWorld = 1, worldClock = 0;
    let bossSpawnFlag = false, bossEngaged = false, bossFinalDefeated = false;
    
    // ========== ტურები (Tours) ==========
    let currentTour = 1;
    let enemiesKilledThisTour = 0;
    const ENEMIES_PER_TOUR = 8;  // ყოველ 8 მოკლულ მტერზე ახალი ტური
    
    const panda = { x: 110, y: H - 82, w: 38, h: 48, vx: 0, vy: 0, onGround: true, jumpsLeft: 2, hp: 100, maxHp: 100, dir: 1, attackCd: 0, beamCd: 0, beamEnergy: 3, maxBeam: 3, invincibleTimer: 0, dead: false, actionState: 'idle' };
    let platforms = [], enemies = [], items = [], playerBeams = [], particles = [], spawnDelay = 0;
    let boss = { active: false, x: W-140, y: H-105, w: 96, h: 88, hp: 400, maxHp: 400, phase: 1, dir: -1, attackTimer: 0, hitEffect: 0, dead: false, bullets: [], vy: 0, vx: 0 };

    // ========== INPUT ==========
    const keys = {}, mobileKeys = {};
    document.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space') e.preventDefault(); });
    document.addEventListener('keyup', e => { keys[e.code] = false; });
    function isPressed(...codes) { return codes.some(c => keys[c] || mobileKeys[c]); }

    const mbLeft = document.getElementById('mLeft'), mbRight = document.getElementById('mRight'), mbJump = document.getElementById('mJump'), mbAttack = document.getElementById('mAttack'), mbBeam = document.getElementById('mBeam');
    if(mbLeft) mbLeft.addEventListener('touchstart', e => { e.preventDefault(); mobileKeys['ArrowLeft']=true; });
    if(mbLeft) mbLeft.addEventListener('touchend', () => { mobileKeys['ArrowLeft']=false; });
    if(mbRight) mbRight.addEventListener('touchstart', e => { e.preventDefault(); mobileKeys['ArrowRight']=true; });
    if(mbRight) mbRight.addEventListener('touchend', () => { mobileKeys['ArrowRight']=false; });
    if(mbJump) mbJump.addEventListener('touchstart', e => { e.preventDefault(); mobileKeys['Space']=true; setTimeout(()=>mobileKeys['Space']=false, 180); });
    if(mbAttack) mbAttack.addEventListener('touchstart', e => { e.preventDefault(); mobileKeys['KeyZ']=true; setTimeout(()=>mobileKeys['KeyZ']=false, 100); });
    if(mbBeam) mbBeam.addEventListener('touchstart', e => { e.preventDefault(); mobileKeys['KeyX']=true; setTimeout(()=>mobileKeys['KeyX']=false, 100); });

    function buildWorld(world) {
      platforms = [];
      if(world === 1) platforms = [{x:130,y:315,w:85,h:16},{x:280,y:265,w:80,h:16},{x:460,y:285,w:90,h:16},{x:640,y:230,w:100,h:16},{x:790,y:295,w:70,h:16}];
      else if(world === 2) platforms = [{x:110,y:305,w:90,h:16},{x:250,y:250,w:85,h:16},{x:420,y:275,w:90,h:16},{x:590,y:215,w:105,h:16},{x:745,y:285,w:85,h:16}];
      else platforms = [{x:100,y:300,w:90,h:16},{x:230,y:245,w:80,h:16},{x:400,y:265,w:95,h:16},{x:580,y:200,w:110,h:16},{x:720,y:270,w:85,h:16}];
    }

    // მტრის სპაუნი (ტურის სირთულის მიხედვით)
    function spawnEnemy() {
      let type = 'soldier';
      if(currentWorld === 1) type = Math.random() < 0.65 ? 'soldier' : 'drone';
      else if(currentWorld === 2) type = Math.random() < 0.4 ? 'tank' : (Math.random() < 0.5 ? 'soldier' : 'drone');
      else type = Math.random() < 0.55 ? 'tank' : 'turret';
      
      let side = Math.random() < 0.6 ? 'right' : 'left';
      let x = side === 'right' ? W + 45 : -65, y = H - 85, hp = 34, ww = 32, hh = 40;
      
      // ტურის მიხედვით გაძლიერება
      let tourBonus = Math.floor(currentTour / 3);
      if(type === 'soldier') { hp = 38 + tourBonus * 5; ww = 30; hh = 42; }
      if(type === 'drone') { hp = 28 + tourBonus * 4; ww = 32; hh = 30; y = H - 110; }
      if(type === 'tank') { hp = 90 + tourBonus * 8; ww = 55; hh = 44; y = H - 88; }
      if(type === 'turret') { hp = 68 + tourBonus * 6; ww = 38; hh = 46; y = H - 90; }
      
      enemies.push({ x, y, w: ww, h: hh, type, dir: side==='right'?-1:1, hp, maxHp: hp, vx:0, vy:0, attackTimer:0, hitFlash:0, dead:false, deadTimer:0, projectiles:[] });
    }

    function addTourBonus() {
      // ტურის განახლება
      document.getElementById('tourBadge').innerHTML = `🌊 ტური ${currentTour}`;
      // ტურის მიხედვით ჯანმრთელობის აღდგენა (პატარა ბონუსი)
      panda.hp = Math.min(panda.maxHp, panda.hp + 5);
      updateHUD();
      // ვიზუალური ეფექტი
      addParticles(panda.x + panda.w/2, panda.y + panda.h/2, '#ffd966', 15);
    }

    function onEnemyKilled() {
      enemiesKilledThisTour++;
      if(enemiesKilledThisTour >= ENEMIES_PER_TOUR) {
        currentTour++;
        enemiesKilledThisTour = 0;
        addTourBonus();
      }
    }

    function damagePanda(amt) { 
      if(panda.invincibleTimer > 0 || panda.dead) return; 
      panda.hp = Math.max(0, panda.hp - amt); 
      panda.invincibleTimer = 22; 
      addParticles(panda.x+panda.w/2, panda.y+15, '#ff9fcf', 8); 
      if(panda.hp <= 0) { panda.dead = true; gameAlive = false; showDeathOverlay(); } 
    }
    
    function addParticles(x,y,c,count=6) { for(let i=0;i<count;i++) particles.push({x,y, vx:(Math.random()-0.5)*5, vy:-Math.random()*4, life:22, color:c, size:3+Math.random()*4}); }

    function pandaAttack() {
      if(panda.attackCd > 0) return;
      panda.attackCd = 15; panda.actionState = 'attack';
      let ax = panda.dir === 1 ? panda.x+panda.w : panda.x-48, ay = panda.y, aw = 58, ah = panda.h;
      for(let e of enemies) {
        if(e.dead) continue;
        if(ax < e.x+e.w && ax+aw > e.x && ay < e.y+e.h && ay+ah > e.y) {
          let dmg = 18 + (combo>1 ? combo*3 : 0) + Math.floor(currentTour/4);
          e.hp -= dmg; e.hitFlash = 8; addParticles(e.x+e.w/2, e.y+e.h/2, '#ffb86c', 6);
          if(e.hp <= 0) { 
            e.dead = true; 
            combo++; comboTimer = 80; 
            let addScore = 15 * Math.max(1, combo);
            score += addScore; 
            onEnemyKilled();
            if(Math.random() < 0.32) items.push({x:e.x+e.w/2-12, y:e.y-12, w:24, h:24, type: Math.random()<0.7?'bamboo':'energy', bob:0}); 
          }
        }
      }
      if(boss.active && !boss.dead && ax < boss.x+boss.w && ax+aw > boss.x && ay < boss.y+boss.h && ay+ah > boss.y) {
        let dmg = 24 + (combo>1 ? combo*4 : 0) + Math.floor(currentTour/5);
        boss.hp -= dmg; boss.hitEffect = 12; addParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#ff9a6e', 9);
        if(boss.hp <= 0) { boss.dead = true; score += 600; combo+=5; comboTimer=180; bossEngaged=false; bossFinalDefeated=true; }
        if(boss.hp < boss.maxHp*0.4 && boss.phase === 1) boss.phase = 2;
      }
    }

    function shootBeamAttack() {
      if(panda.beamCd > 0 || panda.beamEnergy <= 0) return;
      panda.beamEnergy--; panda.beamCd = 48; panda.actionState = 'beam';
      playerBeams.push({ x: panda.x + (panda.dir===1?panda.w:0), y: panda.y + panda.h/2 - 5, w: 28, h: 14, vx: panda.dir * 10, life: 65 });
    }

    function updateGame() {
      if(!gameAlive) return;
      frame++;
      if(panda.dead) return;
      if(panda.invincibleTimer > 0) panda.invincibleTimer--;
      if(panda.attackCd > 0) panda.attackCd--;
      if(panda.beamCd > 0) panda.beamCd--;
      if(frame % 170 === 0 && panda.beamEnergy < panda.maxBeam) panda.beamEnergy++;
      if(comboTimer > 0) comboTimer--; else combo = 0;

      let move = 0;
      if(isPressed('ArrowLeft')) move = -1;
      if(isPressed('ArrowRight')) move = 1;
      panda.vx = move * 3.5;
      panda.vx *= 0.86;
      if(panda.vx !== 0) panda.dir = panda.vx > 0 ? 1 : -1;
      if(isPressed('ArrowUp','Space') && panda.jumpsLeft > 0 && !panda._lockJump) {
        panda.vy = -10.2;
        panda.jumpsLeft--;
        panda._lockJump = true;
        setTimeout(()=> panda._lockJump=false, 210);
      }
      panda.vy += 0.52;
      panda.x += panda.vx;
      panda.y += panda.vy;
      panda.onGround = false;
      const groundY = H - 70;
      if(panda.y + panda.h >= groundY) { panda.y = groundY - panda.h; panda.vy = 0; panda.onGround = true; panda.jumpsLeft = 2; }
      for(let p of platforms) {
        if(panda.x + panda.w > p.x && panda.x < p.x+p.w && panda.y+panda.h > p.y && panda.y+panda.h < p.y+p.h+10 && panda.vy >= 0) {
          panda.y = p.y - panda.h; panda.vy = 0; panda.onGround = true; panda.jumpsLeft = 2;
        }
      }
      panda.x = Math.min(Math.max(panda.x, 12), W - panda.w - 12);

      if(isPressed('KeyZ')) pandaAttack();
      if(isPressed('KeyX')) shootBeamAttack();
      if(panda.actionState === 'attack' && frame % 7 === 0) panda.actionState = 'idle';
      if(panda.actionState === 'beam' && frame % 9 === 0) panda.actionState = 'idle';

      // ბოსის გააქტიურება
      if(currentWorld === 3 && !bossSpawnFlag && !bossEngaged && !bossFinalDefeated && worldClock > 620) {
        bossSpawnFlag = true;
        bossEngaged = true;
        boss.active = true;
        boss.x = W-140; boss.y = H-108; boss.hp = 410 + Math.floor(currentTour/2); boss.maxHp = boss.hp; boss.phase=1; boss.dead=false;
        document.getElementById('bossWrap').style.display = 'flex';
        enemies = [];
      }

      if(!bossEngaged && enemies.filter(e=>!e.dead).length < 5 && !bossSpawnFlag) {
        spawnDelay--;
        if(spawnDelay <= 0) { spawnEnemy(); spawnDelay = 68 - (currentWorld*4) - Math.floor(currentTour/5); if(spawnDelay < 25) spawnDelay = 25; }
      }

      // მტრების ლოგიკა (შემოკლებით)
      for(let i=0;i<enemies.length;i++) {
        let e = enemies[i];
        if(e.dead) { e.deadTimer++; if(e.deadTimer>32) { enemies.splice(i,1); i--; } continue; }
        if(e.hitFlash>0) e.hitFlash--;
        let dx = panda.x - e.x;
        if(e.type === 'soldier') {
          e.x += dx>0?0.9:-0.9;
          e.vy+=0.5; e.y+=e.vy; if(e.y>=H-85) { e.y=H-85; e.vy=0; }
          if(Math.abs(dx)<58 && e.attackTimer>45) { damagePanda(12 + Math.floor(currentTour/6)); e.attackTimer=0; addParticles(panda.x, panda.y, '#ff99bb',5); }
          e.attackTimer++;
        } else if(e.type === 'drone') {
          e.x += (panda.x - e.x)*0.028;
          e.y += (panda.y-40 - e.y)*0.022;
          e.attackTimer++;
          if(e.attackTimer>68) { e.attackTimer=0; e.projectiles.push({x:e.x+e.w/2,y:e.y+e.h, vx:(Math.random()-0.5)*3.2, vy:3.8, w:8, h:8, life:48, type:'bomb'}); }
        } else if(e.type === 'tank') {
          let step = dx>0?0.65:-0.65;
          if(Math.abs(dx)>55) e.x += step;
          e.vy+=0.5; e.y+=e.vy; if(e.y>=H-90) e.y=H-90;
          e.attackTimer++;
          if(e.attackTimer>72) { e.attackTimer=0; e.projectiles.push({x:e.x+(e.dir===1?e.w:0), y:e.y+e.h/2, vx:(dx>0?4.8:-4.8), vy:0, w:14, h:11, life:75, type:'shell'}); }
        } else if(e.type === 'turret') {
          e.attackTimer++;
          if(e.attackTimer>60) {
            e.attackTimer=0;
            let ang = Math.atan2(panda.y - (e.y+e.h/2), panda.x - (e.x+e.w/2));
            e.projectiles.push({x:e.x+e.w/2, y:e.y+e.h/2, vx:Math.cos(ang)*4.4, vy:Math.sin(ang)*4.4, w:9, h:9, life:60, type:'laser'});
          }
        }
        for(let j=0;j<e.projectiles.length;j++) {
          let pj = e.projectiles[j];
          pj.x+=pj.vx; pj.y+=pj.vy; pj.life--;
          if(pj.x < panda.x+panda.w && pj.x+pj.w > panda.x && pj.y < panda.y+panda.h && pj.y+pj.h > panda.y) {
            damagePanda(pj.type==='shell'?18:13);
            e.projectiles.splice(j,1); j--;
          } else if(pj.life<=0) e.projectiles.splice(j,1), j--;
        }
      }

      // ბოსის ლოგიკა (შემოკლებით)
      if(boss.active && !boss.dead) {
        if(boss.hitEffect>0) boss.hitEffect--;
        boss.vx = boss.dir * (boss.phase===2?2.6:1.9);
        boss.vy += 0.48;
        boss.x += boss.vx; boss.y += boss.vy;
        if(boss.x < 45) boss.dir = 1; if(boss.x+boss.w > W-45) boss.dir = -1;
        if(boss.y >= H-108) { boss.y = H-108; boss.vy=0; if(boss.phase===2 && Math.random()<0.028) boss.vy = -10.5; }
        boss.attackTimer++;
        let rate = boss.phase===1 ? 74 : 50;
        if(boss.attackTimer >= rate) {
          boss.attackTimer=0;
          if(boss.phase===1) {
            boss.bullets.push({x:boss.x, y:boss.y+boss.h*0.4, vx:-5.4, vy:0, w:15, h:13, life:75, type:'shell'});
            boss.bullets.push({x:boss.x+boss.w, y:boss.y+boss.h*0.4, vx:5.4, vy:0, w:15, h:13, life:75, type:'shell'});
          } else {
            for(let ang=-0.75; ang<=0.75; ang+=0.4) {
              boss.bullets.push({x:boss.x+boss.w/2, y:boss.y+boss.h/2, vx:Math.sin(ang)*6.2, vy:-2.5+Math.random()*5, w:11, h:11, life:70, type:'laser'});
            }
          }
        }
        for(let i=0;i<boss.bullets.length;i++) {
          let pj = boss.bullets[i];
          pj.x+=pj.vx; pj.y+=pj.vy; pj.life--;
          if(pj.x<panda.x+panda.w && pj.x+pj.w>panda.x && pj.y<panda.y+panda.h && pj.y+pj.h>panda.y) {
            damagePanda(pj.type==='shell'?22:15);
            boss.bullets.splice(i,1); i--;
          } else if(pj.life<=0) boss.bullets.splice(i,1), i--;
        }
        document.getElementById('bossFill').style.width = Math.max(0,(boss.hp/boss.maxHp)*100)+'%';
        if(boss.hp <= 0) { boss.dead=true; bossEngaged=false; document.getElementById('bossWrap').style.display='none'; }
      }
      if(boss.dead && bossEngaged && currentWorld===3) { gameAlive=false; showWinOverlay(); }

      for(let i=0;i<playerBeams.length;i++) {
        let b = playerBeams[i];
        b.x += b.vx; b.life--;
        for(let e of enemies) {
          if(!e.dead && b.x < e.x+e.w && b.x+b.w > e.x && b.y < e.y+e.h && b.y+b.h > e.y) {
            e.hp -= 30; e.hitFlash=10;
            if(e.hp<=0) { e.dead=true; combo++; comboTimer=80; score+=22*Math.max(1,combo); onEnemyKilled(); }
            playerBeams.splice(i,1); i--; break;
          }
        }
        if(i>=0 && b.life<=0) playerBeams.splice(i,1);
      }

      for(let i=0;i<items.length;i++) {
        let it = items[i]; it.bob+=0.12;
        let yoff = Math.sin(it.bob)*4;
        if(panda.x < it.x+it.w && panda.x+panda.w > it.x && panda.y < it.y+yoff+it.h && panda.y+panda.h > it.y+yoff) {
          if(it.type === 'bamboo') panda.hp = Math.min(panda.maxHp, panda.hp+22);
          else panda.beamEnergy = Math.min(panda.maxBeam, panda.beamEnergy+1);
          score += 12;
          items.splice(i,1); i--;
        }
      }

      particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; });

      if(!bossEngaged && currentWorld < 3 && !bossSpawnFlag && !bossFinalDefeated) {
        worldClock++;
        if(worldClock > 1250) {
          currentWorld++;
          buildWorld(currentWorld);
          worldClock = 0;
          enemies = []; items = [];
          bossSpawnFlag = false; bossEngaged=false;
          document.getElementById('bossWrap').style.display = 'none';
          if(currentWorld===3) bossSpawnFlag=false;
        }
      }
      updateHUD();
    }

    function updateHUD() {
      document.getElementById('hpFill').style.width = (panda.hp/panda.maxHp)*100+'%';
      document.getElementById('scoreValue').innerText = String(score).padStart(4,'0');
      let comboDiv = document.getElementById('comboBadge');
      if(combo>1) { comboDiv.innerText = `✨ x${combo}`; comboDiv.style.opacity='1'; }
      else comboDiv.style.opacity='0';
    }

    function draw() {
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle = VIOLET_BG; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = VIOLET_ACCENT; ctx.fillRect(0,H-70,W,4);
      ctx.fillStyle = '#20143a'; ctx.fillRect(0,H-70,W,70);
      for(let p of platforms) { ctx.fillStyle = '#2c1b55'; ctx.fillRect(p.x,p.y,p.w,p.h); ctx.fillStyle = '#a55eff'; ctx.fillRect(p.x,p.y,p.w,3); }

      for(let e of enemies) {
        if(e.dead) continue;
        ctx.fillStyle = e.type==='drone'?'#8b6db3':e.type==='soldier'?'#7850b0':e.type==='tank'?'#aa77dd':'#bd84e6';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        if(e.hitFlash>0) { ctx.fillStyle='#ffffffaa'; ctx.fillRect(e.x,e.y,e.w,e.h); }
        for(let pj of e.projectiles) { ctx.fillStyle='#ffc285'; ctx.fillRect(pj.x,pj.y,pj.w,pj.h); }
      }
      if(boss.active && !boss.dead) {
        ctx.fillStyle = boss.phase===2?'#c44b6e':'#8c54c0';
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        if(boss.hitEffect>0) { ctx.fillStyle='#ffadad'; ctx.fillRect(boss.x,boss.y,boss.w,boss.h); }
        for(let pj of boss.bullets) ctx.fillRect(pj.x,pj.y,pj.w,pj.h);
      }
      for(let b of playerBeams) { ctx.fillStyle = '#ffc970'; ctx.fillRect(b.x, b.y, b.w, b.h); }
      for(let it of items) { let yoff = Math.sin(it.bob)*4; ctx.fillStyle=it.type==='bamboo'?VIOLET_ACCENT:'#ffdc6a'; ctx.fillRect(it.x, it.y+yoff, it.w, it.h); }

      // 🐼 პანდას დახატვა
      ctx.save();
      if(panda.invincibleTimer>0 && (frame%3<1)) ctx.globalAlpha=0.6;
      // სხეული (თეთრი)
      ctx.fillStyle = '#f5f5f5'; ctx.fillRect(panda.x, panda.y, panda.w, panda.h);
      // შავი ლაქები
      ctx.fillStyle = '#2c2c2c'; ctx.fillRect(panda.x+6, panda.y+22, 8, 12); ctx.fillRect(panda.x+panda.w-14, panda.y+22, 8, 12);
      // თვალები
      ctx.fillStyle = '#111'; ctx.fillRect(panda.x+8, panda.y+10, 6, 7); ctx.fillRect(panda.x+panda.w-14, panda.y+10, 6, 7);
      // ცხვირი
      ctx.fillStyle = '#8B4513'; ctx.fillRect(panda.x+panda.w/2-3, panda.y+32, 6, 10);
      // ყურები
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(panda.x-4, panda.y-2, 12, 12); ctx.fillRect(panda.x+panda.w-8, panda.y-2, 12, 12);
      // ენერგიის მაჩვენებელი
      ctx.fillStyle = '#f5cb5c'; ctx.font = "bold 18px monospace"; ctx.fillText("⚡"+panda.beamEnergy, panda.x-14, panda.y-4);
      ctx.restore();

      for(let p of particles) { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); }
    }

    function gameLoop() { if(gameAlive) updateGame(); draw(); requestAnimationFrame(gameLoop); }

    function startAdventure(world) {
      currentWorld = world;
      buildWorld(currentWorld);
      score = 0; combo = 0; comboTimer = 0; frame = 0; worldClock = 0;
      currentTour = 1; enemiesKilledThisTour = 0;
      bossEngaged = false; bossSpawnFlag = false; bossFinalDefeated = false;
      enemies = []; items = []; playerBeams = []; particles = [];
      panda.hp = panda.maxHp; panda.dead = false; panda.x = 100; panda.y = H-82;
      panda.vx = 0; panda.vy = 0; panda.beamEnergy = 3; panda.attackCd = 0; panda.beamCd = 0;
      panda.invincibleTimer = 0;
      boss.active = false; boss.dead = false;
      document.getElementById('bossWrap').style.display = 'none';
      document.getElementById('tourBadge').innerHTML = `🌊 ტური 1`;
      gameAlive = true;
      closeAllOverlays();
    }

    function closeAllOverlays() {
      document.getElementById('startOverlay').classList.add('hide');
      document.getElementById('deathOverlay').classList.add('hide');
      document.getElementById('winOverlay').classList.add('hide');
    }
    function showDeathOverlay() { document.getElementById('deathScore').innerText = score; document.getElementById('deathOverlay').classList.remove('hide'); }
    function showWinOverlay() { document.getElementById('winScore').innerText = score; document.getElementById('winOverlay').classList.remove('hide'); }

    let pickedWorld = 1;
    document.querySelectorAll('.world-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.world-card').forEach(c=>c.classList.remove('selected'));
        card.classList.add('selected');
        pickedWorld = parseInt(card.dataset.world);
      });
    });
    document.getElementById('startBtn').addEventListener('click', () => startAdventure(pickedWorld));
    document.getElementById('restartGameBtn').addEventListener('click', () => startAdventure(currentWorld));
    document.getElementById('winAgainBtn').addEventListener('click', () => startAdventure(1));
    document.querySelector('.world-card').classList.add('selected');
    gameLoop();
  })();
</script>
</body>
</html>
