<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐼 პანდა-რანერი</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;
  --ground:#1a1630;
  --accent:#c084fc;
  --accent2:#f0abfc;
  --green:#4ade80;
  --red:#f87171;
  --panel:rgba(30,25,60,0.95);
  --border:rgba(192,132,252,0.3);
  --text:#ede0ff;
  --text2:#9d7bc8;
}
body{
  font-family:'Noto Sans Georgian',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  user-select:none;
}

/* stars bg */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(192,132,252,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(240,171,252,0.04) 0%, transparent 50%);
  pointer-events:none;
}

#gameWrap{
  position:relative;
  width:min(820px,98vw);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

/* HUD */
#hud{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 4px;
}
.hud-score{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(13px,2.5vw,18px);
  color:var(--accent2);
  letter-spacing:1px;
}
.hud-lives{font-size:clamp(16px,3vw,22px);letter-spacing:2px;}
.hud-hi{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(10px,1.8vw,13px);
  color:var(--text2);
}

/* Canvas */
#gameCanvas{
  width:min(820px,98vw);
  height:min(320px,44vw);
  border-radius:20px;
  border:2px solid var(--border);
  box-shadow:0 0 40px rgba(192,132,252,0.15),0 8px 32px rgba(0,0,0,0.5);
  display:block;
  cursor:pointer;
  image-rendering:pixelated;
}

/* Controls bar */
#controls{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:center;
}
.ctrl-btn{
  padding:9px 22px;
  border-radius:50px;
  border:1.5px solid var(--border);
  background:var(--panel);
  color:var(--text);
  font-family:'Noto Sans Georgian',sans-serif;
  font-size:13px;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  gap:6px;
}
.ctrl-btn:hover{background:rgba(192,132,252,0.15);border-color:var(--accent);}
.ctrl-btn.primary{
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  border-color:transparent;
  font-weight:600;
  box-shadow:0 4px 18px rgba(168,85,247,0.4);
}
.ctrl-btn.primary:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(168,85,247,0.55);}
.ctrl-btn.danger{border-color:rgba(248,113,113,0.4);color:var(--red);}
.ctrl-btn.danger:hover{background:rgba(248,113,113,0.1);}

/* speed badge */
#speedBadge{
  font-family:'Unbounded',sans-serif;
  font-size:10px;
  padding:4px 12px;
  border-radius:20px;
  background:rgba(74,222,128,0.1);
  border:1px solid rgba(74,222,128,0.3);
  color:var(--green);
  letter-spacing:.5px;
}

/* Overlay screens */
.screen{
  position:absolute;
  inset:0;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:rgba(10,8,25,0.88);
  backdrop-filter:blur(6px);
  z-index:10;
  pointer-events:none;
}
.screen.hidden{display:none;}
.screen-emoji{font-size:clamp(40px,8vw,72px);line-height:1;filter:drop-shadow(0 0 20px rgba(192,132,252,0.5));}
.screen-title{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(14px,3vw,22px);
  font-weight:900;
  color:var(--text);
  letter-spacing:.5px;
  text-align:center;
}
.screen-sub{
  font-size:clamp(11px,2vw,14px);
  color:var(--text2);
  text-align:center;
  max-width:320px;
  line-height:1.6;
}
.screen-score{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(18px,4vw,32px);
  font-weight:900;
  color:var(--accent2);
  text-shadow:0 0 20px rgba(240,171,252,0.5);
}
.screen-hint{
  font-size:11px;
  color:var(--text2);
  font-family:'Unbounded',sans-serif;
  letter-spacing:.5px;
  margin-top:4px;
  animation:blink 1.2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Mobile jump btn */
#mobileJump{
  display:none;
  width:70px;height:70px;
  border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  border:none;
  color:#fff;
  font-size:28px;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(168,85,247,0.5);
  transition:transform .1s;
  position:fixed;
  bottom:24px;
  right:24px;
  z-index:100;
  align-items:center;
  justify-content:center;
}
#mobileJump:active{transform:scale(0.9);}
@media(max-width:600px){
  #mobileJump{display:flex;}
  #gameCanvas{height:min(260px,55vw);}
}

/* Score popup */
@keyframes scoreFloat{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.4)}
}
</style>
</head>
<body>

<div id="gameWrap">
  <div id="hud">
    <div class="hud-score">⚡ <span id="scoreEl">0</span></div>
    <div class="hud-lives" id="livesEl">🐼🐼🐼</div>
    <div class="hud-hi">🏆 <span id="hiEl">0</span></div>
  </div>

  <div style="position:relative;width:100%">
    <canvas id="gameCanvas"></canvas>

    <!-- START screen -->
    <div class="screen" id="startScreen">
      <div class="screen-emoji">🐼</div>
      <div class="screen-title">პანდა-რანერი</div>
      <div class="screen-sub">პანდა გარბის, შენ ხტები!<br>ბამბუკი, ქვები და მტრები — გაუძელი!</div>
      <div class="screen-hint">SPACE / ↑ / ტეფი — გასაშვებად</div>
    </div>

    <!-- DEAD screen -->
    <div class="screen hidden" id="deadScreen">
      <div class="screen-emoji">💫</div>
      <div class="screen-title">ოჰ, პანდა დაეცა!</div>
      <div class="screen-score" id="deadScore">0</div>
      <div class="screen-sub" id="deadMsg">კარგი მცდელობა!</div>
      <div class="screen-hint">SPACE / ტეფი — თავიდან</div>
    </div>

    <!-- PAUSE screen -->
    <div class="screen hidden" id="pauseScreen">
      <div class="screen-emoji">⏸️</div>
      <div class="screen-title">პაუზა</div>
      <div class="screen-hint">SPACE — გაგრძელება</div>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn primary" id="startBtn" onclick="handleStart()">▶ დაწყება</button>
    <button class="ctrl-btn" onclick="togglePause()" id="pauseBtn" style="display:none">⏸ პაუზა</button>
    <button class="ctrl-btn danger" onclick="resetGame()" id="resetBtn" style="display:none">🔄 თავიდან</button>
    <div id="speedBadge">სიჩქარე: <span id="speedEl">1x</span></div>
  </div>
</div>

<button id="mobileJump" onclick="jump()">⬆</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resizeCanvas(){
  const w = Math.min(820, window.innerWidth * 0.98);
  const h = Math.min(320, window.innerWidth <= 600 ? window.innerWidth * 0.55 : w * 0.39);
  canvas.width = w;
  canvas.height = h;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

// Game constants (relative to canvas)
const GROUND_RATIO = 0.78;
const PANDA_W_RATIO = 0.07;
const PANDA_H_RATIO = 0.22;

// Colors
const C = {
  bg: '#0d0b1a',
  ground1: '#1a1630',
  ground2: '#221e40',
  accent: '#c084fc',
  accent2: '#f0abfc',
  green: '#4ade80',
  red: '#f87171',
  yellow: '#fbbf24',
  sky1: '#0d0b1a',
  sky2: '#12103a',
  star: 'rgba(255,255,255,0.6)',
  shadow: 'rgba(192,132,252,0.3)',
};

// Stars (background)
const stars = Array.from({length:60}, () => ({
  x: Math.random(),
  y: Math.random() * 0.7,
  r: Math.random() * 1.5 + 0.5,
  a: Math.random()
}));

// Game state
let state = 'idle'; // idle | running | dead | paused
let score = 0;
let hiScore = parseInt(localStorage.getItem('panda_hi') || '0');
let lives = 3;
let frame = 0;
let speed = 4;
let baseSpeed = 4;
let invincible = 0; // frames of invincibility after hit
let scoreTimer = 0;

// Panda
const panda = {
  x: 0, y: 0, w: 0, h: 0,
  vy: 0,
  onGround: true,
  jumping: false,
  doubleJump: false,
  animFrame: 0,
  dead: false,
  squish: 1,
};

// Arrays
let obstacles = [];
let clouds = [];
let particles = [];
let scorePopups = [];

// Obstacle types
const OBS_TYPES = [
  { id:'rock',   emoji:'🪨', wR:0.055, hR:0.14, points:10 },
  { id:'bamboo', emoji:'🎋', wR:0.04,  hR:0.25, points:15 },
  { id:'snake',  emoji:'🐍', wR:0.07,  hR:0.10, points:20 },
  { id:'bomb',   emoji:'💣', wR:0.06,  hR:0.14, points:25 },
  { id:'double', emoji:'🪨', wR:0.055, hR:0.14, points:30, double:true },
];

// Collectibles
let collectibles = [];
const COL_TYPES = [
  { id:'bamboo_food', emoji:'🎍', wR:0.045, hR:0.12, pts:50 },
  { id:'star',        emoji:'⭐', wR:0.04,  hR:0.10, pts:30 },
  { id:'heart',       emoji:'❤️', wR:0.04,  hR:0.10, pts:0, life:true },
];

function groundY() { return canvas.height * GROUND_RATIO; }
function pandaW()   { return canvas.width  * PANDA_W_RATIO; }
function pandaH()   { return canvas.height * PANDA_H_RATIO; }
function spd()      { return speed * (canvas.width / 820); }

function initPanda(){
  panda.w = pandaW();
  panda.h = pandaH();
  panda.x = canvas.width * 0.12;
  panda.y = groundY() - panda.h;
  panda.vy = 0;
  panda.onGround = true;
  panda.jumping = false;
  panda.doubleJump = false;
  panda.dead = false;
  panda.squish = 1;
  panda.animFrame = 0;
}

function resetGame(full=true){
  if(full){
    score = 0;
    lives = 3;
    speed = baseSpeed;
    frame = 0;
  }
  obstacles = [];
  collectibles = [];
  particles = [];
  scorePopups = [];
  invincible = 0;
  initPanda();
  updateHUD();
  state = 'idle';
  showScreen('startScreen');
  document.getElementById('startBtn').style.display='';
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('resetBtn').style.display='none';
}

function startGame(){
  state = 'running';
  hideAllScreens();
  document.getElementById('startBtn').style.display='none';
  document.getElementById('pauseBtn').style.display='';
  document.getElementById('resetBtn').style.display='';
  if(!clouds.length) spawnInitialClouds();
  requestAnimationFrame(loop);
}

function handleStart(){
  if(state==='idle') startGame();
  else if(state==='dead'){ resetGame(true); setTimeout(startGame,100); }
}

function togglePause(){
  if(state==='running'){ state='paused'; showScreen('pauseScreen'); }
  else if(state==='paused'){ state='running'; hideAllScreens(); requestAnimationFrame(loop); }
}

function jump(){
  if(state==='idle'||state==='dead'){ handleStart(); return; }
  if(state==='paused'){ togglePause(); return; }
  if(panda.onGround){
    panda.vy = -canvas.height * 0.032;
    panda.onGround = false;
    panda.jumping = true;
    panda.squish = 0.7;
    spawnJumpParticles();
  } else if(!panda.doubleJump){
    panda.vy = -canvas.height * 0.027;
    panda.doubleJump = true;
    spawnJumpParticles();
    addScorePopup('✨ x2!', panda.x, panda.y);
  }
}

// Input
document.addEventListener('keydown', e => {
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); jump(); }
  if(e.code==='KeyP'||e.code==='Escape') togglePause();
});
canvas.addEventListener('click', () => jump());
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});

// Clouds
function spawnInitialClouds(){
  for(let i=0;i<5;i++) clouds.push(makeCloud(Math.random()*canvas.width));
}
function makeCloud(x){
  return {
    x: x || canvas.width + 100,
    y: canvas.height * (0.05 + Math.random()*0.35),
    r: canvas.width*(0.04+Math.random()*0.06),
    spd: 0.3 + Math.random()*0.5
  };
}

// Obstacles
let obsTimer = 0;
let obsInterval = 90;
function trySpawnObstacle(){
  obsTimer++;
  if(obsTimer < obsInterval) return;
  obsTimer = 0;
  obsInterval = Math.max(40, 90 - score/30);

  // sometimes spawn collectible instead
  if(Math.random()<0.25){
    const t = COL_TYPES[Math.floor(Math.random()*COL_TYPES.length)];
    const w = canvas.width*t.wR, h = canvas.height*t.hR;
    // collectible hovers above ground
    const floatY = groundY() - h - canvas.height*(0.15+Math.random()*0.3);
    collectibles.push({
      ...t, x:canvas.width+w, y:floatY, w, h,
      startY: floatY, bob: Math.random()*Math.PI*2
    });
    return;
  }

  let type = OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
  if(score<200 && type.id==='bomb') type = OBS_TYPES[0];
  const w = canvas.width*type.wR, h = canvas.height*type.hR;
  const obs = { ...type, x:canvas.width+w, y:groundY()-h, w, h };
  if(type.double){
    obstacles.push({...obs, x:canvas.width+w+w*1.5});
  }
  obstacles.push(obs);
}

// Particles
function spawnJumpParticles(){
  for(let i=0;i<8;i++){
    particles.push({
      x: panda.x + panda.w/2,
      y: panda.y + panda.h,
      vx: (Math.random()-0.5)*3,
      vy: Math.random()*2+1,
      life: 1, decay: 0.06,
      r: 2+Math.random()*3,
      color: C.accent,
    });
  }
}
function spawnHitParticles(){
  for(let i=0;i<16;i++){
    particles.push({
      x: panda.x+panda.w/2, y: panda.y+panda.h/2,
      vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
      life: 1, decay: 0.04,
      r: 3+Math.random()*4,
      color: C.red,
    });
  }
}
function spawnCollectParticles(x,y,color){
  for(let i=0;i<12;i++){
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*5, vy: -Math.random()*4-1,
      life: 1, decay: 0.05,
      r: 2+Math.random()*3,
      color,
    });
  }
}

// Score popup
function addScorePopup(text, x, y){
  scorePopups.push({ text, x, y, life:1, decay:0.025 });
}

// HUD
function updateHUD(){
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('hiEl').textContent = hiScore;
  document.getElementById('livesEl').textContent = '🐼'.repeat(Math.max(0,lives));
  document.getElementById('speedEl').textContent = (speed/baseSpeed).toFixed(1)+'x';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id)?.classList.remove('hidden');
}
function hideAllScreens(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
}

// Collision (AABB with margin)
function collides(a, b, margin=0.65){
  const ax=a.x+a.w*(1-margin)/2, aw=a.w*margin;
  const bx=b.x+b.w*(1-margin)/2, bw=b.w*margin;
  const ay=a.y+a.h*(1-margin)/2, ah=a.h*margin;
  const by=b.y+b.h*(1-margin)/2, bh=b.h*margin;
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

// Draw panda with emoji parts
function drawPanda(){
  const { x, y, w, h, animFrame, dead } = panda;
  const cx = x + w/2, cy = y + h/2;
  const sq = panda.squish;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(1, sq);

  // Shadow
  if(panda.onGround){
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.shadow;
    ctx.beginPath();
    ctx.ellipse(0, h/2+2, w*0.55, h*0.1, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // Invincible flash
  if(invincible>0 && Math.floor(invincible/4)%2===0){
    ctx.restore();
    return;
  }

  // Body
  const bodyGrad = ctx.createRadialGradient(-w*0.05,-h*0.05,w*0.05,0,0,w*0.6);
  bodyGrad.addColorStop(0,'#fff');
  bodyGrad.addColorStop(1,'#e8d5ff');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, w*0.48, h*0.44, 0, 0, Math.PI*2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(-w*0.3,-h*0.38,w*0.13,h*0.11,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( w*0.3,-h*0.38,w*0.13,h*0.11,0,0,Math.PI*2); ctx.fill();

  // Eye patches
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(-w*0.16,-h*0.05,w*0.14,h*0.13,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( w*0.16,-h*0.05,w*0.14,h*0.13,0,0,Math.PI*2); ctx.fill();

  // Eyes
  if(dead){
    // X eyes
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    [[-1,1],[1,-1]].forEach(([dx,dy])=>{
      ctx.beginPath();
      ctx.moveTo(-w*0.16+dx*4,-h*0.05+dy*4);
      ctx.lineTo(-w*0.16-dx*4,-h*0.05-dy*4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo( w*0.16+dx*4,-h*0.05+dy*4);
      ctx.lineTo( w*0.16-dx*4,-h*0.05-dy*4);
      ctx.stroke();
    });
  } else {
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-w*0.16,-h*0.05,w*0.07,h*0.07,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( w*0.16,-h*0.05,w*0.07,h*0.07,0,0,Math.PI*2); ctx.fill();
    // Pupils — look right while running
    const pupilOff = panda.onGround ? w*0.02 : 0;
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.ellipse(-w*0.13+pupilOff,-h*0.04,w*0.035,h*0.04,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( w*0.19+pupilOff,-h*0.04,w*0.035,h*0.04,0,0,Math.PI*2); ctx.fill();
    // Shine
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(-w*0.11+pupilOff,-h*0.06,w*0.015,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( w*0.21+pupilOff,-h*0.06,w*0.015,0,Math.PI*2); ctx.fill();
  }

  // Nose
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.ellipse(0,h*0.06,w*0.08,h*0.05,0,0,Math.PI*2); ctx.fill();

  // Smile / sad
  ctx.strokeStyle='#333'; ctx.lineWidth=1.2; ctx.lineCap='round';
  ctx.beginPath();
  if(dead){ ctx.arc(0,h*0.1,w*0.1,0,Math.PI,true); }
  else     { ctx.arc(0,h*0.06,w*0.08,0.2,Math.PI-0.2); }
  ctx.stroke();

  // Arms (running animation)
  const armAngle = panda.onGround ? Math.sin(animFrame*0.25)*0.5 : -0.8;
  ctx.strokeStyle='#222'; ctx.lineWidth=w*0.12; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-w*0.35, h*0.08);
  ctx.lineTo(-w*0.35-Math.cos(armAngle)*w*0.22, h*0.08+Math.sin(armAngle)*h*0.18);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo( w*0.35, h*0.08);
  ctx.lineTo( w*0.35+Math.cos(-armAngle)*w*0.22, h*0.08+Math.sin(-armAngle)*h*0.18);
  ctx.stroke();

  // Legs (running animation)
  const legAngle = panda.onGround ? Math.sin(animFrame*0.25)*0.6 : 0.3;
  ctx.lineWidth=w*0.11;
  ctx.beginPath();
  ctx.moveTo(-w*0.2, h*0.36);
  ctx.lineTo(-w*0.2-Math.cos(legAngle)*w*0.2, h*0.36+Math.sin(legAngle)*h*0.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo( w*0.2, h*0.36);
  ctx.lineTo( w*0.2+Math.cos(-legAngle)*w*0.2, h*0.36+Math.sin(-legAngle)*h*0.2);
  ctx.stroke();

  ctx.restore();
}

// Draw ground
let groundOffset = 0;
function drawGround(){
  const gy = groundY();
  const gh = canvas.height - gy;

  // Main ground strip
  const gGrad = ctx.createLinearGradient(0, gy, 0, canvas.height);
  gGrad.addColorStop(0,'#1e1a38');
  gGrad.addColorStop(1,'#0d0b1a');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, gy, canvas.width, gh);

  // Ground line with glow
  ctx.shadowColor = C.accent;
  ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(192,132,252,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, gy);
  ctx.lineTo(canvas.width, gy);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Dashed lane marks
  ctx.strokeStyle = 'rgba(192,132,252,0.12)';
  ctx.lineWidth = 1;
  ctx.setLineDash([20,30]);
  ctx.beginPath();
  ctx.moveTo(0, gy+gh*0.35);
  ctx.lineTo(canvas.width, gy+gh*0.35);
  ctx.stroke();
  ctx.setLineDash([]);
}

// Draw sky + stars
function drawSky(){
  const gGrad = ctx.createLinearGradient(0,0,0,groundY());
  gGrad.addColorStop(0,'#07061a');
  gGrad.addColorStop(1,'#12103a');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0,0,canvas.width,groundY());

  // Twinkle stars
  stars.forEach(s=>{
    s.a += 0.012;
    const alpha = 0.3 + Math.sin(s.a)*0.3;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x*canvas.width, s.y*groundY(), s.r, 0, Math.PI*2);
    ctx.fill();
  });
}

// Draw clouds
function drawClouds(){
  clouds.forEach(c=>{
    if(state==='running') c.x -= c.spd * (canvas.width/820);
    ctx.fillStyle='rgba(192,132,252,0.07)';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.r, c.r*0.5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x+c.r*0.5, c.y-c.r*0.15, c.r*0.65, c.r*0.4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x-c.r*0.5, c.y-c.r*0.1, c.r*0.5, c.r*0.35, 0, 0, Math.PI*2);
    ctx.fill();
    if(c.x < -c.r*2) Object.assign(c, makeCloud(canvas.width+c.r*2));
  });
}

// Draw emoji object
function drawEmoji(emoji, x, y, w, h, bob=0){
  ctx.font = `${Math.min(w,h)*1.1}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, x+w/2, y+h/2 + (bob ? Math.sin(frame*0.06+bob)*4 : 0));
}

// Draw particles
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Draw score popups
function drawScorePopups(){
  scorePopups.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = C.accent2;
    ctx.font = `bold ${14*(canvas.width/820)}px 'Unbounded', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y - (1-p.life)*50);
  });
  ctx.globalAlpha = 1;
}

// Update physics
function update(){
  frame++;
  panda.animFrame++;

  // Gravity
  const gravity = canvas.height * 0.0014;
  panda.vy += gravity;
  panda.y += panda.vy;

  const gy = groundY() - panda.h;
  if(panda.y >= gy){
    panda.y = gy;
    panda.vy = 0;
    panda.onGround = true;
    panda.jumping = false;
    panda.doubleJump = false;
  }

  // Squish recovery
  if(panda.squish < 1) panda.squish = Math.min(1, panda.squish + 0.07);
  if(panda.squish > 1) panda.squish = Math.max(1, panda.squish - 0.05);

  // Invincible countdown
  if(invincible > 0) invincible--;

  // Speed up over time
  speed = baseSpeed + score * 0.008;
  speed = Math.min(speed, baseSpeed * 3.5);
  document.getElementById('speedEl').textContent = (speed/baseSpeed).toFixed(1)+'x';

  // Score
  scoreTimer++;
  if(scoreTimer >= 6){
    scoreTimer = 0;
    score++;
    if(score > hiScore){ hiScore = score; localStorage.setItem('panda_hi', hiScore); }
    document.getElementById('scoreEl').textContent = score;
    document.getElementById('hiEl').textContent = hiScore;
  }

  // Spawn obstacles
  trySpawnObstacle();

  // Move obstacles
  obstacles.forEach(o => o.x -= spd());
  obstacles = obstacles.filter(o => o.x + o.w > -10);

  // Move collectibles (bob)
  collectibles.forEach(c => {
    c.x -= spd()*0.9;
  });
  collectibles = collectibles.filter(c => c.x + c.w > -10);

  // Move clouds (done in drawClouds)

  // Collision with obstacles
  if(invincible === 0){
    for(const o of obstacles){
      if(collides(panda, o)){
        lives--;
        invincible = 90;
        spawnHitParticles();
        panda.squish = 1.3;
        if(lives <= 0){
          panda.dead = true;
          state = 'dead';
          die();
        } else {
          updateHUD();
          addScorePopup('💔 -ცხოვრება', panda.x+panda.w/2, panda.y-10);
        }
        break;
      }
    }
  }

  // Collision with collectibles
  for(let i=collectibles.length-1;i>=0;i--){
    const c = collectibles[i];
    if(collides(panda, c, 0.8)){
      collectibles.splice(i,1);
      if(c.life && lives < 5){
        lives = Math.min(5, lives+1);
        spawnCollectParticles(c.x+c.w/2, c.y+c.h/2, '#f87171');
        addScorePopup('❤️ +ცხოვრება!', c.x+c.w/2, c.y);
      } else {
        score += c.pts || 0;
        spawnCollectParticles(c.x+c.w/2, c.y+c.h/2, C.yellow);
        addScorePopup('+'+(c.pts||0), c.x+c.w/2, c.y);
      }
      updateHUD();
    }
  }

  // Update particles
  particles.forEach(p=>{
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
  });
  particles = particles.filter(p=>p.life>0);

  // Update score popups
  scorePopups.forEach(p=>p.life-=p.decay);
  scorePopups = scorePopups.filter(p=>p.life>0);
}

function die(){
  document.getElementById('deadScore').textContent = '⚡ '+score+' ქულა';
  const msgs = ['კარგი მცდელობა! 🐼','გაბედე კიდევ! 💪','პანდა ვარჯიშობს! 🎋','ახლა გამოგივა! ⭐'];
  document.getElementById('deadMsg').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  showScreen('deadScreen');
  document.getElementById('startBtn').style.display='';
  document.getElementById('startBtn').textContent='🔄 თავიდან';
  document.getElementById('pauseBtn').style.display='none';
}

// Main loop
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawSky();
  drawClouds();
  drawGround();

  // Draw collectibles
  collectibles.forEach(c=>{
    drawEmoji(c.emoji, c.x, c.y, c.w, c.h, c.bob);
  });

  // Draw obstacles
  obstacles.forEach(o=>{
    drawEmoji(o.emoji, o.x, o.y, o.w, o.h);
  });

  if(state==='running'||state==='paused') update();

  drawPanda();
  drawParticles();
  drawScorePopups();

  // Ground scroll line detail
  groundOffset = (groundOffset + spd()) % 40;
  ctx.strokeStyle='rgba(192,132,252,0.06)';
  ctx.lineWidth=1;
  for(let x=-40+groundOffset; x<canvas.width+40; x+=40){
    ctx.beginPath();
    ctx.moveTo(x, groundY());
    ctx.lineTo(x+20, groundY()+8);
    ctx.stroke();
  }

  if(state==='running') requestAnimationFrame(loop);
}

// Init
updateHUD();
showScreen('startScreen');

// idle animation
function idleLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawSky();
  drawClouds();
  drawGround();
  initPanda();
  // Idle bob
  panda.y = groundY() - panda.h + Math.sin(Date.now()/400)*3;
  panda.animFrame = Math.floor(Date.now()/80);
  panda.squish = 1 + Math.sin(Date.now()/300)*0.03;
  drawPanda();
  if(state==='idle') requestAnimationFrame(idleLoop);
}
// Start idle
state='idle';
initPanda();
if(!clouds.length) spawnInitialClouds();
idleLoop();
</script>
