<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 ბილიარდი - 8-ბოლი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+Georgian:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --purple:#7c3aed;
  --purple2:#6d28d9;
  --green:#1a5c2a;
  --dark:#0a0a1a;
  --card:#151528;
  --card2:#1a1a3a;
}
body{background:var(--dark);color:#fff;font-family:'Noto Sans Georgian',sans-serif;min-height:100vh;overflow-x:hidden}

/* ===== LOBBY ===== */
#lobby{max-width:460px;margin:0 auto;padding:20px}
.logo{font-size:56px;text-align:center;margin-bottom:6px;filter:drop-shadow(0 0 20px rgba(124,58,237,0.6))}
h2{text-align:center;margin-bottom:20px;font-family:'Rajdhani',sans-serif;letter-spacing:2px;font-size:20px;color:#c4b5fd}

.my-profile{background:var(--card2);border-radius:14px;padding:14px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(124,58,237,0.3);box-shadow:0 0 20px rgba(124,58,237,0.1)}
.sec-title{font-size:11px;color:#8b8ba0;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase}

#onlineList{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;max-height:380px;overflow-y:auto}
#onlineList::-webkit-scrollbar{width:4px}
#onlineList::-webkit-scrollbar-thumb{background:var(--purple);border-radius:4px}

.user-card{background:var(--card);border-radius:14px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(255,255,255,0.05);transition:border-color .2s,transform .15s}
.user-card:hover{border-color:rgba(124,58,237,0.4);transform:translateX(2px)}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0;border:2px solid rgba(124,58,237,0.4)}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-weight:600;font-size:15px}
.user-wins{font-size:11px;color:#a78bfa;margin-top:2px}
.online-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;display:inline-block;margin-right:5px;box-shadow:0 0 6px #22c55e}

.invite-btn{background:linear-gradient(135deg,var(--purple),#4f46e5);border:none;padding:8px 16px;border-radius:10px;color:#fff;cursor:pointer;font-size:13px;font-family:'Noto Sans Georgian',sans-serif;transition:opacity .2s,transform .15s;white-space:nowrap}
.invite-btn:hover{opacity:.9;transform:scale(1.03)}
.invite-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

.wait-msg{text-align:center;padding:20px;background:var(--card2);border-radius:14px;margin-top:10px;display:none;border:1px solid rgba(124,58,237,0.3)}
.wait-msg p{margin-bottom:12px;color:#c4b5fd}
#cancelInviteBtn{background:#ef4444;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif}

/* ===== GAME ===== */
.game-area{display:none;flex-direction:column;height:100vh;background:var(--dark)}
.game-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--card2);border-bottom:1px solid rgba(124,58,237,0.2)}
.player-card{text-align:center;padding:8px 14px;border-radius:12px;transition:background .3s;min-width:110px}
.player-card.active{background:linear-gradient(135deg,rgba(124,58,237,0.4),rgba(79,70,229,0.4));border:1px solid rgba(124,58,237,0.5)}
.player-card .user-avatar{margin:0 auto 6px;width:38px;height:38px}
.player-card .pname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.player-card .pstat{font-size:11px;color:#a78bfa;margin-top:2px}

#vs{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#4b5563}

#gameCanvas{flex:1;display:block;cursor:crosshair;background:var(--green)}
.bottom-bar{display:flex;gap:10px;justify-content:center;padding:10px;background:var(--card2)}
.bottom-bar button{padding:8px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;font-size:13px;font-weight:600;transition:opacity .2s}
.btn-reset{background:#3b82f6;color:#fff}
.btn-leave{background:#ef4444;color:#fff}
.btn-reset:hover,.btn-leave:hover{opacity:.85}

#turnBar{text-align:center;padding:6px;background:var(--card);font-size:13px;color:#c4b5fd;border-top:1px solid rgba(124,58,237,0.15)}

/* ===== MODALS ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-card{background:var(--card2);border-radius:20px;padding:30px 24px;text-align:center;max-width:320px;width:90%;border:1px solid rgba(124,58,237,0.4);box-shadow:0 0 40px rgba(124,58,237,0.2)}
.modal-card h3{margin-bottom:8px;font-size:20px;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.modal-card p{color:#9ca3af;margin-bottom:20px;font-size:14px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns button{padding:10px 22px;border-radius:10px;border:none;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;font-size:14px;font-weight:600;transition:transform .15s}
.modal-btns button:hover{transform:scale(1.04)}
.btn-accept{background:#22c55e;color:#fff}
.btn-decline{background:#ef4444;color:#fff}

/* ===== WIN SCREEN ===== */
#winScreen{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;justify-content:center;align-items:center;z-index:1500;flex-direction:column;backdrop-filter:blur(6px)}
#winScreen .win-emoji{font-size:72px;animation:bounce .6s infinite alternate}
#winScreen h2{font-size:32px;font-family:'Rajdhani',sans-serif;margin:16px 0 8px;letter-spacing:2px}
#winScreen p{color:#9ca3af;margin-bottom:24px}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
#winScreen button{padding:12px 28px;border-radius:12px;border:none;cursor:pointer;font-family:'Noto Sans Georgian',sans-serif;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--purple),#4f46e5);color:#fff;transition:transform .15s}
#winScreen button:hover{transform:scale(1.05)}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(124,58,237,0.95);padding:10px 22px;border-radius:20px;z-index:9999;font-size:14px;white-space:nowrap;backdrop-filter:blur(4px);box-shadow:0 4px 20px rgba(124,58,237,0.4);animation:toastAnim 2.5s forwards}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}

/* ===== POWER BAR ===== */
#powerWrap{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);display:none;background:rgba(0,0,0,0.7);border-radius:20px;padding:6px 14px;align-items:center;gap:10px;pointer-events:none;z-index:50}
#powerBar{width:120px;height:10px;background:#1f2937;border-radius:5px;overflow:hidden}
#powerFill{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#ef4444);border-radius:5px;transition:width .05s}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">🎱</div>
  <h2>BILLIARDS — 8 BALL</h2>
  
  <div class="my-profile">
    <div class="user-info">
      <div class="user-avatar" id="myAvatar">😊</div>
      <div>
        <div id="myNick" style="font-weight:600">იტვირთება...</div>
        <div class="user-wins">🏆 <span id="myWins">0</span> გამარჯვება</div>
      </div>
    </div>
    <div style="font-size:11px;color:#22c55e"><span class="online-dot"></span>ონლაინ</div>
  </div>
  
  <div class="sec-title"><span class="online-dot"></span>ონლაინ მოთამაშეები</div>
  <div id="onlineList"><div style="text-align:center;padding:30px;color:#4b5563">⏳ იტვირთება...</div></div>
  
  <div id="waitMsg" class="wait-msg">
    <p>⏳ მოწვევა გაგზავნილია...<br><span id="waitFor" style="color:#fff;font-weight:600"></span></p>
    <button id="cancelInviteBtn">❌ გაუქმება</button>
  </div>
</div>

<!-- GAME AREA -->
<div id="gameArea" class="game-area">
  <div class="game-header">
    <div class="player-card" id="p1Card">
      <div class="user-avatar" id="p1Av">😊</div>
      <div class="pname" id="p1Name">-</div>
      <div class="pstat">🏆 <span id="p1Wins">0</span> &nbsp; 🎯 <span id="p1Score">0</span></div>
    </div>
    <div id="vs">VS</div>
    <div class="player-card" id="p2Card">
      <div class="user-avatar" id="p2Av">😊</div>
      <div class="pname" id="p2Name">-</div>
      <div class="pstat">🏆 <span id="p2Wins">0</span> &nbsp; 🎯 <span id="p2Score">0</span></div>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="powerWrap">
    <span style="font-size:12px;color:#9ca3af">ძალა</span>
    <div id="powerBar"><div id="powerFill"></div></div>
  </div>
  <div class="bottom-bar">
    <button class="btn-reset" id="resetBtn">🔄 თავიდან</button>
    <button class="btn-leave" id="leaveBtn">🚪 გასვლა</button>
  </div>
  <div id="turnBar">🎯 ჯერი: <span id="turnName">-</span></div>
</div>

<!-- INVITE MODAL -->
<div id="inviteModal" class="modal-overlay">
  <div class="modal-card">
    <h3 id="inviteTitle">🎱 მოწვევა</h3>
    <p id="inviteText">მოთამაშე გიწვევს ბილიარდის თამაშში</p>
    <div class="modal-btns">
      <button class="btn-accept" id="acceptInvite">✅ დასტური</button>
      <button class="btn-decline" id="declineInvite">❌ უარი</button>
    </div>
  </div>
</div>

<!-- WIN SCREEN -->
<div id="winScreen">
  <div class="win-emoji" id="winEmoji">🏆</div>
  <h2 id="winTitle">გამარჯვება!</h2>
  <p id="winSubtitle">შესანიშნავი თამაში!</p>
  <button id="winContinueBtn">🔄 კიდევ ერთი</button>
</div>

<script>
// ============ SUPABASE ============
const sb = supabase.createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

// ============ AUDIO (Web Audio API - ბიბლიოთეკის გარეშე) ============
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playSound(type) {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);

    if (type === 'hit') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.15);
      gain.gain.setValueAtTime(0.4, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
      osc.start(); osc.stop(ac.currentTime + 0.2);
    } else if (type === 'pocket') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(220, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.5, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
      osc.start(); osc.stop(ac.currentTime + 0.35);
    } else if (type === 'wall') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, ac.currentTime);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
      osc.start(); osc.stop(ac.currentTime + 0.08);
    } else if (type === 'win') {
      [0, 0.1, 0.2, 0.35].forEach((t, i) => {
        const o2 = ac.createOscillator();
        const g2 = ac.createGain();
        o2.connect(g2); g2.connect(ac.destination);
        o2.type = 'sine';
        o2.frequency.value = [523, 659, 784, 1047][i];
        g2.gain.setValueAtTime(0.3, ac.currentTime + t);
        g2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.25);
        o2.start(ac.currentTime + t);
        o2.stop(ac.currentTime + t + 0.25);
      });
    }
  } catch(e) {}
}

// ============ GAME CONSTANTS ============
const TW = 800, TH = 450;
const BR = 11; // ball radius
const FRICTION = 0.985;
const MIN_VEL = 0.06;

// Pocket positions
const POCKETS = [
  {x:22, y:22}, {x:TW/2, y:14}, {x:TW-22, y:22},
  {x:22, y:TH-22}, {x:TW/2, y:TH-14}, {x:TW-22, y:TH-22}
];
const POCKET_R = 18;

// Ball colors
const BALL_COLORS = [
  '#fff',           // 0 - cue
  '#f59e0b',        // 1 yellow
  '#3b82f6',        // 2 blue
  '#ef4444',        // 3 red
  '#7c3aed',        // 4 purple
  '#f97316',        // 5 orange
  '#16a34a',        // 6 green
  '#b45309',        // 7 brown
  '#1f2937',        // 8 black
  '#fef08a',        // 9-15 stripes (same hue but striped)
  '#bfdbfe',
  '#fca5a5',
  '#c4b5fd',
  '#fed7aa',
  '#86efac',
  '#d97706',
];

let canvas, ctx;
let balls = [];
let currentTurn = 'p1';
let scores = { p1: 0, p2: 0 };
let gameOver = false;
let myRole = null;
let myTurn = false;
let canShoot = false;

let aiming = false, aimX = 0, aimY = 0;
let power = 0;
let chargeInterval = null;
let animationId = null;
let inGame = false;
let roomCode = null;
let currentChannel = null;
let waitingForResponse = false;
let wasMoving = false;

// User data
let ME = null;
let myNick = '', myAvatar = '😊', myWins = 0;
let opponentNick = '', opponentAvatar = '😊', opponentWins = 0, opponentId = null;

// ============ INIT ============
async function init() {
  // Try session first (works in iframes & same-origin)
  let user = null;
  try {
    const { data: s1 } = await sb.auth.getSession();
    user = s1?.session?.user || null;
  } catch(e) {}

  // Fallback: getUser (works when cookies are passed)
  if (!user) {
    try {
      const { data: s2 } = await sb.auth.getUser();
      user = s2?.user || null;
    } catch(e) {}
  }

  if (!user) {
    document.getElementById('onlineList').innerHTML = `
      <div style="text-align:center;padding:30px;color:#f59e0b;line-height:1.8">
        ⚠️ სესია ვერ მოიძებნა<br>
        <span style="font-size:12px;color:#6b7280">გთხოვთ გახსენით ბილიარდი<br>მთავარი საიტის მეშვეობით</span>
      </div>`;
    return;
  }
  ME = user;

  const { data: profile } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  myNick = profile?.username || ME.email?.split('@')[0] || 'მოთამაშე';
  myAvatar = profile?.avatar_url || profile?.emotion || '😊';
  myWins = profile?.billiards_wins || 0;

  setAvatarEl('myAvatar', myAvatar);
  document.getElementById('myNick').textContent = myNick;
  document.getElementById('myWins').textContent = myWins;

  await updateLastSeen();
  await loadOnlineUsers();
  listenToProfileChanges();
  listenForInvites();

  setInterval(() => { if (!inGame) updateLastSeen(); }, 15000);
  setInterval(() => { if (!inGame) loadOnlineUsers(); }, 6000);

  document.getElementById('cancelInviteBtn').onclick = cancelInvite;
  document.getElementById('acceptInvite').onclick = acceptInvite;
  document.getElementById('declineInvite').onclick = declineInvite;
  document.getElementById('resetBtn').onclick = resetGame;
  document.getElementById('leaveBtn').onclick = leaveGame;
  document.getElementById('winContinueBtn').onclick = () => {
    document.getElementById('winScreen').style.display = 'none';
    resetGame();
  };
}

function setAvatarEl(elId, val) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (val && val.startsWith('http')) {
    el.innerHTML = `<img src="${val}" onerror="this.parentElement.textContent='😊'">`;
  } else {
    el.textContent = val || '😊';
  }
}

async function updateLastSeen() {
  if (!ME) return;
  await sb.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', ME.id);
}

function listenToProfileChanges() {
  sb.channel('profile-watch-billiards')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles' }, (p) => {
      if (p.new.id !== ME.id) loadOnlineUsers();
    })
    .subscribe();
}

// ============ ONLINE USERS ============
async function loadOnlineUsers() {
  const cutoff = new Date(Date.now() - 90000).toISOString();
  const { data } = await sb.from('profiles')
    .select('id, username, avatar_url, emotion, billiards_wins, last_seen')
    .gte('last_seen', cutoff)
    .order('username');

  const online = (data || []).filter(u => u.id !== ME.id);
  const container = document.getElementById('onlineList');

  if (online.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:#4b5563;font-size:14px">😴 სხვა ონლაინ მოთამაშე არ არის</div>';
    return;
  }

  container.innerHTML = online.map(u => {
    const av = u.avatar_url
      ? `<img src="${u.avatar_url}" onerror="this.parentElement.textContent='😊'">`
      : (u.emotion || '😊');
    return `
      <div class="user-card">
        <div class="user-info">
          <div class="user-avatar">${av}</div>
          <div>
            <div class="user-name">${esc(u.username)}</div>
            <div class="user-wins">🏆 ${u.billiards_wins || 0} გამარჯვება</div>
          </div>
        </div>
        <button class="invite-btn"
          data-id="${u.id}"
          data-nick="${esc(u.username)}"
          data-av="${esc(u.avatar_url || u.emotion || '😊')}">
          📨 მოწვევა
        </button>
      </div>
    `;
  }).join('');

  document.querySelectorAll('.invite-btn').forEach(btn => {
    btn.onclick = () => sendInvite(btn.dataset.id, btn.dataset.nick, btn.dataset.av);
  });
}

// ============ INVITE SYSTEM ============
async function sendInvite(targetId, targetNick, targetAvatar) {
  if (inGame) return toast('⚠️ ახლა თამაშში ხარ!');
  if (waitingForResponse) return toast('⚠️ უკვე გაქვს გაგზავნილი მოწვევა');

  waitingForResponse = true;
  document.getElementById('waitMsg').style.display = 'block';
  document.getElementById('waitFor').textContent = targetNick + '-ს ველოდებით...';

  roomCode = Math.random().toString(36).slice(2, 8).toUpperCase();
  myRole = 'p1';
  opponentId = targetId;
  opponentNick = targetNick;
  opponentAvatar = targetAvatar;

  // შევქმნათ ოთახი
  const { error: roomErr } = await sb.from('billiards_rooms').upsert({
    code: roomCode,
    p1_nick: myNick,
    p1_uid: ME.id,
    p1_avatar: myAvatar.startsWith('http') ? myAvatar : null,
    status: 'waiting',
    created_at: new Date().toISOString()
  });
  if (roomErr) console.error('room err:', roomErr);

  // Notification
  const { error: notifErr } = await sb.from('notifications').insert({
    user_id: targetId,
    from_uid: ME.id,
    type: 'game_invite',
    data: { code: roomCode, nick: myNick, avatar: myAvatar, game: 'billiards' },
    is_read: false
  });
  if (notifErr) console.error('notif err:', notifErr);

  toast(`📨 მოწვევა გაეგზავნა ${targetNick}-ს`);

  // ველოდებით პასუხს
  const responseChan = sb.channel(`billiards-resp-${ME.id}`);
  responseChan
    .on('broadcast', { event: 'accept' }, ({ payload }) => {
      if (payload.code !== roomCode) return;
      waitingForResponse = false;
      document.getElementById('waitMsg').style.display = 'none';
      opponentWins = payload.wins || 0;
      responseChan.unsubscribe();
      startGame();
    })
    .on('broadcast', { event: 'decline' }, ({ payload }) => {
      if (payload.code !== roomCode) return;
      waitingForResponse = false;
      document.getElementById('waitMsg').style.display = 'none';
      toast(`❌ ${payload.nick} უარყო მოწვევა`);
      roomCode = null;
    })
    .subscribe();

  // 30 წამი timeout
  setTimeout(() => {
    if (!waitingForResponse) return;
    waitingForResponse = false;
    document.getElementById('waitMsg').style.display = 'none';
    toast('⏰ პასუხი ვერ მივიღეთ');
    roomCode = null;
  }, 30000);
}

function listenForInvites() {
  sb.channel(`notif-listen-${ME.id}`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'notifications',
      filter: `user_id=eq.${ME.id}`
    }, (payload) => {
      const n = payload.new;
      if (n.type !== 'game_invite') return;
      if (inGame) return;
      const d = n.data;
      window.pendingInvite = { code: d.code, fromId: n.from_uid, fromNick: d.nick, fromAvatar: d.avatar };
      document.getElementById('inviteTitle').textContent = `🎱 ${d.nick} გიწვევს!`;
      document.getElementById('inviteText').textContent = 'ბილიარდის თამაშზე';
      document.getElementById('inviteModal').style.display = 'flex';
    })
    .subscribe();
}

async function acceptInvite() {
  document.getElementById('inviteModal').style.display = 'none';
  const inv = window.pendingInvite;
  if (!inv) return;

  myRole = 'p2';
  roomCode = inv.code;
  opponentId = inv.fromId;
  opponentNick = inv.fromNick;
  opponentAvatar = inv.fromAvatar;

  await sb.from('billiards_rooms').update({
    p2_nick: myNick, p2_uid: ME.id,
    p2_avatar: myAvatar.startsWith('http') ? myAvatar : null,
    status: 'playing'
  }).eq('code', roomCode);

  const { data: op } = await sb.from('profiles').select('billiards_wins').eq('id', opponentId).single();
  opponentWins = op?.billiards_wins || 0;

  const respChan = sb.channel(`billiards-resp-${inv.fromId}`);
  await respChan.subscribe();
  setTimeout(() => {
    respChan.send({ type: 'broadcast', event: 'accept', payload: { code: roomCode, nick: myNick, wins: myWins } });
  }, 300);

  startGame();
}

function declineInvite() {
  document.getElementById('inviteModal').style.display = 'none';
  const inv = window.pendingInvite;
  if (inv) {
    const c = sb.channel(`billiards-resp-${inv.fromId}`);
    c.subscribe().then(() => {
      c.send({ type: 'broadcast', event: 'decline', payload: { code: inv.code, nick: myNick } });
    });
  }
  window.pendingInvite = null;
  toast('❌ მოწვევა უარყოფილია');
}

function cancelInvite() {
  waitingForResponse = false;
  document.getElementById('waitMsg').style.display = 'none';
  roomCode = null;
  toast('❌ მოწვევა გაუქმდა');
}

// ============ GAME SETUP ============
function startGame() {
  inGame = true;
  document.getElementById('lobby').style.display = 'none';
  const ga = document.getElementById('gameArea');
  ga.style.display = 'flex';

  initCanvas();
  initBalls();

  myTurn = (myRole === 'p1');
  canShoot = myTurn;
  scores = { p1: 0, p2: 0 };
  currentTurn = 'p1';
  gameOver = false;
  updateGameUI();

  if (currentChannel) sb.removeChannel(currentChannel);
  currentChannel = sb.channel(`billiards_game_${roomCode}`);
  currentChannel
    .on('broadcast', { event: 'shoot' }, ({ payload }) => {
      if (payload.senderRole === myRole) return;
      applyRemoteShoot(payload);
    })
    .on('broadcast', { event: 'state_sync' }, ({ payload }) => {
      if (payload.senderRole === myRole) return;
      currentTurn = payload.currentTurn;
      scores = payload.scores;
      gameOver = payload.gameOver;
      myTurn = (currentTurn === myRole);
      canShoot = myTurn && !gameOver;
      updateGameUI();
    })
    .on('broadcast', { event: 'reset_game' }, ({ payload }) => {
      if (payload.senderRole === myRole) return;
      doReset();
    })
    .subscribe();

  if (animationId) cancelAnimationFrame(animationId);
  gameLoop();
}

// ============ CANVAS & BALLS ============
function initCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  // Responsive sizing
  function resize() {
    const container = canvas.parentElement;
    const w = container.clientWidth;
    const h = container.clientHeight;
    // Keep 16:9ish ratio
    const ratio = TW / TH;
    let cw = w, ch = w / ratio;
    if (ch > h) { ch = h; cw = h * ratio; }
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    canvas.width = TW;
    canvas.height = TH;
  }
  resize();
  window.addEventListener('resize', resize);

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0]); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0]); }, {passive:false});
  canvas.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, {passive:false});
}

// Standard triangle rack
function initBalls() {
  balls = [];
  // Cue ball
  balls.push({ id: 0, x: TW*0.28, y: TH/2, vx:0, vy:0, active:true, pocketed:false });

  // Rack positions (triangle)
  const cx = TW * 0.67, cy = TH / 2;
  const sp = BR * 2.1;
  const rackOrder = [1, 9, 2, 10, 8, 3, 11, 4, 12, 5, 13, 6, 14, 7, 15];
  let idx = 0;
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col <= row; col++) {
      const rx = cx + row * sp * Math.cos(Math.PI/6);
      const ry = cy + (col - row/2) * sp;
      balls.push({ id: rackOrder[idx], x: rx + (Math.random()-0.5)*0.5, y: ry + (Math.random()-0.5)*0.5, vx:0, vy:0, active:true, pocketed:false });
      idx++;
    }
  }
}

// ============ PHYSICS ============
function gameLoop() {
  update();
  draw();
  animationId = requestAnimationFrame(gameLoop);
}

function update() {
  let anyMoving = false;

  balls.forEach(b => {
    if (!b.active) return;
    b.x += b.vx; b.y += b.vy;
    b.vx *= FRICTION; b.vy *= FRICTION;
    if (Math.abs(b.vx) < MIN_VEL) b.vx = 0;
    if (Math.abs(b.vy) < MIN_VEL) b.vy = 0;
    if (b.vx !== 0 || b.vy !== 0) anyMoving = true;

    // Wall bounces
    if (b.x - BR < 0) { b.x = BR; b.vx = Math.abs(b.vx); playSound('wall'); }
    if (b.x + BR > TW) { b.x = TW-BR; b.vx = -Math.abs(b.vx); playSound('wall'); }
    if (b.y - BR < 0) { b.y = BR; b.vy = Math.abs(b.vy); playSound('wall'); }
    if (b.y + BR > TH) { b.y = TH-BR; b.vy = -Math.abs(b.vy); playSound('wall'); }
  });

  // Ball-ball collisions
  for (let i = 0; i < balls.length; i++) {
    for (let j = i+1; j < balls.length; j++) {
      const a = balls[i], b = balls[j];
      if (!a.active || !b.active) continue;
      const dx = b.x-a.x, dy = b.y-a.y;
      const d = Math.hypot(dx, dy);
      if (d < BR*2 && d > 0.01) {
        const nx = dx/d, ny = dy/d;
        const overlap = BR*2 - d;
        a.x -= nx*overlap/2; a.y -= ny*overlap/2;
        b.x += nx*overlap/2; b.y += ny*overlap/2;
        const dvx = a.vx-b.vx, dvy = a.vy-b.vy;
        const dot = dvx*nx + dvy*ny;
        if (dot > 0) {
          a.vx -= dot*nx; a.vy -= dot*ny;
          b.vx += dot*nx; b.vy += dot*ny;
          playSound('hit');
        }
      }
    }
  }

  // Pocket check
  balls.forEach(b => {
    if (!b.active) return;
    POCKETS.forEach(p => {
      if (Math.hypot(b.x-p.x, b.y-p.y) < POCKET_R) {
        b.active = false;
        b.pocketed = true;
        playSound('pocket');
        if (b.id === 0) {
          // cue ball pocketed - respawn
          setTimeout(() => {
            b.active = true; b.pocketed = false;
            b.x = TW*0.28; b.y = TH/2; b.vx=0; b.vy=0;
          }, 800);
        } else if (b.id === 8) {
          // 8-ball pocketed
          handleEightBallPocketed();
        } else {
          // regular ball scored
          const scorer = currentTurn;
          scores[scorer] = (scores[scorer] || 0) + 1;
          updateGameUI();
        }
      }
    });
  });

  // Detect when balls stop
  if (wasMoving && !anyMoving && !gameOver) {
    wasMoving = false;
    // Switch turns only if it was opponent's turn that ended
    if (!myTurn) {
      currentTurn = myRole;
      myTurn = true;
      canShoot = true;
      updateGameUI();
    }
  }
  if (anyMoving) wasMoving = true;
}

function handleEightBallPocketed() {
  if (gameOver) return;
  gameOver = true;
  const winner = currentTurn; // whoever pocketed 8-ball wins
  const iWon = (winner === myRole);
  showWinScreen(iWon);
  if (iWon) {
    myWins++;
    sb.from('profiles').update({ billiards_wins: myWins }).eq('id', ME.id);
    document.getElementById('myWins').textContent = myWins;
  }
  // Sync
  currentChannel?.send({ type:'broadcast', event:'state_sync', payload: {
    senderRole: myRole, currentTurn, scores, gameOver
  }});
}

function showWinScreen(iWon) {
  const ws = document.getElementById('winScreen');
  document.getElementById('winEmoji').textContent = iWon ? '🏆' : '😢';
  document.getElementById('winTitle').textContent = iWon ? 'გაიმარჯვე!' : 'წააგე!';
  document.getElementById('winSubtitle').textContent = iWon
    ? `შესანიშნავი! +1 გამარჯვება პროფილზე`
    : `${opponentNick} გაიმარჯვა. კიდევ სცადე!`;
  ws.style.display = 'flex';
  if (iWon) playSound('win');
}

// ============ DRAW ============
function draw() {
  ctx.clearRect(0, 0, TW, TH);

  // Table felt
  const feltGrad = ctx.createLinearGradient(0,0,0,TH);
  feltGrad.addColorStop(0, '#1d6b32');
  feltGrad.addColorStop(1, '#145224');
  ctx.fillStyle = feltGrad;
  ctx.fillRect(0, 0, TW, TH);

  // Rail border
  ctx.strokeStyle = '#5c3a1e';
  ctx.lineWidth = 20;
  ctx.strokeRect(10, 10, TW-20, TH-20);

  // Center line (subtle)
  ctx.setLineDash([12, 8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(TW/2, 14); ctx.lineTo(TW/2, TH-14); ctx.stroke();
  ctx.setLineDash([]);

  // Pockets
  POCKETS.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, POCKET_R, 0, Math.PI*2);
    const pGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, POCKET_R);
    pGrad.addColorStop(0, '#111');
    pGrad.addColorStop(1, '#000');
    ctx.fillStyle = pGrad;
    ctx.fill();
    ctx.strokeStyle = '#4a3010';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // Balls
  balls.forEach(b => {
    if (!b.active) return;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BR, 0, Math.PI*2);

    if (b.id === 0) {
      // Cue ball - white with shine
      const cg = ctx.createRadialGradient(b.x-3, b.y-3, 1, b.x, b.y, BR);
      cg.addColorStop(0, '#fff');
      cg.addColorStop(1, '#d1d5db');
      ctx.fillStyle = cg;
    } else {
      const col = BALL_COLORS[b.id] || '#888';
      const bg = ctx.createRadialGradient(b.x-3, b.y-4, 1, b.x, b.y, BR);
      bg.addColorStop(0, lighten(col, 40));
      bg.addColorStop(0.6, col);
      bg.addColorStop(1, darken(col, 30));
      ctx.fillStyle = bg;

      // Stripe for 9-15
      if (b.id >= 9) {
        ctx.fill();
        ctx.save();
        ctx.beginPath();
        ctx.arc(b.x, b.y, BR, 0, Math.PI*2);
        ctx.clip();
        ctx.fillStyle = '#fff';
        ctx.fillRect(b.x - BR, b.y - BR*0.4, BR*2, BR*0.8);
        ctx.restore();
        ctx.beginPath();
        ctx.arc(b.x, b.y, BR, 0, Math.PI*2);
      }
    }

    ctx.fill();

    // Shine
    ctx.beginPath();
    ctx.arc(b.x-3, b.y-4, BR*0.32, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();

    // Number
    ctx.fillStyle = b.id === 0 ? 'transparent' : (b.id >= 9 ? '#333' : '#fff');
    ctx.font = `bold ${BR*1.1}px Rajdhani,sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (b.id > 0) ctx.fillText(b.id, b.x, b.y+0.5);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  });

  // Aim line
  if (aiming && canShoot && !gameOver) {
    const cue = balls.find(b => b.id === 0 && b.active);
    if (cue) {
      const dx = cue.x - aimX, dy = cue.y - aimY;
      const dist = Math.hypot(dx, dy);
      if (dist > 5) {
        // Dashed aim line
        ctx.setLineDash([6, 6]);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cue.x, cue.y); ctx.lineTo(aimX, aimY); ctx.stroke();
        ctx.setLineDash([]);

        // Power vector
        const nx = dx/dist, ny = dy/dist;
        const len = (power/100) * 90 + 10;
        const grad = ctx.createLinearGradient(cue.x, cue.y, cue.x+nx*len, cue.y+ny*len);
        grad.addColorStop(0, '#fbbf24');
        grad.addColorStop(1, 'rgba(251,191,36,0)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(cue.x, cue.y); ctx.lineTo(cue.x+nx*len, cue.y+ny*len); ctx.stroke();

        // Cue stick
        ctx.strokeStyle = '#d97706';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(aimX + nx*20, aimY + ny*20);
        ctx.lineTo(aimX + nx*90, aimY + ny*90);
        ctx.stroke();
        ctx.lineCap = 'butt';
      }
    }
  }
}

// ============ COLOR HELPERS ============
function lighten(hex, amt) {
  const r = parseInt(hex.slice(1,3)||'88',16), g = parseInt(hex.slice(3,5)||'88',16), b2 = parseInt(hex.slice(5,7)||'88',16);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b2+amt)})`;
}
function darken(hex, amt) {
  const r = parseInt(hex.slice(1,3)||'88',16), g = parseInt(hex.slice(3,5)||'88',16), b2 = parseInt(hex.slice(5,7)||'88',16);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b2-amt)})`;
}

// ============ INPUT ============
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = TW / rect.width, scaleY = TH / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

function onDown(e) {
  if (!canShoot || gameOver) return;
  const pos = getPos(e);
  aiming = true; aimX = pos.x; aimY = pos.y; power = 0;
  const pw = document.getElementById('powerWrap');
  pw.style.display = 'flex';
  const start = Date.now();
  if (chargeInterval) clearInterval(chargeInterval);
  chargeInterval = setInterval(() => {
    power = Math.min(100, (Date.now() - start) / 15);
    document.getElementById('powerFill').style.width = power + '%';
  }, 16);
}

function onMove(e) {
  if (!aiming) return;
  const pos = getPos(e);
  aimX = pos.x; aimY = pos.y;
}

function onUp() {
  if (!aiming || !canShoot || gameOver) return;
  aiming = false;
  clearInterval(chargeInterval);
  document.getElementById('powerWrap').style.display = 'none';

  const cue = balls.find(b => b.id === 0 && b.active);
  if (!cue) return;
  const dx = cue.x - aimX, dy = cue.y - aimY;
  const dist = Math.hypot(dx, dy);
  if (dist < 5) return;

  const speed = (power / 100) * 16 + 2;
  cue.vx = (dx/dist) * speed;
  cue.vy = (dy/dist) * speed;

  canShoot = false; myTurn = false;
  currentTurn = (myRole === 'p1') ? 'p2' : 'p1';
  updateGameUI();

  currentChannel?.send({ type:'broadcast', event:'shoot', payload: {
    senderRole: myRole,
    cueVx: cue.vx, cueVy: cue.vy,
    balls: balls.map(b => ({id:b.id,x:b.x,y:b.y,vx:b.vx,vy:b.vy,active:b.active,pocketed:b.pocketed}))
  }});
}

function applyRemoteShoot(payload) {
  payload.balls.forEach(s => {
    const b = balls.find(bb => bb.id === s.id);
    if (b) { b.x=s.x; b.y=s.y; b.vx=s.vx; b.vy=s.vy; b.active=s.active; b.pocketed=s.pocketed; }
  });
  const cue = balls.find(b => b.id === 0);
  if (cue) { cue.vx = payload.cueVx; cue.vy = payload.cueVy; }
  currentTurn = myRole;
  myTurn = true;
  canShoot = false; // wait for balls to stop
  updateGameUI();
}

// ============ UI ============
function updateGameUI() {
  const isP1 = myRole === 'p1';
  document.getElementById('p1Name').textContent = isP1 ? myNick : opponentNick;
  document.getElementById('p2Name').textContent = isP1 ? opponentNick : myNick;
  document.getElementById('p1Wins').textContent = isP1 ? myWins : opponentWins;
  document.getElementById('p2Wins').textContent = isP1 ? opponentWins : myWins;
  document.getElementById('p1Score').textContent = scores.p1;
  document.getElementById('p2Score').textContent = scores.p2;

  setAvatarEl('p1Av', isP1 ? myAvatar : opponentAvatar);
  setAvatarEl('p2Av', isP1 ? opponentAvatar : myAvatar);

  const myTurnNow = currentTurn === myRole;
  document.getElementById('turnName').textContent = myTurnNow ? '🟢 შენი ჯერია!' : `⏳ ${opponentNick}-ის ჯერია`;
  document.getElementById('p1Card').classList.toggle('active', currentTurn === 'p1');
  document.getElementById('p2Card').classList.toggle('active', currentTurn === 'p2');
}

function resetGame() {
  initBalls();
  scores = { p1: 0, p2: 0 };
  gameOver = false;
  currentTurn = 'p1';
  myTurn = (myRole === 'p1');
  canShoot = myTurn;
  wasMoving = false;
  updateGameUI();
  currentChannel?.send({ type:'broadcast', event:'reset_game', payload:{ senderRole: myRole }});
}

function doReset() {
  initBalls();
  scores = { p1: 0, p2: 0 };
  gameOver = false;
  currentTurn = 'p1';
  myTurn = (myRole === 'p1');
  canShoot = myTurn;
  wasMoving = false;
  document.getElementById('winScreen').style.display = 'none';
  updateGameUI();
}

function leaveGame() {
  inGame = false;
  if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
  if (currentChannel) { sb.removeChannel(currentChannel); currentChannel = null; }
  if (roomCode) sb.from('billiards_rooms').update({ status:'done' }).eq('code', roomCode);
  roomCode = null; myRole = null;
  document.getElementById('winScreen').style.display = 'none';
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
  loadOnlineUsers();
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
