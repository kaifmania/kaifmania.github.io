<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 ბილიარდი - 8-ბოლი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:sans-serif;min-height:100vh}
#lobby{max-width:450px;margin:0 auto;padding:20px}
.logo{font-size:48px;text-align:center;margin-bottom:10px}
h2{text-align:center;margin-bottom:20px}
.my-profile{background:#1a1a3a;border-radius:12px;padding:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.sec-title{font-size:12px;color:#aaa;margin-bottom:10px}
#onlineList{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;max-height:350px;overflow-y:auto}
.user-card{background:#1a1a3a;border-radius:12px;padding:12px;display:flex;justify-content:space-between;align-items:center}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:40px;height:40px;border-radius:50%;background:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-weight:600}
.user-wins{font-size:11px;color:#aaa}
.invite-btn{background:#7c3aed;border:none;padding:8px 16px;border-radius:8px;color:#fff;cursor:pointer}
.invite-btn:disabled{opacity:0.5}
.wait-msg{text-align:center;padding:20px;background:#1a1a3a;border-radius:12px;margin-top:20px;display:none}
.game-area{display:none;flex-direction:column;height:100vh}
.game-header{display:flex;justify-content:space-between;padding:10px;background:#1a1a3a}
.player-card{text-align:center;padding:8px;border-radius:10px}
.player-card.active{background:#7c3aed;color:#fff}
canvas{flex:1;background:#1a5c2a;margin:10px;border-radius:10px;cursor:crosshair}
.bottom-bar{display:flex;gap:10px;justify-content:center;padding:10px}
button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer}
.btn-reset{background:#3b82f6;color:#fff}
.btn-leave{background:#ef4444;color:#fff}
.invite-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;z-index:1000}
.invite-card{background:#1a1a3a;border-radius:20px;padding:30px;text-align:center;max-width:300px;width:90%}
.invite-card h3{margin-bottom:15px}
.invite-card button{margin:10px;padding:10px 20px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#7c3aed;padding:10px 20px;border-radius:20px;z-index:2000;animation:fadeOut 2s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;display:none}}
</style>
</head>
<body>

<div id="lobby">
  <div class="logo">🎱</div>
  <h2>ბილიარდი - 8 ბოლი</h2>
  
  <div class="my-profile">
    <div class="user-info">
      <div class="user-avatar" id="myAvatar">😊</div>
      <div>
        <div id="myNick">იტვირთება...</div>
        <div class="user-wins" id="myWins">🏆 0</div>
      </div>
    </div>
  </div>
  
  <div class="sec-title">🟣 ონლაინ მოთამაშეები</div>
  <div id="onlineList">⏳ იტვირთება...</div>
  
  <div id="waitMsg" class="wait-msg">
    ⏳ მოწვევა გაგზავნილია... ელოდება პასუხს
    <button id="cancelInviteBtn" style="margin-top:10px;background:#ef4444">გაუქმება</button>
  </div>
</div>

<div id="gameArea" class="game-area">
  <div class="game-header">
    <div class="player-card" id="p1Card">
      <div class="user-avatar" id="p1Av" style="margin:0 auto 5px;width:40px;height:40px">😊</div>
      <div id="p1Name">-</div>
      <div>🏆 <span id="p1Wins">0</span></div>
      <div>🎯 <span id="p1Score">0</span></div>
    </div>
    <div class="player-card" id="vs">VS</div>
    <div class="player-card" id="p2Card">
      <div class="user-avatar" id="p2Av" style="margin:0 auto 5px;width:40px;height:40px">😊</div>
      <div id="p2Name">-</div>
      <div>🏆 <span id="p2Wins">0</span></div>
      <div>🎯 <span id="p2Score">0</span></div>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="bottom-bar">
    <button class="btn-reset" id="resetBtn">🔄 თავიდან</button>
    <button class="btn-leave" id="leaveBtn">🚪 გასვლა</button>
  </div>
  <div id="turnIndicator" style="text-align:center;padding:5px;background:#1a1a3a">🎯 ჯერი: <span id="turnName">-</span></div>
</div>

<div id="inviteModal" class="invite-modal">
  <div class="invite-card">
    <h3 id="inviteTitle">🎱 მოწვევა</h3>
    <p id="inviteText">მოთამაშე გიწვევს თამაშში</p>
    <button id="acceptInvite" style="background:#22c55e">✅ დასტური</button>
    <button id="declineInvite" style="background:#ef4444">❌ უარი</button>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

// ============ თამაშის კონსტანტები ============
const TW = 800, TH = 500, BR = 10;
let canvas, ctx;
let balls = [];
let currentTurn = 'p1';
let scores = { p1: 0, p2: 0 };
let gameOver = false;
let myRole = null;
let myTurn = false;
let canShoot = false;
let aiming = false, aimX = 0, aimY = 0, power = 0;
let chargeInterval = null;
let animationId = null;
let inGame = false;
let roomCode = null;
let currentChannel = null;
let waitingForResponse = false;

// მომხმარებლის მონაცემები
let ME = null, myProfile = null;
let myNick = '', myAvatar = '😊', myWins = 0;
let opponentNick = '', opponentAvatar = '😊', opponentWins = 0, opponentId = null;

// ============ 1. ავტორიზაცია ============
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    alert('გთხოვთ გაიარეთ ავტორიზაცია ჩატში');
    return;
  }
  ME = user;
  
  // პროფილის ჩატვირთვა
  const { data: profile } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  myProfile = profile;
  myNick = profile?.username || ME.email?.split('@')[0] || 'მოთამაშე';
  myAvatar = profile?.avatar_url || profile?.emotion || '😊';
  myWins = profile?.billiards_wins || 0;
  
  document.getElementById('myNick').textContent = myNick;
  document.getElementById('myWins').textContent = `🏆 ${myWins}`;
  if (myAvatar.startsWith('http')) {
    document.getElementById('myAvatar').innerHTML = `<img src="${myAvatar}">`;
  } else {
    document.getElementById('myAvatar').textContent = myAvatar;
  }
  
  // 🔥 მნიშვნელოვანი: ვაახლებთ last_seen-ს
  await updateLastSeen();
  
  // ონლაინ სიის ჩატვირთვა
  await loadOnlineUsers();
  
  // 🔥 ვუსმენთ profiles ცხრილის ცვლილებებს
  listenToProfileChanges();
  
  // მოწვევების მოსმენა
  listenForInvites();
  
  // ყოველ 10 წამში ვაახლებთ last_seen-ს
  setInterval(() => {
    if (!inGame) updateLastSeen();
  }, 10000);
  
  // ყოველ 5 წამში ონლაინ სიის განახლება
  setInterval(() => {
    if (!inGame) loadOnlineUsers();
  }, 5000);
  
  // ღილაკები
  document.getElementById('cancelInviteBtn').onclick = cancelInvite;
  document.getElementById('acceptInvite').onclick = acceptInvite;
  document.getElementById('declineInvite').onclick = declineInvite;
  document.getElementById('resetBtn').onclick = resetGame;
  document.getElementById('leaveBtn').onclick = leaveGame;
}

// last_seen-ის განახლება
async function updateLastSeen() {
  if (!ME) return;
  await sb.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', ME.id);
  console.log('🟢 last_seen განახლდა', new Date().toLocaleTimeString());
}

// პროფილების ცვლილებების მოსმენა
function listenToProfileChanges() {
  sb.channel('profile-changes-billiards')
    .on('postgres_changes', { 
      event: 'UPDATE', 
      schema: 'public', 
      table: 'profiles' 
    }, (payload) => {
      // თუ ვინმეს last_seen შეიცვალა, განაახლე სია
      if (payload.new.id !== ME.id) {
        console.log('🔔 პროფილი განახლდა:', payload.new.username);
        loadOnlineUsers();
      }
    })
    .subscribe();
}

// ============ 2. ონლაინ მომხმარებლების ჩატვირთვა ============
async function loadOnlineUsers() {
  // ბოლო 60 წამში აქტიური მომხმარებლები
  const cutoff = new Date(Date.now() - 60000).toISOString();
  const { data } = await sb
    .from('profiles')
    .select('id, username, avatar_url, emotion, billiards_wins, last_seen')
    .gte('last_seen', cutoff)
    .order('username');
  
  console.log('📊 ნაპოვნია მომხმარებლები:', data?.length || 0);
  console.log('📊 ბოლო 60 წამის cutoff:', cutoff);
  
  if (data) {
    data.forEach(u => {
      console.log(`  - ${u.username}: last_seen=${u.last_seen}`);
    });
  }
  
  // საკუთარი თავის გამორიცხვა
  const online = (data || []).filter(u => u.id !== ME.id);
  
  const container = document.getElementById('onlineList');
  
  if (online.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa">😴 სხვა ონლაინ მოთამაშე არ არის</div>';
    return;
  }
  
  container.innerHTML = online.map(u => {
    const avatarHtml = u.avatar_url 
      ? `<img src="${u.avatar_url}">` 
      : (u.emotion || '😊');
    return `
      <div class="user-card" data-uid="${u.id}">
        <div class="user-info">
          <div class="user-avatar">${avatarHtml}</div>
          <div>
            <div class="user-name">${escapeHtml(u.username)}</div>
            <div class="user-wins">🏆 ${u.billiards_wins || 0}</div>
          </div>
        </div>
        <button class="invite-btn" data-id="${u.id}" data-nick="${escapeHtml(u.username)}" data-avatar="${u.avatar_url || ''}" data-emoji="${u.emotion || '😊'}">
          📨 მოწვევა
        </button>
      </div>
    `;
  }).join('');
  
  // ღილაკების მოვლენები
  document.querySelectorAll('.invite-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const targetId = btn.dataset.id;
      const targetNick = btn.dataset.nick;
      const targetAvatar = btn.dataset.avatar || btn.dataset.emoji;
      sendInvite(targetId, targetNick, targetAvatar);
    };
  });
}

// ============ 3. მოწვევის გაგზავნა ============
async function sendInvite(targetId, targetNick, targetAvatar) {
  if (inGame) {
    toast('⚠️ ახლა თამაშში ხარ!');
    return;
  }
  if (waitingForResponse) {
    toast('⚠️ უკვე გაქვს გაგზავნილი მოწვევა');
    return;
  }
  
  waitingForResponse = true;
  document.getElementById('waitMsg').style.display = 'block';
  
  roomCode = Math.random().toString(36).slice(2, 8).toUpperCase();
  myRole = 'p1';
  opponentId = targetId;
  opponentNick = targetNick;
  opponentAvatar = targetAvatar;
  
  // ოთახის შექმნა
  await sb.from('billiards_rooms').upsert({
    code: roomCode,
    p1_nick: myNick,
    p1_uid: ME.id,
    p1_avatar: typeof myAvatar === 'string' && myAvatar.startsWith('http') ? myAvatar : null,
    status: 'waiting',
    created_at: new Date().toISOString()
  });
  
  // 🔥 მოწვევა notifications ცხრილში
  await sb.from('notifications').insert({
    user_id: targetId,
    from_uid: ME.id,
    type: 'game_invite',
    data: {
      code: roomCode,
      nick: myNick,
      avatar: myAvatar,
      game: 'billiards'
    },
    is_read: false
  });
  
  toast(`📨 მოწვევა გაეგზავნა ${targetNick}`);
  
  // პასუხის მოსმენა
  const responseChan = sb.channel(`game-response-${ME.id}`);
  responseChan
    .on('broadcast', { event: 'accept' }, ({ payload }) => {
      if (payload.code === roomCode) {
        waitingForResponse = false;
        document.getElementById('waitMsg').style.display = 'none';
        opponentWins = payload.wins || 0;
        startGame();
      }
    })
    .on('broadcast', { event: 'decline' }, ({ payload }) => {
      if (payload.code === roomCode) {
        waitingForResponse = false;
        document.getElementById('waitMsg').style.display = 'none';
        toast(`❌ ${payload.nick} უარყო მოწვევა`);
        roomCode = null;
      }
    })
    .subscribe();
  
  setTimeout(() => {
    if (waitingForResponse) {
      waitingForResponse = false;
      document.getElementById('waitMsg').style.display = 'none';
      toast('⏰ მოწვევის დრო ამოიწურა');
      roomCode = null;
    }
  }, 30000);
}

// ============ 4. მოწვევების მოსმენა ============
function listenForInvites() {
  sb.channel(`game-invite-listener-${ME.id}`)
    .on('postgres_changes', { 
      event: 'INSERT', 
      schema: 'public', 
      table: 'notifications',
      filter: `user_id=eq.${ME.id} AND type=eq.game_invite`
    }, async (payload) => {
      if (inGame) return;
      const notif = payload.new;
      const invData = notif.data;
      
      window.pendingInvite = {
        code: invData.code,
        fromId: notif.from_uid,
        fromNick: invData.nick,
        fromAvatar: invData.avatar
      };
      
      document.getElementById('inviteTitle').innerHTML = `🎱 ${invData.nick} გიწვევს!`;
      document.getElementById('inviteText').innerHTML = 'ბილიარდის თამაშზე';
      document.getElementById('inviteModal').style.display = 'flex';
    })
    .subscribe();
}

async function acceptInvite() {
  document.getElementById('inviteModal').style.display = 'none';
  const inv = window.pendingInvite;
  if (!inv) return;
  
  myRole = 'p2';
  roomCode = inv.code;
  opponentId = inv.fromId;
  opponentNick = inv.fromNick;
  opponentAvatar = inv.fromAvatar;
  
  await sb.from('billiards_rooms').update({
    p2_nick: myNick,
    p2_uid: ME.id,
    p2_avatar: typeof myAvatar === 'string' && myAvatar.startsWith('http') ? myAvatar : null,
    status: 'playing'
  }).eq('code', roomCode);
  
  const { data: oppProf } = await sb.from('profiles').select('billiards_wins').eq('id', opponentId).single();
  opponentWins = oppProf?.billiards_wins || 0;
  
  const respChan = sb.channel(`game-response-${inv.fromId}`);
  await respChan.subscribe();
  respChan.send({
    type: 'broadcast',
    event: 'accept',
    payload: { code: roomCode, nick: myNick, wins: myWins }
  });
  
  startGame();
}

function declineInvite() {
  document.getElementById('inviteModal').style.display = 'none';
  const inv = window.pendingInvite;
  if (inv) {
    const rejectChan = sb.channel(`game-response-${inv.fromId}`);
    rejectChan.subscribe();
    rejectChan.send({
      type: 'broadcast',
      event: 'decline',
      payload: { code: inv.code, nick: myNick }
    });
  }
  window.pendingInvite = null;
  toast('❌ მოწვევა უარყოფილია');
}

function cancelInvite() {
  waitingForResponse = false;
  document.getElementById('waitMsg').style.display = 'none';
  roomCode = null;
  toast('❌ მოწვევა გაუქმდა');
}

// ============ 5. თამაშის ლოგიკა ============
function startGame() {
  inGame = true;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('gameArea').style.display = 'flex';
  
  initCanvas();
  initBalls();
  startAnimation();
  
  myTurn = (myRole === 'p1');
  canShoot = myTurn;
  updateGameUI();
  
  if (currentChannel) sb.removeChannel(currentChannel);
  currentChannel = sb.channel(`billiards_${roomCode}`);
  currentChannel
    .on('broadcast', { event: 'shoot' }, ({ payload }) => {
      if (payload.turn !== myRole) applyRemoteShoot(payload);
    })
    .on('broadcast', { event: 'state' }, ({ payload }) => {
      if (payload.currentTurn) currentTurn = payload.currentTurn;
      if (payload.scores) scores = payload.scores;
      if (payload.gameOver !== undefined) gameOver = payload.gameOver;
      myTurn = (currentTurn === myRole);
      canShoot = myTurn && !gameOver;
      updateGameUI();
    })
    .subscribe();
}

function initCanvas() {
  canvas = document.getElementById('canvas');
  canvas.width = TW;
  canvas.height = TH;
  ctx = canvas.getContext('2d');
  
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerDown(e.touches[0]); });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e.touches[0]); });
  canvas.addEventListener('touchend', (e) => { e.preventDefault(); onPointerUp(); });
}

function initBalls() {
  balls = [];
  balls.push({ id: 0, x: TW*0.25, y: TH/2, vx: 0, vy: 0, active: true });
  for (let i = 1; i <= 15; i++) {
    const angle = (i - 1) * 0.35;
    balls.push({
      id: i,
      x: TW*0.7 + Math.cos(angle) * 28,
      y: TH/2 + Math.sin(angle) * 28 * (i < 8 ? 1 : 0.7),
      vx: 0, vy: 0, active: true
    });
  }
}

function startAnimation() {
  function loop() {
    stepPhysics();
    draw();
    animationId = requestAnimationFrame(loop);
  }
  loop();
}

function stepPhysics() {
  let moving = false;
  
  balls.forEach(b => {
    if (!b.active) return;
    if (Math.abs(b.vx) > 0.05 || Math.abs(b.vy) > 0.05) moving = true;
    
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= 0.98;
    b.vy *= 0.98;
    if (Math.abs(b.vx) < 0.05) b.vx = 0;
    if (Math.abs(b.vy) < 0.05) b.vy = 0;
    
    if (b.x - BR < 0) { b.x = BR; b.vx = Math.abs(b.vx); }
    if (b.x + BR > TW) { b.x = TW - BR; b.vx = -Math.abs(b.vx); }
    if (b.y - BR < 0) { b.y = BR; b.vy = Math.abs(b.vy); }
    if (b.y + BR > TH) { b.y = TH - BR; b.vy = -Math.abs(b.vy); }
  });
  
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      const b1 = balls[i], b2 = balls[j];
      if (!b1.active || !b2.active) continue;
      const dx = b2.x - b1.x, dy = b2.y - b1.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < BR * 2 && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = BR * 2 - dist;
        b1.x -= nx * overlap / 2;
        b1.y -= ny * overlap / 2;
        b2.x += nx * overlap / 2;
        b2.y += ny * overlap / 2;
      }
    }
  }
  
  if (!moving && !canShoot && myTurn && !gameOver) {
    canShoot = true;
    updateGameUI();
  }
}

function draw() {
  ctx.clearRect(0, 0, TW, TH);
  ctx.fillStyle = '#1a5c2a';
  ctx.fillRect(0, 0, TW, TH);
  
  ctx.fillStyle = '#000';
  [[10,10], [TW/2,5], [TW-10,10], [10,TH-10], [TW/2,TH-5], [TW-10,TH-10]].forEach(p => {
    ctx.beginPath();
    ctx.arc(p[0], p[1], 12, 0, Math.PI*2);
    ctx.fill();
  });
  
  balls.forEach(b => {
    if (!b.active) return;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BR, 0, Math.PI*2);
    if (b.id === 0) ctx.fillStyle = '#fff';
    else if (b.id === 8) ctx.fillStyle = '#333';
    else ctx.fillStyle = `hsl(${b.id * 24}, 70%, 55%)`;
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(b.id, b.x-4, b.y+4);
  });
  
  if (aiming && canShoot) {
    const cue = balls.find(b => b.id === 0);
    if (cue) {
      ctx.beginPath();
      ctx.moveTo(cue.x, cue.y);
      ctx.lineTo(aimX, aimY);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.setLineDash([5,5]);
      ctx.stroke();
      
      const dx = cue.x - aimX, dy = cue.y - aimY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 0.01) {
        const len = Math.min(120, power * 1.2);
        ctx.beginPath();
        ctx.moveTo(cue.x, cue.y);
        ctx.lineTo(cue.x + (dx/dist)*len, cue.y + (dy/dist)*len);
        ctx.strokeStyle = '#fbbf24';
        ctx.setLineDash([]);
        ctx.stroke();
      }
    }
  }
}

function getCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (TW / rect.width),
    y: (e.clientY - rect.top) * (TH / rect.height)
  };
}

function onPointerDown(e) {
  if (!canShoot || gameOver) return;
  const pos = getCoords(e);
  aiming = true;
  aimX = pos.x;
  aimY = pos.y;
  power = 0;
  const start = Date.now();
  if (chargeInterval) clearInterval(chargeInterval);
  chargeInterval = setInterval(() => {
    power = Math.min(100, (Date.now() - start) / 12);
  }, 16);
}

function onPointerMove(e) {
  if (!aiming) return;
  const pos = getCoords(e);
  aimX = pos.x;
  aimY = pos.y;
}

function onPointerUp() {
  if (!aiming || !canShoot) return;
  aiming = false;
  if (chargeInterval) clearInterval(chargeInterval);
  
  const cue = balls.find(b => b.id === 0);
  if (!cue) return;
  
  const dx = cue.x - aimX, dy = cue.y - aimY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 5) return;
  
  const speed = (power / 100) * 12;
  cue.vx = (dx / dist) * speed;
  cue.vy = (dy / dist) * speed;
  
  canShoot = false;
  myTurn = false;
  
  currentChannel?.send({
    type: 'broadcast',
    event: 'shoot',
    payload: {
      turn: myRole,
      cueVx: cue.vx,
      cueVy: cue.vy,
      balls: balls.map(b => ({ id: b.id, x: b.x, y: b.y, vx: b.vx, vy: b.vy, active: b.active }))
    }
  });
  updateGameUI();
}

function applyRemoteShoot(payload) {
  payload.balls.forEach(s => {
    const b = balls.find(bb => bb.id === s.id);
    if (b) {
      b.x = s.x; b.y = s.y;
      b.vx = s.vx; b.vy = s.vy;
      b.active = s.active;
    }
  });
  const cue = balls.find(b => b.id === 0);
  if (cue) { cue.vx = payload.cueVx; cue.vy = payload.cueVy; }
  myTurn = true;
  canShoot = true;
  updateGameUI();
}

function updateGameUI() {
  document.getElementById('p1Name').textContent = myRole === 'p1' ? myNick : opponentNick;
  document.getElementById('p2Name').textContent = myRole === 'p2' ? myNick : opponentNick;
  document.getElementById('p1Wins').textContent = myRole === 'p1' ? myWins : opponentWins;
  document.getElementById('p2Wins').textContent = myRole === 'p2' ? myWins : opponentWins;
  document.getElementById('p1Score').textContent = scores.p1;
  document.getElementById('p2Score').textContent = scores.p2;
  document.getElementById('turnName').textContent = myTurn ? 'შენ' : 'მეტოქე';
  
  document.getElementById('p1Card').classList.toggle('active', currentTurn === 'p1');
  document.getElementById('p2Card').classList.toggle('active', currentTurn === 'p2');
}

function resetGame() {
  initBalls();
  scores = { p1: 0, p2: 0 };
  gameOver = false;
  currentTurn = 'p1';
  myTurn = (myRole === 'p1');
  canShoot = myTurn;
  updateGameUI();
  currentChannel?.send({
    type: 'broadcast',
    event: 'state',
    payload: { currentTurn, scores, gameOver }
  });
}

function leaveGame() {
  inGame = false;
  if (currentChannel) sb.removeChannel(currentChannel);
  sb.from('billiards_rooms').update({ status: 'done' }).eq('code', roomCode);
  roomCode = null;
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
  loadOnlineUsers();
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

init();
</script>
