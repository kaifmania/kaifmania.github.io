<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>🎱 ბილიარდი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
#app{text-align:center}
.online-list{display:flex;flex-direction:column;gap:8px;margin:20px 0}
.user-item{background:#1a1a3a;padding:10px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;width:300px}
button{background:#7c3aed;border:none;padding:8px 16px;border-radius:8px;color:#fff;cursor:pointer}
button:disabled{opacity:0.5}
.game-area{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a1a;display:none;flex-direction:column}
.game-header{display:flex;justify-content:space-between;padding:10px}
canvas{flex:1;background:#1a5c2a;margin:10px;border-radius:10px}
.invite-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center}
.invite-box{background:#1a1a3a;padding:30px;border-radius:20px;text-align:center}
.invite-box button{margin:10px}
.hidden{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="lobby">
    <h2>🎱 ბილიარდი</h2>
    <div id="myInfo"></div>
    <div class="sec-lbl">🟣 ონლაინ მოთამაშეები</div>
    <div id="onlineList" class="online-list"></div>
    <div id="waitMsg" class="hidden">⏳ ელოდება მოწვევის დადასტურებას...</div>
  </div>
  
  <div id="gameArea" class="game-area">
    <div class="game-header">
      <div id="p1Card">👤 მოთამაშე 1: <span id="p1Name">-</span> (<span id="p1Score">0</span>)</div>
      <div id="turnInd">🎯 ჯერი: <span id="turnName">-</span></div>
      <div id="p2Card">👤 მოთამაშე 2: <span id="p2Name">-</span> (<span id="p2Score">0</span>)</div>
    </div>
    <canvas id="canvas"></canvas>
    <div style="padding:10px;display:flex;gap:10px;justify-content:center">
      <button id="resetBtn">🔄 თავიდან</button>
      <button id="leaveBtn">🚪 გასვლა</button>
    </div>
  </div>
  
  <div id="inviteOverlay" class="invite-overlay">
    <div class="invite-box">
      <div id="inviteText">🎱 მოწვევა</div>
      <button id="acceptInviteBtn">✅ დასტური</button>
      <button id="declineInviteBtn">❌ უარი</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

let ME = null;
let myNick = '', myWins = 0;
let roomCode = null, myRole = null;
let gameChannel = null;
let inGame = false;
let currentOpponent = null;
let pendingInvite = null;

// თამაშის ცვლადები
let canvas, ctx, scale;
let balls = [], currentTurn = 'p1', scores = {p1:0, p2:0}, gameOver = false, myTurn = false, canShoot = false;
let aiming = false, aimX, aimY, power = 0, chargeInt;
const TW=800, TH=450, BR=10;

// 1. ავტორიზაცია - ავტომატურად ამოიღებს ნიკს
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    alert('გთხოვთ გაიარეთ ავტორიზაცია ჩატში');
    return;
  }
  ME = user;
  
  const { data: profile } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  myNick = profile?.username || 'მოთამაშე';
  myWins = profile?.billiards_wins || 0;
  
  document.getElementById('myInfo').innerHTML = `👤 ${myNick} | 🏆 ${myWins}`;
  
  loadOnlineUsers();
  listenForInvites();
  
  setInterval(loadOnlineUsers, 15000);
  
  document.getElementById('acceptInviteBtn').onclick = acceptInvite;
  document.getElementById('declineInviteBtn').onclick = declineInvite;
  document.getElementById('resetBtn').onclick = resetGame;
  document.getElementById('leaveBtn').onclick = leaveGame;
}

// 2. ონლაინ მომხმარებლების ჩატვირთვა
async function loadOnlineUsers() {
  const cutoff = new Date(Date.now() - 60000).toISOString();
  const { data } = await sb.from('profiles')
    .select('id, username, avatar_url, billiards_wins, last_seen')
    .gte('last_seen', cutoff);
  
  const online = (data || []).filter(u => u.id !== ME.id);
  const container = document.getElementById('onlineList');
  
  if (online.length === 0) {
    container.innerHTML = '<div>😴 სხვა ონლაინ მოთამაშე არ არის</div>';
    return;
  }
  
  container.innerHTML = online.map(u => `
    <div class="user-item">
      <span>👤 ${u.username} (🏆 ${u.billiards_wins || 0})</span>
      <button class="invite-btn" data-id="${u.id}" data-nick="${u.username}">📨 მოწვევა</button>
    </div>
  `).join('');
  
  document.querySelectorAll('.invite-btn').forEach(btn => {
    btn.onclick = () => sendInvite(btn.dataset.id, btn.dataset.nick);
  });
}

// 3. მოწვევის გაგზავნა
async function sendInvite(targetId, targetNick) {
  if (inGame) { alert('თამაშში ხარ!'); return; }
  
  roomCode = Math.random().toString(36).slice(2, 8).toUpperCase();
  myRole = 'p1';
  
  await sb.from('billiards_rooms').upsert({
    code: roomCode,
    p1_nick: myNick,
    p1_uid: ME.id,
    status: 'waiting'
  });
  
  // მოწვევა notifications ცხრილში
  await sb.from('notifications').insert({
    user_id: targetId,
    from_uid: ME.id,
    type: 'game_invite',
    data: { code: roomCode, nick: myNick, game: 'billiards' },
    is_read: false
  });
  
  document.getElementById('waitMsg').classList.remove('hidden');
  toast(`📨 მოწვევა გაეგზავნა ${targetNick}`);
  
  subscribeToRoom();
}

// 4. მოწვევების მოსმენა
function listenForInvites() {
  sb.channel(`invites-${ME.id}`)
    .on('postgres_changes', { 
      event: 'INSERT', 
      schema: 'public', 
      table: 'notifications',
      filter: `user_id=eq.${ME.id} AND type=eq.game_invite`
    }, async (payload) => {
      if (inGame) return;
      const inv = payload.new.data;
      pendingInvite = { code: inv.code, fromId: payload.new.from_uid, fromNick: inv.nick };
      document.getElementById('inviteText').innerHTML = `🎱 ${inv.nick} გიწვევს თამაშში!`;
      document.getElementById('inviteOverlay').style.display = 'flex';
    })
    .subscribe();
}

async function acceptInvite() {
  document.getElementById('inviteOverlay').style.display = 'none';
  if (!pendingInvite) return;
  
  myRole = 'p2';
  roomCode = pendingInvite.code;
  
  await sb.from('billiards_rooms').update({
    p2_nick: myNick,
    p2_uid: ME.id,
    status: 'playing'
  }).eq('code', roomCode);
  
  const { data: room } = await sb.from('billiards_rooms').select('*').eq('code', roomCode).single();
  currentOpponent = { nick: room.p1_nick, uid: room.p1_uid, wins: 0 };
  
  subscribeToRoom();
  startGame();
}

function declineInvite() {
  document.getElementById('inviteOverlay').style.display = 'none';
  pendingInvite = null;
  toast('❌ მოწვევა უარყოფილია');
}

// 5. ოთახის არხი
function subscribeToRoom() {
  if (gameChannel) sb.removeChannel(gameChannel);
  gameChannel = sb.channel(`billiards_${roomCode}`);
  gameChannel
    .on('broadcast', { event: 'shoot' }, ({ payload }) => {
      if (payload.turn !== myRole) applyRemoteShoot(payload);
    })
    .on('broadcast', { event: 'state' }, ({ payload }) => {
      applyRemoteState(payload);
    })
    .subscribe();
}

// 6. თამაშის დაწყება
function startGame() {
  inGame = true;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('gameArea').style.display = 'flex';
  document.getElementById('waitMsg').classList.add('hidden');
  
  initCanvas();
  initBalls();
  startAnimation();
  
  myTurn = (myRole === 'p1');
  canShoot = myTurn;
  updateGameUI();
}

function initCanvas() {
  canvas = document.getElementById('canvas');
  canvas.width = TW;
  canvas.height = TH;
  ctx = canvas.getContext('2d');
  
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
}

function initBalls() {
  balls = [];
  balls.push({ id: 0, x: TW*0.25, y: TH/2, vx: 0, vy: 0, active: true });
  for(let i=1; i<=15; i++) {
    balls.push({ id: i, x: TW*0.7 + (i%5)*15, y: TH/2 + (Math.floor(i/5)-1)*20, vx: 0, vy: 0, active: true });
  }
}

function startAnimation() {
  function loop() {
    stepPhysics();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
}

function stepPhysics() {
  // მარტივი ფიზიკა
  balls.forEach(b => {
    if (!b.active) return;
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= 0.985;
    b.vy *= 0.985;
    if (Math.abs(b.vx) < 0.05) b.vx = 0;
    if (Math.abs(b.vy) < 0.05) b.vy = 0;
    
    // კედლები
    if (b.x - BR < 0) { b.x = BR; b.vx = Math.abs(b.vx); }
    if (b.x + BR > TW) { b.x = TW-BR; b.vx = -Math.abs(b.vx); }
    if (b.y - BR < 0) { b.y = BR; b.vy = Math.abs(b.vy); }
    if (b.y + BR > TH) { b.y = TH-BR; b.vy = -Math.abs(b.vy); }
  });
  
  // შეჯახებები
  for(let i=0; i<balls.length; i++) {
    for(let j=i+1; j<balls.length; j++) {
      const b1=balls[i], b2=balls[j];
      if(!b1.active || !b2.active) continue;
      const dx = b2.x-b1.x, dy = b2.y-b1.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < BR*2) {
        const nx = dx/dist, ny = dy/dist;
        const overlap = BR*2 - dist;
        b1.x -= nx*overlap/2;
        b1.y -= ny*overlap/2;
        b2.x += nx*overlap/2;
        b2.y += ny*overlap/2;
      }
    }
  }
  
  // მოძრაობა?
  let moving = balls.some(b => Math.abs(b.vx) > 0.1 || Math.abs(b.vy) > 0.1);
  if (!moving && !canShoot && myTurn && !gameOver) {
    canShoot = true;
    updateGameUI();
  }
}

function draw() {
  ctx.clearRect(0, 0, TW, TH);
  ctx.fillStyle = '#1a6b3c';
  ctx.fillRect(0, 0, TW, TH);
  
  // ბურთები
  balls.forEach(b => {
    if (!b.active) return;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BR, 0, Math.PI*2);
    ctx.fillStyle = b.id===0 ? '#fff' : (b.id===8 ? '#333' : `hsl(${b.id*24}, 70%, 50%)`);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = '12px sans-serif';
    ctx.fillText(b.id, b.x-4, b.y+4);
  });
  
  // მიზნის ხაზი
  if (aiming && canShoot) {
    const cue = balls.find(b=>b.id===0);
    if(cue) {
      ctx.beginPath();
      ctx.moveTo(cue.x, cue.y);
      ctx.lineTo(aimX, aimY);
      ctx.strokeStyle = 'white';
      ctx.setLineDash([5,5]);
      ctx.stroke();
      
      const len = Math.min(150, power*1.5);
      const dx = cue.x - aimX, dy = cue.y - aimY;
      const d = Math.sqrt(dx*dx+dy*dy);
      if(d>0.01) {
        ctx.beginPath();
        ctx.moveTo(cue.x, cue.y);
        ctx.lineTo(cue.x + (dx/d)*len, cue.y + (dy/d)*len);
        ctx.strokeStyle = '#ffaa00';
        ctx.setLineDash([]);
        ctx.stroke();
      }
    }
  }
}

function getCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * (TW/rect.width), y: (e.clientY - rect.top) * (TH/rect.height) };
}

function onPointerDown(e) {
  if (!canShoot || gameOver) return;
  const pos = getCoords(e);
  aiming = true;
  aimX = pos.x;
  aimY = pos.y;
  power = 0;
  const start = Date.now();
  if(chargeInt) clearInterval(chargeInt);
  chargeInt = setInterval(() => {
    power = Math.min(100, (Date.now()-start)/15);
  }, 16);
}

function onPointerMove(e) {
  if (!aiming) return;
  const pos = getCoords(e);
  aimX = pos.x;
  aimY = pos.y;
}

function onPointerUp() {
  if (!aiming || !canShoot) return;
  aiming = false;
  if(chargeInt) clearInterval(chargeInt);
  
  const cue = balls.find(b=>b.id===0);
  if(!cue) return;
  
  const dx = cue.x - aimX, dy = cue.y - aimY;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(dist < 5) return;
  
  const speed = (power/100) * 15;
  cue.vx = (dx/dist) * speed;
  cue.vy = (dy/dist) * speed;
  
  canShoot = false;
  myTurn = false;
  
  // გაგზავნა მეტოქესთვის
  gameChannel.send({
    type: 'broadcast',
    event: 'shoot',
    payload: {
      turn: myRole,
      cueVx: cue.vx,
      cueVy: cue.vy,
      balls: balls.map(b => ({ id: b.id, x: b.x, y: b.y, vx: b.vx, vy: b.vy, active: b.active }))
    }
  });
  updateGameUI();
}

function applyRemoteShoot(payload) {
  payload.balls.forEach(s => {
    const b = balls.find(bb => bb.id === s.id);
    if(b) { b.x = s.x; b.y = s.y; b.vx = s.vx; b.vy = s.vy; b.active = s.active; }
  });
  const cue = balls.find(b=>b.id===0);
  if(cue) { cue.vx = payload.cueVx; cue.vy = payload.cueVy; }
  myTurn = true;
  canShoot = true;
  updateGameUI();
}

function applyRemoteState(payload) {
  if(payload.balls) {
    payload.balls.forEach(s => {
      const b = balls.find(bb => bb.id === s.id);
      if(b) { b.x = s.x; b.y = s.y; b.vx = s.vx; b.vy = s.vy; b.active = s.active; }
    });
  }
  if(payload.currentTurn) currentTurn = payload.currentTurn;
  if(payload.scores) scores = payload.scores;
  if(payload.gameOver !== undefined) gameOver = payload.gameOver;
  myTurn = (currentTurn === myRole);
  canShoot = myTurn && !gameOver;
  updateGameUI();
}

function updateGameUI() {
  document.getElementById('p1Name').textContent = myRole === 'p1' ? myNick : (currentOpponent?.nick || '?');
  document.getElementById('p2Name').textContent = myRole === 'p2' ? myNick : (currentOpponent?.nick || '?');
  document.getElementById('p1Score').textContent = scores.p1;
  document.getElementById('p2Score').textContent = scores.p2;
  document.getElementById('turnName').textContent = myTurn ? 'შენ' : 'მეტოქე';
}

function resetGame() {
  initBalls();
  scores = {p1:0, p2:0};
  gameOver = false;
  currentTurn = 'p1';
  myTurn = (myRole === 'p1');
  canShoot = myTurn;
  updateGameUI();
  gameChannel?.send({ type: 'broadcast', event: 'state', payload: { balls: balls.map(b=>({...b})), currentTurn, scores, gameOver } });
}

function leaveGame() {
  inGame = false;
  if(gameChannel) sb.removeChannel(gameChannel);
  sb.from('billiards_rooms').update({status:'done'}).eq('code', roomCode);
  roomCode = null;
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
  loadOnlineUsers();
}

function toast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#7c3aed;padding:10px 20px;border-radius:20px;z-index:9999';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

init();
</script>
</body>
</html>
