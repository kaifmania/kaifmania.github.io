<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ჩამოხრჩობანა · კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080612;
  --panel:#0f0c22;
  --panel2:#16122e;
  --border:rgba(251,191,36,0.2);
  --text:#fff8e7;
  --text2:#c49a20;
  --text3:#5a4810;
  --accent:#fbbf24;
  --accent2:#f59e0b;
  --red:#ef4444;
  --green:#22c55e;
  --glow:rgba(251,191,36,0.25);
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{
  font-family:'Noto Sans Georgian',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,rgba(251,191,36,0.06),transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%,rgba(239,68,68,0.04),transparent 60%);
}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:rgba(8,6,18,0.9);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.hdr-logo{
  font-family:'Unbounded',sans-serif;font-size:12px;font-weight:900;
  color:var(--accent);letter-spacing:1.5px;
  text-shadow:0 0 16px var(--glow);
  display:flex;align-items:center;gap:6px;
}
.hdr-score{
  display:flex;align-items:center;gap:6px;
  background:var(--panel2);border:1px solid var(--border);
  border-radius:20px;padding:5px 14px;
}
.hdr-score .lbl{font-size:9px;color:var(--text3);font-family:'Unbounded',sans-serif;letter-spacing:1px}
.hdr-score .num{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:900;color:var(--accent)}

/* ── BODY LAYOUT ── */
.game-body{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  position:relative;z-index:1;
}

/* ── TOP ROW: gallows + side info ── */
.top-row{
  flex-shrink:0;
  display:flex;align-items:stretch;
  padding:10px 12px 0;
  gap:10px;
}

.gallows-card{
  flex:0 0 auto;
  width:118px;height:128px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#svg-mob{width:106px;height:116px}

.side-info{
  flex:1;
  display:flex;flex-direction:column;gap:8px;
  justify-content:center;
}

.hint-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(251,191,36,0.08);
  border:1px solid rgba(251,191,36,0.18);
  border-radius:20px;padding:5px 12px;
  font-size:11px;color:var(--text2);font-weight:500;
  align-self:flex-start;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.err-block{}
.err-lbl{
  font-size:8px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text3);font-family:'Unbounded',sans-serif;
  margin-bottom:5px;
}
.mdots{display:flex;gap:4px}
.mdot{
  width:13px;height:13px;border-radius:50%;
  background:var(--panel2);border:1.5px solid var(--border);
  transition:all 0.25s;
}
.mdot.hit{
  background:var(--red);border-color:var(--red);
  box-shadow:0 0 7px rgba(239,68,68,0.55);
  animation:dotPop .28s ease;
}
@keyframes dotPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

.lives-track{
  height:4px;background:var(--panel2);border-radius:4px;
  overflow:hidden;margin-top:5px;
}
.lives-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--green),#86efac);
  transition:width .4s ease,background .4s ease;
}

/* ── WORD ROW ── */
.word-row{
  flex-shrink:0;
  padding:8px 12px;
  display:flex;justify-content:center;
}
.word-display{
  display:flex;flex-wrap:wrap;gap:5px;
  justify-content:center;align-items:flex-end;
  min-height:48px;
}
.ls{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:20px}
.ls .ch{
  font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;
  color:var(--accent);min-height:22px;min-width:20px;
  display:flex;align-items:center;justify-content:center;
}
.ls .ch.pop{animation:lPop .32s cubic-bezier(.34,1.56,.64,1)}
@keyframes lPop{from{transform:scale(0) rotateX(90deg);opacity:0}to{transform:scale(1) rotateX(0);opacity:1}}
.ls .ln{width:100%;height:2px;background:var(--border);border-radius:2px;transition:background .25s}
.ls.ok .ln{background:var(--accent)}
.ls-sp{width:10px;height:48px;display:flex;align-items:flex-end}

/* ── DIVIDER ── */
.div-line{height:1px;background:var(--border);opacity:.4;margin:0 12px;flex-shrink:0}

/* ── KEYBOARD ── */
.keyboard-area{
  flex:1;min-height:0;
  display:flex;flex-direction:column;justify-content:center;
  padding:6px 8px 10px;
  gap:4px;
}
.kb-row{display:flex;gap:3px;justify-content:center}
.kb-btn{
  width:33px;height:33px;border-radius:9px;
  background:var(--panel2);border:1px solid var(--border);
  color:var(--text);font-family:'Noto Sans Georgian',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s,background .15s,border-color .15s,color .15s;
  -webkit-tap-highlight-color:transparent;user-select:none;
  position:relative;overflow:hidden;
}
.kb-btn::after{
  content:'';position:absolute;inset:0;
  background:var(--accent);opacity:0;transition:opacity .1s;
}
.kb-btn:active:not(:disabled)::after{opacity:.18}
.kb-btn:active:not(:disabled){transform:scale(.9)}
.kb-btn.ok{background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.4);color:var(--green)}
.kb-btn.no{background:rgba(239,68,68,.09);border-color:rgba(239,68,68,.25);color:rgba(239,68,68,.45)}
.kb-btn:disabled{cursor:not-allowed}

/* bigger on wider phones */
@media(min-width:375px){.kb-btn{width:35px;height:35px}}
@media(min-width:414px){.kb-btn{width:38px;height:38px;font-size:14px}.ls .ch{font-size:19px;min-width:22px}}
@media(min-width:480px){.kb-btn{width:42px;height:42px;font-size:15px}.ls .ch{font-size:21px}}

/* ── DESKTOP / TABLET ── */
@media(min-width:640px){
  html,body{height:auto;min-height:100dvh;overflow:auto}
  .game-body{
    flex-direction:row;
    max-width:840px;margin:0 auto;width:100%;
    padding:24px 20px;gap:20px;
    align-items:flex-start;
  }
  /* Left: gallows panel */
  .left-col{
    flex:0 0 240px;
    background:var(--panel);border:1px solid var(--border);
    border-radius:22px;padding:22px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    box-shadow:0 8px 40px rgba(0,0,0,.5);
  }
  /* Right: word + keyboard */
  .right-col{
    flex:1;display:flex;flex-direction:column;gap:16px;
  }
  .word-box{
    background:var(--panel);border:1px solid var(--border);
    border-radius:22px;padding:22px 18px;
    box-shadow:0 8px 40px rgba(0,0,0,.5);
  }
  .kb-box{
    background:var(--panel);border:1px solid var(--border);
    border-radius:22px;padding:18px;
    box-shadow:0 8px 40px rgba(0,0,0,.5);
  }
  /* hide mobile elements */
  .top-row,.div-line{display:none!important}
  .word-row{padding:0}
  .keyboard-area{padding:0;flex:none}
  /* desktop gallows */
  .gallows-card-desk{display:flex!important}
  .side-info-desk{display:flex!important}
  /* word slightly bigger */
  .ls .ch{font-size:22px;min-width:26px}
  .kb-btn{width:40px;height:40px;font-size:14px}
  .kb-row{gap:5px}
  .keyboard-area{gap:6px}
}

/* desktop-only elements (hidden on mobile) */
.gallows-card-desk{display:none;align-items:center;justify-content:center}
.side-info-desk{display:none;flex-direction:column;gap:10px;width:100%}
#svg-desk{width:180px;height:180px}
.desk-lbl{
  font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:2px;
  color:var(--text3);text-transform:uppercase;align-self:flex-start;
}

/* ── SHAKE ── */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-5px)}40%{transform:translateX(5px)}
  60%{transform:translateX(-3px)}80%{transform:translateX(3px)}
}
.shaking{animation:shake .4s ease}

/* ── RESULT ── */
.result-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.88);backdrop-filter:blur(16px);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.result-overlay.open{display:flex}
.result-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:26px;padding:30px 26px;
  text-align:center;max-width:340px;width:100%;
  box-shadow:0 24px 80px rgba(0,0,0,.8),0 0 60px rgba(251,191,36,.1);
  animation:cpop .42s cubic-bezier(.34,1.3,.64,1);
}
@keyframes cpop{from{opacity:0;transform:scale(.72) translateY(20px)}to{opacity:1;transform:none}}
.r-icon{font-size:54px;display:block;margin-bottom:12px;animation:ibounce .55s .15s both}
@keyframes ibounce{0%{transform:scale(0)}70%{transform:scale(1.18)}100%{transform:scale(1)}}
.r-title{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:900;margin-bottom:5px}
.r-title.win{color:var(--green)}.r-title.lose{color:var(--red)}
.r-answer{font-size:12px;color:var(--text3);margin-bottom:3px}
.r-answer strong{color:var(--accent);font-family:'Unbounded',sans-serif;font-size:14px;display:block;margin-top:3px}
.r-pts{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(251,191,36,.09);border:1px solid rgba(251,191,36,.22);
  border-radius:20px;padding:6px 16px;
  font-family:'Unbounded',sans-serif;font-size:11px;color:var(--accent);font-weight:700;
  margin:12px 0 16px;
}
.r-btn{
  width:100%;padding:13px;border-radius:13px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;color:#1a0800;
  font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.5px;
  box-shadow:0 6px 22px rgba(251,191,36,.28);
  transition:transform .15s;
  -webkit-tap-highlight-color:transparent;
}
.r-btn:active{transform:scale(.97)}

/* confetti */
.cp{position:fixed;pointer-events:none;animation:cfall linear forwards;z-index:9999}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* loading */
.loading-wrap{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:9999;flex-direction:column;gap:10px;
}
.ld-icon{font-size:36px;animation:ldspin 2s linear infinite}
@keyframes ldspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.ld-txt{font-family:'Unbounded',sans-serif;font-size:10px;letter-spacing:2px;color:var(--text3);animation:ldblink 1.4s ease infinite}
@keyframes ldblink{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>

          <div class="mdot" id="m0"></div><div class="mdot" id="m1"></div>
          <div class="mdot" id="m2"></div><div class="mdot" id="m3"></div>
          <div class="mdot" id="m4"></div><div class="mdot" id="m5"></div>
        </div>
        <div class="lives-track"><div class="lives-fill" id="lfMob" style="width:100%"></div></div>
      </div>
    </div>
  </div>

  <!-- word -->
  <div class="word-row" id="wordRow">

  <div class="div-line"></div>

  <!-- ===== DESKTOP LEFT COL (injected by JS) ===== -->

</div>

/* ── KEYBOARD ── */
function buildKB(){
  const el=document.getElementById('kbEl');
  el.style.cssText='display:flex;flex-direction:column;gap:4px';
  KB.forEach(row=>{
    const r=document.createElement('div');r.className='kb-row';
    row.forEach(l=>{
      const b=document.createElement('button');
      b.className='kb-btn';b.textContent=l;b.dataset.l=l;
      b.addEventListener('click',()=>guess(l));
      r.appendChild(b);
    });
    el.appendChild(r);
  });
}

/* ── ROUND ── */
function nextRound(){
  const rem=WORDS.map((_,i)=>i).filter(i=>!used.includes(i));
  if(!rem.length)used=[];
  const pool=WORDS.map((_,i)=>i).filter(i=>!used.includes(i));
  const idx=pool[Math.floor(Math.random()*pool.length)];
  used.push(idx);
  curWord=WORDS[idx].w; curHint=WORDS[idx].h;
  guessed=new Set(); mistakes=0; dead=false;

  // reset SVG
  [...BODY_M,...BODY_D].forEach(id=>{
    const e=document.getElementById(id);
    if(e)e.style.opacity='0';
  });

  // reset dots
  for(let i=0;i<6;i++){
    document.getElementById('m'+i)?.classList.remove('hit');
    document.getElementById('d'+i)?.classList.remove('hit');
  }

  setBar(6);
  document.getElementById('hintMob').textContent='📂 '+curHint;
  const hd=document.getElementById('hintDesk');
  if(hd)hd.textContent='📂 '+curHint;
  document.getElementById('resOverlay').classList.remove('open');
  renderWord();
  resetKB();
}

function setBar(rem){
  const pct=(rem/6)*100;
  const col=rem>3?'linear-gradient(90deg,#22c55e,#86efac)':rem>1?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#ef4444,#f87171)';
  ['lfMob','lfDesk'].forEach(id=>{
    const e=document.getElementById(id);
    if(e){e.style.width=pct+'%';e.style.background=col;}
  });
}

/* ── WORD RENDER ── */
function renderWord(){
  const d=document.getElementById('wordDisp');d.innerHTML='';
  for(const ch of curWord){
    if(ch===' '){
      const s=document.createElement('div');s.className='ls-sp';d.appendChild(s);continue;
    }
    const slot=document.createElement('div');
    slot.className='ls'+(guessed.has(ch)?' ok':'');
    const c=document.createElement('div');c.className='ch';c.textContent=guessed.has(ch)?ch:'';
    const ln=document.createElement('div');ln.className='ln';
    slot.appendChild(c);slot.appendChild(ln);
    d.appendChild(slot);
  }
}

/* ── GUESS ── */
function guess(letter){
  if(dead||guessed.has(letter))return;
  guessed.add(letter);
  const btn=document.querySelector(`.kb-btn[data-l="${letter}"]`);

  if(curWord.includes(letter)){
    if(btn){btn.classList.add('ok');btn.disabled=true;}
    revealLetters(letter);
    const won=[...curWord].filter(c=>c!==' ').every(c=>guessed.has(c));
    if(won)setTimeout(()=>showResult(true),380);
  } else {
    if(btn){btn.classList.add('no');btn.disabled=true;}
    mistakes++;
    // shake active svg
    const svgId=window.innerWidth>=640?'svg-desk':'svg-mob';
    const svg=document.getElementById(svgId);
    if(svg){svg.classList.remove('shaking');void svg.offsetWidth;svg.classList.add('shaking');setTimeout(()=>svg.classList.remove('shaking'),420);}
    // reveal part
    const pidx=mistakes-1;
    [BODY_M[pidx],BODY_D[pidx]].forEach(id=>{const e=document.getElementById(id);if(e)e.style.opacity='1';});
    document.getElementById('m'+pidx)?.classList.add('hit');
    document.getElementById('d'+pidx)?.classList.add('hit');
    setBar(6-mistakes);
    if(mistakes>=6)setTimeout(()=>showResult(false),680);
  }
}

function revealLetters(letter){
  const slots=document.querySelectorAll('#wordDisp .ls');
  let i=0;
  for(const ch of curWord){
    if(ch===' ')continue;
    const slot=slots[i++];
    if(!slot)continue;
    if(ch===letter&&!slot.classList.contains('ok')){
      slot.classList.add('ok');
      const c=slot.querySelector('.ch');
      if(c){c.textContent=ch;c.classList.remove('pop');void c.offsetWidth;c.classList.add('pop');}
    }
  }
}

function resetKB(){
  document.querySelectorAll('.kb-btn').forEach(b=>{b.disabled=false;b.classList.remove('ok','no');});
}

/* ── RESULT ── */
async function showResult(won){
  dead=true;
  if(won){
    await updateScore();spawnConfetti();
    document.getElementById('rIcon').textContent='🎉';
    document.getElementById('rTitle').className='r-title win';
    document.getElementById('rTitle').textContent='გამარჯვება!';
    document.getElementById('rAnswer').innerHTML='სიტყვა: <strong>'+curWord+'</strong>';
    document.getElementById('rPts').textContent='🪢 +5 ქულა';
  } else {
    document.getElementById('rIcon').textContent='💀';
    document.getElementById('rTitle').className='r-title lose';
    document.getElementById('rTitle').textContent='ჩამოიხრჩე!';
    document.getElementById('rAnswer').innerHTML='პასუხი: <strong>'+curWord+'</strong>';
    document.getElementById('rPts').textContent='🪢 0 ქულა';
  }
  document.getElementById('resOverlay').classList.add('open');
  const{data:p}=await sb.from('profiles').select('hangman_score').eq('id',ME.id).single();
  if(p)document.getElementById('totScore').textContent=p.hangman_score||0;
}

async function updateScore(){
  const{data:p}=await sb.from('profiles').select('hangman_score').eq('id',ME.id).single();
  await sb.from('profiles').update({hangman_score:(p?.hangman_score||0)+5}).eq('id',ME.id);
}

function spawnConfetti(){
  const cols=['#fbbf24','#f59e0b','#22c55e','#3b82f6','#ec4899','#8b5cf6','#ef4444'];
  for(let i=0;i<50;i++){
    const e=document.createElement('div');e.className='cp';
    const s=5+Math.random()*8;
    e.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.4}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
    document.body.appendChild(e);setTimeout(()=>e.remove(),3500);
  }
}

document.addEventListener('keydown',e=>{if(GEO.includes(e.key))guess(e.key);});
init();
</script>
