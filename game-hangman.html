<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ჩამოხრჩობა 🪢</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;
  --panel:#120f24;
  --border:rgba(160,80,255,0.3);
  --text:#ede0ff;
  --text2:#b580e0;
  --text3:#7a5a9a;
  --accent:#f07aff;
  --indigo:#7a1fc8;
  --indigo2:#a855f7;
  --glow:rgba(168,85,247,0.3);
  --green:#4ade80;
  --red:#ff5555;
  --gold:#ffd040;
}
body{
  font-family:'Noto Sans Georgian',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 12px 32px;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 10%,rgba(120,30,200,0.15) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%,rgba(240,122,255,0.1) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}

/* ── HEADER ── */
header{
  width:100%;
  max-width:640px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
  position:relative;
  z-index:1;
}
.logo{
  font-family:'Unbounded',sans-serif;
  font-size:18px;
  font-weight:900;
  color:var(--text);
  letter-spacing:.5px;
}
.logo span{color:var(--accent);}
.score-chip{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px 14px;
  font-family:'Unbounded',sans-serif;
  font-size:11px;
  box-shadow:0 0 20px var(--glow);
}
.score-val{
  color:var(--gold);
  font-size:15px;
  font-weight:900;
}
@keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.5)}100%{transform:scale(1)}}
.score-val.pop{animation:scorePop .4s cubic-bezier(.34,1.6,.64,1);}

/* ── MAIN CARD ── */
.card{
  width:100%;
  max-width:640px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:24px;
  padding:20px 16px;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 60px rgba(168,85,247,.08);
  position:relative;
  z-index:1;
}

/* ── GALLOWS ── */
.gallows-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:12px;
}
#gallowsSvg{
  filter:drop-shadow(0 0 8px var(--glow));
}

/* ── WORD DISPLAY ── */
.word-row{
  display:flex;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.letter-box{
  width:30px;
  height:38px;
  border-bottom:3px solid var(--indigo2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Unbounded',sans-serif;
  font-size:15px;
  font-weight:700;
  color:var(--text);
  transition:all .25s;
}
.letter-box.space{border-bottom-color:transparent;width:14px;}
@keyframes letterReveal{
  0%{transform:scale(0) rotateY(-90deg);opacity:0}
  60%{transform:scale(1.2) rotateY(10deg)}
  100%{transform:scale(1) rotateY(0deg);opacity:1}
}
.letter-box.revealed{
  animation:letterReveal .35s cubic-bezier(.34,1.4,.64,1);
  color:var(--accent);
}
.letter-box.wrong-reveal{color:var(--red);}

/* ── HINT ── */
.hint-text{
  text-align:center;
  font-size:11px;
  color:var(--text3);
  margin-bottom:12px;
  background:rgba(120,30,200,0.12);
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px 14px;
  font-style:italic;
}

/* ── WRONG LETTERS ── */
.wrong-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:5px;
  flex-wrap:wrap;
  margin-bottom:10px;
  min-height:26px;
}
.wrong-chip{
  padding:3px 8px;
  border-radius:8px;
  background:rgba(255,85,85,0.15);
  border:1px solid rgba(255,85,85,0.35);
  color:var(--red);
  font-family:'Unbounded',sans-serif;
  font-size:11px;
  font-weight:700;
}
.lives-text{
  font-size:10px;
  color:var(--text3);
  font-family:'Unbounded',sans-serif;
  letter-spacing:.5px;
  text-align:center;
  margin-bottom:12px;
}
.lives-text span{color:var(--red);font-size:12px;}

/* ── KEYBOARD ── */
.keyboard{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.key-btn{
  aspect-ratio:1;
  border-radius:8px;
  background:rgba(120,30,200,0.2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Unbounded',sans-serif;
  font-weight:700;
  cursor:pointer;
  transition:all .15s;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
  position:relative;
  overflow:hidden;
  /* font size handled responsively below */
  font-size: clamp(8px, 2.2vw, 13px);
}
.key-btn::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(168,85,247,.15),transparent);
  opacity:0;
  transition:opacity .15s;
}
.key-btn:hover:not(:disabled)::before{opacity:1;}
.key-btn:hover:not(:disabled){
  border-color:var(--indigo2);
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(168,85,247,.3);
}
.key-btn:disabled{
  opacity:0.25;
  cursor:default;
  transform:none;
}
.key-btn.correct{
  background:rgba(74,222,128,0.2);
  border-color:rgba(74,222,128,0.5);
  color:var(--green);
}
.key-btn.wrong{
  background:rgba(255,85,85,0.15);
  border-color:rgba(255,85,85,0.3);
  color:var(--red);
}

/* ── STATUS OVERLAY ── */
@keyframes statusIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
.status-overlay{
  position:absolute;
  inset:0;
  border-radius:24px;
  background:rgba(13,11,26,0.93);
  backdrop-filter:blur(12px);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  z-index:10;
  padding:20px;
}
.status-overlay.show{display:flex;animation:statusIn .4s cubic-bezier(.34,1.3,.64,1);}
.status-icon{font-size:56px;filter:drop-shadow(0 0 20px var(--glow));}
.status-title{
  font-family:'Unbounded',sans-serif;
  font-size:20px;
  font-weight:900;
  color:var(--text);
  text-align:center;
}
.status-sub{font-size:13px;color:var(--text2);text-align:center;}
.status-word{
  font-family:'Unbounded',sans-serif;
  font-size:15px;
  color:var(--accent);
  background:rgba(168,85,247,0.12);
  border:1px solid var(--border);
  border-radius:12px;
  padding:8px 20px;
}
.status-score-gain{
  font-family:'Unbounded',sans-serif;
  font-size:24px;
  font-weight:900;
  color:var(--gold);
  text-shadow:0 0 20px rgba(255,208,64,.5);
}
.next-btn{
  margin-top:4px;
  padding:12px 36px;
  border-radius:50px;
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));
  border:none;
  color:#fff;
  font-family:'Unbounded',sans-serif;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:.5px;
  box-shadow:0 8px 28px rgba(120,30,200,.5);
  transition:all .2s;
}
.next-btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 14px 40px rgba(120,30,200,.65);}

/* ── LOADING ── */
.loader{
  text-align:center;
  padding:48px;
  font-family:'Unbounded',sans-serif;
  font-size:13px;
  color:var(--text3);
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-emoji{
  display:inline-block;
  font-size:40px;
  margin-bottom:12px;
  animation:spin 2s linear infinite;
}

/* ── LEADERBOARD ── */
.lb-wrap{
  width:100%;
  max-width:640px;
  margin-top:16px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  position:relative;
  z-index:1;
}
.lb-head{
  background:linear-gradient(135deg,rgba(120,30,200,.2),transparent);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  font-family:'Unbounded',sans-serif;
  font-size:10px;
  letter-spacing:1.5px;
  color:var(--text2);
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:6px;
}
.lb-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 16px;
  border-bottom:1px solid rgba(160,80,255,0.1);
  transition:background .15s;
}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:rgba(120,30,200,.08);}
.lb-rank{
  font-family:'Unbounded',sans-serif;
  font-size:13px;
  font-weight:700;
  width:26px;
  text-align:center;
  flex-shrink:0;
}
.lb-rank.gold{color:#ffd040;}
.lb-rank.silver{color:#c8c8c8;}
.lb-rank.bronze{color:#c88040;}
.lb-name{flex:1;font-size:12px;color:var(--text);}
.lb-score{
  font-family:'Unbounded',sans-serif;
  font-size:13px;
  font-weight:700;
  color:var(--accent);
}
.lb-me{background:rgba(168,85,247,.08);}

/* ── PARTICLES ── */
@keyframes particleFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}
.particle{
  position:fixed;
  pointer-events:none;
  font-size:20px;
  z-index:99999;
  animation:particleFly .8s ease-out forwards;
}

/* ── DESKTOP overrides ── */
@media(min-width:480px){
  body{padding:20px 16px 40px;}
  .card{padding:28px 24px;}
  .logo{font-size:20px;}
  .letter-box{width:34px;height:42px;font-size:18px;}
  .hint-text{font-size:12px;margin-bottom:16px;}
  .lives-text{font-size:11px;margin-bottom:14px;}
  .keyboard{gap:6px;}
  .key-btn{border-radius:10px;font-size:clamp(10px,1.6vw,13px);}
  .status-icon{font-size:72px;}
  .status-title{font-size:24px;}
  .status-word{font-size:18px;}
  .status-score-gain{font-size:28px;}
  .lb-wrap{margin-top:20px;border-radius:20px;}
}
</style>
</head>

let ME = null, MYPROF = null;
let currentWord = null, currentHint = null;
let guessedLetters = new Set();
let wrongLetters = [];
let gameOver = false;
let currentScore = 0;

const BODY_PARTS = ['p-head','p-body','p-larm','p-rarm','p-lleg','p-rleg'];
const GEO_LETTERS = 'აბგდევზთიკლმნოპჟრსტუფქღყშჩცძწჭხჯჰ'.split('');

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.close(); return; }
  ME = user;
  const { data } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  MYPROF = data;
  currentScore = data?.hangman_score || 0;
  document.getElementById('scoreVal').textContent = currentScore;
  document.getElementById('loader').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  buildKeyboard();
  newGame();
  loadLeaderboard();
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  GEO_LETTERS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'key-btn';
    btn.textContent = l;
    btn.id = 'key-' + l;
    btn.addEventListener('click', () => guess(l));
    kb.appendChild(btn);
  });
}

function newGame() {
  const idx = Math.floor(Math.random() * WORD_LIST.length);
  currentWord = WORD_LIST[idx].w;
  currentHint = WORD_LIST[idx].h;
  guessedLetters = new Set();
  wrongLetters = [];
  gameOver = false;

  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('loseOverlay').classList.remove('show');

  BODY_PARTS.forEach(id => document.getElementById(id).style.display = 'none');

  GEO_LETTERS.forEach(l => {
    const btn = document.getElementById('key-' + l);
    if (btn) { btn.disabled = false; btn.className = 'key-btn'; }
  });

  document.getElementById('wrongCount').textContent = '0';
  document.getElementById('wrongRow').innerHTML = '';
  document.getElementById('hintText').textContent = 'მინიშნება: ' + currentHint;

  renderWordRow();
}

function renderWordRow() {
  const row = document.getElementById('wordRow');
  row.innerHTML = '';
  for (const ch of currentWord) {
    const box = document.createElement('div');
    if (ch === ' ') {
      box.className = 'letter-box space';
    } else {
      box.className = 'letter-box';
      if (guessedLetters.has(ch)) {
        box.textContent = ch;
        box.classList.add('revealed');
      }
    }
    row.appendChild(box);
  }
}

function guess(letter) {
  if (gameOver || guessedLetters.has(letter)) return;
  guessedLetters.add(letter);

  const btn = document.getElementById('key-' + letter);
  if (btn) btn.disabled = true;

  if (currentWord.includes(letter)) {
    if (btn) btn.classList.add('correct');
    revealLetters(letter);
    if (isWordSolved()) winGame();
  } else {
    if (btn) btn.classList.add('wrong');
    wrongLetters.push(letter);
    const wRow = document.getElementById('wrongRow');
    const chip = document.createElement('span');
    chip.className = 'wrong-chip';
    chip.textContent = letter;
    wRow.appendChild(chip);

    const errCount = wrongLetters.length;
    document.getElementById('wrongCount').textContent = errCount;
    if (errCount <= BODY_PARTS.length) {
      document.getElementById(BODY_PARTS[errCount-1]).style.display = 'block';
    }
    if (errCount >= 6) loseGame();
  }
}

function revealLetters(letter) {
  const boxes = document.getElementById('wordRow').querySelectorAll('.letter-box');
  let i = 0;
  for (const ch of currentWord) {
    if (ch !== ' ') {
      if (ch === letter) {
        boxes[i].textContent = ch;
        boxes[i].classList.add('revealed');
      }
      i++;
    } else {
      i++;
    }
  }
}

function isWordSolved() {
  for (const ch of currentWord) {
    if (ch !== ' ' && !guessedLetters.has(ch)) return false;
  }
  return true;
}

async function winGame() {
  gameOver = true;
  spawnParticles();

  currentScore += 5;
  const newScore = currentScore;
  document.getElementById('scoreVal').textContent = newScore;
  const sv = document.querySelector('.score-val');
  sv.classList.remove('pop');
  void sv.offsetWidth;
  sv.classList.add('pop');

  await sb.from('profiles').update({ hangman_score: newScore }).eq('id', ME.id);

  document.getElementById('winWord').textContent = currentWord;
  document.getElementById('winScoreInfo').textContent = 'სულ ქულა: ' + newScore;
  document.getElementById('winOverlay').classList.add('show');

  loadLeaderboard();
}

function loseGame() {
  gameOver = true;
  const boxes = document.getElementById('wordRow').querySelectorAll('.letter-box');
  let i = 0;
  for (const ch of currentWord) {
    if (ch !== ' ') {
      if (!guessedLetters.has(ch)) {
        boxes[i].textContent = ch;
        boxes[i].classList.add('revealed','wrong-reveal');
      }
      i++;
    } else {
      i++;
    }
  }
  document.getElementById('loseWord').textContent = currentWord;
  document.getElementById('loseOverlay').classList.add('show');
}

function nextRound() {
  newGame();
}

async function loadLeaderboard() {
  const { data } = await sb.from('profiles').select('id,username,hangman_score').order('hangman_score', { ascending: false }).limit(5);
  const el = document.getElementById('lbRows');
  if (!el || !data) return;
  el.innerHTML = '';
  const medals = ['🥇','🥈','🥉'];
  const rankClasses = ['gold','silver','bronze'];
  data.forEach((u, i) => {
    const d = document.createElement('div');
    d.className = 'lb-row' + (u.id === ME?.id ? ' lb-me' : '');
    d.innerHTML = `<span class="lb-rank ${rankClasses[i]||''}">${medals[i]||i+1}</span><span class="lb-name">${escH(u.username||'?')}</span><span class="lb-score">🪢 ${u.hangman_score||0}</span>`;
    el.appendChild(d);
  });
}

function spawnParticles() {
  const emojis = ['🎉','✨','💜','🌟','🎊','💫','⭐','🪢'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const x = 20 + Math.random() * 60;
      const y = 20 + Math.random() * 60;
      p.style.left = x + 'vw';
      p.style.top = y + 'vh';
      p.style.setProperty('--dx', (Math.random()-0.5)*200+'px');
      p.style.setProperty('--dy', -(50+Math.random()*100)+'px');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 900);
    }, i * 60);
  }
}

function escH(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('keydown', e => {
  const l = e.key;
  if (GEO_LETTERS.includes(l)) guess(l);
});

init();
