<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ჩამოხრჩობა 🪢</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--panel:#111827;--panel2:#1a2234;
  --border:rgba(251,191,36,0.25);--text:#fff8e7;--text2:#d4a030;--text3:#7a6030;
  --accent:#fbbf24;--indigo:#92400e;--indigo2:#d97706;
  --indigo-f:rgba(251,191,36,0.12);--glow:rgba(251,191,36,0.3);
  --green:#4ade80;--red:#f87171;--rope:#a0522d;
}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:12px 16px 80px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(251,191,36,0.08),transparent),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(146,64,14,0.1),transparent);pointer-events:none;z-index:0}

.back-btn{position:fixed;top:14px;left:14px;background:var(--indigo-f);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:12px;padding:8px 14px;cursor:pointer;z-index:100;transition:all .2s;font-family:'Noto Sans Georgian',sans-serif;text-decoration:none;display:flex;align-items:center;gap:5px}
.back-btn:hover{background:var(--indigo2);color:#fff}

/* HEADER */
.game-header{text-align:center;margin:8px 0 18px;position:relative;z-index:1}
.game-logo{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:900;color:var(--accent);text-shadow:0 0 30px rgba(251,191,36,.4);letter-spacing:1px;margin-bottom:4px}
.game-sub{font-size:10px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;font-family:'Unbounded',sans-serif}

/* SCORE STRIP */
.score-strip{display:flex;gap:8px;margin-bottom:16px;position:relative;z-index:1;flex-wrap:wrap;justify-content:center}
.sc-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:9px 16px;text-align:center;min-width:80px}
.sc-label{font-size:9px;color:var(--text3);font-family:'Unbounded',sans-serif;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.sc-val{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;color:var(--accent)}

/* MAIN LAYOUT */
.main-grid{display:flex;gap:16px;width:100%;max-width:700px;position:relative;z-index:1;flex-wrap:wrap;justify-content:center}

/* GALLOWS CARD */
.gallows-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:220px}

/* SVG GALLOWS */
#gallowsSvg{width:200px;height:220px}
.gallows-wood{stroke:#8B6914;stroke-width:5;stroke-linecap:round;fill:none}
.rope-line{stroke:var(--rope);stroke-width:3;stroke-linecap:round;transition:all .3s}
.body-part{stroke:#fbbf24;stroke-width:4;stroke-linecap:round;fill:none;opacity:0;transition:opacity .2s}
.body-part.visible{opacity:1;animation:partAppear .3s cubic-bezier(.2,1.5,.4,1)}
.head-circle{fill:none;stroke:#fbbf24;stroke-width:4;opacity:0;transition:opacity .2s}
.head-circle.visible{opacity:1;animation:partAppear .3s cubic-bezier(.2,1.5,.4,1)}
/* Dead eyes */
.dead-eye{opacity:0;transition:opacity .3s}
.dead-eye.visible{opacity:1}
/* Swing animation when alive */
@keyframes swing{0%,100%{transform-origin:160px 50px;transform:rotate(-3deg)}50%{transform-origin:160px 50px;transform:rotate(3deg)}}
@keyframes partAppear{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes deathShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes winPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(74,222,128,.3))}50%{filter:drop-shadow(0 0 20px rgba(74,222,128,.7))}}
.figure-group.swinging{animation:swing 2s ease-in-out infinite}
.figure-group.dead{animation:deathShake .6s ease}
.figure-group.won{animation:winPulse 1.5s ease infinite}

/* WRONG LETTERS */
.wrong-letters{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;min-height:30px;justify-content:center;max-width:200px}
.wrong-chip{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);border-radius:8px;padding:4px 10px;font-size:14px;font-weight:700;color:var(--red);font-family:'Noto Sans Georgian',sans-serif}
.lives-row{display:flex;gap:4px;margin-top:8px;justify-content:center}
.life-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);transition:all .3s;box-shadow:0 0 6px var(--glow)}
.life-dot.lost{background:#374151;box-shadow:none}

/* WORD CARD */
.word-card{flex:1;min-width:260px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:14px}

.category-badge{font-size:10px;font-family:'Unbounded',sans-serif;letter-spacing:1px;color:var(--text2);background:var(--indigo-f);border:1px solid var(--border);padding:4px 12px;border-radius:20px;text-transform:uppercase;align-self:flex-start}

/* WORD SLOTS */
.word-slots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:8px 0}
.letter-slot{width:40px;height:48px;border-bottom:3px solid var(--accent);display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-family:'Noto Sans Georgian',sans-serif;font-size:22px;font-weight:700;color:var(--text);transition:all .3s;position:relative}
.letter-slot.revealed{border-bottom-color:var(--green);animation:revealPop .35s cubic-bezier(.2,1.5,.4,1)}
.letter-slot.wrong-reveal{border-bottom-color:var(--red)}
.letter-slot span{display:inline-block;transition:all .3s}
@keyframes revealPop{0%{transform:translateY(-10px) scale(1.3);opacity:0}60%{transform:translateY(2px)}100%{transform:translateY(0) scale(1);opacity:1}}

/* HINT */
.hint-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hint-text{background:rgba(251,191,36,.08);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--text2);display:none;line-height:1.5;flex:1}
.hint-text.show{display:block}
.hint-btn{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:11px;padding:6px 12px;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Noto Sans Georgian',sans-serif;flex-shrink:0}
.hint-btn:hover{background:var(--indigo2);color:#fff}
.hint-btn:disabled{opacity:.4;cursor:not-allowed}

/* KEYBOARD */
.keyboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:6px;margin-top:6px}
.key-btn{height:46px;border-radius:12px;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans Georgian',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center}
.key-btn:hover:not(:disabled){background:var(--indigo-f);border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(251,191,36,.2)}
.key-btn:active:not(:disabled){transform:scale(.93)}
.key-btn.correct{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.5);color:var(--green);cursor:not-allowed}
.key-btn.wrong{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:#6b7280;cursor:not-allowed}
.key-btn:disabled{opacity:.4;cursor:not-allowed}

/* RESULT OVERLAY */
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;padding:16px}
.result-overlay.show{opacity:1;pointer-events:all}
.result-card{background:var(--panel);border:1px solid var(--border);border-radius:28px;padding:28px 24px;text-align:center;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 60px rgba(251,191,36,.1);animation:popIn .4s cubic-bezier(.22,1.5,.4,1)}
.result-emoji{font-size:60px;display:block;margin-bottom:10px;line-height:1}
.result-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;margin-bottom:6px}
.result-title.win{color:var(--green);text-shadow:0 0 20px rgba(74,222,128,.4)}
.result-title.lose{color:var(--red);text-shadow:0 0 20px rgba(248,113,113,.3)}
.result-word{font-size:28px;font-weight:700;color:var(--accent);margin:8px 0;letter-spacing:3px}
.result-info{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.btn-row{display:flex;gap:10px}
.btn{flex:1;padding:13px;border-radius:14px;border:1px solid var(--border);font-family:'Noto Sans Georgian',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;font-weight:600}
.btn-primary{background:linear-gradient(135deg,#92400e,#d97706);border:none;color:#fff;box-shadow:0 4px 18px rgba(217,119,6,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(217,119,6,.5)}
.btn-secondary{background:var(--indigo-f);color:var(--text2)}
.btn-secondary:hover{background:var(--panel2);color:var(--text)}

/* LEADERBOARD */
.lb-section{width:100%;max-width:700px;margin-top:16px;position:relative;z-index:1}
.lb-wrap{background:var(--panel);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.lb-head{background:var(--indigo-f);padding:12px 16px;font-family:'Unbounded',sans-serif;font-size:9px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border)}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--indigo-f)}
.lb-rank{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;width:28px;text-align:center}
.rank-1{color:#ffd040;text-shadow:0 0 10px rgba(255,208,64,.5)}
.rank-2{color:#c8c8c8}.rank-3{color:#c88040}
.lb-name{flex:1;font-size:13px;color:var(--text)}
.lb-score{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--accent)}

@keyframes popIn{from{opacity:0;transform:scale(.7) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes scoreFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px) scale(1.4)}}
.floating-score{position:fixed;font-family:'Unbounded',sans-serif;font-size:26px;font-weight:900;color:var(--green);text-shadow:0 0 20px rgba(74,222,128,.5);pointer-events:none;z-index:9999;animation:scoreFloat 1s ease forwards}

.progress-bar{width:100%;height:4px;background:var(--panel2);border-radius:4px;margin-bottom:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--indigo2),var(--accent));border-radius:4px;transition:width .5s ease}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--accent);font-family:'Unbounded',sans-serif;font-weight:700;transition:all .3s;align-self:flex-start}
.streak-badge.hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>

<a class="back-btn" href="javascript:window.close()">← უკან</a>

<div class="game-header">
  <div class="game-logo">🪢 ჩამოხრჩობა</div>
  <div class="game-sub">გამოიცანი სიტყვა · 6 შანსი</div>
</div>

<div class="score-strip">
  <div class="sc-card"><div class="sc-label">ქულა</div><div class="sc-val" id="scoreVal">0</div></div>
  <div class="sc-card"><div class="sc-label">სწორი</div><div class="sc-val" style="color:var(--green)" id="correctVal">0</div></div>
  <div class="sc-card"><div class="sc-label">N</div><div class="sc-val" style="color:var(--text2)" id="wordNum">1</div></div>
  <div class="sc-card"><div class="sc-label">სტრიქი</div><div class="sc-val" style="color:var(--accent)" id="streakVal">0🔥</div></div>
</div>

<div class="main-grid">
  <!-- GALLOWS -->
  <div class="gallows-card">
    <svg id="gallowsSvg" viewBox="0 0 200 220">
      <!-- Gallows frame -->
      <line x1="20" y1="210" x2="180" y2="210" class="gallows-wood"/>
      <line x1="60" y1="210" x2="60" y2="20" class="gallows-wood"/>
      <line x1="60" y1="20" x2="140" y2="20" class="gallows-wood"/>
      <line x1="60" y1="45" x2="85" y2="20" class="gallows-wood" style="stroke-width:3"/>
      <!-- Rope -->
      <line x1="140" y1="20" x2="140" y2="48" class="rope-line" id="ropeTop"/>

      <!-- Figure group -->
      <g class="figure-group" id="figureGroup">
        <!-- Head -->
        <circle cx="140" cy="60" r="14" class="head-circle" id="headEl"/>
        <!-- Dead X eyes -->
        <g id="deadEyes">
          <line x1="133" y1="54" x2="139" y2="60" class="dead-eye" id="de1" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="139" y1="54" x2="133" y2="60" class="dead-eye" id="de2" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="141" y1="54" x2="147" y2="60" class="dead-eye" id="de3" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="147" y1="54" x2="141" y2="60" class="dead-eye" id="de4" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <!-- Happy eyes (alive) -->
        <g id="happyEyes">
          <circle cx="134" cy="57" r="2" fill="#fbbf24" opacity="0" id="he1"/>
          <circle cx="146" cy="57" r="2" fill="#fbbf24" opacity="0" id="he2"/>
          <path d="M134 63 Q140 67 146 63" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" opacity="0" id="smile"/>
        </g>
        <!-- Body -->
        <line x1="140" y1="74" x2="140" y2="130" class="body-part" id="bodyEl"/>
        <!-- Left arm -->
        <line x1="140" y1="85" x2="115" y2="108" class="body-part" id="armLEl"/>
        <!-- Right arm -->
        <line x1="140" y1="85" x2="165" y2="108" class="body-part" id="armREl"/>
        <!-- Left leg -->
        <line x1="140" y1="130" x2="115" y2="165" class="body-part" id="legLEl"/>
        <!-- Right leg -->
        <line x1="140" y1="130" x2="165" y2="165" class="body-part" id="legREl"/>
      </g>
    </svg>

    <div class="lives-row" id="livesRow"></div>
    <div class="wrong-letters" id="wrongLetters"></div>
  </div>

  <!-- WORD CARD -->
  <div class="word-card">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span class="category-badge" id="catBadge">კატეგორია</span>
      <div class="streak-badge hidden" id="streakBadge">🔥 <span id="streakText">0</span></div>
    </div>
    <div class="hint-row">
      <div class="hint-text" id="hintText"></div>
      <button class="hint-btn" id="hintBtn" onclick="useHint()">💡 (<span id="hintCount">3</span>)</button>
    </div>
    <div class="word-slots" id="wordSlots"></div>
    <div class="keyboard" id="keyboard"></div>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="lb-section">
  <div class="lb-wrap">
    <div class="lb-head">🏆 ტოპ 10 · ჩამოხრჩობა</div>
    <div id="lbContainer"></div>
  </div>
</div>

<!-- RESULT -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <div class="result-title" id="resultTitle">გამარჯვება!</div>
    <div class="result-word" id="resultWord"></div>
    <div class="result-info" id="resultInfo"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="nextWord()">➡ შემდეგი</button>
    </div>
  </div>
</div>

<script>

const sb = createClient(

// ======================== 300 GEORGIAN WORDS WITH HINTS ========================
const WORDS = [
  // ქართული ისტორია / History
  {w:"თამარი",cat:"ისტორია",hint:"საქართველოს ოქრის ხანის დედოფალი"},

  {w:"ბოლნისი",cat:"ისტორია",hint:"უძველესი ქართული წარწერის ადგილი"},

  {w:"მტკვარი",cat:"გეოგრაფია",hint:"თბილისის მდინარე"},
  {w:"ალაზანი",cat:"გეოგრაფია",hint:"კახეთის მდინარე"},
  {w:"ყაზბეგი",cat:"გეოგრაფია",hint:"5047 მ. ქართული მთა"},
  {w:"სვანეთი",cat:"გეოგრაფია",hint:"მესტია, ლენტეხი — მხარე"},
  {w:"კახეთი",cat:"გეოგრაფია",hint:"ყურძნის მხარე"},
  {w:"სამეგრელო",cat:"გეოგრაფია",hint:"ზუგდიდი — ცენტრი"},
  {w:"გურია",cat:"გეოგრაფია",hint:"ოზურგეთი — ცენტრი"},

// ====== GEORGIAN KEYBOARD ======
const GEO_LETTERS = [
  'ა','ბ','გ','დ','ე','ვ','ზ','თ','ი','კ','ლ','მ',
  'ნ','ო','პ','ჟ','რ','ს','ტ','უ','ფ','ქ','ღ','ყ',
  'შ','ჩ','ც','ძ','წ','ჭ','ხ','ჯ','ჰ','ო'
];
// Unique letters
const KEYBOARD_LETTERS = [...new Set(GEO_LETTERS)];

// ====== BODY PARTS (in order of reveal) ======
const BODY_PARTS = ['headEl','bodyEl','armLEl','armREl','legLEl','legREl'];
const MAX_WRONG = 6;

// ====== STATE ======
let ME = null, MYPROF = null;
let currentWord = null;
let score = 0, correctCount = 0, wordNum = 0, streak = 0;
let wrongLetters = [], guessedLetters = new Set();
let hintCount = 3;
let gameActive = false;

// ====== INIT ======
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.close(); return; }
  ME = user;
  const { data } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  MYPROF = data;
  score = MYPROF?.hangman_score || 0;
  document.getElementById('scoreVal').textContent = score;
  buildKeyboard();
  buildLivesRow();
  loadLeaderboard();
  loadNewWord();
}

// ====== WORD ======
function loadNewWord() {
  const idx = Math.floor(Math.random() * WORDS.length);
  currentWord = WORDS[idx];
  wrongLetters = [];
  guessedLetters = new Set();
  gameActive = true;
  wordNum++;

  document.getElementById('wordNum').textContent = wordNum;
  document.getElementById('catBadge').textContent = currentWord.cat;
  document.getElementById('hintText').textContent = '💡 ' + currentWord.hint;
  document.getElementById('hintText').classList.remove('show');
  document.getElementById('progressFill').style.width = Math.min(wordNum * 0.33, 100) + '%';

  resetGallows();
  renderWordSlots();
  renderKeyboard();
  renderWrongLetters();
  updateLives();
}

// ====== GALLOWS ======
function resetGallows() {
  BODY_PARTS.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('visible'); }
  });
  // Reset head
  const head = document.getElementById('headEl');
  if (head) head.classList.remove('visible');
  // Dead eyes off
  ['de1','de2','de3','de4'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('visible');
  });
  // Happy eyes off
  ['he1','he2','smile'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = '0';
  });
  const fig = document.getElementById('figureGroup');
  fig.classList.remove('swinging','dead','won');
}

function showBodyPart(wrongCount) {
  // wrongCount: 1=head, 2=body, 3=armL, 4=armR, 5=legL, 6=legR
  if (wrongCount === 1) {
    const head = document.getElementById('headEl');
    head.classList.add('visible');
    // Show happy eyes while alive
    ['he1','he2','smile'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.opacity = '1';
    });
    const fig = document.getElementById('figureGroup');
    fig.classList.add('swinging');
  } else if (wrongCount > 1) {
    const partId = BODY_PARTS[wrongCount - 1];
    if (partId) {
      const el = document.getElementById(partId);
      if (el) el.classList.add('visible');
    }
    // Remove happy eyes at 4+
    if (wrongCount >= 4) {
      ['he1','he2','smile'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.opacity = '0';
      });
    }
  }
  // Full figure: show death
  if (wrongCount >= MAX_WRONG) {
    const fig = document.getElementById('figureGroup');
    fig.classList.remove('swinging');
    ['de1','de2','de3','de4'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('visible');
    });
    ['he1','he2','smile'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.opacity = '0';
    });
    setTimeout(() => fig.classList.add('dead'), 50);
  }
}

function showWinFigure() {
  const fig = document.getElementById('figureGroup');
  fig.classList.remove('swinging','dead');
  fig.classList.add('won');
  // Green body
  BODY_PARTS.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.stroke = '#4ade80'; }
  });
  const head = document.getElementById('headEl');
  if (head) head.style.stroke = '#4ade80';
}

// ====== WORD SLOTS ======
function renderWordSlots() {
  const el = document.getElementById('wordSlots');
  el.innerHTML = '';
  [...currentWord.w].forEach(letter => {
    const slot = document.createElement('div');
    slot.className = 'letter-slot';
    const span = document.createElement('span');
    span.textContent = guessedLetters.has(letter) ? letter : '';
    if (guessedLetters.has(letter)) slot.classList.add('revealed');
    slot.appendChild(span);
    el.appendChild(slot);
  });
}

// ====== KEYBOARD ======
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  // Build from word letters we actually need + full alphabet
  const allGeoLetters = [
    'ა','ბ','გ','დ','ე','ვ','ზ','თ','ი','კ','ლ','მ',
    'ნ','ო','პ','ჟ','რ','ს','ტ','უ','ფ','ქ','ღ','ყ',
    'შ','ჩ','ც','ძ','წ','ჭ','ხ','ჯ','ჰ'
  ];
  allGeoLetters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'key-btn';
    btn.textContent = letter;
    btn.dataset.letter = letter;
    btn.addEventListener('click', () => guessLetter(letter));
    kb.appendChild(btn);
  });
}

function renderKeyboard() {
  document.querySelectorAll('.key-btn').forEach(btn => {
    const letter = btn.dataset.letter;
    btn.classList.remove('correct','wrong');
    btn.disabled = false;
    if (guessedLetters.has(letter)) {
      if (currentWord.w.includes(letter)) btn.classList.add('correct');
      else btn.classList.add('wrong');
      btn.disabled = true;
    }
  });
}

// ====== WRONG LETTERS ======
function renderWrongLetters() {
  const el = document.getElementById('wrongLetters');
  el.innerHTML = '';
  wrongLetters.forEach(l => {
    const chip = document.createElement('div');
    chip.className = 'wrong-chip';
    chip.textContent = l;
    el.appendChild(chip);
  });
}

// ====== LIVES ======
function buildLivesRow() {
  const el = document.getElementById('livesRow');
  el.innerHTML = '';
  for (let i = 0; i < MAX_WRONG; i++) {
    const dot = document.createElement('div');
    dot.className = 'life-dot';
    dot.id = 'life_' + i;
    el.appendChild(dot);
  }
}

function updateLives() {
  for (let i = 0; i < MAX_WRONG; i++) {
    const dot = document.getElementById('life_' + i);
    if (dot) dot.classList.toggle('lost', i >= MAX_WRONG - wrongLetters.length);
  }
}

// ====== GUESS ======
function guessLetter(letter) {
  if (!gameActive || guessedLetters.has(letter)) return;
  guessedLetters.add(letter);

  const btn = document.querySelector(`.key-btn[data-letter="${letter}"]`);
  if (btn) btn.disabled = true;

  if (currentWord.w.includes(letter)) {
    // Correct
    if (btn) btn.classList.add('correct');
    renderWordSlots();
    // Check win
    const allRevealed = [...currentWord.w].every(l => guessedLetters.has(l));
    if (allRevealed) {
      gameActive = false;
      streak++;
      score += 5;
      correctCount++;
      updateScoreDisplay();
      updateStreak();
      saveScore();
      showWinFigure();
      spawnScoreFloat('+5');
      setTimeout(() => showResult(true), 600);
    }
  } else {
    // Wrong
    if (btn) btn.classList.add('wrong');
    wrongLetters.push(letter);
    showBodyPart(wrongLetters.length);
    renderWrongLetters();
    updateLives();
    // Check lose
    if (wrongLetters.length >= MAX_WRONG) {
      gameActive = false;
      streak = 0;
      updateStreak();
      // Reveal all letters
      [...currentWord.w].forEach(l => guessedLetters.add(l));
      renderWordSlots();
      document.querySelectorAll('.letter-slot').forEach(s => s.classList.add('wrong-reveal'));
      setTimeout(() => showResult(false), 800);
    }
  }
}

// Physical keyboard support
document.addEventListener('keydown', (e) => {
  if (!gameActive) return;
  const letter = e.key;
  if (/^[ა-ჰ]$/.test(letter) && !guessedLetters.has(letter)) {
    guessLetter(letter);
  }
});

// ====== HINT ======
function useHint() {
  if (hintCount <= 0) return;
  hintCount--;
  document.getElementById('hintCount').textContent = hintCount;
  document.getElementById('hintText').classList.add('show');
  if (hintCount === 0) document.getElementById('hintBtn').disabled = true;
}

// ====== SCORE ======
function updateScoreDisplay() {
  const el = document.getElementById('scoreVal');
  el.textContent = score;
  document.getElementById('correctVal').textContent = correctCount;
}

function updateStreak() {
  document.getElementById('streakVal').textContent = streak + '🔥';
  const badge = document.getElementById('streakBadge');
  const text = document.getElementById('streakText');
  if (streak >= 2) {
    text.textContent = streak;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

async function saveScore() {
  if (!ME) return;
  await sb.from('profiles').update({ hangman_score: score }).eq('id', ME.id);
  loadLeaderboard();
}

// ====== RESULT ======
function showResult(win) {
  const overlay = document.getElementById('resultOverlay');
  const streakMsgs = ['','','🔥 2x სტრიქი!','🔥🔥 3x!','⚡ 4x ლეგენდა!','👑 5x ღმერთია!'];

  if (win) {
    document.getElementById('resultEmoji').textContent = streak >= 3 ? '🏆' : '🎉';
    document.getElementById('resultTitle').textContent = 'გამარჯვება!';
    document.getElementById('resultTitle').className = 'result-title win';
    document.getElementById('resultWord').textContent = currentWord.w;
    document.getElementById('resultInfo').innerHTML = 
      `+<strong style="color:var(--accent);font-size:18px">5</strong> ქულა · სულ: <strong>${score}</strong><br>${streak >= 2 ? streakMsgs[Math.min(streak,5)] : ''}`;
  } else {
    document.getElementById('resultEmoji').textContent = '💀';
    document.getElementById('resultTitle').textContent = 'ჩამოხრჩეს!';
    document.getElementById('resultTitle').className = 'result-title lose';
    document.getElementById('resultWord').textContent = currentWord.w;
    document.getElementById('resultInfo').innerHTML = `სიტყვა იყო: <strong style="color:var(--green)">${currentWord.w}</strong><br>კატეგორია: ${currentWord.cat}`;
  }
  overlay.classList.add('show');
}

function nextWord() {
  document.getElementById('resultOverlay').classList.remove('show');
  // Reset body part colors
  BODY_PARTS.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.stroke = '';
  });
  const head = document.getElementById('headEl');
  if (head) head.style.stroke = '';
  loadNewWord();
}

// ====== FLOATING SCORE ======
function spawnScoreFloat(txt) {
  const el = document.createElement('div');
  el.className = 'floating-score';
  el.textContent = txt;
  el.style.left = (30 + Math.random() * 40) + '%';
  el.style.top = '30%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// ====== LEADERBOARD ======
async function loadLeaderboard() {
  const { data } = await sb.from('profiles')
    .select('id,username,hangman_score')
    .order('hangman_score', { ascending: false })
    .limit(10);
  const cont = document.getElementById('lbContainer');
  cont.innerHTML = '';
  (data || []).forEach((u, i) => {
    if (!u.hangman_score) return;
    const medals = ['🥇','🥈','🥉'];
    const isMe = u.id === ME?.id;
    const d = document.createElement('div');
    d.className = 'lb-row';
    if (isMe) d.style.background = 'var(--indigo-f)';
    d.innerHTML = `
      <span class="lb-rank ${i < 3 ? 'rank-'+(i+1) : ''}">${medals[i] || (i+1)}</span>
      <span class="lb-name" style="${isMe?'color:var(--accent);font-weight:700':''}">${esc(u.username||'?')}${isMe?' 👈':''}</span>
      <span class="lb-score">${u.hangman_score||0}</span>
    `;
    cont.appendChild(d);
  });
  if (!cont.children.length) cont.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px;text-align:center">ჯერ ქულა არ არის</div>';
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
