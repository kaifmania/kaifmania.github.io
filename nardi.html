<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ნარდი · ქართული წესები</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;--panel:#120f24;--panel2:#1a1730;--border:rgba(160,80,255,0.35);
  --text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;--input-bg:#221f3a;
  --indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.18);--accent:#f07aff;
}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes flash{0%,100%{background:rgba(168,85,247,.2)}50%{background:rgba(168,85,247,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
#topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.tb-logo{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:900;display:flex;align-items:center;gap:8px}
.tb-logo span{color:var(--accent)}
.tb-back{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;padding:5px 12px;cursor:pointer;text-decoration:none}
.tb-spacer{flex:1}
.tb-score{background:var(--indigo-f);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-family:'Unbounded',sans-serif;font-size:11px;color:var(--accent)}
.tb-user{display:flex;align-items:center;gap:6px;background:var(--indigo-f);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px}
#gameArea{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;min-height:0}
#lobby{display:flex;flex-direction:column;align-items:center;gap:18px;max-width:400px;width:100%;animation:pop .4s ease}
.lobby-icon{font-size:64px}
.lobby-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900}
.lobby-sub{font-size:12px;color:var(--text3)}
.lcard{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:16px}
.lcard-title{font-family:'Unbounded',sans-serif;font-size:9px;color:var(--text2);margin-bottom:6px}
.user-list{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto}
.uitem{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent}
.uitem:hover{background:var(--indigo-f)}
.uitem.sel{background:rgba(168,85,247,.15);border-color:var(--indigo2)}
.uav{width:28px;height:28px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;flex-shrink:0}
.uav img{width:100%;height:100%;object-fit:cover}
.btn{padding:10px 22px;border-radius:50px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;color:#fff;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn2{padding:8px 16px;border-radius:50px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2);font-size:11px;cursor:pointer}
.stat-row{display:flex;justify-content:space-around;margin-top:8px}
.stat-val{font-size:22px;color:var(--accent);text-align:center}
.stat-lbl{font-size:10px;color:var(--text3);text-align:center}
#waitingScreen{display:none;flex-direction:column;align-items:center;gap:16px;animation:pop .4s ease}
.spinner{width:52px;height:52px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
#boardWrap{display:none;flex-direction:row;gap:8px;width:100%;max-width:1040px;height:100%;align-items:stretch}
#boardContainer{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0}
.pinfo-row{display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.pinfo{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:5px 10px}
.pinfo.active{border-color:var(--accent);box-shadow:0 0 10px rgba(240,122,255,.3)}
.pav{width:24px;height:24px;border-radius:50%;background:var(--indigo-f);display:flex;align-items:center;justify-content:center;font-size:13px}
.pname{font-size:11px;font-weight:600}
.tbadge{font-family:'Unbounded',sans-serif;font-size:9px;color:var(--indigo2);background:var(--indigo-f);border:1px solid var(--border);border-radius:18px;padding:4px 10px}
.board-and-side{display:flex;flex:1;min-height:0;gap:5px}
#board{position:relative;background:#1e3a1e;border-radius:14px;border:3px solid #0a2a0a;flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.half-row{display:flex;flex:1;min-height:0}
.half{display:flex;flex:1}
.bar-col{width:36px;background:#0a1f0a;border-left:2px solid #0a2a0a;border-right:2px solid #0a2a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex-shrink:0}
.pt{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer;min-width:0}
.pt:hover{background:rgba(255,255,255,.05)}
.pt.hl{background:rgba(168,85,247,.4)!important;animation:flash .7s ease infinite}
.pt.src{background:rgba(240,122,255,.22)!important}
.tri{position:absolute;width:100%;pointer-events:none}
.tri.t{top:0;height:80%}
.tri.b{bottom:0;height:80%}
.tri svg{width:100%;height:100%;display:block}
.stk{width:100%;display:flex;align-items:center;z-index:2;position:absolute;overflow:hidden;max-height:90%}
.stk.top{top:1px;flex-direction:column}
.stk.bot{bottom:1px;flex-direction:column-reverse}
.ck{width:76%;aspect-ratio:1;border-radius:50%;border:2px solid rgba(255,255,255,.18);position:relative;flex-shrink:0;pointer-events:none}
.ck.W{background:radial-gradient(circle at 35% 30%,#fff,#ccc)}
.ck.B{background:radial-gradient(circle at 35% 30%,#666,#111)}
.ck.glow{box-shadow:0 0 14px var(--accent)}
.ck-cnt{position:absolute;font-size:8px;font-weight:900;background:rgba(0,0,0,.65);border-radius:50%;width:13px;height:13px;display:flex;align-items:center;justify-content:center;top:-1px;right:-1px;color:#fff}
.ptnum{font-size:7px;font-family:'Unbounded',sans-serif;color:rgba(255,255,255,.35);position:absolute;z-index:3;pointer-events:none}
.ptnum.tn{bottom:2px}
.ptnum.bn{top:2px}
#diceArea{display:flex;align-items:center;justify-content:center;gap:10px;padding:7px;background:rgba(0,0,0,.55);flex-shrink:0;min-height:62px}
.die{width:46px;height:46px;background:#fff;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#111;box-shadow:0 3px 10px rgba(0,0,0,.5);flex-shrink:0}
.die.used{opacity:.3;filter:grayscale(.6)}
#rollBtn{padding:7px 18px;border-radius:30px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;color:#fff;font-family:'Unbounded',sans-serif;font-size:11px;cursor:pointer;flex-shrink:0}
#rollBtn:disabled{opacity:.4;cursor:not-allowed}
#passBtn{padding:7px 14px;border-radius:30px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2);font-size:11px;cursor:pointer;display:none;flex-shrink:0}
#statusBar{text-align:center;font-size:11px;color:var(--text2);padding:3px;flex-shrink:0}
.side-col{width:50px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.bzone{flex:1;background:var(--panel);border:2px solid var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;padding:5px 0;position:relative;cursor:pointer;overflow:hidden}
.bzone.can{border-color:var(--accent);animation:flash .7s ease infinite}
.bzone-lbl{font-size:7px;font-family:'Unbounded',sans-serif;color:var(--text3)}
.bzone-cnt{font-family:'Unbounded',sans-serif;font-size:16px;color:var(--accent);position:absolute;bottom:4px}
.bck{width:68%;aspect-ratio:1;border-radius:50%;margin:1px auto;display:block}
.bck.W{background:radial-gradient(circle at 35% 30%,#fff,#ccc)}
.bck.B{background:radial-gradient(circle at 35% 30%,#666,#111)}
#chatPanel{width:210px;background:var(--panel);border:1px solid var(--border);border-radius:18px;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.chat-head{background:linear-gradient(135deg,var(--indigo),var(--indigo2));padding:9px 12px;font-family:'Unbounded',sans-serif;font-size:10px;color:#fff}
#chatMsgs{flex:1;overflow-y:auto;padding:7px;font-size:11px;display:flex;flex-direction:column;gap:3px}
.cm{background:var(--bubble);border-radius:8px;padding:5px 7px;word-break:break-word}
.cm.me{background:rgba(120,30,200,.4);align-self:flex-end}
.cm-sys{text-align:center;font-size:9px;color:var(--text3)}
.chat-foot{display:flex;gap:4px;padding:7px;border-top:1px solid var(--border)}
#chatIn{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:9px;padding:5px 8px;color:var(--text);outline:none;font-size:12px}
.chat-send{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;border-radius:8px;color:#fff;padding:0 9px;cursor:pointer;font-size:13px}
#invBanner{position:fixed;top:58px;right:14px;width:270px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border-radius:16px;padding:12px;z-index:9000;display:none;flex-direction:column;gap:7px}
#invBanner.show{display:flex}
.ib-name{font-size:13px;font-weight:700}
.ib-btns{display:flex;gap:8px}
.ib-yes{background:#fff;border:none;border-radius:9px;color:var(--indigo);padding:6px 10px;cursor:pointer;font-size:12px}
.ib-no{background:rgba(255,255,255,.2);border:none;border-radius:9px;color:#fff;padding:6px 10px;cursor:pointer;font-size:12px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:10000;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:24px;text-align:center;max-width:300px;width:90%}
.modal-title{font-family:'Unbounded',sans-serif;font-size:20px;color:var(--accent)}
.mrow{display:flex;gap:10px;margin-top:14px}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--indigo2);color:#fff;padding:7px 18px;border-radius:30px;font-size:12px;z-index:99999;animation:pop .3s ease;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>

<div id="invBanner">
  <div class="ib-name" id="ibName">?</div>
  <div style="font-size:12px">გამოგიგზავნა ნარდის მოწვევა</div>
  <div class="ib-btns">
    <button class="ib-yes" id="ibYes">✅ დასტური</button>
    <button class="ib-no"  id="ibNo">❌ უარი</button>
  </div>
</div>

<div id="topbar">
  <a href="chat.html" class="tb-back">← ჩატი</a>
  <div class="tb-logo">🎲 <span>ნარდი</span></div>
  <div class="tb-spacer"></div>
  <div class="tb-score" id="myScoreDisp">🏆 0</div>
  <div class="tb-user"><span id="myTbName">-</span></div>
</div>

<div id="gameArea">
  <div id="lobby">
    <div class="lobby-icon">🎲</div>
    <div class="lobby-title">ნარდი</div>
    <div class="lobby-sub">ქართული კლასიკური წესები</div>
    <div class="lcard">
      <div class="lcard-title">👤 ოპონენტის არჩევა</div>
      <div class="user-list" id="userList"></div>
      <button class="btn" id="invBtn" disabled>🎲 მოწვევის გაგზავნა</button>
    </div>
    <div class="lcard">
      <div class="lcard-title">📊 სტატისტიკა</div>
      <div class="stat-row">
        <div><div class="stat-val" id="stWins">0</div><div class="stat-lbl">მოგება</div></div>
        <div><div class="stat-val" id="stLoss" style="color:var(--text2)">0</div><div class="stat-lbl">წაგება</div></div>
        <div><div class="stat-val" id="stScore" style="color:#4ade80">0</div><div class="stat-lbl">ქულა</div></div>
      </div>
    </div>
  </div>

  <div id="waitingScreen">
    <div class="spinner"></div>
    <div style="font-family:'Unbounded',sans-serif;font-size:14px">ველოდებით...</div>
    <div style="font-size:12px;color:var(--text3)">მოწვევა გაიგზავნა</div>
    <button class="btn2" id="cancelBtn" style="margin-top:8px">❌ გაუქმება</button>
  </div>

  <div id="boardWrap">
    <div id="boardContainer">
      <div class="pinfo-row">
        <div class="pinfo" id="oppInfo"><div class="pav" id="oppAv">😊</div><span class="pname" id="oppName">ოპონენტი</span></div>
        <div class="tbadge" id="turnBadge">⏳</div>
        <div class="pinfo" id="myInfo"><div class="pav">😊</div><span class="pname" id="myInfoName">შენ</span></div>
      </div>
      <div class="board-and-side">
        <div id="board">
          <div class="half-row" id="topRow">
            <div class="half" id="topL"></div>
            <div class="bar-col" id="barTop"></div>
            <div class="half" id="topR"></div>
          </div>
          <div id="diceArea">
            <button id="rollBtn" disabled>🎲 გააგორე</button>
            <div class="die" id="d1" style="display:none"></div>
            <div class="die" id="d2" style="display:none"></div>
            <div class="die" id="d3" style="display:none"></div>
            <div class="die" id="d4" style="display:none"></div>
            <button id="passBtn">⏭ გამოტოვება</button>
          </div>
          <div class="half-row" id="botRow">
            <div class="half" id="botL"></div>
            <div class="bar-col" id="barBot"></div>
            <div class="half" id="botR"></div>
          </div>
        </div>
        <div class="side-col">
          <div class="bzone" id="bzOpp">
            <div class="bzone-lbl" id="bzOppLbl">ოპ.</div>
            <div id="bzOppCks"></div>
            <div class="bzone-cnt" id="bzOppN">0</div>
          </div>
          <div class="bzone" id="bzMe">
            <div class="bzone-lbl" id="bzMeLbl">შენ</div>
            <div id="bzMeCks"></div>
            <div class="bzone-cnt" id="bzMeN">0</div>
          </div>
        </div>
      </div>
      <div id="statusBar"></div>
    </div>
    <div id="chatPanel">
      <div class="chat-head">💬 ჩატი</div>
      <div id="chatMsgs"><div class="cm-sys">🎲 თამაში დაიწყეთ!</div></div>
      <div class="chat-foot">
        <input id="chatIn" placeholder="შეტყობინება..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">➤</button>
      </div>

<div class="overlay" id="winOverlay">
  <div class="modal">
    <div class="modal-title" id="winTitle">🏆</div>
    <div style="margin:10px 0;font-size:13px" id="winSub"></div>
    <div class="mrow">
      <button class="btn" id="restartBtn" style="margin:0;padding:9px">🔄 ახლიდან</button>
      <a href="chat.html" class="btn2" style="text-decoration:none;padding:9px;display:flex;align-items:center">← ჩატი</a>
    </div>
  </div>
</div>

<script>
'use strict';

/*
  =====================================
  ქართული ნარდი — სრული ლოგიკა (გასწორებული)
  =====================================

  LAYOUT (ორივე მხარეს ერთნაირი ხედი — სახლი ქვ-მარჯვენა):
  ──────────────────────────────────────────────
  TOP ROW:    dp13 dp14 dp15 dp16 dp17 dp18 | BAR | dp19 dp20 dp21 dp22 dp23 dp24
  BOT ROW:    dp12 dp11 dp10  dp9  dp8  dp7 | BAR |  dp6  dp5  dp4  dp3  dp2  dp1
  ──────────────────────────────────────────────

  WHITE (⚪): თამაშობს pt24 → pt1 (მოძრ. -die)
    - სახლი: real pt 1–6  = dp 1–6  (ქვ-მარჯ ✓)
    - bar entry: 25 - die  (die=1 → pt24, die=6 → pt19)
    - bear-off: exact = real pt ნომერი

  BLACK (⚫): თამაშობს pt1 → pt24 (მოძრ. +die)
    - სახლი: real pt 19–24 = dp 1–6  (ქვ-მარჯ ✓, რადგან dp = 25-real)
    - bar entry: die        (die=1 → pt1,  die=6 → pt6)
    - bear-off: exact = 25 - real pt ნომერი

  display↔real:
    WHITE: dp = real,    real = dp
    BLACK: dp = 25-real, real = 25-dp
*/

const {createClient} = supabase;
const sb = createClient(
  'https://brggiyhfzfbmlirqfgpo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU'
);

let ME = null, PROF = null, allUsers = [];
let gameId = null, gameCh = null, selOpp = null, pendingInv = null;

// ── game state ──
let board = [];         // index 0 unused; 1–24 = real points
let bar = {W:0, B:0};
let whiteOff = 0, blackOff = 0;
let dice = [], diceUsed = [];
let myCol = 'W', myTurn = false, started = false, selPt = null;

// ── board init ──
function initBoard() {
  const b = [];
  for (let i = 0; i <= 24; i++) b.push({color: null, count: 0});
  // Georgian nardi: all 15 whites start on pt24, all 15 blacks on pt12
  b[24] = {color: 'W', count: 15};
  b[12] = {color: 'B', count: 15};
  return b;
}

// ── perspective helpers ──
// toDisplay: real point → display point number shown on board
// toReal:    display point → real point used in logic
function toDisplay(r) { return myCol === 'W' ? r : 25 - r; }
function toReal(d)    { return myCol === 'W' ? d : 25 - d; }

// ── movement: target real point after using a die ──
// WHITE goes pt24→pt1 (decreasing), BLACK goes pt1→pt24 (increasing)
function targetReal(fromReal, die) {
  return myCol === 'W' ? fromReal - die : fromReal + die;
}

// ── home range (real points) ──
function homeMin() { return myCol === 'W' ? 1 : 19; }
function homeMax() { return myCol === 'W' ? 6 : 24; }

// ── bar re-entry real point for a given die value ──
// WHITE: enters from pt25 side → 25-die  (die=1→pt24, die=6→pt19)
// BLACK: enters from pt0 side  → die     (die=1→pt1,  die=6→pt6)
function barEntryReal(die) {
  return myCol === 'W' ? 25 - die : die;
}

// ── remaining (unused) dice ──
function remDice() {
  return dice.filter((_, i) => !diceUsed[i]);
}

// ── consume one die of a given value ──
function consumeDie(val) {
  for (let i = 0; i < dice.length; i++) {
    if (!diceUsed[i] && dice[i] === val) {
      diceUsed[i] = true;
      return;
    }
  }
}

// ── can a checker of 'col' land on real point 'rp'? ──
function canLand(rp, col) {
  if (rp < 1 || rp > 24) return false;
  const c = board[rp];
  if (!c || !c.color || !c.count) return true;   // empty
  if (c.color === col) return true;               // own checker
  if (c.count === 1) return true;                 // blot → can hit
  return false;                                   // blocked
}

// ── all my checkers in home board? ──
function allInHome() {
  if ((bar[myCol] || 0) > 0) return false;
  const mn = homeMin(), mx = homeMax();
  for (let i = 1; i <= 24; i++) {
    if (i < mn || i > mx) {
      if (board[i] && board[i].color === myCol && board[i].count > 0) return false;
    }
  }
  return true;
}

function hasBar() { return (bar[myCol] || 0) > 0; }

// ── which die value is valid to bear off from real point rp? ──
// Returns the die value to use, or null if none available.
//
// "Exact" rule: die value equals the pip distance to the edge.
//   WHITE: exact = rp          (pt1 needs die=1, pt6 needs die=6)
//   BLACK: exact = 25 - rp     (pt24 needs die=1, pt19 needs die=6)
//
// "Excess" rule: use a larger die only when no checker sits
//   on a point *further* from the bearing-off edge.
//   WHITE "further" = higher point number (pt6 further than pt1)
//   BLACK "further" = lower point number  (pt19 further than pt24)
function bearDie(realPt) {
  const exact = myCol === 'W' ? realPt : 25 - realPt;
  const rem = remDice();

  // exact match
  if (rem.includes(exact)) return exact;

  // excess die (bigger than needed)
  const bigger = rem.filter(d => d > exact);
  if (!bigger.length) return null;

  // check if any checker sits further from the goal
  let hasFurther = false;
  if (myCol === 'W') {
    // points with higher index are further (pt6 > pt5 > ... > pt1)
    for (let p = realPt + 1; p <= 6; p++) {
      if (board[p] && board[p].color === 'W' && board[p].count > 0) { hasFurther = true; break; }
    }
  } else {
    // BLACK home is pt19–24; lower index is further from goal (pt19 > pt20 > ... > pt24)
    for (let p = 19; p < realPt; p++) {
      if (board[p] && board[p].color === 'B' && board[p].count > 0) { hasFurther = true; break; }
    }
  }

  if (hasFurther) return null;
  return Math.min(...bigger);
}

// ── does any legal move exist with current dice? ──
function hasAnyMove() {
  const rem = remDice();
  if (!rem.length) return false;

  // bar: must enter before any other move
  if (hasBar()) {
    return rem.some(d => {
      const entry = barEntryReal(d);
      return entry >= 1 && entry <= 24 && canLand(entry, myCol);
    });
  }

  // bear-off mode
  if (allInHome()) {
    for (let p = homeMin(); p <= homeMax(); p++) {
      if (board[p] && board[p].color === myCol && board[p].count > 0 && bearDie(p) !== null) return true;
    }
    return false;
  }

  // normal move
  for (let p = 1; p <= 24; p++) {
    if (!board[p] || board[p].color !== myCol || !board[p].count) continue;
    if (rem.some(d => {
      const t = targetReal(p, d);
      return t >= 1 && t <= 24 && canLand(t, myCol);
    })) return true;
  }
  return false;
}

// ── execute a normal move (fromReal → toReal) ──
function doMove(fromReal, toReal_) {
  board[fromReal].count--;
  if (!board[fromReal].count) board[fromReal].color = null;

  const cell = board[toReal_];
  // hit blot
  if (cell.color && cell.color !== myCol && cell.count === 1) {
    bar[cell.color] = (bar[cell.color] || 0) + 1;
    cell.count = 0;
    cell.color = null;
    toast('💥 Kill!');
  }
  if (!cell.color) cell.color = myCol;
  cell.count = (cell.count || 0) + 1;
}

// ── re-enter from bar ──
function doBarExit(toReal_) {
  bar[myCol] = Math.max(0, (bar[myCol] || 0) - 1);

  const cell = board[toReal_];
  if (cell.color && cell.color !== myCol && cell.count === 1) {
    bar[cell.color] = (bar[cell.color] || 0) + 1;
    cell.count = 0;
    cell.color = null;
    toast('💥 Kill!');
  }
  if (!cell.color) cell.color = myCol;
  cell.count = (cell.count || 0) + 1;
}

// ── bear off a checker ──
function doBearOff(realPt) {
  board[realPt].count--;
  if (!board[realPt].count) board[realPt].color = null;
  if (myCol === 'W') whiteOff++; else blackOff++;
}

// ── point click handler (dispPt = display point 1–24) ──
function onPtClick(dispPt) {
  if (!myTurn || !started) { toast('❌ შენი ჯერი არ არის'); return; }
  if (!dice.length) { toast('🎲 ჯერ ზარი გააგორე'); return; }

  const rem = remDice();
  if (!rem.length) { toast('🎲 ზარი ამოიწურა'); return; }

  const realPt = toReal(dispPt);

  // ── BAR mode: must enter first ──
  if (hasBar()) {
    let entered = false;
    for (const d of rem) {
      const entry = barEntryReal(d);
      if (entry === realPt && canLand(realPt, myCol)) {
        doBarExit(realPt);
        consumeDie(d);
        selPt = null;
        afterMove();
        entered = true;
        break;
      }
    }
    if (!entered) toast('❌ ბარიდან ამ წერტილში ვერ');
    return;
  }

  // ── BEAR-OFF mode ──
  if (allInHome()) {
    if (selPt === null) {
      // select a piece
      if (!board[realPt] || board[realPt].color !== myCol || !board[realPt].count) {
        toast('❌ შენი ქვა არ არის');
        return;
      }
      if (bearDie(realPt) === null) {
        toast('❌ ამ ზარით გამოყვანა ვერ');
        return;
      }
      selPt = realPt;
      showDests();
      return;
    }
    // deselect
    if (selPt === realPt) { selPt = null; clearHL(); hlMovable(); return; }
    // switch selection to another own piece
    if (board[realPt] && board[realPt].color === myCol && board[realPt].count > 0) {
      if (bearDie(realPt) !== null) { selPt = realPt; showDests(); }
      else toast('❌ ამ ზარით გამოყვანა ვერ');
      return;
    }
    // clicked somewhere else — deselect
    selPt = null; clearHL(); hlMovable();
    return;
  }

  // ── NORMAL mode ──
  if (selPt === null) {
    if (!board[realPt] || board[realPt].color !== myCol || !board[realPt].count) {
      toast('❌ შენი ქვა არ არის');
      return;
    }
    const hasDest = rem.some(d => {
      const t = targetReal(realPt, d);
      return t >= 1 && t <= 24 && canLand(t, myCol);
    });
    if (!hasDest) { toast('❌ ამ ქვით სვლა შეუძლებელია'); return; }
    selPt = realPt;
    showDests();
    return;
  }

  // deselect same
  if (selPt === realPt) { selPt = null; clearHL(); hlMovable(); return; }

  // switch to another own piece
  if (board[realPt] && board[realPt].color === myCol && board[realPt].count > 0) {
    const hasDest = rem.some(d => {
      const t = targetReal(realPt, d);
      return t >= 1 && t <= 24 && canLand(t, myCol);
    });
    if (hasDest) { selPt = realPt; showDests(); }
    else toast('❌ ამ ქვით სვლა შეუძლებელია');
    return;
  }

  // attempt to land
  let usedD = null;
  for (const d of rem) {
    if (targetReal(selPt, d) === realPt) { usedD = d; break; }
  }
  if (usedD === null) {
    toast('❌ ამ სვლისთვის ზარი არ გამოდის');
    selPt = null; clearHL(); hlMovable();
    return;
  }
  if (!canLand(realPt, myCol)) {
    toast('❌ ეს წერტილი დაბლოკილია');
    selPt = null; clearHL(); hlMovable();
    return;
  }
  doMove(selPt, realPt);
  consumeDie(usedD);
  selPt = null;
  afterMove();
}

// ── bear-off zone click ──
function onBearOffClick() {
  if (!myTurn || !started) return;
  if (!dice.length) { toast('🎲 ჯერ ზარი გააგორე'); return; }
  if (!remDice().length) { toast('🎲 ზარი ამოიწურა'); return; }
  if (!allInHome()) { toast('❌ ჯერ ყველა ქვა სახლში'); return; }
  if (selPt === null) { toast('▲ ჯერ ქვაზე დააჭირე'); return; }
  const d = bearDie(selPt);
  if (d === null) { toast('❌ ამ ქვის გამოყვანა ვერ'); return; }
  doBearOff(selPt);
  consumeDie(d);
  selPt = null;
  renderBoard();
  if (whiteOff >= 15 || blackOff >= 15) { finishGame(); return; }
  afterMove();
}

// ── post-move logic ──
async function afterMove() {
  renderBoard();
  if (whiteOff >= 15 || blackOff >= 15) { finishGame(); return; }

  const noMov = !hasAnyMove();
  if (remDice().length === 0 || noMov) {
    if (noMov && remDice().length > 0) addSys('😞 სვლა შეუძლებელია — ჯერი გადაეცა');
    await endTurn();
  } else {
    updateDiceUI();
    updateTurnUI();
    // sync partial board state so opponent can see
    await sb.from('nardi_games').update({
      board_state: JSON.stringify(board),
      white_bar:   bar.W,
      black_bar:   bar.B,
      white_home:  whiteOff,
      black_home:  blackOff,
      dice:        dice,
      dice_used:   diceUsed
    }).eq('id', gameId);
  }
}

// ── end turn ──
async function endTurn() {
  const next = myCol === 'W' ? 'B' : 'W';
  await sb.from('nardi_games').update({
    board_state: JSON.stringify(board),
    white_bar:   bar.W,
    black_bar:   bar.B,
    white_home:  whiteOff,
    black_home:  blackOff,
    turn:        next,
    dice:        [],
    dice_used:   []
  }).eq('id', gameId);
  myTurn = false;
  dice = [];
  diceUsed = [];
  updateDiceUI();
  updateTurnUI();
  renderBoard();
  addSys('🔄 ოპონენტის ჯერი');
}

// ── roll dice ──
async function rollDice() {
  if (!myTurn)       { toast('❌ შენი ჯერი არ არის'); return; }
  if (dice.length)   { toast('❌ ზარი უკვე გააგდე');  return; }

  const d1 = Math.ceil(Math.random() * 6);
  const d2 = Math.ceil(Math.random() * 6);
  dice     = d1 === d2 ? [d1, d1, d1, d1] : [d1, d2];
  diceUsed = dice.map(() => false);

  addSys(d1 === d2 ? `🎲🎲 დუბლი! ${d1}:${d2}` : `🎲 ${d1}+${d2}`);

  await sb.from('nardi_games').update({
    dice:      dice,
    dice_used: diceUsed
  }).eq('id', gameId);

  updateDiceUI();
  renderBoard();

  if (!hasAnyMove()) {
    addSys('😞 სვლა შეუძლებელია — ჯერი გადაეცა');
    await endTurn();
  }
}

// ── pass move ──
async function passMove() {
  if (!myTurn) return;
  await endTurn();
}

// ────────────────────────────────────────────
// HIGHLIGHTS
// ────────────────────────────────────────────

function clearHL() {
  document.querySelectorAll('.pt.hl, .pt.src').forEach(p => p.classList.remove('hl', 'src'));
  document.querySelectorAll('.ck.glow').forEach(c => c.classList.remove('glow'));
  document.getElementById('bzMe').classList.remove('can');
}

function hlMovable() {
  clearHL();
  if (!myTurn || !started || !dice.length) return;
  const rem = remDice();
  if (!rem.length) return;

  if (hasBar()) {
    rem.forEach(d => {
      const e = barEntryReal(d);
      if (e >= 1 && e <= 24 && canLand(e, myCol)) {
        document.getElementById('dp' + toDisplay(e))?.classList.add('hl');
      }
    });
    return;
  }

  if (allInHome()) {
    for (let p = homeMin(); p <= homeMax(); p++) {
      if (board[p] && board[p].color === myCol && board[p].count > 0 && bearDie(p) !== null) {
        document.getElementById('dp' + toDisplay(p))?.classList.add('hl');
      }
    }
    if (document.querySelectorAll('.pt.hl').length > 0) {
      document.getElementById('bzMe').classList.add('can');
    }
    return;
  }

  for (let p = 1; p <= 24; p++) {
    if (!board[p] || board[p].color !== myCol || !board[p].count) continue;
    if (rem.some(d => {
      const t = targetReal(p, d);
      return t >= 1 && t <= 24 && canLand(t, myCol);
    })) {
      document.querySelectorAll('#stk' + toDisplay(p) + ' .ck').forEach(c => c.classList.add('glow'));
    }
  }
}

function showDests() {
  clearHL();
  if (selPt === null) return;

  document.getElementById('dp' + toDisplay(selPt))?.classList.add('src');
  const rem = remDice();

  if (allInHome()) {
    if (bearDie(selPt) !== null) document.getElementById('bzMe').classList.add('can');
    return;
  }

  rem.forEach(d => {
    const t = targetReal(selPt, d);
    if (t >= 1 && t <= 24 && canLand(t, myCol)) {
      document.getElementById('dp' + toDisplay(t))?.classList.add('hl');
    }
  });
}

// ────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────

function renderBoard() {
  // clear all stacks
  for (let dp = 1; dp <= 24; dp++) {
    const s = document.getElementById('stk' + dp);
    if (s) s.innerHTML = '';
  }

  // place checkers
  for (let real = 1; real <= 24; real++) {
    const cell = board[real];
    if (!cell || !cell.count || !cell.color) continue;
    const dp  = toDisplay(real);
    const stk = document.getElementById('stk' + dp);
    if (!stk) continue;

    const show = Math.min(cell.count, 6);
    const sz   = show <= 2 ? '78%' : show <= 4 ? '72%' : '66%';

    for (let c = 0; c < show; c++) {
      const el = document.createElement('div');
      el.className = 'ck ' + cell.color;
      el.style.width = sz;
      if (c === show - 1 && cell.count > 6) {
        const n = document.createElement('span');
        n.className = 'ck-cnt';
        n.textContent = cell.count;
        el.appendChild(n);
      }
      stk.appendChild(el);
    }
  }

  // bar checkers
  const bT = document.getElementById('barTop');
  const bB = document.getElementById('barBot');
  bT.innerHTML = '';
  bB.innerHTML = '';

  // WHITE bar shown in top (opponent side), BLACK bar shown in bottom (own side)?
  // Actually for the fixed visual, WHITE moves bottom→top visually so WHITE bar is
  // shown at top bar-col, BLACK bar at bottom bar-col — this matches both perspectives.
  for (let i = 0; i < (bar.W || 0); i++) {
    const c = document.createElement('div');
    c.className = 'ck W';
    c.style.cssText = 'width:68%;margin:1px';
    bT.appendChild(c);
  }
  for (let i = 0; i < (bar.B || 0); i++) {
    const c = document.createElement('div');
    c.className = 'ck B';
    c.style.cssText = 'width:68%;margin:1px';
    bB.appendChild(c);
  }

  // bear-off counts
  const myOff  = myCol === 'W' ? whiteOff : blackOff;
  const opOff  = myCol === 'W' ? blackOff : whiteOff;
  const opCol  = myCol === 'W' ? 'B' : 'W';
  const meCks  = document.getElementById('bzMeCks');
  const opCks  = document.getElementById('bzOppCks');
  meCks.innerHTML = '';
  opCks.innerHTML = '';

  for (let i = 0; i < Math.min(myOff, 15); i++) {
    const c = document.createElement('div');
    c.className = 'bck ' + myCol;
    meCks.appendChild(c);
  }
  for (let i = 0; i < Math.min(opOff, 15); i++) {
    const c = document.createElement('div');
    c.className = 'bck ' + opCol;
    opCks.appendChild(c);
  }
  document.getElementById('bzMeN').textContent  = myOff;
  document.getElementById('bzOppN').textContent = opOff;

  // highlights
  if (myTurn && started && dice.length && remDice().length) {
    hlMovable();
  } else {
    clearHL();
  }
}

function updateDiceUI() {
  const faces = ['·', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('d' + (i + 1));
    if (i < dice.length) {
      el.style.display  = 'flex';
      el.textContent    = faces[dice[i]] || '?';
      el.className      = 'die' + (diceUsed[i] ? ' used' : '');
    } else {
      el.style.display = 'none';
    }
  }
  document.getElementById('rollBtn').disabled = !myTurn || dice.length > 0;
  document.getElementById('passBtn').style.display =
    (myTurn && dice.length > 0 && remDice().length > 0) ? 'inline-block' : 'none';
}

function updateTurnUI() {
  document.getElementById('turnBadge').textContent = myTurn ? '🎲 შენი ჯერია!' : '⏳ ველოდები...';
  document.getElementById('myInfo').classList.toggle('active', myTurn);
  document.getElementById('oppInfo').classList.toggle('active', !myTurn);

  let s;
  if (!myTurn) {
    s = '⏳ ოპონენტის ჯერი...';
  } else if (!dice.length) {
    s = '🎲 გააგორე ზარი!';
  } else if (hasBar()) {
    s = '⚡ ბარიდან გამოდი!';
  } else if (allInHome()) {
    s = '🏁 გამოიყვანე ქვა!';
  } else {
    s = '✋ აირჩიე ქვა';
  }
  document.getElementById('statusBar').textContent = s;
}

// ────────────────────────────────────────────
// DOM BOARD CONSTRUCTION
// ────────────────────────────────────────────
/*
  Fixed visual layout (invariant for both colors):
  TOP:  dp13 14 15 16 17 18 | BAR | dp19 20 21 22 23 24   ← triangles point down
  BOT:  dp12 11 10  9  8  7 | BAR |  dp6  5  4  3  2  1   ← triangles point up

  WHITE: dp=real → home dp1-6 (bottom-right) ✓
  BLACK: dp=25-real → home dp1-6 = real19-24 (bottom-right) ✓
*/
function buildBoard() {
  ['topL','topR','botL','botR'].forEach(id => {
    document.getElementById(id).innerHTML = '';
  });

  // top row: left = dp13–18, right = dp19–24
  for (let dp = 13; dp <= 18; dp++) document.getElementById('topL').appendChild(makePt(dp, true));
  for (let dp = 19; dp <= 24; dp++) document.getElementById('topR').appendChild(makePt(dp, true));

  // bottom row: left = dp12–7 (descending), right = dp6–1 (descending)
  for (let dp = 12; dp >= 7;  dp--) document.getElementById('botL').appendChild(makePt(dp, false));
  for (let dp = 6;  dp >= 1;  dp--) document.getElementById('botR').appendChild(makePt(dp, false));
}

function makePt(dp, isTop) {
  const p = document.createElement('div');
  p.className = 'pt';
  p.id = 'dp' + dp;

  const col = dp % 2 === 0 ? '#c8951a' : '#b83030';
  p.innerHTML = isTop
    ? `<div class="tri t"><svg viewBox="0 0 60 100" preserveAspectRatio="none"><polygon points="30,95 2,4 58,4" fill="${col}" opacity=".85"/></svg></div>`
    : `<div class="tri b"><svg viewBox="0 0 60 100" preserveAspectRatio="none"><polygon points="30,5 2,96 58,96" fill="${col}" opacity=".85"/></svg></div>`;

  const num = document.createElement('div');
  num.className = 'ptnum ' + (isTop ? 'tn' : 'bn');
  num.textContent = dp;
  p.appendChild(num);

  const stk = document.createElement('div');
  stk.className = 'stk ' + (isTop ? 'top' : 'bot');
  stk.id = 'stk' + dp;
  p.appendChild(stk);

  p.addEventListener('click', () => onPtClick(dp));
  return p;
}

// ────────────────────────────────────────────
// FINISH GAME
// ────────────────────────────────────────────
async function finishGame() {
  const winner = whiteOff >= 15 ? 'W' : 'B';
  const iWon   = winner === myCol;

  await sb.from('nardi_games').update({
    board_state: JSON.stringify(board),
    white_bar:   bar.W,
    black_bar:   bar.B,
    white_home:  whiteOff,
    black_home:  blackOff,
    status:      'finished',
    winner:      winner
  }).eq('id', gameId);

  if (iWon) {
    const ns = (PROF.nardi_score  || 0) + 5;
    const nw = (PROF.nardi_wins   || 0) + 1;
    await sb.from('profiles').update({nardi_score: ns, nardi_wins: nw}).eq('id', ME.id);
    PROF.nardi_score = ns;
    PROF.nardi_wins  = nw;
  } else {
    const nl = (PROF.nardi_losses || 0) + 1;
    await sb.from('profiles').update({nardi_losses: nl}).eq('id', ME.id);
    PROF.nardi_losses = nl;
  }

  document.getElementById('myScoreDisp').textContent = '🏆 ' + (PROF.nardi_score || 0);
  document.getElementById('winTitle').textContent = iWon ? '🏆 გამარჯვება!' : '😢 წაგება';
  document.getElementById('winSub').textContent   = iWon ? '+5 ქულა' : 'მომდევნო თამაშში!';
  document.getElementById('winOverlay').classList.add('open');
}

// ────────────────────────────────────────────
// INVITES  (broadcast-based, polling fallback)
// ────────────────────────────────────────────

// Supabase broadcast channel shared by both users for signalling
// Channel name is deterministic from sorted user IDs so both sides join the same one
function invChannel(uid1, uid2) {
  const key = [uid1, uid2].sort().join('_');
  return sb.channel('inv_sig_' + key);
}

let invPollTimer = null;
let sentInvId    = null;
let invSigCh     = null;

async function sendInvite() {
  if (!selOpp) return;
  document.getElementById('invBtn').disabled = true;

  const {data, error} = await sb.from('nardi_invites')
    .insert({from_uid: ME.id, to_uid: selOpp.id, status: 'pending'})
    .select('id').single();

  if (error) {
    toast('❌ ' + error.message);
    document.getElementById('invBtn').disabled = false;
    return;
  }

  sentInvId = data.id;
  document.getElementById('lobby').style.display        = 'none';
  document.getElementById('waitingScreen').style.display = 'flex';

  // ── broadcast: fast path ──
  invSigCh = invChannel(ME.id, selOpp.id);
  invSigCh
    .on('broadcast', {event: 'inv_response'}, async p => {
      if (p.payload.inv_id !== sentInvId) return;
      clearInterval(invPollTimer);
      if (p.payload.status === 'accepted') {
        myCol  = 'W';
        gameId = p.payload.game_id;
        await joinGame(gameId);
      } else {
        toast('❌ მოწვევა უარყო');
        resetLobby();
      }
    })
    .subscribe();

  // ── polling: reliable fallback every 3 s ──
  invPollTimer = setInterval(async () => {
    const {data: inv} = await sb.from('nardi_invites')
      .select('status, game_id')
      .eq('id', sentInvId)
      .single();
    if (!inv) return;
    if (inv.status === 'accepted') {
      clearInterval(invPollTimer);
      invSigCh?.unsubscribe();
      myCol  = 'W';
      gameId = inv.game_id;
      await joinGame(gameId);
    } else if (inv.status === 'declined') {
      clearInterval(invPollTimer);
      invSigCh?.unsubscribe();
      toast('❌ მოწვევა უარყო');
      resetLobby();
    }
  }, 3000);
}

function resetLobby() {
  document.getElementById('lobby').style.display        = 'flex';
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('invBtn').disabled = false;
  sentInvId = null;
}

function watchInvites() {
  // ── polling: check every 4 s for new pending invites addressed to me ──
  // (more reliable than postgres_changes INSERT filter on free tier)
  let lastCheck = new Date().toISOString();

  setInterval(async () => {
    const now = new Date().toISOString();
    const {data: rows} = await sb.from('nardi_invites')
      .select('*')
      .eq('to_uid', ME.id)
      .eq('status', 'pending')
      .gt('created_at', lastCheck);
    lastCheck = now;

    if (!rows || !rows.length) return;
    // take the most recent one
    const inv = rows[rows.length - 1];
    // ignore if already showing a banner
    if (document.getElementById('invBanner').classList.contains('show')) return;
    pendingInv = inv;
    const sender = allUsers.find(u => u.id === inv.from_uid);
    document.getElementById('ibName').textContent = sender?.username || '?';
    document.getElementById('invBanner').classList.add('show');
  }, 4000);

  // ── also listen via broadcast (fast path) ──
  // When someone sends us an invite they also broadcast on the shared channel
  // acceptInvite / declineInvite will broadcast the response back
}

async function acceptInvite() {
  if (!pendingInv) return;
  document.getElementById('invBanner').classList.remove('show');

  const initB = initBoard();

  // ── step 1: create game row ──
  const {data: gr, error} = await sb.from('nardi_games').insert({
    player_white: pendingInv.from_uid,
    player_black: ME.id,
    board_state:  JSON.stringify(initB),
    turn:         'W',
    dice:         [],
    dice_used:    [],
    status:       'active',
    white_home:   0,
    black_home:   0,
    white_bar:    0,
    black_bar:    0
  }).select('id').single();

  if (error) {
    console.error('nardi_games INSERT error:', error);
    toast('❌ ' + (error.message || error.code || JSON.stringify(error)));
    // re-show banner so user can retry
    document.getElementById('invBanner').classList.add('show');
    return;
  }

  // update DB
  await sb.from('nardi_invites').update({
    status:  'accepted',
    game_id: gr.id
  }).eq('id', pendingInv.id);

  // broadcast fast response so sender doesn't have to wait for polling cycle
  try {
    const sigCh = invChannel(pendingInv.from_uid, ME.id);
    await new Promise(res => { sigCh.subscribe(s => s === 'SUBSCRIBED' && res()); });
    await sigCh.send({
      type:    'broadcast',
      event:   'inv_response',
      payload: {inv_id: pendingInv.id, status: 'accepted', game_id: gr.id}
    });
  } catch(e) { /* broadcast optional — polling will catch it */ }

  myCol      = 'B';
  gameId     = gr.id;
  pendingInv = null;
  await joinGame(gameId);
}

async function declineInvite() {
  if (pendingInv) {
    await sb.from('nardi_invites').update({status: 'declined'}).eq('id', pendingInv.id);

    try {
      const sigCh = invChannel(pendingInv.from_uid, ME.id);
      await new Promise(res => { sigCh.subscribe(s => s === 'SUBSCRIBED' && res()); });
      await sigCh.send({
        type:    'broadcast',
        event:   'inv_response',
        payload: {inv_id: pendingInv.id, status: 'declined'}
      });
    } catch(e) { /* broadcast optional */ }
  }
  document.getElementById('invBanner').classList.remove('show');
  pendingInv = null;
}

// ────────────────────────────────────────────
// JOIN / SYNC GAME
// ────────────────────────────────────────────
async function joinGame(gid) {
  document.getElementById('lobby').style.display        = 'none';
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('boardWrap').style.display    = 'flex';

  const {data: g, error} = await sb.from('nardi_games').select('*').eq('id', gid).single();
  if (error) { toast('❌ ' + error.message); return; }

  loadGameState(g);
  buildBoard();

  const oppId = myCol === 'W' ? g.player_black : g.player_white;
  const opp   = allUsers.find(u => u.id === oppId);
  document.getElementById('oppName').textContent   = opp?.username || 'ოპ.';
  document.getElementById('myInfoName').textContent = PROF?.username || 'შენ';
  document.getElementById('bzMeLbl').textContent   = myCol === 'W' ? '⚪ შენ' : '⚫ შენ';
  document.getElementById('bzOppLbl').textContent  = myCol === 'W' ? '⚫ ოპ.' : '⚪ ოპ.';

  renderBoard();
  updateDiceUI();
  updateTurnUI();
  addSys('🎲 თამაში! ' + (myCol === 'W' ? '⚪ თეთრი' : '⚫ შავი') + ' ხარ');

  gameCh = sb.channel('game_' + gid)
    .on('postgres_changes', {
      event:  'UPDATE',
      schema: 'public',
      table:  'nardi_games',
      filter: `id=eq.${gid}`
    }, p => {
      // don't clobber a mid-move local state
      if (selPt !== null) return;

      const wasMyTurn = myTurn;
      loadGameState(p.new);

      if (myTurn && !wasMyTurn) addSys('🎲 შენი ჯერია!');

      renderBoard();
      updateDiceUI();
      updateTurnUI();

      if (p.new.status === 'finished') {
        document.getElementById('winTitle').textContent =
          p.new.winner === myCol ? '🏆 გამარჯვება!' : '😢 წაგება';
        document.getElementById('winSub').textContent =
          p.new.winner === myCol ? '+5 ქულა' : 'მომდევნო თამაშში!';
        document.getElementById('winOverlay').classList.add('open');
      }
    })
    .on('broadcast', {event: 'chat'}, p => {
      appendChat((p.payload.nick || '?') + ': ' + (p.payload.text || ''), false);
    })
    .subscribe();
}

// ── load game state from DB row ──
function loadGameState(g) {
  board    = JSON.parse(g.board_state);
  // DB stores bar as separate integer columns, off as white_home/black_home
  bar      = {W: g.white_bar || 0, B: g.black_bar || 0};
  whiteOff = g.white_home || 0;
  blackOff = g.black_home || 0;
  dice     = Array.isArray(g.dice) ? g.dice : [];
  if (Array.isArray(g.dice_used) && g.dice_used.length === dice.length) {
    diceUsed = g.dice_used.map(v => v === true || v === 'true');
  } else {
    diceUsed = dice.map(() => false);
  }
  myTurn  = (g.turn === myCol);
  started = true;
}

// ────────────────────────────────────────────
// CHAT
// ────────────────────────────────────────────
function sendChat() {
  const txt = document.getElementById('chatIn').value.trim();
  if (!txt) return;
  document.getElementById('chatIn').value = '';
  appendChat(txt, true);
  gameCh?.send({
    type:    'broadcast',
    event:   'chat',
    payload: {nick: PROF?.username || '?', text: txt}
  });
}

function appendChat(text, isMe) {
  const b = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = 'cm' + (isMe ? ' me' : '');
  d.textContent = text;
  b.appendChild(d);
  b.scrollTop = b.scrollHeight;
}

function addSys(t) {
  const b = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className   = 'cm-sys';
  d.textContent = t;
  b.appendChild(d);
  b.scrollTop = b.scrollHeight;
}

function toast(msg) {
  const t = document.createElement('div');
  t.className   = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// ────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────
async function loadUsers() {
  const {data} = await sb.from('profiles')
    .select('id,username,avatar_url,emotion,nardi_score')
    .neq('id', ME.id);
  allUsers = data || [];

  const list = document.getElementById('userList');
  list.innerHTML = '';
  allUsers.forEach(u => {
    const d = document.createElement('div');
    d.className = 'uitem';
    d.innerHTML = `<div class="uav">${
      u.avatar_url ? `<img src="${u.avatar_url}">` : (u.emotion || '😊')
    }</div><div style="flex:1;font-size:13px">${u.username || '?'}</div>`;
    d.onclick = () => {
      document.querySelectorAll('.uitem').forEach(i => i.classList.remove('sel'));
      d.classList.add('sel');
      selOpp = u;
      document.getElementById('invBtn').disabled = false;
    };
    list.appendChild(d);
  });
}

async function init() {
  const {data: {user}} = await sb.auth.getUser();
  if (!user) { location.href = 'index.html'; return; }
  ME = user;

  const {data: prof} = await sb.from('profiles').select('*').eq('id', ME.id).single();
  PROF = prof;

  document.getElementById('myTbName').textContent   = PROF?.username || '?';
  document.getElementById('myScoreDisp').textContent = '🏆 ' + (PROF?.nardi_score || 0);
  document.getElementById('stWins').textContent      = PROF?.nardi_wins   || 0;
  document.getElementById('stLoss').textContent      = PROF?.nardi_losses || 0;
  document.getElementById('stScore').textContent     = PROF?.nardi_score  || 0;

  await loadUsers();
  watchInvites();

  document.getElementById('invBtn').onclick     = sendInvite;
  document.getElementById('cancelBtn').onclick  = async () => {
    clearInterval(invPollTimer);
    invSigCh?.unsubscribe();
    if (sentInvId) {
      await sb.from('nardi_invites').update({status: 'declined'}).eq('id', sentInvId);
    }
    location.reload();
  };
  document.getElementById('ibYes').onclick      = acceptInvite;
  document.getElementById('ibNo').onclick       = declineInvite;
  document.getElementById('rollBtn').onclick    = rollDice;
  document.getElementById('passBtn').onclick    = passMove;
  document.getElementById('restartBtn').onclick = () => location.reload();
  document.getElementById('bzMe').onclick       = onBearOffClick;
}

init();
</script>
