<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ნარდი · ქართული წესები</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;--panel:#120f24;--panel2:#1a1730;--border:rgba(160,80,255,0.35);
  --text:#ede0ff;--text2:#b580e0;--text3:#7a5a9a;--bubble:#2a2745;--input-bg:#221f3a;
  --online:#c07aff;--indigo:#7a1fc8;--indigo2:#a855f7;--indigo-f:rgba(120,30,200,0.18);
  --glow:rgba(168,85,247,0.28);--accent:#f07aff;
  --board-bg:#1e3a1e;
}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
@keyframes pop{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes flash{0%,100%{background:rgba(168,85,247,.22)}50%{background:rgba(168,85,247,.48)}}
@keyframes spin{to{transform:rotate(360deg)}}
#topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.tb-logo{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:900;color:var(--text);display:flex;align-items:center;gap:8px}
.tb-logo span{color:var(--accent)}
.tb-back{background:var(--indigo-f);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;padding:5px 12px;cursor:pointer;text-decoration:none}
.tb-spacer{flex:1}
.tb-score{background:var(--indigo-f);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-family:'Unbounded',sans-serif;font-size:11px;color:var(--accent)}
.tb-user{display:flex;align-items:center;gap:6px;background:var(--indigo-f);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px}
.tb-av{width:24px;height:24px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:12px;overflow:hidden}
.tb-av img{width:100%;height:100%;object-fit:cover}
#appWrap{display:flex;flex:1;min-height:0}
#gameArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;position:relative}
#lobby{display:flex;flex-direction:column;align-items:center;gap:20px;max-width:400px;width:100%;animation:pop .4s ease}
.lobby-icon{font-size:72px}
.lobby-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;text-align:center}
.lobby-sub{font-size:12px;color:var(--text3)}
.lobby-card{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px}
.lcard-title{font-family:'Unbounded',sans-serif;font-size:9px;color:var(--text2)}
.user-pick-list{display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto;margin-top:8px}
.user-pick-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent}
.user-pick-item:hover{background:var(--indigo-f)}
.user-pick-item.selected{background:rgba(168,85,247,.15);border-color:var(--indigo2)}
.upi-av{width:30px;height:30px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden}
.upi-av img{width:100%;height:100%;object-fit:cover}
.upi-name{font-size:13px;flex:1}
.btn-primary{padding:11px 24px;border-radius:50px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;color:#fff;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{padding:9px 18px;border-radius:50px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer}
#waitingScreen{display:none;flex-direction:column;align-items:center;gap:18px;animation:pop .4s ease}
.waiting-spinner{width:56px;height:56px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
#boardWrap{display:none;flex-direction:row;gap:10px;width:100%;max-width:1020px;height:100%;align-items:stretch}
#boardContainer{flex:1;display:flex;flex-direction:column;gap:6px}
.board-top-info{display:flex;justify-content:space-between;align-items:center}
.player-info{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:5px 10px}
.pi-av{width:26px;height:26px;border-radius:50%;background:var(--indigo-f);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.pi-av img{width:100%;height:100%;object-fit:cover}
.pi-name{font-size:11px;font-weight:600}
.pi-active{border-color:var(--accent);box-shadow:0 0 10px rgba(240,122,255,.3)}
.turn-badge{font-family:'Unbounded',sans-serif;font-size:9px;color:var(--indigo2);background:var(--indigo-f);border:1px solid var(--border);border-radius:18px;padding:4px 10px}
.board-and-bearoff{display:flex;flex:1;min-height:0;gap:5px}
#board{position:relative;background:#1e3a1e;border-radius:14px;border:3px solid #0a2a0a;flex:1;display:flex;flex-direction:column;overflow:hidden}
.bearoff-col{width:52px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.bearoff-zone{flex:1;background:var(--panel);border:2px solid var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer}
.bearoff-zone.can-bear{border-color:var(--accent);animation:flash .6s ease infinite}
.bearoff-label{font-size:8px;font-family:'Unbounded',sans-serif;color:var(--text3);text-align:center;margin-top:5px}
.bearoff-count{font-family:'Unbounded',sans-serif;font-size:22px;color:var(--accent);position:absolute;bottom:8px}
.bearoff-checker{width:70%;aspect-ratio:1;border-radius:50%;margin:2px 0}
.bearoff-checker.white{background:radial-gradient(circle at 35% 30%,#fff,#bbb)}
.bearoff-checker.black{background:radial-gradient(circle at 35% 30%,#555,#0a0a15)}
.board-half{display:flex;flex:1}
.board-row{display:flex;flex:1}
.board-bar{width:38px;background:#0a1f0a;border-left:2px solid #0a2a0a;border-right:2px solid #0a2a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.point{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer}
.point:hover{background:rgba(255,255,255,.05)}
.point.highlight{background:rgba(168,85,247,.35)!important;animation:flash .6s ease infinite}
.point.selected-src{background:rgba(240,122,255,.25)!important}
.tri{position:absolute;width:100%;pointer-events:none}
.tri-top{top:0;height:80%}
.tri-bot{bottom:0;height:80%}
.tri svg{width:100%;height:100%;display:block}
.checkers-stack{width:100%;display:flex;flex-direction:column;align-items:center;z-index:2;position:absolute;overflow:hidden;max-height:88%}
.checkers-stack.top-stack{top:2px;flex-direction:column}
.checkers-stack.bot-stack{bottom:2px;flex-direction:column-reverse}
.checker{width:74%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;position:relative;margin:0;border:2px solid rgba(255,255,255,.2);pointer-events:none}
.checker.white{background:radial-gradient(circle at 35% 30%,#fff,#bbb)}
.checker.black{background:radial-gradient(circle at 35% 30%,#666,#111)}
.checker.movable{box-shadow:0 0 16px var(--accent);transform:scale(1.05)}
.checker-count{position:absolute;font-size:9px;font-weight:900;background:rgba(0,0,0,.6);border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;top:-2px;right:-2px}
.pt-num{font-size:7px;font-family:'Unbounded',sans-serif;color:rgba(255,255,255,.4);position:absolute;z-index:3}
.pt-num.top-num{bottom:2px}
.pt-num.bot-num{top:2px}
#diceArea{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px;background:rgba(0,0,0,.5);flex-shrink:0;min-height:65px}
.dice{width:48px;height:48px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 3px 12px rgba(0,0,0,.6);color:#111}
.dice.used{opacity:.3;filter:grayscale(0.5)}
#rollBtn{padding:8px 20px;border-radius:30px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;color:#fff;font-family:'Unbounded',sans-serif;font-size:11px;cursor:pointer}
#rollBtn:disabled{opacity:.4;cursor:not-allowed}
#passBtn{padding:8px 16px;border-radius:30px;background:var(--indigo-f);border:1px solid var(--border);color:var(--text2);font-size:11px;cursor:pointer;display:none}
#statusBar{text-align:center;font-size:11px;color:var(--text2);padding:4px}
#chatPanel{width:220px;background:var(--panel);border:1px solid var(--border);border-radius:18px;display:flex;flex-direction:column;overflow:hidden}
.chat-head{background:linear-gradient(135deg,var(--indigo),var(--indigo2));padding:10px}
.chat-head-title{font-family:'Unbounded',sans-serif;font-size:10px;color:#fff}
#chatMsgs{flex:1;overflow-y:auto;padding:8px;font-size:11px}
.cmsg{background:var(--bubble);border-radius:8px;padding:5px 8px;margin:4px 0}
.cmsg.mine{background:rgba(120,30,200,.4);text-align:right}
.cmsg-nick{font-size:9px;color:var(--indigo2)}
.cmsg-sys{text-align:center;font-size:9px;color:var(--text3);padding:4px}
.chat-input-row{display:flex;gap:5px;padding:8px;border-top:1px solid var(--border)}
#chatInput{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:6px;color:var(--text);outline:none}
.chat-send{background:linear-gradient(135deg,var(--indigo),var(--indigo2));border:none;border-radius:9px;color:#fff;padding:0 10px;cursor:pointer}
#inviteBanner{position:fixed;top:60px;right:16px;width:280px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));border-radius:16px;padding:12px;z-index:9000;display:none}
#inviteBanner.show{display:flex;flex-direction:column;gap:8px}
.ib-name{font-size:13px;font-weight:bold}
.ib-btns{display:flex;gap:8px;margin-top:6px}
.ib-accept{background:#fff;border:none;border-radius:10px;color:var(--indigo);padding:6px;cursor:pointer}
.ib-decline{background:rgba(255,255,255,.2);border:none;border-radius:10px;color:#fff;padding:6px;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:10000;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:22px;text-align:center;max-width:320px}
.win-title{font-family:'Unbounded',sans-serif;font-size:20px;color:var(--accent)}
.modal-row{display:flex;gap:10px;margin-top:15px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--indigo2);color:#fff;padding:8px 20px;border-radius:30px;font-size:12px;z-index:99999;animation:pop .3s ease}
@media(max-width:680px){#chatPanel{width:180px}}
</style>
</head>
<body>

<div id="inviteBanner">
  <div class="ib-name" id="ibName">-</div>
  <div class="ib-text">გამოგიგზავნა ნარდის მოწვევა</div>
  <div class="ib-btns">
    <button class="ib-accept" id="acceptInviteBtn">✅ დასტური</button>
    <button class="ib-decline" id="declineInviteBtn">❌ უარი</button>
  </div>
</div>

<div id="topbar">
  <a href="chat.html" class="tb-back">← ჩატი</a>
  <div class="tb-logo">🎲 <span>ნარდი</span></div>
  <div class="tb-spacer"></div>
  <div class="tb-score" id="myScoreDisplay">🏆 0</div>
  <div class="tb-user">
    <div class="tb-av" id="myTbAv">😊</div>
    <span id="myTbName">-</span>
  </div>
</div>

<div id="appWrap">
<div id="gameArea">

  <div id="lobby">
    <div class="lobby-icon">🎲</div>
    <div class="lobby-title">ნარდი</div>
    <div class="lobby-sub">ქართული წესები</div>
    <div class="lobby-card">
      <div class="lcard-title">👤 აირჩიე ოპონენტი</div>
      <div class="user-pick-list" id="userPickList"></div>
      <button class="btn-primary" id="inviteBtn" disabled>🎲 მოწვევა</button>
    </div>
    <div class="lobby-card">
      <div class="lcard-title">📊 სტატისტიკა</div>
      <div style="display:flex;justify-content:space-around;margin-top:8px">
        <div><div style="font-size:24px;color:var(--accent)" id="statWins">0</div><div style="font-size:10px">მოგება</div></div>
        <div><div style="font-size:24px;color:var(--text2)" id="statLosses">0</div><div style="font-size:10px">წაგება</div></div>
        <div><div style="font-size:24px;color:#4ade80" id="statScore">0</div><div style="font-size:10px">ქულა</div></div>
      </div>
    </div>
  </div>

  <div id="waitingScreen">
    <div class="waiting-spinner"></div>
    <div class="waiting-title">ველოდებით...</div>
    <div class="waiting-sub" id="waitingFor">მოწვევა გაიგზავნა</div>
    <button class="btn-secondary" id="cancelInviteBtn" style="margin-top:10px">❌ გაუქმება</button>
  </div>

  <div id="boardWrap">
    <div id="boardContainer">
      <div class="board-top-info">
        <div class="player-info" id="oppInfo">
          <div class="pi-av" id="oppAv">😊</div>
          <span class="pi-name" id="oppName">ოპონენტი</span>
        </div>
        <div class="turn-badge" id="turnBadge">⏳</div>
        <div class="player-info" id="myInfo">
          <div class="pi-av" id="myInfoAv">😊</div>
          <span class="pi-name" id="myInfoName">შენ</span>
        </div>
      </div>
      <div class="board-and-bearoff">
        <div id="board">
          <div class="board-row" id="topRow">
            <div class="board-half" id="topLeft"></div>
            <div class="board-bar"></div>
            <div class="board-half" id="topRight"></div>
          </div>
          <div id="diceArea">
            <button id="rollBtn" disabled>🎲 გააგორე</button>
            <div class="dice" id="dice1">·</div>
            <div class="dice" id="dice2">·</div>
            <button id="passBtn">⏭ გამოტოვება</button>
          </div>
          <div class="board-row" id="botRow">
            <div class="board-half" id="botLeft"></div>
            <div class="board-bar"></div>
            <div class="board-half" id="botRight"></div>
          </div>
        </div>
        <div class="bearoff-col">
          <div class="bearoff-zone" id="bearoffOpp">
            <div class="bearoff-label" id="bearoffOppLabel">⚫ სახლი</div>
            <div id="bearoffOppCheckers"></div>
            <div class="bearoff-count" id="bearoffOppCount">0</div>
          </div>
          <div class="bearoff-zone" id="bearoffMe">
            <div class="bearoff-label" id="bearoffMeLabel">⚪ სახლი</div>
            <div id="bearoffMeCheckers"></div>
            <div class="bearoff-count" id="bearoffMeCount">0</div>
          </div>
        </div>
      </div>
      <div id="statusBar"></div>
    </div>
    <div id="chatPanel">
      <div class="chat-head"><div class="chat-head-title">💬 ჩატი</div></div>
      <div id="chatMsgs"><div class="cmsg-sys">🎲 კეთილი იყოს!</div></div>
      <div class="chat-input-row">
        <input id="chatInput" placeholder="შეტყობინება..." onkeydown="if(event.key==='Enter')sendChatMsg()">
        <button class="chat-send" onclick="sendChatMsg()">✈️</button>
      </div>
    </div>
  </div>
</div>
</div>

<div class="overlay" id="winOverlay">
  <div class="modal">
    <div class="win-title" id="winTitle">🏆 გამარჯვება!</div>
    <div style="margin:10px 0" id="winScore">+5 ქულა</div>
    <div class="modal-row">
      <button class="btn-primary" id="resetGameBtn" style="padding:8px">🔄 ახლიდან</button>
      <a href="chat.html" class="btn-secondary" style="text-decoration:none;padding:8px">← ჩატი</a>
    </div>
  </div>
</div>

<script>
'use strict';

const { createClient } = supabase;
const sb = createClient(
  "https://brggiyhfzfbmlirqfgpo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2dpeWhmemZibWxpcnFmZ3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE5NzUsImV4cCI6MjA5MjUyNzk3NX0.tCqsgnKDV5I7Us-qZVW14CxVO-ow2BphU0v-b_wsswU"
);

// ========== STATE ==========
let ME = null, MYPROF = null, allUsers = [];
let pendingInviteId = null, activeGameId = null, gameChannel = null, chatChannel = null;
let selectedOpponent = null, currentInvite = null;

// Game state (ქართული ნარდი - არა Backgammon!)
let board = [];           // 1-24
let whiteHome = 0, blackHome = 0;  // გაყვანილი ქვები
let dice = [], diceUsed = [];
let myColor = 'white';    // white ან black
let myTurn = false;
let gameStarted = false;
let selectedPoint = null;  // არჩეული ქვა გადასაადგილებლად

// ========== საწყისი დაფა (ქართული ნარდი) ==========
function getInitialBoard() {
  const b = Array.from({ length: 26 }, () => ({ color: null, count: 0 }));
  // თეთრი: 24-დან 1-ისკენ
  b[24] = { color: 'white', count: 2 };
  b[13] = { color: 'white', count: 5 };
  b[8] = { color: 'white', count: 3 };
  b[6] = { color: 'white', count: 5 };
  // შავი: 1-დან 24-ისკენ
  b[1] = { color: 'black', count: 2 };
  b[12] = { color: 'black', count: 5 };
  b[17] = { color: 'black', count: 3 };
  b[19] = { color: 'black', count: 5 };
  return b;
}

// ========== დამხმარე ფუნქციები ==========
function unusedDiceIndices() { return dice.map((_, i) => !diceUsed[i] ? i : null).filter(i => i !== null); }
function remainingDiceValues() { return unusedDiceIndices().map(i => dice[i]); }
function consumeDie(value) {
  for (let i = 0; i < dice.length; i++) {
    if (!diceUsed[i] && dice[i] === value) { diceUsed[i] = true; return true; }
  }
  return false;
}
function allDiceUsed() { return diceUsed.every(u => u); }

// მიმართულება: თეთრი ← (24→1), შავი → (1→24)
function targetPoint(from, d) { return myColor === 'white' ? from - d : from + d; }

// შეუძლია თუ არა ამ წერტილში ჩაჯდომა
function canLand(pt) {
  if (pt < 1 || pt > 24) return false;
  const cell = board[pt];
  if (!cell || !cell.color || cell.count === 0) return true;
  if (cell.color === myColor) return true;
  // მოწინააღმდეგის 1 ქვა → შეიძლება "მოკვლა" (გაცოცხლება)
  if (cell.count === 1) return true;
  return false; // 2+ ქვა → დაბლოკილია
}

// ყველა ქვა სახლშია?
function allInHome() {
  if (myColor === 'white') {
    for (let i = 7; i <= 24; i++) {
      if (board[i] && board[i].color === 'white' && board[i].count > 0) return false;
    }
  } else {
    for (let i = 1; i <= 18; i++) {
      if (board[i] && board[i].color === 'black' && board[i].count > 0) return false;
    }
  }
  return true;
}

// "მოკლული" ქვების გაცოცხლება - 24-დან ან 1-დან
function hasDeadCheckers() {
  if (myColor === 'white') {
    // თეთრის მოკლული ქვები 24-ზე ინახება
    return board[24] && board[24].color === 'white' && board[24].count > 0;
  } else {
    // შავის მოკლული ქვები 1-ზე ინახება
    return board[1] && board[1].color === 'black' && board[1].count > 0;
  }
}

// "მოკლული" ქვის გაცოცხლება - სჭირდება ზუსტი ზარი
function canRevive(d) {
  if (myColor === 'white') {
    const target = 25 - d;  // 24-დან d ნაბიჯით
    if (target < 1 || target > 24) return false;
    return canLand(target);
  } else {
    const target = d;  // 1-დან d ნაბიჯით
    if (target < 1 || target > 24) return false;
    return canLand(target);
  }
}

// აქვს თუ არა რაიმე სვლა
function hasAnyLegalMove() {
  const rem = remainingDiceValues();
  if (!rem.length) return false;
  
  // ჯერ "მოკლული" ქვების შემოყვანა
  if (hasDeadCheckers()) {
    return rem.some(d => canRevive(d));
  }
  
  // ყველა ქვა სახლშია? → გაყვანა
  if (allInHome()) {
    for (const d of rem) {
      for (let i = 1; i <= 6; i++) {
        const cell = board[i];
        if (cell && cell.color === myColor && cell.count > 0) {
          if (i === d) return true;
          if (i < d) {
            // თუ იმ რიცხვზე ქვა არ გაქვს, უფრო მაღლიდან გაყვანა
            let hasExact = false;
            for (let j = d; j <= 6; j++) {
              if (board[j] && board[j].color === myColor && board[j].count > 0) { hasExact = true; break; }
            }
            if (!hasExact && i === Math.max(...rem.filter(r => r >= i))) return true;
          }
        }
      }
    }
    return false;
  }
  
  // ჩვეულებრივი სვლები
  for (let i = 1; i <= 24; i++) {
    const cell = board[i];
    if (!cell || cell.color !== myColor || cell.count === 0) continue;
    for (const d of rem) {
      const to = targetPoint(i, d);
      if (to >= 1 && to <= 24 && canLand(to)) return true;
    }
  }
  return false;
}

// ========== სვლების შესრულება ==========
// "მოკვლა" - მოწინააღმდეგის ქვა მიდის სათავეში (24 ან 1)
function applyMove(fromPt, toPt) {
  // ქვის ამოღება საწყისი წერტილიდან
  if (fromPt >= 1 && fromPt <= 24) {
    board[fromPt].count--;
    if (board[fromPt].count === 0) board[fromPt].color = null;
  }
  
  // ჩაჯდომა სამიზნე წერტილში
  const cell = board[toPt];
  let killed = false;
  
  // თუ მოწინააღმდეგის 1 ქვაა → "მოკვლა"
  if (cell.color && cell.color !== myColor && cell.count === 1) {
    // მოკლული ქვა მიდის თავში (თეთრი → 24, შავი → 1)
    const deadColor = cell.color;
    if (deadColor === 'white') {
      board[24].color = 'white';
      board[24].count = (board[24].count || 0) + 1;
    } else {
      board[1].color = 'black';
      board[1].count = (board[1].count || 0) + 1;
    }
    cell.count = 0;
    cell.color = null;
    killed = true;
  }
  
  // ჩაჯდომა
  if (!cell.color) cell.color = myColor;
  cell.count = (cell.count || 0) + 1;
  
  return killed;
}

// გაყვანა სახლიდან
function bearOff(point, dieValue) {
  if (point === dieValue) {
    // ზუსტად იმ წერტილიდან გაყვანა
    board[point].count--;
    if (board[point].count === 0) board[point].color = null;
    if (myColor === 'white') whiteHome++;
    else blackHome++;
    return true;
  } else if (point < dieValue) {
    // უფრო მაღალი რიცხვიდან გაყვანა (თუ ზუსტი არ გვაქვს)
    let hasExact = false;
    for (let i = dieValue; i <= 6; i++) {
      if (board[i] && board[i].color === myColor && board[i].count > 0) {
        hasExact = true;
        break;
      }
    }
    if (!hasExact) {
      board[point].count--;
      if (board[point].count === 0) board[point].color = null;
      if (myColor === 'white') whiteHome++;
      else blackHome++;
      return true;
    }
  }
  return false;
}

// ========== UI რენდერი ==========
function renderBoardUI() {
  // გასუფთავება
  for (let i = 1; i <= 24; i++) {
    const stack = document.getElementById('stack' + i);
    if (stack) stack.innerHTML = '';
    const pt = document.getElementById('pt' + i);
    if (pt) pt.classList.remove('highlight', 'selected-src');
  }
  
  // ქვების განთავსება
  for (let i = 1; i <= 24; i++) {
    const cell = board[i];
    if (!cell || !cell.count || !cell.color) continue;
    const stack = document.getElementById('stack' + i);
    if (!stack) continue;
    
    const show = Math.min(cell.count, 6);
    const pct = (show <= 2 ? 80 : show <= 4 ? 74 : 68) + '%';
    for (let c = 0; c < show; c++) {
      const ch = document.createElement('div');
      ch.className = 'checker ' + cell.color;
      ch.style.width = pct;
      if (c === show - 1 && cell.count > 6) {
        const cnt = document.createElement('span');
        cnt.className = 'checker-count';
        cnt.textContent = cell.count;
        ch.appendChild(cnt);
      }
      stack.appendChild(ch);
    }
  }
  
  // სახლების რენდერი
  const myBearCount = myColor === 'white' ? whiteHome : blackHome;
  const oppBearCount = myColor === 'white' ? blackHome : whiteHome;
  const myBearDiv = document.getElementById('bearoffMeCheckers');
  const oppBearDiv = document.getElementById('bearoffOppCheckers');
  if (myBearDiv) {
    myBearDiv.innerHTML = '';
    for (let i = 0; i < Math.min(myBearCount, 10); i++) {
      const c = document.createElement('div');
      c.className = 'bearoff-checker ' + myColor;
      myBearDiv.appendChild(c);
    }
  }
  if (oppBearDiv) {
    oppBearDiv.innerHTML = '';
    for (let i = 0; i < Math.min(oppBearCount, 10); i++) {
      const c = document.createElement('div');
      c.className = 'bearoff-checker ' + (myColor === 'white' ? 'black' : 'white');
      oppBearDiv.appendChild(c);
    }
  }
  document.getElementById('bearoffMeCount').textContent = myBearCount;
  document.getElementById('bearoffOppCount').textContent = oppBearCount;
  
  // მოძრავი ქვების მონიშვნა
  if (myTurn && gameStarted && dice.length && remainingDiceValues().length) {
    highlightMovable();
  }
}

function highlightMovable() {
  clearHighlights();
  const rem = remainingDiceValues();
  if (!rem.length) return;
  
  // მოკლული ქვების შემოყვანა
  if (hasDeadCheckers()) {
    rem.forEach(d => {
      if (canRevive(d)) {
        const target = myColor === 'white' ? 25 - d : d;
        document.getElementById('pt' + target)?.classList.add('highlight');
      }
    });
    return;
  }
  
  // ყველა ქვა სახლში → გაყვანა
  if (allInHome()) {
    for (let i = 1; i <= 6; i++) {
      if (board[i] && board[i].color === myColor && board[i].count > 0) {
        if (rem.includes(i)) {
          document.getElementById('pt' + i)?.classList.add('highlight');
        } else {
          const canBearHigher = rem.some(d => d > i);
          if (canBearHigher) {
            let hasExact = false;
            for (let j = Math.max(...rem); j <= 6; j++) {
              if (board[j] && board[j].color === myColor && board[j].count > 0) hasExact = true;
            }
            if (!hasExact) document.getElementById('bearoffMe')?.classList.add('can-bear');
          }
        }
      }
    }
    return;
  }
  
  // ჩვეულებრივი სვლები
  for (let i = 1; i <= 24; i++) {
    const cell = board[i];
    if (!cell || cell.color !== myColor || !cell.count) continue;
    const hasMove = rem.some(d => {
      const to = targetPoint(i, d);
      return to >= 1 && to <= 24 && canLand(to);
    });
    if (hasMove) {
      document.getElementById('stack' + i)?.querySelectorAll('.checker').forEach(c => c.classList.add('movable'));
    }
  }
}

function clearHighlights() {
  document.querySelectorAll('.point.highlight').forEach(p => p.classList.remove('highlight'));
  document.querySelectorAll('.point.selected-src').forEach(p => p.classList.remove('selected-src'));
  document.querySelectorAll('.checker.movable').forEach(c => c.classList.remove('movable'));
  document.getElementById('bearoffMe')?.classList.remove('can-bear');
}

function showDestinations(fromPt) {
  clearHighlights();
  if (fromPt !== 'bearoff') document.getElementById('pt' + fromPt)?.classList.add('selected-src');
  const rem = remainingDiceValues();
  
  // მოკლული ქვის შემოყვანა
  if (hasDeadCheckers()) {
    rem.forEach(d => {
      if (canRevive(d)) {
        const target = myColor === 'white' ? 25 - d : d;
        document.getElementById('pt' + target)?.classList.add('highlight');
      }
    });
    return;
  }
  
  // სახლიდან გაყვანა
  if (allInHome() && fromPt !== 'bearoff') {
    rem.forEach(d => {
      if (fromPt === d) {
        document.getElementById('bearoffMe')?.classList.add('can-bear');
      } else if (fromPt < d) {
        let hasExact = false;
        for (let i = d; i <= 6; i++) {
          if (board[i] && board[i].color === myColor && board[i].count > 0) hasExact = true;
        }
        if (!hasExact) document.getElementById('bearoffMe')?.classList.add('can-bear');
      }
    });
    return;
  }
  
  // ჩვეულებრივი სვლები
  rem.forEach(d => {
    const to = targetPoint(fromPt, d);
    if (to >= 1 && to <= 24 && canLand(to)) {
      document.getElementById('pt' + to)?.classList.add('highlight');
    }
  });
}

// ========== კლიკების დამუშავება ==========
function onPointClick(pt) {
  if (!myTurn || !gameStarted) { toast('❌ შენი ჯერი არ არის'); return; }
  if (!dice.length || !remainingDiceValues().length) { toast('🎲 ჯერ ზარი გააგორე'); return; }
  
  // მოკლული ქვების შემოყვანა
  if (hasDeadCheckers()) {
    const dieNeeded = myColor === 'white' ? 25 - pt : pt;
    if (!remainingDiceValues().includes(dieNeeded)) { toast('❌ ამ წერტილში ვერ შეხვალ'); return; }
    if (!canLand(pt)) { toast('❌ ეს წერტილი დაბლოკილია'); return; }
    execRevive(pt, dieNeeded);
    return;
  }
  
  // თუ ქვა არ არის არჩეული
  if (selectedPoint === null) {
    const cell = board[pt];
    if (!cell || cell.color !== myColor || !cell.count) { toast('❌ შენი ქვა არ არის'); return; }
    selectedPoint = pt;
    showDestinations(pt);
    return;
  }
  
  // იგივე წერტილი → გაუქმება
  if (selectedPoint === pt) {
    selectedPoint = null;
    clearHighlights();
    highlightMovable();
    return;
  }
  
  // სხვა წერტილზე დაჭერა → სვლა
  const from = selectedPoint;
  const dieNeeded = myColor === 'white' ? (from - pt) : (pt - from);
  if (dieNeeded <= 0 || !remainingDiceValues().includes(dieNeeded)) {
    toast('❌ ამ სვლისთვის ზარი არ გამოდის');
    selectedPoint = null;
    clearHighlights();
    highlightMovable();
    return;
  }
  if (!canLand(pt)) {
    toast('❌ ეს წერტილი დაბლოკილია');
    selectedPoint = null;
    clearHighlights();
    highlightMovable();
    return;
  }
  
  execMove(from, pt, dieNeeded);
}

function onBearOffClick() {
  if (!myTurn || !gameStarted) return;
  if (!dice.length || !remainingDiceValues().length) { toast('🎲 ჯერ ზარი გააგორე'); return; }
  if (!allInHome()) { toast('❌ ჯერ ყველა ქვა სახლში არ არის'); return; }
  if (selectedPoint === null) { toast('⬆ ჯერ ქვაზე დააჭირე'); return; }
  
  const from = selectedPoint;
  const rem = remainingDiceValues();
  let usedDie = null;
  
  for (const d of rem) {
    if (from === d) { usedDie = d; break; }
    if (from < d) {
      let hasExact = false;
      for (let i = d; i <= 6; i++) {
        if (board[i] && board[i].color === myColor && board[i].count > 0) hasExact = true;
      }
      if (!hasExact) { usedDie = d; break; }
    }
  }
  
  if (usedDie === null) { toast('❌ ამ ქვის გაყვანა არ შეიძლება'); return; }
  
  if (bearOff(from, usedDie)) {
    consumeDie(usedDie);
    selectedPoint = null;
    renderBoardUI();
    if (whiteHome >= 15 || blackHome >= 15) { finishGame(); return; }
    syncGameState();
  } else {
    toast('❌ გაყვანა ვერ მოხერხდა');
  }
}

// ========== სვლების შესრულება ==========
async function execMove(fromPt, toPt, dieValue) {
  const killed = applyMove(fromPt, toPt);
  consumeDie(dieValue);
  selectedPoint = null;
  if (killed) toast('💥 მოკალი!');
  renderBoardUI();
  if (whiteHome >= 15 || blackHome >= 15) { finishGame(); return; }
  await syncGameState();
}

async function execRevive(toPt, dieValue) {
  // მოკლული ქვის ამოღება სათავიდან
  if (myColor === 'white') {
    board[24].count--;
    if (board[24].count === 0) board[24].color = null;
  } else {
    board[1].count--;
    if (board[1].count === 0) board[1].color = null;
  }
  
  // ჩაჯდომა
  const cell = board[toPt];
  if (cell.color && cell.color !== myColor && cell.count === 1) {
    // კიდევ ერთი მოკვლა!
    const deadColor = cell.color;
    if (deadColor === 'white') {
      board[24].color = 'white';
      board[24].count = (board[24].count || 0) + 1;
    } else {
      board[1].color = 'black';
      board[1].count = (board[1].count || 0) + 1;
    }
    cell.count = 0;
    cell.color = null;
    toast('💥 კიდევ ერთი მოკვლა!');
  }
  if (!cell.color) cell.color = myColor;
  cell.count = (cell.count || 0) + 1;
  
  consumeDie(dieValue);
  selectedPoint = null;
  renderBoardUI();
  await syncGameState();
}

async function syncGameState() {
  const rem = remainingDiceValues();
  const turnDone = rem.length === 0 || !hasAnyLegalMove();
  let nextTurn = myColor;
  let nextDice = dice;
  let nextDiceUsed = diceUsed;
  
  if (turnDone) {
    nextTurn = myColor === 'white' ? 'black' : 'white';
    nextDice = [];
    nextDiceUsed = [];
  }
  
  await sb.from('nardi_games').update({
    board_state: JSON.stringify(board),
    turn: nextTurn,
    dice: nextDice,
    dice_used: nextDiceUsed,
    white_home: whiteHome,
    black_home: blackHome
  }).eq('id', activeGameId);
  
  if (turnDone) {
    myTurn = false;
    dice = [];
    diceUsed = [];
    updateDiceUI();
    updateTurnUI();
    renderBoardUI();
    addSysMsg('🔄 მოწინააღმდეგის ჯერი');
  } else {
    updateDiceUI();
    renderBoardUI();
  }
}

// ========== ზარი ==========
async function rollDice() {
  if (!myTurn) { toast('❌ შენი ჯერი არ არის'); return; }
  if (dice.length > 0) { toast('❌ ზარი უკვე გააგდე'); return; }
  
  const d1 = Math.ceil(Math.random() * 6);
  const d2 = Math.ceil(Math.random() * 6);
  const isDouble = d1 === d2;
  const newDice = isDouble ? [d1, d1, d1, d1] : [d1, d2];
  
  dice = [...newDice];
  diceUsed = dice.map(() => false);
  
  await sb.from('nardi_games').update({ dice, dice_used: diceUsed }).eq('id', activeGameId);
  
  updateDiceUI();
  renderBoardUI();
  addSysMsg(`🎲 ${d1}+${d2}${isDouble ? ' (ორმაგი!)' : ''}`);
  
  if (!hasAnyLegalMove()) {
    addSysMsg('😞 სვლა შეუძლებელია — გამოტოვება');
    await syncGameState();
  }
}

async function passMove() {
  if (!myTurn) return;
  diceUsed = dice.map(() => true);
  await syncGameState();
}

function updateDiceUI() {
  const faces = ['·', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
  for (let i = 0; i < 2; i++) {
    const el = document.getElementById('dice' + (i + 1));
    if (i < dice.length) {
      el.style.display = 'flex';
      el.textContent = dice[i] ? faces[dice[i]] : '·';
      el.className = 'dice' + (diceUsed[i] ? ' used' : '');
    } else {
      el.style.display = 'none';
    }
  }
  document.getElementById('rollBtn').disabled = !myTurn || dice.length > 0;
  const hasMoves = dice.length > 0 && remainingDiceValues().length > 0;
  document.getElementById('passBtn').style.display = (myTurn && hasMoves) ? 'inline-block' : 'none';
}

function updateTurnUI() {
  document.getElementById('turnBadge').textContent = myTurn ? '🎲 შენი ჯერია!' : '⏳ ველოდები...';
  document.getElementById('myInfo').classList.toggle('pi-active', myTurn);
  document.getElementById('oppInfo').classList.toggle('pi-active', !myTurn);
  document.getElementById('statusBar').textContent = myTurn ? (dice.length ? '✋ აირჩიე ქვა' : '🎲 გააგორე ზარი!') : '⏳ ოპონენტის ჯერი...';
  document.getElementById('rollBtn').disabled = !myTurn || dice.length > 0;
}

// ========== თამაშის დასრულება ==========
async function finishGame() {
  const winner = whiteHome >= 15 ? 'white' : 'black';
  const iWon = winner === myColor;
  await sb.from('nardi_games').update({ status: 'finished', winner }).eq('id', activeGameId);
  if (iWon) {
    const newScore = (MYPROF.nardi_score || 0) + 5;
    const newWins = (MYPROF.nardi_wins || 0) + 1;
    await sb.from('profiles').update({ nardi_score: newScore, nardi_wins: newWins }).eq('id', ME.id);
    MYPROF.nardi_score = newScore; MYPROF.nardi_wins = newWins;
  } else {
    const newLosses = (MYPROF.nardi_losses || 0) + 1;
    await sb.from('profiles').update({ nardi_losses: newLosses }).eq('id', ME.id);
    MYPROF.nardi_losses = newLosses;
  }
  showWinModal(iWon);
}

function showWinModal(iWon) {
  document.getElementById('winTitle').innerHTML = iWon ? '🏆 გამარჯვება!' : '😢 წაგება';
  document.getElementById('winScore').innerHTML = iWon ? '+5 ქულა' : 'მომდევნო თამაში გაიმარჯვებ!';
  document.getElementById('winOverlay').classList.add('open');
  document.getElementById('myScoreDisplay').textContent = '🏆 ' + (MYPROF.nardi_score || 0);
}

// ========== მოწვევები ==========
async function sendInvite() {
  if (!selectedOpponent) return;
  document.getElementById('inviteBtn').disabled = true;
  const { data, error } = await sb.from('nardi_invites').insert({
    from_uid: ME.id, to_uid: selectedOpponent.id, status: 'pending'
  }).select('id').single();
  if (error) { toast('❌ ' + error.message); return; }
  pendingInviteId = data.id;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('waitingScreen').style.display = 'flex';
  
  const ch = sb.channel('invite_' + data.id)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'nardi_invites', filter: `id=eq.${data.id}` }, async p => {
      if (p.new.status === 'accepted') {
        await sb.removeChannel(ch);
        activeGameId = p.new.game_id;
        myColor = 'white';
        await joinGame(p.new.game_id);
      }
    }).subscribe();
}

function watchInvites() {
  sb.channel('my_invites_' + ME.id)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'nardi_invites', filter: `to_uid=eq.${ME.id}` }, async p => {
      if (p.new.status !== 'pending') return;
      currentInvite = p.new;
      document.getElementById('ibName').innerHTML = `🎲 მოწვევა`;
      document.getElementById('inviteBanner').classList.add('show');
    }).subscribe();
}

async function acceptInvite() {
  if (!currentInvite) return;
  document.getElementById('inviteBanner').classList.remove('show');
  const initBoard = getInitialBoard();
  const { data: gameRow } = await sb.from('nardi_games').insert({
    player_white: currentInvite.from_uid,
    player_black: ME.id,
    board_state: JSON.stringify(initBoard),
    turn: 'white',
    dice: [],
    dice_used: [],
    status: 'active',
    white_home: 0,
    black_home: 0
  }).select('id').single();
  await sb.from('nardi_invites').update({ status: 'accepted', game_id: gameRow.id }).eq('id', currentInvite.id);
  activeGameId = gameRow.id;
  myColor = 'black';
  currentInvite = null;
  await joinGame(gameRow.id);
}

function declineInvite() {
  document.getElementById('inviteBanner').classList.remove('show');
  currentInvite = null;
}

async function joinGame(gameId) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('boardWrap').style.display = 'flex';
  
  const { data: game } = await sb.from('nardi_games').select('*').eq('id', gameId).single();
  board = JSON.parse(game.board_state);
  whiteHome = game.white_home || 0;
  blackHome = game.black_home || 0;
  dice = game.dice || [];
  diceUsed = game.dice_used || dice.map(() => false);
  myTurn = (game.turn === myColor);
  gameStarted = true;
  
  const oppId = myColor === 'white' ? game.player_black : game.player_white;
  let opp = allUsers.find(u => u.id === oppId);
  if (opp) document.getElementById('oppName').textContent = opp.username || 'ოპონენტი';
  
  renderBoardUI();
  updateDiceUI();
  updateTurnUI();
  
  gameChannel = sb.channel('nardi_game_' + gameId)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'nardi_games', filter: `id=eq.${gameId}` }, async p => {
      if (selectedPoint !== null) return;
      board = JSON.parse(p.new.board_state);
      whiteHome = p.new.white_home || 0;
      blackHome = p.new.black_home || 0;
      dice = p.new.dice || [];
      diceUsed = p.new.dice_used || dice.map(() => false);
      myTurn = (p.new.turn === myColor);
      renderBoardUI();
      updateDiceUI();
      updateTurnUI();
      if (whiteHome >= 15 || blackHome >= 15) showWinModal(whiteHome >= 15 ? myColor === 'white' : myColor === 'black');
    }).subscribe();
  
  addSysMsg('🎲 თამაში დაიწყო! შენ ხარ ' + (myColor === 'white' ? '⚪ თეთრი' : '⚫ შავი'));
}

// ========== UI ფუნქციები ==========
function buildBoard() {
  const tl = document.getElementById('topLeft'); tl.innerHTML = '';
  [13,14,15,16,17,18].forEach(n => tl.appendChild(makePoint(n, true)));
  const tr = document.getElementById('topRight'); tr.innerHTML = '';
  [19,20,21,22,23,24].forEach(n => tr.appendChild(makePoint(n, true)));
  const bl = document.getElementById('botLeft'); bl.innerHTML = '';
  [12,11,10,9,8,7].forEach(n => bl.appendChild(makePoint(n, false)));
  const br = document.getElementById('botRight'); br.innerHTML = '';
  [6,5,4,3,2,1].forEach(n => br.appendChild(makePoint(n, false)));
}

function makePoint(num, isTop) {
  const p = document.createElement('div');
  p.className = 'point';
  p.id = 'pt' + num;
  const col = (num % 2 !== 0) ? '#b83030' : '#c8951a';
  if (isTop) p.innerHTML = `<div class="tri tri-top"><svg viewBox="0 0 60 100" preserveAspectRatio="none"><polygon points="30,96 2,4 58,4" fill="${col}" opacity="0.85"/></svg></div>`;
  else p.innerHTML = `<div class="tri tri-bot"><svg viewBox="0 0 60 100" preserveAspectRatio="none"><polygon points="30,4 2,96 58,96" fill="${col}" opacity="0.85"/></svg></div>`;
  const numEl = document.createElement('div');
  numEl.className = 'pt-num ' + (isTop ? 'top-num' : 'bot-num');
  numEl.textContent = num;
  p.appendChild(numEl);
  const stack = document.createElement('div');
  stack.className = 'checkers-stack ' + (isTop ? 'top-stack' : 'bot-stack');
  stack.id = 'stack' + num;
  p.appendChild(stack);
  p.addEventListener('click', () => onPointClick(num));
  return p;
}

async function loadUsers() {
  const { data } = await sb.from('profiles').select('id,username,avatar_url,emotion,nardi_score').neq('id', ME.id);
  allUsers = data || [];
  const list = document.getElementById('userPickList');
  list.innerHTML = '';
  allUsers.forEach(u => {
    const d = document.createElement('div');
    d.className = 'user-pick-item';
    d.innerHTML = `<div class="upi-av">${u.avatar_url ? `<img src="${u.avatar_url}">` : (u.emotion || '😊')}</div><div class="upi-name">${u.username || '?'}</div>`;
    d.onclick = () => {
      document.querySelectorAll('.user-pick-item').forEach(i => i.classList.remove('selected'));
      d.classList.add('selected');
      selectedOpponent = u;
      document.getElementById('inviteBtn').disabled = false;
    };
    list.appendChild(d);
  });
}

async function sendChatMsg() {
  const txt = document.getElementById('chatInput').value.trim();
  if (!txt) return;
  document.getElementById('chatInput').value = '';
  const box = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = 'cmsg mine';
  d.innerHTML = `<div>${escapeHtml(txt)}</div>`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  if (chatChannel) chatChannel.send({ type: 'broadcast', event: 'chat', payload: { content: txt } });
}

function addSysMsg(msg) {
  const box = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = 'cmsg-sys';
  d.textContent = msg;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function escapeHtml(s) { return (s || '').replace(/[&<>]/g, function(m) { return { '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]; }); }
function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { location.href = 'index.html'; return; }
  ME = user;
  const { data: prof } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  MYPROF = prof;
  document.getElementById('myTbName').textContent = MYPROF?.username || '?';
  document.getElementById('myScoreDisplay').textContent = '🏆 ' + (MYPROF?.nardi_score || 0);
  document.getElementById('statWins').textContent = MYPROF?.nardi_wins || 0;
  document.getElementById('statLosses').textContent = MYPROF?.nardi_losses || 0;
  document.getElementById('statScore').textContent = MYPROF?.nardi_score || 0;
  await loadUsers();
  buildBoard();
  watchInvites();
  
  document.getElementById('inviteBtn').onclick = () => sendInvite();
  document.getElementById('cancelInviteBtn').onclick = () => location.reload();
  document.getElementById('acceptInviteBtn').onclick = () => acceptInvite();
  document.getElementById('declineInviteBtn').onclick = () => declineInvite();
  document.getElementById('rollBtn').onclick = () => rollDice();
  document.getElementById('passBtn').onclick = () => passMove();
  document.getElementById('resetGameBtn').onclick = () => location.reload();
  document.getElementById('bearoffMe').onclick = () => onBearOffClick();
}

init();
</script>
