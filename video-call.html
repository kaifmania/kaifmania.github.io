<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია — ზარი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;
  --glass:rgba(255,255,255,0.04);
  --glass2:rgba(255,255,255,0.08);
  --border:rgba(160,80,255,0.2);
  --text:#f0e8ff;
  --text2:#a070d0;
  --text3:#604890;
  --accent:#c060ff;
  --accent2:#8030d0;
  --green:#00e080;
  --red:#ff3060;
  --yellow:#ffb030;
  --glow:rgba(192,96,255,0.3);
}
body{
  font-family:'Noto Sans Georgian',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15}
.orb1{width:500px;height:500px;background:#7010c0;top:-100px;left:-100px;animation:orbFloat1 12s ease-in-out infinite}
.orb2{width:400px;height:400px;background:#0050c0;bottom:-100px;right:-50px;animation:orbFloat2 15s ease-in-out infinite}
.orb3{width:300px;height:300px;background:#c00060;top:40%;left:40%;animation:orbFloat3 10s ease-in-out infinite}
@keyframes orbFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-60px)}}
@keyframes orbFloat3{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-30px)}66%{transform:translate(-30px,20px)}}

/* ============ SCREENS ============ */
#screen{flex:1;display:flex;flex-direction:column;position:relative;z-index:1}

/* ============ INCOMING CALL ============ */
#incomingScreen{
  display:none;flex:1;flex-direction:column;
  align-items:center;justify-content:center;gap:32px;
  padding:40px 20px;
}
#incomingScreen.active{display:flex}
.incoming-label{
  font-family:'Unbounded',sans-serif;font-size:11px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--text2);animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.call-avatar-ring{position:relative;display:flex;align-items:center;justify-content:center}
.ring{
  position:absolute;border-radius:50%;border:2px solid var(--accent);
  animation:ringExpand 2s ease-out infinite;opacity:0;
}
.ring:nth-child(1){width:140px;height:140px;animation-delay:0s}
.ring:nth-child(2){width:180px;height:180px;animation-delay:.5s}
.ring:nth-child(3){width:220px;height:220px;animation-delay:1s}
@keyframes ringExpand{
  0%{transform:scale(.8);opacity:.8}
  100%{transform:scale(1.3);opacity:0}
}
.call-avatar{
  width:110px;height:110px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:3px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:48px;position:relative;z-index:2;overflow:hidden;
  box-shadow:0 0 40px var(--glow),0 0 80px rgba(192,96,255,0.15);
}
.call-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.caller-name{font-size:26px;font-weight:600;color:var(--text);text-align:center}
.call-type-badge{
  font-size:12px;color:var(--text2);
  background:var(--glass2);border:1px solid var(--border);
  border-radius:20px;padding:4px 14px;
  display:flex;align-items:center;gap:6px;
}
.incoming-actions{display:flex;gap:24px;margin-top:8px}
.call-action-btn{
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
}
.call-action-circle{
  width:70px;height:70px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;transition:all .2s;position:relative;overflow:hidden;
}
.call-action-circle::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:rgba(255,255,255,.1);transform:scale(0);
  transition:transform .3s;
}
.call-action-circle:hover::before{transform:scale(1)}
.btn-accept{background:linear-gradient(135deg,#00c060,var(--green));box-shadow:0 8px 30px rgba(0,224,128,.4)}
.btn-accept:hover{transform:scale(1.1);box-shadow:0 12px 40px rgba(0,224,128,.6)}
.btn-decline{background:linear-gradient(135deg,#c00040,var(--red));box-shadow:0 8px 30px rgba(255,48,96,.4)}
.btn-decline:hover{transform:scale(1.1);box-shadow:0 12px 40px rgba(255,48,96,.6)}
.call-action-label{font-size:11px;color:var(--text2);font-family:'Unbounded',sans-serif;letter-spacing:.5px}

/* ============ OUTGOING CALL ============ */
#outgoingScreen{
  display:none;flex:1;flex-direction:column;
  align-items:center;justify-content:center;gap:28px;
  padding:40px 20px;
}
#outgoingScreen.active{display:flex}
.outgoing-label{
  font-family:'Unbounded',sans-serif;font-size:11px;
  letter-spacing:3px;text-transform:uppercase;color:var(--text2);
}
.calling-dots{display:flex;gap:6px;align-items:center}
.calling-dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  animation:dotBounce .8s ease-in-out infinite;
}
.calling-dot:nth-child(2){animation-delay:.15s}
.calling-dot:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-6px);opacity:1}}

/* ============ ACTIVE CALL ============ */
#activeScreen{
  display:none;flex:1;flex-direction:column;
  position:relative;overflow:hidden;
}
#activeScreen.active{display:flex}

/* VIDEO AREA */
#remoteVideoWrap{
  flex:1;background:#060410;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#remoteVideo{width:100%;height:100%;object-fit:cover;display:none}
.remote-no-video{
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.remote-avatar{
  width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:52px;border:3px solid var(--accent);
  box-shadow:0 0 50px var(--glow);overflow:hidden;
}
.remote-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.remote-name-overlay{
  position:absolute;top:20px;left:20px;right:20px;
  display:flex;align-items:center;justify-content:space-between;
}
.remote-name-pill{
  background:rgba(0,0,0,.5);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:20px;
  padding:6px 16px;font-size:13px;font-weight:500;color:var(--text);
}
.call-timer-pill{
  background:rgba(0,0,0,.5);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:20px;
  padding:6px 16px;font-size:12px;color:var(--text2);
  font-family:'Unbounded',sans-serif;letter-spacing:.5px;
}
/* Local PIP */
#localVideoWrap{
  position:absolute;bottom:100px;right:16px;
  width:120px;height:160px;border-radius:16px;
  overflow:hidden;border:2px solid var(--border);
  background:#0a0816;cursor:pointer;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
  z-index:10;transition:all .2s;
}
#localVideoWrap:hover{transform:scale(1.05);border-color:var(--accent)}
#localVideo{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:none}
.local-no-video{
  width:100%;height:100%;display:flex;
  align-items:center;justify-content:center;font-size:36px;
  background:var(--glass2);
}

/* CONTROLS */
#callControls{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(6,4,16,.95),transparent);
  padding:16px 24px 28px;
  display:flex;align-items:center;justify-content:center;gap:16px;
}
.ctrl-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;user-select:none;
}
.ctrl-circle{
  width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;transition:all .2s;border:1px solid var(--border);
  background:var(--glass2);
  backdrop-filter:blur(10px);
}
.ctrl-circle:hover{background:var(--glass);transform:scale(1.1)}
.ctrl-circle.active-state{background:var(--accent2);border-color:var(--accent)}
.ctrl-circle.danger{background:linear-gradient(135deg,#c00040,var(--red));border-color:var(--red);box-shadow:0 6px 24px rgba(255,48,96,.4)}
.ctrl-circle.danger:hover{transform:scale(1.1);box-shadow:0 10px 32px rgba(255,48,96,.6)}
.ctrl-label{font-size:9px;color:var(--text3);font-family:'Unbounded',sans-serif;letter-spacing:.5px}

/* AUDIO VISUALIZER */
#audioViz{
  position:absolute;bottom:95px;left:0;right:0;
  height:40px;display:flex;align-items:flex-end;justify-content:center;
  gap:3px;pointer-events:none;opacity:.6;
}
.viz-bar{
  width:4px;border-radius:2px;background:var(--accent);
  animation:vizPulse 1.2s ease-in-out infinite;
  transform-origin:bottom;
}
@keyframes vizPulse{
  0%,100%{height:4px;opacity:.4}
  50%{height:var(--h,20px);opacity:.9}
}

/* ============ ENDED SCREEN ============ */
#endedScreen{
  display:none;flex:1;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  padding:40px 20px;
}
#endedScreen.active{display:flex}
.ended-icon{font-size:64px;opacity:.8}
.ended-title{font-family:'Unbounded',sans-serif;font-size:16px;color:var(--text);letter-spacing:.5px}
.ended-duration{font-size:13px;color:var(--text2)}
.back-btn{
  margin-top:8px;padding:12px 32px;border-radius:50px;
  background:var(--glass2);border:1px solid var(--border);
  color:var(--text);font-family:'Noto Sans Georgian',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s;
}
.back-btn:hover{background:var(--glass);border-color:var(--accent);color:var(--accent)}

/* ============ TOAST ============ */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;padding:10px 22px;border-radius:20px;
  font-size:13px;z-index:9999;white-space:nowrap;
  animation:toastIn .3s ease;pointer-events:none;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ============ CONNECTION BADGE ============ */
.conn-badge{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:20px;
  padding:5px 16px;font-size:11px;font-family:'Unbounded',sans-serif;
  letter-spacing:1px;transition:all .3s;z-index:20;
}
.conn-badge.connecting{color:var(--yellow);border-color:rgba(255,176,48,.4)}
.conn-badge.connected{color:var(--green);border-color:rgba(0,224,128,.4)}
.conn-badge.poor{color:var(--red);border-color:rgba(255,48,96,.4)}

/* ============ RAISED HAND ============ */
@keyframes handRaise{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.raised-hand{animation:handRaise .6s ease-in-out 3}

/* ============ SPEAK INDICATOR ============ */
.speaking-ring{
  position:absolute;inset:-4px;border-radius:50%;
  border:3px solid var(--green);opacity:0;
  animation:speakPulse 1s ease-in-out infinite;
}
@keyframes speakPulse{0%,100%{opacity:0;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}

/* ringtone visualizer */
#ringtoneViz{display:flex;gap:3px;align-items:flex-end;height:24px}
.rtone-bar{width:4px;border-radius:2px;background:var(--accent);animation:rtonePulse 0.7s ease-in-out infinite}
.rtone-bar:nth-child(1){animation-delay:0s}
.rtone-bar:nth-child(2){animation-delay:.1s}
.rtone-bar:nth-child(3){animation-delay:.2s}
.rtone-bar:nth-child(4){animation-delay:.1s}
.rtone-bar:nth-child(5){animation-delay:0s}
@keyframes rtonePulse{0%,100%{height:4px}50%{height:20px}}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div id="screen">

  <!-- ========== INCOMING ========== -->
  <div id="incomingScreen">
    <div class="incoming-label">შემოსული ზარი</div>
    <div class="call-avatar-ring">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="call-avatar" id="incomingAvatar">👤</div>
    </div>
    <div>
      <div class="caller-name" id="incomingName">სახელი</div>
      <div style="display:flex;justify-content:center;margin-top:8px">
        <div class="call-type-badge" id="incomingTypeBadge">📹 ვიდეო ზარი</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div id="ringtoneViz">
        <div class="rtone-bar"></div><div class="rtone-bar"></div>
        <div class="rtone-bar"></div><div class="rtone-bar"></div>
        <div class="rtone-bar"></div>
      </div>
    </div>
    <div class="incoming-actions">
      <div class="call-action-btn" onclick="declineCall()">
        <div class="call-action-circle btn-decline">📵</div>
        <div class="call-action-label">უარი</div>
      </div>
      <div class="call-action-btn" onclick="acceptAudio()">
        <div class="call-action-circle" style="background:linear-gradient(135deg,#406080,#608090);box-shadow:0 8px 24px rgba(96,128,160,.4)">🎙️</div>
        <div class="call-action-label">ხმა</div>
      </div>
      <div class="call-action-btn" onclick="acceptCall()">
        <div class="call-action-circle btn-accept">📹</div>
        <div class="call-action-label">ვიდეო</div>
      </div>
    </div>
  </div>

  <!-- ========== OUTGOING ========== -->
  <div id="outgoingScreen">
    <div class="outgoing-label">ზარი...</div>
    <div class="call-avatar-ring">
      <div class="ring"></div><div class="ring"></div>
      <div class="call-avatar" id="outgoingAvatar">👤</div>
    </div>
    <div class="caller-name" id="outgoingName">სახელი</div>
    <div class="call-type-badge" id="outgoingTypeBadge">📹 ვიდეო ზარი</div>
    <div class="calling-dots">
      <div class="calling-dot"></div>
      <div class="calling-dot"></div>
      <div class="calling-dot"></div>
    </div>
    <div style="margin-top:16px">
      <div class="call-action-btn" onclick="cancelOutgoing()">
        <div class="call-action-circle btn-decline" style="width:64px;height:64px;font-size:26px">📵</div>
        <div class="call-action-label" style="margin-top:2px">გაუქმება</div>
      </div>
    </div>
  </div>

  <!-- ========== ACTIVE CALL ========== -->
  <div id="activeScreen">
    <div id="remoteVideoWrap">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="remote-no-video" id="remoteNoVideo">
        <div class="remote-avatar" id="activeAvatar" style="position:relative">
          <span id="activeAvatarContent">👤</span>
          <div class="speaking-ring" id="speakingRing"></div>
        </div>
        <div style="font-size:16px;color:var(--text2)" id="activePeerName">სახელი</div>
      </div>
      <div class="remote-name-overlay">
        <div class="remote-name-pill" id="remoteNamePill">👤</div>
        <div class="call-timer-pill" id="callTimer">00:00</div>
      </div>
      <div class="conn-badge connecting" id="connBadge">🔄 დაკავშირება...</div>
    </div>

    <!-- Local PIP -->
    <div id="localVideoWrap">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="local-no-video" id="localNoVideo">😊</div>
    </div>

    <!-- Audio Visualizer -->
    <div id="audioViz" id="audioViz"></div>

    <!-- Controls -->
    <div id="callControls">
      <div class="ctrl-btn" onclick="toggleMic()">
        <div class="ctrl-circle" id="micBtn">🎙️</div>
        <div class="ctrl-label" id="micLabel">ხმა</div>
      </div>
      <div class="ctrl-btn" onclick="toggleCam()">
        <div class="ctrl-circle" id="camBtn">📹</div>
        <div class="ctrl-label" id="camLabel">კამერა</div>
      </div>
      <div class="ctrl-btn" onclick="toggleSpeaker()">
        <div class="ctrl-circle" id="spkBtn">🔊</div>
        <div class="ctrl-label">სპიკერი</div>
      </div>
      <div class="ctrl-btn" onclick="raiseHand()">
        <div class="ctrl-circle" id="handBtn">✋</div>
        <div class="ctrl-label">ხელი</div>
      </div>
      <div class="ctrl-btn" onclick="endCall()">
        <div class="ctrl-circle danger">📵</div>
        <div class="ctrl-label">გათიშვა</div>
      </div>
    </div>
  </div>

  <!-- ========== ENDED ========== -->
  <div id="endedScreen">
    <div class="ended-icon">📵</div>
    <div class="ended-title" id="endedTitle">ზარი დასრულდა</div>
    <div class="ended-duration" id="endedDuration">ხანგრძლივობა: 00:00</div>
    <button class="back-btn" onclick="window.close()">← დახურვა</button>
  </div>

</div>

<script>
const {createClient} = supabase;
const sb = createClient(

// ============ STATE ============
let ME = null, MYPROF = null;
let callId = null, peerId = null, peerProfile = null;
let localStream = null, remoteStream = null;
let peerConnection = null;
let callMode = 'video'; // 'video' | 'audio'
let micMuted = false, camOff = false, spkMuted = false;
let callTimerInterval = null, callSeconds = 0;
let callCh = null;
let audioContext = null, analyser = null, vizBars = [];
let ringtoneOscillators = [];
let audioOnlyMode = false;

const ICE_SERVERS = {
  iceServers: [
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'stun:stun2.l.google.com:19302'},
  ]
};

// ============ RINGTONE ============
function playRingtone(type = 'incoming') {
  stopRingtone();
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const pattern = type === 'incoming' ? [800, 600, 0, 800, 600, 0] : [440, 0, 440, 0];
    let time = ctx.currentTime;
    const osc = [];
    function makeBeep(freq, dur) {
      if (!freq) { time += dur; return; }
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(0.3, time + 0.02);
      g.gain.linearRampToValueAtTime(0.3, time + dur - 0.02);
      g.gain.linearRampToValueAtTime(0, time + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(time); o.stop(time + dur);
      time += dur;
      osc.push(o);
    }
    function playPattern() {
      time = ctx.currentTime;
      if (type === 'incoming') {
        makeBeep(900, 0.15); makeBeep(700, 0.1); makeBeep(0, 0.1);
        makeBeep(900, 0.15); makeBeep(700, 0.1); makeBeep(0, 0.5);
      } else {
        makeBeep(440, 0.4); makeBeep(0, 0.2); makeBeep(440, 0.4); makeBeep(0, 1.5);
      }
    }
    playPattern();
    const interval = setInterval(playPattern, type === 'incoming' ? 2500 : 2800);
    ringtoneOscillators = [ctx, interval];
  } catch(e) {}
}
function stopRingtone() {
  if (ringtoneOscillators.length) {
    try { clearInterval(ringtoneOscillators[1]); ringtoneOscillators[0].close(); } catch(e) {}
    ringtoneOscillators = [];
  }
}
function playTone(freq, dur) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}

// ============ UTILS ============
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}
function showScreen(name) {
  ['incomingScreen','outgoingScreen','activeScreen','endedScreen'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.style.display = 'none';
  });
  const el = document.getElementById(name + 'Screen');
  if (el) { el.style.display = 'flex'; el.classList.add('active'); }
}
function fmtTime(s) {
  const m = Math.floor(s / 60);
  return String(m).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}
function startTimer() {
  callSeconds = 0;
  clearInterval(callTimerInterval);
  callTimerInterval = setInterval(() => {
    callSeconds++;
    document.getElementById('callTimer').textContent = fmtTime(callSeconds);
  }, 1000);
}
function stopTimer() {
  clearInterval(callTimerInterval);
}

// ============ WEBRTC ============
async function setupPeerConnection() {
  if (peerConnection) { try { peerConnection.close(); } catch(e) {} }
  peerConnection = new RTCPeerConnection(ICE_SERVERS);

  peerConnection.onicecandidate = async (e) => {
    if (e.candidate) {
      await sb.from('call_signals').insert({
        call_id: callId, sender_id: ME.id,
        type: 'ice', payload: JSON.stringify(e.candidate)
      });
    }
  };

  peerConnection.onconnectionstatechange = () => {
    const state = peerConnection.connectionState;
    const badge = document.getElementById('connBadge');
    if (state === 'connected') {
      badge.textContent = '● დაკავშირებულია';
      badge.className = 'conn-badge connected';
      setTimeout(() => badge.style.opacity = '0', 3000);
    } else if (state === 'connecting') {
      badge.textContent = '🔄 დაკავშირება...';
      badge.className = 'conn-badge connecting';
      badge.style.opacity = '1';
    } else if (state === 'failed' || state === 'disconnected') {
      badge.textContent = '⚠️ კავშირი გაწყდა';
      badge.className = 'conn-badge poor';
      badge.style.opacity = '1';
    }
  };

  peerConnection.ontrack = (e) => {
    remoteStream = e.streams[0];
    const remoteVideo = document.getElementById('remoteVideo');
    remoteVideo.srcObject = remoteStream;
    const hasVideo = remoteStream.getVideoTracks().length > 0;
    remoteVideo.style.display = hasVideo ? 'block' : 'none';
    document.getElementById('remoteNoVideo').style.display = hasVideo ? 'none' : 'flex';
    setupAudioVisualizer(remoteStream);
  };

  if (localStream) {
    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
  }
}

async function getLocalMedia(video = true) {
  try {
    const constraints = video ? { video: { facingMode: 'user', width: 640, height: 480 }, audio: true } : { video: false, audio: true };
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    const localVideo = document.getElementById('localVideo');
    localVideo.srcObject = localStream;
    if (video && localStream.getVideoTracks().length > 0) {
      localVideo.style.display = 'block';
      document.getElementById('localNoVideo').style.display = 'none';
    }
  } catch(e) {
    toast('⚠️ კამერა/მიკ ვერ ჩაიტვირთა — ხმოვანი რეჟიმი');
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e2) { toast('❌ მიკ ვერ'); }
    audioOnlyMode = true;
  }
}

async function setupAudioVisualizer(stream) {
  try {
    if (audioContext) audioContext.close();
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 32;
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    const vizEl = document.getElementById('audioViz');
    vizEl.innerHTML = '';
    vizBars = [];
    for (let i = 0; i < 12; i++) {
      const bar = document.createElement('div');
      bar.className = 'viz-bar';
      bar.style.setProperty('--h', '4px');
      vizEl.appendChild(bar);
      vizBars.push(bar);
    }
    function animateViz() {
      if (!analyser) return;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      vizBars.forEach((bar, i) => {
        const val = data[i] || 0;
        const h = Math.max(4, Math.round(val / 255 * 36));
        bar.style.height = h + 'px';
        bar.style.setProperty('--h', h + 'px');
        const opacity = Math.max(0.3, val / 255);
        bar.style.opacity = opacity;
      });
      // speaking ring
      const avgVol = data.reduce((a,b)=>a+b,0)/data.length;
      const ring = document.getElementById('speakingRing');
      if (ring) ring.style.opacity = avgVol > 15 ? '1' : '0';
      requestAnimationFrame(animateViz);
    }
    animateViz();
  } catch(e) {}
}

// ============ SIGNALING CHANNEL ============
function subscribeSignaling() {
  if (callCh) { try { sb.removeChannel(callCh); } catch(e) {} }
  callCh = sb.channel('call_' + callId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'call_signals', filter: `call_id=eq.${callId}` }, async (payload) => {
      const sig = payload.new;
      if (sig.sender_id === ME.id) return;
      if (sig.type === 'offer') await handleOffer(JSON.parse(sig.payload));
      else if (sig.type === 'answer') await handleAnswer(JSON.parse(sig.payload));
      else if (sig.type === 'ice') await handleIce(JSON.parse(sig.payload));
      else if (sig.type === 'end') handleRemoteEnd();
      else if (sig.type === 'accept') handlePeerAccept();
      else if (sig.type === 'decline') handlePeerDecline();
      else if (sig.type === 'cancel') handlePeerCancel();
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'calls', filter: `id=eq.${callId}` }, (payload) => {
      const s = payload.new.status;
      if (s === 'ended') handleRemoteEnd();
      else if (s === 'accepted') handlePeerAccept();
      else if (s === 'declined') handlePeerDecline();
    })
    .subscribe();
}

async function sendSignal(type, payload) {
  await sb.from('call_signals').insert({ call_id: callId, sender_id: ME.id, type, payload: JSON.stringify(payload) });
}

async function handleOffer(offer) {
  if (!peerConnection) await setupPeerConnection();
  await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  await sendSignal('answer', answer);
}

async function handleAnswer(answer) {
  if (!peerConnection) return;
  if (peerConnection.signalingState !== 'stable') {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
  }
}

async function handleIce(candidate) {
  try {
    if (peerConnection && peerConnection.remoteDescription) {
      await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    }
  } catch(e) {}
}

// ============ CALL ACTIONS ============
async function acceptCall(videoOnly = false) {
  stopRingtone(); playTone(660, 0.2);
  callMode = videoOnly ? 'audio' : 'video';
  await getLocalMedia(callMode === 'video');
  await setupPeerConnection();
  await sb.from('calls').update({ status: 'accepted' }).eq('id', callId);
  await sendSignal('accept', {});

  // Create and send offer
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  await sendSignal('offer', offer);

  showScreen('active');
  updateCallUI();
  startTimer();
}
async function acceptAudio() { await acceptCall(true); }

async function declineCall() {
  stopRingtone(); playTone(300, 0.3);
  if (callId) {
    await sb.from('calls').update({ status: 'declined', ended_at: new Date().toISOString() }).eq('id', callId);
    await sendSignal('decline', {});
  }
  showEnded('ზარი უარყოფილია', 0);
}

async function cancelOutgoing() {
  stopRingtone(); playTone(300, 0.3);
  if (callId) {
    await sb.from('calls').update({ status: 'cancelled', ended_at: new Date().toISOString() }).eq('id', callId);
    await sendSignal('cancel', {});
  }
  showEnded('ზარი გაუქმდა', 0);
}

async function endCall() {
  stopTimer(); stopRingtone();
  const dur = callSeconds;
  playTone(300, 0.5);
  if (peerConnection) { try { peerConnection.close(); } catch(e) {} peerConnection = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (audioContext) { try { audioContext.close(); } catch(e) {} audioContext = null; }
  if (callId) {
    await sb.from('calls').update({ status: 'ended', ended_at: new Date().toISOString(), duration_sec: dur }).eq('id', callId);
    await sendSignal('end', {});
  }
  if (callCh) { try { sb.removeChannel(callCh); } catch(e) {} callCh = null; }
  showEnded('ზარი დასრულდა', dur);
}

function handleRemoteEnd() {
  const dur = callSeconds;
  stopTimer(); stopRingtone();
  if (peerConnection) { try { peerConnection.close(); } catch(e) {} peerConnection = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (audioContext) { try { audioContext.close(); } catch(e) {} audioContext = null; }
  showEnded('ზარი დასრულდა', dur);
  playTone(300, 0.5);
}

async function handlePeerAccept() {
  stopRingtone();
  playTone(660, 0.15);
  document.getElementById('connBadge').style.opacity = '1';
  showScreen('active');
  updateCallUI();
  startTimer();
}

function handlePeerDecline() {
  stopRingtone();
  playTone(300, 0.5);
  showEnded('ზარი უარყოფილია', 0);
}

function handlePeerCancel() {
  stopRingtone();
  playTone(300, 0.4);
  showEnded('ზარი გაუქმდა', 0);
}

// ============ CONTROLS ============
function toggleMic() {
  micMuted = !micMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !micMuted);
  const btn = document.getElementById('micBtn');
  const lbl = document.getElementById('micLabel');
  btn.textContent = micMuted ? '🔇' : '🎙️';
  btn.classList.toggle('active-state', micMuted);
  lbl.textContent = micMuted ? 'გათიშული' : 'ხმა';
}

function toggleCam() {
  camOff = !camOff;
  if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = !camOff);
  const btn = document.getElementById('camBtn');
  const lbl = document.getElementById('camLabel');
  btn.textContent = camOff ? '📷' : '📹';
  btn.classList.toggle('active-state', camOff);
  lbl.textContent = camOff ? 'გათიშული' : 'კამერა';
  const localVid = document.getElementById('localVideo');
  const localNoVid = document.getElementById('localNoVideo');
  if (camOff) { localVid.style.display = 'none'; localNoVid.style.display = 'flex'; }
  else { localVid.style.display = 'block'; localNoVid.style.display = 'none'; }
}

function toggleSpeaker() {
  spkMuted = !spkMuted;
  const remoteVid = document.getElementById('remoteVideo');
  if (remoteVid) remoteVid.muted = spkMuted;
  const btn = document.getElementById('spkBtn');
  btn.textContent = spkMuted ? '🔇' : '🔊';
  btn.classList.toggle('active-state', spkMuted);
}

function raiseHand() {
  const btn = document.getElementById('handBtn');
  btn.classList.add('raised-hand');
  btn.textContent = '🙋';
  setTimeout(() => { btn.classList.remove('raised-hand'); btn.textContent = '✋'; }, 2000);
  toast('✋ ხელი ასწიე!');
}

function updateCallUI() {
  const nick = peerProfile?.username || '?';
  const av = peerProfile?.avatar_url || null;
  const emo = peerProfile?.emotion || '👤';

  document.getElementById('activePeerName').textContent = nick;
  document.getElementById('remoteNamePill').textContent = '👤 ' + nick;

  const avContent = document.getElementById('activeAvatarContent');
  if (av) {
    avContent.outerHTML = `<img id="activeAvatarContent" src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else {
    avContent.textContent = emo;
  }

  const localNoVid = document.getElementById('localNoVideo');
  if (MYPROF?.avatar_url) {
    localNoVid.innerHTML = `<img src="${MYPROF.avatar_url}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    localNoVid.textContent = MYPROF?.emotion || '😊';
  }
}

function showEnded(title, dur) {
  document.getElementById('endedTitle').textContent = title;
  document.getElementById('endedDuration').textContent = dur > 0 ? 'ხანგრძლივობა: ' + fmtTime(dur) : '';
  showScreen('ended');
}

// ============ INIT ============
async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.close(); return; }
  ME = user;

  const { data: prof } = await sb.from('profiles').select('*').eq('id', ME.id).single();
  MYPROF = prof;

  const params = new URLSearchParams(window.location.search);
  callId = params.get('call_id');
  peerId = params.get('peer_id');
  const role = params.get('role'); // 'caller' | 'callee'
  callMode = params.get('mode') || 'video';

  // load peer profile
  if (peerId) {
    const { data: pp } = await sb.from('profiles').select('*').eq('id', peerId).single();
    peerProfile = pp;
  }

  // If no call_id, open as standalone demo UI
  if (!callId && !peerId) {
    showDemoUI();
    return;
  }

  subscribeSignaling();

  if (role === 'callee') {
    // Show incoming
    showIncoming();
  } else {
    // Caller — start outgoing, get media, create call
    await startOutgoing();
  }
}

function showDemoUI() {
  // Standalone mode — show incoming demo
  document.getElementById('incomingName').textContent = 'ვარდო გიგაური';
  document.getElementById('incomingTypeBadge').innerHTML = '📹 ვიდეო ზარი';
  showScreen('incoming');
  playRingtone('incoming');
}

function showIncoming() {
  const nick = peerProfile?.username || '?';
  const av = peerProfile?.avatar_url || null;
  const emo = peerProfile?.emotion || '👤';
  document.getElementById('incomingName').textContent = nick;
  document.getElementById('incomingTypeBadge').innerHTML = callMode === 'video' ? '📹 ვიდეო ზარი' : '🎙️ ხმოვანი ზარი';
  const avEl = document.getElementById('incomingAvatar');
  if (av) avEl.innerHTML = `<img src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  else avEl.textContent = emo;
  showScreen('incoming');
  playRingtone('incoming');
}

async function startOutgoing() {
  const nick = peerProfile?.username || '?';
  const av = peerProfile?.avatar_url || null;
  const emo = peerProfile?.emotion || '👤';
  document.getElementById('outgoingName').textContent = nick;
  document.getElementById('outgoingTypeBadge').innerHTML = callMode === 'video' ? '📹 ვიდეო ზარი' : '🎙️ ხმოვანი ზარი';
  const avEl = document.getElementById('outgoingAvatar');
  if (av) avEl.innerHTML = `<img src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  else avEl.textContent = emo;
  showScreen('outgoing');
  playRingtone('outgoing');
  await getLocalMedia(callMode === 'video');
  await setupPeerConnection();
}

init();
</script>
