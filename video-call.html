<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ვიდეო ზარი - კაიფმანია</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0b10;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .call-container {
            width: 100%;
            max-width: 1280px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0f1117;
        }
        .call-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(18, 20, 28, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
        }
        .call-title { font-weight: 600; font-size: 16px; }
        .call-status { font-size: 12px; color: #a0a3b0; margin-left: 8px; }
        .call-actions { display: flex; gap: 12px; }
        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            font-size: 20px;
            cursor: pointer;
        }
        .end-call { background: #ff3b30; }
        .video-area {
            flex: 1;
            display: flex;
            position: relative;
            background: #000;
        }
        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 140px;
            height: 180px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            background: #1a1c2a;
        }
        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .incoming-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .incoming-card {
            background: #1c1e2c;
            border-radius: 32px;
            padding: 32px;
            text-align: center;
            width: 300px;
        }
        .incoming-card button {
            font-size: 40px;
            margin: 10px;
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        .accept { background: #34c759; }
        .decline { background: #ff3b30; }
        .hidden { display: none !important; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2e3e;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
        }
    </style>
</head>
<body>
<div class="call-container">
    <div class="call-header">
        <button class="back-btn" onclick="window.close()">←</button>
        <div class="call-title">
            📹 ვიდეო ზარი
            <span class="call-status" id="callStatus">დაკავშირება...</span>
        </div>
        <div class="call-actions">
            <button class="icon-btn" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="icon-btn" id="camBtn" onclick="toggleCam()">📷</button>
            <button class="icon-btn end-call" onclick="endCall()">📞</button>
        </div>
    </div>
    <div class="video-area">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="local-video">
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
    </div>
</div>

<div id="incomingCall" class="incoming-overlay hidden">
    <div class="incoming-card">
        <div style="font-size: 64px; margin-bottom: 16px;">📞</div>
        <div style="font-size: 20px; font-weight: bold;" id="callerName">მეგობარი</div>
        <div style="margin: 16px 0;">ვიდეო ზარი</div>
        <div>
            <button class="accept" onclick="acceptCall()">✅</button>
            <button class="decline" onclick="declineCall()">❌</button>
        </div>
    </div>
</div>

<script>
    // WebRTC ვიდეო ზარი - დემო ვერსია (localStorage სიგნალიზაციით)
    let localStream = null;
    let peerConnection = null;
    let callActive = false;
    let myId = Math.random().toString(36).substr(2, 8);
    
    const configuration = {
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };
    
    async function startLocalStream() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            return true;
        } catch(e) {
            showToast('❌ კამერა/მიკროფონი არ არის');
            return false;
        }
    }
    
    async function startCall(isCaller, targetId = null) {
        if (!localStream && !await startLocalStream()) return;
        
        peerConnection = new RTCPeerConnection(configuration);
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });
        
        peerConnection.ontrack = (event) => {
            document.getElementById('remoteVideo').srcObject = event.streams[0];
            document.getElementById('callStatus').innerText = '🔴 ზარში';
            callActive = true;
        };
        
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                sendSignal('ice', { candidate: event.candidate });
            }
        };
        
        if (isCaller) {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            sendSignal('offer', { offer: offer });
            document.getElementById('callStatus').innerText = '📞 რეკავს...';
        }
    }
    
    function sendSignal(type, data) {
        const signal = { from: myId, type, data, time: Date.now() };
        localStorage.setItem('webrtc_signal', JSON.stringify(signal));
        setTimeout(() => { if (localStorage.getItem('webrtc_signal') === JSON.stringify(signal)) localStorage.removeItem('webrtc_signal'); }, 1000);
    }
    
    function listenForSignals() {
        window.addEventListener('storage', async (e) => {
            if (e.key === 'webrtc_signal' && e.newValue) {
                const signal = JSON.parse(e.newValue);
                if (signal.from === myId) return;
                
                if (signal.type === 'offer' && !callActive) {
                    document.getElementById('callerName').innerText = 'მეგობარი';
                    document.getElementById('incomingCall').classList.remove('hidden');
                    window.pendingOffer = signal.data.offer;
                } else if (signal.type === 'answer' && peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: signal.data.answer }));
                } else if (signal.type === 'ice' && peerConnection) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(signal.data.candidate));
                }
            }
        });
    }
    
    async function acceptCall() {
        document.getElementById('incomingCall').classList.add('hidden');
        if (!localStream && !await startLocalStream()) return;
        
        await startCall(false);
        if (window.pendingOffer) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(window.pendingOffer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            sendSignal('answer', { answer: answer });
            window.pendingOffer = null;
        }
    }
    
    function declineCall() {
        document.getElementById('incomingCall').classList.add('hidden');
        showToast('📵 ზარი უარყოფილია');
    }
    
    function endCall() {
        if (peerConnection) peerConnection.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        callActive = false;
        showToast('📴 ზარი დასრულდა');
        setTimeout(() => window.close(), 500);
    }
    
    function toggleMic() {
        if (localStream) {
            const audio = localStream.getAudioTracks()[0];
            if (audio) audio.enabled = !audio.enabled;
        }
    }
    
    function toggleCam() {
        if (localStream) {
            const video = localStream.getVideoTracks()[0];
            if (video) video.enabled = !video.enabled;
        }
    }
    
    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    // ავტომატურად დარეკვა (დემო)
    async function autoStart() {
        await startLocalStream();
        listenForSignals();
        setTimeout(() => {
            if (!callActive) {
                startCall(true);
            }
        }, 500);
    }
    
    autoStart();
</script>
</body>
</html>
