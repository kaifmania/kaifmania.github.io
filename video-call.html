<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>კაიფმანია - ვიდეო ზარი</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg: #0a0a12;
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.1);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.7);
  --text3: rgba(255,255,255,0.4);
  --accent: #a855f7;
  --accent2: #7c3aed;
  --green: #4ade80;
  --red: #ef4444;
  --red2: #dc2626;
  --yellow: #fbbf24;
}

body{
  font-family:'Noto Sans Georgian',sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ===== ANIMATED BACKGROUND ===== */
.bg-orbs{
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.orb{
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  animation: orbFloat 8s ease-in-out infinite;
}
.orb1{ width:400px;height:400px;background:#7c3aed;top:-100px;left:-100px;animation-delay:0s; }
.orb2{ width:300px;height:300px;background:#1d4ed8;bottom:-80px;right:-60px;animation-delay:-3s; }
.orb3{ width:200px;height:200px;background:#a855f7;top:40%;left:50%;transform:translate(-50%,-50%);animation-delay:-5s; }

@keyframes orbFloat{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-30px) scale(1.05)}
}

/* ===== INCOMING CALL SCREEN ===== */
#incomingScreen{
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 32px;
  text-align: center;
}

.caller-avatar-ring{
  position: relative;
  width: 140px;
  height: 140px;
}
.caller-avatar-ring::before,
.caller-avatar-ring::after{
  content:'';
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  opacity: 0;
  animation: ringPulse 2s ease-out infinite;
}
.caller-avatar-ring::after{
  inset: -24px;
  animation-delay: 0.5s;
}
@keyframes ringPulse{
  0%{opacity:0.8;transform:scale(0.9)}
  100%{opacity:0;transform:scale(1.3)}
}
.caller-avatar{
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 56px;
  overflow: hidden;
  border: 3px solid rgba(168,85,247,0.5);
  box-shadow: 0 0 40px rgba(168,85,247,0.3);
  position: relative;
  z-index: 1;
}
.caller-avatar img{
  width:100%;height:100%;object-fit:cover;border-radius:50%;
}
.caller-name{
  font-family:'Unbounded',sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}
.caller-status{
  font-size: 14px;
  color: var(--text2);
  animation: fadeInOut 1.5s ease-in-out infinite;
}
@keyframes fadeInOut{
  0%,100%{opacity:0.5}
  50%{opacity:1}
}
.call-type-badge{
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border-radius: 20px;
  background: rgba(168,85,247,0.15);
  border: 1px solid rgba(168,85,247,0.3);
  font-size: 13px;
  color: var(--accent);
}
.incoming-actions{
  display: flex;
  gap: 40px;
  margin-top: 12px;
}
.inc-btn{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: transform 0.2s;
}
.inc-btn:hover{ transform: scale(1.08); }
.inc-btn-circle{
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.inc-accept{ background: linear-gradient(135deg, #16a34a, var(--green)); }
.inc-accept:hover{ box-shadow: 0 8px 32px rgba(74,222,128,0.5); }
.inc-reject{ background: linear-gradient(135deg, var(--red2), var(--red)); }
.inc-reject:hover{ box-shadow: 0 8px 32px rgba(239,68,68,0.5); }
.inc-btn-label{
  font-size: 12px;
  color: var(--text2);
  font-family:'Unbounded',sans-serif;
  letter-spacing: 0.5px;
}

/* ===== OUTGOING CALL SCREEN ===== */
#outgoingScreen{
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 32px;
  text-align: center;
}
.sound-bars{
  display: flex;
  gap: 4px;
  align-items: flex-end;
  height: 32px;
}
.sound-bar{
  width: 4px;
  border-radius: 2px;
  background: var(--accent);
  animation: soundPulse 0.8s ease-in-out infinite;
}
.sound-bar:nth-child(1){height:10px;animation-delay:0s}
.sound-bar:nth-child(2){height:20px;animation-delay:.1s}
.sound-bar:nth-child(3){height:28px;animation-delay:.2s}
.sound-bar:nth-child(4){height:20px;animation-delay:.3s}
.sound-bar:nth-child(5){height:10px;animation-delay:.4s}
@keyframes soundPulse{
  0%,100%{transform:scaleY(0.5);opacity:0.5}
  50%{transform:scaleY(1);opacity:1}
}

/* ===== ACTIVE CALL SCREEN ===== */
#callScreen{
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  display: none;
}

/* Remote video */
#remoteVideoWrap{
  flex: 1;
  position: relative;
  background: #050508;
  overflow: hidden;
}
#remoteVideo{
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.remote-placeholder{
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.remote-ph-av{
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  overflow: hidden;
  border: 2px solid rgba(168,85,247,0.4);
}
.remote-ph-av img{ width:100%;height:100%;object-fit:cover;border-radius:50%; }
.remote-ph-name{
  font-family:'Unbounded',sans-serif;
  font-size: 20px;
  font-weight: 700;
}
.remote-ph-status{
  font-size: 13px;
  color: var(--text3);
}

/* Call timer */
.call-timer{
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 18px;
  font-family:'Unbounded',sans-serif;
  font-size: 14px;
  color: var(--text);
  letter-spacing: 2px;
  z-index: 10;
}
.call-quality{
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 11px;
  color: var(--text2);
  z-index: 10;
}
.quality-dot{
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

/* Local video (PiP) */
#localVideoWrap{
  position: absolute;
  bottom: 120px;
  right: 16px;
  width: 120px;
  border-radius: 14px;
  overflow: hidden;
  border: 2px solid rgba(168,85,247,0.5);
  background: #0a0a12;
  cursor: pointer;
  transition: all 0.3s;
  z-index: 20;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#localVideoWrap:hover{
  transform: scale(1.05);
  border-color: var(--accent);
}
#localVideo{
  width: 100%;
  display: block;
  transform: scaleX(-1);
  background: #1a1a2e;
}
.local-label{
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: rgba(255,255,255,0.7);
  font-family:'Unbounded',sans-serif;
  letter-spacing:0.5px;
  white-space:nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.cam-off-overlay{
  position:absolute;
  inset:0;
  background:rgba(10,10,18,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  display:none;
}

/* Controls bar */
.controls-bar{
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px 24px 32px;
  display: flex;
  justify-content: center;
  gap: 16px;
  align-items: center;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
  z-index: 30;
}

.ctrl-btn{
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  background: var(--surface2);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  position: relative;
}
.ctrl-btn:hover{
  background: rgba(255,255,255,0.15);
  transform: scale(1.08);
}
.ctrl-btn.active-mute{
  background: rgba(239,68,68,0.2);
  border-color: rgba(239,68,68,0.4);
}
.ctrl-btn.end{
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--red2), var(--red));
  border: none;
  box-shadow: 0 4px 20px rgba(239,68,68,0.4);
  font-size: 24px;
}
.ctrl-btn.end:hover{
  box-shadow: 0 6px 28px rgba(239,68,68,0.6);
}
.ctrl-label{
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--text3);
  white-space: nowrap;
  font-family:'Unbounded',sans-serif;
  letter-spacing: 0.3px;
}

/* ===== ENDED SCREEN ===== */
#endedScreen{
  position: fixed;
  inset: 0;
  z-index: 100;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 32px;
}
.ended-icon{
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(239,68,68,0.15);
  border: 2px solid rgba(239,68,68,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}
.ended-title{
  font-family:'Unbounded',sans-serif;
  font-size: 20px;
  font-weight: 700;
}
.ended-sub{
  font-size: 14px;
  color: var(--text3);
}
.ended-duration{
  font-family:'Unbounded',sans-serif;
  font-size: 28px;
  color: var(--accent);
  margin: 8px 0;
}
.close-btn{
  margin-top: 8px;
  padding: 12px 32px;
  border-radius: 30px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family:'Noto Sans Georgian',sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.close-btn:hover{
  background: rgba(255,255,255,0.1);
  border-color: var(--accent);
}

/* ===== TOAST ===== */
.toast{
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 9999;
  white-space: nowrap;
  animation: toastPop 0.3s ease;
  pointer-events: none;
}
@keyframes toastPop{
  from{opacity:0;transform:translateX(-50%) translateY(10px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

@media(max-width:480px){
  .caller-avatar,.caller-avatar-ring{width:110px;height:110px;}
  .caller-avatar-ring::before{inset:-10px}
  .caller-avatar-ring::after{inset:-20px}
  .caller-name{font-size:20px}
  #localVideoWrap{width:90px;bottom:100px;}
  .ctrl-btn{width:48px;height:48px;font-size:18px;}
  .ctrl-btn.end{width:56px;height:56px;font-size:20px;}
}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- INCOMING CALL -->
<div id="incomingScreen" style="display:none">
  <div class="caller-avatar-ring">
    <div class="caller-avatar" id="incAv">📞</div>
  </div>
  <div class="caller-name" id="incName">?</div>
  <div class="caller-status" id="incStatus">გიბარებთ ვიდეო ზარზე...</div>
  <div class="call-type-badge">📷 ვიდეო ზარი</div>
  <div class="incoming-actions">
    <div class="inc-btn" onclick="acceptCall()">
      <button class="inc-btn-circle inc-accept">📞</button>
      <span class="inc-btn-label">პასუხი</span>
    </div>
    <div class="inc-btn" onclick="rejectCall()">
      <button class="inc-btn-circle inc-reject">📵</button>
      <span class="inc-btn-label">უარი</span>
    </div>
  </div>
</div>

<!-- OUTGOING CALL -->
<div id="outgoingScreen" style="display:none">
  <div class="caller-avatar-ring">
    <div class="caller-avatar" id="outAv">📞</div>
  </div>
  <div class="caller-name" id="outName">?</div>
  <div class="caller-status">დარეკვა...</div>
  <div class="sound-bars">
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
  </div>
  <button onclick="cancelCall()" style="margin-top:16px;padding:12px 32px;border-radius:30px;border:1px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.12);color:#ef4444;font-family:'Noto Sans Georgian',sans-serif;font-size:14px;cursor:pointer">
    📵 გაუქმება
  </button>
</div>

<!-- ACTIVE CALL -->
<div id="callScreen">
  <div id="remoteVideoWrap">
    <video id="remoteVideo" autoplay playsinline style="width:100%;height:100%;object-fit:cover;display:none"></video>
    <div class="remote-placeholder" id="remotePlaceholder">
      <div class="remote-ph-av" id="remotePHAv">👤</div>
      <div class="remote-ph-name" id="remotePHName">?</div>
      <div class="remote-ph-status" id="remotePHStatus">კავშირი...</div>
    </div>

    <div class="call-timer" id="callTimer">00:00</div>
    <div class="call-quality" id="callQuality">
      <div class="quality-dot"></div>
      <span id="qualityText">კარგი</span>
    </div>

    <!-- Local PiP -->
    <div id="localVideoWrap" onclick="swapVideos()">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="local-label">შენ</div>
      <div class="cam-off-overlay" id="camOffOverlay">📷</div>
    </div>
  </div>

  <div class="controls-bar">
    <button class="ctrl-btn" id="micBtn" onclick="toggleMic()" title="მიკრ.">
      🎤
      <span class="ctrl-label">მიკ.</span>
    </button>
    <button class="ctrl-btn" id="camBtn" onclick="toggleCam()" title="კამ.">
      📷
      <span class="ctrl-label">კამ.</span>
    </button>
    <button class="ctrl-btn end" onclick="endCall()" title="გათ.">
      📵
    </button>
    <button class="ctrl-btn" id="flipBtn" onclick="flipCamera()" title="გადაბ.">
      🔄
      <span class="ctrl-label">გადაბ.</span>
    </button>
    <button class="ctrl-btn" id="speakerBtn" onclick="toggleSpeaker()" title="სპ.">
      🔊
      <span class="ctrl-label">სპ.</span>
    </button>
  </div>
</div>

<!-- ENDED -->
<div id="endedScreen">
  <div class="ended-icon">📵</div>
  <div class="ended-title">ზარი დასრულდა</div>
  <div class="ended-duration" id="endedDuration">00:00</div>
  <div class="ended-sub" id="endedWith">?</div>
  <button class="close-btn" onclick="window.close()">✕ დახურვა</button>
</div>

let ME = null, MY_PROF = null, OTHER_PROF = null;

/* ===== AUDIO ===== */
function playRingtone() {
  stopRingtone();
  // Oscillator-based ringtone — no external file needed
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    let t = ctx.currentTime;
    ringtoneAudio = {ctx, oscillators:[], stop: function(){
      this.oscillators.forEach(o=>{try{o.stop();}catch(e){}});
      try{this.ctx.close();}catch(e){}
    }};
    function makeBeep(freq, start, dur) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.3, start + 0.02);
      gain.gain.setValueAtTime(0.3, start + dur - 0.02);
      gain.gain.linearRampToValueAtTime(0, start + dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(start + dur);
      ringtoneAudio.oscillators.push(osc);
    }
    // Repeating musical ringtone: C5-E5-G5 pattern
    for(let i=0; i<6; i++){
      const base = t + i * 1.8;
      makeBeep(523.25, base, 0.18);       // C5
      makeBeep(659.25, base + 0.22, 0.18); // E5
      makeBeep(783.99, base + 0.44, 0.25); // G5
      makeBeep(659.25, base + 0.73, 0.15); // E5
    }
  } catch(e) { console.log('audio ctx failed', e); }
}

function playCallConnectSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    function beep(f, s, d) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, s);
      gain.gain.linearRampToValueAtTime(0.25, s + 0.01);
      gain.gain.setValueAtTime(0.25, s + d - 0.01);
      gain.gain.linearRampToValueAtTime(0, s + d);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(s);
      osc.stop(s + d);
    }
    beep(523.25, t, 0.12);
    beep(783.99, t + 0.15, 0.18);
    setTimeout(()=>ctx.close(), 1000);
  } catch(e) {}
}

function playCallEndSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    function beep(f, s, d) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0.25, s);
      gain.gain.setValueAtTime(0.25, s+d-0.02);
      gain.gain.linearRampToValueAtTime(0, s+d);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(s);
      osc.stop(s+d);
    }
    beep(440, t, 0.12);
    beep(349.23, t+0.15, 0.12);
    beep(293.66, t+0.30, 0.20);
    setTimeout(()=>ctx.close(), 1000);
  } catch(e) {}
}

function stopRingtone() {
  if(ringtoneAudio){
    try { ringtoneAudio.stop(); } catch(e){}
    ringtoneAudio = null;
  }
}

/* ===== TIMER ===== */
function startTimer() {
  callStartTime = Date.now();
  timerInterval = setInterval(()=>{
    const sec = Math.floor((Date.now()-callStartTime)/1000);
    const m = String(Math.floor(sec/60)).padStart(2,'0');
    const s = String(sec%60).padStart(2,'0');
    const t = `${m}:${s}`;
    document.getElementById('callTimer').textContent = t;
    document.getElementById('endedDuration').textContent = t;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

/* ===== UI HELPERS ===== */
function showScreen(name) {
  ['incomingScreen','outgoingScreen','callScreen','endedScreen'].forEach(id=>{
    const el = document.getElementById(id);
    el.style.display = 'none';
    if(id==='callScreen') el.style.display = 'none';
  });
  const target = document.getElementById(name+'Screen');
  if(target) {
    if(name === 'call') target.style.display = 'flex';
    else target.style.display = 'flex';
  }
}

function toast(msg) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function setAvatarEl(elId, prof) {
  const el = document.getElementById(elId);
  if(!el) return;
  if(prof?.avatar_url) {
    el.innerHTML = `<img src="${prof.avatar_url}" alt="">`;
  } else {
    el.textContent = prof?.emotion || '👤';
  }
}

/* ===== WEBRTC ===== */
async function getLocalStream() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentCamera, width:{ideal:1280}, height:{ideal:720} },
      audio: { echoCancellation:true, noiseSuppression:true }
    });
    document.getElementById('localVideo').srcObject = localStream;
    return true;
  } catch(err) {
    toast('❌ კამერა/მიკ. ვერ ჩაირთო');
    console.error(err);
    return false;
  }
}

async function setupPC(isCaller) {
  if(peerConnection) { try{peerConnection.close();}catch(e){} }
  peerConnection = new RTCPeerConnection(config);

  if(localStream) {
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
  }

  peerConnection.ontrack = (e) => {
    const rv = document.getElementById('remoteVideo');
    rv.srcObject = e.streams[0];
    rv.style.display = 'block';
    document.getElementById('remotePlaceholder').style.display = 'none';
    document.getElementById('remotePHStatus').textContent = '✅ კავშირი';
    playCallConnectSound();
    startTimer();
    showScreen('call');
  };

  peerConnection.onconnectionstatechange = () => {
    const st = peerConnection.connectionState;
    const qualEl = document.getElementById('qualityText');
    const dotEl = document.querySelector('.quality-dot');
    if(st==='connected') {
      qualEl.textContent = 'კარგი';
      dotEl.style.background = '#4ade80';
    } else if(st==='disconnected') {
      qualEl.textContent = 'სუსტი';
      dotEl.style.background = '#fbbf24';
      toast('⚠️ კავშირი შეწყდა');
    } else if(st==='failed') {
      qualEl.textContent = 'ვერ';
      dotEl.style.background = '#ef4444';
      toast('❌ კავშირი ვერ მოხ.');
    }
  };

  peerConnection.oniceconnectionstatechange = () => {
    if(peerConnection.iceConnectionState === 'connected') {
      document.getElementById('remotePHStatus').textContent = '✅ კავშირი';
    }
  };
}

/* ===== OUTGOING ===== */
async function startOutgoingCall() {
  showScreen('outgoing');
  document.getElementById('outName').textContent = OTHER_PROF?.username || '?';
  setAvatarEl('outAv', OTHER_PROF);

  const ok = await getLocalStream();
  if(!ok) { showScreen('ended'); return; }

  const roomName = `vcall_${[ME.id, TO_UID].sort().join('_')}`;
  if(callChannel) { try{await sb.removeChannel(callChannel);}catch(e){} }
  callChannel = sb.channel(roomName);

  await setupPC(true);

  peerConnection.onicecandidate = (e) => {
    if(e.candidate && callChannel?.subscribed) {
      callChannel.send({type:'broadcast',event:'ice',payload:{candidate:e.candidate,to:TO_UID}});
    }
  };

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  callChannel
    .on('broadcast',{event:'answer'},async({payload})=>{
      if(payload.to===ME.id) {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.answer));
      }
    })
    .on('broadcast',{event:'ice'},async({payload})=>{
      if(payload.to===ME.id && payload.candidate) {
        try{await peerConnection.addIceCandidate(new RTCIceCandidate(payload.candidate));}catch(e){}
      }
    })
    .on('broadcast',{event:'end'},({payload})=>{
      if(payload.to===ME.id) { toast('📵 მოპ. გათიშა'); doEndCall(false); }
    })
    .on('broadcast',{event:'reject'},({payload})=>{
      if(payload.to===ME.id) { toast('📵 ზარი უარყოფილია'); doEndCall(false); }
    });

  await callChannel.subscribe();

  setTimeout(()=>{
    if(callChannel?.subscribed) {
      // Signal via dedicated incoming channel for the other user
      const incCh = sb.channel(`vcall_incoming_${TO_UID}`);
      incCh.subscribe(async (status) => {
        if(status === 'SUBSCRIBED') {
          await incCh.send({
            type:'broadcast', event:'offer',
            payload: { offer, from: ME.id, to: TO_UID, callerName: MY_PROF?.username, roomName }
          });
          setTimeout(()=>{ try{sb.removeChannel(incCh);}catch(e){} }, 3000);
        }
      });
    }
  }, 600);
}

/* ===== INCOMING ===== */
async function listenIncoming() {
  const incCh = sb.channel(`vcall_incoming_${ME.id}`);
  incCh.on('broadcast',{event:'offer'},async ({payload})=>{
    if(payload.to !== ME.id) return;

    // Load caller profile
    const {data} = await sb.from('profiles').select('*').eq('id',payload.from).single();
    OTHER_PROF = data;
    pendingOffer = payload;

    document.getElementById('incName').textContent = data?.username || '?';
    document.getElementById('incStatus').textContent = data?.status ? `"${data.status}"` : 'გიბარებთ...';
    setAvatarEl('incAv', data);

    playRingtone();
    showScreen('incoming');
  }).subscribe();
}

async function acceptCall() {
  stopRingtone();
  if(!pendingOffer) return;
  showScreen('call');

  const ok = await getLocalStream();
  if(!ok) { showScreen('ended'); return; }

  const roomName = pendingOffer.roomName || `vcall_${[ME.id, pendingOffer.from].sort().join('_')}`;
  if(callChannel) { try{await sb.removeChannel(callChannel);}catch(e){} }
  callChannel = sb.channel(roomName);

  await setupPC(false);

  peerConnection.onicecandidate = (e) => {
    if(e.candidate && callChannel?.subscribed) {
      callChannel.send({type:'broadcast',event:'ice',payload:{candidate:e.candidate,to:pendingOffer.from}});
    }
  };

  callChannel
    .on('broadcast',{event:'ice'},async({payload})=>{
      if(payload.to===ME.id && payload.candidate) {
        try{await peerConnection.addIceCandidate(new RTCIceCandidate(payload.candidate));}catch(e){}
      }
    })
    .on('broadcast',{event:'end'},({payload})=>{
      if(payload.to===ME.id) { toast('📵 მოპ. გათიშა'); doEndCall(false); }
    });

  await callChannel.subscribe();

  await peerConnection.setRemoteDescription(new RTCSessionDescription(pendingOffer.offer));
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  callChannel.send({type:'broadcast',event:'answer',payload:{answer,to:pendingOffer.from}});

  // Update remote placeholder
  document.getElementById('remotePHName').textContent = OTHER_PROF?.username || '?';
  if(OTHER_PROF?.avatar_url) {
    document.getElementById('remotePHAv').innerHTML = `<img src="${OTHER_PROF.avatar_url}" alt="">`;
  } else {
    document.getElementById('remotePHAv').textContent = OTHER_PROF?.emotion || '👤';
  }

  pendingOffer = null;
}

function rejectCall() {
  stopRingtone();
  if(pendingOffer && callChannel?.subscribed) {
    try {
      callChannel.send({type:'broadcast',event:'reject',payload:{to:pendingOffer.from}});
    } catch(e){}
  }
  pendingOffer = null;
  showScreen('ended');
  document.getElementById('endedWith').textContent = '';
  document.getElementById('endedDuration').textContent = '00:00';
}

function cancelCall() {
  if(callChannel?.subscribed && TO_UID) {
    try {
      callChannel.send({type:'broadcast',event:'end',payload:{to:TO_UID}});
    } catch(e){}
  }
  doEndCall(false);
}

/* ===== CONTROLS ===== */
function toggleMic() {
  if(!localStream) return;
  isMicMuted = !isMicMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);
  const btn = document.getElementById('micBtn');
  btn.textContent = isMicMuted ? '🎙️' : '🎤';
  btn.classList.toggle('active-mute', isMicMuted);
  toast(isMicMuted ? '🎙️ მიკ. გამოთ.' : '🎤 მიკ. ჩართ.');
}

function toggleCam() {
  if(!localStream) return;
  isCamOff = !isCamOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isCamOff);
  const btn = document.getElementById('camBtn');
  btn.textContent = isCamOff ? '🚫' : '📷';
  btn.classList.toggle('active-mute', isCamOff);
  document.getElementById('camOffOverlay').style.display = isCamOff ? 'flex' : 'none';
  toast(isCamOff ? '📷 კამ. გამოთ.' : '📷 კამ. ჩართ.');
}

async function flipCamera() {
  if(!localStream) return;
  currentCamera = currentCamera === 'user' ? 'environment' : 'user';
  try {
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode: currentCamera},
      audio: true
    });
    const newVideoTrack = newStream.getVideoTracks()[0];
    const oldVideoTrack = localStream.getVideoTracks()[0];
    if(oldVideoTrack) { localStream.removeTrack(oldVideoTrack); oldVideoTrack.stop(); }
    localStream.addTrack(newVideoTrack);
    document.getElementById('localVideo').srcObject = localStream;
    if(peerConnection) {
      const sender = peerConnection.getSenders().find(s => s.track?.kind === 'video');
      if(sender) await sender.replaceTrack(newVideoTrack);
    }
    toast('🔄 კამერა შეიცვალა');
  } catch(e) { toast('❌ კამ. ვერ შეიც.'); }
}

function toggleSpeaker() {
  isSpeakerOff = !isSpeakerOff;
  const rv = document.getElementById('remoteVideo');
  rv.muted = isSpeakerOff;
  const btn = document.getElementById('speakerBtn');
  btn.textContent = isSpeakerOff ? '🔇' : '🔊';
  btn.classList.toggle('active-mute', isSpeakerOff);
  toast(isSpeakerOff ? '🔇 ხმა გამოთ.' : '🔊 ხმა ჩართ.');
}

function swapVideos() {
  // Swap local and remote videos
  const rv = document.getElementById('remoteVideo');
  const lv = document.getElementById('localVideo');
  const tmp = rv.srcObject;
  rv.srcObject = lv.srcObject;
  lv.srcObject = tmp;
  lv.muted = !lv.muted;
}

function endCall() {
  doEndCall(true);
}

async function doEndCall(sendSignal = true) {
  stopRingtone();
  stopTimer();
  playCallEndSound();

  if(sendSignal && callChannel?.subscribed && (TO_UID || pendingOffer?.from)) {
    try {
      callChannel.send({
        type:'broadcast', event:'end',
        payload: { to: TO_UID || pendingOffer?.from }
      });
    } catch(e){}
  }

  if(peerConnection) { try{peerConnection.close();}catch(e){} peerConnection = null; }
  if(localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
  if(callChannel) { try{await sb.removeChannel(callChannel);}catch(e){} callChannel = null; }

  document.getElementById('localVideo').srcObject = null;
  document.getElementById('remoteVideo').srcObject = null;

  const otherName = OTHER_PROF?.username || MY_PROF?.username || '?';
  document.getElementById('endedWith').textContent = otherName + 'თან საუბარი';

  showScreen('ended');
  document.getElementById('endedScreen').style.display = 'flex';
}

/* ===== INIT ===== */
async function init() {
  const {data:{user}} = await sb.auth.getUser();
  if(!user) { window.close(); return; }
  ME = user;

  const {data: myProf} = await sb.from('profiles').select('*').eq('id', ME.id).single();
  MY_PROF = myProf;

  if(MODE === 'outgoing' && TO_UID) {
    const {data: otherProf} = await sb.from('profiles').select('*').eq('id', TO_UID).single();
    OTHER_PROF = otherProf;

    // Setup remote placeholder
    document.getElementById('remotePHName').textContent = otherProf?.username || '?';
    if(otherProf?.avatar_url) {
      document.getElementById('remotePHAv').innerHTML = `<img src="${otherProf.avatar_url}" alt="">`;
    } else {
      document.getElementById('remotePHAv').textContent = otherProf?.emotion || '👤';
    }

    await startOutgoingCall();
  } else {
    // Incoming mode — listen for calls
    await listenIncoming();
    toast('📞 ზარის მოლოდინში...');
  }
}

window.addEventListener('beforeunload', ()=>{ stopRingtone(); });
window.addEventListener('load', init);
</script>
